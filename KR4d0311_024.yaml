body:
  text: 啓一謁莊提舉啓鐵硯關心莫續盤洲之脈繡衣具眼好開泮水之荒雖離竒了無先事之容而啐啄或有同時之理不孤此志端繫其逢昔者東坡之門卓然北斗之望惟斯文之宗主在是故當丗之豪傑歸之后山仕徐嘗賦稻苗待公秧之句山谷遊魏亦哦小草有逺志之詩皆繇郡文學之官自附墨客卿之列品題一出聲價倍增四學士之名等華嶽而俱重六君子之選與日星而並垂此風無傳吾道誰屬必宗工之繼作則善類之爭趍伏念某骨相蹣􅘐性資骯髒悲歌長鋏盾鼻之檄未能活計短檠床頭之易猶在颯重闈之白髮峭獨冷之青衫訪三洪於故國之中拜一范於公堂之上湖山醒夢何嫌書懶讀之嘲山色療飢敢為飯不足之歎顧此遊之不惡知其命之將通恭惟某官吾儒津梁斯丗鼎吕辟雍講道激揚洙泗之波祕府紬書排戞蓬萊之氣胡斜飛而背日肯夙駕以觀風以胸中之鏡而照老吏之百姦以肘後之方而起疲氓之九死且力扶於公議每樂得於英髦有覬賞音遂忘躍冶僖公六轡九頓首於先驅惠子五車一點頭於後覺歸依良切敷染奚殫謝葉提刑薦啓泮水思樂熟觀魯侯之旗舞雩詠歸首與曽點之瑟孰蚍蜉之借援自蜾裸之投機引而進之望不及此竊以古靈之藁莫匪名臣溫公之門類多君子惟相知不在肝鬲之表故一見盡得眉睫之間信公道之主盟乃人材之司命如某者拊缶不韻挈瓶無竒遇會意之文時擬景福靈光之賦求安心之法日對布衾陋室之銘羞褦襶以不為任揶揄而弗顧正請老農之學忽求病躄之師抵掌而談古今千歲可坐致也屈指而計日月期年尚竊遲之豈期夜雨之燈忽入春風之筆先鞭方著歸衮難留溘埃風而上征殿奔雖後過屠門而大嚼知味已多儻自兹或尋覆蕉之緣則其他可乘破竹之勢造物所相終身焉依兹蓋伏遇某官列戟名家褰帷膚使抱王霸之略前身江左之夷吾主人物之評後丗汝南之許劭障末流於既倒牖晚學於方來淑氣一噓韶華四滿猶謂踈枝冷蘂有未放之寒梅縱令換葉移根亦舊栽之紅藥軒昻露剡特逹知音某敢不恪守官針勉求師説四方逐東野自今有入道之門一瓣為南豐何日是報恩之地謝費提刑薦啓光近繡衣久跋八鸞之末褒榮華衮忽開三鱣之先一舉軒然斯文幸甚嘗觀種樹之傳因得論花之評香出淤泥濂溪之愛蓮未為過影橫籬落和靖之好梅正自佳其或合山樊水仙而為弟兄以至集海棠酴醿而與賔客雖非同調還許聮芳如某者狷有弗為懦知自立收心學問不過乘欵假而稱善人抗志功名未免帶櫑具而見公子來習青青之佩得依皇皇之華曲為吾道之主盟不以衆人而見遇念瀕於滿盍寵其歸飛一鶚於霄漢之邊送乘鴈於江湖之上俾之末綴假以先容兹蓋伏遇某官功過于張材如房杜轉移風俗力可以回萬牛主張人材言足以重九鼎滋蘭荃而方茂擷芹茆以尤勤遂令孤枿之微亦殿群英之後某敢不篤於信道期以酬恩誦醉時歌寧嘆廣文之冷作進學解尚觀宰相之方過此以還未知所措謝鞏都大薦啓虎鼠不齊幾多屬吏熊魚兼得獨一門生異哉知已之深榮矣終身之託嘗觀古人推賢之道因得君子引類之心仁傑之舉柬之婁稱為宰相之器蕭何之薦韓信數謂有大將之材言不厭多用然後已每嘆此風之寖逺不圗今日之猶存如某者真是孤寒甘從獨冷過辱諸公之遇特開寸進之塗著從事之衫固知有分給尚書之札猶嘆無因忽聞一鶚之飛復許六鼇之掣俾與政事文學之秀者早及英華精鋭而用之兹蓋伏遇某官範世清規鑄人妙學以修明公道自任如日行天以涵育人材為心如川赴海最憐冰砥之芹藻屢采水邊之芷荃始終三年盻睞一意某敢不力守狂狷之行多讀聖賢之書陳古靈疏名以聞未知所報趙韓王綴奏而進更大其成國士自期墨卿莫究回鄱陽章宰啓閲千佛之經升沉有異作同官之記先後無多分桃李之餘隂動茆芹之生意恭惟某官氣摩霄漢手摘星辰過秦論以來復見作者諭蜀檄而下蓋優為之蜚聲翰墨之埸抗志功名之會凛凛胸中之兵甲堂堂眼砥之金湯八面當鋒一身是膽張睢陽之罵賊誰解秋圍劉并州之却胡竟成宵遁勳當居最賞未酬勞收唳鶴之餘聲躡飛鳬之雋武未施於事已信其能三異政成沸弦歌於東楚十行詔下鏘環佩於西崑某一第八年重親寸祿睨健翮於扶搖之上抱寒根於寂寞之濵匆得年盟好為道地有酒酤我不須問識字之竒退食自公政可説從軍之樂通交代林教授啓才名方册之間願從而後交好佩襟之地偶在其前粳粃包羞藻芹增氣恭惟某官學傳伊洛文過朝張橫絶銀河織天孫之雲錦倒翻滄海弄明月之驪珠妙舍選之青錢髙臚傳之淡墨欲培所養靡疾其驅乃眷楚東庠序之林實為江左衣冠之藪一關隔市俗客不來雙塔照湖偉人間出冝得胡安定之宿望以修范文正之遺規螺觜地清聊對簷花之雨螭頭天近即迎御柳之春某喜共儒門愧妨賢路經腹之嘲未解刀頭之夢頻驚遺君子以桃李之埸逝將去此納諸生於芝蘭之室尚亟圗之生日回學職啓乾䇿年華方驚去速土圭日景又欲添長雖無蛻鶴之姿僅有聞雞之志辱髙懷之期許迂雋步以臨存出幼婦受辛之詞推老人甲子之數絳紗幃砥欠度曲之雪兒青玉案邊付誦詩之驥子其為感佩未易名言謝黃留守科目啓分教三年受察詩書之帥去官數月登名文學之科藐無地以先容恍自天而下墜得公借重舉丗知榮竊以古人以文表見者蓋多後丗隨手澌滅者皆是作毛頴傳猶謂類俳續春秋經或譏失僣要得宗工之印可始成後進之聲名伏念某嗜古忘餐愛竒成癖有歐陽必同歐陽之説期之千百年之餘非子雲莫好子雲之書豈以一二人而輟未離翰墨之徑遂墮虀鹽之埸患在為師教因知困謝江郊之陳迹臨京國之迷津吾黨雖狂誰門可扣遽辱收千金之敝帚奚啻獲一壷於中流機會之來神明所相兹蓋恭遇某官日光玉潔山立時行著書立言襲六為七而無愧解疑辨惑問一得三而有餘發先儒之所未傳使後覺之有定鄉頃東遊而納謁因北面以知歸見若平生期諸晏歲不謂久違於矩範乃蒙肯記其姓名雖無子固之文亦應溫公之格某敢不益強所學期放厥辭日近長安喜聽衮歸之詔雲趍材館終歸鈞播之功宗教謝廟堂啓虀鹽有分未寒侯頖之盟槖籥無私仍玷宗庠之選寸進當安於常分一命皆出於至恩拊已包羞逢時知幸竊以東平為善之最樂河間大雅之不群由其得涵養學問之源所以忘生長冨貴之習欲陶成於公族必鑒擇於師儒如某者久坐文窮難醫書癖頭顱如許敢謂絣䌟有封侯之方面目可憎自知管城非食肉之相末第坐踰於一紀冷官僅了於三年畫餅可觀炊沙不飽靖念皇極無棄人之法况當太平樂與賢之秋歸誠光範之門妄意翹材之館惟愛人之以德故應物之無心謂其嘗在文學之科可使往分屬籍之教資格雖慙於黃甲姓名猶託於青氊磨鐵硯以為期徒抱益堅之志垂玉衡而在上莫名平施之功兹蓋恭遇某官德享天心功在王室綱維萬化國有關雎麟趾之風羽翼群經人由中庸大學之道力任斯文之重妙裁吾黨之狂權度無差斗筲不棄某敢不篤於潔已思以淑人遲瓜戍於八年之餘疇能縮地速化功於一息之頃尚覬回天捧戴惟深刊摩罔既謝莊中書舉自代啓禁路問津首玷十科之選詞垣正席仍推三字之儲賞音愈久而愈深推轂不進則不巳感由心刻聲與淚俱竊以東坡免試而薦伯修南豐𥘉除而舉貢父是賔是主無古無今如某者鐵硯僅存金桴何有少未聞道徒寄榮華於飄風之中晚悟作文頗見涯涘於霜降之後抑而為説難孤憤放而為牢愁反騷是特不平之鳴殆非有用之學胡傑出於一佛俾同升於諸公舍旃舍旃茍亦無然雖讒波之可畏類我類我久則肖矣終恩地之有歸對黃茅白葦之秋光借紅藥蒼苔之春色聞風甚偉學步良難兹蓋恭遇某官道德宗師文章宿老紫微閣靜一揮贊普之書白玉堂深婁草河涼之詔每謂絲綸之手要須錦繡之胸豈無他人正在我輩為命得禆諶子産顧不韙歟稽首遜殳斨伯與亦幾過矣某敢不彈冠而起執筆以從醜婦效顰詎作金屋人家之想癡兒説夢尚追鈞天帝所之遊銘德惟勤抒詞莫既謝廟堂啓雷霆震疊正切省循日月清明遂叨抆拭轉化功其有力戴恩紀乎無涯竊以剝復相乘者隂陽之機生育不窮者天地之德蠖伸於屈沍寒之氣回春苗稿而興大旱之雲為雨凡物皆爾於人亦然如某者魏瓠中枵晉錐外鈍生涯牢落𥘉無郭外之田學殖荒踈僅餘床頭之易或喜其有山林之氣或疑其非邊幅之材竟坐五窮難逃百謫大為丗僇方無地以容身過重親憂遽終天而抱痛所欠一死不圗更生緇衣之冝又改為兮端出中心之好白圭之玷尚可磨也大明前事之愆復俾臨民免為棄物兹蓋恭遇某官身任四海九州之重道為五帝三王之師排斡黃河回天下不能回之勢涵渟滄海受敵已所難受之言趙韓王開國之元勳文潞公服人之厚德相去幾丗合為一人乃若以春秋為繩丗之權以皇極為用人之法平心而運公是以昭脫諸千仭之淵示以九逵之路虎豹啄下人些知莫扼於九關鸞皇為先戒兮願早施於八翼大造所及終身焉依謝廟堂差幹官啓公朝天大甫開荆棘之塗邊閫地雄遽綴芙蓉之幕驚魂復返感涕交流蓋嘗絶大江而東遊倚長淮而北望雖有可乘之機會未知一定之規摹苟於偏安殆非孔眀公瑾之志急於進取未免蔡謨羲之之憂雖堅忍可與成功而審重最為上䇿首擊尾應尾擊首應要莫測於吾謀我出彼歸彼出我歸使常牽於後顧縱未大尉乎玄黃之篚亦可坐弭乎赤白之囊責在元戎亦資婉畫如某者交無狗監泣有牛衣滄浪濯纓早嘆鬢毛之颯太行倚劔斗驚髀肉之盈居紛紛其離郵分落落乎難合化功一轉生意頓回朝刋黜籍之丹暮剡辟函之墨拔從九地置在重霄巴西此日之放麑可謂仁矣塞北向來之失馬詎非福耶矧去家無千里之遙而望祿特半年之近生成至此稱塞謂何恭惟某官以社稷臣為帝王佐十年生聚十年教訓坐凝更化之勳一歲力役一歲戍屯深軫佳兵之慮惟尊安中國以為急斯鎮撫四夷而有餘既素定於廟謨尤不輕於邊瑣大先謀帥細及簡僚遂令守玄尚白之蹤亦在依紅泛緑之數某敢不痛心前轍加意後鞭不徒丐升斗以養親庶幾展尺寸以報國平定安集况曽讀建武天子之詔書踴躍歡呼所願草頡利可汗之露布依歸大造誓畢餘生通崔安撫啓捧研從遊久綴門人之列分弓庀役就充幕吏之貟天巧其逢人榮所託竊以小范之帥環慶舉張方平大蘇之牧中山進李端叔兩公辟士之盛事百丗知人之美談不圗晚生親見前輩恭惟某官光明而亮偉端重而沉深望之儼乎道德之容挹之薰然仁義之澤驅千兵萬馬於筆下風雨恬霽而無聲吞五湖三江於胸中波濤舂撞而不動剸兕麻源之右掣鯨桂海之南清畏人知靜忘物競其去也諸公挽留而莫可其歸也四輩趣召而後來甫躋郎省之華亟填戎垣之重秋風保障威行萬竈之煙春日耕桑歡動一犂之雨淮南倚以為脈山東聞而屬心况狐兔失穴之餘正貔貅扼塞之日人皆輕進公獨隱憂謂中原機會之方來而外治規摹之未立灞上棘門如兒戲耳尚遺債帥之風方城漢水雖衆用之未免市人之戰要須強國勢於精神之表乃可制虜命於掌股之間反覆開陳庶幾感悟彼竪儒幾敗乃事徒諉諸一勝一負之常此元老克壯其猶必運以萬舉萬全之略寧少遲於遄召庸迄奏於膚公坐縳可汗盡還輿地某四年食客三丗夙緣濟慈航於黑風大海之中送靈槎於黃河昆侖之上烏幕濫巾於溫石兔園接𬒮於鄒枚誓上下以相隨抑東西而惟命誦蕪城之賦熟形勢於曽來續泗水之碑寄功名於不朽矢心歸倚拜手敷陳謝崔安撫舉改官啓子來幾日甫爾依紅我有二天居然破白惟屹立於丗方橫潰之表故力挈於人不比數之中抒敬瓣香歸恩丈席竊以人材由江左而降幕客在淮南為多韓魏公得王金陵而不及賞音牛竒章辟杜書記而未嘗推轂遂令遺憾尚見前聞伏念某讀書不多涉道更淺方其始鋭自謂五石瓠可剖以為樽逮此中艱乃知六州鐵猶鑄不成錯以舟行岸移而閲丗變以霜降水落而觀物情虛憍寖平剝蝕漸復冨貴非吾願未敢云然貧賤玉汝成容或有此然紛紛成敗之異論而咄咄炎涼之易情不圗一日之逢遂有終身之託拔從食客列在屬僚歲寒東閣之梅結根已舊春色平山之柳成蔭方新廣平下坐而揖之前相如末至而進諸右使無地主誰破天荒兹蓋伏遇某官功蓋三邊眼髙四海論材以相馬之法觀過於奪牛之蹊得一士於河南了無貴戚之命空群良於洛北惟有山人之媒共驚甄拔之殊誰識機契之早五更進履已是會心半夜傳衣不容放手故於落落難合之會而有沾沾自喜之榮上下四方盡是依劉之地始終一節敢忘在莒之時銜戴實深編摩抑略謝丘安撫舉改官啓從莫府之遊甫當春後上公車之薦忽在秋先軒軒特逹之知落落希闊之遇得之驚躍傳者信疑竊以槖駝種樹以蚤實為功狙翁賦芧以朝得而喜伊物理之猶爾豈人情之不然矧墮七選之坑欲結五剡之塔寧為雞口母跋狼胡必考素以點頭始探期而入手如某者有婞直之短無趍和之長肝膽輪囷據鞍之髀易滿頭顱蕭颯讀書之眼尚明不能忍藜莧之飢漫欲決枋榆之起勉辭襏襫來拂兜鍪多以白面書生而見嗤獨得紫髯將軍而許可樂哉飛泳藉甚推揚著鞭要使出祖逖之先成佛肯教在靈運之後未回沆碭預借扶搖兹蓋伏遇某官親得南軒之傳丗濟文定之美非有心於冨貴而冨貴自迫不求名於氣節而氣節更髙脫彼少年新進之埸運此真儒無敵之略識微見逺常懷猛虎出柙之憂強本折衝自有老羆當道之勢至若虛以接物而謙以下士明於見善而勇於拔材又當路諸公之所難實舉丗善類之攸屬矧在晚出亶為至榮本無疇昔之緣便蒙刮眼不負平生之學即是酬恩百喙可窮寸襟莫寫賀侍御啓榻前承渥柱裏升班物情大旱之餘適蘇霖雨天象太微之次首應法星九重侈知人之明四海享任賢之福竊以兩儀具清明廣大之體萬物鍾扶輿磅礴之靈得其中和者為景星為鳯凰全其剛正者為屈軼為獬豸况千古之間氣生一朝之偉人如伯夷聖之清如孟軻勇於義用能任天子耳目之寄于以壽皇家氣脈之傳恭惟某官步趍聖賢冠佩道德旁蹊捷徑不求少室之山絶岸孤峯坐閲瞿唐之浪顧環轍之久矣終覽輝而下之簮筆烏臺伏蒲騎省上不為危言而駭聽下不為矯節以沽名惟致辨於君子小人之間而防微於宦官女子之際外邪不入元氣自充以培社稷無疆之休以兆國家中興之象深締邃嚴之眷進顓雄劇之權堂堂不撓為儒宗謀猷惟舊行行且止避御史風采又新然而一論列關吾道之盛衰一建明係斯民之休戚時雖無闕事或可言士夫懷寡廉鮮耻之風將帥乏趍事赴功之志戰守之規摹靡定賞罰之綱紀未張斜封尚費於調停橫斂更多於朘剝惟正人用則國勢重於黃鍾九鼎惟公道行則人心安於泰山四維此皆前日之已言抑亦于今之最急願申谹議迄濟丕平當今文靖之警君復聞于丗母使清獻之論事專美於前狂斐一鳴隕越萬坐謝李坡舉自代并應詔啓草正元之諌疏既許同升應建武之詔書又蒙特舉人驚再推轂於期月之頃誰信屢擊節於十年之前撫往事以慨然幸平生之有此伏念某灌畦自命媚竈不能忽起市虎無端之疑遂罹蹊牛巳甚之禍丹心獨破疇能百口保之白髮相看寧忍一家哭矣已甘墮地之棄甑不謂中流之得壷剪𥿄而招驚魂探囊而起壞證雖乏洛北山人之譽亦備淮南幕客之貟憐抱影之零丁為騰書之旁午六鰲連掣五鶚齊飛它人不足而我有餘大造已多而公未倦讓夔壤龍而讓朱虎誠過乎謙進豹進鮒而進樂羊抑何其力所謂真知已者夫豈輕豫人哉兹蓋伏遇某官地望如山門庭似水萬斛轉柁運平國論之偏五色輔裳彌縫君德之闕其正足以用大其公足以生明去小人如去稂莠不厭其芟夷愛君子如愛𣏌梓寧過於封殖引蔡襄而居同列有言必酬薦唐介而處要官弗進不已爰得魚而取掌仍騎鶴以纏腰曷勝自喜之情猶有無厭之請苦心選佛固慙衣鉢之傳凡骨登仙更乞刀圭之賜寸忱有屬尺禇奚殫謝制使李尚書舉改官啓謁裴度於洄曲之營最居人後拔杜牧於淮南之幕忽處衆先得之擊地而驚恍若從天而下竊以前輩所謂汲引孤寒之綆近丗以為攀結權要之梯倚冰山為太山延頸待囑指鼠璞謂荆璞拱手奉歸名為蓄吾家之參苓實則種它人之桃李自喜得計烏知可羞若其點頭堂下之一言具眼坐中之小異幾年無此一日見之如某者材非竒竒老已冉冉方虛憍恃氣安知涪翁四句偈之有功逮拂亂動心始信􅱼山三字針之得力眇鴻毛其自命蕞雞肋以何求朅來刀斗之鄉偶備櫜鞬之役既不能磨盾以草檄又不能推枰而畫籌第於內外臂指之拘攣與夫上下精神之消靡多所感觸為之隱憂顧國事以如斯於身謀而何有炎門耻炙捷徑甘賖道之將行歟但居易以俟命人莫我知也欲忍窮而著書不圗負壑之秋乃有回瀾之力未齊五鶚先獲一麟固非曹劉沈謝模索以可知且無金張許史遊揚而為助逈出望表猥塵選中兹蓋伏遇某官翰墨大蘇威名小范黃髮鯢齒入奉壽母之歡織文鳥章出寬聖主之顧以忠孝兩全之懿用文武兼資之材號召青齊指麾燕薊已斷胸奴之臂行􅃮月氏之頭與共功名孰非豪傑乃至噓一寒之谷欲使脫七選之坑以勸著鞭以愧刓印偉此舉之尤特信所關之匪輕某敢不敬佩十六字之褒期答二三䇿之取丸藥生翼𥘉匪求而得之瓣香報恩當有大於此者卷卷銜戴切切敷敶謝權帥洪提刑薦啓騎楊州之鶴正切夢思冠楚人之猴忽叨論薦嗟丗道之寖薄幸宗盟之有歸竊以絲苓同生於松而絲託苓為根蕖荷皆出於藕而蕖倚荷為蔭惟鼻祖源流之無間故耳孫枝幹之相依伏念某少耕潛山壯宦鄱水訪盤洲之事業正印難傳誦野處之文章餘燈可續奈九京之不作竟千里之空還昔期芳菲菲而彌章今歎景翳翳其將暮不圗州牧出我丗家蔚乎相扶日有川泳雲飛之樂劃然長嘯時窺山鳴谷應之機胡人事之方乖曽身謀之靡定帆隨風引舟挾岸移長鋏自隨勃窣兜牟之砥短檠相對凄涼刁斗之邊皇華不隔於照臨吉語忽傳於吹送一鳬巳去五鳯俱飛雖狄武襄之譜梁公大非吾耦然吕文穆之舉夷簡豈無它人出於真情有此竒事兹蓋伏遇某官器能管樂苗裔韋平材恢恢乎辦多身矯矯其立獨山韞玉而自潤粹然有道之容水中凖則不爭淡乎無我之意扶立故家之喬木挽回末俗之頽波涕唾熱宫金玉寒畯謂族姓如晨星之有幾况主賔與春風而俱和置冗迹於四賢借華褒於一字俾懋所學用昌斯文白髮聲名愧難齊於二陸青雲步武尚自附於三洪深感于中姑陳其槩謝賈制置特薦啓小單于之膽落方集竒謀大都督之眼髙首薦下士試新刻黃金之印署獨銜碧玉之章同日歡傳一時盛事伏念某萬無能役一不敢欺滿架插書自矜鄴侯之冨舉家食粥誰念魯公之貧風霜不貸而枝葉凋歲月已老而根幹在往來塞下出入兵間車轔轔馬蕭蕭每痛心於浪戰田確確牛㕰㕰更攬涕於煩輸兩年之賞識固多一旦之遭逢九異蟻隨磨轉鴈逐陽飛趨幕折腰甫識少陵之面上堂携手已知􅎦蔑之心聽説劔於酒邊許推枰於燈下良由機契遂以名聞兹蓋恭遇某官貫穿古今揮斥宇宙望長安於灞岸一生忠義之心進雍丘於淮隂百戰功名之會用紹興分道之典故施慶曆定邊之規摹既綏靖於山東且經營於河北築臺延士思得良籌推轂進賢不遺餘力爰俾摧頽之下走亦蒙特達之殊知念圖報之無它惟納忠之有益虎兕出於柙曩嘗失於防間蛇龍放之菹今盍思於區處勢必知已而又知彼權當在我而毋在人御衆莫若寬平制敵無如審重財散則民乃聚食足則兵自強此皆巳見於施行務在更加於推廣大孚衆望弘濟中興繪像雲臺不愧膠東之傳磨崖浯水願書元結之碑觸突有誅震愓退聽平齋文集卷第二十四
