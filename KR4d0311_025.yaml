body:
  text: 啓二通李參政啓退思巖之勳名聞從諸老獨樂園之風骨識後群兒惟伯陽實出於洪冝孔融自通於李輒將一瓣仰扣六符竊以武侯未起於草廬熟知成敗晉公雖逸於緑野常佩安危上天非無故而生賢君子蓋有待而行道矧今大勢異昔平時朝廷未深察取燕之圗邊鄙或復用攻遼之䇿國計捉襟而見肘民生剜肉以醫瘡士懷諉鶴之心將有養鷹之志屯棘門屯灞上視紀律以如無出斜谷出祁山問規模而猶未縱使置一勝一負於度外可不計五大五細於目前鬱攸煽熖而薄京師熒惑吐芒而犯帝座仰占天意似應人謀朋黨漸萌未免向時一網之慮元良未定豈無異日半𥿄之憂波方急而維楫莫施證已壞而刀圭安在上深念此公有意乎恭惟某官道德宗師文章宿老太山之雲為雨自有機緘虞淵之日洗光不動聲色方權姦之用事惟明哲以保身幾年出鄴侯以避元載之鋒一日進弱翁而正霍禹之罪雲霓盡掃宇宙復清五龍夾以飛既展濟時之略四蛇入其宇𥘉無求丗之心鋤梅花之月於未春飲木蘭之露於將曉觀渠血指攢我醉眉然救否者莫謹乎苞桑而反剝者亦由乎碩果離當復合危可使平我公有衮衣以歸趣登上相天子負斧扆而立迄濟中興某涉道未深謀身更拙聊爾署冗銜於𥿄尾居然託後乘於遨頭矯詹峨眉太白之間知有東坡頴濵者在雖執鞭之晚矣尚捧研以從之蓋欲質平生書囊之疑豈止為方來夾袋之地後天下而樂况曽協於寅恭安宇內為先願無忘於辰告寸忱所屬百喙奚殫上劉閣學啓駟玉虬以征尚遲牀下之拜騎青牛而過敢後道傍之迎顧斯文千古以無傳而前輩百年之幾見熟窺梗槩粗識源流蓋自蜀公以來始有後溪者作其清明則青天白日其髙深則太山黃河參古今之典刑具出處之本末權門鼎盛在熙寧自拔於熙寧聖化更張處元祐不黨於元祐以雞鳴嘐嘐之志追鴻飛冥冥之風去不可留歸猶未老巡梅花而索笑浩若胸中之春樹諼草以忘憂蕭然物外之樂盡醉於田父泥飲之頃相忘於舍者爭席之間文章散落於人寰翰墨流傳於夷裔雖有詔以強起曽何心於復來然而一飯不忘乎吾君百方欲濟乎斯丗有關廟畫每以驛聞宗磐未強首陳儲嗣事之十九疏民瘼已亟次及條例司之數千言伏孤忠以直前犯衆怒而不顧亶為仁者之勇兼得聖人之清天下之逹尊三孰如公者國中之儒者一其捨我乎賜劔履以給扶偉衣冠而入侍某遨頭後乘鉗尾冗銜每思退續離騷之詞何幸親問太玄之字觀神和而氣定知目擊而道存自憐孺子倥侗毋惜一編之教更願老親強健亦如三壽之朋敬在下風有如皎日上安宣撫啓魚鳬蠶叢以來形勢千古伏龍鳯雛而後勳業一人朝家西顧以寬憂屬吏東鄉而聽令九卯旗之近三熏子墨之恭竊嘗泛觀古今制敵之機頗識東南立國之勢腹心江浙腰膂荆襄維蜀道之山川如人身之頭目吳合之則可奪曹瞞之氣晉失之則難折阿堅之謀雖太白峩眉四萬八千年始通中國然西陵江都五千七百里莫重上游唇亡則齒必寒首擊而尾自應欲混鼎峙三分之地無如坤維半壁之天恭惟某官抱王佐之材任天下之重乘雲氣騎日月橫騖泬寥之間簸鴻𪷟扇雷霆獨立汗漫之表以道義養吾之大勇以忠忱運我之壯猶唾怒虎其方拏截奔鯨乎已沛聲子璋之罪血模糊於髑髏正劉闢之誅刀紛綸於膾脯三綱垂弛以重立四極既搖而復安逮黑谷之繹騷重緑林之俶擾病逢壞證棋入危機人寒心而莫支公攬涕而又起矛驅海若障漢沔之頽瀾甲洗天河斂殽函之妖祲威行夷夏功塞堪輿盍歸上相之班猶坐元戎之帳以西土之方靖冝東人之欲留不惟後徑以中權要使左饘而右粥勃律天西之野春草犢肥蓬婆雪外之城秋風馬臥惟梁益無鳴弓之警則荆楊享奠枕之安紀社稷之元勳申山河之信誓微管仲其左祍矣夙髙耆定之謀歸周公以衮衣兮佇翼升平之運某暫汙班尾即趂遨頭顧治中之非長置貟外而奚益惟大莫府推赤心而聽計而小朝廷開青眼以延材甘踏羊腸願詹馬首出師一表既於伊訓說命而有光皇武兩詩當視吉日嵩髙而無愧委心歸倚拜手敷陳添倅到任謝廟堂啓東望日邊迷前塵於班尾西來雪外陪後乘於遨頭轍行地以雖遙梯倚天而實近作平生不到之夢出造化非常之恩伏念某文字蟲魚姓名蟣虱逼仄何逼仄定非湖海之豪伊優自伊優粗有山林之氣襲子長南游之遺跡放少陵北征之壯懷捩淮柂以方休掛江帆而又去石頭牛渚六朝名勝之如存夏口烏林三國英雄之安在木葉秋飛於楚些竹枝寒送於巴歌每渺渺以凝思還逢逢而催發灘稠十二培之上路繞百八盤之間鹿角狼牙旋渦正沸虎鬚龍脊激浪欲飛電驚鮓甕之谽谺雷吼業牀之濆薄寄性命於一蔑蕩神魂於兩橈可謂人生之畏塗然亦天下之偉觀三峽矗井絡而上動搖星辰一川翻月窟而來傾倒河漢屏巫山於絶岸柱灔澦於中流峭立百牢之關橫陳八陳之磧腳力未窮於涪萬目光已射於岷峨萬里橋邊啁哳估船之曉百花潭上喧呼藥市之春以治中别駕之冗貟追方外司馬之樂事經行所到獵取巳多進可賡王褒益州之詩退可續太冲蜀都之賦匪私鈞播疇與玉成兹蓋恭遇某官道大而有容功髙而不伐謂紫雲樓之議論在安細民而天章閣之條陳務去宿弊咄坤軸之萬里邈君門之九重碩鼠多貪小鮮易擾既擇蕃宣之雅望又收關决之駑材俾笏而魚隨琴與鶴惟民愁之既劇且兵調之方殷衛公籌邊之圗必精思而制勝武侯出師之表非快意以徼功要當為根本之謀乃可固藩籬之勢勉毗鎮撫期答生成一弛一張知妙得濟時之略五細五大願早施醫國之功言非所冝死有餘罪通成都倅啓手弄參旗快治中之展驥眼穿危棧容貟外之題輿凄其一葉之來幸甚萬間之托恭惟某官儲岷巫之秀傳坡頴之源天孫雲漢之分軒軒傑作巨靈太華之擘矯矯竒材藏諸用而不窮隨所施而可紀盍陟道山之峻猶迂錦水之遙泥軾生光油幢倚重浣花勝踐聊接武於遨頭視草新除便問津於龍尾某淮城久戍蜀道遐征雖云裂風月而三之不過旅琴龜之一耳古心而又古貌自信獨難異人而得異書相從未晚回節推䄂啓殿上呼盧之䜟早動諸公幕中倚馬之材肯交餘子接茵巳幸銜𬒮何謙恭惟某官琅琅國子監之書爛爛蓬萊宫之賦一通脫手萬乘改容杜書記在其下風嚴少尹置諸上客如石投水猶珠生淵指籌邊之兩圗平章蠻徼草出師之一表號召秦關盡搴芙蓉之華遂翻芍藥之影某幾年心敬一日眼明略窺小陸之文已識大任之韞屋頭問訊欣雞犬之相聞劔外征行恨燕鴻之相避回僉判䄂啓星槎仙客忽來笙鶴之聲雪錦主人益壯琴龜之氣辱在聮事願言定交恭惟某官賀白材名朝黃文采集芙蓉之裳而修𥘉服不著一塵卧蓮葉之舟而讀玉書平吞八極屢試發硎之刃難藏露頴之錐宣閫拔尤戎垣借重落筆於龍筋鳯髓之上寄興乎魚泳鳥飛之間姑贊籌邊即登天祿某逺趨幕砥近接墻隂合簮甫挹於清摽攬𬒮首勤於好語手遮西日曷圗橫草之功腳踏東風當共浣花之樂龍州到任謝廟堂啓萬里橋邊甫解佐州之組百牢關裏忽分護塞之符名未登聖天子之御屏身巳入真宰相之夾袋夢想不到頂踵有歸伏念某冰霰窮崖風濤苦海藐爾幾年之流落軒然一旦之遭逢𥙷太廟齊郎入扣天田之角與京官通判出捫雲棧之參了無關决之長惟佩丁寧之訓一來錦水四度劔門雖弗陪大莫府之賔猶自詭老元戎之客其於徇國靡忘愚公移山之心所謂籌邊但進彭祖觀井之法偶畢葵丘之戍方謀栗里之歸不圗寒根遽動春意兹蓋恭遇某官胸中水鏡筆下化爐有猷有為有守則念之得箕子建極之意乃牧乃事乃凖惟后矣循周公立政之規凡諸老退而無營暨衆正用之未盡大為坯冶悉入搜羅上關豐芭數丗之仁下應泰茅三陽之象為今元祐嗣昔淳熙矧墮甑之餘生乃播鈞之舊物亟令剖竹靡俟需瓜歷吉日以問塗遡下風而委命丹心許國敢矜畫㦸之榮白髮倚門第想綵衣之樂兩全命誼一出生成謝制置崔閣學啓目送飛雲欲問吳頭之路手遮落日忽乘蜀尾之關告赤崖父老以天子之聖仁諭青羌種族以元戎之威信凡束襟而聽令皆彈指以知恩伏念某危機熏心老色上面拍銅㪷而舞角鋭之習巳空摩石鼓而歌嗜竒之癖猶在惟鷽鳩不能以自奮故駏蛩有待而後行追隨一琴跋履雙劔草左將軍之檄雖未愈於頭風誦崔大夫之詩亦能驅於瘧鬼滿冝去矣行復尼之走絶棧之危途訪縋兵之間道邦人嗟異昔無朝士之來山獠傳呼今見幕賔之出樂郊至止道院蕭然長嘯而萬壑譍獨立而千章拱真成吏隱何有官癡兹蓋恭遇某官心與造物者游身任天下之重以強國勢為定三秦之根本以收人材為用四蜀之規摹乘鴈雖多前魚未棄始平辟司馬以丞郡其事略同小范挾師魯以行邊所期更逺故雖公斯丗而稱物未免私其人而擇官矜此踈庸置之簡靜俾於撫字催科之暇而求切磋琢磨之功為君子儒從先生後類我類我久則肖敢忘函席之規式微式微胡不歸尚尉倚門之望請事斯語有如大江回生日啓年華垂暮久矣倦游月紀就盈依然𥘉度影留積雪之表心在飛雲之邊何勤記存特枉慶問夸詡斑衣之樂鋪張黃絹之辭義重同寅情深泛愛贈之秋菊知欲制於頽齡歌以木桃尚無忘於永好迓鄭制置啓入侍中宸出制外閫西控六詔磊落籌邊之圗北定三秦淋漓出師之表惟卧龍之規橅素定故刺虎之機㑹可投氣壓赤雲聲搖紫邏恭惟某官學空萬古名塞兩間緇衣敝豫又改為兮典刑尚在朱弦倡而有遺音矣格調更髙岸巾湓浦之秋風舉酒平山之春色吟懷激壯酣膽輪囷論山東之事冝浪戰非䇿指淮南之形勢寢謀在人上知為天下之竒材公請當今日之重寄方整雍丘之役又嚴斜谷之征惟井參之上游與關隴而錯壤枕戈雖切傳檄尚遲豈人謀之未臧抑天運之有待虜乘丙午之釁而犯梁汴于今百年我應甲申之䜟而破秦川在此一舉開誠心以集衆智倡大義以激三軍招搖所臨攙槍如洗天生晟非為朕亟收耆定之功帝咨度遂相豫丕贊升平之業某一身虎鼠萬里駏蛩昔凌斗野以從游今介雪山而聽令慨斯道之孰主誇吾邦之有人未暏前茅已占破竹讀長安之露布相與歡呼賡涇水之鐃歌尚知興起𬒳旨奏事謝廟堂啓瞻太行之雲心方搖於西徼近長安之日夢忽到於東華天道以從欲為仁人紀以錫類為孝綱常立矣聖賢能之竊以行卭郲九折而去官漢許全於子道守西山三城而入奏唐使便於親闈蓋天下之至情冝人上之深察伏念某汚邪家丗窶藪身名王粲問從誰猝猝行邊之志顧况悔生汝依依去國之懷泝瞿唐灔澦而西躡龍門石匱以北趼足萬里回首五年江上秋風影斷未歸之鴈城頭落日魂飛返哺之烏讀何蕃之傳而躊躇覽孫寶之章而愓息去天雖邈控地有祈但為昏定晨省之謀乃叨朝奏暮召之寵父曰嗟豫子行役展轉許時昔我往矣今來思團欒有日舉家歡舞行道榮觀兹蓋伏遇某官以躬行作百丗之程以性學立三才之極大既和於民則細亦盡於人情四牡之啓處不遑聽其來諗杖杜之憂心孔疚知爾懷歸况家山正在紅雲之旁而菽水難供白雪之外俾趍北闕就養南陔所謂老者安少者懷莫非仁之至義之盡第閶闔護關之有虎蓬萊引棹之常風可恃而前惟繫所主三吐哺三握髮行窺上衮之光一舉足一出言永戴洪鈞之施過此以往未知所裁賀廟堂定䇿啓劄恭審以一代元勳定萬丗大䇿生靈有主社稷無疆嘗觀歷代之源流因考置君之本末奉之冕服伊尹在太甲為阿衡逆以干戈召公相康王作顧命凡邦家奕丗之慶皆宰輔得人之功秦不足言漢亦未善代王之入以太尉陳平何為曽孫之立以將軍楊敞不與或外戚推擇於襁褓之內或宦官操制於掌握之中託周公行事者皆然如武侯用心者有幾以至晉聽之司馬之處分唐付之中尉之轉移倒持太阿擅弄神器忠如狄仁傑中宗僅付諸人智如李衛公宣宗不出於己噬臍莫及扼攬徒多惟我熙朝若時元老藏書金匱定大業於兄弟之繼承漬墨水盂扶正統於父子之授受顧託之寄在宰相擁立之權歸朝廷大典具存盛事復見某官相先帝十七年之治培皇家億萬祀之休巍巍煌煌無逸太平之業濯濯赫赫嵩髙中興之謀逮慿几之道揚重嗣服之付托謳歌之啓而人心屬曆數在舜而天命歸危疑雖深咳唾已定挈洊雷而出地獨恃寸心扶大明而當天盡出一手此蓋列聖監其志先正啓其衷用能奠九鼎於聲色不動之中于以大一統於觀聽惟新之始旗常遍紀鍾吕特書泰山喬嶽之俱崇長江大河之無極某委身坱圠拭目休明知宗祏之有依與草木而同慶然事莫難於謀始功尤重於圗終潞公老臣盡日立侍於少主之側魏公舊相一旦卷簾於母后之前有光昔人正在今日某下情不任踴躍慶快之至祕書郎謝廟堂啓虎落賦歸尚憶窮邊之戍龍飛入奏忽叨廣內之除當明兩作離之旦而兼收與謂一為元之制而並下始終大造之力俯仰平生之榮竊以漢九種一百三家録嚴中祕唐四部二十萬卷藏冨弘文逮熙朝之煟興嚴列館之鼎峙上搜禹穴下采虞𥘉登其庭者道山日月之最華讀其書者瀛洲風露之亦飽乃若秩美職清之選莫非見殫聞洽之材如某者識字亡竒用心徒苦日斜牛背慣從襏襫之耕月暗馬頭間問兜牟之役莫府劔山之外麗譙涪水之濵粗了官癡不改書癖伊川絶學巳箍匠之不存清獻髙風尚蒼頭之可語心折百牢之客路眼穿萬里之親闈第期西崦之還乃作東華之夢周章拜命勃窣趨朝天近五雲甫候紫宸之對地清群玉忽陪碧閬之遊左思于此而賦三都丗南由是而擅五絶歷觀作者深愧斯文兹蓋恭遇某官定大計如隆興開皇極如元祐收召久間之耆艾韓吕朋來登崇未顯之畯良朝張輩出謂今奎壁之府自昔豫章之林國以儲材士焉養望遂下采於兔褐亦俾乘於鹿車某敢不澡雪精神於征塵沒沒之餘收斂身心於夜氣搖搖之後竹裏汲泉而煮茗花邊挹露以研朱端日將臨首獻三元之頌盛時親見尚賡七德之歌回胡判院啓曠度髙才方快景星之睹雄文大軸忽勤明月之投喜獲一麟盡洗萬馬恭惟某官壘劘屈賈灰撥隂何以湖海一生之豪為京洛諸老之客流涕痛哭見於議論怒罵嘻笑發為文章具眼非無其人壓頭終付之命黃金且盡長鋏猶存自昔聲名當三千而何啻祗今冨貴過五十以非遲某脫從煙霞來足風露枕書清樾之砥誰與喚醒拾落花之邊更煩舉似略兹具報幸甚鑒紆臨安諸友招講東山啓慕徂徠之餘風退安西崦引嶽麓之故事延致東巖豈不願一鄉善士之交其如非諸儒名家之選莫當盛意輒誦淺聞蓋自兩楹之夢既符一貫之學如線以仲尼事有若安能無貌似之疑由子思傳孟軻所幸有性善之說逮秦熖之寖冷而漢塗之復開淄川言易濟南言書各擅專門之業賈逵作訓馬融作傳居多著録之徒雖穿鑿之未純亦發明之良苦㑹文有益溫故冝師乃若泰北之仰昌黎衡湘之宗子厚頭童齒豁未免先生欺余哉之嘲耳拂心騷且有吾子見愛爾之嘆顧好為之通患在善誘以疇能惟本朝五星之聚奎而斯文百川之至海自伊洛出有洙泗風氣象巖巖立盡三更之雪精神盎盎坐餘一月之春所謂賢希聖聖希天夫豈書盡言言盡意諸老信有功於後覺群英求無愧於前修腔子裏盡惻隱之心貴加存養科舉外有義理之學不厭討論能自得於源流更孰加於模範藐如逐客老矣陳人久忘東塗西抹之時未定南去北來之地辱拂黃龍之榻俾修白鹿之規端是借聾誠難起躄見大巫而怯敢危坐於虎皮從野翁者遊尚醉眠於牛背略敷梗槩切幾鑒紆再答招講啓劄某伏承妙語申諭寵延曷月豫還歸哉久起故園之興吾年今已如此難陪勝社之遊况蝸涎不足以自濡而螢爝何堪於共照徒慙便腹多費解頥幸諸君之見寬容老子之省事窪樽西乳甘寂寞之漫郎石室東山付風流之太傅荐滕口說切幾心孚生日回啓戊子蒼顔五十三又逢𥘉度化身千百億揔是窮愁辱飛雙鳬來顧獨鶴開行厨於竹裏出妙語於梅邊為留西日之隂待轉東風之信掛梢緑鳯夢何到於調羮啄黍黃雞盟尚尋於煮餅其為心感併得面陳生日回程宰啓己丑以墨梅并詩來牛奮其角閲良月之就盈鴻漸于干驚朔風之欲暮過勤掞藻加賁垂蓬某官學道愛人折節下士同出老先生之門而矜其不耦日奉太夫人之歡而念其有親欲回東里之春先寄西湖之信句隨香動格與幹髙照見百里奚飯牛之心寫出九方臯相馬之意戒以點白俾之守玄老我長間敲棊聲於橘裏為君細誦引酒興於梅邊生日回啓庚寅閲天地之數久矣疑年對聖賢之書蕭然送日方嘆箕張而牛奮忽聞春發以鯨鏗笑桃李之爭新許楩楠之耐久詞髙戞玉意重訂金水調數聲恨缺雪兒之唱山光一帶願從詩老之遊占報斐然垂察幸甚生日回啓癸巳九年謫之賦不暇問天十月交之詩猶記墮地方擁山隂之雪忽披沁水之春醖藉不凡機杼自别以彼冨貴榮華之夢開此風流散誕之懷意氣重於斷金音調諧於佩玉醉喚盧同之赤腳強為我歌笑摩杜老之白頭莫當君賜其為感著未易名言生日回吳季永寺簿啓乙未歲周六甲氣近一陽過辱髙情俯記𥘉度吳罡之斧修月出語不凡洪崖之榼留春拜賜殊侈琢磨以岷山五花之玉護養以峨眉千歲之苓愛之欲生永以為好義襟特重莫訝卷錦鯨而還老眼尚明要看冠鐵豸而立復官謝廟堂啓新綸渙發宏開宥罪之科舊秩復還仍賦祝釐之廪與兩儀而同量控九地以知恩伏念某姿禀迂踈學問寡陋明主可忠言之日誼孰數之天下本無事之秋黯妄發矣冝坐反脣之律特寬擢髮之誅僅禠官聮俾安家食兒從郎罷拾柿葉以學書妻對藁砧然松明而理績凡此團欒之適莫非坱北之私以口語心引手加額第一日之去國倐七年之杜門户外屨空但有莓苔之徑床頭金盡况無𥝧稏之墟未問數百指碎纍之煎熬可堪七八十老親之落寞居然待盡忽爾更生長樂宫之稱觴華夷同慶丹鳯門之肆青天地皆春大或漏吞丹之魚細亦振坯户之蟄洗之丹筆卑以青氊昔漁者爭隈巳斷市朝之夢今廪人繼粟遂紓溝壑之憂靖惟平生盡出大造兹蓋伏遇某官手扶社稷心契乾坤卷卷乎緇衣之好賢休休然干旄之樂善謂四海之英雄豪傑悉歸籠絡之中豈一介之皎厲便儇不在涵容之數貸之衆人欲殺之始察之公論既定之餘欲放一頭趣開三面搢紳相顧而動色簡冊大書而有光某敢不仰體包荒退思遷善步虛聲裏疑從鈞天帝所之游知見香中期報佛地位人之德銘藏亡斁刊染奚殫平齊文集卷第二十五
