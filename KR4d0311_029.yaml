body:
  text: 故事髙宗皇帝建炎元年冬十月內侍自京賫內府珠玉二囊來上上投之汴水翌日以諭輔臣黃潛善曰可惜有之不必棄無之不必求上曰太古之丗擲玉毁珠小盜不起朕甚慕之庶幾求所以息盜耳臣聞人主一念之動左右承之百辟趍之天下嚮之故好惡之念當謹其微蓋此心不能兩用有所重則有所輕愛易流之隂者視尺璧如瓦礫寶難得之賢者視逺物如糞壤徑寸之珠不易齊之四臣連城之璧不奪趙之一士審輕重之義也魯公伐衛齊人來歸衛寶而意不啻足齊伐北燕賂以瑶甕玉櫝遂不克而還此念一為外物所移志消氣沮矣我髙宗皇帝紹開中興急欲信大義於天下以內侍所獻投之汴水使左右諸大夫國人皆知志不在小而在大與光武手不執珠玉同意用能收拾人心於渙散之餘振起國勢於頽壞之後後聖所當法也乃者經略山東九重之上𥘉未嘗有嗜好見於外而當國惟寶玉是徇諸將旁搜巧索爭投所好竒珍異玩坌集私第歸附者得以窺其無志於中原而動於惡臣願陛下一懲宿弊而反之凡以珠玉服玩來獻皆碎之通衢以示聖意之所嚮邊臣聞風亦將以功名自勵務為廉白以服豪傑盜賊之心事功可集矣至若中原銅鏹亦不必以輦入內郡為功昔張林告淮閫有云土地歸本朝銅錢安往識者謂為至論謀國者所當察也晉謝安以荆江二州並缺亘石虔有沔陽之功慮其驍猛在形勝之地終或難制乃以亘石民為荆州亘伊為中流石虔為豫州既以三亘據三州彼此無怨各得所任其經逺無競類皆如此臣聞御得其道則天下狙詐咸作使御失其道則天下狙詐咸作敵御之為言以馬喻也詭銜泛駕之馬跅弛而難制使王良造父御之則鳴和鸞逐水曲進退伸縮無不如意否則駻不受羈矣謝安之用三亘人徒知其經逺無競而不知駕御之術默寓乎其間蓋石虔趫捷絶倫既奪之上流而石民與伊非所患兼是時荆江豫三州軍事皆在安都督之下而兵權實操於內此首重則彼尾輕也苟朝廷無以操其權而制其命王彪之所謂兵權萃於一門非深根固蒂之冝安烏得不為之深慮哉知此則知八柄馭臣雖王者有所不敢忽髙帝詔曰欲省賦甚今獻未有程吏或多賦以為獻而諸侯王尤多民疾之令諸侯王通侯常以十月朝獻及郡各以其口數率人歲六十三錢以給獻費武帝置𥘉郡十七且以其故俗治毋賦稅南陽漢中以往各以其地比給𥘉郡而𥘉郡時時殺吏漢發南方吏卒往誅之費皆仰給大農以均輸調鹽鐵助賦故能贍之然兵所過縣為以訾給毋乏而巳不敢言擅賦法矣臣聞人君有愛民之實意而後有及民之實惠漢丗詔書出於人主之筆精神心術之微悉於詔見之觀髙帝欲省賦甚之語簡嚴明白繼之文帝振貸減租之詔勤勤懇懇其愛民實意皆可以對越天地安有不𬒳其澤者漢賦有三口賦以食天子算賦以治庫兵車馬更賦以給戍邊此詔所欲省當是斯時又有獻賦郡國假獻為名重賦以為民害故亟欲省之方楚漢之爭未決則𥘉為算賦及天下既定則欲省獻賦以此見傷財害民無如兵費之重兵費百出而欲行愛民之政蓋難然愛民之意不可以兵而間斷也武帝元狩之詔謂君者心也民猶支體支體傷則心􅉃怛非無愛民之意而好大喜功移之臣嘗考司馬遷平凖書其論帝取財贍兵本末凡十餘節一節害深於一節曰江淮之間蕭然矣曰廢格沮誹窮治之獄用矣曰三人言利析秋毫矣曰吏道益雜而多賈人矣曰稍稍置均輸通貨物矣曰無慮皆鑄金錢矣曰公卿大夫多諂諛取容矣曰楊可告緍令縱矣曰縣官有鹽鐵緍錢之故用益饒矣曰株送徒入財得輔郎郎選衰矣而終至於曰不敢言擅賦法矣而極髙帝欲為民省賦帝乃聽吏擅取非經常之賦夫豈不知有民哉置郡方新顒顒待哺恐廢前功惟求趣辦雖欲禁吏之不擅賦不可得也益口賦三十輪臺悔之猶幸此意不絶如線而仁義之澤未至於遽斬此所以壽四百年之脈歟紹興元年六月辛巳上虞縣丞婁寅亮上書言宗社大計欲望於伯字行下遴選太祖諸孫有賢德者視秩親王使牧九州以待皇嗣之生退處藩服上大嘆寤戍子上諭大臣曰昨令㢜選藝祖之後宗子二三歲者得四五人資相皆非𡵨嶷且令歸家俟其至泉南選之臣恭考髙宗皇帝誕聖於大觀丁亥即位於建炎丁未至婁寅亮上書之歲聖壽方二十有五萬丗無疆之計大矣哉蜀先主將東征孫權群臣多諌不從大軍敗績諸葛亮歎曰法孝直若在則能制主上東行就復東行必不傾危矣唐太宗欲自征髙麗群臣多諌不聽凡拔十城上以不能成功深悔之歎曰魏證若在不使我有是行也臣聞孟子曰入則無法家拂士出則無敵國外患者國常亡蓋自堯舜不作人主孰能無舉動之過所賴以拂正其非而反諸是惟左右前後之臣爾而便佞者逢之輕黠者長之具位者拱視而不暇問畏事者竊歎而不敢言幸而敢言亦惟一言以塞責而終歸於首鼠人主過舉於是莫之能救使當舉動少差之𥘉力盡面折廷諍之誼引𥚑不從繼以折檻自非諱過愎諌之主安能不矍然悟幡然改惟其若宫之竒懦而不能強諌故雖諌無益也先主復關羽之耻而興忿兵太宗討髙麗之罪而興貪兵非無黃權禇遂良等之諌而所諌不力無救於行法魏二臣猶在必將激烈懇到極其骨鯁不從不止也夷陵鴨緑之悔當時諸臣安得辭其責哉雖然亮知惜孝直而考其推擇之素特蔣琬費禕之純良向寵之淑均何望其復有孝直之方徑太宗知惜魏證而田舍翁之怒見於生前仆碑停昏之恨形於身後敢言之氣沮喪殆盡末節欲望廷臣如證之剴切難矣是則人君平時能養法家拂士之氣臨事乃獲法家拂士之力上方欲用文武求之如弗及始以蒲輪迎枚生見主父偃而歎息群士慕嚮異人並出卜式拔於芻牧洪羊擢於賈孺衛青奮於奴僕日磾出於降虜斯亦曩時版築飯牛之朋巳漢之得人於兹為盛儒雅則公孫洪董仲舒兒寬篤行則石建石慶質直則汲黯卜式推賢則韓安國鄭當時定令則趙禹張湯文章則司馬遷相如滑稽則東方朔枚臯應對則嚴助朱買臣歷數則唐都洛下閎協律則李延年運籌則桑洪羊奉使則張騫蘇武將率則衛青霍去病受遺則霍光金日磾其餘不可勝紀是以興造功業制度遺文後丗莫及順帝知能任使故士得用情天下喁喁仰其風采遂乃備元纁玉帛以聘南陽樊英天子降寢殿設壇席尚書奉引延問失得急登賢之舉虛降已之禮於是處士鄙生忘其拘儒拂巾祍褐以企旌車之招矣至乃英能承風俊乂咸事若李固周舉之淵謨洪深左雄黃瓊之政事正固亘焉楊厚以儒學進崔爰馬融以文章顯吳祐蘇章种皓欒巴牧民之良幹龐參虞詡將帥之宏規王龔張皓虛心以推士張綱杜喬直道以紏違郎顗隂陽詳密張衡機術特妙東京之士於兹盛焉向使廟堂納其髙謀疆埸宣其智力帷幄容其謇辭舉措稟其成式則武宣之軌豈其逺而臣聞求賢而不用吉士與不求同知人而不善任使與不知同人主有志於治孰不知非賢罔乂而急於求賢者有行可除可公養之仕亦莫不起而應其求海濵之大老至洛陽之年少至東山之髙卧者至周南之滯留者至明庭立鵠華階振鷺非不極一時之盛而知不盡所抱用不盡所知如醫者聚參苓术桂玉札丹砂於一槖品雖至珍用與病違雖聚無益也武帝蒲輪之招一下而異人並出順帝元纁之聘一馳而俊乂咸事好賢急士之意前後無間然武帝有儒雅篤行質直推賢定令文章滑稽應對歷數協律運籌奉使將率受遺所聚凡二十七人而漢以之盛順帝有淵謨政事儒學文章牧民將帥推士紏違隂陽機術所聚凡二十人而漢以之衰蓋武帝於人才之長短小大洞察底藴隨所用而各當順帝第知來之而髙謀不見納謇辭不見容智力不得宣賢雖滿朝廷足以美觀聽而巳諸葛亮嘗言親賢人逺小人先漢所以興隆親小人逺賢士後漢所以傾頽一親一逺之間盛衰判矣易之損益皆以十朋之龜弗克違明衆賢之助在損之六五虛中自損以從在下之賢則為元吉在益之六二賢者欲致益於君而君之樂受其益未可盡必也則惟常守正固以待之至王用之以享于帝然後吉有志於治者其可以徒聚天下之賢哉賢者之聚亦豈可徒樂簮盍之盛而不思相與共慰天下之望哉晉元帝建武元年置史官立太學太興元年帝親雩𥘉置諌鼓謗木新作聽訟觀二年置博士貟四年置周易儀禮公羊博士帝親覽庶獄臣聞物有本末事有終始知所先後則近道矣先者事之所當急後者事之所當緩緩急先後不舛其序治道何患於不舉元帝承皇綱解紐之餘冝思興起國勢如拯溺救焚之急顧乃以安平之大體治危亡之壞證以守文之常度制應變之危機故近丗論者謂此何等時而舉不急之務訟觀作矣胡不築將壇以拜淮隂太學興矣胡不立武舉以招汾陽親雩之禮行矣胡不屈帝尊而勞細柳博士之貟置矣胡不造樓船而命將軍諌鼓謗木設矣胡不修車馬備器械以圗修攘之治是非數端為可略也典午綴斿胡羯扛鼎中原豪傑競起而逐鹿時之所急不在是也使當時內以經制國用為實政而不以綀衣為僅足之規外以嚴飭兵備為實功而不以玉册為茍安之地晉其興乎厥今金甌雖無玷缺之虞玉關未有閉拒之䇿戰難於必勝守難於必固和難於必信而民力國計已俱至於窮不汲汲於豐財強兵先其所當急而論義理者多清談言政事者多細務拆裳輔帶以為巧折柳樊圃以為固厝火積薪以為安脫有意外之警臣恐非雍容拱揖之所能辦也席前左端之銘曰安樂必敬前右端之銘曰無行可悔後左端之銘曰一反一側亦不可以忘後右端之銘曰所監不逺視邇所代機之銘曰皇皇惟敬口生㖃口戕口鑑之銘曰見爾前慮爾後盥盤之銘曰與其溺於人也寧溺於淵溺於淵猶可遊也溺於人不可救也楹之銘曰毋曰胡殘其禍將然毋曰胡害其禍將大毋曰胡傷其禍將長杖之銘曰惡乎危於忿疐惡乎失道於嗜欲惡乎相忘於冨貴帶之銘曰火滅修容謹戒必恭恭則壽屨履之銘曰謹之勞勞則冨觴豆之銘曰食自杖食自杖戒之憍憍則逃户之銘曰夫名難得而易失無勤弗志而曰我知之乎無勤弗及而曰我杖之乎擾阻以泥之若風將至必先搖搖雖有聖人不能為謀也牗之銘曰隨天時地之財敬祀皇天敬以先時劒之銘曰帶之以為服動必行德行德則興倍德則壞弓之銘曰屈伸之義廢興之行無忘自過矛之銘曰造矛造矛少間弗忍終身之羞豫一人所聞以戒後丗子孫衣之銘曰桑𧖟苦女工難得新捐故後必寒鏡之銘曰以鏡自照見形容以人自照者見吉凶觴之銘曰樂極則悲沈湎致非社稷為危機之銘曰安無忘危存無忘亡孰惟二者必後無凶杖之銘曰輔人無茍扶人無容此武王聞丹書於師尚父為銘以自警也維昔帝王之治天下莫不以敬為主敬則百慮澄不敬則百慮擾敬則萬善集不敬則萬善隳是敬非自外而入也上帝臨女毋二爾心知所畏然後知所敬也人主身都綦貴心受衆攻非隨物致戒以警勑之則畏心忘而敬心泯天理之存者幾何武王惕懼而銘諸物不曰視邇所代則曰溺不可救不曰其禍將大則曰社稷為危何其辭之嚴也天真難保人欲易流出入起居之際龜鑒在目庶幾常若危亡禍亂之壓其前而起臨深履薄之懼無一念之非敬也然以武王之聖豈待睹銘而知懼哉堯舜性之也湯武身之也身之則寧過於檢防求進乎性之之域也其或收斂於十手十目之地而縱肆於暗室屋漏之中修飾於親儒生學士之時而玩狎於對宦官女子之頃雖有此銘如無此銘矣故中庸大學皆貴乎君子謹其獨宣公十有五年秋𥘉稅畒𥘉者何始也稅畒者何履畒而稅也𥘉稅畒何以書譏何譏爾譏始履畒而稅也臣謂立法以取民莫患乎其作俑也夫君與民夲一家國用之而取諸民民出其所有以供乎上猶子奉父孰不敬應然自昔什一之法公田藉民力而耕收其歲入民田之私則未嘗有稅魯創法履畒以稅之國用不足蓋有甚不獲已者聖人於此乃書𥘉以示譏豈非𥘉之所創疑若特一時之暫而後之沿襲必假是以行其無藝之斂如螽之生喙其害未有砥止二吾不足而用田賦此其俑也武帝紀書𥘉算商車𥘉算緍錢𥘉榷酒酤頗識此意梁冀在位二十餘年窮極滿盛收冀財貨縣官斥賣合三十餘萬萬以充王府用減天下租稅之半散其苑囿以業窮民臣聞財用之在天下如血脈行乎一身可通而不可壅王者藏冨於民霸者藏冨於國其下冨不在國又不在民而在於聚斂臣之家蓋自正道不行而人心壞人心壞而吏治壞舍義趍利假公售私朘民自封一孔不貸柄國者又為生姦受盜之府而天下之冨偏聚焉此冀所以積至三十餘萬萬而未屬饜也夫財本吾國之有而取以助國財皆吾民之出而還以豫民其理順其政公故收冀家以充王府而減租稅天下以為快後丗莫以為非不謂威帝能行之也太祖問李承進曰莊宗以英武定中原享國不久何也承進曰莊宗務姑息將士每出禁兵衛卒必控馬首告兒郎輩寒冷望與救接莊宗即隨其所欲給之蓋威令不行賞賚無節也上撫髀歎曰三十年夾河戰爭取得天下不能用軍法約束此輩縱其無厭之求以兹臨御誠為兒戲朕今撫養士卒固不吝惜爵賞茍犯吾法惟有劒耳易曰上天下澤履君子以辨上下定民志上下不辨民志何由定民志不定而欲求國勢之安強是却行而求前也况三軍以紀律為重處不知禮則出不知律犯上之意一萌作亂之機巳兆尚可望其敵王愾而伸國威哉唐自肅宗偷一時之安平盧節度察軍中所欲立者授以旌節自是以姑息為常至於偏禆士卒殺逐主帥而不問廉逺地則堂髙廉近地則堂卑陵夷之勢何所不至此唐所以亡也後唐莊宗猶襲故態不能以軍法約束而威令不行享國不永竟坐姑息之過我太祖皇帝受天明命為丗立極盡革唐季五代禮法蕩析之弊一階一級上下相承川班妄訴必肆顯戮此所以國勢有金城千里之固民生有泰山四維之安也然豈徒以階級之法繩之哉平時撫養不吝爵賞苟犯法則有劒恩施而後威立冝軍心恱服不敢輕於有犯也憲宗嘗與宰相論治道於延英殿日旰暑甚汗透御服宰相恐上體倦求退上留之曰朕入禁中所與處者獨宫人宦官耳故樂與卿等共談為理之要殊不知倦也人心不可以兩用有所慕則有所忘好善者忘酒樂德者忘色八年于外急於拯四海之溺而忘其家日􅉴不食勤於合萬民之和而忘其身所重在此則所輕在彼也方時疸暑人孰不惟寬涼之是慕憲宗鋭於圗治議政延英日且旰矣汗透御衣而不顧蓋忘其為暑也謙虛以盡大臣之情而無取乎宫人宦官之與處奮厲以講中興之要而不求乎深宫廣厦之自逸社稷生靈之念日切於中凡人情之所共樂者無不忘之其肯以天下之未安為一身之適乎况是時名相皆足以穆天縡經國體所議必非不急細務徒留旰食之聽者堂堂兩河已盡在規畫中矣彼避暑九成而忘其親生涼殿閣而忘其民心移於物惟欲是縱賢君所當戒也熙寧三年知舉吕公著在貢院中密奏言天子臨軒䇿士而用詩賦非舉賢求治之意乞出自宸衷以咨訪治道至是上御集英殿進士𥘉就席有司猶給禮部韻及試題出乃䇿問也既而賜葉祖洽巳下及第時韓維吕惠卿𥘉考䇿阿時者多在髙等訐直者多在下等自鄉舉里選之法壞而取士惟虛文是尚漢䇿賢良雖未免以利祿入其心科别或有未竟猶不失言揚之意唐進士得人為盛特絺章繪句之習工如日五色何益丗用國朝䇿士𥘉襲唐人詞章之舊至此始以䇿咨訪治道與漢制科等其意美矣然草茅言事豈能皆若素宦于朝而效忠獻直悉出於愛君憂國之真情言之當固不以人廢言之過亦貴於能容人君能容過直之言市駿骨揖怒蛙感發作興之下孰不以安危治忽之實來告茍有司喜阿逢而惡訐直以行上下其手之私如吕惠卿輩美意一失奚以臨軒發䇿為哉維我仁宗之䇿蘇轍其言宫中事過於直上曰以直言求人而以直棄之天下謂我何可謂有大舜之大矣是時考官則司馬光范鎮蔡襄唐太宗謂蕭瑀曰朕少好弓矢得良弓十數自謂無以加近以示弓工乃曰皆非良材朕問其故工曰木心不直則脈理皆邪弓雖徑而發矢不直朕始寤向者辨之未精也虞人有原獸之針輪人有糟粕之議工執藝事以諌不聞於丗久矣而唐之弓工獨得古意其言蓋以規太宗功業雖盛而治心之道實未嘗講也夫心者萬理之會萬事之主此心明白洞逹無一毫迂曲之纍則見面盎背皆天理之形著發號出令盡人心之契合敬義直方所以相為表裏也太宗天姿髙而學問不足其得在於好名其失亦在於好名好名故能矯揉為善惟名之好而觀省存養之不加故矯揉之力怠而稟受之偏者不能掩輕我宫人之怒不役一夫之怒會須殺此田舍翁之怒以至好大喜功而多愛無非夲心之發露也木心不直脈理皆邪雖徑而發矢不直弓工可謂善窺其君心術之微矣太宗亦可於此進格物正心之功矣其謂勇辨諂諛姦詐嗜欲輻湊以攻一心是特知制外而未知養內安有內心不治而外邪可間者哉孝宗皇帝宣諭宰臣十年來欲令宰執進呈退將得旨文字再具熟狀進入朕再行審閲批出然後施行既免專擅之嫌且無遷令之患易曰渙汗其大號書曰令出惟行勿惟反反汗非也號令當反而不反是又遂非也然未當而反不若謹之於樞機未發之先一發而民信之孝祖所以欲再行審閲使無遷令之患也茍熟狀之進隨入隨可而思慮不加焉其與不再進何異惟能存主一之敬每事收斂精神熟觀詳繹而後出尚奚舛令之有孝宗皇帝臨朝每以方寸𥿄作掌記微偃兩旁而中摺之置在御手若內殿則留香案上三省密院奏事畢即視所記一一宣諭已乃收之人主日總萬幾之繁而心思有限安能無所遺忘孝祖聰明睿智與神為謀猶識所欲宣諭之事於掌記可謂文理密察矣故凡禁嚴清燕之地經史之所閲典故之所聞群臣章奏之所采有當與大臣參酌可否日隨記於其上俟坐論從容歷舉而訪之大臣所知悉心以對所未及知則討論以進久而天下事無一不明習而洞曉其益豈不多哉明道中執政除親舊二人為正言司諌上謂曰祖宗法臺諌官須出宸選若大臣自除則大臣過失無敢言者治平二年以范純仁為殿中侍御史吕大防為監察御史裏行近制御史有闕則命翰林學士御史中丞迭舉二人而上自擇取一人為之至是闕兩貟舉者未上內出純仁大防姓名而命之臣聞臺諌天子耳目之官耳以司吾之聰目以司吾之明而人執之可乎張行成無先容舉為殿中侍御史柳公權有諍臣風屈為諌議大夫萬乘親擢邇臣莫與夫如是則任耳目之寄者激昻振厲思稱主知周而無所比正而無所阿朝政之得失廟論之是非相業之修廢不吐不茹悉以上聞不至於懷私恩徇偏見以亂天下之公我朝祖宗法臺諌官須出宸選正以是也異時唐介論文彥博王陶彈韓琦以二輔臣之賢猶不為之少隱况下於文韓者乎雖然臺諌不由進擬固足攬馭臣之枋要必人主有至明之見而後能奮獨斷以聳衆望否則不謀之外廷謀之左右親䁥附下罔上抑又甚矣大明在上邪正洞燭得范純仁吕公著而內出姓名得歐陽修余靖王素而御筆親除斯無愧纍朝之盛唐正元中宣武都知兵馬使李萬榮逐節度使劉士寧上聞之使問陸贄贄上奏士寧見逐雖是衆情萬榮揔軍且非朝旨願審之謹之上復謂贄曰今議除一親王充節度使令萬榮知留後贄復上奏曰夫制置之安危由勢付授之濟否由才勢如器焉唯在所置置之夷地則平才如負焉唯在所授踰其力則踣為國之道以義訓人將教事君先令順長若使傾奪之徒便得代居其任利之所在人各有心此源潛滋禍必難救非徒長亂之道亦開謀逆之端上不從竟以萬榮為留後臣聞名分者天下之大間植之則治隳之則亂唐自天寶以宴安兆釁君失其尊肅宗復國冝思挈皇綱於既墜扶大分於寖隳乃就平盧軍中察所欲立者授以旄節自此廢置之權在軍士而姑息之弊開至代宗專事姑息僅止羈縻德宗加甚焉李萬榮逐劉士寧而自揔宣武陸贄以傾奪長亂為諌曽莫之聽夫姑息者陵夷之夲姑且也息止也茍圗一時之靜急求目前之紓而莫計其窮是以強藩悍將敗國事者不敢問冒國禁者不敢討屈情抑勢俯而就之以順適其意所求必從所請必獲倨傲偃蹇莫知稟承始則節度不知有朝廷久則將校不知有節度更相睥睨見便則奪犯上者必好亂德宗亦安能禁萬榮之自為留後乎然使當時君德修明朝綱振肅不以猜忌踈臣下不以聚斂苦民生禁兵非市井之冨兒軍政非宫庭之嬖幸以至在列皆陸贄而非盧𣏌皆李泌而非張延賞則朝廷之勢重於九鼎藩鎮安得而輕視之藩鎮之敢於干名犯分朝廷輕故也自昔安有朝廷輕於上廉傾級圯而能措大器於安者哉魏丗祖東如許昌大興軍伐吳親御舟循蔡潁浮淮如壽春至廣陵吳徐盛為疑城自石頭至江乘一日而成又大浮舟艦于江時江水盛長帝臨望歎曰魏雖有武騎千群無所用之未可圗也帝舟遇暴風漂蕩幾至覆沒乃旋師臣聞江流湯湯萬古一天險也而飛渡者有之曹操之至赤壁曹丕之至廣陵佛狸之至瓜步逆亮之至采石皆望洋奪氣或且送死豈長江隨時而為險夷耶天險在勢人險在德與政君無闕德天人交助夫誰敢犯之其次朝無闕政紀綱立賞罰明號令信任賢使能各當其材則人謀咸贊國勢增強坐有以制勝矣丕之再飲江窺吳輒自廢而返非特川后之效其靈孫權為國靡政不舉謀臣勇將咸樂為用疑城相望巨艦相銜而丕膽落天限南北冝其不敢以一衣帶水易視之也是知天險待人險而固德政增修勝勢在我東南有太山之安矣周丗宗擊北漢主劉崇於髙平之南樊愛能何徽引騎兵先遁帝欲誅愛能等以肅軍政猶豫未決張永德曰愛能等望敵先奔死未塞責且陛下方欲削平四海茍軍法不立雖有熊羆之士百萬之衆安得而用之帝擲枕於地大呼稱善即收愛能徽及所部軍使以上七十餘人悉斬之自是驕將惰卒始知所懼不行姑息之政矣臣聞軍國之綱紀莫大於賞罰有賞而無罰則惠褻而威不振白刃在前誰肯委命此軍法所以不立也近年以來僨軍之將未嘗有顯罰間鐫其階隨即牽復曽無損於毫毛故皆以棄甲曵兵避死趍生為得計朝廷姑息將帥將帥姑息士卒未戰即潰既潰即招望風獸奔恬不為怪於是兵律壞國勢微矣英主欲大有為冝以丗宗髙平之事為法群臣請上尊號及作樂神宗以久旱不許群臣固請冨弼言故事有災變皆徹樂恐陛下以同天節虜使當上壽故未斷其請臣以為此盛德事正當以示夷狄乞并罷上壽從之即日而雨弼又上疏願益畏天戒逺姦佞近忠良神宗親書答詔曰義忠言親理正文直苟非意在愛君志在王室何以臻此敢不置之枕席銘諸肺腑終老是戒更願公不替今日之志則天災不難弭太平可立俟也臣聞詩曰文王陟降在帝左右又曰陟降厥士日監在兹上天之心與君接人君之心與天通一陟一降隨寓隨在𥘉無毫髮之間五事有敬怠則庶證有休咎其應如響之應聲我神祖以久旱輟同天節上壽之禮亢陽即日而雨陛下以雷變寢天基節上壽之禮積隂即日而霽夫豈人力所能致哉此心即天心天心即此心也冨弼於既雨之後奏益畏天戒逺姦佞近忠良蓋姦佞之逺忠良之近即以畏天戒天意在於進君子退小人人君欽承此意而行之則寅畏之實也答詔欲弼不替今日之志君臣交相警戒冝有以祈天永命也歟臣故亦願陛下與二三大臣不以天意已回為喜常以天命難諶為懼平齋文集卷第二十九
