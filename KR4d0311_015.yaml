body:
  text: 內制二殿中侍御史王遂辭免除户部侍郎恩命不允詔朕自親政以來臺諌以直聲著者必超軼等級而進之所以勸敢言廣忠益也卿氣壯而材茂識髙而論偉繇分察再遷察非法於殿中暴未殄之惡折方萌之姦蹇蹇匪躬聞于天下朕甚器其直稽諸故府臺臣以供奉赤墀攝二版部僅一二見如卿即日為真亦足昭眷簡之殊旌拔之異矣矧嘗考核郡國計簿具見本末理財有疏義利之辨尤嚴今特舉而措之毋多遜所辭冝不允權户部侍郎趙立夫辭免除户部侍郎恩命不允詔小司徒掌建邦之教法令貢賦抑其細也而後世專以理財為職卿本固而末茂外寬而內明踐敡所至務以有餘不敢盡之意寓於政事攝二地卿恂恂如不能言而鈎索原委檢核滲漏吏無所容其欺心計精矣就俾為真用懋前業夫天下大計分隸四總其入于版曹者才二十七郡生寡而食衆用疾而為舒故常患不淡鞭算笏畫之長朕方以陳恕望卿勿辭可也所辭冝不允權刑部侍郎李性傳辭免除禮部侍郎恩命不允詔有虞氏命伯夷作秩宗曰夙夜惟寅直哉惟清寅故直直故清也知此然後可以為禮樂之官卿務敬以直內之學有淵乎似道之風甘泉之論思露門之勸講責難陳善備罄忠益而不汲汲於進寅直清矣若昔折民惟刑與降典相為表裏疇庸邦憲之平正序春官之二選妙望華朕命惟允齊仲孫來省難知魯秉周禮而不敢動晉欲服楚必先大搜被廬示之禮時方多艱卿其思所以尊吾國者徒鳴其謙非朕所望所辭冝不允權兵部侍郎趙彥悈辭免除兵部侍郎恩命不允詔卿學問造乎精微論議根乎正大垂紳端笏於朝蓋麟之儀儀鳯之師師也引年告歸朕以金華之業未竟擢繇武部之最就進二卿之真亦可為勉留矣而猶以歸諗歷觀在廷畨畨黃髮我尚有之而公族之年耆德明孰踰卿者四郊多壘主憂則臣辱同姓之老方與國同其戚休而忍不為朕修九伐之法明七德之武遽舍之去乎其強起就厥位所辭冝不允朝議大夫新除兵部侍郎兼國史院編修官實録院檢討官兼崇政殿説書趙彥悈辭免升兼同修國史實録院同修撰恩命不允詔經者道之綱也史者事之紀也八書十志而下述作紛紛經學之不明也深於經則必良於史卿學有師傳晚造自得邇英論説析微抉隱多先儒所未發用力於經深矣典謨歷代之軌範春秋百王之繩墨記言動者祖焉卿能以經法為史法品藻實録方將軼遷董而上之進參纂修尚奚遜所辭冝不允特進左丞相兼樞密使鄭清之等奏為雷發非時乞賜罷黜家居待罪不允詔自昔有國之患莫大於君臣玩天變而不知懼間者雷洊發於首春雷君象也燁燁震電不寧不令朕方引咎修省卿等亦以陽不斂藏俟罪于家上下相與警懼若此吾國其庶幾乎漢丙魏同心輔政風雨災變時氣失節皆惕然以為已憂而中興之治成卿冝一乃心德圗所以回天意者移災股肱非朕志也明發其率百辟以朝端朔所請冝不允特進左丞相兼樞密使鄭清之等奏為滿散天基聖節乞許免肆筵不允詔朕惟天心仁愛人君故出災異以譴告之星雷示變天所以大警朕也而卿等職思其憂莫不震恐引慝可謂得交修之誼矣然損貴酌損節戒苦節禮以義起必惟厥中朕於誕日既寢上壽之禮群臣嘉賔之式燕可盡略乎勉體示慈之意毋勤引避之嫌所辭冝不允太中大夫同知樞密院事兼參知政事鄭性之奏為雷電非時乞賜顯加黜罰不允詔乃立春再翼日庚戍殷雷始發又再翼日壬子而震少陽驟泄恐懼靡寧故預戒百官天基節寢介壽輟用樂庶幾上答天譴卿乃謂咎在臣等乞加顯黜昔我仁祖以春雷為異明詔責躬曷嘗歸過股肱卿冝悉心輔朕以􅊒􅊒致福勿復辭費所請冝不允工部尚書李鳴復辭免玉牒兼侍讀恩命不允詔周小史掌邦國之志奠繫丗辨昭穆師氏以媺詔王居虎門之左司王朝自唐以來瑤牒之纂修經幃之誦説蓋昉諸此而兼其長為難卿著御史之冠曵尚書之履聲稱籍甚而執春秋一經以陪緝熙之講尤多所發明朕孰察所韞閎中而肆外故以開元禇無量開成李衢之職兼命之進而勸讀則明引君於當道之誼退而撰次則用大事書於䇿之法恢乎有餘地也所辭冝不允户部侍郎王遂辭免同修國史實録院同修撰恩命不允詔文以氣為主職史事者有直氣則無曲筆卿以學問養集義之氣頃為御史不為強禦屈剛且直矣進升言語侍從之聮參舉紀傳編年之法以前日之是非一時者榮辱百丗均是氣也况司馬遷之進姦雄崇藝利班固之否正直輕仁義曽莫能當卿麾訶之餘鋒一代大典久未就緒非卿其誰宜為所辭冝不允兵部侍郎趙彥悈辭免侍講恩命不允詔元祐中程頥為説書以敬涵飬君德范祖禹為侍講以和開導主意親學士大夫之益如此朕知卿和而能敬始進之以頥今進之以祖禹德性之迪意嚮之正惟吾宗老是凖巽櫝來上謂究心自得而無能悟主朕實愧焉雖然學有緝熙于光明佛時仔肩示我顯德行亦惟卿勉之所辭冝不允特進左丞相兼樞密使鄭清之金紫光祿大夫右丞相兼樞密使喬行簡再上奏為雷發非時乞賜罷免退伏田里不允不得再有陳請詔春秋書三月大雨震電夏正月也劉向謂雷未可以發而發陽不能閉隂之象故邇者雷發於春始朕甚懼焉丞相與國同其戚休既夙夜熏心圗答譴告積隂隨霽矣而猶執咎不自巳夫勑天之命惟時惟幾元首股肱交相警戒固應天之實然宣王遇災而懼側身修行詎嘗分過於申伯仲山甫哉况今外患未弭內治未飭朕方倚丞相如左右手其安厥位懋我政事以保乂我有夏穆我天縡毋輕於奉身而退以孤朕也所請冝不允端明殿學士宣奉大夫李􅐉上表辭免除資政殿學士知眉州恩命不允詔朝廷以耆儒而尊故國以世臣而重朕萬里召卿期以為股肱心膂詎肯使一日去修門哉惟西土嘗不靖朕為之廢寢食者纍月峨英岷秀盡萃王庭鄉大夫之舊德宿望莫有留者拊髀躊躇憂顧無所寄然後知季良在隨廉頗用趙之足以重鄉國也輟經幄之優進書殿之重髙牙大纛歸鎮鳴珂薦紳父老念疇昔綏靖之勳猶在必動色相告坤維可無憂矣况峻職以尚賢即家而為守在蜀才止一人朕於卿可謂盡體貌之冝往哉毋以中外為間所辭冝不允端明殿學士宣奉大夫李􅐉再上表辭免除資政殿學士知眉州恩命不允詔孔子自衛而反魯孟軻去齊而歸鄒弗逢其時乃諉諸命卿心存於致主朕志切於用賢將以有行未為不遇曩頻年外服嘗著績於制垣今再歲中朝遂視班於執政雍容勸讀繾綣給扶顧圗任之念未志何引謝之章屢至躋隆名於祕殿建巨屏於故鄉歷考前聞罕見近比相如之諭蜀道方來弩矢之迎買臣之守會稽何勤印綬之上諒薄言於晝繡尚逺告於辰猶所辭冝不允太中大夫守兵部侍郎淮南東路安撫制置使兼知楊州軍州事趙葵以護邊無狀乞賜罷歸不允詔善射或失於百命中之餘良醫多得於三折肱之後此操危慮深者所以逹也卿蚤懷智略鋭赴事功雖鳴劒伊吾之志未酬而堅壁細柳之風猶在梁荆俶擾淮獨晏然涉歷多而識慮老可與圗守矣邊烽少斂亟上歸請兵法曰毋恃其不來恃吾有以待之賊情叵測吾圉尚疏卿冝日討軍實思敵王愾其可遽奉身而退乎所請冝不允太中大夫守尚書户部侍郎兼刪修敕令官趙立夫乞卑叢祠不允詔漢張蒼為計相更以列侯主計唐劉晏自度支領租庸鹽鐵至僕射猶領使如舊理財不宿其官簿書放紛吏並緣為姦利雖竭江河之入莫供尾閭之泄也卿踐更中外之久財賦脈絡洞燭表裏而姿稟靜固精力強乂又足以行之左户為真朕方委重閲日幾何遽以春衣辨集而求均佚蒼晏職業僅以是自諉耶維時調度孔殷尚究爾材毋曠吾事所請冝不允朝奉大夫權工部尚書時暫兼權吏部尚書兼修玉牒官兼侍讀李鳴復辭免除權刑部尚書日下供職兼職並依舊恩命不允詔朕惟舜命九官垂共工臯陶作士皆終其身不易後世必遞遷熟試以觀通材卿為棘卿有明清之風則峻總一臺為臺端有直亮之操則超躋八座為起部有簡靜之譽則併攝天官知卿深故進卿亟也然經逺猶者貴事功之詳歷圗大任者在望實之積孚兹繇五雉之華趣典鷞鳩之重擢無虛月意蓋有在卿以因人序升而辭過矣其思式敬爾由獄以長我王國所辭冝不允中奉大夫寶文閣待制賜紫金魚袋鍾震辭免除寶章閣直學士知靜江府廣西經略安撫恩命不允詔朕待臣下無中外之間以久不見卿召自姑孰賜對于便朝議論平實可見於行良用嘉獎攝長起曹詔墨猶濕而嘖言已至憮然不得而私也乃眷桂管為廣右都會有江山之勝無瘴癘之虐峻直西清往顓牧御過家上冡行道謂榮豈若季布徒以一毀譽為進退哉勉敷德意使海蛋山獠人人懷其生則豫以懌所辭冝不允朝議大夫權尚書兵部侍郎四川安撫制置使趙彥呐乞速加汰斥不允詔西南六十州倚天險以為固卿老於邊籌控仙原之險以挫賊鋒功與馬服先據北山等朕既下詔奬勞矣而爾子洸夫又能獮潰旅以紓心腹之憂威名既立賊雖狼貪無厭羝觸未巳獨不忌吾老羆之當道耶進卿武部之二且官厥子於朝其體有功見知之意益堅授任危難之圗收合散亡謹固封守使全蜀以寧毋過為引咎以自餒其氣也所請冝不允朝議大夫試尚書工部侍郎沿江制置使兼江南東路安撫使馬步軍都總管知建康軍府事兼行宫留守陳韡乞亟卑祠廪不允詔天下一身也論病以及國原診以知政漢之􅏓盩唐之疽根皆識國體者所深憂朕不能逺德䀌然念三垂之不靜北門管鑰徒得卿重除戎搜實飬威制變靡一政之不舉再進文昌用懋乃績俾修扞我于艱病在膏肓日甚一日忽騰祠請殊駭朕聞得非切於憂國以身之病諭國之病歟天醫緩所視固砭劑所不及秦越人浣腸滌胃必有可起之方蓋國勢之轉移在人未可諉之壞證而不之治也卿亦勉為王事親藥餌嗇精神以佩安危之寄所請冝不允魏了翁辭免依舊端明殿學士除簽書樞密院事令疾速赴行在奏事恩命不允詔采薇以遣戍視薇之剛柔為行役久近之候而出車勞還枤杜勤歸繼之所以閔歷時之勞也間者歲聿云暮卿憤於封豖長蛇荐食上國烈然以樞臣視師于江上星言夙駕冒犯霜露曽無幾微見顔面亦云壯矣吳楚上下數千里臂指運掉氣勢翕合有出門同人之應朕寢為安乃眷莫春閲時且再勞於王事盍遄其歸在師中吉序進一等特以示吉甫之燕喜而舍爵䇿勳猶有待也何行而弭斂戍之後艱何施而杜挻憂之內奰何所處置而使朝廷尊強生靈之無失所延英入對其孰數于前以圗綏靖引疾而辭非朕所望所辭冝不允謝奕昌辭免特授保寧軍節度使提舉萬壽觀恩命不允詔我孝宗迪關雎之風重葛覃之本言告師氏間歸謁於祖禰之庭詔馭群臣必進褒於伯仲之列著為國典用厚人倫卿笙磬和平珩璜縝粹清規雅度具存江左之風嘉則令儀同稟洽陽之氣聮鴈行於朱閣肅鷺序於彤墀祗奉宫闈還展寢廟榮光接子五丗異數萃於一門超陟齋壇總提真館蓋率先朝之舊匪繇近戚之私冝益務於好修毋過勤於引避所辭冝不允謝奕禮辭免特授保康軍節度使提舉萬壽觀恩命不允詔朕尊臨函夏夙建長秋化成二南曽無示私外家之意禮成五廟冝有昭德異姓之恩卿性行淑均風神秀徹如圭如璧泝慶派於貂蟬吹塤吹篪播英聲於鵷鷺託在肺附蔚為羽儀奉翟禕而修寢廟之恭擁旄節以領祠庭之佚寵超二等榮動一時以淳熙戚畹之彛章為慶元相閥之盛事匪徒馭貴抑以教姻勉循制節之規冝略撝謙之請所辭冝不允魏了翁再辭免依舊端明殿學士除簽書樞密院事令疾速赴行在奏事恩命不允詔兵難隃度則倍道而疾征事有密奏則乘傳而趣入王事靡盬所以不皇啓處也國朝儒而知兵莫加於范仲淹慶曆中出經略西事久之未獲要領而召為副樞定廟謨於殿陛之間震天聲於靈夏之表卒揉服之卿腹有萬甲名齊一韓乃者視師之行協比諸閫拊循三軍有關疆事既得以直逹朕聽今又以所目擊還歸坐籌折箠笞之好音懷之吾有以待虜矣恢台之交風日未烈其遄驅以尉渴佇所辭冝不允不得再有陳請皇叔祖少傅保寧軍節度使充萬壽觀使嗣秀王師彌生日詔十一月十七日生新陽踰浹協氣先春生一代之宗英為兩朝之國老眷隆列棘恩賁垂蓬備牢餼以陳儀荗燕頥而介壽同知樞密院事鄭性之生日詔小寒屆節駿嶽儲神應昌運以生賢斡洪樞而贊治特隆眷遇肇錫餼牽介黃髮之修齡侈緇衣之篤好永寧郡王楊石生日詔紀鳯標春將臨銘柏傳龜育瑞先慶垂蓬豐好賜於周官洽燕私於漢戚祗豫寵渥介爾耆齡光祿大夫右丞相兼樞密使鄭清之再辭免授特進左丞相兼樞密使恩命不允批答元愷並舉而百揆宅之司空公孤俱立而六典掌之冡宰大厦必棟梁之任巨川惟舟楫之資允繫具瞻曽微虛授以卿韞帝師之學抱王佐之材疇績中台升班首輔蓋欲究致主澤民之業凝調元贊化之功使國勢重於泰山而人心安於磐石倚毗良切考謹非輕盍亟為奠枕之圗猶堅執循墻之請人不足與適也朕正賴於格心時則勿有間之卿何疑於立政况此艱難之日豈其間退之時所辭冝不允宣奉大夫知樞密院事兼參知政事喬行簡再辭免特授金紫光祿大夫右丞相兼樞密使恩命不允批答帝賚良弼而輔丕乂天生賢佐而祐中興繄一德之交孚實千齡之幸會卿三朝夀俊四海逹尊充於性則碩大而光明備於身則康寧而夀考如圭如璧之猗重較久人望之獨隆非龍非彲之遺汝師新國均之對秉蓋天所相維朕之承中外之壞證己形上下之憂心如醉趣展濟時之略毋貽避事之嫌所辭冝不允宣奉大夫知樞密院事兼參知政事喬行簡再上表辭免特授金紫光祿大夫右丞相兼樞密使恩命不允仍斷來章批答朕以治國平天下根本於人主之身深宫暗室左凖右規曷嘗一息懈而世道積壞之餘國勢未振物情易搖中夜以思凛乎若朽索之馭六馬榆塞又將秋矣並建輔弼亟圗康濟免櫝洊至得無以輔苴罅漏扶植頽敝之難耶列聖紀綱法度具在天下事猶可為以卿老於謀國勇於致君調元經武特在機括之一轉趣亮天功用答人望牢辭可巳也所辭冝不允仍斷來章光祿大夫右丞相兼樞密使鄭清之再上表辭免特授特進左丞相兼樞密使恩命不允仍斷來章批答元首明則股肱良股肱喜則元首起相須甚切相值甚艱卿學足以承三聖之傳識足以定萬丗之䇿適更張之有待嗟大壞之難圗救病於已危以爾為上醫之盧扁葺廬於既朽以爾為巧工之般輸特隆左揆之登昭示右賢之切交孚靡間頻巽奚為瞑眩而厥疾瘳妙試回生之劑綢繆而彼桑徹熟思禦侮之規毋棄爾成亟祗朕命所辭冝不允仍斷來章金紫光祿大夫參知政事兼同知樞密院事曽從龍上表再辭免除知樞密院事兼參知政事恩命不允仍斷來章批答國朝之治莫盛於嘉祐時則有大臣考核兵數地理使邊防無闕戍奉行典章故事使百官奉法循理而朝廷尊卿之祖也卿山立川流克丗厥德兹以參預進本兵之重且丗厥官運籌幄中制勝堂上修攘兩盡庶幾海內復還全盛之風詩不云乎對揚王休作召公考此朕所望於卿者撝辭徒費所辭冝不允仍斷來章端明殿學士太中大夫簽書樞密院事鄭性之上表再辭免除同知樞密院事恩命不允仍斷來章批答有國之患莫大於君臣上下以危為安而不知懼知懼則可為矣朕靜觀天下之勢惕如涉淵故並建股肱心膂圗濟于艱二三大臣切於體國莫不念戒懼之不可已而卿踧然以外憂內患為己責天所以訓楚警晉之意其庶矣乎本強則精神折衝得道則狙詐作使力贊樞機之運毋徒傴俯之恭所辭冝不允仍斷來章端明殿學士正議大夫同簽書樞密院事陳卓再上表辭免簽書樞密院事恩命不允仍斷來章批答蓋聞宣王中興倚重於孝友之張仲有孝友之臣主於內則戎車四牡始得以成伐功於外卿踐履全君子之和操守得大臣之正朕之張仲也自登宥府物望具孚進不躐等厥任增重夫國勢之安危在所寄邊防疏闊軍律放紛風寒之慮方深隂雨之備冝急卿雖位樞庭之末可過謙乎所辭冝不允仍斷來章曽從龍再辭免樞密使不允批答召虎江漢之命姬旦淮夷之征皆爵上公往衛中國欲威靈之旁暢必名位之加崇卿有武而有文能定而能應處基命宥密之寄得受任危難之風果為朕行耶趣進臨於都會吾無復憂矣知坐折於遐衝胡尚遜於使端似未孚於豫志望之重則可以盡護諸將權之尊則可以獎率三軍矧視周家之禮猶輕其在國朝之典未逺匪隆㧾統曷聳觀瞻抑使表裏聮絡之諸屯皆識上下綱維之深意玁狁孔熾我是用急姑煩籌筆之勞徐方來庭王曰還歸佇錫命圭之寵倚毗良切傴俯奚勤所辭冝不允魏了翁再辭免簽樞督視京湖軍馬不允斷章批答昔在先朝蜀出名輔張浚精忠之山立允文碩畫之淵深皆於王事靡盬之秋克奮元戎啓行之略朕方深於憂顧卿盍展於英猷荐披謙櫝之勤猶遜師千之重眷禁塗之獻納暨經厦之建明雖所陳略施未盡如賈誼之志然其䇿常用巳深識子房之心兹共濟於艱難乃過虞於扜格况上流之形勢甚重而中朝之體統不殊精神既孚脈絡自貫甲寅報可亟冝上方略於金城辛已饗功詎止訖天誅於洄曲倚須戒道勿事循墻所辭冝不允仍斷來章曽從龍第二次辭免樞密使都督江淮軍馬不允斷章批答易之師正丈人吉非必以素居冨貴稱也才謀德業衆所尊信畏服則國勢倚之而重卿德業之茂才謀之偉積孚于衆望出分憂寄盡董師干十乘啓行有日矣本兵置使特壯前茅豈以冨貴卿哉矧兩相兼官於中元戎專官於外體貌均一脈絡貫通修扞于艱以敉寧武圗功蓋在此行虎拜稽首對揚王休毋屢勤遜牘為也所辭冝不允仍斷來章文武百寮宰臣鄭清之等上表奏請皇帝正月五日天基聖節御紫宸殿上壽不允批答朕親攬政枋以來嘉與海內相安於善治而秉德不康寧無以輯天人之和咎證荐形於象緯妖氛旁煽於疆垂致使吾民重罹其害夙夜怵厲心焉如搗其敢晏然盛禮備樂于廷以侈誕彌之慶哉群公百辟盍圗往求朕攸濟顧援承平舊章以請君曰卜爾萬壽無疆固天保歸美之至情而嚴恭寅畏天命自度治民祗懼無逸享國之長在此不在彼也其思將順用副憂勤所請冝不允文武百寮宰臣鄭清之等再上表奏請皇帝正月五日天基聖節御紫宸殿上壽不允批答誕節之置非古也我朝列聖觀會通以合禮必隨時而酌損之上天示變則寢同天之祲容萬民失業則蠲天申之縟典蓋以畏天恤民為心不以位為樂也朕獲承至尊休德于今一紀露囊獻賀每仰而不進矧今玩洊雷之象恐懼修省莫敢遑息而可效千秋為宴樂乎約浮崇簡朕志堅定卿等勿重請也所請冝不允謝奕昌再辭免特授保寧軍節度使提舉萬夀觀恩命不允仍斷來章批答后父據春秋褒紀之義帝舅緣大雅申伯之意而外戚恩澤寖博其來尚矣卿以相門芝蘭之彥中闈棠棣之雋蹈履規矩藹有令譽翟車歸謁首建騂旄雖恩數超出拘攣之表而人不謂過豈特舊章之可循抑官惟其稱非私昵之及也樊氏丗篤隂亦戒侈恂恂苗裔傳龜襲紫朕所以期卿者甚逺毋留成命所辭冝不允仍斷來章謝奕禮再辭免特授保康軍節度使提舉萬壽觀恩命不允仍斷來章批答閨門者王道之本后有進賢之志無私謁之心則公道行而幸門塞紀綱立而名器重雖同氣何有乎濫恩卿傃冨貴而退遜服儒雅而謹勑后實嘉之于邑于謝寢廟既成禕衣歸省相祀有恪伯仲一日而授兩節度越常科恩義稱也免櫝來上謂隆名盛典不容幸得而謙畏有加漢四姓罔克專美於前矣亟祗若豫命所辭冝不允仍斷來章平齋文集卷第十五
