body:
  text: 外制四貴妃賈氏贈三代故曾祖嗣業太子少保贈太子太保制勑朕仰觀天樞四星之象俯稽王宫六寢之儀選名閥以建妃帥列嬪而佐后恩同宰輔秩視公台推慶系於一門加愍章於三丗具官某故曽祖具官某忠信行乎里孝友著于家源深流長散作滂葩之潤本固末茂敷為沛艾之芳冝荷祉於孫曽遂參華於宫壼肆稽故典茂發潛光升青宫三太之榮侈黃壤百年之報歆豫休渥燕爾後昆可故曽祖母於氏贈文安郡夫人制勑古者髙禖之祠帶韣而授弓宗廟之服躬桑而獻繭后必以妃參之此朕所以柬求淑德陪輔隂教而成王假有家之吉也匪開其先曷昌厥後具官某故曽祖母某氏令儀中度懿行應規教子則朱􅙲熊軾之榮抱孫則茸纛油幢之重慶垂三葉化應二南冝申拓於脂田用增華於翟茀豫非私授爾尚祗歆可故繼曽祖母於氏贈通義郡夫人制勑后順承乾元朕既選之貂蟬之裔妃密贊坤德朕必選之筆槖之門顧積慶之有𥘉冝追榮之無斁具官某故繼曽祖母某氏幽間女則婉娩婦儀承先以于沼于沚之勤垂後以如山如河之懿是鍾邦媛實冠宫嬙泝産嘏之源流衍疏恩之命數易封名壤增賁幽扄可故祖偉太子少傅贈太子太傅制勑赤城霞起而建標雙闕雲竦而夾路渟涵神秀發越嘉祥地靈人傑之有開德厚流光之可卜具官某故祖具官某材猷雋茂學問精深射䇿決科蚤聳士林之望分符出守晚搴宦路之華惟所積如江河之源故其傳全川嶽之氣子為法從孫有賢妃豫方正王化之基爾盍進儲宫之傅九京可作百丗其昌可故祖母於氏贈蘄春郡夫人制勑帝嚳建四妃而萬化成虞舜立二妃而四海乂蓋得正家之道乃凝治國之功兹位亞於軒龍甫儀新於䄖翟肆嘉內德爰獎先徽具官某故祖母具某氏秉柔之姿履惠和之行閨門視則姻黨推尊生也有涯蚤棄采蘩之潔死焉不朽終流芼荇之芳號既正於小君封更加於大郡僾乎如在其克祗承可故繼祖母陸氏贈和政郡夫人制勑唐之諸妃有以恭順稱者有以敏淑稱者雖稟天姿之懿實原丗範之嚴具官某故繼祖母具某氏步節佩環聲諧琴瑟言言乎勉君子之正翼翼乎承先祖之恭身無愧於女針家克貽於嬪則膺子光寵具乃肅雍紫綬金章既視儀於一品文軒象服冝追命於重闈益開湯沐之封永燕焄蒿之𣏌可故父涉太子少師贈太子太師制勑梁傅有孫首𬒳丗宗之選膠東生女亦形光武之思推百丗之發祥驗一門之流慶肇新妃掖追賁親闈具官某故父具官某敵愾精忠折衝逺略披攘妖祲功成淮泗之郊撫納遺黎恩𬒳淄青之境施隆而報必腆積厚而發亦閎象開次北之星光映遡明之月關睢寤寐思服克參窈窕之求雞鳴警戒相成更致盈昌之助望孚禁壼澤被私庭進東宫師範之尊侈北嶽神休之應繩繩蟄蟄尚克相之可故母史氏贈太寧郡夫人制勑葛覃后妃之本必以在父母家志女功之事言之豫得賢妃言動中繩矩母訓豈無自來哉具官某故母具某氏出韋平之裔歸嚴徐之門熟薰染於詩書恪步趨於禮法維蛇協夢篤生淑之姿禖燕占祥迓衆多之祉眷起家之垂慶冝告第之疏榮申錫郡封永綏廟食可桂如琥除川秦都大茶馬制勑具官某茗出於蜀駔駿來於秦熙寧分職元豐合之故邇者榷牧分而復合爾氣稟溫良治理平易夔巫之民安其政進媯閣之直總秦蜀之務興利除害必有得於熟聞素講者詩曰秉心塞淵騋牝三千又曰思無疆思馬斯臧精爾心思之運蕃吾充廄之良魯衛之政且將改聽易視矣往哉母忽可髙稼知沔州兼利州路提點刑獄公事制勑具官某沔屏翰梁益而扼秦隴自關堡險阻蕩析於兵燼連年繕治舊觀猶未還故擇牧尤遴爾氣度軒豁議論精到周旋閫幕秦蜀如指諸掌朕方趣之來將有訪也而沔非爾莫固吾圉榮以木天之直一道臬事併屬之拊循必厚經理必密東西應援同獎王室必睦小大之獄必以情奉計入奏有日矣可陳隆之除直華文閣知興元府兼安撫制勑具官某西顧之憂朕未嘗一日志也制蜀既分置使副梁又以謀帥請得非原堡失其險難於方面之勳乎爾出入兵間而膽略雄往來塞下而機籌熟沔雖重孰與梁重進直丈奎建屏作牧民生之未殖者爾集之軍政之未核者爾飭之邊防之未密者爾緝之聲援合而彼已無異情志慮公而內外有實政守固而戰克矣往勿替朕命可權兵部侍郎陳公益除集英殿修撰知漳州制勑荷紫槖而事主儒生之榮擁朱􅙲以奉親人子之樂肆升華於論撰庸增重於蕃宣具官某韞篤實之姿迪中和之度通今博古曽靡事於空言明善誠身常自安於平進翼翼從塗之列誾誾經幄之遊如慶雲莫能名其祥如時雨不自知其潤屢抗分符之請勉為紬史之留既上送官爰卑便郡眷言漳浦近接海雖緑林妖祲之已空而篁竹驚魂之靡定亟圗綏輯盡息歎愁雅在本朝豈不念蕭生之志咸知上意正欲觀黃霸之功可吏部郎中權國子司業王與權除國子司業制勑具官某大少司成並置定於隆興朕既得老成之望為大司成以範多士少司成亦必於士望乎取之爾經明而行修本固而末茂冝為人師白首郎潛攝二成均士翕然胥嚮三學之教法政令非爾其誰屬夫學校長育人材之地寬以來之必嚴以導之生徒斤斤皆有法度陽城所以陶冶人心必有在於記事纂言之外者知此則知樂正后夔教胄子之意可樞密院編修官兼右司尤焴除樞密院檢詳兼右司制勑具官某宰樞掾軍國之管強弱安危出焉淳熙甲辰乙巳間三邊無塵九扈樂業時則有文儒以檢詳為右司行其所無事而天下安強蓋爾祖也去之五十年爾以竒材壯志踐厥官故事便冝家有遺墨自公退食盡取而閲之以尚論其丗豈特寶魏證之笏哉朕方懼祖武之不克繩故申告可太府寺簿趙汝譢除樞密院編修官兼權兵部郎官制勑具官某刪潤置官隸樞屬為卑在紹興有若直臣銓在乾道有若名儒熹能大其官爾拔于公族名在甲科鞅掌州縣坐閲群飛之刺天而無競心不既賢乎朕搜英獵雋首在選中擢掾宥廷攝耶武部以貫穿馳騁之材與聞廟畫從容援古誼以訂邦國之若否所居官大矣母安於卑而不之勉可太常寺簿朱揚祖除樞密院編修官兼權刑部郎官制勑具官某八陵隔於腥壒踰百年讎虜燼滅伻來以圗朕灑涕恭覽慨懷朝謁謀及卿士爾鋭於行犯暑披榛祗欵陵下橋山弓劒儼乎猶昔而嵩洛之王氣可挹也星言歸奏良尉朕心進編摩於宥府仍攝事於郎曹姑獎忠勤實階選拔可羅愚除淮西提舉兼知無為軍制勑具官某王師順動科調繁興朕懼淮民之告愈亟下詔蠲逋已責母收今年租非部使者之賢殆壅吾澤爾名家之雋論事剴切處事精練出守江城不求有餘於官而慮民之不足田里用乂其以一節觀風于淮右平爾糴公爾榷察州縣吏奉吾詔不勤而厲民者紏逖之人心固則國勢強矣濡須斗壘特遊刃之餘可黃朴除著作郎兼權考功郎官徐清叟著作佐郎兼權司封郎官葉味道著作佐郎兼權屯田郎官並仍兼崇政殿説書制勑具官某元祐𥘉程頥説書崇政范祖禹在著廷朕登崇畯良思得若人發六經三史之韞爾以魁壘之彥立于朝如玉在山輝潤虹貫經帷論説屢為席前承明金馬之邃網羅舊聞採托前記以一代之史兹舉以屬爾涵養君德鋪張帝典求無愧於昔賢可也青綾入直又以觀爾之吏能可校書郎杜幼節除祕書郎兼莊文府教授制勑具官某漢藏書麒麟天祿命劉向楊雄典校謂之中祕書後漢藏之東觀以馬融為郎惟其稱也爾深於龍韜豹略之學而進於經蔚為兩科之雋翶翔册府摩光奎壁序升以司四部之圖籍且為宗藩師疇不謂稱乃若萬里之情三邊之勢討論餘隟試為朕孰計之可趙與勤除太府寺丞余元廙國子監丞章勱太府寺簿髙奎國子監簿制勑具官某君人在於阜財明道大府掌貢賦之二師氏掌教國子不容偏廢也與勤擢秀宗盟首騰關決之最其為我丞外府而以吏事通敏能稱其家之勱為之簿元廙蜚英膠庠久著敡歷之譽其為我丞胄監而以邊畫精練克踐所學之奎為之簿夫善政得民財善教得民心其得民雖不同而同於盡君師之責爾等其各效厥長以助豫治可資政殿學士提舉萬壽觀兼侍讀宣繒除資政殿大學士光祿大夫提舉洞霄宫制勑朕眷懷元祐登用群賢范鎮以內祠召而辭行馮京以勸讀除而請老維豫宿德有昔遺風肆加進律之恩庸渙告廷之綍具官某體全碩大性韞端良蚤擅文埸盡奪諸儒之氣晚躋政路首參元化之機國論之可否未明人材之進退未決深沉籌畫密勿敷陳巳究同寅協恭之謀乃抗陳力就列之誼功成名遂而身退固適雅懷齒宿才壯而意新每形渴想屬親政柄趣侍經筵逺稽真廟之命耆儒近法阜陵之尊舊學亟冝強起胡不果來進祕殿之大名升爭臣之穹秩夷猶故里匽薄殊庭式昭體貌之隆增重儀刑之舊且酒醴維醹以祈黃耇豈忘壽俊之思母金玉爾音而有遐心尚賴逺猶之告可劉用行除太常寺簿制勑具官某孔子先簿正祭器寅清禮樂之府簿非冗曹比也爾以凝重之器和平之政久著聲於湖表擢置容臺禮制樂作皆參聽之漢儀雜秦唐舞因隋情文本末必稽其失而紏其違母徒諉之簿書之末可宗正寺簿林申差權發遣安吉州制勑具官某衆賢聚於朝而郡國吏不能皆賢元氣猶未貫也故間擇周行之彥以出守爾博習明修蚤藹時譽翔而後集甫簿正于麟宗吳興闕守輟一賢以惠之漢選博士諌大夫為守相之意也修門咫尺轉聞良易勿棘勿弛圗惟厥中可大理少卿謝奕禮除右文殿修撰主管佑神觀仍奉朝請制勑具官某本朝家法上軋三代戚畹冨而貴之不及以政豈特防微杜漸之意示優異也爾晉太傅之懿傳漢長秋之篤友丰神氣度灑然塵表詎容久煩奏讞之冗升班論撰賦廪內祠日奉便朝玉色而山立優且榮矣益厲謙恭之美對敡光大之休可林應龍轉承直郎制勑具官某飛錢造幣蜀材孔良灌輸外帑歲有常額爾董裝發應我賞科其進一階益勤勿懈可户部侍郎淮東總領嶽珂磨勘轉中大夫制勑虞廷考百工之績而黜陟行周官計群吏之治而誅賞定兹疇勞於法從冝疏渥於綸言具官某蚤擅長材屢膺煩使控天塹之勢望久著於算鞭參地官之權班寖髙於禁槖閥匪一朝之積課當三歲之遷爰舉彛章式增文秩元豐近臣之品特示寵榮紹興名將之家益殫忠藎可慈聖太后山陵復土提舉官吳惟德轉翊衛大夫制勑慈殿升真渺仙遊於少廣茂陵卜祔矗王氣於橋山乃眷按行之勞特循褒進之典具官某稟姿溫恪蒞事精勤北省承休特重遭逢之慶東朝罹變可勝攀慕之悲泝沙麓之慶源相稽山之吉壤龍盤鞏勢騩馭妥靈冝陟序於橫階用增華於留務益思謙毖祗對恩榮可參知政事曽從龍贈三代故曽祖詳太傅贈太師制勑朕進寧考之舊臣懷昭陵之碩輔修紀綱於基命宥密之日問政令於同寅協恭之時終定䇿于兩朝用垂休乎億丗去之幾葉有爾曽孫具官某故曽祖具官某靈臺湛凝泰宇昭晣忠和孝友之行悉本諸身詩書禮樂之風遂昌厥後卓犖倫魁之彥雍容近弼之聮逺泝慶源丕敡愍册巖石之瞻師尹蔚為窀穸之光故國之有丗臣益介雲仍之祉可故祖憕太師衛國公贈魏國公制勑元受之參則一貫忠恕之學參得之點則浴沂舞雩之風出雲必自於太山導漾實由於嶓冡不遡所積曷觀厥成具官某故祖具官某性抱沖和氣涵磅礴𣢾假下澤夙優鄉里之評駟馬髙車終遂門閭之志鍾聞孫而間出參大政以更張爰敷告第之恩庸侈傳家之慶自天錫羡文公之衛允臧易地進封畢萬之魏必大營魂儼在寵渥祗歆可才人賈氏故伯沖贈迪功郎制勑具官某氏故伯具某人維邦之媛建閣後庭澤暨一門厥有令典爾其伯父拱木巳隂𥘉品追榮尚歆殊渥可才人賈氏故兄承奉郎貫道贈承事郎制勑具官某氏故兄具官某維邦之媛建閣後庭澤暨一門厥有令典爾其同氣拱木巳隂進秩追榮尚歆殊渥可故母弟迪功郎史商卿贈修職郎制勑具官某氏故母弟具官某維邦之媛建閣後廷澤暨母黨厥有令典爾其季舅拱木巳隂進秩追榮尚歆殊渥可趙以夫除江西路提舉常平茶鹽公事制勑具官某江右壤接閩粵創殘未輔思得賢使者藥石而梁肉之亟還元氣之舊爾以公族儀儀之麟周旋外服藉甚有聞輟臨漳之符以庾節幸一道部邑南豐繄乃故治民之情偽俗之良寙皎如示諸掌咨諏所及精采一變積憊蘇醒矣亦惟深求大學以義為利之意則獲我心可祕書少監趙汝談除宗正少卿依舊兼權直學士院制勑具官某宗正四星在帝座東南漢取象置官以序九族辟強德更生遞為之爾學如辟強行如德文采議論有更生之風羽儀道山翛然澤臞輝浸群玉不可得而親踈也維今屬籍蕃衍盛大過劉氏其為朕奠丗繫辨昭穆而陶之信厚以重盤石之宗視草鑾坡則已試可矣可袁甫除祕書少監制勑具官某朕惟五緯聚奎天開離明之運科目取士而異人出焉故親政以來招選魁躔之雋登之政途列之經幄且進之䇿府爾學傳于家磨礲于師友所造蓋深麾節攸屆既推詩書之澤浸其民又合秀民佳子弟以義理性命之學啓迪而薰陶之自任以斯道若此參領登瀛冝矣詩曰樂只君子邦家之光其疾驅以副虛佇可張嗣古右文殿修撰知平江府制勑具官某漢重三輔唐重四輔闔閭故國吾股肱郡也選任維艱爾蚤聞前輩之論議熟識昭代之典章而材諝足以濟之龍泉干將鳴匣蓋久用之惟恐不亟北門留鑰雖輟干行屏翰近畿徒得君重其通班于祕殿往宣朕意時和歲豐坻京相望民有漁陽不可支之樂而無新店實強取之苦斯稱厥職可趙立夫除祕閣修撰樞密副都承旨制勑具官某天下之勢猶衡朕既遴柬廷彥出長外服必博選民庸入治內服然後無輕重之偏爾頃繇九列觀風近甸聲氣不搖而百蠧戢蓋吏師也孝宣厲精政事樞機周密周貴加詳密貴加謹維爾老於識而精於慮式遄其歸以撰著中祕參宥廷之導旨周密以濟中興其庶矣乎可朱鑑除大理寺簿林瓌軍器監簿制勑具官某等作士而致猾夏之誅獻囚而參獻馘之禮此致刑儲戎所以分職並命也爾鑑所傳者正濟以疏通爾瓌所養者厚守以靜退朕惟兵刑非二事既命鑑以鈎棘寺之違又命瓌以稽戎監之闕能使桁楊卧於圜扉戈鋋森於武庫厥職無不舉矣可張元簡除直寶文閣知鄂州兼沿江制置副使制勑具官某江漢上流而下三制閫相望撑裏拓表之勢也鄂渚參襄陽金陵之間事權既還責任與等爾氣盛於折衝謀深於應變而崇論足以發之廷臣歡謂可當一面寶奎寓直龍節虎符往為朕控長江而制勝逺觀三國必爭之形近考中興布置之略民力汝𥙿軍實汝充千艘萬弩汝肄墜者舉惰者奮而隱然老羆當道之足恃乃言砥績矣可權户部尚書真德秀除翰林學士知制誥兼侍讀制勑天下之動正夫一務興起於群心聖人之情見乎辭在宣昭於大訓迪惟仁祖有若臣修朝京師於甲午之元拜內相於季秋之月其深厚則兩都之正氣其坥明則三代之遺風登崇若人鼓舞斯丗具官某剛而濟以大和而約之中殫見洽聞學貫乎百丗之上崇論閎議名塞乎兩儀之間先帝封植以詒謀沖人招徠而訪落甫辭儤直遽厭論思羔羊素絲五紽每慨懷於正直白駒生芻一束徒嘉歎於逍遙惟碩果之剝不窮故拔茅之泰有待少重十連之寄遄歸八座之班屬親攬於皇綱志中興於帝業豫欲山東之聽詔令觀化成於須臾豫欲河西之𬒳璽書驚明見於萬里疇咨大筆樂得英髦趣躋鼇禁之崇仍侍虎門之邃虞夏之書渾爾逺追雅奧之風堯舜之道皇兮備究緝熙之益尚圖大任用穆群瞻可曽頴秀除浙西路提點刑獄公事制勑具官某畿內部使者諸道取則非識召南甘棠行露之意不在繡斧之選爾篤學喜修風裁簡逺抱夜光而不輕售起之浙右之節行以潔矩之道貪殘退聽善良吐氣四方將於是乎觀不特狴犴之無冤也矧伯氏陳時臬事千閩其思光華所𬒳無逺邇之間可都官郎中傅壅差知嚴州制勑具官某諌大夫有以直聲著於嘉定𥘉者吾不得而見之思用其子爾謹守家學而有父風不阿不詭安於平進朕始親政事既起之丞又進之郎顧猶退然以疾辭維爾郡縣最著於江閩久矣嚴陵輔邦姑分符竹少需葵丘之戍以俟疾平朕不汝忘也可鄒應龍父徽贈宣奉大夫制勑蕆儀丗室備殫饗帝之誠肆眚端闈誕布漏泉之澤矧義方之垂慶冝愍典之追榮具官某侃侃德人怡怡善士一真不鑿伹知櫝玉之藏萬卷有傅何愛籝金之滿鍾倫魁之雅望通法從之穹班嚴父之禮既成顯親之恩可後蕭零湛露特升一列之華木撼悲風尚吐九原之氣可葉宰直華文閣知泉州制勑具官某朕嘉與海內更始疇昔庶士御事淫朋比德者退之有為有猷有守者進之而內外肅爾以直簡之器明通之識列在烏府斡棄周鼎而寶康瓠時論日陂乃能不為咸股之隨有識韙之泉七閩望郡且管琛航凋憊久而未蘇爾其以奎直起家熟思振刷之方挽回冨庶之舊用稱簡拔可陳舜臣湖北提點刑獄公事林演提舉湖北路常平茶鹽公事制勑具官某等禹貢田賦定於雲土夢作乂之後召南獄訟息於美化行乎江漢之餘今荆楚境也故出節而分遣爾舜臣以詳練之材治雍管逺民安之司庾湖右就進憲節明刑弼教必能使江漢皆善俗爾演以平易之政治景陵人有去思易麾安陸亟進庾節推利豫民必能使雲夢無橫斂夫監司賢則郡守賢郡守賢則縣令賢轉移習俗當自身始保護風寒亦惟本固往懋哉可桂萬榮直寶章閣知常德府彭方直祕閣知袁州制勑具官某等汲黯願出入禁闥蕭望之雅意本朝士以華近為榮自昔然也而吾望郎如萬榮名監少如方顧牽聮以外庸請豈朕待賢之道有未至耶抑賢者體國無內外之間也武陵統乎澧辰沅靖冝春介乎潭洪贛吉其俗皆易治而難服爾萬榮豫職往守武陵爾方豫職往守冝春寬以字之靜以鎮之異壤而同治矣朕將於此乎選表可留元剛轉中大夫直寶文閣致仕制勑具官某唐以博學宏詞設科裴度陸贄李絳杜黃裳繇此途選今其蜚聲是科者皆列在禁近惜一賢之不及見也爾學該七略文成一家先朝以殊科擢置柱下史未為不遇而留滯周南抑何久耶未衰告老冝實僅秀進之華秩仍直寶奎以寄賢雋之思尚祗休渥可權刑部尚書李􅌫除權禮部尚書兼侍讀制勑羲易之定民志莫先乎乾坤衣裳禹範之敘彛倫莫大乎威福玉食朕收還八柄扶立三綱堂陛之分既嚴鼎吕之勢斯重為國以禮待人而行具官某氣清而神腴齒宿而意壯奫淪其學瞿唐三峽之深紆餘其文卭郲九折之峻自夾螭而振武屢鳴鳯以蜚聲去不可留用然後見油幢中立坐息江湖之波茸纛外馳盡收峩雪之祲茂賢勞而不伐堅𥘉志以善藏玩丗何求際時乃出渴大老之入見促便朝之給扶中庸九經所陳者天下國家之道丘索五典所讀者上丗帝王之書嘉德義之可尊知文獻之足證擢繇司冦進攝春官以正名為衛之先以秉禮為魯之本豈止九賔之臚句群臣無敢喧譁抑令三輔之威儀老吏或至垂泣乃若石室太史之業金華師氏之功具罄英猷奚煩多訓可禮部尚書陳卓除吏部尚書兼給事中兼侍讀制勑朕仰惟孝廟夙重天官妙選於乾道淳熙之間豈一二士真除於俊卿必大之後才三數人矧趨瑣闥之嚴仍侍露門之邃輯兹茂渥屬我耆儒具官某玉粹而春和霜明而秋潔代言爾雅蔚乎廊廟之文批勑森嚴屹然社稷之器久周旋於禁槖日密勿於宸旒望之則祥麟威鳯之在廷親之則天球洪璧之照几簡知惟舊鄉用罙深眷遵晦於十年甫厲精於期月內間請謁既絶側門敕授之風外杜營求盡革都堂唱注之弊猶慮三銓之法未精九等之材疇庸儀曹冠序選部以水鏡之清而洗丗道之濁以衡石之公而遏物情之私品藻之鑒既髙論思之望逾重帥屬掌治朕方思周公六典之規知人安民爾盍究臯陶九德之訓祗承眷倚懋對儀圗可崔福轉兩官制勑具官某邊城讎保虓將火攻烈熖駕風危櫓飛燼受降既久論賞可稽峻陟武階力圗忠報可故通直郎遊九言特贈直龍圗閣制勑具官某洙泗之傳為伊洛伊洛之傳為建之熹潭之栻得其學者皆能著見於丗爾天姿敏強博極群書而質疑就正於二子體之心驗之身且推之民其學進乎成矣習偽有禁秉德不回棄通籍而抱遺經賫志黃壤朕聞而嘉之羲圗寓直表厲節介光明芬郁於百丗者未嘗沒也可葉奭除宗學博士金淵國子博士戚士遜太學博士袁商武學博士兼魏惠獻王府教授制勑具官某等漢重師法淄川濟南齊魯燕趙之學皆以專門名家為博士或變其師説雖衆薦不得與厥選蓋精爾奭直而方有折角之風爾淵莊而靜有下帷之志爾士遜明而整五業並授爾商端而潔諸家兼通其學悉有師法兹進奭于宗庠進淵士遜于上庠進商于右庠仍範我麟定各推所藴招諸生立堂下誨以仁義道德性命之歸正學有傳矣可將作監簿劉克莊除宗正寺簿制勑具官某鶴鳴于九臯聲聞于天士抱負足以鳴於丗雖逖隱未有不逹於朕聽者爾學有源文有度斂芒鏟采不與韋布角進而英聲發越不容掩朕夙有聞焉瑤牒屬籍與慶系仙源圗譜纂輯于司宗天近地嚴有列其中者皆名儒咨爾往簿正之途轍清矣益養其聲之所自出以鳴國家之盛可戴杰宗學諭何處恬太學正馮去疾太學録王萬國子録制勑具官某等士始進于朝而優遊詩書之林饜飫道德之海不其榮乎爾杰之溫明雅有風致爾處恬之沉厚蔚有典刑爾去疾之雋邁逺有志槩爾萬之純茂深有韞藉其學皆可為人師杰往諭宗庠處恬去疾萬往正録成均進之始也大學始教皮辨祭菜宵雅肄三知此則知立教之本可顔頥仲司農寺丞魏峻軍器監簿制勑具官某三代盛時因井田以制軍賦乃積乃倉與干戈戚揚非二事也農寺戎監故並建屬爾頥仲抱材通敏治郡可紀其歸以丞治粟之司爾峻賦姿爽亮立朝可觀其進以簿儲戎之府太倉武庫雖異厥職農以養兵兵以衛農尚於斯有考可韓濤除太社令制勑具官某司社置官紹興中首命臣彥直為之蓋以光寵勳將之家爾同出一門克紹弓冶庀職漕幕能寡悔尤兹故命之丗厥官知寅直之難秉而輕肥之易縱則亢厥官矣可史冝之直龍圗閣致仕制勑具官某維昔兩朝元輔之猶子冝之均佚釐館以謝事告亡幾何台星亦坼朕念之怛然爾敡歷四十餘年業行在州里政理在郡國人能誦之胡遽止於斯也華屋山丘恍其昨夢淵圗進直尚服恩榮可王升轉承節郎制勑具官某造幣之楮來自蜀道爾督綱程靡有稽失進秩一等用酬勞瘁可同鼎武節郎來伯友武翼郎王聞顯武節大夫呼延賞武翼郎制勑具官某等漢開降者封賞之科唐著異域歸忠之傳爾委身王國效力邊城疊二秩以升華肩一心而圗報可張震雷張萬取並輔承信郎制勑具某人等武舉以郭子儀重爾兄弟講磨兵略外省聮登屬邊關之贊籌阻萬里之入對悉授𥘉品開之榮途其相勉以功名見可史彌鞏轉朝散郎髙不儔轉奉議郎制勑具官某管榷國計所關羡利必賞爾庀職京口克懋厥官歲入有常能溢其額俾進升於一列庸獎厲於勞能可不儔改京口為畿內髙平郡夫人毛氏進封和國夫人制勑明德伏波之女自藺發祥和熹太傅之孫由隂育瑞眷慶源之特異冝寵數之增隆具官某氏性行金相容儀玉度河山稟粹嬪于相國之門江漢育徽鍾我俔天之妹篤禕衣之致養侈象服之疏榮號既正於小君秩更加於大國祗膺休渥茂介耆齡可楊恢除直徽猷閣權知襄陽府京西安撫副使制勑具官某西清邃閣列聖圗訓在焉寓直其間非積望之舊效績之新不輕卑躐級而升尤為異數爾擷岷峩之秀吞雲夢之雄進牧京襄坐控許洛文奎峻直越三等而上之蓋以方面之勳望爾非徒以華爾也矧徽猷實維哲廟寶儲遐想俘獲鬼章青冝結之盛尚起壯志可彭鉉廣東路提點刑獄公事石孝淳廣東路轉運判官制勑具官某等五嶺之東官以征粟鬻醝牟利民一疏食不獲安或怵於無聊而動朕甚憫焉爾孝淳守曲江無苛政既出節以推平反之惠就卑外計坐斡賦輿爾鉉守南安有善譽甫增秩以獎中和之最趣攬濡轡往司祥刑其踐實同好整同熟於治理又同觀省民瘼廉訪吏姦相與布宣詔條如朕臨遣母使逺方重蘇洵刺史又抑之歎也可陳畏浙東路提點刑獄公事制勑具官某泰與否相為消長疇昔人材排根於憸人耳目之官者朕悉起諸家食用之不遐遺爾豈弟而廉端方而靜中外之譽俱髙薋菉葹以盈室判獨離而不服冝險德之莫容也錯枉舉直公道是張左浙鄉部亟為朕起衣繡而晝行獄讞之亭吏治之澄惟爾風力之凝可平齋文集卷第二十
