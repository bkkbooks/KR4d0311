body:
  text: 外制四貴妃賈氏贈三代故曾祖嗣業太子少保贈太子太保制勑朕仰觀天樞四星之象俯稽王宫六寢之儀選名閥以建妃帥列嬪而佐后恩同宰輔秩視公台推慶系於一門加愍章於三丗具官某故曽祖具官某忠信行乎里孝友著于家源深流長散作滂葩之潤本固末茂敷爲沛艾之芳冝荷祉於孫曽遂參華於宫壼肆稽故典茂發潜光升青宫三太之榮侈黄壤百年之報歆予休渥燕爾後昆可故曽祖母於氏贈文安郡夫人制勑古者髙禖之祠帶韣而授弓宗廟之服躬桑而獻繭后必以妃參之此朕所以柬求淑德陪輔隂教而成王假有家之吉也匪開其先曷昌厥後具官某故曽祖母某氏令儀中度懿行應規教子則朱􅙲熊軾之榮抱孫則茸纛油幢之重慶垂三葉化應二南冝申拓於脂田用増華於翟茀予非私授爾尚祗歆可故繼曽祖母於氏贈通義郡夫人制勑后順承乾元朕旣選之貂蟬之裔妃宻賛坤德朕必選之筆槖之門顧積慶之有𥘉冝追榮之無斁具官某故繼曽祖母某氏幽閑女則婉娩婦儀承先以于沼于沚之勤垂後以如山如河之懿是鍾邦媛實冠宫嬙泝産嘏之源流衍䟽恩之命數易封名壤増賁幽扄可故祖偉太子少傅贈太子太傅制勑赤城霞起而建標雙闕雲竦而夾路渟涵神秀發越嘉祥地靈人傑之有開德厚流光之可卜具官某故祖具官某材猷雋茂學問精深射䇿决科蚤聳士林之望分符出守晚搴宦路之華惟所積如江河之源故其傳全川嶽之氣子爲法從孫有賢妃予方正王化之基爾盍進儲宫之傅九京可作百丗其昌可故祖母於氏贈蘄春郡夫人制勑帝嚳建四妃而萬化成虞舜立二妃而四海乂蓋得正家之道廼凝治國之功兹位亞於軒龍甫儀新於䄖翟肆嘉内德爰獎先徽具官某故祖母具某氏秉柔之姿履惠和之行閨門視則婣黨推尊生也有涯蚤棄采蘩之㓗死焉不朽終流芼荇之芳號旣正於小君封更加於大郡僾乎如在其克祗承可故繼祖母陸氏贈和政郡夫人制勑唐之諸妃有以恭順稱者有以敏淑稱者雖禀天姿之懿實原丗範之嚴具官某故繼祖母具某氏歩節佩環聲諧琴瑟言言乎勉君子之正翼翼乎承先祖之恭身無愧於女箴家克貽於嬪則膺子光寵具乃肅雍紫綬金章旣視儀於一品文軒象服冝追命於重闈益開湯沐之封永燕焄蒿之𣏌可故父渉太子少師贈太子太師制勑梁傅有孫首𬒳丗宗之選膠東生女亦形光武之思推百丗之發祥驗一門之流慶肇新妃掖追賁親闈具官某故父具官某敵愾精忠折衝逺略披攘妖祲功成淮泗之郊撫納遺黎恩𬒳淄青之境施隆而報必腆積厚而發亦閎象開次北之星光映遡明之月關睢寤寐思服克參窈窕之求雞鳴警戒相成更致盈昌之助望孚禁壼澤被私庭進東宫師範之尊侈北岳神休之應繩繩蟄蟄尚克相之可故母史氏贈太寧郡夫人制勑葛覃后妃之本必以在父母家志女功之事言之予得賢妃言動中繩矩母訓豈無自來哉具官某故母具某氏出韋平之裔歸嚴徐之門熟薫染於詩書恪歩趨於禮法維蛇恊夢篤生淑之姿禖燕占祥迓衆多之祉睠起家之垂慶冝告第之䟽榮申錫郡封永綏廟食可桂如琥除川秦都大茶馬制勑具官某茗出於蜀駔駿來於秦熈寧分職元豐合之故邇者榷牧分而復合爾氣禀温良治理平易䕫巫之民安其政進嬀閣之直緫秦蜀之務興利除害必有得於熟聞素講者詩曰秉心塞淵騋牝三千又曰思無疆思馬斯臧精爾心思之運蕃吾充廐之良魯衛之政且將改聽易視矣往哉母忽可髙稼知沔州兼利州路提點刑獄公事制勑具官某沔屏翰梁益而扼秦隴自關堡險阻蕩析於兵燼連年繕治舊觀猶未還故擇牧尤遴爾氣度軒豁議論精到周旋閫幙秦蜀如指諸掌朕方趣之來將有訪也而沔非爾莫固吾圉榮以木天之直一道臬事併屬之拊循必厚經理必宻東西應援同獎王室必睦小大之獄必以情奉計入奏有日矣可陳隆之除直華文閣知興元府兼安撫制勑具官某西顧之憂朕未嘗一日志也制蜀旣分置使副梁又以謀帥請得非原堡失其險難於方面之勲乎爾出入兵間而膽略雄往來塞下而機籌熟沔雖重孰與梁重進直丈奎建屏作牧民生之未殖者爾集之軍政之未覈者爾飭之邊防之未宻者爾緝之聲援合而彼已無異情志慮公而内外有實政守固而戰克矣往勿替朕命可權兵部侍郎陳公益除集英殿修撰知漳州制勑荷紫槖而事主儒生之榮擁朱􅙲以奉親人子之樂肆升華於論譔庸増重於蕃宣具官某韞篤實之姿迪中和之度通今博古曽靡事於空言明善誠身常自安於平進翼翼從塗之列誾誾經幄之游如慶雲莫能名其祥如時雨不自知其潤屢抗分符之請勉爲紬史之留旣上送官爰卑便郡睠言漳浦近接海雖緑林妖祲之已空而篁竹驚魂之靡定亟圗綏輯盡息歎愁雅在本朝豈不念蕭生之志咸知上意正欲觀黄霸之功可吏部郎中權國子司業王與權除國子司業制勑具官某大少司成並置定於隆興朕旣得老成之望爲大司成以範多士少司成亦必於士望乎取之爾經明而行修本固而末茂冝爲人師白首郎潜攝貳成均士翕然胥嚮三學之教法政令非爾其誰屬夫學校長育人材之地寛以來之必嚴以導之生徒斤斤皆有法度陽城所以陶冶人心必有在於記事纂言之外者知此則知樂正后䕫教胄子之意可樞宻院編修官兼右司尤焴除樞宻院檢詳兼右司制勑具官某宰樞掾軍國之筦彊弱安危出焉淳熈甲辰乙巳間三邊無塵九扈樂業時則有文儒以檢詳爲右司行其所無事而天下安強蓋爾祖也去之五十年爾以竒材壯志踐厥官故事便冝家有遺墨自公退食盡取而閱之以尚論其丗豈特寳魏證之笏哉朕方懼祖武之不克繩故申告可太府寺簿趙汝譢除樞宻院編修官兼權兵部郎官制勑具官某刪潤置官隷樞屬爲卑在紹興有若直臣銓在乾道有若名儒熹能大其官爾拔于公族名在甲科鞅掌州縣坐閱群飛之刺天而無競心不旣賢乎朕蒐英獵雋首在選中擢掾宥廷攝耶武部以貫穿馳騁之材與聞廟畫從容援古誼以訂邦國之若否所居官大矣母安於卑而不之勉可太常寺簿朱揚祖除樞宻院編修官兼權刑部郎官制勑具官某八陵隔於腥壒踰百年讎虜燼滅伻來以圗朕灑涕恭覽慨懷朝謁謀及卿士爾銳於行犯暑披榛祗欵陵下橋山弓劒儼乎猶昔而嵩洛之王氣可挹也星言歸奏良尉朕心進編摩於宥府仍攝事於郎曹姑獎忠勤實階選拔可羅愚除淮西提舉兼知無爲軍制勑具官某王師順動科調繁興朕懼淮民之告瘉亟下詔蠲逋已責母収今年租非部使者之賢殆壅吾澤爾名家之雋論事剴切處事精練出守江城不求有餘於官而慮民之不足田里用乂其以一節觀風于淮右平爾糴公爾榷察州縣吏奉吾詔不勤而厲民者紏逖之人心固則國勢強矣濡湏斗壘特游刃之餘可黄朴除著作郎兼權考功郎官徐清叟著作佐郎兼權司封郎官葉味道著作佐郎兼權屯田郎官並仍兼崇政殿說書制勑具官某元祐𥘉程頥說書崇政范祖禹在著廷朕登崇畯良思得若人發六經三史之韞爾以魁壘之彦立于朝如玉在山輝潤虹貫經帷論說屢爲席前承明金馬之邃網羅舊聞採摭前記以一代之史兹舉以屬爾涵養君德鋪張帝典求無媿於昔賢可也青綾入直又以觀爾之吏能可校書郎杜㓜節除祕書郎兼莊文府教授制勑具官某漢藏書麒麟天禄命劉向楊雄典校謂之中祕書後漢藏之東觀以馬融爲郎惟其稱也爾深於龍韜豹略之學而進於經蔚爲兩科之雋翶翔冊府摩光奎壁序升以司四部之圖籍且爲宗藩師疇不謂稱乃若萬里之情三邊之勢討論餘隟試爲朕孰計之可趙與懃除太府寺丞余元廙國子監丞章勱太府寺簿髙奎國子監簿制勑具官某君人在於阜財明道大府掌貢賦之貳師氏掌教國子不容偏廢也與懃擢秀宗盟首騰關决之最其爲我丞外府而以吏事通敏能稱其家之勱爲之簿元廙蜚英膠庠乆著敡歴之譽其爲我丞胄監而以邊畫精練克踐所學之奎爲之簿夫善政得民財善教得民心其得民雖不同而同於盡君師之責爾等其各效厥長以助予治可資政殿學士提舉萬壽觀兼侍讀宣繒除資政殿大學士光禄大夫提舉洞霄宫制勑朕睠懷元祐登用群賢范鎮以内祠召而辭行馮京以勸讀除而請老維予宿德有昔遺風肆加進律之恩庸渙告廷之綍具官某體全碩大性韞端良蚤擅文埸盡奪諸儒之氣晚躋政路首參元化之機國論之可否未明人材之進退未决深沉籌畫宻勿敷陳巳究同寅協恭之謀廼抗陳力就列之誼功成名遂而身退固適雅懷齒宿才壯而意新毎形渇想屬親政柄趣侍經筵逺稽真廟之命耆儒近法阜陵之尊舊學亟冝強起胡不果來進祕殿之大名升争臣之穹秩夷猶故里匽薄殊庭式昭體貌之隆増重儀刑之舊且酒醴維醹以祈黄耇豈忘壽俊之思母金玉爾音而有遐心尚頼逺猶之告可劉用行除太常寺簿制勑具官某孔子先簿正祭噐寅清禮樂之府簿非冗曹比也爾以凝重之噐和平之政乆著聲於湖表擢寘容臺禮制樂作皆參聽之漢儀雜秦唐舞因隋情文本末必稽其失而紏其違母徒諉之簿書之末可宗正寺簿林申差權發遣安吉州制勑具官某衆賢聚於朝而郡國吏不能皆賢元氣猶未貫也故間擇周行之彦以出守爾博習明修蚤藹時譽翔而後集甫簿正于麟宗呉興闕守輟一賢以惠之漢選博士諌大夫爲守相之意也脩門咫尺轉聞良易勿棘勿弛圗惟厥中可大理少卿謝奕禮除右文殿修撰主管佑神觀仍奉朝請制勑具官某本朝家法上軋三代戚畹冨而貴之不及以政豈特防微杜漸之意示優異也爾晉太傅之懿傳漢長秋之篤友丰神氣度灑然塵表詎容乆煩奏讞之冗升班論譔賦廪内祠日奉便朝玉色而山立優且榮矣益厲謙恭之美對敡光大之休可林應龍轉承直郎制勑具官某飛錢造幣蜀材孔良灌輸外帑歳有常額爾董裝發應我賞科其進一階益勤勿懈可户部侍郎淮東緫領岳珂磨勘轉中大夫制勑虞廷考百工之績而黜陟行周官計群吏之治而誅賞定兹疇勞於法從冝䟽渥於綸言具官某蚤擅長材屢膺煩使控天塹之勢望乆著於筭鞭參地官之權班寖髙於禁槖閥匪一朝之積課當三歳之遷爰舉彛章式増文秩元豐近臣之品特示寵榮紹興名將之家益殫忠藎可慈聖太后山陵復土提舉官呉惟德轉翊衛大夫制勑慈殿升真渺僊游於少廣茂陵卜祔矗王氣於橋山廼睠按行之勞特循襃進之典具官某禀姿温恪莅事精勤北省承休特重遭逢之慶東朝罹變可勝攀慕之悲泝沙麓之慶源相稽山之吉壤龍盤鞏勢騩馭妥靈冝陟序於横階用増華於留務益思謙毖祗對恩榮可叅知政事曽從龍贈三代故曽祖詳太傅贈太師制勑朕進寧考之舊臣懷昭陵之碩輔修紀綱於基命宥宻之日問政令於同寅協恭之時終定䇿于兩朝用垂休乎億丗去之幾葉有爾曽孫具官某故曽祖具官某靈臺湛凝㤗宇昭晣忠和孝友之行悉本諸身詩書禮樂之風遂昌厥後卓犖倫魁之彦雍容近弼之聮逺泝慶源丕敡愍冊巖石之瞻師尹蔚爲窀穸之光故國之有丗臣益介雲仍之祉可故祖憕太師衛國公贈魏國公制勑元受之參則一貫忠恕之學參得之點則浴沂舞雩之風出雲必自於太山導漾實由於嶓冡不遡所積曷觀厥成具官某故祖具官某性抱冲和氣涵磅礴𣢾叚下澤夙優郷里之評駟馬髙車終遂門閭之志鍾聞孫而間出參大政以更張爰敷告第之恩庸侈傳家之慶自天錫羡文公之衛允臧易地進封畢萬之魏必大營魂儼在寵渥祗歆可才人賈氏故伯冲贈迪功郎制勑具官某氏故伯具某人維邦之媛建閤後庭澤曁一門厥有令典爾其伯父拱木巳隂𥘉品追榮尚歆殊渥可才人賈氏故兄承奉郎貫道贈承事郎制勑具官某氏故兄具官某維邦之媛建閤後庭澤曁一門厥有令典爾其同氣拱木巳隂進秩追榮尚歆殊渥可故母弟迪功郎史商卿贈修職郎制勑具官某氏故母弟具官某維邦之媛建閤後廷澤曁母黨厥有令典爾其季舅拱木巳隂進秩追榮尚歆殊渥可趙以夫除江西路提舉常平茶鹽公事制勑具官某江右壤接閩粤創殘未𥙷思得賢使者藥石而梁肉之亟還元氣之舊爾以公族儀儀之麟周旋外服藉甚有聞輟臨漳之符以庾節幸一道部邑南豐繄乃故治民之情僞俗之良寙皦如示諸掌咨諏所及精采一變積憊甦醒矣亦惟深求大學以義爲利之意則獲我心可祕書少監趙汝談除宗正少卿依舊兼權直學士院制勑具官某宗正四星在帝座東南漢取象置官以序九族辟彊德更生遞爲之爾學如辟彊行如德文采議論有更生之風羽儀道山翛然澤臞輝浸群玉不可得而親踈也維今屬籍蕃衍盛大過劉氏其爲朕奠丗繫辨昭穆而陶之信厚以重盤石之宗視草鑾坡則已試可矣可袁甫除祕書少監制勑具官某朕惟五緯聚奎天開離明之運科目取士而異人出焉故親政以來招選魁躔之雋登之政途列之經幄且進之䇿府爾學傳于家磨礲于師友所造蓋深麾節攸届旣推詩書之澤浸其民又合秀民佳子弟以義理性命之學啓迪而薫陶之自任以斯道若此參領登瀛冝矣詩曰樂只君子邦家之光其疾驅以副虚佇可張嗣古右文殿修撰知平江府制勑具官某漢重三輔唐重四輔闔閭故國吾股肱郡也選任維艱爾蚤聞前輩之論議熟識昭代之典章而材諝足以濟之龍泉干將鳴匣蓋乆用之惟恐不亟北門留鑰雖輟干行屏翰近畿徒得君重其通班于祕殿往宣朕意時和歳豐坻京相望民有漁陽不可支之樂而無新店實強取之苦斯稱厥職可趙立夫除祕閣修撰樞宻副都承旨制勑具官某天下之勢猶衡朕旣遴柬廷彦出長外服必博選民庸入治内服然後無輕重之偏爾頃繇九列觀風近甸聲氣不揺而百蠧戢蓋吏師也孝宣厲精政事樞機周宻周貴加詳宻貴加謹維爾老於識而精於慮式遄其歸以譔著中祕參宥廷之導旨周宻以濟中興其庶矣乎可朱鑑除大理寺簿林瓌軍噐監簿制勑具官某等作士而致猾夏之誅獻囚而參獻馘之禮此致刑儲戎所以分職並命也爾鑑所傳者正濟以䟽通爾瓌所養者厚守以静退朕惟兵刑非二事旣命鑑以鈎棘寺之違又命瓌以稽戎監之闕能使桁楊卧於圜扉戈鋋森於武庫厥職無不舉矣可張元簡除直寶文閣知鄂州兼㳂江制置副使制勑具官某江漢上流而下三制閫相望撑裏拓表之勢也鄂渚參襄陽金陵之間事權旣還責任與等爾氣盛於折衝謀深於應變而崇論足以發之廷臣讙謂可當一面寶奎寓直龍節虎符往爲朕控長江而制勝逺觀三國必争之形近考中興布置之略民力汝𥙿軍實汝充千艘萬弩汝肄墜者舉惰者奮而隱然老羆當道之足恃乃言厎績矣可權户部尚書眞德秀除翰林學士知制誥兼侍讀制勑天下之動正夫一務興起於群心聖人之情見乎辭在宣昭於大訓迪惟仁祖有若臣脩朝京師於甲午之元拜内相於季秋之月其深厚則兩都之正氣其坥明則三代之遺風登崇若人皷舞斯丗具官某剛而濟以大和而約之中殫見洽聞學貫乎百丗之上崇論閎議名塞乎兩儀之間先帝封植以詒謀冲人招徠而訪落甫辭儤直遽厭論思羔羊素絲五紽毎慨懷於正直白駒生芻一束徒嘉歎於逍遥惟碩果之剥不窮故拔茅之㤗有待少重十連之寄遄歸八座之班屬親攬於皇綱志中興於帝業予欲山東之聽詔令觀化成於湏臾予欲河西之𬒳璽書驚明見於萬里疇咨大筆樂得英髦趣躋鼇禁之崇仍侍虎門之邃虞夏之書渾爾逺追雅奥之風堯舜之道皇兮備究緝熈之益尚圖大任用穆群瞻可曽頴秀除浙西路提點刑獄公事制勑具官某畿内部使者諸道取則非識召南甘棠行露之意不在繡斧之選爾篤學喜脩風裁簡逺抱夜光而不輕售起之浙右之節行以絜矩之道貪殘退聽善良吐氣四方將於是乎觀不特狴犴之無冤也矧伯氏陳時臬事千閩其思光華所𬒳無逺邇之間可都官郎中傅壅差知嚴州制勑具官某諌大夫有以直聲著於嘉定𥘉者吾不得而見之思用其子爾謹守家學而有父風不阿不詭安於平進朕始親政事旣起之丞又進之郎顧猶退然以疾辭維爾郡縣最著於江閩乆矣嚴陵輔邦姑分符竹少需葵丘之戍以俟疾平朕不汝忘也可鄒應龍父徽贈宣奉大夫制勑蕆儀丗室備殫饗帝之誠肆眚端闈誕布漏泉之澤矧義方之垂慶冝愍典之追榮具官某侃侃德人怡怡善士一眞不鑿伹知櫝玉之藏萬卷有傅何愛籝金之滿鍾倫魁之雅望通法從之穹班嚴父之禮旣成顯親之恩可後蕭零湛露特升一列之華木撼悲風尚吐九原之氣可葉宰直華文閣知泉州制勑具官某朕嘉與海内更始疇昔庶士御事淫朋比德者退之有爲有猷有守者進之而内外肅爾以直簡之噐明通之識列在烏府斡棄周鼎而寶康瓠時論日陂乃能不爲咸股之隨有識韙之泉七閩望郡且筦琛航凋憊乆而未甦爾其以奎直起家熟思振刷之方挽回冨庶之舊用稱簡拔可陳舜臣湖北提點刑獄公事林演提舉湖北路常平茶鹽公事制勑具官某等禹貢田賦定於雲土夢作乂之後召南獄訟息於美化行乎江漢之餘今荆楚境也故出節而分遣爾舜臣以詳練之材治邕管逺民安之司庾湖右就進憲節明刑弼教必能使江漢皆善俗爾演以平易之政治景陵人有去思易麾安陸亟進庾節推利予民必能使雲夢無横歛夫監司賢則郡守賢郡守賢則縣令賢轉移習俗當自身始保護風寒亦惟本固往懋哉可桂萬榮直寶章閣知常德府彭方直祕閣知袁州制勑具官某等汲黯願出入禁闥蕭望之雅意本朝士以華近爲榮自昔然也而吾望郎如萬榮名監少如方顧牽聮以外庸請豈朕待賢之道有未至耶抑賢者體國無内外之間也武陵統乎澧辰沅靖冝春介乎潭洪贛吉其俗皆易治而難服爾萬榮予職往守武陵爾方予職往守冝春寛以字之静以鎮之異壤而同治矣朕將於此乎選表可留元剛轉中大夫直寶文閣致仕制勑具官某唐以博學宏詞設科裴度陸䞇李絳杜黄裳繇此途選今其蜚聲是科者皆列在禁近惜一賢之不及見也爾學該七略文成一家先朝以殊科擢寘柱下史未爲不遇而留滯周南抑何乆耶未衰告老冝實僅秀進之華秩仍直寶奎以寄賢雋之思尚祗休渥可權刑部尚書李􅌫除權禮部尚書兼侍讀制勑羲易之定民志莫先乎乾坤衣裳禹範之叙彛倫莫大乎威福玉食朕収還八柄扶立三綱堂陛之分旣嚴鼎吕之勢斯重爲國以禮待人而行具官某氣清而神腴齒宿而意壯奫淪其學瞿唐三峽之深紆餘其文卭郲九折之峻自夾螭而振武屢鳴鳯以蜚聲去不可留用然後見油幢中立坐息江湖之波茸纛外馳盡収峩雪之祲茂賢勞而不伐堅𥘉志以善藏玩丗何求際時乃出渇大老之入見促便朝之給扶中庸九經所陳者天下國家之道丘索五典所讀者上丗帝王之書嘉德義之可尊知文獻之足證擢繇司冦進攝春官以正名爲衛之先以秉禮爲魯之本豈止九賔之臚句群臣無敢諠譁抑令三輔之威儀老吏或至垂泣乃若石室太史之業金華師氏之功具罄英猷奚煩多訓可禮部尚書陳卓除吏部尚書兼給事中兼侍讀制勑朕仰惟孝廟夙重天官妙選於乾道淳熈之間豈一二士眞除於俊卿必大之後纔三數人矧趨瑣闥之嚴仍侍露門之邃輯兹茂渥屬我耆儒具官某玉粹而春和霜明而秋㓗代言爾雅蔚乎廊廟之文批勑森嚴屹然社稷之噐乆周旋於禁槖日宻勿於宸旒望之則祥麟威鳯之在廷親之則天球洪璧之照几簡知惟舊郷用罙深睠遵晦於十年甫厲精於期月内閑請謁旣絶側門敕授之風外杜營求盡革都堂唱注之弊猶慮三銓之法未精九等之材疇庸儀曹冠序選部以水鏡之清而洗丗道之濁以衡石之公而遏物情之私品藻之鑒旣髙論思之望逾重帥屬掌治朕方思周公六典之規知人安民爾盍究臯陶九德之訓祗承眷倚懋對儀圗可崔福轉兩官制勑具官某邊城讎保虓將火攻烈熖駕風危櫓飛燼受降旣乆論賞可稽峻陟武階力圗忠報可故通直郎游九言特贈直龍圗閣制勑具官某洙泗之傳爲伊洛伊洛之傳爲建之熹潭之栻得其學者皆能著見於丗爾天姿敏強博極群書而質疑就正於二子體之心驗之身且推之民其學進乎成矣習僞有禁秉德不回棄通籍而抱遺經賫志黄壤朕聞而嘉之羲圗寓直表厲節介光明芬郁於百丗者未嘗没也可葉奭除宗學博士金淵國子博士戚士遜太學博士袁商武學博士兼魏惠獻王府教授制勑具官某等漢重師法淄川濟南齊魯燕趙之學皆以專門名家爲博士或變其師說雖衆薦不得與厥選蓋精爾奭直而方有折角之風爾淵莊而静有下帷之志爾士遜明而整五業並授爾商端而㓗諸家兼通其學悉有師法兹進奭于宗庠進淵士遜于上庠進商于右庠仍範我麟定各推所藴招諸生立堂下誨以仁義道德性命之歸正學有傳矣可將作監簿劉克莊除宗正寺簿制勑具官某鶴鳴于九臯聲聞于天士抱負足以鳴於丗雖逖隱未有不逹於朕聽者爾學有源文有度歛芒鏟采不與韋布角進而英聲發越不容揜朕夙有聞焉瑤牒屬籍與慶系僊源圗譜纂輯于司宗天近地嚴有列其中者皆名儒咨爾往簿正之途轍清矣益養其聲之所自出以鳴國家之盛可戴杰宗學諭何處恬太學正馮去疾太學録王萬國子録制勑具官某等士始進于朝而優游詩書之林饜飫道德之海不其榮乎爾杰之温明雅有風致爾處恬之沉厚蔚有典刑爾去疾之雋邁逺有志槩爾萬之純茂深有韞藉其學皆可爲人師杰往諭宗庠處恬去疾萬往正録成均進之始也大學始教皮弁祭菜宵雅肄三知此則知立教之本可顔頥仲司農寺丞魏峻軍噐監簿制勑具官某三代盛時因井田以制軍賦廼積廼倉與干戈戚揚非二事也農寺戎監故並建屬爾頥仲抱材通敏治郡可紀其歸以丞治粟之司爾峻賦姿爽亮立朝可觀其進以簿儲戎之府太倉武庫雖異厥職農以養兵兵以衛農尚於斯有考可韓濤除太社令制勑具官某司社置官紹興中首命臣彦直爲之蓋以光寵勳將之家爾同出一門克紹弓冶庀職漕幕能寡悔尤兹故命之丗厥官知寅直之難秉而輕肥之易縱則亢厥官矣可史冝之直龍圗閣致仕制勑具官某維昔兩朝元輔之猶子冝之均佚釐館以謝事告亡幾何台星亦坼朕念之怛然爾敡歴四十餘年業行在州里政理在郡國人能誦之胡遽止於斯也華屋山丘恍其昨夢淵圗進直尚服恩榮可王陞轉承節郎制勑具官某造幣之楮來自蜀道爾督綱程靡有稽失進秩一等用酬勞瘁可同鼎武節郎來伯友武翼郎王聞顯武節大夫呼延賞武翼郎制勑具官某等漢開降者封賞之科唐著異域歸忠之傳爾委身王國效力邊城疊二秩以升華肩一心而圗報可張震雷張萬取並𥙷承信郎制勑具某人等武舉以郭子儀重爾兄弟講磨兵略外省聮登屬邊關之賛籌阻萬里之入對悉授𥘉品開之榮途其相勉以功名見可史彌鞏轉朝散郎髙不儔轉奉議郎制勑具官某筦榷國計所關羡利必賞爾庀職京口克懋厥官歳入有常能溢其額俾進升於一列庸獎厲於勞能可不儔改京口爲畿内髙平郡夫人毛氏進封和國夫人制勑明德伏波之女自藺發祥和熹太傅之孫由隂毓瑞睠慶源之特異冝寵數之増隆具官某氏性行金相容儀玉度河山禀粹嬪于相國之門江漢毓徽鍾我俔天之妹篤禕衣之致養侈象服之䟽榮號旣正於小君秩更加於大國祗膺休渥茂介耆齡可楊恢除直徽猷閣權知襄陽府京西安撫副使制勑具官某西清邃閣列聖圗訓在焉寓直其間非積望之舊效績之新不輕卑躐級而升尤爲異數爾擷岷峩之秀吞雲夢之雄進牧京襄坐控許洛文奎峻直越三等而上之蓋以方面之勲望爾非徒以華爾也矧徽猷實維哲廟寶儲遐想俘獲鬼章青冝結之盛尚起壯志可彭鉉廣東路提點刑獄公事石孝淳廣東路轉運判官制勑具官某等五嶺之東官以征粟鬻醝牟利民一䟽食不獲安或怵於無聊而動朕甚憫焉爾孝淳守曲江無苛政旣出節以推平反之惠就卑外計坐斡賦輿爾鉉守南安有善譽甫増秩以獎中和之最趣攬濡轡往司祥刑其踐實同好整同熟於治理又同觀省民瘼廉訪吏姦相與布宣詔條如朕臨遣母使逺方重蘇洵刺史又抑之歎也可陳畏浙東路提點刑獄公事制勑具官某泰與否相爲消長疇昔人材排根於憸人耳目之官者朕悉起諸家食用之不遐遺爾豈弟而㢘端方而静中外之譽俱髙薋菉葹以盈室判獨離而不服冝險德之莫容也錯枉舉直公道是張左淛郷部亟爲朕起衣繡而晝行獄讞之亭吏治之澄惟爾風力之凝可平齋文集卷第二十
