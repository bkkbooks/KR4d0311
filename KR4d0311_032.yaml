body:
  text: 祭文祭俞侍郎文中興倫魁舄奕顯融頴出天京横浦與公公殖其學裏腴表豐井養厥德用汲不窮匪矯爲崖春陽茸茸温作之厲飛霆駕風匪阻爲巇晴波溶溶平激之躍驚濤矗空肆爲文章奫淪舂容麾屈軋宋轢遷軼雄發造化籥爲丗迪蒙萬象旉與與天爲功再入西掖筆老逾工皷舞八極渾噩嫓隆矧抱勁節志爲氣帥翼如冥鴻碧落無際有冰其山衆倚而睨有蜜其刃衆嗜而嚌公乎閑閑表立一丗卷舌方棘獨犯其銳岸不受馴嗾獒以噬采荼羅山其甘勝薺大明中天攘屏霾曀帝趣公歸不奪彌勵胡爲孤憤菀結惉懘任重道逺竟死弘毅翦焉諸生淑艾一蓺中流失楫夫誰與濟丹旐悠悠遮道哭酹匪私之悲邦國殄瘁龍州新建武侯祠堂祭文三綱五常之理與卑髙俱陳其斁也時其存也人周衰吾夫子作春秋書盗書叛一辭不貰而亂臣賊子懼公以賊名魏迄能倡天下之大義扶天下之大倫此聖賢所以有功於人極而百丗其仁也夫以公之功在天下仁在後丗豈蜀得而私之蜀之薦紳大夫父兄子弟維公之訓用能不爲鬼蜮之魏而爲漢冝其德公之深歴千百祀而常新䕫巫以東瀘黔以南岷峨以西劒棧以北莫不家社而户稷嘗秋而禴春江由獨無公祠而祠鄧艾是知畏􅐁攘之盗而不知慕鞠復之親知用物精多之爲厲不知正直聦明之謂神方艾縋兵無人之境行險徼倖特乗漢運之屯耳魏爲漢賊晉爲魏賊三尺童子皆知之艾顧嗾昭挾魏以蹙漢漢亡而魏亦亡天彛泯矣小有材未聞君子之大道適足以殺其身安能禍福爾民哉某始至毁艾祠垂去祠公於遺址之西而丹青之背甲而腹壬羽扇而綸巾魚復彌牟之八陣龍騰虎躍左揖右拱可駭可愕而不可馴于以鑰疑牖蔽勸不二心之臣栢溪奫淪玉平嶙峋公兮來妥椒馨醑醇祭莊侍郎文嗚呼三代而下何其正且大之難耶西都之士如洞庭彭蠡匯衆川以爲容非不大也未見砥柱千仞截齧乎頽瀾東都之士如峨眉太白拔地而峭立可謂正矣所少者吞雲夢若八九之寛公造萬理之根極涵一真之肧腪道大學而中庸文五誥而三盤望之閑閑炙之温温扣之盤盤風停水止渺不知其孰倪孰端及義形於色凛不可干則孤峰絶岸坐睨乎横决而崩奔大而不失之靡正而不流於隘蓋三代人物之遺也奚兩都之足論去玉堂其歸乎搴芙蓉而飲蘭歘帝所之謂來徑御風而不還功在斯文名在太史於公乎何憾寛兮倬兮瑟兮僴兮其如四海善類思君子之不可諼某岀入函丈十五暑寒毎進而誨之必曰敬立而内直義行而外方然後可以闖聖賢之門忽梁木之告壞撫張紳其永歎遡秋風而一酹誰與作於九原祭程廷邁文嗚呼廷邁君坤之垠我巽之漘氣貫脉應傾蓋忘新泛東津之月踏西岑之雲盡日乎酴醿芍藥之春相瑩以虚相熈以真上下數千祀之論議沉着痛快眉一伸而百顰是何貌之臞而精神之敷與言之温而肝膽之輪囷信抱負之不凢繅蒼璧其純綸見乎文采政理者特臯蘭之餘芬山風吹衣馬首劃分胥命維何禁柳壓闉無何我斥而君始來謂庶幾隔關之相聞書猶在几詩猶在手而君已招魂大江之濆嗚呼人之生也氣日至而滋息其盈也氣日反而遊散皆不離乎隂陽往來而屈伸伸而爲物屈而爲變魂升魄落旣化而無有矣根於理而日生者固浩然與天地而長存况君定静而明明清而凝冝與根於理而日生者相爲無窮乗雲御飈横八極而戞九旻杏銘旌兮西還嘻有子兮應門寄一酹於江風眇離索其酸辛祭鄒都大文中興百年人物雲蒸大江之東以氣骨稱宫亭彭蠡藍田昆丘公於其間琅玕天球純明而剛平直而方落華取實錦衣綗裳力回萬牛氣凌三軍宴坐觀來堅壁挫紛奔鯨盪海崩濤矗空千艘辟易獨杭逆風雷電晦冥刼火漲天萬瓦俱灰浮屠屹然見危致命衆雌我雄在蹇六二王臣匪躬上功莫府我醒衆酣勞而不伐應謙九三蜀控遼夏人爲金湯探囊取槖神旗央央潼關函谷秋風扇腥籌筆未試前軍墮星矍鑠如援能飯如頗一朝至斯於理則那巴秦父老齎咨同詞東南諸生矧公所竒榘度在目誨言在紳一酹寄悲天乎不仁靈澤侯生日祭文龍州惟神炳山川之靈司一方之命不知其幾祀矣誕彌厥月秋以爲期民猶生事之欲神之福民無窮也某敢爲民奉觴上萬有千歳之壽老人祭疇甫文嗚呼天目之陽翼翼鱗鱗道同味合吾三數人溪光澹暮野芳炫春孰賦不旅疇觴弗賔老瓦逓肘柴車共巾山中之樂白頭一真年過六十氣壯意新期之歳寒開我胷陳君遽舎我如蚤脱輪我不見君如釣失緍村南村北梅笑柳顰扶笻出門誰歟問津嗟彼有司賤玉貴珉老死不售連城之珍此在疇甫逹觀屈伸而我所悲殘星向晨銘旌飄揺寶華輪囷斗酒隻雞遮道酸辛鍾惠叔哀辭并序惠叔臨安人諱應僑與余内同母余仲女其子阜婦也君蚤敏悟絶人讀書日千言埸屋屢見頭角氣盛志勇風進颿駚得前輩格言題滿屋壁坐卧與對伊洛諸老書多隠括爲歌詩時時自諷詠以苦志得竒疾毎發輙神游六虚驂轡鸞鵠與浮丘安期相後先寤則索酒轟引耳熱浩歌吸呼月露以盪胸中之峥嶸幾豪矣而操行純白與人交無貴賤皆盡情奉重闈惟恐少攖其和䘮母過哀悴以死年止四十有五吾黨共惜之余敗官寄廬西㕓期與君周旋作暖熱至未幾君捨之去可勝欷哉葬有日爲賦哀辭相柩繂且以塞余内余女之悲其詞曰凢託形於𬈑涬兮藐起滅於一漚前乎名丗之旣往兮後方來而未休來者不我接兮往者不我留譬草木茍吾臭味兮攬而祛以冩憂便儇嶔之紛前兮巋斯人之好脩凝乎其觚而不堅兮澹乎其靚而不浮素忠信以爲絢兮粻詩書以爲羞索珊瑚於海若兮采夜光於崑丘黙㑹心其躍如兮獨起舞而長謳樂得朋而講習兮甕未蛆其已篘暖澗兮泉瀏凄巘兮雲幽松矯矯兮雪明柳濯濯兮烟柔君其蘭亭竹溪人物之儔耶胡思􅤕神放而莫収若士聳身八景之上兮禦㓂冷風而跨九州排赫戯以超遥挾鴻𪷟與夷猶頫人寰而隘之不翅蟻垤蜂牗蠛蠓而蜉蝣也徑御母於少廣之庭謁帝於碧瑶之樓丗之壽者未必薫兮夭者未必蕕蒹葭老於霜露兮胡梧桐之不能秋豈魂氣聚散之靡常兮聽推還而斡流抑百鬼常瞰乎髙明兮三彭甘心乎爾仇不然萬物芸芸各歸其根兮蹇彼蒼尚奚尤薄寒兮梅窩嫰凉兮荷洲佇立以望兮君不來有酒不樂兮謂我何求嗚呼天乎何奪吾良之亟兮孰論心乎白頭祭孫漢州文嗚呼君宣我杭共此天目竹西定交日稔月熟清不失和惠濟以肅韞抱國噐涵渟民福越在庚辰太少擇牧旅鶴與琴萬里追逐暁皷齊發暮燈分宿短髮相扶蘆花映燭風恬日舒前山迎緑推篷喚酌爛熳魚蔌雲變風怒雪浪翻屋更呼遞號投岸挿舳瞿唐灔澦奔濁飛鏃舟失豪釐蛟齶鼉腹巾子桂林峭磴危矗牽車青冥於莵起伏脫險趍曠秀水佳竹交口勞苦挈命博禄頻年過從分誼骨肉綢繆勸酬低鬟度曲我守江油君倅綿谷相望幾驛靡善不告莫府奏功菊坡解蜀我踵而東君荐華轂風槩絶丗等視榮辱尉薦寂寥駢函絫幅政平如水行粹如玉謂壽而臧胡奪之速皦皦召汚落落起讟人不勝天天定斯復江飈有靈穩送歸鵠所不滿君早訪松菊西望敬亭設位慟哭平生故人安得正叔嗚呼哀哉諸父堂祭妣徐夫人文嗚呼哀哉吾父蚤孤獨當門户眇然丗業危如一縷所頼協濟其不及以相其成惟有吾母中寛而外和上順而下撫螽斯之德薫浹於閨門鳲鳩之愛均壹於兒女諸兒旣及成人相與扶植以不墜祖父之緒則母訓之故也年過八十孫曽如堵含飴戯綵婆娑笑語蓋一身之所關實衆福之攸聚尚安享於期頥胡奄成於千古嗚呼哀哉風木不停駒隙易度垂畢素冠三年之䘮不忍靈車一日之去恍音容其在堂䬃丹旐其欲舉一酹號攀終天悲慕嗚呼哀哉嗚呼痛哉老人祭亡㛐阮氏文嗚呼吾父在時德厚福全三子七孫競爽滿前婦姑妯娌肅然歡然門無哭聲二三十年吾父旣䘮仍歳憂苦首哭吾妻繼哭吾母若弟若兄俱淪千古諸猶子中亦不堪數恃有㛐氏爲家典刑粹言懿行蘭椒其馨歳時上壽疊綵照庭環數百指藹如春榮逾七望八亦旣備福晩哭冡子遽棄華屋銘旌聮翩子先母續遮道祖酹老涙可掬嗚呼哀哉同日祭百二姪文嗚呼吾與汝父友愛純切記屬纊時握手嗚咽謂令兄弟可惜作别言猶在耳念輙痛絶惟汝克家子姪之傑不有渥洼無此汙血毎見汝來紫髯紅頰如見汝父我心則恱牗宻蜂勞巢成燕怯諱病莫告汲海欲竭脩程方開出門軸折母病在牀尋亦永訣吾年寖髙晨星孤月何忍見汝母子俱發祖道一巵春甕𥘉撥汝能飲否我懷如割嗚呼哀哉行狀提舉俞太中行狀公諱灝字商卿其先晉公子食采俞豆亭以爲氏典午永嘉中歙人縱爲征西大將軍榦葉扶踈或顯或微唐末昱有蹟于朝昱生稠自江南宦呉越爲睦州刺史中奉刺史五丗孫也丗居杭爲著姓太中娶于呉興之烏程因徙家焉公㓜敏悟吐辭輙不凢旣冠挹浙漕舉材名鬰起大家貴公子競延致爲師登紹熈癸丑乙科授呉縣尉秩滿辟户部犒賞武康酒庫以格知寧國府宣城縣未上辟知盱眙軍招信縣逾年改辟鎮江都統司主管機冝文字嘉定𥘉元充淮東安撫司參議官二年知臨安府城南左廂公事未上監行在都進奏院兼添差淮東安撫司參議官三年知安豐軍六年知常德府七年提舉湖北常平茶鹽尋主管冲佑觀十二年辟淮東安撫司參議官不就主管崇禧觀提舉千秋鴻禧觀寶慶二年引年致其事先是隨軍䇿應守禦暴露屢特褒轉積階至中大夫爵錢塘縣開國男食邑三百戸賜紫金魚袋東朝大慶尊禮髙年以孫晦封太中大夫𥘉任警捕筦㩁職守外無一辭自鬻當路愛其廉而文交推輓不遺力試邑極邊謂攻守以人心爲本首發芻粟振窮乏家嫗摩之甚得民和王師驟起趨泗隨軍轉運使倉卒無措約公共議公言敝邑已備夫馬千囊米以俟使者大喜薄暮促行遲明悉辦因歎服曰非公幾敗事招撫司調兵道出招信境二河深廣非浮梁莫濟辰巳間檄至申欲渡具材有素先期而集邑阻敵境僅一水北界數千人拏舟坌至邑人大恐公謂彼飢民欲就食耳亦安知非嘗試我者使諭之曰汝等皆中原遺黎慕義而來然湏申明上司方敢受可令徒長至邑議之已而桀黠者十輩來勞之肴醑潜遣戍兵驅其徒出境歘驚疑潰去十輩者返岸亡其衆踉蹡而逃自是知邑有備莫敢窺宣撫丘公崈聞其静定有謀檄使禀議一見大噐賞所陳數䇿即施行留幕下數月聞虜且南㓂以盱眙畢守再遇孤立命攝倅助之還未數日虜果襲淮隂圍山陽畢𬒳旨䇿應解圍甚亟公謂將軍去此虜必引兵壓吾境不去如方命何畢决計啓行挽公與俱屯于雲山諜報日急公料虜必深入窺采石請回軍守石梁河以遏其鋒騎壒漲天人情洶洶戎服行伍中意氣激壯如平時畢毎笑語公吾不料書生亦有此膽也時畢威名暴振招撫深忌之多掣肘公走樞府力陳利害乃命畢節制兩淮軍馬亟回守六合虜果分兵擣虚不得入相距逾月而遁畢尋以都統兼知楊州念非公無與共濟國事辟置機幕進參謀議邊計郡政悉委之區處救脫機於矢石之間回震暴於碪斧之下心平理明軍民恱服留軍中五閱歳以親老歸省胡海弄兵復繇奏邸參幕議公熟識淮人情僞招納盪平計畫居多餘黨有來降者帥以乆抗王師誅之公謂此皆一時迫脅非夲心元惡旣殄來者即良民也極力救護全活甚衆仍各給據使歸農帥怒其咈已同列咸爲危之公曰死生命也委順而已卒歡好如𥘉朝廷以佐平淮㓂有勞擢守六安陛辭論嚴邊備清流品甚切郡經兵燼一意勞集建治宇黌舎葺軍營井井有端緒未幾以太中憂去邊氓共惜之守武陵以簡静稱隨領庾節取予中度未數月引疾去自是絶念榮進矣丘公壽雋帥維揚以公先丗老賔客欲羅致自助掉頭謝去卜築西湖之九里松出門數百歩即買舟任所之㑹意處竟日忘返毎舉酒望孤山而酹曰湖山政爲我輩設也如是者幾二十年湖旁居人以老僊目之晩喜觀釋氏書疾革屏藥餌弗御索筆大書偈語而逝紹定四年四月朔前三日也享年八十有六娶范氏贈令人繼髙氏封碩人二子長遜次修職郎楚州録事叅軍丙皆先卒女三人適進士倪良能芮爕秉義郎前監嘉興府贍軍酒庫沈吉甫孫三人晦從事郎監嘉興府比較務昕㬇業進士公遇郊先任猶子而後孫人推其義性亮直不茍合而接物必以情待婣黨有恩退然若不勝衣而精神充滿志氣奮厲不爲死生禍福所移其驅馳疆埸出入莫府料敵制勝多破的開禧乙丑開邊有萌芽一唱萬和功在漏刻張公巖位政府宻引公籌之公爲言輕脫寡謀之人若可喜不可信燕人趙良嗣平州張覺往轍可鑒力陳之張公然其說後悉驗識慮深逺矣文流出胸臆擺落陳言詩有晩唐風致詞妙處迫秦晏客或扣其舊作輙太息言未第時姜潘諸故人相與泛苕霅登垂虹放浪煙波風露間更倡遞酬以得句相夸尚夜深𬒳酒膽壯拍手嘯歌魚龍起舞今無復此樂矣尚何言哉姪孫松得公詩百篇鋟爲青松居士集餘蒐録未竟諸孫將以其年十二月癸酉葬公于錢塘縣定山郷排山塢之原某視公爲郷執謹叙其業履以告太史氏平齋文集卷第三十二
