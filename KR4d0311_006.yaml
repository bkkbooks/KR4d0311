body:
  text: 詩五秋半聞鶯木葉青黃幾栗留盡情啼破兩山幽怕人冷落生秋思故作春聲為遣愁夕陽百丈岡頭路滄涼步夕陽石芒輕放屨草莢緊牽裳深紫猴樝熟踈紅馬蓼荒牧兒良得意吹笛下牛羊讀書蠖室扁為孜禪作侵尋二十年屈伸聊復爾俯仰故依然直榻無餘地橫窗不欠天焚香長誦罷風雨響山川秋山即事避俗鹿挺走依僧龜深藏淡中般若味定後摩尼光壞垣被雜卉爛熳野媪裝叢薄鳴幽禽凄抑怨女吭桂謝紅不墜菊繁青巳香瘖蟬怯露葉忙蜂急寒芳魁芋鶩護乳拳栗蝟脫芒菘蒔虀甕緑栗登釀篘黃田父時泥飲樵夫間談王意適兩竪屏神王三仇攘龍耶老聃化鳯兮接輿狂翠壁千仞表西風吹我裳方氏棣華桂叢亭各一首一忍來百順寸私生萬殊能思根共出自愛鄂相扶夜雨平生約春風盡日娛幾家燃豆泣知愧脊令無天上廣寒種人間方寸栽田三和氣溢竇十慶源開色閲風霜在香包月露來入窗秋競爽堪覆掌中杯送黎德升出守眉州伯登霜隼健毛骨冥鴻髙羽翰來遲懷去速退易挽留難文物聲明郡中和孝友官大馮棠蔭在多放一分寬同是郾城客對床如弟兄秋風雙鬢改落日寸心明終古方書在隨時局面更公餘經濟學講貫不嫌精晨起入夜風收雨遲明暖釀霜人窮髭易白地瘦葉先黃繡眼語叢竹畫眉啼斷岡炊煙猶未動吾亦起歌商敬和老人秋日山行湍險中回棹寬平處整驂雲峯環六六禪板占三三地冷梅枝北天空鴈影南真觀觀自性危坐讀書龕和子有雨中述懷畏塗險如峽中州蝮蛇倒退猢孫愁熟將義理自陶寫粗衣淡飯過即休邇來陽侯橫造業兩涘莫辨馬與牛髙原低隰半為壑下潦上霧昏人眸西風滯穗可能幾尚作饘粥餘冬謀如麻雨腳未肯斷便有餓死儒冠憂惟窮益堅老益壯更式相好無相猶縱為溝瘠亦何憾多少華屋皆山丘環堵短褐陶靖節𣢾假下澤馬少遊平生耻作稻粱計好還渠不桑榆收東家夫子共此約一醉斷送黃花秋尋梅搖落園林一再霜梅梢葉剩兩三黃蕾紅包褁春猶密隔壠枇杷得擅香會心不是非心佛還疑有漏仙朝聞馳鼓起夜候定鍾眠浴少衣偏垢遊多襪易穿祗將母不敬推倒野狐禪清虛堂六言為淨𣑽僧作石澗寒泉霜曉竹岡霽月涼秋一炷銅爐柏子老禪破衲蒙頭挽萬登仕種德諌議竇處心承事黃池園花竹老庭户簡編香四丗環疊綵百年酣纍觴紫微身不到丹墨付諸郎寄題真相寺遙月堂仍簡禮上人四特遞盈闕八還齊暗明須從心觀覔莫認指摽生地僻人聲逺山空夜氣清何時煨芋火相與聽瓶笙烏息隱山堂覔詩未出為逺志出則為小草請看耆闍窟幾年黃面老米積外科僧照源堂潛山盡頭孤峯嶭嵲布寶鬘雲雨玉珂雪中有醫禪碧眼電掣人以病求一歲幾闑開方便門出廣諸郎寄題真相寺遙月堂仍簡禮上人四特遞盈闕八還齊暗明須從心觀覔莫認指摽生地僻人聲逺山空夜氣清何時煨芋火相與聽瓶笙烏息隱山堂覔詩未出為逺志出則為小草請看耆闍窟幾年黃面老米積外科僧照源堂潛山盡頭孤峯嶭嵲布寶鬘雲雨玉珂雪中有醫禪碧眼電掣人以病求一歲幾闑開方便門出廣長舌病從心起當從心滅方起於心洶洶烈烈不冰而寒不火而熱寒熱交戰內外癥結瘰􅕅疽瘤痀瘻蹩躠湯尉針砭色察脈切不如治心心和氣恱如凝斯泮如壅斯決勿藥有喜匪渙其血凡濁惡海萬病一轍大摩尼珠一照萬徹是珠在祴無有差別名九轉丹字千金訣為安心竟寒水秋月維摩無病文殊無説至節前一日遊汪茫田聖主親郊肹蠁通風恬日霽作春容好從輦路聽清蹕却向深山把瘦笻樵子徑隨蘿薜上道人屋借竹茅封一杯旋煮山泉蕩浣盡平生磊砢胸至日歡喜口號太平寶慶第三年萬乘𥘉郊大報天恰應漢家辛巳日八觚泰畤立甘泉青城矗矗紫壇深碧宇無風挂斗參億萬蒼生齊合爪聖明天子得天心獨夜兩窗明月一庭霜佛屋風鈴語夜長孤酌不多人易醒九回腸付篆盤香雪留董景揚一色凝雲合大和定知冝瑞不冝多飢餐烏昧丗皆是飽進羊羔人幾何搶地折腰紛岸篠撑天強項獨庭柯留君待放晴光出同步春風十二􅌪立雪立雪窮蘭若侵寒破驌驦雲迷山糊塗冰壓樹琅璫甕砥茅柴熟爐頭榾柮香樂天隨分足吾欲老田莊髙壷隱挽詩種德黃芽鼎陶心碧玉壷多交天下士幾喚竹間厨秋雨涼催讀春風醉索扶忽成觀化去冷落輞川圗山房藏書萬三千卷子有賦詩用韻門巷蕭然雀可羅藏山萬卷自研磨懶尋玉女登西嶽甘伴金仙坐輔陀書帶草長塵慮少鉢曇花放道緣多酒肴問字如相過引道松間不用呵又答景揚朝家久設禮為羅小寄禪窗共講磨紅錦障泥飛騕􅒁黃金寶校琢盤陀冰虀薦飯鄉風古雪汁烹茶雅道多領取單傳心法去會將佛祖一時呵挽章冠叟卷却青雲靶書來意轉平於斯觀所養知不失其亨梧竹自師友梅礬皆弟兄悲風吹夢逺不朽是鄉評再用陀字韻煙霏深處萬山羅間裏工夫歲月磨上采緯書乾鑿度下搜雜志薛延陀手披不厭薰沉水心悟何妨涉貝多若問尊經閣中事南豐作記也須呵斸葛行晨雞未號霜塞塗前村後村遞招呼長鑱短篝采葛去冰滿髯鬢風無𥜗頻年米賤置不問髙藤稠葉青扶踈但聞酒渴欲吞海一片兩片甘於酥山深土厚雨露足造物巧為凶年儲𥿄錢挂樹跪致祝地媪發閟何其都𥘉疑大澤龍蛇蟄又疑京觀鯨鯢屠防風氏骨碩且大母陀羅臂修而腴赬肩下山日未䀯候門迎路歡要孥松明燃火磚地爐且削且搗投冰壷細如桄榔滑如菰白如人面柔如膚和以粉米隨所須餅餌其精飯其粗潦田不收野草枯飢虎藉此猶能驅蕨萁札耳皆可糈征自葛始功莫逾小兒媚竈愁眉舒大兒捧盎還嗟吁青青之麥何時鬚長葛盡矣吾誰餔嗚呼冨青州黃承事古人有今人無醉摩便腹視餓夫以腹揣腹心安乎卒歲山雲披披日翳翳澗冰衷甲風擁篲𥿄窗透明竹扉閉蒲團坐穩柏煙細於羊去智魚得計優哉遊哉聊卒歲疥癢疥癢悲志鬱髮涼慨年徂人特自苦耳天竟可恃夫忘憂草良嫵蠲忿花更姝多渠有酒醑寬我無錢沽阿芝亦解事低眉薦吳歈和雪肅容盛氣下璇霄不作投壷玉女嬌坡老堂前微撲面伊川門外驟齊腰得風還解掀天起帶雨才能控地飄無限陳根生意動早看緑長後園焦寶雲庵戒師鍾山好住苦弗住馱嶺難居真欲居出地入天須任我來今去古不關渠萬由旬上起膚寸一剎那間彌太虛識得鬘華雲體假妙髙髙處坐如如戊子新元老人七十有詩自述敬和松鶴昻昻省見稀獨遊汗漫友佺期光風霽日安排好秀水佳山鬪飣竒嘉慶圗中身最貴耆英會上爵猶卑縱心境界天和聚一笑花開蝶滿枝用韻答子有舊雨來人眼砥稀春風獨許共襟期斜川追古年年早曲水從今事事竒爛熳和詩齊少長淋漓被酒略崇卑驚回蜀道芳時夢花亞銀叉舞竹枝歲事山居歲事似羌村注瓦傾瓷酒半渾微麝和餳溲粔籹芳鳬夾薺斫餫飩阮生朱老情懷密張丈殷兄笑語溫簾外東風花信早更煩吹緑鬢毛根羅察院父瑞桂堂老仙方寸長黃芽百順薰蒸到物華移得廣寒宫裏種開將后土廟中花詩書根蒂聖賢脈忠孝馨香今古牙冨貴儻來餘事耳化工深意屬君家治平寺清音堂普門以眼聽觀音以耳觀謂得觀聽真竟𬒳耳眼瞞瞎却觀音耳聾却普門眼萬法本來空蒙頭都不管君不見大藏五千四十八卷第一句如是我聞無著處春行百舌梢頭一半春日長無處著間心推枰競欲投機早結毦誰知用意深梅子胚胎鹽裏味桐花擺布蜜邊隂東臯西崦行幾遍軟腳踉蹡索酒斟田家以二月二日晴雨占榖價枕上口占葛根巳盡麥方青延頸東來米價平怕聽三更三點雨要占二月二朝晴敬和老人青梅雪水迎風細作鱗青青又是故園春只知和鼎非凡子豈料升盤有苦人還我核來機轉熟寄渠花去意猶新側生砥事搖車頰空作漁陽一點顰社前一日點檢山房用呵字韻不論塌扱與婁羅判却風光屐齒磨老柳強顔翻拓跋新禽滿意奏娑陀山如欲雨何妨住僧不能禪亦足多須信斯文天未喪龍蛇虎豹砥煩呵同日次韻可庵夢破巫峯十二鬟家山逸駕尚容攀桃花見面東風裏應笑陳人老上顔長寧髙守定子見寄用韻奉酬呼吸東風養姹嬰翰林非主墨非卿吾身元與三才並此性須存一點明盤谷釣鮮深復窈羌村傾榼濁還清久要誰似長寧守尚記慈恩惡姓名陳尉信伯括水傷冒雨下朱陀出示兩詩次韻娑竭寶藏移列缺雲氣從平地決為壑殱人鋭於鋒豐年變菜色樂土生愁容須煩霹靂手左耳乖龍陳編貯山房故事追康廬欲共天下士讀盡人間書多君弓刀來發我金璧儲山靈似不分震雨翻河魚中春中浣後一日老人挈纍下西市寓舍越三日某行感而賦詩呈友人二首血氣危頻復頭顱老數竒家如緣角鼠身是脫筒龜草樹春離列雲山晚蔽虧意行隨所到不必問何之吐氣韶華裏關心曉哢邊鷓鴣天性在杜宇丗情然怒笋和泥煮殷花蘸乳煎須君來共此巳辦杖頭錢族叔疇甫老死於埸屋人共惜之其子得瑞梅於園實三而花一花十二瓣碧色其遺文發祥歟老人為賦詩敬用韻乃翁抱璞售無媒去作修文地下魁換骨法從青子得返魂香自緑隂來詩書根氣春無盡清白源流慶有開十二循環花瓣異信知天理有時回鍾太君挽詩護額錦裁帕扶腰珠絡衣幾回呼使進盡日醉言歸徑古梅成蔭堂深桂合圍重來無復拜春色黯斜暉鍾雲叔挽詩秋隼風神聳春雲筆勢竒人情方共屬天理竟難窺哭子零丁母啼耶婭姹兒落花飛絮急行道亦傷悲羅解元震龍母胡氏挽詩三丗不異爨一門皆力書此風今所少他行特其餘藻錡明疏牖萱􅌪護碧除春光元自在遺夢杳安輿水牡丹都人呼為雙魚花禁中呼為紫𫀆玉帶花魏紫潛緋真正紅天公不管老東風紫𫀆玉帶雙魚挂猶把闌珊造化功東山塔影相輪髙插碧霄寒好是如如不動山弄影翻光顛倒轉微權只在隙窗間東西山二首西山許邁無人問只説東山有謝安冨貴光明貧賤晦丗情從古兩般看折屐碁邊情易矯捋鬚筝畔淚難禁何如拍手招元放玉室金堂深更深敬和老人寓舍鄒不辭三徙滕何愛一㕓典衣寬酒債乞米續炊煙勝敗供飛雹虧成付響泉東山時撰屨花砥弄潺湲午困故人書斷故山離義重惟窮到處隨無米胸中元自杵不蠶鬢砥却能絲消梅乞與嘲鹽貴苦笋烹來怪醬遲亡可奈何安若命午窗􅑿得睡便冝再賦二首誰為風光管合離緑隂芳草日相隨此身百丈牽三峽吾道千鈞繫一絲力戒蕩舟君子適志期學圃小人遲平生客氣消磨盡醉固佳哉醒亦冝一出俄經震巽離盈虛消息取諸隨盆栽菡蓞何時藕簷挂蜘蛛盡日絲左墄右平魂夢逺東岡西崦杖藜遲稜稜瘦骨蕭蕭髮恰與黃冠野服冝題李杜蘇黃像金鑾天子如天大九萬里鵬容幾箇尋常溝瀆蝦蟆過紅錦宫𫀆空著破故書收拾歸去來倚杖斜陽唱誰和右太白風雲慘淡豺貙吼日憂無飯仍無酒秋來東屯熟八九舉家歡呼拍銅斗老夫欲釀兒欲炊老夫怕醒兒怕飢商量不下撚斷髭歸與汝母折衷之右少陵黑風撼海晨烏青海怪出沒雲濤腥矯首獨立天冥冥保一以靜吾清寧椰冠野服雙鬢星抱書自隨妙娉婷眼寒海南蛋家丁右東坡神為驂騑氣為車秋雲扶踈春風腴湯餅睡起茗碗須意往獨與奚奴俱奴低頭笑公放懶不著書右山谷普照僧生雲軒雲間閣巖芳斂空華谷響答虛牝坐看白雲生會得無生忍雨來山出雲雨過雲歸海悠然天地間得此大自在夏至過東市二絶插遍秧疇雨恰晴牧兒頂踵是升平秃穿犢鼻迎風去橫坐牛腰趂草行漲落平溪水見沙緑隂兩岸市人家晚風來去吹香逺蔌蔌冬青幾樹花和黃伯淵閩人見寄二首流轉風光不暫違等無地角與天涯故人書到幾青李生面客來時紫芝窮裏埋頭傾啞酒涼邊趂手應盲棋寂寥簡短君應笑郎罷吟詩囝和詩錦野西頭始識君便期堊鼻著風斤餘甘到砥有遺味薝蔔本來無異芬忽忽又弦涼榭月亭亭還合暮山雲玉泉道士窮於我也買新鵝約右軍敬和老人覽鏡西谷柴車手自巾風吹不到庾郎塵回光返照千江月復命歸根一點春永晝同窗陶處士涼宵專席竹夫人徐公好醜渾休問認取青銅鏡裏真又和憶可庵耐翁流慶遍仍來隨處蒸嘗薦筍苔但認白雲飛一點便勝黃犢走千回屋山早露柤梨熟墓道秋風菊桂開父子相從歸展省豈無野水為添杯次韻夏日秧青水白四郊同召雨無煩訪守宫槐葉煮􅡤隨市俗蓮花搗麴稱家風過從久謝三千客嬉戲長娛七十翁巳是太平農圃老更揩兩眼看升中敬和老人荷花紅紅白白兩般栽淺淺深深一氣催但愛透從清水出不辭脫自淤泥來隨花著蓋相依立聚菂為房忍擘開妙潔色香無間斷床頭更撥洗兒醅鎮越堂辭汪紹興綱仲舉建氣佳哉兮鬱蔥文五色兮虎龍江胥杵沙為馳道兮海若斂潮其下風前羲舒而後翳霳兮軫獵來自東孕泰和兮諸馮煽炎暉兮沛豐於乎秦望禹會其宇內之鎮兮詎伊越之雄堂兮堂兮冝其眇翠閬而羞丹蓬西庵晚步荷披菰折似秋嚴茀草叢中菊露尖只有木犀荒不得媻􅘐勃窣上亭簷次韻七夕弄巧拙逾甚合歡愁轉多擘金盟似海搔玉淚成河天運真旋磨人生特擲梭身間涼月好且與醉無何蜘蛛巳迫斜陽欲墜時謀身只怕腳行遲縱橫籠罩大為網首尾經綸渾是絲腹飽飛蟲肥似瓠喙工毒螫利於錐朝來猛被兒童掃不放簷牙一點遺晚徑六言促織聲來竹裏凌霄花上松梢清泉白石心領野鶴孤雲手招中秋要看中秋月須交夜半時當中明朗朗直下淨離離地只餘風露天何有斗箕虛靈昭徹性開眼幾人知敬和老人石菖蒲西風擺脫絡頭絲蓀壁為家不問蓍分得九華煙雨壑種將五老水雲芝戟髯灑灑精神健劒脊稜稜氣骨竒窗外幾多凡草木為誰張王為誰衰又敬和還家自喜溪山魚鳥識車塵風日溫明試小春黃帽青鞋安樂法芋魁豆莢太平人接籬倒著情懷放蓬沓逢迎氣味真兒亦夢牽潭上菊和香細嚼勝猩唇又敬和還家喪家知似狗生子望如狼過盡燈花影空餘汗竹香菊肥人自瘦髮短慮何長霜蟹新篘酒由來苦易忘次韻臨安趙丞時讀紹運圗燧農以前疑傳疑理耶亂耶難盡知唐虞三代號極治説著已是令人悲古來神器付有德人心天命何容私使朱與均不豚犬亦家天下如啓時乾尊坤卑大分定孰陽為耦隂為竒南巢牧野可自諉為民噓寒濯其痍後來龍虎戰劉李大氐鸇獺驅秦隋杯羮分我弗暇顧肯與兒女同車馳晉陽宫監計可劫機穽不管為天窺橘中老翁虬髯客冷看丗變從旁嗤當塗典午夜負耳南北五代晝攫之螳螂黃雀遞相視誰肯帖耳甘伏雌日月出矣爝火熄此殆天意非人為所嗟患失長樂老東家浙米西家炊榮華冨貴風雨過但見金椎控人頥君侯讀書眼如月坐閲兩岸隨舟移詩成索酒澆磊磈通德裙帶紅榴垂洗研自洗洮州緑間題柿葉紅一塵空水月百念老霜風鈍菊淒猶蕾顛桃艷巳叢斡流千萬變誰實主鴻𪷟贈俞次孟古屋無過客新涼得可人為回黃觳􅑌同飯紫輪囷杜雨𥘉華稻秋風未老蘋扁舟苕霅去詩料正橫陳已丑新年幾度椒花頌歲朝今年心事最蕭條官雖有路猶窮轍住豈無家却寄巢金盡床頭顔易改樽空座上客難招一般獨得便冝處病裏逢人免折腰背疽猶未平病起獨步病將春到眼慵開只為梅花猛一來何處琵琶推郤手舉頭啄木起林隈答請事簡臘雪如席麥苗肥春雨如膏菜薹賤寧令前壁打後壁不將熱面塌冷面寓事六言飽鶩避弓橫渚驚鱗透網平波一假春光搖曵幾雙靜眼摩挲次韻西山山深莫道得春遲雲漏晴光巳大竒夾徑幽香吹艾納隔林絶豔點燕支一川逺近迷漁屋兩市東西認酒旗錦野著亭坡老後曽來可惜獨無詩次韻遣懷不用憂春雨時來百草芳貓頭肥可臿雀舌嫩堪囊舊酒聞香烈新詩索味長櫻桃空落去吾老白雲鄉挽元寂王道士盤隱早具眼栗齋仍點頭豐碑俱好在爛醉更何求院靜桃開落林深鶴去留翛然風露表無處覔青牛古意條風從東來習習振枯稿美人倚窗閨别思忽巳早兩句夢中得昔為連理枝今為斷腸草雞號天五更髮白不待老中春望後一日登玲瓏出郭暄欲暑涉林清自秋步隨目力髙身與山氣浮飛來辛夷花拾得蓮葉舟一聲提壷盧四顧叢薄幽詰屈九曲屏突兀十二樓泉流澗級峻雲起峯隂稠左摩紫髯兕右拂蒼鱗虬牽衣憩更好擁䇿登三休上呼笙簫侣下瞰錦繡州豁落不平事消融無涯憂太極浩𥘉判此山鬱相繆幾人記曽來老苔蝕雕鎪玲瓏聽我歌歌徹玲瓏愁有酒且湑我羲娥雪人頭夢語麈尾御犢轅竹枝招羊車意足各人眼心合無天涯寶扇間草蟲碧衫涼暗花茶䕷金沙砥清歌按紅牙醒疑不是夢夢到故自佳次韻娑羅花摩耶樹老無多子天女花妍有許般莫把東邊枝便斫堂堂留與碧霄干讀漢事病禹逢沈驁酣參事懦盈隂陽眠燮理天地醉財成河嶽瞢騰立羲娥蹩躠行無人能喚醒作意造升平粥罷昨朝鄰家飯疊爼肉暨魚今晨自家粥單簋筍與蒲不為昨而腯不為今而臞面前有豐殺此腹只自如所以顔氏子簞瓢靡求餘識字行識字不用多識多反為纍結交何用深交深或中棄紫微有君房郎將得賔王胸無半點墨七襄亦成章票姚新賔客文園舊婦翁雖非平生歡冰雪生春容勸君五車不須讀瞑坐蒲團養雙目作雲作雨手翻覆有時烏好丈人屋散䇿窈窕薜荔徑勃窣瞻蔔林六出無他香御此衆緑隂低頭拾摽梅齒老酸不禁仰看栗鼠度危梢與雲侵百舌巧滕頰時過聲自沉摶黍晚得意睍睆流好音水旁兩三家煮繭矮屋深午忙不暇饁荷鉏歸藁砧夾橋女蘿密趍塢孫竹森仙人左元放拍手東西岑一氣地依天萬事古猶今溪山豈不好感槩霜滿簮前乎千百年有人獲我心後乎千百年知誰同此襟花獅雪氄吾家虥知親翰墨妍渴來趍研飲飽去枕書眠弄影窺清鏡收聲聽素絃最能持大體鼠輩任便儇老人賦鄭醫芝隱樓敬次韻鵲經心訣在鴻寶肘方全為問春痟首何如夏脅肩樓居髙進月園涉細疏泉學得種芝法疑君今稚川又敬和寓舍借得盧同屋數間不為太窄不為寬胸中鵬背三千里膜外羊腸百八盤薜荔水中摽本逺菖蒲石上見花難粗茶糲飯隨緣過等作須彌芥子看除妄酒泉能醉麼飯顆免飢不萬事得如願一生應莫愁涼風髙放鶴落日倒騎牛諸妄冰消盡吾師馬少遊晚涼樛枝隂合翠熏籠曲曲斜斜石徑通窈眇蟬聲繅獨繭為渠立盡晚來風迎秋熱不能堪又便秋天公砥暇與人謀形容如許馬非馬氣力幾何牛戴牛勃勃松梢雲片起琤琤藕葉雨聲留新涼收拾歸歌板鈿合金叉萬古愁敬和老人盆池埋盆作沼野人家數斛山泉拍兩涯人立晚風涼似水荷浮香氣勝於花蛙聲恰恰冝飛兩鶩影依依欠落霞齊物逍遙無大小不須煩惱髮生丫喜雨一絶簡趙丞龍公有眼識英材好雨隨聲喚得來酒面添如田水滿眉頭放與稻花開古樂府用禮禪滅翁韻四黃金絡頭五花馬槲葉無風雪蜚野仰看飛鳥命中之好兮儇兮誰似者上蔡門望夷宫往事了不省引白春滿容嘯笙坎鼓踏雪歸馬蹄不記來時蹤右公子遊獵河水湯湯公母渡為妾言嗟未力公渡竟不疑雲昏風雨寒波深蛟鰐飢二十三絃悲復悲黃鵠不雙鸞獨飛右公母渡河桐春華竹秋霏蒼梧雲深人未歸烏八九子恣飛啄夜半飽啼山月落鸑鷟引孤雛腸空羽毛薄為言增擊勿作遙吹參差兮共飄飄右鳯引雛羽肅肅鳴雍雍江南江北秋思同秋思中人無避處風酸月冷江流去鴈奴亦良苦群鴈不我馮夜深炬火滅復明舉網掩盡蘆花翎右鴻鴈行槿花露徑風籬取次芳朝榮暮悴付流光一秋朵朵紅相續比著人情大段長用主司理垠韻送别二首亨衢方四十滿謂乃翁如為砥澼洸藥依然城旦書光塵風物裏消息事情𥘉束起東西玉功名冨貴餘蘆花秋摵摵征思斾悠悠歌吹莫愁國鼓鐃熊繹州胸竒空盾鼻膽雋落旄頭儻有西風鴈頻書老故侯挽鍾孺人夫沒姑嫜老年芳鑑珥新孤峯晴後雪碩果剝中春命義生無愧言容死未陳西風吹拱木雙劒合龍津挽阮宣義逢原父夜氣精神飽春風笑語酣修篁森道北叢桂郁城南雨露榮三釡煙雲老一龕瀧岡阡上路秋思薄晴嵐獎菊二絶木犀滿送第三香交割秋光與後行細雨斜風籬下菊安排青蘂做重陽菰葉離披藕葉欹精神得似未秋時西風坐斷群芳路不屬黃花更屬誰章升伯妻孺人挽詩婉孌從君子青雲逺大謀樂羊燈火夜李侃鼓􅎏秋露舄鳬迎喜星機鵲送愁誥花紛五色光動九原頭東山懷謝傅用禮滅翁韻金堂石室舊徜徉𬒳髮依然下大荒月送嬋姢華落蘂雲移縹眇濕踈篁桓伊筝外深情酒幼度棋邊定力香往古來今開闔眼樓頭吹面朔風涼山中菰生米父老謂豐年之祥用子有韻秋風菰黍黑山崦罕聞之産瑞搖銀海占豐灔玉池芃芃粳合穗裊裊穄分枝却憶官張望嘗新薦一匙𥘉霜庭下曉來霜菰頓芭蕉折絡石瘦菖蒲獨抱青青節九州山僧房路突亭依石林凹渚見沙嶔危幾岣嶁深蔚似琅琊客倦驚寒思僧間忘歲華兩窗風露影一樹枇杷花挽俞致政德藻父涉丗萬緣薄愛書雙眼明身從平處立道向拙中生啖蔗何妨晚栽槐恰待榮偈成投筆去天闊暮雲橫挽銅里葉提點養性居士白用心承事黃春風花竹墅秋雨鱠蓴鄉簡淡趍真諦廉平潔義方志幽無長語手墨粲琳琅徽州葉司理送冬笋凍雪晴邊白柄鑱浴泥扶出錦綳衫定知王謝家苗裔風味生來便不凡挽俞景梁億計橋門士輸君第一籌文為天下樣行與古人謀磨鐵素心在注金蒼鬢休梅邊清絶夢誰更酒扶頭用韻答厲輔卿二首坐窮無過客失喜得吾儕材逸類淮海詩清如簡齋山明知玉氣水涸見霜涯期子進此道為親生好懷南北錦一住東西巖屢登報春梅有信送酒鵲無憑之子能相過詩名不浪稱漉冰烹小鳯爽思為渠增敬用老人功臣淨土院韻髓腦供祠寺膏脂倒井閭岸隤猶略彴塔秃只夫須窈窕叉先燕夷猶帶不魚醉歸天欲雪好箇探梅圗石斛蚱蜢髀多節蜜蜂脾有香蘚䀶分磊砢蘭頴聚琳琅藥譜知曽有詩題得未嘗瓦盆風弄晚披拂一襟涼平齋文集卷第六
