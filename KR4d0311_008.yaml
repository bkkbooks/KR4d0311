body:
  text: 詩七觀物二首飽飯茶甌罷間觀萬物情狗加獅立號猫冒虎為名故沼慈姑王新畦腐婢榮蟬從何許變忽送出林聲薄命天元定深居日轉長塔鈴空洛度車鐸慣琅璫筍長竹還老蓮遲荷自香羡他雛又乳雙燕勝春忙抹利翡翠簾帷雪透肌纎風不動閙香吹裴回顧影精神發省得京華識面時晚蓮颯然秋入井梧嘶窗下紅蕖始脫泥但有意開何論晚縱無力上不嫌低魚貪芳影機還熟蝶怕深香路自迷更把間情堅耐著明年花與屋簷齊凉月二絶蓮房折盡只留荷露蓋班班一丈過髙下橫斜無定影聚凉著得月明多金粟安排雨後黃定知花亦愛新凉夜深月透玲瓏影花自光明月自香挽阮倅膠庠推博洽州縣著廉平人物萬夫特山川千古英虬髯橫意氣猿臂鬱功名一掬同年淚西風浩蕩情挽李丞篤敬古君子公平賢大夫筆端知已有劵外得心無落日搖墻竹淒風墮井梧蓄深施不盡留與讀書符和子有催歸卜廬必擇地買鄰不論金出機與入機去心即來心拗性臨川翁罷相老境侵霜竹鍾山寺雅寄金玉音強項峨眉仙渡海憂患深𥝧稏陽羡田歡言飽甘霖故山月在眼客屋風滿襟欲歸缺生業隨寓如家林覔榿適間趣借竹供清吟俯仰一逆旅乾坤古猶今謹和老人蓮桂二絶點破秋光數葉荷水清時見小魚過渟涵風露三更足收拾江湖萬頃多搗成一百八丸黃入手能令熱惱凉金粟如來身巳化蕊珠仙子骨猶香移居西郭重樓閏九十八欲歸未辦買山資東寄西存漫一枝樓上起樓渠自巧客中作客我何癡﨑嶇溪步通虛市鬱屈山蹊護短籬不用子猷親種竹屋頭元有緑猗猗自和得寮便住似西資誰暇安巢更擇枝閣密不妨中酒聖樓明大好養書癡志公分料存刀尺龐老家風缺笊籬大厦千間宵八尺傍人莫笑太窮猗小雪前三日鍾冠之約余侍老人行山舟發後洪入杜塢自鄭蓋庵過閬山趍翔鳯山菁山遍覽楊墳秀園遂至何山道埸山乘興薄吳興訪玉湖書院水晶境界而歸自戊子至庚子隂晴相半勝處輒徘徊賦詩飲酒偉哉觀也數詩見後溪流轉處兩三家落落踈林淺淺沙可是小春風物早檐頭一束杜䳌花右長橋渡止水攪不動好山邀輒來松間寒月晚似缺兩翁催右閬山妙嚴院松月堂讀張汪二公詩有感用無垢韻鈎輈格磔鳥呼晚勃窣媻姍人試寒野水不流山四合寶華雲裏著欄干一徑白雲明似雪滿山紅葉豔於花過溪買酒等間事只恐客來非當家右宿妙勝閣無雨又無日此行天相之荒園遺木老古隧得峯竒霜晚𬞞猶劔風溫茗巳旗行厨何用許勝處可忘飢右出閬山狂暖釀成雨逆風搖斷橈寂談王舍衛悶想欎臺蕭遊興孤芒屩歸期數翠翹推篷占霽色木末散聲招右謹和老人鳯口遇雨聽雨客無寐放晴山有靈禪關深紫翠勳廟肅丹間事只恐客來非當家右宿妙勝閣無雨又無日此行天相之荒園遺木老古隧得峯竒霜晚𬞞猶劔風溫茗巳旗行厨何用許勝處可忘飢右出閬山狂暖釀成雨逆風搖斷橈寂談王舍衛悶想欎臺蕭遊興孤芒屩歸期數翠翹推篷占霽色木末散聲招右謹和老人鳯口遇雨聽雨客無寐放晴山有靈禪關深紫翠勳廟肅丹間事只恐客來非當家右宿妙勝閣無雨又無日此行天相之荒園遺木老古隧得峯竒霜晚𬞞猶劔風溫茗巳旗行厨何用許勝處可忘飢右出閬山狂暖釀成雨逆風搖斷橈寂談王舍衛悶想欎臺蕭遊興孤芒屩歸期數翠翹推篷占霽色木末散聲招右謹和老人鳯口遇雨聽雨客無寐放晴山有靈禪關深紫翠勳廟肅丹青鼇負摩雲碣龍扶拱日屏真如無盡意石澗水泠泠右翔鳯山資福寺古木隂隂兀老蒼月於踈處弄昏黃巡簷不見梅花面認得東風句子香小窗無缺亦無餘一榻翛然雪透膚收拾故書藏恰好怕人寫入鳯山圗右宿資福小閣次梁間韻生前圗形耀凌煙死後起冡髙祁連垜樓隂合蒼官立輦路苔生石翁泣吳人最重十月朝𥿄錢掛冡風飄飄積金至斗命可買玉帶貂冠鎮長在右楊墳日髙褁飯看何山山缺東南水繞關松檜不搖風自度讀書聲在白雲間右何山書堂何山如幽人道埸如大家穰穰衲子腳刺刺騷翁牙挾雋控寒飈搜光躡晨霞危顛矯窣堵平疇略汙邪巖泉跑虎湧徑松髯龍拏鍾𣑽破深寂金碧開紛葩修廊步屐峻傑閣望眼賖山勢珮玦矗湖光鏡奩谺清苕杳靄入古辨空𪷟遮列翠軒名新建不可唾群籟無敢譁坐我旃檀林酌之槍旗茶宇定岫出雲語妙天雨華吾生久墮甑昔遊慣乘槎夷猶廬阜陽宿留岷江涯髙曽凌嶠棧卑或搜崖窪昨夢難歷省此行足雄誇老親八十健間儔二三嘉拍浮一葉眇收攬萬景奢冨貴上蔡犬貧賤東陵瓜未須笑落鐸誰能苦觰沙候門占噪鵲旋橈趂歸鴉竒事恐沒沒舉詩屬僧伽右道埸山苕霅趍太湖地少天宇寬髙低寶樓閣盛之水晶盤中有讀書廬八窗俯晴瀾衡辨儼相望不受湖光吞彼美金玉人伊吾斗䦨干騎鯨渺何許衰柳風露寒右玉湖書院懷二倪繫船官柳根闤闠得深密日落逺水明雲收好山出天開有聲畫人立無價璧酒行不須多鷺下菰蒲夕右葉推官無盡景梅兩絶風霜搖落都盧盡一點春回造化家萬物成終又成始須將艮體看梅花寒根不與物俱陳髁髁梢頭寂寂春却月凌風誰㑹得不沾一葉是真身和樓前梅兩絶飛香漲艷拍簷牙暖熱樓居鄂陸家寶髻盤鴉冰柱曉倚䦨平折北梢花樓髙夜靜月華陳冷浸含章一假春人影花光相上下定知梅亦解分身送李致逺安逺簿二首四海幾青眼五車今白頭信天投矮屋覔地起岑樓山逈風煙合江平潦霧收誰歟人物計留取備枚鄒與我迭知已喜君𥘉得官時來寧論晚身健莫辭難訪雪牽魂夢停雲寄肺肝斯文元氣在努力好加餐夜坐夜永難為睡群兒坐伴翁漉虀冰甕碧撚豆雪爐紅清誦聽還雋間談笑又烘安排明蚤供薺長後園叢大人和云樓砥雪千峯樓頭著寓翁梅方開蕚緑桃巳亞枝紅斟淺偏勞勸眠遲不受烘錦城春在眼何暇問蠶叢時四川李制置以榮州見辟辭之也某因用前韻寄榻髙寒地收心懶散翁雞鳴虛室白鴉起小窗紅古操塵絃拂新詩凍研烘桃梅芳意覺不是去年叢洪崖圗行葉知録溥臨龍眠本見遺修髯危肩老仙人布𫀆革帶烏靴巾胸中不著半點塵天地萬象胚腪春扇者橘書者栗瓢者术韁而掣者葛笠而鞭者拙中間厖然大者雪從我兩髯三髧一蹩躠驢何鈍奴何癡前掣後鞭趣使馳麾鞭愈急行愈遲掣韁欲斷人驢疲但見尻秃秃蹄局局欲墜不墜止鳴木本無伎倆能噴玉正可吞聲春草緑先生御氣存其神下驢步行意更真從渠蹇材拗莫馴超然目送八極轡鳯驂麒麟歲晏得路隻輪車易上失時獨幅𬒳難眠淡黃虀飯茅柴酒東掩西遮也過年百想卧輪翻伎倆三生圎澤弄精魂何如靜對梅花坐春滿江南雪後村謹和老人賦梅寄得江南驛信來窺林映水幾枝開形容綺語空能絮酬答芳心揔巳灰厭舊趍新和粉染奪真弄假點酥裁紛紛兒女春風惱却笑詩翁醉打隈和趙保之青田即事寶犀壓帳春風入渴烏傳箭寒澌滴砉然推枕起放衙霜月滿庭鳬鴈集簿書顛倒六作五文移縱橫一取十精神坐照吏姦破政事流從儒術出墨池霹靂送飛雨積案如山笑談畢逢迎合爪遞相賀戒石亭前見天日公餘琴疊舞胎仙客退爐熏齊繡佛芳蹊桃李不自言舊燕新鶯沸消息詩筒入手如見面金井新泉生玉色汗青不朽須早計過眼年華征羽急臘月二十五夜䏑玉懷雪貍膾銀憶冰鱭異哉山澤荒坐我窮鬼祟兒頭似耶白相對玩殘歲爐寒灰熒熒檠涸燈翳翳擘柑老赤腳暖酒小青髻一酌佳入蔗再酌甘勝薺陶然㑹道妙嗒然司德契吾身與乾坤共此小關棙三百六十節一節一節繫四萬八千息一息一息繼日月有往來隂陽有開閉太和行其間周流無邊際臘盡梅紛披春回柳搖曵非時難強揠有命莫過計顔回簞瓢空季路緼𫀆弊只恐非大賢公不待後丗送程宗武遊岝㠋驟暖揠芳意薄遊烘軟塵亂山雲氣曉啼鳥杏花春人物少催老物華新換陳一聲鏗爾瑟沂水緑鱗鱗謹和老人雪晴雲屏九折跨三休公欲行春雪不愁逗暖流澌鳴暗谷送晴倒景漾層樓似無似有草㾗動半落半開花氣浮婆餅焦聲林外起便從野渡喚橫舟元寂宫生祠行上元庚申間臺珍館嚴鶴林老桂巨竹籠春隂騎鶴仙翁杳莫尋適從何來貂插金裳珮丹青雜璆琳旗幡繡綵薰甲沉蕊函三洞羅森森雲璈九奏鏘愔愔擁爐步虛搖箕參稽首寥陽祈博臨庭下朝謁紛冠簮願言福壽髙於岑問子為誰對輒瘖以目代口手拊襟伊民豺虎國蠧蟫細大敲剝無遺針凛虞膏血供几砧巧諛曲媚求回心天乎少戢湯火燖庶幾沸魚逃釡􅑄上帝福善禍必淫髙目下耳一監歆察此頌禱皆呻吟革彼飛梟懷好音嗚呼愛而祠者古畏而祠者今安得皥皥相忘武城弦歌單父琴婆餅焦萬斛精神一握身清吭宛轉欲飛塵雞才唱後便知曉燕未來前先得春驚覺海棠休苦睡提醒楊柳莫空顰最憐吉語能相報麥熟同為鼓腹人孫教授挽詩手織天孫錦胸吞海若洋官卑材不盡年往慮空長啼鳥呼春夢飛花餞夕陽唯餘君子澤插架簡編香笋蕨小兒握固骨何弱稚子著綳肌尚寒豈不愛渠風味好只應催我鬢毛殘浴罷氣體和浴罷氣體和坐睡便胡床首欹如汲瓶數俯輒一昻瞢騰復瞢騰欲泯想亦忘乾坤孰髙下今古誰興亡矍然瞪兩眼踈窗半斜陽窗下櫻桃花無風自吹香金不換歌東家鼎貴萬户侯西家暴冨十谷牛喚絲呼竹進玉舟把酒巳作明朝愁中間人家賤貧慣既得未得兩無患晏眠起喫盫菜飯飯罷亂拈書冊看此樂名為金不換酬東風引魏鄭公田舍翁陸敬輿老獠奴斯人斯人尚如許薄命蛾眉何足數野桃溪杏次第紅脫袴博酒酬東風溪行却掃晝隂永意行溪上汀鬢華年减黑草暈日添青魚舞新磨鏡鷗飛小畫屏梨花寒食近誰與管飄零用吳祕書正月晦韻攬春群玉寫芳懷次第安排到藥苔但得斯文留脉在須教我輩放眉開踈風細雨桃花過竹屋柴門燕子來老去湖山無復夢荷鉏西崦覔榿栽禮滅翁退天台能仁院歸梁渚一絶寄之倒劄枯藤立晚風山光不與水俱東蘋花落盡蘆花老地闊天髙一箇鴻棕櫚舊脫敗蓑亂新添華節髙肅容春尚靜俠氣夏方豪黃孕子魚腹青披孔雀尻豐撞知可製雷動景鍾號碧桃曲草平不斷瑶池路樓礙東風花滿樹緑眉素頰淡裙裳月華暖透三更露雙成飛瓊妬髙妍引梢搖月分嬋姢雲璈一曲迸空碧青鸞驚起花翩翩燭下次海棠紅深翠淺浣花春投老相逢過所欣有許精神冝半睡無多醖藉莫全醺涵渟芳露須饒月籠護晴暉不礙雲成就化工真冨貴天香更與牡丹分送李微之倅成都鳯生丹山西來為太平符矯立青琅玕祥雲蔚相扶一鳴合簫韶再鳴應騶虞散為清明風萬象皆敷與色舉抑何决矢脫金僕姑戞摩參旗髙可望不可呼穿花迷嬌雉唼藻戲乳鳬搔首重太息春隂渺江湖次叔厚韻夢斷紅塵踏九衢雲山佳處借樓居採將瓠葉隨冝煮拾得榴皮信意書未問我今忘我丗須知吾本愛吾廬黃公壚在花隂裏磊砢從君一破除二佳佳笋如佳人柔晢飽風致佳醑如佳士醇明負骨氣此笋配此醑可愛不可醉得醉豈不好醉恐不知味蔚如王謝家文雅將冨貴二月二十七遊仙洞次壁間韻點腳地維絶舉頭天語聞瀑泉飛響雪洞石湧崩雲縹眇追元放低回揖郭文神清知好在煙鎖緑苔紋用韻答趙主簿逸氣蓋三謝英詞參二班飛緌冝北闕枉駕忽東山花妥晝隂寂絮吹春思間光風知幾轉盡付酒杯間謹和老人羅山自鑄鐵成錯誰吹灰使然俗情床上下野趣密中邊花豔明光錦苔㾗白打錢醉翁詩板在山莫放童顛寄題辛氏塵外樓羅浮三十里樓對玉崔嵬風卷軟紅去雲扶飛翠來㑹心須盡帙適性莫多杯除得翳根盡靈光生鏡臺𥘉夏鶴帳華纓絶牛蹊老屐穿薄晴生晚哢深緑護餘妍萬卷不堪煮百懷空自煎朱櫻黃苦笋小酌便陶然里人送芍藥用韻詩墨淋漓似小王殷勤包贈暖紅香楊州金繫腰何在隨分留春共一觴寄髙子厚因讀東坡馬生本窮士詩有感而作盤隱門下客流落餘兩箇我故稔子窮子亦諒我懦稚松髙未尺早望屋脊過小蓮出才寸便譽車輪大急灘倒撑船狹路錯推磨不誚材無堪祗嘆命未作去聲沽酒勞閴寂褁飯問寒餓為分猢猻愁相對槖駝坐有無共甘苦休戚先吊賀綢繆平生期荏苒歲月蹉人情少耐久丗事難預課欲尋買山盟恐踏算甕破憫農時邑令建長橋麥黃蠶登簇秧青雨催耕農家竭作時無工搏蚊虻短杠鴈鶩進修繂螻蟻行謨蓋溪壑滿名言輿梁成吞聲不敢怨但願天長晴和禮滅翁感錢氏舊事民不知兵物自華表忠消得老碑誇虎符龍節故王國鳯舞鸞飛今帝家遺廟斷垣低槲葉荒村舊井濕桐花馮夷尚怕潮頭弩一望西興渡口沙滅翁為日者求詩大橈甲子一串穿東州西州走諸禪芭蕉虛實果何物橄欖苦甜猶問天華光佛壽十二劫瞿曇像法一千年兩翁見子肯倒屣好為推到無生前用鍾侍郎韻贈懶谷蒲團竹几妙髙臺瞑坐何能放眼開門外白雲多事在又將飛雨出山來暑夕樓髙收晚照野逈送宵隂鷺下汀沙靜螢行岸竹深攖寧和順氣緣督正平心轉物天機妙昭文不在琴王章皂囊盥手自封題忘却牛衣忍凍啼一點丹心通碧落歲寒寧負白頭妻暑坐隔簾草樹隔溪山密密深深洞啓關水色山光無障礙南風送入亂書間謹和老人夏日東山即事二首剗草根須盡傳花葉未多明波撑窣堵老石卧盤陀煨美甘分芋蒸肥缺褁荷醒然下山去明月滿林阿菜把野園送花枝鄰巷賖搗蟾和絳雪騎斗弄青霞古帖臨禽李新詩續稻瓜晚凉隨杖履携酒訪魚槎田家建除體建鼓勸竭作除田緑紛披滿築沮澤岸平流綺塍陂定約欲水均執熱願雨隨破柱雷電合危簷溜紳垂成功一天瓢收穫萬京坻開元正觀盛閉關更休師和趙青田燕坐青田鶴翁杜德機天根月窟手探之嬰兒姹女熟摶弄妙處不許旁人知渠家庭院紛花藥啄木黃鸝幾推郤流蘇百子卧春風萬欲難供無砥壑生門死户一線間內丹走盡求外丹明朝赤黃裂大山護鼎龍虎方間間新秋藥名兩首老色蒼蒼耳向聾秋聲欺得白頭翁已甘草詔元無分只苦耽詩久缺功引興從容風月足放懷浪宕水雲空雨餘凉意生庭户夜半天河鵲信通兩眼旋花雪點鬚鑽頭故𥿄枉工夫倦懷懶附子公櫝間性熟諳摩詰圗枝拂雲香行到桂葉隨風舞又催梧乘槎欲到空青問織女牽牛事有無謹和老人官山看髙子厚修墓秋風問訊老芙蕖靖節前行後阿舒緩䇿穩過金絡馬小烹佳勝蔗漿厨何榮何辱人千古誰是誰非冡一區遇著好花隨處醉莫論他屋與吾廬用子有述懷韻為壽筆力強於二石弓文埸早合擅元戎東西塗抹未為老左右圗書那得窮三日窺牛酬壯志十年到鳯䇿竒功更須傳取長生訣蜜炬髙燒不受風俞成大送新芋謝三郎女敗蓑衣繿縷中藏玉雪肌柱下莫愁無乳媪秋風得此可忘飢范待制子長挽詩二首太白曉𦦨𦦨飛鴻秋冥冥氣節蚤巳徑勳名晚逾馨冰霜蜀棧蹇風雨秦關腥一范不可作岷峨千古青生不餌柏寺死才跨松階浮雲忽易滅明月終難埋宇宙卓有立江山渺無涯掩卷獨搔首西風知此懷和俞成大八月梅花秋光深處送春來青葉扶踈數點梅料是知君新釀熟攙先九月菊花開謹和老人秋日遣懷鬱鬱年來亦欲東窮魔揮斥缺天蓬得甜自喜皆花密與苦相忘獨蓼蟲張望紅粳新作業柴桑青菊舊家風鄰翁強解人間事數問朱轓甚日熊月下用鄭大參和沾維那圎覺韻無縫冰輪萬古同御風飛到碧天中四方上下無遮礙一點清光處處通東山即事西風卷宿祲天髙近重陽閣虛自沆瀣塔靜能琅璫幽花多素英穠香奪春芳老木未黃落繁隂生夏凉棋雋决楚漢杯壯迷彭殤醉帽信孟嘉歸鞭忘葛強萬事貴適意誰能扣蒼蒼九月四日過增口道中秋光拍塞小村墟髙下人家意自如屋砥四蠶抽蛹細墻頭三桂著花踈握兒早秫酒無限杓子晚菘虀有餘大似元豐年界好天應容我老樵漁謹和老人九日樓頭獨立夕陽西搖落髙風萬木嘶人自官芻銜馬口我方社酒薦豚蹄一塵不著青銅鏡萬法皆空黑􅃮箆節後龍山應更好秋光拍滿錦障泥謹和老人賦牛尾貍二首踏白霜明夜牽黃木葉秋斕斑文未豹觳􅑌䏑先牛壓玉開三面蒸酥讓一頭酒邊纎手削醉倒老浮丘北雪佛貍種西風金狗秋謀生貪過鼠逃死喘如牛糟熟涎奴舌虀芳點客頭何時明獵火吞盡楚青丘趙忠簡孫璧見過有詩用韻薄命窘震凌餘生颯糞朽間間飽欵竹寂寂老煆柳溪空漁爭隈野熟飲𬒳肘有鄰晨致薤無客夜剪韭忽來闖户屨自挈問字酒𥘉見了眉睫徐語應心口顧豫果誰與恐子不我友維昔燕夾攻坐使汴失守應奉固亂階新法實禍首療危非庸醫救敗須國手豐魏兩翁奮關洛孤憤久人謀密相濟天意斷非偶攻守豈必同勝負亦常有誰推姦人出竟墮黠虜誘包將復讎戈付與掃愁帚風雲激矢脫日月峻輪走殘羶汚北雪遺憾掛南斗功名本同舟學術乃各牖一時䇿得失千古史妍醜忠簡社稷臣尚起九京否謹和老人𥘉冬即事莫怒狙公賦芧慳萬緣一定不容干老便窗下迷離暖醉愛尊前郭索寒屑玉晨光明沆瀣流珠夜氣鬱蘭玕但能飽喫長年飯射虎南山有分看謹和老人𥘉冬寓筆十絶平泉草木須臾夢金谷鶯花一撮塵冨貴若生根到砥兩家占斷别無人是非不驗道應壞禍福無慿天也荒便使曹瞞生賣履巳賖王衍死排墻何人地下管天條不是臯陶即是蕭金埒謾誇錢過斗鐵圍寧問玉垂腰當場弄出百般竒傀儡棚中老偃師滿眼機關無著處到頭線索有收時兩儀亦有盈虧數萬物難逃出入機一把牙籌空自苦蓋棺著得幾通衣避風臺上深情寵偃月堂中盡意謀爭奈天公無面目滿林黃葉一畨秋煮茗燒香雙赤腳撿書洗研一蒼頭斯文興喪由天在未用安排地起樓元子掃空桓氏業窟郎蕩盡李家風前人留得兒孫立何患鸞枝不長桐方窮蔡澤問唐舉未遇鄴侯逢懶殘觸石起雲能沛雨不應長作旱雷看命有窮通分虎鼠事無得失盡雞蟲東籬獨有黃花在挹取寒香壽阿翁又和青女籠晴試小春門前沙路淨無塵平洲水竹因依好白鷺飛來不避人往來魚虎澗流淺出沒鼠狼庭草荒宅近市傍人不到獨迎西日上東墻柳亞溪橋幾換條鬢根添得雪飄蕭清臞自信堪騎鶴最喜無錢絆住腰爾雅蟲魚巳熟知更將埤雅訪農師投糟赤蟹真無價薦餅黃雞正及時終朝聒得耳神飛東舍西鄰盡販機百樣攀花無我分慣將簾作後堂衣架上亂書兒自整床頭濁酒婦能謀只將翹足垂蓮勢靜對書窗課奕秋風裏行雲不自由低眉重整玉搔頭桃根縱有飛花渡燕子寧無接翅樓寒燈芳燼發春紅讀到豳詩繼匪風吾道有消還有長欲將此意寫絲桐蟹正肥時秋色老鴉爭噪處夕陽殘未須多進玻瓈碗滿樹霜紅正好看天時人事共流通何用將冰語夏蟲判為梅花多釀酒春風裏著蜜翁翁仲冬九日還可庵謁墓遂入都未放梅梢一箇春枇杷花巳玉嶙峋霜靴帶取苔㾗去應𬒳孤猿野鶴嗔臺中聽雪淅瀝松㕔夜空山一樣聲冰霜元自徑水月更添清衾薄難留夢窗虛易得明庭烏催奏墨未曉巳先鳴太一宫齊祭呈司封吳舍人立春前一日寶鑰轟霄啓玉晨風恬雪霽淨無塵東皇太一紫壇曉丗界大千青陸春藜杖流光環珮集鏠旗斂影豆籩陳樂歌須仗甘泉筆斧藻天家泰道新謹和老人除日吾道何通塞人情自寂喧無羔還可茗有鶴不須錢議論追嘉祐聲名續正元壽親惟此爾一笑柏椒邊清凉院僧房致齊花片墻隂晚禽聲屋角晴東風猶峭在煨芋坐深明銓闈董試上巳二絶天氣年年只麼新官忙不似舊間身油車畫舫西湖閙可惜埋頭典却春柳暗鴉嬌日正長筆頭風雨響修廊一簾芳碧雙蝴蝶也解尋人姓字香除夜哭內密雪踈風客屋穿幾回除夕伴憂煎團欒方索日邊飯契闊巳成松砥眠畫火何堪思舊事理衣誰與管新年平時戒汝無多酌爭得屠蘇到汝前省闈試士東風席帽快行催渾為天家造士來捧詔九霄雲氣濕分題五色日華開㨂金沙裏須精鑒脫頴囊中盡異材容受直言天子聖好聽臚唱響春雷六月五日集英殿䇿士從官待宣于內軍器庫廊漢廷與目䇿英豪投釣知誰首掣鰲百日紅連綸閣逈萬年枝拂禁城髙內廊坐永風生席輦路歸遲月映𫀆西抹東塗渾忘却一絇短雪不堪搔李尚書季允度侍郎周卿趙侍郎履常趙侍郎適道同待宣六月十六日宣鎖禁門深鑰寂無譁濃墨淋漓兩相麻唱徹五更天未曉一池月浸紫薇花恭和御製賜吳叔告巳下聞喜宴詩致主唐虞澤兆民賢才端是國精神作人欲返皇風古拔士先隨聖化新收斂文章歸獻替安排事業到彌綸宸章屬望丁寧甚上答天恩莫愛身謹和老人瘳字韻本期洗眼看伊周到此華胥只夢遊爛熳蒼苔心事晚婆娑紅槿鬢華秋藏頭欲效鑽沙鱉捫舌空成噍草牛飯豆芋魁渾好在得歸不藥病還瘳謹和大人喜晴雨腳如麻日日然垂成生恐壞豐年九重肸蠁通方寸一點光明遍大千喜動朝行花砥散愁銷野次葦間緣奄觀銍艾霜風晚重壓牛車倍費鞭閏月草六日奉御香祈天笁觀音於昭慶寺是日得霽大士慈悲出𥙷陀掃除隂翳作人和武康芋子鹽官棗遇著豐年也倍多謹和老人賦退朝丗事鵬斥鷃人情燕伯勞心須腔放闊眼要孔提髙陳力惟求健承恩敢恃牢熟思歸計是春酒薦蔞蒿下元節後省試進奏院吏推雲不動雨聲苦醖雪未成風力乾瘖鶩一庭淘墨汁也煩老子坐深寒十一月五日鎖學士院樓頭禁鼓試𥘉撾催草江淮督使麻落𥿄一簾風雨疾不知斜墨陳翻鴉直玉堂和李參政絶句曲折宫墻日影方堂深人靜似山梁棕櫚葉砥梅花老次第風光到海棠老人生朝為壽迎侍京華又見春天時人事一畨新丙申兒遇丙申歲已卯逢已卯辰本分法門行得熟長生樣子學來真斑衣奉酒多為壽滿眼光風正可人正月十九日孟享從駕黃繖中間一點紅繡雲鹵簿海棠風鈞容聲出雲霄外馬上誰憐有老聾新將給事換前銜班𬒳真除法從攙道是緊頭人不信回看壓得兩緋衫游景仁吳叔永兼權侍郎太廟致齊風雨殘春晚作晴寶山深靜勃鳩鳴雲收翠㦸龍文潤日透金鋪獸面明蠶出火時桑正沃秧抽頴處麥還成在天列聖孫謀逺流福人間釀太平平齊文集卷第八
