body:
  text: 啓二通李參政啓退思巖之勲名聞從諸老獨樂園之風骨識後群兒惟伯陽實出於洪冝孔融自通於李輙將一瓣仰扣六符􅀼以武侯未起於草廬熟知成敗晉公雖逸於緑野常佩安危上天非無故而生賢君子蓋有待而行道矧今大勢異昔平時朝廷未深察取燕之圗邊鄙或復用攻遼之䇿國計捉衿而見肘民生剜肉以醫瘡士懷諉鶴之心將有養鷹之志屯􅁄門屯灞上視紀律以如無出斜谷出祁山問規模而猶未縱使置一勝一􅀒於度外可不計五大五細於目前鬰攸煽熖而薄京師熒惑吐芒而犯帝座仰占天意似應人謀朋黨漸萌未免向時一網之慮元良未定豈無異日半􅁓之憂波方急而維楫莫施證已壞而刀圭安在上深念此公有意乎恭惟某官道德宗師文章宿老太山之雲爲􅀨自有機緘虞淵之日洗光不動聲色方權姦之用事惟明哲以保身幾年出鄴侯以避元載之鋒一日進弱翁而正霍禹之罪雲霓盡掃宇宙復清五龍夾以飛旣展濟時之略四蛇入其宇􅀄無求丗之心鋤梅花之月於未春飲木蘭之露於將曉觀渠血指攅我醉眉然救否者莫謹乎苞桑而反剥者亦由乎碩果離當復合危可使平我公有衮衣以歸趣登上相天子􅀒斧扆而立迄濟中興某渉道未深謀身更拙聊爾署冗銜於􅁓尾居然託後乗於遨頭矯詹峨眉太白之間知有東坡頴濵者在雖執鞭之晩矣尚捧研以從之蓋欲質平生書囊之疑豈止爲方來夾袋之地後天下而樂况曽協於寅恭安宇内爲先願無忘於辰告寸忱所屬百喙奚殫上劉閣學啓駟玉虬以征尚遲牀下之拜􅀐青牛而過敢後道傍之迎顧斯文千古以無傳而前輩百年之幾見熟窺梗槩粗識源流蓋自蜀公以來始有後溪者作其清明則青天白日其髙深則太山黄河參古今之典刑具出處之本末權門鼎盛在熈寧自拔於熈寧聖化更張處元祐不黨於元祐以雞鳴嘐嘐之志追鴻飛􅁳􅁳之風去不可留歸猶未老廵梅花而索􅀏浩􅀂􅅐中之春樹諼草以忘憂蕭然物外之樂盡醉於田父􅅺飲之頃相忘於舎者争席之間文章散落於人寰翰墨流傳於夷裔雖有詔以強起曽何心於復來然而一飯不忘乎吾君百方欲濟乎斯丗有􅀜廟畫毎以驛聞宗磐未強首陳儲嗣事之十九䟽民瘼已亟次及條例司之數千言伏􅀌忠以直前犯衆怒而不顧亶爲仁者之勇兼得聖人之清天下之逹尊三孰如公者國中之儒者一其捨我乎賜劔履以給扶偉衣冠而入侍某遨頭後乗鉗尾冗銜毎思退續離騷之詞何幸親問太玄之字觀神和而氣定知目擊而道存自憐孺子倥侗毋惜一編之教更願老親強健亦如三壽之朋敬在下風有如皦日上安宣撫啓魚鳬􅅙叢以來形勢千古伏龍鳯雛而後勲業一人朝家西顧以寛憂屬吏東郷而聽令九卯旗之近三熏子墨之恭􅀼嘗泛觀古今制敵之機頗識東南立國之勢腹心江浙腰膂荆襄維蜀道之山川如人身之頭目呉合之則可奪曹瞞之氣晉失之則難折阿堅之謀雖太白峩眉四萬八千年始通中國然西陵江都五千七百里莫重上游唇亡則齒必寒首撃而尾自應欲混鼎峙三分之地無如坤維半壁之天恭惟某官抱王佐之材任天下之重乗雲氣􅀐日月横騖泬寥之間簸鴻􅄥扇雷霆獨立汗漫之表以道義養吾之大勇以忠忱運我之壯猶唾怒虎其方拏截奔鯨乎已沛聲子璋之罪血模糊於髑髏正劉闢之誅刀紛綸於膾脯三綱垂弛以重立四極旣揺而復安逮黒谷之繹騷重緑林之俶擾病逢壞證棋入危機人寒心而莫支公攬涕而又起矛驅海􅀂障漢􅃆之頽瀾甲洗天河歛殽函之妖祲威行夷夏功塞堪輿盍歸上相之班猶坐元戎之帳以西土之方靖冝東人之欲留不惟後勁以中權要使左饘而右粥勃律天西之野春草犢肥蓬婆雪外之城秋風馬臥惟梁益無鳴弓之警則荆楊享奠枕之安紀社稷之元勲申山河之信誓㣲管仲其左祍矣夙髙􅂄定之謀歸周公以衮衣􅀆佇翼升平之運某暫洿班尾即趂遨頭顧治中之非長置貟外而奚益惟大莫府推赤心而聽計而小朝廷開青眼以延材甘踏羊腸願詹馬首出師一表旣於伊訓􅀃命而有光皇武兩詩當視吉日崧髙而無媿委心歸􅀝拜手敷陳添倅到任謝廟堂啓東望日邊迷前塵於班尾西來雪外陪後乗於遨頭轍行地以雖遥梯􅀝天而實近作平生不到之夢出造化非常之恩伏念某文字蟲魚姓名蟣虱偪仄何偪仄定非湖海之豪伊優自伊優粗有山林之氣襲子長南游之遺跡放少陵北征之壯懷捩淮柂以方休掛江㠶而又去石頭牛渚六朝名勝之如存夏口烏林三國英雄之安在木葉秋飛於楚些竹枝寒送於巴歌毎渺渺以凝思還逢逢而催發灘稠十二培之上路遶百八盤之間鹿角狼牙旋渦正沸虎􅂡龍脊激浪欲飛電驚鮓甕之谽谺雷吼業牀之濆薄􅀉性命於一蔑蕩神魂於兩橈可謂人生之畏塗然亦天下之偉觀三峽矗井絡而上動揺星辰一川飜月窟而來傾倒河漢屏巫山於絶岸柱灔澦於中流峭立百牢之􅀜横陳八陣之磧脚力未窮於涪萬目光已射於岷峨萬里橋邊啁哳估舡之曉百花潭上喧呼藥市之春以治中别駕之冗貟追方外司馬之樂事經行所到獵取巳多進可賡王褒益州之詩退可續太冲蜀都之賦匪私鈞播疇與玉成兹蓋恭遇某官道大而有容功髙而不伐謂紫雲樓之議論在安細民而天章閣之條陳務去宿弊咄坤軸之萬里邈君門之九重碩䑕多貪小鮮易擾旣擇蕃宣之雅望又収􅀜决之駑材俾笏而魚隨琴與鶴惟民愁之旣劇且兵調之方殷衛公籌邊之圗必精思而制勝武侯出師之表非快意以徼功要當爲根本之謀乃可固藩籬之􅀔勉毗鎮撫期荅生成一弛一張知妙得濟時之略五細五大願早施醫國之功言非所冝死有餘罪通成都倅啓手弄參旗快治中之展驥眼穿危棧容貟外之題輿凄其一葉之來幸甚萬間之托恭惟某官儲岷巫之秀傳坡頴之源天孫雲漢之分軒軒傑作巨靈太華之擘矯矯竒材藏諸用而不窮隨所施而可紀盍陟道山之峻猶迂錦水之遥􅅺軾生光油幢􅀝重浣花勝踐聊接武於遨頭視草新除便問津於龍尾某淮城乆戍蜀道遐征雖云裂風月而三之不過旅琴􅀛之一耳古心而又古貌自信獨難異人而得異書相從未晩回節推䄂啓殿上呼盧之䜟早動諸公幕中􅀝馬之材肯交餘子接茵巳幸衘􅃑何謙恭惟某官琅琅國子監之書爛爛蓬萊宫之賦一通脫手萬乗改容杜書記在其下風嚴少尹置諸上客如石投水猶珠生淵指籌邊之兩圗平章蠻徼草出師之一表號召秦􅀜盡搴芙蓉之華遂翻芍藥之影某幾年心敬一日眼明略窺小陸之文已識大任之韞屋頭問訊欣雞犬之相聞劔外征行恨燕鴻之相避回僉判䄂啓星槎仙客忽來笙鶴之聲雪錦主人益壯琴􅀛之氣辱在聮事願言定交恭惟某官賀白材名晁黄文采集芙蓉之裳而脩􅀄服不着一塵卧蓮葉之舟而讀玉書平吞八極屢試發硎之刄難蔵露頴之錐宣閫拔尤戎垣借重落筆於龍筋鳯髓之上􅀉興乎魚泳鳥飛之間姑賛籌邊即登天禄某逺趨幕厎近接墻隂合簮甫挹於清摽㩜􅃑首勤於好語手􅃒西日􅂚圗横草之功脚踏東風當共浣花之樂龍州到任謝廟堂啓萬里橋邊甫解佐州之組百牢􅀜裏忽分護塞之符名未登聖天子之御屏身巳入眞宰相之夾袋夢想不到頂踵有歸伏念某冰霰窮厓風濤苦海藐爾幾年之流落軒然一旦之遭逢􅀘太廟齋郎入扣天田之角與京官通判出捫雲棧之參了無􅀜决之長惟佩丁寧之訓一來錦水四度劔門雖弗陪大莫府之賔猶自詭老元戎之客其於徇國靡忘愚公移山之心所謂籌邊但進彭祖觀井之法偶畢葵丘之戍方謀栗里之歸不圗寒根遽動春意兹盖恭遇某官􅅐中水鏡筆下化爐有猷有爲有守則念之得箕子建極之意乃牧乃事乃凖惟后矣循周公立政之規凢諸老退而無營曁衆正用之未盡大爲坯冶悉入蒐羅上􅀜豐􅉮數丗之仁下應泰茅三陽之象爲今元祐嗣昔淳熈矧墮甑之餘生乃播鈞之舊物亟令剖竹靡俟需􅀲歴吉日以問塗遡下風而委命丹心許國敢矜􅀞㦸之榮白髮􅀝門第想綵衣之樂兩全命􅁩一出生成謝制置崔閣學啓目送飛雲欲問吴頭之路手遮落日忽乗蜀尾之􅀜告赤崖父老以天子之聖仁諭青羗種族以元戎之威信凢束衿而聽令皆彈指以知恩伏念某危機熏心老色上面拍銅㪷而舞角銳之習巳空摩石鼓而歌􅄝竒之癖猶在惟鷽鳩不能以自􅁬故駏蛩有待而後行追隨一琴跋履􅀟劔草左將軍之檄雖未愈於頭風誦崔大夫之詩亦能驅於瘧􅀑滿冝去矣行復尼之走絶棧之危途訪縋兵之間道􅀖人嗟異昔無朝士之來山獠傳呼今見幕賔之出樂郊至止道院蕭然長嘯而萬壑譍獨立而千章拱真成吏隱何有官癡兹蓋恭遇某官心與造物者游身任天下之重以強國勢爲定三秦之根本以収人材爲用四蜀之規摹乗鴈雖多前魚未棄始平辟司馬以丞郡其事略同小范挾師魯以行邊所期更逺故雖公斯丗而稱物未免私其人而擇官矜此踈庸置之簡静俾於撫字催科之暇而求切磋􅅣磨之功爲君子儒從先生後􅀋我􅀋我乆則肖敢忘凾席之規式微式微胡不歸尚尉􅀝門之望請事斯語有如大江回生日啓年華垂暮乆矣倦游月紀就盈依然􅀄度影留積雪之表心在飛雲之邊何勤記存特枉慶問夸詡斑衣之樂鋪張黄絹之辭義重同寅情深泛愛贈之秋菊知欲制於頽齡歌以木桃尚無忘於永好迓鄭制置啓入侍中宸出制外閫西控六詔磊落籌邊之圗北定三秦淋漓出師之表惟卧龍之規橅素定故刺虎之機㑹可投氣壓赤雲聲揺紫邏恭惟某官學空萬古名塞兩間緇衣敝予又改爲􅀆典刑尚在朱弦倡而有遺音矣格調更髙岸巾湓浦之秋風舉酒平山之春色吟懷激壯酣膽輪囷論山東之事冝浪戰非䇿指淮南之形勢寢謀在人上知爲天下之竒材公請當今日之重􅀉方整雍丘之役又嚴斜谷之征惟井參之上游與􅀜隴而錯壤枕戈雖切傳檄尚遲豈人謀之未臧抑天運之有待虜乗丙午之釁而犯梁汴于今百年我應甲申之䜟而破秦川在此一舉開誠心以集衆智倡大義以激三軍招揺所臨攙槍如洗天生晟非爲朕亟収􅂄定之功帝咨度遂相予丕賛升平之業某一身虎䑕萬里駏蛩昔凌斗野以從游今介雪山而聽令􅁣斯道之孰主誇吾􅀖之有人未暏前茅已占破竹讀長安之露布相與驩呼賡涇水之鐃歌尚知興起􅀍旨奏事謝廟堂啓瞻太行之雲心方揺於西徼近長安之日夢忽到於東華天道以從欲爲仁人紀以錫􅀋爲孝綱常立矣聖賢能之􅀼以行卭郲九折而去官漢許全於子道守西山三城而入奏唐使便於親闈蓋天下之至情冝人上之深􅊫伏念某汚邪家丗窶藪身名王粲問從誰猝猝行邊之志顧况悔生汝依依去國之懷泝瞿唐灔澦而西躡龍門石櫃以北趼足萬里回首五年江上秋風影斷未歸之鴈城頭落日魂飛返哺之烏讀何蕃之傳而躊躇覽孫寳之章而愓息去天雖邈控地有祈但爲昏定晨省之謀廼叨朝奏暮召之寵父曰嗟予子行役展轉許時昔我往矣今來思團欒有日舉家懽舞行道榮觀兹蓋伏遇某官以躬行作百丗之程以性學立三才之極大旣和於民則細亦盡於人情四牡之啓處不遑聽其來諗杖杜之憂心孔疚知爾懷歸况家山正在紅雲之旁而菽水難供白雪之外俾趍北闕就養南陔所謂老者安少者懷莫非仁之至義之盡第閶闔護􅀜之有虎蓬萊引棹之常風可恃而前惟繫所主三吐哺三握髮行窺上衮之光壹舉足壹出言永戴洪鈞之施過此以往未知所裁賀廟堂定䇿啓劄恭審以一代元勲定萬丗大䇿生靈有主社稷無疆嘗觀歴代之源流因攷置君之本末奉之冕服伊尹在太甲爲阿衡逆以干戈召公相康王作顧命凢􅀖家奕丗之慶皆宰輔得人之功秦不足言漢亦未善代王之入以太尉陳平何爲曽孫之立以將軍楊敞不與或外戚推擇於襁褓之内或宦官操制於掌握之中託周公行事者皆然如武侯用心者有幾以至􅀳聽之司馬之處分唐付之中尉之轉移倒持太阿擅弄神噐忠如狄仁傑中宗僅付諸人智如李衛公宣宗不出於己噬臍莫及搤擥徒多惟我熈朝􅀂時元老藏書金匱定大業於兄弟之繼承漬墨水盂扶正統於父子之授受顧託之􅀉在宰相擁立之權歸朝廷大典具存盛事復見某官相先帝十七年之治培皇家億萬祀之休巍巍煌煌無逸太平之業濯濯赫赫崧髙中興之謀逮慿几之道􅀭重嗣服之付托謳歌之啓而人心屬暦數在舜而天命歸危疑雖深咳唾已定挈洊雷而出地獨恃寸心扶大明而當天盡出一手此蓋列聖監其志先正啓其􅂨用能奠九鼎於聲色不動之中于以大一統於觀聽惟新之始旂常徧紀鍾吕特書泰山喬嶽之俱崇長江大河之無極某委身坱圠拭目休明知宗祏之有依與草木而同慶然事莫難於謀始功尤重於圗終潞公老臣盡日立侍於少主之側魏公舊相一旦卷簾於母后之前有光昔人正在今日某下情不任踴躍慶快之至秘書郎謝廟堂啓虎落賦歸尚憶窮邊之戍龍飛入奏忽叨廣内之除當明兩作離之旦而兼収與謂一爲元之制而並下始終大造之力俛仰平生之榮􅀼以漢九種一百三家録嚴中祕唐四部二十萬卷藏冨弘文迨熈朝之煟興嚴列館之鼎峙上捜禹穴下采虞􅀄登其庭者道山日月之最華讀其書者瀛洲風露之亦飽乃􅀂秩羙職清之選莫非見殫聞洽之材如某者識字亡竒用心徒苦日斜牛背慣從襏襫之耕月暗馬頭間問兠牟之役莫府劔山之外麗譙涪水之濵粗了官癡不改書癖伊川絶學巳箍匠之不存清獻髙風尚蒼頭之可語心折百牢之客路眼穿萬里之親闈第期西崦之還乃作東華之夢周章拜命勃窣趨朝天近五雲甫候紫宸之對地清群玉忽陪碧閬之遊左思于此而賦三都丗南由是而擅五絶歴觀作者深媿斯文兹蓋㳟遇某官定大計如隆興開皇極如元祐収召乆閑之􅂄艾韓吕朋來登崇未顯之畯良晁張輩出謂今奎壁之府自昔豫章之林國以儲材士焉養望遂下采於兎􅄄亦俾乗於鹿車某敢不澡雪精神於征塵没没之餘収歛身心於夜氣揺揺之後竹裏汲泉而煮茗花邊挹露以研朱端日將臨首獻三元之頌盛時親見尚賡七德之歌回胡判院啓曠度髙才方快景星之睹雄文大軸忽勤明月之投喜獲一麟盡洗萬馬恭惟某官壘劘屈賈􅁅撥隂何以湖海一生之豪爲京洛諸老之客流涕痛哭見於議論怒罵嘻􅀏發爲文章具眼非無其人壓頭終付之命黄金且盡長鋏猶存自昔聲名當三千而何啻祗今冨貴過五十以非遲某脫從煙霞來足風露枕書清樾之厎誰與喚醒拾落花之邊更煩舉似略兹具報幸甚鑒紆臨安諸友招講東山啓慕徂徠之餘風退安西崦引嶽麓之故事延致東巖豈不願一郷善士之交其如非諸儒名家之選莫當盛意輙誦淺聞蓋自兩楹之夢旣符一貫之學如綫以仲尼事有􅀂安能無貌似之疑由子思傳孟軻所幸有性善之􅀃迨秦熖之寖冷而漢塗之復開淄川言易濟南言書各擅專門之業賈逵作訓馬融作傳居多著録之徒雖穿鑿之未純亦發明之良苦㑹文有益温故冝師乃􅀂泰北之仰昌􅀺衡湘之宗子厚頭童齒豁未免先生欺余哉之嘲耳拂心騷且有吾子見愛爾之嘆顧好爲之通患在善誘以疇能惟本朝五星之聚奎而斯文百川之至海自伊洛出有洙泗風氣􅁚巖巖立盡三更之雪精神盎盎坐餘一月之春所謂賢希聖聖希天夫豈書盡言言盡意諸老信有功於後覺群英求無媿於前脩腔子裏盡惻隱之心貴加存養科舉外有義理之學不厭討論能自得於源流更孰加於模範藐如逐客老矣陳人乆忘東塗西抺之時未定南去北來之地辱拂黄龍之榻俾修白鹿之規端是借聾誠難起躄見大巫而怯敢危坐於虎皮從野翁者遊尚醉眠於牛背略敷梗槩切幾鑒紆再荅招講啓劄某伏承妙語申諭寵延􅂚月予還歸哉乆起故園之興吾年今已如此難陪勝社之遊况蝸涎不足以自濡而螢爝何堪於共照徒慙便腹多費解頥幸諸君之見寛容老子之省事窪樽西乳甘寂寞之漫郎石室東山付風流之太傅荐滕口􅀃切幾心孚生日回啓戊子蒼顔五十三又逢􅀄度化身千百億揔是窮愁辱飛􅀟鳬來顧獨鶴開行厨於竹裏出妙語於梅邊爲留西日之隂待轉東風之信掛梢緑鳯夢何到於調羮啄􅁰黄雞盟尚㝷於煑餅其爲心感併得面陳生日回程宰啓己丑以墨梅并詩來牛􅁬其角閱良月之就盈鴻漸于干驚朔風之欲暮過勤掞藻加賁垂蓬某官學道愛人折節下士同出老先生之門而矜其不耦日奉太夫人之懽而念其有親欲回東里之春先􅀉西湖之信句隨香動格與􅆬髙照見百里奚飯牛之心冩出九方臯相馬之意戒以點白俾之守玄老我長閑敲棊聲於橘裏爲君細誦引酒興於梅邊生日回啓庚寅閱天地之數乆矣疑年對聖賢之書蕭然送日方嘆箕張而牛􅁬忽聞春發以鯨鏗􅀏桃李之争新許楩楠之耐乆詞髙戞玉意重訂金水調數聲恨欠雪兒之唱山光一帶願從詩老之遊占報斐然垂察幸甚生日回啓癸巳九年謫之賦不暇問天十月交之詩猶記墮地方擁山隂之雪忽披沁水之春醖藉不凢機杼自别以彼冨貴榮華之夢開此風流散誕之懷意氣重於斷金音調諧於佩玉醉喚盧仝之赤脚強爲我歌􅀏摩杜老之白頭莫當君賜其爲感著未易名言生日回呉季永寺簿啓乙未歳周六甲氣近一陽過辱髙情俯記􅀄度呉罡之斧修月出語不凢洪崖之榼留春拜賜殊侈琢磨以岷山五花之玉護養以峨眉千歳之苓愛之欲生永以爲好義􅁭特重莫訝卷錦鯨而還老眼尚明要看冠鐵豸而立復官謝廟堂啓新綸渙發宏開宥罪之科舊秩復還仍賦祝􅁵之廪與兩儀而同量控九地以知恩伏念某姿禀迂踈學問寡陋明主可忠言之日􅁩孰數之天下本無事之秋黯妄發矣冝坐反脣之律特寛擢髮之誅僅禠官聮俾安家食兒從郎罷拾柿葉以學書妻對藁砧然松明而理績凢此團欒之適莫非坱北之私以口語心引手加額第一日之去國倐七年之杜門户外屨空但有莓苔之徑床頭金盡况無􅛉稏之圩未問數百指碎累之煎熬可堪七八十老親之落寞居然待盡忽爾更生長樂宫之稱觴華夷同慶丹鳯門之肆􅌌天地皆春大或漏吞丹之魚細亦振坯户之蟄洗之丹筆􅂌以青氊昔漁者争隈巳斷市朝之夢今廪人繼粟遂紓溝壑之憂靖惟平生盡出大造兹蓋伏遇某官手扶社稷心契乾坤卷卷乎緇衣之好賢休休然干旄之樂善謂四海之英雄豪傑悉歸籠絡之中豈一介之皦厲便儇不在涵容之數貸之衆人欲殺之始察之公論旣定之餘欲放一頭趣開三面搢紳相顧而動色簡􅁽大書而有光某敢不仰體包荒退思遷善歩虚聲裏疑從鈞天帝所之游知見香中期報佛地位人之德銘藏亡斁栞染奚殫平齋文集卷第二十五
