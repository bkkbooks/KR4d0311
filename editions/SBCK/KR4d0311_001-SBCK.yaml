body:
  text: 古賦大冶賦余宦遊東楚宻次冶臺職冷官閑有聞見悉篹于䇿垂去廼輯而賦之其詞曰堪輿奠位峙嶽融瀆合地四與天九乾爲金而兊屬發㤗媪之珍閟轉靈脩之妙軸而築冶鳬􅙫叚桃攻之有六出智創物重在泉幣燧昊俶興黄虞踵繼姒乙鼔于莊歴濟陽九之厄歳􅁎姜均于九府定帛刀之殊制侈卯金之七福筦鹽鐵於大農榆莢之與赤側獨五銖之適中冝乎䜟白水而謡黄牛兆御天之六龍晉陽崛起齊秦賜爐含三體之邈籀印􅀄生之望舒雖㑹昌因州以辨名不易開元之舊模彼其輕之則爲荇葉耒子鵝眼綖環風飄水浮重之則比輪兩柱大布大泉直百當千逞私智以膠擾夫豈足以操大利之權哉顥蒼監德眞人起􅃰聚五星摩兩日嘘風雲旋斗極夷崑崙蕩溟渤湖湘收波劒閣失險而王師飛渡於采石攬六朝之王氣混江南之版籍冶有永平仍鎮楚澤列聖重規同文一􅁤穹符象瑜絫鴹疊媺卝人申其厲禁九牧脩其貢篚於是監有永豐永通阜財阜民熈寧廣寧神泉寶泉豐國豐逺冨民惠民昈分錯跱不可殫論時則提封之廣東枕蟠木南控丹穴西瞰大􅀩北薄祝栗地産物冝旅充庭實而萬寶畢萃莫東南之與匹蓋其鍾温厚之仁氣應絜齊之分域斗牛􅀍飾以晶光江漢灌輸其靈液淮海荆衡之壤厥貢三品㑹稽具區之畛其利金錫漢鐵官長丞五十有一而專其官以主丹陽之銅唐諸道置爐九十有九而重其使以緫江淮之鐵皆所以斡山海天地之藏充少府水衡之積者也矧火德之王離薫恊氣之嘉生銅犇牛而流魄銀走鹿而儲精釥鋈鈏錯丹汞之入非一端之可名漕軺兼統肇於興國都提命官昉於咸平合江淮荆浙閩廣而建一臺則景祐之憲度東治於饒西治於䖍則元豐之章程戾淳熈之綜核始復囊括於永平矣黄旗紫蓋天運有屬醴泉噐車地靈自鬻冶場之盛名在斡官者紛紛其可覆鈆山􅄥山石堰岑水昭寶冨寶寶成寶瑞􅀟瑞嘉瑞大挺大濟永興新興興國興利大冨廣冨通利通濟監務坑井殆幾萬計有嗇而豐有興而廢舉斯以旃特其凢例然或鐵山之孕銅或銅坑之懷金或叄銀而偕發或且浸而且淋腸蠡羊僅之言利莫能研幾而極深但見汰金有洲淘金有崗瑞金有監通金有􅂣曵寶氣而貫虹蜺溢乎麟趾􅒁蹏之祥豐城之黄璨焉瑳瑳秋菊染霜寒英欲墮落亭之紫爛焉􅌔􅌔春蒲闖水茸芽尚短樂安精鏐胎瑞坑谷濬埼磧以採摭畫墠沙而披漉大如落萁之豆小如脫粃之粟輕如麩之去麧細如塵之生􅎘澄之汰之倐胂蒲掬渠陽澤銑毓竒溪洞尋苗罽汋之邃破的䃪壁之壅焮以火則流脂鐵籠之烈淬以水則舂糜鈆杵之重吉挺旅陳符采飛動鑄神鼎而制嘉量是爲萬丗不窮之用以至銀城有􅂣銀斜有坑銀玉有塢銀嶂有山寶積張萬竇之空洞天壽􅀝一柱之㠝岏立巖墻而弗顧􅁣徇利而忘安豅路深入閣道横躡篝燈避風而上照梁杠挿水而下壓戽枵深穽之腹炮泐駢石之脅捷跳蛙其不繫磔蒼髯而可鑷碓山藉礦而殷雷淘池攪粘而飛霎流景倒爐星星曄曄燒窖熟盫爐裂鈆駞沸􅁅窠發氣􅀄走於煙雲花徐翻於霜雪它山莫優朱提則劣于以供王府匪頒之用于以􅀘冶臺貸本之闕是二品則然矣請復究銅之爲􅀃劉濞萃逋逃之藪擅採山之冨而呉之産豐於豫章卓氏争王者之利錮齊人之業而蜀之産阜於臨卭歐子破赤堇之山涸􅀂耶之溪而越之産不止於鏌鎁干將錢幣或造於楚晉冶鑄多出於齊梁伏羲以來銅山四百六十有七今之大要不過厥色之有三其爲黄銅也坑有殊名山多衆樸蜿蟺扶輿鬰積磅礴嶻岑巆崴嵬嶢崅璘彬䦨斑黋漾璀錯脉見函路灼牛飲盤天井落礦紋異采乍純遽駁燻苗殊性欲斷還絡烏膠綴金星爍蔌花淡丹砂渥䑕結聚團雞燋散泊餈餌膏油英潤濯濯宿炎煬而脆解紛􅙑劂而巧斵批亢轟博浪之椎䧟堅洞混沌之鑿巖雲欲起而復墜石火不吹而自躍磅磅馳霆剥剥灑雹丘示掩耳而疾遯木客捧心而竦愕膽寒野伏之夔罔魂禠泥蟠之龍蠖繚乎脩隧􅉳乎幽壑潜㕎旁呀隂􅑆斜郤共工觸不周而地維斷神禹闢伊闕而龍門拓驪山百仞之下穿昆明萬夫之偕作曽未嫓其功用之博也逮其籠簣齊畚臿具專諸虎攫孟賁豕􅀒徙堆阜於平陸矗岑樓於爐歩熺炭周繞薧薪環附􅀂望而燎若城而炬始束緼於畢方旋皷鞴於熛怒鞭火牛而突走􅀐燭龍而騰鶩戰列缺霹􅆮於焱庉舞屏翳豐隆於煙霧陽烏奪耀熒惑遜度石迸髓汋流乳江鏁融臍膏注銗再錬而麤者消鈲復烹而精者聚排燒而汕溜傾吹拂而飜窠露利固孔殷力亦良苦唯彼泉井淘沙可鑄其浸銅也鈆山興利首鳩僝功推而放諸象皆取􅀩辨以易牙之口膽隨味而不同青澁苦以居上黄醓而次中鑒以离婁之目泛浮漚而異容赤間白以爲貴紫奪朱而弗庸陂沼旣瀦溝遂斯決瀺灂澒溶汨滵潎冽銅雀臺之簷霤萬瓦建瓴而淙淙龍骨渠之水道千澮分畦而潏潏量深淺以施槽隨踈宻而制閘陸續吞吐蟬聮貫列乃破不轑之釡乃碎不湘之錡如鱗斯布如翼斯起漱之瓏瓏濺之齒齒沉涵極表裏以俱暢蒸釀窮日夜而不止元冥効其巧譎陽侯獻其恠詭變蝕爲沬轉澁爲􅔱或浹下簟自凝珠蕊且濯且漸盡化乃已投之爐錘遂成粹美其淋銅也經始岑水以逮永興地氣所育它可􅀋稱土抱膽而潜發屋索綯而亟乗剖曼衍攻崚嶒浮埴去堅壤呈得雞子之肧黄知土銗之所凝輦運塞於介蹊㷈積髙於脩楹日愈乆而滋力礬旣生而細碖是設抄盆筠絡以􅍥是築甓槽竹龍以釃散鈱葉而中鋪沃銗液而下漬勇抱甕以潺湲馴飜瓢而滂濞分釅淡於淄澠别清濁於涇渭其滲㵼之聲則糟丘壓酒於歩兵之厨其轉引之勢則渴烏傳漏於挈壷之氏左挹右注循環不竭晝湛夕漑薫染翕欱幻成寒煖燥濕不移之體疑刀圭之􅀧鐵􅀂乃卝課登綱程促鐵往銅來􅃬至鈆續川浮舳艫之衘尾陸走車擔之繦屬出嶺嶠下荆蜀絶彭蠡洞庭而星馳泝重淮大江而電逐四趍圜府如輻有轂殷轔軒礚崱屴􅃨陸頓之連城貯之列屋黒雲隤山而亂委熊豹谽谺而起伏蓋不待銷飛㢘鉟瞿曇而鍾官之用足於是鑄錢使攷其㑹辨銅令第其品丁夫竭作匠師讙奮煤突整㓗炭户充牣鼓兩儀之籥而大播役六丁之工而迭運祝融作女媧進一煽濤生海門之微波再煽日吐扶桑之疊暈三煽烘朝霞而爛照四煽洶屯雷而欲震張格澤之輝􅆋迸􅍴搶之芒潤夸父即之汗翻漿而暍河伯望之瞳眩花而瞬澄澈不殽通明無燼黒濁之氣竭而黄氣次黄白之氣竭而青氣應液爰㵼於兠杓匣遂明於模印之落落貫之磷磷磋之以風車之輣軋轆之以水輪之砰隱繒網㳙拭蠱覈摩揗肉好周郭堅澤精緊文勁銀鈎色瑩玉填旣刮垢以磨光始結緍而就凖盡東門之漚麻不足以爲其貫引百吏告功三官動色乃督餫艘乃輸王國版曹稽其贏虚之數起部程其精觕之績謹内府之登儲衍外帑之樁積天子守之以恭儉􅃁宰理之以均節與五銖開元而並行異黄榜紫標之私殖金工鑠之則有禁蠻舶洩之則有辟冝京師貫朽而莫校天下藏鏹而山則也其或用取鹿皮制參飛錢通物之變扶時之偏亦本於輕重之相濟子母之相權至論殖財莫如擇使有管仲則藏冨於國得劉晏則錢流於地言未畢客有在旁啞然而􅀏曰子來自畨知泉則詳坎蛙難語乎海水醯雞未窺乎天光獨不聞負扆南面運坱北之鈞而皷四方者乎盪八卦範九章颺關睢播我將融庶品於道德之槖歛衆寶於俊乂之􅂣磨而不磷者布在臺省動之斯和者坐諸廟堂旋乾轉坤闔隂闢陽陶唐冶虞規周矩商禮樂凝俗易窳而良仁義鑄人革否而臧㤗階以平天歩以康前星爛乎重暉旄頭澹其不芒南風薰而民財阜膏雨時而年榖昌于以植帝王太平之業詎止圗霸功之冨強余乃豁然悟蹶然起拜手而系之曰天不愛道聖賢興􅀆地不愛寶稼穡登􅀆人不愛情冨壽且安􅀆化工之巧莫窮其端􅀆老圃賦嗟余生之刺乖甘偭宻而即䟽痡虺隤其勌游臝盤薄乎閑居老旣怯於山橋窮莫備乎澤車坐玩相牛之經間抄種樹之書五十弓􅀆野園數百武乎破廬一秃翁以自業羣癡兒而共鉏冰解寒祛霏開日舒濯濯我畦瀏瀏我渠穉甲怒長鮮英蔚扶渉熟成趣驩然忘劬翁放鉏顧兒而言曰汝亦知夫丗有遇不遇之􅂼乎鴽釀施蓼蠯醢侑􅉁蔌之冨強余乃豁然悟蹶然起拜手而系之曰天不愛道聖賢興􅀆地不愛寶稼穡登􅀆人不愛情冨壽且安􅀆化工之巧莫窮其端􅀆老圃賦嗟余生之刺乖甘偭宻而即䟽痡虺隤其勌游臝盤薄乎閑居老旣怯於山橋窮莫備乎澤車坐玩相牛之經間抄種樹之書五十弓􅀆野園數百武乎破廬一秃翁以自業羣癡兒而共鉏冰解寒祛霏開日舒濯濯我畦瀏瀏我渠穉甲怒長鮮英蔚扶渉熟成趣驩然忘劬翁放鉏顧兒而言曰汝亦知夫丗有遇不遇之􅂼乎鴽釀施蓼蠯醢侑􅉁蔌蒲羞鱉食􅋎薦魚芥醬且胾葱渫且朐烈有桂椒滑有堇榆已多乎燧人庖犧氏之􅀄而况織翠㢝殷紅氍毹沐漓觴斚轟豗鍾竽猩唇豹胎之鼎素黿紫駞之厨始饞涎其趨新中便腹而厭餘於是葷臊望風而引郤芳辛􅀱色而應湏擷翠苕於崑丘掇瑶頴乎方壷蔗漿盛夏而凍合萍虀祁寒而煖敷行以白玉奉之緑珠五侯鯖􅀆遜美天酥陀􅀆失􅃾此其遇合不翅􅀄識之機雲晚見之嚴徐也若乃巖壑棲遲竹屋槿籬蓴擅場於秋風空結鱸魚之思韭争長於春雨未辦黄􅆝之炊荻生而河魨上橙熟而蟹螯肥指雖動而莫酬腹不􅀒其幾希巳而凌寒采薇迎陽刈葵祮萱堂背䄡芹澗湄鑱黄獨之雪苗筐白薤之露蕤茗蘼蕪以滌煩醪枸􅂎而􅀘羸冷淘煮􅀆槐茁餫飩斫􅀆薺滋泫膏鉶􅀆雹突飫糞火􅀆蹲鴟酣糟紫薑之掌沐醯青蔯之􅁝雲蒸罌粟之乳濤洶胡麻之糜輪囷鵝鴨之瓠鬰屈龍蛇之芝婆娑熊蹯之菘䰐鬖虬髯之菭鱭孕子􅀆㯶魚鱉解裙􅀆樹雞竹競綳􅀆稚子蕨􅀄拳􅀆小兒以至太華之藕黄河之菇婆羅之波稜大宛之苜蓿南越之鹿角江東之耑蹄與夫蜀之雞蘇龍鶴栮脯加皮名品紛綸色光陸離性異温凉氣分王衰芼擇加精調胹得冝香聞爽心味適解眉有舉桉之接敬無轑釡之見欺芬芬苾苾􅄂陳更進可以甦文園之渴療首陽之飢彼其石芥老而逾勁苦筍少而巳竒蔊有拂士之風菊抱幽人之姿囬睨蔓菁隨地而易質薯蕷視人而變形曽不蒲乎一嗤矧肯數乎惡苣邪蒿臭蒜而穢荽然是􅂼也進不榮於珥貂鳴玉之齒退不豪乎洒削胃脯之頥煙雲歕薄乎夜讀之吻風露簸蕩乎朝吟之脾與齋鉢其争道食方丈乎何期其不遇可知已兒拱而前其然豈然諸􅁑以姓行元脩以字傳玉糝得坡老而重銀茄爲涪翁而妍與其見賞於肉食之鄙孰若託名於捽茹之賢蓋窮患姱名之不立而不患併日之食粥逹患宿學之不能行而不患一筯之萬錢茍道義之信飽飯􅂼食而樂焉翁捧腹一􅀏長歌振林皎白駒􅀆束芻母金玉􅀆爾音閔氓賦嗟􅃖􅃖􅀆皇之氓惟皇引逸􅀆氓不自逸厥生考室于山􅀆山嘯而瀑其降丘宅土􅀆土又墊而谷中田爲廬謂可髙枕無虞􅀆劃吞齧爲川渠􅀝岸環竹以奠厥居􅀆岸且善隤不可以乆諸死殮無衾􅀆生煬無竈哭不成聲􅀆仰天以􅑧天蕩蕩􅀆何尤陽侯不仁􅀆挾天虐氓而横流卑畦席卷􅀆望已絶瀦澮坼􅀆髙疇隨裂今夕之憂􅀆無以爲歸明發之憂􅀆何以禦飢嗚呼􅃖􅃖之氓􅀆惟皇之依烘蚤賦麥送爽寒梅迎溽隂羸肌老幹敗絮故衾睡蛇甫蟠跳蟲倐臨無蜂蠆材有豺虎心孕藁之隩宅笫之岑質􅆌乎粟觜餓也鐔其來施施其進駸駸假託茵慿陵躐祍􅁭躁躍如舞潜行似瘖左發右應前郤後侵螫其股錐􅅥其氊針據蒺刺刺􅀒芒森森􅀛息正清撓不可禁蝶夢方栩攪不可任􅐡搔空疲摸索曷尋撫床以興子規夜吟赤脚張燈蒼頭熾煁絮衾壓篝烈於釡􅑄􅀄而蠕動如商望參少焉紛綸如髪聚簮或壯或穉或纁或黔或尾而丁或腹而壬龍跳虎擲疑聞嗚喑星流電激驚逃沸潯力窮勢屈駢搏旅擒祈父爪牙凱平緑林蠢爾蕞末虱爲賞音虱養大體尚知酌斟爾繁有徒喋血􅉃深予其火攻難腥斧碪老妻在旁一􅀏振衿謂彼族赤可爲丗箴逢笋氣張見􅀲影沉王極必衰理無古今俗諺謂蚤笋籜來􅀲皮去平齋文集卷第一
