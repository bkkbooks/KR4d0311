body:
  text: 外制一國子司業張虙除􅀕酒仍兼侍講制勑具官某賢必希乎聖士必希乎賢朕欲新美天下之士親擇老成有賢望者爲國子師士非幸歟爾淵乎海濵之老也見幾而蚤遯覽德而肯來俾参師氏詔媺于虎門望其容則易直子諒之心生聽其辭則淵泉溥博之義見而况摳衣問業於函丈之間者兹用進之大司成以專六德之教師道立而善人多豐􅉮所以爲數丗之仁朕其庶幾乎可樞宻檢詳􅀽肅除右司郎中兼權樞宻副都承􅈲制勑具官某朕更張萬化首命一相筦文武之柄宰􅁺以賛政理樞􅁺以参訏謨非深識厲精求治之意不在此選爾學得其傳而邃於知氣集以義而勇於行端笏立朝論議閎偉朕知其可大受也挈宏綱於省闥導宻􅈲於殿陛肆兼命爾維時股肱大臣内欲爲朕修天保以上之治爾彌縫之外欲爲朕舉采薇以下之治爾佐佑之往欽哉可右司郎中􅀽肅除太府少卿兼知臨安府制勑具官某維前寧人得名法從濬正大之源以養君德折姦邪之氣以興人心學無不該用有未盡求諸一庭詩禮之彦爲我四方岳牧之師爾講貫有源業履甚度盤根利噐奏民庸而獨髙熟路輕車聳朝望以更偉肆簡都曹之最進参列寺之華典吾神臯資乃儒術俗乆壤而周南之化未浹政積弛而商邑之治未張澄精神於百爲妙機括於一轉迪􅀂考詩書之訓宣朕躬道德之行民情咸熈國􅀔自重此非趙張三王所能知也往逺乃猷用對予渥可大理少卿李鳴復除大理卿制勑具官某朕近觀勑令所編􅀋舊典我孝祖宸筆逐事􅀧勘増修刪改曲當情法於恤刑之條尤加詳焉企慕不已因親扎以示輕用徒刑之戒廷尉天下平可不遴擇爾表于西州儀于王朝心夷氣龢藹然君子長者之風廼者俘纍之獄咨爾聽之簡稽得情弊成以宥而朕好生之德􅀍于貉􅀠逹于窮髮之北良用嘉歎晉躋九列帥屬􅁄廷使四方司政典獄咸知朕欽恤之意念之哉刑期無刑以長我王國可吏部郎中趙彦悈除大理少卿制􅃙具官某朕近觀勑令所編􅀋舊典我孝祖宸筆逐事􅀧勘増修刪改曲當情法於恤刑之條尤加詳焉孰復企慕因親扎以示輕用徒刑之戒廷尉天下平可不遴擇爾講學之粹操履之茂摽的于公族而吏治更髙司臬江左讞奏平允一道無􅁈民入爲望郎進參列􅁄四方司政典獄於爾乎則焉欽哉刑期無刑以長我王國可國子博士李大同除祕書丞仍兼崇政殿􅀃書制勑具官某斯文在天地間前乎管百丗之旣往後乎鑰百丗之方來非諸儒誰屬爾以經明行修都倫魁之望詩所謂如金如􅃬如圭如璧者也列在書帷据經訂古以沃朕心具有師法朕甚嘉之繇博士進丞中祕仍懋金華之業蓋將閎其中而肆其外用昌斯文豈特以鎮吾群玉之府可著作佐郎蔣重珍除著作郎仍兼崇政殿􅀃書制朕甚嘉之繇佐譔進領著廷餘同前校書郎黄朴除著作佐郎仍兼崇政殿􅀃書制朕甚嘉之進繇典校佐譔祕廷餘同前太常博士徐清叟太學博士葉味道並除祕書郎仍兼崇政殿􅀃書制爾以經明行修茂名家之傳徐爾以經明行修都儒林之望葉朕甚嘉之繇博士進典中祕餘並同前祕書丞彭方除著作佐郎兼權侍左郎官制勑具官某斯文在天地間前乎管百丗之旣往後乎鑰百丗之方來非諸儒誰屬爾以經明行修都儒林之望詩所謂如金如􅃬如圭如璧者也丞于祕丘攝組畫省銓綜餘隟盡讀禾見之書韜涵日冨進之佐著蓋將閎其中而肆其外用昌斯文豈特爲時佳吏部哉可祕書郎張洽除著作佐郎制入典中祕盡讀未見之書餘同彭方制敷文閣學士通奉大夫程珌該慶典轉正議大夫制勑奉壽巵於長樂方深追慕之悲通禁籍於甘泉尚共榮懷之慶有嘉宿德何愛崇階具官某學邃而識融履純而飬厚濟時谹議五英六莖之龢華國髙文四璉八簋之古自玉堂之引去毎宣室之興思胡扼虎􅀜尚閑駒谷復非遽復已萌於碩果之餘睽不終睽必合於遇􅀨之後首進班於穹閣仍賦廪於珍臺在爾初無慕爵之心惟朕蓋有懋官之典肆加蕃􅃬庸侈殊私施㦸方新寧鬰起家之望佩囊惟舊毋忘存闕之忠可著作郎權司封郎官呉泳除軍噐少監兼直舎人院制勑具官某朕親攬萬機緫飭百度與士大夫洒濯激昻以追元祐思得軾轍掌我書命興起人心於播告之下爾操行純茂文思汗瀾本之詩書暢之莊騷太史體冝演誥朕有戎監職優務省往服少事雍容討論推厲精更始之意著之訓辭渾厚森嚴與越􅁄大弓同其古斯無媿江漢之靈矣論駮以扶國是朕又於此觀爾之風力可禮部郎官兼學士院權直趙汝談除祕書少監兼權直學士院制勑具官某中興百餘年公族之直禁林惟淳熈間彦中一人爾識度純明風槩凝逺杜門著書尚友千古皎皎白駒之在空谷也㤗道宏開勉爲朕起南宫北扉文簡而有法進參木天之峻仍直丹地之嚴選妙擢殊前後間見爾其推朕厲精更始之意著之訓辭使四方萬里咸曰大哉王言一哉王心是爲稱職可太府少卿何炳除司農卿制勑具官某文帝一形錢榖岀入之問貫朽粟腐其効立見朕於國計登耗念之孰矣而大農經費常患於不澹何耶爾性行純固材諝通明蚤游刃而有餘晚韜光而更宻入參治藏之府曽幾何日能聲著聞進長九扈將以􅁉吾國也孰漏當窒孰蠧當除孰冗當節公爾忘私毋憚叢劇庸稱予厲精政事之意可金淵李榘並除太學博士制勑具官某等科舉之學非所以淑士心也必義理性命之學明則多善士化更而新師選可不重乎爾抱􅀒閎講貫熟製錦劇邑弦歌藹聞可以爲成均師矣敷暢奥義薫陶善性使諸生人人有舞雩詠歸之樂則吾與􅀧可太學博士葉應輔除國子博士仍兼景獻太子府教授制勑具官某科舉之學非所以淑士心也必義理性命之學明則多善士化更而新師選可不重乎爾抱􅀒閎講貫熟模範賢􅀜惠訓宗邸能茂明所學可以爲胄子師矣敷暢奥義薫陶善性使人人有舞雩詠歸之樂則吾與􅀧可奉議郎􅀽立儒餫賞轉一官制勑具官某間者均光襄房之役靡勞不酬爾材良氣雋優於邊畫督餫以濟軍事不憚鞅掌禦侮制勝與有勞焉朕方信賞以勸事功進官一列其懋承之保障最聞嗣有褒擢可全子材除淮西安撫副使兼知廬州兼計度轉運副使制勑具官某朕夢想東都廼睠西顧􅀂昔濡頃之築芍陂之屯郾城之士飽馬騰淝水之風聲鶴唳欲追往躅宅牧良難爾彊乂而忠果逹且武荆襄淮海備著賢勞入搴朝列之華岀鎮邊維之重四履綏静三軍激昻令行陳潁之間氣薄潼藍之表朕嘉爾勇於徇國就􅂌帥旄仍揔飛輓用究多多益辦之韞惟和戰之議論不齊守禦之規模一定必量敵而進慮勝而㑹必臨事而懼好謀而成能圗萬全何往不濟爾尚勉之哉可贈寶文閣直學士楊邁特贈龍圗閣學士制勑朕􅁣念漢宣入承天統博陽侯之定䇿方共致於中興澓中翁之受詩胡獨成於長往宻勿麟儀之舊淒凉馬鬛之新睠懷􅀂存襃贈冝厚具官某抱古粹學事予􅀄潜反覆發明盡詩書禮樂之奥從容規切必仁義道德之言毎尊所聞務藏諸用旣授五龍而夾日忽比列星而􅀐箕􅄂佩贈之莫䆒仔肩之益一鑑亡矣可勝殄瘁之悲雖䘏典之有加尚徽章之未稱峻陟淵圗之序丕増泉壤之光易文子之名死冝不朽録叔敖之後生與俱榮尚其營魂服我休寵可黄壯猷何處信課最各轉一官制勑具官某緫核名實而信必其賞罰親政之急務也爾守何處信貳輔藩有美政且能濬導利源坏窒蠧穴版部課賦入以最聞増秩賞能庸示予信其益厲精白以承可右正言王遂除殿中侍御史制勑具官某朕始親萬幾首得一士置在明目張膽之地蔚有正色敢言之風神鼎鑄而魑魅莫逢干將淬而犀兕亦斷善􅀋吐氣貪夫革心察之旣稔所安用之不厭其速甫躋諌列亟副臺端純仁之内岀姓名蓋非輕授趙抃之不避權倖抑所優爲朕方虚已以受人爾亦得時而行道難逢者風雲之胥㑹易失者日月之如流萬古在前億丗在後母替精白承休之節用爲汗青傳逺之圗可吏部郎中兼右司李宗勉除監察御史制勑具官某蓋聞淫朋去然後可以榖正人側媚屏然後可以用吉士天運之往來消長此其機歟爾和而趨於中大而進於正日用力於明善之學如恐不及洊奉郡最入儀郎省素􅁝一節未嘗以爵禄入於心諸大夫國人皆信其爲賢也朕方謹憸人充耳目之戒儀圗可御史者莫如汝冝在易一隂不能勝五陽則决之於夬五陽不可忽一隂則柅之於遇潜觀機括而制其微天下可常㤗也爾亦有辭于永丗可大理卿李鳴復除侍御史制勑具官某朕稽家法之相傳睠臺綱之特重仁廟思得忠厚淳直之士􅁉陵務革澆浮薄惡之風蓋心術正則無詭隨議論平則不沽激欲維吾國冝表􅀂人爾秉心澹夷藴識精粹良吏之譽溢於外服吉士之稱著於中朝甫陞卿月之華趣應法星之􅁚維昔田􅃬曁于何郯莫非西土之英列在南床之選幾年無此一旦得之春秋之盡而不汙大􅀜榮辱洪範之㑹其有極一洗黨偏百辟咸慕乎君子之中四方聳聞乎仁者之勇繄予所屬惟爾其承可祕書丞兼崇政殿􅀃書李大同除右正言兼侍講制勑具官某師氏詔媺保氏諌惡皆有道之士爲之朕厲精求治之􅀄増置經筵官相與講明五三六經之道以養其源諸儒序進䄡如翼如爾於其間湏眉皓白氣肅而辭莊淵乎其似道也朕退而自喜曰得一佳諌官矣擢寘􅀐省仍侍氊厦逆耳沃心朕於爾乎嘉頼官守一時之臧否言責萬丗之榮辱毋憚嬰鱗有懷不盡然軔輪折檻特救過於巳著望儀刑而意消不聞亦式不諌亦入庶其置朕於無過之地乎可吕殊除太學録制勑具官某科舉之學非所以淑士心也必義理性命之學明則多善士化更而新師選可不重乎爾抱􅀒閎講貫熟金玉其度而不茍售可以爲成均師矣規矩脩明之餘敷暢奥􅈲薫陶善性使人人有舞雩詠歸之樂則吾與􅀧可大宗正丞蔡範除戸部郎中淮西緫領制勑具官某三表五餌不如晁錯實塞之䇿破羗強弩不如充國留田之奏綏御皆不可廢夫守也爾名儒之胄良吏之表廉静有立不爲茍同冝岀入省闥以緝庶務中原事機方集必事力之􅁉乃克濟庸輟爾以尚書郎給餉道往哉守淮所以蔽江而控河士飽而歌馬騰于槽淮西之成雋功以此出納有經而無壅利取予有權而無近名足食足兵爾蓋優爲之寓攻於守而不株其守盍以方略上可歸順人李義承節郎張瑀李德魏珏保義郎制勑具官某討叛以􅁩懷服以仁殱渠貸脅歸斯受之爾能革心奚愛勇爵祗戴寛恩勉圗報効可歸順人同鼎武翼郎王聞顯武翼大夫呼延實來伯友修武郎制勑具官某國家推天覆之仁舎逆取順豈以南北爲間爾等執羈絏以從亡虜途窮力屈束身歸命朕不汝棄也昜􅂌武級之勞毋忘忠力之報可廣州觀察推官魏國梁殁于王事贈通直郎制勑具官某嶺甿不靖爾挺身往諭恩信亦旣勤止得疾于行齎志以没録勞進秩尚慰九泉可淮西路鈐范用吉授髙州刺史節制京西比路軍馬制勑具官某殘虜就燼中原爲墟􅀜河方徯於來蘇陳潁首歸於疆理上功莫府謂爾有勞亟陞遥刺之華仍揔進屯之重祗承休渥益勵忠勤可江陵府副都統孟珙特轉武經郎制勑具官某方城爲城漢水爲池天險也制閫設險加嚴峙芻榦具畚臿濬深培髙屹然金湯之固第勞來上爾實程督進秩二等用勸事功可西和州守陳寅妻安人杜氏男基墍墾死節贈官制勑具官某妻某氏男某人等西和嬰􅀌城抗賊力窮援絶臣爲國死忠子爲父死孝妻爲夫死義三綱立焉􅂢身犯難人所甚難闔門徇節古亦罕見朕悲歎不忘優贈以賁營魂往從爾夫于廟食可三子改夫爲父西和州守陳寅族人立照璽館客李良臣死節贈官制勑具官某族人某人等館客某人西和嬰􅀌城抗賊力窮援絶臣爲國死忠子爲父死孝妻爲夫死義三綱立焉爾以族黨良臣爾館于守義不茍免亦相從于死良用嘉歎贈秩以賁營魂往從寅于廟食可權兵部侍郎陳公益磨勘轉中大夫制勑朕一日萬幾厲精方切三歳群吏考績尤嚴肆疇法從之勞庸渙明緍之寵具官某操修無玷問學有源簮筆雍容毎罄論思之益敷經宻勿屢殫啓沃之忠繇積日以效功爰歴年而㑹課睠賢雖舊詔爵惟新漢中大夫之貟寖髙秩序周小司馬之職勿替謀猷可祕書少監徐僑除太常少卿制勑具官某禮者天地之序樂者天地之和夷䕫不兼命也而簞瓢陋巷之士夫子遽以四代禮樂付之何哉爾好古學行古道瞻彼淇奥其容比於禮考槃在澗其節比於樂朕方網羅衆俊聚之本朝老成典刑思見如渇擢貳蓬省翔而未集又舉奉常亞卿以進之時行則行幡然一來講明王道於玉帛鍾皷之外以善人心視獨善有間矣毋使朕有齊魯二生之歎可楊一䕫父秉遷明堂恩封承務郎制勑具官某父某人宗祀慶成均福寰宇髙年尤吾所尊禮爾禀厚養深年過九袠有子登名于奉常義方立矣􅃬慶増封用勸好德可韓昱特轉武功郎制勑具官某廼者􅇯渠就殱于􅀭逆儔猶􅀒固于楚元戎進討諸將争􅁬薄城一鼓而空之東垂以寧第多來上爾戰尤力用命必賞朕不食言進秩四等緫徒􅀐以護周廬勸功之典渥矣益懋衛上之忠増壯居重之􅀔可門下省檢正諸房公事辛克承除太府卿制勑具官某朕閱班簿輙興才難之嘆得非比年以來抱有用之才而鬰於頓挫老於閑退者多乎爾純實無華廉靖不競越在外服治譽夙著顧善刀而藏之􅀂將終身焉朕方収召四方俊乂以重周行起爾宰士又進爾治藏之長豈以貨賄出納爲足以煩吾老成哉百辟卿士媚于天子不解于位民之攸墍尚求無媿於古可資政殿大學士曽從龍明堂加恩制勑朕紹祖宗之休􅀩天地之况十年飬晦垂衣裳於巖廊三歳蕆祠奉珪幣於重屋肹蠁髙靈之墮嘉虞熈事之成廼睠時髦嘗参政枋有赫慶條之布於昭命綍之敷具官某肅括而端方沉深而凝重涵今茹古學術兩都之宗尊主庛民噐業三代之佐孰復於安危之勢雍容乎進退之機始終幾年夷險一節東山之卧安石常存憂丗之心江左之見夷吾盍究濟時之略登崇有侍注想惟深頃展采於合宫躬受􅁵於宣室肆朌􅀕澤増􅃬圭畬以昭體貌之隆以侈榮懷之盛噫靖四方於我將之頌朕正切於儀刑􅁲萬夀於天保之詩爾毋忘於歸美趣承丕渥入告嘉謀可資政殿學士􅁑洪明堂加恩制勑朕稽周典九筵之規酌羲經二簋之義禮從簡約誠罄精純王瓉黄流裒時之對泰元神筴何天之休屬祲容之熈成冝惠術之具舉疇咨舊德誕播顯綸具官某簡栗而廉剛大以直博學明辨非一日用力於仁特立獨行雖三公不易其介甫罄弼諧之益遽興恬養之思心廣而體自胖年髙而德彌邵方詳延於俊乂毎渴想於老成翊翊而神嘉虞雖阻受􅁵之問皇皇而帝宴饗盍均賜胙之恩申衍租畬光昭簡注噫列文辟公之􅃬祉福聿圗繼序之功黄耉台背之介壽祺尚篤乞言之意體予寅畏告爾辰猶可左諌議大夫鄭性之明堂加恩制勑朕蒐儀先甲展采上辛賦思齊之詩制雖嚴於孝慕稽我將之頌禮不廢於宗祈恍三靈之宴娭遒百禄之來下有嘉首諌冝􅃬閎休具官某抱陸贄之忠勵汲黯之直深見逺識平國論於玉衡忠言嘉謨開君心於金鑑其博大則廊廟之噐其浚明則􅀖家之光啓沃方深郷用良切授䇿而拜泰一莫侍奉髙之祠受􅁵而問􅀑神尚前宣室之席肆増華於􅀐省庸申衍於爰田雖舉􅀖彛實均帝祉春秋承祀欲大祖功宗德之傳夙夜畏威勿替天命人心之戒可吏部尚書崔與之明堂進封南海郡開國公加恩制勑朕蒐儀先甲展采上辛賦思齊之詩制雖嚴於孝慕稽我將之頌禮不廢於宗祈恍三靈之宴娭遒百禄之來下聿懷􅂄俊冝􅃬閎休具官某行峻而約之中氣剛而飬以直風曁髙古秋霜烈日之嚴典刑鎮浮泰山喬嶽之重洊十行之趣召儼三命之滋恭展也逹尊爛然全節延英論事莫遑汗盛夏之衣宣室受􅁵猶思前半夜之席肆肇開於公社仍申衍於爰田繄舉􅀖彛實均帝祉積德而後興禮安得魯生之來爲治不至多言勿替申公之告可敷文閣直學士知潭州余嶸除華文閣學士㳂海制置使知慶元府制勑朕緫治中朝分任外閫或統江淮表裏之勢或當襄蜀風寒之衝廼睠鄞江近扼海道欲壯股肱之郡必求方面之材具官某學明而履方氣充而用博操縱闔闢莫窮應變之長卷舒屈伸不改有常之度擁甘泉之宿望鎮長沙之价藩謂弄兵多岀於無聊而患盗毎生於有欲風采一振號令具孚驩緑林之革心􅄅青草之息警轉聞良偉簡在逾深㓂恂之定頴川乆徇借留之請蕭生之守馮翊更圗詳試之功陟奎閣之穹班緫制垣之重􅀉宏開四履逺控三韓惟威望聳則風颿浪舶之無虞惟恩信著則椎髻卉衣之來慕以至業相安於田里福併及於京師繄我譽髦奚煩多訓可直祕閣新成都府路提刑趙彦覃除都大坑冶制勑具官某國計莫重乎銅楮之相權朕出寶帑之儲歛宿楮而易之物價寖平又必鐘官能振厥職爾天支之秀周行之雋甫起家于蜀部舉圜府之權盡􅂌之進用亟矣唐諸道置爐九十有九在東南爲多地産今猶昔也爾能公以程浮冗明以剔姦蠹敏以幹壅滯少府水衡之積何患不承平􅀂哉可太后山陵復土錢忠表趙􅀂浚轉一官制勑具官某等六騩復土五使置官凢備驅馳悉霑賞賚爾祗吏役例進一階茂對恩榮勉思䇿厲可李安國特轉武節郎制勑具官某比歳蜀閫失馭潰旅迸逸爲民害甚於㓂爾薫染忠義􅁬􅀭驍雄扼險要待其來民恃以無恐果山至今德之増秩旌勞嗣有褒擢可直祕閣知温州游九功除司農少卿制勑具官某良二千石入爲九卿漢法也北海朱邑以治行第一掌周稷之業蓋此其選爾膚敏而静平易而立京蜀荆閩屢更名郡剛不至甈柔不至坯民安其政而有去思可謂良矣朕懲吏道放紛之弊循名責實思用其良不俟東嘉上計以漢法選貳司均夫長於治民者必優於􅁉國信能爲朕養其和節其流而時斟酌焉錢榖之問其紓乎可林禧子封父承務郎制勑具官某父某宗祀慶成均福寰宇髙年尤吾所尊禮爾禀厚養深年過九袠有子登名于奉常義方立矣􅃬慶䟽封用勸好德可林禧子封母孺人制勑具官某母某氏宗祀慶成均福寰宇髙年尤吾所尊禮爾禀厚養深年過九袠有子登名于奉常母訓昭矣􅃬慶䟽封用勸好德可歸順人孫政鮑義邊寶張仲于德楊翼張彪張實髙三受張旺汲漢臣邢海蔡青魏成方元郭通綦仝張時並􅀘承信郎制勑具官某人等討叛以義懷服以仁殱渠貸脅歸斯受之爾能革心奚愛勇爵祗服寛恩勉圗報效可歸順人王元純􅀘迪功郎制勑具某人討叛以義懷服以仁殱渠貸脅歸斯受之爾嘗爲士奚愛文秩祗服異恩勉圗報效可史復祖除刑部郎中制勑具官某朕間者閔雨念中外獄吏奉吾法不䖍逮繫多淹上干和氣亟下宥减之令而􅀨憲部列屬必求知朕意者爾静而不浮謹而不迫明習于律令而不苛累駕緹屏具有善譽輟郡而郎参聽四方之讞奏其選甚髙公則強禦不能欺恕則文致不能入勤則冗釀不能因欽哉監于兹祥刑以逹朕好生之德可軍噐監兼刑部郎官李直柄除大理少卿制勑具官某我坤宗定官制李寺卿一少卿二分左右聽刑獄今圜土空虚治獄雖非宿其業可也四方奏讞萃於斷刑業可不宿乎爾悃愊近厚容氣儼肅習于舜士師周司㓂之典而以惻怚行之五爲理官三爲憲曹其業宿矣爰命爾以亞卿斷天下之刑宥過無大刑故無小能知此意則可以明于刑之中率乂于民棐彛念之哉可權工部尚書㳂江制置副使知黄州兼淮西制置使趙范除兩淮制置大使節制廵邊軍馬兼㳂江制置副使制勑江爲國之門户淮爲國之藩籬門户嚴則謝元無後顧之憂藩籬固則祖逖有前進之勢蓋岀入運掉之如意在表裏撑拓之得冝分外閫以相維緫中權而尤重具官某兼資文武丗篤忠勞賛籌江漢之衝隱􅀂敵國制勝淮海之表賢於長城功雖著而有謙抑之風氣雖銳而有沉深之度知可屬於大事期共成於逺圗殘虜宿讎歘一朝之就燼中原故壤莽萬里之爲墟欲乗車攻復古之機無岀天保治内之略孰強吾意爾壯其猶㧞諸八座之聮付以元戎之􅀉淮東西之星壘盡受􅃌麾江上下之雲屯參聽號令本之老成謹重之識行之平定安集之心以守爲攻以全取勝乃􅀂秦人之鹿掎角相資常山之蛇首尾俱應必能通脉絡於諸道斯可㑹精神於一家迄濟中興用光前烈可趙薿除大理寺丞陶木司農寺丞趙崇嵒太府寺丞姚珤國子監丞賈似道軍噐監丞制勑具官某等漢宣帝厲精求治綜核名實以練群臣黜陟有序衆職修理上下無茍且之意迄濟中興朕甚慕之爾薿丗業之華噐能精敏爾木儒林之望議論堅明爾崇嵒公族之彦材諝通暢爾珤决科之雋講習有源爾似道克家之美趣尚不茍廷尉大農太府有丞胄監戎監亦有丞往爲我分治之丞者承也所以承輔其長使無曠職也政事文學法理之士繼自今咸稱厥職則予以懌可林申除宗正寺簿趙鎬夫司農寺簿趙汝譢太府寺簿余元廙國子監簿制勑具官某等漢宣帝厲精求治綜核名實以練群臣黜陟有序衆職修理上下無苟且之意迄濟中興朕甚慕之爾申茂於踐􅏡聲華甚暢爾鎬夫勇於􅁬厲材術孔優爾汝譢抱􅀒純明志不茍售爾元廙渉歴詳練材不自襮宗正大農太府胄監皆有簿往爲我分治之先簿正􅀕噐聖人猶不敢忽職業之盡也政事文學法理之士繼自今咸稱厥職則予以懌可趙汝􅲳除司農寺丞杜範軍噐監丞李以制大理寺簿章勱將作監簿制勑具官某等漢宣帝厲精求治綜核名實以練群臣黜陟有序衆職修理上下無茍且之意迄濟中興朕甚慕之爾汝􅲳秀于公姓材刃有餘爾範頴于儒紳業履甚度爾以制金玉其質安雅自將爾勱弓冶其傳謹畏自飭大農戎監有丞李寺匠監有簿往爲我分治之丞以承輔其長簿以紏正厥違非特示進擢之榮也政事文學法理之士繼自今咸稱厥職則予以懌可淮西安撫司機冝兼通判廬州劉子澄除軍噐監簿兼淮西安撫司參議官制勑具官某邊閫上介之置非内地比中原事機之集非他時比故擇材尤謹爾氣禀爽邁論議英發與聞經略西事之機籌亦旣熟矣班王朝而長莫府厥任逾重深沉者無躁謀老成者多逺慮爾能賛乃牧圗全而制勝功懋懋賞朕所不吝也可國子監丞張翀除祕書丞制勑具官某寺監皆有丞中祕爲髙天球琬琰之岀元圃楩柟􅂎梓之生鄧林地望殊也爾學殖瓌粹材猷翹拔蔚乎諸儒之頴丞我胄監不撓于法而教令行賢問益昭西崑群玉之府游其間者皆天下選爾往丞之地望稱矣本固則末茂形大則聲宏其益充所飬以待方來之用可太府寺丞尤焴除樞宻院編修官兼權檢詳制勑具官某國朝經武要略一書尊閣於樞庭朕萬幾之暇親御翰墨作經武閣三大字扁之事増重矣職刪潤者冝稱爾涵􅀒噐識之髙講明理義之熟困能不失所亨此致養所以致用也中興保大定功之略咨爾纂修垂則于億丗時政有記㑹計有録併以屬爾而檢詳兼組爾祖淳熈間嘗爲之長慮却頋宻賛幄籌求所以安國家利社稷期無忝家傳之學可太府寺簿劉炳除諸王宫大小學教授制勑具官某行葦忠厚内睦九族朕豈惟睦之必擇師儒以玉其成爾西産之良􅃉於易能發明未畫之藴其師表于磐宗紬繹義理切劘情性使成人有德小子有造則予汝嘉可軍噐監丞謝奕禮除大宗正丞兼權兵部郎官制勑具官某丞郎朕所重非其人不輕􅂌爾韋平之裔有詩禮之傳隂馬之族無冨貴之累可謂雅噐矣丞我大宗攝組郎省豈特用爲爾榮恭儉惟徳恪勤廼事朕將以是觀爾之致逺可賈似道特轉奉議郎制勑具官某朕建后於相家又命妃於法從家而関雎之化行進封有俶推恩惟稱爾襲芳弓冶之傳承暉四星之首擢丞武監進秩二等奕奕光榮矣務學好脩用燕多祉可度支郎中謝采伯除軍噐監制􅃙具官某呉粤之劒取其地良妢胡之笴取其材美朕觀諸此得噐使群工之道爾生相家而無驕氣地之良也挹儒科而有能聲材之美也地良材美繇郎版部長戎監疇不謂冝豈徒以肺附進哉易之除戎詩之備械書之糓胄敿干皆今急務毋視訓工程作爲猥釀而不之屑可魏峻除太社令楊璪除耤田令制勑具官某等社耤置令􅀋以公卿佳子弟處之鸞停鵠峙於梧竹間貴其稱也爾峻貂蟬丗家風度凝粹爾璪筆槖名裔氣禀開敏或司國社或掌帝藉列在容臺培養逺噐其益勵于學以對寵榮可華文閣待制知瀘州魏了翁明堂恩進封蒲江縣開國男加食邑制勑朕蒐儀先甲蕆祀上辛賦思齊之詩慕親方切稽我將之頌饗帝尤嚴恍三靈之宴娭遒百禄之來下有懷時彦冝􅃬神􅁵具官某學貫乎古今氣塞乎穹壤立朝素節挺朝陽之梧桐去國丹心凛歳寒之松栢屬更張之伊始頋趣召之冝先頴川正急於借恂宣室遂遲於見􅁩旣厎于治廼遄其歸維昔宗祈敷時餕惠駿奔百辟曽齊胙之靡遺燕衎一賢胡魯膰之未至冝爵升於榖壁仍户衍於畬圭爾毋謂萬鐘之何加朕方念四簋之不飽亟承顯渥入告嘉猷可平齋文集卷第十七
