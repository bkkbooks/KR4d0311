body:
  text: 詩五秋半聞鶯木葉青黄幾栗留盡情啼破兩山幽怕人冷落生秋思故作春聲爲遣愁夕陽百丈崗頭路滄凉歩夕陽石芒輕放屨草莢緊牽裳深紫猴樝熟踈紅馬蓼荒牧兒良得意吹笛下牛羊讀書蠖室扁爲孜禪作侵㝷二十年屈伸聊復爾俛仰故依然直榻無餘地横䆫不欠天焚香長誦罷風􅀨響山川秋山即事避俗鹿挺走依僧􅀛深藏淡中般􅀂味定後摩尼光壞垣被􅄂卉爛熳野媪裝叢薄鳴幽禽凄抑怨女吭桂謝紅不墜菊繁青巳香瘖蟬怯露葉忙蜂急寒芳魁芋鶩護乳拳栗蝟脫芒菘蒔虀甕緑栗登釀篘黄田父時􅅺飲樵夫間談王意適兩竪屏神王三仇攘龍耶老聃化鳯􅀆接輿狂翠壁千仞表西風吹我裳方氏棣華桂叢亭各一首一忍來百順寸私生萬殊能思根共出自愛鄂相扶夜􅀨平生約春風盡日娯幾家燃豆泣知愧脊令無天上廣寒種人間方寸㘽田三和氣溢竇十慶源開色閱風霜在香包月露來入䆫秋競爽堪覆掌中杯送􅀺德升出守眉州伯登霜隼健毛骨􅁳鴻髙羽翰來遲懷去速退易挽留難文物聲明郡中和孝友官大馮棠䕃在多放一分寛同是郾城客對床如弟兄秋風􅀟􅁂改落日寸心明終古方書在隨時局面更公餘經濟學講貫不嫌精晨起入夜風収􅀨遲明暖釀霜人窮髭易白地瘦葉先黄繡眼語叢竹􅀞眉啼斷崗炊烟猶未動吾亦起歌商敬和老人秋日山行湍險中回棹寛平處整􅆖雲峯環六六禪板占三三地冷梅枝北天空鴈影南真觀觀自性危坐讀書龕和子有􅀨中述懷畏塗險如峽中州蝮蛇倒退猢孫愁熟將義理自陶冩麄衣淡飯過即休邇來陽侯横造業兩涘莫辨馬與牛髙原低隰半爲壑下潦上霧昏人眸西風滯穗可能幾尚作饘粥餘冬謀如麻雨脚未肯斷便有餓死儒冠憂惟窮益堅老益壯更式相好無相猶縱爲溝瘠亦何憾多少華屋皆山丘環堵短􅄄陶靖節􅅃叚下澤馬少游平生耻作稻􅆝計好還渠不桑榆收東家夫子共此約一醉斷送黄花秌㝷梅揺落園林一再霜梅梢葉剰兩三黄蕾紅包褁春猶宻隔壠枇杷得擅香㑹心不是非心佛還疑有漏仙朝聞馳皷起夜候定鍾眠浴少衣偏垢遊多韈易穿祗將母不敬推倒野狐禪清虚堂六言爲浄􅆊僧作石澗寒泉霜曉竹崗霽月凉秋一炷銅爐栢子老禪破衲􅀩頭挽萬登仕種德諌議竇處心承事黄池園花竹老庭户簡編香四丗環疊綵百年酣累觴紫㣲身不到丹墨付諸郎􅀉題眞相寺遥月堂仍簡禮上人四特􅉍盈闕八還齊闇明湏從心觀覔莫認指摽生地僻人聲逺山空夜氣清何時煨芋火相與聽瓶笙烏息隱山堂覔詩未出爲逺志出則爲小草請看􅂄闍窟幾年黄面老米積外科僧照源堂潜山盡頭􅀌峯嶭嵲布寳鬘雲􅀨玉珂雪中有醫禪碧眼電掣人以病求一歳幾闑開方便門出廣諸郎􅀉題眞相寺遥月堂仍簡禮上人四特􅉍盈闕八還齊闇明湏從心觀覔莫認指摽生地僻人聲逺山空夜氣清何時煨芋火相與聽瓶笙烏息隱山堂覔詩未出爲逺志出則爲小草請看􅂄闍窟幾年黄面老米積外科僧照源堂潜山盡頭􅀌峯嶭嵲布寳鬘雲􅀨玉珂雪中有醫禪碧眼電掣人以病求一歳幾闑開方便門出廣長舌病從心起當從心滅方起於心洶洶烈烈不冰而寒不火而熱寒熱交戰内外癥結瘰􅕅疽瘤痀瘻蹩躠湯熨箴砭色察脉切不如治心心和氣恱如凝斯泮如壅斯决勿藥有喜匪渙其血凢濁惡海萬病一轍大摩尼珠一照萬徹是珠在祴無有差別名九轉丹字千金訣爲安心竟寒水秋月維摩無病文殊無􅀃至節前一日遊汪茫田聖主親郊肹蠁通風恬日霽作春容好從輦路聽清蹕却向深山把瘦笻樵子徑隨蘿薜上道人屋借竹茅封一杯旋煮山泉盪浣盡平生磊砢胷至日歡喜口號太平寳慶第三年萬乗􅀄郊大報天恰應漢家辛巳日八觚㤗畤立甘泉青城矗矗紫壇深碧宇無風掛斗參億萬蒼生齊合爪聖明天子得天心獨夜兩䆫明月一庭霜佛屋風鈴語夜長􅀌酌不多人易醒九囬腸付􅂐盤香雪留董景􅀭一色凝雲合大和定知冝瑞不冝多飢餐烏昧丗皆是飽進羊羔人幾何搶地折腰紛岸篠撑天強項獨庭柯留君待放晴光出同歩春風十二􅌪立雪立雪窮蘭􅀂侵寒破驌驦雲迷山糊塗冰壓樹琅璫甕厎茅柴熟爐頭榾柮香樂天隨分足吾欲老田莊髙壷隱挽詩種德黄芽鼎陶心碧玉壷多交天下士幾喚竹間厨秋雨凉催讀春風醉索扶忽成觀化去冷落輞川圗山房藏書萬三千卷子有賦詩用韻門巷蕭然雀可羅藏山萬卷自研磨􅂴㝷玉女登西岳甘伴金僊坐􅀘陀書帶草長塵慮少鉢曇花放道縁多酒肴問字如相過引道松間不用呵又荅景􅀭朝家乆設禮爲羅小􅀉禪䆫共講磨紅錦障泥飛騕􅒁黄金寳校􅅣盤陀冰虀薦飯郷風古雪汁烹茶雅道多領取單傳心法去㑹將佛祖一時呵挽章冠叟卷却青雲靶書來意轉平於斯觀所養知不失其亨梧竹自師友梅礬皆弟兄悲風吹夢逺不朽是郷評再用陀字韻煙霏深處萬山羅閑裏工夫歳月磨上采緯書乾鑿度下搜􅄂志薛延陀手披不厭薫沉水心悟何妨渉貝多􅀂問尊經閣中事南豐作記也湏呵斸􅁑行晨雞未號霜塞塗前村後村遞招呼長鑱短篝采􅁑去冰滿髯􅁂風無􅃭頻年米賤置不問髙藤稠葉青扶踈但聞酒渇欲吞海一片兩片甘於酥山深土厚雨露足造物巧爲凶年儲􅁓錢掛樹跪致祝地媪發閟何其都􅀄疑大澤龍蛇蟄又疑京觀鯨鯢屠防風氏骨碩且大母陀羅臂脩而􅃾赬肩下山日未䀯候門迎路讙要孥松明燃火塼地爐且削且搗投冰壷細如桄榔滑如菰白如人面柔如膚和以粉米隨所湏餅餌其精飯其麄潦田不収野草枯飢虎藉此猶能驅蕨萁札耳皆可糈征自􅁑始功莫逾小兒媚竈愁眉舒大兒捧盎還嗟吁青青之麥何時􅂡長􅁑盡矣吾誰餔嗚呼冨青州黄承事古人有今人無醉摩便腹視餓夫以腹揣腹心安乎卒歳山雲披披日翳翳澗冰􅂨甲風擁篲􅁓䆫透明竹扉閉蒲􅇛坐穩栢烟細於羊去智魚得計優哉游哉聊卒歳疥癢疥癢悲志鬰髮凉􅁣年徂人特自苦耳天竟可恃夫忘憂草良嫵蠲忿花更姝多渠有酒醑寛我無錢沽阿芝亦解事低眉薦呉歈和雪肅容盛氣下璇霄不作投壷玉女嬌坡老堂前微撲面伊川門外驟齊腰得風還解掀天起帶雨􅂊能控地飄無限陳根生意動早看緑長後園焦寳雲庵戒師鍾山好住苦弗住䭾嶺難居眞欲居出地入天湏任我來今去古不􅀜渠萬由旬上起膚寸一刹那間彌太虚識得鬘華雲體叚妙髙髙處坐如如戊子新元老人七十有詩自述敬和松鶴昻昻省見稀獨游汗漫友佺期光風霽日安排好秀水佳山闘飣竒嘉慶圗中身最貴􅂄英㑹上爵猶卑縱心境界天和聚一􅀏花開蝶滿枝用韻荅子有舊雨來人眼厎稀春風獨許共􅁭期斜川追古年年早曲水從今事事竒爛熳和詩齊少長淋漓被酒略崇卑驚回蜀道芳時夢花亞銀􅁫舞竹枝歳事山居歳事似羗村注瓦傾瓷酒半渾微麝和餳溲粔籹芳鳬夾薺斫餫飩阮生朱老情懷宻張丈殷兄􅀏語温簾外東風花信早更煩吹緑􅁂毛根羅察院父瑞桂堂老僊方寸長黄芽百順薫蒸到物華移得廣寒宫裏種開將后土廟中花詩書根蔕聖賢脉忠孝馨香今古牙冨貴儻來餘事耳化工深意屬君家治平寺清音堂普門以眼聽觀音以耳觀謂得觀聽眞竟􅀍耳眼瞞瞎却觀音耳聾却普門眼萬法本來空􅀩頭都不管君不見大藏五千四十八卷第一句如是我聞無着處春行百舌梢頭一半春日長無處着閑心推枰競欲投機早結毦誰知用意深梅子肧胎鹽裏味桐花擺布􅁡邊隂東臯西崦行幾遍軟脚踉蹡索酒斟田家以二月二日晴􅀨占榖價枕上口占􅁑根巳盡麥方青延頸東來米價平怕聽三更三􅀧􅀨要占二月二朝晴敬和老人青梅雪水迎風細作鱗青青又是故園春只知和鼎非凢子豈料升盤有苦人還我核來機轉熟􅀉渠花去意猶新側生厎事揺車頰空作漁陽一􅀧顰社前一日􅀧檢山房用呵字韻不論塌扱與婁羅判却風光屐齒磨老柳強顔翻拓跋新禽滿意奏娑陀山如欲􅀨何妨住僧不能禪亦足多湏信斯文天未䘮龍蛇虎豹厎煩呵同日次韻可庵夢破巫峯十二鬟家山逸駕尚容攀桃花見面東風裏應􅀏陳人老上顔長寧髙守定子見􅀉用韻奉酬呼吸東風養姹嬰翰林非主墨非卿吾身元與三才並此性湏存一􅀧明盤谷釣鮮深復窈羗村傾榼濁還清乆要誰似長寧守尚記慈恩惡姓名陳尉信伯括水傷冒􅀨下朱陀出示兩詩次韻娑竭寳藏移列缺雲氣從平地决爲壑殱人銳於鋒豐年變菜色樂土生愁容湏煩霹􅆮手左耳乖龍陳編貯山房故事追康廬欲共天下士讀盡人間書多君弓刀來發我金璧儲山靈似不分震􅀨翻河魚中春中澣後一日老人挈累下西市寓􅃕越三日某行感而賦詩呈友人二首血氣危頻復頭顱老數竒家如縁角䑕身是脫筒􅀛草樹春離列雲山晚蔽􅃜意行隨所到不必問何之吐氣韶華裏關心曉哢邊鷓鴣天性在杜宇丗情然怒笋和􅅺煮殷花蘸乳煎湏君來共此巳辦杖頭錢族叔疇甫老死於􅂣屋人共惜之其子得瑞梅於園實三而花一花十二瓣碧色其遺文發祥歟老人爲賦詩敬用韻乃翁抱璞售無媒去作修文地下魁換骨法從青子得返魂香自緑隂來詩書根氣春無盡清白源流慶有開十二循環花瓣異信知天理有時囬鍾太君挽詩護額錦裁帕扶腰珠絡衣幾囬呼使進盡日醉言歸徑古梅成䕃堂深桂合圍重來無復拜春色黯斜暉鍾雲叔挽詩秋隼風神聳春雲筆勢竒人情方共屬天理竟難窺哭子零丁母啼耶婭姹兒落花飛絮急行道亦傷悲羅解元震龍母胡氏挽詩三丗不異爨一門皆力書此風今所少他行特其餘藻錡明䟽牖萱􅌪護碧除春光元自在遺夢杳安輿水牡丹都人呼爲􅀟魚花禁中呼爲紫􅂁玉帶花魏紫潜緋眞正紅天公不管老東風紫􅂁玉帶􅀟魚掛猶把䦨􅃢造化功東山塔影相輪髙挿碧霄寒好是如如不動山弄影翻光顛倒轉微權只在􅂩䆫間東西山二首西山許邁無人問只􅀃東山有謝安冨貴光明貧賤晦丗情從古兩般看折屐碁邊情易矯捋􅂡筝畔淚難禁何如拍手招元放玉室金堂深更深敬和老人寓􅃕鄒不辭三徙􅅬何愛一㕓典衣寛酒債乞米續炊烟勝敗供飛雹􅃜成付響泉東山時撰屨花厎弄潺湲午困故人書斷故山離義重惟窮到處隨無米胷中元自杵不􅅙􅁂厎却能􅁝消梅乞與嘲鹽貴苦笋烹來恠醬遲亡可柰何安􅀂命午䆫􅑿得睡便冝再賦二首誰爲風光管合離緑隂芳草日相隨此身百丈牽三峽吾道千鈞繫一􅁝力戒盪舟君子适志期學圃小人遲平生客氣消磨盡醉固佳哉醒亦冝一出俄經震巽離盈虚消息取諸隨盆栽菡蓞何時藕簷掛蜘蛛盡日􅁝左墄右平魂夢逺東崗西崦杖藜遲稜稜瘦骨蕭蕭髮恰與黄冠野服冝題李杜􅂫黄像金鑾天子如天大九萬里鵬容幾箇㝷常溝瀆蝦䗫過紅錦宫􅂁空着破故書收拾歸去來􅀝杖斜陽唱誰和右太白風雲慘淡豺貙吼日憂無飯仍無酒秋來東屯熟八九舉家歡呼拍銅斗老夫欲釀兒欲炊老夫怕醒兒怕飢商量不下撚斷髭歸與汝母折􅂨之右少陵黒風撼海晨烏青海恠出没雲濤腥矯首獨立天􅁳􅁳保一以静吾清寧椰冠野服􅀟􅁂星抱書自隨妙娉婷眼寒海南蜑家丁右東坡神爲􅆖騑氣爲車秋雲扶踈春風􅃾湯餅睡起茗椀湏意往獨與奚奴俱奴低頭􅀏公放􅂴不著書右山谷普照僧生雲軒雲閑閣巖芳歛空華谷響荅虚牝坐看白雲生㑹得無生忍􅀨來山出雲􅀨過雲歸海悠然天地間得此大自在夏至過東市二絶挿遍秧疇􅀨恰晴牧兒頂踵是升平秃穿犢鼻迎風去横坐牛腰趂草行漲落平溪水見沙緑隂兩岸市人家晚風來去吹香逺蔌蔌冬青幾樹花和黄伯淵閩人見􅀉二首流轉風光不暫違等無地角與天涯故人書到幾青李生面客來時紫芝窮裏埋頭傾啞酒凉邊趂手應盲棋寂寥簡短君應􅀏郎罷吟詩囝和詩錦埜西頭始識君便期堊鼻着風斤餘甘到厎有遺味薝蔔本來無異芬忽忽又弦凉榭月亭亭還合暮山雲玉泉道士窮於我也買新鵝約右軍敬和老人覽鏡西谷柴車手自巾風吹不到􅁃郎塵回光返照千江月復命歸根一􅀧春永晝同䆫陶處士凉宵專席竹夫人徐公好醜渾休問認取青銅鏡裏眞又和憶可庵耐翁流慶徧仍來隨處烝嘗薦筍苔但認白雲飛一􅀧便勝黄犢走千回屋山早露柤梨熟墓道秋風菊桂開父子相從歸展省豈無野水爲添杯次韻夏日秧青水白四郊同召􅀨無煩訪守宫槐葉煮􅡤隨市俗蓮花搗麴稱家風過從乆謝三千客嬉戯長娯七十翁巳是太平農圃老更揩兩眼看升中敬和老人荷花紅紅白白兩般栽淺淺深深一氣催但愛透從清水出不辭脫自淤􅅺來隨花着蓋相依立聚菂爲房忍擘開妙㓗色香無間斷床頭更撥洗兒醅鎮越堂辭汪紹興綱仲舉建氣佳哉􅀆鬰葱文五色􅀆虎龍江胥杵沙爲馳道􅀆海􅀂歛潮其下風前羲舒而後翳霳􅀆軫獵來自東孕㤗和􅀆諸馮煽炎暉􅀆沛豐於乎秦望禹㑹其宇内之鎮􅀆詎伊越之雄堂􅀆堂􅀆冝其眇翠閬而羞丹蓬西庵晚歩荷披菰折似秋嚴茀草叢中菊露尖只有木犀荒不得媻􅘐勃窣上亭簷次韻七夕弄巧拙逾甚合歡愁轉多擘金盟似海搔玉淚成河天運眞旋磨人生特擲梭身閑凉月好且與醉無何蜘蛛巳迫斜陽欲墜時謀身只怕脚行遲縱横籠􅇁大爲網首尾經綸渾是􅁝腹飽飛蟲肥似瓠喙工毒螫利於錐朝來猛被兒童掃不放簷牙一􅀧遺晩徑六言促織聲來竹裏凌霄花上松梢清泉白石心領野鶴􅀌雲手招中秋要看中秋月湏交夜半時當中明朗朗直下浄離離地只餘風露天何有斗箕虚靈昭徹性開眼幾人知敬和老人石菖蒲西風擺脫絡頭􅁝蓀壁爲家不問􅆱分得九華煙􅀨壑種將五老水雲芝㦸髯灑灑精神健劒脊稜稜氣骨竒䆫外幾多凢草木爲誰張王爲誰衰又敬和還家自喜溪山魚鳥識車塵風日温明試小春黄帽青鞋安樂法芋魁豆莢太平人接籬倒着情懷放蓬沓逢迎氣味眞兒亦夢牽潭上菊和香細嚼勝猩唇又敬和還家䘮家知似狗生子望如狼過盡燈花影空餘汗竹香菊肥人自痩髮短慮何長霜蟹新篘酒由來苦易忘次韻臨安趙丞時讀紹運圗燧農以前疑傳疑理耶亂耶難盡知唐虞三代號極治􅀃着已是令人悲古來神噐付有德人心天命何容私使朱與均不豚犬亦家天下如啓時乾尊坤卑大分定孰陽爲耦隂爲竒南巢牧野可自諉爲民嘘寒濯其痍後來龍虎戰劉李大氐鸇􅆩驅秦隋杯羮分我弗暇顧肯與兒女同車馳晉陽宫監計可刼機穽不管爲天窺橘中老翁虬髯客冷看丗變從旁嗤當塗典午夜􅀒耳南北五代晝攫之螳螂黄雀逓相視誰肯帖耳甘伏雌日月出矣爝火熄此殆天意非人爲所嗟患失長樂老東家浙米西家炊榮華冨貴風􅀨過但見金椎控人頥君侯讀書眼如月坐閱兩岸隨舟移詩成索酒澆磊磈通德裙帶紅榴垂洗研自洗洮州緑閑題柿葉紅一塵空水月百念老霜風鈍菊淒猶蕾顛桃艶巳叢斡流千萬變誰實主鴻􅄥贈俞次孟古屋無過客新凉得可人爲回黄觳􅑌同飯紫輪囷杜􅀨􅀄華稻秋風未老蘋扁舟苕霅去詩料正横陳已丑新年幾度椒花頌歳朝今年心事最蕭條官雖有路猶窮轍住豈無家却􅀉巢金盡床頭顔易改樽空座上客難招一般獨得便冝處病裏逢人免折腰背疽猶未平病起獨歩病將春到眼慵開只爲梅花猛一來何處琵琶推郤手舉頭啄木起林隈荅請事簡臘雪如席麥苗肥春􅀨如膏菜薹賤寧令前壁打後壁不將熱面塌冷面寓事六言飽鶩避弓横渚驚鱗透網平波一叚春光揺曵幾􅀟静眼摩挲次韻西山山深莫道得春遲雲漏晴光巳大竒夾徑幽香吹艾納隔林絶􅃩􅀧燕支一川逺近迷漁屋兩市東西認酒旗錦野着亭坡老後曽來可惜獨無詩次韻遣懷不用憂春􅀨時來百草芳猫頭肥可臿雀舌嫰堪囊舊酒聞香烈新詩索味長櫻桃空落去吾老白雲郷挽元寂王道士盤隱早具眼栗齋仍􅀧頭豐碑俱好在爛醉更何求院静桃開落林深鶴去留翛然風露表無處覔青牛古意條風從東來習習振枯槁美人􅀝䆫閨别思忽巳早兩句夢中得昔爲連理枝今爲斷腸草雞號天五更髮白不待老中春望後一日登玲瓏出郭暄欲暑渉林清自秋歩隨目力髙身與山氣浮飛來辛夷花拾得蓮葉舟一聲提壷盧四顧叢薄幽詰屈九曲屏突兀十二樓泉流澗級峻雲起峯隂稠左摩紫髯兕右拂蒼鱗虬牽衣憇更好擁䇿登三休上呼笙簫侣下瞰錦繡州豁落不平事消融無涯憂太極浩􅀄判此山鬰相繆幾人記曽來老苔蝕琱鎪玲瓏聽我歌歌徹玲瓏愁有酒且湑我羲娥雪人頭夢語麈尾御犢轅竹枝招羊車意足各人眼心合無天涯寳扇閑草蟲碧衫凉暗花茶䕷金沙厎清歌按紅牙醒疑不是夢夢到故自佳次韻娑羅花摩耶樹老無多子天女花妍有許般莫把東邊枝便斫堂堂留與碧霄干讀漢事病禹逢沈驁酣參事懦盈隂陽眠爕理天地醉財成河嶽瞢騰立羲娥蹩躠行無人能喚醒作意造升平粥罷昨朝隣家飯疊爼肉曁魚今晨自家粥單簋筍與蒲不爲昨而腯不爲今而臞面前有豐殺此腹只自如所以顔氏子簞瓢靡求餘識字行識字不用多識多反爲累結交何用深交深或中棄紫㣲有君房郎將得賔王胷無半􅀧墨七襄亦成章票姚新賔客文園舊婦翁雖非平生驩冰雪生春容勸君五車不湏讀瞑坐蒲團養􅀟目作雲作􅀨手飜覆有時烏好丈人屋散䇿窈窕薜荔徑勃􅌥瞻蔔林六出無他香御此衆緑隂低頭拾摽梅齒老酸不禁仰看栗䑕度危梢與雲侵百舌巧􅅬頰時過聲自沉摶􅁰晩得意睍睆流好音水旁兩三家煮繭矮屋深午忙不暇饁荷鉏歸藁砧夾橋女蘿宻趍塢孫竹森仙人左元放拍手東西岑一氣地依天萬事古猶今溪山豈不好感槩霜滿簮前乎千百年有人獲我心後乎千百年知誰同此􅁭花獅雪氄吾家虥知親翰墨妍渇來趍研飲飽去枕書眠弄影窺清鏡収聲聽素絃最能持大體䑕輩任便儇老人賦鄭醫芝隱樓敬次韻鵲經心訣在鴻寳肘方全爲問春痟首何如夏脅肩樓居髙進月園渉細䟽泉學得種芝法疑君今稚川又敬和寓􅃕借得盧仝屋數間不爲太窄不爲寛胷中鵬背三千里膜外羊腸百八盤薜荔水中摽本逺菖蒲石上見花難麄茶糲飯隨縁過等作湏彌芥子看除妄酒泉能醉麽飯顆免飢不萬事得如願一生應莫愁凉風髙放鶴落日倒􅀐牛諸妄冰消盡吾師馬少游晚凉樛枝隂合翠熏籠曲曲斜斜石徑通窈眇蟬聲繰獨繭爲渠立盡晚來風迎秋熱不能堪又便秋天公厎暇與人謀形容如許馬非馬氣力幾何牛戴牛勃勃松梢雲片起琤琤藕葉􅀨聲留新凉收拾歸歌板鈿合金􅁫萬古愁敬和老人盆池埋盆作沼野人家數斛山泉拍兩涯人立晚風凉似水荷浮香氣勝於花蛙聲恰恰冝飛兩鶩影依依欠落霞齊物逍遥無大小不湏煩惱髮生丫喜􅀨一絶簡趙丞龍公有眼識英材好􅀨隨聲喚得來酒面添如田水滿眉頭放與稻花開古樂府用禮禪滅翁韻四黄金絡頭五花馬槲葉無風雪蜚野仰看飛鳥命中之好􅀆儇􅀆誰似者上蔡門望夷宫往事了不省引白春滿容嘯笙坎皷踏雪歸馬蹄不記來時蹤右公子遊獵河水湯湯公母渡爲妾言嗟未力公渡竟不疑雲昏風􅀨寒波深蛟鰐飢二十三絃悲復悲黄鵠不􅀟鸞獨飛右公母渡河桐春華竹秋霏蒼梧雲深人未歸烏八九子恣飛啄夜半飽啼山月落鸑鷟引􅀌雛腸空羽毛薄爲言増擊勿作遥吹參差􅀆共飄飄右鳯引雛羽肅肅鳴雝雝江南江北秋思同秋思中人無避處風酸月冷江流去鴈奴亦良苦群鴈不我馮夜深炬火滅復明舉網揜盡蘆花翎右鴻鴈行槿花露徑風籬取次芳朝榮暮悴付流光一秋朶朶紅相續比着人情大段長用主司理垠韻送别二首亨衢方四十滿謂乃翁如爲厎澼洸藥依然城旦書光塵風物裏消息事情􅀄束起東西玉功名冨貴餘蘆花秋摵摵征思斾悠悠歌吹莫愁國皷鐃熊繹州胷竒空盾鼻膽雋落旄頭儻有西風鴈頻書老故侯挽鍾孺人夫没姑嫜老年芳鑑珥新􅀌峯晴後雪碩果剥中春命義生無媿言容死未陳西風吹拱木􅀟劒合龍津挽阮宣義逢原父夜氣精神飽春風􅀏語酣脩篁森道北叢桂郁城南雨露榮三釡煙雲老一龕瀧岡阡上路秋思薄晴嵐􅅄菊二絶木犀滿送第三香交割秋光與後行細雨斜風籬下菊安排青蘂做重陽菰葉離披藕葉欹精神得似未秋時西風坐斷群芳路不屬黄花更屬誰章升伯妻孺人挽詩婉孌從君子青雲逺大謀樂羊燈火夜李侃皷􅎏秋露舄鳬迎喜星機鵲送愁誥花紛五色光動九原頭東山懷謝傅用禮滅翁韻金堂石室舊徜徉􅀍髮依然下大荒月送嬋姢華落蘂雲移縹緲濕踈篁􅁊伊筝外深情酒㓜度棋邊定力香往古來今開闔眼樓頭吹面朔風凉山中菰生米父老謂豐年之祥用子有韻秋風菰􅁰黑山崦罕聞之産瑞揺銀海占豐灔玉池芃芃秔合穗裊裊穄分枝却憶官張望嘗新薦一匙􅀄霜庭下曉來霜菰頓芭蕉折絡石瘦菖蒲獨抱青青節九州山僧房路突亭依石林凹渚見沙嶔危幾岣嶁深蔚似琅琊客勌驚寒思僧閑忘歳華兩䆫風露影一樹枇杷花挽俞致政徳藻父渉丗萬縁薄愛書􅀟眼明身從平處立道向拙中生啖蔗何妨晚栽槐恰待榮偈成投筆去天闊暮雲横挽銅里葉提􅀧養性居士白用心承事黄春風花竹墅秋􅀨鱠蓴郷簡淡趍眞諦廉平絜義方誌幽無長語手墨粲琳琅徽州葉司理送冬笋凍雪晴邊白柄鑱浴泥扶出錦綳衫定知王謝家苗裔風味生來便不凢挽俞景梁億計橋門士輸君第一籌文爲天下様行與古人謀磨鐵素心在注金蒼􅁂休梅邊清絶夢誰更酒扶頭用韻荅厲輔卿二首坐窮無過客失喜得吾儕材逸􅀋淮海詩清如簡齋山明知玉氣水涸見霜涯期子進此道爲親生好懷南北錦一住東西巖屢登報春梅有信送酒鵲無憑之子能相過詩名不浪稱漉冰烹小鳯爽思爲渠増敬用老人功臣浄土院韻髓腦供祠寺膏脂倒井閭岸隤猶畧彴塔秃只夫湏窈窕􅁫先燕夷猶帶不魚醉歸天欲雪好箇探梅圗石斛蚱蜢髀多節􅁡蜂脾有香蘚㾗分磥砢蘭頴聚琳琅藥譜知曽有詩題得未嘗瓦盆風弄晩披拂一􅁭凉平齋文集卷第六
