body:
  text: 詩一廬山五猗猗􅀂人􅀆􅁑巾渡柴桑􅀆水泠泠稚子髧兩髦􅀆從而後東家有酒􅀆緑參天其䕃柳山風凉􅀆月瞑枕白石􅀆未醒漭無極􅀆天游不知乾之爲馬􅀆坤之爲牛猗􅀂人􅀆錦􅂁屏九疊􅀆紫雲髙􅀐雲氣􅀆超遥汗漫下上􅀆昌羊以遨左手􅀆提北斗之杓右手􅀆挈東海之鼇摩兩耳􅀆酣熱􅆌八荒􅀆秋毫猗􅀂人􅀆草堂谷簾夕隂􅀆香爐朝陽表溟涬以爲門􅀆架虚空以爲屋四海非無友􅀆邀白雲而同宿風露澹􅀆我琴舞玄鶴􅀆龍吟與太古􅀆同音尚靈脩􅀆知心猗若人􅀆黄犢春風蕩􅀆瑶草緑犢護草􅀆行復止隔林呼􅀆老觳􅑌眠犢背􅀆閑閑仰看青天􅀆飛鳥還恍夢游􅀆何所箕山頴水􅀆匪巢伊許猗若人􅀆深衣萬鐘不爲㤗􅀆一簞而遯肥溪之清􅀆不受淄月離離􅀆風披披芙蓉􅀆渉採欲淡􅀆心夷駕言􅀆何之羲文􅀆與歸解纜春落平蕪外舟行白􅀨邊鳩譍山爾汝櫓畫水之玄官冷誰能吏身閑便是僊康廬眞箇去信有夙生縁晚晴子規聲裏半晴隂百丈牽行岸草深挾􅀨倒回風有力避山横轉水無心人於熟處難爲别酒到離邊不柰斟漁叟厎知如許事櫂歌穿入暮烟林水宿分席眠鷗渚廬山夢巳通蓬聲踈宻􅀨燈影往來風我正思吾母兒應􅀃乃翁擁衾天未曉此味與誰同過四望山人逺鷺􅀌立湖平天四垂柂移舡解語帘舞酒求知望眼傾三􅀏騷吟􅀉九思今宵吾計得解鼈薦鴟夷阻風呈趙史君三絶長紅送酒岀江城檣燕喃喃第二程風色似知攀卧意打頭未肯放舡行􅀝風晴纜着煙莎一抹斜陽白鳥過脫手簿書無半􅀧細飜黄卷課􅀛羅遲速乗除轉晩飈布㠶快意定明朝廬山試問髙多少欲望西川萬里橋左蠡山爲飛沙白江縁漲潦黄古今􅀟去鶩天地一輕航雋永還欹枕牢愁忍别觴晴雲横不度何處是柴桑落星寺春秋隕石于宋五分作金焦與星渚大圎鏡裏八䆫開面面魚龍聽人語瀑垂一線吹不動山擁萬􅀐明可數嗟哉蓄眼無此竒欲倒銀河卷歸去入山箯輿軋幽徑喬松矯踈花好鳥媚嘉䕃圎吭咽清笳膏畦走秧馬茅簷嘶蠒車誰知天下樂盡屬山人家橋横澗水斷寺古林屋斜羅漢寺銘架鎮法皷詩碑記煎茶尊者儼如故天奎失龍蛇劃然小䆫開五蕊撑谽谺斗酒軟兩脚捷歩窮烟霞三峽橋太行擘破黄河出贔屭飜身滄海立老龍抱寶正鼾睡地厎黒風吹霹􅆮挹之以北斗之柄瀹之以明月之璧啜之以太白東坡兩謫僊尚不􅀒乎此山之泉石萬杉寺散珠亭酌觀音泉蒼杉拱立萬夫長破衲素封千户侯昨夜金僊失瓔珞寒光滿地不曽收瀑布開先寺後青壁􅀟尖長劒􅀝博山突兀晴煙紫槐里先生醉欲醒丫山道人定􅀄起摩莎兩眼看飛虹猛悟此身如此水崑崙絶頂有眞瀑倒㵼生肥玉池裏淙淙夜半漱白石十二瓊樓浸清泚是中有味人不知白練銀河較形似青玉峽水繞江南阿李家滿空飛雪響雷車流將采石磯頭去坐看浮梁壓浪花開先乃李中主書院大􅀌山洶長江其迅流巋傑石乎中峙送兩目􅀆􅀟㠶有美人􅀆千里東西林逺永兩尊宿未了人我心相距􅂊百武割據東西林淵明游其間買酒時共斟虎溪醉來往同是廬山隂清溜轉幽港斷雲度巍岑等作如是觀爐香對森森天池燈山谷人家避李成誰知刼數莫逃兵到今􅀑燐青無數認作文殊佛火明􅁃樓湓城陶􅁃共功名廟食樓居孰重輕衮衮長江流不盡淮山青處夕陽明谷簾泉山椒飛􅂀落寒空闘水曽收第一功萬馬鐵衣行夜雪六虬銀甲動秋風分甘晩到玉川子知味早輸桑苧翁手弄潺湲坐盤石蒼凉新月上􅀌桐楚城靖節祠􅀨引莓苔上短垣流泉無恙自㳙㳙不如歸去來􅀆好百丗聞風只杜䳌湯泉水府燃犀處扶桑浴日時能觀雷復地始信坎生離浄垢元無着温凉祗自知驪山殷鑒在莫受阿環緇歸宗墨池龍跳虎躍入昭陵墨汁空留一叚冰散作淋漓元氣濕屋頭老木掛踈藤三疊泉捉月仙人不到處􅀐鵠凌風髙着歩巃嵸翠壁挿天開天上飛來素濤怒玻瓈􅅣岀蓮花漏激電吸蜍髙下注布㠶危掛八節灘飽風吹上龍門路冰􅁝細織無幅綃雪花亂卷有聲絮蔚然而龍鏘然韶大者如珠小者霧解衣盤薄踞虎豹遥送空濛濕巾屨金鋪玉户蔡家姝拍手招人􅀏相顧麻姑老矣不解事􅃌􅀧五雲推使去白鶴觀缺唇丹井應千尺秃頂靈杉恰百圍鶴去不聞人下子黄蜂無數採花歸楞伽山房二絶八萬猊床方丈室九千書卷半邊䆫儋翁句子無人問流水泠泠度石矼風標勁似聶政姊筆力健如曹大家此手始能爲此竹對渠枯木老槎牙水行岸曲頻移柂巾欹獨􅀝檣月分雲外影風進水邊凉宿鳥樹三匝佳人天一方清斯纓可濯誰爲賦滄浪洪園洗心堂飲中偶成官事何時了抽身朱墨叢未霜烏桕赤得日紫嶶紅山勢西南缺湖光左右通引將􅁝竹郤洗耳聽松風荅仲肅梅廵簷索􅀏爲踈花便未開花亦自佳帶月折歸香在手閙觀塞破路三丫鄱江樓晩望暮􅀨􅂊收未炙燈蒼鷖掠破岸隂澄湏􅁷認得舡頭竹始信漁人掛起􅊻有感一蝗東方來孕子九十九未岀婪酣肚巳辦饞口漫天自成幕掃地不用帚一朝霜風寒何處弄百醜取凉二絶六月冷官還解熱解衣盤礴坐蒼苔微風只在松梢頂着意招呼不下來平湖水則减三分尚欠紅蕖一叚雲萬斛波光自吞吐月明亦足張吾軍敞雲樓二絶江天雲作黒山頽上到樓頭手決開水墨枕屏三百里斜陽屬玉一􅀟來草樹成行整復斜江頭白處定蘆花夜深更着無邊月好箇樓居處士家正月三日同莫幹祝法遊東西園探得行春第一籌南梢花事半將休斷雲不礙逺山碧新月自隨江水流金谷主人眞已矣玉堂老子尚來不丁寧留取蒲城酒更約東風汗漫遊擬古送莊郎中歸朝二首西北有髙樓長眺起我思我思非今人古人莫見之孟軻尊仁義妾婦秦與儀孔明抱禮樂􅀑蜮操及丕已物孰重輕徇道不徇時冨貴一餉樂名節百丗師居今而行古豈無􅀂人斯遡洄從之游洧盤濯􅀟緌渉江採芙蓉露華不盈筐雜之蘭爲佩申之蕙爲纕持此孰與贈美人天一方駟虬乗蒼鷖御風朝虚皇䄂中治安書琅琅奏明光探囊岀刀圭爲民起膏肓臨流不可渡與丗爲津梁玉池浸雞舌薫作青史香林同年􅀍檄來體訪民租寓僧舎有詩因次韻二絶河水清􅀆有縣特東方作矣未解􅃭􅀉聲卿自用卿法我獨舉酒留詩臞我雖不飽尚二簋人則何辜無一􅃭官儂早下减租筆天下可肥身寧臞送陳倅泊然無營如子雲撓之不濁如黄憲清静勿擾如曹參躬行不言如石建古人與稽今人居外􅀂不足中有餘治中别駕􅀉途耳用則天下皆華胥東風昨夜收􅀨脚楊柳亭前小盤礴楚江君去定思君有酒一杯湏滿酌陪郡侯岀郊勸農六絶勸農冠蓋岀江干馬上東風觱栗寒珍重春衫唾花碧􅀞眉狼籍道傍看山青未了曉光開鳩喚鳩譍雨又催消得犢車泥滑滑此行不爲杏花來茅屋人家蓐食烟相呼趂􅀨好翻田去年下麥􅅺如鐵一寸春膏直幾錢争問官儂子謂誰看來似不是農師向人羞道閑陪渉􅀃與􅃎風七月詩煉丹人去屋蕭蕭脚厎羣山走翠蛟長嘯一聲空響荅砉然􅃗鶴起松梢王仙壇勸農乃馬蹄福地晉王遥仙去之所丹爐猶存半落梅花雪透明不妨把酒當春行光風有意相料理楊柳青邊約畧晴夜讀夷堅放卷偶成歛卷驚嗟語幻哤搔頭危坐對明缸梧桐細語秋傳信絡緯長鳴月上䆫濁酒不多􅀟耳熱妙香無盡寸心降家山未得平安報飛夢東歸拜老龐秋夜一日一畨􅀨三更三昧凉桐邊青弄影荷厎静留香俗物刺人眼丗情冰我腸關山何處笛落月照胡床次韻曹提管楚東之作蕭騷兩岸落秋蓬楚水西流不肯東好酒但湏知婦有新凉莫問與誰同片心置向嚚塵外萬事留將醉眼中喜得建安標格在何曽詩解使人窮中秋楚東對月次曹提管韻西風一􅀏話綢繆白露横江滴滴秋天没􅃒欄金餅上水無邊際玉繩收扶將太白酣方適喚起馮夷舞未休今夕明年應更好夜潮來處􅀝危樓和黄宰木犀春風花事數河陽又見玲瓏糝綴黄萬斛香添秋醖藉十分凉借月容光熏奩拾取留長挹湯鼎煎來得細嘗湏信小山標致别從渠塗額學宫粧冷􅅟面挹重湖結樓以收逸放之景扁以清斯諸友移酒落其成分韻得里字寧飲三斗水不揖褦襶子寧食三斗葱不踏龍斷市伯夷聖之清餓死不受滓死猶清可爲况乃未必死幾人濁惡海雞鳴爲利起魏其武安門洒削胃脯氏椰榆首陽山自伐我計是使清能死人濁者亦死耳官居寂寞濵不墮闤闠裏嚚塵一關隔宛在水中沚樓居得未有鑒影時自喜天空塔戴角湖歛沙脫觜烏桕生晴隂芙蕖淡秋蘂鷺􅀧横烟稠鴈掠斷雲駚山缺女墻轉林斜僧屋􅀝江流在何許危檣岀半􅃌長堤苔㾗平盡日無歩屣有人爲我來寒冰照人只鷗盟以要之相對弄清泚明月不滿掬一漱霜入齒葹菉薋盈室爲君種蘭􅊉户服艾盈腰爲君攬荃芷吾非好獨清濁亦君所耻千丈一寸渾清恐不如此出門歌濯纓聲節中宫徴西風􅀐兩鵠碧落絶萬里次韻曹提管梅凌寒峭立向庭除晉宋淵明漢二踈面冷不堪相娬媚心清聊爲一軒渠月來月去香仍在春少春多意自如皎㓗􅀌芳誰與共作詩我欲􅀉東徐次黄宰早春韻勝裏春來早遲君秉燭遊煖如三月暮香老百花頭心事付桑落風光催栗留人生行樂耳任命不湏求分歧四絶呈及甫草色半有無梅花間開落還家正自好柰此抱離索送君一程歸别我數里隔定非愛雞􅁰前例無此客大兒長如竹小兒秀如柳迎爺拜新年頷髭白八九客裏有厎忙申旦不成夢逺歸勝新昏還君春睡重白鹿書院萬緑團隂町疃􅂣􅀝凉弦誦玉琅琅溪山涵毓中和氣草木薫蒸正大香陋巷顔淵何所樂舞雩曽􅀧若爲狂懦夫百丗聞風起此去濂溪更有莊和黄幾叔墨梅二絶月暗雲迷竹外枝寒香未動便能竒面如坡老南歸後骨似温公獨樂時六月夜䆫留取看霜風蕭颯墮林端問渠厎事青青晩耻上㝷常桃李盤和黄宰招飲大都春色三分耳能得眉頭幾度開見􅀃東家酒􅀄熟不論今􅀨也湏來幕官相約觀芳草於法曹之亭黄宰病不至以詩來因次韻似無細􅀨還應有欲落餘花更復留草際水邊青未了可禁杯酒爲扶頭古意謝崔楊州辟七首突兀誰家樓風􅀨歳薄之大梁危欲壓小柱亦半欹匠斧睨其旁􅅮手難獨支南山有竒材細鉅不可遺拒霜着秋紅夸詡顔色好五更青女勁顦顇一何早深林蘭自芳寒節耿獨抱識此知見香鼻觀不草草山深閴無人夜半迷黒月魑魅乗其昏光恠互岀没獨行欲何之十歩八九兀隔林炬火明命向虎口脫汾隂有古鼎金景歊浮雲斡棄不知愛瓦豆薦苾芬提携向中庭拂拭蒼蘚紋雖非大籀􅂐彷彿猶八分㩥㩥兒女手申旦軋機杼織成遍地錦翠鳳濕花露三年卷篋中背立泣不遇持歸付刀尺晝線金針度江頭客子舡盡日卧沙尾維楫非不具潮弱未能跬秋風雪浪髙長年絶呌起舡行莫􅀝柁難得此汛水梧桐生髙岡上有朝陽枝鳯從南方來覽煇而下之一鳴寒暑平再鳴風􅀨時秋秋百鳥羣振翼長追隨送潜同年敷調官歸以君一年長爲我異姓兄衡從􅀇圃玉岀入武庫兵急手􅅮蒼兕雋氣鞭長鯨議論到千古慷􅁣吐不平漢以􅀄元衰唐以天寳傾附勢妾媚嫵避事兒嚘嚶頽靡寖成俗忠良竟吞聲自謂􅀝南山不知壞長城君子勇於義小人罔而生儻不餓采薇逺可死結纓每聞壯其語亦嘗用吾情有餘不必盡尺渾勝丈清六經源岷嶓百家􅂀渭涇歸求性内學莫計身外名春風兩􅁂緑秋月􅀟眼明通德擁髙髻勤勤剔寒檠嚴陵道上雜詠七首江上送行潮汛小舡頭回首夕陽多人生有幾柳如此客思不禁花柰何半江雲濕欲成􅀨兩岸水渾􅀄退潮短短竹籬花朶壓深深麥塢雉媒嬌􅀇英范老聞風起俱爲羊裘一釣􅁝堂扁三賢非本意何如只號子陵祠石壇千尺薜蘿古沙徑百盤苔蘚香不是先生求矯丗􅂴將日月趂人忙闖巢摶􅁰待晨餉投岸舂鉏㝷暮棲揔是心爲形所役搔頭獨立渡橋西髙髙下下客行路整整斜斜人住家端的今年蠶較晩石榴花下響繅車細草護沙連不斷踈風畧􅀨散還收山田麥熟不歸去三百里江都是愁爲清隱打化僧􅀃偈雲山幸不求吾是魚鳥依然􅀏我頑自欲入城持鉢去扣門可煞老僧閑丁東泉渇烏滴盡三更􅀨鐵鳯敲寒六月風湯餅困來茶未熟爲師揺夢作丁東昭君行紅嫣翠濕平陽里轣轆遊車汛流水蒼頭擁􅀐知謂誰草草人家􅀉生子君王神武重邊功不愛穠華勝桃李青鸞扶下五雲車顛倒衣裳冠薦履賞功未了􅀃和親又墮蛾眉芳夢裏平章三十六宫春遣似天驕買驩喜朔風吹雪胡馬嘶獵歸月淡龍城西重旃穹窿壓斗帳泛盎快攪金留犂細調弦索爲郎皷手未推郤眉先低林深人静􅀌啄木春盡樹暗􅀟黄鸝大居次吹梅花老小居次舞楊花迷屠牙勃窣起爲壽一粲相對酣如􅅺子卿海上亦良苦牧羝未乳兒先乳信道天涯共此情誰謂􅁎姜必齊魯妾身不爲漢婕妤下嫁猶獲當單于從來蕃漢等昆弟得婿渠不如家奴君不見􅃁象廬山誰比數青塚名傳千萬古春日山行二首一晴一􅀨柳添碧半落半開梅着酸不􅀍東風相鼔弄春山只有老蒼官兩􅀧眼光牛背上一􅌪春色落花邊丗縁不到山深處只恐深山起丗縁挽中書俞侍郎二首噐重千鈞鼎胷涵萬斛舟文章歐六一政事冨青州偃月知誰在靈光獨我留貂蟬雖未着不作汗青羞銓省承新渥詞垣訪舊隂頽波回萬折斷岸立千㝷秪謂人猶已那思昔異今時清猶憤死天地是知心贈希聲居士汗漫􅀐鯨去西風髮半簮安心元是藥得趣不妨琴人静蛩鳴夜天寒月出林爲君重洗耳别酒不湏斟江頭􅀉致逺二首箕斗光移析木津踏霜扶醉不驚塵夜寒應是梅花覺半歛愁容婉待春客䆫翻遍竹爐香樓外更聲作許長解事燈花相報似擁爐兒女􅀃荒唐􅀉崔帥卿歸鴻􅃗影宿汀洲夢繞蘆花不柰愁頴谷杯羮無日遺翳桑槖飯有時酬功名曠丗來斯受議論驚人合則留此事大關天下望殷勤爲報古楊州贈趙同年别買田招隱落星灣採盡詩材始放還逆境自安天理順閙籃誰識道心閑兩窮覿面塵埃裏一􅀏論情醉夢間爲􅀃斯文有宗主春風楊柳滿平山壽崔帥卿七絶嶺右山川間岀賢開元宰相最居先中間不數余安道恰到于今五百年連蜷雌霓墮晴空光照書樓卷􅁓紅天爲斯文開瑞應海南海北一宗工塞下人家盎盎春又推餘澤及流民慶州小范青州冨合作先生社稷身弄兵澒洞射陽秋一􅁓招呼殺氣收十萬蒼生驚魄定活人隂德過賔州夕烽旁午徹甘泉獨有淮東一臂全若使盡從持重計廟謨厎用更憂邊紛紛傳檄方言戰猝猝囊金又􅀃和誰信規摹湏早定計然半䇿不湏多垂弧節過便春風入侍猩􅂁一􅀧紅殿上獸樽誰得飲漢廷諸老定輸公續洗兵馬上李制置太白過午芒角獰􅃖尤亘天鉤尾赬淮東千里正􅋜寢夜半洶湧傳邊聲王師北渡衂泗口胡馬南牧揺青平擁城敗將死蝸縮護堡羸卒飛猱驚詩書元帥戒夙駕往試百萬胷中兵幾人險語挽衣斷甚至涕泗交縱横李晟爲國不虚出裴度與賊難俱生兩軍相持以氣勝督戰火急開行營長江漲緑馮夷舞擊楫東來親一鼓威靈閃閃動牛斗精采軒軒起􅆛虎金牌銀牌膽爲冷千户萬户色如土尺兵寸鏃不待施巳覺目中無此虜四旬頡頏闘困獸一夕倉皇竄飢䑕不聞令狐戞刁斗但見􅀛山撑窣堵麥畦黄裏栗留風秧甽青邊勃姑􅀨老農想見太平年買酒煮茶相勞苦黄旗紫蓋祥光開宫柳飛絮公歸來平淮勒碑字如斗鐃歌奏曲聲如雷奉觴再拜白壽母兒輩破賊邊州回歡然一􅀏春滿面婆娑起舞斑衣萊還觀先正紹興日立朝清節髙崔嵬獨於和議植赤幟坐令火德然寒􅁅家傳此意石不轉事業自許圗雲臺從今着手快經理一洗河洛無纎埃君不見武侯用西蜀誅賞大明人自服又不見叔子鎮襄陽恩信一孚江漢皆金湯送興元聶帥泛觀天地間一氣如爨鼎半鼎沸正急半豈獨爾静從旁更益薪旣往漫不省疇當起沃之轆轤轉脩綆長空墮旄頭胡命懸漏頃不戢方自焚餘熖燎吾境俶從淮漢擾馴至襃斜警勢欲合南北事湏得要領和固不可爲戰亦未易逞中興關人謀而可􅀝天幸君侯冨經綸頗牧在禁省憂國如憂家申旦抱耿耿䄂中平戎䇿直欲繫其頸王斧下青􅁳上游建巨屏秋髙馬正肥􅁣慷泝巴郢鏠旗凛太一福星映參井蜀從更化來舊痛甫甦醒風寒不善護遂與勞復等内勢旣􅏓盭外兵且贅癭但嗟車轔轔未見旗整整胷中百萬兵氣壓􅆛虎猛凉飈送先聲􅀑蜮巳匿影自昔樹勲業莫先拔翹頴共功非衆材殆􅀋無麵餅孔明駐漢中欲翦漢賊梗委心任費禕屈􅂰拜許靖􅀏談扼姦雄老死不得至今出師表日月光烱烱惜哉㑹潼關不從魏延請公才幾倍亮謀略濟忠鯁機㑹有可乗臨事勿吹冷秦隴咳唾定歸衮顓國秉頌磨浯水濵銘勒燕然頂諸生筆如椽湏公一􅀏肯送新婺州汪緫領歸歙天驕運去如隤堤横決燕涿流青齊斬竿掲旗扣並塞􅀍髮左祍稱遺􅀺膾肝山前走肉語碓骨寨裏飢魂啼盡籠虎兕淮南北期獵狐兎山東西常人喜功首例肯智士察變眉先低危言不顧犯衆忌設難直欲開羣迷近嗟唐禍兆回紇逺述晉亂基羗氐積薪未然不着手曲突巳驗空噬臍賊㠶方落射湖去胡􅀐巳闖滁山嘶正湏籌幄坐月觀却卷郡紱㝷黟谿帶􅅺燒筍薦晨餉踏􅀨剪韭供春韲心安便是上池藥眼浄何用黄金箆蜀公早嘗着野服君實晚始持􅁊圭方來事業推不去還踏曉皷聽朝雞窮邊殺氣貫矛㦸嚴城酸風吹鼔鼙化雲相隨不可得矯望玉宇横蒼鷖送崔少蓬南歸五首美官誰不愛所貴以道得道足以得之有厎去尤力祥麟快掣鎻􅀇鶴不受弋此意關重輕當有識者識欽永早患失光禹晚志得飄風一鴻毛何能益人國己重物乃輕此理要深識方寸浩然氣天地吾其塞冨貴紛探驪功名競􅀐虎眉端萬國愁公意良獨苦五年安邊功絶口不自語仙㠶去蓬萊急浪一砥柱岀江梅未花過嶺青着枝解裝書滿床自課應門兒獨樂非不好民瘼將疇醫詔來不俟駕丗事猶可爲楊州傾城出作逺事追送諸生更依依瘦馬踏朝凍􅁳鴻去何許水落霜宇空􅁂短心緒長危檣曵清夢平山放脚氛埃表搔頭廣莫間淮分三代水江護六朝山落日蒼烟起秋風白鳥還歐韓呼不起髀滿􅁂毛斑勸農呈丘帥劭耕好語落西疇父老逢迎􅀏􅀧頭銷甲事農官有術賣薪沽酒我何憂黄金深椀頻傾倒白布長衫迭獻酬颯颯􅀨華隨後乗安排麥隴十分秋南樓健目畧江臯淅蔌風沙響􅁂毛草色不隨壕岸斷柳梢恰與女墻髙碧幢紅斾三邊帥羽扇綸巾一丗豪坐上捷書來獵獵官軍破賊戰方鏖挽孫謙伯二首文妙生花筆名成映雪書處家貧似冨應物宻如踈薦墨交黄綬榮光照板輿出門車折軸天理竟何如日月無多子郷􅀖失兩賢直爲吾黨慟不作丗情憐握手春風醉論心夜雨眠耳言猶歴歴何忍表君阡次繆仲右韻二首心緒千􅁝結年華一鳥過可人元自少知已不湏多咄咄君休恠嗚嗚我亦歌將軍渾健在醉尉莫誰何䆫暖楊花撲庭空燕子過年侵歡易減春惱病冝多攪涕論兵事扶頭讀凱歌日來能飲未正好醉亡何用胡衛道贈姚居士韻牢落淮南賦小山霜風容易老人顔楊瀾左蠡天垂碧夢與盟鷗共往還孫推内子挽詩玉立金閨客家人亦許清共聽秋塞柝細剔夜䆫檠娣􅃑從渠好兒􅃭得我平西風吹落葉不盡夕陽明李致逺母夫人挽詩二首有子何蕃似懸知母訓賢市賖留客酒隣貸買書錢苦過蓮心後甜囬蔗境邊一朝風木憾誰與問蒼天日與夫人子相隨􅀂弟兄羡渠猶有母使我欲無生未病思求藥方餐念遺羮此情今巳矣淚􅀨待同傾送商緫郎三首鶴唳風聲淝水捷馬騰士飽蔡州平􅀏談定取中興䇿莫道司存只餉兵霜遲斷隴蕎花白水足平田稻子紅剰把豐年供祖帳送將玉節過江東百㝷浮玉三更月萬里長江一色秋照映此心湏此水不妨小泊讀書舟挽伯父二首白髮兒隨母蒼顔弟對兄四休元易足一􅀏更何營論事􅁝弦直存心鏡面平德人今已矣誰與嗣郷評憶作行邊别相期到鶴州秋風驚過眼落日􅂴回頭華屋空遺憾佳城足逺謀無從扶柩哭揮淚􅀉江流次張亞夫喜􅀨亞夫從張林自青州到楚汴都􅁰離迷宫堧金鋪獸面秋風寒百年大義冷於鐵西湖走馬狨􅁝鞍亡秦定必三户楚况今南北皆王土紫髯青􅁂祖豫州威如迅霆惠如􅀨山東井落回生意收召驚魂髙枕睡中有虓將來青州馬蹄欲踏狼胥碎􅀖人聚觀閧塞塗和氣釀雪􅂫焦枯銀城萬里軋坤軸燭龍一色煇天衢殷殷好語傳田間雪晴又􅀨直幾錢翠麰漲天士宿飽踴躍一皷空兩甄中原宿愁無地愬歡呼從此歸王度更煩老筆爲草檄讀之㑹使頭風愈挽李漕二首翰墨多推轂功名早着鞭風行青草外春到白鹽邊老去心猶壯歸來意正便如何天不愸烟􅀨閟新阡百折溪山裏佳哉有此翁名方隨政起命已坐文窮滿眼棠隂在回頭橘隱空詩髯無復磔萬象自春風次洪漕韻二首塞垣擁雪髑髏寒多少將軍博美官莫恨知心今丗鮮湏知行道古來難時窮地狹何能舞命好天髙亦可鑚此理乗除應㑹得梅邊索酒􅀏相看和月梅花共一寒兠牟未必盡麄官醉來抱􅂰吟梁父睡起搔頭著􅀃難冨貴冰山何用􅀝功名盤石自湏鑚朔風衰草腥狐兎獵火歸鞭夾市看􅀉趙景周撫幹二首罨􅀞春樹碧逢迎繫行舟酒盡可以起更作湏􅁷留我方鶴投籠君已鷹脫韝相期在歳晏贈之􅃢瑚鉤楊柳青巳絮芍藥紅方葩詩隨去㠶東春風屬誰家音踈日月駚目短天宇賖小德最憐渠丹頰三髻丫贈洪子需二首莫恃青春兩頰紅年來我巳􅁂如蓬盤洲野處源流在早挹文名尉若翁樓􅀝晴空月滿湖一塵飛不到庭除虞􅀄九百渾髙閣且讀人間本分書口占秋風巳颯梧猶碧宿􅀨􅂊収稗亦花天着工夫供醉眼東鄰有酒不堪賖贈相者猨臂老不侯鳶肩騰上速婁羅千丈長不博一寸福送丘都承藝祖立鰲極腹心趙書記披圗􅃌幽燕翰死誰可繼異時拾空城中國坐自弊伊吾紛抵掌湏作根本計仁皇柔北夷冨公效表餌終身耻言功力辭樞宻使況今百年間未洗新亭淚平凉急㝷盟正恐廢大義中朝兩􅀃分各植漢趙幟詔書趣公歸渇欲斷羣議矯矯鸞鳯姿鼎鼎廊廟噐持心水鏡平料事􅆱蔡智天道方好還上䇿先自治折􅂨和戰間守乃萬全利西關碎其有東壘掇所棄證狀朝暮殊守亦豈易事醫國得和扁神聖工巧備囊中黄昏湯着手湏早試外禦幾邊將中權一閫制當思擇時髦不在變局勢時欲分道置制閫忠賢乃命脉公道實元氣精神以此彊可郤十萬􅀐淮南畏汲黯奉天􅀝陸䞇中興在公手一語澤百丗太山重名節鴻毛等冨貴不惟天下望是亦文定志紫樞摩斗極青藜照中祕江風駕檣烏天闊秋雨霽諸生􅀏牽衣狂語出半醉勿作醉語看嚼蠟或有味平齋文集卷第二
