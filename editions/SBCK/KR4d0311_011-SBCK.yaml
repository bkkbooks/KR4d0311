body:
  text: 箴緝熈箴并序臣月正元日皇帝陛下御大慶殿受朝朝退中出奎畫詔増􅀘講讀官夫天下之務衆矣而學爲大故二典莫先於若稽古陛下􅁭道佩德􅁤堯矩舜履端於始典學是崇豈特漢丗重席於正旦以華觀聽哉虚心遜志日再御緝熈延見儒臣峩冠垂紳魚雅就列凢皇王帝霸之所以治天地民物之所以立莫不聚辨居行以進乎罔覺臣寡陋不足以望日月之末光躐升勸誦榮燭縑簡退惟恭在責難敬在陳善輙効虞人官箴王闕謹拜手稽首裁减一篇昧死塵獻于進讀之始文詞骫骳而毣毣寸忠日以髙明光大望陛下伏惟聖慈特垂采擇其辭曰灝穹生民作之君師中立一身宗主兩儀仁在自弘敬在自約剛在自克明在自覺蓋尊莫尊於德性微莫微於道心正能養於􅀩則如泉之始逹慾不窒於損則如澤之彌深是以大學止於至善中庸必謹其獨凖繩規矩檢百爲於將動盤杅几杖収一念於未逐惟定可以澄萬化之源惟虚可以來萬善之益惟博易可以培人材之氣惟寛静可以􅁉民生之力五事乃饗帝之本九經實用丗之則關雎麟趾之意存則王政舉常棣􅁑藟之義明則天彛植此帝王所以正心而脩身齊家而治國彼惠而姣臨春昭陽豈不爾思伐德之鋩彼醲而郁糟隄肉林豈不爾思傷生之鐔况淫樂者志必荒沈湎者氣必昏前靡顧乎太華之壓後遑恤乎滄溟之翻以四海大命供方寸之侈以百丗惡名易一息之懽胡不思天命之不易王業之至艱欽哉母謂天髙厥鍳匪近相在爾室莫見乎隱母謂民卑其聽易欺鼔鍾于宫莫顯乎微故清燕而居必如駿奔在廟之頃嚮晦而息必如辨色眡朝之時所觀貴大母梏於隘所慮貴逺母局於淺母功之徼維莠驕驕母利之涸維木濯濯母名之慕而實之棄母才之尚而德之遺母任賢而貳母去邪而疑母愛直而䟽母喜正而違事母輕於舉而中畫令母易於出而遽移優游則威權遷姑息則紀綱壞牽親故之私恩則􅃜人心之公玩左右之小慧則累君德之大以至舟偏重則失平藥泛試則徒快朝不和何以和於野内未治何以治乎外是皆有國者之通患願治者之深戒於戯道自學而入治自學而出思王度於祈招知稼穡於無逸惡旨酒好善言三王四事之樞要放鄭聲逺佞人四代禮樂之根極行必力行積必眞積小臣詔讀敢告執㦸好軒箴典午稱好不與物忤其圜外方中者歟稽之三代直道則未也子斐名軒之意不可不箴人心如面醜妍異姿譽醜爲妍嫫突西施丗道如樂雅淫異曲指淫爲雅韶遜桑濮离婁師曠惟明以聦阿邑莫辨塗耳目同如好好色大學所貴懷我好音詩人取義理有攸當孰謂其誣而或反之非欺則䛕以言餂人君子不予隱惡揚善聖人所許侯魯男子善學展禽欲師德操斯軒斯箴銘可齋銘子斐佳公子篤學好脩詞葩而履方以可名齋玉堂老仙記之某贅爲作銘仕止乆速始終條理中清中權我則異是繄聖之時天地相似賢希乎聖考祥視履謟驕不作端木所喜簡以自將子桑伯子事稽厥冝不啻足矣欲進乎道尼母以柅樂而好禮如金就砥敬以行簡如弓矯矢任重致逺其謂斯士盤洲有孫玉雪蘭芷垂髫拱立一語提耳挾山超海不可則止我與聖賢相去半跬爲所可爲如詘伸指勿謂僅足稅駕旋􅁤光昭前聞銘在齋几三研銘瓦得之梓潼令端得之五羊醫子石得之天目黄冠叄銘之艮其埴坤其閾坎其洫蔡而墨之離其食金聲而方玉紺而章洸洸乎泱泱乎三代禮樂之藏割􅉳龍之膽剖玄鵬之卵霆耶風耶此其筦蠖室銘室在聞復閣衡維摩方丈五去一從半之三面禇屏闢左牖以受朝陽之光孜禪作也余爲名以蠖今二十餘年矣而閑居讀書其中似非偶然者不可不銘銘曰天地四維八尺之璣日月兩燿八尺之表中立吾身宇宙而人心統元識肧腪太極有室衡㝷此身此心如璣之斡如表之臿屏宻牖明體舒氣平其處也眇其運也杳萬古在前後千億年六合爲大微一塵芥悉受以虚不欠不餘溥通妙用縱横錯綜屈必有伸所致者神伸必有屈所養者德屈伸相生天命流行維欽厥止青山在几端齋銘王孫保之丞臨安有廉静稱與余篤相好也滿别爲言先大夫蚤以端人爲過庭訓荏冉四十餘年矣心之所存身之所履未嘗不凖於端日營一室􅍥父書其中將歸而熟讀益求所謂端者子盍爲我發焉余􅋏然有感於切磋之義遂爲之銘曰猗君子􅀆身端行莊以端爲符詔子直方義以方外内主乎敬敬勝百邪何適非正容色辭氣所貴者三日省厥身居與道參視聽言動所勿者四日用其力欲仁斯至冨貴利逹孰無是心所不可爲枉尺直㝷貧賤困苦夫豈其願所不可悔任重道逺無餒則大無欲則剛萬鍾一瓢緼􅂁繡裳太山積雪蒼松鐵色黄河怒濤􅀌峯斗立維古端人悠悠我思惟今端人尚其似之聖賢參前一室環堵母貳爾心受天之祐阮逢時澹庵銘人統氣形中涵太冲不將不迎虚静明通物誘而遷逐外忘内天理人慾彼進此退有醴其醲勢利之酣有飴其美聲色之甘飽心生疾快意起競能寡其欲自還所性盎乎春融寥乎秋清靚乎深淵汨乎大羮脫機削械未散之樸郤紛屏華可乆之約朋來斯孚匪宻匪踈事至斯應匪亟匪徐左圗右書前槐後竹明月在池白雲滿谷琴入希微詩造和平神怡體舒赫胥大庭以此事先以此燕後鄙聞而寛薄見而厚噫委命則恬任理則眞收歛則敬警省則仁方寸寜極萬象化醇味此無味名其實賔龔時俌庸齋銘顥穹生民秉彛好德本體明清實用平直耳目口鼻此性形色仁義禮智此心知識父止父道子共子職郷黨恂恂閨門翼翼是爲天常亦曰帝則無哲無愚無今無昔雞鳴而起向晦而息夏􅁑冬裘渇飲飢食順而循之如水就濕背而反之如木倒植夙夜匪懈如穎斯栗旦晝或汨如皦斯蝕秩叙諏謨信謹稽易學爲入門敬是居域無事而擾凢夫擿埴與時而中君子安宅體認要精踐守貴力行著習察有舜無跖經名而廬慈湖名其母夫人墓廬曰天經庸名而室允蹈斯義勿問元吉鶴巖銘東天目支峯曰雲鶴巖雲冒其顛輙􅀨鶴未嘗見也壬戌春群鶴見某叨奉常第己卯秋再見子有翁冠郷選夫豈偶然哉翁所居與巖直因以鶴巖自命昻昻中林􅁬爲時瑞巖瑞翁耶翁瑞巖耶銘曰天作髙山東西兩目虬潜西淵鶴盤東谷枕西之沱宅東之阿與虬委蛇與鶴婆娑鶴禀乎陽維君子性清哉伯夷浩然鄒孟鶴遊乎隂維君子居顔氏陋巷孔明草廬導陽而鳴九霄咫尺脫隂而升萬里瞬息在易後天尻坎頂離葆此純白觀象玩辭賛老人壽容賛徹也禪葆也僊静也淵全也天崔先生壽容賛清獻之清忠定之定杭海健㠶燭天老鏡白李韓柳賛壬午春行劒利萬山中乞漿野人家小憇見壁間唐人像四頗有思致扣所從來主人謂探籌得之遂售于我四君子聲名俱震燿一丗俱以事貶香山昌􅀺還爲名法從柳州竟爲蕉荔留太白且􅀐鯨不返矣中苟無媿讎我者豈能終病之少餒焉好我者不能翼而􅁬也人耶天耶戊子夏五西市􅁀梅因太息爲之賛忠南夜郎零陵潮陽地何凉凉人何堂堂如星在天垂精耀芒隕而爲石桀立不僵如水行地茫乎望洋激而之山歕薄淋浪不縮不張不軋不揚繄人之鬰斯天之昌理有消息時有通塞禍同福殊剛柔異則柔必有麗剛能自植剛窮斯返柔窮愈窒否終則傾屯終則泣剥終碩果坎終叢􅁄士寜剛躓母坐柔踣吾以四子占終於易東山渡水布袋賛半進半退是􅇢是礙且請老師放下布袋蜀繡轉經觀音賛觀丗間音非丗間音非丗間音觀丗間音咦一卷旁行􅀟􅀧􅃮無人識得老婆心昭君賛彼姝者子丰􅀆孌􅀆懷我好音􅀖之媛􅀆今夕何夕而恍此見􅀆雖然賢賢易色可也莫愁賛美目盻􅀆清揚婉􅀆悠悠我思室而逺􅀆還予授子之粲􅀆雖然好德如好色可也鍾冠之出山佛賛聞何法來爲何事岀放妙光明作大饒益題子馨弟􅀉容髯星星而氣􅃾眉垂垂而意舒易足而寡求危坐而深居此吾家之少游㓜輿也聽風雨於對床約雲山之卜廬朝奉親而撰屨夕課兒而讀書吾其歸乎雜文兩漢詔令緫論自典謨訓誥誓命之書不作兩漢之制最爲近古一曰䇿書其文曰維某年月日二曰制書其文曰制詔三公三曰詔書其文曰告某官如故事四曰誡勑其文曰有詔勑某官此其凢也䇿有制䇿詔䇿親䇿勑有詔勑璽勑宻勑書有䇿書璽書手書權書赫蹏書詔有制詔親詔宻詔特詔優詔中詔清詔手筆下詔遺詔令有下令著令挈令及令甲令乙令丙諭有口諭風諭譙諭宥罪有赦訓諸王有誥召天下兵有羽檄要詰有誓約延拜有賛以致有報有賜有問有詰又有手迹手記詔記其曰恩澤詔書寛大詔書一切詔書及哀痛之詔隨事名之此其目也䇿命簡長二尺短者半之以􅂐書罷免用尺一木兩行以􅀠書遺單于書牘以尺一寸選舉召拜亦書之尺一板古今􅂐􅀠文體曰鶴頭書與偃波書俱詔板所用在漢則謂之尺一簡詔書有眞草又有案案者冩詔之文一扎十行細書以賜方國扎牒也孟康曰漢􅀄有三璽蔡邕獨斷曰天子六璽皆白玉螭虎紐輿地志曰漢封詔璽用武都紫泥故制詔皆璽封尚書令印重封唯赦贖令司徒印露布州郡詔記緑綈方厎用御史中丞印通官文書不著姓司􅀠詣尚書封胡降檄著姓非故事詔書皂囊施檢報書緑囊宻詔或衣帶間丹書藏之石室策書藏之金匱此其制也漢丗代言未設官王言作命厥意猶古而討論潤色亦間有其人髙后令大謁者張澤報單于嫚書淮南王安善文辭武帝每爲報書及賜常召司馬相如視草光武荅北匈奴藁草司徒􅁺班彪所上至永寧中陳忠謂尚書出納帝命爲王喉舌諸郎鮮有雅材每爲詔文轉相求訪且辭多鄙固遂薦周興爲尚書郎秦少府吏四人在殿中主發書謂之尚書漢因之武昭以後稍重張安丗以善書給事尚書囊簮筆事武帝數十年後漢始置尚書郎三十六人主作文書起草月賜赤管大筆隃麋墨此其造命之原也詔御史大夫下相國相國下諸侯王御史中執法下郡守制下御史御史大夫下丞相丞相下中二千石二千石下郡太守諸侯丞相從事下當用者如律令郡國長史上計丞相御史記室大音讀勑畢遣以詔書部刺史奉詔條察州所察母過六條守令則承流宣化使田里咸知上意此其奉行之序也君能制命爲義臣能承命爲信君不能以義制命則無以使人心丕應惟命之承故夫夜下詔書決之亟也甲寅書報應之疾也母下所賜書幾事宻也封還詔書渙號不容於輕出也更報單于書辭令不嫌於修飾也六月甲子詔書非赦令皆蠲除之雖反汗猶愈於遂非而稔惑也有司母得言赦前事所以示民信也䇿書泰深痛切君子作文爲賢者諱所貴乎體之識也昧死奏故事詔書二十三事所重乎祖宗良法美意之得也璽書封小詔書獨下抑不可不慮其賈疑而召激也案尚書大行無遺詔詔書獨臧嬰家及安得詔書封三子事姦隱於倉卒詐售於危疑尤有國者所當謹察而不可忽也知此則知所以造命知所以造命則知所以奉行矣然有不敢奉詔者有期期不奉詔者有以死争不奉詔者有詔數彊予然後奉詔者猶或許之蓋所以養士氣也若其奉行不䖍則有常刑故廉問不如吾詔者以重論敢有議詔不如詔者皆腰斬詐詔者當棄市格詔者亦當棄市矯制者腰斬誤宣詔者應罰金令下腹誹者論死誹謗聖制者當族謂詔書不可用者丞相御史劾之無承用詔書意者御史奏之而奉詔不謹者皆坐以不敬丞相􅀍䇿書則歩出司農發詔書則鳴皷其嚴如此當時猶不能盡然始而奉詔不勤終而遏絶詔命始而撟䖍終而擅詔以至詐下詔書詐作詔板僞作璽書假爲䇿自書詔以授廉級陵夷紀綱板蕩而國命之柄移大抵外戚宦官之禍闔闥稱制實肧胎之有天下者可不鑒哉按藝文志儒家髙祖傳十三篇髙帝與大臣述古諭及詔䇿文帝傳十一篇文帝所稱及詔䇿當時㑹稡蓋有其書遷固必采取諸此先漢詔遷多以上曰書固間因之一詔或二三出詳略及用字亦有不同疑不能無刪潤髙帝未即位遷不書詔惟重祠敬􅀕詔見封禪書景帝紀遷不書詔其議太宗廟樂舞制詔附見文帝紀文帝於陳武等議謂且無議軍見於律書當亦是詔固不書後漢詔有以東觀漢記漢名臣奏等書見於注其改詔爲制爲誥或謂避武后諱丗祖官王閎子詔附見董賢傳曄書逸之大氐史遷所筆皆有深意固文贍而意不逮曄則文亦不逮乎固矣某假守龍陽俗古事簡因得縱觀三史裒其所謂詔制書䇿令勑諭報誓約之成章者凢若干通事著其略毎帝以臆見繫之􅁵爲若干卷揔曰兩漢詔令以􅀘續書之亡欲觀漢治者當有考於斯文八陣圗說庚辰秋余以太少贅丞入蜀天台許才甫偕行小至後維舟魚復灘下散䇿同訪武侯之遺跡霜風凛晴寒浦縮潦平沙壘石歴歴可數知其原信出於易八陣魁六十有四重易之卦也却月魁二十有四作易之畫也畫起於圎而神故却月之形圎卦定於方以知故八陣之體方方居前而圎居後卦自畫始方自圎生也壁門直袤曲折翼其旁則隂陽二物握竒則有虚一之象焉丗之言風后握竒經者徒知四爲正四爲竒餘竒爲握竒又徒知數有九中心零者大將握之而不知握之在何地余記歩入八陣深處細視魁間平沙之上沙隱起如兩大帶直袤曲折具壁門之體而微竚立環睨正居衆魁之心而虚其中餘竒所握其在兹乎况壁門東向歸峽此則其門西向涪萬出機入機又有不可測識之妙江流湯湯歳月浩渺彼石所壘不爲衝波怒濤轉移巳非人力所及此特微沙相屬亦爾儼然如新抑異矣武侯之忠上貫三極下洞萬古山靈川祇所以護存至此正欲後丗即其虚實向背推見至隱而知侯之用心談古者按圗而不及暏訪古者撫境而不及察往往能言八陣之異同而大將中握遊軍外布曽莫得其指要余每爲之太息才甫出蜀今十年考訂圗說用力乆而功深天機地軸搜抉呈露莫不精確而有據依其於壁門之設先出遊軍定兩端尤得諸賢未發之藴展卷熟覽恍然如對鹽甲因發握竒居中之義以表裏之且詡吾賔主西征之不爲徒行也漢磚考三代墓中欵識用銅偃師比干墓銅槃是也漢銅禁嚴始易以磚至晉唐亦間用磚潜人耕鑿多獲晉磚紹定已丑秋校長謝濟叔源治墓東塢得漢磚七十六面橅脫螭虎文隱起上下爲字十有四曰元康元年太歳在丙辰何遒貞立墓去今千二百九十四年矣案史記歴書用太􅀄暦太􅀄元年歳在焉逢攝提格甲寅也元康元年尚章大荒落則癸已漢律歴志用三統暦太初元年歳在星紀婺女名困敦乃丙子也推至元康元年則丁已惟通監舉要暦與磚合磚其年造志後來追書以磚證志當是元封六年冬改元用夏正建亥以後猶丙子建寅即丁丑越四十年至元康􅀄元爲丙辰也或疑遒爲􅙤貞爲正謂漢仍周官置酒正周禮酒正注􅙤音糟又子由反固不爲無據然周漢官名有酒正宫正軍正宗正皆爲正不爲貞若月令大酋是秦官正避政爲貞則秦紀注正月爲征不爲貞漢􅀠之遶或從三􅀧兼遒字下畫稍長非􅙤明甚􅀠法用筆上出下鈎故與從艸􅀋其實名遒字貞立也遒與貞立義頗相關以􅙤貞爲酒正鑿矣塼徑一尺五寸廣五寸半髙二寸叔源以二見餉因考之勸農文龍陽萬山環合控引氐隴去朝廷無慮七千里聖天子仁不異逺俾太守自東南來牧是􅀖太守山中人也熟知爾父老安於山爲可樂然地勢峭隘土脉磽瘠非刀莫耕非火莫種細民終歳勤動不得一飽至煉以續朝夕亦良苦矣故不患爾農之不力而患乎爾農之蠧夏熟秋成公租私債未暇問長于􅂄保者取之胥于邑里者取之雄于閭黨者取之􅀠于坊場河渡者取之召集有定期裒歛有定數怒攘􅀏攫不厭不止其獲登于爾瓦釡土鉶有幾此農所以重苦也太守以牧養細民爲職爾無患所以蠧爾者而益力于農冬至元正晴和臈未盡一日得雪立春開霽其占爲豐年于耜舉趾母後爾時深耕易耨母愛爾力母徇小利逐末母肆小忿啓争以荒爾業天時旣順人事又力冝爾百榖穰穰有秋雞豚燕社歡浹隣里仰事俯育優游卒歳又家推其秀子弟使力于學孝悌修明風俗淳古太守與爾父老同此樂也可不勉諸大人里居上梁文天目山前兩乳拱帝王都玉川城裏數間占神仙府規摹仍舊氣象増新谷隱老人萬事任縁一生守分焚香讀易老去之意已消把酒賦詩醉來之興不淺雖烟雲自足於别墅而風􅀨不堪於敝廬乆懷問舎之心忽有肯堂之請拔貧作冨搜材􅂎梓之林培下就髙拓址蘭荃之圃門前流水屋上青山可容髙車駟馬之歸可受玉帶金魚之謁脩梁肇舉好語讙傳東家近祥雲杳靄紅千古溪山鍾秀氣一庭梧竹貯春風南水轉山回護蔚藍客有可人來剥啄掃花藉草共春酣西夭矯晴虹臥碧溪脚力好山俱不盡朝來佳氣與雲齊北飛簷正與琁杓直槐邊消息我先知橘裏風光誰解識上積善有根天所相黄庭誦徧晝隂閑十二行􅩲春盎盎下老來倦學樊遲稼大兒鉏耨小兒耘萬頃心田収􅛉稏伏願上梁之後上慈下順内肅外雍里社歡聲之交暢門庭慶事之常逢丹桂孫枝不断讀書之種蒼松老榦長存好德之容䟽普信院重建佛殿䟽錦繡名山鳯鸞拱揖旃檀古刹龍象莊嚴幾年安住道場一旦幻成魔境無量華樓閣謂與法身化身報身而俱存推落大火坑乃至牛車羊車鹿車而莫救勢炎炙手禍烈焦頭固知我佛欲放大光明其柰􅈛時自墮熱惱苦風幡安在露柱俱空給􅀌園千二百五十人赤躶躶以相顧毗盧藏五千四十八卷令嵬嵬而獨存幸死􅁅中餘生意在有能出一臂力便可成七寳林兠率宫天上移來妙勝殿人間示現證無漏果歸有福人朱陀寳福院鍾樓䟽華鍾鯨吼欲喚醒不識暁夜人老簴螭拏尚掛在莫庇風日處蘭若之規摹古矣蒲牢之氣象䬃然要令聲外求聲直湏屋上架屋夜义木硬立脚起飛跂雲霄金剛杵輕着手撞震動山嶽勿道爲髙力士布施且請與朱頭陀結縁寂照寺佛殿䟽菩薩福德智慧十種宫政自光明圎滿如來摩尼清浄一切殿亦湏殊勝莊嚴睠我鳯凰山着此獅子座星霜荏苒風􅀨侵凌左方撑而右欹東未􅀘而西漏瞿曇彌勒巳是頂門撞破虚空迦葉阿難未必脚跟踏着實地屢舉頭而太息欲􅁬臂以更張仗衆福縁成妙法界古潜州三十六蘭若雄占上游舎衛城千二百比丘同祝聖壽平齋文集卷第十一
