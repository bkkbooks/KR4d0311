body:
  text: 奏狀復官申省狀辛卯今月二十二日凖尚書省劄子勘㑹某昨因臣僚論列乆掛責籍累經赦宥今又該遇慶壽霈恩合議指揮七月十六日奉聖旨洪某特與叙復元官仍與宫觀伏念某曩以狂愚自速罪戾遭逢大慶􅀩􅀍寛恩特還舊階仍賦優􅅒仰戴天地生成之造所有省劄除巳於當日望闕謝恩祗受外湏至申聞者禮部郎官辭免申省狀癸巳十月今月十八日恭凖尚書省劄子備奉聖旨洪某除禮部郎官成命肇頒危􅂨震愓伏念某曩以狂瞽自干譴何去國巳閱於九年奉祠且及於兩歳委心丘壑絶望班行不圗大明昭掲之辰亦與衆正彚征之㑹沉淪吐氣俛仰知榮第惟司馬位冡宰之􅀄蘇軾􅀍儀曹之召詎容是選猥及非材欲望朝廷特賜敷奏改􅂌在外合入小小差遣以養偏親實出生成之造所有省劄見􅀉留臨安縣庫未敢祗受謹具申尚書省乞賜敷奏伏候指揮辭免除監察御史申省狀右某今月二十九日凖尚書省劄子三省同奉御筆洪某除監察御史日下供職者恩榮自天兢懼無地􅀼以公議國家之命脉人材朝廷之精神方其未出則望之如景星如鳯凰及其旣用則􅀝之爲屈軼爲獬豸元祐王巖叟之召明道范仲淹之來繄時所推皆此其選皇上養晦於十年之乆天下望治於踰月之間轉機括以作新厲搢紳而更始紀綱所繫風憲可輕如某者積困窮途甫還舊著學問不足以窺王猷之逺議論不足以扶國是之公首玷親除必速官謗况未嘗作縣難以入臺欲望朝廷特賜敷奏収非常之誤渥􅂌有望之時髦庶使危蹤少安微分所有省劄某未敢祗受謹具申尚書省伏候指揮辭免殿中侍御史申省狀甲午四月右某今月十五日凖尚書省劄子節文三省同奉御筆洪某除殿中侍御史日下供職者渙􅆒異渥震愓危􅂨竊惟柱後惠文之官尤重殿中執法之選職修明於國是用整肅於朝綱粤從琴瑟之更張􅀋多矛盾之並立邊帥之或和或戰正值兩強廷臣之孰是孰非必求一勝决治亂安危之勢觀抑揚進退之機疇副臺端盍掄時望如某者誤䝉蒐抜濫厠紏繩謂車當主於可行何人心之擾擾而舟必無於偏重乃王道之平平方包不稱之羞忽冒非常之擢周旋烏府供奉赤墀純仁之内出姓名固誓圗於美報唐介之願解言職正恐􅀒於隆知欲望朝廷特賜敷奏光摩日月别求䕫龍接武之英威厲風霜庶折犲狼當道之氣所有省劄某未敢祗受謹具申尚書省伏候指揮第二次辭免右某昨凖尚書省劄子節文三省同奉御筆洪某除殿中侍御史日下供職於當日具狀辭免今月十六日凖尚書省劄子備奉聖旨不允者聞命知榮感恩思􅁬官卑不當再具辭免事有上關國體難以黽勉供職蓋縁近者一再論奏邊事與外閫異同諸將方鳴劒皷行而前少有疑情必妨大計欲望朝廷念中外相應之理力賜敷奏改􅂌某閑慢差遣邊臣聞之亦將踴躍赴功而無後顧一進退間足強國勢某下情不任懇切之至謹具申尚書省伏候指揮辭免中書舎人申省狀右某今月二十八日凖尚書省劄子三省同奉衘筆洪某除中書舎人挾日再遷寸􅂨積悸伏念某賦資至陋遇事最踈甫叨赤墀供奉之官遽劾烏臺分察之士冝加誅斥廼􅀍襃除矧討論欲貴於皇猷而封駁亦關於國論詎容冒處自速煩言欲望朝廷特賜敷奏収􅁝綸之新渥􅂌香火之叢祠所有省劄某未敢祗受第二辭免狀右某昨凖尚書省劄子三省同奉御筆洪某除中書舎人某於當日具狀辭免今月二十九日凖尚書省劄子備奉聖旨不允者某控辭誤渥尚閟俞音恩重命輕不當再具免櫝重念某九年流落一旦遭逢自郎分察執法殿中曽未踰旬忽塵詞掖聖上更新萬化収召衆正􅀩􅀍寵眷未有某之比者况判花演誥儒生至榮豈不願發揚九重厲精更始之意使百工砥礪以承休德而某瓶甖噐溢潢潦源枯儻華要之冒居必顛隮之立見欲望朝廷力賜敷奏亟収成命特賦叢祠或􅀩矜念係是招徠一人之數改授斗壘以慰偏親實出望表所有省劄未敢祗受辭免兼同修國史實録院同修撰奏右臣今月二十六日凖尚書省劄子三省同奉聖旨洪某兼同修國史兼實録院同修撰者專官演誥甫玷討論分職紬書忽參譔次􅀩恩舄奕揣分屏營竊㠯典謨所以記言春秋所以斷事六經不作三史相承馬遷辨而不華猶坐是非之謬班固詳而有體尚譏仁義之輕迨其下之紛紛徒傳之譾譾矧今脩明三館之制揚厲累朝之休在國史則紀傳表志之纂裁在實録則日月時年之編繫欲成萬丗之典冝得三長之材豈臣斐狂可賛筆削伏望皇帝陛下亟収寵渥别􅂌譽髦必漬墨之得人庶汗青之有日所有恩命臣未敢祗受乞祠奏右臣藐然踈庸乆坐罪斥皇帝陛下更新萬化登崇衆正誤􅀩簡記首預収召爲郎甫旬而分察分察數月而執法執法踰旬而代言㝷兼史館仍理還磨勘歴觀廷紳未有叨竊若臣之甚者遭時遇主冝圗報稱而性禀狷介學術迀拙但知以竭慮爲忠不計以直情爲激天涵地育未賜譴何揆之進退之􅁩出臺便當引去貪戀芻豆黽勉至今廉耻道䘮朝夕芒􅀒况當衆賢和於朝之時獨累皇極之治隆寛不誅公議莫貸欲望聖慈特賜祠廪俾歸求君子時中之學以備異時噐使實戴終始生成之造謹録奏聞伏候勑旨再乞􅀘外申省狀照對某昨具狀奏陳乞賦祠􅅒今月十六日凖尚書省劄子備奉聖旨不允某􅀩恩優異揣分賤微不當再有陳請兼區區肝臆巳盡敷控前狀不敢更有陳述惟是某叨第三十有三年除奉祠外未及十考四年蜀道父親以逺不克往前後就養僅五六年閑居積乆菽水不給遭逢聖朝録用其不肖子目睹恩榮踴躍自慶今春秋七十有六每以足跡未到江湖爲不滿年當喜懼急於養志欲望朝廷念人子事親之日短特賜敷奏陶鎔某一小小合入差遣俾獲迎侍官遊以娛晚景實爲孝治錫􅀋之仁湏至申聞者辭免兼權吏部侍郎申省狀右某今月􅀄九日凖尚書省劄子三省同奉聖旨洪某兼權吏部侍郎􅀩恩便蕃聞命兢惕􅀼以詞垣四禁稽緩爲先選部三銓繁劇尤甚專掌尚虞於弗曁兼官必至於多違伏念某學問空踈材識譾陋領内史之職舉乎一而未能參小宰之聮共其二以何有雖代庖而越爼將毁瓦而畫墁欲望朝廷特賜敷奏念御馬不容於窮力而牧羊每患於多岐俾塵舊官亟寢新命少安愚分實戴隆私所有省劄某未敢祗受病乞􅀘外奏右臣􅀼惟窮則呼天疾痛則呼父母方臣頻年擯退窮莫之恤陛下更新萬化不待呼天首加蒐拔自閑外爲禮部郎如蘇軾不作縣爲御史如周必大以殿中執法出臺而陞詞掖如張震還乆廢之磨勘如胡銓又渉筆史館攝組銓曹曽未逾年徧歴華要遭時遇主若此豈不願周旋衆正之㑹少効千慮之愚而臣分量易盈災蹇踵至悼亡未幾忽得竒疾癰生上齶數醫更療累旬未愈痛連牙頰飲食减少形骸雖具氣液潜泄斯皆素餐無􅀘朶頥不節之所由致君父以體群臣爲心有疾痛而不呼是爲欺隱欲望聖慈察臣知事君之􅁩而非㓗身有垂白之親而非輕禄俯憐實病􅀄非飾詞特􅂌在外待闕差遣還家將理或可痊愈實戴天地父母生全之恩謹録奏聞伏候勑旨辭免兼直學士院奏乙未右臣今月十五日凖尚書省劄子三省同奉御筆洪某兼直學士院自天渙寵控地包羞伏念臣乆困投閑適逢更化市駿骨以致千里馬方共興於斯文剖大瓠以爲五石樽獨無􅀘於當丗越從言責猥玷從班危蹤坐􅅬口之愆竒疾示朶頥之戒精神銷鑠翰墨荒蕪屢懇請於一麾忽進兼於兩制􅀒且乗而知懼服不稱以貽譏伏望皇帝陛下察臣􅀌陋而寡聞憐臣早衰而多病俾從外􅀘免冒中除庶幾少安斗筲之分所有恩命臣未敢祗受辭免兼侍講奏右臣凖尚書省劄子今月十八日三省同奉御筆洪某兼侍講者疊􅀍寵私彌深榮懼伏念臣力耕有素渉獵無多文淪巫史之微道昧聖經之奥頃叨召對拱聽訓辭首明宣光綜攬之方繼論羲文經綸之旨退深慙於謏聞難仰􅉥於清光政虞汙玉堂之廬忽俾侍金華之席丘學山而莫及蠡測海以奚堪伏望皇朝俯垂英鑒肆别求於鴻碩容自蓋於空踈所有恩命臣未敢祗受經筵乞祠奏臣蕞爾庸陋饕榮過分朶頥致疾經年不愈嘗控祠壘之請邇來病證轉劇又再控祠請天聽遼邈未賜俞允臣非不知陛下待士之厚接下之周當仰體眷遇力疾自効又非不知所領職事備極清華有名儒終身企望而不得爲者印纍綬若榮耀偏親豈應自取閑退維臣噐量淺狹病根深固若一意營進不思還家休養形􅤕神離溘先朝露此身永􅀒君親之恩矣扶憊經筵祈憐宸扆欲望聖慈亟賜從欲俾収朝蹟歸佚叢祠息心將理容可痊愈凢未正首丘之日皆駿奔王事之時中庸九經曰體群臣陛下蓋深得之故敢􅈼天請命臣下情無任迫切之至取進止辭免除吏部侍郎兼給事中奏右臣今月十日凖尚書省劄子三省同奉御筆洪某除吏部侍郎兼給事中日下供職者渙綸舄奕震魄正營臣竊以銓省者人材之權衡􅃈闥者國是之綱紀裴行儉以知人之鑒顯張元素以回天之力稱匪得譽髦􅂚當妙選如臣者背時渫辱遇主光榮鳯掖代言兼儤鑾坡之直虎門勸講仍紬石室之藏井不可以汲深弊車尤難於任重譾焉溢量竒甚纒痾屢退乞於叢祠忽進聮於法從貳題才而旣重參批敕以尤嚴求閑獲遷服寵知懼欲望皇帝陛下官必懋德噐母假人念輔頰欲穿莫稱論思之職而精神已索難居閱讀之司母拘反汗之嫌特徇祝􅁵之請用安愚分庶保危蹤所有恩命臣未敢祗受再辭免奏右臣昨凖尚書省劄子三省同奉御筆洪某除吏部侍郎兼給事中日下供職臣具奏辭免拾肆日恭凖詔不允者寵命便蕃嘗伸控避綸言温厚未賜矜俞在微臣不當更有懇陳而公議詎容弗加祗畏靖惟弱質乆苦沉痾期息影於一祠致􅄋忱於九䟽兹􅀩誤渥更越常倫無清通之鑒而爲小宰之眞無􅀌特之操而兼夕郎之重聮翩六組照映一時方退處之力祈乃進陞之狎至將疑矯僞必速顛危伏望皇帝陛下俯矜病悴之深亟寢恩榮之茂俾叨閑􅅒免玷華塗緑給事中不容虚職除已權冝一面閱讀外所有恩命臣實未敢祗受辭免除給事中奏丙申正月右臣今月􅀄一日凖尚書省劄子三省同奉御筆洪某除給事中日下供職兼職依舊者自天錫命無地措躬臣竊惟朝廷命令之出在中書則許舎人封還在門下則許給事中審駁尚書旣奉行矣又許臺諌論列皆所以扶植紀綱而維國勢皇帝陛下親政日勤責治日切方一新臺諌舎人之選搢紳想望其風采給事中冝得漢魏相唐李藩者流以紏正違失顧以寵臣臣頃貳選部嘗攝承􅃈闥批敕無夕郎之風論事乏回天之力正虞幽黜敢冒真除矧當元㑹之辰爵人於朝而使彼其之子不稱其服先之公議謂何伏望聖慈念左省實喉舌之司名噐非假人之具博選一丗豪雋有風力者俾專省閱容臣姑仍東銓徐丐閑廪以全陳力不能之􅁩所有恩命臣未敢祗受再辭免奏右臣昨凖尚書省劄子三省同奉御筆洪某除給事中日下供職兼職依舊臣具奏辭免今月􅀄五日恭凖詔不允者訓辭温厚德意丁寧螻蟻微臣所當即祗成命第自濫吹朝列以來􅀩􅀍隆知夐無倫比而福薄噐狹苦竒疾者一年有半寢食俱妨老形畢具方圗再理祠請夕拜真除從天而下俯伏自揣榮懼交集蓋命令喉衿之地精神枯涸則省閱有違見志氣銷耎則封駁無彊力鸞臺廢職自臣養痾始臣將何所逃罪欲望聖慈爲官擇人以振起朝廷之綱紀収還誤渥俾免顛隮實戴乾坤之造所有恩命臣未敢祗受辭免兼侍讀奏右臣今月􅀄三日凖尚書省劄子正月􅀄一日三省同奉御筆洪某兼侍讀者便蕃䟽渥懾讋交懷臣竊惟上聖以典學爲功諸儒以詔媺爲職執經並列勸讀尤嚴間嘗起舊弼於内祠今亦進􅂄英於書殿必深於道乃稱厥官如臣者猥繇法從之聮濫厠細氊之講懷鈆無得呻畢何禆屬月正元日之臨盛春王三朝之㑹首叨榮於􅃈闥仍陟寵於金華四象八卦之陳未知源委五典三墳之誦􅂚効㳙埃儻兼取於熊魚必重譏於鶉特伏望皇帝陛下充能自得師之妙廣佛時仔肩之公察臣潢潦之易除矜臣丘垤之難進俾安舊序别選名流所有恩命臣未敢祗受乞叢祠奏右臣竊惟體群臣者人君之大經尸寵利者人臣之大戒君體臣而閔其情臣事君而致其義斯合乎進退出處之冝矣臣恭遇陛下親事法宫之始拔擢於留落之餘清塗要轍再歳幾徧廼正月􅀄吉首叨宸筆進陞銀臺金華之峻至榮至耀群臣莫能􅉥及臣亦罔知上膺睿睠之繇序髙而􅀑瞰量盈而神害宿恙加進竒證迭出齒頰浮腫面目可憎雖包羞茹痛牽強應酬寢食俱妨形神不接反覆自揣詎容尚玷班綴臣非不知去歳以乆病冝去屢䟽塵瀆面􅀩聖訓諭留如待鴻儒宿德所當國爾忘身少圗報稱而災迍迫逐無一日寧若更貪戀寵利尸素養疢則是進乏獻替之益旣仰􅀒於殊奬退失廉耻之節復上累於隆知將何所容身宇宙之間欲望聖慈念臣形證皆陛下之所目擊特推體群臣之意賦以叢祠還家將理俟病少間容續次陳乞斗壘勉効民庸頂乾踵坤不外履育臣下情無任祈天請命之至謹録奏聞伏候勑旨辭免除翰林學士知制誥奏右臣今月二十四日凖省劄三省同奉御筆洪某除翰林學士知制誥兼職依舊者内制䟽榮中􅁭襲懼伏念臣山林樸朽場屋腐陳出逢日月清明之􅀄進立雲漢昭回之下自濫竽於西掖仍越爼於北扉狹量超踰竒痾間作方祠櫝聮翩之上徹忽除書煥爛之中敷蠲塗歸之煩陞儤直之峻駑駘千里斥鷃九霄荒虚不稱於摛文羸頓尤難於就職伏望皇帝陛下察臣饕寵爲巳劇祈閑爲巳多特詔大臣檢㑹前後奏申賦以香火之廪博選歐蘇増重鼇禁庶幾詔令有古風烈而名噐不至假人所有恩命臣未敢祗受再辭免奏右臣昨凖省劄三省同奉御筆洪某除翰林學士知制誥兼職依舊臣具奏辭免四月二十九日恭凖詔不允續凖省劄備奉聖旨陞兼修國史兼實録院修撰者臣竊惟正天下之動莫如給事中鼓天下之動莫如翰林學士繇唐以來俱號妙選學士尤爲貴重自非風裁峻㓗文詞爾雅􅀒王佐噐略罕有疊踐二職之眞者臣批敕乏李藩之風力草詔無陸贄之法度誤􅀩聖擢正序􅃈闈甫閱十旬即專内命仍勸金華之誦讀進陞石室之纂修變化而嬗未有速於臣者天施地生榮􅀍萬象蟲鳴螽躍莫知稱塞兼自濫吹東曹以來苦病丐祠䟽至六七今乃於委惙之中叨深嚴之選而扶病就職爲給事中則求去爲學士則留是舎魚而取熊掌也何以爲出處之義用是傴俯控陳不嫌再瀆伏望皇帝陛下察巳試之罔功矜不能之冝止俯從所欲特與祠廟差遣一次庶免以進爲退上玷公議所有恩命臣未敢祗受第三次辭免申省狀右某昨凖省劄三省同奉御筆洪某除翰林學士知制誥兼職依舊某嘗再具奏辭免今月􅀄三日凖省劄備奉聖旨依已降詔不允不得再有陳請者某重惟神宗朝首擢司馬光翰林學士以不能四六辭其後王安石除知制誥自此不復辭官光非不能四六安石非慕官爵者辭受之間各有深意某待罪夕拜驟領詞􅁐材不稱官病不任事在義當去昭如白日累䟽祈免非有他也而俞音猶閟况今文詞之長不無其人趙汝談之古㓗呉泳之典麗眞德秀無恙時甚推賞之内之陳􅂄卿應㒡外之呉潜李劉陳塤參合輿論皆可次第而當妙選某老矣病矣眢井不可汲矣欲望朝廷特賜敷奏改􅂌香火之􅅒擁北門視草之名㝷西崦投閑之迹雖即首丘百丗有餘榮也所有恩命某未敢祗受乞檢㑹八次奏申特􅂌閑􅅒奏右臣自歳旦􅀩恩拔擢待罪􅃈闈宿量坌盈沉痾日進連上五䟽丐祠未􅀩俞允間又叨詞􅁐之命三控免櫝天聽愈髙旬日以來昏昏常如醉人四肢浮腫百骸酸碎氣息迫促生意一綫欲望聖慈詔有司檢㑹前後八次奏申特􅂌閑􅅒庶幾早還故山杜門謝事或可攝理易曰拘係之乃從維之詩曰縶之維之以永今朝陛下方此藂天下之賢而無容輕去者如臣窳陋亦在縶維之列命之逢也貴賤有常夭壽不貳臣之去也亦命之不可過也謹録奏聞伏候勑旨辭免除端明殿學士在京宫觀奏右臣今月十九日凖尚書省劄子三省同奉御筆洪某除端明殿學士在京宫觀者臣聞名噐者君道之所甚重分量者臣道之所當安臣􅀩􅀍聖眷超絶周行多病早衰屢嘗丐去俞音未報除目又攽天道􅃜盈眷愈厚除愈峻而病愈進病愈進而留愈篤正序禁林一草未視叨華書殿且領京祠非􅂄儒宿德而兼取之晉如鼫䑕正厲臣之謂也欲望聖慈念猿鳥冝歸於山林之中鷗騖徒多於江湖之上収還成命俾返故廬銜戴天恩生死肉骨以之所有恩命臣未敢祗受再辭免奏右臣昨凖尚書省劄子三省同奉御筆洪某除端明殿學士在京宫觀臣具奏辭免今月二十五日恭凖詔不允又凖尚書省劄子備奉聖旨仍舊兼修國史兼實録院修撰兼侍讀者臣竊惟端殿之穹崇内祠之優佚經筵史館之清顯望不輕屬恩無妄施親覽政柄以來崔與之之難進易退李􅐉之博物洽聞皆以􅂄儒當此殊禮臣實何人病且死矣乃使接迹二賢之後續貂奚益諉鶴是懼祠請屢陳俞音尚閟欲望聖慈憐臣乆病不差察臣眞情不欺収還上件誤渥特􅂌在外一祠以養殘喘以待驅馳所有恩命臣未敢祗受乞將慶典一官改賜父親銀緋申省狀凖尚書省劄子洪某該遇昨來慶典赦文轉一官並不曽陳乞轉行十月二十二日奉聖旨特與轉行伏念臣脫身淹滯遭丗盛明巳􅀩優恩理還積年閑廢磨勘官至正郎此來又􅀩特旨轉行塵竊過分莫遑寧處惟是父親􅃏甘貧無營教忠有訓春秋今七十有七雖累經恩封見通直郎致仕服緑􅂊及十一年該賜章服之日尚逺喜懼交至人子至情照得紹興中太常博士張九成乞以磨勘一官與父伸賜五品服朝廷從之某輙援上項事例欲將慶典轉行一官恩命乞與父親某改賜銀緋伏望朝廷敷奏特賜從欲用爲就養之榮式昭錫􅀋之孝湏至申聞者小貼子照㑹某父親某昨以某在責降中不敢陳乞慶典轉一官恩例欲乞朝廷併賜指揮平齋文集卷第十二
