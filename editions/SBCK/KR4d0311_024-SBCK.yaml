body:
  text: 啓一謁莊提舉啓鐵硯􅀜心莫續盤洲之脉繡衣具眼好開泮水之荒雖離竒了無先事之容而啐啄或有同時之理不􅀌此志端繫其逢昔者東坡之門卓然北斗之望惟斯文之宗主在是故當丗之豪傑歸之后山仕徐嘗賦稻苗待公秧之句山谷游魏亦哦小草有逺志之詩皆繇郡文學之官自附墨客卿之列品題一岀聲價倍増四學士之名等華嶽而俱重六君子之選與日星而並垂此風無傳吾道誰屬必宗工之繼作則善􅀋之争趍伏念某骨相蹣􅘐性資骯髒悲歌長鋏盾鼻之檄未能活計短檠床頭之易猶在颯重闈之白髪峭獨冷之青衫訪三洪於故國之中拜一范於公堂之上湖山醒夢何嫌書􅂴讀之嘲山色療飢敢爲飯不足之歎顧此游之不惡知其命之將通恭惟某官吾儒津梁斯丗鼎吕辟雍講道激􅀭洙泗之波祕府紬書排戞蓬萊之氣胡斜飛而背日肯夙駕以觀風以􅅐中之鏡而照老吏之百姦以肘後之方而起疲氓之九死且力扶於公議每樂得於英髦有覬賞音遂忘躍冶僖公六轡九頓首於先驅惠子五車一􅀧頭於後覺歸依良切敷染奚殫謝葉提刑薦啓泮水思樂熟觀魯侯之旂舞雩詠歸首與曽􅀧之瑟孰蚍蜉之借援自蜾臝之投機引而進之望不及此􅀼以古靈之藁莫匪名臣温公之門􅀋多君子惟相知不在肝鬲之表故一見盡得眉睫之間信公道之主盟乃人材之司命如某者拊􅇲不韻挈瓶無竒遇㑹意之文時擬景福靈光之賦求安心之法日對布衾陋室之銘羞褦襶以不為任揶揄而弗顧正請老農之學忽求病躄之師抵掌而談古今千歳可坐致也屈指而計日月期年尚􅀼遲之豈期夜雨之燈忽入春風之筆先鞭方着歸衮難留溘埃風而上征殿奔雖後過屠門而大嚼知味已多儻自兹或㝷覆蕉之縁則其他可乗破竹之勢造物所相終身焉依兹蓋伏遇某官列㦸名家褰帷膚使抱王霸之略前身江左之夷吾主人物之評後丗汝南之許劭障末流於旣倒牖晚學於方來淑氣一嘘韶華四滿猶謂踈枝冷蘂有未放之寒梅縱令換葉移根亦舊㘽之紅藥軒昻露剡特逹知音某敢不恪守官箴勉求師􅀃四方逐東野自今有入道之門一瓣爲南豐何日是報恩之地謝費提刑薦啓光近繡衣乆􅉥八鸞之末褒榮華衮忽開三鱣之先一舉軒然斯文幸甚嘗觀種樹之傳因得論花之評香岀淤泥濂溪之愛蓮未爲過影横籬落和靖之好梅正自佳其或合山樊水仙而爲弟兄以至集海棠酴醿而與賔客雖非同調還許聮芳如某者狷有弗爲懦知自立収心學問不過乗欵叚而稱善人抗志功名未免帶櫑具而見公子來習青青之佩得依皇皇之華曲爲吾道之主盟不以衆人而見遇念瀕於滿盍寵其歸飛一鶚於霄漢之邊送乗鴈於江湖之上俾之末綴假以先容兹蓋伏遇某官功過于張材如房杜轉移風俗力可以廻萬牛主張人材言足以重九鼎滋蘭荃而方茂擷芹茆以尤勤遂令􅀌枿之微亦殿群英之後某敢不篤於信道期以酬恩誦醉時歌寧嘆廣文之冷作進學解尚觀宰相之方過此以還未知所措謝鞏都大薦啓虎䑕不齊幾多屬吏熊魚兼得獨一門生異哉知已之深榮矣終身之託嘗觀古人推賢之道因得君子引􅀋之心仁傑之舉柬之婁稱爲宰相之噐蕭何之薦韓信數謂有大將之材言不厭多用然後已毎嘆此風之寖逺不圗今日之猶存如某者真是􅀌寒甘從獨冷過辱諸公之遇特開寸進之塗着從事之衫固知有分給尚書之札猶嘆無因忽聞一鶚之飛復許六鼇之掣俾與政事文學之秀者早及英華精銳而用之兹蓋伏遇某官範世清規鑄人妙學以修明公道自任如日行天以涵育人材爲心如川赴海最憐冰厎之芹藻屢采水邊之芷荃始終三年盻睞一意某敢不力守狂狷之行多讀聖賢之書陳古靈䟽名以聞未知所報趙韓王綴奏而進更大其成國士自期墨卿莫究回鄱陽章宰啓閱千佛之經升沉有異作同官之記先後無多分桃李之餘隂動茆芹之生意恭惟某官氣摩霄漢手摘星辰過秦論以來復見作者諭蜀檄而下蓋優爲之蜚聲翰墨之􅂣抗志功名之㑹凛凛􅅐中之兵甲堂堂眼厎之金湯八面當鋒一身是膽張睢陽之罵賊誰解秋圍劉并州之却胡竟成宵遁勲當居最賞未酬勞収唳鶴之餘聲躡飛鳬之雋武未施於事已信其能三異政成沸弦歌於東楚十行詔下鏘環佩於西崑某一第八年重親寸禄睨健翮於扶揺之上抱寒根於寂寞之濵怱得年盟好爲道地有酒酤我不湏問識字之竒退食自公政可􅀃從軍之樂通交代林教授啓才名方􅁽之間願從而後交好佩衿之地偶在其前糠粃包羞藻芹増氣恭惟某官學傳伊洛文過晁張横絶銀河織天孫之雲錦倒飜滄海弄明月之驪珠妙舎選之青錢髙臚傳之淡墨欲培所養靡疾其驅乃睠楚東庠序之林實爲江左衣冠之藪一􅀜隔市俗客不來􅀟塔照湖偉人間岀冝得胡安定之宿望以修范文正之遺規螺觜地清聊對簷花之􅀨螭頭天近即迎御柳之春某喜共儒門媿妨賢路經腹之嘲未解刀頭之夢頻驚遺君子以桃李之􅂣逝將去此納諸生於芝蘭之室尚亟圗之生日回學職啓乾䇿年華方驚去速土圭日景又欲添長雖無蛻鶴之姿僅有聞雞之志辱髙懷之期許迂雋歩以臨存岀㓜婦受辛之詞推老人甲子之數絳紗幃厎欠度曲之雪兒青玉案邊付誦詩之驥子其爲感佩未易名言謝黄留守科目啓分教三年受察詩書之帥去官數月登名文學之科藐無地以先容恍自天而下墜得公借重舉丗知榮􅀼以古人以文表見者蓋多後丗隨手澌滅者皆是作毛頴傳猶謂􅀋俳續春秋經或譏失僣要得宗工之印可始成後進之聲名伏念某􅄝古忘餐愛竒成癖有歐陽必同歐陽之􅀃期之千百年之餘非子雲莫好子雲之書豈以一二人而輟未離翰墨之逕遂墮虀鹽之􅂣患在爲師教因知困謝江郊之陳跡臨京國之迷津吾黨雖狂誰門可扣遽辱収千金之敝帚奚啻獲一壷於中流機㑹之來神明所相兹蓋恭遇某官日光玉㓗山立時行著書立言襲六爲七而無媿解疑辨惑問一得三而有餘發先儒之所未傳使後覺之有定郷頃東游而納謁因北面以知歸見􅀂平生期諸晏歳不謂乆違於矩範乃􅀩肯記其姓名雖無子固之文亦應温公之格某敢不益彊所學期放厥辭日近長安喜聽衮歸之詔雲趍材館終歸鈞播之功宗教謝廟堂啓虀鹽有分未寒侯頖之盟槖籥無私仍玷宗庠之選寸進當安於常分一命皆出於至恩拊已包羞逢時知幸􅀼以東平爲善之最樂河間大雅之不群由其得涵養學問之源所以忘生長冨貴之習欲陶成於公族必鑒擇於師儒如某者乆坐文窮難醫書癖頭顱如許敢謂絣䌟有封侯之方面目可憎自知管城非食肉之相末第坐踰於一紀冷官僅了於三年􅀞餅可觀炊沙不飽靖念皇極無棄人之法况當太平樂與賢之秋歸誠光範之門妄意翹材之館惟愛人之以德故應物之無心謂其嘗在文學之科可使往分屬籍之教資格雖慙於黄甲姓名猶託於青氊磨鐵硯以爲期徒抱益堅之志垂玉衡而在上莫名平施之功兹蓋恭遇某官德享天心功在王室綱維萬化國有􅀜雎麟趾之風羽翼群經人由中庸大學之道力任斯文之重妙裁吾黨之狂權度無差斗筲不棄某敢不篤於絜已思以淑人遲􅀲戍於八年之餘疇能縮地速化功於一息之頃尚覬廻天捧戴惟深栞摩罔旣謝莊中書舉自代啓禁路問津首玷十科之選詞垣正席仍推三字之儲賞音愈乆而愈深推轂不進則不巳感由心刻聲與淚俱􅀼以東坡免試而薦伯脩南豐􅀄除而舉貢父是賔是主無古無今如某者鐵硯僅存金桴何有少未聞道徒􅀉榮華於飄風之中晚悟作文頗見涯涘於霜降之後抑而爲􅀃難􅀌憤放而爲牢愁反騷是特不平之鳴殆非有用之學胡傑出於一佛俾同升於諸公舎旃舎旃茍亦無然雖䜛波之可畏􅀋我􅀋我乆則肖矣終恩地之有歸對黄茅白葦之秋光借紅藥蒼苔之春色聞風甚偉學歩良難兹蓋恭遇某官道德宗師文章宿老紫微閣静一揮賛普之書白玉堂深婁草河凉之詔毎謂􅁝綸之手要湏錦繡之胷豈無他人正在我輩爲命得禆諶子産顧不韙歟稽首遜殳斨伯與亦幾過矣某敢不彈冠而起執筆以從醜婦効顰詎作金屋人家之想癡兒􅀃夢尚追鈞天帝所之遊銘德惟勤抒詞莫旣謝廟堂啓雷霆震疊正切省循日月清明遂叨抆拭轉化功其有力戴恩紀乎無涯􅀼以剥復相乗者隂陽之機生育不窮者天地之德蠖伸於屈沍寒之氣回春苗槁而興大旱之雲爲􅀨凢物皆尔於人亦然如某者魏瓠中枵晉錐外鈍生涯牢落􅀄無郭外之田學殖荒踈僅餘床頭之易或喜其有山林之氣或疑其非邊幅之材竟坐五窮難逃百謫大爲丗僇方無地以容身過重親憂遽終天而抱痛所欠一死不圗更生緇衣之冝又改爲􅀆端出中心之好白圭之玷尚可磨也大明前事之愆復俾臨民免爲棄物兹蓋恭遇某官身任四海九州之重道爲五帝三王之師排斡黄河回天下不能回之勢涵渟滄海受敵已所難受之言趙韓王開國之元勲文潞公服人之厚德相去幾丗合爲一人乃􅀂以春秋爲繩丗之權以皇極爲用人之法平心而運公是以昭脫諸千仭之淵示以九逵之路虎豹啄下人些知莫扼於九􅀜鸞皇爲先戒􅀆願早施於八翼大造所及終身焉依謝廟堂差幹官啓公朝天大甫開荆􅁄之塗邊閫地雄遽綴芙蓉之幕驚魂復返感涕交流蓋嘗絶大江而東遊􅀝長淮而北望雖有可乗之機㑹未知一定之規摹苟於偏安殆非孔眀公瑾之志急於進取未免蔡謨羲之之憂雖堅忍可與成功而審重最爲上䇿首擊尾應尾擊首應要莫測於吾謀我出彼歸彼出我歸使常牽於後顧縱未大尉乎玄黄之篚亦可坐弭乎赤白之囊責在元戎亦資婉畫如某者交無狗監泣有牛衣滄浪濯纓早嘆􅁂毛之颯太行􅀝劔斗驚髀肉之盈居紛紛其離郵分落落乎難合化功一轉生意頓回朝刋黜籍之丹暮剡辟函之墨拔從九地寘在重霄巴西此日之放麑可謂仁矣塞北向來之失馬詎非福耶矧去家無千里之遥而望禄特半年之近生成至此稱塞謂何恭惟某官以社稷臣爲帝王佐十年生聚十年教訓坐凝更化之勲一歳力役一歳戍屯深軫佳兵之慮惟尊安中國以爲急斯鎮撫四夷而有餘旣素定於廟謨尤不輕於邊􅃈大先謀帥細及簡僚遂令守玄尚白之蹤亦在依紅泛緑之數某敢不痛心前轍加意後鞭不徒丐升斗以養親庶幾展尺寸以報國平定安集况曽讀建武天子之詔書踴躍歡呼所願草頡利可汗之露布依歸大造誓畢餘生通崔安撫啓捧研從游乆綴門人之列分弓庀役就充幕吏之貟天巧其逢人榮所託􅀼以小范之帥環慶舉張方平大蘇之牧中山進李端叔兩公辟士之盛事百丗知人之美談不圗晚生親見前輩恭惟某官光明而亮偉端重而沉深望之儼乎道德之容挹之薫然仁義之澤驅千兵萬馬於筆下風􅀨恬霽而無聲吞五湖三江於胷中波濤舂撞而不動剸兕麻源之右掣鯨桂海之南清畏人知静忘物競其去也諸公挽留而莫可其歸也四輩趣召而後來甫躋郎省之華亟填戎垣之重秋風保障威行萬竈之煙春日耕桑驩動一犂之􅀨淮南􅀝以爲脉山東聞而屬心况狐兎失穴之餘正􅆛貅扼塞之日人皆輕進公獨隱憂謂中原機㑹之方來而外治規摹之未立灞上􅁄門如兒戯耳尚遺債帥之風方城漢水雖衆用之未免市人之戰要湏彊國勢於精神之表乃可制虜命於掌股之間反覆開陳庶幾感悟彼竪儒幾敗乃事徒諉諸一勝一􅀒之常此元老克壯其猶必運以萬舉萬全之略寧少遲於遄召庸迄奏於膚公坐縳可汗盡還輿地某四年食客三丗夙縁濟慈航於黒風大海之中送靈槎於黄河昆侖之上烏幕濫巾於温石兎園接􅃑於鄒枚誓上下以相隨抑東西而惟命誦蕪城之賦熟形勢於曽來續泗水之碑􅀉功名於不朽矢心歸􅀝拜手敷陳謝崔安撫舉改官啓子來幾日甫爾依紅我有二天居然破白惟屹立於丗方横潰之表故力挈於人不比數之中抒敬瓣香歸恩丈席􅀼以人材由江左而降幕客在淮南爲多韓魏公得王金陵而不及賞音牛竒章辟杜書記而未嘗推轂遂令遺憾尚見前聞伏念某讀書不多渉道更淺方其始銳自謂五石瓠可剖以爲樽迨此中艱乃知六州鐵猶鑄不成錯以舟行岸移而閱丗變以霜降水落而觀物情虚憍寖平剥蝕漸復冨貴非吾願未敢云然貧賤玉汝成容或有此然紛紛成敗之異論而咄咄炎凉之易情不圗一日之逢遂有終身之託拔從食客列在屬僚歳寒東閤之梅結根已舊春色平山之柳成䕃方新廣平下坐而揖之前相如末至而進諸右使無地主誰破天荒兹蓋伏遇某官功蓋三邊眼髙四海論材以相馬之法觀過於奪牛之蹊得一士於河南了無貴戚之命空群良於洛北惟有山人之媒共驚甄拔之殊誰識機契之早五更進履已是㑹心半夜傳衣不容放手故於落落難合之㑹而有沾沾自喜之榮上下四方盡是依劉之地始終一節敢忘在莒之時銜戴寔深編摩抑略謝丘安撫舉改官啓從莫府之游甫當春後上公車之薦忽在秋先軒軒特逹之知落落希闊之遇得之驚躍傳者信疑􅀼以槖駞種樹以蚤實爲功狙翁賦芧以朝得而喜伊物理之猶爾豈人情之不然矧墮七選之坑欲結五剡之塔寧爲雞口母跋狼胡必考素以􅀧頭始探期而入手如某者有婞直之短無趍和之長肝膽輪囷據鞍之髀易滿頭顱蕭颯讀書之眼尚明不能忍藜莧之飢漫欲決枋榆之起勉辭襏襫來拂兠鍪多以白面書生而見嗤獨得紫髯將軍而許可樂哉飛泳藉甚推􅀭着鞭要使出祖逖之先成佛肯教在靈運之後未回沆碭預借扶揺兹蓋伏遇某官親得南軒之傳丗濟文定之美非有心於冨貴而冨貴自迫不求名於氣節而氣節更髙脫彼少年新進之􅂣運此真儒無敵之略識微見逺常懷猛虎出柙之憂彊本折衝自有老羆當道之勢至􅀂虚以接物而謙以下士明於見善而勇於抜材又當路諸公之所難實舉丗善􅀋之攸屬矧在晩出亶爲至榮本無疇昔之縁便􅀩刮眼不􅀒平生之學即是酬恩百喙可窮寸􅁭莫冩賀侍御啓榻前承渥柱裏升班物情大旱之餘適蘇霖􅀨天􅁚太微之次首應法星九重侈知人之明四海享任賢之福􅀼以兩儀具清明廣大之體萬物鍾扶輿磅礴之靈得其中和者爲景星爲鳯凰全其剛正者爲屈軼爲獬豸况千古之間氣生一朝之偉人如伯夷聖之清如孟軻勇於義用能任天子耳目之􅀉于以壽皇家氣脉之傳恭惟某官歩趍聖賢冠佩道德旁蹊捷徑不求少室之山絶岸􅀌峯坐閱瞿唐之浪顧環轍之乆矣終覽輝而下之簮筆烏臺伏蒲􅀐省上不爲危言而駭聽下不爲矯節以沽名惟致辨於君子小人之間而防微於宦官女子之際外邪不入元氣自充以培社稷無疆之休以兆國家中興之象深締邃嚴之眷進顓雄劇之權堂堂不撓爲儒宗謀猷惟舊行行且止避御史風采又新然而一論列􅀜吾道之盛衰一建明係斯民之休戚時雖無闕事或可言士夫懷寡㢘鮮耻之風將帥乏趍事赴功之志戰守之規摹靡定賞罰之綱紀未張斜封尚費於調停横歛更多於朘剥惟正人用則國勢重於黄鍾九鼎惟公道行則人心安於泰山四維此皆前日之已言抑亦于今之最急願申谹議迄濟丕平當今文靖之警君復聞于丗母使清獻之論事專美於前狂斐一鳴隕越萬坐謝李坡舉自代并應詔啓草正元之諌䟽旣許同升應建武之詔書又􅀩特舉人驚再推轂於朞月之頃誰信屢擊節於十年之前撫往事以􅁣然幸平生之有此伏念某灌畦自命媚竈不能忽起市虎無端之疑遂罹蹊牛巳甚之禍丹心獨破疇能百口保之白髮相看寧忍一家哭矣已甘墮地之棄甑不謂中流之得壷剪􅁓而招驚魂探囊而起壊證雖乏洛北山人之譽亦備淮南幕客之貟憐抱影之零丁爲騰書之旁午六鰲連掣五鶚齊飛它人不足而我有餘大造已多而公未倦讓䕫壤龍而讓朱虎誠過乎謙進豹進鮒而進樂羊抑何其力所謂真知已者夫豈輕予人哉兹蓋伏遇某官地望如山門庭似水萬斛轉柁運平國論之偏五色􅀘裳彌縫君德之闕其正足以用大其公足以生明去小人如去稂莠不厭其芟夷愛君子如愛􅂎梓寧過於封殖引蔡襄而居同列有言必酬薦唐介而處要官弗進不已爰得魚而取掌仍􅀐鶴以􅆞腰􅂚勝自喜之情猶有無厭之請苦心選佛固慙衣鉢之傳凢骨登僊更乞刀圭之賜寸忱有屬尺禇奚殫謝制使李尚書舉改官啓謁裴度於洄曲之營最居人後拔杜牧於淮南之幕忽處衆先得之擊地而驚恍􅀂從天而下􅀼㠯前輩所謂汲引􅀌寒之綆近丗以爲攀結權要之梯􅀝冰山爲太山延頸待囑指䑕璞謂荆璞拱手奉歸名爲蓄吾家之參苓實則種它人之桃李自喜得計烏知可羞􅀂其􅀧頭堂下之一言具眼坐中之小異幾年無此一日見之如某者材非竒竒老已冉冉方虚憍恃氣安知涪翁四句偈之有功迨拂亂動心始信􅱼山三字箴之得力眇鴻毛其自命蕞雞肋以何求朅來刀斗之郷偶備櫜鞬之役旣不能磨盾以草檄又不能推枰而畫籌第於内外臂指之拘攣與夫上下精神之消靡多所感觸爲之隱憂顧國事以如斯於身謀而何有炎門耻炙捷徑甘賖道之將行歟但居易以俟命人莫我知也欲忍窮而著書不圗􅀒壑之秋乃有回瀾之力未齊五鶚先獲一麟固非曹劉沈謝模索以可知且無金張許史游揚而爲助逈出望表猥塵選中兹蓋伏遇某官翰墨大蘇威名小范黄髮鯢齒入奉壽母之懽織文鳥章出寛聖主之顧以忠孝兩全之懿用文武兼資之材號召青齊指麾燕薊已斷匈奴之臂行􅃮月氏之頭與共功名孰非豪傑乃至嘘一寒之谷欲使脫七選之坑以勸着鞭以愧刓印偉此舉之尤特信所􅀜之匪輕某敢不敬佩十六字之襃期荅二三䇿之取丸藥生翼􅀄匪求而得之瓣香報恩當有大於此者卷卷衘戴切切敷敶謝權帥洪提刑薦啓􅀐楊州之鶴正切夢思冠楚人之猴忽叨論薦嗟丗道之寖薄幸宗盟之有歸􅀼㠯􅁝苓同生於松而􅁝託苓爲根蕖荷皆出於藕而蕖􅀝荷爲䕃惟鼻祖源流之無閒故耳孫枝榦之相依伏念某少耕潜山壯宦鄱水訪盤洲之事業正印難傳誦野處之文章餘燈可續柰九京之不作竟千里之空還昔期芳菲菲而彌章今歎景翳翳其將暮不圗州牧出我丗家蔚乎相扶日有川泳雲飛之樂劃然長嘯時窺山鳴谷應之機胡人事之方乖曽身謀之靡定㠶隨風引舟挾岸移長鋏自隨勃窣兠牟之厎短檠相對凄凉刁斗之邊皇華不隔於照臨吉語忽傳於吹送一鳬巳去五鳯俱飛雖狄武襄之譜梁公大非吾耦然吕文穆之舉夷簡豈無它人出於真情有此竒事兹蓋伏遇某官噐能管樂苗裔韋平材恢恢乎辦多身矯矯其立獨山韞玉而自潤粹然有道之容水中凖則不争澹乎無我之意扶立故家之喬木挽回末俗之頽波涕唾􅀬宫金玉寒畯謂族姓如晨星之有幾况主賔與春風而俱和置冗蹟於四賢借華襃於一字俾懋所學用昌斯文白髮聲名媿難齊於二陸青雲歩武尚自附於三洪深感于中姑陳其槩謝賈制置特薦啓小單于之膽落方集竒謀大都督之眼髙首薦下士試新刻黄金之印署獨銜碧玉之章同日驩傳一時盛事伏念某萬無能役一不敢欺滿架挿書自矜鄴侯之冨舉家食粥誰念魯公之貧風霜不貸而枝葉凋歳月已老而根榦在往來塞下出入兵間車轔轔馬蕭蕭毎痛心於浪戰田确确牛㕰㕰更攬涕於煩輸兩年之賞識固多一旦之遭逢九異蟻隨磨轉鴈逐陽飛趨幕折腰甫識少陵之面上堂携手已知􅎦蔑之心聽􅀃劔於酒邊許推枰於燈下良由機契遂以名聞兹蓋恭遇某官貫穿古今揮斥宇宙望長安於灞岸一生忠義之心進雍丘於淮隂百戰功名之㑹用紹興分道之典故施慶暦定邊之規摹旣綏靖於山東且經營於河北築臺延士思得良籌推轂進賢不遺餘力爰俾摧頽之下走亦􅀩特達之殊知念圖報之無它惟納忠之有益虎兕出於柙曩甞失於防閑蛇龍放之菹今盍思於區處􅀔必知已而又知彼權當在我而毋在人御衆莫􅀂寛平制敵無如審重財散則民乃聚食足則兵自強此皆巳見於施行務在更加於推廣大孚衆望弘濟中興繪像雲臺不媿膠東之傳磨崖浯水願書元結之碑觸突有誅震愓退聽平齋文集卷第二十四
