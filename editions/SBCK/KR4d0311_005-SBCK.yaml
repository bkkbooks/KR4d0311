  text: 平齋文集卷第五
  hash: sha256:1b8c08b3be20a23b9543d752bdc187451d1cbdd2272ed5f4b9e0a24617406f1f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0311_SBCK_005-1a}
body:
  text: 詩四次楊瀘南以前區字韻送行水穩風凉快長年歸㠶東指白雲邊落花􅅃叚兒能御薦草烏犍手自牽蜀口戍兵誰飽飯淮頭編户幾安眠野人只願羣賢進輻湊良籌到上前萬里來鴻未有書社前歸燕與人俱漲㾗落後杭巫峽風力髙時畧太湖深愧平生嗟靖節一厈天下望夷吾延英入定中興業早震天聲到􅀑區岑公洞洞從開闢有翁獨擅眞清磴古蒼苔澁巖空細溜明誰刋新即事盡剔舊題名太息今猶古江山不丗情開濟堂魚復平沙漲夕隂紅旗影底老蛟吟窮今亘古三分恨托地撑天一寸心過􅀨斷雲閑絶壁凉風歸鳥急平林江山難着醒時眼有酒如澠放手斟東屯犖确嶔岑轉百盤峽天深處得平寛秋風䇿䇿􅐘花老暮􅀨蕭蕭稻子寒仁者樂山心本静碩人在澗體俱胖農家不解詩翁趣只道豐年了納官髙齋江滸行厨轉􅀜頭細路過手摩如象石目送臥龍坡骯髒雲端栢鬅鬙􅀨後莎晚來晴更好舟發亂山阿中秋秭歸岸下岀蜀趍吴第一州夕凉隨意繫扁舟十分人鮓甕頭月一片水晶宫裏秋夜氣長存號老鶴天機自動舞潜虬得歸到處皆佳思不問西風解白頭懷程及甫二絶撇濆梢渦穩下舟狼牙鹿角又黄牛兒曹脫險讙呶甚數到家山十二州石馬門前萬里廻向人似亦􅀏顔開獨㝷舊日題詩處却恨騷翁不共來獨醒亭今來古往江山老地盡天窮草木愁爲問大夫能飲否芙蓉落盡菊花秋温泉院二絶老火欺人客路長艤舟取次浴温湯犬鳴三峽夜逾静月上四更天始凉神虎護泉寒翠壁靈虬吐沬暖冰壷玉環不碎征塵裏更引三郎到古渝劉家江阻風二首動地千牛力行天萬馬聲溟濛迷太極浩蕩送平生夢與屏幃兀心隨簋􅇲傾黄頭多着纜作止候三更歳月􅀌槎轉風波斷梗隨謝三元自慣巽二莫相欺沙岸往來拍蘆林開闔吹欠伸呼斗酒一􅀏酹馮夷千竿夾方􅀨江流紅未霜蘆花紫寂寂逺㠶來拍拍晴鷗起包港風濤二首䉲百丈幾牽掣斷鐵三脚已撼揺浮陽侯戯劇何湏爾身丗從來等一漚顛風立海雷轟柁駭浪翻天雪壓篷夜半乖龍酣戰退一奩冰鑑本來空寧宗皇帝挽詩二首虚已堯黄屋清心漢弋綈乾符開太一坤軫拓全齊鎮國天球在賔空寶仗迷歴年施澤乆四海哭遺􅀺德粹三靈接功成萬國雍方培豐水􅉮忽跨鼎湖龍廟號追文考陵名冠丗宗微臣趍覲晩灑涕續車攻送章君範之湖南幕天闊孔鸞起江晴荃􅀂春親榮知有子主勝信冝賔嶽麓盛古學衡山多秀民平生金玉質更看濯磨新􅀉題成都張宰壓雲樓二絶清霜戒曉日將岀急􅀨報晴雲乍開庭下簿書渾引郤獨揩􅀟眼上樓來氣如軻也生於義道似參乎任以仁乾蓋坤輿猶塞破何難壓倒玉嶙峋送杜陽安奉親還蜀二首訪落方勤止而翁苦掉頭立幾遺丗獨行盍爲王留日月馳􅀟轂乾坤􅀉一舟勿縁歸計得忘却緯邊憂買我歸呉棹􅀭君泝蜀旃雖爲萬里別端有一家縁臘雪添新漲春風减舊綿江山隨處好横槊小留連和髙續古省中雪升平見一斑未臘得三雪天開銀色界人立水晶闕小團醉後煮清夢梅邊􅀃莫道石渠春不似山隂月省中和何子温見􅀉東風婉娩燕來􅀟禁漏無聲萬緑香寳鴨炷雲朝太紫玉蜍挹露校鈆黄聖賢不斷千年脉宇宙長存一􅀧光老鶴也知虚静好夜深踏月上脩廊和何特夫見􅀉人從萬里蜀天歸御柳藏鴉絮又飛風細爐熏揺穗直日長漏箭岀花稀九重旰食圗無逸四塞宵征賦采薇愛國書生心更苦夜占列象候璿璣送秦祕監還蜀二首岷峨人物古淮海姓名香識面歳華晚論心春晝長有懷胡去國無媿好還郷呼酒犒三老柁樓天正凉蜀産班行幾分符又去之氣完吞落日心定發凉颸蠅虎攫何壯蝸牛升更癡見幾能許早別思渺江蘺送張行父守贛二首覺是聖賢脉復爲天地根典刑諸老盡文獻幾家存露下鶴先警風髙鴻獨騫一時京洛價知有魏公孫南斗一㠶外西風千􅀐頭莫嗟中落落湏感上休休賈􅁩詞林曉陳蕃墓草秋經行􅂸斗酒爲浣古今愁送客一首送眞侍郎風􅀨寂歴蘆荻秋梧桐落盡斜陽収􅀌鴻影斷蒼莽外愁絶送客濤江頭客心恰似濤江水夾岸擁沙潮不起海門一線拱觚稜無聲夜到龍山尾重雲壓江秋隂隂千古送客非斯今有酒可别不敢斟天乎天乎知客心天乎天乎知客心和續古􅁡术參桂齊名骨自香百花釀醑助甘凉含金咀玉風標别消得肩吾爲發􅀭贈小兒醫忍飢覔句孟東野守寂草􅀇楊子雲囊有遺書無與讀兩家恨不早逢君和續古謝送墨黒月黳雲脫太清海風吹上筆頭輕􅃈䆫冷透芙蕖碧定有新銘到九成題鍾春伯所示周昉明皇對弈圗寳欄十二午隂移思入雲霄落子遲當局早知提醒着危機應不墮蛾眉乙酉六月十九日應詔言事九月一日去國一首黒風吹雨岀長安破帽騷騷怯暮寒不得之乎成一事却因而已失三官人心天理推詳易丗路交情􅀧檢難白髮老人經事慣教兒只作博投看丙戍天基節自至道宫趍寳福院寒甚朝謁千秋節攀援萬歳藤山明松戴雪澗澁石懷冰清壯髯還㦸酸癯面亦稜暖寒能破戒珍重虎溪僧大人用韻再一首静裏栽梨􅀥閑邊話􅁑藤縁塵還我雪丗態任渠冰宿卉芽渾脫新禽語摸稜年華催鑷白自􅀏秃於僧乙酉歳暮有感三絶罷參歸趂日髙眠隨意繙書不計編歳事從教催白髪春風元只在丹田精神收召入腔來水色山光面目開可惜行􅌪新失伴雪晴未忍􅀃㝷梅樽酒團欒里社情眼中忽不見公榮祗應天體如雞子地下人間共月明時疇甫􅀄逝敬和大人新年韻井渫得泉終必食睽弧遇􅀨更奚疑毋庸伊尹要三聘且學顔淵克四非勢去鐵鞋無處覔志亨金印有時纍梅花結子桃花發爛熳春風醉典衣梅寒瓶虚挿一枝斜留待春風放霽華巳信不冰方着水可憐欲槁更開花繁芳玉立夾胡床勾引春韶午夢長有眼盡迷空裏色無心方識定中香又竹屋茅簷一樹斜冰霜意氣蓋韶華有餘不盡如知道半巳青青半尚花桃花紅􅃩照銀床黄入金明柳線長欲與晚梅相輩行同時到厎不同香挽禮上人盤屈虹蜺氣空山老白雲酒因陶令買芋爲鄴侯分甘露門知味毗耶藏著勲南軒無復見巖卉自清芬和開之社日乆要來新燕簷花泫曉霏治聾憨舅醉廢讀惰孫歸鶻突輸􅑿局醒鬆脫着衣一簾春寂寂誰解識吾機春事莫爲春愁兩􅁂翁管愁元不屬春風深黄楊柳夕陽外淡白杏花明月中大自在身天地並妙光明性聖愚同鳴鳩乳燕相料理融得從前萬慮空寒暄不齊二絶社後歸來燕兩三門前細柳緑摻摻乞將蝴蝶蜻蜓扇與試鵝黄水碧衫次第新烟欲試茶錚錚飛霰響簷牙惜春苦欲春長在且得輕寒約住花敬次老人即事韶華九十恰平分過化中存一􅀧神草脫燒㾗非故色梅收花事又新人正􅁭危坐三靈㑹擁鼻長謡萬象賔酬荅風光惟辦此可能春夢到天津清明二絶梨花匼匝不見葉柳穟玲瓏􅀄欲綿寒食清明等閑過日長飜覆壓書眠風將好夢到蘭亭驚覺虚簷九子鈴老眼醒來無着處􅀝樓檢校樹頭青次韻西塢道庵芳蹊幾曲重行行塢裏曽隂塢外晴秧馬鬅鬙和􅀨種蘀龍菌蠢帶煙烹黒風動地前程暗白日行天内景明却愛道民無別解一杯春茗雪花輕雪歎二絶唐時三月十八雪况復今年多一旬萬紫千紅渾過盡荼䕷滿架與争春桑頴騷騷麥又萎雪花如椀􅀨如􅁝老天只解苦黔首快活貴人那得知桂子次韻贈阮甥一樹青青桂子榮廣寒宫殿玉爲楹不知天上何年墮故使人間有種生風影碎揺籖帙爽露華倒洗筆頭清寸田更與加培埴收取天香染姓名次韻􅀟桂物理無枯厎有榮一􅀟玉樹􅀝脩楹長如拱璧天球在元共交梨火􅀥生卜築地連盤谷勝賦歸人占小山清晝隂最喜添新緑時有佳禽自薦名閑居暑設青綀幕晴更皂􅁑巾家貧猶氣象人老亦精神蜂閙花生計蛾翾繭化身静中觀物變同是一天眞鍾惠叔轉示趙臨安兩山堂諸公詩刻隨喜二首兩峯髙峙玉五畒秀含滋細柳未眠種脩篁方醉移雨將雲岀谷水引月歸池動静天機宻何人共一巵朶頥常逐逐觀復自休休静晝青竹笋深春黄栗留覺圎熏穟直夢破茗華浮爲問連山易床頭好在不燕巢華堂横架晴虹壯來鳯結巢長一丈中間贔屭譙樓勢兩旁坡陀翼城様相攸爾居莫此樂得意鳴聲相下上同時啐啄三四雛盡日往來千百餉欲飛未飛翅羞澁似定不定􅉥揺􅃞施施引趂女墻行戢戢教升危堞望黄金鑄印分裏有何用芹泥呈瑞象事見􅀋􅀃主人長健燕長歸但願春風不相放浮溪周居士挽詩野水崗頭屋春風竹裏厨所安仁者静其樂道之􅃾遺逸盍徴詔􅂄英空畫圗詩書根氣逺叢桂蔚相扶次韻子有賦著圗書所冨兒種巵敵封君貧翁結柳呼奴星物理􅃜盈蛇䕫蚿惟有讀書可以逃天刑守􅀇老死天禄閣巧宦三入承明庭人生得失雉梟盧惟有知道可以垂芳馨嗟予鈍甚爐厎鑛陶冩淬濯誰爲硎買書充屋手􅀧勘􅂎菊門巷槐花零九流七略宗六經大川小澮趍東溟騷人墨客幾汗青秦􅁎趙女争娉婷聖賢氣脉眇如綫義理門户元無扄圎冠方屨弗見道金貂玉櫑空圗形君年正壯眼如􅃮一過萬字披不停借書一瓻走赤脚燈前急􅀨鳴髙瓴扶輿磅礴天兩目渟蓄雲氣藏風霆鈎深造極猛着力㑹挿八翼摶青􅁳九日老無擘畫􅀏柴桑兩眼惺惺菊自黄渠更􅀏人無菊把拒霜相對過重陽荅子有褁飯無人過子桑拒霜一徑􅀨昏黄花根記縳西湖纜紅淺紅深醉夕陽夫容向背有深態纎穠無定姿最憐花脫後全似蕊包時荆公君臣一德盛熈寧厭故趍新用六經但怪􅀞圗來鄭俠何期奏議出唐埛掌中大地山河舞舌厎中原草木腥養就禍胎身始去依然鍾阜向人青冬雷行三月卄八雪十月十九雷日官起歴失氣朔深春爲臘冬爲梅衣巾暄淑糝白醭研席昏濕凝青埃堦頭蠢䏰上未已陣陣送􅀨千峯來水郷種早􅂣巳築山郷種晚鎌方催漏天未信解晴否低田芽茁髙田摧老農一飽不自保愁面百摺何當開君不見太史局申十月雷麥成堆送郎丞文炳之桐城江北江南雪意催半酣椎皷起征桅銳從猿鶴歸休去剛􅀍功名引調來破虜檄傳淝水定屯田䟽上皖陂開筆端矍鑠精神在莫只清吟伴老槐奚左藏士逹挽詩二首理學不逺復躬行毋自欺志雖千萬往材僅二三施花竹觥籌宻雲山歩屐遲眇然人物裏公竟止於斯諸老定交早羣兒驚見稀功名身韞櫝翰墨丗傳衣􅀛壽前占夢鷗盟晚息機呉頭􅂄舊盡搔首送斜暉次韻可庵梅􅀧雪非耶果是耶紫千紅萬未曽芽蒼苔有暈龍鍾樹幽谷無人自在花地暖􅀌鴻來索伴天空􅀟鷺下通家詩翁快整春風脚山路霜泥踏馬牙卭杖次韻槎使携歸餉老人髙稜踈節屈中伸撥開豺虎慿陵氣攝取蛟龍變化身訪洗頭盆還喜健伴行脚笠未嫌貧一般仙骨清如鶴􅀝看滄溟解起塵疇甫叔挽詩二首南渡幾年裏深山誰力書獨君酣百戰許我丐三餘參斗明燈燼湖江渇硯蜍斯人猶不第天理竟何如撰屨西山路㝷春得重陪那知分手去不作轉頭來寂寂􅀟溪雪依依半樹梅經行陳迹在横涕濕蒼苔夢中和人梅詩山礬韻溪路槎牙木葉乾角聲吹動五更寒踈踈梅蘂踈踈雪一叚生綃不用礬又用韻竹外横梢半欲乾透香肌骨不勝寒定知天上梅花腦不比人間柳絮礬聞山陽夏全之變洮湟私牘舊開邊淮楚依然様子傳抱虎寢蛟心不保護疽諱蠱禍相挻河流三舎盡人血城闔四門無竈烟昨夜洗兵盈尺雪華夷齊賀太平年丁亥歳朝把筆雞喚璇杓一夜東長天紺碧静無風年華老子懽娱裏春事兒曹翰墨中脫雪薺芽盤飣緑晞陽椒蕾酒行紅赭􅂁親上慈明􅁽正想千官㑹漢宫三日兄弟侍老人展墓歸和尊韻雲淡風柔霽色輕瀧岡阡上氣和明莫思舊日遨頭岀且試新年便面行飽飯即爲君子㤗濁醪不失聖人清一翁二季春無盡更願諸孫向老成次韻梅影白玉堂前絶丗容水晶簾薄透重重非僊非􅀑樹明滅似夢似眞花淡濃韈照晴波添縹緲佩揺寒月欠􅻉瓏一畨青子成隂後却􅀏癡兒認舊蹤春雪甲子乾飛􅀨元宵濕隕星風柔行陣陣月淡下亭亭木筆侵凌碧來牟掩映青東皇収拾急暖漲赴滄溟招隱三章贈李洋自號同􅀄子雲氣歛􅀆天目之顛濤江綫横􅀆海門濺濺扶桑子半􅀆陽烏翩可俯而掬􅀆嚥以天井無聲之泉子其隱乎吾與子􅀆拾荃雲氣冒􅀆天目之趾疊湫歕薄􅀆洞石齒齒列缺正晝􅀆睡蛟起可仰而擾􅀆浴以天河倒流之水子其隱乎吾與子􅀆采芷雲氣吐吞􅀆天目之腹乳潭沉沉􅀆鴨潭煜煜徐伍朝往而暮來􅀆􅀟碧鹿可挽而舞􅀆侑以天風歩虚之曲子其隱乎吾與子􅀆蒔菊次韻遊龍門十絶若木扶桑莫苦攀芙蓉薜荔不妨閑封三萬户煙雲裏化百千身水石間欲訪天池水發源倒􅀐北斗挾飛僊髙低八節灘頭路俛仰三生石上縁拍手東風喚白猿劃開元蓋洞天門可能路指虚無去兩脚湏留􅀧地跟蒼崖斗立兩扉開行􅀨龍歸尚殷雷嫋嫋天風瑶草碧神清依舊鎻樓臺武陵溪上迷津處衡嶽峯頭失道時珍重牧兒相指似隔林招手不吾欺飛泉濺雪林華濕盤石生雲古蘚乾早着些詞招隱去㤗山有賊膾人肝稻花秋晚蟹洗手薺菜春􅀄餳膠牙築厎空山誰辦此留君只有石邊茶不提長劒斬江蛟便掲脩竿釣海鰲縱老無成猶自許一溪流水兩山桃不知我者謂何哉布韈青鞋日日催長嘯一聲啼鳥外朶頥有象著山雷平明岀去日斜回小立巖花澗草隈光景留連非我事此心曽􅀧􅃮雕開挽阮開之窮逹皆歸命􅃜成不掛心醉餘便腹睡棋罷掉頭吟孔雀門䦨舊驪駒院落深可堪重剥啄寂寂杏花隂柳天機日與物華新嫵緑柔黄觸撥人精采只消些子􅀨腰肢無着許多春興亡螢􅁐迷樓夢榮辱􅀌山麯院塵醒眼年來渾看破萬縁分定不湏顰杏萬山築厎作春妍一樹繁紅直幾錢深院日長來燕後平池水暖浴鵝天弦歌禮樂詩書地榜帖功名冨貴天兒輩對花湏自勉莫教空惱少陵顛柳用前韻菀彼烟􅁝一様新依然面目我陳人只疑大造元無物豈料深山亦有春盡日三眠渾得意隨風萬舞不驚塵長長短短亭前路肯與渠儂管􅀏顰上巳呈子有隔水梨花豪放盡安排䑕耳到庭槐十分春事杜門過百色老懷中酒來聞麗人行頭輙掉見蘭亭帖眼還開碧衫玉唾酴醿晩更倩詩翁着句催顔延年三月三日率爾成詩前詩重韻太率可􅀏過盡風波灔澦堆一閑無夢到宫槐迎頭寒食清明近入手櫻桃芍藥來率爾成詩聊意逹快然自足亦顔開期君曲水芳林序花裏傳宣火急催百舌飛上三足烏喚起百舌鳥皷弄林杪春瀾飜屋頭曉氣吞黄栗留勢挾秦吉了向人售嘈􅄂司物窘煎炒轉頭芳意歇噤喙青隂悄晚食從來此腹􅀒將軍淡飯投韲現報身三月不曽知笋蕨夢魂敢到水晶鱗次韻荼䕷二絶瓔珞垂垂蕚緑華光明淡竚自成家枕幃醖藉風流足甘放朝來􅀍厎衙愛春留得瓊英在添竹扶將翠蔓髙更着金沙相間種主人四壁錦周遭官採木深山風􅀨幾百秋直干雲漢大蔽牛輪囷離竒中尺度一旦岀應天家搜山摧浪壓斧斤下横亘十畒眠蒼虬白頭地主坐歎息物囿於數吾何尤爲言此殆有天幸如拔莘渭歸商周棟梁未央坐萬乗柱石明堂朝諸侯老翁聞語囅然起致祝切莫去作昭陽梳洗樓楊花舊􅀨人無半迹來惺惺獨坐眼慵開却嫌飛絮猶多事􅀧破門前一徑苔春禽􅄂言倉庚倉庚集谷之苕謂汝也幽而豈其喬勃鳩勃鳩有安斯巢矜婦之功不念鵲勞决决杜䳌念歸何悲豈知汝歸不如未歸翩翩元鳥羣雛相依羽毛浹矣同乳異飛􅀒隂抱陽均此一氣孰使然哉凄其永愾次徐雲叟賦桃源無脚橋經始西風八月秋桃花春漲巳無憂横飛閣道虚空度直放銀河自在流􅀝岸斜看疑是洞循坡穩上認爲樓遍行呉蜀今􅂊識却􅀏浮橋謾造舟次韻映山紅燧人鑚榆岀新烟烟光濕􅀨山蒼然黄鸝怯寒噤未語有喙三尺惟啼䳌血流染花不知數赤霞爛熳横丹天前山後山列錦障上澗下澗敷金蓮海棠無香許流亞石榴有􅃩疑姻連目光逺送空翠表勝處正在繁芳邊七香寳車果安在東風老去空華顛送監丞家同年守簡池三十韻去年爲君來明廷峙鸞鵠今年爲親歸􅅙市苦思蜀扶輿岀脩門萬里宛在目大江六月寒風飽㠶數幅金山如幽人杜蘅繚荷屋采石如壯士鐵􅀐明鋈續五老烟光開九華雲氣矗如王公大人冠冕而佩玉大􅀌狷介甚赤壁清曠足黄鶴俠者流雋放不容束英雄古荆州霜月耿喬木寂寞三閭亭風露落秋菊陽臺峰十二森拱峽江曲髙標聳赤松絶槩凛􅀌竹或如漢汲黯抗直敢掁觸又如唐眞卿峻絜不受辱瞿唐灔澦堆一柱軋坤軸潰城雎陽􅀌鉤黨林宗獨水石明邊酌蘋蓼佳處宿寛作幾月程迎面峨眉緑丗道淡有味人生平爲福江山無愧容草木有餘馥試劒信雄拔易簡更清沃虎蛇方横道有此廉平牧相如駟馬貴長孺一翁秃明河隔黄姑碧落杳飛鶩獨復即無妄多識廼大畜歳晏以爲期仁亦在乎熟木末老芙蓉䦨干深首蓿郵籖莫厭婁瑟僴尉淇奥浮玉道士琴老蟾亭午潭澄隂雄虬怒吼雌虬吟空巖納息耳應心冩之以神寓之音大音激越風振林細音窈眇雲起岑天機不動天和深非􅃜非成非古今博山一􅀧蓬萊沉山中吟幽居多暇櫽括黄庭内篇賦山中吟俾善琴者􅀝操而歌之蘂珠閑居􅀆作七言琴心三疊􅀆舞胎僊呼吸日月下上雲烟􅀆囬紫抱黄入丹田一面宗泥丸六府主丹元七蕤應兩扉九微徹三關明堂閟虎章玄闕森龍幡素衣翠重裏朱帶緑華裙上有黄裳子丹􅀆常在兩眉端欲求泥丸滿直湏丹元存靈臺貯清明太極涵肧腪升坎降離凝正一而融三五􅀆付之靈堅童子玉池太和官重樓十二環􅀆蘭玕朱鳥白石源􅀆潺湲專閉御景而握固􅀆嗽咽金液漑靈根胎津溢而琅英飽􅀆積精累氣而成眞髙研恬淡􅀆道之園物物不干􅀆㤗而平身披鳯衣銜虎符􅀆控駕三素躡飛霞而升廣寒東西兩目􅀆􅀝天木隂隂􅀆泉㳙㳙一唱三歎􅀆玄鶴下其蹁躚八景二十四眞􅀆吾亦不知其然而然損戒二首河魨行水厎志在全其生縋綆激使怒拍浮拾彭亨觸來不自制天君失和平懲忿當如山一静弭百争野虞雉爲媒榖榖雌召雄隂機發翳緑碎迸錦纈紅耳目誘於物顛倒不有躬窒慾當如澤涵渟清鏡空引鏡水白深還黒山黄逺自青紛然無定色何者是眞形不壞只太極長存惟六經莫疑晨鏡裏黳􅃮換星星苦笋臨軒解􅄄賜湯沐一節兩節水蒼玉氣嚴慣嘗志士膽格髙厭食太官肉此君可人如西湖荷邊冰簟三更鋪心知爽快不冝過柰此風月人間無丁謂鶴相專朝巧萬般中書位子太山安沂公冷眼旁邊看機㑹來時􅃗脚飜欽􅀂􅅄丁丁䧟􅀂謂之厚演演擠丁勢交利合皆如此􅀃與金陵老子聽食糟行龍州石秫七斗醪百錢半升官價髙村民無分酒到吻清晨荷薪争博糟得糟還家喜欲舞逺汲淡煮燃松毛餈麥餅澁難下藉此嚥送如葷臊我時作守輙自愧每飯釡有羮堪轑罷官兩夏肉入務食糟却如住百牢紛綸玉縷芼葱㳿晃􅃞珠滴霑麻膏多從未破甑頭餾間入半折鐺中爊王􅀲未甲蒿苣老芬美獨擅盤飱豪饞奴停匕朶予餕一餔七八譏何饕太平無事稱意飽竹床大鼾枕離騷客來闖户口尚臭錯疑􅀍酒醺陶陶我亦爲言恰夢金􅁝帳厎斟羊羔五月庚申夢人相指爲馬周且誦詩兩句覺而足之伸縮一􅀟手去來三丗身新豐驚昨夢斗酒滿懷春苦笋用前韻林谷迎梅新􅀨沐和綳熟煮琅玕玉籜龍别種冨風味㯶魚同科少肌肉吾廬兩山介宣湖緑隂門徑楊花鋪攻苦食淡父子俱􅀏看兩孫指之無老人曽和天象白氣一抹􅃖尤旗南斗北斗天兩垂西方熒惑耀芒角􅀄月吐魄來食之去年天象巳可駭今年天象更可疑春王正月曁三月黒氣幾度摩晨曦銅盤亭亭慘且淡鐵鈸拍拍合復離沙盆貯水静照影眼亂兩日讙童兒移時妖氛漸引郤赤光如血鋪庭墀家無占書矒休咎但効􅊔婦顰􅀟眉昨朝忽見邸狀報詔荅丞相辭公師首言金烏効祥瑞變我愁蹙成愉怡玉堂學士天下選王治有象非吾欺東淮西蜀狗䑕賊看折尺箠從頭笞用虞提刑剛簡見􅀉詩韻荅之有美人􅀆古錦官落花芳草幾慿欄紛紛丗故肱三折忽忽年華指一彈詩到考槃湏熟講易於未濟莫輕看門前尺雪清燈夜尚欲從公扣兩端雞鳴而起一般時舜跖殊途覺與迷此理天無分厚薄乃心人自眩東西柴門風雨榴花老草巷烟霏燕子低玉汝有書來萬里聖賢不㤗不栖栖次韻夏日乍晴雲更黒頓冷日如青飽飯眞成蠧幽居又見螢燈光翻露柱琴疊舞黄庭猛作逃儒去沉酣幾箇醒瀑布白龍飛岀翠雲堆不見源頭只見來勢有盛衰惟視雨聲無髙下盡成雷誰教河皷翻將落我欲陽侯挽取回東陌西阡分港去豐年入眼稻花開狐䑕狐䑕擅一窟虎蛇行九逵不論天有眼但管地無皮吏鶩肥如瓠民魚爛欲糜交征誰敢問空想素􅁝詩次韻髙蓼隰葒照眼似舡䆫只欠沙頭野鴨􅀟花引穟垂丹作佩葉扶節起翠爲幢婦収滋味歸羮鼎兒挹馨香赴酒缸老我爲渠牽午夢白蘋風冷釣煙江示諸兒徂徠古君子涇渭何太明一姦衆稷契詩作竒禍萌姦人擠之死旣死氣未平銳欲剖其棺謂北走猶生妻子坐凍餒不斷啼號聲冨韓各分俸買田活其嬰吾䟽視彼詩歴數羣公卿觸怒非一竦舉朝眼瞠瞠所頼天子聖不死五鼎烹斥歸天目下石田力躬耕田少食指多讀書飢鳶鳴此身不足憂憂我身後惸冨韓不常有勉哉自玉成忍貧知好脩道在困亦亨續夢造化有眞機寒暑不停軸秋風促絡緯春雨鳴播榖一氣臂屈伸萬事手翻覆得牛或貽災失馬詎非福七侯梁冀誅三妹國忠族鼎貴正酣豢旁窺巳魚􅁏自古聖賢徒不耻貧賤辱忠信以爲寳豈弟而干禄但信命行藏不計得遲速㤗極必有否剥爛乃爲復一理無間斷九卦要精熟夢起獨忘言䆫前數叢菊浄􅆊僧頥􅀩堂山下有雷頥山下出泉􅀩主静山之體養正静之功閑閑六䆫明寂寂萬􅄜空坐觀鼻端白巖花自春風讀漢書漢衰元帝爲優游成帝荒淫更可憂論􅀃金華風過耳山河大柄醉中休六月二十八日入朱陀山寺决决巖下泉翛翛竹間路破寂􅀌蜩吟送瞑踈鍾度箇裏欲求心應生無所住促織一􅀧光分草際螢繰車未了緯車鳴催科知要先期辦風露飢腸織到明水碧衫裙透骨鮮飄揺機杼夜凉邊隔林恐有人聞得報縣來拘土産錢荅子有髙吟梁甫卧隆中眼厎駑駘不足空清白自將千古月温凉不定六時風交梨火􅀥根苗長翠竹黄花信息通樓外秋鶯強饒舌􅀏人遲却黒頭公用韻荅游司直佀見􅀉道在皇王帝霸間古今同是一人寰不愁垂白三千丈獨喜飛黄十二閑晚桂薦花熏鼎古寒松墮子茗甌斑山中風味無人㑹頼得新詩起老頑龍池沙漲龍徙三湫宅山飛百道洪雲車風馬去福地洞天空蒼莽渾沙積﨑嶇没徑通等閑陵谷變驚倒白頭翁平齋文集卷第五
