body:
  text: 詩六庚寅元日甲子晴聖君元命是元正三素雲開甲子晴不識姓名農圃老相逢便與賀升平元夕輕隂不隔團團月遺俗猶傳緩緩歌踏雪看燈知不惡冝春釀酒恨無多水仙蘭水仙瀟洒伴梅寒鴻鴈行中合數蘭七里香花陪隸耳涪翁醉眼被麄瞞燈歎坐乆燈欲乾倒檠丐餘􅄋􅀧滴能幾多燼滅在漏刻可以觀養生精涸神氣蝕豈伊半圭茸能續踵後息可以觀爲政歛苦生理迫豈伊數匙糜能起溝中瘠嗟哉秋晨禾葉葉含露液母使暵就槁而望一漑益對門兩絶對門三日罷晨炊無處傭身老􅀞師安得化山爲飯顆大家皷腹太平時一簾霏􅀨暗花朝焙藥爐邊擁破貂深坐不知畦麥信喜看黄液上瓶焦禽語脫却布袴博米歸崗􅅺滑滑行苦遲打麥作飯知何時阿婆餅焦涎滿頥更願春􅁞一百箔賣新得價􅁝貴樂葫蘆沽酒和家酌免教竈婦嘲姑惡讀元公輔傳有感公輔溪壑慾胡椒八百斛􅀂比梁兾大是廉幾舡珠璣幾車玉三十萬萬無厭足我宋從來相用儒國肥民飽却家臞田園圗史論貧冨鼎鼐樓臺辨有無嗚呼哉鄙夫嗚呼哉貪夫示諸兒老人四十年前示兒長詩豫章實佳木㝷丈早異衆匠石雖未顧終解作梁棟社櫟大蔽牛不資丗所用棄置成散材歳乆即空洞誠由天所産亦在德者種吾兒豫章流丱角不好弄經訓雖未通數過輙成誦只今十五六舉止頗持重仰頼師友功綴緝成賦頌積􅁝未盈尺粗喜入機綜胡爲不自量將使應郷貢文􅂣倍千數作者豈倖中而子於其間燕雀􅄂鸞鳯鈆刀未易割庶可供一閧造物果何如往往形吉夢天其助我心勿使汝放縱業貴精于勤耐取曉䆫凍文章實公器妙語丗人共歳朝哦此詩洗醆掲春甕吾家有隂德行矣光炎宋某今五十五矣敬用尊韻示諸兒道大兩儀小身寡萬物衆此心能砥柱斯文即隆棟書從羲孔來字字濟丗用愈窮理愈邃如探無厎洞有書不勤讀惰農失春種如何望秋成箕杵日簸弄一經勝籯金萬帙供洛誦所願噐業進増益門户重兒童悟易􅀇奴婢曉詩頌而况以士名經史􅂴條綜古來天目下誰識三歳貢吾翁破天荒教子期命中顧我肋巳雞望汝毛猶鳯詩書氣脉續聲價天壤閧毋學韓家符燈火照睡夢毋學陶家雍文術付遊縱光明發勤苦竒雋出餓凍四壁瓢腹空一檠鐺脚共人情易喘筒丗事難筭甕努力湏青春三陳與二宋春行花信􅀨擔閣睡魔茶破除朗吟揺矮屋徐歩逸輕車鳥語向人宻交情隨事踈紛紛何足問天地一蘧廬次趙保之清明即事五絶餅喫紅綾空復憶錢分白打厎曽知推排風雨清明過只有梨花三兩枝草草携家去踏青舊阡新冡􅁓錢輕觸懷易作中年惡羡殺兒童􅀏語聲花信東風第幾回蕭條門巷老蒼苔漢宫儘有新鑚火無分傳將一􅀧來看花何必只長安到處韶華緫一般可是家貧風物晚郎當萵筍􅋐春盤擅春正是海棠時賸爲新晴凖備詩潑火雨來還有信崗南崗北竹雞啼九華葉子眞賦汴呉兩都極陳治亂之原仍有詩用杜遣懷韻見􅀉因和酬之於皇永昌陵食􅀛大梁都坐控天下樞卜丗周鼎俱聖賢六七作夷夏同康衢懷鴆玩積安厝火忘細娯黼京相與樂興亡視如無元氣付一錮膏血供百湏但知豢冨貴金珠潤黄壚豈料醉夢中蠱瘵生華􅃾凄風暗離􅁰斜陽渺煙蕪空令老忠簡渡河死猶呼南來呉㑹雄北望汴水枯迓續赤帝脉覊縻黄頭胡楚蜀壯􅁭帶江淮豐灌輸以此圗中原所嗟欠謀夫平園舊賔客清燈耿寒爐搔首􅀫感集拊髀流光徂理亂有成鑒天髙不容呼擬古賦二京舉一通三隅謂墮狗監舌寜老􅀲芋區誰能齒臯朔俳優􅄂星巫芙蓉歸去來月落長庚􅀌暮春即事温明好天氣猛憶湖山遨平堤到處柳流水誰家桃樽斚選勝檻笙歌喚輕舠百需不移具一醉何庸逃膜皷着日緊􅁓鳶得風髙買歸不論價矜詡相爲豪迅晷畧兩眼柔颸揺三毛閙裏夢巳破閑邊趣方牢摘桑暮西崦浸榖朝東臯病來飯即藥客至茶當醪雲煙面目稔筍蕨氣勢鏖腰頑渠稱鶴脚硬難爲鰲吾非東山謝亦非華陽陶泊乎潜溪潜萬事隨所遭次韻閔飢兩絶貴人生長不知田􅁝竹聲中醉飽眠渠信春山青草盡排門三日未炊煙巷頭巷尾幾夷齊日爲飢腸不肯西只願天公多雨粟便教米價賤如泥茶笋病蕾金􅀄出焙板玉又登厨爲愛頰車雋做成風骨臞黄婆幾倒盡姹女得安無快意冝知悔清標不忍􅀌五兵生厚味寜作病浮屠口占酬俞端叔牡丹沉香亭北夢魂賖驚見祥雲七寳車窮孟嘗君空好客病維摩老不禁花次韻何伯温三首庭前木蘭花皦皦扶春陽鶴鳴夜漏午歩花獨歌商低迷露濕衣浩蕩月滿梁深省渺誰語中心空自藏出門夾徑松春盡花滿林毿毿麈尾黄梟梟雲氣深仙人左元放􅀐龍夜相㝷飯我花杪露實腹虚其心銅瓶一穟蕙芳㓗以自旌相看色轉睟未言意先傾翛如鄭子眞聲名豈其卿明䆫細披挹心空氣和平山郷石田磽确萬山隈逢着荒年更可哀盡日幾人擔米上長年何處得錢來扣門強貸刑難逭閉户清飢死又催不是乾坤芻狗汝要令箇箇學顔回錢德成山水窟亦有黄金埓非無瑞錦窠養􅀩知趣早觀復用功多嘉客賁􅂣谷碩人槃澗阿時平風日好花竹幾行窩壽程宰三首作縣如弄潮莫吸半呷水紅旗上岸來喝采沙河市拈取第一籌細柳天風裏愛民如縁竿百尺頭進歩未到百尺頭努力莫回顧當􅂣萬人看亭亭碧霄住回翁十日前先脫老鶴胎拍手浮玉頂君􅀐鳯凰來相逢􅀃長生一􅀏榴花開曉出一􅀟杜宇青天月兩􅀧烏犍白水陂不爲好山勾引出那知巳是揷秧時行臨安縣圃縣勢坡陀樹老蒼山光明潤客荒唐木蘭多露不能濕薝蔔匪風還自香萬事婦姑鳴好醜百年翁仲領興亡九龍堂裏隨冝酒盧橘來禽日正長􅀉題永嘉林氏眞意堂萱草逕庭寂橘花䆫户明我惟天地性物自古今情元酒無窮味朱弦不盡聲道從涵泳得寛作讀書程荅隆慶李守楀萬里一天碧百懷􅀟􅁂秋凄其占後㑹展也企前脩風露昻藏鶴煙波浩蕩鷗書來如覿面香滿藕花洲東山次俞紫微止止堂韻佛法元無法人謀盡過謀􅀃空猶是着領妙更何求徑滑松杉古䆫虚水石幽琤琤鳴鐵裏安處一時休繡觀音酬郢州王知録丹青美人之贈兩絶楚人不識女湏面只􅀞昭君并莫愁􅑿得江南窮相眼自嗟空白一生頭十相端嚴具足身一團楊柳浄瓶春石城莫與蛾眉看羞不如人却妬人乍凉一雨添一凉秋近暑巳逺菰荷響騷颯忽其歳年晚悁悁我所思室而偏其反燕乳巢未空蛩吟枕先滿渉非忘淺深飲自知冷暖黄姑與織女隔河送悽惋南金英瓊瑶不換霜􅁂短七夕好箇牽牛織女天凄其獨夜不成眠柳家細婢何能問太尉麄人祗自憐比翼難磨終古恨嫵眉未了􅀫生縁新凉如水誰消得平等天公也解偏秋思一曲玉連􅃈十分金屈巵故新相代謝厎用爲秋悲寓興巨口松江鱸縮頸槎頭鯿一釂聊復爾百懷故依然林静横沆瀣庭空澹嬋姢鳴螿識人意切切悲流年最憐重開桂抱寒爲人妍阮亨甫壽樂堂澹庵各一首􅀌塔明横巘短橋華枉渚結堂水石邃奉此清節母菊能駐頽景松下蔚可數萱能忘百憂竹間粲欲語日淡迎春風雲薄謝秋暑板輿穿䕃來綵􅃑踏花舞􅀧頭毎一􅀏彈指忽千古盡將栢舟淚灑作蓼莪􅀨僾然其􅀂存青山照庭户右壽樂江西老澹庵髙節湛秋水君庵亦澹名聞其風興起一徑窈栢竹八䆫秀荃芷意行襲幽芳燕坐鑑碧泚銅爐古鍾磬瓦研素屏几􅀇根息芸芸㤗宇安止止大羮及元酒不入丗人齒床頭周易在更與參妙理右澹庵秋懷二首素節垂垂杪衰懷拍拍叢風乾梧葉白霜老菊花紅理曲多添瘦停詩不减窮出㝷空闊處揩眼送飛鴻鸚鵡琵琶恨融歸十四弦撥寒紅玉笋拍暖繡金蓮梅影春風裏茶聲雪水邊自憐還自􅀏星髮照嬋姢記夢青天一朶雲起東斗黒怒􅀨驤玉龍江頭女子十七八喚出八十老龍翁龍翁擲珠引龍舞女子􅀏滿􅀟頰紅天風吹動翡翠佩􅀐龍直入蓬萊宫山行紀事至節後兩日侍老人訪岳林精舎晩過眞君觀小飲還宿澄維那房厥明登九僊山晚取道陌上花里而歸徐雲叟鍾冠之崇之偕行男延勲侍扉開日華早路轉霜花鮮遊鴻得嘉客健鶴隨老僊舴艋野渡淺畧彴􅀌村連紆餘盤龍外杳靄烏猿邊麥畦破凍剗稻架烘晴懸萬鴉暗鴻洞􅃗鷺明㛹姢寺古繚虚嶂房深貯澄漣珍鱗紫金睟秀石蒼玉攣住僧自縳律愛客能逃禪老帖不容塌枯琴尚堪弦出訪文舉碣還息維摩氊䆫暉梅枝月帳鬰栢子煙吸清飽蟬腹擁薄攅􅀛肩忍寒如忍艾望曉猶望年報明翠鯨壯送暖紅麟妍讀易坐方穩搜詩去俄翩行行晉縣壘歴歴呉墓田森峭徑絶壁嵌空􅂀危泉飛墮雪珂境撼動冰輪閣名天憇寂小養雋挾酣急凌巔閣摧失傑詠巖在餘竒鐫夕氣生逺嶼勌懷􅀉平川路旁柳如此陌上花依然數年束強項一日舒聮拳大千自鵬鷃方寸皆魚鳶東風染芳碧更着㝷春鞭和何伯温見􅀉二首問字無人過草堂昨非今是兩俱忘鶴何骯髒寒方警梅許凄凉静更香萬古江山窮太白一簾風月老張蒼多君不作炎凉語識我平生鐵石腸青山流水曉葱朧讀遍黄庭萬境空羔甕無縁澆舌本貘屏有分護頭風人謀歴歴旣未濟民力班班大小東陶冩此懷湏好句殷勤時與􅀉來鴻和子有感時八州都督新推轂兩紀中書舊覆甌郿塢然齊如有䇿聊城飛笴便無憂時逆全作過歳杪用韻二首日月磨心緒風霜染􅁂華暦看新歳草梅憶舊年花濁酒供僛舞清歌應摻撾阿咸多事在猶問老生涯黄麾春簇仗夢不到東華瓦研磨冰葉塼爐煮雪花窮甘猿帳卧老勌犢轅撾凍解光風轉晴波拍兩涯元宵前三日侍老人遊􅀟林大徑山髙寺山巔小徑山深寺山趾辛夷花開數􅀧􅀨艾納香空半泓水新新故故自樓閣下下髙髙各䆫几二三名公詩一束八十老衲􅀞幾􅁓雲岑滅没野屋浮草樹離列渡舟檥露横斷浦月巳髙日落平沙風欲起直疑着我江湖間安得伴君巖壑裏魚肥尚恨􅁝蓴晚酒酣苦愛􅉁筍美參寥有句墮杳靄更上迎暉亭徙􅀝謹和老人明朝中春二首田夫野老布長衫郊外相逢與共譚一把年華將望六九分春色又過三竹雞絶呌茶生笋梅子微酸酒熟藍流轉風光無間斷此身元與化功參淡黄深碧上春衫無限春懷豈易譚隨手去來拈放一到頭得失暮朝三日烘花氣通􅀇牝􅀨洗山光漲蔚藍熟聽五更晴哢好不湏多恨罷朝參春行次韻拂開芳草碧坐斷落花紅丗味觥籌外年華帶眼中六州空鑄鐵萬物任爲銅有鷕桑疇雉逢時㑹長雄病齒吾母苦蚤衰髮霜齒存幾小兒得其髮大兒得其齒予方四十時上齶右車毀從兹白石源歳歳費經理軟疑梅着酸踈􅀋榴㙤子根浮觸易兀力弱遇輙靡懷核忌堅栗設胔便脆美爛炰故自佳急嚥聊復爾刺肥劇鉏姦剔纎難拔壘屢搜風屢入一快勢一圯撼揺腫貫顴焦蠧痛徹髓外雖編貝然中實空齦似赤龍攪沆􅒭玉池漲清泚天皷弗能扣金鼎亦徒䑛乳媪老不羞機女少自喜風流乆已絶血氣安足恃磨治朝辛鹽漱漑夕莎芷庶幾尚扶危不至遽乏使太官羊何􅃾五侯鯖更旨雖無轑釡嗔未免媚竈耻菽腐柔趂梜粟糜滑流七不愁餒在中却􅀏飽欲死舌以柔故存此語未敢唯春思三絶柳汁何能染􅁂根柳􅁝只解絆愁魂年光有厎催人急水牡丹花又上盆細草荒煙古墓田知經寒食幾年天雪條花下翩翩􅁓疑是曽分白打錢蝴蝶深深淺淺黄被春惱得一般狂打團飛入菜花去自信丗間無别香偶成沂水春風弄夕暉舞雩意得詠而歸爲何與􅀧狂曽晢箇裏湏參最上機三月晦東山太皥明朝禪祝融杖藜能送幾東風兩崖蘿蔓因依緑一樹桐華自在紅聒聒竊脂農即事喈喈摶􅁰女趍功細思舉丗誰閑得一􅀏浮圗倒景中續夢琉璃庭釦水晶欄寶樹婆娑玉斧閑只恐姮娥嫌冷落却隨飛月下人間作茶行磨斵女媧􅀘天不盡石磅礴輪囷凝紺碧臼刳扶桑掛日最上枝媻􅘐勃􅌥生紋漪呉罡小君贈我杵阿香藁砧授我斧斧開蒼璧粲磊磊杵碎玄璣紛楚楚出臼入磨光吐吞危坐􅃗手旋乾坤碧瑶宫殿几塵墮蕊珠樓閣粧鈆飜慢流乳泉活火鼎淅瑟微波開溟涬花風迸入毛骨香雪月浸澈湏眉影太一眞人走上蓮花航維摩居士驚起獅子床不交半談共細啜山河日月俱清凉桑苧翁玉川子欵門未暇相倒屣予方抱易坐虚明參到洗心􅀇妙旨送程於潜兩首溪山民物古政理噐能寛平易見眉睫明清生肺肝春風簾影暖霜月研聲寒野老自相語元豐崔長官遡紫催飛舄攅紅簇去鞍吾􅀖傾市送旁邑塞塗看清廟登犧象明庭峙孔鸞野翁麋鹿友時與訊平安新月天面如人面昏昏鎮是愁晚來雲色解新月放眉頭百合花日月飛􅀟轂如何駐黒頭􅂊看敷宻友又見拆彊仇葉聚稜稜峭花垂娜娜稠晩凉芬烈甚欲睡更遲留􅀨中次韻兩絶積多雲鶴巖前􅀨種遍長松墓上田豐歉相乗天有數今年管取斗三錢提壷勸飲元無秫促織催機未有􅁝葉厎蟬蟟尤更苦吸風飲露伴人飢送徐顯道尉無􅃬握手不禁別庭梧聲欲秋雲霄生脚厎田里付眉頭敬是禔身柱和爲應物舟卷旗蒲柳市茶鼎􅀨颼颼二花粲粲金錢映玉簮榮華能得幾光隂季倫歌妓春申客零落秋風没處㝷理菖蒲朝刪石上青之黄暮摘鏡裏黒之蒼􅅐中多少冗荆􅁄不翦不芸空過日君不見顔子一克巳曽參三省身每日低頭矻矻自􅀧檢何曽浪把外物勞精神嗟乎我猶未免爲郷人閑居二首一覺湯餅睡幾轉庭花隂不作八翼夢以無冨貴心東家朝鳴玉西家暮横金芭蕉大蔽牛不柰霜風侵何如老忘得曲肱滋味深出門聞鳩語秋思生春妍豆苗深没腰稻花髙出肩路旁兩三叟合爪感謝天老身幸不死得見穰穰田眼中多少人不能待豐年􅀟林志廉得元暉筆法作此七十三矣爲賦六言兩首近浦霏開略彴逺山雲没招提樹厎人家欲曉隔籬彷彿雞啼潮退寒洲聚沫􅀨収春嶂蒸雲歴歴舊經行處江村曙色􅀄分送阮深甫尉桂東兩首秋隂踈梧桐暮寒老蒹葭病鶴臥空谷遊鴻起平沙飄揺征衣單寂歴津堠賖中年不禁别湘江􅄅天涯一静鎮百紛一恕生百順所居欲官大此道貴坐進塗平鞭影疾風壯㠶力迅臯蘭拾秋芳好􅀉南來信九月一日侍老人遊洞霄宿超然館聞鐘太一相過燭未銷朝元鐘動鬰羅蕭身輕不怕瓊臺滑蹴踏青霞上斗杓翠蛟亭兩絶壯杉耄檜護嵌空飛墮蜿蜒白玉虹莫道隔凡元有柱胡麻流出石矼東晴雷碾破白雲􅌪無數林華衮下坡好把轆轤飜轉着崑崙頂上卷黄河贈石室朱修行兩絶響泉一􅂀落天風人在浮雲柳絮中亭午柴􅀜猶未啓碧珍瓏厎拒霜紅落葉堆中折脚鐺白雲煑盡又還生洞門黄鶴婆娑舞留得松風待月明送趙處士遊方道家何荒唐釋氏更汗漫君胡欲逃儒結入楊墨案時文窘枘鑿俗好厭冰炭起㝷出頭路去覔行脚飯左携仙君茅右挾佛祖粲隨身絶長物到處得竒觀江山枯桐冩風月老筆判識透心轉空養足骨自換長生不可獨分􅀉石髓半何正言母安人挽詩鳯采生丹穴螢光聚絳幃兩登黄甲去一佩皂囊歸萱老悲方切蘭枯夢又非青山秋寂歴客淚不勝揮􅀄釀手臼登新秫頭缸試嫰醪蒲城寒信早栗里曠懷髙重熟魚沾麵微生蟹帶糟老儂元不飲隨喜亦陶陶贈前京東王制屬赤葉風欲盡黄花霜未乾病添予許老窮迫子能寒劒蝕蛟還吼袍塵鶻尚盤山東河北事欲語涙汍瀾翁媪行翁頭白如銀媪頭黄如金抵足搔瘡昏到明羞殺敗布多年衾晴䆫蟢子懸瀰瀰翁媪相看顔色啓門前人送撰碑錢半贖冬衣半糴米哭都城火辛卯九月丙戍夜未中祝融漲熖通天紅曽樓傑觀舞燧象綺峯繡陌奔燭龍始從李博士橋起三面分風十五里崩摧洶洶海潮翻填咽紛紛釡魚死開禧回禄前未聞今更五分多二分大塗小撤噤不講拱手坐視連宵焚殿前將軍猛如虎救得汾陽令公府祖宗神靈飛上天痛哉九廟成焦土仲冬二日還自谷川道中兩絶晴烟杳靄似春山踈柳啼鴉意度閑溪上麥田翻未遍故遲牛帶夕陽還滿天返照醉紅殷未到生明月巳彎好是蛾眉無􅀧恨盈盈淡掃有無間至節前十日遊勝因寺霜霽午曦暖潦収沙路晞束山知寺古避客恠僧稀籜滑渉危屐藤鈎穿宻衣月黄風不動燈火虹去聲橋歸謹次老人至節韻但見隂陽遞斡流誰知陽本未嘗休善端繼繼無窮脉元化生生不盡頭杜牧浪將箱勸讀少陵空爲線添愁何如静坐觀其復一􅀧靈臺造物遊至節出謁回二絶一脉陽從地厎回人情物意便春䑓鮮衣稚子面紅醉知向外家參節來巧􅀏聲揺六博盆纎纎人在緑䆫根隔紗想見春風面雲滑金􅁫欲溜㾗病目日過學不力年催名未芳心期雖皦皦目視巳茫茫燈疊青紅暈書紛黒白行蒲團深瞑坐禪味覺偏長椒菊枕矮檠矻􅀄年細字窘晚節天憐蠧書障神授鴻寳訣金葩凉而嚴丹寳温以烈兩囊貯風露半簮藉霜雪芬透頂􅗞爽清祛腦脂熱夢魂寥廓逺宇觀沆瀣澈雲開月更朗電掣巖欲裂術妙刮膜金功過刳蟇鐵聱牙讀楚詛􅃈尾窺越絶不憂幻景侵且喜翳根滅頌花醉春温餐英飽秋㓗塗屋兆蕃碩飲潭進􅂄耋况兹芳澤聚盡洗空華結夜氣存虚明天光發昭晣湏彌能微塵渤澥或丘垤不直一􅀏粲巳判􅀟眥决俞提舉挽詩二首展也萬夫特翛然山澤臞朔風空汴泗春水􅄅淮湖籌驛尹師魯詩壇梅聖俞繡衣歸老去有韞不輕沽蒼鶴􅀌山曉黄花栗里秋一身雖物外萬國尚眉頭遺老幾何在􅂄英只麽休問天天不語江闊莫雲愁奚知縣挽詩敏銳霹􅆮手寛平雲夢胷雄臺髙幕畫劇邑冨民庸㠶掛風方駃戈揮日又舂炊􅆝剪春韭無復奉從容臈中歩月二絶平山堂下解圍去天水堡前經戰來天地無情一般月照人霜骨白皚皚賣妻鬻子年饑後索母求爺賊亂餘對月椎胷幾家哭更堪蕭索歳將除何正言挽詩雋手芥拾紫忠肝蒲伏青嬰龍雲氣直縳虎雪毛腥炊枕夢何短書棺名更馨眇然人物幾墓草涕交零謹和老人惠山泉二首取水驛符到喊山旗信通碾分花厎月爐受竹間風金谷正覔醉玉川誰道窮頂門甘露入喚醒主人公第二水泉動斜三封印通愛竒親煮雪得雋細生風酒肺蘇將渇詩情洗盡窮娉婷湏好買供奉讀書公歳暮山中紀事三首南山大小空横行無常時蓄狗豢豕盡澤吻樵牧兒翁嫗起譟逐妥尾行愈遲力窮哭且罵天網不汝遺里巷􅀒暄翁隤然支離䟽饕虱縁緼袍􅀧綴頷下湏旁人勸翁捫揺手一任渠虱多轉不癢何庸事驅除郷風臘卄五比户然爆竹窮隂挾黄昏霹􅆮起空屋梁間􅀑拍手􅀏人未免俗罔兩白晝行渠爾一爆逐除夜市兒數十百挾炬相追奔争唱賣獃歌祈以昭易惛我獃大如屋幾臘擁敗垣群雛勸我賣急售價莫論弄巧或成拙太清不如渾老鐵無孔鎚甘守鈍性根新年欲識新年課都非舊日圗詞分詩料帳酒奪飯工夫鍜息柳邊手鑷閑花裏􅂡寒消芳草緑打急辦行厨謹和老人欲還故廬颼颼破屋小青禂客枕頻年􅀉道周行止非人眞可􅀏窮通有命尚何愁春風舊壘􅀟飛燕宿雨新巢百拙鳩信是還家貧亦好德人何處不天遊謹和老人春行抗䟽明時効伏伽一歸七度試春紗柔風緑遍庭前草細雨紅催陌上花惠逺買來猶濁酒趙州喫去只麄茶回頭恰恰鶯啼處黄四娘今尚有家又塔院僧伽傳法處阿育放光時到頂直無縫透心横有枝梅間詩鳯咮竹裏酒鴟夷醉上危層去空明渺所思燈夕獨酌二絶鈿車羅帕禁街夜珂傘炬城沙路春少不自強今老矣落梅風暖酒生鱗海濤風定柳枝曲江檝波明桃葉歌剪燭停盃聽宛轉不妨白雪映青蛾送游考功將漕䕫門七絶温公一傳諌議劉菊坡一傳吏部游長庚伴月天欲曉西照太白南羅浮神鼎一鑄魑魅怖法鼓四震波旬悲祖宗涵養天下氣留得此脉扶顛危欲鳴不鳴銜口馬欲去不去羸角羝排天絶呌河漢裂􅃗舸飛上岷江西古來刀鋸鼎鑊具用待誹謗妖言人掁觸不怒予節去惟天爲大知堯仁金湯棄去七百里珠玉走盡六十州誰生厲階不可問桔栢江上風颼飀燒畬瀼外竹枝瘦踏磧灘上桃花肥繡衣故郷豈不好爲天下計母庸歸四肢誰謂可無骨五臟自信難留寒􅉥予望之不得語但願萬里書平安正月二十四日早夢乞聦明於東坡東來一舸横天上御風而行無􅀧浪有人野服帽髙簷宛如赤壁圗中様舉手疾聲呼先生爲我心孔開聦明䱼然一􅀏􅀂相語乞得聦明不如魯老人晚得女眞眞又曽孫女金華皆再周而殤葬塔院後今春焚化用前韻賦詩謹和窣波影裏誦陁伽古佛燈籠護絳紗智慧竭羅雖正果慈悲妙善亦空花怕寒婉孌􅀄拳蕨望􅀨醒鬆細舌茶節物感人還自解有兒何用女當家送澄維那訪舊湖山梅子酸猶淺桃花􅃩已饒春風開口吸明月換肩挑鶴向平湖放猿從古洞招出門天地濶何處不逍遥葉主簿挽詩生理鴟夷子心期桑苧翁行厨脩竹月坐艦落花風雛好􅂊􅀌鳯行踈忽斷鴻呉松明逺目一􅀧夕陽紅謹和老人古硯韻破壞憨僧衲凹欹漫叟窪吐雲頭縮蜃啖月口呿蟇宫㜮愁難捧堂胥怒可撾莫貪濡筆利浪草侍中麻路逢徽州送牡丹入都飛絮遊􅁝弄霽華出門芳草􅄅天涯太平莫道全無象脫繡鳴鈴傳送花首夏一絶示徐錦囊金九未熟櫻桃過錦幄俱空芍藥來共坐晩凉觀物化床頭有酒爲君開荅王仲鈞兩首無言安止止不動妙如如􅁀虎未聞道汗牛空讀書赤窮遑恤後白坐且求􅀄寂歴野花晩嫣然風􅀨餘老鏡風霜飽離觴歳月悠曲多傳郢水前郢州司理詩亦到􅂫州拽轉撩天鼻抽將閙市頭投林母用急時至㑹封侯次子有下第韻東風換骨立成僊五色終迷自古然龍變未符今舉䜟鶴來當驗後科縁情如中酒冝親酒命合腰錢㑹有錢許買娉婷供老伴不妨遲得兩三年荅駱肖秦過我葵榴巷留君筍薤厨􅁭懷新雨快面目故山癯自􅀏􅀌飛鶴誰憐返哺烏未應埋没得囊有萬驪珠􅀄夏即事一首謝俞德逺惠茶病眼昏花􅂴讀書閉門恬養冉溪愚一簾草色蛤呼伴四壁樹隂雞護雛巳是歸來何用引本無太極不湏圗小團自汲新泉試凉滿松風石銚爐重午山蹊獨歩扶病索清䕃循林歩幽霏花拈勃姑飯草拾蝦蟆衣良藥觸手是壯容轉頭非昜􅀘天上漏難駐人間暉寒暑遞流斡悲樂相因依功名少終吉冨貴多危機李泌語欲咽屈平志空違不如滿引酒舉丗知我希平齋文集卷第七
