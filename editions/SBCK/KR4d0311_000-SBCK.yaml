body:
  text: 古賦大冶賦老圃賦閔垊賦烘蚤賦卷第二詩一廬山五猗解纜晚晴水宿過四望山阻風呈趙史君三絶左蠡落星寺入山三峽橋萬杉寺酌觀音泉瀑布開先寺後青玉峽大􅀌山東西林天池燈􅁃樓谷簾泉楚城靖節祠湯泉歸宗墨池三疊泉白鶴觀楞伽山房二絶水行洪園洗心堂飲中偶成荅仲肅梅鄱江樓晩望有感取凉二絶敞雲樓二絶正月三日遊東西園擬古送莊郎中歸朝二首次林同年韻二絶送陳倅陪郡侯出郊勸農六絶夜讀夷堅放卷偶成秋夜次韻曹提管楚東之作中秋對月次曹提管韻和黄宰木犀清斯樓分韻得里字次韻曹提管梅次黄宰早春韻分岐四絶呈及甫白鹿書院和黄幾叔墨梅二絶和黄宰招飲觀芳草次黄宰韻古竟謝崔楊州辟七首送潜同年敷調官歸嚴陵道上􅄂詠七絶爲清隱打化僧􅀃偈丁東泉昭君行春日山行二首挽中書俞侍郎二首贈希聲居士江頭􅀉致逺二絶􅀉崔帥卿贈趙同年别壽崔帥卿七絶續洗兵馬上李制置送興元聶帥送新婺州汪緫領歸歙送崔少蓬南歸五首平山勸農呈丘帥二首挽孫謙伯二首次繆仲右韻二首用胡衛道贈姚居士韻孫推内子挽詩李致逺母夫人挽詩二首送商緫郎三絶挽伯父二首次張亞夫喜雨挽李漕二首次洪漕韻二首􅀉趙景周撫幹二首贈洪子需二絶口占贈相者送丘都承卷第三詩二呈同行諸丈遇風出陸次程及甫韻次及甫韻送致逺别九日復口荅程及甫徐少望宿柁頭次及甫入沌韻又荅孫正叔祖母哀挽二首夜泊劉郎浦二絶夜泊柳子口荆州江浮水燈作佛事江陵渚宫又次及甫渚宫艬舡次及甫即事登無盡墓次程教韻二絶次及甫覺寒舟中望南山次及甫韻青草夢詩次及甫入峽􅄂詠峽口十二培平善埧至喜亭三游洞二絶釣魚石翁蝦䗫培泉聖節日望拜黄牛祠有感荅及甫和又用韻十月晦過巫山二首峽中八陣圗次費伯矩贈行韻五首崔綿谷共賦亭次韻詩告至李漢州叅政李公以勤謹和緩勵後學江憲益以公廉忠信爲八箴因賦詩贈别次王同年晞鴻不遇之韻九日閱武退而紀事酬呉教程丞送髙才卿守永康二首贈相士郭少僊水僊鏡月酒後戯呈及甫偶成梅二絶荅呉叔永叔長二絶荅家朝南二絶次髙永康送行韻重過劒門荅程教見和梅詩二絶和虞仲易送行二首次李閬州禀議三首夢中得蕎粥詩和程教元日韻次鄭宣撫詩刻韻酬􅀺倅元夕春日即事再用韻春行次程廷邁春行送王萬里赴闕再和廷邁草堂次虞憲日近即事五絶垂去送崔吉甫分韻得舎字次李叅政晚春口占十絶次朝南送研屏香几韻和李叅政東園韻十絶次程季允韻謝髙倅送糟蟹破故􅁓荅髙才卿二絶次劉後溪和雁湖即事十絶四月壬午發利州二絶漩口帽子簷水宿發閬州二絶回龍寺松􅀛勝寺枸􅂎伏中宿冨樂山賞泉次張伯脩韻宿觀音寺次朝南韻二絶青渠追和宋金部壁間韻幽芳晩凉􅀝䆫觀稼二絶龍尾食菜讀楞嚴得老人書中詩用韻次徐隆慶夀詩韻二首卷第四詩三壽崔西清二首試院口占二絶隨筆林氏著存亭馬城詩􅀉趙耤令挽李貫之郎中二首次張義立登九頂三絶大像烏尤清音亭萬景樓次韻六絶壽鄒茶使三首次曹瀘南韻三首大雲寺同王翬父晚歸用伯脩韻迓虞提刑嘉陵江舟中三絶落􅀥岸行新井道間安泰戯成四十字􅀉王翬父和􅀺德升贈别應提刑招飲北山伯矩同登牛頭過三鶴山二絶入少城題李叅政范殿撰大散關詩後次李公謹美人行見􅀉後溪挽詩二首柳絮二絶追和及甫雪用虞仲易觀棊詩韻拜和老人見􅀉韻彌牟觀土八陣􅀉程嘉定楊漢州見和荅之二絶荅程嘉定二絶賦隆慶徐守蜀固堂送王崇慶得樽字昭化送交代王公輔行三盤蟇頥棧道三首赤崖讀史三絶用蜀行送徐隆慶守金州毀鄧艾廟西龍道院賦龍州麩金丹砂七夕夜坐雨范漕仲武季克雲坡官舎見月三首酬程嘉定楊漢州見和三首又次程嘉定三首次及甫見􅀉二首次費伯矩護印道中韻生日口占用王火井見􅀉韻三首送曹瀘南赴闕薺餛飩羅浮髙壽崔制置張太博亨泉用韻荅廷邁送范漕赴召八絶􅀍檄出城次李綿州韻二首劒外驢潭毒關送崔先生東歸次仲禹韻二首壽鄭制置讀書樓二首發龍州泥溪兩首荅及甫見和兩首唐何循吏廟先妣忌日發昭化荅贈劉交代二首僊鶴樓避暑次韻張提刑方送行六絶卷第五詩四次楊瀘南韻岑公洞開濟堂東屯髙齋中秋秭歸岸下懷程及甫二絶獨醒亭温泉院二絶劉家江阻風二首千竿夾包港風濤二首寧宗皇帝挽詩二首送章君範之湖南幕􅀉題張宰壓雲樓二絶送杜陽安奉親還蜀二首和髙續古省中雪省中和何子温見􅀉和何特夫見􅀉送秦祕監還蜀二首送張行父守贛二首送客一首送眞侍郎和續古􅁡术贈小兒醫和續古謝送墨題周昉明皇對弈圗乙酉應詔言事去國天基節趍寶福院寒甚大人用韻再一首乙酉歳暮有感三絶敬和大人新年韻梅二絶又用韻二絶挽禮上人和開之社日春事寒暄不齊二絶敬次老人即事清明二絶次韻西塢道庵雪歎二絶桂子次韻贈阮甥次韻􅀟桂閑居鍾惠叔轉示趙臨安兩山堂諸公詩刻隨喜二首挽阮開之柳杏柳用前韻上巳呈子有顔延年三月三日率爾成詩重韻太率可􅀏百舌晚食次韻荼䕷二絶官採木楊花春禽􅄂言次韻賦桃源無脚橋次韻映山紅送家同年守簡池浮玉道士琴山中吟損戒二首引鏡苦笋丁謂食糟行五月庚申夢人指爲馬周且誦詩兩句覺而足之苦笋用前韻天􅁚用虞提刑見􅀉韻荅之次韻夏日瀑布狐䑕次韻髙蓼示諸兒續夢浄􅆊僧頥􅀩堂讀漢書六月卄八入朱陀山寺促織荅子有用韻荅游司直侶見􅀉龍池沙漲卷第六詩五秋半聞鶯夕陽讀書蠖室秋山即事方氏棣華桂叢亭各一首送􅀺德升出守眉州二首晨起敬和老人秋日山行和子有雨中述懷㝷梅㑹心清虚堂六言爲浄􅆊僧作挽萬將仕􅀉題真相寺遥月堂烏息隱山堂覔詩米積外科僧照源堂至節前一日遊汪茫田至日歡喜口號二絶獨夜雪留董景􅀭立雪髙壷隱挽詩山房藏書萬三千卷子有賦詩用韻又荅景􅀭挽章冠叟再用陀字韻斸􅁑行卒歳疥癢和雪寶雲庵戒師戊子新元老人七十有詩自述敬和用韻荅子有歳事羅察院父瑞桂堂治平寺清音堂春行二月二日晴枕上口占敬和老人青梅􅀧檢山房用呵字韻同日次韻可庵長寧髙守見􅀉用韻陳尉信伯括水傷冒雨下朱陀示兩詩次韻老人挈累下西市感而賦詩呈友人二首用老人韻賦瑞梅鍾太君挽詩鍾雲叔挽詩羅震龍母胡氏挽詩水牡丹東山塔影東西山二絶敬和老人寓舎午困再賦二首題李杜􅂫黄像生雲軒雲閑閣各一首夏至過東市二絶和黄伯淵見􅀉二首敬和老人覽鏡又和憶可庵次韻夏日敬和老人荷花鎮越堂辭西庵晚歩次韻七夕蜘蛛晩徑六言中秋敬和老人石菖蒲又敬和還家自喜又敬和還家次韻趙丞讀紹運圗洗研贈俞次孟己丑新年病起獨歩荅請事簡寓事六言次韻西山次韻遣懷挽元寂王道士古意中春望後一日登玲瓏夢語次韻娑羅花讀漢事粥罷識字行散䇿花獅老人賦芝隱樓次韻又敬和寓舎除妄晚凉迎秋敬和老人盆池喜雨簡趙丞古樂府用禮滅翁韻四槿花用王司理垠韻送别二首挽鍾孺人挽阮宣義􅅄菊二絶章升伯妻孺人挽詩用禮滅翁韻山中菰生米用子有韻􅀄霜九州山僧房挽俞致政挽銅里葉提􅀧徽州葉司理送冬笋挽俞景梁用韻荅厲輔卿二首用老人功臣浄土院韻石斛卷第七詩六庚寅元日甲子晴元夕水仙蘭燈歎對門兩絶禽語讀元公輔傳有感示諸兒阮亨甫夀樂堂澹庵秋懷二首記夢山行紀事和何伯温見􅀉二首和子有感時歳杪用韻二首侍老人遊􅀟林和老人明朝中春二首春行次韻病齒春思三絶偶成三月晦東山續夢作茶行送程於潜兩首新月百合花雨中次韻兩絶送徐顯道尉無􅃬二花理菖蒲閑居二首􅀟林志廉得元暉筆法爲賦六言兩首送阮深甫尉桂東二首侍老人宿超然館聞鐘翠蛟亭兩絶贈石室朱修行兩絶送趙處士遊方何正言母安人挽詩􅀄釀贈前京東王制屬翁媪行哭都城火辛卯還自谷川道中兩絶遊勝因寺謹次老人至節韻至節出謁回二絶病目椒菊枕俞提舉挽詩二首奚知縣挽詩臈中歩月二絶何正言挽詩謹和老人惠山泉二首歳暮山中紀事三首除夜新年謹和老人欲還故廬謹和老人春行又塔院燈夕獨酌二絶送游考功將漕夔門七絶夢乞聦明於東坡老人晚得女真真又曽孫女金華皆再周而殤葬塔院後今春焚化用前韻賦詩謹和送澄維那訪舊湖山葉主簿挽詩謹和老人古硯韻路逢徽州送牡丹入都首夏一絶示徐錦囊荅王仲鈞兩首次子有下第韻荅駱肖秦􅀄夏即事重午山蹊獨歩卷第八詩七觀物二首抹利晚蓮凉月二絶挽阮倅挽李丞和子有催歸謹和老人蓮桂二絶移居西郭重樓自和小雪前三日侍老人行山共十四首長橋渡宿妙勝閣閬山妙嚴院次無垢韻二出閬山和老人鳯口遇雨翔鳯山資福寺宿資福小閣次韻二楊墳何山書堂玉湖書院懷二倪道􅂣山葉推官無盡景梅兩絶和樓前梅兩絶送李致逺安逺簿二首夜坐又用韻洪崖圗行歳晏兩絶謹和老人賦梅和趙保之青田即事臈月二十五夜送程宗武遊岝㠋謹和老人雪晴元寂宫生祠行婆餅焦孫教授挽詩笋蕨浴罷氣體和金不換歌酬東風引溪行用呉祕書正月晦韻􅀉禮滅翁㯶櫚碧桃曲燭下次海棠送李微之倅成都次叔厚韻二佳遊僊洞次壁間韻用韻荅趙主簿謹和老人羅山􅀉題辛氏塵外樓􅀄夏里人送芍藥用韻􅀉髙子厚憫農和禮滅翁感錢氏舊事滅翁爲日者求詩用鍾侍郎韻贈􅂴谷暑夕王章暑坐和老人夏日即事二首田家建除體和趙青田燕坐新秋藥名兩首和老人看髙子厚修墓用子有述懷韻爲壽俞成大送新芋范待制子長挽詩二首和俞成大八月梅花謹和老人秋日遣懷月下用鄭大參韻東山即事過増口道中謹和老人九日和老人賦牛尾貍二首用趙忠簡孫璧韻和老人􅀄冬即事和老人􅀄冬寓筆十絶又和還可庵謁墓遂入都䑓中聽雪呈司封呉舎人謹和老人除日清凉院僧房致齋銓闈董試上已二絶除夜哭内省闈試士集英殿䇿士待宣六月十六日宣鎻恭和御製賜聞喜宴詩謹和老人瘳字韻謹和大人喜晴奉御香祈天竺觀音於昭慶寺是日得霽謹和老人賦退朝後省試進奏院吏十一月五日鎻學士院直玉堂和李參政韻老人生朝爲壽孟享從駕二絶太廟致齋卷第九記饒州州學新田記重築采芹堤記東圃記楊州重修城壕記利州通判㕔記清約堂記洞霄宫施田記於潜丞㕔續題名記奚疑堂記著圗書所記於潜登科續題名記浮溪橋記知心堂記於潜縣㕔題名記臨安眞相院修造記竹洲記此君軒記善圃記東山婆娑巖壑記餘杭重建縣治記鎮江府學田記卷第十序楚泮榮登義約序送何龔父序於潜洪氏譜系圗序豫章外集詩注序桂巖􅀟蓮圗序春秋􅀃序兩漢詔令序送程叔運之湖南序􅈸窟詩藁序題跋龍州免運糧夫碑跋易齋詩藁跋崔文昌書翰跋俞拙庵偈語跋陶同年詩卷跋彭忠毅謚勑跋家朝南避僞回任檄跋徽廟草書千文跋髙廟千文跋程剛愍死事跋題洪崖圗題西岳降獵圗題天台十八尊者像范丞相謝表跋劉忠肅尚書右丞告跋忠肅冗費官制擬草跋忠肅遺龔輔之手啓跋觀劉忠肅手簡題劉忠肅和洗竹詩帖觀劉忠肅書金剛經書李立之十全堂詩後書天竺杲古鏡住持箴卷第十一箴緝熈箴并序好軒箴銘可齋銘三研銘蠖室銘端齋銘阮逢時澹庵銘龔時俌庸齋銘鶴巖銘賛老人壽容賛崔先