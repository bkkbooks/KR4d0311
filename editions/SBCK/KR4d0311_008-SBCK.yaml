body:
  text: 詩七觀物二首飽飯茶甌罷閑觀萬物情狗加獅立號猫冒虎爲名故沼慈姑王新畦腐婢榮蟬從何許變忽送出林聲薄命天元定深居日轉長塔鈴空洛度車鐸慣琅璫筍長竹還老蓮遲荷自香羡他雛又乳􅀟燕勝春忙抹利翡翠簾帷雪透肌纎風不動閙香吹裴回顧影精神發省得京華識面時晚蓮颯然秋入井梧嘶䆫下紅蕖始脫泥但有意開何論晚縱無力上不嫌低魚貪芳影機還熟蝶怕深香路自迷更把閑情堅耐着明年花與屋簷齊凉月二絶蓮房折盡只留荷露蓋班班一丈過髙下横斜無定影聚凉着得月明多金粟安排􅀨後黄定知花亦愛新凉夜深月透玲瓏影花自光明月自香挽阮倅膠庠推博洽州縣著廉平人物萬夫特山川千古英虬髯横意氣猿臂鬰功名一掬同年淚西風浩蕩情挽李丞篤敬古君子公平賢大夫筆端知已有劵外得心無落日揺墻竹淒風墮井梧蓄深施不盡留與讀書符和子有催歸卜廬必擇地買鄰不論金出機與入機去心即來心拗性臨川翁罷相老境侵霜竹鍾山寺雅􅀉金玉音強項峨眉僊渡海憂患深􅛉稏陽羡田歡言飽甘霖故山月在眼客屋風滿襟欲歸欠生業隨寓如家林覔榿適閑趣借竹供清吟俛仰一逆旅乾坤古猶今謹和老人蓮桂二絶􅀧破秋光數葉荷水清時見小魚過渟涵風露三更足収拾江湖萬頃多搗成一百八丸黄入手能令熱惱凉金粟如來身巳化蕊珠僊子骨猶香移居西郭重樓閏九十八欲歸未辦買山資東􅀉西存漫一枝樓上起樓渠自巧客中作客我何癡﨑嶇溪歩通虚市鬰屈山蹊護短籬不用子猷親種竹屋頭元有緑猗猗自和得寮便住似西資誰暇安巢更擇枝閤宻不妨中酒聖樓明大好養書癡誌公分料存刀尺龐老家風欠笊籬大厦千間宵八尺傍人莫􅀏太窮猗小雪前三日鍾冠之約余侍老人行山舟發後洪入杜塢自鄭蓋庵過閬山趍翔鳯山菁山徧覽楊墳秀園遂至何山道􅂣山乗興薄呉興訪玉湖書院水晶境界而歸自戊子至庚子隂晴相半勝處輙徘徊賦詩飲酒偉哉觀也數詩見後溪流轉處兩三家落落踈林淺淺沙可是小春風物早檐頭一束杜䳌花右長橋渡止水攪不動好山邀輙來松間寒月晚似欠兩翁催右閬山妙嚴院松月堂讀張汪二公詩有感用無垢韻鈎輈格磔鳥呼晚勃窣媻姍人試寒野水不流山四合寶華雲裏着欄干一徑白雲明似雪滿山紅葉􅃩於花過溪買酒等閑事只恐客來非當家右宿妙勝閣無􅀨又無日此行天相之荒園遺木老古隧得峯竒霜晩􅂼猶劔風温茗巳旗行厨何用許勝處可忘飢右出閬山狂暖釀成􅀨逆風揺斷橈寂談王舎衛悶想欎臺蕭遊興􅀌芒屩歸期數翠翹推篷占霽色木末散聲招右謹和老人鳯口遇􅀨聽􅀨客無寐放晴山有靈禪􅀜深紫翠勲廟肅丹閑事只恐客來非當家右宿妙勝閣無􅀨又無日此行天相之荒園遺木老古隧得峯竒霜晩􅂼猶劔風温茗巳旗行厨何用許勝處可忘飢右出閬山狂暖釀成􅀨逆風揺斷橈寂談王舎衛悶想欎臺蕭遊興􅀌芒屩歸期數翠翹推篷占霽色木末散聲招右謹和老人鳯口遇􅀨聽􅀨客無寐放晴山有靈禪􅀜深紫翠勲廟肅丹閑事只恐客來非當家右宿妙勝閣無􅀨又無日此行天相之荒園遺木老古隧得峯竒霜晩􅂼猶劔風温茗巳旗行厨何用許勝處可忘飢右出閬山狂暖釀成􅀨逆風揺斷橈寂談王舎衛悶想欎臺蕭遊興􅀌芒屩歸期數翠翹推篷占霽色木末散聲招右謹和老人鳯口遇􅀨聽􅀨客無寐放晴山有靈禪􅀜深紫翠勲廟肅丹青鼇􅀒摩雲碣龍扶拱日屏眞如無盡意石澗水泠泠右翔鳯山資福寺古木隂隂兀老蒼月於踈處弄昏黄廵簷不見梅花面認得東風句子香小䆫無欠亦無餘一榻翛然雪透膚収拾故書藏恰好怕人冩入鳯山圗右宿資福小閣次梁間韻生前圗形燿凌煙死後起冡髙祁連垜樓隂合蒼官立輦路苔生石翁泣呉人最重十月朝􅁓錢掛冡風飄飄積金至斗命可買玉帶貂冠鎮長在右楊墳日髙褁飯看何山山缺東南水遶關松檜不揺風自度讀書聲在白雲間右何山書堂何山如幽人道􅂣如大家穰穰衲子脚刺刺騷翁牙挾雋控寒飈搜光躡晨霞危顛矯窣堵平疇畧汙邪巖泉跑虎湧徑松髯龍拏鍾􅆊破深寂金碧開紛葩脩廊歩屐峻傑閣望眼賖山勢珮玦矗湖光鏡奩谺清苕杳靄入古弁空􅄥􅃒列翠軒名新建不可唾群􅄜無敢譁坐我旃檀林酌之槍旗茶宇定岫出雲語妙天􅀨華吾生乆墮甑昔遊慣乗槎夷猶廬阜陽宿留岷江涯髙曽凌嶠棧卑或搜崖窪昨夢難歴省此行足雄誇老親八十健閑儔二三嘉拍浮一葉眇収攬萬景奢冨貴上蔡犬貧賤東陵􅀲未湏􅀏落鐸誰能苦觰沙􅀱門占噪鵲旋橈趂歸鴉竒事恐没没舉詩屬僧伽右道􅂣山苕霅趍太湖地少天宇寛髙低寶樓閣盛之水晶盤中有讀書廬八䆫頫晴瀾衡弁儼相望不受湖光吞彼美金玉人伊吾斗䦨干􅀐鯨渺何許衰柳風露寒右玉湖書院懷二倪繫舡官柳根闤闠得深宻日落逺水明雲収好山出天開有聲􅀞人立無價璧酒行不湏多鷺下菰蒲夕右葉推官無盡景梅兩絶風霜揺落都盧盡一􅀧春回造化家萬物成終又成始湏將艮體看梅花寒根不與物俱陳髁髁梢頭寂寂春却月凌風誰㑹得不沾一葉是眞身和樓前梅兩絶飛香漲艶拍簷牙暖熱樓居鄂陸家寶髻盤鴉冰柱曉􅀝䦨平折北梢花樓髙夜静月華陳冷浸含章一叚春人影花光相上下定知梅亦解分身送李致逺安逺簿二首四海幾青眼五車今白頭信天投矮屋覔地起岑樓山逈風煙合江平潦霧収誰歟人物計留取備枚鄒與我迭知已喜君􅀄得官時來寧論晚身健莫辭難訪雪牽魂夢停雲􅀉肺肝斯文元氣在努力好加餐夜坐夜永難爲睡群兒坐伴翁漉虀冰甕碧撚豆雪爐紅清誦聽還雋閑談􅀏又烘安排明蚤供薺長後園叢大人和云樓厎雪千峯樓頭着寓翁梅方開蕚緑桃巳亞枝紅斟淺偏勞勸眠遲不受烘錦城春在眼何暇問􅅙叢時四川李制置以榮州見辟辭之也某因用前韻􅀉榻髙寒地収心􅂴散翁雞鳴虚室白鴉起小䆫紅古操塵絃拂新詩凍研烘桃梅芳意覺不是去年叢洪崖圗行葉知録溥臨龍眠本見遺脩髯危肩老僊人布􅂁革帶烏靴巾􅅐中不着半􅀧塵天地萬象肧腪春扇者橘書者栗瓢者术韁而掣者􅁑笠而鞭者拙中間厖然大者雪從我兩髯三髧一蹩躠驢何鈍奴何癡前掣後鞭趣使馳麾鞭愈急行愈遲掣韁欲斷人驢疲但見尻秃秃蹄局局欲墜不墜止鳴木本無􅇊倆能噴玉正可吞聲春草緑先生御氣存其神下驢歩行意更眞從渠蹇材拗莫馴超然目送八極轡鳯驂麒麟歳晏得路􅃗輪車易上失時獨幅􅀍難眠淡黄虀飯茅柴酒東掩西􅃒也過年百想卧輪翻􅇊倆三生圎澤弄精魂何如静對梅花坐春滿江南雪後村謹和老人賦梅􅀉得江南驛信來窺林映水幾枝開形容綺語空能絮酬荅芳心揔巳􅁅厭舊趍新和粉染奪眞弄假􅀧酥裁紛紛兒女春風惱却􅀏詩翁醉打隈和趙保之青田即事寶犀壓帳春風入渇烏傳箭寒澌滴砉然推枕起放衙霜月滿庭鳬鴈集簿書顛倒六作五文移縱横一取十精神坐照吏姦破政事流從儒術出墨池霹􅆮送飛雨積案如山􅀏譚畢逢迎合爪逓相賀戒石亭前見天日公餘琴疊舞胎僊客退爐熏齋繡佛芳蹊桃李不自言舊燕新鶯沸消息詩筒入手如見面金井新泉生玉色汗青不朽湏早計過眼年華征羽急臈月二十五夜䏑玉懷雪貍膾銀憶冰鱭異哉山澤荒坐我窮􅀑祟兒頭似耶白相對玩殘歳爐寒􅁅熒熒檠涸燈翳翳擘柑老赤脚煖酒小青髻一酌佳入蔗再酌甘勝薺陶然㑹道妙嗒然司德契吾身與乾坤共此小關棙三百六十節一節一節繫四萬八千息一息一息繼日月有往來隂陽有開閉太和行其間周流無邊際臈盡梅紛披春回柳揺曵非時難強揠有命莫過計顔回簞瓢空季路緼􅂁弊只恐非大賢公不待後丗送程宗武遊岝㠋驟暖揠芳意薄遊烘軟塵亂山雲氣曉啼鳥杏花春人物少催老物華新換陳一聲鏗爾瑟沂水緑鱗鱗謹和老人雪晴雲屏九折跨三休公欲行春雪不愁逗暖流澌鳴暗谷送晴倒景􅃞層樓似無似有草㾗動半落半開花氣浮婆餅焦聲林外起便從野渡喚横舟元寂宫生祠行上元庚申間臺珍館嚴鶴林老桂鉅竹籠春隂􅀐鶴僊翁杳莫㝷適從何來貂挿金裳珮丹青􅄂璆琳旗旛繡綵薫甲沉蕊函三洞羅森森雲璈九奏鏘愔愔擁爐歩虚揺箕參稽首寥陽祈博臨庭下朝謁紛冠簮願言福壽髙於岑問子爲誰對輙瘖以目代口手拊襟伊民豺虎國蠧蟫細大敲剥無遺針凛虞膏血供几砧巧䛕曲媚求回心天乎少戢湯火燖庶幾沸魚逃釡􅑄上帝福善禍必淫髙目下耳一監歆察此頌禱皆呻吟革彼飛鴞懷好音嗚呼愛而祠者古畏而祠者今安得皥皥相忘武城弦歌單父琴婆餅焦萬斛精神一握身清吭宛轉欲飛塵雞􅂊唱後便知曉燕未來前先得春驚覺海棠休苦睡提醒楊柳莫空顰最憐吉語能相報麥熟同爲皷腹人孫教授挽詩手織天孫錦胷吞海􅀂洋官卑材不盡年往慮空長啼鳥呼春夢飛花餞夕陽唯餘君子澤挿架簡編香笋蕨小兒握固骨何弱稚子着綳肌尚寒豈不愛渠風味好只應催我􅁂毛殘浴罷氣體和浴罷氣體和坐睡便胡床首欹如汲瓶數俯輙一昻瞢騰復瞢騰慾泯想亦忘乾坤孰髙下今古誰興亡矍然瞠兩眼踈䆫半斜陽䆫下櫻桃花無風自吹香金不換歌東家鼎貴萬户侯西家􅁀冨十谷牛喚􅁝呼竹進玉舟把酒巳作明朝愁中間人家賤貧慣旣得未得兩無患晏眠起喫盫菜飯飯罷亂拈書􅁽看此樂名爲金不換酬東風引魏鄭公田舎翁陸敬輿老獠奴斯人斯人尚如許薄命蛾眉何足數野桃溪杏次第紅脫袴博酒酬東風溪行却掃晝隂永意行溪上汀􅁂華年减黒草暈日添青魚舞新磨鏡鷗飛小􅀞屏梨花寒食近誰與管飄零用呉祕書正月晦韻攬春群玉冩芳懷次第安排到藥苔但得斯文留脉在湏教我輩放眉開踈風細􅀨桃花過竹屋柴門燕子來老去湖山無復夢荷鉏西崦覔榿栽禮滅翁退天台能仁院歸梁渚一絶􅀉之倒劄枯藤立晚風山光不與水俱東蘋花落盡蘆花老地闊天髙一箇鴻㯶櫚舊脫敗蓑亂新添華節髙肅容春尚静俠氣夏方豪黄孕子魚腹青披孔雀尻豐撞知可製雷動景鍾號碧桃曲草平不斷瑶池路樓礙東風花滿樹緑眉素頰澹裙裳月華暖透三更露􅀟成飛瓊妬髙妍引梢揺月分嬋姢雲璈一曲迸空碧青鸞驚起花翩翩燭下次海棠紅深翠淺浣花春投老相逢過所欣有許精神冝半睡無多醖藉莫全醺涵渟芳露湏饒月籠護晴暉不礙雲成就化工眞冨貴天香更與牡丹分送李微之倅成都鳯生丹山西來爲太平符矯立青琅玕祥雲蔚相扶一鳴合簫韶再鳴應騶虞散爲清明風萬象皆旉與色舉抑何决矢脫金僕姑戞摩參旗髙可望不可呼穿花迷嬌雉唼藻戯乳鳬搔首重太息春隂渺江湖次叔厚韻夢斷紅塵踏九衢雲山佳處借樓居採將瓠葉隨冝煑拾得榴皮信意書未問我今忘我丗湏知吾本愛吾廬黄公壚在花隂裏磊砢從君一破除二佳佳笋如佳人柔晢飽風致佳醑如佳士醇明􅀒骨氣此笋配此醑可愛不可醉得醉豈不好醉恐不知味蔚如王謝家文雅將冨貴二月二十七遊僊洞次壁間韻􅀧脚地維絶舉頭天語聞瀑泉飛響雪洞石湧崩雲縹緲追元放低回揖郭文神清知好在煙鎻緑苔紋用韻荅趙主簿逸氣蓋三謝英詞參二班飛緌冝北闕枉駕忽東山花妥晝隂寂絮吹春思閑光風知幾轉盡付酒杯間謹和老人羅山自鑄鐵成錯誰吹􅁅使然俗情床上下野趣宻中邊花􅃩明光錦苔㾗白打錢醉翁詩板在山莫放童顛􅀉題辛氏塵外樓羅浮三十里樓對玉崔嵬風卷軟紅去雲扶飛翠來㑹心湏盡帙適性莫多杯除得翳根盡靈光生鏡臺􅀄夏鶴帳華纓絶牛蹊老屐穿薄晴生晩哢深緑護餘妍萬卷不堪煮百懷空自煎朱櫻黄苦笋小酌便陶然里人送芍藥用韻詩墨淋漓似小王殷勤包贈暖紅香楊州金繫腰何在隨分留春共一觴􅀉髙子厚因讀東坡馬生本窮士詩有感而作盤隱門下客流落餘兩箇我故稔子窮子亦諒我懦穉松髙未尺早望屋脊過小蓮出􅂊寸便譽車輪大急灘倒撑舡狹路錯推磨不誚材無堪祗嘆命未作去聲沽酒勞閴寂褁飯問寒餓爲分猢猻愁相對槖駝坐有無共甘苦休戚先吊賀綢繆平生期荏苒歳月蹉人情少耐乆丗事難預課欲㝷買山盟恐踏筭甕破憫農時邑令建長橋麥黄􅅙登簇秧青􅀨催耕農家竭作時無工搏蚊蝱短杠鴈鶩進脩繂螻蟻行謨蓋溪壑滿名言輿梁成吞聲不敢怨但願天長晴和禮滅翁感錢氏舊事民不知兵物自華表忠消得老碑誇虎符龍節故王國鳯舞鸞飛今帝家遺廟斷垣低槲葉荒村舊井濕桐花馮夷尚怕潮頭弩一望西興渡口沙滅翁爲日者求詩大橈甲子一串穿東州西州走諸禪芭蕉虚實果何物橄欖苦甜猶問天華光佛壽十二刼瞿曇像法一千年兩翁見子肯倒屣好爲推到無生前用鍾侍郎韻贈􅂴谷蒲團竹几妙髙臺瞑坐何能放眼開門外白雲多事在又將飛雨出山來暑夕樓髙収晩照野逈送宵隂鷺下汀沙静螢行岸竹深攖寧和順氣縁督正平心轉物天機妙昭文不在琴王章皂囊盥手自封題忘却牛衣忍凍啼一􅀧丹心通碧落歳寒寧􅀒白頭妻暑坐隔簾草樹隔溪山宻宻深深洞啓􅀜水色山光無障礙南風送入亂書間謹和老人夏日東山即事二首剗草根湏盡傳花葉未多明波撑窣堵老石卧盤陀煨美甘分芋蒸肥欠褁荷醒然下山去明月滿林阿菜把野園送花枝隣巷賖搗蟾和絳雪􅀐斗弄青霞古帖臨禽李新詩續稻􅀲晩凉隨杖履携酒訪魚槎田家建除體建鼓勸竭作除田緑紛披滿築沮澤岸平流綺堘陂定約欲水均執熱願雨隨破柱雷電合危簷溜紳垂成功一天瓢収穫萬京坻開元正觀盛閉􅀜更休師和趙青田燕坐青田鶴翁杜德機天根月窟手探之嬰兒姹女熟摶弄妙處不許旁人知渠家庭院紛花藥啄木黄鸝幾推郤流􅂫百子卧春風萬慾難供無厎壑生門死户一線間内丹走盡求外丹明朝赤黄裂大山護鼎龍虎方閑閑新秋藥名兩首老色蒼蒼耳向聾秋聲欺得白頭翁已甘草詔元無分只苦耽詩乆欠功引興從容風月足放懷浪宕水雲空雨餘凉意生庭户夜半天河鵲信通兩眼旋花雪􅀧􅂡鑚頭故􅁓枉工夫勌懷􅂴附子公櫝閑性熟諳摩詰圗枝拂雲香行到桂葉隨風舞又催梧乗槎欲到空青問織女牽牛事有無謹和老人官山看髙子厚修墓秋風問訊老芙蕖靖節前行後阿舒緩䇿穩過金絡馬小烹佳勝蔗漿厨何榮何辱人千古誰是誰非􅃁一區遇着好花隨處醉莫論他屋與吾廬用子有述懷韻爲壽筆力強於二石弓文􅂣早合擅元戎東西塗抹未爲老左右圗書那得窮三日窺牛酬壯志十年到鳯䇿竒功更湏傳取長生訣􅁡炬髙燒不受風俞成大送新芋謝三郎女敗蓑衣繿縷中藏玉雪肌柱下莫愁無乳媪秋風得此可忘飢范待制子長挽詩二首太白曉􅆋􅆋飛鴻秋􅁳􅁳氣節蚤巳勁勲名晚逾馨冰霜蜀棧蹇風雨秦關腥一范不可作岷峨千古青生不餌栢寺死􅂊跨松階浮雲忽易滅明月終難埋宇宙卓有立江山渺無涯掩卷獨搔首西風知此懷和俞成大八月梅花秋光深處送春來青葉扶踈數􅀧梅料是知君新釀熟􅍴先九月菊花開謹和老人秋日遣懷鬰鬰年來亦欲東窮魔揮斥欠天蓬得甜自喜皆花宻與苦相忘獨蓼蟲張望紅秔新作業柴桑青菊舊家風隣翁強解人間事數問朱轓甚日熊月下用鄭大參和沾維那圎覺韻無縫冰輪萬古同御風飛到碧天中四方上下無􅃒礙一􅀧清光處處通東山即事西風卷宿祲天髙近重陽閣虚自沆瀣塔静能琅璫幽花多素英穠香奪春芳老木未黄落繁隂生夏凉棋雋决楚漢杯壯迷彭殤醉㡌信孟嘉歸鞭忘􅁑強萬事貴適意誰能扣蒼蒼九月四日過増口道中秋光拍塞小村墟髙下人家意自如屋厎四􅅙抽蛹細墻頭三桂着花踈握兒早秫酒無限杓子晚菘虀有餘大似元豐年界好天應容我老樵漁謹和老人九日樓頭獨立夕陽西摇落髙風萬木嘶人自官芻銜馬口我方社酒薦豚蹄一塵不着青銅鏡萬法皆空黒􅃮箆節後龍山應更好秋光拍滿錦障泥謹和老人賦牛尾貍二首踏白霜明夜牽黄木葉秋斕斑文未豹觳􅑌䏑先牛壓玉開三面蒸酥讓一頭酒邊纎手削醉倒老浮丘北雪佛貍種西風金狗秋謀生貪過䑕逃死喘如牛糟熟涎奴舌虀芳􅀧客頭何時明獵火吞盡楚青丘趙忠簡孫璧見過有詩用韻薄命窘震凌餘生颯糞朽閑閑飽欵竹寂寂老鍜柳溪空漁争隈野熟飲􅀍肘有隣晨致薤無客夜剪韭忽來闖户屨自挈問字酒􅀄見了眉睫徐語應心口顧予果誰與恐子不我友維昔燕夾攻坐使汴失守應奉固亂階新法實禍首療危非庸醫救敗湏國手豐魏兩翁􅁬􅀜洛􅀌憤乆人謀宻相濟天意斷非偶攻守豈必同勝􅀒亦常有誰推姦人岀竟墮􅃛虜誘包將復讎戈付與掃愁帚風雲激矢脫日月峻輪走殘羶汚北雪遺憾掛南斗功名本同舟學術廼各牖一時䇿得失千古史妍醜忠簡社稷臣尚起九京否謹和老人􅀄冬即事莫怒狙公賦芧慳萬縁一定不容干老便䆫下迷離暖醉愛尊前郭索寒屑玉晨光明沆瀣流珠夜氣鬰蘭玕但能飽喫長年飯射虎南山有分看謹和老人􅀄冬寓筆十絶平泉草木湏􅁷夢金谷鶯花一撮塵冨貴􅀂生根到厎兩家占斷别無人是非不驗道應壞禍福無慿天也荒便使曹瞞生賣履巳賖王衍死排墻何人地下管天條不是臯陶即是蕭金埒謾誇錢過斗鐵圍寧問玉垂腰當場弄出百般竒傀儡棚中老偃師滿眼機􅀜無着處到頭線索有収時兩儀亦有盈􅃜數萬物難逃出入機一把牙籌空自苦蓋棺着得幾通衣避風䑓上深情寵偃月堂中盡意謀争柰天公無面目滿林黄葉一畨秋煑茗燒香􅀟赤脚撿書洗研一蒼頭斯文興䘮由天在未用安排地起樓元子掃空桓氏業窟郎蕩盡李家風前人留得兒孫立何患鸞枝不長桐方窮蔡澤問唐舉未遇鄴侯逢􅂴殘觸石起雲能沛雨不應長作旱雷看命有窮通分虎䑕事無得失盡雞蟲東籬獨有黄花在挹取寒香壽阿翁又和青女籠晴試小春門前沙路浄無塵平洲水竹因依好白鷺飛來不避人往來魚虎澗流淺出没䑕狼庭草荒宅近市傍人不到獨迎西日上東墻柳亞溪橋幾換條􅁂根添得雪飄蕭清臞自信堪􅀐鶴最喜無錢絆住腰爾雅蟲魚巳熟知更將埤雅訪農師投糟赤蟹眞無價薦餅黄雞正及時終朝聒得耳神飛東舎西隣盡販機百様攀花無我分慣將簾作後堂衣架上亂書兒自整床頭濁酒婦能謀只將翹足垂蓮勢静對書䆫課弈秋風裏行雲不自由低眉重整玉搔頭桃根縱有飛花渡燕子寧無接翅樓寒燈芳燼發春紅讀到􅃎詩繼匪風吾道有消還有長欲將此意冩􅁝桐蟹正肥時秋色老鴉争噪處夕陽殘未湏多進玻瓈盌滿樹霜紅正好看天時人事共流通何用將冰語夏蟲判爲梅花多釀酒春風裏着􅁡翁翁仲冬九日還可庵謁墓遂入都未放梅梢一箇春枇杷花巳玉嶙峋霜靴帶取苔㾗去應􅀍􅀌猿野鶴嗔䑓中聽雪淅􅄋松㕔夜空山一様聲冰霜元自勁水月更添清衾薄難留夢䆫虚易得明庭烏催奏墨未曉巳先鳴太一宫齋􅀕呈司封呉舎人立春前一日寳鑰轟霄啓玉晨風恬雪霽浄無塵東皇太一紫壇曉丗界大千青陸春藜杖流光環珮集鏠旗歛影豆籩陳樂歌湏仗甘泉筆斧藻天家㤗道新謹和老人除日吾道何通塞人情自寂喧無羔還可茗有鶴不湏錢議論追嘉祐聲名續正元壽親惟此爾一􅀏栢椒邊清凉院僧房致齋花片墻隂晚禽聲屋角晴東風猶峭在煨芋坐深明銓闈董試上巳二絶天氣年年只麽新官忙不似舊閑身油車􅀞舫西湖閙可惜埋頭典却春柳暗鴉嬌日正長筆頭風雨響脩廊一簾芳碧􅀟蝴蝶也解㝷人姓字香除夜哭内宻雪踈風客屋穿幾回除夕伴憂煎團欒方索日邊飯契闊巳成松厎眠畫火何堪思舊事理衣誰與管新年平時戒汝無多酌争得屠蘇到汝前省闈試士東風蓆帽快行催渾爲天家造士來捧詔九霄雲氣濕分題五色日華開㨂金沙裏湏精鑒脫頴囊中盡異材容受直言天子聖好聽臚唱響春雷六月五日集英殿䇿士從官待宣于内軍噐庫廊漢廷與目䇿英豪投釣知誰首掣鰲百日紅連綸閣逈萬年枝拂禁城髙内廊坐永風生席輦路歸遲月映􅂁西抺東塗渾忘却一絇短雪不堪搔李尚書季允度侍郎周卿趙侍郎履常趙侍郎適道同待宣六月十六日宣鎻禁門深鑰寂無譁濃墨淋漓兩相麻唱徹五更天未曉一池月浸紫薇花恭和御製賜呉叔告巳下聞喜宴詩致主唐虞澤兆民賢才端是國精神作人欲返皇風古拔士先隨聖化新収歛文章歸獻替安排事業到彌綸宸章屬望丁寧甚上荅天恩莫愛身謹和老人瘳字韻本期洗眼看伊周到此華胥只夢遊爛熳蒼苔心事晚婆娑紅槿􅁂華秋藏頭欲効鑚沙鼈捫舌空成噍草牛飯豆芋魁渾好在得歸不藥病還瘳謹和大人喜晴􅀨脚如麻日日然垂成生恐壞豐年九重􅆄蠁通方寸一􅀧光明徧大千喜動朝行花厎散愁銷野次葦間縁奄觀銍艾霜風晚重壓牛車倍費鞭閏月卄六日奉御香祈天笁觀音於昭慶寺是日得霽大士慈悲出􅀘陀掃除隂翳作人和武康芋子鹽官􅀥遇着豐年也倍多謹和老人賦退朝丗事鵬斥鷃人情燕伯勞心湏腔放闊眼要孔提髙陳力惟求健承㤙敢恃牢熟思歸計是春酒薦蔞蒿下元節後省試進奏院吏推雲不動􅀨聲苦醖雪未成風力乾瘖鶩一庭淘墨汁也煩老子坐深寒十一月五日鎻學士院樓頭禁皷試􅀄撾催草江淮督使麻落􅁓一簾風􅀨疾不知斜墨陣翻鴉直玉堂和李參政絶句曲折宫墻日影方堂深人静似山梁㯶櫚葉厎梅花老次第風光到海棠老人生朝爲壽迎侍京華又見春天時人事一畨新丙申兒遇丙申歳已卯逢已卯辰本分法門行得熟長生様子學來眞斑衣奉酒多爲壽滿眼光風正可人正月十九日孟享從駕黄繖中間一􅀧紅繡雲鹵簿海棠風鈞容聲出雲霄外馬上誰憐有老聾新將給事換前銜班􅀍眞除法從攙道是緊頭人不信回看壓得兩緋衫游景仁呉叔永兼權侍郎太廟致齋風􅀨殘春晚作晴寳山深静勃鳩鳴雲収翠㦸龍文潤日透金鋪獸面明􅅙出火時桑正沃秧抽頴處麥還成在天列聖孫謀逺流福人間釀太平平齋文集卷第八
