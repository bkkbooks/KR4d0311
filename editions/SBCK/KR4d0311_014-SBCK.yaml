  text: 平齋文集卷第十四
  hash: sha256:a3d334093bab59f12d6a466f156d01f3e9e84143dcc21d72c558f46eb91d348c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0311_SBCK_014-1a}
body:
  text: 内制一戒飭將帥撫恤士卒詔朕仰惟藝祖皇帝立國以仁制國以義撫軍馭軍恩威不相揜用能賦民養軍而民不憚整軍衛民而軍不怨經制一定國勢尊安􅁣慕風烈常懼弗逮間者惠陽建安京口髙沙之軍蠢爲不静以駭民聽雖怙終必戮迄伸􅀖憲而事非獲巳痛切朕躬夫三綱五常之理在人未始泯絶彼其忘平時撫養之恩背理􅂢生而以衛民者厲民豈盡本心哉有司奉令不䖍故其病於掊尅而飢寒之不免困於力役而休息之無期鬰悒於沮遏而赴愬之無所殆非一日亦惟朕之不明有以敢之詩不云乎祈父予王之爪牙胡轉予于恤内而三衙外而列閫曁諸軍主兵官其各體至意上下交飭訓禮示信威以儆其玩而恩以恤其私使人人自愛相安于紀律而國勢張時惟汝嘉狃故必罰朕不敢赦四川安撫制置使趙彦呐堅守邊関將士用命奬諭詔坤維國之上游我髙宗皇帝暢威逺之略炳知人之鑒拔虓將玠俾扼賊虜出竒制勝隱如長城蜀固而國勢定於皇祖烈朕甚慕之蠢兹新虜荐食亡厭廼者窺我蜀関諸將嘗􅁬前鏖郤矣兹又渉漢􅃆以逞卿儒而知兵忠於徇國用玠勝筭身爲金湯駐軍于原上馮髙下臨熊卧虎視圍合累旬而氣不折將士感厲用命人百其勇虜有後顧逡廵不敢深入卿之力也朕自聞卿犯危難控險阻每飯意未嘗不在原忽㩜吉奏且歎且喜彼曲我直彼竭我盈乗神人之共憤鼔吾􅆛貅滌氛􅅽而空之勞士輯民治堡繕塞使西陲安堵如故母患有功之不見知也書曰汝多修扞我于艱若汝予嘉卿尚勉之哉新除吏部尚書李􅐉辭免陞兼修國史兼實録院修撰專一提領纂修髙宗皇帝正史恩命不允詔自史䇿散逸於鬰攸之後思陵大典正史迄今猶未脫藁朕甚懼焉卿以開物成務之材通今博古之識入儀于禁途國史實録俾參撰次具有家法兹旣正厥職掌而炎興之醲綱懿榘所以維人心而永天命者併屬卿鈎元提要亟緒成之用副予思皇祖烈之意典銓批勑精明有餘母以學槁思昏爲解使太史公之業無傳也所辭冝不允福州觀察使楊鳯孫除安德軍承宣使依舊提舉佑神觀免奉朝請恩命不允詔朕躬御路朝永懷長樂旣推恩猶子又推恩猶子之子所以隆罔極之報也矧卿文雅自將謙静寡過尤慈扆所鍾愛進之留務佚之祠館雍容家食以奉其親可不謂榮乎昔隂馬氏以恂恂丗厥家用能􅀛紫傳襲與國同慶尚祗踐之奚辭爲所辭冝不允端明殿學士崔與之辭免除廣東經略安撫使兼知廣州恩命不允詔朕惟先朝以韓􅄾守相范仲淹守蘇德選也然擁旄里第於安平無事之時孰與即家宅牧而分憂􅀉卿風節在朝廷威名在夷狄朕之韓范也頃辭聘召佚老海濵悍卒嘯兇薄畨禺幅巾登陴赤心諭暁衆狙屏氣宵遁賢者有益於人國如此就鎮郷枌全護海嶠家國一體孰如卿冝矧弭盗於淮郤㓂於蜀沉深有逺略爲我強起可也士君子行乎蠻貊易行乎州里難愈近而愈不可欺卿忠信篤敬積孚於州里推之可以孚蠻貊鴞音之革奚難哉即日建牙四履驩舞朕方嘉卿勇義而識變巽櫝非所樂聞也所辭冝不允從臣李􅐉等乞將所得俸給减半幇支不允詔朕承丗治垢敝之極楮輕物重公私交瘉夙夜不皇寜惟昔司馬光有言撙節用度冝自上始故裁濫約冗興于􅆌躬而大臣祈歸賦禄之半蓋錢榖之問方􅁄相與警勑貶損以圗其闕非以是爲可􅁉吾國也卿等􅁩深體國援比有請其未諭朕志乎夫損貴酌損節戒苦節惟時之中尓知厲羔羊五紽之風予乃蹈權輿四簋之戒國雖未􅁉何至是勉思大計之禆母徇小㢘之執所請冝不允中大夫眞德秀辭免資政殿學士在京宫觀兼侍讀恩命不允詔天之生賢不數其得時行道亦非偶然者朕以王佐噐卿於十年之前儀圗共政所以承天祐慰人望也平治之機方開無妄之疾來諗當饋重歎天豈虚生是賢哉惟大學一書卿推致知格物之理啓沃甚悉而未竟其以祕殿内祠養疾闕下少間則勸讀于邇英卿獲專意嗇衛朕不失佛時仔肩之益而大政易於諮訪是爲兼得天壽斯文何恙不巳股肱嘉哉母輕於去朕所辭冝不允光禄大夫右丞相兼樞宻使鄭清之再上奏劄乞從鐫罷居家待罪不允不得再有陳請詔國朝筦軍於三衙本兵於宥府務立上下相維之制使知少長有禮之風故服事有階而犯法惟劒是關國體可忽廟謨卿具守文應變之長得禁􅁀和衆之略謂平陸失伍固訓齊之乆隳曲梁亂行抑驕駻之難制恩威並用紀律復張顧􅀝成之方深胡引慝之荐至廼腃周公之輔克綏洛邑之頑予以敉寧武功毎思艱而圗易我惟無斁康事迄欲去而復留冝體朕心勉安厥位惟京師南北軍之置必謹惟羽林左右衛之選必精益􅁬乃庸茂躋于治尚奚罪之待所請冝不允不得再有陳請知院喬行簡參政曽從龍樞宻鄭性之同僉書陳卓再上奏劄仰祈明罰居家待罪不允不得再有陳請詔維國大勢如人一身病之受也有源證之發也有候粤從債帥莫制驕兵但知畏不識之煩曽靡見光弼之整適當其弊乃在于今卿宣弼諧之勞懋綏靖之畫虎兕出於柙知干戈之可憂牛羊反諸人念芻牧之有在抗章自劾陳義甚髙維開寳川班擊皷之時與慶暦衛士踰垣之日股肱未嘗引咎精神自能折衝勉殫訏謨奚事挹損所請冝不允賜宣奉大夫知樞宻院事喬行簡辭免除兼參知政事恩命不允詔存養固則智識明閱歴深則謀慮逺此朕􅀝重黄髮之意也睠留樞筦數日一朝帷幄大議瞭如􅆱蔡維我隆興淳熈軍國一體典宥宻者必參大政安有文武兼資之老猶未與聞萬微之務乎命從中出旣喻朕心何嫌何疑而欲引避况天下之弊莫大於因循姑息朕寤寐治道茫乎渉川卿其與丞相同心協力濟斯丗于艱以副責治之切施置罷行之得冝則轉移興起之有漸矍鑠是翁謹勿憚煩也所辭冝不允知院兼參政喬行簡辭免權監修國史日暦恩命不允詔春秋修魯史之舊以事繫日以日繫月而書法著因書法以求聖人心法不在鉅儒乎卿學優柔而饜飫文贍直而詳核軍國訏謨之暇振挈綱領錯綜注記襲六爲七而作一經蓋浩乎沛然也矧自薛居正以來執政緫統尚矣其母以兼三爲解而曠大典所辭冝不允光禄大夫右丞相兼樞宻使鄭清之乞解罷機政不允詔朕永惟萬務之統在一相相安厥位然後可圗社稷之安丞相蚤以天下爲己任弼予親政期厎丕乂謂宿弊沉痼勢難遽起而正氣寖還徐當自瘉用能虚心無我聚衆賢於朝抜茅而泰盍簮而豫朕日夜望之遽以􅀌危祈解機政中流捨濟川之楫可乎天下之理一公可以勝衆私一敬可以勝百邪益旣乃心終輔台德母使國人謂朕任賢之或貳也所請冝不允光禄大夫右丞相兼樞宻使鄭清之乞俾還故里不允詔廼六月庚寅召對宰執于便殿咨訪庶務漏過午太史奏日有承氣其占爲臣承君其吾相開心布公率同列以承弼厥辟之象歟諄切諭留旣還需牘越四日癸巳仍以去請殊咈朕懷周公聖人也群情猶不能遽孚其欲去迄留輔成太平之業爲文武申固天命也朕於卿一體無間而明農之志浩不可遏縱不念公無困哉之訓獨不爲前寧人付託之重奉幣供王以祈天永命虖慶暦之車主必行元祐之舟戒偏重卿旣得之推是心以往何治不濟國歩方艱而捨去天下其謂卿何其謂朕何所請冝不允光禄大夫右丞相兼樞宻使鄭清之辭免授特進左丞相兼樞宻使恩命不允詔元祐更化一日制下命二相吕大防爲左范純仁爲右而大防之宅左凢七年君臣之際盛矣哉朕遵晦養􅀩之乆嘉與群生共躋新美得卿舊學相我親政壅者迪之仆者植之憊者翼之大明當天群隂盡伏靡容光之不照卿之力也左揆虚位有年如人身之股肱何可偏舉故進卿以首相兼緫文武之柄且選於衆得􅂄俊以助之朝夕納誨夾輔台德庶幾元祐之盛撝章來上乃以寵榮爲懼而求歸老卿豈人爵所能榮哉得位與時憂責彌重勉殫金礪之益迄成玉鉉之功獨善非所望也所辭冝不允宣奉大夫知樞宻院事兼參知政事喬行簡辭免特授金紫光禄大夫右丞相兼樞宻使恩命不允詔帝王盛丗左禹而右臯左周而右召用能濟登雍熈泰和之治本朝稽古建官並相非一權臣專國則獨相如彼其乆可不變而通之乎卿直大無競心老成有逺慮方威柄未還他人所不敢言者毎雍容造􅂰歴言之簡在朕心知爲宰相噐迨更化共政而益信進升次輔仍斡樞極蔽自夙志􅀝爲􅆱􅀛謂冝亟展經綸之藴副予望治之切顧猶以衰病諉大廷朝㑹進趨䄡如拜起翼如搢紳動色相慶謂少壯有不速精神折衝奚難哉書曰若濟巨川用汝作舟楫其勿辭所辭冝不允權禮部尚書魏了翁辭免兼直學士院恩命不允詔戊寅並命二相越翼日己卯便朝同班奏擬首以卿進曰號令文章有國之精神禁林虚直非了翁不可朕喜於得人亟俞之卿乆困排根趣還禁近學益老文益偉戞摩三光斧藻萬象沛乎有餘思以是而草内命孰謂典誥之逺母多遜也所辭冝不允喬行簡辭免提舉國史實録院提舉㑹要勑令經武要略恩命不允詔房元齡之監修國史實録崔鉉之進讀㑹要與蕭何之次律令魏相之知兵略皆宰相職也卿以名丗鴻碩爰立作相内外萬務蓋無不統矧簡䇿之記兵律之志乎維是諸書事嚴體重設官分纂曠歳未就非老於經制述作之學緫提其綱要諸儒將奚所折􅂨而収汗青之功哉國典有常巽章良過所辭冝不􅁢金紫光禄大夫參知政事兼同知樞宻院事曽從龍辭免除知樞宻院事兼參知政事恩命不允詔乾坤以六子爲用而化功成朕同日命二相又同日命四執政六子備矣卿以凝重參大政以深沉賛廟筭履正奉公言可厎績朕簡注蓋深進筦五兵之􅀉仍預萬微之務夫豈以序遷爲卿榮天下大勢方厝火於積薪朝廷逺慮冝徹桑於未雨討諸軍國一日不可緩也抗章祈免欲别求文武全材而用之孰有加於卿者乎旣深多事之憂母徇一謙之執所辭冝不允端明殿學士太中大夫簽書樞宻院事鄭性之辭免除同知樞宻院事恩命不允詔慶暦以韓􅄾范仲淹爲樞宻副使士大夫酌酒相賀朕思見其人若飢渇卿氣明而抗志逺見定而慮事精列在宥府隱憂更切指陳可否多中肯綮進參樞筦之嚴増壯精神之本待之優乃望之深也卿能以􅄾仲淹自勉則何巽避之有所辭冝不允端明殿學士正議大夫同簽書樞宻院事陳卓辭免除依舊端明殿學士簽書樞宻院事恩命不允詔朕即政之七年嘗命舊德爲同簽書㝷進簽書今右揆是也故甚重其選卿廉方足以起懦謙毖足以壓浮擢聮宥宻訏謨備究如玉在山隱然􅀖家之光循序而升寵數非過深長邊􅃈之思懇切籌帷之助朕所以進卿者未艾也懋哉母格成渙所辭冝不允權禮部尚書魏了翁辭免兼侍讀恩命王人求多聞以建事朕自親政以來宏開氊厦詳延儒雅性命道德之奥治亂安危之機所聞多矣卿何相見之晩耶一命而典禮再命而儤直三命而勸讀蘇軾在元祐嘗兼之惟卿爲允平居之所講切憂患之所論著本末該貫從容前陳朕將虚心以聽尚奚辭權禮部尚書兼侍讀魏了翁辭免兼同修國史實録院同修撰恩命不􅁢詔西狩絶筆遷固獨以良史稱迨唐魏謩領起居注人主索觀之以兼書善惡不奉詔厥職舉矣爾系出於謩論議挺挺猶有證之風烈紬書史館裁成一代之典疇不謂冝况爲望郎名卿爲柱下史皆嘗執簡纂次今顧以大宗伯參紀録之職而辭乎往欽哉書法母隱所辭冝不允光禄大夫新除左丞相兼樞宻使鄭清之辭免特進恩命不允不得更有陳請詔朕惟說命之進于王立政之教厥后旣交孚於志慮必共訂於規摹無言不酬從欲以治卿學足以正人心承三聖材足以經􅀖國紀萬民進躋上宰之班増壯中朝之勢牢辭欲去力挽廼留歴歴乎奏牘之數百言卷卷乎治道之十餘事上勿揺於疑間下自絶於依違開元要說之姚崇彼何取尓正觀勸行之魏證是蓋似之方堅此意以責成必踐乃言而厎績胡爲卑牧猶遜崇賢雖賜位之加隆實懋官之冝厚矧乾道並命之盛典即元豐改制之首階匪朕敢私惟人是稱亟對揚於休命母過事於撝詞所辭冝不允權禮部尚書魏了翁辭免兼權吏部尚書恩命不允詔朕謀廟訪落之始卿以嘉猷入告曰王位在德元厥亦惟棐民彛用懌寧人受命實獲我心無人乎子思之側不我留也間去而嗑惠然來思敷奏以言亦克用乂方將迪簡在庭偕庶明翼于朕躬以春官行天官事顧以爲大介賚尓耶惟寅斯清惟公斯明卿蓋􅁉於率屬母違朕所辭冝不允兵部侍郎淮東制置使趙葵乞罷黜不允詔維予前寧人經德秉哲咨乃父宅牧于江漢匪舒匪􅁄肆敉寜武圗功迨今靡間言良用嘉歎廼者錫壹惠之謚以忠冠肅亦惟旌往勸來庶幾丗有不二心之臣服勞于王家卿佩教忠之訓􅁬志孔武朕推心任之整淮浦之旅雪崤函之眚奄觀後効顧以群疑自鞠自沮何耶夫簡物議者䘮功之本畏人言者進德之機㩜卿來奏謂忠孝有聞憂懼無所且重感於惎間不行之子儀継自今其知所進矣虖秋風戒寒嚴車攻之修備謹采薇之守衛以張吾國而昭乃辟之有乂睽疑何有哉避讙祈免非朕樂聞所請冝不允端明殿學士太中大夫廣東經略安撫使崔與之再辭免除參知政事趣令就道恩命不允不得再有陳請詔朕􅁣念爲君之難儀圗􅂄壽俊共政用康保民以長我王國詔書屢下申之親札致敬有禮視安車蒲輪爲加厚卿抱道俟時可幡然起東海之濵矣巽章至再陳義何切范鎮年未及謝事而休致在元祐固不以爲矯獨不思文彦博起於旣老之餘力扶丕乂豈徒爲保身之哲耶夫麒麟鳯凰之出百鷙率服以其德非以其力也卿旅力雖愆精神逾勁坐而謀國必能折姦弭慝翼朕攸濟維日望之彊飯就道母憚于行所辭冝不允不得再有陳請寳謨閣學士正議大夫提舉江州太平興國官余嶸乞俾致其事不允詔華髪舊德壯猶元老有國者所甚重故朕親政以來樂得􅂄喆是馮是翼兆渭水以􅁬庸起海濵而共政經闈史觀亦參列備咨訪安有先朝名法從老於學問政事如卿而簡拔獨後乎顧卿牧御湖湘積勞嬰疢姑俾均佚祠庭嗇精神以俟用兹􅄃來章祈致厥事惻然宿恙之未平也知止不殆抗懷固髙渇想儀刑詎容得謝其務玩勿藥有喜之象以康乃身佇嘉謀之入告所請冝不允太中大夫權禮部尚書兼直學士院兼同修國史實録院同修撰兼侍讀魏了翁乞賦祠􅅒不允詔靺鞨不道闖我蜀関卿伯氏杖使者節乗􅃆誓不與俱生而死之朕䀌然歎嘉詔褒金城之節以勸忠且以紓卿孔懷之戚而請祠欲西將進至荆䕫與父老謀救郷國陳義甚髙昔漢嘗有事于四方馳傳諭蜀屬之司馬相如汲黯則留以自近山立玉色姦宄奪氣功出大將軍上本彊則精神折衝故也卿其圗濟乃辟謹勿言去有勝筭亟入告所請冝不允禮部尚書魏了翁辭免慶典轉一官詔緇衣之冝􅀆敝予又改爲􅀆好賢之心無斁也卿曩以言去國非朕意更化入儀槖從直諒之氣不少衰朕愛其有元祐諸賢之風旣還銓簿之四階兹又進慶典之一秩眷隆恩浹豈以周南留滯爲間哉夫天爵之尊固無慕於人爵緇衣之好朕心庶幾焉其母過辭所辭冝不允知樞宻院事曽從龍辭免樞宻使督視江淮軍馬恩命不允詔朕承艱難之業昧綏御之方蜀旣􅀍兵襄復告警長淮大江風寒之備孔􅁄元戎重􅀉安危惟人然自昔康時濟丗非便儇皦厲者所能爲此截截善諞言秦誓所以重悔也卿沉深如鄧禹鎮静如謝安始對延英首以佳兵爲戒識慮逺矣共政逾年威重有體朕知可屬大事時方多壘輟股肱之臣以盡護邊將國有令典便朝咨卿勉爲朕往卿旣許朕矣而猶以取具臨時爲解夫軍國一機内外同體措置得冝精采立變走符堅於肥水折佛貍於􅀲歩盡在卿指縱之下母留成命佇奏膚公所辭冝不允權禮部尚書魏了翁辭免除端明殿學士同簽書樞宻院事督視京湖軍馬恩命不允詔可大之業由事而生此功業所以見乎變也蠢兹􅃛虜窺我蜀襄朕􅁣事變之方來一日建兩督府於江上使聲援相接以全制勝卿學洞古今安危之略識照夷夏盛衰之幾眷知特深䜛惎莫間趣進參於樞筦往盡護於上流成命一頒江漢重湖巳􅀮然有虎豹在山之勢顧以軍旅未學辭何耶中軍謀帥必本之詩書禮樂萬里戎情亦惟儒者能料之文事武備不容異觀也集思廣益之有加保大定功之可必亟究真儒之韞母遲先乗之行所辭冝不允同知樞宻院事鄭性之辭免兼參知政事恩命不允詔軍國雖有異容文武􅀄非二道屬時多故輯我衆謀召虎來旬來宣旣出揔徹疆之􅀉山甫令儀令色冝進參賦政之規卿學術深明氣度軒豁蚤培逺業嘗有志於着鞭晚簉邇聮猶不忘於運甓居切風寒之慮圗爲隂雨之防適當東府之暫虚爰藉西樞之兼領雖相與經綸於萬務何以假爲然熟觀酬酢於百爲自此升矣勉殫忠益奚事勞謙所辭冝不允權工部尚書兼知建康府陳韡辭免刑部尚書㳂江制置大使控扼長江往來武昌廵視恩命不允詔西陵之至江都俱切風寒之護建鄴之控天塹尤嚴王氣之占方邊遽之孔殷冝中權之増重卿弘深智略沉毅威名自膺留鑰之司備舉戎旃之務賢於長城矣旣髙閫外之謀豈憂匈奴哉何吝師中之寵常伯申加於妙選制垣仍進於大名寧於卿榮徒得君重盍亟講於勝畫母過爲於遜辭乃若上流更資廵視之勤陪都恐有空虚之慮肆披來奏式契朕懷况西府盡護於列屯北門母勞於行役第江流之絶警曁海道之無虞寛予顧憂維尓成績所辭冝不允端明殿學士提舉萬壽觀兼侍讀李􅐉乞賜骸骨不允詔卿宿學深於造微壯略優於經逺簡知惟舊禮遇特殊專紬石室之蔵首勸金華之讀班升書殿恩視政塗示委曲以貪賢俾從容而獻可胡爲陳力婁欲乞骸豈齊王無以留孟軻抑魯公不能安孔伋致煩􅂄德遂起遐心朝無白首大儒則内勢輕國有黄髮良士則外侮息當此艱圗之日豈卿得謝之時母以兄弟之子而嬰其心勉爲君臣之義而安厥位所請冝不允寶章閣直學士太中大夫提舉江州太平興國宫史嵩之辭免除華文閣直學士知隆興府江西安撫使恩命不允詔南昌爲江湖間一都㑹蠻荆甌粤左控右引形勢今猶古也必得威望夙著者宅乃牧以卿抱應變之材懷經逺之志分閫京峴厥有勞績故進嬀閣之直起家以鎮之顧以親年喜懼辭往來擊鮮獨不可耶亟其入覲朕將臨遣所辭冝不允太中大夫同知樞宻院事兼參知政事鄭性之辭免同提舉編修勑令恩命不允詔道者立治之本法者制治之具成周盛時冡宰以六典八灋八則治􅀖國都鄙官府必有掌其貳者重成憲也我朝勑局之設緫以宰臣貳以執政盖此意卿冨博古通今之學茂致君澤民之志擢副樞筦進翊政枋凢前律後令著在簡䇿參舉而科别之非卿誰冝爲有次律令之蕭何則規摹宏逺有奏故事詔書之魏相則品式備具而况以三代之佐修三代之法乎分職有常引避徒贅所辭冝不允端明殿學士提舉萬壽觀兼侍讀李􅐉乞歸田里不允詔岷峨江漢之英靈鍾爲人物其萃在本朝莫今爲盛而德爵齒之俱尊孰有過於卿者累章祈去挽留愈力朕豈私卿哉一陽在内衆陽朋來留卿所以聚坤産之珍爲􅀖家之光也矧蜀警未弭思卿疇昔控禦還定之功猶未大􅁀白於時儻聽之輕去人謂朕何卿以禮義㢘耻而自砥礪朕以􅂄壽俊在厥服而加縶維冝體貪賢之心益究格君之學所請冝不允不得再有陳請新除端明殿學士太中大夫同簽書樞宻院事督視京湖軍馬魏了翁辭免兼同提舉編修經武要略恩命不允詔國朝以武名書究鶡冠黄石之旨則有神武袐略采留侯揚僕之制則有武經緫要三朝控禦之方則有經武要略阜陵規恢之志則有武經􅀛鑑而經武要略爲尤重創業中興之宏模懿範皆在焉編剗以儒臣提綱以宰輔尊閣以樞廷其來尚矣朕方整軍修戎以折衝固圉旣進卿翊本兵於内又屬卿視成師於外而是書命以參掌凢兵制邊防而下發金匱之閟蔵續玉鈐之㑹稡昈分彚輯熟訂詳施職也亦時之冝也卿􅅐蟠四庫神斡五兵筆力所至挾雷霆而驅風雨奚遜爲所辭冝不允侍御史兼侍講李鳴復辭免除權工部尚書恩命不允詔朕撫艱難之運而求治越拘攣之法以用人苟得非常之材可無不次之舉卿頃階卿列峻陟臺端蔚乎直其正方其義之風挺然剛不吐柔不茹之操力扶國論宻契朕􅂨兹繇耳目之官超進喉舌之􅀉蓋中興百年所未有也侍從職在獻納何事不可言卿其母以言責官守爲間祗若予命所辭冝不允平齋文集卷第十四
