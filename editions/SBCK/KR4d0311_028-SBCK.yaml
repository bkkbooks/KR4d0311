body:
  text: 講義下臨元亨利貞至于八月有㐫臣聞事㑹沓來乃君子大有爲之機此蠱之所以轉而臨也夫陽大而隂小有自然相臨之分方一陽爲復其端甚微五隂在上詎能獨勝故必待朋來而後无咎至二陽爲臨則有朋矣陽得朋則群隂禠氣而退聽故復止於亨臨則元亨利貞陽寖長而隂寖消也臨據陽長之㑹旣能變蠱壞而亨通又能處亨通而正固以此保大其又奚虞而見逺識微者巳不勝其隱憂何則隂陽無兩盛之理一長則一消其機在反掌間自復而臨以至爲泰爲大壯爲夬爲乾陽極矣而一隂潜萌於五陽之下爲姤二隂則遯也由建子而復至建未而遯凢八閱月二隂之遯與二陽之臨正相反陽消而隂長㐫可必也然亂生於治否生於泰理所必至而酣豢宴安者常忽之有能燭其幾於人情之所易忽而轉移機軸於􅁳􅁳之中使履霜不至於堅冰陽常進而隂常置於空虚不用之地則大亨以正可常保而吉其㐫矣觀至于之辭則知吉㐫未定之間儘有可用力之地特患乎玩安忘危不知所以用其力􅂏曰臨剛浸而長􅀃而順剛中而應大亨以正天之道也至于八月有㐫消不乆也臣聞一陽而復二陽而臨剛浸長也下卦爲兊上卦爲坤􅀃而順也九二以剛處中上與六五相應剛中而應也臨有是德故大亨以正也隂陽消長皆非一日之積今陽剛浸長於復返之餘其來有漸然懼其乗方進之機銳於逐群隂而失之暴故繼以􅀃而順􅀃而無所忿順而無所拂心和氣平動循天理則剛不至於過於是臣之剛中足以輔乎君君之柔中足以濟乎臣上下交應同歸一中冝大亨可致且不失其正也豈特人事爲然天爲剛德猶不干時一元運於上而雲行雨施保合大和莫非剛健中正之用天道亦何嘗過於剛哉况陽無常勝之功隂無盡滅之理消長往來間不容髮二陽之臨方長而二隂之遯巳知其必至陽消蓋不乆也自復至遯閱月凢八而謂其消不乆何哉疾疢萌於彊壯之時人不自覺也元祐􅀄司馬光一洗新法之弊而奉行差役巳有蔡京消豈待乆哉遯進而否君子之道盡消則蔡京之禍天下㐫莫甚焉夫惟上之人常以防微杜漸爲心遏隂柔於未進之始尚何陽消之慮􅁚曰澤上有地臨君子以教思無窮容保民無疆臣聞坤地在上兊澤居下地之臨澤最爲切近君臨民之􅁚也地上有水爲比澤上有地爲臨皆以切近取義而水與澤異水流而不盈故比於地而不爲臨澤者水之瀦涵深蓄逺渟奫演迆而地之岸際常臨之此具區雲夢大野所以爲澤而不爲川浸也君子觀地與澤相臨之􅁚而得近民之理故教思必无窮容保必无疆无窮者意味深長百丗猶有先王之澤則兊之浸潤也無疆者規摹恢廣出日莫非丕冒之地則坤之包含也人君以是臨民無媿君師之責矣蓋君之於民猶父之於子其相親也以情相維也以道而非可以􅀔分拘以􅀔而臨則教思必淺容保必狹私心町畦公道磔裂尚何足以知臨之爲大乎大哉堯之爲君惟天爲大惟堯則之人君方寸之中與堯同大而後可以盡臨之不然教思何由而无窮容保何由而无疆哉􅀄九咸臨貞吉􅁚曰咸臨貞吉志行正也臣聞澤通於山爲咸咸感也凢具隂陽孰能無感以貞則吉貞者正也君子小人之辨在於正不正之間臨爲剛長之卦􅀄九與四爲應而比於二皆臨我者也吾欲感動所臨獲乎上以行吾道必一出於正曠乎其公而係吝之私不留純乎其誠而矯飾之僞不作此以正感彼以正應精神心術之妙相與凝固而不散則君子之道由是進進乎泰亨之盛所感以正而吉也然所感之邪正莫謹乎其􅀄志者心之所之在卦之􅀄此心趨嚮主於正而行則無往不以正合進以正可以正􅀖也一渉於邪則見金夫不有躬進不以正特一時之茍合爾然則下之感乎上能察乎正不正而爲進退則不至於失已上之應乎下能辨乎正不正而爲用舎則不至於失人九二咸臨吉无不利􅁚曰咸臨吉无不利未順命也臣聞臨之爲卦以二陽爲主二陽又以九二爲重二承乎五五臨乎二實君臣相與感通之㑹二剛中五柔中俱得其正冝旣吉且无不利也然自復而臨陽剛浸長固吉矣而長必有消八月之遯巳逆計其必㐫君臣相與綱維斯丗其將聽隂陽之自爲消長付之無可柰何而安之􅀂命乎抑將進陽退隂以制消長之運而自我立命乎命賦於天受於人行廢有定運死生有定數非可以人力轉移然有君子不謂命者存二陽長而爲臨與二隂長而爲遯固天運之所必至茍一以命哲命吉㐫委之天而安之八月有㐫拱手順受而不思闔闢變通之道臨終爲遯矣我生不有命在天此商之所以亡也惟知賦命在天制命在我旋乾轉坤與丗立極陽冝消矣挽而回之使不至於消隂冝長矣尼而止之使不至於長吾方以天自處未容一切惟命之順也夫如是君子常長小人常消而咸臨之吉常存二五君臣各盡其道矣不然何以君相不可言命六三甘臨無攸利旣憂之无咎􅁚曰甘臨位不當也旣憂之咎不長也臣聞君子之樂王天下不與存爲人上者不可以位爲樂也夫以天命難諶民情難保大業難守重噐難安夙夜兢愓危懼猶恐不蔇而可樂於得位而泰然處之乎甘者􅀃樂之至也六三居下卦之上處兊􅀃之極而以臨人之位爲樂玩聲色之娯而忘美疢之患懷宴安之適而遺鴆毒之慮好樂一形投合四集便嬖側媚相與以巧言令色皷舞之施之政事冝其無往而利也有能凛然深省幡然大改以所樂爲所憂念二陽方進於下而消不乆之㐫已兆於吸呼之頃操危慮深􅀂不能以終日切切乎予又集于蓼之懼則前日之咎今可免矣蓋三以甘􅀃爲臨其位不中不正一惟偏私之徇故象示不當之戒又懼夫人耻過而遂非開之自新許以轉甘爲憂雖有咎而不長有國者冝知所擇矣六四至臨无咎象曰至臨无咎位當也臣聞至臨臨之至也四居大臣之位上比於五君以道合下應於􅀄賢以道親且時當剛長大臣虚心無我援天下陽剛之賢進輔其君與共成致君之業以此而臨豈非至乎然進賢退不肖大臣職也援陽剛之賢與共成致君之業乃職分之當然極其至如周公之握髮吐哺始可以无咎有一毫驕吝之色賢者望望而去之則咎隨之矣象明臨之能極其至亦惟處得其位之故以六居四是爲正位體柔履順不自矜其能而惟賢是與德與位稱也六五之君柔矣六四之大臣又柔而下無陽剛之賢爲之應則治淪於姑息勢失於委靡謀國者能辭其咎乎六五知臨大君之冝吉象曰大君之冝行中之謂也臣聞知所以察未見之幾制有爲之㑹人君之臨天下轉移萬化闔闢萬變必有知行乎其間而知以得中爲難蓋是知之用不及則闇太過則察無過無不及則中六五有深沉先物之知又下與九二之賢爲正應不以一已之聦明爲聦明而以賢者之聦明爲聦明臨無遺知矣然知不可以過用丗之小知自私者用知必過明帝之苛察德宗之猜忌何其􅄶也故惟大德之君然後於用知爲冝明有前旒之蔽見無淵魚之察知君子之當進必推翕受之量知小人之當退曽微深疾之心以大用知而知得其中即舜之大知也􅁚言行中之謂豈非不過用其知即舜之用中歟中庸聦明睿知以有臨必寛􅁉温柔以有容正此意上六敦臨吉无咎象曰敦臨之吉志在内也臣聞卦終必變君臨天下之道以克終爲難必用心加厚乎其􅀄則可以保其終敦者厚之至也何所厚厚於親君子也親君子逺小人之心乆而愈篤則以之畏天必加畏以之愛民必加愛無所往不用其厚也艮上九敦民以加厚而吉臨旣吉又申之以无咎者爲六三設也上六居臨之終而應乎三三不中不正上茍私所應與而親之何以免咎惟舎三隂邪之小人而志在二􅀄陽剛之君子故冝有咎而免也兊爲内卦君子在内屈已下親不以乆而替寜有加於大亨之鼎母或失於二簋之權輿則賢者肩一心以輔乎上非箴之庭燎則戒之無逸君臨天下之道於是乎保克終之吉矣明皇始厚宋璟韓休張九齡終厚李林甫憲宗始厚杜黄裳李絳裴度終厚皇甫鎛此心一移卒貽不終之禍可爲百丗戒觀盥而不薦有孚顒􅀂臣聞臨觀反對卦也臨二陽在下觀二陽在上觀如兩觀之觀儀刑掲而群瞻聳也觀之聖人正心脩身以觀天下一誠之外無他尚猶宗廟之􅀕交於神明一誠之外無他物盥即奉槃沃盥巾以帨手時也􅀕先盥手然後酌鬯而祼祼用鬰鬯猶未免託物以求神盥則蠲㓗内外與神黙接洋洋乎如在其上如在其左右不假物而誠已通又何俟腥熟之薦而後逹其誠哉爲人上者能至誠主一無假乎外如盥而不薦斯民不期孚而自孚矣孚者信也誠之實有諸已者也人受天地之中以生誰無是誠君以誠感民以誠應顒然興起不約而同與聖人作而萬物覩均此機也是知人君之化天下不難於孚諸人而難於孚諸已􅂏曰大觀在上順而巽中正以觀天下觀盥而不薦有孚顒􅀂下觀而化也觀天神道而四時不忒聖人以神道設教而天下服矣臣聞一隂爲姤進而爲遯爲否爲觀爲剥莫非小人道長觀獨不以隂盛爲憂者二陽在上四隂順聽於下是上有陽剛之君儀表一丗隂柔雖衆方將化而爲君子之歸其爲觀甚大也觀合巽坤爲卦以九居五順巽而中正也循理而行無所拂逆可以懷天下未足以觀天下觀天下必中且正大明當天萬物咸仰一有偏􅀝必有照臨不及之地此聖人所以爲天立極也然必本之以誠誠者物之終始不誠無物此心之誠不存則順巽中正俱失其有猶盥而不薦以誠爲主􅁰稷不如明德之馨殺牛不如禴􅀕之福在誠不在物也此誠所格斯民莫不相孚以心顒然尊仰隨所觀而化其觀果何所見哉誠則形也其化果孰使之然哉唯天下至誠爲能化也求諸天道春夏秋冬運行而不息皆神之所爲聖人以是道設教天下不期服而自服又豈非誠則神乎觀之聖人一誠貫通三才之間始與人爲一終與天爲一極而歸於無聲無臭之妙非黄帝堯舜之神化冝民文王之純亦不巳不足以當之􅁚曰風行地上觀先王以省方觀民設教臣聞自上示下爲觀天下之物凢可以示人者皆有形之觀惟風行乎地上草木均􅀍披拂則無形之觀有形之觀其觀淺無形之觀其觀深故先王取􅁚於風之行地省方觀民而設教五方之俗各有不同隨方省察因民俗而教之以救其偏扶其正使同歸道德之中舜之同律度量衡成王之考制度雖􅀂渉於有形之觀教行而民從猶風行而草偃皥皥乎其不自知實有無形之觀存蓋誠存乎中不動而敬不言而信不容以形迹窺也後丗省方之禮廢人主深居九重之上民何由觀教何由設亦惟心存乎群生之休戚庶俗之媺惡四方萬里皆暸然於户庭之間而以身爲教自正心誠意以至於脩身齊家無一不盡自然國治而天下平與身歴目睹所設教何異哉􅀄六童觀小人无咎君子吝􅁚曰􅀄六童觀小人道也臣聞觀以二陽位否剥之間欲化小人爲君子故待小人恕欲君子益進其爲君子故待君子嚴九五宅中于上光明碩大之德如日月之照臨有目皆覩􅀄氣卑質弱而去五逺乃爲童稚之觀童者􅀩而未發孩提之童無不知愛其親則有可發之機彼其䧟於小人豈性也哉物欲蔽之也茍如童稚於倥侗顓􅀩之􅀄有以發之則昏者可迪塞者可通氣質變化安知小人之不爲君子故雖童觀而許其无咎􅁚以小人道爲言其質固不可以語上而申言􅀄六亦示其上進之路也爲君子而不能以學問開明所見而甘心與懵無識知者同歸則爲吝矣聖人於大觀之􅀄恕於待小人所以示皇極大受之法嚴於待君子所以示春秋責備之法六二闚觀利女貞􅁚曰闚觀女貞亦可醜也臣聞聖人之道無窮人心之見有限上帝降􅂨􅀂有常性靈明虚徹􅀄無聖愚賢不肖之間而氣有清濁材有利鈍故所見亦隨之而廣狹仁者見之謂之仁知者見之謂之知百姓日用而不知此其所以區而别之也闚觀之不能廣大豈非六二氣質之柔闇歟九五陽剛之君大觀在上乃帝光天之下至于海隅蒼生萬􅀖􅀺獻共惟帝臣之時􅀄以童稚之見而觀􅀩昧未有識知二以闚覘之見而觀有識知矣又自安於卑陋蹇淺僅足以知聖人之汙是惟女子生長於深閨之中幽間專静而有守則闚觀猶未至害士君子則害道矣􅁚發明爻辭之所未發謂闚覘爲觀雖女子之貞亦有可醜蓋鑚穴相闚闚見室家皆爲不正之視女子雖貞而所視不正心隨境移恐不能保其貞也然則欲廣闚觀之見則何先中庸曰好學近乎知學愈進則見愈廣聖人之全體大用目擊而道存矣故惟人百之已千之雖愚必明雖柔必彊六三觀我生進退􅁚曰觀我生進退未失道也臣聞三上承二陽下接二隂而居其中陽爲君子隂爲小人進而從陽則爲君子之歸退而從隂則爲小人之趍一進一退蓋邪正善惡之􅀜也三於此觀我生生者出於吾身者也其大端則言行是巳觀吾之言其進而合於君子耶其未至於君子耶觀吾之行其退而䧟於小人耶其遂逺於小人耶君子小人之界限其間不能以寸反觀吾身之所發必欲進與上之二陽同其光明而不欲退與下之二隂同其柔闇能如是三雖處不中不正之位亦未至於失道也蓋三之質易於失道以能反觀諸身去小人而從君子故道爲未失也然未之一辭猶未深保其不失道盍亦戰戰栗栗於取舎之决爲舜而不爲跖爲堯而不爲桀哉此正大學致知工夫之地六四觀國之光利用賔于王象曰觀國之光尚賔也臣聞九五剛中之君在上􅀄與二去九五爲逺故止於童觀闚觀三少近則未失道四切近則利用賔觀愈近見愈親也賢者進退有時行藏有道如麒麟鳯凰其出必待休明之丗故觀國之光然後賔也國之光明本君德之光明人君能明吾之明德如鑑不受翳水不受滓則本然之明常存篤實之光充實之輝皆由此而發在朝廷則禮樂彰法度著在天下則道德同風俗一其爲國之光大矣賢者觀乎此而願立於其朝伊尹起於莘野吕望歸於東海豈非湯文之時利用賔乎􅁚以尚賔發之蓋道義重則勢利輕賢者寜甘心於白駒之谷考槃之澗不肯屈身輕售其出也以時其進也以禮其事君也以道君望其儀刑而起敬故崇尚之以賔禮而不敢臣取重者在已重之者在君如此則諌行言聽膏澤下於民矣茍在已無以取重君且望而輕之母恠乎有言莫之行也九五觀我生君子无咎􅁚曰觀我生觀民也臣謂反觀内省之功儒者所難而况貴爲萬乗可喜可欲所以移其心者滿於前乎九五陽剛而中正居巽而應順動無過舉矣然猶於我生必反而觀之凢言行出於吾身者爲我生觀吾一言之出皆合於君子之道則言無過言一行之出皆合於君子之道則行無過行以此示民可以无咎有一不合於君子則有咎矣吾身未能无咎顧欲使天下皆有士君子之噐表偏而影正無是理也􅁚又以觀民言者君子之道本諸身證諸庶民觀群􅀺百姓徧爲爾德則知言行之出於吾身者爲善觀怙侈滅義服美于人則知言行之出於吾身者爲不善是觀我生者必當觀諸民也因觀民之所化而觀吾身則言行是非不能揜因觀我之所生而觀吾心則念慮之邪正不能蔽由外而反諸内愈近愈不敢自恕由内而推諸外愈逺愈不能自隱内外交相養之道旣盡天下觀而化之孰不顒然而孚乎上九觀其生君子无咎􅁚曰觀其生志未平也臣聞上九與九五爻辭同惟我生其生異蓋吾身之所出爲我生九五之君所以自觀也上九則觀君身之所出故爲其生五君位上處無位之地而宻比之雖居無位之地一念未嘗忘乎君常欲納之於無過故觀君之言行果君子耶則喜其能免於咎觀君之言行未君子耶則憂其不能免於咎身在畎畒心在王室因所觀而察之惟恐吾君之出乎身發乎邇者有一毫之未當無以示四海之儀則其志豈遽平哉然九五觀我生上九觀其生皆合乎君子之道而僅止於无咎何耶人君之治身無止法言行極尭舜禹湯文武之盛不過盡其身之所當爲􅀄非有餘故君子乃无咎不然有咎矣人臣之望君無止法以禹湯文武爲未足又耻其不及堯舜故君德至于君子特喜其无咎未敢遽以爲可安也此觀之君臣所以各盡其道噬嗑亨利用獄臣聞嗑者合也噬去頥中之物而合也頥卦合艮震爲體􅀄上皆剛而中之四爻皆柔猶人之頥虚其中也噬嗑􅀄上皆剛與頥同而四亦剛是頥中有物間之故有待於噬而後嗑也凢去間之道皆然時則勿有間之是君臣之際以無所間而合也人不間於父母昆弟之言是骨肉之際以無所間而合也彼蠻夷猾夏㓂賊姦宄蓋梗聖人之化爲天下之間者去其間則化行於天下矣噬嗑亨間去而合即亨也其義利於用獄獄以推見其爲間之情而去之則梗吾化者不至於覆出爲惡病根除而正氣還也其在人心則人欲爲天理之間人欲盡去天理流行豈非間去而亨乎此又克巳工夫之當盡􅂏曰頥中有物曰噬嗑噬嗑而亨剛柔分動而明雷電合而章柔得中而上行雖不當位利用獄也臣聞頥者養也頥以納飲食致養而有物梗之故必待噬而後合合則亨矣亨之功在噬噬者用力囓去之也小人爲君子之間不用力以退小人則君子不進夷狄爲中國之間不用力以却夷狄則中國不尊姦民爲良民之間不用力以治姦民則良民不安此皆噬之功所以致亨也以爻言之則三陽三隂爲剛柔分以卦言之則下震上離爲動而明以􅁚言之則震爲雷離爲電二者參合而成章雷取其威電取其明治獄之道無大於此然六五爲用獄之主乃以柔中之道行於上雖以隂居陽爲不當位而治獄以燭見情僞爲先离體虚中而明故於用獄爲利夫獄者民命所係得其情則哀矜而弗喜欽恤之仁行焉茍不以柔治而以剛治則明過於察威過於猛人將無所錯手足失天地大生之德矣噬嗑義在除間而歸於柔中以此知好生者聖人之本心用刑者聖人之不得已􅁚曰雷電噬嗑先王以明罰勑法臣聞隂陽相薄而爲雷相軋而爲電故震之一陽動於下離之一隂明於中噬嗑之􅁚取焉卦本先電􅂏􅁚乃以雷先於電者蓋泰卦上坤而下乾不曰地天交泰而曰天地交泰取其交也噬嗑上離而下震不曰電雷噬嗑而曰雷電噬嗑取其合也電明而雷動雷行而電隨明與威合然後梗化者可去徒明而不威則詳於察姦而不能除其失也懦徒威而不明則銳於去惡而不能辨其失也闇明行以威威發以明天下無難去之間矣先王觀雷電之􅁚於是用電之明以明罰用雷之威以勑法罰顯而枉直各得其情法飭而輕重各當其罪利用獄之道盡矣舜之去四㐫成王之去三監孔子之去少正卯皆此道也然辟以止辟刑期無刑聖人豈徒恃法令爲齊民之具明與威並用罰一人而千萬人懼法雖飭而不常用也雷電之合隨即開霽天道亦豈常用其威哉􅀄九屨校滅趾无咎􅁚曰屨校滅趾不行也臣聞噬嗑利用獄􅀄上爲受刑之人人之性本善情動欲生遂䧟於惡聖人憫之故設爲刑罰以懲惡而挽之於善然善惡觀其所積欲惡之不積當於其始而禁之趾在下爲行之始加校於屨而趾滅焉彼雖欲行而不可得則不進於惡可以免咎矣校足械也滅没也校深大至於没其足也或謂滅趾爲刖刑刖則施踊何取乎屨有屨加校非斷趾明矣唐虞􅀞􅁚而民不犯特赭衣菲屨之􅀋肉刑未嘗用也蓋小懲而大誡故能免麗於刑小不懲則惡積罪大聖人豈得而私宥哉其在人心一念有不善貴乎早覺而力遏不貳過不逺復之功皆基於此覺之不早遏之不力則去舜就跖悔莫追矣觀易者知治已則知治人六二噬膚滅鼻无咎􅁚曰噬膚滅鼻乗剛也臣聞爲一卦之間者九四也􅀄九與四爲正應是同惡相濟者也膚柔而易噬猶􅀄之爲惡未稔而易制鼻髙而難滅猶四之爲間甚大而難治始噬者膚而終至於滅鼻小懲於􅀄遂大討於四也四之間去則􅀄無與應小人之黨􅀌何能爲哉乗剛言二位乎􅀄之上乗􅀄之剛以攻四之剛因瑕而及堅也蓋二居中得正以用刑所施不失其序故下能治􅀄之罪上能除四之間輕重有權尚何過咎之有皇矣一詩文王侵自阮疆不過用輕兵以臨之而阮自服進至崇墉則聲罪致伐必是絶是忽而後巳彼其剛戾梗化之罪雖同阮爲易討崇爲難討侵阮則膚之噬伐崇則鼻之滅聖人􅀄意不汲汲於深治小人而終有不容不深治者皆其所自取也六三噬腊肉遇毒小吝无咎􅁚曰遇毒位不當也臣聞周禮腊人掌乾肉腊物之全乾者也小人掌盛而勢強其堅難噬與全體之腊同三乗􅀄應上而隣於四疾小人挾黨爲間欲盡除之然人之爲惡情有淺深罪有輕重不問渠魁脅從而例殱之是舉腊肉之全體求快於一噬故反遇其毒豈非可吝者乎而其吝小終歸於无咎我之治小人名正言順彼雖有反噬之心無所施也然其遇毒亦以位不當之故無瑕者可以戮人三所處不中不正而欲施刑去天下之間人其肯心服哉齊威公自侵蔡而伐楚猶噬難噬之腊肉屈元如師辭多勃戾有遇毒小吝之􅁚而終於服包茅不貢之罪則无咎矣齊之挾天子以令諸侯位固不當楚雖強不敢不服豈非齊之尊王名正言順乎九四噬乾胏得金矢利艱貞吉􅁚曰利艱貞吉未光也臣聞凢物乾爲陽濡爲隂腊胏及肉以乾取義指陽爻言也九四在一卦之中本爲間者以爻言之則四之位近君九之材足以堅决而立斷故資之以除間􅀄九不畏不仁不耻不義四與爲正應猶聮骨之胏肉旣乾而堅至爲難噬一旦噬而去之見善明而趍義勇蓋得金矢之象焉有金之剛而無柔懦有矢之直而無回遹義形於色不茹不吐冝難噬者之無不噬也然去間不可有所易以易視之樞機不宻未必不反爲人所制不可有所撓在我不能貞固其守而猶豫遷就安知無當斷不斷之患此所以利艱貞吉也􅁚言未光蓋始與小人宻而終力去之雖得去間之義亦豈所謂表裏純一本末坦明昭昭然掲日月而行者乎平勃勸吕氏王諸吕其後卒誅諸吕在漢爲有大功參之王陵以白馬之盟折其萌則二臣爲未光矣大臣任去間之責者當觀諸此六五噬乾肉得黄金貞厲无咎象曰貞厲无咎得當也臣聞人主天下之利勢威靈氣􅆋之所曁以去小人之間則小人消以去夷狄之間則夷狄服權有所歸則勢有所易也腊肉全體最難噬乾胏附骨亦難噬乾肉雖難噬而視腊胏爲易凢三爻之陽皆足以梗化以六五離明之君制之如噬乾肉然何堅之不斷何間之不除正以其得黄金之􅁚也黄取其中金取其剛人君有剛中之德天下之悍戾邪僻無不退聽尤當正固守此而以兢愓危厲行之則惡無覆出㐫無反噬尚何咎之有夫有間則有咎其所以能終免於咎蓋以得剛中之道以治間當其冝也六五本柔中爻乃取剛中爲義上卦屬離離一隂居二陽之間中柔而外剛仁者之勇也君德茍仁有餘而剛不足則無以斷天下之疑定天下之業唐之姑息受制於強藩悍鎮漢之優游養釁於宦官外戚豈不甚可鑒哉上九何校滅耳凶􅁚曰何校滅耳聦不明也臣聞􅀄上兩爻皆受刑之人初九小懲而大誡故受刑輕上九惡積而罪大故受刑重何校械其頸也械深大至於没耳耳主聦有耳而不能聞過徙義聾瞶其心而浸至此極其所由來者漸矣夫視曰明聽曰聦本二事也而以不明麗之聦明於聽德然後謂之聦也天下之耳相似誰無是聦私心塞之顛倒是非而有誤蠅聲而雞蟻闘而牛外雖有聞中實蔽惑故聞人之善言而惡其逆已聞人之惡言則恱其順已不明孰大焉使盗跖桀紂能聽人逆已之言而不以順已爲恱亦何至天下之惡皆歸萬丗不可湔濯哉此易􅁚示人遷善改過之門最緊切處平齋文集卷第二十八
