body:
  text: 平齋集巻十六宋洪咨䕫撰外制國子司業張虙除祭酒仍兼侍講制勑具官某賢必希乎聖士必希乎賢朕欲新美天下之士親擇老成有賢望者為國子師士非幸與爾淵乎海濵之老也見幾而早遯覧徳而肯來俾参師氏詔媺於虎門望其容則易直子諒之心生聼其詞則淵泉溥博之義見而况摳衣問業於函丈之間者兹用進之大司成以專六徳之教師道立而善人多豐芑所以為數世之仁朕其庶幾乎可樞宻檢詳袁肅除右司即中兼權樞宻副都承㫖制勑具官某朕更張萬化首命一相筦文武之柄宰掾以賛政理樞掾以参訏謨非深識厲精求治之意不在此選爾學得其傳而邃於知氣集以義而勇於行端笏立朝論議閎偉朕知其可大受也挈宏綱於省闥𨗳宻㫖於殿陛肆兼命爾維時股肱大臣内欲為朕修天保以上之治爾彌縫之外欲為朕舉采薇以下之治爾佐佑之往欽哉可右司即中袁肅除太府少卿兼知臨安府制勑具官某惟前寕人得名法從濬正大之源以養君徳折姦邪之氣以興人心學無不該用有未盡求諸一庭詩禮之彦為我四方岳牧之資爾講貫有源業履甚度盤根利器奏民庸而獨髙熟路輕車聳朝望以更偉肆簡都曹之最進参列寺之華典吾神臯資乃儒術俗久壞而周南之化未浃政積弛而商邑之治未張澄精神於百為妙機括於一轉廸若攷詩書之訓宣朕躬道徳之行民情咸熈國勢自重此非趙張三王所能知也往遠乃猷用對予渥可大理少卿李鳴復除大理卿制勑具官某朕近觀勑令所編類舊典我孝祖宸筆逐事㸃勘増修刪改曲當情法於恤刑之條尤加詳焉企慕不已因親札以示輕用徒刑之戒廷尉天下平可不遴擇爾表於西州儀於王朝心夷氣和藹然君子長者之風廼者俘纍之獄咨爾聴之簡稽得情弊成以宥而朕好生之徳被於貉𨽻達於窮髪之北良用嘉欵晉躋九列帥屬棘庭使四方司政典獄咸知朕欽恤之意念之哉刑期無刑以長我王國可吏部即中趙彦悈除大理少卿制勑具官某朕近觀勑令所編類舊典我孝祖宸筆逐事㸃勘増修刪改曲當情法於恤刑之條尤加詳焉孰復企慕因親札以示輕用徒刑之戒廷尉天下平可不遴擇爾講學之粹操履之茂摽的於公族而吏治更髙司臬江左讞奏平允一道無寃民入為望即進参列棘四方司政典獄於爾乎則焉刑期無刑以長我王國可國子博士李大同除祕書丞仍兼崇政殿説書制勅具官某斯文在天地間前乎管百世之既往後乎鑰百世之方來非諸儒誰屬爾以經明行修都倫魁之望詩所謂如金如錫如圭如璧者也列在書帷据今訂古以沃朕心具有師法朕甚嘉之繇博士進丞中祕仍懋金華之業盖將閎其中而肆其外用昌斯文豈特以鎮吾群玉之府可著作佐即蔣重珎除著作郎仍兼崇政殿説書制朕甚嘉之繇佐譔進領著廷餘同前校書即黄朴除著作佐即仍兼崇政殿說書朕甚嘉之進繇典校佐譔祕廷餘同前太常博士徐清叟太學博士葉味道並除祕書即仍兼崇政殿説書制爾以經明行修茂名家之傳徐爾以經明行修都儒林之望葉朕甚嘉之繇博士進典中祕餘並同前秘書丞彭方除著作佐郎兼權侍左郎官制勑具官某斯文在天地間前乎管百世之既往後乎鑰百世之方來非諸儒誰屬爾以經明行修都儒林之望詩所謂如金如錫如圭如璧者也丞於祕邱攝組畫省銓綜餘隟盡讀未見之書韜涵日富進之佐著蓋將閎其中而肆其外用昌斯文豈特為時佳吏部哉可秘書郎張洽除著作佐郎制入典中秘讀未見書餘同彭方制敷文閣學士通奉大夫程珌該慶典轉正議大夫制勑奉壽巵於長樂方深追慕之悲通禁籍於甘泉尚共榮懷之慶有嘉宿德何愛崇階具官某學邃而識融履純而養厚濟時谹議五霙六莖之和華國髙文四璉八簋之古自玉堂之引去毎宣室之興思胡扼虎關尚閑駒谷復非遽復已萌於碩果之餘暌不終暌必合於遇雨之後首進班於穹閣仍賦廩於珎臺在爾初無慕爵之心惟朕盖有懋官之典肆加蕃錫庸侈殊私施㦸方新寕鬰起家之望佩囊惟舊毋忘存闕之忠可著作郎權司封郎官吳泳除軍器少監兼直舍人院制勑具官某朕親攬萬幾總飭百度與士大夫洒濯激昂以追元祐思得軾轍掌我書命興起人心於播吿之下爾操行純茂文思汗瀾本之詩書暢之莊騷太史體宜演誥朕有戎監職優務省往服少事雍容討論推厲精更始之意著之訓辭渾厚森嚴與越棘大弓同其古斯無愧江漢之靈矣論駮以扶國是朕又於此觀爾之風力可禮部郎官兼學士院權直趙汝談除秘書少監兼權直學士院制勑具官某中興百餘年公族之直禁林惟淳熈間彦中一人爾識度純明風槩凝遠杜門著書尚友千古皎皎白駒之在空谷也泰道宏開勉為朕起南宮北扉文簡而有法進参木天之峻仍直丹地之嚴選妙擢殊前後間見爾其推朕厲精更始之意著之訓辭使四方萬里咸曰大哉王言一哉王心是為稱職可太府少卿何炳除司農卿制勑具官某文帝一形錢榖出入之問貫朽粟腐其效立見朕於國計登耗念之熟矣而大農經費常患於不贍何也爾性行純固材諝通明蚤㳺刅而有餘晚韜光而更宻入参治藏之府曽幾何日能聲著聞進長九扈將以裕吾國也孰漏當窒孰蠧當除孰冗當節公爾忘私毋憚叢劇庸稱予厲精政事之意可金淵李榘並除太學博士制勑具官某等科舉之學非所以淑士也必義理性命之學明則多善士化更而新師選可不重乎爾抱負閎講貫熟製錦劇邑弦歌藹聞可以為成均師矣敷暢奥義薰陶善性使諸生人人有舞雩詠歸之樂則吾與㸃也可太學博士葉應輔除國子博士仍兼景獻太子府教授制勑具官某模範賢關惠訓宗邸能茂明所學可以為胄子師矣餘同上奉議郎袁立儒餫賞轉一官制勑具官某間者均光襄房之役靡勞不酬爾才良氣雋優於邊畫督餫以濟軍事不憚鞅掌禦侮制冦與有勞焉朕方信賞以勸事功進官一列其懋承之保障最聞俟有優擢可全子材除淮西安撫副使兼知廬州兼計度轉運副使制勑具官某朕夢想東都廼眷西顧若昔濡須之築芍陂之屯郾城之士飽馬騰淝水之風聲鶴唳欲追往躅宅牧良難爾彊入而忠果達且武荆襄淮海倍著賢勞入搴朝列之華出鎮邊維之重四履綏靖三軍激昂令行陳潁之間氣薄潼藍之表朕嘉爾勇於徇國就畀帥旄仍總飛輓用䆒多多益辦之韞惟和戰之議論不齊守禦之規模一定必量敵而進慮勝而㑹必臨事而懼好謀而成能圖萬全何往不濟尚勉之哉可贈寳文閣學士楊邁特贈龍圖閣學士制勑朕慨念漢宣入承大綂博陸侯之定策方共致於中興澓中翁之受詩胡獨成於長往宻勿麟儀之舊凄凉馬鬛之新睠懷若存褒贈宜厚具官某抱古邃學事予初潛反覆發明盡詩書禮樂之奥從容規切必仁義道德之言每尊所聞務藏諸用既授五龍而夾日忽比列星而騎箕雜佩贈之莫䆒仔肩之益一鑑亡矣可勝殄瘁之悲雖䘏典之有加尚徽章之未稱峻陟淵圖之序丕増泉壤之光易文子之名死宜不朽録叔敖之後生與俱榮尚其營䰟服我休寵可黃壯猷何處信課最各轉一官制勑具官某綜覈名實而信必其賞罰親政之急務也爾守何處信貳輔藩有美政且能濬𨗳利源坯窒蠧穴版部課賦入以最聞増秩賞能庸示予信其益厲精白以承可右正言王遂除殿中侍御史制勑具官某朕始親萬幾首得一士置在明目張膽之地蔚有正色敢言之風神鼎鑄而魑魅莫逢干將淬而犀兕亦㫁善類吐氣貪夫革心察之既稔所安用之不厭其速甫躋諫列亟副臺端純仁之内出姓名蓋非輕授趙抃之不避權倖抑所優為朕方虛已以受人爾亦得時而行道難逢者風雲之胥㑹易失者日月之如流萬古在前億世在後毋替精白承休之節用為汗青傳遠之圖可吏部郎中兼右司李宗勉除監察御史制勑具官某蓋聞淫朋去然後可以榖正人側媚屏然後可以用吉士天運之往來消長此其機與爾和而趨於中大而麗於正日用力於明善之學如恐不及洊奉郡最入儀郎省素絲一節未嘗以爵禄入於心諸大夫國人皆信其為賢也朕方謹憸人充耳目之戒儀圖可御史者莫如汝宜在易一隂不能勝五陽則決之於夬五陽不可忽一隂則柅之於遇潛觀機括而制其㣲天下可常泰也爾亦有辭於永世可大理卿李鳴復除侍御史制勑具官某朕稽家法之相傳睠臺綱之特重仁廟思得忠厚淳誠之士裕陵務革澆浮薄惡之風盖心直正則無詭隨議論平則不沽􅈭欲維吾國宜表若人爾秉心澹夷藴識精粹良吏之譽溢於外服吉士之稱著於中朝甫陞卿月之華趣應法星之象維昔田錫暨於何郯莫非西土之英列在南床之選幾年無此一旦得之春秋之盡而不汚大關榮辱洪範之㑹其有極一洗黨偏百辟咸慕乎君子之中四方聳聞乎仁者之勇繄予所屬惟爾其承可秘書丞兼崇政殿説書李大同除右正言兼侍講制勑具官某師氏詔媺保氏諫惡皆有道之士為之朕厲精求治之初増置經筵官相與講明五三六經之道以養其源諸儒序進襜如翼如爾於其間鬚眉皓白氣肅而辭莊淵乎其似道也朕退而自喜曰得一佳諫官矣擢寘騎省仍侍氊厦逆耳沃心朕於爾乎嘉頼官守一時之臧否言責萬世之榮辱毋憚嬰鱗有懐不盡然軔輪折檻特救過於已著望儀刑而意消不聞亦式不諫亦入庶其置朕於無過之地乎可吕殊除太學録制爾金玉其度而不茍售可以為成均師矣餘同金淵李榘大宗正丞蔡範除户部郎中淮西總領制勑具官某三表五餌不如晁錯實塞之策破𦍑强弩不如充國留田之奏綏禦皆不可廢夫守也爾名儒之胄良吏之表亷静有立不為茍同宜出入省闥以緝庶務中原事機方集必事力之裕乃克濟庸輟爾以尚書郎給餉道往哉守淮所以蔽江而控河士飽而歌馬騰於槽淮西之成雋功以此出納有經而無壅利取予有權而無近名足食足兵爾盖優為之寓攻於守而不株其守盍以方畧上可歸順人李義承節郎張瑀李德魏珏保義郎制勑具官某討叛以誼懷服以仁殱渠貸脅歸斯受之爾能革心奚愛勇爵祗戴寛恩勉圖報效可歸順人同鼎武翼郎王聞顯武翼大夫呼延實來伯友修武郎制勑具官某國家推天覆之仁舍逆取順豈以南北為間爾等執覊絏以事異姓途窮力屈束身歸命朕不汝棄也易畀武級之勞毋亡忠力之報可廣州觀察推官魏國良殁於王事贈通直郎制勑具官某嶺甿不靖爾挺身往諭恩信亦既勤止得疾於行齎志以殁録勞進秩尚慰九泉可淮西路鈐范用吉授髙州刺史節制京西北路軍馬制勑具官某昔年餘燼中原為墟關河方徯於來蘓陳潁首歸於疆理上功莫府謂爾有勞亟陞遥刺之華仍揔進屯之重祗承休渥益勵忠勤可江陵府副都綂孟珙特轉武經郎制勑具官某方城為城漢水為池天險也制閫設險加嚴峙芻榦具畚臿濬深培髙屹然金湯之固第勞來上爾實程督進秩二等用勸事功可平齋集巻十六
