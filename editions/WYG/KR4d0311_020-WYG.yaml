body:
  text: 平齋集巻二十宋洪咨䕫撰外制兩淮制置使兼㳂江制置副使趙范除江淮制置大使制勑全江淮濟中興莫大乎要衝之勢築壇場拜大將莫嚴乎專閫之權迺睠時髦宻承廟筭内養威而植屏外觀變以投機丕建使名特加命紱具官某挺資果毅抗志忠勤材閎而用周力振西平之業氣壯而識老逺追鄧禹之風自討賊之策勳即平戎之定計入儀法從出撫成師朕惟九節度以無統率而危唐四將軍以有領屬而强漢必中權之獨縂斯外治之咸張車攻復㑹東都首經營於江滸閟宫遂荒徐宅先疆理於淮夷兹大恢表裏之規摹宜盡禀精明之號令翼翼文昌之座堂堂太乙之旗壯本根於荆揚震聲采於汴洛詩書之帥以尊主為德仁義之將以安民為功行三軍則務於好謀掌六師則貴乎同力觀宣勞之寖久信任重之優為江左自有夷吾朕方倚深長之畧河南盡為晉土爾盍堅綏定之圖權工部侍郎留元英除集英殿修撰知江州制勑翠緌鳴玉入聫法從之榮皁盖飛旟出殿名藩之重不輕厥選宜賁其行具官某篤實無華寛平有則物情方靡初何意於鷹鸇世道既回仍可儀於鵷鷺政藉居中之益忽騰補外之章勉徇懇祈俾圖共理升班論譔留夙望於甘泉奉最藩宣寄壯懐於湓浦予曲盡待臣之禮爾益殫報上之忠華奭除國子博士應除太學博士兼在文府教授汪之道除國子録制勑具官某道存乎人心藴之為德行行之為事業文辭陋矣朕故謹擇知道者為學校師爾奭直簡而廉爾融明而靜爾之道英拔而粹俱有得乎正大之㫖庸命奭為博士以學胄子為博士以學士仍典藩房之教之道為錄以紏冑監之不如規者師道立而皆知以求仁明善為急化成天下獨不在兹可前右正言何萬齡特轉朝奉大夫直寳謨閣致仕制勑具官某臺諫以觸邪指佞為職自仗馬相戒而舍豺狼問狐狸有年矣爾以駿發之才邁往之氣列在騎省能於波流風靡之中奮擊大吏疾於迅霆非不畏強禦者乎銜卹以沒歲月奔駛崇階邃職示不汝忘可著作郎兼權司封郎官蔣重珍除起居舍人兼崇政殿説書制勑具官某廸惟先朝策多士得掄魁之彦敷遺後人休朕既簡在大僚又簡厥修如爾重珍者以柱史從華光之游矯矯乎鳯凰之集阿閣黃鵠之下太液也榮貴素定盛名難居詔美責難益究爾韞使碩大光明不愧天聖嘉祐之盛顧不偉與可黃壯猷除金部郎官制勑具官某朕方經理京洛財計裕於内則事力充於外金幣委輸鉤考其數以周知登耗而頒節制司珍職也爾噐局明整才華暢茂司庾左浙能斟酌取予歛散之宜以乂我民趣踐郎省參掌國用曹雖劇刄游盤錯矣抑以是詳觀爾之能可司農寺簿趙鎬夫除司農寺丞兼提領安邊所制勑具官某景夀昌丞大農関内漕穀國便之常平置倉民便之北邊亦藉以給丞不當如是耶爾鎬夫機圜而不窮氣鋭而有立逾月再轉就丞九扈且坐縂邊計材選也孰利當興孰害當除毋使夀昌專美於漢則職之稱可軍噐監簿陳振孫除諸王宫大小學教授勑具官某我仁宗詔諸宫院教授非止講習經㫖須選履行端慤盖欲其以身教也爾静而不競簡而不華可謂端慤矣振振麟定以爾為之師觀矩度於歩武之間挹芳潤於言論之頃而成童既冠莫非大雅麗澤講習之功將有考於此可方大琮除司農寺簿樓杓除軍噐監簿制勑具官某寺監有簿職鈎稽違失簡矣國以養材士以養望爾大琮粹然其瑜而静俾簿於農寺爾杓嶷然其度而立俾簿於戎監鴻之漸而鷺之振也觀其所養朕不敢忽爾益觀其自養可知南安軍彭鉉職事修舉轉一官制勑具官某漢二千石有治理效輙璽書勉厲增其秩故良吏為盛朕甚慕之爾果於事功達於識慮而敏於材江右南接嶺嶠俗悍而闕壘假守能不以繭絲易保障田里相安蟊賊屏跡其漢吏之良乎一秩示勸益進於理以對顯擢可施􅵉差知雄州制勑具官某融在廣右為望郡銅虎符璽不輕畀爾以淳熈執政之胄克修令猷履平而植固三為别乗抱璞不售亦老於世故矣是以起家毋鄙逺其民而厚拊之廉善達於聽聞斯稱惟良之選可曹叔逺贈光禄大夫制勑老之将至甫抗志於垂車生也有涯遽遺言於易簀推我䀌傷之意形於贈禭之章具官某薰然澤物之稱蔚乎成己之學中年去國流落而氣不衰晚節還朝虺隤而志已倦進陟論思之選退尋蕭散之盟方惜日以自休胡御風而不反出處本末具知存闕之忠始終哀榮茂享書棺之寵可李衍直寳文閣致仕制勑具官某河東守以一人之毁而去雲中守以文吏之䋲而罰今昔之通恨爾直方自信無所撓折宅牧淮右竟以賈憎朕夷考其平生公於狥國廉於居官暌弧之疑可亡也齒髮未衰遺榮何亟進直寳奎尚其吐氣可吳淵除右文殿修撰知鎮江府制勑具官某物不受變則材不成人不渉難則智不明此風雨霜露所以為天道至教爾以昂霄聳壑之秀質出於鄧林夫豈常材也哉而匠石必取於歛華就實之後京口為江淮襟喉升班論譔起家出鎮識老噐定而政平軍民之福也暇日登北固而長望慷慨擊節聞風作興斯稱予蓄材待事之意可蔣重珍除集英殿修撰知安吉州制勑具官某董仲舒宜在漢庭而出相教令國中所居輙治志在及物無中外之間爾以奥學閎識奉天人之對嘗襃然為舉首不輕於售挽莫能致迨攬大政幡然肯来敷經旃厦吮墨螭首朕方傾意卿之非仲舒不遇比也卧疾念歸姑以論譔殿輔藩勿藥且召矣可姚珤除直秘閣權知建寧府制勑具官某富沙軍情屢摇頃為甚官治民廬半委烈燼朕念之怛然故選熟知德意者為守寓直中祕以榮其行爾名在文學之科而議論鏘發志氣英邁丞于麟臺郎於憲部與聞廟筭於宥府聲聞日起詎宜輕去一方病矣勉為朕徃廉平以字民簡靜以馭軍百廢具舉而聲色不動以表列城可何炳除集英殿修譔知江州制勑長江上下䕶風寒非一處潯陽西挹武昌東引京口自晉以来為重鎮故輟從臣臨之具官某以撥煩之才致逺之識嘗建臺閫于上流厥績用茂晚登從塗齒宿而氣不衰升華論譔徃控天險酌保鄣繭絲之計嚴綢繆牗户之圖江波不驚廬阜屹峙尚可登庾亮之樓而銷憂也可國子監書庫兼皇后宅教授徐雄除國子録制勑具官某虞周有胄子國子之教漢有四姓小侯之學朕參用之以作人爾講習克勤圭角不露方授經隂馬之家遂分録成均之政師道行焉茂哉思其所以為人師可陳大樸平黎蠻賞轉儒林郎制勑具官某黎蠻干犯海邦繹騷爾宻贊守臣設謀致討論功宜賞爰進一階漢水之陽益勤警邏可張綽平蠻督餫賞轉儒林郎制勑具官某黎蠻干紀海邦繹騷維時守臣亟致討定爾服官黃綬督餉良勞示勸一階益勤警邏可趙善瀚知岳州制勑具官某岳陽處粤蜀荆楚之會吳晉皆為重鎮以魯肅陶侃為之守爾氣盛於權竒材優於盤錯傑然公族之頴繁弱櫜藏人所共惜起馮熊軾揖肅侃於千古之上可無薄洞庭而羞君山也維彼澤國民生孔艱悉力拊循無失休譽可黃朴改差知泉州制勑具官某奉親而守便郡縉紳之至榮爾學問昭融議論激壯以掄魁雅望昌文聲於朝而料戎情商國勢類出人意表識者以方面材期之甫懐吳興之綬隨綰温陵之組去家壓境能幾何舍板輿親御如行户庭父老相與榮艷於道周且喜色相告曰仁孝同源孝於親必仁於民凋瘵其甦乎可涂顯行知崇慶府制勑具官某蜀在萬里外朕於人物之賢否難隃度而耳目惟制閫之寄爾之公亷律己豈弟愛民彦呐為朕言之觀逺臣以其所主唐安一麾不汝吝也政平訟理圖稱厥舉勿以去朝廷為邈可厲模楮綱賞轉朝請大夫制勑具官某幣行於東南而取楮於蜀精實緻宻偽難以亂真也爾抱才敏鋭將漕井絡歳發楮綱適應賞今其升一級庸勸奉公可權工部侍郎徐僑除集英殿修撰提舉佑神觀兼侍讀制勑勞侍從之事願去承明考仁聖之風勉留廣厦雖優老之盛典實從儒之盛心具官某志操孤高問學淳古詠歸沂水之上世果何求作興北海之濵時然後出有嘉耆艾置在清華守益固而眷益隆進愈峻而辭愈力兹領祠於闕下仍勸讀於禁中以體貌大臣之舊規為尊寵高年之特禮更陞論譔不替纂修行葦之養老乞言亦孔厚矣大學之致知格物尚茂明之可黃堮知肇慶府制勑具官某朕惟民生之不易吏治之不良雖斗壘未嘗輕畀矧名藩乎爾承元祐故家之傳材優而氣壯自著勞於試邑即振譽於登畿僅爾小休倐焉起復為遐嶠之民擇守也潰旅未殄地廹高要徃疾其驅亟圖案堵可丁曄除直寳謨閣淮東路轉運判官制勑具官某王良造父之御鳴和鸞逐水曲無不中節人與馬相習也爾氣明而敏材通而偉屏翰澄清之最荐著於淮左物情地利習之久矣兹還寳奎之直俾膺飛輓之寄咨諏貴廣積貯貴豐徃究乃心用圖厥績以寛我東顧可平齋集巻二十
