body:
  text: 平齋集巻一宋洪咨䕫撰講義豫利建侯行師豫有猶豫備豫和豫逸豫之義人能决猶豫而思備豫則見幾於吉之先安往而不和豫過於豫則逸矣其義雖四而實則一也豫承謙之後謙無凶悔吝則和豫可知震動於上坤順於下動必以順故建侯以親衆行師以動衆事雖至重無不利大順則大利在其中也建侯而非順則開國而用小人行師而非順則行險而毒天下果何利之有哉其卦以一陽主五隂亦有比建國師蓄衆之互體象曰豫剛應而志行順以動豫豫順以動故天地如之而况建侯行師乎天地以順動故日月不過而四時不忒聖人以順動則刑罰清而民服豫之時義大矣哉六五以柔居上九四以剛應之剛宻比於柔不期應而自應也人君有柔中之徳虚已以任大臣大臣有剛徤之德自任以天下之重剛柔相應而相濟志所欲為何往不克然志之所以行亦惟其順也以順而動用能致豫既豫之後又以順動終始一順無有間斷天地所以妙不息之運如此而已人君之建侯行師其能違乎天地以順而動則日月四時無過忒人君以順而動則不待刑罰而民心服在我無所違乎理在人自無所違乎我也時者天運義者天理順而行之豫之時義豈不甚大茍或違道干譽咈民從欲是為悖矣象曰雷出地奮豫先王以作樂崇德殷薦之上帝以配祖考禮極順樂極和順則和矣樂所以導和也方雷在地中動於至靜而不露迨出乎地而奮乎天群蟄啓户萬象趋榮孰不同其和豫然聖人合震坤以為象不曰雷出地上而以奮言深閉久欝之餘一旦奮發造化妙用軒豁呈露施生訢合動植昭蘇豫莫大於此先王觀豫之象發揚和聲褒崇先德如韶繼勺酌以侈祖考對天之休盛薦之上帝如思文我将推而配之葢謂治至於豫皆祖考盛德之積非予一人所能致也人君惟不以和豫自居則不至於以逸豫自安矣初六鳴豫凶象曰初六鳴豫志窮凶也臣聞巧言者誤國之具佞人者危世之本豫五隂皆宗九四一陽四秉大臣之權初以隂柔小人宻相應與極其趋和之意形為邪謟之辭以求容恱大臣亦恱其愛已而甘受之象以志窮致凶為言志不自立惟用之於獻佞貢諛其窮可知矣等而上之以此求容恱於君人材阨而不進則曰野無遺賢民生困而不省則曰雨不害稼積薪将燃而曰已安已治朋黨方興而曰太平無象其發於聲音謟曲萬態而宦官女子之言朝夕薰浹於耳者又相與為表裏大厦就頽同於一壓凶孰大焉六二介于石不終日貞吉象曰不終日貞吉以中正也臣聞天下之理非與物俱轉者所能察也人惟主中正於中然後能介然如石能介然如石然後能見幾而作盖石質堅而體靜靜者見善必明堅者用心必剛一念不動萬里洞燭不俟終日已盡見未然之幾區處先定應酬不差宜其正固而吉也盖二與五為應不與四為應衆爻皆宗九四之大臣二獨居中得正介特自立以砥柱一世可謂難矣然二五君臣雖為正應而隔於九四其情不得以相親故介特之臣但能堅於守未能鬯於用其先見之逺先知之明萬夫之望已深屬之矣人主能不沉酣於逸縱不昏蔽於便佞好賢之心不衰求善之志不改則介者終有時而親矣六三盱豫悔遲有悔象曰盱豫有悔位不當也臣謂此人臣患得患失之象三廹近九四當國之大臣欲如初六小人進為容恱恐非正應而不我與眄眄仰視逐逐營求是患得也欲如六二君子介特自守又利害祻福交戰於胸中躊躇未决趦趄復前是患失也以不中正之人處不中正之位而盱遲皆悔隕穫充詘情狀畢露其悔而不凶者大臣不與為應姦無所售故不至凶使其姦得售則欺君賣國無所不至矣有國者安用是患得患失之臣為哉九四由豫大有得勿疑朋盍簪象曰由豫大有得志大行也臣聞九四以一陽為衆隂所宗材全而氣盛毅然以天下之重為已任下傾心而仰之上虚心而屬之此天下之豫所由致也由我致豫建侯而國勢尊行師而人心順其有得大矣然功業之盛者必有信已太過之弊權任之隆者必有專已自用之咎大臣當由豫之時茍驕吝一萌不能開心與天下之賢以共治則豫之由致安保其不為亂之階得亦安保其不失也惟洞無有我之私披胸臆以待賢忘勢分以下士疑豫一㸃不㽞於中則聲應氣求之下如簪聚髪何材之不集而致君澤民之志遂得以達於天下信於萬世此正周公握髪吐哺時也盖疑者德之莠事之賊大臣無疑心之累則足以合天下之善㫁㫁乎知賢之當任知邪之當去不以疑貳之心來讒賊而啓惎間則百志維熈矣六五貞疾恒不死象曰六五貞疾乘剛也恒不死中未亡也臣聞疾非特六淫之疾凡足以為吾心之害吾德之累吾國之憂吾民之戚皆疾也人君處和豫之極而逸豫生嗜慾好樂便嬖側媚之足以蠱方寸者紛至於前於此能一念内固外邪客氣不得以乘虚而干正則德性堅明元氣充實既壽其身又以壽其民壽其國則億萬年無疆之休皆其功也象以乘剛中未亡為言葢六五柔中之君乘乎剛則有格心之大臣而内志不可摇秉乎中則有閑邪之定力而外慾不能入内外交相飬此所以貞疾而安恒不死而壽也夫德慧生乎疢疾鴆毒藏於宴安此爻在豫之五當以無逸三宗享國之意參之上六㝠豫成有渝旡咎象曰㝠豫在上何可長也臣聞人孰無靈明虚徹之性有物蔽之則靈者㝠和豫之極而肆逸豫此心瞽塞罔有知覺故㝠豫以成成非一日之積也方此心清明之初豈不知觀逸逰田沈湎耽樂之為患及為外物所移則勤者惰立者弛操者放日積月累性為情鑠而㝠頑不靈之豫於是乎成正以隂柔之資不能聞義而徙見善而遷以至此極也易卦未有窮而不變者故逸豫既極必渝渝則亦可以無咎旡咎善補過前日之不善庶幾其可揜也茍既極而不知變則危亡無日何長之有哉然㝠豫既成宜無可變之理聖人猶許之渝若其未成而知變豈特旡咎而止觀此則知唐明皇之亂兆於開元成於天寳懵不知變禍亂四起可為萬世之戒平齋集卷一
