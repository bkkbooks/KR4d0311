body:
  text: 平齋集卷五宋洪咨䕫撰講義觀盥而不薦有孚顒若臣聞臨觀反對卦也臨二陽在下觀二陽在上觀如兩觀之觀儀型揭而群瞻聳也觀之聖人正心修身以觀天下一誠之外無他尚猶宗廟之祭交於神明一誠之外無他物盥即奉槃沃盥巾以帨手時也祭先盥手然後酌鬯而祼祼用鬰鬯猶未免託物以求神盥則蠲潔内外與神黙接洋洋乎如在其上如在其左右不假物而誠已通又何俟腥熟之薦而後逹其誠哉為人上者能至誠主一無假乎外如盥而不薦斯民不期孚而自孚矣孚者信也誠之實有諸已者也人受天地之中以生誰無是誠君以誠感民以誠應顒然興起不約而同與聖人作而萬物覩均此機也是知人君之化天下不難於孚諸人而難於孚諸已彖曰大觀在上順而巽中正以觀天下觀盥而不薦有孚顒若下觀而化也觀天之神道而四時不忒聖人以神道設教而天下服矣臣聞一隂為姤進而為遯為否為觀為剥莫非小人道長觀獨不以隂盛為憂者二陽在上四隂順聽於下是上有陽剛之君儀表一世隂柔雖衆方将化而為君子之歸其為觀甚大也觀合巽坤為卦以九居五順巽而中正也循理而行無所拂逆可以懐天下未足以觀天下觀天下必中且正大明當天萬物咸仰一有偏倚必有照臨不及之地此聖人所以為天立極也然必本之以誠誠者物之終始不誠無物此心之誠不存則順巽中正俱失其有猶盥而不薦以誠為主黍稷不如明德之馨殺牛不如禴祭之福在誠不在物也此誠所格斯民莫不相孚以心顒然尊仰隨所觀而化其觀果何所見哉誠則形也其化果孰使之然哉唯天下至誠為能化也求諸天道春夏秋冬運行而不息皆神之所為聖人以是道設教天下不期服而自服又豈非誠則神乎觀之聖人一誠貫通三才之間始與人為一終與天為一極而歸於無聲無臭之妙非黄帝堯舜之神化宜民文王之純亦不已不足以當之象曰風行地上觀先王以省方觀民設教臣聞自上示下為觀天下之物凡可以示人者皆有形之觀惟風行乎地上草木均被披拂則無形之觀有形之觀其觀淺無形之觀其觀深故先王取象於風之行地省方觀民而設教五方之俗各有不同隨方省察因民俗而教之以救其偏扶其正使同歸道德之中舜之同律度量衡成王之考制度雖若涉於有形之觀教行而民從猶風行而草偃皥皥乎其不自知實有無形之觀存盖誠存乎中不動而敬不言而信不容以形迹窺也後世省方之禮廢人主深居九重之上民何由觀教何由設亦惟心存乎群生之休戚庶俗之美惡四方萬里皆瞭然於户庭之間而以身為教自正心誠意以至於修身齊家無一不盡自然國治而天下平與身歴目覩所設教何異哉初六童觀小人无咎君子吝象曰初六童觀小人道也臣聞觀以二陽位否剥之間欲化小人為君子故待小人恕欲君子益進其為君子故待君子嚴九五宅中於上光明碩大之德如日月之照臨有目皆覩初氣卑質弱而去五逺乃為童稚之觀童者䝉而未發孩提之童無不知愛其親則有可發之幾彼其陥於小人豈性也哉物欲蔽之也茍如童稚於倥侗顓䝉之初有以發之則昏者可廸塞者可通氣質變化安知小人之不為君子故雖童觀而許其无咎象以小人道為言其質固不可以語上而申言初六亦示其上進之路也為君子而不能以學問開明所見而甘心與懵然無知識者同歸則為吝矣聖人於大觀之初恕於待小人所以示皇極大受之法嚴於待君子所以示春秋責偹之法六二闚觀利女貞象曰闚觀女貞亦可醜也臣聞聖人之道無窮人心之見有限上帝降𠂻若有常性靈明虚徹初無聖愚賢不肖之間而氣有清濁材有利鈍故所見亦隨之而廣狹仁者見之謂之仁知者見之謂之知百姓日用而不知此其所以區而别之也闚觀之不能廣大豈非六二氣質之柔闇與九五陽剛之君大觀在上乃帝光天之下至于海隅蒼生萬邦黎獻共惟帝臣之時初以童稚之見而觀䝉昧未有識知二以窺覘之見而觀有識知矣又自安於卑陋蹇淺僅足以知聖人之汙是惟女子生長於深閨之中幽間專靜而有守則闚觀猶未至害士君子則害道矣象發明爻辭之所未發謂闚觀為觀雖女子之貞亦有可醜盖鑽穴相闚闚見室家皆為不正之視女子雖貞而所視不正心隨境移恐不能保其貞也然則欲廣闚觀之見則何先中庸曰好學近乎知學愈進則見愈廣聖人之全體大用目擊而道存矣故惟已百之已千之雖愚必明雖柔必強六三觀我生進退象曰觀我生進退未失道也臣聞三上承二陽下接二隂而居其中陽為君子隂為小人進而從陽則為君子之歸退而從隂則為小人之趋一進一退盖邪正善惡之關也三於此觀我生生者出於吾身者也其大端則言行是已觀吾之言其進而合於君子耶其未至於君子耶觀吾之行其退而陥於小人耶其遂逺於小人耶君子小人之界限其間不能以寸反觀吾身之所發必欲進與上之二陽同其光明而不欲退與下之二隂同其柔闇能如是三雖處不中不正之位亦未至於失道也盖三之質易於失道以能反觀諸身去小人而從君子故道為未失也然未之一辭猶未深保其不失道盍亦戰戰栗栗於取舍之决為舜而不為跖為堯而不為桀哉此正大學致知工夫之地六四觀國之光利用賔于王象曰觀國之光尚賔也臣聞九五剛中之君在上初與二去九五為逺故止於童觀闚觀三少近則未失道四切近則利用賔觀愈近見愈親也賢者進退有時行藏有道如麒麟鳳凰其出必待休明之世故觀國之光然後賔也國之光明本君德之光明人君能明吾之明德如鑑不受翳水不受滓則本然之明常存篤實之光充實之輝皆由此而發在朝廷則禮樂彰法度著在天下則道德同風俗一其為國之光大矣賢者觀乎此而願立於其朝伊尹起於莘野呂望歸於東海豈非湯文之時利用賔乎象以尚賔發之盖道義重則勢利輕賢者寧甘心於白駒之谷考槃之澗不肯屈身輕售其出也以時其進也以禮其事君也以道君望其儀型而起敬故崇尚之以賔禮而不敢臣取重者在已重之者在君如此則諫行言聽膏澤下於民矣茍在已無以取重君且望而輕之毋怪乎有言莫之行也九五觀我生君子无咎象曰觀我生觀民也臣謂反觀内省之功儒者所難而况貴為萬乘可喜可欲所以移其心者滿於前乎九五陽剛而中正居巽而應順動無過舉矣然猶於我生必反而觀之凡言行出於吾身者為我生觀吾一言之出皆合於君子之道則言無過言一行之出皆合於君子之道則行無過行以此示民可以无咎有一不合於君子則有咎矣吾身未能无咎顧欲使天下皆有士君子之器表偏而影正無是理也象又以觀民言者君子之道本諸身徴諸庶民觀羣黎百姓徧為爾德則知言行之出於吾身者為善觀怙侈滅義服美於人則知言行之出於吾身者為不善是觀我生者必當觀之民也因觀民之所化而觀吾身則言行是非不能掩因觀我之所生而觀吾心則念慮之邪正不能蔽由外而返諸内愈近愈不敢自恕由内而推諸外愈逺愈不能自隠内外交養之道既盡天下觀而化之孰不顒然而孚乎上九觀其生君子无咎象曰觀其生志未平也臣聞上九與九五爻辭同惟我生其生異盖吾身之所出為我生九五之君所以自觀也上九則觀君身之所出故為其生五君位上處無位之地而宻比之雖居無位之地一念未嘗忘乎君常欲納之於无過故觀君之言行果君子耶則喜其能免於咎觀君之言行未君子耶則憂其不能免於咎身在畎畝心在王室因所觀而察之惟恐吾君之出乎身發乎邇者有一毫之未當無以示四海之儀則其志豈遽平哉然九五觀我生上九觀其生皆合乎君子之道而僅止於无咎何耶人君之治身無止法言行極堯舜禹湯文武之盛不過盡其身之所當為初非有餘故君子乃无咎不然有咎矣人臣之望君無止法以禹湯文武為未足又恥其不及堯舜故君德至於君子特喜其无咎未敢遽以為可安也此觀之君臣所以各盡其道平齋集卷五
