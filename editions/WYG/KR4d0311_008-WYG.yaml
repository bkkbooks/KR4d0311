body:
  text: 平齋集巻八宋洪咨䕫撰故事梁冀在位二十餘年窮極滿盛收冀財貨縣官斥賣合三十餘萬萬以充王府用減天下租税之半散其苑囿以業窮民臣聞財用之在天下如血脉行乎一身可通而不可壅王者藏富於民覇者藏富於國其下富不在國又不在民而在於聚歛臣之家蓋自正道不行而人心壞人心壞而吏治壊舍義趨利假公售私朘民自封一孔不貸柄國者又為生姦受盗之府而天下之富偏聚焉此冀所以積至三十餘萬萬而未屬饜也夫財本吾國之有而取以助國財皆吾民之出而還以予民其理順其政公故收冀家以充王府而减租税天下以為快後世莫以為非不謂桓帝能行之也太祖問李承進曰莊宗以英武定中原享國不久何也承進曰莊宗務姑息將士每出禁民衛卒必控馬首告兒郎軰寒冷望與救接莊宗即隨其所欲給之蓋威令不行賞賚無節也上撫髀嘆曰三十年夾河戰争取得天下不能用軍法約束此軰縱其無厭之求以兹臨御誠為兒戲今朕撫養士卒固不吝惜爵賞茍犯吾法惟有劍耳易曰上天下澤履君子以辨上下定民志上下不辨民志何由定民志不定而欲求國勢之安强是却行而求全也况三軍以紀律為重處不知禮則出不知律犯上之意一萌作亂之機已兆尚可望其敵王愾而伸國威哉唐自肅宗偷一時之安平盧節度察軍中所欲立者授以旌節自是以姑息為常至於偏禆士卒殺逐主帥而不問亷逺地則堂高亷近地則堂卑陵夷之勢何所不至此唐所以亡也後唐莊宗猶襲故態不能以軍法約束而威令不行享國不永竟坐姑息之過我太祖皇帝受天明命為世立極盡革唐季五代禮法蕩析之弊一階一級上下相承川班妄訴必肆顯戮此所以國勢有金城千里之固民生有泰山四維之安也然豈徒以階級之法懲之哉平時撫養不吝爵賞茍犯法則有劍恩施而後威立宜軍心悦服不敢輕於有犯也憲宗嘗與宰相論治道於延英殿日旰暑甚汙透御服宰相恐上體倦求退上留之曰朕入禁中所與處者獨宫人宦官爾故樂與卿等共談為理之要殊不知倦也人心不可以兩用有所慕則有所忘好善者忘酒樂德者忘色八年於外急於拯四海之溺而忘其家日􅉴不食勤於合萬民之和而忘其身所重在此則所輕在彼也方時癉暑人孰不惟寛凉之是慕憲宗鋭於圖治議政延英日且旰矣汙透御衣而不顧蓋忘其為暑也謙虛以盡大臣之情而無取乎宫人宦官之與處奮厲以講中興之要而不求乎深宫廣厦之自逸社稷生靈之念日切於中凡人情之所共樂者無不忘之其肯以天下之未安為一身之適乎况是時名相皆足以穆天縡經國體所議必非不急細務徒留旰日之聽者堂堂兩河已盡在規畫中矣彼避暑九成而忘其親生凉殿閣而忘其民心移於物惟欲是縱賢君所當戒也熈寧三年知舉吕公著在貢院中宻奏言天子臨軒策士而用詩賦非舉賢求治之意乞出自宸𠂻以諮訪治道至是上御集英殿進士初就席有司猶給禮部韻及試題出乃策問也既而賜葉祖洽已下及第時韓維吕惠卿初考策阿時者多在高等訐直者多在下等自鄉舉里選之法壞而取士惟虛文是尚漢策賢良雖未免以利禄入其心科别或有未竟猶不失言揚之意唐進士得人為盛特絺章繪句之習工如日五色何益世用國朝策士初襲唐人辭章之咎至此始以䇿諮訪治道與漢制科等其意美矣然草茅言事豈能皆若素宦於朝而効忠獻直悉出於愛君憂國之眞情言之當固不以人廢言之過亦貴於能容人君能容過直之言市駿骨揖怒蛙感興發作之下孰不以安危治忽之實來告茍有司喜阿逄而惡訐直以行上下其手之私如吕惠卿􅒰美意一失奚以臨軒發策為哉維我仁宗之策蘇轍其言宫中事過於直上曰以直言求人而以直棄之天下謂我何可謂有大舜之大矣是時考官則司馬光范鎮蔡襄唐太宗謂蕭瑀曰朕少好弓矢得良弓十數自謂無以加近以示弓工乃曰皆非良材朕問其故工曰木心不直則脉理皆邪弓雖勁而發矢不直朕始寤向者辨之未精也虞人有原獸之箴輪人有糟粕之議工執藝事以諫不聞於世久矣而唐之弓工獨得古意其言蓋以規太宗功業雖盛而治心之道實未嘗講也夫心者萬理之㑹萬事之主此心明白洞逹無一毫迂曲之累則見面盎背皆天理之形著發號出令盡人心之契合敬義直方所以相為表裏也太宗天姿高而學問不足其得在於好名其失亦在於好名好名故能矯揉為善惟名之好而觀省存養之不加故矯揉之力怠而禀受之偏者不能掩輕我宫人之怒不役一夫之怒㑹須殺此田舍翁之怒以至好大喜功而多愛無非本心之發露也木心不直脉理皆邪雖勁而發矢不直弓工可謂善窺其君心術之㣲矣太宗亦可於此進格物正心之功矣其謂勇辨謟諛姦詐嗜慾輻輳以攻一心是特知制外而未知養内安有内心不治而外邪可閑者哉孝宗皇帝宣諭宰臣十年來欲令宰執進呈退將得㫖文字再具熟状進入朕再行審閲批出然後施行既免專擅之嫌且無遷令之患易曰渙汗其大號書曰令出惟行勿惟反反汗非也號令當反而不反是又遂非也然未當而反不若謹之於樞機未發之先一發而民信之孝祖所以欲再行審閲使無遷令之患也茍熟狀之進隨可隨入而思慮不加焉其與不再進何異惟能存主一之敬每事收歛精神熟觀詳繹而後出尚奚舛令之有孝宗皇帝臨朝每以方寸紙作掌記㣲偃兩旁而中摺之寘在御手若内殿則留香案上三省宻院奏事畢即視所記一一宣諭已乃收之人主日總萬幾之煩而心思有限安能無所遺忘孝祖聰明睿智與神為謀猶識所欲宣諭之事於掌記可謂文理宻察矣故凡禁嚴清燕之地經史之所閲典故之所聞群臣章奏之所采有當與大臣恭酌可否日隨記於其上俟坐論從容歴舉而訪之大臣所知悉心以對所未及知則討論以進久而天下事無一不明習而洞曉其益豈不多哉明道中執政除親舊二人為正言司諌上謂曰祖宗法䑓諌官須出宸選若大臣自除則大臣過失無敢言者治平二年以范純仁為殿中侍御史吕大防為監察御史裏行近制御史有闕則命翰林學士御史中丞迭舉二人而上自擇取一人為之至是闕兩貟舉者未上内出純仁大防姓名而用之臣聞臺諌天子耳目之官耳以司吾之聰目以司吾之明而人執之可乎張行成無先容舉為殿中侍御史栁公權有諍臣風屈為諌議大夫萬乗親擢邇臣莫與夫如是則任耳目之寄者激昂振勵思稱主知周而無所比正而無所阿朝政之得失廟論之是非相業之修廢不吐不茹悉以上聞不至於懐私恩徇偏見以亂天下之公我朝祖宗法臺諌官須出宸選正以是也異時唐介論文彦博王陶彈韓琦以二輔臣之賢猶不為之少隐况下於文韓者乎雖然臺諌不由進擬固足攬御臣之柄要必人主有至明之見而後能奮獨斷以聳衆望否則不謀之外廷謀之左右親暱附下罔上抑又甚矣大明在上邪正洞燭得范純仁吕大防而内出姓名得歐陽修余靖王素而御筆親除斯無愧累朝之盛唐貞元中宣武都知兵馬使李萬榮逐節度使劉士寧上聞之使問陸贄贄上奏士寧既逐雖是衆情萬榮摠軍且非朝㫖願審之謹之上復謂贄曰今議除一親王充節度使令萬榮知留後贄復上奏曰夫制置之安危由勢付授之濟否由才勢如器焉惟在所置置之夷地則平才如負焉惟在所授踰其力則踣為國之道以義訓人将教事君先令順長若使傾奪之徒便得代居其任利之所在人各有心此源潛滋禍必難救非徒長亂之道亦開謀逆之端上不從竟以萬榮為留後臣聞名分者天下之大閑植之則治隳之則亂唐自天寳以宴安兆釁君失其尊肅宗復國宜思挈皇綱於既墜扶大分於寖隳乃就平盧軍中察所欲立者授以節旄自此廢置之權在軍士而姑息之弊開至代宗專事姑息僅止覊縻德宗加甚焉李萬榮逐劉士寧而自摠宣武陸贄以傾奪長亂為諌曾莫之聴夫姑息者陵夷之本姑且也息止也茍圖一時之静急求目前之紓而莫計其窮是以强藩悍将敗國事者不敢問冐國禁者不敢討屈情抑勢俯而就之以順適其意所求必從所請必獲倨傲偃蹇莫知禀程始則節度不知有朝廷久則将校不知有節度更相睥睨見便則奪犯上者必好亂德宗亦安能禁萬榮之自為留後乎然使當時君德修明朝綱振肅不以猜忌踈臣下不以聚歛苦民生禁兵非市井之富児軍政非宫庭之嬖倖以至在列皆陸贄而非盧把皆李泌而非張延賞則朝廷之勢重於九鼎藩鎮安得而輕視之藩鎮之敢於干名犯分朝廷輕故也自昔安有朝廷輕於上廉傾級圯而能措大器於安者哉魏世祖東如許昌大興軍伐吴親御舟循蔡潁浮淮如夀春至廣陵吴徐盛為疑城自石頭至江乗一日而成又大浮舟艦於江時江水盛長帝臨望歎曰魏雖有武騎千羣無所用之未可圖也帝舟遇暴風漂蕩幾至覆没乃旋師臣聞江流湯湯萬古一天險也而飛渡者有之曹操之至赤壁曹丕之至廣陵佛狸之至瓜歩逆亮之至采石皆望洋奪氣或且送死豈長江隨時而為險夷耶天險在勢人險在德與政君無闕德天人交助夫誰敢犯之其次朝無闕政紀綱立賞罰明號令信任賢使能各當其才則人謀咸賛國勢増强坐有以制勝矣丕之再飲江窺吴輙自廢而返非特川后之效其靈孫權為國靡政不舉謀臣勇将咸樂為用疑城相望巨艦相衘而丕膽落天限南北宜其不敢以一衣帶水易視之也是知天險待人而固德政増修勝勢在我東南有㤗山之安矣周世宗擊北漢主劉崇於髙平之南樊愛能何徽引騎兵先遁帝欲誅愛能等以肅軍政猶豫未决張永德曰愛能等望敵先奔死未塞責且陛下方欲削平四海茍軍法不立雖有熊羆之士百萬之衆安得而用之帝擲枕於地大呼稱善即收愛能徽及所部軍使以上七十餘人悉斬之自是驕将惰卒始知所懼不行姑息之政矣臣聞軍國之綱紀莫大於賞罰有賞而無罰則惠䙝而威不振白刃在前誰肯委命此軍法所以不立也近年以来僨軍之将未嘗有顯罰間鐫其階隨即牽復曾無損於毫毛故皆以棄甲曵兵避死趨生為得計朝廷姑息将帥将帥姑息士卒未戰即潰既潰即招望風獸奔恬不為怪於是兵律壊國勢㣲矣英主欲大有為宜以世宗髙平之事為法群臣請上尊號及作樂神宗以久旱不許群臣固請富弼言故事有災變皆徹恐陛下以同天節虜使當上夀故未斷其請臣以為此盛德事正當以示夷狄乞并罷上夀從之即日而雨弼又上䟽願益畏天戒逺佞姦近忠良神宗親書答詔曰義忠言親理正文直茍非意在愛君志在王室何以臻此敢不置之枕席銘諸肺腑終老是戒更願公不替今日之志則天災不難弭太平可立俟也臣聞詩曰文王陟降在帝左右又曰陟降厥士日監在兹上天之心與君接人君之心與天通一陟一降隨寓隨在初無毫髪之間五事有敬怠則庻徴有休咎其應如響之應聲我神祖以久旱輟同天節上夀之禮積隂即日而雨陛下以雷變寝天基節上夀之禮積隂即日而霽夫豈人力所能致哉此心即天心天心即此心也富弼於既雨之後奏益畏天戒逺姦佞近忠良盖姦佞之逺忠良之近即以畏天戒人意在於進君子退小人人君欽承此意而行之則寅畏之實也答詔欲弼不替今日之志君臣交相警戒宜有以祈天永命也歟臣故亦願陛下與二三大臣不以天意已回為喜常以天命難諶為懼平齋集卷八
