body:
  text: 平齋集巻十七宋洪咨䕫撰外制西和州守陳寅妻安人杜氏男基暨墾死節贈官制勑具官某妻氏男某人等西和嬰孤城抗敵力窮援絶臣為國死忠子為父死孝妻為夫死義三綱立焉捐身犯難人所甚難闔門殉節古亦罕見朕悲不忘優贈以賁營魂往從爾夫子于廟食可三子改夫為父西和州守陳寅族人立照璽舘客李良臣死節贈官制勑具官某族人某舘客某人等闕爾以族黨良臣爾舘於守義不茍免亦相從於死良用嘉歎贈秩以賁營魂往從寅于廟食可餘同上權兵部侍郎陳公益磨勘轉中大夫制勑朕一日萬幾厲精方切三歲群吏考績尤嚴肆疇法從之勞庸渙明緡之寵具官某操修無玷問學有源簮筆雍容每罄論思之益效經宻勿屡殚啓沃之忠繇積日以效功爰歴年而㑹課睠賢雖舊詔爵惟新漢中大夫之員寖髙秩序周小司馬之職勿替謀猷可祕書少監徐僑除太常少卿制勑具官某禮者天地之序樂者天地之和夷䕫不兼命也而簞瓢陋巷之士夫子遽以四代禮樂付之何哉爾好古學行古道瞻彼淇澳其容比於禮考槃在澗其節比於樂朕方􅃠羅衆俊聚之本朝老成典刑思見如渇擢貳篷省翔而未集又舉奉常亞卿以進之時行則行幡然一来講明王道於玉帛鐘鼓之外以善人心視獨善有間矣毋使朕有齊魯二生之歎可楊一夔父秉遷明堂恩封承務郎制勑具官某父某人宗祀慶成均福寰宇髙年尤吾所尊禮爾稟厚飬深年過九袠有子登名於奉常義方立矣錫慶增封用勸好徳可韓昱特轉武功郎制勑具官某廼者兇渠就殱于楊逆儔猶負固于楚元戎進討諸将争奮薄城一鼓而空之東垂以寕第多来上爾戰尤力用命必賞朕不食言進秩四等總徒騎以䕶周廬勸功之典渥矣益懋衛上之忠増壮居重之勢可門下省檢正諸房公事辛克承除太府卿勑具官某朕閲班簿輙興才難之嘆得非比年以来抱有用之才而欎於頓挫老於閑退者多乎爾純實無華廉靖不競越在外服治譽夙著顧善刀而藏之若將終身焉朕方収召四方俊乂以重周行起爾宰士又進爾治藏之長豈以貨賄出納為足以煩吾老成哉百辟卿士媚于天子不觧於位民之攸塈尚求無媿于古可資政殿大學士曾從龍明堂加恩制勑朕紹祖宗之休䝉天地之貺十年飬晦垂衣裳於巖廊三嵗蕆祠奉圭幣於重屋肹蠁髙靈之墮嘉虞熈事之成廼眷時髦嘗参政柄有赫慶條之布於昭命綍之敷具官某肅括而端方深沉而凝重涵今茹古學術兩都之宗尊主庇民噐業三代之佐孰復於安危之勢雍容乎進退之幾終始幾年夷險一節東山之卧安石常存憂世之心江左之見夷吾盍究濟時之畧登崇有待注想惟深頃展采於合宮躬受釐於宣室肆頒祭澤增錫圭畬以昭體貌之隆以侈榮懐之盛噫靖四方於我将之頌朕正切於儀刑卜萬壽於天保之詩爾無忘於歸美趣承丕渥入吿嘉謀可資政殿學士葛洪明堂加恩制勑朕稽周典九筵之規酌羲經二簋之義禮從簡約誠罄精純玉瓚黄流裒時之對泰元神筴何天之休屬寢容之熈成宜恵術之具舉疇咨舊徳誕播顯綸具官某簡栗而亷剛大以直博學明辨非一日用力于仁特立獨行雖三公不易其介甫罄弼諧之益遽興恬飬之思心廣而體自胖年髙而徳彌劭方詳延於俊乂每渇想於老成翊翊而神嘉虞雖阻受釐之問皇皇而帝宴饗盍均賜胙之恩申衍租畬光昭簡注噫烈文辟公之錫祉福聿圖繼序之功黄耉台背之介壽祺尚篤乞言之意體予辰畏告爾辰猶可左諫議大夫鄭性之明堂加恩制勑朕蒐儀先甲展采上辛賦思齊之詩制雖嚴於孝慕稽我将之頌禮不廢於宗祈恍三靈之宴娛遒百禄之來下有嘉首諫宜錫閎休具官某抱陸贄之忠勵汲黯之直深見逺識平國論於玉衡忠言嘉謨開君心於金鑑其博大則廊廟之噐其浚明則邦家之光啓沃方深向用良切授䇿而拜㤗一莫侍奉髙之祠受釐而問鬼神尚前宣室之席肆增華於騎省庸申衍於爰田雖舉邦彛實均帝祉春秋承祀欲大祖功宗徳之傳夙夜畏威勿替天命人心之戒可吏部尚書崔與之明堂進封南海郡開國公加恩制聿懷耆俊宜錫宏休具官某行峻而約之中氣剛而飬以直風槩髙古秋霜烈日之嚴典刑鎮浮㤗山喬嶽之重洊十行之趣召儼三命之滋恭展也達尊爛然全節延英論事莫遑汗盛夏之衣宣室受釐猶思前半夜之席肆肇開於公社仍申衍於爰田繄舉邦彛寔均帝祉積徳而後興禮安得魯生之來為治不在多言勿替申公之告可首同鄭性之辭敷文閣直學士知潭州余嶸除華文閣學士㳂海制置使知慶元府制勑朕總治中朝分任外閫或統江淮表裡之勢或當㐮蜀風寒之衝廼睠鄞江近扼海道欲壮股肱之郡必求方面之材具官某學明而履方氣充而用博操縱闔闢莫窮應變之長卷舒屈伸不改有常之度擁甘泉之夙望鎮長沙之介藩謂弄兵多出於無聊而患盗每生於有欲風采一振號令具孚驩緑林之革心𣺌青草之息警轉聞良偉簡在逾深冦恂之定潁川乆徇借留之請簫生之守馮翊更圖詳試之功陟奎閣之穹班總制垣之重寄宏開四履爰控三韓惟威望聳則風颿浪舶之無虞惟恩信著則椎髻卉衣之來慕以至業相安於田里福并及於京師繄我譽髦奚煩多訓可直秘閣新成都府路提刑趙彥覃除都大坑冶制勑具官某國計莫重乎銅楮之相權朕出寳帑之儲歛宿楮而易之物價浸平又必鐘官能振厥職爾天支之秀周行之雋甫起家於蜀部舉圜府之權盡畀之進用亟矣唐諸道置爐九十有九在東南為多地産今猶昔也爾能公以懲浮冗明以剔姦蠧敏以幹壅滯少府水衡之積何患不承平若哉可太后山陵復土錢忠表趙若浚轉一官制勑具官某等六騩復土五使置官凢備馳驅悉霑賞賚爾祗吏役例進一階茂對恩榮勉思策勵可李安國特轉武節郎制勑具官某比嵗蜀閫失馭潰旅迸逸為民害甚於冦爾薫染忠義奮揚驍雄扼險要待其来民恃以無恐果山至今徳之増秩旌勞俟有褒擢可直秘閣知温州游九功除司農少卿制勑具官某良二千石入為九卿漢法也北海朱邑以治行第一掌周稷之業蓋此其選爾膚敏而静平易而正京蜀荆閩屢更名郡剛不至甈柔不至坯民安其政而有去思可謂良矣朕懲吏道放紛之弊循名責實思用其良不俟東嘉上計以漢法選貳司均夫長於治民者必優於裕國信能為朕飬其和節其流而時斟酌焉錢榖之間其紓乎可林禧子封父承務郎制勑具官某父某宗祀慶成均福寰宇髙年尤吾所尊禮爾稟厚飬深年過九袠有子登名於奉常義方立矣錫慶疏封用勸好徳可林禧子封母孺人制勑具官某母某氏云云母訓昭矣錫慶疏封用勸好徳可餘同父歸順人孫政鮑義邉寳張仲于徳楊翼張彪張實髙三受張旺汲漢臣邢海蔡青魏成方元郭通綦同張時並補承信郎制勑具官某人等討叛以義懐服以仁殱渠貸脅歸斯受之爾能革心奚愛髙爵祗服寬恩勉圖報效歸順人王元純補廸功郎制爾嘗為士奚愛文秩祗服異恩勉圖報效可餘同上史復祖除刑部即中制勑具官某朕間者閔雨念中外獄吏奉吾法不䖍逮繫多淹上干和氣亟下宥减之令而雨憲部列屬必求知朕意者爾静而不浮謹而不廹明習於律令而不苛累駕緹屏具有善譽輟郡而即参聼四方之讞奏其選甚髙公則强禦不能欺恕則文致不能入勤則冗醸不能困欽哉監于兹祥刑以達朕好生之徳可軍噐監兼刑部郎官李直柄除大理少卿制勑具官某我神宗定官制理寺卿一少卿二分左右聼刑獄今圜土空虛治獄雖非宿其業可也四方奏讞萃于斷刑業可不速乎爾悃愊近厚容氣儼肅習于舜士師周司冦之典而以惻怛行之五為理官三為憲曹其業宿矣爰命爾以亞卿斷天下之刑宥過無大刑故無小能知此意則可以明于刑之中率乂于民棐彛念之哉可權工部尚書㳂江制置副使知黄州兼淮西制置使趙范除兩淮制置大使節制廵邉軍馬兼㳂江制置副使制勑江為國之門户淮為國之藩籬門戸嚴則謝元無後顧之憂藩籬固則祖逖有前進之勢蓋出入運棹之如意在表裡撑拓之得宜分外閫以相維總中權而尤重具官某兼資文武世篤忠勞賛籌江漢之間隐若敵國制勝淮海之表賢於長城功雖著而有謙抑之風氣雖銳而有深沉之度知可屬於大事期共成於逺圖殘虜宿讎歘一朝之就燼中原故壌莽萬里之為墟欲乘車攻復古之機無出天保治内之畧孰强吾意爾壮其猶㧞諸八座之聫付以元戎之寄淮東西之星壘盡受指揮江上下之雲屯参聼號令本之老成謹重之識行之平定安集之心以守為攻以全取勝乃若秦人之鹿犄角相資常山之蛇首尾俱應必能通脉絡於諸道斯可㑹精神於一家迄躋中興用光前烈趙薿除大理寺丞陶木司農寺丞趙崇嵒太府寺丞姚珤國子監丞賈似道軍噐監丞制勑具官某等漢宣帝勵精求治綜覈名實以練羣臣黜陟有序衆職修理上下無茍且之意迄濟中興朕甚慕之爾薿世業之華噐能精敏爾木儒林之望議論堅明爾崇嵒公族之彥材諝通暢爾珤决科之雋講習有源爾似道克家之美趣尚不茍廷尉太農太府有丞胄監戎監亦有丞徃為我分治之丞者承也所以承輔其長使無曠職也政事文學理法之士繼自今咸稱厥職則予以懌可林申除宗正寺簿趙鎬夫司農寺簿趙汝璲太府寺簿余元廙國子監簿制爾申茂於踐踢聲華甚暢爾鎬夫勇於奮勵材術孔優爾汝璲抱負純明志不茍售爾元廙渉歴詳練材不自暴宗正大農太府胄監皆有簿徃為我治之先簿正祭噐聖人猶不敢忽職業之盡也餘同上趙汝􅲳除司農寺丞杜範軍器監丞李以制大理寺簿章勱将作監簿制爾汝􅲳秀於公姓材刃有餘爾範頴於儒紳業履甚度爾以制金玉其質安雅自将爾勱弓冶其傳謹畏自飭大農戎監有丞李寺戎監有簿徃為我分治之丞以輔其長簿以糾正厥違非特示進擢之榮也餘同上淮西安撫使機宜兼通判廬州劉子澄除軍器監簿兼淮西安撫司参議官制勑具官某邉閫上介之置非内地比中原事㡬之集非他時比故擇材尤謹爾氣禀爽邁議論英發與聞經畧西事之機籌亦既熟矣班王朝而長莫府厥任逾重深沉者無躁謀老成者多逺慮爾乃贊乃牧圗全而制勝功懋懋賞朕所不吝也可國子監丞張翀除秘書監制勑具官某寺監皆有丞中秘為髙天球琬琰之出元圃楩柟把梓之生鄧林地望殊也爾學殖􅅛粹材猷翹㧞蔚乎諸儒之頴丞我胄監不撓于法而教令行賢聞益昭西崑群玉之府㳺其間者皆天下選爾往丞之地望稱矣本固則末茂形大則聲宏其益充所養以待方來之用可太府寺丞尤焴除樞宻院編修官兼權檢詳制勑具官某國朝經武要略一書尊閣於樞庭朕萬幾之暇親御翰墨作經武閣三大字扁之事増重矣職刪潤者宜稱爾涵負器識之髙講明理義之熟困能不失所亨此致養所以致用也中興保大定功之略咨爾纂修垂則於億世時政有紀㑹計有録併以屬爾而撿詳兼徂爾祖淳熈間嘗為之長慮却顧宻賛幄籌求所以安國家利社稷期無忝家傳之學可平齋集卷十七
