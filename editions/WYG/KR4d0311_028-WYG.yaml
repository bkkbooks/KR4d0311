body:
  text: 平齋集巻二十八宋洪咨䕫撰啓五賀鄭丞相啓伏審揚庭渙號宅揆奮庸天開聖人揭大明於積隂之後帝賚良弼興霖雨於久早之餘九鼎尊强萬殊闓懌竊以慶歴之進杜正獻盡草弊端元祐之相司馬公力囘正論凢其變則通通則久本乎定而静静而安今聖上始親於萬幾朝家大整於百度追還盛觀允屬真儒恭惟某官秉粹而履方造博而守約黄裳文在中也道傳往聖之宗緇衣敝又為兮身繋聖賢之脉蚤勸初濳之學蔚為大任之儲淵源養䝉羽翼出震六龍御天而萬物覩依乘最先九鰲負地而四極安扶植更力肆増隆於上婘亟入贊於中樞密勿引裾雍容補衮避權逺勢初無富貴之心合意運籌自契明良之㑹覆金甌其久矣登玉鉉焉遲之播一朝希濶之麻開幾年壅塞之路昔妖星示變除舊之兆已萌今瑞雪應期作新之慶可卜兩全文武之憲獨斡中和之機惟國事總總乎其方殷而民情喁喁然其更切决否泰之消長在乾坤之轉旋平輕重於一舟丕展濟川之畧寄安危於八柱迄成支厦之功以福華夷以夀社稷某霜途易蹶冰谷難春夙䝉鍳賞之殊快覩延登之盛調元有道坐培上甲子之休播物無垠早吐雌丙申之氣踴躍胥慶編摩曷宣禮部郎官謝廟堂啓九年去國甘從西崦之耕一旦起家遽草南宫之奏大明昭揭於積曀之後妙造濳囘於沍寒之中脱迹沉淪委心坱圠伏念某天姿不頴世諦更踈虎負嵎莫敢攖徒奮直前之氣鹿走險何能擇了無善後之謀寄懷抱於倚楹付光隂於靣壁低徊空谷轉輾窮途蠻素掉頭早厭香山之老雍端拍手亦嗤栗里之貧間意行而覔詩率危坐而讀易忽逢隂剥遂與陽升牢落馮唐尋青綾之故歩推頽禹錫訪瑞錦之新窠久湮焦榖之芽頓吐寒灰之熖俛仰自省生成有歸兹盖恭遇某官道包元功心契真宰伊尹舉而不仁逺矣選衆惟公臯陶歌而庶事康哉知人尤急熟觀否㤗往來之運宻轉乾坤闔闢之機大姦朝耡衆雋暮㧞謂鵲巢可窺而鳯凰集駿骨既市而騏驥來憐其數竒開以寸進某敢不敬佩隆眷加鞭後圖白首為郎敢嘆桑榆之晚丹心報國更祈松柏之堅囘薛觀文啓恭審陞華秘殿均逸珠庭六子之佐乾坤功成斯退八還之玩日月宇定自光几几雖新巖巖維舊恭惟某官吏師一代王佐兩朝問方略之世家自唐浸盛練制度之人物視漢畧同三十年密勿於修門一萬戸肇開於大國倚成方切引去何輕野梅官栁之坊路喧迎騎流水青山之屋門繫歸艎兒孫出萬巻以披吟父老散千金而燕集移閶闔衣冠之夢為園林鐘鼓之盟陽羡買田拍塞秧疇之雨惠山試水颼飀茶竈之風誰為公謀使有此樂某猥慿客度輙犯顔行呂獻可固得罪於荆舒文潞公初何尤於質肅想見幅巾蕭散訪疇昔之釣游願言列鼎舂容享方來之耆艾囘程内翰啓伏審均逸珍臺陞華穹閣人材凋落之久上深念之天運轉移之新公向用矣漸所以進㤗於此占恭惟某官九垓隆名五嶽全氣伊川明道而後獨傳正宗野處平園以來復見作者早從龍尾直上鰲頭扶日之功未酬偃月之機已露方奪萑苻之氣遽尋花竹之盟司馬公之流水青山姑從獨樂歐陽子之茅簷凉簟尚想玉堂雖出處了無累於吾心然安危豈遽忘於斯世宜膺蠖濩之眷趣進凝嚴之班與造物者遊益培夜氣後天下而樂亟告辰猶某狂編虎鬚窮巷龜殻追十年之夢寧傲宰相而不敢傲翰林叨一日之逢難為諫官而猶使為御史䝉恩莫稱請誨無從所願君子之彚征庻幾吾道之浸長元祐之詔大老峩冠而來慶歴之頌名臣執筆以俟惓惓有屬纚纚奚殫中書舎人謝丞相啓歲星之犯執法前數夕太史奏歲星犯中執法公果出臺猥干憲府之誅帝座之拱紫薇驟玷詞垣之選觀君相之深意知乾坤之厚恩竊以為治莫重乎紀綱之張用人尤患乎意嚮之轉拱辰一網君子之氣遂衰之邵兩來小人之勢斯盛厯攷往鑒寧忘隠憂伏念某髪種種其絲棼心怦怦乎繩直歐陽余靖列在四諫毎懷聖德之詩王衍盧把合為一人欲著辨姦之論適改弦而更始偶簮筆以居先議論不足以聳鳯凰之鳴風力不足以快鷹鸇之逐苐濳觀於機括慮或撓於規摹景祐一不肖之來大圖搏噬熙寧三舎人之作孰效鉗鎚去稂莠所以養嘉禾薙茅艾所以䕶芳草獨奮一擊衆觀四驚或疑靣前行路之未寛或怪袖中彈文之太早勇為國計奚暇身謀奉帝勑而傳霹靂之符何難驅鬼仗佛力以運金剛之杵自可降魔雖閤門不隔於交章而臺院俱成於退舎彼姦既折此志還伸立五花之磚甫軒眉於旬浹扈六飛之蹕遽蜕骨於須臾黜轉而陞榮忘其辱茲葢恭遇某官吾道砥柱斯文津梁遜直諫如元齡之佐唐去副封如魏相之興漢謂保合善類必去敗羣之羊而修明太和何愛溺井之狗辨薫蕕之殊氣培杞李之深根俾京尹授舘以使留許詞臣遜闕以見處宣昭實意安集危𠂻續翻紅芍藥之吟莫知稱塞占澄碧琅玕之夢終託生成衘戴輪囷栞摩梗概囘趙制使啓恭審上思東略公請西征以文昌八座之尊總元戎十乘之重江淮増氣關洛屬心恭惟某官文武兼資忠孝兩盡西平父子悉如飛而如翰慶州弟兄抑非彲而非虎挫鋒鏑於指顧之下却貔貅於笑談之間功歸一家名震四海正佩甘泉之槖又分細栁之弓幼度却符堅於合肥風聲撼塞公瑾破曹瞞於赤壁雪浪翻江中莫府之宏開外提封之盡䕶不求一勝必出萬全東夏口西武昌規模既定北羊腸南伊闕經略何難大奏凱於前茅永垂光於汗竹某搔頭白雪引睇赤雲竹樓之記猶存徒懷清賞桃林之詩可作尚賀元功囘楊侍郎啓竊以南臺執法未輸折檻之忠西掖代言遽獻斵窻之醜䝉恩超越揣分凌兢伏念某蚤坐排根久成流落窮懷不柰毎嗟煑鶴之琴老氣未衰尚愛擊蛇之笏天適開於日月地偶借於風霜了無囘川障瀾之功僅有去莠䕶苗之志方奮前而抨擊忽踵後以褒還觀象門深浹日之留已幸翔鸞閣静半生之夢還驚取數過多揆元有自恭惟某官聲諧笙磬佩襲璆璜閙裏掉頭耿耿高時之操閑邉袖手惓惓憂世之心念善類之相扶欲頽風之復起遂令渫辱亦轉光榮詩到蒼苔寄宦情之澹薄帖來青李佩交好之綢繆占報斐然垂察幸甚囘趙婺州必愿謝忠定配享劄子㳟惟先正忠定太師周程粹學文富精忠龍夾日以飛定神器於危疑之頃鰲負極而立安磐石於指顧之間初罹偃月之謀終墮浮雲之計迨更聖化始記功宗侑食原廟之廷圖形容臺之閣阿衡格於上帝雖音跡之莫追周公祭於大烝迄英靈之如在旂常増耀簡䇿騰芬某濫次周行聳瞻盛典知臧孫之有後宜文子之作原爾祖與享之已著丹青之信斯文未喪也更堅清白之傳賛忭良深敷宣曷既略此酬謙施之辱切丏紆察囘趙制使葵謝忠肅賜謚劄子恭惟先正忠肅太師學問以毋自欺為先踐履以不逺復為主胷吞八九雲夢浩乎無涯腹有數萬甲兵用之不盡擁師干於江漢控戎索於關河以頗牧之籌修羊陸之政屯田之奏則營平之逺略出師之表則孔明之精忠收績前茅垂休汗竹邊有雲中之警上興鉅鹿之思灑寳墨以疏恩易美名而壹惠光流宇宙聲撼華夷是皆曹武穆之將家范文正之儒裔克傳世業深結帝知故能顯揚於無窮于以侈大其有子某聳聆盛事倍􅈭懦𠂻方圖羾於柔緘忽首勤於珍翰執謙良過抱愧為多排紛控賀不莊仰丏台察除禮部謝丞相劄子某恭惟我聖上親萬幾之初賢相宅百揆之始大明昭揭公道宏開群隂見睍而雪消衆正連茹而茅㧞融歸皇極扶立太平某去國九年奉祠再歲自謂窮途之老死不圖大造之更生抱舊直之青綾趨新窠之瑞錦孰云起廢有此叨榮某官鑒其愚而無它腸愛其懦而有立志以恤窮悼屈之念為嘘枯吹生之仁首加招徠使脱沉滯動八十親之喜寛數百指之愁踴躍而興糜捐以報然念禹錫十年待文昌之相始授此官温公數月趣東坡之還乃居是選豈繄晚學可跂前修伏望鈞慈憫傷弓之心危察墮甑之氣索收還誤渥改轉真機賙其甔石之家授以升斗之壘一飽養志三熏戴恩謹此控謝併布其𠂻仰祈鈞察答呉總卿劄子某九年擯去𤣥都之樹已空一日喚囘少林之壁忽倒若有相者夫豈偶然某官功名鼎盛之秋意氣相期之素謂荃蕙化為茅久矣尚復何言而桃李自成隂有之不須多慮毎對酒而憶太白必裹飯而問子桑更加牙頰之春欲起頭顱之暮昔耕今穫彼竭此盈竊自攷其生平曽不滿乎一笑方趨郎舎忽被郵籖論復如前固待以唐質肅之舉節難保晚正恐如韓忠獻之言猗須公歸共論此事伏丏丙照答葉子真劄子某九年坐廢翟公之門欲氷一旦謂來馮唐之首已雪方群振鷺忽㸃棲烏作之髀肉久消之餘置諸夢想不到之地莫知稱塞第劇凌兢足下氣雲升而川増文水湧而山出念嘗交訊知可論心方從九芙蓉之游特貽百車渠之帖首勸之以劉元城范希文奏疏繼戒之以王彦霖朱光廷䇿題推車惟主於行乗舟毋偏其重惓惓一意纚纚千言期頽風之復興使懦志之有立把玩不已感藏可知此去凡可以警䇿其不逮毋惜陸續平齋集卷二十八
