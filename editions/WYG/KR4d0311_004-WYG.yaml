body:
  text: 平齋集卷四宋洪咨䕫撰講義臨元亨利貞至于八月有凶臣聞事㑹沓來乃君子大有為之幾此蠱之所以轉而臨也夫陽大而隂小有自然相臨之分方一陽為復其端甚㣲五隂在上詎能獨勝故必待朋來而後无咎至二陽為臨則有朋矣陽得朋則群隂禠氣而退聽故復止於亨臨則元亨利貞陽寖長而隂寖消也臨據陽長之㑹既能變蠱壞而亨通又能處亨通而正固以此保大其又奚虞而見逺識㣲者毎不勝其隠憂是則隂陽無兩盛之理一長則一消其機在反掌間自復而臨以至為泰為大壯為夬為乾陽極矣而一隂潛萌於五陽之下為姤二隂則遯也由建子而至建未而遯凡八閱月二隂之遯與二陽之臨正相反陽消而隂長凶可必也然亂生於治否生於泰理所必至而酣豢宴安者常忽之有能燭其幾於人情之所易忽而轉移機軸於㝠㝠之中使履霜不至於堅氷陽常進而隂常置於空虛不用之地則大亨以正可常保而吉其凶矣觀至于之辭則知吉凶未定之間儘有可用力之地特患乎玩安忘危不知所以用其力彖曰臨剛浸而長説而順剛中而應大亨以正天之道也至于八月有凶消不久也臣聞一陽而復二陽而臨剛浸長也下卦為兌上卦為坤説而順也九二以剛處中上與六五相應剛中而應也臨有是德故大亨以正也隂陽消長皆非一日之積今陽剛浸長於復返之餘其來有漸然懼其乘方進之機鋭於逐羣隂而失之暴故繼以説而順説而無所憤順而無所拂心和氣平動循天理則剛不至於過於是臣之剛中足以輔乎君君之柔中足以濟乎臣上下交應同歸一中宜大亨可致且不失其正也豈特人事為然天為剛德猶不干時一元運於上而雲行雨施保合太和莫非剛徤中正之用天道亦何嘗過於剛哉况陽無常勝之功隂無盡滅之理消長往來間不容髪二陽之臨方長而二隂之遯已知其必至陽消葢不久也自復至遯閱月凢八而謂其消不久何哉疾疢萌於強壯之時人不自覺也元祐初司馬光一洗新法之弊而奉行差役已有蔡京消豈待久哉遯進而否君子之道盡消則蔡京之禍天下凶莫甚焉夫惟上之人常以防㣲杜漸為心遏隂柔於未進之始尚何陽消之慮象曰澤上有地臨君子以教思无窮容保民无疆臣聞坤地在上兌澤居下地之臨澤最為切近君臨民之象也地上有水為比澤上有地為臨皆以切近取義而水與澤異水流而不盈故比於地而不為臨澤者水之瀦含深蓄逺渟奫演迆而地之岸際常臨之此具區雲夢大野所以為澤而不為川浸也君子觀地與澤相臨之象而得近民之理故教思必無窮容保必無疆無窮者意味深長百世猶有先王之澤則兌之浸潤也無疆者規模恢廣出日莫非丕冒之地則坤之包含也人君以是臨民無媿君師之責矣葢君之於民猶父之於子其相親也以情相維也以道而非可以勢分拘以勢而臨則教思必淺容保必狹私心町畦公道磔裂尚何足以知臨之為大乎大哉堯之為君惟天為大惟堯則之人君方寸之中與堯同大而後可以盡臨之義不然教思何由而无窮容保何由而无疆哉初九咸臨貞吉象曰咸臨貞吉志行正也臣聞澤通於山為咸咸感也凡具隂陽孰能無感以貞則吉貞者正也君子小人之辨在於正不正之間臨為剛長之位初九與四為應而比於二皆臨我者也吾欲感動所臨獲乎上以行吾道必一出于正曠乎其公而係吝之私不㽞純乎其誠而矯飾之偽不作此以正感彼以正應精神心術之妙相與凝固而不散則君子之道由是進退乎泰亨之盛所感以正而吉也然所感之邪正莫謹乎其初志者心所之也在卦之初此心趋向志於正而行則無往不以正合進以正可以正邦也一涉於邪則見金夫不有躬進不以正特一時之茍合耳然則下之感乎上能察乎正不正而為進退則不至於失已上之應乎下能辨乎正不正而為用舍則不至於失人九二咸臨吉无不利象曰咸臨吉无不利未順命也臣聞臨之為卦以二陽為主二陽又以九二為重二承乎五五臨乎二實君臣相與感通之㑹二剛中五柔中俱得其正宜既吉且无不利也然自復而臨陽剛浸長固吉矣而長必有消八月之遯已逆計其必凶君臣相與綱維斯世其將聽隂陽之自為消長付之無可奈何而安之若命乎抑將進陽退隂以制消長之運而自我立命乎命賦於天受於人行廢有定運死生有定數非可以人力轉移然有君子不謂命者存二陽長而為臨與二隂長而為遯固天運之所必至茍一以命哲命吉凶委之天而安之八月有凶拱手順受而不思闔闢變通之道臨終為遯矣我生不有命在天此商之所以亡也惟知賦命在天制命在我旋乾轉坤與世立極陽宜消矣挽而囘之使不至於消隂宜長矣尼而止之使不至於長吾方以天自處未容一切惟命之順也夫如是君子常長小人常消而咸臨之吉常存二五君臣各盡其道矣不然何以君相不可言命六三甘臨无攸利既憂之无咎象曰甘臨位不當也既憂之咎不長也臣聞君子之樂王天下不與存為人上者不可以位為樂也夫以天命難諶民情難保大業難守重器難安夙夜兢惕危懼猶恐不蔇而可樂於得位而泰然處之乎甘者悦樂之至也六三居下卦之上處兌悅之極而以臨人之位為樂玩聲色之娛而忘美疢之患懐宴安之適而遺鴆毒之慮好樂一形投合四集便嬖側媚相與以巧言令色鼔舞之施之政事宜其無往而利也有能凛然深省幡然大改以所樂為所憂念二陽方進於下而消不久之凶已兆於呼吸之頃操危慮深若不能以終日切切乎予又集于蓼之懼則前日之咎今可免矣盖三以甘説為臨其位不中不正一惟偏私之徇故象示不當之戒又懼夫人恥過而遂非開之自新許以轉甘為憂雖有咎而不長有國者宜知所擇矣六四至臨无咎象曰至臨无咎位當也臣聞至臨臨之至也四居大臣之位上比於五君以道合下應於初賢以道親且時當剛長大臣虚心無我援天下陽剛之賢進輔其君與共成致君之業以此而臨豈非至乎然進賢退不肖大臣職也援陽剛之賢與共成致君之業乃職分之當然極其至如周公之握髪吐哺始可以无咎有一毫驕吝之色賢者望望而去之則咎隨之矣象明臨之能極其至亦惟處得其位之故以六居四是為正位體柔履順不自矜其能而惟賢是與德與位稱也六五之君柔矣六四之大臣又柔而下無陽剛之賢為之應則治淪於姑息勢失於委靡謀國者能辭其咎乎六五知臨大君之宜吉象曰大君之宜行中之謂也臣聞知所以察未見之幾制有為之㑹人君之臨天下轉移萬化闔闢萬變必有知行乎其間而知以得中為難盖是知之用不及則闇太過則察無過無不及則中六五有深沉先物之知又下與九二之賢為正應不以一已之聰明為聰明而以賢者之聰明為聰明臨無遺知矣然知不可以過用世之小知自私者用知必過明帝之苛察德宗之猜忌何其褊也故惟大德之君然後於用知為宜明有前旒之蔽見無淵魚之察知君子之當進必推翕受之量知小人之當退曽㣲深疾之心以大用知而知得其中即舜之大知也象言行中之謂豈非不過用其知即舜之用中與中庸聰明睿知以有臨必寛裕温柔以有容正此意上六敦臨吉无咎象曰敦臨之吉志在内也臣聞卦終必變君臨天下之道以克終為難必用心加厚乎其初則可以保其終敦者厚之至也何所厚厚於親君子也親君子逺小人之心久而愈篤則以之畏天天必加畏以之愛民民必加愛無所往不用其厚也艮上九以敦艮而吉臨既吉又申之以无咎者為六三設也上六居臨之終而應乎三三不中不正上茍私所應與而親之何以免咎惟舍三隂邪之小人而志在二初陽剛之君子故宜有咎而免也兌為内卦君子在内屈已下親不以久而替寧有加于大亨之鼎毋或失於二簋之權輿則賢者肩一心以輔乎上非箴之庭燎則戒之無逸君臨天下之道於是乎保克終之吉矣明皇始厚宋璟韓休張九齡終厚李林甫憲宗始厚杜黄裳李絳裴度終厚皇甫鎛此心一移卒貽不終之禍可為百世戒平齋集卷四
