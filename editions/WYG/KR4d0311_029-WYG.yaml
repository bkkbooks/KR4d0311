body:
  text: 平齋集巻二十九宋洪咨䕫撰序楚泮榮登義約序禮賔周制續食漢法士未嘗為舂糧之謀科舉設而待士之意衰薦名春官至有貧不能行者亦有屡上而索其家者逺方皆病之番江去武林餘千里歲當大比相與裒金俟同盟薦送之多寡均以給費嗟乎牀頭金盡壯士失色囊無一錢羞澁萬態彼盖未知道者吾儒讀書萬巻可敵猗頓之富何至預以行槖不充為憂是舉以義為勸亦惟相期於功名之會而已然義利相去不能以寸而趨舎有舜跖之分平時燈窻議論務以道義相磨礲至利害廹之小則賣友大則賣國視所學為芻狗者多矣諸君聯翩青雲致身富貴其毋忘虀鹽時後車十乗從者數百其毋忘聚糧時一貴一賤升沉不齊其毋忘同盟時能守是約斯可謂義皆曰能遂輟萬錢為之倡嘉定三年正月望日錢唐洪某序送何龔父序夏至後三日龔父歸閬訪予以别飲之酒且告之曰君子之學進於静為難静者誠之復性之貞也聖人定之以中正仁義而主静學聖人者必以静養夫中正仁義之所自出盖人生本静物交物引之則静者動動而無以制之愛惡情偽互相感觸則横流而忘反静所以制夫動也而静之功非可以驟進朝省夕察日磨月鍊用力於惟危之地如馭悍馬如防潰隄如治百萬之師使志足以帥氣而氣不為非義餒在我者立在物者靡慾心平而躁心釋静之功進矣静進則内體純固而清明廣大生焉清明則天地萬物之理皆會於吾誠廣大則方寸之運天地萬物皆為吾用而道在是矣易六十四卦乾坤之外其本體以道言者惟復與艮復之動隠於至静之中故曰反復其道艮之静立於羣動之表故曰其道光明道未有不自静入者也參之魯艮顔子之如愚復聖門之正傳以此龔父資簡茂近於静其入道為易澄心以觀我平心以觀物一敬主内萬想不摇山光凝而白雲度野水空而庭草碧悠然意得表裏俱瑩所到詎可尋尺計哉予方習矣弗察乃以告吾子它山之石可以為錯朋友講切之義也龔父勉之異日將於是乎觀所進於濳洪氏譜系圖序洪姓有兩出一避唐孝敬帝及今本朝宣祖諱易𢎞為洪一伏羲神農間共工以水德伯九州其子勾龍為后土後裔封於共為共氏漢末避仇益水為洪吾宗共伯之胄也聚族天目下以東洪名其村無慮六七十家耆舊相傳始祖自四明挈家奉母來今西莊下擔墓猶亡恙毎歲除家祀所謂渡江祖席地用古禮而所徙歲月漫不可考然自始祖至於今不翅十五六世一世三十年當是唐中葉徙居於濳谷口矣洪望燉煌郡其散見於纂記多占籍東南吳廬江太守矩宣城人唐集賢學士孝昌舒城人翰林學士侃仕南漢參知政事昌杲仕南唐昇元宗譜一侍御三尚書則鄱陽三洪之逺祖也得姓以來鄱陽為鼎盛而在濳之洪四五百年間種德蓺善源深流長曽未有顯者豈聞崖􅋖之風以肥遯為高歟抑名山大川英淑之氣有待而發蓄雲閉霆然後大沛厥施歟紹興己酉裔孫珏首考世系𣲖别為圖藏於家其後斌又采之為祖宗諱第圖訖于己夘去今六十八年枝葉益蕃不可無紀余自郎曹罷歸地偏日永因彚稡而續之凢力田以肥家從戎以世宦讀書為文以名塲屋皆倉監公長子仁朗之傳吾所祖也故詳仁藴之後數傳而遂微故老不存舊聞放失未免間闕文以俟質訪夫能言其祖郯子見師不識其先藉談取誚肖貌於兩間者不可不知世繫之所自出知所自出則知根榦華葉同此一氣自葉流根不容間斷春秋烝嘗以序昭穆而謹終追逺之意存歲時會聚以親族黨而乖争陵犯之風息朝夕講摩修飭求為善士君子之歸而無忝於爾祖此圖盖亦風教之助云寳慶丙戌六月庚寅十五世孫某序豫章外集詩註序天降時雨山川出雲故嵩高烝民之咏不于人物之盛而於其生我朝列聖以人文陶天下學問議論文章之士莫盛於熙豐元紹間其生也類在於神宗朝如詩家曰蘇黄曰黄陳蘇公生於景祐陳公生於皇祐而豫章生於慶歴天地清寧日月正明禀於氣者全也公得清寧正明之全氣氣全而神王挾豐隆騎倒景飄飄乎與造物者遊放為篇章超軼絶塵獨立萬物之表坡翁盖心服之而後山師焉其集嘗擬莊子分内外篇外集如韓淮隂驅市人背水而戰暗與兵法合内集如諸葛武侯八陣竒正相生鬼神莫窺其奥彚分之意嚴矣君子之學日進而日新日新而日化進則人新則道化則天逝者如斯不舎晝夜正以是也文與詩亦然論詩者不泝其始無以知其進而新不極其終無以知其新而化内集斷自入舘以後極其終矣外集起初年溪上吟泝其始也眉山任處士驥天成擺落科舉之累真積於學者無不覽愛公詩若嗜慾然以内集有任子淵注因註外集十二巻攷年譜以推出處用事必求其意用字必探其原勤且博至矣或以詩嘗經公手刪而疑其多愛然使學者盡見前輩少年至老之作以觀日新日化之功雖多不厭也子逢博習有家法方注詩時兩髦耽耽檢書捧硯領退而學詩之意今以名卿守蜀白首矣懼父書無傳力自校讐鋟而公諸世萬里信來俾序之某晚出未闖其藩何敢贅疣攻瑰謂宋宗儒摘阮歌戴道士彈琴書不知何以分内外當有能辨之者余聞李衛公好惠山泉置驛取水有僧言長安昊天觀井水與惠山泉通雜他水十餘缶試之僧指其二曰此惠山泉也文饒為罷水驛欲知内外之辨者請以是觀之桂巖雙蓮圖序西風入簷涼滿巾席紫水何君器之以嘉蓮圖來示云大兒自任舎桂巖沼中所産前是庭砌嘗長異篁今復有此鄉之耆耋雋艾相與夸咏以為瑞懼弗克當也子以為何如余撫圖太息曰深哉造物之意也鳲鳩在桑其子七兮淑人君子其儀一兮鳲鳩之哺其子朝從上下暮從下上均平如一君以義方名家以厚德燕後男子子四叔仲季連著聲科級而伯未也伯有子亦復嶄然露頴𣲖義方之澤蔓厚德之慶猶鳲鳩晚哺已徧於下方進而上固有開必先乎夫英華者和順之發也馨香者忠信之逹也充實輝光者善羙之形見呈露不可遏者也君觀是華根培而榦擢枝芳而趾榮天理人事之相符昭昭也惟無必其在天而後知天之可必也春秋說序帝王誥命訖於平王國風變於黍離聖人傷王者之不作因魯史修春秋以奉天命而立人極夫天命流行於人極之中無一息間斷人惟不知吾心有天而外求天謂吉㓙禍福天未嘗定往往無天而動於惡然天雖有時而未定終必有時而定天者定則人者屈此人極之所由立也此春秋成亂賊所以懼也彼亂臣賊子惟利是計豈懼夫空言之貶身後之辱哉懼夫天者定而人者屈失其所以為利也故凢犯天下之清議冐天下之大罪逭諸一時不能逭諸異日能逭之其身不能逭諸其子孫人誰無愛身愛子孫之念知天定有不可逭則欲動於惡將有所懼而戢此撥亂返正之筆所以有功於人極也且易春秋在魯皆所以司天人之契人欲窮而天理滅其卦為剥春秋二百四十二年純乎剥者也以齊威覇天下始末求之毎四十年當一爻隂愈進則亂愈甚盟宋之後晉以天下之權授之楚而大夫專盟諸侯皆廪廪乎贅疣之危五隂之剥成矣其末又以天下之權授之呉吳楚與越參立而交横大夫各朶頥其國禍亂及矣而獲麟於西狩亂極必治安知無王者作此碩果不食剥所以不終於剥也春秋以傷王者不作而始以幸王者復作而終以魯聖賢之澤未冺一變可至道而託之以詔萬世天道至教聖人至德備見於行事斷斷乎循之則治失之則亂信人極非春秋不立也余自考功罷歸杜門深省有感於聖人以天治人之意作春秋說兩漢詔令序天道不言而四時行聖人不言而萬化成言非感人悟物之本也審矣二帝之典三王之謨猶不能已於言誠在言前也言出於誠雖言而忘言漢世至誠之學不講皇極之訓蔑聞而一人志慮形為播告大抵出於手製天下猶得以因其言知其意夫言之不文行之不逺渾渾灝噩王言之體也漢上接三代統緒其文猶有爾雅之遺人主天資有高下躬行有純駁識量有廣狹政事有得失固不容槩論而以仁立國之意丁寧反覆四百年猶一日至先主孔明之用蜀一時詔勑亦能使聞者為之興起豈非兩漢之澤未斬歟孟子曰誦其詩讀其書不知其人可乎是以論其世也此書為尚論其世作送程叔運掌之湖南序秋風動容木葉欲下眉新進士叔運程君過我東山將歴沅湘而南征愀然買酒酌之曰香草佳木隨地皆産而莫盛於湘之南湘南衆芳所在杜衡江籬芙蓉薜荔木蘭若芷荃孫椒桂不可一二名而莫盛於蘭蘭有國香人服媚之初不以進而榮其生深林無人自芳亦不以退而辱騷人所以反覆深致其意以其似道也故紉之為佩折瓊枝以繼之而求襲其芳澤是芳發於身逹於家漸於國以及乎天下熏烝乎兩間流被乎百世曽何負於人哉而服艾者謂不可佩人心嗜好不同乃爾於蘭庸何悲委厥美以從俗而與惡草俱化則蘭之悲也然蕪没於蕭艾之中可蔽其芳不可奪其芳故曰佩繽紛其繁飾兮芳菲菲其彌章又曰惟兹佩之可貴兮芳菲菲其難虧其根於天者盖始終未嘗為時俗流從所轉也蘭有數種有澤蘭有石蘭有一榦一花之蘭或秀於春或旉於夏而發榮沅湘者紫而尤馥見於秋為正秋方憭慄慘悽萬卉溘然如戰敗無人色緑葉紫莖表表獨芳其可敬也夫坎維心亨困而不失其所亨此蘭之所以似道也君欲進乎道盍於蘭乎訪之且為我歴訊衆芳無恙攬涕延佇未知九畹百畮之誰屬也嬾窟詩藁序祕丞檇李錢君子正與余好嘗從容論詩喜稱仲氏慶善賦詠得囘谿老人之傳恨不及識也子正即世十有五六年其猶子巖友以嬾窟一編來曰願徼福於秘丞叔丏為先君子發之予愴然追往不能已因念詩亡而離騷作騷之憤世疾邪盖出於小雅之變後世之詩又以出於騷為近雅時觸乎所感事拂乎所遇託物引興以寄永愾紆餘窈渺激揚頓挫有不盡之思而詩工矣然皆變小雅流風之遺也知大雅廣哉熙熙乎之體幾何人哉慶善嘗為長樂宰施不盡學其見於詩凢騷人感槩不平之氣憤欝無聊之情一無有陶寫性分惟澹然樂易之歸江山之平逺風月之清明草木魚鳥之幽閒自適皆其神氣之動德符之充也廣大而静疏逹而信者宜歌大雅其必有會乎平齋集巻二十九
