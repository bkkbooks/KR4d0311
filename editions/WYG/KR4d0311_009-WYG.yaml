body:
  text: 平齋集卷九宋洪咨䕫撰策問文舉殿試策朕猥承至尊休德於今一紀夙寤晨興懼不克負荷以羞列聖廼者収攬大柄躬親萬務嘉與海内共濟丕又㧞人才於久鬰䟽言路於積壅亦既踰年而更化善治猶云未獲豈弊端轇轕汙俗沉浸未易遽更與抑崇名忘實齊末遺本所更者政而不及化與何責治愈切而愈邈也黄帝堯舜通其變使民不倦非聽其窮而莫之反垂衣裳而天下治必有妙於化裁推行之表者三代忠質文之尚其弊未始不可救而禮有損益隨時施宜亦非區區於制度文為之間也孔子變魯至道孟軻以齊王猶反手綏來動和過化存神固不容以淺智窺而四代禮樂經世之大法三王四事治國之要道知之者衆而行之者寡何與夫天命不難於迓續而難於凝人心不難於轉移而難於固朕歴觀治忽消長之運念此至熟而行有弗逮國體嘗少振矣而茍且相仍未保其不弛國論嘗少定矣而是非交至未保其不揺國勢不可不彊而選將厲兵屯田積榖未能両全攻守之宜國計不可不裕而約已厚下開原節流未能一出取予之正伊欲整紀綱於姑息之餘飭法度於因循之後洒濯衆志新美大化以凝固天命人心於無窮其要安在子大夫彊學待問久矣其据經證古科别以對朕將親覧焉靡有所隠武舉殿試策葢聞有天下者審其御御有得失則狙詐有作使作敵之殊自昔英君猶難之朕厲精更始以來無日不討諸軍國以興起治功而轡策一世銜橜四夷毎有慕於漢髙祖經營帝業築壇而拜以寵韓信踞洗而召以挫黥布御將之法然也周廬内衞列屯外戍使功使過俾皆踴躍奔走於作興之下而無跅弛之累兒戯之習其道何先光武再造炎圖璽書明見以服竇融幘坐迎笑以折馬援御豪傑之法然也中原遺材慕義來附效智效勇俾皆歡呼鼔舞於大受之中而無養鷹之患放虎之虞其術何要孝宣號稱中興先零負固則㽞屯浩亹以平之呼韓稱藩則置酒甘泉以饗之御夷狄之法然也故讎雖殄新隣方張或和或戰情偽叵測在我必有以待之進可為車攻之復古退不失采􅅔之守衛其策何上夫能御將帥而後能御豪傑能御豪傑而後能御夷狄審本末之序權緩急之勢以制動静之機操縱闔闢顧不在我乎至若軍律之當嚴戎旃之當睦邊民之當䘏新甿之當撫無一不關宵旰之慮子大夫有志事功其率意茂明之朕將親覧召試舘職策天下大勢首蜀尾淮而腰膂荆襄自昔所甚重也諸葛亮之用蜀祖逖謝元之用淮羊祜陸遜之用荆襄規模具在得其人善用之則撫機酬變進退闔闢豈不在我而猶患備守之匪易蜀方告警㐮又戒嚴且蔓延於淮右敵為三師以觀所應故我之應敵不容出於一術諸閫交相為援如常山之蛇力非不合也或慮趋前不能無後顧畫境人自為守可無連鷄之患然同舟遇風又慮一處不牢則俱受其害分建三數大鎮聚甲兵糗糧以重中權似可熊卧虎視而並塞列城䕶風寒之地恐難於歛戍使寸寸而守之則備多力分抑兵家之所忌挾初郡以為外扞庶増藩籬之固而鞭長或不及於馬腹委雞肋而棄之又幾前功之俱廢沿江諸大屯招兵増戍而練舟師門户之急務也或謂守淮襄自能蔽江原保綿亘於鳳沔所以保蜀也移三關之戍而扼三泉得無已廹乎督府進駐荆襄上流壯矣金房聨蜀海道接淮延袤數千里或虞運掉之難隨地分立幕府則大費又未易支也以至南北軍何以相制官民兵何以相使屯田於新疆何以能不資敵調夫於邊郡何以能不重擾子大夫熟於觀時切於憂國其舉三邊備守之要悉意陳之將復于上武舉公試策問乙酉問恭惟皇上以聰喆英粹嗣無疆大歴服學問辨寛居仁行義四方萬里翹跂望治諸君䝉被新美之化可無説以禆新政敢問舜月正元日受終文祖首察璣衡以齊七政而類禋望徧之並舉豈觀天交神庶政莫先與異時月正元日格于文祖詢四岳闢四門明目達聰惟恐或後且進十二牧而歴咨之聽言用人又所當急也太甲元祀祗見厥祖伊尹明言烈祖之成德以訓於王是天下之政無大於法祖宗矣髙宗恭嘿思道君臣相與告語尤惓惓於遜志時敏之務典學豈容緩與成王即政無逸舉三宗以勸主乎畏天愛民而已立政一書乃以三宅三俊為不可忽終之勿悮庶獄為重意固各有在與抑又有可疑者禹受命於神宗不旋踵㑹群后誓師而征有苗康王率循大卞大臣進戒未暇他及首以張皇六師為言佳兵不祥之器顧先之何與豈國之大事在戎不可一日弛與新服厥命求以聳四方之觀聽與人情易玩泰用馮河之義與君以乾剛為德必神武英略而後足以運天下與事有本末物有先後則近道矣隆古帝王出治之序參之今日所當先者悉以陳之有司将以復于上省試一乙未問大明當天而萬景隨北辰居所而列曜拱恭惟主上以文王之聖躬虞舜之孝宮中三年之制畢将㳙剛旦御路朝以延見百官臨撫萬國禮隆典鉅不可不預蒐而夙講也周外朝在路門外内朝在路門内燕朝在路寢之庭所謂治朝者果安在豈即外朝與天官太宰王眡治朝則贊體治豈王公坐論關於治道甚大斯謂之治朝與司士之公孤卿大夫士朝士之群吏州長衆庶莫不在列揆之明堂位夷蠻戎狄不與焉豈置之國門之外不容列於表著與漢接三代而興奉常綿蕞之習不過秦儀雜就已知皇帝之貴使得魯兩生相與翼成之果盡還周之舊歟德陽殿大朝㑹夜漏未盡七刻鳴鐘受賀與長樂之儀先後交映然長樂陳車俠陛執㦸傳警而不設樂德陽乃鐘鼔鏗鍧管絃和雅豈禮樂至此而後備與宣帝受釐前席何盛服齋明獨施於少年之見宣德幘坐迎笑何威儀簡略能奪夫説客之氣髙帝之朝廷而愛幸者媟戯於殿上宰相得以折之先帝之正處而貴寵者引内於殿中中郎得以卻之佞倖方張二臣何為無投䑕之忌小臣廷辱師傅至攀折殿檻而不顧盖謂其不能正主益民也而金華入説尚書論語其有補於帝學者何事武帳不冠不見使人可其奏而出入禁闥之請曽不克從間見髙門之論乃謂妄發其不能動帝聽者何説十萬横行面謾可斬而殿上皆恐遂罷朝不復議何聽納之易奉珍來朝待以客禮而甘泉受謁稱藩而不名何禮遇之過朝而問錢穀出入公私之積何其難於裕也坐朝而日􅉴未退内外之務何其難於清也朝堂百僚之位䔥曹丙魏謀謨乎其上司徒毎府天子親幸與丞相决大事是外朝之存者豈非君臣一堂交孚無間而後足以増朝廷之重歟其歴攷周漢本末以告二問繼志述事者人主之達孝崇德報功者朝廷之盛典昔在寧考親挈神器以授聖明昭哉嗣服于今一紀而文母保佑之恩永言孝思亦既邦祔侑食清廟豈無舊弼顧猶􅆙焉可乎盤庚告其臣民兹予大享于先王爾祖其從與享之功臣配食于太廟商家尚矣而莫名所享之臣伊尹格于皇天伊涉臣扈格於上帝豈即其人乎周司勲有功者祭於大烝傳者於王功曰勲獨取輔成王業之周公而召公之夾輔尚父之爕伐皆所不及豈難其人乎漢論功定封録第侯籍藏諸宗廟以至麒麟雲臺之繪崇報厚矣未聞有列於烝嘗者而先儒謂漢祭有功於廟庭其詳可得聞乎唐享功臣祫則配禘則不配其後禘祫皆配果合乎古否也髙祖廟以裴劉故人爼豆其間能無出於私乎太宗廟以魏徴讎臣冠佩其中抑無一之非公乎長風孤騫之仁傑廟享宜也而五王之賢並侑固不厭其衆忠冠日月之子儀廟享亦宜也而中興第一之功不與亦不嫌其寡乎佐佑王化之説享之未過也而應變守文之名相皆不在選其有所抑乎光復宗祏之李晟享之誠當也而上不負天子下不負所學者廼置而不問豈文墨議論不如汗馬乎翦蜀於清明無蔽之日平蔡於惟㫁乃成之時杜裴元功享之俱無媿也而崇文及愬莫非指蹤之下乃與同升豈将相叶心然後功業有濟乎許敬宗威勢熾灼停享於神龍固足以懲㴞天之罪而名宰相如𤣥齡百世猶将宥之亦以子停何以允公論苗晉卿小心謹畏崇配於大歴已不足以孚當世之望而首贊經綸如裴冕一時無能及者乃以即世先後為疑何以逃清議自武德至於元和功臣列在祀典凡四十餘人穆敬文武宣而下廟食靡所著見豈無其人則闕乎抑有其人而冺乎無傳也夫黄鐘動而氣序轉應龍翔而雲霧集君臣感召之機盖非偶然者然一時之功孰與乎萬世之功左右諸大夫之曰賢孰與乎國人之皆曰賢人心是非昭如日月侑饗大議可一言而定也諸君攷古騐今以對毋枉江東漕司不礙格問國無常勢隨時而為強弱周公之於魯太公之於齊乃能逆料預計於數百年之前則其勢亦有時而定也周之季世地不大於曹滕民不衆於邾莒而諸侯不敢有無周之心秦汛埽六合鞭笞四海自以為帝王萬世之業而繩樞之子亦得而易視之人有尫羸而壽考物或暴長而夭折理固應爾獨怪春秋以來齊有葵丘之㑹晉有踐土之盟均為五覇之盛而心術譎正宜可以占其國何威公僅能終其身覇業遂替文公之後世為盟主齊且屈而從之豈譎正無闗於強弱耶是猶有可諉者曰國異而勢殊也及觀漢之文宣規摹一家而強弱乃有異勢吳王不朝賜以几杖匃奴嫚侮結以金繒太息流涕之勢其不滿人意非一事然兵無刃而威權自振刑不肉而德化自孚貫朽粟腐迄成庶富之效而後嗣頼之樞機周宻技巧咸精吏稱民安之餘單于且欵塞而來享中興之治赫然莫及而一傳之後漢業衰焉弱轉而強強轉而弱始終之變相反若此其必有故矣恭惟主上更張萬化縂攬權綱舉天下之政滌蕩振刷而一新之朝廷清明邊鄙不聳四方延頸以望太平而轉弱為強之機不可失也宵旰雖切庶績未凝鴻鴈之民尚勞於還定䑕狗之盜猶費於掃除而内外體統之間血􅍺壅底臂指拘攣識者尤為之深慮國勢所係若有待而強意者刑賞之施惠䙝而威不振耶紀綱之張名存而實未至耶抑亦體祖宗立國之意守以寛仁道德安彊隠然自有不可犯之威而天命人心之固在此而不在彼耶諸君其敷繹濟時之策以告礙格問國論之變至乎中而定夫中在易為二五在書為皇極君子小人進退之幾天下國家理亂之本皆於此乎見泰之九二居治泰之位審處泰之道包荒得尚于中行是以并包兼容而為中也然泰自否來君子之道方長閑邪不可以不嚴防㣲不可以不謹而負荒穢之累者乃從而包含之得無啓小人乘間而進之漸耶洪範皇極之疇有猷有為有守則念之好徳則錫之福宜也至不恊於極不罹于咎亦且大而受之恊於極則君子罹于咎則小人居君子小人之間而為鄉愿之行其害德為尤甚受之者何意四㐫之惡已著猶得以假息於堯朝非包荒與堯不去四㐫而舜去之豈包荒不能如堯之大與少正夘言行之偽加以兩觀之誅盖謂其已罹於咎矣三家分魯陽虎執國命罪固浮於少正夘而誅反不及胡為獨受於此彼其知宦䜿專殺之罪而不問遂成優㳺聽藩鎮陸梁之勢而莫制寖至姑息得非假是説以自文曰吾将以求合於中者又况泰以朋亡為貴洪範以滛朋為戒至公無我黨與不立而中道以行漢唐之季朋黨成風雖賢者不能免豈其自叛於中歟抑上之人無以并包而大受之故逸為朋黨之歸與厥今更化以來進君子而退小人開衆正而杜群枉天下莫不服聖上之明而用舍之際猶恐或激於偏徇議者乃有中立不倚之説盖欲示尚中建極之意而定國論於不可轉移之地也夫否與泰常相反極與咎不両立邪正消長間不容髪伊欲恢包荒之量而小人無得以投君子之隙推大受之公而君子自有以制小人之變皇極大明與天下相安於泰和之域若何而可憂世之士盍相與圖之平齋集卷九
