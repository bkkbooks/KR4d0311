body:
  text: 平齋集卷十五宋洪咨䕫撰内制左丞相鄭清之口宣卿德尊朝廷勲在社稷欲重處中之寄宜膺虚左之求宅揆奮庸揚庭孚號亟祗殊眷力濟丕平右丞相喬行簡口宣卿斯文砥柱有國元龜久樞紐之宻旋趣鈞衡之對秉綸言煥發輿望允諧亟祗予休共圖乃乂左丞相鄭清之批答口宣延登上宰翊贊中興増九鼎之尊安永三階之澄穆趣祗成渙毋事勞謙右丞相喬行簡批答口宣孚號大廷登庸碩輔允頼巨川之濟式隆巗石之瞻亟效贊襄奚勤遜避右丞相喬行簡批答口宣朕寤寐治功延登耆德既恊從於龜筮宜交濟於鹽梅其遏牢辭以圖丕乂左丞相鄭清之批答口宣天毖成功帝賚良弼首陟泰階之峻亟圖鼎飪之和勉為堅留毋煩牢避知樞宻院曽從龍同知鄭性之簽書陳卓批答口宣外治有嚴中樞尤重必進爽邦之彦廼凝基命之功勉效勝籌毋勤遜牘樞宻使曽從龍批答口宣十乘董戎亟宜引道五兵置使奚尚循墻體予憂顧之深寢爾撝謙之過節度使謝奕昌批答口宣卿世業韋平家法隂馬寵陟齋壇之峻榮施先廟之崇渙綍已孚巽凾可遏節度使謝奕禮批答口宣卿椒掖流輝芝庭峙秀襲冠貂之積慶膺綬鶻之殊恩朕授非私爾辭毋屢賜龍圖閣學士京西湖北路安撫制置大使兼知襄陽府趙范兵部侍郎淮東安撫制置使兼知揚州趙葵銀合夏藥勑書卿望聳禁塗籌安邊閫屬履炎蒸之序備殫牧御之勞宜錫上奩用頒内劑禦兹烈日揚我仁風賜工部侍郎㳂江制置使知建康府陳韡銀合夏藥勑書卿法從名流陪京重寄餘同上賜權兵部侍郎四川安撫制置使趙彦呐銀合夏藥勑書卿天𣲖名流坤維重寄餘同上賜司農卿知慶元府兼㳂海制置使游九功銀合夏藥勑書炎令司衡赫威爍石廼眷輔藩之彦具宣制閫之勞爰錫珍良式資寳衛賜右文殿修撰四川安撫制置副使兼知成都府丁黼銀合夏藥勑書廼睠漢庭之彦具宣蜀閫之勞餘同游九功詞賜兵部郎官兼淮西安撫制置副使兼知黄州楊恢銀合夏藥廼睠漢庭之彦具宣淮閫之勞餘同上賜直寳章閣權發遣鄂州兼㳂江制置副使張元簡銀合夏藥勑書炎令司衡赫威鑠石廼睠上流之寄具宣外禦之勞爰錫珍良式資寳衛賜鎮江府都統制王虎池州都統制趙邦永鄂州江陵府副都統制樊文彬江州左軍統制權管幹光州武定都綂制司職事王忠銀合夏藥勑書三庚御序萬甲分屯總戎律以良勞犯炎威而不憚宜頒珍劑用示眷懐賜平江府許浦水軍都統制董琳銀合夏藥勑書三庚御序萬甲分屯䕶海道以良勞犯暑威而不憚宜頒珍劑用示眷懐賜帯御噐械兼權管主馬軍行司公事兼知光州孟珙建康府都綂制兼知泗州李虎鄂州江陵府都綂制兼權發遣德安府王旻興元府都統制李顯忠鎮江府副都綂制劉虎襄陽府忠衛軍副都綂制江海權沔州都綂制司職事陳昱權利州都綂制司職事曹友聞權廬州強勇軍都綂制司職事王福利州後軍綂制權行管幹金州都綂制司職事吳桂銀合夏藥勑書三庚御序萬甲行邊總戎律以良勞犯炎威而不憚宜頒珍劑用示眷懷賜龍圖閣學士京西湖北路安撫制置大使兼知襄陽府趙范銀合臘藥勑書卿任隆外閫威聳上㳺犯霜露以靡寧䕶風寒而良苦爰錫衞生之寳用旌敵愾之勞壯爾精神寛予憂顧賜權刑部尚書㳂江制置大使兼江東安撫使知建康府陳韡銀合臘藥勑書卿佩囊法禁典鑰陪都凛水澤之中堅嚴風寒之外䕶爰錫攝調之劑用昭睠倚之懐壯爾精神寛予憂顧賜寳章閣待制㳂江制置副使兼知鄂州黄伯固銀合臘藥勑書卿承恩中扆建閫上㳺犯霜露以夙征䕶風寒而良苦爰錫衞生之寳用旌敵愾之勞壯爾精神寛予憂顧賜兵部侍郎淮東制置使兼知揚州淮東安撫使趙葵将作監淮西制置副使兼知廬州尤焴銀合臘藥勑書朔雪方霏淮風更凛言念制垣之重備殫王事之勞爰錫珍良用資葆塞増壯魚麗之氣茂揚鶴唳之威賜權兵部侍郎四川安撫制置使趙彦呐右文殿修撰四川安撫制置副使兼知成都府丁黼銀合臘藥勑書卿分憂北顧制勝西垂犯霜露以靡寧䕶風寒而良苦爰錫攝調之劑用昭眷倚之懐大振戎容亟蘇民瘼賜太府卿四川總領兼撫諭使安癸仲銀合臘藥勑書卿分憂北顧宣指西垂餘同上賜司農卿知慶元府兼㳂海制置使㳺九功銀合臘藥勑書卿坐綏海服宻拱京畿凛水澤之中堅嚴風寒之外䕶爰錫攝調之劑用昭眷倚之懐民瘼既蘇戎容益振賜帶御器械兼權主管侍衞歩軍司公事兼建康都綂制王鑑帶御器械兼權主管侍衞馬軍行司公事兼知黄州孟珙帶御器械鎮江都綂制李虎池州都綂制趙邦彦鄂州江陵都綂制兼權發遣德安府王旻興元都綂制李顯忠平江府許浦水軍都綂制劉虎權光州武定都綂制司職事于俊權利州都綂制司職事曹友聞利州後軍綂制權行管幹金州都綂制司職事吳桂權江州副都綂制楊福興襄陽府忠衞副都綂制江海鄂州江陵副都綂制兼知棗陽軍樊文彬平江府許浦水軍副都綂制兼知海州趙東淮西路鈐兼權廬州強勇諸軍副都綂制司職事王福權管沔州都綂制司職事和彦威銀合臘藥勑書卿等系出山西威行塞北慨朔風之未静忘霏雪之為勞賚以寳奩實諸珍劑用壯前矛之氣進圖破竹之功賜端明殿學士同簽書樞宻院事督視江淮京湖軍馬魏了翁銀合臘藥勑書卿推誠體國决計視師犯霜露以靡寧䕶風寒而良苦爰錫上池之水用紓先乘之勞壯爾精神寛予憂顧賜直徽猷閣㳂海制置副使兼知慶元府王定銀合臘藥勑書卿顯膺閫寄坐鎮瀛壖餘同㳺九功詞平齋集卷十五
