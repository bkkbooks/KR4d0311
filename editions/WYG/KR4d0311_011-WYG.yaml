body:
  text: 平齋集卷十一宋洪咨䕫撰策問饒州堂試十問大江以東衣冠之盛饒為最螺州地䜟異人出焉冠大廷世殊科班班可數皆學校作成之功也漢之番君唐之顔魯公德澤在人至深而獨不聞垂意興學何邪晋虞公為内史大修庠序是前此嘗有學矣誰實基之移告屬縣廣招生徒至七百餘人教養之盛若此今所養僅能三之一而虀鹽之態常患不足不知當時雲㑹輻輳何以為養先正范文正公相攸於東湖上繼者始築儒宮以據水光山色之㑹公之詩文胡不及之買田三頃以贍士大書特書詫以為盛然所入其能幾何今膏腴歲増數凡幾倍而倉廪之積不見有餘抑尾閭之泄無以窒其源耶髙堂顯敞不改舊觀硯湖平逺尤覺増明二公所以淑艾後人者雖百世聞風而亦起諸君藏修其間講明正心誠意之學􅆂飬致君澤民之業以求無負於教育之素盍各為我言爾志十一問世臣之喬木舊德之元龜有國者所甚重而出處進退天下莫不望以為標的尚論古人顧不能無疑焉復亳卜洛之餘告歸之志則同胡為乃有欲去而復留者不惟自留且作書以留同列同列亦為久留而不去何勇退之難耶海濵二老同為善飬而來歸扣馬之諌鷹揚之舉果孰為義天下既定表東海者乃不與師保左右之任何耶從心不踰矩之年尚皇皇於歴聘否以天下之達尊自居終不見諸侯否乘馹而見輦而如公告老猶得以與聞國事至朝廷大議遣廷尉咨問亦乞言之遺意否願棄人間事從赤松子逰盖已見幾而作何衣冠甚偉者始來上閔将軍之老召其子為太僕可謂貪賢之切何知足不辱者遽求去求文武如不及而蒲輪之迎特能詞賦為治顧在力行而魯邸之議乃先服色據鞍矍鑠非不鋭也未免乘下澤車之悔食肉萬里非不壮也未免入玉門關之請而無踰老臣尚堪一行則又好勇至老而不衰其視番番黄髪之謀孰得孰失晚應賢良但見不情而多詐周流四公不過恭遜以取媚請尚方劍賜靈壽杖與夫長樂老之自叙血氣既衰固應爾彼緑野堂之逰九老圖之作亦必有所懲而然也著節而稱祭酒攷于周當為何官遮説而得三老不謂秦尚存此名自諫大夫遷御史大夫為太傅而封褒德侯漢家校年之法抑又安在書陳舊人之圖任詩歌元老之壮猷年髙德劭閲義理為甚熟出處大節必有非衆人所能識者幸商訂之十二問漢公子之好學莫如楚元王一門之盛元王受詩於浮丘伯諸子皆讀詩至孫辟疆亦好讀詩越數世猶有以少通詩書名者豈非過庭之訓而然與然德修黄老之術得枕中鴻寳秘苑書於淮南其子竟以是下吏恐非所以為義方之教也而典校秘書於天禄閣太一青藜為之下照歆復領五經卒父前業可謂能世其官矣然向自主榖梁春秋義歆則欲建左右春秋論難迭出自為矛盾豈父書有不必讀耶抑輪扁斵輪不能授其子耶其究榖梁左氏於聖人之經為孰近左氏多古字歆獨好之引傳釋經轉相發明其於字學盖精棻則方且問竒字於子雲無乃有貴鶩之意與向作洪範五行傳為外戚之戒歆乃挾周官泉府之説為新室國師父子異心一至於此然國師方貴顯矣棻以符命投四裔何其忘䑛犢之愛也董仲舒為漢純儒通達古今有補於治向與之相伯仲伊呂無以加之語必非輕許可者淵源不及逰夏何為歆復少之曽孫龔篤論君子以歆言為然黨同伐異孰為至當自交而至於龔弓冶箕裘之業蟬聨十世輝映兩都其間先後異同是非得失不可槩論意者同于好學而不同於所學亦不害為世家歟諸生平時自許不在漢公子之下家學之傳亦能若是之盛否十三問周之士也貴而肆秦之士也賤而拘疇實使之然賤而且拘秦固以亡貴而至於肆周亦安取此得非周以道勝法秦以法勝道耶太學賢士之關士氣屈伸公論通塞所係為甚重鮑宣為司𨽻諸生舉幡集闕下而留之夫司𨽻内治京師外綂諸郡其於太學若無與也愛而留之不忍其去所以能得其心者何故嘗聞鄉校議執政之善否而憎兹多口者欲毁之胡為於宣獨眷眷如此韓愈為祭酒招諸生而誨之學競起侮予之嘲夫祭酒為古司成國人矜式其於弟子員至近而易格也侮而嘲之曽不受教所以莫能回其心者何故嘗聞聚為朋曹誶罵有司而退然自克者無幾胡為於愈亦不能少降心以相從耶異時處士横議名節相望適以趣漢室之衰六舘之士不陥非義終無以弭唐室之變遡流尋源要必有説十四問孔門速肖者七十子而名在四科者十人而已果孰為之區别耶參悟一貫於口耳之外胡為不在四科之列夫子傳諸曽子曽子傳之子思子思傳之孟子是道之統參乃得之而在四科者反不與何耶借曰政事言語文學不足以盡道德行之顔閔盖嘗在寢矣平日之所許可之所期屬非曽子所敢望今不傳諸此而傳之彼必有深意謂參之魯有受道之質與回也亦如愚謂參之孝為百行之源乎孝哉閔子騫初亦何愧意者寳藏於海聽夫人之所自取與後世以顔孟配先聖而得道統之正傳如曽子僅與㳺夏齒又有不可曉者願聞其説十五問臺諌天子之耳目建置本末可得聞乎九官之命聖讒納言龍獨任其責他官何為不得與善旌謗木人皆可言而四凶之惡胡不聞有斥其非者周官御史司諫似以風采議論為職然御史掌治令賛書之事初不及於觸邪指佞而弊群吏者乃有小宰司諌掌紏萬民之德亦不及於繩愆弼違而諌王惡者乃有保氏官名與後世同而職業則異何故藉曰凡治者受法令御史得以劾其違令之罪以詔廢置司諌可以因事而納規三百六十官之中職於紏察者止二人無乃自狹其進言之塗與漢承秦制以御史大夫為三公中執法領侍御史十五人諌大夫無常員多至數十人唐則監察御史十人又有裏行之名諫議大夫四人而拾遺補闕亦復並置其視周人設官可謂詳矣而當時治道曽不能庶幾成周之盛豈惟其人不惟其官歟方今衆正在列國是堅定臺諌紀綱之地雖不偹其官而一士諤諤嘗首形於王言之嘉歎然攷之國朝之制天禧中御史諌官皆四員慶歴有三諌之除元豐有六察之命今焉冠豸伏蒲各專一官而不並建必有深意謂才難而不輕授與賢俊滿朝孰無明目張膽之志否則得其人而一䕫自足與十朋之龜弗克違宜其不厭多也又否則聖朝無闕小人退聽而皂嚢白筆之可畧與則人情之譸張國事之膠轕未可盡諉諸太平之無事意者御史司諌之專其任将以復成周之訓歟復古之難不可不詳議而熟圖也諸君志於有用其為鋪張聖賢相逢之盛事十六問與其有聚歛之臣寧有盜臣以其為國植怨於民也盜竊寳玉大弓春秋誅之胡獨聚歛之臣不及賍吏犯法法在姦吏舞法法亡盖無法則無以為國也伐檀之貪鄙而無功詩人刺之胡不聞有刺在位之姦者茍變賦於民而食人二鷄子至疑其傷亷然禮順人情乃或置米肉之遺於不問何邪劉寵之為守受一大錢而去人皆稱其賢然法有明禁受所監臨一孔以上皆贜論何耶得非禮法不相為用與頃者貪相債帥之得志上下成風恬不為怪聖化更新首嚴簠簋不飭之禁革貪為亷宜翕然丕變論者猶謂賞罰不信不足以懲汚染之習而善類名家科甲之士不當遷就為之諱是欲一以文法懲之也禮義亷恥以維持士大夫之風俗法禁之外亦有可行者乎若曰人心趋利如水就下禮不足以防其無厭之欲法不足以制其自營之私又將何術而可史家皆傳酷吏獨無傳賍吏者欲裒為一書暴諸國史一字之貶若撻諸市不識可使革心易行精白以承休否十七問宰相論可否於廟堂之上以行其道諌官争是非於殿陛之間以行其言經綸治功彌縫君德盖非他官比也冢宰制國用必於歲杪然周官太宰歲終受群吏之㑹其不㑹者惟酒與膳服耳夫惟辟玉食膳服之不㑹宜也酒誥一篇歴歴無彞酒之戒酒而可以不㑹乎彼庖人膳夫之不㑹王及后世子皆然而酒正之不㑹惟王及后而世子不與得非養正於䝉不容以是亂德耶歲終天子齋戒受群臣之諫然周官司諌不過紏萬民之德而掌諫王惡者惟保氏一官進言之路何示人不廣藉曰左右前後皆可繩愆而受諌獨于歲終事有可諫必待卒歲而後言則為立仗馬者多矣彼孟春徇鐸工執藝事以諫此受以歲終彼諌以歲始抑又何故後世宰相兼領鹽鐵度支諫大夫無常員揆之周家建官之制然與否與朝而問一歲錢榖之數與正旦酌獸尊以賞直言概之歲杪制用歲終受諌同與否與頃建言於朝者請宰相制國用諌官補闕員歲云暮矣因舉周官王制之疑以為問十八恭惟主上盛德大業冠冕帝王閎休懿鑠輝映天地廼者自仲秋初吉日御昕朝已而儲闈之授册宗祀之慶成千秋之上壽元正長至萬玉來庭盛事荐臻祲容迭講凡此大朝㑹之儀固有曲臺之議在然國家制作多仍唐舊是不可以無攷也今觀唐制大駕屬車十二乘大陳設則分左右施於衛内三衛番上分為五仗號衙内五衛元日朔望視朝則服翼善冠其後朔望仍用弁服元日冬至朝㑹七德與九功同舞其後至有不忍觀破陣樂舞者至於大陳設皇太子而下以次上夀且奏祥瑞雲物其大略亦若是而已而其間不能無疑者太極宮之承天門受萬國之朝賀既曰古之外朝矣或又謂含元殿在周為外朝在唐為大朝何也太極殿者朔望坐而視政既曰古之中朝矣或又謂宣政殿在周為中朝在唐為正殿何也兩儀殿常曰以聽政而視事為古内朝又以紫宸為周之内朝漢之宣室唐之上閤亦曰内衙然乎否乎兩儀承慶皆為受朝聽訟之所而元和中正朔乃御紫宸朝賀寳歴中則又月朔御紫宸行入閤之儀胡為受朝之地曽無定所舊制以隻日視朝其後乃命輟朝放朝皆用雙日或又五日一御太極殿胡為臨朝之日曽無定期引對廷臣何屢見於延英讀示月令何獨見於宣政入閤之儀開元舊禮本無之後之諸儒從而附益抑又何説也夫以唐家一代之制損益沿革豈無得失之辨仰參周典俯采漢儀其合於古而宜於今要必有一定之説諸君結綬登畿觀光之國有日矣試言其槩平齋集卷十一
