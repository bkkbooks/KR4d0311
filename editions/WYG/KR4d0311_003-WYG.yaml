body:
  text: 平齋集卷三宋洪咨䕫撰講義蠱元亨利渉大川先甲三日後甲三日臣聞大弊極壞之世天所以開聖人也蠱取壞亂為義以爻言之自㤗來以卦言之繼豫隨之後安則玩玩則媮媮則垢弊日積養成壞證與人久宴溺而疾生於心其為蠱一也而蠱無終蠱之理故蠱壞之中有元亨者存何則飢易為食渴易為飲大弊極壞易為治方王道板蕩綱紀文章一切掃地英君起而拯之中興不翅反掌是知蠱未有不可治治得其道而大亨雖江河至險亦利於涉特患安于蠱而無興起之志耳然急於救弊者未免用意之太鋭切於望治者未免求功之太速險難在前徑渉不懼志壯氣盈視天下事若無足為而易之易則難者将至過懲前日之不事事適滋後日之多事未保其不然也夫甲者十干之首而事之端既先三日以謀其始又後三日以圖其終反覆擬論備極詳宻使治道日有趋新之功而無矯枉之慮前弊可拯後患可弭矣夫如是然後謂之善治蠱彖曰蠱剛上而柔下巽而止蠱蠱元亨而天下治也利渉大川往有事也先甲三日後甲三日終則有始天行也臣聞户樞不蠧流水不腐以其日運而不息也故蠱壞常生於久安不事事之餘人君亢然于上人臣靡然于下截然其不相接且下以巽順養腴無切劘正救之益上以逸樂養尊乏振厲奮發之意於是紀綱隳於姑息制度弛於因循道揆法守紊亂於私意之轇轕天下之治日入於大弊極壞之境而不自知在卦艮之剛居上九巽之柔居初六巽順艮止而蠱以成正君臣相與拱平安坐以致天下之亂也然蠱豈終於蠱哉有能以飭蠱為已任力量大而規模壯精神全而風采立一斡旋間掃積壞之弊而興大亨之治有不難者利渉大川必明之以往有事盖久安不事事所以成蠱往有事所以濟蠱也况作事貴果慮事貴精世之賢君思欲為天下拯弊起壞而納之治豈非立志之美然或發強有餘而宻察不足廣大已致而精微未盡故事隨舉而隨沮令隨行而隨輟皆由未得先甲後甲之義也夫先甲三日以謀始後甲三日以圖終終而復始循環無間精義入神以致用何蠱之不治其在天行如貞之復返於元艮之復出於震非終之外有所謂始也故觀天運知人事象曰山下有風蠱君子以振民育德臣聞左氏傳風落山為蠱風落於山下無物不撓故蠱以取象然致蠱者風之動治蠱者艮之静盖艮體重厚而篤實不為物移屹乎山之止也風能撓於一時使山下之物散亂不齊少焉風止草木之髙髙下下自若山何嘗加損哉君子觀象於蠱以巽振民以艮育德育成君德固作興民心之本而德之育也必以山之静與山下出泉䝉同吾能體中正仁義而主静挫衆紛而不擾應萬變而不亂動與静無非静外物孰能蠱之吾心無所蠱則人心無所蠱而天下國家之治無所蠱一静足以制百動也玩易者必因象而求意初六幹父之蠱有子考无咎厲終吉象曰幹父之蠱意承考也臣聞蠱自㤗來具乾坤之體故諸爻幹蠱以父母言父之行事一出於正作室而塗塈茨為力甚易不見其子幹治之功惟前人蠱壞有待振飭必其才足以植僵起仆使百堵皆作於室毁之餘則幹治之功見矣有子而考无咎正以子能補其過也不然生不之諍没不之改陥父不義猶為有子乎然聖人以不改父臣父政為難初六乃於繼父之始亟懲其蠱壞而飭治之必有甚不獲已者而於心終不安故必以惕厲處之事無輕舉舉之必當如此則可以終吉終不失其順也象所謂意承考盖前人之蠱自我而治不曰我之能而曰吾父之志欲為而未遂者今特以我之意逆父之意而行之幹治非我功也是不特揜父之過又将揚父之名豈不俱有光榮哉元祐改新法斥姦臣皆推之神考之意正得此意九二幹母之蠱不可貞象曰幹母之蠱得中道也臣聞九二上應六五為子事母母有不及不可不正正救或過則易至於傷恩怡聲下氣柔行巽入使之浸潤而氷釋則蠱為可治或以貞行之隂柔之性吝執不囘情有所激未必不重其蠱也貞者事之幹而幹母之蠱不可貞不貞乃所以為中盖闈閫之内聽其自蠱為不及急於治蠱為太過無過無不及則中道得二居巽體之中猶以是為子道戒事母難於事父也詩凱風母氏聖善我無令人痛自尅責幾無以自容於天地間卒能回母心而成其志可謂得此義矣推之事君暌之遇主於巷未免委曲開陳隂柔故也若夫事剛明之主則王臣蹇蹇匪躬之故惟恐其不克貞九三幹父之蠱小有悔无大咎象曰幹父之蠱終无咎也臣聞舜之齋慄曽子之養志莫非順乎親也子以順感父以慈應家有蠱壞不治之事隨宜整飭次第畢舉而閨門雍肅氣象自如乃幹蠱之善也九三處巽體而過於剛安得無悔然其才足以克家與其嘻嘻失節置父於有過之地孰若三諫號泣納父於無過之域故所悔小而咎不至於大象以終无咎言之迹若非順心未嘗不順也彼排闥引裾折檻軔輪之臣雖一時若以忤上為咎而其心欲使國家動無過舉實存乎愛君忠顯而咎冺亦猶是也然則子以剛幹父之蠱而旡咎恃父之慈臣以剛幹君之蠱而无咎恃君之明六四裕父之蠱往見吝象曰裕父之蠱往未得也臣聞德可以勉而進才不可以彊而能世之賢子以起家為已任如善奕者以一著救一枰之敗非有過人之才不能也六四以柔居艮體之下寛夷静厚有餘而材不足方家事之蠱壞非不思滌蕩振刷而一新之材不逮心詎容強揠故其蠱僅止於裕裕者寛緩而不廹也事勢搶攘弊端轇轕人情易於躁紊而能鎮動以静制逆以順撫横厲以柔逶迤容與不求快於一時而磨以歲月終能使亂䋲之自解而蠱亦徐飭矣茍不量其材冐為一决則往必見吝正以力常奪於過髙變每激於欲速不可以輕進也人臣治君之蠱亦有隨才就功以為裕者子産相鄭修辭令以交於晉楚而外難紓主強直以盟於豐駟而内難解鄉校議之而不怨輿人誦之而不怒鄭頼以寧非裕於蠱者乎故孔子美其有君子之道而不稱其材茍材過於子産而道非君子則盆成括之死又孟子所深歎六五幹父之蠱用譽象曰幹父用譽承以德也臣聞愛敬者孝之始顯揚者孝之終人君出而當遺大投艱之責仆者興之紛者理之壞者修之彌縫前人之闕使天下後世不得以議其過如昭帝繼武帝與民休息已為難事而况揚父令譽於無窮者乎六五柔中之君得九二剛中之臣為之輔蠱壞之見於前者一意幹治不遺餘力已往之咎與時俱化方來之善隨日加新而父之譽用是暴白於天下後世此無他承之以德故也承以材畧則必求度外之功承以文法則僅救目前之過惟承之以德則髙明光大之懿緝熈於九重溥博淵泉之澤滲漉於海内天下莫不以手加額賀吾君之有子後世亦莫不稱其為天下得人之仁父之譽豈不充塞於天地之間乎文王當商末蠱壞之世有志未遂武王以聖德繼之而文之聲益廣此爻應之上九不事王侯髙尚其事象曰不事王侯志可則也臣聞功名之士輕富貴道義之士輕功名世道蠱壞少有抱負者孰無趋事赴功之心而上九乃不屑事王侯豈其恝然忘天下不與世同其憂哉費惠公曰吾於子思則師之矣吾於顔般則友之矣王順長息則事我者也繆公亟見於子思子思不恱以位則子君也我臣也何敢與君友也以德則子事我者也上九居無位之地而道足以為王者師茍其時上無明天子下無賢諸侯詎肯屈道而事之潛心太極之先獨立萬物之表髙尚其所行事外物無一足以動其心志如此其逺也百世聞風猶将興起豈不可為世則哉雖然隠居求志正所以為行義達道之本一瓢非所憂則可以繼四代而興禮樂萬鍾非所慕則可以承三聖而正人心世之興大事建大業决非患得患失者之所能為窮居不損盛行不加則致君澤民恢乎有餘用矣伊尹三聘而成格天之功孔明三顧而定興漢之計道義重故也是知不以富貴功名先入其心者乃可與圖天下之事平齋集卷三
