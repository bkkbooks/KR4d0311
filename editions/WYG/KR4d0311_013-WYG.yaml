  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0311_WYG_013-1a, image: WYG1175/WYG1175-0204a.png}
body:
  text: 平齋集卷十三宋洪咨䕫撰内制太中大夫守兵部侍郎淮南東路安撫制置使兼知揚州軍州事趙葵以䕶邊無狀乞賜罷歸不允詔善射或失於百命中之餘良醫多得於三折肱之後此操危慮深者所以達也卿早懐智略鋭赴事功雖鳴劍伊吾之志未酬而堅壁細栁之風猶在梁荆俶擾淮獨晏然渉歴多而識慮老可與圗守矣邊烽少歛亟上歸請兵法曰毋恃其不來恃吾有以待之賊情叵測吾圉尚疏卿宜日討軍實忠敵王愾其可遽奉身而退乎所請宜不允太中大夫守尚書户部侍郎兼刪修勑令官趙立夫乞畀叢祠不允詔漢張蒼為計相更以列侯主計唐劉晏自度支領租庸鹽鐵至僕射猶領使如舊理財不宿其官簿書放紛吏並縁為姦利雖竭江河之入莫供尾閭之泄也卿踐更中外之久財賦脉絡洞燭表裏而姿禀静固精力強乂又足以行之左户為真朕方委重閲日幾何遽以春衣辦集而求均佚蒼晏職業僅以是自諉耶維時調度孔慇尚䆒爾材毋曠吾事所請宜不允朝奉大夫權工部尚書時暫兼權吏部尚書兼修玉牒官兼侍讀李鳴復辭免除權刑部尚書日下供職兼職並依舊恩命不允詔朕惟舜命九官垂作共工臯陶作士皆終其身不易後世必逓遷熟試以觀通材卿為棘卿有明清之風則峻縂一臺為臺端有直亮之操則超躋八座為起部有簡静之譽則併攝天官知卿深故進卿亟也然經逺猶者貴事功之詳歴圖大任者在望實之積孚兹由五雉之華趣典爽鳩之重擢無虚月意盖有在卿以因人序升而辭過矣其思式敬爾由獄以長我王國所辭宜不允中奉大夫寳文閣待制賜紫金魚袋鍾震辭免除寳章閣直學士知静江府廣西經畧安撫恩命不允詔朕待臣下無中外之間以久不見卿詔自姑熟賜對於便朝議論平實可見於行良用嘉奨攝長起曹詔墨猶濕而嘖言已至憮然不得而私也廼眷桂管為管右都㑹有江山之勝無瘴厲之虐峻直西清往顓牧御過家上冡行道謂榮豈若季布徒以一毁譽為進退哉勉敷德意使海蜑山獠人懐其生則予以懌所辭不允朝議大夫權尚書兵部侍郎四川安撫制置使趙彦呐乞速加汰斥不允詔西南六十州倚天險以為固卿老於邊籌控仙源之險以挫賊鋒功與馬服光據北山等朕既下詔奨勞矣而爾子洸夫又能獮潰旅以紓心腹之憂威名既立賊雖狼貪無厭羝觸未已獨不忌吾老羆之當道耶進卿武部之貳且官厥子於朝其體有功見知之意益堅授任危難之圖收合散亡謹固封守使全蜀以寧毋過爲引咎以自餒其氣也所請宜不允朝議大夫試尚書工部侍郎㳂江制置使兼江南東路安撫使馬歩軍都總管知建康軍府事兼行宮留守陳韡乞亟畀祠廪不允詔天下一身也論病以及國原診以知政漢之􅏓盭唐之疽根皆識國體者所深憂朕不能逺德䀌然念三垂之不靖北門管鑰徒得卿重除戎蒐實養威制變靡一政之不舉再進文昌用懋乃蹟俾脩捍我于艱病在膏肓日甚一日忽騰祠請殊駭朕聞得非切於憂國以身之病喻國之病與夫醫緩所視固砭劑所不及秦越人浣腸滌胃必有可起之方盖國勢之轉移在人未可諉之壊症而不爲治也卿亦勉爲王事親藥餌嗇精神以佩高危之寄所請宜不允魏了翁辭免依舊端明殿學士除簽書樞宻院事令疾速赴行在奏事恩命不允詔采薇以遣戌視薇之剛柔以爲行役久近之候而出車勞還杕杜勤歸繼之所以閔歴時之勞也間者嵗聿云暮卿憤於封豕長蛇荐食上國烈然以樞臣視師于江上星言夙駕冐犯霜露曽無㡬㣲見顔面亦云壯矣呉楚上下數千里臂指運掉氣勢翕合有出門同人之應朕寢爲安廼睠暮春閲時且再勞於王事盍遄其歸在師中吉序進一等特以示吉甫之燕喜而飲至䇿勲猶有待也何行而弭歛戍之後艱何施而杜挻憂之内奰何所處置而使朝廷尊強生靈之無失所延英入對其熟數于前以圗綏靖引疾而辭非朕望所辭宜不允謝奕昌辭免特授保寕軍節度使提舉萬夀觀恩命不允詔我孝宗廸關雎之風重葛覃之本言告師氏間歸謁於祖禰之庭詔馭羣臣必進褒於伯仲之列著爲國典用厚人倫卿笙磬和平珩璜縝粹清規雅度具存江左之風嘉則令儀同禀洽陽之氣聨鴈行於朱閣肅鷺序於彤墀祗奉宮闈還展寢廟榮光接於五世異數萃於一門超陟齋壇總提真舘盖率先朝之舊匪繇近戚之私宜益務於好脩毋過勤於引避所辭宜不允謝奕禮辭免特授保康軍節度使提舉萬夀宮恩命不允詔朕尊臨凾夏夙建長秋化成二南曽無示私外家之意禮成五廟宜有昭徳異姓之㤙卿性行淑均風神秀徹如圭如璧泝慶𣲖於貂蟬吹壎吹箎播英聲於鵷鷺託在肺腑鬱爲羽儀奉翟禕而脩寢廟之恭擁旌旄以領祠庭之秩寵超二等榮動一時以淳熈戚畹之彛章爲慶元相閥之盛事匪徒馭貴抑以教婣勉循制節之規宜畧撝謙之牘所辭宜不允魏了翁再辭免依舊端明殿學士除簽書樞宻院事令疾速赴行在奏事恩命不允詔兵難隃度則倍道而疾征事有宻奏則乗傳而趣入王事靡盬所以不遑啓處也國朝儒而知兵莫加於范仲淹出經畧西事久之未獲要領而占爲副樞定廟謨於殿陛之間震天聲於靈夏之表卒柔服之卿腹有萬甲名齊一韓廼者視師之行恊比諸閫拊循三軍有關疆事既得以直達朕聽今又以所目擊還歸坐籌折箠笞之好音懐之吾有以待敵矣恢台之交風日未烈其遄驅以慰渴佇所辭宜不允不得再爲陳請皇叔祖少傅保寧軍節度使充萬夀觀使嗣秀王師彌生日詔十一月十七生新陽踰節恊氣先春生一代之宗英爲兩朝之國老眷隆列棘㤙賁垂蓬備牢餼以陳儀茂燕頥而介夀同知樞宻院事鄭性之生日詔小寒届節峻岳儲神應昌運以生賢幹洪樞而贊治特隆眷遇肇錫餼牽介黄髪之脩齡侈緇衣之篤好永寧郡王楊石生日詔紀鳳標春将臨銘栢傳龜毓瑞先慶垂蓬豐好賜於周官洽燕私於漢戚祗予寵眷介爾耆靈光禄大夫右丞相兼樞宻院使鄭清之再辭免特進左丞相兼樞宻使㤙命不允詔元愷並舉而百揆宅之司空公孤俱立而六典掌之冢宰大厦必棟梁之任巨川惟舟楫之資允繫具瞻曽㣲虗授以卿韞帝師之學抱王佐之材疇績中台升班首輔盖欲䆒致主澤民之業凝調元贊化之功使國勢重於泰山而人心安於磐石倚毗良切考課匪輕盍亟為奠枕之圖猶堅執循墻之請人不足與謫也朕正賴于格心時則勿有間之卿何疑於立政况此艱難之日豈其閑退之時所辭宜不允宣奉大夫知樞宻院事兼参知政事喬行簡再辭免特授金紫光禄大夫右丞相兼樞宻使恩命不允批答帝賚良弼而輔丕乂天生賢佐而祐中興繄一徳之交孚實千齡之幸會卿三朝夀俊四海達尊充於性則碩大而光明備於身則康寕而夀考如圭如璧之猗重較久人望之獨隆非龍非彲之遺汝師斯國均之對秉盖天所相惟朕之承中外之壊證已形上下之憂心如醉趣展濟時之畧毋貽避事之嫌所辭宜不允宣奉大夫知樞宻院事兼㕘知政事喬行簡再上表辭免特授金紫光禄大夫右丞相兼樞宻使恩命不允仍斷來章批答朕以治國平天下根本於人主之身深宮暗室左凖右規何嘗一息懈而世道積壊之餘國勢未振物情易摇中夜以思凛乎若朽索之馭六馬榆塞又将秋矣並建輔弼亟圖康濟免櫝洊至得無以補苴罅漏扶植頽敝之難耶列聖紀綱法度具在天下事猶可以為卿老於謀國勇於致君調元經武特在機括之一轉趣亮天工用答人望牢辭可已也所辭不允仍斷來章光禄大夫右丞相兼樞宻使鄭清之再辭免特授進左丞相兼樞宻使恩命不允仍㫁來章批答元首明則股肱良股肱喜則元首起相須甚切相值甚艱卿學足以承三聖之傳識足以定萬世之策適更張之有待嗟大壊之難圖救病於己危以爾為上醫之盧扁葺廬於既朽以爾為巧工之班輸特隆左揆之登昭示右賢之切交孚靡間頻巽奚為暝眩而厥疾瘳妙試回生之劑綢繆而彼桑徹熟思禦侮之規毋棄爾成亟祗朕命所辭宜不允仍㫁來章金紫光禄大夫參知政事兼同知樞宻院事曽從龍上表再辭免除知樞宻院事兼參知政事恩命不允仍㫁來章批答國朝之治莫盛於嘉祐時則有大臣考覈兵數地理使邊防無闕戍奉典章故事使百官奉法循理而朝廷尊卿之祖也卿山立川流克世厥德兹以參預進本兵之重且世厥官運籌幄中制勝堂上修撰兩盡庶幾海内復還全盛之風詩不云乎對揚王休作召公考此朕所望於卿者撝辭徒費所辭宜不允仍㫁來章平齋集巻十三
