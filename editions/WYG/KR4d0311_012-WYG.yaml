body:
  text: 平齋集卷十二宋洪咨䕫撰内制殿中侍御史王遂辭免除户部侍郎恩命不允詔朕自親政以來臺諫以直聲著者必超軼等級而進之所以勸敢言廣忠益也卿氣壯而材茂識髙而論偉繇分察再遷察非法於殿中暴未殄之惡折方萌之姦蹇蹇匪躬聞於天下朕甚器其直稽諸故府臺臣以供奉赤墀攝貳版部僅一二見如卿即日為真亦足昭眷簡之殊旌㧞之異矣矧嘗考覈郡國計簿具見本末理財有疏義利之辨尤嚴今特舉而措之毋多遜所辭宜不允權戸部侍郎趙立夫辭免除户部侍郎恩命不允詔小司徒掌建邦之教法令貢賦抑其細也而後世專以理財為職卿本固而末茂外寛而内明踐􅆒所至務以有餘不敢盡之意寓於政事攝貳地卿恂恂如不能言而鉤索原委檢覈滲漏吏無所容其欺心計精矣就俾為真用懋前業夫天下大計分𨽻四總其入於版曹者纔二十七郡生寡而食衆用疾而為舒故常患不贍鞭筭笏畫之長朕方以陳恕望卿勿辭可也所辭宜不允權刑部侍郎李性傳辭免除禮部侍郎恩命不允詔有虞氏命伯夷作秩宗曰夙夜惟寅直哉惟清寅故直直故清也知此然後可以為禮樂之官卿務敬以直内之學有淵乎似道之風甘泉之論思露門之勸講責難陳善備罄忠益而不汲汲於進寅直清矣若昔折民惟刑與降典相為表裏疇庸邦憲之平正序春官之貳選妙望華朕命惟允齊仲孫來省難知魯秉周禮而不敢動晉欲服楚必先大蒐被廬示之禮時方多艱卿其思所以尊吾國者徒鳴其謙非朕所望所辭宜不允權兵部侍郎趙彦悈辭免除兵部侍郎恩命不允詔卿學問造乎精㣲論議根乎正大垂紳端笏於朝盖麟之儀儀鳯之師師也引年告歸朕以金華之業未就擢繇武部之最就進貳卿之真亦可為勉留矣而猶以歸諗歴觀在廷番番黄髮我尚有之而公族之年耆徳明孰踰卿者四郊多壘主憂則臣族同姓之老方與國同其戚休而忍不為朕修九伐之法明七徳之武遽舍之去乎其彊起就厥位所辭宜不允朝議大夫新除兵部侍即兼國史院編修官實録院檢討官兼崇政殿説書趙彦悈辭免陞兼同修國史實録院同修撰恩命不允詔經者道之綱也史者事之紀也八書十字而下述作紛紛經學之不明也深於經則必良於史卿學有師傳晚造自得邇英論説析㣲抉奥多先儒所未發用力於經深矣典謨歴代之軌範春秋百王之䋲墨記言動者祖焉卿能以經法為史法品藻實録方將軼遷董而上之進参纂修尚奚遜所辭宜不允特進左丞相兼樞宻使鄭清之等奏為雷發非時乞賜罷黜家居待罪不允詔自昔有國之患莫大於君臣玩天變而不知懼間者雷洊發於首春雷君象也詩稱震電不寕不令朕方引咎修省卿等亦以陽不歛藏俟罪於家上下相與警懼若此吾國其庶幾乎漢丙魏同心輔政風雨災變時氣失節皆惕然以為己憂而中興之治成卿宜一乃心徳圖所以回天意者移災股肱非朕志也明發其率百辟以朝端朔所請宜不允特進左丞相兼樞宻使鄭清之等奏為滿散天基聖節乞許肆筵不允詔朕惟天心仁愛人君故出災異以譴告之星雷示變天所以大儆朕也而卿等職思其憂莫不震恐引慝可謂得交修之誼矣然損貴酌損節戒苦節禮以義起必惟厥中朕於誕日既寢上壽之禮群臣嘉賔之式燕可盡略乎勉體示慈之意毋勤引避之嫌所辭宜不允太中大夫同知樞宻院事兼恭知政事鄭性之奏為雷電非時乞賜顯加黜罰不允詔廼立春再翌日庚戌殷雷始發又再翌日壬子而震少陽驟洩恐懼靡寕故預戒百官天基節寢介壽輟用樂庶幾上答天譴卿乃謂咎在臣等乞加顯黜昔我仁祖以春雷為異明詔責躬曷嘗歸過股肱卿宜悉心輔朕以虩虩致福勿復辭費所請宜不允工部尚書李鳴復辭免玉牒兼侍讀恩命不允詔周小史掌邦國之志奠繫世辨昭穆師氏以媺詔王居虎門之左司王朝自唐以來瑶牒之纂修經幃之誦説蓋昉諸此而兼其長為難卿著御史之冠曵尚書之履聲稱籍甚而執春秋一經以陪緝熈之講尤多所發明朕熟察所韞閎中而肆外故以開元禇無量開成李衢之職兼命之進而勸讀則明引君於當道之誼退而撰次則用大事於書冊之法恢乎有餘地也所辭宜不允户部侍即王遂辭免同修國史實録院同修撰恩命不允詔文以氣為主職史事者有直氣則無曲筆卿以學問養集義之氣頃為御史不為強禦屈剛且直矣進升言語侍從之聨参舉紀傳編年之法以前日之是非一時者榮辱百世均是氣也况司馬遷之進姦雄崇執利班固之否正直輕仁義曾莫能當卿麾訶之餘鋒一代大典久未就緒非卿其誰宜為所辭宜不允兵部侍即趙彦悈辭侍講恩命不允詔元祐中程頥為説書以敬涵養君徳范祖禹為侍講以和開𨗳主意親學士大夫之益如此朕知卿和而能敬始進之以頥今進之以祖禹徳性之廸意嚮之正惟吾宗老是凖巽櫝來上謂究心自得而無能悟主朕實愧焉雖然學有緝熈於光明佛時仔肩示我顯徳行亦惟卿勉之所辭宜不允特進左丞相兼樞宻使鄭清之金紫光禄大夫右丞相兼樞宻使喬行簡再上奏為雷發非時乞賜罷免退伏田里不允不得再有陳請詔春秋書三月大雨震電夏正月也劉向謂雷未可以發而發陽不能閉隂之象故邇者雷發於春始朕甚懼焉丞相與國同其戚休既夙夜薰心圖答譴告積隂隨霽矣而猶執咎不自己夫勑天之命惟時惟幾元首股肱交相儆戒固應天之實然宣王遇災而懼側身修行詎嘗分過於申伯仲山甫哉况今外患未弭内治未飭朕方倚丞相如左右手其安厥位懋我政事以保乂我有夏穆我天縡毋輕於奉身而退以孤朕也所請宜不允端明殿學士宣奉大夫李􅌫上表辭免除資政殿學士知眉州恩命不允詔朝廷以耆儒而尊故國以世臣而重朕萬里召卿期以為股肱心膂詎肯使一日去修門哉惟西土嘗不靖朕為之廢寢食者累月峨英岷秀盡瘁王庭卿大夫之舊徳宿望莫有留者拊髀躊躇憂顧無所寄然後知季良在隨亷頗用趙之足以重鄉國也輟經幄之優進書殿之重髙牙大纛歸鎮鳴珂薦紳父老念疇昔綏靖之勳猶在必動色相戒坤維可無憂矣况峻職以尚賢即家而為守在蜀纔止一人朕於卿可謂盡體貎之宜往哉毋以中外為間所辭宜不允端明殿學士宣奉大夫李􅌫再上表辭免除資政殿學士知眉州恩命不允詔孔子自衛而反魯孟軻去齊而歸鄒弗逢其時乃諉諸命卿心存於致主朕志切於用賢將以有行未為不遇曩頻年外服嘗著績於制垣今再嵗中朝遂眡班於執政雍容勸讀繾綣給扶顧圖任之念未忘何引謝之章屢至躋隆名於祕殿建巨屏於故鄉歴考前聞罕見近比相如之諭蜀道方來弩矢之迎買臣之守㑹稽何勤印綬之上諒薄言於晝繡尚遠告於辰猷所辭宜不允平齋集巻十二
