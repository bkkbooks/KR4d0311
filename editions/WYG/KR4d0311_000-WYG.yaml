body:
  text: 平齋文集别集類三宋提要臣等謹案平齋文集三十二巻宋洪咨䕫撰咨䕫有春秋傳已著錄是集經筵進講及制誥之文居多詩歌雜著謹十之三其官御史時忠言讜論力陳時弊畧見於宋史本傳而集中不錄其奏疏或避人焚草之意歟考史稱咨夔為嘉定二年進士而厲鶚宋詩紀事據咸淳臨安志謂嘉定無二年榜因㫁為元年今考集中題陶崇詩巻云某與宗山同壬戌進士按嘉定以戊辰改元其二年為己巳若壬戌則實嘉泰二年史特誤泰為定鶚未詳考而以咨䕫為嘉定元年進士非也又謝枋得叠山集末附錄贈行諸詩有洪平齋七律詩一首核其時代與咨䕫殊不相及宋詩紀事别出洪平齋一條不以入咨䕫條下是則考之為審矣乾隆四十一年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書集部四平齋集目録别集類三宋巻一講義巻二講義巻三講義巻四講義巻五講義巻六講義巻七故事卷八故事卷九策問卷十策問巻十一策問巻十二内制巻十三内制巻十四内制卷十五内制卷十六外制巻十七外制巻十八外制巻十九外制巻二十外制巻二十一外制巻二十二外制巻二十三青詞帖子古今詩巻二十四啟巻二十五啟巻二十六啟巻二十七啟巻二十八啟劄子巻二十九序巻三十記題跋巻三十一墓誌銘巻三十二祭文
