body:
  text: 平齋集巻二十四宋洪咨䕫撰啟一謁莊提舉啟鐡硯關心莫續盤洲之脉繡衣具眼好開泮水之荒雖離竒了無先事之容而啐啄或有同時之理不孤此志端繫其逢昔者東坡之門卓然北斗之望惟斯文之宗主在是故當世之豪傑歸之后山仕徐嘗賦稲苗待公秧之句山谷游魏亦哦小草有逺志之詩皆繇郡文學之官自附墨客卿之列品題一出聲價倍增四學士之名等華嶽而俱重六君子之號與日星而並垂此風無傳吾道誰屬必宗工之繼作則善類之争趨伏念某骨相蹣跚性資骯髒悲歌長鋏盾鼻之檄未能活計短檠床頭之易猶在諷重闈之白髮峭獨冷之青衫訪三洪於故國之中拜一范於公堂之上湖山醒夢何嫌書懶讀之嘲山色療饑敢為飯不足之嘆顧此游之不惡知其命之將通恭惟某官吾儒津梁斯世鼎吕辟雍講道激揚洙泗之波祕府抽書排戞蓬莱之氣胡斜飛而背日肯夙駕以觀風以胸中之鏡而照老吏之百姦以肘後之方而起疲甿之九死且力扶於公議每樂得於英髦有覬賞音遂忘躍冶僖公六轡九頓首於先驅惠子五車一㸃頭於後覺歸依良切敷染奚殫謝葉提刑薦啟泮水思樂熟觀魯侯之旂雩舞詠歸首與曾㸃之瑟孰蚍蜉之借援自蜾蠃之投機引而進之望不及此竊以古靈之藁莫非名臣温公之門類多君子惟相知不在肝鬲之表故一見盡得眉睫之間信公道之主盟乃人材之司命如某者拊缶不韵挈缾無竒遇會意之文時擬景福靈光之賦求安心之法日對布衾陋室之銘羞褦襶以不為任揶揄而弗顧正請老農之學忽求病甓之師抵掌而談古今千嵗可坐致也屈指而計日月期年尚竊遲之豈期夜雨之燈忽入春風之筆先鞭方著歸衮難留􅅽埃風而上征殿奔雖後過屠門而大嚼知味已多倘自兹或尋覆蕉之縁則其他可乗破竹之勢造物所相終身焉依兹盖伏遇某官列㦸名家褰帷膚使抱王覇之略前身江左之夷吾主人物之評後世汝南之許劭障末流於既倒牖晚學於方来淑氣一嘘韶華四滿猶謂踈枝冷蘂有未放之寒梅縱令換葉移根亦舊栽之紅藥軒昻露剡特達知音某敢不恪守官箴勉求師説四方逐東野自今有入道之門一瓣為南豐何日是報恩之地謝費提刑薦啟光近繡衣久跂八鸞之末褒榮華衮忽開三鱣之先一舉軒然斯文幸甚某嘗觀種樹之傳因得論花之評香出汚泥濓溪之愛蓮未為過影橫籬落和靖之好梅正自佳其或合小樊水僊而為弟兄以至集海棠酴醿而與賔客雖非同調還許聫芳如某者狷有弗為懦知自立收心學問不過乗欵叚而稱善人抗志功名未免帶櫑具而見公子来習青青之佩得依皇皇之華曲為吾道之主盟不以衆人而見遇念瀕於滿盍寵其歸飛一鶚於霄漢之邊送乗鴈於江湖之上俾之末綴假以先容兹盖伏遇某官功過于張材如房杜轉移風俗力可以回萬牛主張人材言足以重九鼎滋蘭荃而方茂擷芹茆以尤勤遂令孤枿之㣲亦殿羣英之後某敢不篤於信道期以酬恩誦醉時歌寧歎廣文之冷作進學解尚觀宰相之方過此以還未知所措謝鞏都大薦啟虎䑕不齊幾多屬吏熊魚兼得獨一門生異哉知己之深榮矣終身之託嘗觀古人推賢之道因得君子引類之心仁傑之舉柬之屢稱為宰相之噐蕭何之薦韓信數謂有大將之材言不厭多用然後已每嘆此風之寖逺不圖今日之猶存如某者直是孤寒甘從獨冷過辱諸公之遇特開寸進之途着從事之衫固知有分給尚書之札猶嘆無因忽聞一鶚之飛復許六鼇之掣俾得與政事文學之秀者早及英華精鋭而用之兹盖伏遇某官範世清規鑄人妙學以修明公道自任如日行天以涵育人材為心如川赴海最憐氷底之芹藻屢采水邊之芷荃始終三年盻睐一意某敢不力守狂狷之行多讀聖賢之書陳古靈䟽名以聞未知所報趙韓王綴奏而進更大其成國士自期墨卿莫究回鄱陽張宰啟閲千佛之經升沉有異作同官之記先後無多分桃李之餘隂動茆芹之生意恭惟某官氣摩霄漢手摘星辰過秦論以來復見作者諭蜀檄而下盖優為之蜚聲翰墨之塲抗志功名之會凛凛胸中之兵甲堂堂眼底之金湯八面當鋒一身是胆張睢陽之罵賊誰解秋圍劉幷州之卻胡竟成宵遁勳當居最賞未酬勞收鶴唳之餘聲躡飛鳬之雋武未施於事已信其能三異政成沸弦歌於東楚十行詔下鏘環珮於西崑某一第八年重親寸禄睨健翮於扶摇之上抱寒根於寂寞之濵忽得年盟好為道地有酒沽我不須問識事之竒退食自公政可説從軍之樂通交代林教授啟才名方册之間願從而後交好珮衿之地偶在其前糠粃包羞藻芹增氣恭惟某官學傳伊洛文過晁張橫絶銀河織天孫之雲錦倒翻滄海弄明月之驪珠妙舍選之青錢高臚傳之淡墨欲培所養靡疾其驅乃睠楚東庠序之林實為江左衣冠之藪一關隔市俗客不来雙塔照湖偉人間出宜得胡安定之宿望以修范文正之遺規螺觜地清聊對簷花之雨螭頭天近即迎御栁之香某喜共儒門愧妨賢路徑腹之嘲未解刀頭之夢頻驚遺君子以桃李之場逝將去此納諸生於芝蘭之室尚亟圖之生日回學職啟乾策年華方驚去速土圭日景又欲添長雖無蜕鶴之姿僅有聞鷄之志辱高懐之期許迂雋歩以臨存出㓜婦受辛之辭推老人甲子之數絳紗幃底欠度曲之雪児青玉案邊付誦詩之驥子其為感佩未易名言謝黃留守科目啟分教三年受察詩書之帥去官數月登名文學之科貌無地以先容恍自天而下墜得公借重舉世知榮竊以古人以文表見者盖多後世隨手澌滅者皆是作毛頴傳猶謂類俳續春秋經或譏失僭要得宗工之印可始成後進之聲名伏念某嗜古忘餐愛竒成癖有歐陽必同歐陽之説期之千百年之餘非子雲莫好子雲之書豈以一二人而輟未離翰墨之徑遂墮虀鹽之場患在為師教因知困謝江郊之陳跡臨京國之迷津吾黨雖狂誰門可叩遽辱收千金之敝帚奚啻獲一壺於中流機會之来神明所相兹盖恭遇某官日光玉潔山立時行著書立言襲六為七而無媿解疑辨惑問一得三而有餘發先儒之所未傳使後覺之有定郷頃東㳺而納謁因北面以知歸見若平生期諸宴歳不謂久違於矩範乃䝉肯記其姓名雖無子固之文亦應温公之格某敢不益彊所學期放厥辭日近長安喜聽衮歸之詔雲趨材舘終歸鈞播之功宗教謝廟堂啟虀鹽有分未寒侯頖之盟槖籥無私仍玷宗庠之選寸進當安於常分一命皆出於至恩拊已包羞逢時知幸竊以東平為善之最樂河間大雅之不羣由其得涵養學問之源所以忘生長富貴之習欲陶成於公族必鑒擇於師儒如某者久坐文窮難醫書癖頭顱如許敢謂絣䌟有封侯之方面目可憎自知管城非食肉之相末第坐踰於一紀冷官僅了於三年畫餅可觀炊沙不飽靖念皇極無棄人之法况當太平樂與賢之秋歸誠光範之門妄意翹材之館惟愛人之以德故應物之無心謂其嘗在文學之科可使徃分屬籍之教資格雖慚於黃甲姓名猶託於青氊磨鐡硯以為期徒抱益堅之志垂玉衡而在上莫名平施之功兹盖恭遇某官德享天心功在王室綱維萬化國有關雎麟趾之風羽翼羣經人由中庸大學之道力任斯文之重妙裁吾黨之狂權度無差斗筲不棄某敢不篤於潔已思以淑人遅𤓰戌於八年之餘疇能縮地速化工於一息之頃尚覬迴天捧戴惟深栞摩罔既謝荘中書舉自代啟禁路問津首玷十科之選詞垣正席仍推三字之儲賞音愈久而愈深推轂不進則不已感由心刻聲與淚俱竊以東坡免試而薦伯修南豐初除而舉貢父是賔是主無古無今如某者鐡硯僅存金桴何有少未聞道徒寄榮華於飄風之中晚悟作文頗見涯涘於霜降之後抑而為説難孤憤放而為牢愁反騷是特不平之鳴殆非有用之學胡傑出於一佛俾同升於諸公舍旃舍旃茍亦無然雖讒波之可畏類我類我久則肖矣終恩地之有歸對黃茅白葦之秋光借紅藥蒼苔之春色聞風甚偉學歩良難兹盖恭遇某官道徳宗師文章宿老紫薇閣靜一揮贊普之書白玉堂深屢草河凉之詔每謂絲綸之手要須錦繡之胷豈無他人正在我軰為命得裨諶子産顧不偉與稽首遜殳斨伯與亦幾過矣某敢不彈冠而起執筆而從醜婦效顰詎作金屋人家之想癡児説夢尚追鈞天帝所之游銘德惟勤抒詞莫既謝廟堂啟雷霆震叠正切省循日月清明遂叨􅋞拭轉化功其有力戴恩紀乎無涯竊以剥復相乗者隂陽之機生育不窮者天地之德蠖信於屈沍寒之氣回春苗稿而興大旱之雲為雨凢物皆爾於人亦然如某者魏瓠中枵晉錐外鈍生涯牢落初無郭外之田學術荒踈僅餘牀頭之易或喜其有山林之氣或疑其非邊幅之材竟坐五窮難逃百謫大為世僇方無地以容身過重親憂遽終天而抱痛所欠一死不圖更生緇衣之宜又改為兮端出中心之好白圭之玷尚可磨也大明前事之愆復俾臨民免為棄物兹盖恭遇某官身任四海九州之重道為五帝三王之師排斡黃河回天下不能回之勢涵渟滄海受敵已所難受之言趙韓王開國之元勳文潞公服人之厚德相去幾世合為一人乃若以春秋為䋲世之權以皇極為用人之法平心而運公是以昭脱諸千仭之淵示以九逹之路虎豹啄下人些知莫扼於九關鸞皇為先戒兮願早施於八翼大造所及終身焉依謝廟堂差幹官啟公朝天大甫開荆棘之塗邊閫地雄遽綴芙蓉之幕驚魂復返感涕交流盖嘗絶大江而東遊倚長淮而北望雖有可乗之幾㑹未知一定之規摹茍於偏安殆非孔明公瑾之志急於進取未免蔡謨羲之之憂雖堅忍可與成功而審量最為上策首擊尾應尾擊首應要莫測於吾謀我出彼歸彼出我歸使常牽於後顧縱未大慰乎元黃之篚亦可坐弭乎赤白之嚢責在元戎亦資緩畫如某者交無狗監泣有牛衣滄浪濯纓早嘆鬢毛之颯大行倚劍斗驚髀肉之盈居紛紛其離尤分落落乎難合化功一轉生意頓回朝刋黜籍之丹暮剡辟函之墨拔從九地置在重霄巴西此日之放麑可謂仁矣塞北向来之失馬詎非福耶矧去家無千里之遙而望禄特半年之近生成至此稱塞謂何恭惟某官以社稷臣為帝王佐十年生聚十年教訓坐凝更化之勲一嵗力役一嵗戍屯深軫佳兵之慮惟奠安中國以為急斯鎮撫四夷而有餘既素定於廟謨尤不輕於邊鎖大先謀帥細及簡僚遂令守𤣥尚白之蹤亦在依紅泛緑之數某敢不痛心前轍加意後鞭不徒丐升斗以養親庶幾展尺寸以圖報平定安集况曽讀建武天子之詔書踴躍懽呼所願草頡利可汗之露布歸依大造誓畢餘生平齋集巻二十四
