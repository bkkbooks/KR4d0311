  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0311_WYG_002-1a, image: WYG1175/WYG1175-0141a.png}
body:
  text: 平齋集卷二宋洪咨䕫撰講義隨元亨利貞旡咎臣聞隨者從也從之義無不該人之從乎我與我之從乎人皆從也而隨以我之所從為重外卦兌内卦震震動而兌說一念動於中隨所感而說隨之得所從則有大亨之理然動說成體易於轉移惟利乎貞則可以保其終之无咎况人君宅民物之上一言而萬里響應一動而群黎風偃致亨之大有不難者特懼乎所從不得其正耳從乎天理正也而從人欲從乎人心正也而從已私賢人君子之從正也而從佞人忠言嘉謨之從正也而從讒說儒生學士之從正也而從宦官女子從非其正咎能免乎穆姜謂有四德隨而无咎似識此意其以隨元亨利貞同乾德之備非彖意也彖曰隨剛來而下柔動而說隨大亨正无咎而天下隨時隨時之義大矣哉臣聞易以上下无常剛柔相易成卦乾上九之剛來於坤二隂之下為震而上卦則兑動於内而說於外也盖隨自否來方否之時三陽位於上三隂位於下天地不交而萬物不通何隨之有隨之為卦上下接而隂陽交故其動也臣言可從則說而從乎臣民欲可從則說而從乎民剛下於柔不惟已之狥也惟不狥乎已之私是以否之塞轉而為隨之通大亨且正終保其无咎而與天下相安於時措之宜羲農黄帝堯舜氏十三卦之制作與夫子丑寅之建忠質文之尚析因夷隩作訛成易之序莫非與時而偕行上無戾乎天運下無咈乎人心其義至大而不可窮皆剛來下柔轉否為隨之功也茍徒恃一已之剛而不明下柔之義勢尊則亢氣盛則驕君子之言日踈小民之情日戾猶不免於無民無輔又安保隨之不為否乎象曰澤中有雷隨君子以嚮晦入宴息臣聞静極而動動極而静造化自然之理也雷動於春夏今潛伏於澤之中兑為澤正秋之時也雷収聲於正秋亦維當静之時隨時而安於静且以養夫動也雷不養動於静無以出地而奮豫君子不養動於静無以體天而行徤龍蛇之蟄以存身豈徒蟄哉故朝以聽政晝以訪問夜以安身莫非惟時之隨使不安其身於夜神過役則易竭朝聽晝訪烏能無憊是以嚮晦必入處於内而宴息息盖作之機生之本也夜氣存于至静之中湛然其清淵然其明渾然與太極同體嚮晦所養若此凡旦晝所以泛應酬酢各中乎理而用之不窮者皆此其出也彼沈湎於長夜宴安於袵席安知瞬息存養之義初九官有渝貞吉出門交有功象曰官有渝從正吉也出門交有功不失也臣聞隨以剛來下柔成卦重在初九初隨之始也所隨邪正是非當嚴之於始夫耳目之官不思而蔽於物心之官則思人之一身耳司聰目司明以至口鼻體莫不各有所司心則綂之君子治身之道當先治其心盖此心不難於應事物之常而難於接事物之變境變於前感物而動官失其守遂與俱移能於紛至㳫來之變操之常得其正則吉矣然必出門而交乃能有功出門即出門同人之義交於事物無親暱係吝之私也一私不立與天下為公則既吉而且有功豈非所交不失其正與彼謂不見可欲使心不亂是必死灰槁木而後可其何以定而應寂然不動感而遂通天下之故感而通天下之故而寂然不動者常自若能如是則見可欲而心不亂然後可與論從正不失之義六二係小子失丈夫象曰係小子弗兼與也臣聞理無兩立心無兩用人無兩從隨以得所從為吉六二以隂從陽初九陽之㣲為小子九五陽之盛為丈夫小子剽輕而無逺慮丈夫靜重而有深識吾心所係茍屬於在下之小子則必失在上之丈夫所與豈能兼哉大抵中人之性趋下易趋上難小子狎而親便嬖善柔如以石投水丈夫敬而踈直諒多聞如以水投石言焉舍忠而從佞事焉舍是而從非行焉舍正而從邪得於此則失於彼曽不自覺也六二隂柔牽於多愛故設此戒以勸擇善板詩刺厲王失道老夫灌灌然輸其忱欵而不見聽小子則蹻蹻然得志而驕所從可不謹乎六三係丈夫失小子隨有求得利居貞象曰係丈夫志舍下也臣聞同是心也操舍有存亡善利有舜跖一念之發所由分也故人心惟危六二本居中得正係乃在於小子六三本不中不正係乃在於丈夫克念罔念之間狂聖易位此心界限惡可不嚴哉吾之所係既能舍邪而從正舍非而從是則無求不獲人之善皆我之善也而猶以居貞為利不正則雖擇善而從不能固執何益哉然所係得失當觀之立志之初趨向髙明則上從趨向卑汚則下從三欲舍卑汚而進髙明宜不為小子屈也君道亦然志在於下則係孟明而失蹇叔係商鞅而失甘龍係林甫而失九齡係盧把而失陸贄天下以之而亂六二六三兩爻政相反玩易者可以類推而知所擇矣九四隨有獲貞凶有孚在道以明何咎象曰隨有獲其義凶也有孚在道明功也臣聞仁者先難而後獲初未嘗有獲心詭遇一朝而獲十則有心於獲者也人臣之患莫大乎有心於獲獲心一萌則髙者狥名卑者逐利一念外騖曽莫知返功與道始判而為二臯䕫稷契伊傅周召道行而功自存乎其中管晏求功於道之外而功亦冺矣九四以陽剛之材居近君之位動於中而說於外其心所隨惟在於獲急淺功近利之計昧至正大公之趣貞固守此宜其凶也是必順天命本人心以輔治而行其所無事惟知有道不知有功一忱所存終始無間則功自道出昭然大明於天下皆歸於仁義禮樂之中皥皥乎其不自知尚何咎之有夫子之得邦家立之斯立道之斯行綏之斯來動之斯和足以盡此董仲舒謂仁人正其誼不謀其利明其道不計其功足以知此九五孚于嘉吉象曰孚于嘉吉位正中也臣聞嘉者善也九五居中得正之君在隨之時以說為體聲色玩好一無動乎其中而惟善之從言必善言動必善行發必善政用必善士其推之四海散之兩間良心善性之感發祥風膏雨之露被何往而非嘉哉然其要在孚孚者出於中心之實而非偽表裏相應終始相續以不二不息之心而從乎善㫁㫁乎有諸已之信以極乎充實之美輝光之大而進乎聖神之域吉孰大焉茍惟矯揉於十手十目之地而放於宮庭之淵邃勉強於一朝一夕之頃而怠於歲月之悠久秉於中者非實意飾於外者皆偽為善轉而惡吉亦轉而凶一念之孚不孚其意盖不爽也象以位正中為言盖有是位不可無是德九五之位既正且中而德之正中又能㑹萬善於一已位斯稱矣是知居天下之廣居立天下之正位必行天下之大道上六拘係之乃從維之王用亨於西山象曰拘係之上窮也臣聞民至愚而神可以心感不可以力刼可以道御不可以智籠隨之上六人心恱從有所不容釋此非智力所能及也太王居邠廹於狄不忍以養人者害人而去之民相與遮前擁後力攀強挽惟恐仁人之舍去既拘係之又從而維之與詩白駒之留賢者縶之維之同意民之㽞太王者若此太王終不為之㽞而從者如歸市有人斯有土故用之享于西山周家八百年之建於是乎肇迹矣象以拘係之為上窮盖上處隨之極髙而無位太王為狄所廹失位而去至于拘係之不可留遂邑於岐山之下豈非隨之窮乎易道窮必變窮上返下宜有亨之理也然則人心之所去秦雖刼之而不能止人心之所趋周雖逃之而不能郤有天下者可不深求撫后虐讎之義而思所以固結斯民之心哉平齋集卷二
