body:
  text: 平齋集巻三十二宋洪咨䕫撰祭文祭俞侍郎文中興倫魁舄奕顯融頴出天京横浦與公公殖其學裏腴表豐井養厥德用汲不窮匪矯為崖春陽茸茸温作之厲飛霆駕風匪阻為巇晴波溶溶平激之躍驚濤矗空肆為文章奫淪舂容麾屈軋宋轢遷軼雄發造化籥為世廸䝉萬象旉與與天為功再入西掖筆老逾工鼔舞八極渾噩嫓隆矧拘勁節志為志帥翼如㝠鴻碧落無際有氷其山衆倚而睨有蜜其刅衆嗜而嚌公乎閑閑表立一世巻舌方棘獨犯其鋭岸不受馴嗾獒以噬采荼羅山其甘勝薺大明中天攘屏霾曀帝趣公歸不奪彌勵胡為孤憤菀結惉懘任重道逺竟死𢎞毅翦焉諸生淑艾一蓺中流失楫夫誰與濟丹旐悠悠遮道哭酹匪私之悲邦國殄瘁龍州新建武侯祠堂祭文三綱五常之理與卑高俱陳其斁也時其存也人周衰吾夫子作春秋書盜書叛一辭不貰而亂臣賊子懼公以賊名魏迄能倡天下之大義扶天下之大倫此聖賢所以有功於人極而百世其仁也夫以公之功在天下仁在後世豈蜀得而私之蜀之薦紳大夫父兄子弟維公之訓用能不為鬼蜮之魏而為漢宜其德公之深歴千百祀而常新䕫巫以東瀘黔以南岷峨以西劍棧以北莫不家社而戸稷嘗秋而禴春江油獨無公祠而祠鄧艾是知敓攘之盗而不知慕鞠復之親知用物精多之為厲不知正直聰明之謂神方艾縋兵無人之境行險僥倖特乘漢運之屯耳魏為漢賊晉為魏賊三尺童子皆知之艾顧嗾昭挾魏以蹙漢漢亡而魏亦亡天彛冺矣小有材未聞君子之大道適足以殺其身安能禍福爾民哉某始至毁艾祠垂去祠公於遺址之西而丹青之背甲而腹壬羽扇而綸巾魚復彌牟之八陣龍騰虎躍左揖右拱可駭可愕而不可馴於以鑰疑牖蔽勸不二心之臣栢溪奫淪玉平嶙峋公兮來妥椒馨醑醇祭莊侍郎文嗚呼三代而下何其正且大之難耶西都之士如洞庭彭蠡滙衆川以為容非不大也未見砥柱千仞截齧乎頽瀾東都之士如峨眉太白㧞地而峭立可謂正矣所少者吞雲夢苦八九之寛公造萬里之根極含一真之胚腪道大學而中庸文五誥而三盤望之閑閑炙之温温扣之盤盤風停水止渺不知其孰倪孰端及義形於色凛不可干則孤峰絶㟁坐睨乎横决而崩奔大而不失之靡正而不流於隘盖三代人物之遺也奚兩都之足論去玉堂其歸乎搴芙蓉而飲蘭歘帝所之謂來徑御風而不還功在斯文名在太史於公乎何憾寛兮綽兮瑟兮僴兮其如四海善類思君子之不可諼某出入函丈十五暑寒毎進而誨之必曰敬立而内直義行而外方然後可以闖聖賢之門忽梁木之告壞撫張紳其永歎遡秋風而一酹誰與作於九原祭程廷邁文嗚呼廷邁君坤之垠我巽之漘氣貫脉應傾盖忘新泛東津之月􅂿西岑之雲盡日乎酴醿芍藥之春相瑩以虚相熙以真上下數千祀之論議沉着痛快眉一伸而百顰是何貎之臞而精神之敷與言之温而肝膽之輪囷信抱負之不凢繅蒼璧其純綸見乎文采政理者特臯蘭之餘芳山風吹衣馬首劃分胥命維何禁栁壓闉無何我斥而君已招䰟大江之濆嗚呼人之生也氣日至而滋息其盈也氣日反而游散皆不離乎隂陽徃來而屈伸伸而為物屈而為變魂升魄落既化而無有矣根於理而日生者固浩然與天地而長存况君定静而明明清而凝宜與根於理而日生者相為無窮乗雲御飈横八極而戞九旻杳銘旌兮西還嘻有子兮應門寄一酹於江風眇離索其酸辛祭鄒都大文中興百年人物雲蒸大江之東以氣骨稱宫亭彭蠡藍田昆丘公於其間琅玕天球純明而剛平直而方落華取實錦衣褧裳力囘萬牛氣凌三軍宴坐觀來堅壁挫紛奔鯨蕩海奔濤矗空干艘辟易獨抗逆風雷電晦㝠刦火漲天萬瓦俱破浮屠屹然見危致命衆雌我雄在蹇六二王臣匪躬上功莫府我醒衆酣勞而不伐應謙九三蜀控遼夏人為金湯探囊取槖神旗央央潼關函谷秋風扇腥籌筆未試前軍墮星矍鑠如援能飯如頗一朝至斯於理則那巴秦父老齎咨同詞東南諸生矧公所竒矩度在目誨言在紳一酹寄悲天乎不仁靈澤侯生日祭文龍州惟神炳山川之靈司一方之命不知其幾祀矣誕彌厥月秋以為期民猶生事之欲神之福民無窮也某敢為民奉觴上萬有千歲之夀老人祭疇甫文嗚呼天目之陽翼翼鱗鱗道同味合吾三數人溪光澹暮野芳炫春孰賦不旅疇觴不賔老瓦逓肘柴車共巾山中之樂白頭一真年過六十氣壯意新期之歲寒開我胷陳君遽舎我如蚤脱輪我不見君如釣失緡村南村北梅笑栁顰扶笻出門誰與問津嗟彼有司賤玉貴珉老死不售連城之珍此在疇甫逹觀屈伸而我所悲殘星向晨銘旌飄摇寳華輪菌斗酒隻鷄遮道酸辛鍾惠叔哀辭并序惠叔臨安人諱應僑與予内同母余仲女其子阜婦也君蚤敏悟絶人讀書日千言場屋屢見頭角氣盛志勇風進颿駛得前輩格言題滿屋壁坐卧與對伊洛諸老書多隐括為歌詩時時自諷詠以苦志得竒疾毎發輙神游六虛驂轡鸞鵠與浮丘安期相後先寤則索酒酣飲耳熱浩歌吸呼月露以盪胷中之峥嶸幾豪矣而操行純白與人交無貴賤皆盡情奉重闈惟恐少嬰其和喪母過哀悴以死年止四十有五吾黨共惜之余敗官寄廬西㕓與君周旋作暖熱至未幾君舎之去可勝欷哉葬有日為賦哀辭相柩繂且以塞余内余女之悲其詞曰凢託形於溟涬兮藐起滅於一漚前乎名世之既徃兮後方來而未休來者不我接兮往者不我留譬草木茍吾臭味兮攬而袪以寫憂便儇嶔􅥤之紛前兮巋斯人之好修凝乎其觚而不堅兮澹乎其靚而不浮素忠信以為絢兮粻詩書以為羞索珊瑚於海若兮采夜光於昆丘黙會心其躍如兮獨起舞而長謳樂得朋而講習兮甕未蛆其已􅀢暖澗兮泉瀏凄巘兮雲幽松矯矯兮雪明栁濯濯兮烟柔君其蘭亭竹溪人物之儔耶胡思􅤕神放而莫收若士聳身八景之上兮禦㓂冷風而跨九州排赫羲與超摇挾鴻濛與夷猶頫人寰而隘之不啻蟻蛵蜂牗蠛蠓而蜉蝣也徑御母於少廣之庭謁帝於碧瑶之樓世之夀者未必薫兮夭者未必蕕蒹葭老於霜露兮胡梧桐之不能秋豈䰟氣聚散之靡常兮聽推遷而斡留抑百鬼常瞰乎高明兮三彭甘心乎爾仇不然萬物芸芸各歸其根兮蹇彼蒼尚奚尤薄寒兮梅窩嫩凉兮荷洲佇立以望兮君不來有酒不樂兮謂我何求嗚呼天乎何奪吾良之亟兮孰論心乎白頭祭孫漢州文嗚呼君宣我杭共此天目竹西定交日稔月熟清不失和惠濟以肅韞抱國器涵停民福越在庚辰太少擇牧旅鶴與琴萬里追逐曉鼓齊發暮燈分宿短髪相扶蘆花映燭風恬日舒前山迎緑推蓬唤酌爛熳魚蔌雲變風怒雪浪翻屋更呼遞號投岸挿舳瞿唐灔澦奔濁飛鏃舟失毫釐蛟齶鼉腹巾子桂林峭磴危矗牽車青𡨕於菟起伏脱險趨曠秀水佳竹交口勞苦挈命博禄頻年過從分誼骨肉綢繆勸酬低鬟度曲我守江油君倅綿谷相望幾驛靡善不告莫府奏功菊坡解蜀我踵而東君薦華轂風㮣絶世等視榮辱尉薦寂寥駢函絫幅政平如水行粹如玉謂壽而臧胡奪之速皦皦召汚落落起讟人不勝天天定斯復江飈有靈稳送歸鵠所不滿君早訪松菊西望敬亭設位慟哭平生故人安得正叔嗚呼哀哉諸父堂祭妣徐夫人文嗚呼哀哉吾父早孤獨當門戸渺然世業危如一縷所賴恊濟其不及以相其成惟有吾母中寛而外和上順而下撫螽斯之德薰浹於閨門鳲鳩之愛均壹於兒女諸兒既及成人相與扶植以不墜祖父之緒則母訓之故也年過八十曽孫如堵含飴戲綵婆娑笑語盖一身之所關實衆福之攸聚尚安享於期頥胡奄成於千古嗚呼哀哉風木不停駒隙易度垂畢素冠三年之喪不忍靈車一日之去恍音容其在堂䬃丹旐其欲舉一酹號攀終天悲慕嗚呼哀哉嗚呼痛哉老人祭亡㛐阮氏文嗚呼吾父在時德厚福全三子七孫競爽滿前婦姑妯娌肅然懽然門無哭聲二三十年吾父既喪仍歲憂苦首哭吾妻繼哭吾母若弟若兄俱淪千古諸猶子中亦不堪數特有㛐氏為家典刑粹言懿行蘭椒其馨歲時上夀疊綵照庭環數百指藹如春榮逾七望八亦既備福晚哭冡子遽棄華屋銘旌聨翩子先母續遮道祖酹老淚可掬同日祭百二姪文嗚呼吾與汝父友愛純切記屬纊時握手嗚咽謂令兄弟可惜作别言猶在耳念輙痛絶惟汝克家子姪之傑不有渥洼無此汗血毎見汝來紫髯紅頰如見汝父我心則恱牗宻蜂勞巢成燕怯諱病莫告汲海欲竭修程方開出門軸折母病在牀尋亦永訣吾年寖高晨星孤月何忍見汝母子俱發祖道一巵春甕初醱汝能飲否我懷如割嗚呼哀哉平齋集巻三十二
