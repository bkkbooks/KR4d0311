body:
  text: 平齋集卷十宋洪咨䕫撰策問饒州堂試一問周官有宮正掌王宮之戒禁糾令宮伯掌王宮之士庶子凡在版者皆屬之天官所以嚴宿衛而備非常也漢制周廬千列陛㦸百重視周為加詳光禄勲衛尉之設即宮伯宮正之遺意亦屬之丞相否乎排闥而入大臣隨之内朝外朝之勢猶未至于隔絶加官既設之後大臣亦得至内庭否乎入未央宮殿門不納徘徊往來其禁嚴矣使北軍之印未解則將何以制其變清宮具法駕而入謁者之衛端門且誰何之則夜拜衛将軍無乃猶或置疑其間耶置酒宣室敢於形辟㦸之言從幸林光有以杜觸瑟之變若不當以詼諧覊虜少之而當時議者欲使列侯郡守二千石各擇吏民之賢者嵗貢以給宿衛豈其猶未足為賢耶儒者侍中特聽掌御唾壺朝廷榮之似不足榮也其榮之何説願為中郎出入禁闥而薄淮陽之郡似未可薄也其薄之何意黄門侍郎號為要處彼擢之給事黄門又以為官之落拓何也郡國材官番上宿衛其法果皆便乎南北分屯以相統制其權果孰重乎謁者執楯執㦸武士騶與期門羽林之置亦各有説乎世為衛尉見于同姓而王國人乃不得宿衛何也太傅古官論道經邦而以給事中領宿衛又何也夫以漢世宿衛之嚴防㣲杜漸皆有深意揆之成周其得失安在邇者議臣有請宮禁侍衛各儆攸司欲以隆主威而尊國勢上亟諭之不識漢制有可施於今日者乎諸君博古通今言之無畧二問恭惟主上撫盈成之運垂延洪之休豫建元良以固國本謹擇天下耆儒端士為之輔翼儲德日隆涓剛受册三代有道之長誠不是過自漢以下固不容並論也而有司竊於考古有疑焉四皓之來衣冠甚偉羽翼既成而漢之大本以定子房之畫婉矣論者乃謂其植黨締交以相傾軋殆非子房之意然髙帝與呂后母子共起於艱難之中漢業甫定顧牽於私慾欲動摇之期期之諌曽莫能回其意則權以濟事似不當以植黨論也至觀異日開博望苑以延賔客遂至於虧天性之恩無乃出於招致四皓之故智乎二䟽之去知足不辱有以激漢世亷頑懦立之風亦可謂賢矣而論者謂是時太子年未冠學未成未可以潔身而退然宣帝之教不過雜覇之制道已非詒謀燕翼之道獨親許氏而尊禮師傅之意寖薄見幾而作似不當以潔身論也至考其既去之餘論語孝經之學遂轉於甘泉洞簫賦之好卒無以養成其德得非二䟽遺其憂乎夫齊威㑹諸侯於首止而王世子始定髙宗舊學於甘盤既乃遯於荒野是則四皓之來二䟽之去盖非茍然者而得失是非曽無定論何耶諸君以麟趾之英親逢懿爍自宜鋪張揚厲編之詩書而無愧商訂及此特以觀講學之素耳幸茂明之三問五百歲而聖人出若囿於天地之定數君臣而並父子而處胡為獨盛於帝王之世耶電繞斗樞虹流華渚瑶光貫月赤龍生風其見於世紀者若此質之正符亦過於愛竒矣然履武敏歆天命元鳥降而生商詩人猶且咏歌之不足得非聖人之生固與人異而受命之符抑有在耶夫天生聪明天錫勇智謂之生知之性出類㧞萃可也語怪及神顧安取此至若東南有天子氣南陽有鬰葱之佳氣得非王氣有所屬乎夢神於大澤之陂夢吞日於猗蘭之殿得非精神有所感乎重瞳八彩日角龍顔與夫鳳姿日表之異抑肖貎有不同乎十四月而生乃立堯母門胡為誕彌之月適相似也甲觀畫堂或謂畫九子母于其中果何據也功成慶善之樂何為而作誕聖繼天之樂孰從而獻千秋紀節何所本始節近長春其議安在恭惟主上天縱之聖冠冕千古御籙膺圖重熈累洽屬兹良月瑞慶標辰桂海氷天嵩呼華祝同一心也諸君生逢千一之期目覩五三之盛躋公堂稱兕觥以介萬夀實維其時是宜鋪張對天之宏休與生民天保之詩相為表裏凡自昔帝王震夙之盛事盍相與訂㩁以諗有司四問道揆明於上法守嚴於下則天下之治不難舉矣宅揆之官奮庸熈載三公之職論道經邦古之大臣所以任天下之重曷嘗以細故自累哉漢唐之世九卿更進他官參與已失委任大臣之意而持禄固位伴食模稜尚何望其職業之能盡其間少知治體者抑又不能無疑焉錢榖决獄所宜與聞乃一諉之内史廷尉而不復省事無不統顧如是耶死傷横道豈不大於牛喘而科瑣邊吏僅見於赤白嚢交馳之後恐憂邉思職者不爾也聽受訟獄日不暇給乃至有愧禮樂豈萬世長策未暇講耶序進郎吏仰視不顧則體貎安在而止擇十使猶患未盡得人恐兼収待用者不爾也夫坐而論道謂之三公綱舉目張豈無其要而世之喜事事者乃以身親細務為稱職不事事者又以無所建明為得體漢唐相業之卑得無坐是乎主上更新萬化圖任老成以恢張治功宜日異而月殊可也然天下之弊紛如蝟毛二三大臣夙夜盡瘁於其間而未底厥成故議臣欲清中書之務簡節疎目而講明其大者揆守之辨要必有在至若賢才之未盡舉倖門之未易塞兵聚而難散民困而易摇糓貴尤艱於和糴楮輕尚費於稱提凡此數端莫非當今之急務孰為大臣之職孰為有司之事輕重緩急當與識時務者籌之諸君其毋隠五問兵以多算勝智者察事幾於呼吸之間料敵勢於千里之外發無不中如矢破的何其神也而謀之用舍抑又有幸有不幸焉廣武説成安欲假竒兵絶信耳之輜重而兩将可致淮隂使人間視知其不用然後敢下井陘亦可謂竒策矣使成安果用其計則信将何以應之魏延每隨亮出輙欲請兵異道㑹於潼闗如韓信故事其謀差強人意亮乃制而不用毎歎已才之不獲盡幸而從之不識長安果可入乎信抱國士之畧亮負王佐之才得失勝負燎如觀火隨機而應慮勝而㑹必有非衆人所能窺者幸紬繹之六問三盤五誥之不作而漢制詔幾於典誥得非去古未逺猶有渾灝之遺風耶漢唐有天下皆數百年漢之帝紀詔不一書而唐史略之何耶文帝之詔半為農下山東布詔令老癃扶杖觀聴願觀德化之成可謂善於布宣者矣而當時猶謂吏奉吾詔不勤勸民不明何責吏之深也循良無傳獨一河南抑吏治誠有未至歟憲宗之世藩鎮禀令制下魏博士卒懽動如雷至有倔强何益之嘆可謂易於感動者矣而淮蔡以三州之衆合兵環攻累年乃下何平盜之難也草制失詞致煩改定抑人心亦有未孚歟彼其輪臺之詔奉天之詔均罪已也其辭孰切寛大之詔陣傷之詔均恤人也其惠孰渥河涼三鎮播告之修均所以奪其心也其意孰明視草之才較以除書德音擅名者孰勝期期之請視以批敇壊麻為忠者孰優此猶未足深議也後元獨盛於七制元和並列於三宗號令之煥然可述與温雅有古風烈乃不見於文帝之賛唐之威令幾於復振獨於贊憲宗言之而二祖之制命無稱焉作史者必有深意恭惟主上祗畏天戒勤恤民隠嘉與海内同躋仁夀廼者明詔荐頒飭監司守令以奉職之意開盜賊脅從以自新之途王言大哉一見可决四方萬里鼔舞於風雷之下當不止於山東魏博吏士而已也然澄清者流為姑息撫字者轉為催科習俗移人詎能遽革錢弊久壅而未通榖價方踴而未艾凶歲多暴還定猶難伊欲吏治興起姦盜革心翕然丕應如漢唐之盛時若何而可憂世之士盍相與圖之七問周南為三百篇之始文王修身齊家治國平天下之道悉於此見之亦猶易首乾坤書㫁自唐虞之意與然自闗睢至兎置凡七詩始言關睢之化行又四詩而麟趾始著其應夫王道自閨門祍席而達乎天下逺而難化者宜莫如㭬杙之人近而易化者宜莫如同姓之親今乃不應於彼而應於此何耶羔羊為鵲巢之功致在位皆節儉正直至其應見於騶虞則天下純被文王之化草木群生無一不遂夫召南特諸侯之風其視周南王者之風固為有間彼之應顯於庶類之㣲此獨應於公子信厚無犯非禮而已又何邪詩取麟以為應趾定角果有仁厚之象與抑謂太平致麟之時與序言衰世不知果紂與文王之日與抑謂周之季世歟麟趾鑄金以班諸侯王夫豈無説而良史之作訖于麟其意安在語曰人而不為周南召南其猶正牆面而立有志於學者必三復於此而好修之公子尤當佩之而不㤀反覆二南之意推之於行葦角弓以䆒終始盛衰之變諸君事也其為我索言之八問六經著天道人事之極莫詳於春秋雖不言某事有某應而證應具存其聖人憂世之心所由見乎日食三十六螽蝝蜚蜮之災縂十有八雪電星石隕霜無冰凡其關于天人之際雖㣲必録而水旱之變尤不敢略僖王正月不雨夏四月不雨六月始雨其不曰旱謂其有志於民而不為災然文自正月不雨至於秋七月昭上辛大雩季辛又雩旱亦甚矣而不以旱書無乃亦不為災耶以至夏大旱欲焚巫尫而復止是歲饑而不害然旱以大書為虐尤酷安有民不困於饑者不然則宣亦書大旱而不書饑亦謂其不害可也或書旱或書雩或書不雨美惡異辭必有深意宣大水而繼以饑襄大水而繼以大饑淫潦妨農固宜艱食而威成之秋大水莊之末年横流尤數至鼔用牲於社於門何為皆不以歉告抑豈如七年之水雖無麥苗不害嘉榖故從而略之然大無麥禾臧孫辰遂至告糴貽我來牟獨非嘉殖與亦未有洚水若是而嘉穀不害者威之初年有平原出水之害越二歲而有年其轉凶為豐者何道他國非無乖沴宋獨書水淫雨害於粢盛乃知其必興者何説恭惟主上篤於敬天切於愛民真得堯湯之用心而大兵之後四方未免以水旱告若幾於春秋之不一書者天心仁愛固在是與木饑水毁皆有數與近觀吾饒去歲常暘今兹常雨官無委積民有菜色而或者猶以饒在江東為優得毋旱不為災雨不害榖如魯史之所書與諸君學貫天人不愧舒向盍相與發明春秋筆削之義以諗為政者毋以訐而為直九問人主操富貴之柄以御天下錢幣輕重之權當一出於上不當與天下共之也虞夏金為三品周立九府圜法利權所在上實專之至景王欲更鑄大錢單穆公雖諫而不聽百姓竟䝉其利揆之劉陶之議則不合文帝除盗鑄之令賜鄧通銅山得以自鑄而錢乃至於貫朽質之賈生之論則不然撰直三千錯刀五千何其直之多百錢墊七八與三十五為陌何其陌之寡是猶未足深論彼漢之五銖唐之開元錢制是為得輕重之中然五銖既行郡國多姦鑄而益輕公卿請鑄鍾官赤側以一當五其後二歲赤側以賤而廢三官錢始富矣開元既用以經費不給始鑄乾元重寳參用以一當十犯法日數百終復其舊然後民便之夫錢出於上而散於下上之所重孰得而輕顧方行而遽輟何耶抑上之人不過為一時權宜之舉隨即反經耶否則朝廷之上無以主其議以一人之言為用舍耶漢方再造猶興五銖之思唐凡幾世一循開元之制而赤側重寳不復見抑又何也國家銅楮並行深得子母相權之意頃以楮幣益輕多為秤提之術而未底於重於是以開禧新布以二准三行於輦轂之下利權輕重操之自我可謂得其宜矣或者猶謂貨泉新舊均國寳也而自謂抑揚京城内外皆畿甸也而自謂畛域恐未免抵冐之多然使以二准三果可通行則錢之布於天下者皆可從而増益否幸以利害得諸目擊者為有司告平齋集卷十
