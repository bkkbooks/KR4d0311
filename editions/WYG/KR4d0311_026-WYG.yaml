body:
  text: 平齋集巻二十六宋洪咨䕫撰啓三通李參政啓退思巖之勳名聞從諸老獨樂園之風骨識後群兒惟伯陽實出於洪宜孔融自通於李輙將一瓣仰叩六符竊以武侯未起於草廬熟知成敗晉公雖逸於緑野常佩安危上天非無故而生賢君子盖有待而行道矧今大勢異昔平時朝廷未深察取燕之圖邊鄙或復用攻遼之策國計捉衿而見肘民生剜肉以醫瘡士懷誘鶴之心將有養鷹之志屯棘門屯㶚上視紀律以如無出斜谷出祁山問規模而猶未總使置一勝一負於度外可不計五大五細於目前欝攸煽熖而薄京師熒惑吐芒而犯帝座仰占天意似應人謀朋黨漸萌未免向時一網之慮元良未定豈無異日半紙之憂波方急而維楫莫施證已壞而刀圭安在上深念此公有意乎恭惟某官道德宗師文章宿老太山之雲為雨自有機緘虞淵之日洗光不動聲色方權奸之用事惟明哲以保身幾年出鄴侯以避元載之鋒一旦進弱翁而正霍禹之罪雲霓盡掃宇宙復清五龍夾以飛既展濟時之畧四蛇入其宇初無求世之心耡梅花之月於未春飲木蘭之露於將曉觀渠血指攅我醉眉然救否者莫謹乎苞霜而反剥者亦由乎碩果離當復合危可使平我公有衮衣以歸趣登上相天子負斧扆而立迄濟中興某涉道未深謀身更拙聊爾署冗䘖於紙尾居然託後乘於遨頭矯詹峨眉太白之間知有東坡頴濵者在雖執鞭之晚矣尚捧硯以從之盖欲質平生書囊之疑豈止為方來夾袋之地後天下而樂况曽恊於寅恭安宇内為先願無忘於辰告寸忱所屬百喙奚殫上劉閣學啓駟玉虬以征尚遲牀下之拜騎青牛而過敢後道旁之迎顧斯文千古以無傳而前輩百年之幾見熟窺梗槩粗識源流盖自蜀公以來始有後溪者作其清明則青天白日其高深則太山黄河參古今之典刑具出處之本末權門鼎盛在熙寧自拔於熙寧聖化更張在元祐不黨于元祐以鷄鳴膠膠之志追鴻飛㝠㝠之風去不可留歸猶未老廵梅花而索笑浩若胷中之春樹萱草以忘憂蕭然物外之樂盡醉於田父泥飲之頃相忘於舎者争席之間文章散落於人寰翰墨流傳於夷裔雖有詔以强起曽何心於復來然而一飯不忘乎吾君百方欲濟乎斯世有關廟畫毎以驛聞宗磐未强首陳儲嗣事之十九疏民瘼已亟次及條例司之數千言仗孤忠以直前犯衆怒而不顧亶為仁者之勇兼得聖人之清天下之逹尊三孰如公者國中之儒者一其舎我乎賜劍履以給扶偉衣冠而入侍某遨頭後乘鉗尾冗銜毎思退續離騷之辭何幸親問太𤣥之字觀神和而氣定知目擊而道存自憐孺子倥侗毋惜一編之教更願老親强健亦如三夀之朋敬在下風有如皦日上安宣撫啓魚鳬蠶叢以來形勢千古伏龍鳯雛而後勲業一人朝家西顧以寛憂屬吏東郷而聽令九􅀈夘旗之近三熏子墨之恭竊嘗泛觀古今制敵之機頗識東南立國之勢腹心江浙腰膂荆襄維蜀道之山川如人身之頭目吳合之則可奪曹瞞之氣晉失之則難折阿堅之謀雖太白峩眉四萬八千年始通中國然西陵江都五千七百里莫重上游唇亡則齒必寒首擊而尾自應欲混鼎峙三分之地無如坤維半壁之天恭惟某官抱王佐之材任天下之重乘雲氣騎日月横騖泬寥之天簸鴻䝉扇雷霆獨立汗漫之表以道義養吾之大勇以忠忱運我之壯猷唾怒虎其方拏截奔鯨乎已沛聲子璋之罪血糢糊於髑髏正劉闢之誅刀紛綸於膾脯三綱垂弛以重立四極既摇而復安逮黑谷之繹騷重緑林之俶擾病逢壞症碁入危機人寒心而莫支公攬涕而又起矛驅海若障漢沔之頽瀾甲洗天河歛殽函之妖祲威行夷夏功塞堪輿盍歸上相之班猶坐元戎之帳以西土之方靖宜東人之欲留不惟後勁以中權要使左饘而右粥勃律天西之野春草犢肥蓬姿雪外之城秋風馬卧惟梁益無鳴弓之警則荆揚享奠枕之安紀社稷之元勲申山河之信誓微管仲其左祍矣夙髙耆定之謀歸周公以衮衣兮佇翼昇平之運某暫洿班尾即趂遨頭顧治中之非長置員外而奚益惟大莫府推赤心而聽計而小朝廷開青眼以延才甘􅂿羊腸願詹馬首出師一表既於伊訓說命而有光皇武兩詩當視吉日崧高而無愧委心歸倚拜首敷陳添倅到任謝廟堂啓東望日邊迷前塵於班尾西來雪外陪後乘於遨頭轍行地以雖遥梯倚天而實近作平生不到之夢出造化非常之恩伏念某文字蟲魚姓名蟣蝨偪仄何偪仄定非湖海之豪伊優自伊優粗有山林之氣襲子長南遊之遺蹟放少陵北征之壯懷捩淮柂以方休掛江帆而又去石頭牛渚六朝名勝之如存夏口烏林三國英雄之安在木葉秋飛於楚些竹枝寒送於巴歌毎渺渺以凝思還逢逢而催發灘周十二涪之上路遶百八盤之間鹿角狼牙旋渦正沸虎鬚龍脊激浪欲飛電驚鮓甕之谽谺雷吼業牀之噴薄寄性命於一篾蕩神魂於兩橈可謂人生之畏塗然亦天下之偉觀三峽矗井絡而上動摇星辰一川飜月窟而來倒傾河漢屏巫山於絶岸柱灧澦於中流峭立百牢之關横陳八陣之蹟脚力未窮於涪萬目光已射於岷峨萬里橋邊啁哳估船之曉百花潭上喧呼藥市之春以治中别駕之冗員追方外司馬之樂事徑行所到躐取已多進可賡王褒益州之詩退可續太冲蜀都之賦匪私鈞播疇與玉成兹盖恭遇某官道大而有容功高而不伐謂紫雲樓之議論在安細民而天章閣之條陳務去宿弊咄坤軸之萬里邈君門之九重碩䑕多貪小鮮易擾既擇蕃宣之雅望又收關决之駑材俾笏而魚隨琴與鶴惟民愁之既劇且兵調之方殷衛公籌邊之圖必精思而制勝武侯出師之表非快意以邀功要當為根本之謀乃可固藩籬之勢勉毗鎮撫期答生成一弛一張知妙得濟時之畧五細五大願早施醫國之功言非所宜死有餘罪通成都倅啓手弄參旗快治中之展驥眼穿危棧容員外之題輿凄其一葉之來幸甚萬間之託恭惟某官儲岷巫之秀傳坡頴之源天孫雲漢之分軒軒傑作巨靈太華之擘矯矯竒材藏諸用而不窮隨所施而可紀盍陟道山之峻猶迂錦水之遥泥軾生光油幢倚重浣花勝踐聊接武於遨頭視草新除便問津於龍尾某淮城久戍蜀道遐征雖云裂風月而三之不過旅琴龜之一耳古心而又古貌自信獨難異人而得異書相從未晚囘節推袖啓殿上呼盧之䜟早動諸公幕中倚馬之材肯交餘子接茵已幸衘袂何謙恭惟某官琅琅國子監之書爛爛蓬萊宫之賦一通脱手萬乘改容杜書記在其下風嚴少尹置諸上客如石投水猶珠生淵指籌邊之兩圖平章蠻徼草出師之一表號召秦關搴盡芙蓉之花遂翻芍藥之影某幾年心敬一日眼明略窺小陸之文已識大任之韞屋頭問訊欣鷄犬之相聞劍外征行恨燕鴻之相避囘僉判袖啓星槎仙客忽來笙鶴之聲雪錦主人益壯琴龜之氣辱在聨事願言定交恭惟某官賀白材名晁黄文采集芙蓉之裳而修初服不着一塵卧蓮葉之舟而讀玉書平吞八極屢試發硎之刅難藏露頴之錐宣閫㧞尤戎垣借重落筆於龍筋鳯髓之上寄興乎魚泳鳥飛之間姑賛籌邊即登天禄某遠趨幕底近接牆隂合簮甫挹於清標攬袂首勤於好語手遮西日曷圖横草之功脚􅂿東風當共浣花之樂龍州到任謝廟堂啓萬里橋邊甫解佐州之組百牢關裏忽分䕶塞之符名未登聖天子之御屏身已入真宰相之夾袋夢想不到頂踵有歸伏念某氷霰窮厓風濤苦海藐爾幾年之流落軒然一旦之遭逢補太廟齋即入扣天田之角與京官通判出捫雲棧之參了無關决之長惟佩丁寧之訓一來錦水四度劍門雖弗陪大幕府之賔猶自詭老元戎之客其於徇國靡忘愚公移山之心所謂籌邊但進彭祖觀井之法偶畢葵丘之戍方謀栗里之歸不圖寒根遽動春意兹盖恭遇某官胷中水鏡筆下化爐有猷有為有守則念之得箕子建極之意乃牧乃事乃凖惟后矣循周公立政之規凢諸老退而無營暨衆正用之未盡大為坯冶悉入蒐羅上關豐芑數世之仁下應㤗茅三陽之象為今元祐嗣昔淳熙矧墮甑之餘生乃播鈞之舊物亟令剖竹靡俟需𤓰厯吉日以問塗遡下風而委命丹心許國敢矜畵㦸之榮白髪倚門苐想綵衣之樂兩全命誼一出生成謝制置崔閣學啓目送飛雲欲問吳頭之路手遮落日忽過蜀尾之關告赤崖父老以天子之聖仁諭青羗種族以元戎之威信凢束衿而聽令皆彈指以知恩伏念某危機熏心老色上靣拍銅㪷而舞角鋭之習已空摩石鼓而歌嗜竒之癖猶在惟鷽鳩不能以自奮故駏蛩有待而後行追隨一琴䟦履䨇劍草左將軍之檄雖未愈於頭風誦崔大夫之詩亦能驅於瘧鬼滿宜去矣行復尼之走絶棧之危途訪縋兵之間道邦人嗟異昔無朝士之來山獠傳呼今見莫賔之出樂郊至止道院蕭然長笑而萬壑譍獨立而千章拱真成吏隠何有官癡兹盖恭遇某官心與造物者遊身任天下之重以彊國勢為定三秦之根本以收人才為用四蜀之規模乘鴈雖多前魚未棄始平辟司馬以丞郡其事略同小范挾師魯以行邊所期更逺故雖公斯世而稱物未免私其人而擇官矜此踈庸置之簡静俾於撫字催科之暇而求切磋琢磨之功為君子儒從先生後類我類我久則肖敢忘函席之規式微式微胡不歸尚慰倚門之望請事斯語有如大江囘生日啓年華垂暮久矣倦遊月紀就盈依然初度影留積雪之表心在飛雲之邊何勤記存特枉慶問夸詡斑衣之樂鋪張黄絹之辭義重同寅情深泛愛贈之秋菊知欲制於頽齡歌以木桃尚無忘於永好平齋集巻二十六
