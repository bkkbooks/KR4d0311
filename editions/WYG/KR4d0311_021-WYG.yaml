body:
  text: 平齋集巻二十一宋洪咨䕫撰外制魏了翁除權禮部尚書兼直學士院兼侍讀制勑秩宗之典三禮虞凝垂拱之功春官之掌九儀周格盈成之治繄制作之自古必推行之在人進我鴻儒膺兹妙選具官某氣以志為帥學以經為宗賈誼六太息之書洞達國體魏徵十不終之䟽仰當帝心梧桐方挺於朝陽蒹葭已颯於白露遂處以順樂忘其憂務著書而立言期精義以致用緑竹猗猗而瞻彼澳每興磨切之思白駒皎皎而食我苗徒起縶維之歎適中朝之更始俾外服之遄歸睠百王之典寖微而一代之防多闕匪究定民之本曷為經世之方漢僅草儀猶折武夫之氣魯惟秉禮卒回強國之謀爾熟講乎后蒼之九篇深稽乎姬公之六典未入趨於宣室趣攝長於容臺仍摛盤誥之文更勸索丘之讀登崇伊始簡注良深吏士之見官儀正頼濟時之畧公卿之明王制毋忘致主之規叅知政事曾從龍除知樞宻院事加食邑實封仍兼叅知政事制勑聖賢相維而致昇平莫重弼諧之寄文武兼資而有智略尤嚴宥宻之圖廼睠譽髦洊參大政進筦五兵之重用培九鼎之尊倚成匪輕作命惟允具官某學該乎今古識貫乎天人長江大河不足以喻其量之深太山喬嶽不足以言其噐之重夙擅掄魁之望嘗陪近輔之聫仲舒見疾孫𢎞不少安於朝廷之上李泌出避元氏寧退處乎畎畝之間既屢最于介藩爰趣還於政路屬逢更化備罄告猶直方大之兼全深得鎮浮之體知仁勇之並用洞明應變之幾顧邊鎻之孔艱期廟謨之洪濟宣帝樞機周宻固先二相之資憲宗紀律設張尤切衆賢之助肆疇庸於間社俾進序於本兵縂提星紐之權仍贊台衡之務邑畬申衍邦典增崇以成道德之疆以全帝王之勝噫天保治内所以收采薇之功烝民任賢所以定車攻之業維真儒之無敵知中國之有人務逺乃猷用厎於乂可簽書樞宻院事鄭性之除同知樞宻事加食邑四百户制勑帝舜之格三苗有伯益以贊禹宣王之定四國有吉甫以誦申睠宥宻之孔嚴頼寅恭之恊濟肆頒命綍參典事樞具官某資早悟而夙成學旁貫而曲暢凾鐘太簇為角始終繳繹之和玉瓚黃流在中表裏清明之粹久矣冥鴻之去時哉儀鳳之來不累日而長諫坡未再月而登政路以非常之際㑹為有大之規摹難於定不難於回熟知國勢可以戰斯可以守洞識戎情爰進貳於本兵仍申陪於賜邑維予制勝咨爾陳謨府兵列於關中孰是相維之制屬國置於塞下曷為叵測之防隐憂既深區畫可後坐弭控弦之警宻輸借箸之籌噫文武之憲萬邦政有頼中興之佐明良之圖庶事盍共康丕應之功惟爾之能俾予以治可同簽書樞宻院事陳卓除簽書加食邑四百户制勑民獻敉寧武功求濟於艱大之日王師遵養時晦用介於純熈之餘睠國勢之重輕視人謀之臧否進賢宥府揚號明庭具官某栁下惠之聖和樂正子之好善謙謙自牧夙全君子之風蹇蹇匪躬克慕王臣之操紛炎門之競騖獨夷軌之徐行一冺忮求両無淄磷去知有命靡矜噐能政理之長来亦何心益稔議論文章之望迨親覽於威柄爰趣登於政塗勤樸斵於梓材力贊厲精之治綢牗户於桑土常懐先事之憂備罄壯猷罙深邃簡就陟樞庭之序仍循書殿之班爵進公圭秩陪邑采俾宻裨於勝筭用坐折於遐衝噫明主可為忠言朕方合介胄縉紳之議上策莫如自治爾盍思車馬噐械之圖必同寅協恭而和𠂻斯禁暴定功而保大式孚民聽庸對王休可余玠起復宣教郎㐮陽府通判兼西京制置司機宜文字制勑具官某奪情非令典也惟從戎則許其墨爾以明敏練達受知於制閫秋防孔邇辟置自助起之堊室貳政要藩且參幕府之畫不以家事辭王事其禮之變乎移孝為忠勉圖協濟可李勉平黎賞轉朝奉郎制勑具官某廣右平黎上功爾以彊敏宣勞於莫府進二秩以奨之甫通閨籍遂階員外異渥也試邑於䖍益厲勿懈可軍噐少監徐清叟除將作監依舊兼司封郎官崇政殿説書制勑具官某朝廷之用賢非一途信其賢耶用之惟恐不亟故必躐正郎梯監少而升爾家傳正大之學躬厲直方之操金華開説援古以証今亹亹不倦朕甚嘉之攝主爵貳戎監而進大匠華軌直矣朴素化行繕修務簡涵泳竹素綽乎餘暇輪人有釋椎鑿議上之讀書者試詳訪之以告庻乎他山之石可以攻玉也可大宗正丞蔣峴除軍噐少監仍兼權侍左郎官制勑具官某武監戎部之附庸官間無事少也占位渉筆無幾牘然向用之材於是乎儲爾學問醇茂義理融暢恬夷而莊舒巻阿吉士其人歟丞我麟宗攝郎銓省几案文書填委不動聲色隨手冰泮而九品無遺鑒體用具矣試材以劇養望以暇鶴膝犀渠姑貳程作朕方圖所以進爾者可丘岳除兵部郎官趙與除都官郎中兼樞宻院檢詳文字制勑具官某等國朝最重尚書郎之選懷香而奏明光襆被而直建禮非郡最不真授爾岳篤茂而暢邁守夷真以吏畏民懐稱爾與䟽明而詳達守嘉禾以政平訟理著朕厲精政事以來厯課吏治皆其良也表惟良之吏以勸郡國故俾岳郎于司武與自丞大宗郎于司僕且攝屬于宥府太㣲積星之次即日為真顧不謂榮乎兵不可黷刑不可濫必寢必措勉賛而長可樞宻院編修官趙汝譢除宗正寺丞仍兼右司制勑具官某王丞望華職簡而宰屬為劇授官兼劇以簡欲其才有餘於事也爾早收危級蔚著雅望攝組省闥靡枉於法守而事不辭難沛乎其才也擢由編纂涉筆宗盟仍行紀綱百司之職輕車熟路疇能及之益涵致逺之噐用對方來之渥可汪之道除太常寺丞制勑具官某漢制朝議武夫抜劍撃柱之風為之氣奪使成周禮樂得見於後世情偽之防何如哉故奉常置丞必通於古誼爾學愽而約氣直而清時輅冕舞之傳孰復蓋乆談經官邸薫陶信厚涉筆曲臺宜矣因革損益訂古而施諸今以美化善俗亦惟無忘夙夜惟寅之義可劉克莊除樞宻院編修兼權侍右郎官制勑具官某時政紀者國史之椎輪經武要略則先朝制勝典刑之囊括其書纂次於樞屬自昔必名儒文士爾家傳儒藝蚤著文聲韞抱不凢脫餌科級諸老先生多之簿正屬籍進升刪潤維汗青之稱也與聞廟畫攝事郎讃精毖簡通對我殊擢可陳一薦䕶獻俘有勞轉朝奉郎制勑具官某垂瓠合圍穹廬就燼凾首緒檻天網獻功於藁街修途䕶役爾實宣勞其升員外之階徃効莫中之畫可顔信之獻俘有勞轉保義郎制勑具官某淮蔡凾骨獻俘之役爾與有勞其陞一級以酬䟦涉可蔡仲龍除大宗正丞兼權屯田郎官袁商太常博士並兼沂請王府教授制勑具官某等沂邸於屬為近朕篤内睦擇師而教之乆則逓遷奬其勤爾皆以經明行修立於朝如玉在山煜然其煇潤楷範麟趾麗澤多益是用進仲龍丞於大宗且攝省郎進商繼仲龍議禮於曲臺而典教悉惟求舊懋詩書禮樂之訓陶河間東平之風不特講習留屯蒐綿蕞之欽厥職也可安恭行除大理寺正制勑具官某廷尉有正監及平漢制也我朝置正於卿少之下丞司直之上厥選蓋謹爾材資亮通風矩明整蔚其梧鵠之秀丞郡以李法簿召未至升之正以聽獄成甄㧞峻矣書曰明啟刑書胥占咸庻中正勉哉圖厥稱可魏峻除宗正寺簿楊璪太府簿趙與爽籍田令制勑具官某等楩柟把梓之材生于鄧林其地美也非雨露之養不成爾峻簡而温雅而文爾璪茂而通整而練爾與爽頴而秀韶而明英英世家翹翹天支朕皆欲養其材以待用故進峻簿正於珤牒璪繼峻簿外傅與爽繼璪令帝籍前暉後映其各懋於自獻可馮去疾除武學博士制勑具官某善用兵者不學古兵法而圯下一編亦詎容無師慶厯置右庠之意昉此爾以通經博古之學彪炳於文成均諸生咸歛衽其下風而平時慷慨激烈論南北離合之勢兵家勝負之畧皆有據依遷之博士使業韜鈴者又得所矜式新美作成之下安知不有武舉如子儀出於中乎可劉宰除將作少監制勑具官某朕宵旰圖治計効猶邈每嘆君子有材之難然不敢諉斯世之無其人也爾隱居以求志深造而自得君子人歟其論天下事目無全牛投刄可以中桑林之節材益偉矣旌詔屢下未肯從吾㳺何耶超越拘攣繇丞奉常經貳繕監迎之致敬有禮矣惠然來思毋興盡而返可尤爚除知江陵府兼京湖路安撫劉煇叔政績轉一官依舊知建昌軍制勑具官某等河東以地望之重歸季布頴川以民情之安㽞㓂恂悉惟其宜爾爚抱識時應變之長徃帥荆州事權非昔而承上撫下無間言可以為難矣故齒召復還以壯吾上㳺控扼之勢爾煇叔厲盡職奉公之志出守盱江邑里甫集而興利除害無遺功可以為善矣故選擢復留以尉千里戀慕之情分閫乗壘任有輕重朕為地望民情而擇官奚有間哉各鞭厥後無棄爾成可葛洪除資政殿大學士提舉洞霄宫制勑武公叡聖晚年不忘箴規之心文子亷忠至老猶篤事君之志朕緬懷舊弼乆樂燕居年垂九袠之崇望稔三朝之重峻深邃職昭示隆恩具官某嶧陽特生之桐新甫後凋之柏致身廊廟雍容麟也之來引興丘園翕忽鳯兮之去仁樂山而俱寂義飲水以自娛雖黄髮之皤皤愈丹心之炯炯廼睠粹古務尊耆儒不得謝則賜杖而安車優㳺佚老如有問則就室而珍從懇切乞言方將遺掌故而訪伏生乃欲致少傅而從䟽受旄期雖重於趨召矍鑠詎容於告歸陟祕殿之大名踵珍臺之優禮肆加體貎式聳觀瞻噫夀考維祺朕敢失日秩月存之禮憂心如醉爾無忘晨興夙寤之規益茂養恬對揚猷訓可何處乆太府卿兼知嘉興府制勑具官某士君子任於時入儀九列出殿三輔通願矣矧建惟月之旜馮扶風之軾而為王人爾守故家之學術熟昭代之典章色莊辭毅爭是非於殿陛間不少詘用之郡國何姦萌之不戢戻氣之不彌哉因南徐惜其去之早知檇李恐其來之暮就乗夏縵趣布藩條徒得君重毋薄淮陽也可度正轉朝議大夫守禮部侍郎致仕制勑允矣君子佩筆槖以方貞賢哉大夫掛衣冠而何亟能知所止盍賁其行具官某學守粹傳性全至善見於治郡有閉閣思過之風推以立朝得自牖納約之體進貳秩宗之典仍參師氏之司尚頼繩愆遽聞告老一正君而定未究責難之恭致為臣而歸廼慕保身之哲宜升華秩用慰耆齡還家峩雪之邉遺世烟霞之表莫回爾志徒愴予懷可太學博士李榘除諸王宫大小學教授制勑具官某太學在西郊小學在國中四代之制然也二學並設以教神明之胄則我朝作古爾行應周旋之規學茂講習之澤相觀而善六館得師而吾葛藟𤓰瓞之秀不可無良範也故輟之司教于宫庠小以成小大以成大等就傅肄簡而上皆知勉於為善則振振之化行可平齋集巻二十一
