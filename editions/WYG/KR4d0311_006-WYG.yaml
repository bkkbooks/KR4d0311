body:
  text: 平齋集巻六宋洪咨䕫撰講義噬嗑亨利用獄臣聞嗑者合也噬去頥中之物而合也頥卦合艮震為體初上皆剛而中之四爻皆柔猶人之頤虚其中也噬嗑初上皆剛與頥同而四亦剛是頥中有物間之故有待於噬而後合也凡去間之道皆然時則勿有間之是君臣之際以無間而合也人不間於父母昆弟之言是骨肉之際以無所間而合也彼蠻夷猾夏㓂賊姦宄蓋梗聖人之化為天下之間者去其間則化行於天下矣噬嗑亨間去而合即亨也其義利於用獄獄以推見其為間之情而去之則梗吾化者不至於覆出為惡病根除而正氣還也其在人心則人欲為天理之間人欲盡去天理流行豈非間去而亨乎此又克已工夫之當盡彖曰頥中有物曰噬嗑噬嗑而亨剛柔分動而明雷電合而章柔得中而上行雖不當位利用獄也臣聞頥者養也頥以納飲食致養而有物梗之故必待噬而後合合則亨矣亨之功在噬噬者用力囓去之也小人為君子之間不用力以退小人則君子不進夷狄為中國之間不用力以却夷狄則中國不尊姦民為良民之間不用力以治姦民則良民不安此皆噬之功所以致亨也以爻言之則三陽三隂為剛柔分以卦言之則下震上離為動而明以象言之則震為雷離為電二者參合而成章雷取其威電取其明治獄之道無大於此然六五為用獄之主乃以柔中之道行於上雖以隂居陽為不當位而治獄以燭見情僞為先離體虚中而明故於用獄為利夫獄者民命所係得其情則哀矜而勿喜欽恤之仁行焉茍不以柔治而以剛治則明過於察威過於猛人將無所措手足失天地大生之德矣噬嗑義在除間而歸於柔中以此知好生者聖人之本心用刑者聖人之不得已象曰雷電噬嗑先王以明罰勑法臣聞隂陽相薄而為雷相軋而為電故震之一陽動於下離之一隂明於中噬嗑之象取焉卦本先電彖象乃以雷先於電者蓋泰卦上坤而下乾不曰地天交泰而曰天地交泰取其交也噬嗑上離而下震不曰電雷噬嗑而曰雷電噬嗑取其合也電明而雷動雷行而電隨明與威合然後梗化者可去徒明而不威則詳於察姦而不能除其失也懦健威而不明則鋭於去惡而不能辨其失也闇明行以威威發以明天下無難去之間矣先王觀雷電之象於是用電之明以明罰用雷之威以勑法罰顯而枉直各得其情法勅而輕重各當其罪利用獄之道盡矣舜之去四凶成王之去三監孔子之去少正夘皆此道也然辟以止辟刑期無刑聖人豈徒恃法令為齊民之具明與威並用罰一人而千萬人懼法雖飭而不常用也雷電之合隨即開霽天道亦豈常用其威哉初九屨校滅趾旡咎象曰屨校滅趾不行也臣聞噬嗑利用獄初上為受刑之人人之性本善情動欲生遂陷於惡聖人憫之故設為刑罰以懲惡而挽之於善然善惡觀其所積欲惡之不積當於其始而禁之趾在下為行之始加校於屨而趾滅焉彼雖欲行而不可得則不進於惡可以免咎矣校足械也滅没也校深大至於没其足也或謂滅趾為刖刑刖則施踊何取乎屨有履加校非斷趾明矣唐虞畵象而民不犯特赭衣菲屨之類肉刑未嘗用也蓋小懲而大誡故能免麗於刑小不懲則惡積罪大聖人豈得而私宥哉其在人心一念有不善貴乎早覺而力遏不貳過不逺復之功皆基於此覺之不早遏之不力則去舜就跖悔莫追矣觀易者知治已則知治人六二噬膚滅鼻旡咎象曰噬膚滅鼻乗剛也臣聞為一卦之間者九四也初九與四為正應是同惡相濟者也膚柔而易噬猶初之為惡未稔而易制鼻高而難滅猶四之為間甚大而難治始噬者膚而終至於滅鼻小懲於初遂大討於四也四之間去則初無與應小人之黨孤何能為哉乘剛言二位乎初之上乘初之剛以攻四之剛因瑕而及堅也蓋二居中得正以用刑所施不失其序故下能治初之罪上能除四之間輕重有權尚何過咎之有皇矣一詩文王侵自阮疆不過用輕兵以臨之而阮自服進至崇墉則聲罪致伐必是絶是忽而後已彼其剛戾梗化之罪雖同阮為易討崇為難討侵阮則膚之噬伐崇則鼻之滅聖人初意不汲汲於深治小人而終有不容不深治者皆其所自取也六三噬腊肉遇毒小吝旡咎象曰遇毒位不當也臣聞周禮腊人掌乾肉腊物之全乾者也小人黨盛而勢強其堅難噬與全體之腊同三乘初應上而鄰於四疾小人挾黨為間欲盡除之然人之為惡情有淺深罪有輕重不問渠魁脅從而例殱之是舉腊肉之全體求快於一噬故反遇其毒豈非可吝者乎而其吝小終歸於無咎我之治小人名正言順彼雖有反噬之心無所施也然其遇毒亦以位不當之故無瑕者可以戮人三所處不中不正而欲施刑去天下之間人其肯心服哉齊威公自侵蔡而伐楚猶噬難噬之腊肉屈完如師辭多勃戾有遇毒小吝之象而終於服包茅不貢之罪則旡咎矣齊之挾天子以令諸侯位固不當楚雖强不敢不服豈非齊之尊王名正言順乎九四噬乾胏得金矢利艱貞吉象曰利艱貞吉未光也臣聞凡物乾為陽濡為隂腊胏及肉以乾取義指陽爻言也九四在一卦之中本為間者以爻言之則四之位近君九之材足以堅决而立斷故資之以除間初九不畏不仁不恥不義四與為正應猶聯骨之胏肉既乾而堅至為難噬一旦噬而去之見善明而趨義勇蓋得金矢之象焉有金之剛而無柔懦有矢之直而無回遹義形於色不茹不吐宜難噬者之無不噬也然去間不可有所易以易視之樞機不宻未必不反為人所制不可有所撓在我不能貞固其守而猶豫遷就安知無當斷不斷之患此所以利艱貞吉也象言未光蓋始與小人宻而終力去之雖得去間之義亦豈所謂表裏純一本末坦明昭昭然揭日月而行者乎平勃勸吕氏王諸吕其後卒誅諸吕在漢為有大功參之王陵以白馬之盟折其萌則二臣為未光矣大臣任去間之責者當觀之此六五噬乾肉得黃金貞厲无咎象曰貞厲旡咎得當也臣聞人主天下之利勢威靈氣􅆋之所暨以去小人之間則小人消以去夷狄之間則夷狄服權有所歸則勢有所易也腊肉全體最難噬乾胏附骨亦難噬乾肉雖難噬而較噬腊胏為易凡三爻之陽皆足以梗化以六五離明之君制之如噬乾肉然何堅之不斷何間之不除正以其得黃金之象也黃取其中金取其剛人君有剛中之德天下之悍戾邪僻無不退聽尤當正固守此而以兢惕危厲行之則惡無覆出凶無反噬尚何咎之有夫有間則有咎其所以能終免於咎蓋以得剛中之德以治間當其宜也六五本柔中爻乃取剛中為義上卦屬離離一隂居二陽之間中柔而外剛仁者之勇也君德茍仁有餘而剛不足則無以斷天下之疑定天下之業唐之姑息受制於强藩悍鎮漢之優游養釁於宦官外戚豈不甚可鍳哉上九何校滅耳凶象曰何校滅耳聰不明也臣聞初上兩爻皆受刑之人初九小懲而大誡故受刑輕上九惡積而罪大故受刑重何校械其頸也械深大至於没耳耳主聰有耳而不能聞過徙義聾瞶其心而浸至此極其所由來者漸矣夫視曰明聽曰聰本二事也而以不明麗之聰明於聽德然後謂之聰也天下之耳相似誰無是聰私心塞之顚倒是非而有誤蠅聲而鷄蟻鬬而牛外雖有聞中實蔽壞故聞人之善言而惡其逆已聞人之惡言則悦其順已不明孰大焉使盗跖桀紂能聽人逆已之言而不以順已為悦亦何至天下之惡皆歸萬世不可湔濯哉此易象示人遷善改過之門最𦂳切處平齋集卷六
