body:
  text: 平齋集巻二十七宋洪咨䕫撰啓四迓鄭制置啓入侍中宸出制外閫西控六詔磊落籌邊之圖北定三秦淋漓出師之表惟卧龍之規撫素定故刺虎之機㑹可投氣壓赤雲聲摇紫邏恭惟某官學空萬古名塞兩間緇衣敝予又改為兮典刑尚在朱弦倡予有遺音矣格調更高岸巾湓浦之秋風舉酒平山之春色吟懷激壯酣膽輪囷論山東之事宜浪戰非䇿指淮南之形勢寢謀在人上知為天下之竒材公請當今日之重寄方整雍丘之役又嚴斜谷之征惟井參之上游與關隴而錯壤枕戈雖切傳檄尚遲豈人謀之未臧抑天運之有待敵乘丙午之釁而犯梁汴於今百年我應甲申之䜟而破秦川在此一舉開誠心以集衆智倡大義以激三軍招摇所臨欃槍如洗天生晟非為朕亟收耆定之功帝咨度遂相予丕贊升平之業某一身虎䑕萬里駏蛩昔凌斗野以從游今介雪山而聽令慨斯道之孰主誇吾邦之有人未賭前茅已占破竹讀長安之露布相與懽呼賡涇水之鐃歌尚知興起被新㫖奏事謝廟堂啓瞻太行之雲心方摇於西徼近長安之日夢忽到於東華天道以從欲為仁人紀以錫類為孝綱常立矣聖賢能之竊以行卭郲九折而去官漢許全於子道守西山三城而入奏唐使便於親闈盖天下之至情宜人上之深詧伏念某汚邪家世窶藪身名王粲問從誰猝猝行邊之忠顧况悔生汝依依去國之懷泝瞿塘灧澦而西躡龍門石櫃以北趼足萬里囘首五年江上秋風影斷未歸之鴈城頭落日魂飛返哺之烏讀何蕃之傳而躊躇覧孫寳之章而惕息去天雖渺控地有祈但為昏定晨省之謀廼叨朝奏暮召之寵父曰嗟予子行役展轉許時昔我往矣今來思團欒有日舉家懽舞行道榮觀兹盖伏遇某官以躬行作百世之程以性學立三才之極大既和於民則細亦盡於人情四牡之啓處不遑聽其來諗杕杜之憂心孔疚知爾懐歸况家山正在紅雲之旁而菽水難供白雲之外俾趨北闕就養南陔所謂老者安少者懷莫非仁之至義之盡苐閶闔䕶關之有虎蓬萊引掉之常風可恃而前惟繫所主三吐哺三握髪行窺上衮之光壹舉足壹出言永戴洪鈞之施過此以往未知所裁賀廟堂定䇿啓劄恭審以一代元勲定萬世大䇿生靈有主社稷無疆嘗觀歴代之源流因攷置君之本末奉之冕服伊尹在太甲為阿衡逆以干戈召公相康王作顧命凢邦家奕世之慶皆宰輔得人之功秦不足言漢亦未善代王之入以太尉陳平何為曽孫之立以將軍楊敞不與或外戚推擇於襁褓之内或宦官操制於掌握之中託周公行事者皆然如武侯用心者有幾以至晉聽之司馬之處分唐付之中尉之轉移倒持太阿擅弄神器忠如狄仁傑中宗僅付諸人智如李衛公宣宗不出於己噬臍莫及搤擥徒多惟我熙朝若時元老藏書金匱定大業於兄弟之繼承漬墨水盂扶正統於父子之授受顧託之寄在宰相擁立之權歸朝廷大典具存盛事復見某官相先帝十七年之治培皇家億萬祀之休巍巍煌煌無逸太平之業赫赫濯濯崧高中興之謀逮􅑀几之道揚重嗣服之付託謳歌之啓而人心屬厯數在舜而天命歸危疑雖深咳唾已定挈洊雷而出地獨恃寸心扶大明而當天盡出一手此盖列聖鍳其志先正啓其􅇆用能奠九鼎於聲色不動之中於以大一統於觀聽維新之始旂常編紀鐘呂特書泰山喬嶽之俱崇長江大河之無極某委身坱圠拭目休明知宗祏之有依與草木而同慶然事莫難於謀始功尤重於圖終潞公老臣盡日立侍於少主之側魏公舊相一旦巻簾於母后之前有光昔人正在今日某下情不任踴躍慶快之至秘書郎謝廟堂啓虎落賦歸尚憶窮邉之戍龍飛入奏忽叨廣内之除當明兩作離之旦而兼收與謂一為元之制而並下始終大造之力俛仰平生之榮竊以漢九種一百三家録嚴中祕唐四部二十萬巻藏富𢎞文迨熙朝之煟興嚴列舘之鼎峙上搜禹穴下采虞初登其庭者道山日月之最華讀其書者瀛洲風露之亦飽乃若秩羙職清之選莫非見殫聞洽之神如某者識字無竒用心徒苦日斜牛背慣從襏襫之耕月暗馬頭間問兠鍪之役莫府劍山之外麗譙涪水之濵粗了官癡不改書癖伊川絶學已箍匠之不存清獻高風尚蒼龍之可語心折百牢之客路眼穿萬里之親闈苐期西崦之還乃作東華之夢周章拜命勃宰趨朝天近五雲甫候紫宸之對地清群玉忽陪碧閬之遊左思於此而賦三都世南由是而擅五絶歴觀作者深愧斯文兹盖恭遇某官定大計如隆興開皇極如元祐收召久閑之耆艾韓吕朋來登崇未顯之俊良晁張輩出謂今奎壁之府自昔豫章之林國以儲才士焉養望遂下采於兎褐亦俾乘於鹿車某敢不澡雪精神於征塵没没之餘收歛身心於夜氣摇摇之後竹裏汲泉而煮茗花邊挹露以研朱端日將臨首獻三元之頌盛時親見尚賡七德之歌囘胡判院啓曠度高才方快景星之睹雄文大軸忽勤明月之投喜獲一麟盡洗萬馬恭惟某官壘劘屈賈灰撥隂何以湖海一生之豪為京洛諸老之客流涕痛哭見於議論怒罵嬉笑發為文章具眼非無其人壓頭終付之命黄金且盡長鋏猶存自昔聲名當三千而何啻祇今富貴過五十以非遲某脱從烟霞來足風露枕書清樾之底誰與喚醒拾句落花之邉更煩舉似略茲具報幸甚鍳紆臨安諸友招講東山啓慕徂徠之餘風退安西崦引嶽麓之故事延致東巖豈不願一鄉善士之交其如非諸儒名家之選莫當盛意輙誦淺聞盖自兩楹之夢既符一貫之學如綫以仲尼事有若安能無貌似之疑由子思傳孟軻所幸有性善之說迨秦熖之寖冷而漢塗之復開淄川言易濟南言書各擅專門之業賈逵作訓馬融作傳居多著録之徒雖穿鑿之未純亦發明之良苦㑹文有益温故宜師乃若㤗北之仰昌黎衡湘之宗子厚頭童齒豁未免先生欺予哉之嘲耳拂心騷且有吾子見愛爾之嘆顧好為之通患在善誘以疇能惟本朝五星之聚奎而斯文百川之至海自伊洛出有洙泗風氣象巖巖立盡三更之雪精神盎盎坐餘一月之春所謂賢希聖聖希天夫豈書盡言言盡意諸老信有功於後覺群英求無愧於前修腔子裏盡惻隠之心貴加存養科舉外有義理之學不厭討論待自得於源流更孰加於模範藐如逐客老矣陳人久忘東塗西抹之時未定南去北來之地辱拂黄龍之榻俾修白鹿之規端是借聾誠難起甓見大巫而怯敵危坐於虎皮從野翁者遊尚醉眠於牛背略敷梗槩切幾鍳紆再荅招講啓劄某伏承妙語申諭寵延曷月予還歸哉久啓故園之興吾年今已如此難陪勝社之游况蝸涎不足以自濡而螢爝何堪於共照徒慚便腹多費解頥幸諸君之見寛容老子之省事窪尊西市甘寂寞之漫郎石室東山付風流之太傅薦縢口説切幾心孚生日囘啓戊子蒼顔五十三又逢初度化身千百億總是窮愁辱飛雙鳬來顧獨鶴開行厨於竹裏出妙語於梅邉為留西日之隂特轉東風之信掛梢緑鳯夢何到於調羮啄黍黄鷄盟尚尋於煮餅其為心感併得面陳生日回程宰啓己丑以墨梅并詩來牛奮其角閲良月之就盈鴻漸于干驚朔風之欲暮過勤掞藻加賁垂蓬某官學道愛人折節下士問出老先生之門而驚其不偶日奉太夫人之懽而念其有親欲囘東里之春先寄西湖之信句隨香動格與榦高照見百里奚飯牛之心寫出九方臯相馬之意戒以㸃白俾之守元老我長閑敲碁聲於橘裏為君細誦引酒興於梅邊生日囘啓庚寅閲天地之數久矣疑年對聖賢之書蕭然送日方嘆箕張而牛奮忽聞春發以鯨鏗笑桃李之争新許楩楠之耐久詞高戞玉意重訂金水調數聲恨欠雪兒之唱山光一帶願從詩老之遊占報斐然垂察幸甚生日囘啓癸巳九年謫之賦不暇問天十月交之詩猶記墮地方擁山隂之雪忽披沁水之春醖藉不凢機杼自别以彼富貴榮華之夢開此風流散淡之懷意氣重於斷金音調諧於佩玉醉唤盧仝之赤脚强為我歌笑摩杜老之白頭莫當君賜其為感著未易名言生日回呉季永寺簿啓乙未歲週六甲氣近一陽過辱高情俯記初度呉罡之斧修月出語不凢洪崖之榼留春拜賜殊侈琢磨以岷山五花之玉䕶養以峨眉千歲之苓愛之欲生永以為好義襟特重莫訝巻錦鯨而還老眼尚明要看冠鐡豸而立復官謝廟堂啓新綸涣發宏開宥罪之科舊秩復還仍賦祝釐之廪與兩儀而同量控九地以知恩伏念某姿禀迂踈學問寡陋明主可忠言之日誼熟數之天下本無事之秋黯妄發矣宜坐反唇之律特寛擢髮之誅僅裭官聨俾安家食兒從郎罷拾柿葉以學書妻對藁砧然松明而理績凢此團欒之適莫非坱圠之私以口語心引手加額第一日之去國倐七年之杜門戸外屨空但有莓苔之徑床頭金盡况無䆉稏之圩未問數百指碎累之煎熬可堪七八十老親之落莫居然待盡忽爾更生長樂宫之稱觴華夷同慶丹鳯門之肆𤯝天地皆春大或漏吞舟之魚細亦振坯戸之蟄洗之丹筆畀以青氊昔漁者争隈已斷市朝之夢今廪人繼粟遂紆溝壑之憂靖惟平生盡出大造兹盖伏遇某官手扶社稷心契乾坤惓惓乎緇衣之好賢休休然干旄之樂善謂四海之英雄豪傑悉歸籠絡之中豈一介之皦厲便儇不在㴠容之數貸之衆人欲殺之始察之公論既定之餘欲放一頭趣開三面縉紳相顧而動色簡冊大書而有光某敢不仰體包荒退思遷善歩虚聲裏疑從鈞天帝所之遊知見香中期報佛地位人之德銘藏亡斁乗染奚殫平齋集巻二十七
