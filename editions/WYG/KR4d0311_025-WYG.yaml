body:
  text: 平齋集巻二十五宋洪咨䕫撰啓二通崔安撫啓捧硯從游久綴門人之列分弓庇役就充幕吏之員天巧其逢人榮所託竊以小范之帥環慶舉張方平大蘇之牧中山進李端叔兩公辟士之盛事百世知人之羙談不圖晚生親見前輩恭惟某官光明而亮偉端重而沉深望之儼乎道德之容挹之薫然仁義之澤驅千兵萬馬於筆下風雨恬霽而無聲吞五湖三江於胸中波濤舂撞而不動剸兕麻源之右掣鯨桂海之南清畏人知静忘物競其去也諸公挽留而莫可其歸也四輩趣召而後來甫躋郎省之華亟填戎垣之重秋風保障威行萬竈之烟春日耕桑驩動一犁之雨淮南倚以為脉山東聞而屬心况狐兎失穴之餘正貔貅扼塞之日人皆輕進公獨隱憂謂中原機㑹之方來而外治規模之未立㶚上棘門如兒戯耳尚遺債帥之風方城漢水雖衆用之未免市人之戰要須彊國勢於精神之表乃可制鹵命於掌股之間反覆開陳庶幾感悟彼竪儒幾敗乃事徒委諸一勝一負之常此元老克壯其猷必運以萬舉萬全之畧寧少遲於遄召庸迄奏於膚功坐縛可汗盡還餘地某四年食客三世夙縁濟慈航於黑風大海之中送靈槎於黄河崑崙之上烏幕濫巾於温石兎園接袂於鄒枚誓上下以相隨抑東西而惟命誦蕪城之賦熟形勢于曽來續泗水之碑寄功名於不朽矢心歸倚拜手敷陳謝崔安撫舉改官啓子來幾日甫爾依紅我有二天居然破白惟屹立於世方横潰之表故力挈於人不比數之中抒敬瓣香歸恩丈席竊以人才由江左而降幕客在淮南為多韓魏公得王金陵而不及賞音牛竒章辟杜書記而未嘗推録遂令遺憾尚見前聞伏念某讀書不多渉道更淺方其始銳自謂五石瓠可剖以為尊迨此中艱乃知六州鐵猶鑄不成錯以舟行岸移而閲世變以霜䧏水落而觀物情虚憍寖平剥蝕漸復富貴非吾願未敢云然貧賤玉汝成容或有此然紛紛成敗之異論而咄咄炎凉之易情不圖一日之逄遂有終身之託拔從食客列在屬僚歲寒東閣之梅結根已舊春色平山之栁成䕃方新廣平下坐而揖之前相如末至而進之右使無地主誰破天荒茲盖伏遇某官功盖三邊眼高四海論材以相馬之法觀過於奪牛之蹊得一士於河南了無貴戚之命空群良於洛北惟有山人之媒共驚甄拔之殊誰識機契之早五更進履已是會心半夜傳衣不容放手故於落落難合之㑹而有沾沾自喜之榮上下四方盡是依劉之地始終一節敢忘在莒之時銜戴寔深編摩抑略謝丘安撫舉改官啓從莫府之游甫當春後上公車之薦忽在秋先軒軒特逹之知落落希闊之遇得之驚躍傳者信疑竊以槖馳種樹以蚤實為功狙翁賦芧以朝得而喜伊物理之猶爾豈人情之不然矧墮七選之坑欲結五剡之塔寧為鷄口毋跋狼胡必考索以㸃頭始探期而入手如某者有婞直之短無趨和之長肝胆輪囷據鞍之髀易滿頭顱蕭颯讀書之眼尚明不能忍藜莧之饑漫欲决枋榆之起勉辭襏襫來拂兠鍪多以白面書生而見嗤獨得紫髯將軍而許可樂哉飛泳籍甚推揚着鞭要使出祖逖之先成佛肯教在靈運之後未囘沆碭預借扶摇兹盖伏遇某官親得南軒之傳世濟文定之羙非有心於富貴而富貴自廹不求名於氣節而氣節更高脫彼少年新進之場運此真儒無敵之略識㣲見逺常懷猛虎出柙之憂强本折衝自有老羆當道之勢至若虚以接物而謙以下士明於見善而勇於拔材又當路諸公之所難實舉世善類之攸屬矧在晚出亶為至榮本無疇昔之縁便䝉刮眼不負平生之學即是酬恩百喙可窮寸襟莫寫賀侍御啓榻前承渥柱裏升班物情大旱之餘適蘇霖雨天象太㣲之次首應法星九重侈知人之明四海享任賢之福竊以兩儀具清明廣大之體萬物鍾扶輿磅礴之靈得其中和者為景星為鳯凰全其剛正者為屈軼為獬豸况千古之間氣生一朝之偉人如伯夷聖之清如孟軻勇於義用能任天子耳目之寄于以壽皇家氣脉之傳恭惟某官歩趨聖賢冠珮道德旁蹊㨗徑不求少室之山絶岸孤峯坐閱瞿唐之浪顧環轍之久矣終覽輝而下之簪筆烏臺伏蒲騎省上不為危言而駭聽下不為矯節以沽名惟致辨于君子小人之間而防微於宦官女子之際外邪不入元氣自充以培社稷無疆之休以兆國家中興之象深締邃嚴之眷進顓雄劇之權堂堂不撓為儒宗謀猶惟舊行行且止避御史風采又新然而一論列關吾道之盛衰一建明係斯民之休戚時雖無闕事或可言士大夫懷寡廉鮮耻之風將帥乏趍事赴功之勇戰守之規模靡定賞罰之綱紀未張斜封尚費於調停横歛更多於朘剥惟正人用則國勢重於黄鐘九鼎惟公道行則人心安於泰山四維此皆前日之已言抑亦於今之最急願申谹議迄濟丕平當令文靖警君復聞於世毋使清獻之論事專羙於前狂斐一鳴隕越萬坐謝李坡舉自代并應詔啓草正元之諫疏既許同升應建武之詔書又䝉特舉人驚再推轂於朞月之頃誰信屢擊節於十年之前撫往事以慨然幸平生之有此伏念某灌畦自命媚竈不能忽起市虎無端之疑遂罹蹊牛已甚之禍丹心獨破疇能百口保之白髮相看安忍一家哭矣已甘墮地之棄甑不謂中流之得壺剪紙而招驚䰟探囊而起壞証雖乏洛北山人之譽亦備淮南幕客之員憐抱影之零仃為騰書之旁午六鰲連掣五鶚齊飛它人不足而我有餘大造已多而公未倦讓䕫讓龍而讓朱虎誠過乎謙進豹進鮒而進樂羊抑何其力所謂真知己者夫豈輕予人哉兹盖伏遇某官地望如山門庭似水萬斛轉舵運平國論之偏五色補裳彌縫君德之闕其正足以用大其公足以生明去小人如去稂莠不厭其芟夷愛君子如愛杞梓寧過於封殖引蔡襄而居同列有言必酬薦唐介而處要官弗進不已爰得魚而取掌仍騎鶴以纒腰曷勝自喜之情猶有無厭之請苦心選佛固慙衣鉢之傳凢骨登仙更乞刀圭之賜寸忱有屬尺楮奚殫謝制使李尚書舉改官啓謁裴度於洄曲之營最居人後抜杜牧於淮南之幕忽處衆先得之擊地而驚恍若從天而下竊以前輩所謂汲引孤寒之綆近世以為攀級權要之梯倚冰山為㤗山延頸待囑指䑕璞為荆璞拱手奉歸名為蓄吾家之參苓實則種它人之桃李自喜得計烏知可羞若其㸃頭堂下之一言具眼坐中之小異幾年無此一日見之如某者材非竒竒老已冉冉方虛憍恃氣安知培翁四句偈之有功迨拂亂動心始信竮山三字箴之得力眇鴻毛其自命蕞鷄肋以何求朅來刁斗之郷偶備櫜鞬之役既不能磨盾以草檄又不能推枰而畫籌第於内外臂指之拘攣與夫上下精神之消靡多所感觸為之隐憂顧國事以如斯於身謀而何有炎門耻炙㨗徑甘賖道之將行歟但居易以俟命人莫我知也欲忍窮而著書不圖負􅐿之秋乃有囘瀾之力未齊五鶚先獲一麟固非曹劉沈謝摸索以可知且無許史金張游揚而為助逈出望表猥塵選中茲盖伏遇某官翰墨大蘇威名小范黄髪兒齒入奉壽母之懽織文鳥章出寛聖主之顧以忠孝兩全之懿用文武兼資之才號召青齊指揮燕薊已斷匃奴之臂行漆月氐之頭與共功名孰非豪傑乃至嘘一寒之谷欲使脱七選之坑以勸着鞭以愧刓印偉此舉之尤特信所關之匪輕某敢不敬佩十六字之褒期答二三策之取丸藥生翼初匪求而得之瓣香報恩當有大於此者巻巻䘖戴切切敷敶謝權帥洪提刑薦啓騎揚州之鶴正切夢思冠楚人之猴忽叨論薦嗟世道之寖薄幸宗盟之有歸竊以絲苓同生於松而絲以苓為根渠荷皆出於藕而渠倚荷為䕃惟鼻祖源流之無間故耳孫枝榦之相依伏念某少耕潜山壯宦鄱水訪盤州之事業正印難傳誦野處之文章餘燈可續柰九京之不作竟千里之空還昔期芳菲菲而彌章今欲景翳翳其將暮不圖州牧出我世家蔚乎相扶日有川泳雲飛之樂劃然長嘯時窺山鳴谷應之機胡人事之方乖曽身謀之靡定㠶隨風引舟挾岸移長鋏自隨勃窣兠鍪之底短檠相對凄凉刁斗之邊皇華不隔於照臨吉語忽傳於吹送一鳬已去五鳯俱飛雖狄武襄之譜梁公大非吾偶然吕文穆之舉夷簡豈無他人出於真情有此竒事茲盖伏遇某官器能管樂苖裔韋平材恢恢乎辦多身矯矯其獨立山韞玉而自潤粹然有道之容水中凖則不争澹乎無我之意扶立故家之喬木挽囘末俗之頽波涕唾熱宫金玉寒畯謂族姓如晨星之有幾况主賔與春風而俱和置冗蹟於四賢借華衮於一字俾懋所學用昌斯文白髪聲名媿難齊於二陸青雲歩武尚自附於三洪深感於中姑陳其概謝賈制置特薦啓小單于之膽落方集竒謀大都督之眼高首薦下士試新刻黄金之印署獨御碧玉之章同日驩傳一時盛事伏念某萬無能役一不敢欺滿架挿書自矜鄴侯之富舉家食粥誰念魯公之貧風霜不貸而枝葉凋歲月已老而根榦在往來塞下出入兵間車轔轔馬蕭蕭毎痛心於浪戰田确确牛吒吒更攬涕於煩輸兩年之賞識固多一旦之遭逄尤異蟻隨磨轉鴈逐陽飛趨幕折腰甫識少陵之面上堂携手已知鬷蔑之心聽說劍於酒邊許推枰於燈下良由機契遂以名聞兹盖恭遇某官貫穿古今揮斥宇宙望長安於㶚㟁一生忠義之心進雍丘於淮隂百戰功名之㑹用紹興分道之典故施慶厯定邊之規摹既綏請於山東且經營於河北築臺延士思得良籌推轂進賢不遺餘力爰俾摧頽之下走亦䝉特逹之殊知念圖報之無他惟納忠之有益虎兕出於柙曩嘗失於防閑蛇龍放之菹今盍思於區處勢必知己而又知彼權當在我而無在人御衆莫若寛平制敵無如審重財散則民乃聚食足則兵自强此皆己見於施行務在更加於推廣大孚衆望洪濟中興繪像雲臺不媿膠東之傳磨崖浯水願書元結之碑觸突有誅震惕退聽平齋集巻二十五
