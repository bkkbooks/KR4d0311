body:
  text: 平齋集巻十九宋洪䕫撰外制宫觀葉莫除權發遣贑州提舉南安南雄汀州兵甲制勅具官某章貢與閩越錯壌其俗易摇而難服奉吾詔令以鎮綏之其惟良二千石乎爾和平而有制莊靜而有立武岡戎伍之變洞察情偽設方略不數旬兇渠授首一邦底寧帥閫上功既懋爾賞繩於文吏吾帥臣又為爾明白之起分二水之符坐緫三州之甲必恩意孚而善良吐氣威信著而悍獷革心治化蒸蒸如漢良吏是為不負所舉可陳良驥轉承議郎制勅具官某維揚翦冦之賞大閫弟功無㣲不逮爾庀役𤓰州賫伐援比以自請亦陞一列責實方嚴思稱所䝉可王丙特改承務郎制勅具官某巴蓬山髙林深姦民淵藪嘯呼剽刦實煩有徒爾奮身書生急義鄉井招懐其脅從禽僇其不率一方安堵諸閫上功超授京秩宦塗方開亦克用勤可參知政事兼同知樞宻院事喬行簡除知樞宻院事同提舉編修經武要略加食邑實封制勅朕撫車攻復古之運慕烝民任賢之功我儀圖之則山甫柔嘉侯誰在矣則張仲孝友廼睠股肱之重夙咨齒德之尊講内治以既嚴籌中興而抑熟進握本兵之寄俾殫謀國之長渙我明綸諗於列序具官某直大而不倚深冗而有謀翛然其癯精神溢於萬物之表皓然其老志氣塞乎兩儀之間予養晦則宻勿以效忱予更化則従容而賛決凡君子小人之進退暨中國外夷之盛衰備輸啟沃之忠居頼弼諧之助惟關洛有鼎來之幾㑹而江淮有前進之規模必元老壯猷乃可以出萬全必真儒無敵乃可以大一統就煩舊德坐筦洪樞緫提經武之編益懋運籌之略申陪井賦併實圭畬噫詢黄髪則罔愆朕方謹仡仡番番之戒有常德以立武爾毋忘緜緜翼翼之圖渉厯深則無躁謀思慮精則無遺䇿共恢大業茂對閎休可資政殿大學士新知建康府曽從龍除參知政事同提舉編修勅令加食邑實封制勅慶厯之開太平范仲淹為恭預元祐之新大法吕公著為凝丞朕遵晦十年厲精一旦趣召先朝之彦俾還近輔之聨誕􅆒絲綸敦告簮紱具官某學根乎正大氣抱乎純明其重足以挫衆紛屹然鼎吕其靜足以燭羣動瞭若蓍龜蚤服在於大僚耻茍同於汙俗不合則去有待而行鶴鳴九臯之聞聲而樂只鳯翔千仞迄覽徳以來思予興相見何晚之嗟爾動可為忠言之喜舉昔大對勸今力行嘿有契於此心期共由於斯道更化則可善治宜増重於本朝折衝何必臨邉奚尚勞於外服爰輟居留之計聿嚴共政之圖蒞勅局以提綱拓爰田而衍賦併昭異數式奬英猷噫六典建於周家莫光乎設恭而置輔庻績凝於虞室尤在乎同寅而協恭勉殫訏謨之忠共濟垂拱之治可左諫議大夫鄭性之除端明殿學士簽書樞宻院事同提舉編修經武要略加食邑食實封制朕廸簡在廷儀圖共政繇諫長而選盖僅聞於二紀之間自掄魁而升况並見於一日之頃繄非常之盛舉必不世之竒材翊我事樞揚於制綍具官某身端而行治心廣而體胖鴻漸可用為儀望風髙於華著鷄鳴不改其度志晩適於槃阿維予初潜慕世賢喆未親魏徵之論已稔蕭生之名迨躬攬於萬幾首旁招於衆正擢從郡最列在從途朝入對於治朝暮進登於騎省規君德則中庸大學條國事則天保采薇方累疏之前陳己一言之嘿悟經躋宥府宻賛籌帷由求之切而得之難故知之深而用之速總武經之大筆陟書殿之穹班爵肇啟於徹侯封更陪於多邑以寄股肱之重以示精神之强噫虞舜之治有五人朕方篤任賢之意宣王之德洽四國爾盍思復古之圖叶濟廟謨丕昭儒效可何處久除直寳謨閣知鎮江府制勅具官某南徐襟江枕海而控淮地望重矣制勝孔嚴擇守加遴爾材猷宏碩志氣激壯為御史諫官甞陳内外修攘之略具有本末朕甚偉之冠冕蓬山未暢設施祖逖擊楫渡江之地以奎直徃為朕圖厥功應接於外屏蔽於内威行愛孚而天險之勢以强京師併䝉福也可何琮除直徽猷閣福建路轉運副使制勅具官某七閩樂郊也間者鴟義姦宄多抵冐於法非憔悴菀結莫之省乎爾風槩凝逺性行修潔世道渫濁能不磷淄朕噐之奏對間久矣歛武華要寓直凝邃夙駕暑征徃將使指豈直為飛輓計以鐵冠觸邪之餘威察一道臧否貪亷丙刺舉之使姦吏澄而民氣舒斯稱朕臨遣之意可董洪父自修王公瑾父羽方岳父欽祖趙子森父復先陳子椿父千期朱炎父師友孫鏞父价明堂恩封官制勅具官某總章大饗熙事涓成歛福錫民同躋仁夀爾耄期康彊有子仕版京秩䟽封式昭善慶可太中大夫曹叔逺特轉通奉大夫依前煥章閣待制致仕制勅訪正元之遺事尚想告猶追長慶之髙風遽聞請老莫囬雅志用錫徽章具官某襟度曠夷風規凝粹羊腸峻阪早備罄於忠勤豹尾屬車晚寖隆於恩遇勞禁途而諗疾佚真舘以言歸賜杖竊遲掛冠何急疊進髙華之秩仍通嚴邃之班祗服寵榮益綏夀嘏可正議大夫程珌磨勘轉正奉大夫勅等六曹而上課嚴三嵗之遷超四品而陞秩重八年之轉雖循彛典實著恩章具官某粹學淵深英規山立謀猷獻納備殫日月之忠典冊鋪張叶應風雲之㑹繇殊庭之引興每魏闕之存心積閲既深陟明可後飛鴻自適初何計於穹階鳴鶴相求肯尚遺於宿德可閭丘梓林炎趙崇􅍇趙崇森除大理評事勅具官某等典獄惟平之難漢吏用法巧文浸深於是置廷尉平四人務平之爾皆練習律令而文無害故並命以司庻獄之平明啓刑書胥占咸庻中正則平矣欽哉可虞衡除大理寺正制勅具官某王制獄辭之成史告於正正聽之正所以正庶獄之不正也爾簡澹而詳敏褰帷嶺嶠之東以風力著庸命爾正於李吏有上下其手以舞吾法爾悉為朕糾之庻幾廷中稱平而天下無寃民可權知信州史彌忞除將作監制勅具官某上饒間於江浙頃悍卒軼紀律以駭吾民翦其萌可緩乎爾優於應變勇於討惡尺二渠於市而羣姦之魄裭千里底定朕甚材之召丞匠監用旌爾能繕修務簡益培雅望可趙與懽起復直寳謨閣淮西提刑制勅具官某兵刑一也西淮方整軍經武陳時臬事宜加謹爾公族之雋材優而氣盛甞守輔邦蔚有能譽繁弱可久櫜乎起之欒棘進之奎直徃司臬於西能使在泮獻囚與在泮獻馘同功則移孝為忠之道得矣可大理寺丞桂萬榮除考功員外郎制勅具官某馮唐白首顔駟龎眉尚書郎以老於職為重爾行已純固蒞事精恪丞於北寺不詭不撓盖渉深而識定者也考功課吏之法公則一私則萬殊勉為我權衡之抑揚惟允俟有褒進可權兵部尚書趙至道除寳謨閣直學士知鎮江府制勅法從莫如文昌八座之尊介藩莫如扶風三輔之重必巻舒之有裕斯出入之俱榮具官某早以孝稱晩繇㢘進歴耳目之寄每侃侃以自將升喉舌之官尤循循而維謹久厭禁嚴之直欲尋閑退之盟莫挽而留宜華其去赤刀琬琰峻秘職於西清皁蓋朱幡鞏名城於北固亟上中興之最慰予耆艾之思可太常寺丞兼權右司曽天麟除將作少監勅具官某永惟技巧工匠之鮮及不如宫室苑囿之無増故膳監不以飭工而以程才爾䟽通而艾寛靜而栗材出鄧林信良矣容臺省闥趣陞於少匠厚其儲以致用也爾知噐用利則用力少而就效衆斯識朕心可王瀹轉承議郎制勅具官某朕觀新店民之語知和糴之厲民尚矣爾守滁日糴辦而民不擾數逾三萬應我賞格増秩旌賢尚鞭其後可歸順人沙兀惹特補修武郎添差蔡州兵鈐兼權蔡州事詔勅具官某襄漢奮伐淮蔡底平莫府以戎㨗來上謂爾能知逆順之分赤心歸誼願效忠力蔡人即吾人也爰畀右階就命爾守復民業以趨耕作士氣以待戰保障鞏固斯稱委寄可房應發轉文林郎制勅具官某六騩復土五使置官凡備驅馳悉霑賞賚爾祗吏役例進一階茂對恩榮尚思䇿厲可劉顯以艾評戰歿補承信郎制勅具官某蜀關禦㓂虓將死勇爾父從之鏖戰繼歿羽林孤兒漢恩特厚録爾一官用勸徇國可石天瑞白華補秉義郎制勅具官某等方城濯征垂瓠震潰執訊獲醜餘燼為空爾能自歸貸而官使尚圖忠効用答生全可李駿起復直龍圖閣四川都大茶馬制勅具官某秦蜀𣙜牧之政分合凡幾然非其人分任而不足得其人合治而有餘爾沉毅足以經逺果逹足以治劇所居底績晩譽更偉坤維事力日匱茗法壊而後馬政壊頃甞分任未見其益也茲庸合以命爾且寓直淵圖以重其行毋俟祥琴慷慨叱馭能使亷信浹於園戸行於蕃落則摘山富而效牽煩矣可工部郎中鄭寅除尚左郎官制勅具官某艮以止為體能時止則止然後能時行則行爾簡粹而通亮為郡甞以治理效聞顧時俗之流又孰能無變化懼荃蕙之為茅也而恬然歸潔坐玩嵗華待化機之轉移偕衆正而彚集其將有行乎郎選甚髙毋憚於劇朕方思所以進爾者可王邁轉朝請郎制勅具官某𣙜務萬貨萃焉而摘山煮海之利居多羡入必賞厥有著令爾材優於從政甞司出納嵗有羡利其知理財正辭之義乎一官懋賞益圖爾庸可將作少監趙與芮除大理少卿制勅具官某孟侯朕其弟必巻巻以陳時臬事丕蔽要囚為誥豈非刑者君子所盡心焉友之篤則誨之切乎爾氣質金玉歩趨繩矩卓有大雅不羣之風朕猶欲其政事之篤也既試之大匠又試之少大理民命至重國脉所關欽哉惜哉其寧惟永爾亦與有令聞可鄧雲轉武節郎制勅具官某山東逆儔負固淮楚大震貔貅之氣一空狐兎之羣制閫第功爾甞鏖戰進官四等獲戎湖右其日夕淬厲以稱信賞可王旻勅具官某峻升武級用奬驍雄仍顓戎律之嚴坐鎮邉城之重祗承異渥勉䇿竒勲可餘同上直寳謨閣宫觀劉宰除太常寺丞制勅具官某聖人與曽㸃悦漆雕開盖不汲汲於用乃所以致用也爾德於天者厚求於人者淺見幾逺引樂道而著書與行乎國政之久者相為終始世方瀾倒獨落落乎其有風飈朕甚嘉之㧞之槃澗丞我奉常幡然一來尚不負國人之望可考功員外郎桂萬榮除尚右郎官制勅具官某比嵗倖門開而吏道雜武級猥濫尤甚綜覈方嚴銓管宜允爾為考功郎氣嚴詞厲莫敢欺推是以修審官西院之法鑒掲而妍醜分衡設而輕重判劇曹其澄乎來幾何日三錫厥命用惟其才毋謂序進可平齋集巻十九
