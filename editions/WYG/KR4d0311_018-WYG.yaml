body:
  text: 平齋集巻十八宋洪咨䕫撰外制太府寺簿劉炳除諸王宫大小學教授制勅具官某行葦忠厚内睦九族豈惟睦之必擇師儒以玉其成爾西産之良邃於易能發明未畫之藴其師表于磐石紬繹義理切劘情性使成人有德小子有造則予汝嘉可軍噐監丞謝奕禮除大宗正丞兼權兵部郎官制勅具官某丞郎朕所重非其人不輕畀爾韋平之裔有詩禮之傳隂馬之族無富貴之累可謂雅噐矣丞我大宗攝徂郎省豈特用為爾榮恭儉惟徳恪勤廼事朕將以是觀爾之致逺可賈似道特轉奉議郎制勅具官某朕建后於相家又命妃於法從而關雎之化行進封有俶推恩惟稱爾襲芳弓冶之傳承暉四星之首擢丞武監進秩二等奕奕光榮矣務學好修用燕多祉可度支郎中謝采伯除軍噐監制勅具官某吳越之劍取其地良妢胡之笴取其材美朕觀諸此得噐使羣工之道爾生相家而無驕氣地之良也挹儒科而有能聲材之美也地良材美繇郎版部長戎監疇不謂宜豈徒以肺腑進哉易之除戎詩之備械書之􅙀胄敿干皆今急務毋視訓工程作為猥釀而不之屑可魏峻除太社令楊璪除籍田令制勅具官某等社籍置令類以公卿佳子弟處之鸞停鵠峙於梧竹間貴其稱也爾峻貂蟬世家風度凝粹爾璪筆槖名裔氣禀開敏或司國社或掌帝籍列在容臺培養逺噐其益勵於學以對寵榮可華文閣待制知瀘州魏了翁用明堂恩進封蒲江縣開國男加食邑制勅朕有懐時彦宜錫神釐具官某學貫乎古今氣塞乎穹壌立朝素節挺朝陽之梧桐去國丹心凛歳寒之松栢屬更張之伊始顧趣召之宜先頴川正急於借恂宣室遂遲於見誼既底於治廼遄其歸維昔宗祈敷時餕惠駿奔百辟曽齊胙之靡儀燕衎一賢胡魯膰之未至宜爵升於糓辟仍戸衍於畬圭爾毋謂萬鍾之何加朕方念四簋之不飽亟承顯渥入告嘉猷可餘同鄭性之諸王宫教授蔡仲龍除太常博士制勅具官某奉常禮樂之司王政由出朕方起耆儒為介卿以備諏訪博士叅之宜得賢才爾醖藉其學詳雅其度楷模宫邸蔚有賢聲端委佩玉据經以訂損益之文折是非之議盖裕如也彼度吾所能行而遷就焉朕安取此太社令李晞顔除大理司直制勅具官某三尺法具在枉於舞文吏朕甚憫焉必得古之遺直而後可為邦之司直爾詞藻有華業履有度所居官惟法守是謹以是議法於廷尉不橈不折不􅄽不濫而王道行皇極立矣枉己未有能直人則孟軻之戒可敷文閣學士李埴明堂恩加食邑實封制勅具官某學博而識明氣全而節勁螭頭去國望久鬱於論思豹尾行邉功獨髙於綏定屬大權之親攬務衆正之詳延首告李泌以束裝欲為賈生而前席正深樂只宜亟來思維昔宗祈敷時餕惠肆疇采邑仍衍真畬餘同鄭性之魏了翁戸部侍郎京湖制置使史嵩之明堂恩進封鄞縣開國子加食邑制勅具官某賦頴脱之才抱輻輳之畧從途榮顯侈世業於韋平制閫崇嚴聳軍聲於羊陸惟四履遐􅇏之絶警故九筵精意之潜通禮既底於熙成福寧容於專嚮爵升蒲璧户衍畬圭帝命式於九圍朕既荷受球之寵天威不違咫尺爾毋忘拜胙之恭懋暢英猷對揚景况可餘同上徽猷閣學士新知太平州鄒應龍明堂加恩制具官某學擅掄魁望髙法從居易以俟命初無徇世之心充實而有輝未䆒濟時之藴試望之於馮翊得汲黯於淮陽雖廣合宫之詢尚遲宣室之見維時熙事丕舉慶條肆加多邑之榮庸示名藩之寵綏我思成者在於温恪介爾景福者由乎靖共茂展英猷對揚休渥可餘同上華文閣學士知慶元府余嶸明堂恩進封信安郡開國侯加食邑制具官某學擅名儒材優法從長沙之稱吳芮久藉蕃宣東海之得翁歸更需鎮撫雖緩受釐之訪靡忘籲俊之思廼睠明禋迄成熙事餕惠下逮於煇庖之賤脤膰上親乎族姓之尊豈繄時髦可後祭澤肆進徹侯之重仍加采邑之腴綏我思成在於温恪云云餘同上楊汝明聶子述明堂恩進封加食邑制具官某業擅名儒材優法從騎星辰於奎閣歩武寖穹挹風露於珍臺精神更逺屬改絃而更始每前席之興思廼睠明禋迄成熙事惟予靡忘於寅畏爾毋替於辰猶可餘同上吏部尚書崔與之除端明殿學士提舉西京崇福宫制勅節誼天下之大閑而厲其節者在人主徳齒天下之達尊而褒其徳者在朝廷朕眷懐東海之濵夙著南陽之望渇於見晩趣使來思顧抗志之何髙宜疏恩之特異具官某純明而績學靜定而善謀東撫淮堧制勝紛㧝之表西馳蜀道計安震擾之餘乃荷寧考簡知之深予冲人注想之切遲十年之圭覲洊一旦之旌招戔戔之賁丘園儀圖共政囂囂之樂畝畆懇請辭行屹砥柱於患失之波歸靈光於戒得之境免從雅志丕振髙風維元祐諸賢之方來獨范鎮屢召而不至進承明之祕殿領崇福之殊庭兹復見於耆英宜一循於優禮鳳翽翽而亦集爰止朕雖阻於儀刑駒皎皎而毋有遐心爾尚殫於訓誥可華文閣待制江西安撫使陳韡除權工部侍郎兼江西安撫使知隆興府制勅政令寛猛之乖而後有苻澤之姦民困饑寒之廹而後有潢池之盗鉏萌芽則力易圖滋蔓則功難有嘉討捕之勞庸示褒遷之寵具官某忠以體國儒而知兵遏淮㓂之鴟張威名早暢殄閩兇之螽起籌略更髙緑林動於循梅黒祲被於汀贑跳梁莫制震蕩靡寧朕合三道而建元戎爾鼓諸將而鏖劇賊訪鴻鴈於棘荆之下追狌鼯於篁竹之間左翦右屠而禽其良既大懲於弗靖下筦上簟而安斯寢遂咸樂於有生以數年宣力之勤底一旦成功之偉宜進班於起部仍宅牧於洪都勉為朕留益振如虎如貔之氣盡除民蠧永凝買牛買犢之風可大理寺丞鄭伯謙差知常徳府提舉德灃辰沅靖州兵馬制勅具官某武陵枕重湖帶五溪民夷錯處牧御非易必熟知德意者徃綏之爾厚而不浮莊而不撓正於廷尉惻然惟恐一民之寃德意盖熟之矣出布藩條旁制四郡奉法循理以康又民夷俗亦將聞風而帖服本正則末治也朕方以責實課吏爾求為可知嗣對光華之渥可復中大夫直龍圖閣致仕季衍特贈通議大夫制勅具官某天未有久而不定者士君子所以不急乎人之知而蘄乎天之知也爾公而忠亷而直所至厥績用茂顧以閑退終人勝天乎朕思起事功於積弛而才之難九京莫作良深悼歎既還爾秩又寓直羲圖進兩階以追榮之天者定矣魂而有知歆此愍章可新知西外宗正事趙彦紓乞休致除直祕閣官制勅具官某奔競成俗如水趨下有安於命誼而無得心吾能尊顯之爾業履平實治行亷靜甞為部刺史通顯矣耻於浚常之求甘從肥遯之樂讀書求志若將終身朕起之外宗曽莫能奪何巻懐之深耶寓直木天優游閒舘身愈退而愈榮可以媿世之嗜進而務得者可王儀特轉朝奉郎致仕制勅具官某仕者以員外郎致其事則澤及後嗣非㑹課應格不可倖得爾疏通而勤敏甞貳安慶板築之功居多引疾告老進秩一等不俟積閥遂郎員外殊恩也歸而教忠尚其無斁可朝散郎直祕閣李燔特轉朝奉大夫直華文閣致仕制勅具官某朕新美政化民獻有十夫予翼方來而未艾也胡一賢之不憗遺爾早從諸老之游熟講有用之學果逹而藝從政何難時未可為則巻而懐之時可為矣則嵗不爾與果制於命也耶陟序正郎陞華奎閣榮其歸老示我惜賢可歸順人偽防禦使樊辛特補武翼大夫忠州刺史淮西兵馬副都監制勅具官某淮右鞠旅汝南歸疆爾有簞食壺漿之迎我無亡矢遺鏃之費肆加知義易授穹階徃分刺郡之榮仍領䕶戎之寄勉殫忠力用荅殊恩可李大謙特轉朝議大夫依前直寳章閣致仕制勅具官某竭忠盡瘁者人臣之職分榮始厚終者人君之恩禮爾寛平而栗精練而介吏能著聞久矣輟從郎省司臬左淛皇皇臨遣精神尤炯然也亡幾何遽以謝事告良用閔惻華之奎直佚之祠舘又陞之元士始終恩榮爾尚奚憾可寳謨閣待制致仕毛憲明堂加恩制具官某松階凝邃了忘勢利之榮栗里蕭閑自適性真之樂屬勵精之更始毎籲俊而興思肆衍邑畬之富庸増家食之華予方篤養老乞言之意爾無忘歸美報上之忠可餘同魏了翁等制許應龍除禮部郎中制勅具官某朕親政以來除南宫郎者再西垣北扉斧藻王度皆由此其選爾㓜襲荃蕙之芳歩武珩璜之節璧海瀛山休問籍甚望郎出守挹汗瀾之澤於潮學益老矣撰遺草奏挈之華峻能以博古之識昌用世之文其昇也熟禦可司農寺丞傅㻾除都官郎中制勅具官某周司𨽻總冗辱之役屬秋官漢都官從事掌中郎官不法屬司𨽻今庀曹憲部挈令𨽻士職古而事簡爾儒術通明吏事詳敏累綰郡紱綽有治行蓋能世其家者渉筆農扈甫謂之來賜墨隃糜趣進厥序其欽飭百𨽻使不枉於法以培卿用之望可淮西强勇軍統制吕深轉武經郎制勅具官某廼者山東逆儔敢犯王畧大振貔虎之氣亟正鯨鯢之誅制閫第功爾甞鏖戰進官三列仍統一軍其日夕淬厲以稱信賞可趙汝遇除度支郎中制勅具官某地官帥屬以經邦用司金職其入司度司其出贏虗所關維材是授爾􅏡歴中外以老成精練聞國費積冗軍調紛集楮幣鹽筴術窮而莫繼爾其精意計度量入為出斟酌損益而圖厥中毋徒委諸有司之吝可安恭行除大理寺簿制勅具官某朕緬懐光朝樞臣保蜀之勲而其報既擢其子又録其孫爾競爽而警敏王父所鍾愛也丞郡東川方騰善譽簿正棘庭趣登華綴三世有績於朝榮矣哉仕優則學圖稱厥家可利州路轉運判官陳隆之除直寳章閣權知沔州兼利州路提刑兼提舉制勅具官某蜀號天險沔當要衝積吾百年之經營空於一旦之蹂躪孰寛憂顧宜得偉材爾氣鋭於理紛術優於應變祁山斜谷之遺蹟木牛流馬之故智紬繹蓋精輟從漕輓徃圖控禦合兩節奎閣以重其行爾能以公滅私一意國事阨塞當築堡塢當修流離當集疲弱當練悉為朕挽舊觀而囬之進可以瞰秦隴退可以蔽梁益則維汝功可利州路提刑王翔除利州路轉運判官制勅具官某武侯用蜀每患餉道之不繼以木牛流馬為未足而雜耕渭上規模逺矣朕訂古謀今慨然于懐爾志氣宏壯材猷􅅛達周旋劍棧之表具著勞效繇憲而漕豈特以平時將輸望爾關隘空於冦攘閭井蕩於兵燬舊規猶未還也爾其以堅力行實政安輯流離經葺荒墜使民趨生業之樂則兵享耕屯之利西顧庻其寛乎可平齋集巻十八
