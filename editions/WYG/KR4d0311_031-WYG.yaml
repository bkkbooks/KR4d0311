body:
  text: 平齋集巻三十一宋洪咨䕫撰墓誌銘吏部鞏公墓誌銘靖康建炎間中原學士大夫多避地南徙鞏至自東平呂至自東萊愛寳婺溪山之勝家焉地偏俗古文物未振山堂鞏先生首以北方之學授徒著録幾數百人呂成公繼講道明招精舎負笈坌集聲氣薰浹淵源濡漸類為世聞人公諱嶸字仲同山堂季孫成公門弟子也糿神氣明粹風骨凝重大父愛其似北人曰必昌吾宗長偕兄豐執經明招鈎邃摘幽神接心領出語輙破的同舎歛袵避其鋒中淳熙二年第授嚴州建德尉調淮西摠領所凖備差遣以格知徽州歙縣憂免起知處州麗水縣當路交薦其材入提轄㩁貨務都茶場幹辦諸軍審記司遷太學博士進大理寺丞出知嚴州未踰月改邵州擢都大提㸃坑冶鑄錢司職事修舉直秘閣因其任七十餘年曠典也除侍右郎官以煩言畀武夷祠起家知温州擢江西轉運判官比年丏閑有㫖入奏未行除司封郎官罷奉鴻禧祠祠滿檢會續食而春秋寖高浩然已忘世故垂車得請日杖屨溪山間弄花漉月昌羊忘返曰佚我以老上恩深矣寳慶丁亥三月庚申終於武夷里第享年七十有七積階至中大夫爵須城縣開國男食邑三百户初尉建德世其官拯溺字荒不遺力父老謂有祖風淮西總臣被命築歴陽倉修采石戰艦及體訪㳂江軍政舉以委公條畫詳明悉當上意一日大軍庫延燎㧞幟登屋周麾而呼曰熸士力者賞衆奮火撲觀者勇之歙十有八郷訟牒叢夥公日聽郷二操約御詳庭空如水麗水以撫字寓之催科如治歙前積負郡逋累百萬郡胥利其稽索縣賄縣胥乗其索以重民擾公曰此無補於州而厲民以飫吏可乎力白守刋其籍編戸以役破家者相踵為去所以蠧役者民爭應恐後東南仰茶鹽為國計三㩁務總於轄官討尋源委如理家事吏莫敢欺歲入數倍富商木栰之訟府尹掣於交謁改屬於理公當承鞠慨然曰天獄臨安府可乞送耶避嫌止當送鄰路白於朝從之審計輪對論催科管㩁之弊甚力暨為學官適有詔以火災求直言謂學校公論自出不可徒應故事上書陳時政闕失多所指切大略謂兵端不可開權姦忤矣未幾予郡陛辭論外攘當先内修復寓兵不可輕用之意自信不撓朝譽藉甚江右劇賊方棘邵與溪洞接蠻徭性狙易動至即増埤濬隍肄射繕甲以折姦萌發儲勸分置六十四場贍恤飢羸一郡帖然治司孝宗朝定鑄額嵗十五萬緡後寖虧額六不及一公推原弊端知楮輕丱重售不酬費故入少而鑄虧乃使楮與丱各時其直輕重足以相權坑丁競勸丱務倍入先是冶卒窳惰多遺丱泥滓中有司莫之察公置局淘洗所得皆精良於是盡還故額俄兼憲節積潦薄番城民廬半没葉舟掀舞家訪戸厯周䘏之見者引手加額永嘉始至訪名儒之閭問所宜先以海瀕逐末者衆首勸民務本業適歲大比増闢貢闈以受多士士狃積習以逞試之三日躬警䕶於棘外有貴游子挾醉號呶道上莫敢何亟械於市曰士不自愛者視此訖事無敢譁牓掲校藝官例亟行緩則羣譟遮境上生可否公故留宴至累日乃去前所未有也時嚴海道之防得㫖造䝉衝二十艘掾屬請下諸邑公不可捐利誘海商二十人人造一艘按期辦集符不及民漕臺以官軍討捕劇賊日費共億公私告匱公綜理綱條補窒罅漏漕計裕而民不知和糴至百五十萬斛皆商賈願出於市盡革敷配之弊十一州上供歲圑綱六有無相影數多虧公區别窠名使不相紊卒復其舊豫章一再攝閫歲和物阜政平訟簡時往來東湖書院與諸生以義理之學相講明士風為起釋奠帥守宿學必露刅以衛曰此何為郤之士服其知體去之日邦人揭幟追送擁車後先有經夕不能舎去者性静正夷博居官未嘗澤辭色貫聲光以媒進而儒術吏能毎為時所不舎與人不植岸異周旋委曲惟恐失一士之心至不為利囘義疚雖議其介不顧也平居細謹動中徽墨及倉卒應變多出度外邵陽番汭江右凢三斬虣卒弭患未萌其識權類此為政務因其俗未嘗容心終歸之愛利民多繪像祠之始生踰月而孤與兄相依為命白首無間言母楊夫人通孝經論語毛詩大義所至奉板輿行日請所以為政如丱角口授章句時鄉黨稱其孝愛書一過目終身不遺忘作文期於有用非精粹不輕出有厚齋文集八十巻藏於家其先出晉士莊伯世為真定人後徙鄆曽祖燾左奉議郎贈通奉大夫祖庭芝左議郎贈太中大夫父法贈正奉大夫娶何氏繼高氏先卒皆贈令人子友聞儒林郎台州司戸參軍孫端祖從事郎江州瑞昌縣尉次延祖孫女一曽孫男女五紹定己丑正月庚午朔諸孤塟公於金華縣壽溪原友聞以某辱公知最早重趼請銘嗚呼栁下惠聖之和者也而三公不易其介卒窮於三黜公遭時且鄉用矣雲出輙還膏施未光其囿於命也耶銘曰可欲之善莫難於有中庸之德莫難於久何以有之典則世守何以久之源流師友公祖山堂而師東萊學實體用根幹條枚氣定心夷求福不囘絫麾再節用不盡材孰虧孰成蛻和委順易簀琅然忠孝其訓有苑彼阡山暉木潤過者式之我耆夀俊亡弟子文壙誌洪氏世居濳山之谷口大父年二十四生我伯父鎡伯父亦以二十四生我弟琥皆冡嗣也琥字子文生於淳熙丁酉二月丙子後余一歲㓜嬉戲相逐長同就外傅既而予忝一官檣浮轡走胷喘膚汗曽不免於窮子文循分理生足不趼􅆎不折而疆畎日斥􅂗蔇日華林沼日蕃爼鮮以奉親籯書以教子優游卒歲兩忘榮辱余未嘗不欲其計之得也其為人修幹豐下而髯行已恪與人信磊落明白不為深險操切且退然若虛里黨推重寳慶丙戌四月辛夘以渴作一夕不起莫不惋惜之母妻皆増口阮氏男二人日卿庶孫三人尚㓜母夫人慈而肅禮法行於家春秋七十有六失壯子悲不自勝末疾増劇明年九月已亥卒又明年正月壬辰次子璞偕日卿塟夫人於家山鳩起之原從夫兆同日葬子文於西鳩相望三里所兄某攬涕叙其平生納諸壙高朝散墓誌銘嘉定辛巳壬午間成都通守高才卿㤗叔以文學器能為西閫賞重某時員外置間與聞末議回首十寒暑矣其守三嵎﨑嶇走書天目下為言先君子即窆有年識竁之文猶未也蜀非無宗工可屬必公諸東南庶幾信百世子好我敢請案高姓𣲖於齊占籍卭蒲江者世有隐操珣生孝立孝立生興國嘗大書於屏訓子孫學以忠信孝弟為本君其長子也諱澤字叔淵少朗悟絶人書一再過成誦荀楊氏韓栁氏漢唐三國南北諸史皆手抄是非得失反覆究見根極而折以經郷先生趙澥深可之浸尋不偶退謂其子曰基之以孝悌植之以忠信培之以至誠無息天終阨我哉未幾予䇿名奉常君喜見顔靣曰天所逸我也屏舉子業不復省輕車就養笈書以自隨所至隽艾系踵請益危坐縱論要其歸於涵泳孰復而自得幅巾蕭散當路欲一見輙謝去不喜誦佛氏書而戒殺嚴甚曰物我俱生天地間同一氣也用心􅉃怛類如此開禧丙寅夏啓手足於普慈郡文學官舎春秋六十有二累贈闕郎娶韓氏事姑婉恪能得其懽心間君客游手課其子容止服御有常度里黨尊為婦則先君十八年卒贈恭人葬仁惠郷龜山阡從舅姑也君兆卜向六門惟乾食相距三里而近丁夘蜀變淺殯故廬西丙子四月乙酉廼克葬一子即㤗叔今朝請大夫知嘉定軍府事一孫允績某官曽孫男女若干人士求仁之方莫切於孝悌忠信四者秉彛所鈞有甚易知易行也往往由之而不知何哉學失其傳爾君得一語之傳於家庭知之至守之篤朝夕省飭欲天理之在我者皆實而無偽其志於仁矣乎明善誠身上可以順乎親則下可以榖爾子宜其至嘉定而大也銘曰切已之學莫如求仁求仁維何誠善於身孝悌其本忠信其質仁莫近焉落華取寔翼翼緜緜是似是傳榮光漏泉何千萬年二鍾君墓記臨安亭川鍾氏景常生子淵子淵生福州助教億億二子長貴州助教俊卿字子明次將仕郎仁卿字子壽子明娶徐氏生端理蚤卒次端詳一孫與齡子夀娶龔氏生端謨端誼二女適施大用龔英二孫道齡佑孫子明忼慨機警遇事無留難子夀通而敏文多成誦生相後十年志鈞才耦以力業相摩厲凢所規畫兄不自謀必以咨諸弟弟劑度可否聽兄决之壎倡箎和如出一人以故積居懋化中權而獲厚生理既裕又相與以輕財急義聚書樂教為聲華勝士往往願交邦大夫亦賔禮異等居旁池園深秀結堂竹石間扁以世友暇時相携娛娭華髪交映兒姪迭起奉觴為夀雍如也子夀年六十有四以紹定庚寅十一月晦卒越明年八月五日子明卒得年七十有五二君無恙時誓生無異廬死無異兆治夀竁於新安郷南山之原右左以序至是同卜以其年十一月丙申葬焉惟孝友於兄弟知孝於其親而思手足均父母之遺體則能友矣兄弟之子猶子也知伯叔父即吾父從兄弟即吾兄弟則能世其友矣子明子夀之友後人盍求以世之乎嗚呼和樂而家道昌暌疑而外侮起又可不懼乎余探二君友愛之情併誌之使其子各刻一通藏諸墓以慰九原云羅廸功墓誌銘行於蠻貊易行於州里難行於閨門尤難愈近愈不可矯也三代直道㣲俗日益薄有能積忠恕平實之踐使鄉人尊家人親而化耳目所接得臨安羅君介圭元度焉曽祖將仕曉祖文學虨父將仕若濟聚族以恩義相陶浹三世不異居君意承厥考弗懈偕夫人厪苦節約以奉烝嘗酬應内外一簮弗營其私倒已槖且弗勒而量淺機深之戒毎為子姪誦之肅雝一門自為師友升其堂詩書之聲鏘如也紹定甲寅水糓價騰躍道殣相枕前是里中貸子錢者計緡累萬君歎若救死不贍何忍更責若償裒劵焚之他歲饑疫率推食饋藥以振羸乏惟恐不我聞鄉鄰信其長者有訟不之有司而之君取平相踵也人性皆善氣質厚薄則有不齊而行事因之君於善利取舎之間擇明而守確既行於其家又行於其鄉得天者厚矣歲癸夘蓮異葩同柎擢於沼而子震龍生壬午玉燕巢於庭辛夘異竹産於書塾之廡義方發祥蘭院競爽震龍聲撼膠序舎選以優升君時七袠遭逢慈明大慶遂被初品封天於厚德之報未垠也明年二月乙夘以㣲疾考終於家巷哭多失聲十一月庚申葬平西上沈塢夫人先六年卒同兆子男四震龍正奏名進士次友龍從龍一龍女四適俞元龍俞鎔呉伯振郎應午孫男六女二銘曰盡已忠乎推已恕乎踐其著乎處其裕乎噫庶乎元度乎吳致政墓誌銘東朝慶霈臨安吳君孝先謙仲以子元卿為太學諸生封初品官越再歲紹定癸巳春正月壬申卒夀六十有八先是君未屬纊晨起語家人吾夢遊穹林邃洞三茅君命之坐殆非久於人間世者自今勿以肉食進越半月曰吾殆病矣四肢百骸無所苦而胃少弱自今勿以粒食進惟日飲參棗湯兩瓦桮又半月曰參棗煮湯固佳未免烟火氣棘人苐汲井花水飲我可也如是者又半月水不復飲矣翛然一榻神恬氣明親交省候人人起道寒温叙慇懃去則執手訣别以寡慾延年樂善受福為勸唅殮葬祭纎悉治命忽整衿曰吾苦目𤯝累年今劃若開明亟取筆來書頌甫畢而坐暝莫不異之君讀書務實踐耻為口耳之學晚倦游場屋移志道書得谷神琴心之㫖毎謂其說與吾儒同歸手稡孔子子思孟子仁義孝弟之訓自出機杼纂為科典亡慮萬餘言冠佩宣誦聽者竦立家事付諸子深居燕坐飛神御氣排膠葛而泝沉寥超摇八極之表水旱緑章精禱雨霽遲速言輙騐静則虚虚則明故也性冲澹不忮競而篤愛敬治家嚴而有節端黙堂皇内外無履聲待人接物恕而慈嘉定己巳大疫暴骼莫揜君募致累萬舉佛老㑹歸之明年歲大祲道殣相枕首發私廪為粥以食餓者巨家相率致助全活不可計又明年糓騰躍猶故盡出伏臘之儲捐直以糶為鄉里先而包黍以遺饑紉絮以濟寒和藥以拯病歲其常也人有善誦羙如已出有不善惻然閔其失本心見義勇前茍利於衆不退顧見賢起敬起慕不暇隣曲小故傷和雍容談笑以平其忿而人犯之不校親族以事咨訪立為劑量輕重使不失凖雖童稚必拱而忠告其篤於信道而誠於善自少壯至老猶一朝夕也卒之日郷閭逺邇嗟惜不容口室鍾氏先六年卒墓在福昌玉泉山君以某年八月甲申合葬焉曽祖某祖某父某將仕郎男五元卿和卿舜卿舟卿德卿皆業書二女適進士鍾甫錢克俊孫男七人道家以清浄自然為宗致柔返樸而虚其心所以求道也東郭順子人貌而天虚縁而葆直清而容物深於道矣君中扄虚明内行純固盖淵乎似之委蜕乗化宜有以異於人哉某省族牀下屬以幽竁之銘掛劍之義不可寒也銘曰深根寧極絶外營危坐内照虚白生龍章虎籙提玉衡鞭風駕霆溘上征九光前𨗳八景迎祗欵寥陽朝通明紫皇濳簡一念精瑤宮璇臺􅎁標名積功滿千道紀成拍手下招􅋖人盈獨騎黄鶴凌太清遺劍墮舄搖寒晶雲氣紛葱䕶佳城郎廸功墓誌銘余自郎曹以言事謫僑居西市距君舎二里所嘗過君飲君時已七十餘姿狀厖艾髯髪盡白酒酣慷慨道平生經行山川之險易風俗之媺惡及可喜可愕事纚纚有本末且言開禧初淮楚驛騷身在圍城中間以竒畫干主帥用輒中圍解欲官僕掉頭挾所得胡人弓矢徑歸毎北風塵起拂絃撫笴猶踴躍自喜恨不獲窄袍快馬蹴􅂿氷雪効驅馳也語畢目光烱然如秋隼之欲撃意甚壯之問君何以不從戎曰吾宗本詩書家也景德六年逺祖簡登進士第仕至工部侍郎名在國史衣冠中絶落莫幾二百年物乆鬰必怒􅁬貨久居必暴贏僕少游四方閲人多視諸孫當有以儒科進者歸出槖中裝延師教之晝綜理家事夜張燈挾筴坐孫輩旁吟諷與相應和老者未寢少者不敢懈以故偉伋能力學於紹定壬辰同忝科第以續前脉僕藉是亦偕初品孰與鶡冠多因扣君養生以何術曰寡慾安生以何術曰寡怨治生以何術矍然摇手曰是非考功所當問老夫亦不能語考功也余今浮湛周行媿且病念君涉多而見博年耆而識明沼魚畦卉可以永日欲歸效太史公訪所過長老從君執筆記所聞而遽以不起訃噫惜哉君郎姓在漢為安丘人在魏為中山人唐五季以來世為杭之臨安人贇生瑀瑀生孜孜生君君諱思字伯永性明直無機械事母孝老彌篤撫鞠猶子盡恩平居意色沉毅閨門整暇與人言是是非非不茍同臨財義不立責劵而樂周急生以紹興庚辰卒以端平乙未十一月八日娶章氏封孺人男三謙詠該季早卒女嫁施廷祀孫男七偉前紹興酒官儀俶伋新慶元市舶務儼僑俌孫女四曽孫男女十二卜以明年三月壬申葬君於章塢先域偉伋奉大母命來乞銘曰曽大母嘗得銘大父不得銘寧不葬惟先生哀憐之因次第其說系之銘曰動以順乎時為富静以安乎命為夀四世而林立一科而岐秀其蓺之深封之茂也夫平齋集卷三十一
