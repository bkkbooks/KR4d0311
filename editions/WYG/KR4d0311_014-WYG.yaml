body:
  text: 平齋集巻十四宋洪咨䕫撰内制端明殿學士正議大夫同簽書樞宻院事陳卓再上表辭免簽書樞宻院事不允仍㫁來章批答葢聞宣王中興倚重於孝友之張仲有孝友之臣主於内則戎車四牡始得以成功伐於外卿踐履全君子之和操守得大臣之正朕之張仲也自登宥府物望具孚進不躐等厥任増重夫國勢之安危在所寄邊防疎濶軍律放紛風寒之慮太深隂雨之備宜亟卿雖位樞庭之末可過謙乎所辭宜不允仍㫁來章曽從龍再辭免樞宻使不允批答召虎江漢之命姬旦淮夷之征皆爵上公往衞中國欲威靈之旁暢必名位之崇加卿有武而有文能定而能應處基命宥宻之寄得受任危難之風果為朕行耶趣進臨於都㑹吾無復憂矣知坐折於遐衝胡尚遜於使端似未孚於予志望之重則可以盡䕶諸将權之尊則可以奨率三軍矧視周家之禮猶輕其在國朝之典未逺匪隆縂統曷聳觀瞻抑使表裏聨絡之諸屯皆識上下綱維之深意玁狁孔熾我是用急姑煩籌筆之勞徐方來庭王曰旋歸佇錫命珪之寵倚毗良切傴俛奚勤所辭宜不允魏了翁再辭免簽樞督視荆湖兵馬不允㫁章批答昔在先朝蜀出名輔張浚精忠之山立允文碩畫之淵深皆於王事靡盬之秋克奮元戎啓行之畧朕方深於憂顧卿盍展於英猷荐披謙牘之勤猶遜師干之重睠禁途之獻納暨經厦之建明雖所陳略施未盡如賈誼之志然其策常用已深識子房之心兹共濟於艱難乃過虞於扞格况上流之形勢甚重而中朝之體統不殊精神既孚􅍺絡自貫甲寅報可亟宜上方略于金城辛巳饗功詎止訖天誅於洄曲倚須戒道勿事循墻所辭宜不允曽從龍第二次辭免樞宻使都督江淮軍馬不允㫁章批答易之師正丈人吉非必以素居富貴稱也才謀德業衆所尊信畏服則國勢倚之而重卿德業之茂才謀之偉積孚於衆望出分憂寄盡董師干十乘啓行有日矣本兵置使特壯前茅豈以富貴卿哉况兩相兼官於中元戎專官於外體貎均一脉絡貫通修扞于艱以敉寧武圖功盖在此行虎拜稽首對揚王休毋屢勤遜牘為也所辭宜不允仍㫁來章文武百寮宰臣鄭清之等上表奏請皇帝正月五日天基聖節御紫宸殿上夀不允批答朕親攬政柄以來嘉與海内相安于善治而秉德不康寧無以輯天人之和咎證荐形於象緯妖氛旁煽於疆陲致使吾民重罹其害夙夜怵厲心焉如擣其敢晏然盛禮備樂於廷以侈誕彌之慶哉群公百辟盍圖往求朕攸濟顧援承平舊章以請君曰卜爾萬夀無疆固天保歸美之至情而嚴恭寅畏天命自度治民祗懼無逸享國之長在此不在彼也其思將順用副憂勤所請宜不允文武百寮宰臣鄭清之等再上表奏請天基聖節御殿上夀不允批答誕節之置非古也我朝列聖觀㑹通以合禮必隨時而酌損之上天示變則寢同天之祲容萬民失業則蠲天申之縟典盖以畏天恤民為心不以位為樂也朕獲承至尊休德於今一紀露囊獻賀毎抑而不進矧今玩荐雷之象恐懼修省莫敢遑息而可効千秋為宴樂乎約浮崇簡朕志堅定卿等勿重請也所請宜不允謝奕昌再辭免授保寧軍節度使提舉萬夀觀恩命不允仍㫁來章批答后父據春秋褒紀之義帝舅縁大雅申伯之意而外戚恩澤寖薄其來尚矣卿以相門芝蘭之彦中闈棠棣之雋蹈履規矩藹有令譽翟車歸謁首建騂旄雖恩數超出拘攣之表而人不謂過豈特舊章之可循抑官惟其稱非私昵之及也樊氏世篤隂亦戒侈恂恂苗裔傳龜襲紫朕所以期卿者甚逺毋留成命所辭宜不允仍㫁來章謝奕禮再辭恩命不允仍㫁來章批答閨門者王道之本后有進賢之志無私謁之心則公道行而倖門塞紀綱立而名器重雖同氣何有乎濫恩卿傃富貴而退遜服儒雅而謹勑后實嘉之于邑于謝寢廟既成禕衣歸省相祀有恪伯仲一日而授兩節度越常科恩義稱也免櫝來上謂除名盛典不容倖得而謙畏有加漢四姓㒺克專美於前矣亟祗若予命所辭宜不允仍㫁來章光禄大夫右丞相兼樞宻使鄭清之可特授特進拜左丞相兼樞宻使加食邑食實封制門下伊尹學而後臣商后所以懋格天之業周公相而為佐成王所以綿卜世之休朕厲精百度之新注意一賢之切望既孚於巗石位宜正於元台咸輯群工渙揚大號具官某道包乎衆甫氣塞乎兩間其無我則顔氏克己之仁其有為則曽子守約之勇升暘谷之日而春萬象翊我初潛興太山之雲而雨八瀛贊予更化即上天下澤以辨分本内陽外隂而進賢凛諌路之復開紛倖門之自塞回狂瀾於既倒坐消貪濁之風泝大川而獨航期濟艱難之運惟宿弊不容於驟革而駿功有待於美成修攘之務孔嚴安危之寄逾重匪進久虚之次曷旋丕應之機是用稽之端拱趙普之元勲恭以咸平李沆之舊德序陞左輔光踐前修總樞機於本兵超品級於賜位仍陪多邑併衍真畬以尊天官冢宰之權以應太㣲上相之象於戲一德咸有莫大乎主善之為師百志惟熈莫先乎任賢之勿貳予欲天縡之穆汝翼予欲國棟之隆汝為予欲職業咸修汝明予欲形聲俱和汝聽仰承尊帝籲俊之意益䆒佐王治邦之功一人以寧萬世永頼可宣奉大夫知樞宻院事兼參知政事喬行簡特授金紫光禄大夫右丞相兼樞宻使加食邑食實封制門下朕玩占㤗象稽若乾文北斗璇璣之斡天樞既運平于四序太㣲端門之列次相爰經緯于三光肆嘉宥宻之英夙稔弼諧之望誕揚制綍旉告廷紳具官某秉先覺之姿厲後凋之操學問貫穿於千古器能包括於三才退然不勝衣充以至大至剛之氣淵乎其似道形為可觀可度之容徧儀禁路之華趣踐政途之峻力扶更化備罄陳謨惓惓乎任賢而去邪懇懇乎理内而禦外尚猷詢兹黄髪獨知籌慮之深咨岳有能奮庸咸謂延登之晚睠予匪質紹我前休宴紫雲之樓念民生之未裕開天章之閣虞國事之多艱楫舟必頼於烝徒維厦匪資於一木參諸夢卜得爾耆明庸合守文應變之長共致經體贊元之助仍揔提於樞管兼疊進於文階申錫多畬併陪真采於戯仲虺為左而伊尹為右本一體以相須召奭在後而周公在前必同心而叶濟惟宻於補衮則無彌縫之迹惟妙於和羮則有調一之功惟精神強則國勢張惟紀綱正則人心定俾予以治時乃之休可金紫光禄大夫知樞宻院事兼參知政事曽從龍可除樞宻使督視江淮軍馬加食邑食實封制門下朕祗承鴻業逺慕駿功督江左之軍而國勢張晉頼謝安之畧視淮右之師而皇威暢唐資裴度之籌顧采薇治外之孔嚴宜烝民任賢之尤急妙簡元樞之望盡提諸将之權肆諏剛辰式渙孚號具官某學醇而識邃德厚而器閎蚤擅兩都之倫魁蔚為三代之王佐炳謀國之智先見洞乎蓍龜勵事君之忠精誠貫乎金石再踐政塗之峻獨顓宥府之崇一念慮必圖乂於家邦一訏謨必思安於社稷氣塞乾坤之大志期宇宙之清克敷心腹之司宜佐股肱之郡屬鞬清蹕亞父細栁之風摲邑麾城子雲長楊之賦眷言江塹粤若淮壖昔稱南北畫限之區肯蹈東西分晉之轍兹太乙之神來格久占福曜之臨而甲子之厯有開適應初陽之復趣迎善氣特命元戎皇天付予有家莫重要衝之守寧王遺我大寳適資艱運之扶維文武之全才藴深沉之大畧就陞使領仍衍井畬總表撐裏拓而定規模合前茅後勁而受節度風生草木聲震山川聖策定則有功可必應兵之勝真儒用而無敵何難外侮之平注倚非輕延登有待於戱義問之拒逆亮収萬全於指顧之間張浚之却偽齊奏三㨗於談笑之頃朕方恢於祖烈爾宜邁於前修衆益集則精神強列戍睦則首尾應亟菑攘於外侮用勱相於中興可平齋集卷十四
