body:
  text: 平齋集巻七宋洪咨䕫撰故事高宗皇帝建炎元年冬十月内侍自京賫内府珠玉二囊來上上投之汴水翌日以諭輔臣黃潛善曰可惜有之不必棄無之不必求上曰太古之世擿玉毁珠小盗不起朕甚慕之庶幾求所以息盗耳臣聞人主一念之動左右承之百辟趨之天下嚮之故好惡之念當謹其㣲蓋此心不能兩用有所重則有所輕愛易流之隂者視尺璧如瓦礫寶難得之賢者視逺物如糞壤徑寸之珠不易齊之四臣連城之璧不奪趙之一士審輕重之義也魯公伐衛齊人來歸衛寶而意不啻足齊伐北燕賂以瑤甕玉櫝遂不克而還此念一為外物所移志消氣沮矣我高宗皇帝紹開中興急欲信大義於天下以内侍所獻投之汴水使左右諸大夫國人皆知志不在小而在大與光武手不執珠玉同意用能收拾人心於渙散之餘振起國勢於頺壞之後後聖所當法也廼者經畧山東九重之上初未嘗有嗜好見於外而當國惟寶玉是狥諸將旁搜巧索争投所好珍竒異玩坌集私第歸附者得以窺其無志於中原而動於惡臣願陛下一懲宿弊而反之凡以珠玉服玩來獻皆碎之通衢以示聖意之所嚮邊臣聞風亦將以功名自勵務為亷白以服豪傑盗賊之心事功可集矣至若中原銅鏹亦不必以輦入内郡為功昔張林告淮閫有云土地歸本朝銅錢安徃識者謂為至論謀國者所當察也晉謝安以荆江二州並缺桓石䖍有沔陽之功慮其驍猛在形勝之地終或難制乃以桓石民為荆州桓伊為中流石䖍為豫州既以三桓據三州彼此無怨各得所任其經逺無競類皆如此臣聞御得其道則天下狙詐咸作使御失其道則天下狙詐咸作敵御之為言以馬喻也譎銜泛駕之馬跅􅕟而難制使王良造父御之則鳴和鸞逐水曲進退伸縮無不如意否則駻不受覊矣謝安之用三桓人徒知其經逺無競而不知駕馭之術黙寓乎其間蓋石䖍趫㨗絶倫既奪之上流而石民與伊非所患兼是時荆江豫三州軍事皆在安都督之下而兵權實操於内此首重則彼尾輕也茍朝廷無以操其權而制其命王彪之所謂兵權萃於一門非深根固蒂之宜安烏得不為之深慮哉知此則知八柄馭臣雖王者有所不敢忽高帝詔曰欲省賦甚今獻未有程吏或多賦以為獻而諸侯王尤多民疾之令諸侯王通侯常以十月朝獻及郡各以其口數率人嵗六十三錢以給獻費武帝制初郡十七且以其故俗治毋賦税南陽漢中以徃各以其地比給初郡而初郡時時殺吏漢發南方吏卒徃誅之費皆仰給大農以均輸調鹽鐵助賦役故能贍之然兵所過縣為以貲給毋乏而已不敢言擅賦法矣臣聞人君有愛民之實意而後有及民之實惠漢世詔書出於人主之筆精神心術之㣲悉於詔見之觀高帝欲省賦甚之語簡嚴明白繼之文帝振貸减租之詔勤勤懇懇其愛民實意皆可以對越天地安有不被其澤者漢賦有三口賦以食天子算賦以治庫兵車馬更賦以給戍邊此詔所欲省當是斯時又有獻賦郡國假獻為名重賦以為民害故亟欲省之方楚漢之争未决則初為算賦及天下既定則欲省獻賦以此見傷財害民無如兵費之重兵費百出而欲行愛民之政蓋難然愛民之意不可以兵而間斷也武帝元狩之詔謂君者心也民猶支體支體傷則心􅉃怛非無愛民之意而好大喜功移之臣嘗考司馬遷平凖書其論帝取財贍兵本末凡十餘節一節害深於一節曰江淮之間蕭然矣曰廢沮誹窮治之獄用矣曰三人言利析秋毫矣曰吏道益雜而多賈人矣曰稍稍置均輸通貨物矣曰無慮皆鑄金錢矣曰公卿大夫多諂諛取容矣曰楊可告緡令縱矣曰縣官有鹽鐵緡錢之故用益饒矣曰株送徒入財得補郎即選衰矣而終至於曰不敢言擅賦法矣而極高帝欲為民省賦帝乃聽吏擅取非經常之賦夫豈不知有民哉置郡方新顒顒待哺恐廢前功惟求趨辦雖欲禁吏之不擅賦不可得也益口賦三十輪臺悔之猶幸此意不絶如綫而仁義之澤未至於遽斬此所以壽四百年之脉與紹興元年六月辛已上虞縣丞婁寅亮上書言宗社大計欲望於伯字行下遴選太祖諸孫有賢德者視秩親王使牧九州以待皇嗣之生退處藩服上大嘆寤戊子上諭大臣曰昨令廣選藝祖之後宗子二三歲者得四五人資相皆非岐嶷且令歸家俟其至泉南選之臣恭考高宗皇帝誕聖於大觀丁亥即位於建炎丁未至婁寅亮上書之歲聖壽方二十有五萬世無疆之計大矣哉蜀先主將東征孫權羣臣多諫不從大軍敗績諸葛亮嘆曰法孝直若在則能制主上東行就欲東行必不傾危矣唐太宗欲自征高麗羣臣多諫不聽凡㧞十城上以不能成功深悔之嘆曰魏徴若在不使我有是行也臣聞孟子曰入則無法家拂士出則無敵國外患者國恒亡蓋自堯舜不作人主孰能無舉動之過所賴以拂正其非而反諸是惟左右前後之臣耳而便佞者逄之輕黠者長之具位者拱視而不暇問畏事者竊欲而不敢言幸而敢言亦惟一言以塞責而終歸於首䑕人主過舉於是莫之能救使當舉動少差之初力盡面折廷諍之誼引裾不從繼以折檻自非諱過愎諫之主安能不瞿然悟幡然改惟其若宫之竒懦而不能强諫故雖諫無益也先主復關羽之恥而興忿兵太宗討高麗之罪而興貪兵非無黃權褚遂良等之諫而所諫不力無救於行法魏二臣猶在必將激烈懇到極其骨鯁不從不止也夷陵鴨緑之悔當時諸臣安得辭其責哉雖然亮知惜孝直而考其推擇之素特蔣琬費褘之純良向寵之淑均何望其復有孝直之方勁太宗知惜魏徴而田舍翁之怒見於生前仆碑停昏之恨形於身後敢言之氣沮喪殆盡末節欲望廷臣如徴之剴切難矣是則人君平時能養法家拂士之氣臨事乃獲法家拂士之力上方欲用文武求之如弗及始以蒲輪迎枚生見主父偃而嘆息羣士慕嚮異人並出卜式㧞於芻牧𢎞羊擢於賈䜿衛青奮於奴僕日磾出於降虜斯亦曩時版築飯牛之朋矣漢之得人於兹為盛儒雅則公孫𢎞董仲舒兒寛篤行則石建石慶質直則汲黯卜式推賢則韓安國鄭當時定令則趙禹張湯文章則司馬遷相如滑稽則東方朔枚臯應對則嚴助朱買臣厯數則唐都洛下閎協律則李延年運籌則桑𢎞羊奉使則張騫蘇武將率則衛青霍去病受遺則霍光金日磾其餘不可勝紀是以興造功業制度遺文後世莫及順帝知能任使故士得用情天下喁喁仰其風采遂乃備元纁玉帛以聘南陽樊英天子降寢殿設壇席尚書奉引延問失得急登賢之舉虚降已之禮於是處士鄙生忘其拘儒拂巾祍褐以企旌車之招矣至廼英能承風俊又咸事若李固周舉之淵謨𢎞深左雄黃瓊之政事正固桓焉楊厚以儒學進崔爰馬融以文章顯吳祐蘇章种暠欒巴牧民之良幹龎参虞詡將帥之宏規王龔張皓虛心以推士張綱杜喬直道以紏違郎顗隂陽詳宻張衡機術特妙東京之士於兹盛焉向使廟堂納其高謀疆塲宣其智力帷幄容其謇辭舉措禀其程式則武宣之軌豈其逺而臣聞求賢而不用吉士與不求同知人而不善任使與不知同人主有志於治孰不知非賢罔又而急於求賢者有行可際可公養之仕亦莫不起而應其求海濵之大老至洛陽之年少至東山之高卧者至周南之滯留者至明廷立鵠華階振鷺非不極一時之盛而知不盡所抱用不盡所知如醫者聚参苓术桂玉札丹砂於一槖品雖至珍用與病違雖聚無益也武帝蒲輪之徴一下而異人並出順帝元纁之聘一馳而俊又咸事好賢急士之意前後無間然武帝有儒雅篤行質直推賢定令文章滑稽應對厯數協律運籌奉使將帥受遺所聚凡二十七人而漢以之盛順帝有淵謨政事儒學文章牧民將帥推士紏違隂陽機術所聚方二十人而漢以之衰蓋武帝於人才之長短小大洞察底藴隨所用而當順帝第知來之而高謀不見納謇辭不見容智力不得宣賢才滿朝廷足以美觀聽而已諸葛亮嘗言親賢人逺小人先漢所以興隆親小人逺賢士後漢所以傾頽一親一逺之間盛衰判矣易之損益皆以十朋之龜弗克違明衆賢之助在損之六五虛中自損以從在下之賢則為元吉在益之六二賢者欲致益於上而君之樂受其益未可必也則惟常守正固以待之至王用之以享於帝然後吉有志於治者其可以徒聚天下之賢哉賢者之聚亦豈可徒樂盍簪之盛而不思相與共慰天下之望哉晉元帝建武元年置史官立太學太興元年帝親雩初置諫鼓謗木新作聽訟觀二年置博士員四年置周易儀禮公羊博士帝親覧庶獄臣聞物有本末事有終始知所先後則近道矣先者事之所當急後者事之所當緩緩急先後不舛其序治道何患於不舉元帝承皇綱觧紐之餘宜思興起國勢如拯溺救焚之急顧乃以安平之太體治危亡之壞證以守文之常度制應變之危機故近世論者謂此何等時而舉不急之務訟觀作矣胡不築將壇以拜淮隂太學興矣胡不立武舉以招汾陽親雩之禮行矣胡不屈帝尊而勞細栁博士之員置矣胡不造樓船而命將軍諫鼓謗木設矣胡不修車馬備器械以圖修攘之治是非數端為可畧也典午綴斿胡羯扛鼎中原豪傑競起而逐鹿時之所急不在是也使當時内以經制國用為實政而不以練衣為僅足之規外以嚴飭兵備為實功而不以玉册為茍安之地晉其興乎厥今金甌雖無玷缺之虞玉關未有閉拒之䇿戰難於必勝守難於必固和難於必信而民力國計已俱至於窮不汲汲於豐財强兵先其所當急而論義理者多清談言政事者多細務拆裳補帶以為巧折栁樊圃以為固厝火積薪以為安脱有意外之警臣恐非雍容拱揖之所能辦也席前左端之銘曰安樂必敬前右端之銘曰無行可悔後左端之銘曰一反一側亦不可以忘後右端之銘曰所監不逺視爾所代机之銘曰皇皇惟敬口生垢口戕口鑑之銘曰見爾前慮爾後盥盤之銘曰與其溺於人也寧溺於淵溺於淵猶可遊也溺於人不可救也楹之銘曰毋曰胡殘其禍将然毋曰胡害其禍将大毋曰胡傷其禍将長杖之銘曰惡乎危於忿􅓰惡乎失道於嗜慾惡乎相忘於富貴帶之銘曰火滅修容謹戒必恭恭則夀屨履之銘曰謹之勞勞則富觴豆之銘曰食自杖食自杖戒之憍憍則逃户之銘曰夫名難得而易失無懃弗志而曰我知之無懃弗及而曰我杖之乎擾阻以泥之若風将至必先摇摇雖有聖人不能為謀也牖之銘曰隨天時地之財敬祀皇天敬以先時劍之銘曰帶之以為服動必行徳行徳則興背徳則壊弓之銘曰屈伸之義廢興之行無忘自過矛之銘曰造矛造矛少間弗忍終身之羞予一人所聞以戒後世子孫衣之銘曰桑蠶苦女工難得新捐故後必寒鏡之銘曰以鏡自照見形容以人自照者見吉凶觴之銘曰樂極則悲沉湎致非社稷為危机之銘曰安無忘危存無忘亡孰惟二者必後無凶杖之銘曰輔人無茍扶人無容此武王聞丹書於師尚父為銘以自警也維昔帝王之治天下莫不以敬為主敬則百慮澄不敬則百慮擾敬則萬善集不敬則萬善隳是敬非自外而入也上帝臨女無貳爾心知所畏然後知所敬也人主身都綦貴心受衆攻非隨物致戒以警動之則畏心忘而敬心冺天理之存者幾何武王惕懼而銘諸物不曰視爾所代則曰溺不可救不曰其禍將大則曰社稷為危何其辭之嚴也天真難保人欲易流出入起居之際龜鍳在目庶幾常若危亡禍亂之壓其前而起臨深履薄之懼無一念之非敬也然以武王之聖豈待覩銘而知懼哉堯舜性之也湯武身之也身之則寜過於檢防求進乎性之之域也其或收歛於十手十目之地而縱肆於暗室屋漏之中修飾於親儒生學士之時而玩狎於對宦官女子之頃雖有此銘如無此銘矣故中庸大學皆貴乎君子謹其獨宣公十有五年秋初税畝者何始也税畝者何履畝而税也初税畝何以書譏何譏爾譏始履畝而税也臣謂立法以取民莫患乎其作俑也夫君與民本一家國用之而取諸民民出其所有以供乎上猶子奉父孰不敬應然自昔什一之法公田藉民力而耕收其嵗入民田之私則未嘗有税魯創法履畝以税之國用不足蓋有甚不獲已者乃聖人於此書初以示譏豈非初之所創疑若特一時之暫而後之沿襲必假是以行其無藝之歛如螽之生喙其害未有底止二吾不足而用田賦此其俑也武帝紀書初算車商初算緡錢初𣙜酒酤頗識此意平齋集巻七
