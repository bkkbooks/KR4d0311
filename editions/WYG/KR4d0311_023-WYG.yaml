body:
  text: 平齋集巻二十三宋洪咨䕫撰青詞萬夀觀純福殿開啟甲子本命道場青詞玉厯紹休猥次周星之歲金行紀閏適臨元命之辰祗祓瑶壇具宣瓊籙伏願真遊濳格景貺旁流九扈有秋陶人心於和樂三邊無警鞏國勢於奠安朱表孟秋月閏先甲命元肅延真馭之臨仰控忱􅇆之禱上銷咎證下鎮危情格丕乂於萬方儲鴻休於百世太一宫祈晴醮青詞西成應兊南畝占豐熏心滛雨之憂拜首叢霄之禱伏願飈斿濳格曦馭昭升凡陶玉燭之和俱燕金穣之慶永祐陵下宫顯恭皇后殿神帳後壁山墻坍損修整畢告遷神御還殿表文奠幄栢宫靈斿夙御繕垣椒寢僊仗嘗移屹鳩僝之告功儼燕寧之復次孟冬朝獻祝香文伏願乾文循軌㤗道迓衡愛日薰和民遂熈恬之樂朔方絶警軍無暴露之憂昭德崇勳閣安奉太師趙汝愚貌像祝文維姬有旦維宋有公斷鰲奠極賔日升穹歲閲周星祀登崇功諏禮曲臺妥靈肖容肩摩前哲凌烟嫓隆祭告功臣二十三人祝文容臺丹青森拱星弁有虛其席惟人是踐相我前寧磐宗碩彦訊良告䖍爼豆羣獻甲子本命青詞氣轉一陽甫應初躔之紀辰開六甲首逢端命之元祗演雲籖仰延飈駕伏願天光下濟帝况博臨夀域四方永底寧民之意金城萬里亟收却敵之功滿散朱表序屆初陽辰臨元命宣演沖科之祕導迎善氣之新鶴唳風聲奉天威而制勝星暉日麗受帝祉以緜休立春祭太一祝文天尊神兮挾東皇龍駕翺兮周八荒五福舍兮廸時康祠壇紫兮歌青陽神宴娛兮夜未央星留俞兮集祥光四氣和兮萬有昌三垂晏兮九農穰多受祉兮命溥將太一宫交年醮青詞化宫宻轉序首正於孟陬歳事更新法肇頒於象魏輙輸悃素仰叩旻蒼靖念眇躬適逢多故隴西未靖逞貔虎以慿陵漢上方鏖又風鶴之報警狼烽交於梁沔騎􅅽徧於荆襄由秉徳之不康寧致御事之日艱大跂叢霄而引咎迎端朔以祈休伏願上帝畀矜尊神篤祐以全取勝亟清玉塞之塵轉危為安增壮金城之勢凡遂耕桑之樂悉歸覆育之仁天基聖節青詞保佑自天運應一元之泰誕彌厥月氣陶萬彚之春展寀瑶壇投忱璇極伏願兩儀申祐列曜延光時和歲豐妙叶玉衡之正兵寢刑措屹隆磐石之安朱表星回蓂厯茂迎震夙之期雲䕶芝函備展泰元之薦仰祈昭鍳申錫鴻釐東作西成躋民生於仁夀南暢北洽措國勢於安彊孟春朝獻祝香文伏願緝熈純嘏保合太和雨霽秧疇咸樂東郊之業風恬栁塞盡清南牧之塵攢宫補種祝文路寢孔碩每切慕思春露既濡宜加繕植先事以告維靈之安孟夏朝獻祝香文伏願本支蕃衍疆塲敉寧物被生成穆若薰風之阜民陶耕鑿熈然化日之舒雨師雷師風師祝文天歩方艱以稔為命龍見而雩雨不時若高原下隰暵其乾矣熬熬然巻簔笠倚耒臿以告瘉神所閔也雷霆以鼓之風雨以潤之坎震巽三者之氣合而隂陽和甘霈應既霑既足迄用康年維爾神之功昭慈聖憲皇后永思陵憲節皇后憲聖慈烈皇后下宫修葺奏遷神御表文葱葱鬰欎蟠佳氣於兩儀實實枚枚鞏閟宫于千古飭御史以省視戒工師而繕修遷御有嚴前期敢告孟秋朝獻祝香文伏願氣調玉燭序秩金行雨足周原年屢登於大有風清漢塞運丕濟於中興天基聖節錫宴致語帝出乎震祥開華渚之光雲上于天恩錫鎬京之燕恭惟皇帝陛下聪明時乂剛健日新與物為春播太和于有截自天申命綿景祚於無疆臣等幸備伶官願陳口號寳鳯啣春度玉墀開基節後即天基日行黃道三辰秩斗轉蒼龍萬象熈扶起車攻常武運做成既醉太平時千官拜舞東風裏歡上延英萬歳巵勾合曲嵩岳三呼山鞏聖人之夀鈞天九奏春融治世之音上奉天顔教坊合曲帖子端平二年端午帖子皇帝閤五言三首更化開皇極中興兆赤符節摽千歲厯氣協五時圖又雨足秧分甽風清麥弄岐聖心涵水鏡即是太平基又明進離方午柔生遇已隂妙參三聖易理測兩儀心七言三首緝熈虛敞薰颸細清燕深明晝晷長大學中庸繙詠久金猊幾度手添香又登進英才追慶厯開延正論踵咸平朝廷有道長如此拜賜宫衣信是榮又王師一舉下河東好定規摹繼伐功入眼宫槐宜夏日轉頭關栁易秋風貴妃閤五言二首珮襲芳蘭碧釵明寳篆紅深宫三十六同被二南風又萱長宜男草榴開結子花歡聲喧令節慶事屬天家七言三首綺䟽浸影槐龍轉繡户浮香艾虎垂硯冷玉蜍金井水手抄警戒愛君詩又裁成寳月翻宫扇織就祥雲製御衣朝賀歸來無㸃暑坐㸔燕子引雛飛又穿蓮漏水金鋪邃雪藕衣輕玉殿凉好把毋邪毋不敬細挑綵字夀君王端平三年春帖子詞皇帝閤五言三首龡鳯東風轉携龍北斗回人間遒振鐸天上獸樽開又氷天寒雪餞暘谷齊華賔生意乾坤滿宸襟一㸃春又寛大朝廷詔中和郡國詩欲求躋慶厯先使見淳熈七言三首喚仗紫宸披曉靄退朝清宴坐晴霏簡編有味鑪香永鈴索無聲漏箭稀又東風送喜上天顔吉語飛来井軫間榆塞雪消鳴鏑静栁營月暖撃刁閑又麥苗培秀臘前雪稻種浸芽春後晴野老田夫觀治象便從新歳賀昇平皇后閤五言二首太液輕澌泮温明霽日融菜流芳荇碧花頌瑞椒紅又甲觀韶光集禖壇好語傳思齊男慶百假樂子宜千七言三首塗山隂贊夏王化媯汭宻嫓虞帝仁保合太和無間斷際天蟠地一般春又關雎風化冠周南次第桃夭及葛覃農事未興先獻種女紅方起又親蠶又殷雷金鑰千門邃斜月璇題六寝深禁栁䕶寒烟未起求衣已獻晚朝箴貴妃閤五言二首梅試催籹粉蘭披入夢香迎春占北斗受福拜東皇又象應軒龍次恩承帝座光燕壇風澹蕩蠶舘日舒長七言三首春透蓬莱碧玉壺晴忩恭侍寳奎敷從容玩畫家人卦取次題箴列女圖又鳷鵲雪殘籠霽景鵁鶄波暖颺紋漪宫中不用催行樂草木羣生各自熈又萬年枝上綵綴緑千葉花頭酥㸃紅鏡綬嚢絲相映燭探先半月慶流虹古今詩東山金堂石室舊徜徉被髮依然下大荒風送嬋娟花落蘂雲移縹緲濕踈篁桓伊筝外深情酒幼度碁邊定力香萬事古今開闔眼樓頭吹面水風凉東山即事西風巻宿祲天高近重陽門虚自沆瀣塔静能琅璫幽花多素英穠香奪春芳草木未黃落繁隂留夏凉棋雋决漢楚杯壯迷彭殤醉㡌信孟嘉歸鞭忘葛彊萬事貴適意誰能扣蒼蒼東山塔院春暮太皥明朝禪祝融杖藜能送幾東風兩崖蘿蔓因依緑一樹桐花自在紅聒聒竊脂農即事喈喈摶黍女趨功細思舉世誰閑得一咲浮圖倒影中又絶句折屐棊邊情易矯捋鬚筝畔淚難禁何如拍手招元放玉室金堂深更深三休亭亭在玲瓏山九折岩之南出郭暄欲暑渉林清自秋歩隨目力高身與山氣浮飛来辛夷花拾得蓮葉舟一聲提壺盧四顧叢薄幽詰屈九曲屏突兀十二樓泉流澗級峻雲起樹隂稠左摩紫髯兕右拂蒼鱗虬上呼笙簫侣下瞰錦繡洲太極浩初判此山欎相繆幾人記曾来老苔蝕雕鎪玲瓏聽我歌歌徹玲瓏愁有酒且湑我羲娥雪人頭丁東泉渇烏滴盡三更雨鐡鳯敲寒六月風湯餅困来茶未熟為師摇夢作丁東招隐辭雲氣歛兮天目之巔濤江綫橫兮海門濺濺扶桑子半兮陽烏翩翩可俯而掬兮咽以天井無聲之泉子其隐乎吾與子兮拾荃其二雲氣冐兮天目之趾疊湫濆薄兮洞石齒齒列缺正畫兮睡蛟蟄起可豢而擾兮浴以天河倒流之水子其隐乎吾與子兮採芷其三雲氣吐兮天目之腹乳潭沉沉兮鴨潭煜煜徐伍朝徃而暮来兮雙碧鹿可挽而舞兮侑以天風歩虛之曲子其隐乎吾與子兮蒔菊徐伍天目二仙人寳福寺山房門巷蕭然雀可羅藏書萬巻自研摩懶尋玉女登西嶽甘伴金仙坐補陀書帶草長塵慮少鉢曇花放道縁多酒肴問字如相過引道松間不用呵又荅景陽朝家久設禮為羅小寄禪忩共講摩紅錦障泥飛騕褭黃金寳校設盤陀冰虀薦飯鄉風古雪汁烹茶雅道多領取單傳心法去會將佛祖一時呵再用韻烟霏深處萬山羅閑裏工夫歳月磨上採緯書乾鑿度下捜史志薛延陀手挼不厭薰沈少心賞何妨闕多若問闕閣闕南豐一瓣也須呵遊岝㠋山驟暖偃芳草薄遊烘軟塵亂山雲氣曉啼鳥杏林春人物少催老浮華陳玩新一聲鏗爾瑟澗水緑粼粼西山晉許邁隐居䖏西山許邁無人問只説東山有謝安富貴光明貧賤晦世情從古兩般㸔九州山僧房路突亭依石林㘭渚見沙嶔危幾岣嶁深蔚似瑯琊客動驚寒思僧閑㤀歳華雨忩風露影一樹枇杷花題松軒蒼官面目冷於氷傾盖真成耐久朋隨世炎凉渠自爾與時榮悴我何曾聲傳茶鼎風鳴籟影過熏爐月抹楞束傳欲煩三昧手箇中着個覔詩僧翠蛾亭晴雷碾破白雲窩無數林花滚下坡好把轆轤翻轉㸔崑崙頂上捲黃河次俞紫薇止止堂詩佛法示無法人謀盡過謀説空猶是着領妙更何求徑滑松杉古忩虛水石幽琤琤鳴鐡裏安䖏一時休東山塔院僧伽傳法處阿育放光時到頂上無縫透心橫有枝梅間詩鳳咮竹裏酒鴟夷醉上危層去空明𣺌所思平齋集巻二十三
