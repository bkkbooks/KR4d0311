body:
  text: 內制三光祿大夫右丞相兼樞密使鄭清之可特授特進拜左丞相兼樞密使加食邑食實封制門下伊尹學而後臣商后所以懋格天之業周公相而為左成王所以綿卜丗之休朕厲精百度之新注意一賢之切望既孚於巖石位冝正於元台咸輯群工渙揚大號具官某道包乎衆甫氣塞乎兩間其無我則顔氏克巳之仁其有為則曽子守約之勇升晹谷之日而春萬象翊我𥘉潜興太山之雲而雨八瀛贊豫更化即上天下澤以辨分本內陽外隂而進賢凛諌路之復開紛幸門之自塞回狂瀾於既倒坐消貪濁之風泝大川而獨航期濟艱難之運惟宿弊不容於驟革而駿功有待於美成修攘之務孔嚴安危之寄逾重匪進久虛之次曷旋丕應之機是用稽之端拱趙普之元勳參以咸平李沆之舊德序升左輔光踐前修總樞機於本兵超品級於賜位仍陪多邑併衍真畬以尊天官冡宰之權以應太微上相之象於戲一德咸有莫大乎主善之為師百志惟熙莫先乎任賢之勿二豫欲天縡之穆汝翼豫欲國棟之隆汝為豫欲職業咸修汝明子欲形聲俱和汝聽仰承尊帝籲俊之意益究佐王治邦之功一人以寧萬丗永賴可宣奉大夫知樞密院事兼參知政事喬行簡特授金紫光祿大夫右丞相兼樞密使加食邑食實封制門下朕玩占泰象稽若乾文北斗璇璣之斡天樞既運平於四序太微端門之列次相爰經緯於三光肆嘉宥密之英夙稔弼諧之望誕揚制綍敷告廷紳具官某秉先覺之姿厲後凋之操學問貫穿於千古器能苞括於三才退然不勝衣充以至大至剛之氣淵乎其似道形為可觀可度之容遍儀禁路之華趣踐政塗之峻力扶更化備罄陳謨卷卷乎任賢而去邪懇懇乎理內而禦外尚猷詢兹黃髮獨知籌慮之深咨嶽有能奮庸咸謂延登之晚眷豫菲質紹我前休宴紫雲之樓念民生之未𥙿開天章之閣虞國事之多艱楫舟必賴於蒸徒維厦匪資於一木參諸夢卜得爾耆明庸合守文應變之長共致經體贊元之助仍揔提於樞管兼疊進於文階申錫多畬併陪真采於戲仲虺為左而伊尹為右本一體以相須召奭在後而周公在前必同心而叶濟惟密於𥙷衮則無彌縫之迹惟妙於和羮則有調一之功惟精神強則國勢張惟紀綱正則人心定俾豫以治時乃之休可金紫光祿大夫知樞密院事兼參知政事曽從龍可除樞密使督視江淮軍馬加食邑食實封制門下朕祗承洪業逺慕駿功督江左之軍而國勢張晉賴謝安之略視淮右之師而皇威暢唐資裴度之籌顧采薇治外之孔嚴冝蒸民任賢之尤急妙簡元樞之望盡提諸將之權肆諏剛辰式渙孚號具官某學醇而識邃德厚而器閎蚤擅兩都之倫魁蔚為三代之王佐炳謀國之智先見洞乎蓍龜勵事君之忠精誠貫乎金石再踐政塗之峻獨顓宥府之崇一念慮必圗乂於邦家一訏謨必思安於社稷氣塞乾坤之大志期宇宙之清蠢靺鞨之黠戎乘女真之末緒并吞諸郡莽萬里之丘墟蹂􅏳中原慘兆民之塗炭不顧夷夏大分之定不思帝王正統之尊敢嘯餘凶自干顯討况太一之神來格久占福曜之臨而甲子之曆有開適應𥘉陽之復趣迎善氣特命元戎皇天付豫有家莫重要衝之守寧王遺我大寶適資艱運之扶維文武之全才藴沉深之大略就升使領仍衍井畬總表撑裏拓而庭規摹合前茅後徑而受節度風生草木聲震山川聖䇿定則有功可必應兵之勝真儒用而無敵何難賊虜之平注倚非輕延登有待於戲義問之拒逆亮收萬全於指顧之間張浚之郤僞齊奏三捷於談笑之頃朕方恢於祖烈爾冝邁於前修衆思集則精神彊列戍睦則首尾應亟菑攘於外侮用勱相於中興可左丞相鄭清之口宣卿德尊朝廷勳在社禝欲重處中之寄冝膺虛左之求宅揆奮庸揚庭孚號亟祗殊婘力濟丕平右丞相喬行簡口宣卿斯文砥柱有國元龜久樞紐之密旋趣鈞衡之對秉綸言渙發輿望僉諧亟祗豫休共圗乃乂左丞相鄭清之批答口宣延登上宰翊贊中興增九鼎之尊安永三階之澄穆趣祗成渙毋事勞謙右丞相喬行簡批答口宣孚號大廷登庸碩輔允賴巨川之濟式隆巖石之瞻亟效贊襄奚勤遜避右丞相喬行簡批答口宣朕寤寐治功延登耆德既協從於龜筮冝交濟於鹽梅其遏牢辭以圗丕乂左丞相鄭清之批答口宣天毖成功帝賚良弼首陟泰階之峻亟圗鼎飪之和勉為堅留毋煩牢避知樞密院曽從龍同知鄭性之簽書陳卓批答口宣外治有嚴中樞尤重必進爽邦之彥乃凝基命之功勉效勝籌毋勤遜櫝樞密使曽從龍批答口宣十乘董戎亟冝引道五兵置使奚尚循墻體豫憂顧之深寢爾撝謙之過節度使謝奕昌批答口宣卿丗業韋平家法隂馬寵陟齊壇之峻榮施先廟之崇渙綍已孚巽函可遏節度使謝奕禮批答口宣卿椒掖流暉芝庭峙秀襲冠貂之積慶膺綬鶻之殊恩朕授非私爾辭毋屢賜龍圗閣學士京西湖北路安撫制置大使兼知襄陽府趙范兵部侍郎淮東安撫制置使兼知楊州趙葵銀合夏藥勑書卿望聳禁塗籌髙邊閫屬履炎蒸之序備殫牧御之勞冝錫上奩用攽內劑禦兹烈日揚我仁風賜工部侍郎㳂江制置使知建康府陳韡銀合夏藥勑書卿法從名流陪京重寄餘同上賜權兵部侍郎四川安撫制置使趙彥呐銀合夏藥勑書卿天派名流坤維重寄餘同上賜司農卿知慶元府兼㳂海制置使游九功銀合夏藥勑書炎令司衡赫威鑠石乃眷輔藩之彥具宣制閫之勞爰錫珍良式資寶衛賜右文殿修撰四川安撫制置副使兼知成都府丁黼銀合夏藥勑書乃眷漢廷之彥具宣蜀閫之勞餘同游九功詞賜兵部郎官兼淮西安撫制置副使兼知黃州楊恢銀合夏藥勑書乃眷漢廷之彥具宣淮閫之勞餘同游九功詞賜直寶章閣權發遣鄂州兼權㳂江制置副使張元簡銀合夏藥勑書炎令司衡赫威鑠石乃眷上流之寄具宣外禦之勞爰錫珍良式資寶衛賜鎮江府都統制王虎池州都統制趙邦永鄂州江陵府副都統制樊文彬江州左軍統制權管幹光州武定都統制司職事王忠銀合夏藥勑書三庚御序萬甲分屯總戎律以良勞犯炎威而不憚冝攽珍劑用示眷懷賜平江府許浦水軍都統制董琳銀合夏藥勑書三庚御序萬甲分屯護海道以良勞犯暑威而不憚冝攽珍劑用示眷懷賜帶御器械兼權主管馬軍行司公事兼知光州孟珙建康府都統制兼知泗州李虎鄂州江陵府都統制兼權發遣德安府王旻興元府都統制李顯忠鎮江府副都統制劉虎襄陽府忠衛軍副都統制江海權沔州都統制司職事陳昱權利州都統制司職事曹友聞權廬州強勇軍都統制司職事王福利州後軍統制權行管幹金州都統制司職事吳桂銀合夏藥勑書三庚御序萬甲乘邊㧾戎律以良勞犯炎威而不憚冝攽珍劑用示眷懷賜龍圗閣學士京西湖北路安撫制置大使兼知襄陽府趙范銀合臘藥勑書卿任隆外閫威聳上游犯霜露以靡寧護風寒而良苦爰錫衛生之寶用旌敵愾之勞壯爾精神寬豫憂顧賜權刑部尚書㳂江制置大使兼江東安撫使知建康府陳韡銀合臘藥勑書卿佩囊法禁典鑰陪都凛水澤之中堅嚴風寒之外護爰錫攝調之劑用昭眷倚之懷壯爾精神寬豫憂顧賜寶章閣待制㳂江制置副使兼知鄂州黃伯固銀合臘藥勑書卿承恩中扆建閫上游犯霜露以夙征護風寒而良苦奚錫衛生之寶用旌敵愾之勞壯爾精神寬豫憂顧賜兵部侍郎淮東制置使兼知楊州淮東安撫使趙葵將作監淮西制置副使兼如廬州尤焴銀合臘藥勑書朔雪方霏淮風更凛言念制垣之重備殫王事之勞爰錫珍良用資葆嗇增壯魚麗之氣茂揚鶴唳之威賜權兵部侍郎四川安撫制置使趙彥呐右文殿修撰四川安撫制置副使兼知成都府丁黼銀合臘藥勑書卿分憂北顧制勝西垂犯霜露以靡寧護風寒而良苦爰錫攝調之劑用昭眷倚之懷大振戎容亟蘇民瘼賜太府卿四川總領兼撫諭使安癸仲銀合臘藥勑書卿分憂北顧宣指西垂餘同上賜司農卿知慶元府兼㳂海制置使游九功銀合臘藥勑書卿坐綏海服密拱京畿凛水澤之中堅嚴風寒之外護爰錫攝調之劑用昭眷倚之懷民瘼既蘇戎容益振賜帶御器械兼權主管侍衛步軍司公事兼建康都統制王鑑帶御器械兼權主管侍衛馬軍行司公事兼知黃州孟珙帶御器械鎮江都統制李虎池州都統制趙邦永鄂州江陵都統制兼權發遣德安府王旻興元都統制李顯忠平江府許浦水軍都統制劉虎權光州武定都統制司職事于俊權利州都統制司職事曹友聞利州後軍統制權行管幹金州都統制司職事吳桂權江州副都統制楊福興襄陽府忠衛副都統制江海鄂州江陵副都統制兼知棗陽軍樊文彬平江府許浦水軍副都統制兼知海州趙東淮西路鈐兼權廬州強勇諸軍副都統制司職事王福權管沔州都統制司職事和彥威銀合臘藥勑書卿等系出山西威行塞北慨朔風之未靜忘霏雪之為勞賚以寶奩實之珍劑用壯前茅之氣進圗破竹之功賜端明殿學士同簽書樞密院事督視江淮京湖軍馬魏了翁銀合臘藥勑書卿推誠體國决計視師犯霜露以靡寧護風寒而良苦爰錫上池之劑用紓先乘之勞壯爾精神寬豫憂顧賜直徽猷閣㳂海制置副使兼知慶元府王定銀合臘藥勑書卿顯膺閫寄坐鎮瀛壖餘同游九功詞文舉殿試䇿朕猥承至尊休德于今一紀夙寤晨興懼不克負荷以羞列聖乃者收攬大柄躬親萬務嘉與海內共濟丕乂拔人材於久鬱疏言路於積壅亦既踰年而更化善治猶未云獲豈弊端膠轕汙俗沉浸未昜遽更與抑崇名忘實齊末遺本所更者政而不及化與何責治愈切而愈邈也黃帝堯舜通其變使民不倦非聽其窮而莫之反垂衣裳而天下治必有妙於化裁推行之表者三代忠質文之尚其敝未始不可救而禮有損益隨時施冝亦非區區於制度文為之間也孔子變魯至道孟軻以齊王猶反手綏來動和過化存神固不容以淺智窺而四代禮樂經丗之大法三王四事治國之要道知之者衆而行之者寡何與夫天命不難於迓續而難於凝人心不難於轉移而難於固朕歷觀治忽消長之運念此至孰而行有弗逮國體嘗少振矣而茍且相仍未保其不弛國論嘗少定矣而是非交至未保其不搖國勢不可不彊而選將厲兵屯田積榖未能兩全攻守之冝國計不可不𥙿而約已厚下開源節流未能一出取豫之正伊欲整紀綱於姑息之餘飭法度於因循之後灑濯衆志新美大化以凝固天命人心於無窮其要安在子大夫彊學待問久矣其据經證古科别以對朕將親覽焉靡有所隱武舉殿試䇿蓋聞有天下者審其御御有得失則狙詐有作使作敵之殊自昔英君猶難之朕厲精更始以來無日不討諸軍國以興起治功而轡䇿一丗銜橛四夷每有慕於漢髙祖經營帝業築壇而拜以籠韓信踞洗而召以挫黥布御將帥之法然也周廬內衛列屯外戍使功使過俾皆踴躍奔走於作興之下而無跅弛之纍兒戲之習其道何先光武再造炎圗璽書明見以服竇融幘坐迎笑以折馬援御豪傑之法然也中原遺材慕義來附效智效勇俾皆歡呼鼓舞於大受之中而無飬鷹之患放虎之虞其術何要孝宣號稱中興先零負固則留屯浩亹以平之呼韓稱藩則置酒甘泉以饗之御夷狄之法然也故讎雖殄新鄰方張或和或戰情僞叵測在我必有以待之進可為車攻之復古退不失采薇之守衛其䇿何上夫能御將帥而後能御豪傑能御豪傑而後能御夷狄審本末之序權緩急之勢以制動靜之機操縱闔闢顧不在我乎至若軍律之當嚴戎旃之當睦邊民之當恤新􅡦之當撫無一不關宵旰之慮子大夫有志事功其悉意茂明之朕將親覽召試館職䇿天下大勢首蜀尾淮而腰膂荆襄自昔所甚重也諸葛亮之用蜀祖逖謝元之用淮羊祜陸遜之用荆襄規摹具在得其人善用之則撫機酬變進退闔闢豈不在我而猶患備守之匪易蜀方告警襄又戒嚴且蔓延于淮賊虜為三師以觀所應故我之應敵不容出於一術諸閫交相為援如常山之蛇力非不合也或慮趍前不能無後顧畫境人自為守可無連雞之患然同舟遇風又慮一處不牢則俱受其害分建三數大鎮聚甲兵糗糧以重中權似可熊卧虎視而並塞列城護風寒之地恐難於斂戍使寸寸而守之則備多力分抑兵家之所忌挾𥘉郡以為外扞庶增藩籬之固而鞭長或不及於馬腹委雞功而棄之又幾前功之俱廢㳂江諸大屯招兵增戍而練舟師門户之急務也或謂守淮襄自能蔽江原堡綿亘於鳯沔所以保蜀也移三關之戍而扼三泉得無已迫乎督府進駐荆鄂上流壯矣金房聮蜀海道接淮延袤數千里或虞運掉之難隨地分立莫府則大費又未易支也以至南北軍何以相制官民兵何以相使屯田於新疆何以能不資敵調夫於邊郡何以能不重優子大夫熟於觀時切於憂國其舉三邊備守之要悉意陳之將復于上萬壽觀純福殿開啓甲子本命道埸青詞玉曆紹休猥次周星之歲金行紀閏適臨元命之辰祗祓瑶壇具宣瓊籙伏願真游潜格景况旁流九扈有秋陶人心於和樂三邊無警鞏國勢於尊安朱表孟秋月閏先甲命元肅延真馭之臨仰控忱衷之禱上銷咎證下鎮危情格丕乂於萬方儲鴻休於百丗太一宫祈晴醮青詞西成應兊南畒占豐熏心淫雨之憂拜手叢霄之禱伏願飈斿潜格曦馭昭升凡陶玉燭之和均燕金穰之慶永祐陵下宫顯恭皇后殿神帳後壁山墻坍損修整畢告遷神御還殿表文奠幄柏宫靈斿夙御繕垣椒寢仙仗嘗移屹鳩僝之告功儼燕寧之復次孟冬朝獻祝香文伏願乾文循軌泰道迓衡愛日薰和民遂恬熙之樂朔風絶警軍無暴露之憂昭德崇勳閣安奉太師趙汝愚貌像祝文維姬有旦維宋有公斷鰲奠極賔日升穹歲閲周星祀登功宗諏禮曲臺妥靈肖容肩摩前哲凌煙嫓隆祭告功臣二十三人祝文容臺丹青森拱星辨有虛其席惟人是踐相我前寧盤宗碩彥訊良告䖍爼豆群獻甲子本命青詞氣轉一陽甫應𥘉躔之紀辰開六甲首逢端命之元祗演雲籖仰延飈駕伏願天光下濟帝况博臨壽域四方永底凝民之治金城萬里亟收郤敵之功滿散朱表序届𥘉陽辰臨元命宣演冲科之祕導迎善氣之新鶴唳風聲奉天威而制勝星暉日暈受帝祉以綿休立春祭太一祝文天尊神兮挾東皇龍駕翶兮周八荒五福舍兮迪時康祠壇紫兮歌青陽神宴娭兮夜未央星留俞兮集祥光四氣和兮萬有昌三垂晏兮九農穰多受祉兮命溥將太一宫交年醮青詞化功密轉序首正於孟陬歲事更新法肇頒於象魏輒輸悃素仰扣旻蒼靖念眇躬適逢多故狂胡反道方孔熾以逞凶降虜背恩又相挻而濟惡狼烽交於梁沔騎壒遍於荆襄由秉德之不康寧致御事之曰艱大跋叢霄而引咎迎端朔以祈休伏願上帝卑矜尊神篤右以全取勝亟清玉塞之塵轉危為安增壯金城之勢凡遂耕桑之樂悉歸覆育之仁天基聖節青詞保右自天運應一元之泰誕彌厥月氣陶萬彚之春展宷瑶壇投忱璇極伏願兩儀申祐列曜延光時和歲豐妙協玉衡之正兵寢刑措屹隆磐石之安朱表星回蓂歷茂迎震夙之期雲護芝函備展泰元之薦仰祈昭鑒申錫鴻釐東作西成躋民生於仁夀南暢北洽措國勢於安彊孟春朝獻祝香文伏願緝熙純嘏保合大和雨霽秧疇咸樂東郊之業風恬柳塞盡清南牧之塵攢宫𥙷種祝文路寢孔碩每切慕思春露既濡冝加繕植先事以告維靈之安孟夏朝獻祝香文伏願本支蕃衍疆埸敉寧物𬒳生成穆若薰風之阜民陶耕鑿熙然化日之舒雨師雷師風師祝文天步方艱以稔為命龍見而雩雨不時若髙原下隰熯其乾矣熬熬然卷簔笠倚耒臿以告愈神所閔也雷霆以鼓之風雨以潤之坎震巽三者之氣合而隂陽和甘沛應既霑既足迄用康年維爾神之功昭慈聖憲皇后永思陵憲節皇后憲聖慈烈皇后下宫修葺奏遷神御表文葱葱鬱鬱蟠佳氣於兩儀實實枚枚鞏閟宫於千古飭御史以省視戒工師而繕修遷御有嚴前期敢告孟秋朝獻祝香文伏願氣調玉燭序秩金行雨足周原年屢登於大有風清漢塞運丕濟於中興天基聖節錫宴致語帝出乎震祥開華渚之光雲上於天恩錫鎬京之燕恭惟皇帝陛下聰明時乂剛健日新與物為春播大和於有截自天申命綿景祚於無疆臣等幸備伶官願陳口號寶鳯銜春度玉墀開基節後即天基日行黃道三辰秩斗轉蒼龍萬象熙扶起車攻常武運做成既醉太平時千官拜舞東風裏歡上延英萬歲巵勾合曲嵩嶽三呼山鞏聖人之壽鈞天九奏春融治丗之音上奉天顔教坊合曲端平二年端午貼豫詞皇帝閣五言三首更化開皇極中興兆赤符節摽千歲曆氣協五時圗又雨足秧分甽風清麥弄𡵨聖心涵水鏡即是太平基又明進離方午柔生遇巳隂妙參三聖易細測兩儀心七言三首緝熙虛敞薰颸細清燕深明晝晷長大學中庸翻詠久金猊幾度手添香又登進英才追慶曆開延正論踵咸平朝廷有道長如此拜賜宫衣信是榮又王師一舉下河東好定規摹繼伐功入眼宫槐冝夏日轉頭關柳易秋風貴妃閣五言二首珮襲芳蘭碧叉明寶篆紅深宫三十六同𬒳二南風又萱長冝男草榴開結子花歡聲喧令節慶事屬天家七言三首綺疏浸影槐龍轉繡户浮香艾虎垂硯冷玉蜍金井水手抄警戒愛君詩又裁成寶月翻宫扇織就祥雲製御衣朝賀歸來無點暑坐看燕子引雛飛又穿蓮漏永金鋪邃雪藕衣輕玉殿凉好把無邪毋不敬細挑綵字夀君王端平三年春帖子詞皇帝閣五言三首吹鳯東風轉擕龍北斗回人間遒鐸振天上獸樽開又冰天寒色餞暘谷霽華賔生意乾坤滿宸襟一點春又寬大朝廷詔中和郡國詩欲求躋慶曆先使見淳熙七言三首喚仗紫宸披曉靄退朝清燕坐晴霏簡編有味爐熏永鈴索無聲漏箭稀又東風送喜上天顔吉語飛來井軫間榆塞雪消鳴鏑靜柳營月暖擊刁間又麥苗培秀臘前雪稻種浸芽春後晴野老田夫觀治象便從新歲賀升平皇后閣五言二首太液輕澌泮溫明霽日融菜流芳荇碧花頌瑞椒紅又甲觀韶光集禖壇好語傳思齊男慶百假樂子冝千七言三首塗山隂贊夏王化媯汭密禆虞帝仁保合大和無間斷際天蟠地一般春又關雎風化冠周南次第桃夭及葛覃農事未興先獻種女紅方起又親𧖟又殷雷金鑰千門邃斜月璇題六寢深禁柳護寒鴉未起求衣巳獻晚朝針貴妃閣五言二首梅試催粧粉蘭披入夢香迎春占北斗受福拜東皇又象應軒龍次恩承帝座光燕壇風淡蕩𧖟館日舒長七言三首春透蓬萊碧玉壷晴窗恭侍寶奎敷從容玩畫家人卦取次題針列女圗又鳷鵲雪殘籠霽景鵁鶄波暖揚紋漪宫中不用催行樂草木群生各自熙又萬年枝上綵裁緑千葉花頭酥點紅鏡綬囊絲相映燭探先半月慶流虹平齊文集卷第十六
