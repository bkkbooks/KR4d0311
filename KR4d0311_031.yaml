body:
  text: 墓志吏部鞏公墓志銘靖康建炎間中原學士大夫多辟地南徙鞏至自東平吕至自東萊愛寶婺溪山之勝家焉地偏俗古文物未振山堂鞏先生首以北方之學授徒著録常數百人吕成公繼講道明招精舍負笈坌集聲氣薰浹淵源濡漸類為丗聞人公諱嶸字仲同山堂季孫成公門弟子也幼神氣明粹風骨凝重大父愛其似北人曰必昌吾宗長偕兄豐執經明招鉤邃摘幽神接心領出語輒破的同舍斂祍避其鋒中淳熙二年第授嚴州建德尉調淮西總領所凖備差遣以格知徽州歙縣憂免起知處州麗水縣當路交薦其材入提轄榷貨務都茶埸幹辦諸軍審計司遷太學博士進大理寺丞出知嚴州未踰月改邵州擢都大提點坑冶鑄錢司職事修舉直祕閣因其任七十餘年曠典也除侍右郎官以煩言卑武夷祠起家知溫州擢江西轉運判官比年丐間有旨入奏未行除司封郎官罷奉鴻禧祠祠滿檢㑹續食而春秋寖髙浩然巳忘丗故垂車得請日杖屨溪山間弄花漉月昌羊忘返曰佚我以老上恩深矣寶慶丁亥三月庚申終于武義里第享年七十有七積階至中大夫爵須城縣開國男食邑三百戶𥘉尉建德丗其官拯溺字荒不遺力父老謂有祖風淮西總臣𬒳命築歷陽倉修采石戰艦及體訪㳂江軍政舉以委公條畫詳明悉當上意一日大軍庫延燎拔幟登屋周麾而呼曰􅑒士力者賞衆奮火撲觀者勇之歙十有八鄉訟牒叢夥公日聽鄉二操約御詳庭空如水麗水以撫字寓之催科如治歙前積負郡逋絫萬郡胥利其稽以索縣賕縣胥乘其索以重民擾公曰此無𥙷於州而厲民以飫吏可乎力白守刋其籍編户以役破家者相踵為去所以蠧役者民爭應恐後東南仰茶鹽為國計三榷務總於轄官討尋源委如理家事吏莫敢欺歲入數倍冨商木筏之訟府尹掣於交謁改屬于理公當承鞠慨然曰天嶽臨安府可乞送耶避嫌止當送鄰路白于朝從之審計輪對論催科管榷之弊甚力暨為學官適有詔以火災求直言謂學校公論自出不可徒應故事上書陳時政闕失多所指切大略謂兵端不可開權姦忤矣未幾豫郡陛辭論外攘當先內修復寓兵不可輕用之意自信不撓朝譽藉甚江右劇賊方棘邵與溪洞接蠻徭性狙易動至即增埤濬隍肄射繕甲以折姦萌發儲勸分置六十四埸淡恤飢羸一郡帖然冶司孝宗朝定鑄額歲十五萬緍積久寖虧六不及一公推原弊端知楮輕丱重售不酬費故入少而鑄虧乃使楮與丱各時其直輕重足以相權坑丁競勸丱務倍入先是冶卒窳惰多遺丱泥滓中有司莫之察公置局淘洗所得皆精良於是盡還故額俄兼憲節積潦薄番城民廬半沒葉舟掀舞家訪户歷周恤之見者引手加額永嘉始至訪名儒之閭問所冝先以海瀕逐末者衆首勸民務夲業適歲大比增闢貢闈以受多士士狃積習以逞試之三日躬警護于棘外有貴游子挾醉號呶道上莫敢何亟械于市曰士不自愛者視此訖事無敢譁榜揭校藝官例亟行緩則群譟遮境上生可否公故宴留至纍日乃去前所未有也時嚴海道之防得旨造蒙衝二十艘掾屬請下諸邑公不可捐利誘海商二十人人造一艘按期辦集符不及民漕臺以官軍討捕劇賊日費供億公私告匱公綜理綱條𥙷窒罅漏漕計𥙿而民不知和糴至百五十萬斛皆商賈願出於市盡革敷配之弊十一州上供歲團綱六有無相影數多虧公區别窠名使不相紊卒復其舊豫章一再攝閫歲和物阜政平訟簡時往來東湖書院與諸生以義理之學相講磨士風為起釋奠帥守宿學必露刃以衛曰此何為者郤之士服其知體去之日邦人揭幟追送擁車後先有經昔不能舍去者性靜正夷博居官未嘗澤辭色貫聲光以媒進而儒術吏能每為時所不舍與人不植崖異周旋委曲惟恐失一士之心至不為利回義疚雖議其介不顧也平居細謹動中徽墨及倉卒應變多出度外邵陽番汭江右凡三斬暴卒弭患未萌其識權類此為政務因其俗未嘗容心終歸之愛利民多繪像祠之始生踰月而孤與兄相依為命白首無間言母楊夫人通孝經論語毛詩大義所至奉版與行日請所以為政如丱角口授章句時鄉黨稱其孝愛書一過目終身不遺忘作文期於有用非精粹不輕出有厚齊文集八十卷藏于家其先出晉士莊伯丗為真定人後徙鄆曽祖燾左奉議郎贈通奉大夫祖庭芝左承議郎贈太中大夫父法贈正奉大夫娶何氏繼髙氏先卒皆贈令人子友聞儒林郎台州司理參軍賁亨蚤卒友說從事郎溫州司户參軍孫端祖從事郎江州瑞昌縣尉次延祖孫女一曽孫男女五紹定巳丑正月庚午朔諸孤葬公于金華縣夀溪原友聞以某辱公知最早重趼請銘嗚呼柳下惠聖之和者也而三公不易其介卒窮於三黜公遭時且鄉用矣雲出輒還膏施未光其囿於命也耶銘曰可欲之善莫難於有中庸之德莫難於久何以有之典則丗守何以久之源流師友公祖山堂而師東萊學貫體用根幹條枚氣定心夷求福不回絫麾再節用不盡材孰虧孰成蛻和委順易簀琅然忠孝其訓有菀彼阡山暉木潤過者式之我耆夀俊孺人吳氏墓志銘孺人吳姓諱妙靜臨安將仕郎渭之女承務郎致仕俞君泳之妻子三人修職郎新桂陽軍教授德藻進士德林德棻女二人適進士陳千齡國學吳元卿吳氏丗以詩書孝友為家法將仕君四女見聞濡浹皆有淑行孺人幼尤敏悟誦書知倫類識大義親有疾衣不解帶藥餌非親嘗不進既嫁踰月而哭其姑以不獲日奉巾櫛為終身恨歲時感愴蒸嘗孔嚴承務君性疏直不切切規利約衣節食以相之身任家事之勞而𥙿其子於學子未就外傅孝經論語率口授誦聲鏘然塗𥿄淋漓輒喜溢顔面延師聚書斥簮珥無靳色間遣游學裝齎靡密必經手反必問所習及所與友教授以嘉定甲戍入太學登舍選癸未中甲科明年秋新天子大饗承務君與孺人俱受𥘉封族姻交賀孺人愀然曰吾舅姑餘慶也歲侵輟餐以食餓者疫癘手和藥以遺病者內外親黨小不咸為之委曲開曉使釋然歡洽如𥘉而後已故其殁也哭之皆盡哀實寶慶丙戍六月癸已也年五十有九卜丁亥九月丙午葬于平西鄉九山之原教授以某辱與游一日欵門泣且拜曰母氏攻苦教諸兒閔焉日望其成德藻甫得一官垂及迎養而棄之不自意忍死以襄大事百用既戒敢請銘嗚呼吾母之教某猶君母疇昔需外教之次而失吾母與君同痛割逮今未間也尚忍銘君母哉銘曰山韞玉而長虹水孕珠而五色維子之賢繄母之德鬱鬱林丘過者必式吳氏孺人墓志銘臨安故鍾君子度之妻吳氏守靜以寶慶二年六月丁亥卒年六十有四曽祖贇祖憲父渭將仕郎將仕公壻于鍾夫人鍾出也而歸子度男二人長殤次應僑孫二人甫阜孫女二人曽孫三人夫人之卒姑王夫人春秋八十九矣一日呼應僑來前曰吾年至此喪兒女幾盡繄汝母是賴汝母方哭汝妻吾又哭汝母天乎忍哉丗非無賢婦賢如汝母不多見未嫁時其母苦上氣疾多方療之未愈晨起剔股和糜以進兄孝立感之亦齊戒露禱穴胸析肝以救遂活其母鄉閭稱孝既嫁吾家一手綜理家務以相汝父汝父得專意問學所與游皆當丗知名士風月佳時論文氣雋諸公索飲亡算其典中饋隨取輒辦無倦容客去主人頽然奏床鼻息如雷汝母復秉燭料撿中外理明日事矣如是二十四年而婺婺居又二十四年未嘗御鉛華所以孝於奉我者終始如一日記汝父無恙時日侍我昌羊後圃半酣奉觴起舞且歌吾欣然和之汝母手挹新果以薦聲怡氣下吾每為盡醉不幸婦姑俱孀相依為命杯羮必絮寸跬必掖悲歡榮瘁同之今舍我而先吾不欲生矣應僑放聲哭王夫人亦哭應僑遂奉大母命來丐銘以葬夫孝者百行之本也女而孝於母婦而孝於姑其本立矣以之治身峻而潔以之理家儉而法以之處妯娌姻族和而有禮訓子孫必以學手足親愛有疾痛恨不能分其楚鄰有襁褓失哺惻然遣乳媪日字之如已出歲儉包黍以遺餓者大侵則捐攻苦食淡之積倡鄉邑為粥以食之其風槩有介胄不可犯之色而慈於恤人其言論識趣雖賢士大夫不能過而信於行事孝之推也於古誼應銘某與其孤應僑厚當銘故中書二卿嘗銘子度宰木拱矣夫人卜以其年十二月丙申合葬于國昌鄉湊水山之原乃為之銘銘曰人生兩間與萬物異孝為之根其幹也義有齊季女孝於事親移之事姑厥孝惟鈞孝著而義松堅玉潔衆善萃焉皆其枝葉凡得於天悉具是彛不愧于幽維此銘詩孺人吳氏墓志銘孺人姓吳氏臨安新溪人吳與同里郎姓丗有連父憲器孜以妻之生二男思勤勤蚤卒一女嫁吳公棨孫四人謙諤詠該曽孫八人偉儀倬俶伋儼僑俌元孫四人孫曽元女十人人壽七袠鮮矣孺人九十有四上壽也上壽百未必一有有之衰病日侵食費祝動費掖常也孺人晚益堅強視聽不少衰耄期而堅強纍百未必一有有之必含飴擁䣛嬉戲蒲前而後懌以舒孺人身見五丗家數百指矣耄期而堅強身見五丗千百未必一有有之能少長巉巉盡在目中乎孺人一門數十年尊不哭卑兒婦皆七十餘歲時帥諸孫班白者辨者角者髫鬢者羅拜奉觴介夀綵衣紛如也耄期而堅強身見五丗且一門數十年尊不哭卑抑寥乎鮮矣矧能以詩書華其家偉挹鄉薦伋升太學勝衣以上層級相師友進未艾也好德者福積善者慶天道可必如此孺人福慶萃於身鍾於後豈偶然哉卒以紹定戊子十一月丁丑葬以明年十一月癸酉合章塢夫兆思謁銘為書人之所難天之可必者以勸其奉尊章順相夫勤約以厚蒸嘗嚴待骨肉有恩意常事不書銘曰豐難乎其臧也耋難乎其康也繩繩難乎其將也噫盛哉夀母之慶也鍾孺人墓志銘余杜門東山下一日有客冒前乞銘其母弗省也既而言吾聞君子不以已廢人君能使巴清母傳寧能使衛姜母詩乎因改容扣其概信不可沒已孺人鍾姓諱妙清丗居臨安西市年十六歸東市阮君自勵十九娠而寡父林母陳夙愛甚即而唁之唶唶憐之哭而指其腹曰勿我憐也生男耶守男生女耶守女安之命也逾月得男又即而撫之哭而目其嬰曰天以此厚我矣除喪歸寧母黨具杯勺相勞苦且泛辭覘之哭而罵曰爾不聞良馬不兩鞍耶亟索車去事舅姑謹於夫時舅殁姑老益謹於舅時姑殁輯睦先後篤於姑時惠誨其孤逢時使成立三孫亦秀爽而生日饒每自喜曰可以見吾夫地下矣年五十七而卒實紹定已丑五月一日也古者婦人女子居處有圗史之訓行步有環珮之節用能養其心於禮義孺人里中家人子耳針紉機杼之外無它習而芳齡自誓雪明日烈根於天性然歟前是逢時痛父蚤丗無塋為母預治兆域于錦南平原築堂夀樂環以水竹時奉板輿來游意甚適至是以九月壬申復父魂合葬焉銘曰水有時兮洄石有時兮泐匪泐匪洄兮維婦之則亡弟子文壙志洪氏丗居潜山之谷口大父年二十四生我伯父鎡伯父亦以二十四生我弟琥皆冡嗣也琥字子文生於淳熙丁酉二月丙子後余一歲幼嬉戲相逐長同就外傳既而余忝一官檣浮轡走胸喘膚汗曽不免於窮子文循分理生足不趼腰不折而疆畎日斥塗墍日華林沼日蕃爼鮮以奉親籝書以教子優游卒歲兩忘榮辱余未嘗不嘆其計之得也其為人修幹豐下而髯行已恪與人信磊落明白不為深險操切且退然若虛里黨推重寶慶丙戌四月辛卯以渴作一夕不起莫不惋惜之母妻皆增口阮氏男二人日卿庶孫三人尚幼母夫人慈而肅禮法行於家春秋七十有六失壯子悲不自勝末疾增劇明年九月己亥卒又明年正月壬辰次子璞偕日卿葬夫人于家山鳩起之原從夫兆同日葬子文于西鳩相望三里所兄某攬涕叙其平生納諸壙舒夫人墓志銘余友毛璲君玉書以舒城尉何光華填諱狀一通來曰先大父帥屬諱若訥字辨道丗為處松陽望族娶葉無子殁繼舒氏諱妙慧婺永康人年二十六來歸生洙次涬次庶子渙文璲父克任幼子也孫五人璡璲璚璋琡女孫六人慶元已未正月二十六日大父卒後十有四年嘉定壬申十二月八日大母卒得壽七十有八性靜而慈相大父惟義之急不以有亡為解教諸父必儒璲父酷嗜收書鬻田園以庚直借書問字者滿門縱論古今留連燕飲莫繼燭弗倦至空其家歲庚午春大母且泣且語吾望而取冨貴以華老今顧日貧爾妻死矣母懷居挈爾子游都門或幸成立不成吾死母歸夏鬻荷塘屋得緍錢千二百留半為菽水不虞備偕璲哭辭以出月移歲改倀倀逆旅莫之省大母訃聞無斗舂以奔喪父子東望號躃絶已復蘇念惟忍死賣文以辦葬庶乎不孝之罪可末减於是曵𥚑並奏王公貴人門鉤摘繪寫脫手眼青解衣推食不我勒也紹定庚寅璲侍父歸自惟揚倒槖中裝經度窀穸相攸逍遙觀舊址古洞陽之側山明水清妥厥靈為冝越壬辰二月乃克葬先是璲母程氏兆金山之陽地卑多潦從弟璋之母程死焚而末殯同日併遷柩骨夾祔于側置田租二十斛入逍遙為蒸嘗供挽道士楊祖雲主岡林仍度一人以丗汛掃烏乎樂莫樂於負米悲莫悲於齧臂髙堂垂白一訣千古為子若孫者何心哉賴天卑矜積囏苦二十年了大事子幸哀而銘之水激則髙矢激則逺賢父子激於太夫人一言日夜刻厲用能以子雲之筆札孔璋之書檄撥窮起悴還以奉之生之養不過百年而死之奉與山川相為久其無憾矣乎小人有母凄其拱木因感愴系之詞以申孝子慈孫之志銘曰林洞古兮虛壇瑶草春兮芳蘭笙鶴杳兮雲旗間魂返宅兮吉且安髙朝散墓志銘嘉定辛已壬午間成都通守髙才卿泰叔以文學器能為西閫賞重某時貟外置間與聞末議回首十寒暑矣其守三嵎﨑嶇走書天目下為言先君子即窆有年識竁之文猶未也蜀非無宗工可屬必公諸東南庶幾信百丗子好我敢請案髙姓派於齊占籍卭蒲江者丗有隱操珣生孝立孝立生興國嘗大書于屏訓子孫學以忠信孝悌為本君其長子也諱澤字叔淵少朗悟絶人書一再過成誦荀楊氏韓柳氏漢唐三國南北諸史皆手抄是非得失反覆究見根極而折以經鄉先生趙澥深可之侵尋不耦退謂其子曰基之以孝悌植之以忠信培之以至誠無息天終厄我哉未幾子䇿名奉常君喜見顔面曰天所以逸我也屏舉子業不復省輕車就養笈書以自隨所至雋艾系踵請益危坐縱論其要歸於涵泳孰復而自得幅巾蕭散當路欲一見輒謝去不喜誦佛氏書而戒殺嚴甚曰物我俱生天地間同一氣也用心􅉃怛類如此開禧丙寅夏啓手足於普慈郡文學官舍春秋六十有二纍贈郎娶韓氏事姑婉恪能得其歡心間君客游手課其子容止服御有常度里黨尊為婦則先君十八年卒贈恭人葬仁惠鄉龜山阡從舅姑也君兆卜向六門惟乾食相距三里而近丁卯蜀變淺殯故廬西丙子四月乙酉乃克葬一子即泰叔今朝請大夫知嘉定軍府事一孫允績某官曽孫男女若干人士求仁之方莫切於孝悌忠信四者秉彛所鈞有甚易知易行也往往由之而不知何哉學失其傳爾君得一語之傳於家庭知之至守之篤朝夕省飭欲天理之在我者皆實而無僞其志於仁矣乎明善誠身上可以順乎親則下可以穀爾子冝其至嘉定而大也銘曰切已之學莫如求仁求仁維何誠善於身孝悌其本忠信其質仁莫近焉落華取實翼翼綿綿是似是傳榮光漏泉何千萬年佛心禪師塔銘寧宗皇帝在宥三十有一年元默無為以心學仁天下聞主徑山如琰得即心非心之祕賜號佛心禪師婁命就山為衆說法錫賚甚寵山川震耀夫敬直義方表裏兩盡下學上逹顯微一貫此自昔聖賢相傳之心法釋氏得之證其體而滅其用以成之者性為圜覺以復則不妄為楞嚴以勿忘勿助長為金剛第一義以不失赤子之心為華嚴最上乘湛然太虛本無增减雲行月脫隨有昏明頂竅靈關鼻端寂觀一喚覺於意識智得之表而大光明藏無缺無餘南渡百年間大慧杲以是說授佛照光佛照以授師師寧海國氏子母夢神人遺大珠而娠生有光瑞能言時母戲之曰人從何來曰人中來聞者異之十五出家淨土院十八祝髮二十游方卅一得法於佛照𥘉束包問津雙徑見大慧髙弟仁扣以當時千七百衆咨决之要得狗子無佛性話默領去江湖遍參群疑塞胸還求决佛照於台之報恩夜參聞舉丗尊鞭影語曰見鞭影而行非良馬也言下有省旦日入室問不思善不思惡正恁麼時如何是琰上座本來面目師云佛手遮不得曰恁地也未夢見在久之從過靈隱苦研精索至忘食寢佛照勇其進痛施砭劄師終以未徹憤悱遂謁證老衲於番易聞旁僧商略雲門話墮語云那裏是這僧話墮處豁然洞見佛照從前機用義諦密融智辨捷出九萬里風在下矣還參於育王佛照迎呼曰大事辦耶尋復從過是山朝莫激揚極其造詣佛照每語人曰我握佛柄以來的契吾機惟琰耳其賞屬如此繇育王分座出主南劒之含清歷越之能仁明之光孝建康之蔣山皆迫而後應最後天童與是山宸命也師見趣髙深提倡直截所至禪衲川赴平居簡默似不能言及籌室勘驗學徒如驚雷忽電不容湊泊領衆嚴而奉已約應物圎而處事定叢林推敬謂浙中尊宿獨此翁因共稱浙翁住山八年春秋七十五矣以退休請未獲命一日忽剡遺奏遣書别素所往來公卿抵莫問侍者曰鐘鳴未曰已鳴大書偈擲筆端逝寶慶𥘉元秋七月戊寅也越九日塔于東􅤝之麓其徒了阡以師六㑹語要介法戒謁辭圗堅銘曰佛果有心萬籟沉沉佛果無心萬象森森靈明溥通徹古徹今契非其真杳不可尋佛照鉗椎雲門芥針是印非印脫礦鑄金沕萬古淵閉陽闢隂炮車起雲奮霹靂音川魅澤怪腦裂氣瘖須臾恬霽天垂斗參無去無來谷髙岸深護窣堵波龍公夜吟為蜜說甜以詔主林二鍾君墓記臨安亭川鍾氏景常生子淵子淵生福州助教億億二子長貴州助教俊卿字子明次將仕郎仁卿字子壽子明娶徐氏生端禮蚤卒次端詳一孫與齡子壽娶龔氏生端謨端誼二女適施大用龔奐二孫道齡佑孫子明慷慨機警遇事無留難子壽通而敏文多成誦生相後十年志鈞材耦以力業相摩厲凡所規畫兄不自謀必以咨諸弟弟劑度可否聽兄决之塤倡篪和如出一人以故積居懋化中權而獲厚生理既𥙿又相與以輕財急義聚書樂教為聲華勝士往往願交邦大夫亦賔禮異等居旁池園深秀結堂竹石間扁以丗友暇時相携娛娭華髮交映兒姪迭起奉觴為壽雍如也子夀年六十有四以紹定庚寅十一月晦卒越明年八月五日子明卒得年七十有五二君無恙時誓生無異廬死無異兆治夀竁於新安鄉南山之原右左以序至是同卜以其年十一月丙申葬焉惟孝友于兄弟知孝於其親而思手足均父母之遺體則能友矣兄弟之子猶子也知伯叔父即吾父從兄弟即吾兄弟則能丗其友矣子明子夀之友後人盍求以丗之乎嗚呼和樂而家道昌睽疑而外侮起又可不懼乎余探二君友愛之情併志之使其子各刻一通藏諸墓以尉九原云十月望日於潜洪某記羅迪功墓志銘行於蠻貊易行於州里難行於閨門尤難愈近愈不可以矯揉欺也三代直道微俗日益薄有能積忠利平實之踐使鄉人尊而信家人親而化耳目所接得臨安羅君介圭元度焉曽祖將仕曉祖文學虨父將仕若濟聚族以恩義相陶浹三丗不異㸑君意承厥考弗懈偕夫人廑苦節約以奉蒸嘗酬應內外一簮弗營其私倒已槖且弗靳而量淺機深之戒每為子姪誦之肅雍一門自為師友升其堂詩書之聲鏘如也紹熙甲寅水穀賈騰躍道殣相枕前是里中貸子錢者計緍纍萬君嘆若救死不淡何忍更責若償裒劵焚之他歲饑疫率推食饋藥以振羸乏惟恐不我聞鄉鄰信其長者有訟不之有司而之君取平相踵也人性皆善氣質厚薄則有不齊而行事因之君於善利取舍之間擇明而守確既行於其家又行於其鄉天者厚矣歲癸卯蓮異葩同跗擢于沼而子震龍生壬午玉燕巢于庭辛卯異竹産於書孰之廡義方發祥蘭院競爽震龍聲撼膠序舍選以優升君時七袠遭逢慈明大慶遂𬒳𥘉品封天於厚德之報未垠也明年二月乙卯以微疾考終于家巷哭多失聲十一月庚申葬平西上沈塢夫人先六年卒同兆子男四震龍正奏名進士次友龍從龍一龍女四適俞元龍俞鎔吳伯振郎應午孫男六女二銘曰盡已忠乎推已恕乎踐其著乎處其𥙿乎噫庶乎元度乎獅巖沈君墓志銘浙漕貢士沈湀與余交步趨語默中度文中律執親喪啜𬞞處獨不見齒者三年一日舉內外柩四竣事謁余銘其先大父獅巖君墓孝子慈孫之請不得辭也沈氏望吳興避五季亂徙瑞安丗以儒名家惟正生忠訓咸咸生特奏琮琮生君諱賁字成伯年七十有三以慶元己未五月十日卒娶給事劉公安上姪女先卒子二振蚤卒抃未除君喪卒女二適進士塢說許仲承孫一湀女孫三湀承考志以紹定己丑十一月癸酉葬君于橫山考祔焉君少負英氣身七尺射命中聞舊臣宿將說中原事輒慷慨流涕間往來武夷考亭諸山從偉人訪異聞得八陳微指因㑹稡諸家方圎竒正之說著書數千言附以孤虛六甲占風望氣之法期於有用學成不售杜門評論諸史究見成敗得失以寄憤鬱氣岸潔然湛盧青萍之在匣有不可蟠屈者而行已居家動合繩矩事母劉夫人以孝聞訓育猶子收拾師友遺孤乳保之若已子董勸里丁鄉校之役若家事行義著矣猶未足為君多也丙戍風潮之變死者山積君既負母如亢爽群從少稚􅍪至轟豗澎湃震掉心目跬步不能進相與號呼於浮沉中君奮前不顧手挈而登之人人得脫魚鱉之涎而君二子反迷失道莫知所之或唁君君曰是有命既而亦皆免於難士平居暇日孰不知志士仁人為可慕猝然之變壓于前死生禍福垂於一髮未有不志移氣奪擇利以自謀於此能委命徇義寧忘其身忘其子而不忍遺兄弟之子其惟近古之卓行乎先是君家東美躬行二君子從伊川先生游得其學特奏未冠以明經走京師試行臺為貢士第一遂介從弟游伊川門君學得於特奏就正於東美抗志制行信有自來哉銘曰學出伊洛如江河近接其流渚而沱釃為洫渠引沚阿滲漉所及黍與禾有相之道嘉且多壬辰冬十有二月庚寅於潜洪某撰吳致政墓志銘東朝慶霈臨安吳君孝先謙仲以子元卿為太學諸生封𥘉品官越再歲紹定癸巳春正月壬申卒夀六十有八先是君未屬疾晨起語家人吾夢遊穹林邃洞三茅君命之坐殆非久於人間丗者自今勿以肉食進越半月曰吾殆病矣四肢百骸無所苦而胃少弱自今勿以粒食進惟日飲參棗湯兩瓦杯又半月曰參棗煮湯固佳未免烟火氣棘人第汲井花水飲我可也如是者又半月水不復飲矣翛然一榻神恬氣明親交省候人人起道寒溫叙殷勤去則執手訣别以寡欲延年樂善受福為勸唅殮葬祭纎悉治命忽整襟曰吾苦目眚纍年今劃若開明亟取筆來書頌甫畢而坐瞑莫不異之君讀書務實踐耻為口耳之學晚倦遊埸屋移志道家書得谷神琴心之旨每謂其說與吾儒同歸手稡孔子子思孟子仁義孝悌之訓自出機杼纂為科典亡慮萬餘言冠珮宣誦聽者竦立家事付諸子深居燕坐飛神御氣排膠葛而泝沉寥超搖八極之表水旱緑章精禱雨霽遲速言輒驗靜則虛虛則明故也性冲淡不忮競而篤愛敬治家嚴而有節端默堂皇內外無履聲待人接物恕而慈嘉定已已大疫暴骼莫掩君募致纍萬舉佛老㑹歸之明年歲大侵道殣相枕首發私廩為粥以食餓者巨家相率致助全活不可計又明年榖騰躍猶故盡出伏臘之儲損直以糶為鄉里先而包黍以遺飢紉絮以濟寒和藥以拯病歲其常也人有善誦美如已出有不善惻然閔其失本心見義勇前苟利於衆不退顧見賢起敬起慕不暇鄰曲小故傷和雍容談笑以平其忿而人犯之不校親族以事咨訪立為劑量輕重使不失凖雖童稚必拱而忠告其篤於信道而誠於善自少壯至老猶一朝夕也卒之日鄉閭逺邇嗟惜不容口室鍾氏先六年卒墓在福昌玉泉山君以其年八月甲申合葬焉曽祖某祖某父某將仕郎男五元卿和卿舜卿舟卿德卿皆業詩二女適進士鍾甫錢克俊孫男七人道家以清靜自然為宗致柔返朴而虛其心所以求道也東郭順子人貌而天虛緣而葆真清而容物深於道矣君中扄虛明內行純固蓋淵乎似之委蛻乘化冝有以異於人哉某省疾牀下辱以幽竁之銘屬掛劒之義不可寒也銘曰深根寧極絶外營危坐內照虛白生龍章虎籙提玉衡鞭風駕霆溘上征九光前導八景迎祗欵寥陽朝通明紫皇潜簡一念精瑶宫璇臺敕標名積功滿千道紀成拍手下招仙人盈獨騎黃鶴凌太清遺劒墮舄搖寒晶雲氣紛葱護佳城郎迪功墓志銘余自郎曹以言事擯僑居西市距君舍二里所嘗過君飲君時已七十餘姿狀厖艾髯髮盡白酒酣慷慨道平生經行山川之險易風俗之媺惡及可喜可愕事纚纚有本末且言開禧𥘉淮楚繹騷身在圍城中間以竒畫干主帥用輒中圍解欲官僕掉頭挾所得胡人弓矢徑歸每北風塵起拂絃撫笴猶踴躍自喜恨不獲窄𫀆快馬蹴踏冰雪效驅馳也語畢目光炯然如秋隼之欲擊意甚壯之問君何以不從戎曰吾宗本詩書家也景德六年逺祖簡登進士第仕至工部侍郎名在國史衣冠中絶落莫幾二百年物久鬱必怒奮貨久居必暴贏僕少游四方閲人多視諸孫當有以儒科進者歸出槖中裝延師教之晝綜理家事夜張燈挾策坐孫輩傍吟諷與相應和老者未寢少者不敢懈以故偉伋能力于學紹定壬辰同忝科第以續前脉僕藉是亦階𥘉品孰與鶡冠多因扣君養生以何術曰寡欲安生以何術曰寡怨治生以何術矍然搖手曰是非考功所當問老夫亦不能語考功也余今浮湛周行愧且病念君涉多而見博年耆而識明沼魚畦卉可以永日欲歸效太史公訪所過長老從君執筆記所聞而遽以不起赴噫惜哉君郎姓在漢為安丘人在魏為中山人唐五季以來丗為杭之臨安人贇生瑀瑀生孜孜生君君諱思字伯永性明直無機械事母老彌篤撫鞠猶子盡恩平居意色沈毅閨門整暇與人言是是非非不茍同臨財義不立責劵而樂周急生以紹興庚辰卒以端平乙未十一月八日娶章氏封孺人男三謙詠該季蚤卒女嫁施廷祀孫男七偉前紹興酒官儀俶伋新慶元市舶務儼僑俌孫女四曽孫男女十二卜以明年三月壬申葬君于章塢先域偉伋奉大母命來乞銘曰曽大母嘗得銘大父不得銘寧不葬惟先生哀憐之因次第其說系之銘曰動以任乎時為冨靜以安乎命為壽四丗而林立一科而𡵨秀其蓻之深封之茂也夫平齊文集卷第三十一
