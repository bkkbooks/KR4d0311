body:
  text: 講義下臨元亨利貞至于八月有凶臣聞事會沓來乃君子大有為之機此蠱之所以轉而臨也夫陽大而隂小有自然相臨之分方一陽為復其端甚微五隂在上詎能獨勝故必待朋來而後無咎至二陽為臨則有朋矣陽得朋則群隂禠氣而退聽故復止於亨臨則元亨利貞陽寖長而隂寖消也臨據陽長之會既能變蠱壞而亨通又能處亨通而正固以此保大其又奚虞而見逺識微者巳不勝其隱憂何則隂陽無兩盛之理一長則一消其機在反掌間自復而臨以至為泰為大壯為夬為乾陽極矣而一隂潛萌於五陽之下為姤二隂則遁也由建子而復至建未而遁凡八閲月二隂之遁與二陽之臨正相反陽消而隂長凶可必也然亂生於治否生於泰理所必至而酣豢宴安者常忽之有能燭其幾於人情之所易忽而轉移機軸於冥冥之中使履霜不至於堅冰陽常進而隂常置於空虛不用之地則大亨以正可常保而吉其凶矣觀至于之辭則知吉凶未定之間儘有可用力之地特患乎玩安忘危不知所以用其力彖曰臨剛浸而長説而順剛中而應大亨以正天之道也至于八月有凶消不久也臣聞一陽而復二陽而臨剛浸長也下卦為兊上卦為坤説而順也九二以剛處中上與六五相應剛中而應也臨有是德故大亨以正也隂陽消長皆非一日之積今陽剛浸長於復返之餘其來有漸然懼其乘方進之機鋭於逐群隂而失之暴故繼以説而順説而無所忿順而無所拂心和氣平動循天理則剛不至於過於是臣之剛中足以輔乎君君之柔中足以濟乎臣上下交應同歸一中冝大亨可致且不失其正也豈特人事為然天為剛德猶不干時一元運於上而雲行雨施保合大和莫非剛健中正之用天道亦何嘗過於剛哉况陽無常勝之功隂無盡滅之理消長往來間不容髮二陽之臨方長而二隂之遁巳知其必至陽消蓋不久也自復至遁閲月凡八而謂其消不久何哉疾疢萌於強壯之時人不自覺也元祐𥘉司馬光一洗新法之弊而奉行差役巳有蔡京消豈待久哉遁進而否君子之道盡消則蔡京之禍天下凶莫甚焉夫惟上之人常以防微杜漸為心遏隂柔於未進之始尚何陽消之慮象曰澤上有地臨君子以教思無窮容保民無疆臣聞坤地在上兊澤居下地之臨澤最為切近君臨民之象也地上有水為比澤上有地為臨皆以切近取義而水與澤異水流而不盈故比於地而不為臨澤者水之瀦涵深蓄逺渟奫演迆而地之岸際常臨之此具區雲夢大野所以為澤而不為川浸也君子觀地與澤相臨之象而得近民之理故教思必無窮容保必無疆無窮者意味深長百丗猶有先王之澤則兊之浸潤也無疆者規摹恢廣出日莫非丕冒之地則坤之包含也人君以是臨民無愧君師之責矣蓋君之於民猶父之於子其相親也以情相維也以道而非可以勢分拘以勢而臨則教思必淺容保必狹私心町畦公道磔裂尚何足以知臨之為大乎大哉堯之為君惟天為大惟堯則之人君方寸之中與堯同大而後可以盡臨之不然教思何由而無窮容保何由而無疆哉𥘉九咸臨貞吉象曰咸臨貞吉志行正也臣聞澤通於山為咸咸感也凡具隂陽孰能無感以貞則吉貞者正也君子小人之辨在於正不正之間臨為剛長之卦𥘉九與四為應而比於二皆臨我者也吾欲感動所臨獲乎上以行吾道必一出於正曠乎其公而係吝之私不留純乎其誠而矯飾之偽不作此以正感彼以正應精神心術之妙相與凝固而不散則君子之道由是進進乎泰亨之盛所感以正而吉也然所感之邪正莫謹乎其𥘉志者心之所之在卦之𥘉此心趨嚮主於正而行則無往不以正合進以正可以正邦也一涉於邪則見金夫不有躬進不以正特一時之茍合爾然則下之感乎上能察乎正不正而為進退則不至於失已上之應乎下能辨乎正不正而為用舍則不至於失人九二咸臨吉無不利象曰咸臨吉無不利未順命也臣聞臨之為卦以二陽為主二陽又以九二為重二承乎五五臨乎二實君臣相與感通之會二剛中五柔中俱得其正冝既吉且無不利也然自復而臨陽剛浸長固吉矣而長必有消八月之遁巳逆計其必凶君臣相與綱維斯丗其將聽隂陽之自為消長付之無可奈何而安之若命乎抑將進陽退隂以制消長之運而自我立命乎命賦於天受於人行廢有定運死生有定數非可以人力轉移然有君子不謂命者存二陽長而為臨與二隂長而為遁固天運之所必至茍一以命哲命吉凶委之天而安之八月有凶拱手順受而不思闔闢變通之道臨終為遁矣我生不有命在天此商之所以亡也惟知賦命在天制命在我旋乾轉坤與丗立極陽冝消矣挽而回之使不至於消隂冝長矣尼而止之使不至於長吾方以天自處未容一切惟命之順也夫如是君子常長小人常消而咸臨之吉常存二五君臣各盡其道矣不然何以君相不可言命六三甘臨無攸利既憂之無咎象曰甘臨位不當也既憂之咎不長也臣聞君子之樂王天下不與存為人上者不可以位為樂也夫以天命難諶民情難保大業難守重器難安夙夜兢愓危懼猶恐不蔇而可樂於得位而泰然處之乎甘者説樂之至也六三居下卦之上處兊説之極而以臨人之位為樂玩聲色之娛而忘美疢之患懷宴安之適而遺鴆毒之慮好樂一形投合四集便嬖側媚相與以巧言令色鼓舞之施之政事冝其無往而利也有能凛然深省幡然大改以所樂為所憂念二陽方進於下而消不久之凶已兆於吸呼之頃操危慮深若不能以終日切切乎豫又集于蓼之懼則前日之咎今可免矣蓋三以甘説為臨其位不中不正一惟偏私之徇故象示不當之戒又懼夫人耻過而遂非開之自新許以轉甘為憂雖有咎而不長有國者冝知所擇矣六四至臨無咎象曰至臨無咎位當也臣聞至臨臨之至也四居大臣之位上比於五君以道合下應於𥘉賢以道親且時當剛長大臣虛心無我援天下陽剛之賢進輔其君與共成致君之業以此而臨豈非至乎然進賢退不肖大臣職也援陽剛之賢與共成致君之業乃職分之當然極其至如周公之握髮吐哺始可以無咎有一毫驕吝之色賢者望望而去之則咎隨之矣象明臨之能極其至亦惟處得其位之故以六居四是為正位體柔履順不自矜其能而惟賢是與德與位稱也六五之君柔矣六四之大臣又柔而下無陽剛之賢為之應則治淪於姑息勢失於委靡謀國者能辭其咎乎六五知臨大君之冝吉象曰大君之冝行中之謂也臣聞知所以察未見之幾制有為之會人君之臨天下轉移萬化闔闢萬變必有知行乎其間而知以得中為難蓋是知之用不及則暗太過則察無過無不及則中六五有深沉先物之知又下與九二之賢為正應不以一已之聰明為聰明而以賢者之聰明為聰明臨無遺知矣然知不可以過用丗之小知自私者用知必過明帝之苛察德宗之猜忌何其𥚹也故惟大德之君然後於用知為冝明有前旒之蔽見無淵魚之察知君子之當進必推翕受之量知小人之當退曽微深疾之心以大用知而知得其中即舜之大知也象言行中之謂豈非不過用其知即舜之用中歟中庸聰明睿知以有臨必寬𥙿溫柔以有容正此意上六敦臨吉無咎象曰敦臨之吉志在內也臣聞卦終必變君臨天下之道以克終為難必用心加厚乎其𥘉則可以保其終敦者厚之至也何所厚厚於親君子也親君子逺小人之心久而愈篤則以之畏天必加畏以之愛民必加愛無所往不用其厚也艮上九敦民以加厚而吉臨既吉又申之以無咎者為六三設也上六居臨之終而應乎三三不中不正上茍私所應與而親之何以免咎惟舍三隂邪之小人而志在二𥘉陽剛之君子故冝有咎而免也兊為內卦君子在內屈已下親不以久而替寧有加於大亨之鼎母或失於二簋之權輿則賢者肩一心以輔乎上非針之庭燎則戒之無逸君臨天下之道於是乎保克終之吉矣明皇始厚宋璟韓休張九齡終厚李林甫憲宗始厚杜黃裳李絳裴度終厚皇甫鎛此心一移卒貽不終之禍可為百丗戒觀盥而不薦有孚顒若臣聞臨觀反對卦也臨二陽在下觀二陽在上觀如兩觀之觀儀刑揭而群瞻聳也觀之聖人正心修身以觀天下一誠之外無他尚猶宗廟之祭交於神明一誠之外無他物盥即奉槃沃盥巾以帨手時也祭先盥手然後酌鬯而祼祼用鬱鬯猶未免託物以求神盥則蠲潔內外與神默接洋洋乎如在其上如在其左右不假物而誠已通又何俟腥熟之薦而後逹其誠哉為人上者能至誠主一無假乎外如盥而不薦斯民不期孚而自孚矣孚者信也誠之實有諸已者也人受天地之中以生誰無是誠君以誠感民以誠應顒然興起不約而同與聖人作而萬物覩均此機也是知人君之化天下不難於孚諸人而難於孚諸已彖曰大觀在上順而巽中正以觀天下觀盥而不薦有孚顒若下觀而化也觀天神道而四時不忒聖人以神道設教而天下服矣臣聞一隂為姤進而為遁為否為觀為剝莫非小人道長觀獨不以隂盛為憂者二陽在上四隂順聽於下是上有陽剛之君儀表一丗隂柔雖衆方將化而為君子之歸其為觀甚大也觀合巽坤為卦以九居五順巽而中正也循理而行無所拂逆可以懷天下未足以觀天下觀天下必中且正大明當天萬物咸仰一有偏倚必有照臨不及之地此聖人所以為天立極也然必本之以誠誠者物之終始不誠無物此心之誠不存則順巽中正俱失其有猶盥而不薦以誠為主黍稷不如明德之馨殺牛不如禴祭之福在誠不在物也此誠所格斯民莫不相孚以心顒然尊仰隨所觀而化其觀果何所見哉誠則形也其化果孰使之然哉唯天下至誠為能化也求諸天道春夏秋冬運行而不息皆神之所為聖人以是道設教天下不期服而自服又豈非誠則神乎觀之聖人一誠貫通三才之間始與人為一終與天為一極而歸於無聲無臭之妙非黃帝堯舜之神化冝民文王之純亦不巳不足以當之象曰風行地上觀先王以省方觀民設教臣聞自上示下為觀天下之物凡可以示人者皆有形之觀惟風行乎地上草木均𬒳披拂則無形之觀有形之觀其觀淺無形之觀其觀深故先王取象於風之行地省方觀民而設教五方之俗各有不同隨方省察因民俗而教之以救其偏扶其正使同歸道德之中舜之同律度量衡成王之考制度雖若涉於有形之觀教行而民從猶風行而草偃皥皥乎其不自知實有無形之觀存蓋誠存乎中不動而敬不言而信不容以形迹窺也後丗省方之禮廢人主深居九重之上民何由觀教何由設亦惟心存乎群生之休戚庶俗之媺惡四方萬里皆暸然於户庭之間而以身為教自正心誠意以至於修身齊家無一不盡自然國治而天下平與身歷目睹所設教何異哉𥘉六童觀小人無咎君子吝象曰𥘉六童觀小人道也臣聞觀以二陽位否剝之間欲化小人為君子故待小人恕欲君子益進其為君子故待君子嚴九五宅中于上光明碩大之德如日月之照臨有目皆覩𥘉氣卑質弱而去五逺乃為童稚之觀童者蒙而未發孩提之童無不知愛其親則有可發之機彼其陷於小人豈性也哉物欲蔽之也茍如童稚於倥侗顓蒙之𥘉有以發之則昏者可迪塞者可通氣質變化安知小人之不為君子故雖童觀而許其無咎象以小人道為言其質固不可以語上而申言𥘉六亦示其上進之路也為君子而不能以學問開明所見而甘心與懵無識知者同歸則為吝矣聖人於大觀之𥘉恕於待小人所以示皇極大受之法嚴於待君子所以示春秋責備之法六二窺觀利女貞象曰窺觀女貞亦可醜也臣聞聖人之道無窮人心之見有限上帝降衷若有常性靈明虛徹𥘉無聖愚賢不肖之間而氣有清濁材有利鈍故所見亦隨之而廣狹仁者見之謂之仁知者見之謂之知百姓日用而不知此其所以區而别之也窺觀之不能廣大豈非六二氣質之柔暗歟九五陽剛之君大觀在上乃帝光天之下至于海隅蒼生萬邦黎獻共惟帝臣之時𥘉以童稚之見而觀蒙昧未有識知二以窺覘之見而觀有識知矣又自安於卑陋蹇淺僅足以知聖人之汙是惟女子生長於深閨之中幽間專靜而有守則窺觀猶未至害士君子則害道矣象發明爻辭之所未發謂窺覘為觀雖女子之貞亦有可醜蓋鑽穴相窺窺見室家皆為不正之視女子雖貞而所視不正心隨境移恐不能保其貞也然則欲廣窺觀之見則何先中庸曰好學近乎知學愈進則見愈廣聖人之全體大用目擊而道存矣故惟人百之已千之雖愚必明雖柔必強六三觀我生進退象曰觀我生進退未失道也臣聞三上承二陽下接二隂而居其中陽為君子隂為小人進而從陽則為君子之歸退而從隂則為小人之趍一進一退蓋邪正善惡之關也三於此觀我生生者出於吾身者也其大端則言行是巳觀吾之言其進而合於君子耶其未至於君子耶觀吾之行其退而陷於小人耶其遂逺於小人耶君子小人之界限其間不能以寸反觀吾身之所發必欲進與上之二陽同其光明而不欲退與下之二隂同其柔暗能如是三雖處不中不正之位亦未至於失道也蓋三之質易於失道以能反觀諸身去小人而從君子故道為未失也然未之一辭猶未深保其不失道盍亦戰戰栗栗於取舍之決為舜而不為跖為堯而不為桀哉此正大學致知工夫之地六四觀國之光利用賔于王象曰觀國之光尚賔也臣聞九五剛中之君在上𥘉與二去九五為逺故止於童觀窺觀三少近則未失道四切近則利用賔觀愈近見愈親也賢者進退有時行藏有道如麒麟鳯凰其出必待休明之丗故觀國之光然後賔也國之光明本君德之光明人君能明吾之明德如鑑不受翳水不受滓則本然之明常存篤實之光充實之輝皆由此而發在朝廷則禮樂彰法度著在天下則道德同風俗一其為國之光大矣賢者觀乎此而願立於其朝伊尹起於莘野吕望歸於東海豈非湯文之時利用賔乎象以尚賔發之蓋道義重則勢利輕賢者寧甘心於白駒之谷考槃之澗不肯屈身輕售其出也以時其進也以禮其事君也以道君望其儀刑而起敬故崇尚之以賔禮而不敢臣取重者在已重之者在君如此則諌行言聽膏澤下於民矣茍在已無以取重君且望而輕之母怪乎有言莫之行也九五觀我生君子無咎象曰觀我生觀民也臣謂反觀內省之功儒者所難而况貴為萬乘可喜可欲所以移其心者滿於前乎九五陽剛而中正居巽而應順動無過舉矣然猶於我生必反而觀之凡言行出於吾身者為我生觀吾一言之出皆合於君子之道則言無過言一行之出皆合於君子之道則行無過行以此示民可以無咎有一不合於君子則有咎矣吾身未能無咎顧欲使天下皆有士君子之器表偏而影正無是理也象又以觀民言者君子之道本諸身證諸庶民觀群黎百姓遍為爾德則知言行之出於吾身者為善觀怙侈滅義服美于人則知言行之出於吾身者為不善是觀我生者必當觀諸民也因觀民之所化而觀吾身則言行是非不能掩因觀我之所生而觀吾心則念慮之邪正不能蔽由外而反諸內愈近愈不敢自恕由內而推諸外愈逺愈不能自隱內外交相養之道既盡天下觀而化之孰不顒然而孚乎上九觀其生君子無咎象曰觀其生志未平也臣聞上九與九五爻辭同惟我生其生異蓋吾身之所出為我生九五之君所以自觀也上九則觀君身之所出故為其生五君位上處無位之地而密比之雖居無位之地一念未嘗忘乎君常欲納之於無過故觀君之言行果君子耶則喜其能免於咎觀君之言行未君子耶則憂其不能免於咎身在畎畒心在王室因所觀而察之惟恐吾君之出乎身發乎邇者有一毫之未當無以示四海之儀則其志豈遽平哉然九五觀我生上九觀其生皆合乎君子之道而僅止於無咎何耶人君之治身無止法言行極堯舜禹湯文武之盛不過盡其身之所當為𥘉非有餘故君子乃無咎不然有咎矣人臣之望君無止法以禹湯文武為未足又耻其不及堯舜故君德至于君子特喜其無咎未敢遽以為可安也此觀之君臣所以各盡其道噬嗑亨利用獄臣聞嗑者合也噬去頥中之物而合也頥卦合艮震為體𥘉上皆剛而中之四爻皆柔猶人之頥虛其中也噬嗑𥘉上皆剛與頥同而四亦剛是頥中有物間之故有待於噬而後嗑也凡去間之道皆然時則勿有間之是君臣之際以無所間而合也人不間於父母昆弟之言是骨肉之際以無所間而合也彼蠻夷猾夏寇賊姦宄蓋梗聖人之化為天下之間者去其間則化行於天下矣噬嗑亨間去而合即亨也其義利於用獄獄以推見其為間之情而去之則梗吾化者不至於覆出為惡病根除而正氣還也其在人心則人欲為天理之間人欲盡去天理流行豈非間去而亨乎此又克巳工夫之當盡彖曰頥中有物曰噬嗑噬嗑而亨剛柔分動而明雷電合而章柔得中而上行雖不當位利用獄也臣聞頥者養也頥以納飲食致養而有物梗之故必待噬而後合合則亨矣亨之功在噬噬者用力囓去之也小人為君子之間不用力以退小人則君子不進夷狄為中國之間不用力以却夷狄則中國不尊姦民為良民之間不用力以治姦民則良民不安此皆噬之功所以致亨也以爻言之則三陽三隂為剛柔分以卦言之則下震上離為動而明以象言之則震為雷離為電二者參合而成章雷取其威電取其明治獄之道無大於此然六五為用獄之主乃以柔中之道行於上雖以隂居陽為不當位而治獄以燭見情偽為先離體虛中而明故於用獄為利夫獄者民命所係得其情則哀矜而弗喜欽恤之仁行焉茍不以柔治而以剛治則明過於察威過於猛人將無所錯手足失天地大生之德矣噬嗑義在除間而歸於柔中以此知好生者聖人之本心用刑者聖人之不得已象曰雷電噬嗑先王以明罰勑法臣聞隂陽相薄而為雷相軋而為電故震之一陽動於下離之一隂明於中噬嗑之象取焉卦本先電彖象乃以雷先於電者蓋泰卦上坤而下乾不曰地天交泰而曰天地交泰取其交也噬嗑上離而下震不曰電雷噬嗑而曰雷電噬嗑取其合也電明而雷動雷行而電隨明與威合然後梗化者可去徒明而不威則詳於察姦而不能除其失也懦徒威而不明則鋭於去惡而不能辨其失也暗明行以威威發以明天下無難去之間矣先王觀雷電之象於是用電之明以明罰用雷之威以勑法罰顯而枉直各得其情法飭而輕重各當其罪利用獄之道盡矣舜之去四凶成王之去三監孔子之去少正卯皆此道也然辟以止辟刑期無刑聖人豈徒恃法令為齊民之具明與威並用罰一人而千萬人懼法雖飭而不常用也雷電之合隨即開霽天道亦豈常用其威哉𥘉九屨校滅趾無咎象曰屨校滅趾不行也臣聞噬嗑利用獄𥘉上為受刑之人人之性本善情動欲生遂陷於惡聖人憫之故設為刑罰以懲惡而挽之於善然善惡觀其所積欲惡之不積當於其始而禁之趾在下為行之始加校於屨而趾滅焉彼雖欲行而不可得則不進於惡可以免咎矣校足械也滅沒也校深大至於沒其足也或謂滅趾為刖刑刖則施踊何取乎屨有屨加校非斷趾明矣唐虞畫象而民不犯特赭衣菲屨之類肉刑未嘗用也蓋小懲而大誡故能免麗於刑小不懲則惡積罪大聖人豈得而私宥哉其在人心一念有不善貴乎早覺而力遏不二過不逺復之功皆基於此覺之不早遏之不力則去舜就跖悔莫追矣觀易者知治已則知治人六二噬膚滅鼻無咎象曰噬膚滅鼻乘剛也臣聞為一卦之間者九四也𥘉九與四為正應是同惡相濟者也膚柔而易噬猶𥘉之為惡未稔而易制鼻髙而難滅猶四之為間甚大而難治始噬者膚而終至於滅鼻小懲於𥘉遂大討於四也四之間去則𥘉無與應小人之黨孤何能為哉乘剛言二位乎𥘉之上乘𥘉之剛以攻四之剛因瑕而及堅也蓋二居中得正以用刑所施不失其序故下能治𥘉之罪上能除四之間輕重有權尚何過咎之有皇矣一詩文王侵自阮疆不過用輕兵以臨之而阮自服進至崇墉則聲罪致伐必是絶是忽而後巳彼其剛戾梗化之罪雖同阮為易討崇為難討侵阮則膚之噬伐崇則鼻之滅聖人𥘉意不汲汲於深治小人而終有不容不深治者皆其所自取也六三噬臘肉遇毒小吝無咎象曰遇毒位不當也臣聞周禮臘人掌乾肉臘物之全乾者也小人掌盛而勢強其堅難噬與全體之臘同三乘𥘉應上而鄰於四疾小人挾黨為間欲盡除之然人之為惡情有淺深罪有輕重不問渠魁脅從而例殱之是舉臘肉之全體求快於一噬故反遇其毒豈非可吝者乎而其吝小終歸於無咎我之治小人名正言順彼雖有反噬之心無所施也然其遇毒亦以位不當之故無瑕者可以戮人三所處不中不正而欲施刑去天下之間人其肯心服哉齊威公自侵蔡而伐楚猶噬難噬之臘肉屈元如師辭多勃戾有遇毒小吝之象而終於服包茅不貢之罪則無咎矣齊之挾天子以令諸侯位固不當楚雖強不敢不服豈非齊之尊王名正言順乎九四噬乾胏得金矢利艱貞吉象曰利艱貞吉未光也臣聞凡物乾為陽濡為隂臘胏及肉以乾取義指陽爻言也九四在一卦之中本為間者以爻言之則四之位近君九之材足以堅決而立斷故資之以除間𥘉九不畏不仁不耻不義四與為正應猶聮骨之胏肉既乾而堅至為難噬一旦噬而去之見善明而趍義勇蓋得金矢之象焉有金之剛而無柔懦有矢之直而無回遹義形於色不茹不吐冝難噬者之無不噬也然去間不可有所易以易視之樞機不密未必不反為人所制不可有所撓在我不能貞固其守而猶豫遷就安知無當斷不斷之患此所以利艱貞吉也象言未光蓋始與小人密而終力去之雖得去間之義亦豈所謂表裏純一本末坦明昭昭然揭日月而行者乎平勃勸吕氏王諸吕其後卒誅諸吕在漢為有大功參之王陵以白馬之盟折其萌則二臣為未光矣大臣任去間之責者當觀諸此六五噬乾肉得黃金貞厲無咎象曰貞厲無咎得當也臣聞人主天下之利勢威靈氣𦦨之所暨以去小人之間則小人消以去夷狄之間則夷狄服權有所歸則勢有所易也臘肉全體最難噬乾胏附骨亦難噬乾肉雖難噬而視臘胏為易凡三爻之陽皆足以梗化以六五離明之君制之如噬乾肉然何堅之不斷何間之不除正以其得黃金之象也黃取其中金取其剛人君有剛中之德天下之悍戾邪僻無不退聽尤當正固守此而以兢愓危厲行之則惡無覆出凶無反噬尚何咎之有夫有間則有咎其所以能終免於咎蓋以得剛中之道以治間當其冝也六五本柔中爻乃取剛中為義上卦屬離離一隂居二陽之間中柔而外剛仁者之勇也君德茍仁有餘而剛不足則無以斷天下之疑定天下之業唐之姑息受制於強藩悍鎮漢之優遊養釁於宦官外戚豈不甚可鑒哉上九何校滅耳凶象曰何校滅耳聰不明也臣聞𥘉上兩爻皆受刑之人初九小懲而大誡故受刑輕上九惡積而罪大故受刑重何校械其頸也械深大至於沒耳耳主聰有耳而不能聞過徙義聾瞶其心而浸至此極其所由來者漸矣夫視曰明聽曰聰本二事也而以不明麗之聰明於聽德然後謂之聰也天下之耳相似誰無是聰私心塞之顛倒是非而有誤蠅聲而雞蟻鬪而牛外雖有聞中實蔽惑故聞人之善言而惡其逆已聞人之惡言則恱其順已不明孰大焉使盜跖桀紂能聽人逆已之言而不以順已為恱亦何至天下之惡皆歸萬丗不可湔濯哉此易象示人遷善改過之門最緊切處平齋文集卷第二十八
