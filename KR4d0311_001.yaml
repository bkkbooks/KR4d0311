body:
  text: 古賦大冶賦余宦遊東楚密次冶臺職冷官間有聞見悉纂于䇿垂去乃輯而賦之其詞曰堪輿奠位峙嶽融瀆合地四與天九乾為金而兊屬發泰媪之珍閟轉靈修之妙軸而築冶鳬􅙫假桃攻之有六出智創物重在泉幣燧昊俶興黃虞踵繼姒乙鼓于莊歷濟陽九之厄歲姬姜均于九府定帛刀之殊制侈卯金之七福管鹽鐵於大農榆莢之與赤側獨五銖之適中冝乎䜟白水而謡黃牛兆御天之六龍晉陽崛起齊秦賜爐含三體之邈籀印𥘉生之望舒雖㑹昌因州以辨名不易開元之舊模彼其輕之則為荇葉耒子鵝眼綖環風飄水浮重之則比輪兩柱大布大泉直百當千逞私智以膠擾夫豈足以操大利之權哉皓蒼監德真人起涿聚五星摩兩日噓風雲旋斗極夷崑崙蕩溟渤湖湘收波劒閣失險而王師飛渡於采石攬六朝之王氣混江南之版籍冶有永平仍鎮楚澤列聖重規同文一軌穹符象瑜絫鴹疊媺草人申其厲禁九牧修其貢篚於是監有永豐永通阜財阜民熙寧廣寧神泉寶泉豐國豐逺冨民惠民昈分錯跱不可殫論時則提封之廣東枕蟠木南控丹穴西瞰大蒙北薄祝栗地産物冝旅充庭實而萬寶畢萃莫東南之與匹蓋其鍾溫厚之仁氣應潔齊之分域斗牛𬒳飾以晶光江漢灌輸其靈液淮海荆衡之壤厥貢三品㑹稽具區之畛其利金錫漢鐵官長丞五十有一而專其官以主丹陽之銅唐諸道置爐九十有九而重其使以總江淮之鐵皆所以斡山海天地之藏充少府水衡之積者也矧火德之王離薰協氣之嘉生銅奔牛而流魄銀走鹿而儲精釥鋈鈏錯丹汞之入非一端之可名漕軺兼統肇於興國都提命官昉於咸平合江淮荆浙閩廣而建一臺則景祐之憲度東治於饒西治於䖍則元豐之章程戾淳熙之綜核始復囊括於永平矣黃旗紫蓋天運有屬醴泉器車地靈自鬻冶場之盛名在斡官者紛紛其可覆鉛山𪷟山石堰岑水昭寶冨寶寶成寶瑞雙瑞嘉瑞大挺大濟永興新興興國興利大冨廣冨通利通濟監務坑井殆幾萬計有嗇而豐有興而廢舉斯以旃特其凡例然或鐵山之孕銅或銅坑之懷金或叄銀而偕發或且浸而且淋腸蠡羊僅之言利莫能研幾而極深但見汰金有洲淘金有岡瑞金有監通金有埸曵寶氣而貫虹霓溢乎麟趾􅒁蹄之祥豐城之黃璨焉瑳瑳秋菊染霜寒英欲墮落亭之紫爛焉􅌔􅌔春蒲闖水茸芽尚短樂安精鏐胎瑞坑谷濬崎磧以採托畫墠沙而披漉大如落萁之豆小如脫粃之粟輕如麩之去麧細如塵之生麯澄之汰之倐胂蒲掬渠陽澤銑育竒溪洞尋苗罽汋之邃破的䃪壁之壅焮以火則流脂鐵籠之烈淬以水則舂糜鉛杵之重吉挺旅陳符采飛動鑄神鼎而制嘉量是為萬丗不窮之用以至銀城有埸銀斜有坑銀玉有塢銀嶂有山寶積張萬竇之空洞天壽倚一柱之㠝岏立巖墻而弗顧慨徇利而忘安豅路深入閣道橫躡篝燈避風而上照梁杠插水而下壓戽枵深穽之腹炮泐駢石之脅捷跳蛙其不繫磔蒼髯而可鑷碓山藉礦而殷雷淘池攪粘而飛霎流景倒爐星星曄曄燒窖熟盫爐裂鉛駝沸灰窠發氣𥘉走於煙雲花徐翻於霜雪它山莫優朱提則劣于以供王府匪頒之用于以𥙷冶臺貸本之闕是二品則然矣請復究銅之為說劉濞萃逋逃之藪擅採山之冨而吳之産豐於豫章卓氏爭王者之利錮齊人之業而蜀之産阜於臨卭歐子破赤堇之山涸若耶之溪而越之産不止於鏌鎁干將錢幣或造於楚晉冶鑄多出於齊梁伏羲以來銅山四百六十有七今之大要不過厥色之有三其為黃銅也坑有殊名山多衆朴蜿蟺扶輿鬱積磅礴嶻岑巆崴嵬嶢崅璘彬䦨斑黋漾璀錯脉見函路灼牛飲盤天井落礦紋異采乍純遽駁燻苗殊性欲斷還絡烏膠綴金星爍蔌花淡丹砂渥鼠結聚團雞燋散泊餈餌膏油英潤濯濯宿炎煬而脆解紛剞劂而巧斫批亢轟博浪之椎陷堅洞混沌之鑿巖雲欲起而復墜石火不吹而自躍磅磅馳霆剝剝灑雹丘示掩耳而疾遁木客捧心而竦愕膽寒野伏之夔罔魂禠泥蟠之龍蠖繚乎修隧􅉳乎幽壑潜㕎旁呀隂􅑆斜郤共工觸不周而地維斷神禹闢伊闕而龍門拓驪山百仞之下穿昆明萬夫之偕作曽未嫓其功用之博也逮其籠簣齊畚臿具專諸虎攫孟賁豕負徙堆阜於平陸矗岑樓於爐步熺炭周繞薧薪環附若望而燎若城而炬始束緼於畢方旋鼓鞴於熛怒鞭火牛而突走騎燭龍而騰鶩戰列缺霹靂於焱庉舞屏翳豐隆於煙霧陽烏奪耀熒惑遜度石迸髓汋流乳江鎖融臍膏注銗再錬而粗者消鈲復烹而精者聚排燒而汕溜傾吹拂而翻窠露利固孔殷力亦良苦唯彼泉井淘沙可鑄其浸銅也鉛山興利首鳩僝功推而放諸象皆取蒙辨以易牙之口膽隨味而不同青澀苦以居上黃醓而次中鑒以離婁之目泛浮漚而異容赤間白以為貴紫奪朱而弗庸陂沼既瀦溝遂斯決瀺灂澒溶汨滵潎冽銅雀臺之簷霤萬瓦建瓴而淙淙龍骨渠之水道千澮分畦而潏潏量深淺以施槽隨踈密而制閘陸續吞吐蟬聮貫列乃破不轑之釡乃碎不湘之錡如鱗斯布如翼斯起漱之瓏瓏濺之齒齒沉涵極表裏以俱暢蒸釀窮日夜而不止元冥效其巧譎陽侯獻其怪詭變蝕為沫轉澀為􅔱或浹下簟自凝珠蕊且濯且漸盡化乃已投之爐錘遂成粹美其淋銅也經始岑水以逮永興地氣所育它可類稱土抱膽而潜發屋索綯而亟乘剖曼衍攻崚嶒浮埴去堅壤呈得雞子之胚黃知土銗之所凝輦運塞於介蹊㷈積髙於修楹日愈久而滋力礬既生而細碖是設抄盆筠絡以􅍥是築甓槽竹龍以釃散鈱葉而中鋪沃銗液而下漬勇抱甕以潺湲馴翻瓢而滂濞分釅淡於淄澠别清濁於涇渭其滲㵼之聲則糟丘壓酒於步兵之厨其轉引之勢則渴烏傳漏於挈壷之氏左挹右注循環不竭晝湛夕溉薰染翕欱幻成寒暖燥濕不移之體疑刀圭之點鐵若乃草課登綱程促鐵往銅來錫至鉛續川浮舳艫之銜尾陸走車擔之繦屬出嶺嶠下荆蜀絶彭蠡洞庭而星馳泝重淮大江而電逐四趍圜府如輻有轂殷轔軒礚崱屴復陸頓之連城貯之列屋黑雲隤山而亂委熊豹谽谺而起伏蓋不待銷飛廉鉟瞿曇而鍾官之用足於是鑄錢使考其㑹辨銅令第其品丁夫竭作匠師歡奮煤突整潔炭户充牣鼓兩儀之籥而大播役六丁之工而迭運祝融作女媧進一煽濤生海門之微波再煽日吐扶桑之疊暈三煽烘朝霞而爛照四煽洶屯雷而欲震張格澤之輝𦦨迸攙搶之芒潤夸父即之汗翻漿而暍河伯望之瞳眩花而瞬澄徹不殽通明無燼黑濁之氣竭而黃氣次黃白之氣竭而青氣應液爰㵼於兜杓匣遂明於模印之落落貫之磷磷磋之以風車之輣軋轆之以水輪之砰隱繒網㳙拭蠱核摩揗肉好周郭堅澤精緊文徑銀鈎色瑩玉填既刮垢以磨光始結緍而就凖盡東門之漚麻不足以為其貫引百吏告功三官動色乃督餫艘乃輸王國版曹稽其贏虛之數起部程其精粗之績謹內府之登儲衍外帑之樁積天子守之以恭儉冡宰理之以均節與五銖開元而並行異黃榜紫標之私殖金工鑠之則有禁蠻舶泄之則有辟冝京師貫朽而莫校天下藏鏹而山則也其或用取鹿皮制參飛錢通物之變扶時之偏亦本於輕重之相濟子母之相權至論殖財莫如擇使有管仲則藏冨於國得劉晏則錢流於地言未畢客有在旁啞然而笑曰子來自畨知泉則詳坎蛙難語乎海水醯雞未窺乎天光獨不聞負扆南面運坱北之鈞而鼓四方者乎蕩八卦範九章揚關睢播我將融庶品於道德之槖斂衆寶於俊乂之埸磨而不磷者布在臺省動之斯和者坐諸廟堂旋乾轉坤闔隂闢陽陶唐冶虞規周矩商禮樂凝俗易窳而良仁義鑄人革否而臧泰階以平天步以康前星爛乎重暉旄頭淡其不芒南風薰而民財阜膏雨時而年榖昌于以植帝王太平之業詎止圗霸功之冨強余乃豁然悟蹶然起拜手而系之曰天不愛道聖賢興兮地不愛寶稼穡登兮人不愛情冨壽且安兮化工之巧莫窮其端兮老圃賦嗟余生之刺乖甘偭密而即疏痡虺隤其倦游裸盤薄乎間居老既怯於山橋窮莫備乎澤車坐玩相牛之經間抄種樹之書五十弓兮野園數百武乎破廬一秃翁以自業羣癡兒而共鉏冰解寒祛霏開日舒濯濯我畦瀏瀏我渠稚甲怒長鮮英蔚扶涉熟成趣歡然忘劬翁放鉏顧兒而言曰汝亦知夫丗有遇不遇之𬞞乎鴽釀施蓼蠯醢侑𦵔蔌之冨強余乃豁然悟蹶然起拜手而系之曰天不愛道聖賢興兮地不愛寶稼穡登兮人不愛情冨壽且安兮化工之巧莫窮其端兮老圃賦嗟余生之刺乖甘偭密而即疏痡虺隤其倦游裸盤薄乎間居老既怯於山橋窮莫備乎澤車坐玩相牛之經間抄種樹之書五十弓兮野園數百武乎破廬一秃翁以自業羣癡兒而共鉏冰解寒祛霏開日舒濯濯我畦瀏瀏我渠稚甲怒長鮮英蔚扶涉熟成趣歡然忘劬翁放鉏顧兒而言曰汝亦知夫丗有遇不遇之𬞞乎鴽釀施蓼蠯醢侑𦵔蔌蒲羞鱉食苽薦魚芥醬且胾葱泄且朐烈有桂椒滑有堇榆已多乎燧人庖犧氏之𥘉而况織翠㢝殷紅氍毹沐漓觴斚轟豗鍾竽猩唇豹胎之鼎素黿紫駝之厨始饞涎其趨新中便腹而厭餘於是葷臊望風而引郤芳辛候色而應須擷翠苕於崑丘掇瑶頴乎方壷蔗漿盛夏而凍合萍虀祁寒而暖敷行以白玉奉之緑珠五侯鯖兮遜美天酥陀兮失腴此其遇合不翅𥘉識之機雲晚見之嚴徐也若乃巖壑棲遲竹屋槿籬蓴擅場於秋風空結鱸魚之思韭爭長於春雨未辦黃粱之炊荻生而河魨上橙熟而蟹螯肥指雖動而莫酬腹不負其幾希巳而凌寒采薇迎陽刈葵祮萱堂背䄡芹澗湄鑱黃獨之雪苗筐白薤之露蕤茗蘼蕪以滌煩醪枸𣏌而𥙷羸冷淘煮兮槐茁餫飩斫兮薺滋泫膏鉶兮雹突飫糞火兮蹲鴟酣糟紫薑之掌沐醯青蔯之絲雲蒸罌粟之乳濤洶胡麻之糜輪囷鵝鴨之瓠鬱屈龍蛇之芝婆娑熊蹯之菘䰐鬖虬髯之菭鱭孕子兮棕魚鱉解裙兮樹雞竹競綳兮稚子蕨𥘉拳兮小兒以至太華之藕黃河之菰婆羅之波稜大宛之苜蓿南越之鹿角江東之專蹄與夫蜀之雞蘇龍鶴栮脯加皮名品紛綸色光陸離性異溫凉氣分王衰芼擇加精調胹得冝香聞爽心味適解眉有舉桉之接敬無轑釡之見欺芬芬苾苾雜陳更進可以蘇文園之渴療首陽之飢彼其石芥老而逾徑苦筍少而巳竒蔊有拂士之風菊抱幽人之姿回睨蔓菁隨地而易質薯蕷視人而變形曽不蒲乎一嗤矧肯數乎惡苣邪蒿臭蒜而穢荽然是𬞞也進不榮於珥貂鳴玉之齒退不豪乎灑削胃脯之頥煙雲噴薄乎夜讀之吻風露簸蕩乎朝吟之脾與齊鉢其爭道食方丈乎何期其不遇可知已兒拱而前其然豈然諸葛以姓行元修以字傳玉糝得坡老而重銀茄為涪翁而妍與其見賞於肉食之鄙孰若託名於捽茹之賢蓋窮患姱名之不立而不患併日之食粥逹患宿學之不能行而不患一筯之萬錢茍道義之信飽飯𬞞食而樂焉翁捧腹一笑長歌振林皎白駒兮束芻母金玉兮爾音閔氓賦嗟蚩蚩兮皇之氓惟皇引逸兮氓不自逸厥生考室于山兮山嘯而瀑其降丘宅土兮土又墊而谷中田為廬謂可髙枕無虞兮劃吞齧為川渠倚岸環竹以奠厥居兮岸且善隤不可以久諸死殮無衾兮生煬無竈哭不成聲兮仰天以􅑧天蕩蕩兮何尤陽侯不仁兮挾天虐氓而橫流卑畦席卷兮望已絶瀦澮坼兮髙疇隨裂今夕之憂兮無以為歸明發之憂兮何以禦飢嗚呼蚩蚩之氓兮惟皇之依烘蚤賦麥送爽寒梅迎溽隂羸肌老幹敗絮故衾睡蛇甫蟠跳蟲倐臨無蜂蠆材有豺虎心孕藁之隩宅笫之岑質眇乎粟觜餓也鐔其來施施其進駸駸假託茵慿陵躐祍襟躁躍如舞潜行似瘖左發右應前郤後侵螫其股錐惕其氊針據蒺刺刺負芒森森龜息正清撓不可禁蝶夢方栩攪不可任􅐡搔空疲摸索曷尋撫床以興子規夜吟赤腳張燈蒼頭熾煁絮衾壓篝烈於釡􅑄𥘉而蠕動如商望參少焉紛綸如髮聚簮或壯或稚或纁或黔或尾而丁或腹而壬龍跳虎擲疑聞嗚喑星流電激驚逃沸潯力窮勢屈駢搏旅擒祈父爪牙凱平緑林蠢爾蕞末虱為賞音虱養大體尚知酌斟爾繁有徒喋血􅉃深豫其火攻難腥斧砧老妻在旁一笑振襟謂彼族赤可為丗針逢笋氣張見瓜影沉王極必衰理無古今俗諺謂蚤笋籜來瓜皮去平齊文集卷第一
