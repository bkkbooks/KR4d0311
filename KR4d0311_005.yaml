  text: 平齊文集卷第五
  hash: sha256:74b81294e7307cfac705aead6cd55ed8398a74f375645d587e7e0df2c01985e7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0311_SBCK_005-1a}
body:
  text: 詩四次楊瀘南以前區字韻送行水穩風凉快長年歸帆東指白雲邊落花𣢾假兒能御薦草烏犍手自牽蜀口戍兵誰飽飯淮頭編户幾安眠野人只願羣賢進輻湊良籌到上前萬里來鴻未有書社前歸燕與人俱漲㾗落後杭巫峽風力髙時略太湖深愧平生嗟靖節一厈天下望夷吾延英入定中興業早震天聲到鬼區岑公洞洞從開闢有翁獨擅真清磴古蒼苔澀巖空細溜明誰刋新即事盡剔舊題名太息今猶古江山不丗情開濟堂魚復平沙漲夕隂紅旗影底老蛟吟窮今亘古三分恨托地撑天一寸心過雨斷雲間絶壁凉風歸鳥急平林江山難著醒時眼有酒如澠放手斟東屯犖確嶔岑轉百盤峽天深處得平寬秋風䇿䇿􅐘花老暮雨蕭蕭稻子寒仁者樂山心本靜碩人在澗體俱胖農家不解詩翁趣只道豐年了納官髙齊江滸行厨轉關頭細路過手摩如象石目送臥龍坡骯髒雲端柏鬅鬙雨後莎晚來晴更好舟發亂山阿中秋秭歸岸下出蜀趍吳第一州夕凉隨意繫扁舟十分人鮓甕頭月一片水晶宫裏秋夜氣長存號老鶴天機自動舞潜虬得歸到處皆佳思不問西風解白頭懷程及甫二絶撇濆梢渦穩下舟狼牙鹿角又黃牛兒曹脫險歡呶甚數到家山十二州石馬門前萬里回向人似亦笑顔開獨尋舊日題詩處却恨騷翁不共來獨醒亭今來古往江山老地盡天窮草木愁為問大夫能飲否芙蓉落盡菊花秋溫泉院二絶老火欺人客路長艤舟取次浴溫湯犬鳴三峽夜逾靜月上四更天始凉神虎護泉寒翠壁靈虬吐沫暖冰壷玉環不碎征塵裏更引三郎到古渝劉家江阻風二首動地千牛力行天萬馬聲溟濛迷太極浩蕩送平生夢與屏幃兀心隨簋缶傾黃頭多著纜作止候三更歲月孤槎轉風波斷梗隨謝三元自慣巽二莫相欺沙岸往來拍蘆林開闔吹缺伸呼斗酒一笑酹馮夷千竿夾方雨江流紅未霜蘆花紫寂寂逺帆來拍拍晴鷗起包港風濤二首䉲百丈幾牽掣斷鐵三腳已撼搖浮陽侯戲劇何須爾身丗從來等一漚顛風立海雷轟柁駭浪翻天雪壓篷夜半乖龍酣戰退一奩冰鑑本來空寧宗皇帝挽詩二首虛已堯黃屋清心漢弋綈乾符開太一坤軫拓全齊鎮國天球在賔空寶仗迷歷年施澤久四海哭遺黎德粹三靈接功成萬國雍方培豐水芭忽跨鼎湖龍廟號追文考陵名冠丗宗微臣趍覲晚灑涕續車攻送章君範之湖南幕天闊孔鸞起江晴荃若春親榮知有子主勝信冝賔嶽麓盛古學衡山多秀民平生金玉質更看濯磨新寄題成都張宰壓雲樓二絶清霜戒曉日將出急雨報晴雲乍開庭下簿書渾引郤獨揩雙眼上樓來氣如軻也生於義道似參乎任以仁乾蓋坤輿猶塞破何難壓倒玉嶙峋送杜陽安奉親還蜀二首訪落方勤止而翁苦掉頭立幾遺丗獨行盍為王留日月馳雙轂乾坤寄一舟勿緣歸計得忘却緯邊憂買我歸吳棹揚君泝蜀旃雖為萬里別端有一家緣臘雪添新漲春風减舊綿江山隨處好橫槊小留連和髙續古省中雪升平見一斑未臘得三雪天開銀色界人立水晶闕小團醉後煮清夢梅邊說莫道石渠春不似山隂月省中和何子溫見寄東風婉娩燕來雙禁漏無聲萬緑香寶鴨炷雲朝太紫玉蜍挹露校鉛黃聖賢不斷千年脉宇宙長存一點光老鶴也知虛靜好夜深踏月上修廊和何特夫見寄人從萬里蜀天歸御柳藏鴉絮又飛風細爐熏搖穗直日長漏箭出花稀九重旰食圗無逸四塞宵征賦采薇愛國書生心更苦夜占列象候璿璣送秦祕監還蜀二首岷峨人物古淮海姓名香識面歲華晚論心春晝長有懷胡去國無愧好還鄉呼酒犒三老柁樓天正凉蜀産班行幾分符又去之氣完吞落日心定發凉颸蠅虎攫何壯蝸牛升更癡見幾能許早別思渺江蘺送張行父守贛二首覺是聖賢脉復為天地根典刑諸老盡文獻幾家存露下鶴先警風髙鴻獨騫一時京洛價知有魏公孫南斗一帆外西風千騎頭莫嗟中落落須感上休休賈誼詞林曉陳蕃墓草秋經行拚斗酒為浣古今愁送客一首送真侍郎風雨寂歷蘆荻秋梧桐落盡斜陽收孤鴻影斷蒼莽外愁絶送客濤江頭客心恰似濤江水夾岸擁沙潮不起海門一線拱觚稜無聲夜到龍山尾重雲壓江秋隂隂千古送客非斯今有酒可别不敢斟天乎天乎知客心天乎天乎知客心和續古蜜术參桂齊名骨自香百花釀醑助甘凉含金咀玉風標别消得肩吾為發揚贈小兒醫忍飢覔句孟東野守寂草玄楊子雲囊有遺書無與讀兩家恨不早逢君和續古謝送墨黑月黳雲脫太清海風吹上筆頭輕瑣窗冷透芙蕖碧定有新銘到九成題鍾春伯所示周昉明皇對奕圗寶欄十二午隂移思入雲霄落子遲當局早知提醒著危機應不墮蛾眉乙酉六月十九日應詔言事九月一日去國一首黑風吹雨出長安破帽騷騷怯暮寒不得之乎成一事却因而已失三官人心天理推詳易丗路交情點檢難白髮老人經事慣教兒只作博投看丙戍天基節自至道宫趍寶福院寒甚朝謁千秋節攀援萬歲藤山明松戴雪澗澀石懷冰清壯髯還㦸酸癯面亦稜暖寒能破戒珍重虎溪僧大人用韻再一首靜裏栽梨棗間邊話葛藤緣塵還我雪丗態任渠冰宿卉芽渾脫新禽語摸稜年華催鑷白自笑秃於僧乙酉歲暮有感三絶罷參歸趂日髙眠隨意翻書不計編歲事從教催白髮春風元只在丹田精神收召入腔來水色山光面目開可惜行􅌪新失伴雪晴未忍說尋梅樽酒團欒里社情眼中忽不見公榮祗應天體如雞子地下人間共月明時疇甫𥘉逝敬和大人新年韻井泄得泉終必食睽弧遇雨更奚疑毋庸伊尹要三聘且學顔淵克四非勢去鐵鞋無處覔志亨金印有時纍梅花結子桃花發爛熳春風醉典衣梅寒瓶虛插一枝斜留待春風放霽華巳信不冰方著水可憐欲槁更開花繁芳玉立夾胡床勾引春韶午夢長有眼盡迷空裏色無心方識定中香又竹屋茅簷一樹斜冰霜意氣蓋韶華有餘不盡如知道半巳青青半尚花桃花紅豔照銀床黃入金明柳線長欲與晚梅相輩行同時到砥不同香挽禮上人盤屈虹霓氣空山老白雲酒因陶令買芋為鄴侯分甘露門知味毗耶藏著勳南軒無復見巖卉自清芬和開之社日久要來新燕簷花泫曉霏治聾憨舅醉廢讀惰孫歸鶻突輸􅑿局醒鬆脫著衣一簾春寂寂誰解識吾機春事莫為春愁兩鬢翁管愁元不屬春風深黃楊柳夕陽外淡白杏花明月中大自在身天地並妙光明性聖愚同鳴鳩乳燕相料理融得從前萬慮空寒暄不齊二絶社後歸來燕兩三門前細柳緑摻摻乞將蝴蝶蜻蜓扇與試鵝黃水碧衫次第新烟欲試茶錚錚飛霰響簷牙惜春苦欲春長在且得輕寒約住花敬次老人即事韶華九十恰平分過化中存一點神草脫燒㾗非故色梅收花事又新人正襟危坐三靈㑹擁鼻長謡萬象賔酬答風光惟辦此可能春夢到天津清明二絶梨花匼匝不見葉柳穟玲瓏𥘉欲綿寒食清明等間過日長翻覆壓書眠風將好夢到蘭亭驚覺虛簷九子鈴老眼醒來無著處倚樓檢校樹頭青次韻西塢道庵芳蹊幾曲重行行塢裏曽隂塢外晴秧馬鬅鬙和雨種蘀龍菌蠢帶煙烹黑風動地前程暗白日行天內景明却愛道民無別解一杯春茗雪花輕雪歎二絶唐時三月十八雪况復今年多一旬萬紫千紅渾過盡荼䕷滿架與爭春桑頴騷騷麥又萎雪花如碗雨如絲老天只解苦黔首快活貴人那得知桂子次韻贈阮甥一樹青青桂子榮廣寒宫殿玉為楹不知天上何年墮故使人間有種生風影碎搖籖帙爽露華倒洗筆頭清寸田更與加培埴收取天香染姓名次韻雙桂物理無枯砥有榮一雙玉樹倚修楹長如拱璧天球在元共交梨火棗生卜築地連盤谷勝賦歸人占小山清晝隂最喜添新緑時有佳禽自薦名間居暑設青綀幕晴更皂葛巾家貧猶氣象人老亦精神蜂閙花生計蛾翾繭化身靜中觀物變同是一天真鍾惠叔轉示趙臨安兩山堂諸公詩刻隨喜二首兩峯髙峙玉五畒秀含滋細柳未眠種修篁方醉移雨將雲出谷水引月歸池動靜天機密何人共一巵朵頥常逐逐觀復自休休靜晝青竹笋深春黃栗留覺圎熏穟直夢破茗華浮為問連山易床頭好在不燕巢華堂橫架晴虹壯來鳯結巢長一丈中間贔屭譙樓勢兩旁坡陀翼城樣相攸爾居莫此樂得意鳴聲相下上同時啐啄三四雛盡日往來千百餉欲飛未飛翅羞澀似定不定跋搖漾施施引趂女墻行戢戢教升危堞望黃金鑄印分裏有何用芹泥呈瑞象事見類說主人長健燕長歸但願春風不相放浮溪周居士挽詩野水岡頭屋春風竹裏厨所安仁者靜其樂道之腴遺逸盍徴詔耆英空畫圗詩書根氣逺叢桂蔚相扶次韻子有賦著圗書所冨兒種巵敵封君貧翁結柳呼奴星物理虧盈蛇䕫蚿惟有讀書可以逃天刑守玄老死天祿閣巧宦三入承明庭人生得失雉梟盧惟有知道可以垂芳馨嗟豫鈍甚爐砥礦陶寫淬濯誰為硎買書充屋手點勘𣏌菊門巷槐花零九流七略宗六經大川小澮趍東溟騷人墨客幾汗青秦姬趙女爭娉婷聖賢氣脉眇如線義理門户元無扄圎冠方屨弗見道金貂玉櫑空圗形君年正壯眼如􅃮一過萬字披不停借書一瓻走赤腳燈前急雨鳴髙瓴扶輿磅礴天兩目渟蓄雲氣藏風霆鈎深造極猛著力㑹插八翼摶青冥九日老無擘畫笑柴桑兩眼惺惺菊自黃渠更笑人無菊把拒霜相對過重陽答子有褁飯無人過子桑拒霜一徑雨昏黃花根記縳西湖纜紅淺紅深醉夕陽夫容向背有深態纎穠無定姿最憐花脫後全似蕊包時荆公君臣一德盛熙寧厭故趍新用六經但怪畫圗來鄭俠何期奏議出唐埛掌中大地山河舞舌砥中原草木腥養就禍胎身始去依然鍾阜向人青冬雷行三月草八雪十月十九雷日官起歷失氣朔深春為臘冬為梅衣巾暄淑糝白醭研席昏濕凝青埃階頭蠢䏰上未已陳陳送雨千峯來水鄉種早埸巳築山鄉種晚鎌方催漏天未信解晴否低田芽茁髙田摧老農一飽不自保愁面百摺何當開君不見太史局申十月雷麥成堆送郎丞文炳之桐城江北江南雪意催半酣椎鼓起征桅鋭從猿鶴歸休去剛𬒳功名引調來破虜檄傳淝水定屯田疏上皖陂開筆端矍鑠精神在莫只清吟伴老槐奚左藏士逹挽詩二首理學不逺復躬行毋自欺志雖千萬往材僅二三施花竹觥籌密雲山步屐遲眇然人物裏公竟止於斯諸老定交早羣兒驚見稀功名身韞櫝翰墨丗傳衣龜壽前占夢鷗盟晚息機吳頭耆舊盡搔首送斜暉次韻可庵梅點雪非耶果是耶紫千紅萬未曽芽蒼苔有暈龍鍾樹幽谷無人自在花地暖孤鴻來索伴天空雙鷺下通家詩翁快整春風腳山路霜泥踏馬牙卭杖次韻槎使携歸餉老人髙稜踈節屈中伸撥開豺虎慿陵氣攝取蛟龍變化身訪洗頭盆還喜健伴行腳笠未嫌貧一般仙骨清如鶴倚看滄溟解起塵疇甫叔挽詩二首南渡幾年裏深山誰力書獨君酣百戰許我丐三餘參斗明燈燼湖江渴硯蜍斯人猶不第天理竟何如撰屨西山路尋春得重陪那知分手去不作轉頭來寂寂雙溪雪依依半樹梅經行陳迹在橫涕濕蒼苔夢中和人梅詩山礬韻溪路槎牙木葉乾角聲吹動五更寒踈踈梅蘂踈踈雪一假生綃不用礬又用韻竹外橫梢半欲乾透香肌骨不勝寒定知天上梅花腦不比人間柳絮礬聞山陽夏全之變洮湟私牘舊開邊淮楚依然樣子傳抱虎寢蛟心不保護疽諱蠱禍相挻河流三舍盡人血城闔四門無竈烟昨夜洗兵盈尺雪華夷齊賀太平年丁亥歲朝把筆雞喚璇杓一夜東長天紺碧靜無風年華老子歡娛裏春事兒曹翰墨中脫雪薺芽盤飣緑晞陽椒蕾酒行紅赭𫀆親上慈明冊正想千官㑹漢宫三日兄弟侍老人展墓歸和尊韻雲淡風柔霽色輕瀧岡阡上氣和明莫思舊日遨頭出且試新年便面行飽飯即為君子泰濁醪不失聖人清一翁二季春無盡更願諸孫向老成次韻梅影白玉堂前絶丗容水晶簾薄透重重非仙非鬼樹明滅似夢似真花淡濃襪照晴波添縹眇佩搖寒月缺𤤮瓏一畨青子成隂後却笑癡兒認舊蹤春雪甲子乾飛雨元宵濕隕星風柔行陳陳月淡下亭亭木筆侵凌碧來牟掩映青東皇收拾急暖漲赴滄溟招隱三章贈李洋自號同𥘉子雲氣斂兮天目之顛濤江線橫兮海門濺濺扶桑子半兮陽烏翩可俯而掬兮咽以天井無聲之泉子其隱乎吾與子兮拾荃雲氣冒兮天目之趾疊湫噴薄兮洞石齒齒列缺正晝兮睡蛟起可仰而擾兮浴以天河倒流之水子其隱乎吾與子兮采芷雲氣吐吞兮天目之腹乳潭沉沉兮鴨潭煜煜徐伍朝往而暮來兮雙碧鹿可挽而舞兮侑以天風步虛之曲子其隱乎吾與子兮蒔菊次韻遊龍門十絶若木扶桑莫苦攀芙蓉薜荔不妨間封三萬户煙雲裏化百千身水石間欲訪天池水發源倒騎北斗挾飛仙髙低八節灘頭路俯仰三生石上緣拍手東風喚白猿劃開元蓋洞天門可能路指虛無去兩腳須留點地跟蒼崖斗立兩扉開行雨龍歸尚殷雷嫋嫋天風瑶草碧神清依舊鎖樓臺武陵溪上迷津處衡嶽峯頭失道時珍重牧兒相指似隔林招手不吾欺飛泉濺雪林華濕盤石生雲古蘚乾早著些詞招隱去泰山有賊膾人肝稻花秋晚蟹洗手薺菜春𥘉餳膠牙築砥空山誰辦此留君只有石邊茶不提長劒斬江蛟便揭修竿釣海鰲縱老無成猶自許一溪流水兩山桃不知我者謂何哉布襪青鞋日日催長嘯一聲啼鳥外朵頥有象著山雷平明出去日斜回小立巖花澗草隈光景留連非我事此心曽點􅃮雕開挽阮開之窮逹皆歸命虧成不掛心醉餘便腹睡棋罷掉頭吟孔雀門䦨舊驪駒院落深可堪重剝啄寂寂杏花隂柳天機日與物華新嫵緑柔黃觸撥人精采只消些子雨腰肢無著許多春興亡螢苑迷樓夢榮辱孤山麯院塵醒眼年來渾看破萬緣分定不須顰杏萬山築砥作春妍一樹繁紅直幾錢深院日長來燕後平池水暖浴鵝天弦歌禮樂詩書地榜帖功名冨貴天兒輩對花須自勉莫教空惱少陵顛柳用前韻菀彼烟絲一樣新依然面目我陳人只疑大造元無物豈料深山亦有春盡日三眠渾得意隨風萬舞不驚塵長長短短亭前路肯與渠儂管笑顰上巳呈子有隔水梨花豪放盡安排鼠耳到庭槐十分春事杜門過百色老懷中酒來聞麗人行頭輒掉見蘭亭帖眼還開碧衫玉唾酴醿晚更倩詩翁著句催顔延年三月三日率爾成詩前詩重韻太率可笑過盡風波灔澦堆一間無夢到宫槐迎頭寒食清明近入手櫻桃芍藥來率爾成詩聊意逹快然自足亦顔開期君曲水芳林序花裏傳宣火急催百舌飛上三足烏喚起百舌鳥鼓弄林杪春瀾翻屋頭曉氣吞黃栗留勢挾秦吉了向人售嘈雜司物窘煎炒轉頭芳意歇噤喙青隂悄晚食從來此腹負將軍淡飯投韲現報身三月不曽知笋蕨夢魂敢到水晶鱗次韻荼䕷二絶瓔珞垂垂蕚緑華光明淡竚自成家枕幃醖藉風流足甘放朝來𬒳砥衙愛春留得瓊英在添竹扶將翠蔓髙更著金沙相間種主人四壁錦周遭官採木深山風雨幾百秋直干雲漢大蔽牛輪囷離竒中尺度一旦出應天家搜山摧浪壓斧斤下橫亘十畒眠蒼虬白頭地主坐歎息物囿於數吾何尤為言此殆有天幸如拔莘渭歸商周棟梁未央坐萬乘柱石明堂朝諸侯老翁聞語囅然起致祝切莫去作昭陽梳洗樓楊花舊雨人無半迹來惺惺獨坐眼慵開却嫌飛絮猶多事點破門前一徑苔春禽雜言倉庚倉庚集谷之苕謂汝也幽而豈其喬勃鳩勃鳩有安斯巢矜婦之功不念鵲勞决决杜䳌念歸何悲豈知汝歸不如未歸翩翩元鳥羣雛相依羽毛浹矣同乳異飛負隂抱陽均此一氣孰使然哉凄其永愾次徐雲叟賦桃源無腳橋經始西風八月秋桃花春漲巳無憂橫飛閣道虛空度直放銀河自在流倚岸斜看疑是洞循坡穩上認為樓遍行吳蜀今才識却笑浮橋謾造舟次韻映山紅燧人鑽榆出新烟烟光濕雨山蒼然黃鸝怯寒噤未語有喙三尺惟啼䳌血流染花不知數赤霞爛熳橫丹天前山後山列錦障上澗下澗敷金蓮海棠無香許流亞石榴有豔疑姻連目光逺送空翠表勝處正在繁芳邊七香寶車果安在東風老去空華顛送監丞家同年守簡池三十韻去年為君來明廷峙鸞鵠今年為親歸蠶市苦思蜀扶輿出修門萬里宛在目大江六月寒風飽帆數幅金山如幽人杜蘅繚荷屋采石如壯士鐵騎明鋈續五老烟光開九華雲氣矗如王公大人冠冕而佩玉大孤狷介甚赤壁清曠足黃鶴俠者流雋放不容束英雄古荆州霜月耿喬木寂寞三閭亭風露落秋菊陽臺峰十二森拱峽江曲髙標聳赤松絶槩凛孤竹或如漢汲黯抗直敢掁觸又如唐真卿峻潔不受辱瞿唐灔澦堆一柱軋坤軸潰城雎陽孤鉤黨林宗獨水石明邊酌蘋蓼佳處宿寬作幾月程迎面峨眉緑丗道淡有味人生平為福江山無愧容草木有餘馥試劒信雄拔易簡更清沃虎蛇方橫道有此廉平牧相如駟馬貴長孺一翁秃明河隔黃姑碧落杳飛鶩獨復即無妄多識乃大畜歲晏以為期仁亦在乎熟木末老芙蓉䦨干深首蓿郵籖莫厭婁瑟僴尉淇奧浮玉道士琴老蟾亭午潭澄隂雄虬怒吼雌虬吟空巖納息耳應心寫之以神寓之音大音激越風振林細音窈眇雲起岑天機不動天和深非虧非成非古今博山一點蓬萊沉山中吟幽居多暇櫽括黃庭內篇賦山中吟俾善琴者倚操而歌之蘂珠間居兮作七言琴心三疊兮舞胎仙呼吸日月下上雲烟兮回紫抱黃入丹田一面宗泥丸六府主丹元七蕤應兩扉九微徹三關明堂閟虎章玄闕森龍幡素衣翠重裏朱帶緑華裙上有黃裳子丹兮常在兩眉端欲求泥丸滿直須丹元存靈臺貯清明太極涵胚腪升坎降離凝正一而融三五兮付之靈堅童子玉池太和官重樓十二環兮蘭玕朱鳥白石源兮潺湲專閉御景而握固兮嗽咽金液溉靈根胎津溢而琅英飽兮積精纍氣而成真髙研恬淡兮道之園物物不干兮泰而平身披鳯衣銜虎符兮控駕三素躡飛霞而升廣寒東西兩目兮倚天木隂隂兮泉㳙㳙一唱三歎兮玄鶴下其蹁躚八景二十四真兮吾亦不知其然而然損戒二首河魨行水砥志在全其生縋綆激使怒拍浮拾彭亨觸來不自制天君失和平懲忿當如山一靜弭百爭野虞雉為媒榖榖雌召雄隂機發翳緑碎迸錦纈紅耳目誘於物顛倒不有躬窒欲當如澤涵渟清鏡空引鏡水白深還黑山黃逺自青紛然無定色何者是真形不壞只太極長存惟六經莫疑晨鏡裏黳􅃮換星星苦笋臨軒解褐賜湯沐一節兩節水蒼玉氣嚴慣嘗志士膽格髙厭食太官肉此君可人如西湖荷邊冰簟三更鋪心知爽快不冝過奈此風月人間無丁謂鶴相專朝巧萬般中書位子太山安沂公冷眼旁邊看機㑹來時隻腳翻欽若獎丁丁陷若謂之厚演演擠丁勢交利合皆如此說與金陵老子聽食糟行龍州石秫七斗醪百錢半升官價髙村民無分酒到吻清晨荷薪爭博糟得糟還家喜欲舞逺汲淡煮燃松毛餈麥餅澀難下藉此咽送如葷臊我時作守輒自愧每飯釡有羮堪轑罷官兩夏肉入務食糟却如住百牢紛綸玉縷芼葱㳿晃漾珠滴霑麻膏多從未破甑頭餾間入半折鐺中爊王瓜未甲蒿苣老芬美獨擅盤飱豪饞奴停匕朵豫餕一餔七八譏何叨太平無事稱意飽竹床大鼾枕離騷客來闖户口尚臭錯疑𬒳酒醺陶陶我亦為言恰夢金絲帳砥斟羊羔五月庚申夢人相指為馬周且誦詩兩句覺而足之伸縮一雙手去來三丗身新豐驚昨夢斗酒滿懷春苦笋用前韻林谷迎梅新雨沐和綳熟煮琅玕玉籜龍别種冨風味棕魚同科少肌肉吾廬兩山介宣湖緑隂門徑楊花鋪攻苦食淡父子俱笑看兩孫指之無老人曽和天象白氣一抹蚩尤旗南斗北斗天兩垂西方熒惑耀芒角𥘉月吐魄來食之去年天象巳可駭今年天象更可疑春王正月暨三月黑氣幾度摩晨曦銅盤亭亭慘且淡鐵鈸拍拍合復離沙盆貯水靜照影眼亂兩日歡童兒移時妖氛漸引郤赤光如血鋪庭墀家無占書矒休咎但效婺矛牙婦顰雙眉昨朝忽見邸狀報詔答丞相辭公師首言金烏效祥瑞變我愁蹙成愈怡玉堂學士天下選王治有象非吾欺東淮西蜀狗鼠賊看折尺箠從頭笞用虞提刑剛簡見寄詩韻答之有美人兮古錦官落花芳草幾慿欄紛紛丗故肱三折忽忽年華指一彈詩到考槃須熟講易於未濟莫輕看門前尺雪清燈夜尚欲從公扣兩端雞鳴而起一般時舜跖殊途覺與迷此理天無分厚薄乃心人自眩東西柴門風雨榴花老草巷烟霏燕子低玉汝有書來萬里聖賢不泰不栖栖次韻夏日乍晴雲更黑頓冷日如青飽飯真成蠧幽居又見螢燈光翻露柱琴疊舞黃庭猛作逃儒去沉酣幾箇醒瀑布白龍飛出翠雲堆不見源頭只見來勢有盛衰惟視雨聲無髙下盡成雷誰教河鼓翻將落我欲陽侯挽取回東陌西阡分港去豐年入眼稻花開狐鼠狐鼠擅一窟虎蛇行九逵不論天有眼但管地無皮吏鶩肥如瓠民魚爛欲糜交征誰敢問空想素絲詩次韻髙蓼隰葒照眼似船窗只缺沙頭野鴨雙花引穟垂丹作佩葉扶節起翠為幢婦收滋味歸羮鼎兒挹馨香赴酒缸老我為渠牽午夢白蘋風冷釣煙江示諸兒徂徠古君子涇渭何太明一姦衆稷契詩作竒禍萌姦人擠之死既死氣未平鋭欲剖其棺謂北走猶生妻子坐凍餒不斷啼號聲冨韓各分俸買田活其嬰吾疏視彼詩歷數羣公卿觸怒非一竦舉朝眼瞪瞪所賴天子聖不死五鼎烹斥歸天目下石田力躬耕田少食指多讀書飢鳶鳴此身不足憂憂我身後惸冨韓不常有勉哉自玉成忍貧知好修道在困亦亨續夢造化有真機寒暑不停軸秋風促絡緯春雨鳴播榖一氣臂屈伸萬事手翻覆得牛或貽災失馬詎非福七侯梁冀誅三妹國忠族鼎貴正酣豢旁窺巳魚肉自古聖賢徒不耻貧賤辱忠信以為寶豈弟而干祿但信命行藏不計得遲速泰極必有否剝爛乃為復一理無間斷九卦要精熟夢起獨忘言窗前數叢菊淨𣑽僧頥蒙堂山下有雷頥山下出泉蒙主靜山之體養正靜之功間間六窗明寂寂萬籟空坐觀鼻端白巖花自春風讀漢書漢衰元帝為優游成帝荒淫更可憂論說金華風過耳山河大柄醉中休六月二十八日入朱陀山寺决决巖下泉翛翛竹間路破寂孤蜩吟送瞑踈鍾度箇裏欲求心應生無所住促織一點光分草際螢繅車未了緯車鳴催科知要先期辦風露飢腸織到明水碧衫裙透骨鮮飄搖機杼夜凉邊隔林恐有人聞得報縣來拘土産錢答子有髙吟梁甫卧隆中眼砥駑駘不足空清白自將千古月溫凉不定六時風交梨火棗根苗長翠竹黃花信息通樓外秋鶯強饒舌笑人遲却黑頭公用韻答游司直似見寄道在皇王帝霸間古今同是一人寰不愁垂白三千丈獨喜飛黃十二間晚桂薦花熏鼎古寒松墮子茗甌斑山中風味無人㑹賴得新詩起老頑龍池沙漲龍徙三湫宅山飛百道洪雲車風馬去福地洞天空蒼莽渾沙積﨑嶇沒徑通等間陵谷變驚倒白頭翁平齊文集卷第五
