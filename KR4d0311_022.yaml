body:
  text: 外制六忠州團練使淮東路鈐國用安除順昌軍承宣使右武衛將軍制勑李祐自蔡而至效力擒吳韓信由楚而來抗謀滅項惟知擇主之義斯著際時之勳具官某山西梟雄冀北翹駿屹虎頭之風槩勇蓋三軍聳龍額之威名氣酣百戰耻委身於戎索願歸命於王朝抱志竟酬乘機斯奮杖劒而渡漣水適會風雲搴旗而入汴都不淹日月朕肆嘉壯志首録前勞升班留務之崇領衛周廬之重仍提軍律坐振邊豈小丈夫哉徒較一勝一負之勢此真將軍矣尚圖萬舉萬全之功厲爾精忠對豫顯渥可李琦武義大夫吉州刺史制勑某人制域有華夷之辨勸功無內外之殊爾倡義來歸杖忠自奮勵貔虎以賈勇屠鯨鯢而效功峻陟武階仍躋遙刺祗承異渥勉究殊庸可李琦除福州觀察使蕭均除和州防禦使黃國弼轉武功大夫除蘄州防禦使李璨轉武經大夫除和州防禦使制勑具官某唐收契苾阿史之用漢有弓髙襄城之封能效殊勞可稽醲賞爾拔身區脫庀役蝥弧王旅嘽嘽氣獨髙於後徑戎容暨暨志尤鋭於先登進乘汴洛之機圗合關河之勢趣升武級仍卑廉車兵防益殫奮衛之忠用對勸功之典可歸順人李伯淵武翼大夫和州防禦使制勑某人制域有華夷之辨勸功無內外之殊爾倡義來歸杖忠自奮勵貔虎以賈勇屠鯨鯢而效功趣升武級之穹仍揔軍防之重祗承異渥勉究殊庸可歸順人李璨輔武功郎制勑某人制域有華夷之辨勸功無內外之殊爾倡義來歸杖忠自奮振貔虎以賈勇屠鯨鯢而效功峻卑武階用厲壯志可陳一薦除軍器監簿兼淮西制置司參議官制勑具官某幕掾以王官兼之朕親政逾年未嘗輕假人也爾抱駿拔之材贊襄峴之畫積勞著矣今嚴內柔外淮右為要思得識機逹體者參外閫之謀冝莫如汝武監有簿以榮其行朕不得而吝也繁弱之弓闕鞏之甲尚精思古制以告可劉用行知安慶府制勑具官某群舒灊為大兵調旁午之餘民亦勞止疇為我分承流之寄以爾儒猷茂明吏事宏逹可使足民而治賦也輟之奉常為我屏翰推禮樂之澤以浸其民庶有望矣漢丗循吏蜀郡之文翁東海之朱邑皆生長於是邦尚論千古而師友之何民瘼之不瘳乎可大理少卿趙彥悈除太府卿制勑具官某鄭武公以同姓為王卿士緇衣一詩適館而授粲親親賢賢也爾公族老成之典刑而邃於學力於行入二廷尉平心以閲四方之讞咸庶正兹庸進之卿于受頒貨賄之府易之理財有義大學之生財有道非言利析秋毫以為冨也推明經意發舒儒術𥙿民足國於道義之中蓋爾素學朕抑將引之自近以究講貫之益可崔福轉四官授武功大夫制勑具官某于台之役大小三十七戰而城降將士用命也莫府上功謂爾勇􅋧敢戰冝受醲賞峻躋武級鈐護南昌公侯干城毋忘努力可楊孝錫贈通直郎豫一子恩澤制勑具官某爾積學入官奉檄督餫見危授命罵賊不降父子併命於白刃而女光訟其節可哀也巳禭以升朝之階且録遺孤用尉忠魄可龐謙轉武翼郎制勑具官某滁陽介于兩淮恃城以為固修壞植圯爾與有程督之勞進官二列用示激厲庀職轅門勿憚鞅掌可陳畏除大理少卿制勑具官某朕嘗詔有司母輕用徒刑頃又詔諸將母專殺重人命也而哲人惟刑必自士師始爾見善之明迪德之茂山立時行不與物靡推以折獄冝片言而人信之甫憲節之起家趣棘廷之參聽豈徒以登仙之行為爾榮唐虞畫象而民不犯朕甚慕之得淑問如臯陶者弼五教則欽恤之仁逹于四海矣懋哉可白身人任震亨襲父官輔修武郎充珍州綏陽縣沿邊都同巡檢制勑某人士無丗官惟控扼西南夷則襲之爾恪遵父訓洞曉邊情冝傳勇爵之榮仍踐徼巡之職撫寧遐俗惟信惟廉可崔端純除倉部郎官制勑具官某周設廩人之職漢置倉氏之官求會計當也而重本之意存爾靜而不苛平而不陂修潔而不矯田里相安之政番之士民歡稱之襆𬒳粉闈司我庾事蓋以旌治行也維時八蠟雖通國與民猶未砥俱𥙿髙廩萬億及秭太倉紅腐相因果何道可以臻此亟其來思具以告朕可朱實之差知肇慶府制勑具官某朕廣求民瘼每患郡縣吏不能體篤近舉逺之意故嶺嶠擇守尤謹爾踐歷之久通練而詳明佐理畨禺蔚有善譽就卑符組假守髙要炎荒凋羸特甚鎮物以靜字民以寬吾澤東漸于海矣往既乃心罔俾包拯之專美可權刑部侍郎周端朝特轉通議大夫守刑部侍郎致仕制勑孟氏修身立命不以夭壽易其心曽子正色出辭不以寢疾忘其道生惟無愧殁亦有榮具官某蚤負直聲晚充素學廣厦細氊之上考古以訂今法從屬車之間獻可而替否久朕心之簡在斯吾道之將行胡不歲寒乃先朝露渺流光之莫返湛正性之長存跋豫望之尚想嘉猷之告慨其歎矣徒勤遺藁之求往升二級之華用作九原之氣可李伯度除直祕閣京西轉運判官兼提舉提刑制勑具官某京右比歲科調轉輸之繁民不堪命朕屢詔寬恤必賢刺史奉行之爾材周於用政得其平上流並邊之郡治理茂著擢卑庾節民情具冝進丞戎監就領漕挽又華之中祕之直憲庾併以屬爾身兼數器矣孟子謂省刑薄斂深耕易耨而修孝弟忠信可以撻堅甲利兵人心國勢蓋相為表裏也往圗稱朕指可顔耆仲直祕閣淮東路提舉常平茶鹽兼提點刑獄公事制勑具官某江淮財賦之淵唐所恃以用其國也朕自親萬務日討御外理內之術顧詹在廷求善治賦者使于淮乃今得之爾開亮而敏精練而實越在省闥事有可否不為詭隨朕嘉其公爾忘私也輟泉南之行授節東出庾政臬事併咨之而牢盆之課為尤重本錢給則亭户樂其廉鈔法定則商賈趨其信浮鹽窒則官府安其義從容笏畫斡東南山海之藏以濟經費可不勉歟可楊椿贈武經郎制勑具官某爾結髮從戎熟知虜勢赤心報國竟死邊鋒升再級以示褒俾列屯之知勸可李安國轉武功郎依舊知金州兼管內安撫制勑具官某爾忠烈有傳材勇自奮入庀八屯之列備宣十稔之勞既應賞科冝升華級往任蕃宣之寄力圖控禦之勳可周宗傑轉四官授武功郎制勑具官某于台之役大小三十七戰而城降士用命也莫府上功謂爾勇􅋧而敢戰冝受醲賞峻躋武級統戍惟揚報國赤心更觀來效可宫人丘氏封信安郡夫人制勑曹大家之芳規具存女訓藺夫人之淑行實重母儀冝疏翟茀之榮用侈葛覃之慶宫人某氏性姿柔惠德履懿和祗事名臣壯聲猷於虓虎篤生良媛承輝采於軒龍屬通禁籍之華盍渙郡封之寵仍稽祿式並著恩徽尚謙毖之有加對熾昌之未艾可陳隆之除屯田郎官兼知興元府兼利州路安撫制勑具官某諸葛亮北駐漢中以圗中原以木牛流馬為未足又雜耕于渭上食足兵強而後國勢振遺迹可尋也爾材猷卓踔志氣軒岸健帆蒸楫駕順風於長川誰能禦之褒斜建藩瞰雍蔽益威名一震膚公亟奏朕知其當一面有餘也惟邊關雖靖田菜尚荒繕原堡濬溝洫貸牛種以耕最今急務咨爾良牧郎于司田以蒞之墾屯積榖貔貅宿飽秦隴在吾目中矣往哉圗稱柬拔可盧進李聚朱廣等一十六人歸順輔承節郎制勑具官某等王道以舍逆取順為貴人情以用夏變夷為難唐鄧歸疆爾能自拔爵之鶡辨為我王官其祗服恩榮毋怠可李虎趙邦永轉右武大夫王政轉左武大夫制勑具官某等隆興詔旨橫階非戰功不授勸忠勇也山陽之役爾等忠於衛國勇於敵愾功最來上應我賞典進升五列特免貤恩尚思在師中吉以承天寵可周衧轉從事郎制勑具官某荒政莫先於勸分建安飢爾不俟勸捐私廪與邦人共之非輕財急義能爾耶循升二列用旌好善抑厲異時居官及民之益可王瓉轉朝奉郎制勑具官某浮光子威巴灣之捷論者疑之然功疑惟重爾禔身肅括蒞事正固非徼功為利者關決于光嘗同調遣書生而知戎情何愛一官不以為賢勞勸往分乘障之符亟上安邊之最可林瓌除直祕閣與宫觀制勑具官某朕惟華髮國之元龜年耆德明靡不招選而逸老養髙亦必有以厲其節爾素履昭融泰宇澄徹逾八望九脫屣丗故之心與冥鴻俱逺朕欲起之名藩不能奪也木天寓直仍賦真祠閲理多而更事深尚乞言之有待可殿前司統領劉喜轉武顯大夫制勑具官某詩嚴備器易重除戎爾董工程悉皆犀利進升穹列用獎精能庀役羽林益勤國事可董升葛仙白身輔忠翊郎制勑具官某等拔自材官戍吾邊壘勇而知義不墮賊謀登名勇爵之榮勵志事功之會可遊似除軍器監制勑具官某紹熙末國有大議蜀士主軍器監簿者實發之冝其有子哉爾雅粹而明靜莊而舒曩列干朝慷慨論事有風槩意所不合攬轡徑去朕未嘗不思見賈生也化弦更張召自萬里便朝趣對氣不少衰武監務簡姑為朕長之以需柬拔夫難得者可為之時易奪者有為之志立朝大節能若犀渠鶴膝淬勵而常新爾父履綦猶在與有榮矣可知嘉興府趙與􅊸政績轉朝議大夫制勑具官某檇李吾股肱郡民衆物繁號難治共理得人朕不輕易也爾明而整寬靜而有立所至冝其材典我輔藩視田里疾痛抑搔之亦既用乂而賦入不愆于期知體國矣孝宣親政以良二千石為重有治狀則增秩使留朕於爾用之度越品級不計也然自昔政令以久而孚亦以久而玩力鞭其後益茂厥成則惟汝能可李昴英除大理寺司直兼廣東經略司機冝文字制勑具官某東廣弗靖朕起壯猶之老於其鄉以鎮綏之簡僚必謹爾抱邁往之氣而有賢聲月評所重進列棘廷就參幕畫雲川飛泳熟講長算恩威得兼濟之方海嶠息桴鼓之警謂爾來矣可李華依舊直華文閣廣東路轉運判官制勑具官某朕親政逾年深惟民貧而不加恤軍勞而不加閔戒飭攸司屢矣嶺左吏奉吾詔不勤釀成蒲澤之警部刺史可不擇乎爾踐履平實施置精敏臨汀政美盜不敢近嘗進之奎直以風厲四方南顧未寬用輟以往星言夙駕謹勿歎賢勞之獨也轉輸方亟綏靜為期臺閫相望叶謀共濟斯稱豫重逺之意可趙汝憚轉中奉大夫致仕制勑具官某生而在選拔之科死則有贈禭之典國家之待搢紳厚於恩篤於禮矣爾以公族之雋蚤即鴻騫中嘗鷁退老其材而用之意蓋有待何崦嵫迅景之迫耶進官一等往書爾柩榮光下燭尚克祗歆可趙希逾轉兩官授朝奉郎制勑具官某維昔洞徭負固湖湘繹騷爾切於衛民勇於徇國深入窮討一方以寧帥垣上功疊進華秩公議信其不忝也益殫撫字之勤茂對褒遷之渥可軍器少監直舍人院吳泳除祕書少監兼權中書舍人制勑具官某東璧圗書之府西垣誥令之司皆儒者至榮也然成周盛時內史掌䇿命御史掌贊書外史參其間掌四方之志掌三皇五帝之書豈書志之藏與䇿贊之出相為源委歟爾學明河洛之正文擅江漢之竒試代豫言韶雅而不華翹明而有體斧藻百度律吕萬化具孚于觀聽而還詔惟允朕甚器之用進二于蓬山以重四禁汗牛之書飫於中而倚馬之藻掞於外源而委也唐武德正觀間是兼命師古號為稱職爾尚懋乃訓以亢斯文可安癸仲除太府少卿依舊總領四川軍馬錢糧制勑具官某西南民力竭矣稽九賦之登耗權萬貨之盈虛以贍列營惟王人是屬苟稱厥職九卿不吝也爾蚤嘗與聞定蜀之謀天險地産歷歷在目以燭照數計之智濟笏畫鞭算之長挈畚用𥙿外府繇二而長豈特序遷以獎爾勞推周官九府之法均通乎上下兵食足而民不病朕有望焉可陳康􅳹除司農寺主簿兼知泰州制勑具官某蜀有三陳閩之三陳實似之爾抱淹洽之學雖退然不以殊科見而素履行願含章時發鴻鴈行之良也簿正農扈出守海邦蓋以起爾詎謂是足以處爾哉可歸順人王丗昌輔武翼大夫差知宿州制勑具官某老上之庭既焚月氏之頭且􅃮爾見幾興起慕義來歸挈符離於版圗削左祍而冠帶朕甚嘉之峻升武列仍領軍防往分銅竹之符用聳鄉枌之望其竭忠以稱殊渥可歸順人張子良輔武翼郎京東路兵馬鈐轄制勑具官某爾久厭旃裘樂慕冠帶鏠旗所指相與挈符離而歸職方可謂知義矣峻躋武級往蒞戎鈐茂對寵光勉圖忠效可歸順偽進士出身齊希古輔承直郎制勑具官某爾久厭旃裘樂慕冠帶鏠旗所指相與挈符離而歸職方可謂知義矣特卑文階毋忘忠藎可歸順人西圭輔承信郎制勑具官某爾久厭旃裘樂慕冠帶鏠旗所指相與挈符離而歸職方可謂知義矣易授勇爵尚知激厲可歸順人于仙郭珍劉用遊淑並輔承信郎制勑具官某等爾等久厭旃裘樂慕冠帶首挈唐鄧歸吾版圗可謂知義矣易授勇爵尚知激厲可偽朝列大夫張德直改輔文林郎偽朝列大夫李國賢改輔從事郎制勑具官某等江漢之師于征唐鄧之境盡復爾等窮而歸義待以同仁易授文階示有科級祗服好生之德勉殫事上之忠可張叔寅贈宣教郎豫一子恩澤制勑具官某韃犯蜀關兵行如鬼爾以郡博士從戎而死之盡臣節也褒進京秩仍官遺孤邾矢復魂可以瞑目可趙善璙除刑部郎中制勑具官某吾欲省刑甚憲部置郎以參決四方之讞必熟於布宣德意者乃在此選爾守潯陽能奉吾詔以惠利其民近規社倉逺凖平糴露積相望使千里無凶年而嬰孺之失乳保者皆有養民之慈母也推是心聽刑於省户天下無冤民其庶矣乎可黃朴差知安吉州制勑具官某董仲舒冝在漢廷而出相江都膠西教令國中所居而治志在及物無中外之間也爾以春秋奉天人之對褎然為舉首細氊廣厦著廷郎省搏扶搖羊角而上方將使九萬里風在其下而一息豈仲舒不遇比哉霅川密拱行闕姑煩共理修材奧學朕不汝忘可參知政事真德秀除資政殿學士提舉萬壽觀兼侍讀制勑避繁機於政府特升書殿之班祝曼壽於殊庭仍勸經闈之讀眷豫近弼為丗巨儒雖寒疾未遂於造朝然嘉猷何嫌於告后茂揚異渥誕播明緍具官某玉𥙿而金相川涵而嶽負十年去國淡乎沕淵潛以自珍一旦際時幡然覽德輝而復下其入奏則祈天永命其侍言則格物致知嘉其有輔衮之風進而共改弦之政偶嬰微疢遽起遐心魯人望季子來歸期弼諧之有益秦伯使醫和視疾謂輔養之冝先稽典章於熙朝隆體貌於舊德躋榮穹職均佚內祠時從邇英延義之遊丕展中庸大學之韞噫道之將行也命方無言之不酬天之未喪斯文尚勿藥之有喜勉加葆嗇用副倚毗可太府寺丞吕延年除大理寺丞制勑具官某中原故家落落如晨星况蓋丗名儒之子乎爾挹正大之澤襲秀頴之芳好修而有吏事外府轉丞廷尉能贊而長以欽恤之意是為克家可劉輝叔除太府寺丞制勑具官某丞者述六職以輔治故九卿皆有丞而外府為重爾守家傳之典刑究吏術之本末分符盱江能使其民愛慕如二郡時知為政矣治藏設官來涉爾筆尚思理財正辭之義可何琮依舊直徽猷閣知福州兼福建路安撫制勑具官某君子而有才國之寶臣也故孔子以為難爾為臺諌清而不隘和而有立質直而知體敷對詳雅藹然君子之風輟自版曹出將漕指不苛不暴威愛胥濟豺虎興於前而色不動迄談笑而之才之稱也閩中謀帥弄印蓋久就為朕往以詩書禮樂陶其民於整暇使朕無方面乏才之歎顧不美歟可曽頴茂除直祕閣依舊福建路提點刑獄公事制勑具官某端拱𥘉詔就崇文院建祕閣擇三館書充其中淳化御飛白以扁之穹窿宏敞號稱木天今偉觀猶昔也寓直其間有登瀛之榮爾佩詩書之訓濟聲猷之美亭刑七閩而行帥事剃姦植良民聽用肅朕聞而嘉之俾進直于東壁以重臬臺天球琬琰河圗大訓虹光下飭可挹可攬益思所以稱榮遇可趙彥候湖南路轉運判官姚子材湖南路提點刑獄黃靜夫湖南路提舉常平茶鹽公事制勑具官某等重湖以南地大而物夥二三部使者皆賢則列城風動與斯民相安於和平之域爾彥候秀整而雅疏亮而潔陳我臬事率乂棐彛其升之漕節爾子材寬夷而栗安恬而邵司我庾事亦克用乂其進之憲節爾靜夫平易而敏詳謹而練著績外服善不近名其卑之倉節孔門三子果逹藝皆可從政仁則未也朕同日出三節以參舉一道之政治賦折獄能知用力於仁民其有不𬒳皇華之澤者乎往哉毋虛朕選可陳塏除直敷文閣知安慶府制勑具官某漢科瑣邊吏於赤白囊交馳之後蓋巳晚矣故並邊擇守綢繆於未隂爾清謹而有立志宣勞江湖間非一日起丞農扈聲問益華皖城闕守其寓邃嚴之直勉為朕往民嘗苦於征調兵猶疲於戍守恪意鎮撫屹為保鄣尚何風寒之慮哉可厲模直祕閣知常德府制勑具官某武陵人氣和柔多淳孝常彈五絃以自樂有虞夏之遺風守得其人易治也爾氣姿開敏材諝通亮自齊安改守是邦嘗以有政稱寓直中祕往訪故俗蔽芾其猶舊乎朕惟五溪蠻獠昔梗漢化與其得一討擊之名將不若得一撫循之賢守爾尚勉之可葛逢除著作郎劉炳除司農寺丞制勑具官某等漢良二千石必選召渤海入為水衡都尉頴川入為太子太傅左馮翊入為大鴻臚美意猶在也爾逢修潔而寬厚守嚴能使其民咸樂於有生承明有庭進為之長爾炳詳明而通敏守徽能與其民相安於無事司均有丞俾還其舊文學政事之科雖異表厲藩輔之意則同或汗竹之摛華或治粟之贊計各攄素韞用對殊獎可陳韡除工部侍郎沿江制置使兼江東安撫使知建康府制勑朕顧詹陪京控扼天塹折衝有術武騎千群奚所用之設險無方衣帶一水何足恃者茂選從塗之雋往開制閫之雄具官某瓌韞鈎深英猷經逺智略輻湊蚤馳騁於淮楚之間功名鼎來晚震耀於江閩之表進起部之妙選揔別都之重權虎踞龍蟠遺風猶昔魚麗鵝鸛勝算方新惟江陵武昌之相望暨合肥蕪城之對峙首尾聮絡輔車因依其堅共獎王室之心以壯外攘夷狄之勢頃奉圭而入覲有嘉韓奕之忠兹掌籥以居留尚鄼侯之志可王與權知寧國府制勑具官某宛陵介吳楚之交地望非不枵然大也其土磽瘠其民􅏽嗇大絃急則小絃絶故其治貴清靜爾舍於昔而無愠容用於今而無矜色挈範六館士曰得師翽翽孔鸞之在廷何色舉之亟耶詳試近藩能如烹鮮之勿擾巖耕谷隱生意彌滿儒以道得民爾尚有焉可韓祥轉儒林郎制勑具官某江東荒政之講民無捐瘠夫豈一手足之力哉部使者第勞來上謂爾冝賞其進一列用勸字民可鍾璵轉修職郎制勑具官某六騩復土五使置官凡備馳驅悉霑賞賚爾祗冗役例進一階茂對恩榮毋忘䇿厲可崔興王信劉旺彭立劉政王才彭辛王用並輔承節郎制勑某人等壽春兩寨分扼東西爾能效忠冦不敢犯登名勇爵益厲功多可劉謙王鎔轉兩官並授保義郎制勑具官某等虜既焚巢爾因削祍易之武級列在王官其加進於二階俾恪勤於乃職可王福轉武翼郎升差淮西路鈐兼強勇軍都統制勑具官某軍務孔嚴將材匪易爾以挽強射逺奮不顧身為吾帥臣所舉升之一秩進領戎鈐任責捍邊尚迪果毅可戴翼轉奉議郎制勑具官某盜發江右蔓延嶠南討平雖倚於元戎奔奏抑資於群吏爾抱材試邑竭力餉軍其進華階用旌勞效可何元壽除户部郎官依舊總領湖廣軍馬錢糧制勑具官某我思陵詔户部郎建臺鄂渚專總軍賦自霍蠡始良法美意垂𥙿百丗爾以通練燭物理以沉密制事冝餉師逾年有宿飽而無後爨襄鄂用壯正序地官之屬增重王人之權有功見知矣主兵主財惟和惟一漢之人傑豈以戰勝攻取而後給餽之勞哉可王伯大除江南路提舉常平茶鹽公事兼知池州制勑具官某朕甚重部刺史之選必試可然後為真爾清粹而恬夷多文而有政所至以治行著池陽密控天塹臺郡常相依而立假節臨藩亦既滿歲牧御兩得軍民胥安爰疇屏翰之庸就正司庾之寄斂一道之權以重一州又推一州之澤以幸一道田閭爾蘇卒乘爾輯吏治爾澄財計爾𥙿賢譽日起豈久於外服者可李江轉四官授武功大夫依舊淮東路兵馬鈐轄制勑具官某于台之役大小三十七戰而城降士用命也莫府上功謂爾勇鷙而敢戰冝受醲賞峻躋武級總戍海陵報國赤心更觀來效可趙汝捍和糴賞轉朝奉大夫制勑具官某漢享平糴之利唐𬒳和糴之害行之惟人爾以材選將漕畿內雖乘豐糴賤易於辦集而農樂與市亦云善矣進陟正郎賞格維信可趙希㥁轉承事郎制勑具官某永王朕大父行也莫覩老成之則尚思垂殁之請爾其季子信厚有傳進陟一偕前言是踐庸示豫追逺睦族之意可陶木除祕書丞兼右司郎官制勑具官某中書之務清而後能簡節疏目以經綸天下之大務置掾不可不謹也爾裏夷表莊言寡理中蔚為通逹國體之器轉丞道山脫氛壒而凌沆瀣俾得以悉心於省闥整紛疏壅剔煩撮要中書之務其清乎神宗聖訓有云左右司須是學為宰相爾雖兼官尚帥志毋怠可趙與􅊸除大宗正丞兼權樞密院檢詳諸房文字制勑具官某朕欲內外之輕重等朝譽之休或卑之麾節民庸之茂必登之班著爾守近輔潛藩民無繭絲之苦而有耕鑿之樂既增秩以表厲之又趣之來丞我麟籍劉德以千里駒嘗為是官矣職清務簡攝掾宥府帷幄勝籌勉思禆益可趙與虤轉一官授儒林郎制勑具官某六騩復土五使置官凡備馳驅悉霑賞賚爾祗冗役例進一階𬒳服恩榮毋忘䇿厲可陳應星輸粟輔迪功郎制勑某人一毛亦嗇冨民之常爾業儒樂善能於兵荒發廪無靳色冨而知仁矣文階示勸增耀旦評可衛洙除大理寺丞方大琮太府寺丞制勑具官某片言折獄千乘治賦孔門髙第為之於此可以觀有用之學爾洙浚明而不苛爾大琮安雅而不襮皆學者也聮翔表著有問甚華爰進丞于廷尉外府獄訟得哀矜之仁財賦得阜通之誼所學見於用矣懋哉毋忽可新太府寺丞劉輝叔除大理寺丞制勑具官某郡太守以美最登朝著榮矣修門未入除書再下其榮抑多爾守劇壘于江右政得寬猛之中燮友者樂業強弗友者無梗化風物寖還舊矣召丞外府轉丞廷尉丈二之組猶綰也惟服其榮而圗其稱可知髙郵軍馬光祖政績轉朝奉郎制勑具官某承據江淮舟車之會冨庶出他郡上能與民相安則為良守爾以實頴之材分共理之寄政令明簡田里熙豫其在惟良之選乎進官一等用旌善最尚加鞭以須甄采可何文美轉武德郎依舊淮安州副都使制勑具官某定逺戰禦之勞去今十有八年矣爾纍閥積階而後自列朝廷方厲忠勇以勸事功不汝靳也進升再級仍將偏師淮水湯湯毋忘敵愾可何處久除太府卿制勑具官某九府設於周今唯太府官名猶古受其貨賄之入頒于受藏之府職業亦猶古也知圜法之為均通則為稱職爾登騎省而聲采肅長蓬山而風致逺治輔藩而恩威立蓋通儒也鹽楮之令屢變錢榖之問日棘非通莫濟蓋法猶衡也人猶權也衡一定不易而權之以人則通矣入儀九列總斡萬貨任法任人庶其兩得乎可史嶲之除直寶謨閣致仕制勑具官某范吕丗家多良材所積厚也爾師垣之孫文昌之子受材孔良遺榮何早禹閣寓直尚尉出門折軸之憾可遊九功除司農卿依舊知慶元府沿海制置使制勑具官某江淮制閫皆以王人臨之重其權也分閫海服其可輕爾簡而廉剛而塞強而義頃縣農少出殿東藩待煢獨髙明有體而無吐茹乎鯨波之表朕用嘉之進升列棘仍鎮舊晏澄三農和樂尚益加之意可莫異德白身襲父官授銀青光祿大夫制勑具官某舜化柔逺禹聲暨南爾知慕於華風冝克承於丗業卑階崇祿效職遐陬祗服寵光益肩忠孝可陳韡磨勘轉朝議大夫制勑虞陟明於考績之餘周詔賞於計治之後眷時法從鎮我陪都適銓簿之程勞冝贊書之錫寵具官某涵渟術業震耀威名豹尾屬車之嚴告猶良切石頭鍾阜之勝宣力惟勤積日以課功按歲成而進秩雖髙賢躅不廢彛章元祐之著定貟增重論思之望紹興之付劇政益堅控禦之圗可平齋文集卷第二十二
