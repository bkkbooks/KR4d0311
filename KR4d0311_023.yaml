body:
  text: 外制七吳淵除右文殿修撰知鎮江府制勑具官某物不受變則材不成人不涉難則智不明此風雨霜露所以為天道至教爾以昻霄聳壑之質秀出於鄧林夫豈常材也哉而匠石必取於斂華就實之後京口為江淮襟喉升班論撰起家出鎮識老氣定而政平軍民之福也暇日登北固而長望慷慨擊楫聞風作興斯稱豫蓄材待事之意可蔣重珍除集英殿修撰知安吉州制勑具官某董仲舒冝在漢廷而出相教令國中所居輒治志在及物無中外之間爾以奧學閎識奉天人之對嘗褎然為舉首不輕於售挽莫能致逮攬大政幡然肯來敷經氊厦吮墨螭首朕方傾意鄉之非仲舒不遇比也卧疾念歸姑以論撰殿輔藩勿藥且召矣可姚珤除直祕閣權知建寧府制勑具官某冨沙軍情屢搖頃為甚官治民廬半委烈燼朕念之怛然故選孰知德意者為守寓直中祕以榮其行爾名在文學之科而議論鏘發志氣英邁丞于麟臺郎于憲部與聞廟算於宥府聲問日起詎冝輕去一方病矣勉為朕往廉平以字民簡靜以馭軍百廢具舉而聲色不動以表列城是為稱選可何炳除集英殿修撰知江州制勑長江上下護風寒非一處潯陽西挹武昌東引京口自晉以來為重鎮故輟從臣臨之具官某以撥煩之材致逺之識嘗建臺閫于上流厥績用茂晚登從塗齒宿而氣不衰升華論撰往控天險酌保鄣繭絲之計嚴綢繆牖户之圗江波不驚廬阜屹峙尚可登庾亮之樓而銷憂也可國子監書庫兼皇后宅教授徐雄除國子録制勑具官某虞周有胄子國子之教漢有四姓小侯之學朕參用之以作人爾講習克勤圭角不露方授經隂馬之家遂分録成均之政師道行焉茂哉思其所以為人師可陳大朴平黎蠻賞轉儒林郎制勑具官某黎蠻千紀海邦繹騷爾密贊守臣設謀致討論功冝賞爰進一階漢水之陽益勤警邏可張綽平蠻督餫賞轉儒林郎制勑具官某黎蠻干紀海邦繹騷維時守臣亟致討定爾服官黃綬督餫良勞示勸一階益勤警邏可趙善瀚知嶽州制勑具官某嶽陽處粵蜀荆楚之會吳晉皆為重鎮以魯肅陶侃為之守爾氣盛於權竒材優於盤錯傑傑然公族之頴繁弱櫜藏人所共惜起馮熊軾揖肅侃於千古之上可無薄洞庭而羞君山也維彼澤國民生孔艱悉力拊循毋失休譽我有好爵將於爾乎進之可黃朴改差知泉州制勑具官某奉親而守便郡搢紳之至榮爾學問昭融議論激壯以倫魁雅望昌文聲於朝而料戎情商國勢類出人意表識者以方面之材期之甫懷吳興之綬隨綰溫陵之組去家壓境能幾何舍板輿親御如行户庭父老相與榮豔於道周且喜色相告曰仁孝同源孝於親必仁於民凋瘵其蘇乎可塗顯行知崇慶府制勑具官某蜀在萬里外朕於人物之賢否難隃度而耳目惟制閫之寄爾之公廉律已豈弟愛民彥呐為朕言之觀逺臣以其所主唐安一麾不汝吝也政平訟理圗稱厥舉謹勿以去朝廷為邈可厲模楮綱賞轉朝請大夫制勑具官某幣行於東南而取楮於蜀精實緻密偽難以亂真也爾抱材敏鋭將漕井絡歲發楮綱適應賞令其升一級庸勸奉公可權工部侍郎徐僑除集英殿修撰提舉佑神觀兼侍讀制勑勞侍從之事願去承明考仁聖之風勉留廣厦雖優老之令典實崇儒之盛心具官某志操孤髙問學淳古詠歸沂水之上丗果何求作興北海之濵時然後出有嘉耆艾置在清華守益固而眷益隆進愈峻而辭愈力兹領祠於闕下仍勸讀於禁中以體貌大臣之舊規為尊寵髙年之特禮更升論撰不替纂修行葦之養老乞言亦孔厚矣大學之致知格物尚茂明之可黃堮知肇慶府制勑具官某朕惟民生之不易吏治之不良雖斗壘未嘗輕卑矧名藩乎爾承元祐故家之傳材優而氣壯自著勞於試邑即振譽於登畿僅爾小休倐焉復起為遐嶠之民擇守也潰旅未殄地迫髙要往疾其驅亟圗按堵可丁曄除直寶謨閣淮東路轉運判官制勑具官某王良造父之御鳴和鸞逐水曲無不中節人與馬相習也爾氣明而敏材通而偉屏翰澄清之最荐著於淮左物情地利習之久矣兹還寶奎之直俾膺飛挽之寄咨諏貴廣積貯貴豐往究乃心用圗厥績以寬我東顧可魏了翁除權禮部尚書兼直學士院兼侍讀制勑秩宗之典三禮虞凝垂拱之功春官之掌九儀周格盈成之治繄制作之自古必推行之在人進我鴻儒膺兹妙選具官某氣以志為帥學以經為宗賈誼六太息之書洞逹國體魏證十不終之疏仰當帝心梧桐方挺於朝陽兼葭已颯於白露逆處以順樂忘其憂務著書而立言期精義以致用緑竹猗猗而瞻彼奧每興磨切之思白駒皎皎而奎之直俾膺飛挽之寄咨諏貴廣積貯貴豐往究乃心用圗厥績以寬我東顧可魏了翁除權禮部尚書兼直學士院兼侍讀制勑秩宗之典三禮虞凝垂拱之功春官之掌九儀周格盈成之治繄制作之自古必推行之在人進我鴻儒膺兹妙選具官某氣以志為帥學以經為宗賈誼六太息之書洞逹國體魏證十不終之疏仰當帝心梧桐方挺於朝陽兼葭已颯於白露逆處以順樂忘其憂務著書而立言期精義以致用緑竹猗猗而瞻彼奧每興磨切之思白駒皎皎而食我苗徒起縶維之歎適中朝之更始俾外服之遄歸眷百王之典寖微而一代之防多闕匪究定民之本曷為經丗之方漢僅草儀猶折武夫之氣魯惟秉禮卒回強國之謀爾熟講乎后倉之九篇深稽乎姬公之六典未入趨於宣室趣攝長於容臺仍摛盤誥之文更勸索丘之讀登崇伊始簡注良深吏士之見官儀正賴濟時之略公卿之明王制毋忘致主之規可參知政事曽從龍除知樞密院事加食邑實封仍兼參知政事制勑聖賢相維而致升平莫重弼諧之寄文武兼資而有智略尤嚴宥密之圗乃眷譽髦洊參大政進管五兵之重用培九鼎之尊倚成匪輕作命惟允具官某學該乎今古識貫乎天人長江大河不足以喻其量之深太山喬嶽不足以言其器之重夙擅倫魁之望嘗陪近輔之聮仲舒見嫉孫洪不少安於朝廷之上李泌出避元氏寧退處乎畎畒之間既屢最於價藩爰趣還於政路屬逢更化備罄告猶直方大之兼全深得鎮浮之體知仁勇之並用洞明應變之機顧邊瑣之孔艱期廟謨之宏濟宣帝樞機周密固先二相之資憲宗紀律設張尤切衆賢之助肆疇庸於間社俾進序於本兵總提星紐之權仍贊台衡之務邑畬申衍邦典增崇以成道德之強以全帝王之勝噫天保治內所以收采薇之功蒸民任賢所以定車攻之業維真儒之無敵知中國之有人務逺乃猷用砥于乂可簽書樞密院事鄭性之除同知樞密院事加食邑四百户制勑帝舜之格三苗有伯益以贊禹宣王之定四國有吉甫以誦申眷宥密之孔嚴賴寅恭之協濟肆頒命綍參典事樞具官某資蚤悟而夙成學旁貫而曲暢函鐘太蔟為角始終皎繹之和玉瓉黃流在中表裏清明之粹久矣冥鴻之去時哉儀鳯之來不纍日而長諌坡未再月而登政路以非常之際會為有大之規摹難於定不難於回熟知國勢可以戰斯可以守洞識戎情爰進二於本兵仍申陪於賜邑維豫制勝咨爾陳謨府兵列於關中孰是相維之制屬國置於塞下曷為叵測之防隱憂既深區畫可後坐弭控弦之警密輸借箸之籌噫文武之憲萬邦政有賴中興之畫明良之康庶事盍共圗丕應之功惟爾之能俾豫以治可同簽書樞密院事陳卓除簽書樞密院事加食邑四百戶制勑民獻敉寧武功求濟於艱大之日王師遵養時晦用介於純熙之餘眷國勢之重輕視人謀之臧否進賢宥府揚號明廷具官某柳下惠之聖和樂正子之好善謙謙自牧夙全君子之風蹇蹇匪躬克慕王臣之操紛炎門之競騖獨夷軌之徐行一泯忮求兩無緇磷去知有命靡矜器能政理之長來亦何心益稔議論文章之望逮親攬於威柄爰趣登於政塗勤朴斫於梓材力贊厲精之治綢牖户於桑土常懷先事之憂備罄壯猷罙深邃簡就陟樞庭之序仍循書殿之班爵進公圭秩陪邑采俾密禆於勝算用坐折於遐衝噫明主可為忠言朕方合介胄搢紳之議上䇿莫如自治爾盍思車馬器械之圗必同寅協恭而和衷斯禁暴定功而保大式孚民聽庸對王休可余玠起復宣教郎襄陽府通判兼京西制置司機冝文字制勑具官某奪情非令典也惟從戎則許其墨爾以明敏練逹受知于制閫秋防孔邇辟置自助起之堊室二政要藩且參莫府之畫不以家事辭王事其禮之變乎移孝為忠勉圗協濟可李勉平黎賞轉朝奉郎制勑具官某廣右平黎上功爾以強敏宣勞于莫府進二秩以獎之甫通閨籍遂階貟外異渥也試邑于虔益勵勿懈可軍器少監徐清叟除將作監依舊兼司封郎官兼崇政殿説書制勑具官某朝廷之用賢非一途信其賢耶用之惟恐不亟故必躐正郎梯監少而升爾家傳正大之學躬厲直方之操金華開説援古以證今亹亹不倦朕甚嘉之攝主爵二戎監而進大匠華軌直矣朴素化行繕修務簡涵泳竹素綽乎餘暇輪人有釋椎鑿議堂上之讀者試詳訪之以告庶乎他山之石可以政玉也可大宗正丞蔣峴除軍器少監仍兼權侍左郎官制勑具官某武監戎部之附庸官間無事少也占位涉筆無幾牘然鄉用之材於此乎儲爾學問醇茂義理融暢恬夷而莊舒卷阿吉士其人歟丞我麟宗攝郎銓省几案文書填委不動聲氣隨手冰泮而九品無遺鑒體用具矣試材以劇養望以暇鶴膝犀渠姑二程作朕方圗所以進爾者可丘嶽除兵部郎官趙與􅊸除都官郎中兼樞密院檢詳文字制勑具官某等國朝最重尚書郎之選懷香而奏明光襆𬒳而直建禮非郡最不真授爾嶽篤茂而暢邁守儀真以吏畏民懷稱爾與􅊸疏明而詳逹守嘉禾以政平訟理著朕厲精政事以來歷課吏治皆其良也表惟良之吏以勸郡國故俾嶽郎于司武與􅊸自丞大宗郎于司僕且攝屬于宥府太微積星之次即日為真顧不謂榮乎兵不可黷刑不可濫必寢必措勉贊而長可樞密院編修官趙汝譢除宗正寺丞仍兼右司制勑具官某三丞望華職簡而宰屬為劇授官兼劇以簡欲其材有餘於事也爾蚤收危級蔚著雅望攝組省闥靡枉于法守而事不辭難沛乎其材也擢繇編纂涉筆宗盟仍行紀綱百司之職輕車熟路疇能及之益涵致逺之器用對方來之渥可汪之道除太常寺丞制勑具官某漢制朝儀武夫拔劒擊柱之風為之氣奪使成周禮樂得見于後丗情偽之防何如哉故奉常置丞必通于古誼爾學博而約氣直而清時輅冕舞之傳孰復蓋久談經宫邸薰陶信厚涉筆曲臺冝矣因革損益訂古而施諸今以美化善俗亦惟無忘夙夜惟寅之義可劉克莊除樞密院編修官兼權侍右郎官制勑具官某時政記者國史之椎輪經武要略則先朝制勝典刑之囊括其書纂次於樞屬自昔必名儒文士爾家傳儒藝蚤著文聲韞抱不凡脫餌科級諸老先生多之簿正屬籍進升刪潤維汗青之稱也與聞廟畫攝事郎潛精毖簡通對我殊擢可陳一薦護獻俘有勞轉朝奉郎制勑具官某垂瓠合圍穹廬就燼函守緒檻天綱獻功于藁街修途護役爾實宣勞其升貟外之階往效幕中之畫可顔信之獻俘有勞轉保義郎制勑具官某淮蔡函骨獻俘之役爾與有勞其升一階以酬跋涉可蔡仲龍除大宗正丞兼權屯田郎官袁商太常博士並兼沂靖王府教授制勑具官某等沂邸於屬為近朕篤內睦擇師而教之久則遞遷獎其勤爾仲龍爾商皆以經明行修立於朝如玉在山燁然其輝潤楷範麟趾麗澤多益是用進仲龍丞于大宗且攝省郎進商繼仲龍議禮于曲臺而典教悉惟求舊懋詩書禮樂之訓陶河間東平之風不特講留屯搜綿蕞之欽厥職也可安恭行除大理寺正制勑具官某廷尉有正監及平漢制也我朝置正於卿少之下丞司直之上厥選蓋謹爾材姿亮通風矩明整蔚其梧鵠之秀丞郡以李法簿召未至升之正以聽獄成甄拔峻矣書曰明啓刑書胥占咸庶中正勉哉圗厥稱可魏峻除宗正寺簿楊璪太府寺簿趙與爽藉田令制勑具官某等楩柟𣏌梓之材生於鄧林其地美矣非雨露之養不成爾峻簡而溫雅而文爾璪茂而通整而練爾與爽頴而秀韶而明英英丗家翹翹天支朕皆欲養其材以待用故進峻簿正于瑶牒璪繼峻簿外府與爽繼璪令帝藉前輝後映其各懋於自獻可馮去疾除武學博士制勑具官某善用兵者不學古兵法而圯下一編亦詎容無師慶曆置右庠之意昉此爾以通經博古之學彪炳於文成均諸生咸斂祍其下風而平時慷慨激烈論南北離合之勢兵家勝負之略皆有據依遷之博士使業韜鈐者又得所矜式新美作成之下安知不有武舉如子儀出於中乎可劉宰除將作少監制勑具官某朕宵旴圗治計效猶邈每嘆君子有材之雖然不敢諉斯丗之無其人也爾隱居以求志深造而自得君子人歟其論天下事目無全牛投刃可以中桑林之節材抑偉矣旌招屢下未肯從吾遊何耶超越拘攣繇丞奉常徑二繕監迎之致敬有禮矣惠然來思毋興盡而返可尤爚除知江陵府兼京湖路安撫劉輝叔政績轉一官依舊知建昌軍制勑具官某等河東以地望之重歸季布頴川以民情之安留冦恂悉惟其冝爾爚抱識時應變之長往帥荆州事權非昔而承上撫下無間言可以為難矣故齒召復還以壯吾上遊控扼之勢爾輝叔厲盡職奉公之志出守盱江邑里甫集而興利除害無遺功可以為善矣故選擢復留以尉千里戀慕之情分閫乘壘任有輕重朕為地望民情而擇官奚有間哉各鞭厥後毋棄爾成可葛洪除資政殿大學士提舉洞霄宫制勑武公睿聖晚不忘針國之心文子廉忠老猶篤事君之志朕緬懷舊弼久樂燕居年垂九帙之崇望稔三朝之重峻升邃職昭示隆恩具官某嶧陽特生之桐新甫後凋之柏致身廊廟雍容麟也之來引興丘園翕忽鳯兮之去仁樂山而俱寂義飲水以自娛雖黃髮之畨畨愈丹心之炯炯乃眷粹古務尊耆儒不得謝則賜杖而安車優遊佚老如有問則就室而珍從懇切乞言方將遣掌故而訪伏生乃欲致少傅而從疏受旄期雖重於趣召矍鑠詎容於告歸陟祕殿之大名踵珍臺之優廩肆加體貌式聳觀瞻噫壽考維祺朕敢忽日秩月存之禮憂心如醉爾毋忘晨興夙寤之規益茂養恬對揚猷訓可何處久太府卿兼知嘉興府制勑具官某士君子任於時入儀九列出殿三輔通顯矣矧建惟月之旜馮扶風之軾而為王人爾守故家之學術熟昭代之典章色莊辭毅爭是非於殿陛間不少詘用之郡國何姦萌之不戢戾氣之不弭哉因南徐惜其去之早知檇李恐其來之暮就乘夏縵趣布藩條徒得君重毋薄淮陽也可度正轉朝議大夫守禮部侍郎致仕制勑允矣君子佩筆槖以方真賢哉大夫挂衣冠而何亟能知所止盍賁其行具官某學守粹傳性全至善見於治郡有閉閣思過之風推以立朝得自牖納約之體進二秩宗之典仍參師氏之司尚賴繩愆遽聞告老一正君而定未究責難之恭致為臣而歸乃慕保身之哲冝升華秩用尉耆齡還家峩雪之邊遺丗煙霞之表莫回爾志徒愴豫懷可禮部侍郎致仕度正贈通議大夫制勑有十夫豫翼方來下於井參不一老憗遺乃去騎於箕尾冝加禭典庸示眷懷具官某秉心醇明制行平實大夫國人之譽蚤推其賢諸老先生之傳晚試所學踐禁途而獻替簉經幄以開陳每望其儀嘗期以壽胡夕陽之莫駐忽朝露之先零臥病於數千卷之間性焉巳盡殮含於二三子之手命也何言凄涼萬里之歸赫奕四階之贈英魂如在茂渥歆承可趙綝除大理寺丞諸葛十朋除大理寺司直制勑具官某等獄重事也煆錬以為巧攟托以為察析律以為密深文以為公而民命近止國脈斫矣理官其可不選爾綝器涵渾璞薰然忠厚長者之風挈繩直於圜棘刑不失仁故就進之丞爾十朋步中規矩藹然悃幅無華之美贊笏畫於國帑利不失義故俾繼綝司邦之直皆以逹吾好生之德也敬之哉惟良折獄可太學博士李矩除諸王宫大小學教授制勑具官某大學在西郊小學在國中四代之制然也二學並設以教神明之胄則我朝作古爾行應周旋之規學茂講習之澤相觀而善六館得師而吾葛藟瓜瓞之秀不可無良範也故輟之司教于宫庠小以成小大以成大等就傅肄簡而上皆知勉於為善則振振之化行矣可太學正何處恬除太學博士制勑具官某博士掌通古今漢始以五經置施讎之易孔霸之書張生之詩小戴之禮皆嘗以是論同異於石渠其通經何如哉爾涵渾厚之氣藴精深之學正于膠庠士服習其訓而不敢犯升之分經講授之官剖疑析滯導正釋回以成首善之風乃見師法可架閣林宋偉除太學正臨安府學教授林伯順除武學諭鄭斗祥除太學録制勑具官某等文武異庠而樞紐風化坯冶人物之功等故選授皆明師爾宋偉志氣激昻講藝精博爾伯順風規凝整汲古深長爾斗祥抱負瑰傑造理閎奧掌故郡博士中一舉而得三士上庠以宋偉為正斗祥為録右庠以伯順為諭望實孚矣教學相長之道尚觀所進可兩浙轉運判官顔頥仲除户部郎官兼知臨安府制勑具官某朕間者親扎十有二條敕畿尹以重四方之本丁寧貇到奉行惟人爾立心直而平見理靜而明處事果而精將漕闕下聲采奮厲撫虎兕之出柙知牛羊之求牧兼組彈壓都人士安之兹用擢之版部郎俾為真周以尊枕于京為盛漢以桴鼓不鳴為能燮友強弗友剛柔異施而國勢增鼎吕之重斯克訓于朕志可都官兼檢詳趙與􅊸除直寶章問兩浙路轉運判官制勑具官某歲九遷而日三接遇合之盛也未半歲褒表者五六其非常之遇歟爾良而材寬夷而精密治輔郡有善最朕既增秩原其任未幾以丞大宗召又未幾以都官樞掾進又未幾以寶奎寓直國畿將漕選翼乎鴻鵠之遇順風誰能禦之夫諸路之漕一也而漕于畿為難噓弱揉強壓浮鎮薄與牧尹參錯為功皇皇枕奠矣可端明殿學士廣東經略知廣州崔與之除參知政事加食邑四百戶制勑朕仰稽列聖並建輔臣在乾德則除餘慶於荆南就參國秉在紹興則擢趙鼎於江右入預政機肆嘉牧御之賢久鬱訏謨之望討論舊典揚厲新綸具官某存心以事天行義以逹道風節髙乎一丗威名聳于四夷泛三峽而歸久適山林之樂越五嶺而召尚安水石之間甫升書殿以賦祠旋即里門而宅牧期釋宵衣之慮忘居晝錦之榮方飛梟懷我好音已肅登陴之諭逮急鹿鋌而走險竟伸負固之誅環扶胥黃木以懷生極交址蒼梧而息警益深簡在可後儀圗維漢化之雖更尚唐綱之未振聚民獻以為敉寧之本每拊髀於才難開皇極以示會歸之方尤拂膺於道逺疇可禆於大政信無易於老成以叶群心以熙庶務仍總提於邦典兼申衍於邑租趣裝而來虛寧以待噫召公成南國之化既茂著於民庸尚父起東海之濵盍共扶於國勢體豫至意究爾嘉猷可凌嵩除大理評事制勑具官某天下之平一傾則用法者皆為之輕重故廷尉置評以平之爾秉心近厚蒞事詳敏退然不知而不愠擢畫一之科亭四方之讞以身體之以心求之何往不得其平哉母徒曰三尺法安出可江西路轉運副使吳潛除太常少卿制勑具官某禮樂根於心著於日用逹於天地之化百物之産隆古聖人重之故分命夷夔以治其精後丗文勝實衰一奉常掌其粗足矣矧卿不常命惟二之置爾以倫魁之望發名父之傳事親從兄仁義充於一性而禮以節之樂以樂之無非實理出揚濡轡之光華入揔容臺之制作孰非實用哉丗教之防範不立人心之情偽益滋借鉏取帚拔劒擊柱綱常幾少隳矣爾其思辨上下和神人之道以暢所學可馮田改差知金州兼管內安撫制勑具官某襄沔上流為安康以守行帥事左符每艱其選爾守洋川有治行制閫謂才周應變績著籌邊冝易鎮要藩信如其言吾得良牧矣郡據秦楚蜀之會距啇􅉑孔邇非識常山蛇勢不足以圗攻守而撫軍字民其本也毋怠毋易可資政殿學士中大夫提舉萬壽觀兼侍讀真德秀轉太中大夫守資政殿學士致仕制勑上印祈間風獨髙於東府挂冠告老景遽迫於西山繄一身何有於去留而四海實關於輕重特隆禮貌昭示眷懷具官某俊偉而光明直大而博厚出則野老望車而迎拜識恨不先入則都人遮道以聚觀用嗟何晚進陟詞坡之長密陪經厦之遊勉朕躬為天地而立心使斯丗見帝王之為道久韞經綸之妙徑躋丞弼之崇方觀厥成乃辭以疾雖堅留於勸講莫力遏於懷歸何但上下床信人才之有間如失左右手况時事之多艱維聖賢之會難逢而治忽之機易判所期三事寧計一階噫君子不可諼兮尚想英規之在賢者樂與共也竟嗟𥘉志之違往服恩徽用光祖道可資政殿學士太中大夫致仕真德秀贈銀青光祿大夫制勑致為臣而歸甫惜孟軻之去非夫人之慟忽驚顔子之亡以十年退養廊廟之姿不一日與聞朝廷之議悲深易簀恩重書棺具官某休休焉有容屬屬乎其敬中庸大學之經丗講貫深微伊訓説命之格君敷陳坦白少徊朔於禁路首典領於文闈為國搜賢忘身竭瘁方騰徹棘之譽已告負薪之憂趣升股肱旋乞骸骨鍾全氣於三光五嶽如斯幾人受正命於太極兩儀僅爾中壽舉朝歎息行道咨嗟顧民生之方殿屎豈天意之未平治咸觖金甌之望特升銀艾之榮噫涉大水而無津孰濟奔流之勢仰髙山而景行尚聞屹立之風九原可興百丗不朽可同簽書樞密院事陳卓贈三代故曽祖嘉謨朝奉郎贈太子少保特贈太子太保制勑有媯逺系為漢丗家咸而欽欽而躬躬而寵則位司空實而紀紀而群群而泰則官僕射繄流光之無斁蓋鍾慶之有源具官某故曽祖具官某充實中存浚明外著愛人利物博古通今子拔列卿之頴孫搴法從之華傳至爾曽進輔豫治培深而發必茂積厚而報亦豐雨露九霄峻陟青宫之保雲來百丗益增黃壤之光可故曽祖母黃氏上饒郡夫人特贈文安郡夫人制勑天降時雨山川出雲嵩髙駿極之詩所以作也必有隤祉發祥之懿是鍾經文緯武之英具官某故曽祖母具官某氏淑行椒蘭柔儀蘋藻婦從夫而積纍始大厥家孫生子以顯揚遂強吾國丕顯曽門之慶申加名郡之封僾然如存歆此休渥可故祖膏朝奉大夫太府少卿贈太子太傅特贈少傅制勑寤寐治功登崇人傑三階聮耀不忘夙夜宥密之忠五廟均休益茂春秋蒸嘗之孝冝隆尊祖用顯詒孫具官某故祖具官某德履純明風猷簡逺荐更外服隂成勿翦之棠特立中朝氣凛後凋之柏僅升華於卿月竟鍾瑞於樞星贊我逺圗皆而遺訓班髙亞傅時申加第之恩望重丗臣益篤傳家之慶可故祖母蔡氏魏郡夫人特贈安國夫人制勑舜帝之後為陳文王之昭有蔡冝其家室貽厥子孫具官某故祖母具某氏任只秉心溫其積行禮嚴舉桉曵藻綬於名卿教篤斷機飛翠緌於法從傳芳再丗制勝五兵不忘報本之思冝厚追榮之典積恩徽於大郡新湯沐於名邦象服是冝尚其不昧可故祖母汪氏魯郡夫人特贈崇國夫人制勑含飴弄孫者家庭之慶為醴蒸祖者寢廟之榮肆倚重於良臣庸追榮於大母具官某故祖母具某氏淑均姆訓雍肅婦儀采南澗之蘋躬承家而共祀有北山之李丗為國以生賢眷時樞紐之尊贊我經綸之妙孝思維永德報冝隆易郡號於曲阜之墟進國封於崇墉之壤潛光煥發懿魄祗歆可故父居仁華文閣學士正奉大夫贈太師特追封申國公制勑朕講求采薇治外之略企慕蒸民任賢之風擢時英猷列我該輔千尋之木以培埴而茂九層之臺以積纍而髙必有教忠乃能移孝具官某故父具官某心夷而履粹學博而文雄締眷阜陵佩荷囊之清切受知光廟擁茸纛之森嚴視萬石以為輕傳一經而特重克開哲嗣進翊洪樞禰廟疏榮躋上公於二吕師垣流慶邁盛事於三陳可故嫡母王氏鎮國夫人特贈燕國夫人制勑延范逵而開陶侃濟丗之功窺元齡而卜王圭佐時之業家或無於賢母國奚有於名臣具官某故嫡母具某氏環珮雍和帨紛肅穆獻納論思之最能勉其夫彌縫輔贊之功克昌厥子任方隆於政路報冝侈於脂田進召公故國之封正魯人小君之號音容未泯蠁䀛其歆可故所生母俞氏新安郡夫人特贈和政郡夫人制勑綵衣之戲天性真樂板輿之奉人生至榮眷豫兩社為輔之英抱此萬鍾致養之憾匪隆禭典曷尉孝思具官某故所生母具某氏育詩禮之門嬪衣冠之族怡聲下氣奉棘列之尊章柔則令儀佐槖班之君子爰篤生於國棟肆坐斡於天樞心如母存義以子貴易舊封於古歙加新命於西岷不惟紓蓼莪之悲抑亦示白華之勸可故妻林氏信安郡夫人特贈大寧郡夫人制勑召南鵲巢之什夫人起家魯侯燕嘉之詩令妻受祉何嗟契闊不逮顯融具官某故妻具某氏佩服女針踐修婦則于沼于沚齊明錡釡之共如山如河􅈺雅笄珈之飾冝百年之偕老胡一旦之溘先顧豫樞臣失此內助冝郡封之加峻俾廟食之增華隂相其夫永輔吾國可家抑除將作監丞制勑具官某參井之光下濟岷峨之氣上直鍾其英者多清廟之器故選拔為盛爾淵於學而睟葩於詞而峻西産之珍也外閫荐以名薦深鐍弗售特招乃來球璧冝在東序而涉匠監之筆朕豈以閬劒善最為可略哉職優事簡姑涵雅望伯仲塤箎聲問孰禦可四川制置司機冝文字趙垙夫除太社令制勑具官某朕重名器甚録其父之勞而進其子於周行不一二見也爾父以名法從當方面撫蜀控秦具有威略贊籌莫府爾抑有助朕何愛司社不以為循陔之榮哉其砥礪事功使人知西平之有子可史彌鞏王宇榷務羡賞各轉一官制勑具官某等管榷國計所關羡必賞爾庀職京口克懋厥官歲入有常能溢其額俾進升於一列庸獎厲於勞能可史全之監軍平蔡州轉兩官制勑具官某方城負固我師進討摩壘鏖戰遂復故境爾監厥軍計功受賞兩秩升華勉思來效可孫林張旺告發軍姦並輔承信郎制勑具某人羽林失馭敢犯紀律爾發其姦悉正顯戮而京邑以寧登名武階儲材將列表示戎行使知懲勸可陳文孫知髙州制勑具官某炎嶠守吏必諳風土稔習俗然後能盡心於撫字爾端飭而敏於政守封川民無歎愁易符髙涼必能推之共理詩不云乎誰能亨魚溉之釡􅑄貴不擾也往毋鄙逺其民可淮東路兵馬領轄耶律均復山陽有功轉三官授武德大夫兼知淮安州鹽城縣制勑具官某山陽淮之門户間為冦保王師大討蟻潰鼠逸爾搴旗鏖擊之勇莫府髙之疊進武階往理邊邑加意撫循毋失軍民之譽可平齋文集卷第二十三
