  text: 平齊文集卷第二十一
  hash: sha256:f17efa96dcf8b55f9f67a7782dbcd34e34994361c287574e54200c1ef5f2a4ee
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0311_SBCK_021-1a}
body:
  text: 外制五司農寺丞陶木除大宗正丞制勑具官某宗正以卿少丞簿聮事合治大宗正獨置丞簡且嚴乎爾融明而凝重有韞而不襮論奏亹亹切於為民既俾丞大農矣重惟明德睦族之意非賢莫宣故亟進之以丞大宗尚書郎之選於此乎儲勉佐乃長母以再轉為淹也可權兵部尚書史嵩之除寶章閣直學士宫觀制勑封萬里之侯不足以敵過庭之榮佩六國之印不足以易戲綵之樂方枤杜之還役乃式微之賦歸具官某蚤奮儒科寖躋朝列牧民御衆擁漢水之騂旄舍爵䇿勳佩甘泉之紫槖雖向日之云切顧望雲之抑深願為返哺之烏退奉間居之燕重違雅志俾領真游以西清嚴邃之聮致南陔怡愈之養石奮之教素謹諒亟下於里門子牟之心常存尚母忘於魏闕可林楷特轉朝議大夫直敷文閣致仕制勑具官某情莫切於閔勞恩莫厚於崇卒乃者赤子嘯兵三衢朕為之丙夜不安枕爾以公平廉靜選拔出守剃鉏稂莠不遺餘力廩廩向還定矣而病以革告天胡奪之亟耶進官一列升職四等用書爾柩尚克知歆可趙范除龍圗閣學士京湖制置大使兼知襄陽府制勑仲淹守慶州而純粹踵其成規丗衡築青澗而种諤保其遺績繄㦸纛交輝之盛實衣冠奕葉之榮具官某望壓江淮志吞河洛前茅後徑不虞街亭節度之違左櫜右鞬益慕金城圗略之上獨差彊於人意常簡在於朕心眷上流形勢之雄有乃考威名之著闞如虓虎賢於長城爾嘗從士燮之謀晉心廉頗之用趙士冠西清之邃職護北門老農扶杖以歡迎喜談舊事宿將帕紅而上謁誓立新功惟寡欲可以全剛惟集思可以廣益惟多算可以制敵惟不殺可以結人守果見於有餘攻奚憂於不足功名未艾何止復鴈門之踦機㑹無窮正可奮澠池之翼勉揚先烈用答殊知可史洽轉奉直大夫制勑具官某間者韃犯信陽略雲夢轉黃陂而薄浮光虐𦦨蓋烈烈也爾為守將能識事機亟調貔貅奮前迎擊賊禠氣而宵遁可謂敏則有功矣一歲三階實為異數賞無幸得其懋承之可孟點鄧泳各轉一官制勑具官某等唐鄧息蔡復歸版圗雖發縱之有人亦莫府之交助爾能知體國不憚從戎效婉畫於郾城贊成功於峴首特升一級用獎賢勞可樓昉贈直龍圗閣制勑具官某士君子存心養性以事天夭壽不二以立命豈計一時之屈伸哉爾淹貫而有歸正固而不撓蓋深於道者立朝蒞郡聲稱甚茂井雖泄而可汲需見險而竟止此心不失其本然之天則命自我立冝區區者之不能縻也王通氏抱太平之䇿以殁房杜諸賢卒用之以昌正觀之治道安有終屈而不伸耶羲圗邃直仍録遺孤拱木九京尚其可作可李道傳贈直龍圗閣制勑具官某學以見道為難苟有見乎道則形而為實踐發而為正論推而為美政無異源也爾以蜀莊之珍薦清廟之璧踐履也方議論也剛政事也昌非漸乎師友之澤洞乎聖賢之奧殆將委厥美以從俗蘭芷變而不芳矣西風寥碧駟虬獨逺跋豫望之惜不我遇奎躔峻直且表其孤以一時之屈易百丗之伸爾尚奚憾可胡夢昱贈朝奉郎制勑具官某朕訪落伊始首下詔來讜直蓋與諌鼓謗木同意以直言求人而以直言罪之豈朕心哉爾風裁峭潔志槩激壯繇廷尉平上書公車言人之所難言方嘉貫日之忠巳墮偃月之計問途胥口訪事瀧頭曽無幾微見於面何氣節之烈也仁祖能全介於逺謫之餘孝祖能拔銓於投荒之後撫今懷往魂不可招潦霧墮鳶悲悔何及陟階貟外仍官厥子用旌折檻之直且識投杼之過爾雖死可不朽矣可徐瑄贈集英殿修撰制勑具官某舍生而取義殺身以成仁惟剛者能之爾燭理明植志果屢躓而氣愈徑晚治廷尉獄怵之風㫖不移壓之禍福不折据經訂律反覆開陳寧以一身試不測之淵而不忍以根連株送之命資其身委蛻炎瘴其甘如飴非所謂剛者乎唐司刑有功守死明道不阿旨詭辭以求苟免吾於爾見之追榮論撰仍録遺孤英魂如在尚知未有久而不定之天也可陳宓贈直龍圗閣制勑具官某列聖以隆寬大公涵養天下敢言之氣故雖丗道波靡必有嶤然自見折姦萌而扶正論者爾風猷名相之裔學問諸老之傳刷行出政具有源委嘉定一疏朝陽獨鳴於萬喙皆瘖之頃憸壬禠魄而不敢肆頑鄙灑心而思自立何其偉也分符卑節挽之莫回樂道著書死而後已砥柱斯丗之功甚大進直淵圗仍獎厥子泉扄有知其識豫恨不同時之意可張柙中奉大夫致仕制勑具官某岷峨多竒士朕弓旌下招絯網略盡其不克忍死以須更化則囿於命爾抱材翹雋藴識超邁分教眉山適遭蜀變慷慨灑涕不草賀僞之表志節立矣入儀班著出最麾節方將滂洋厥施於盈科之後何返壑之速耶萬里搜賢于嗟靡及一階告第冥漠知榮可楊必復贈朝請大夫制勑具官某聖人有金城以守圄扞敵之臣能死城郭封疆也爾乘障文南不虞潰卒之涉境挺身諭告期革梟音雖披赤心竟蹈白刃望風棄郡紱而逃者冝知愧矣優加愍典超進華階仍俾丗延用旌死節可尤元龍贈通直郎制勑具官某尉以警捕為職盜發三衢爾能躬帥弓刀嬰其鋒而死之職不曠矣官之升朝仍録厥孤尚紓九泉之悲可趙與貌贈奉議郎制勑具官某靺鞨頃為不道犯我應山爾以户曹攝邑寄勇於徇國率厲戍卒輿臺迎擊之雖死於寡不勝衆而氣吞此虜矣旌之華秩用尉忠魄可宋昭逺贈通直郎制勑具官某鹽城之役飛芻走粟以餉師亦既勞止又轉致于山陽冝爾馬瘏僕痡而卒於行也官以升朝知豫閔恤可吳淵轉朝奉大夫制勑具官某漢管鹽鐵有官唐榷茶有使利源出於東南為多均通得冝經費用𥙿爾以儒術飾吏事以宰士贊邦計提綱管榷有條不紊一歲之入沛乎其􅑿既應懋賞之科冝進正郎之秩毋忘體國用對恩華可趙必法轉承議郎制勑具官某虜保陡山王師進討調度旁午陸運尤艱爾贊畫於計臺備宣勞於供億進升一列益礪廉勤可王子申落致仕除刑部郎中制勑具官某韓厥既老而禀政留侯道引不食榖而強起材足以為斯丗用詎容得謝爾操尚渾厚風致簡逺郡國選表再召再辭遂以垂車請幅巾林壑獨立氛壒之表固泊乎丗味矣朕訪西南人物於朝謂爾年耆德明精神猶未衰懷香憲部勉為一來霜峽放舟使觀者知朕能致華髮於萬里顧不韙歟可趙希昔除工部郎官制勑具官某朕日御便朝與二三大臣妙柬四方之雋乂登崇之乃眷西顧有公姓之老在爾秉心靜夷制行縝栗聲問蚤頴擢于政事之科晚守東川材益練政益美捐有餘以紓征調之迫家誦而人德之卷懷滋久宿望猶鬱握蘭起部冝不俟駕蜀之邊防軍實民賦吏治爾平日講之蓋熟朕將修輦過郎舍故事而問焉可辛稏潼川府路提點刑獄趙希濬䕫州路提點刑獄張起艮成都府路提點刑獄公事制勑具官某等東井法令所取平參下三星曰罰主斬艾分節司憲於參旗井絡之分加遴惟均爾稏丗傳威望身佩材名直指䕫巫姦宄屏息其進以典東川之獄爾希濬氣禀篤厚政術寬平共理眉山田里熙豫其升以司巴峽之臬爾起艮吏事詳敏邊籌精練出入制幕多所毗益其擢以亭西州之讞在易賁無敢折獄豐折獄致刑噬嗑明罰勑法皆有離象取其外剛而內明也然無欲者必剛無私者必明爾等果能以明用剛則數道之間吏之不良民之無告悉暸乎目擊矣欽哉毋謂君門萬里之逺可汪之強殁於王事特贈朝奉郎與一子恩澤制勑具官某魯誄賁父漢録孤兒閔死事也爾庀職淮幕密參機籌變起倉卒父子併命聞者悲傷之進官一等澤及遺孤營魂有知可無銜憾可楊伯雨除䕫州路轉運判官制勑具官某四蜀財計莫豐於大寧鹽策之入數十年來漕臣以羡餘濟苞苴囊槖無遺利矣朕欲變而通之故謹擇所使爾材甚頴政甚練可使治其職也一節起家六轡督餫擁牢盆之冨運算鞭之長輕車峻阪夫誰能禦然民力竭矣盍思所以𥙿之軍餉棘矣盍思所以濟之利源無壅上下阜通朕蓋於此乎課爾之廉能可王翔除直祕閣利州路轉運判官兼知利州制勑具官某寧武控梁蔽益夙號重鎮故必以漕兼守而制閫亦於此立莫府今閫外之制移梁閫內之制還益漕守滋重爾材茂而識逺志堅而慮密隴蜀山川之形勢兵民之便冝歷歷在目中玉節銅符采衆譽而併屬且木天寓直以華之委寄隆矣夫邊儲軍實以厚民為本農桑勸則食貨通田里安則保障固祁山斜谷之運與中和樂職之詠實相表裏爾其懋圗之可黎伯登除直華文閣知潼川府制勑具官某實材用則天下治堯舜三代循吏之效惟其務實不務名也爾莊靜不襮而篤求己之學廉直無華而堅為民之意自去周行屢牧壯郡朝梳夕􅐡不遺餘力用能害除而利興非善美充實之發耶甫出憲節隨卑藩符進以媯閣之直維東梓地巨望隆疇昔間以衮舄筆槖臨之非偏郡比布吾實德行爾實政使民𬒳實惠選表有日矣可國子録汪之道除諸王宫大小學教授制勑具官某朕寤寐雋髦以起治功日輪百執事入對便朝求其通逹如賈誼懇到如陸贄未多見也爾茹古而涵今弸中而彪外頃敷奏以言慷慨英發作興天下之勢鼓舞天下之材纚纚有契於心朕甚竒之楷模河間東平之系陶冶成人小子之質姑為朕往起視六合周覽群動朕方思所以訪爾者可大理寺丞趙薿除司農寺丞制勑具官某師行日費千金石城非粟莫守漢大將軍票騎之出所以必取給於大農也爾居家有孝謹之行治郡有廉靜之譽立朝有深逺之識甫丞棘廷又丞農扈夫豈輕進爾哉仲季分閫淮襄日講立武足兵之略一歲錢榖出入使爾與聞則軍國之調度供億塤篪交應矣且以示獎拔之權輿可趙崇濤直祕閣知遂寧府制勑具官某泝䕫萬而陸走穹山復嶺虎兕出沒涉武信乃趨夷良疇沃壄桑稻彌望坤維樂土也必填之良吏爾以信厚之質邁往之材行平易之政將指巴䕫灌輸阜通而民不病可謂良矣寓直中祕殿我巨屏旁制于四郡恩威兼濟辦治無難然元祐諸賢邦有遺像尚求聞於往行用康保民以表于蜀可李鋂差知嘉定府制勑具官某犍為古夜郎國漢定西南夷與沈黎俱置郡而地望敻出黎上逮為潜藩又加重爾璵璠其質豫章其材故家之最良也試郡于黎疚心邊瑣所陳便民事冝懇切而詳明知必良于政易鎮犍為昭示獎擢體豫不忘逺之意懋爾有常吉之行恩信並著民夷胥安則所至可紀矣可李艮孫知隆慶府李仲熊知紹慶府制勑具官某等劒門北扼棧道黔陽南控溪洞皆要藩也亦皆潜藩也守不輕授爾艮孫以敏劭之姿著關决之譽就擁劒麾駕輕車於熟路爾仲熊以駿邁之器養融顯之望趣綰黔紱發利刃於新硎孟子曰固國不以山溪之險險雖天設必以人固爾能䖍奉吾詔養民也惠使民也義則人心隱然可恃如金湯往哉毋忽可劉竑之改知重慶府制勑具官某蜀有耆壽雋直節著於慶元髙風振於嘉定落落乎其不苟合朕聞而賢之爾其季子也力學而修潔抱材而謙粹雍容氣度酷似厥考方需偏壘趣典名藩超等而授人不謂過而喜古渝之得賢守家法可想也益懋中和之治用昌詩禮之業可李景翶和糴賞轉朝議大夫致仕制勑具官某李悝平糴之法百丗可行也居是邦而習其俗則雖多易辦爾總蜀賦而歸優游家食以冨於才任我糴事年豐價平農固樂市積數踰億能無勞乎躐升元士之級尚知告老之榮可陳一薦屯田和糴賞轉承議郎制勑具官某羊祜墾田於襄陽至有十年之積豈一手足之力哉爾材髙莫府職涖耕屯當危機交急之秋收平時勸課之效迄充兵廩用濟邊功進升一級之華益懋方來之績可歸順周岊𥙷武功郎遙郡刺史淮東兵馬鈐轄制勑具官某朐山東峙密邇淮浦挈城歸誼爾實倡之莫非王臣超卑武級仍躋榮於遙刺俾參領於戎鈐祗服異恩勉殫忠力可李敏𥙷修武郎制勑具官某虜情叵測以間為竒爾戍安豐深察情僞不為利誘仍效戰多超授武階用旌知義可蒲南強落致仕差知茂州制勑具官某自筰以東北冉駹為大茂其地也六夷七羌九蠻錯處之俗猶有遺者置守必廉靜爾廉而介於守靜而恬於進踐敡可紀蜀士共推之詎容以據鞍矍鑠掛神武之冠耶起之里居往鎮汶水化浹于襏襫風行于旃毳不待按籌邊之圗而遐徼奠枕矣其母徒以遺榮為髙可楊恢除直寶文閣淮西制置副使兼知黃州制勑具官某奕莫先於審局布勢取勢多則勝局也江淮表裏分置制閫亦然爾乘塞於均宅牧於荆進屯於襄撫機應變之材愈出而不窮維時淮右風寒最切而齊安據山川之㑹峻直寶奎參領閫寄往為朕守中襄鄂升揚而立首尾聮絡非取勢獨多乎江漢之詩曰匪安匪舒淮夷來鋪又曰經營四方告成于王淮服砥寧則四方可經營也內繕諸關外嚴列戍懷來新氓綏定故境朕方倚重於汝懋哉可工部侍郎知建康府陳韡明堂加恩制勑朕搜儀先甲蕆祀上辛賦思齊之詩慕親方切稽我將之頌饗帝尤嚴恍三靈之宴娭遒百祿之來下有懷時彥冝錫神釐具官某學擅名儒望髙法從輪囷膽略吞青海於胸中磅礴威名碎黑山於掌上乃眷明禋之講迄臻熙事之成雖阻清廟之執籩靡忘宣室之前席爵爰升於蒲璧户仍衍於畬圭帝命式干九圍朕既荷受球之寵天威不違咫尺爾毋忘拜胙之恭懋暢英猷對敡景况可虞孝先特轉一官授朝奉大夫制勑具官某蜀關赤白囊交馳姦氓或乘間矯䖍為郡縣害去敗群之羊必良牧爾以長材選拔攝守閬川芟夷不逞封護善良千里絶桴鼓之警可無獎乎進階正郎分麾邊徼益厲精白以承可陳亞卿知德慶府制勑具官某古康名藩也邈在嶺海之東必習其風土諳其俗者為之守爾𥙿於材諝敏於事功自筮仕至試郡扶胥黃木之間熟知津矣藹勞能之可紀鬱瓌韞之未究起家分符往鎮瀧水其為朕布宣寬大之意簡賦平刑以惠逺民可牛大年以子病乞祠除直敷文閣主管建康府崇禧觀制勑具官某立朝而引去握節而賦歸殆不以冨貴利逹入其心者歟爾玉雪其廉明凖繩其平直卓有立於斯丗晚繇蜀道入儀郎省步武寖華矣而出駕四牡列城聳動顧浩然有歸志何耶父母惟其疾之憂天性之愛也爾以子諗朕重違之進班穹閣均佚釐館非朕之不汝以也尚培髙風用礪頽俗可曽治鳯除直徽猷閣知建寧府制勑具官某閩粵接壤比歲黔首失職相挻而動亦既砥定矣推吾德意燠寒飫飢以遂其欲安欲壽之情在賢牧守爾器識邃明材猷通亮所至以最稱宅牧畨禺恩信茂著一道晏然沉柝建安巨屏號稱難治其進直奎躔易地填綏之爾知閩之俗與粵近則燮友柔克彊弗友剛克何往非美政哉可沈安義辟差知冝州制勑具官某廣右郡二十餘或繚而深控蠻而枕海守慮人器之不相習也故委重於臺閫之辟爾賦材彊敏抗志駿偉二政長沙綽有佳譽辟函上於公車謂冝方闕守奉詔條以撫遐嶠莫如汝稱往哉毋鄙逺其俗而同其戚休山氓溪獠咸知德意是為舉能其官可鄧雲特轉武略大夫制勑具官某功之多者賞必厚爾江右捕盜山陽討虜皆以功受賞岡門鹽城又著竒功信能迪果毅矣躐進穹級參護戎旅毋玩寵榮而忘賈勇可留子邁救荒推賞轉朝奉大夫依舊潭州通判制勑具官某救荒無定法得其人則政舉爾試邑衡陽再講荒政既脫民於溝瘠又儲粟為先備朕惠養元元之意庶幾下逹矣升秩正郎二政大府益進民庸惟勤惟毖可王爚轉朝奉郎致仕制勑具官某官至貟外郎則賞延于丗必年勞乃克轉爾飭已無玷蒞官有聲方諗疾以少休遽遺榮而長往肆疇前績式進華階燕爾後昆服豫異渥可章謙亨除京西路提舉常平茶鹽公事制勑具官某朕選拔四方譽俊布列中外茍當其材用之惟恐不亟縱騁景靡過都歷塊乃見齧膝乘旦之良也爾業履正平材氣駿發能不墜其家聲擢繇轄院趣守壯藩未合竹符趣卑英蕩蓋欲及精鋭而用之維京右民力憊而未蘇財計屈而未𥙿出納斂散權之以義而行以仁惟爾之能可淮東路兵馬鈐轄桑青轉武功大夫制勑具官某于台之役大小三十七戰而城降士用命也莫府上功謂爾勇􅋧而敢戰冝受醲賞峻躋武級統戍惟揚報國赤心更觀來效可趙彥覃除直寶謨閣權知廣州兼廣東路經略安撫制勑具官某自唐以來殿南服者能使海嶺之陬既足既濡幾何人故宅牧必謹爾嚴於治己而不絶物切於愛民而不近名公族之英吏之良也起乘蜀傳卑冶節刀布之利方興畨禺課帥又輟以往為官擇人奚嫌數易夫貪泉不能汙夷齊之操固也以身為表州縣吏聞風皆趨於精白則遵海而南斯民安必樂業如中州矣朕蓋以廉頑立懦而望汝可翰林學士真德秀磨勘轉中大夫制勑用儒無敵奚拘考績之科彰德有常可後懋官之典矧承暉於蓮炬盍疏寵於芝綸具官某學冨而文醇行方而言正孟氏舍齊而去昔豈本心季子為魯而來今維衆望冠鑾坡而視草列氊厦以侍言展也開陳隱然禆益雖時行或異於時止而歲㑹悉歸於歲成稽課簿之既髙陟文階之冝峻食舊德從上吉也政資密勿之規有好爵與爾靡之懋對便蕃之渥可項容孫改差知順慶府制勑具官某果山朕潜藩也眷焉西顧未有以慰其父兄子弟思得良二千石以惠之爾林猷之偉事功之敏能稱其家者分符蜀道亦既鼓枻三峽易文以果地益大寄益重疲氓凋俗元氣未固視其戚休為朕風披而雨濡之使物物皆生意澤庶乎不下壅矣往哉盡乃心可李以制除大理寺丞趙師楷太府寺丞衛洙大理寺簿魏峻太府寺簿制勑具官某文帝明習國家事首以决獄錢榖為問仁儉一念之發也朕此意每於分職授任見之以制學業粹明心術平厚勾稽棘讞惟允故進之以丞廷尉洙莊靜有守寬夷無競則擢繇司匭為之簿師楷宗枝秀頴吏能通暢討論外計蓋熟故來之以丞外府峻風規􅈺整志尚簡逺則輟繇儲戎為之簿獄者生民之司命財者天下之血脉朕甚重焉爾等惟良折獄而不留獄惟正理財而不傷財斯副體仁行儉之意可朝謁八陵朱復之除軍器監主簿制勑具官某紹興間燾士㒟朝八陵之後今且百年朕祗承聖緒慨想中原未嘗不望嵩洛而灑涕龍庭橋山斂壒分道展省爾弗憚行駿極之勢氣如故歸陳梗槩若指諸掌克尉抔履之良勞俾勾稽于戎監胸中兵甲筆端戈矛尚於此培致逺之器可天水軍教授權知軍州曹友聞特轉承事郎權知天水軍事制勑具官某矯矯虎臣在泮獻馘此風無傳久矣爾奮迹詩書典教邊壘冦至不為先去之謀見義乃有必為之勇迎鋒鏖擊蜀關以寧儒而知兵良用嘉歎趣升京秩仍進一階就分保障之符增壯金湯之勢可吳馹特轉武經郎制勑具官某縠將中軍溱為之佐贊籌幕府每難其材爾從元戎備殫婉畫躋榮一列毋替忠勞可城固縣尉趙僎特轉儒林郎制勑具官某尉黃綬卑秩也苟志事功必露囊頴爾警于邊瑣克贊戎旃進秩旌能益勤勿懈可武功大夫湯孝信轉右武大夫制勑繁纓不如多邑弊袴必待有功况品級超越于拘攣之表具官某抱姿梟勇屢效戰多都梁之役援近比以祈醲賞雖礙止法亦進橫階豫豈爾私蓋以勸忠勞也懋建舟師之績仰酬異等之恩可川秦都大茶馬桂如琥除户部貟外郎制勑具官某尚書郎非民庸暴白不授矧地官之屬選髙而劇可輕乎爾將漕于䕫就建帥閫不苛急以牟利不矯異以干名刀耕火種之民悉安之朕惟榷牧卑節以示獎厲孰與入奏明光之為密式遄其歸贊我邦計凋窮若何而𥙿煩冗若何而節幣輕物重若何而權推此類具言之用觀爾韞可吳昌裔除太常寺簿鄭逢辰將作監簿制勑具官某等朕惟湯執中立賢無方故待天下之材未嘗以進士丗家為輕重爾昌裔氣明而文冨所謂江漢炳靈曄曄其秀者爾逢辰志立而器整所謂臺閣之儀不習自成者朕知其皆嶄然而角升昌裔于奉常以訂禮登逢辰于匠監以信度塗轍相望而簿正等臺萊𣏌梓盡在封植中其競厥職以對搜拔可陳授中奉大夫直敷文閣宫觀制勑具官某朕親攬八柄進退百辟以成調瑟之化苟爵於先甲當其材則申命之爾淡乎無欲凝乎有度藹乎聲稱江右繡斧之行雖未竟乃功亦既勞止增秩進職於更化之前今不與易也真祠均佚善刀而藏時方急材尚觀新硎之發可中奉大夫趙善璙轉一官回授本生父不卞贈承事郎制勑松柏不生於培塿而梧桐生於朝陽士君子可忘其本哉具官某故本生父某秀挹天潢評髙月旦是生賢息出繼同支屬進秩以旌能願貤恩而報本爰加愍典用慰孝思顯親揚名之榮衣𬒳九原矣尚歆承之無斁可中奉大夫趙善璙轉一官回授故本生母梅氏贈孺人制勑松柏不生於培塿而梧桐生於朝陽士君子可忘其本哉具官某故本生母某氏歸嬪宗磐蔚著閫範是生賢息出繼同支屬進秩以旌能願貤恩而報本爰加愍典用尉孝思顯親揚名之榮衣𬒳九原矣尚歆承之無斁可中大夫參知政事陳貴誼特授正議大夫守參知政事致仕制勑須股肱而治甫新萬化之更乞骸骨而歸俄惜一賢之老晉加異數渙播明緍具官某寬博而川涵凝重而山立道貫六學足以羽翼乎聖傳文成一家足以經緯乎國典蚤華塗之遍歷亟邇列之延登𥙷衮於有闕之時而胥訓居多改弦於不調之後而同寅更力允天民之先覺蔚王佐之全材况休然而有容且淡乎而無欲冝其俾艾胡爾遺榮維楫未施朕方念乘航之勢輻輪俱壯爾乃為稅駕之圗眷委倚之素深惜訏謨之未究趣升峻秩仍拓真畬九老自娛孰與繪樂天之社五湖莫返尚思鑄范蠡之金可陳章特授中大夫致仕制勑具官某幼學而壯行者在所立生榮而死哀者在所遇爾制行寬夷蒞事明練荐更共理之寄民熙於田野士競於庠序蔽芾猶未拜也方祝釐而自適遽謝事以長逝進躋崇秩用答宿勞朕之待臣下可謂有恩矣營魂如存歆此禭典可僞觀察副使顔仲明僞都總領王逸僞徴仕郎化平縣令胡士元僞徴仕郎單公履僞明威將軍鄭彥僞將仕郎尚書户部任嘉言僞都總領亢志忠僞安平都尉張林僞宣武將軍安居信僞明威將軍晉德僞武節將軍同進僞同知􅉑州軍州事聞鈞僞徴仕郎王采苓僞登科人尚書令史朝列大夫陳紀並𥙷承信郎僞朝列大夫郝士特僞都尉劉儀僞昭毅大將軍楊全僞定逺大將軍郭春並𥙷承節郎僞光祿大夫張俊特𥙷忠翊郎制勑具官某等王者大一統際天所覆孰非吾臣爾等效官外域歸誼中朝授之右階拔干左祍其相與竭忠以報上可故正議大夫守參知政事致仕陳貴誼特贈少保資政殿大學士制勑抗章太紫之北歸志方新占象尾箕之東遊魂巳逺乃眷謨明弼諧之韞未究輔相彌縫之功茂錫恩徽誕敡命綍具官某學根乎正大氣備乎中和德盛禮恭謙九三君子之美義方敬直坤六二大臣之風自儀禁路之華趣踐政塗之重了無緇磷具罄猷為欲仁而仁斯至則無念非公不言而言必中則有謀斯斷屬更大化共振頽綱三千惟一心正賴蒸徒之助五十不稱夭遽驚隆棟之摧惟慶曆之仲淹暨元祐之蘇轍用俱不盡命尚奚尤萬金之藥雖施何嗟及矣十漸之屏猶在如將見之欲紓殄瘁之悲庸侈褒崇之典位外朝之列棘班祕殿之鴻名噫亮天功而弼一人詎止書棺之寵質鬼神而俟百丗永為銘鼎之光極而生死之榮歆我始終之遇可金部郎中黃壯猷除直祕閣權知紹興府兼浙東安撫制勑具官某㑹稽東南巨鎮中興百年之馮翊朕之豐沛也吏治剛則甈柔則坯故牧守以識體為良爾韞姿融明慮事精密間者攬轡左浙政得寬猛之中朕深知之輟自望郎出殿帥閫中祕寓直擁髙牙大纛而東豈特以華舊部之觀哉書曰以厥庶民暨厥臣逹大家又曰康濟小民率自中德禮刑政導齊有序而上下相安於和樂體斯得矣重楮幣而輕和買抑思乃言之踐可彭協贈承信郎制勑具官某勇士不忘喪其元義重於生也武休之役爾挺戈陷陳效死封疆而賊氣奪可謂勇矣荐升武級仍録孤兒英魂有知歆戴無憾可歸順人王青劉天山米興王庭李思齊門清劉全魏師愈王瑜李𥙿范天保並𥙷保義郎制勑具官某等王者大一統際天所覆孰非吾臣爾等效官外域歸命中朝授之右階拔于左祍其相與竭忠以報上可平齊文集卷第二十一
