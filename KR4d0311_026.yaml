front:
  text: 平齊文集卷第二十六
  hash: sha256:0448b2f428a8126e2b9879041e2762b9152bba37457ebe0ea38e89bcc78bffd3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0311_SBCK_026-1a}
body:
  text: 啓三賀鄭丞相啓伏審揚廷渙號宅揆奮庸天開聖人揭大明於積隂之後帝賚良弼興霖雨於久旱之餘九鼎尊強萬殊闓懌竊以慶曆之進杜正獻盡革弊端元祐之相司馬公力回正論凡其變則通通則久本乎定而靜靜而安聖上始親於萬機朝家大整於百度追還盛觀允屬真儒恭惟某官秉粹而履方造博而守約黃裳文在中也道傳往聖之宗緇衣敝又為兮身繫衆賢之脉蚤勸𥘉潜之學蔚為大任之儲淵源養蒙羽翼出震六龍御天而萬物覩依乘最先九鰲負地而四極安扶植更力肆增隆於上婘亟入贊於中樞密勿引𥚑雍容𥙷衮避權逺勢𥘉無冨貴之心合意運籌自契明良之㑹覆金甌其久矣登玉鉉焉遲之播一朝希闊之麻開幾年壅塞之路昔妖星示變除舊之兆巳萌今瑞雪應期作新之慶可卜兩全文武之憲獨斡中和之機惟國事總總乎其方殷而民情喁喁然其更切决否泰之消長在乾坤之轉旋平輕重於一舟丕展濟川之略寄安危於八柱迄成支厦之功以福華夷以壽社稷某霜途易蹶冰谷難春夙蒙鑒賞之殊快覩延登之盛調元有道坐培上甲子之休播物無垠早吐雌丙申之氣踴躍胥慶編摩曷宣禮部郎官謝廟堂啓九年去國甘從西崦之耕一旦起家遽草南宫之奏大明昭揭於積曀之後妙造潜回於沍寒之中脫跡沉淪委心坱圠伏念某天姿不頴丗諦更踈虎負嵎莫敢攖徒奮直前之氣鹿走嶮何能擇了無善後之謀寄懷抱於倚楹付光隂於面壁低徊空谷展轉窮途蠻素掉頭早厭香山之老雍端拍手亦嗤栗里之貧間意行而覔詩率危坐而讀易忽逢隂剝遂與陽升牢落馮唐尋青綾之故步摧頽禹錫訪瑞錦之新窠久湮焦榖之芽頓吐寒灰之熖俯仰自省生成有歸兹蓋恭遇某官道包元功心契真宰伊尹舉而不仁逺矣選衆惟公臯陶歌而庶事康哉知人尤急孰觀否泰往來之運密轉乾坤闔闢之機大姦朝鋤衆雋暮拔謂鵲巢可窺而鳯凰集駿骨既市而騏驥來憐其數竒開以寸進某敢不敬佩隆眷加鞭後圗白首為郎敢嘆桑榆之晚丹心報國更祈松柏之堅回薛觀文啓恭審升華祕殿均逸殊庭六子之佐乾坤功成斯退八還之玩日月宇定自光几几雖新巖巖維舊恭惟某官吏師一代王佐兩朝問方略之丗家自唐浸盛練制度之人物視漢略同三十年密拱於修門一萬户肇開於大國倚成方切引去何輕野梅官柳之坊路喧迎騎流水青山之屋門繫歸艎兒孫出萬卷以披吟父老散千金而燕集移閶闔衣冠之夢為園林鍾鼓之盟陽羡買田拍塞秧疇之雨惠山試水颼飀茶竈之風誰為公謀使有此樂某猥馮容度輒犯顔行吕獻可固得罪於荆舒文潞公𥘉何尤於質肅想見幅巾蕭散訪疇昔之釣遊願言列鼎舂容享方來之耆艾回程內翰啓伏審均逸珍臺升華穹閣人材凋落之久上深念之天運轉移之新公嚮用矣漸所以進泰於此占恭惟某官九垓隆名五嶽全氣伊川明道而後獨傳正宗野處平園以來復見老作蚤從龍尾直上鰲頭扶日之功未酬偃月之機已露方奪萑苻之氣遽尋花竹之盟司馬公之流水青山姑從獨樂歐陽子之茅簷凉簟尚想玉堂雖出處了無纍於吾心然安危豈遽忘於斯丗冝膺蠖濩之眷趣進凝嚴之班與造物者游益培夜氣後天下而樂亟告辰猷某狂編虎鬚窮卷龜殼追十年之夢寧傲宰相而不敢傲翰林叨一日之逢難為諌官而猶使為御史蒙恩莫稱請誨無從所願君子之彚征庶幾吾道之浸長元祐之詔大老峩冠而來慶曆之頌名臣執筆以俟卷卷有屬纚纚奚殫中書舍人謝丞相啓歲星之犯執法前數夕太史奏歲星犯中執法公果出臺猥干憲府之誅帝座之拱紫微驟玷詞垣之選觀君相之深意知乾坤之厚恩竊以為治莫重乎紀綱之張用人尤患乎意嚮之轉拱辰一網君子之氣遂衰之邵兩來小人之勢斯逞歷考往鑒寧忘隱憂伏念某髮種種其絲棼心怦怦乎繩直歐陽余靖列在四諌每懷聖德之詩王衍盧𣏌合為一人欲著辨姦之論適改弦而更始偶簮筆以居先議論不足以聳鳯凰之鳴風力不足以快鷹鸇之逐第潜觀於機括慮或撓於規摹景祐一不肖之來大圗搏噬熙寧三舍人之作孰效鉗槌去稂莠所以養嘉禾剃茅艾所以護芳草獨奮一擊衆觀四驚或疑面前行路之未寬或怪䄂中彈文之太早勇為國計奚暇身謀奉帝勑而傳霹靂之符何難驅鬼仗佛力以運金剛之杵自可降魔雖閣門不隔於交章而臺院俱成於退舍彼姦既折此志還伸立五花之磚甫軒眉於旬浹扈六飛之蹕遽蛻骨於須臾黜轉而升榮忘其辱兹蓋恭遇某官吾道砥柱斯文津梁遜直諌如元齡之佐唐去副封如魏相之興漢謂保合善類必去敗群之羊而修明大公何愛溺井之狗辨薰蕕之殊氣培𣏌李之深根俾京尹授館以使留許詞臣遜闕以見處宣昭實意安集危蹤續翻紅芍藥之吟莫知稱塞占澄碧琅玗之夢終托生成銜戴輪困刊摩梗槩回趙制使啓恭審上思東略公請西征以文昌八座之尊總元戎十乘之重江淮增氣關洛屬心恭惟某官文武兼資忠孝兩盡西平父子悉如飛而如翰慶州弟兄抑非彲而非虎挫狂虜於指顧之下平逆雛於笑談之間功歸一家名震四海正佩甘泉之槖又分細柳之弓幼度却符堅於合肥風聲撼塞公瑾破曹瞞於赤壁雪浪翻江中莫府之宏開外提封之盡護不求一勝必出萬全東夏口西武昌規模既定北羊腸南伊闕經略何難大奏愷於前茅永垂光於汗竹某搔頭白雪引睇赤雲竹樓之記猶存徒懷清賞桃林之詩可作尚賀元功回楊侍郎啓竊以南臺執法未輸折檻之忠西掖代言遽獻斫窗之醜蒙恩超越揣分凌兢伏念某蚤坐排根久成流落窮懷不奈每嗟煮鶴之琴老氣未衰尚愛擊蛇之笏天適開於日月地偶借於風霜了無回川障瀾之功僅有去莠護苗之志方奮前而抨擊忽踵後以褒遷觀象門深浹日之留已幸翔鸞閣靜半生之夢還驚取數過多揆元有自恭惟某官聲諧笙磬佩襲璆璜閙裏掉頭耿耿髙時之操間邊䄂手卷卷憂丗之心念善類之相扶欲頽風之復起遂令泄辱亦轉光榮詩到蒼苔寄宦情之淡泊帖來青李佩交好之綢繆占報斐然垂察幸甚回趙婺州必願謝忠定配享劄子恭惟先正忠定太師周程粹學文冨精忠龍夾日以飛定神器於危疑之頃鰲負極而立安盤石於指顧之間𥘉罹偃月之謀終墮浮雲之計逮更聖化始記功宗侑食原廟之廷圗形容臺之閣阿衡格于上帝雖音跡之莫追周公祭于大蒸迄英靈之如在旗常增耀簡䇿騰芬某濫厠周行聳瞻盛典知臧孫之有後冝文子之作原爾祖與享之已著丹青之信斯文未喪也更堅清白之傳贊抃良深敷宣曷既略此酬謙施之辱切丐紆察回趙制置葵謝忠肅賜諡劄子恭惟先正忠肅太師學問以母自欺為先踐履以不逺復為主胸吞八九雲夢浩乎無涯腹有數萬甲兵用之不盡擁師千於江漢控戎索於關河以頗牧之籌修羊陸之政屯田之奏則營平之逺略出師之表則孔明之精忠收績前茅垂休汗竹邊有雲中之警上興巨鹿之思灑寶墨以疏恩易美名而一惠光流宇宙聲撼華夷是皆曹武穆之將家范文正之儒裔克傳丗業深結帝知故能顯揚於無窮于以侈大其有子某聳聆盛事倍激懦衷方圗羾於柔緘忽首勤於珍翰執謙良過抱愧為多排紛控賀不莊仰丐台察除禮部謝丞相劄子某恭惟聖上親萬幾之𥘉賢相宅百揆之始大明昭揭公道宏開群隂見晛而雪消衆正連茹而茅拔融歸皇極扶立太平某去國九年奉祠再歲自謂窮途之老死不圗大造之更生抱舊直之青綾趍新窠之瑞錦孰云起廢有此叨榮某官監其愚而無它腸愛其懦而有立志以恤窮悼屈之念為噓枯吹生之仁首加招徠使脫沉滯動八十親之喜寬數百指之愁踴躍而興糜捐以報然念禹錫十年待文昌之相始授此官溫公數月趣東坡之還乃居是選豈繄晚學可跂前修伏望鈞慈憫傷弓之心危察墮甑之氣索收還誤渥改轉真機賙其甔石之家授以斗升之壘一飽養志三熏戴恩謹此控謝併布其衷仰祈鈞察答吳總卿劄子某九年擯去玄都之樹已空一日喚回少林之壁忽倒若有相者夫豈偶然某官功名鼎盛之秋意氣相期之素謂荃蕙化為茅久矣尚復何言而桃李自成蹊有之不須多慮每對酒而憶太白必褁飯而問子桑更加牙頰之春欲起頭顱之暮昔耕今穫彼竭此盈竊自考其平生曽不滿乎一笑方趍郎舍忽𬒳郵籖論復如前固待以唐質肅之舉節難保晚正恐如韓忠獻之言倚須公歸共論此事伏丐丙照答葉子真劄子某九年坐廢翟公之門欲冰一旦謂來馮唐之首巳雪方群振鷺忽點棲烏作之髀肉久消之餘置諸夢想不到之地莫知稱塞第劇凌兢足下氣雲升而川增文水湧而山出念嘗交訊知可論心方從九芙蓉之游特貽百車渠之帖首勸之以劉元城范希文奏疏繼戒之以王彥霖朱光庭䇿題推車惟主於行乘舟毋偏其重卷卷一意纚纚千言期頽風之復興使懦志之有立把玩不巳感藏可知此去凡可以警䇿其不逮毋惜陸續平齊文集卷第二十六
