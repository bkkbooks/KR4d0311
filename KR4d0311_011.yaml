body:
  text: 針緝熙針并序臣月正元日皇帝陛下御大慶殿受朝朝退中出奎畫詔增𥙷講讀官夫天下之務衆矣而學為大故二典莫先於若稽古陛下襟道佩德軌堯矩舜履端於始典學是崇豈特漢丗重席於正旦以華觀聽哉虛心遜志日再御緝熙延見儒臣峩冠垂紳魚雅就列凡皇王帝霸之所以治天地民物之所以立莫不聚辨居行以進乎罔覺臣寡陋不足以望日月之末光躐升勸誦榮燭縑簡退惟恭在責難敬在陳善輒效虞人官針王闕謹拜手稽首裁减一篇昧死塵獻于進讀之始文詞骫骳而毣毣寸忠日以髙明光大望陛下伏惟聖慈特垂采擇其辭曰灝穹生民作之君師中立一身宗主兩儀仁在自弘敬在自約剛在自克明在自覺蓋尊莫尊於德性微莫微於道心正能養於蒙則如泉之始逹欲不窒於損則如澤之彌深是以大學止於至善中庸必謹其獨凖繩規矩檢百為於將動盤杅几杖收一念於未逐惟定可以澄萬化之源惟虛可以來萬善之益惟博易可以培人材之氣惟寬靜可以𥙿民生之力五事乃饗帝之本九經實用丗之則關雎麟趾之意存則王政舉常棣葛藟之義明則天彛植此帝王所以正心而修身齊家而治國彼惠而姣臨春昭陽豈不爾思伐德之鋩彼醲而郁糟隄肉林豈不爾思傷生之鐔况淫樂者志必荒沈湎者氣必昏前靡顧乎太華之壓後遑恤乎滄溟之翻以四海大命供方寸之侈以百丗惡名易一息之歡胡不思天命之不易王業之至艱欽哉母謂天髙厥鍳匪近相在爾室莫見乎隱母謂民卑其聽易欺鼓鍾于宫莫顯乎微故清燕而居必如駿奔在廟之頃嚮晦而息必如辨色視朝之時所觀貴大母梏於隘所慮貴逺母局於淺母功之徼維莠驕驕母利之涸維木濯濯母名之慕而實之棄母才之尚而德之遺母任賢而二母去邪而疑母愛直而疏母喜正而違事母輕於舉而中畫令母易於出而遽移優游則威權遷姑息則紀綱壞牽親故之私恩則虧人心之公玩左右之小慧則纍君德之大以至舟偏重則失平藥泛試則徒快朝不和何以和於野內未治何以治乎外是皆有國者之通患願治者之深戒於戲道自學而入治自學而出思王度於祈招知稼穡於無逸惡旨酒好善言三王四事之樞要放鄭聲逺佞人四代禮樂之根極行必力行積必真積小臣詔讀敢告執㦸好軒針典午稱好不與物忤其圜外方中者歟稽之三代直道則未也子斐名軒之意不可不針人心如面醜妍異姿譽醜為妍嫫突西施丗道如樂雅淫異曲指淫為雅韶遜桑濮離婁師曠惟明以聰阿邑莫辨塗耳目同如好好色大學所貴懷我好音詩人取義理有攸當孰謂其誣而或反之非欺則諛以言餂人君子不豫隱惡揚善聖人所許侯魯男子善學展禽欲師德操斯軒斯針銘可齊銘子斐佳公子篤學好修詞葩而履方以可名齊玉堂老仙記之某贅為作銘仕止久速始終條理中清中權我則異是繄聖之時天地相似賢希乎聖考祥視履諂驕不作端木所喜簡以自將子桑伯子事稽厥冝不啻足矣欲進乎道尼母以柅樂而好禮如金就砥敬以行簡如弓矯矢任重致逺其謂斯士盤洲有孫玉雪蘭芷垂髫拱立一語提耳挾山超海不可則止我與聖賢相去半跬為所可為如詘伸指勿謂僅足稅駕旋軌光昭前聞銘在齊几三研銘瓦得之梓潼令端得之五羊醫子石得之天目黃冠叄銘之艮其埴坤其閾坎其洫蔡而墨之離其食金聲而方玉紺而章洸洸乎泱泱乎三代禮樂之藏割􅉳龍之膽剖玄鵬之卵霆耶風耶此其管蠖室銘室在聞復閣衡維摩方丈五去一從半之三面禇屏闢左牖以受朝陽之光孜禪作也余為名以蠖今二十餘年矣而間居讀書其中似非偶然者不可不銘銘曰天地四維八尺之璣日月兩耀八尺之表中立吾身宇宙而人心統元識胚腪太極有室衡尋此身此心如璣之斡如表之臿屏密牖明體舒氣平其處也眇其運也杳萬古在前後千億年六合為大微一塵芥悉受以虛不缺不餘溥通妙用縱橫錯綜屈必有伸所致者神伸必有屈所養者德屈伸相生天命流行維欽厥止青山在几端齊銘王孫保之丞臨安有廉靜稱與余篤相好也滿别為言先大夫蚤以端人為過庭訓荏冉四十餘年矣心之所存身之所履未嘗不凖於端日營一室􅍥父書其中將歸而熟讀益求所謂端者子盍為我發焉余􅋏然有感於切磋之義遂為之銘曰猗君子兮身端行莊以端為符詔子直方義以方外內主乎敬敬勝百邪何適非正容色辭氣所貴者三日省厥身居與道參視聽言動所勿者四日用其力欲仁斯至冨貴利逹孰無是心所不可為枉尺直尋貧賤困苦夫豈其願所不可悔任重道逺無餒則大無欲則剛萬鍾一瓢緼𫀆繡裳太山積雪蒼松鐵色黃河怒濤孤峯斗立維古端人悠悠我思惟今端人尚其似之聖賢參前一室環堵母二爾心受天之祐阮逢時淡庵銘人統氣形中涵太冲不將不迎虛靜明通物誘而遷逐外忘內天理人欲彼進此退有醴其醲勢利之酣有飴其美聲色之甘飽心生疾快意起競能寡其欲自還所性盎乎春融寥乎秋清靚乎深淵汨乎大羮脫機削械未散之朴郤紛屏華可久之約朋來斯孚匪密匪踈事至斯應匪亟匪徐左圗右書前槐後竹明月在池白雲滿谷琴入希微詩造和平神怡體舒赫胥大庭以此事先以此燕後鄙聞而寬薄見而厚噫委命則恬任理則真收斂則敬警省則仁方寸寧極萬象化醇味此無味名其實賔龔時俌庸齊銘皓穹生民秉彛好德本體明清實用平直耳目口鼻此性形色仁義禮智此心知識父止父道子共子職鄉黨恂恂閨門翼翼是為天常亦曰帝則無哲無愚無今無昔雞鳴而起向晦而息夏葛冬裘渴飲飢食順而循之如水就濕背而反之如木倒植夙夜匪懈如穎斯栗旦晝或汨如皎斯蝕秩叙諏謨信謹稽易學為入門敬是居域無事而擾凡夫擲埴與時而中君子安宅體認要精踐守貴力行著習察有舜無跖經名而廬慈湖名其母夫人墓廬曰天經庸名而室允蹈斯義勿問元吉鶴巖銘東天目支峯曰雲鶴巖雲冒其顛輒雨鶴未嘗見也壬戌春群鶴見某叨奉常第己卯秋再見子有翁冠鄉選夫豈偶然哉翁所居與巖直因以鶴巖自命昻昻中林奮為時瑞巖瑞翁耶翁瑞巖耶銘曰天作髙山東西兩目虬潜西淵鶴盤東谷枕西之沱宅東之阿與虬委蛇與鶴婆娑鶴禀乎陽維君子性清哉伯夷浩然鄒孟鶴遊乎隂維君子居顔氏陋巷孔明草廬導陽而鳴九霄咫尺脫隂而升萬里瞬息在易後天尻坎頂離葆此純白觀象玩辭贊老人壽容贊徹也禪葆也仙靜也淵全也天崔先生壽容贊清獻之清忠定之定杭海健帆燭天老鏡白李韓柳贊壬午春行劒利萬山中乞漿野人家小憩見壁間唐人像四頗有思致扣所從來主人謂探籌得之遂售于我四君子聲名俱震耀一丗俱以事貶香山昌黎還為名法從柳州竟為蕉荔留太白且騎鯨不返矣中苟無愧讎我者豈能終病之少餒焉好我者不能翼而奮也人耶天耶戊子夏五西市暴梅因太息為之贊忠南夜郎零陵潮陽地何凉凉人何堂堂如星在天垂精耀芒隕而為石桀立不僵如水行地茫乎望洋激而之山噴薄淋浪不縮不張不軋不揚繄人之鬱斯天之昌理有消息時有通塞禍同福殊剛柔異則柔必有麗剛能自植剛窮斯返柔窮愈窒否終則傾屯終則泣剝終碩果坎終叢棘士寧剛躓母坐柔踣吾以四子占終於易東山渡水布袋贊半進半退是罥是礙且請老師放下布袋蜀繡轉經觀音贊觀丗間音非丗間音非丗間音觀丗間音咦一卷旁行雙點􅃮無人識得老婆心昭君贊彼姝者子丰兮孌兮懷我好音邦之媛兮今夕何夕而恍此見兮雖然賢賢易色可也莫愁贊美目盻兮清揚婉兮悠悠我思室而逺兮還豫授子之粲兮雖然好德如好色可也鍾冠之出山佛贊聞何法來為何事出放妙光明作大饒益題子馨弟寄容髯星星而氣腴眉垂垂而意舒易足而寡求危坐而深居此吾家之少游幼輿也聽風雨於對床約雲山之卜廬朝奉親而撰屨夕課兒而讀書吾其歸乎雜文兩漢詔令總論自典謨訓誥誓命之書不作兩漢之制最為近古一曰䇿書其文曰維某年月日二曰制書其文曰制詔三公三曰詔書其文曰告某官如故事四曰誡勑其文曰有詔勑某官此其凡也䇿有制䇿詔䇿親䇿勑有詔勑璽勑密勑書有䇿書璽書手書權書赫蹄書詔有制詔親詔密詔特詔優詔中詔清詔手筆下詔遺詔令有下令著令挈令及令甲令乙令丙諭有口諭風諭譙諭宥罪有赦訓諸王有誥召天下兵有羽檄要詰有誓約延拜有贊以致有報有賜有問有詰又有手迹手記詔記其曰恩澤詔書寬大詔書一切詔書及哀痛之詔隨事名之此其目也䇿命簡長二尺短者半之以篆書罷免用尺一木兩行以隸書遺單于書牘以尺一寸選舉召拜亦書之尺一板古今篆隸文體曰鶴頭書與偃波書俱詔板所用在漢則謂之尺一簡詔書有真草又有案案者寫詔之文一扎十行細書以賜方國扎牒也孟康曰漢𥘉有三璽蔡雍獨斷曰天子六璽皆白玉螭虎紐輿地志曰漢封詔璽用武都紫泥故制詔皆璽封尚書令印重封唯赦贖令司徒印露布州郡詔記緑綈方砥用御史中丞印通官文書不著姓司隸詣尚書封胡降檄著姓非故事詔書皂囊施檢報書緑囊密詔或衣帶間丹書藏之石室策書藏之金匱此其制也漢丗代言未設官王言作命厥意猶古而討論潤色亦間有其人髙后令大謁者張澤報單于嫚書淮南王安善文辭武帝每為報書及賜常召司馬相如視草光武答北胸奴藁草司徒掾班彪所上至永寧中陳忠謂尚書出納帝命為王喉舌諸郎鮮有雅材每為詔文轉相求訪且辭多鄙固遂薦周興為尚書郎秦少府吏四人在殿中主發書謂之尚書漢因之武昭以後稍重張安丗以善書給事尚書囊簮筆事武帝數十年後漢始置尚書郎三十六人主作文書起草月賜赤管大筆隃麋墨此其造命之原也詔御史大夫下相國相國下諸侯王御史中執法下郡守制下御史御史大夫下丞相丞相下中二千石二千石下郡太守諸侯丞相從事下當用者如律令郡國長史上計丞相御史記室大音讀勑畢遣以詔書部刺史奉詔條察州所察母過六條守令則承流宣化使田里咸知上意此其奉行之序也君能制命為義臣能承命為信君不能以義制命則無以使人心丕應惟命之承故夫夜下詔書決之亟也甲寅書報應之疾也母下所賜書幾事密也封還詔書渙號不容於輕出也更報單于書辭令不嫌於修飾也六月甲子詔書非赦令皆蠲除之雖反汗猶愈於遂非而稔惑也有司母得言赦前事所以示民信也䇿書泰深痛切君子作文為賢者諱所貴乎體之識也昧死奏故事詔書二十三事所重乎祖宗良法美意之得也璽書封小詔書獨下抑不可不慮其賈疑而召激也案尚書大行無遺詔詔書獨臧嬰家及安得詔書封三子事姦隱於倉卒詐售於危疑尤有國者所當謹察而不可忽也知此則知所以造命知所以造命則知所以奉行矣然有不敢奉詔者有期期不奉詔者有以死爭不奉詔者有詔數彊豫然後奉詔者猶或許之蓋所以養士氣也若其奉行不䖍則有常刑故廉問不如吾詔者以重論敢有議詔不如詔者皆腰斬詐詔者當棄市格詔者亦當棄市矯制者腰斬誤宣詔者應罰金令下腹誹者論死誹謗聖制者當族謂詔書不可用者丞相御史劾之無承用詔書意者御史奏之而奉詔不謹者皆坐以不敬丞相𬒳䇿書則步出司農發詔書則鳴鼓其嚴如此當時猶不能盡然始而奉詔不勤終而遏絶詔命始而嬌䖍終而擅詔以至詐下詔書詐作詔板僞作璽書假為䇿自書詔以授廉級陵夷紀綱板蕩而國命之柄移大抵外戚宦官之禍闔闥稱制實胚胎之有天下者可不鑒哉按藝文志儒家髙祖傳十三篇髙帝與大臣述古諭及詔䇿文帝傳十一篇文帝所稱及詔䇿當時㑹稡蓋有其書遷固必采取諸此先漢詔遷多以上曰書固間因之一詔或二三出詳略及用字亦有不同疑不能無刪潤髙帝未即位遷不書詔惟重祠敬祭詔見封禪書景帝紀遷不書詔其議太宗廟樂舞制詔附見文帝紀文帝於陳武等議謂且無議軍見於律書當亦是詔固不書後漢詔有以東觀漢記漢名臣奏等書見於注其改詔為制為誥或謂避武后諱丗祖官王閎子詔附見董賢傳曄書逸之大氐史遷所筆皆有深意固文贍而意不逮曄則文亦不逮乎固矣某假守龍陽俗古事簡因得縱觀三史裒其所謂詔制書䇿令勑諭報誓約之成章者凡若干通事著其略每帝以臆見繫之釐為若干卷揔曰兩漢詔令以𥙷續書之亡欲觀漢治者當有考於斯文八陳圗說庚辰秋余以太少贅丞入蜀天台許才甫偕行小至後維舟魚復灘下散䇿同訪武侯之遺跡霜風凛晴寒浦縮潦平沙壘石歷歷可數知其原信出於易八陳魁六十有四重易之卦也却月魁二十有四作易之畫也畫起於圎而神故却月之形圎卦定於方以知故八陳之體方方居前而圎居後卦自畫始方自圎生也壁門直袤曲折翼其旁則隂陽二物握竒則有虛一之象焉丗之言風后握竒經者徒知四為正四為竒餘竒為握竒又徒知數有九中心零者大將握之而不知握之在何地余記步入八陳深處細視魁間平沙之上沙隱起如兩大帶直袤曲折具壁門之體而微竚立環睨正居衆魁之心而虛其中餘竒所握其在兹乎况壁門東向歸峽此則其門西向涪萬出機入機又有不可測識之妙江流湯湯歲月浩渺彼石所壘不為衝波怒濤轉移巳非人力所及此特微沙相屬亦爾儼然如新抑異矣武侯之忠上貫三極下洞萬古山靈川祇所以護存至此正欲後丗即其虛實向背推見至隱而知侯之用心談古者按圗而不及暏訪古者撫境而不及察往往能言八陳之異同而大將中握遊軍外布曽莫得其指要余每為之太息才甫出蜀今十年考訂圗說用力久而功深天機地軸搜抉呈露莫不精確而有據依其於壁門之設先出遊軍定兩端尤得諸賢未發之藴展卷熟覽恍然如對鹽甲因發握竒居中之義以表裏之且詡吾賔主西征之不為徒行也漢磚考三代墓中欵識用銅偃師比干墓銅槃是也漢銅禁嚴始易以磚至晉唐亦間用磚潜人耕鑿多獲晉磚紹定已丑秋校長謝濟叔源治墓東塢得漢磚七十六面橅脫螭虎文隱起上下為字十有四曰元康元年太歲在丙辰何遒貞立墓去今千二百九十四年矣案史記歷書用太𥘉曆太𥘉元年歲在焉逢攝提格甲寅也元康元年尚章大荒落則癸已漢律歷志用三統曆太初元年歲在星紀婺女名困敦乃丙子也推至元康元年則丁已惟通監舉要曆與磚合磚其年造志後來追書以磚證志當是元封六年冬改元用夏正建亥以後猶丙子建寅即丁丑越四十年至元康𥘉元為丙辰也或疑遒為􅙤貞為正謂漢仍周官置酒正周禮酒正注􅙤音糟又子由反固不為無據然周漢官名有酒正宫正軍正宗正皆為正不為貞若月令大酋是秦官正避政為貞則秦紀注正月為征不為貞漢隸之繞或從三點兼遒字下畫稍長非􅙤明甚隸法用筆上出下鈎故與從草類其實名遒字貞立也遒與貞立義頗相關以􅙤貞為酒正鑿矣磚徑一尺五寸廣五寸半髙二寸叔源以二見餉因考之勸農文龍陽萬山環合控引氐隴去朝廷無慮七千里聖天子仁不異逺俾太守自東南來牧是邦太守山中人也熟知爾父老安於山為可樂然地勢峭隘土脉磽瘠非刀莫耕非火莫種細民終歲勤動不得一飽至煉以續朝夕亦良苦矣故不患爾農之不力而患乎爾農之蠧夏熟秋成公租私債未暇問長于耆保者取之胥于邑里者取之雄于閭黨者取之隸于坊場河渡者取之召集有定期裒斂有定數怒攘笑攫不厭不止其獲登于爾瓦釡土鉶有幾此農所以重苦也太守以牧養細民為職爾無患所以蠧爾者而益力于農冬至元正晴和臘未盡一日得雪立春開霽其占為豐年于耜舉趾母後爾時深耕易耨母愛爾力母徇小利逐末母肆小忿啓爭以荒爾業天時既順人事又力冝爾百榖穰穰有秋雞豚燕社歡浹鄰里仰事俯育優游卒歲又家推其秀子弟使力于學孝悌修明風俗淳古太守與爾父老同此樂也可不勉諸大人里居上梁文天目山前兩乳拱帝王都玉川城裏數間占神仙府規摹仍舊氣象增新谷隱老人萬事任緣一生守分焚香讀易老去之意已消把酒賦詩醉來之興不淺雖烟雲自足於别墅而風雨不堪於敝廬久懷問舍之心忽有肯堂之請拔貧作冨搜材𣏌梓之林培下就髙拓址蘭荃之圃門前流水屋上青山可容髙車駟馬之歸可受玉帶金魚之謁修梁肇舉好語歡傳東家近祥雲杳靄紅千古溪山鍾秀氣一庭梧竹貯春風南水轉山回護蔚藍客有可人來剝啄掃花藉草共春酣西夭矯晴虹臥碧溪腳力好山俱不盡朝來佳氣與雲齊北飛簷正與琁杓直槐邊消息我先知橘裏風光誰解識上積善有根天所相黃庭誦遍晝隂間十二行􅩲春盎盎下老來倦學樊遲稼大兒鉏耨小兒耘萬頃心田收𥝧稏伏願上梁之後上慈下順內肅外雍里社歡聲之交暢門庭慶事之常逢丹桂孫枝不斷讀書之種蒼松老幹長存好德之容疏普信院重建佛殿疏錦繡名山鳯鸞拱揖旃檀古剎龍象莊嚴幾年安住道場一旦幻成魔境無量華樓閣謂與法身化身報身而俱存推落大火坑乃至牛車羊車鹿車而莫救勢炎炙手禍烈焦頭固知我佛欲放大光明其奈爾時自墮熱惱苦風幡安在露柱俱空給孤園千二百五十人赤裸裸以相顧毗盧藏五千四十八卷令嵬嵬而獨存幸死灰中餘生意在有能出一臂力便可成七寶林兜率宫天上移來妙勝殿人間示現證無漏果歸有福人朱陀寶福院鍾樓疏華鍾鯨吼欲喚醒不識曉夜人老簴螭拏尚掛在莫庇風日處蘭若之規摹古矣蒲牢之氣象颯然要令聲外求聲直須屋上架屋夜義木硬立腳起飛跂雲霄金剛杵輕著手撞震動山嶽勿道為髙力士布施且請與朱頭陀結緣寂照寺佛殿疏菩薩福德智慧十種宫政自光明圎滿如來摩尼清淨一切殿亦須殊勝莊嚴眷我鳯凰山著此獅子座星霜荏苒風雨侵凌左方撑而右欹東未𥙷而西漏瞿曇彌勒巳是頂門撞破虛空迦葉阿難未必腳跟踏著實地屢舉頭而太息欲奮臂以更張仗衆福緣成妙法界古潜州三十六蘭若雄占上游舍衛城千二百比丘同祝聖壽平齊文集卷第十一
