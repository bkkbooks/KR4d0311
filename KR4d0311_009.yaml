body:
  text: 記饒州州學新田記辨峯葉公司臬江左之明年某來庀楚泮一夕漏過午曵屣修廊齊廬燈半明滅聞有扣庭竹而歌曰月連姢兮露垂木蘭厭浥兮蟬飲之朵頥兮疇屬饜不如東湖洋洋兮可樂飢又歌曰露函月兮相輝鶴鳴九臯兮止復飛屋漏兮尚不愧羌三月不肉兮吾亦肥其思深而不迫其音悄而不怨甚異之明發謁臺下為公誦所聞公笑謂豫得無與廣文飯俱不足耶因問歲入之目豫謝不與知獨數慶曆元祐以來幾豐碑以對而終以罪歲公又太息居亡幾以番水下鄉在官之田歸于學最五頃有竒山稱是僦廬數十楹已而攝郡組且還續食之布意尤未艾也夫教與刑同出而異用出教則入刑皆以約人心歸諸譱公亭刑一道聽訟以平鎮俗以靜格姦暴以誠惻然念民力之窮而甘苦同之民隱然恃為太山而心不搖簿書期㑹時方􅑣午獨汲汲學官之是崇壽名教之命脉扶風俗之元氣其深識輕重緩急之權度者歟饒學居臺府鼎峙之地刺史二千石士皆能皂白之每為豫言三山李公珏握憲節時威名凛乎動人康山膏腴十頃舉以加惠于學視疇昔始廢告朔之禮而􅐁吾所有以肥𣏌者賢否何如也今李公平反西道與公實共長江聲明風采彪丙交映詩曰矯矯虎臣在泮獻馘江右以是期李公淑問如臯陶在泮獻囚江左以是頌葉公公名簣字景山嘗任太府少卿今直寶謨閣嘉定三年四月朔旦洪某記重築采芹堤記城東數百武為泮宫貢士之闈冷官之廬附庸而翼之督軍湖匯其右貫湖為堤徑于學湖裂為東西西湖在堤北倚山瀦水植以蓮菱隄無風濤撼觸故不壞東湖在其南瞰湖有亭曰采芹夷曠虛明莎蕪彌望潦水時至挾風鏖岸拍拍作聲不少息日朘月圯闊不能半尋歲大比縣編竹貯土𥙷葺以苟目前事巳輒頽析如是婁矣余來分教每出擇地而履或夜㑹風雨寸跬不前毛髮磔立因念士與民同出是塗可拱睨不問命絫石為趾每五尺揵以石笋東為層六西益一開級道以便下上者三覆石甃以草墼根盤結不可動鱗次而上以殺水勢廣十有七尺崇十有五尺修一千二百尺植楊護其趾且為舉子繫纜地烏桕合抱垂䕃下接景益深秀作門于西扁以泮水役始於去年十月甲子訖二月壬戍凡靡錢二百萬嗟夫物之成壞也有時時之難易也有數堤昉於文正范公再築於元祐之庚午余之增築又適當庚午之冬周兩甲子所成僅爾謂之非數可乎更兩甲子陵耶谷耶嘉定四年春社前五日錢塘洪某記東圃記余既結樓廨西偏以受兩湖之勝東偏有隟地數百步畦𬞞灌莽爭長遂規以為圃買梅數十本手自扶植少長有序寒香冷蘂緑隂青子人所共愛秋後木葉脫盡若枯不枯欲蕾未蕾更自佳耳梅有君子之德臭味同者必愛之或不好事析之不中薪斫之不中桷亦足自壽旁種竹數十箇忍者戕饞者揠懼其不能與梅俱久梅下薔薇整整就列可編以為屏萱菊成􅩲隱映陸續水仙芍藥必火于秋分培其根使豐碩乃能多華金沙酴醿上䕃惡木援昌條而升之萎蕤下飾庶幾惡者亦轉而良因窪疏沼輦淖育蓮隨種即葩菂殊快人意久不雨則躬抱甕之勞壇有新安牡丹方苞須籠護以防鵲啅有庶蘖則搔去母使分正氣巖桂𥘉移更數年乃盛小松髙不能尋丈又當期之百餘年後桃杏之繁葵榴之豔海棠之姝麗風日佳時若有矜色特未知松桂肯之否築亭其中表以百花頭上獨主梅而言者春秋書盟㑹之例也客笑余名亭有舉子習氣余夜夢游埸屋觀榜帖則躍然以喜習氣未除安敢諱異時士友藏修之暇婆娑梅隂采華托實必有能為我誦角弓之詩者嘉定壬申仲春望日記楊州重修城壕記廣陵負淮挾海前俯大江槃槃為一都㑹古蕪城昉吳王濞而拓於隋俯仰千古岸移谷遷坡陀濔迆隱起蒼莽間後周顯德中韓令坤相攸東南陬别城以亢治所周二十里一百五十步崇二十六尺是為今州城國朝盛時南轅北輈走集旁午如奠枕堂皇無所事乎金湯之險六飛南駐郡為北門重鎮形勢控帶繕防日嚴培庳葺陋萬雉鬱起矗如長雲望不可極而壕河堙狹日甚稍不雨則褰裳可涉嘉定甲戍春金部郎崔公出鎮是邦厥𥘉視事登陴臨眺進父老而問故謂役費夥繁民壤綺錯且城東髙卬平衍虜嘗頓兵浚下增髙守禦非冝坐是噤不敢輕議公慨然念天下事患不為耳度逺近凖髙下程廣狹量淺深圗成而鎮江都統馮榯實來聮請于朝尋報可屬時晏清弓䩨矢箙戍兵須暇售力相先植表作旗萬臿競奮行行伍伍一無敢譁單車巡勞犒給有度搜簡勤惰勸懲有章日出而作未昳戒休嘯篁坎鼓歸營歡動其施功自東徂西而終於南因地相冝河面闊至十有六丈砥殺其半深五分廣之一環繚三千五百四十一丈壕外餘三丈護以旱溝又外三丈封積土以限淋淤又展地七丈以受土使與危堞不相陵民地視歲入庚其直事已俾復作業城五門為月河總百十七丈而南為裏河又八十七丈呀然而淵沛然而川波光柳隂下上交映實墉實壑深與髙稱賈航餫艘並帆疾馳萬目驚盱前所未暏西北曰堡寨城周九里十六步相去餘二里屬以夾城勢如蜂腰地所必守左右尤淺隘濬之槩如州城壕以丈計者七百三十有一且甓女墻以壯其勢郡倚三塘為固有邊遽則疏陳公句城塘水灌州城壕支河引水入九曲池合雷塘水灌西城壕公先是封築閘柵斥大隄岸潴水益漭漾兩壕告功試決而注之水僅落數寸而河流四溢矣經始于八年八月訖于九年九月工一百一十五萬四百二十五費朝家緍錢三十四萬八千七百五十六米石二萬一千八百四十七州家激犒為緍錢五萬一千六百市河貫城即古䢴溝南距北五里六十步外壕既深水勢趍下市河涸不可舟就加深廣三分廣一新輿梁五又費緍錢四萬有竒公以正大學問發為政事所至聲迹章灼擊楫東來恩信孚浹軍民歸命恃為長城識者以經濟事業望之斯役特細耳客謂孱虜垂亡機㑹方集何規規守是為公曰不然古人設險如奕棋置子雖踈取勢欲廣楊為根本要地控海沂而引汴泗取勢為獨多吾試與子馮髙而望中原故壤一目千里強本折衝顧不在兹乎客領之去是役也參議陳師文機冝何處禮提督通判髙惟月鈐轄劉諶節度推官鮑克正受給統制孟顯仁總轄統制王明元真統領韓亮王孝忠張健李進李琮莊安國夏榮部役敢勇精鋭武鋒神勇左軍強勇鎮淮則其役兵也公名與之字正子南海人利州通判㕔記上更化十有三年南海崔公以名法從出殿成都柬其屬得宣城孫君若蒙正叔為成都宰與俱西明年公盡護全蜀闢幕府于劔外緝忠裒益正叔參焉又明年辟通判利州利以寧武冠其軍介梁益拓表撑裏自昔號重鎮中興後臺閫鼎立又重郡太守印綰以部刺史丞二非它郡比也舊有廨郡治東歲庚辰合為大行臺郡治麗于漕郡丞倀倀無與歸濡需而游寠藪而泊吾腹果矣它不暇問正叔以為大愧一日過南門綿谷故驛掖仆碑摩桫讀之皇祐中規置也秦蜀同軌利當孔道故崇大其館以贏客使其後郡將兵鈐迭嘗匽薄近復釐為四五以廬僑士叢猥族紛左陊右壓庭下老木數章突兀輪囷猶有百年文獻在正叔喜曰可矣退而咨諸長長曰可哉翼衡以從張故以新迪晦以明堂序有嚴官府具體既表舊扁諸大夫相與落之三邊無塵野無遺秉可信眉一釂矣書來屬余以記余謂天壤間孰非傳舍閲人之地况毀室於梟取巢於鵲抑有甚不獲巳者未足為正叔書也憶疇昔過正叔抵掌劇談丗故節節中窽郤其言利者怨之殖也名者忌之的也忿與欲損摩桫讀之皇祐中規置也秦蜀同軌利當孔道故崇大其館以贏客使其後郡將兵鈐迭嘗匽薄近復釐為四五以廬僑士叢猥族紛左陊右壓庭下老木數章突兀輪囷猶有百年文獻在正叔喜曰可矣退而咨諸長長曰可哉翼衡以從張故以新迪晦以明堂序有嚴官府具體既表舊扁諸大夫相與落之三邊無塵野無遺秉可信眉一釂矣書來屬余以記余謂天壤間孰非傳舍閲人之地况毀室於梟取巢於鵲抑有甚不獲巳者未足為正叔書也憶疇昔過正叔抵掌劇談丗故節節中窽郤其言利者怨之殖也名者忌之的也忿與欲損之棘也氣一動志者壯之蹶而得者老之蝕也天下所謂磨之不磷灼之不焦震之不碎者惟一誠實而巳身不行道不行於妻子苟誠其身則可以順乎親信乎朋友而獲乎上真者不可矯昭者不可匿也余聞而惕然向知正叔之老於才今知正叔之老於學故書嘉定十六年六月朔洪某記清約堂記參天地而立者人包天地而運者心同是心也而有人心道心之别道心性之存也人心情之動也情動而百欲生故危之危而難安未至於亡也故猶可及反反則危者平矣顔之復曽之省反身之謂也然省在復先能省而後能復顔子有不善未嘗不知知之未嘗復行隨省而復也曽子則用力於省者顔色之正容貌之動辭氣之出戰兢惕厲警察精密無一息之間斷而夫子之道竟以是得三省之積一貫之入歟晉人張君承祖伯修學博而材偉氣明而膽壯舉天下禍福利害莫能壓之試劇成都期年政成作堂以休扁以清約殆老於丗故落其華而取實將以是志所省乎夫養心莫善於寡欲其為人也寡欲雖有不存焉者寡矣其為人也多欲雖有存焉者寡矣此心具清明之全體人欲一萌清明隨蝕去其所以蝕清明者而清明還則本然之心得矣故天下之損莫大於欲人心之所當損亦莫急於欲邑大夫公餘退食燕坐深省曰夜氣之存其不為旦晝汨乎雞鳴而起其於利與善之間巳辨乎宫室之美妻妾之奉所識窮乏之得我其不為之動乎口之於味耳之於聲目之於色四體之於安逸其知有命而委順乎內以敬而直外以義而方敬義充塞於內外物欲無自而入則民𬒳學道之澤矣董幼宰不足進也詩云蒹葭蒼蒼白露為霜所謂伊人在水一方西鄉舉酒為伯修賦之寶慶𥘉元八月旦日古潜洪某記洞霄宮施田記洞霄距行闕三舍而近翠華臨幸舊德典領廷緌寺貂禜禱旁午望出璇臺珍館之右星冠羽衣來游來處常不翅數百千指九霞八景晴霏濕翠朝攬夕挹充然有得而主其徒者每皇皇懼無鞅數衆之弗克淡唐中葉嘗賜觀莊田一所國𥘉錢氏籍以歸有司祥符中賜仁和田十有五頃除其租政和中易賜膏田千畒逮紹興創通明殿于宫之東偏又歲有常餼以給齊祭列聖涵育之恩至矣賜田中更多故僅存磽瘠歲入不足支數月都監宫事龔大明語其徒王思明王大年前是住山潘君三華尚能斥槖裝買曹橋田以繼粟吾徒可坐睨寬鄉上腴大家腐陳丐彼有餘輔吾不足庶幾我疇我耕我庾我積以𥙿我後之人怡聲勸相堅力經度其志卒以酬畏壘既攘姑射且熟鼓腹升平稽首萬壽欲與是山相為無窮來諗豫為記夫道行乎天地之間日用飲食何者非道先王以是生養天下一夫授田百畒于耜築埸有其時紏笠趙鎛有其具堅好頴栗舂揄釋蒸有其成墻屋有桑疆畎有果蓏柵有雞豚沼有魚鱉身勤於所養心安於所止一毫無待於人此王道所以為盛也丗降道裂始有食非其力者浮屠氏幻而辨能撼人以禍福塍陌綺錯鉢巾雲趍所至皆是而為老氏之學者大氐以清淨無為為宗須於人者狹故其廬聚不能十佛之一雖名山藏室大洞殊庭號稱海內之望亦往往微常産以自殖其教然也於其教清淨無為之中而能謀長以殖其衆可不謂難乎雖然樂與餌過客止道淡乎其無味視之不可見聽之不可聞而用之不可既爾師之說然也繼今不以口體為心害冝有進乎淡而無味者余家天目之陽去天柱為近間當分半席叩之施者生有祈死有薦其姓氏畒石附見碑隂云於潜丞廳續題名記吳門葉君芭丞吾潜諸臺交薦其材垂滿過余以題名更端屬之記且曰官無􅋻崇職無簡繁事無易難惟敬則行居是官而罔其思非敬也居是官而出其思亦非敬也上不侵官以僣下不怠官以曠心止於事靡他其適如農有畔行無越思其斯為執事敬乎芭不佞何足以及此惟是常平義倉之賦受丁口力役之簡稽暨上官所以奔走使令之悉惟謹土膏脉奮凍解泉動出入阡陌程督坊瀦日與臺笠襏襫相爾汝過此不問也有堂述六面山而俯沼嘉卉美竹參伍布列暇時玩游鱗之溶曵聽幽吭之啁哳弄柔芳而坐密䕃以休其心負丞不負丞不敢知也余愛其言知敬於職業因筆而卑之石且告來者奚疑堂記為楊尚書汝明作太極運而隂陽生隂陽分而剛柔斷人具隂陽剛柔之體而性太極者也氣禀則有不齊得陽剛之粹者為正直為平易為靜定為勇决得隂柔之偏者為便曲為險躁為多愛為不果自昔聖賢所以擇精而守一與道俱出與義俱入進不泰驕退不吝屈動以天而不牽於物剛實為之夫剛者疑之斧欲者疑之蘖欲則不能剛矣剛而無欲然後能知天知天之所以命我者不容毫忽人力於其間則能安乎天凡利害禍福榮辱得喪錯立乎吾前不將不迎不掣不撓躍如脫矢􅒂如奏刀沛如决千仭之隄而赴平川疑何有哉今寶章閣學士瀘南帥尚書公表和而裏也剛其立朝不沽激以為異亦不媕阿以為同惟時之中締知茂陵廩廩枋用一日幡然請蜀麾而去築堂家山顯爽靚深志將老焉間斯燕斯謂歸去來一詞指在末章先君嘗欲以奚疑扁所居未暇也遂名之易之遁曰肥遁無不利無所疑也見於上九之剛坤之六二不疑其所行則動而剛也有是剛信道而踐實任運而養胖處貧賤無患得之心處冨貴無患失之心遁與坤所以均於群疑之泮然見幾以用遁違丗者之事故其剛著於外敬直義方而德不孤用丗者之事故其剛動於中靖節違丗者也公用丗者也違丗固安乎天用丗抑何往非天哉昔伯起傳秉及彪四丗德業蟬聮相輝為東京名族清白之遺也公以安乎天者上承考下以詔子若孫德業庸可既乎敢為楊氏賀且為楊氏勸著圗書所記余誦天隨子杞菊賦愛之因取著圗書所名間居之室菊坡為灑其扁廉頑立懦之風可挹也嘗言曰結繩以前未有書有書自易三畫始易在天地之先而畫顯於一隂一陽之後陽竒為乾隂耦為坤隂陽竒耦之畫交而文生焉故易者文之太極也詩書禮樂春秋論語文之兩儀也諸子之有見於道有𥙷於丗教者文之四時五行三辰也太史之紀録先儒之訓詁文人才士之撰著騷人墨客之賦詠公卿大夫之論奏百家異端稗官小說各求自表於丗其融為江河峙為山嶽散為風雲雨露磔裂為草木之華昆蟲之鳴不知其幾也而總之為圗書其出於河洛者蓋其元也前代書皆禇素傳抄至五季始有六經墨版國𥘉又刋司馬遷班固范曄諸史以幸學者猶未盡然也今則靡書不版矣手抄之得難版傳之聚易得之難則讀之力聚之易則有書不讀如前輩之慮蓋多然亦有由也士未一命晨窗向白執編而長哦夜膏欲涸掩卷而紬繹莫非所謂科舉之文書非不讀也而讀非其書及既一命矣日以司空城旦從事神疲力瘁於簿書文墨中書不暇讀矣為士而讀非其書為吏而書不暇讀勇於學問者顧不爾而力與心違類不能不爾故惟不士不吏而後可以力於書余家合新故書亡慮萬餘帙放斥還山無埸屋之冗無官府之勞書於此而不讀真不讀矣郤萬紛以保靜揩雙眵而就明日課一編心領大義老退雖不能彊記如苗得溉生意亦新易曰君子多識前言往行以蓄其德厚其入而不輕其出是之謂蓄蓄之極而至於何天之衢亨則上逹矣未蓋棺之日月尚勉之於潜登科續題名記上科詔再頒之歲冬十月己未邑令池陽程君燾修鹿鳴故事于宣化堂諸生作而言曰潜士登科有題名自慶元龍飛始閲三十年石且溢矣表先逹以厲後進盍續諸令曰唯唯鳯凰鳴矣于彼髙岡地之得也梧桐生矣于彼朝陽時之得也時與地莫難乎兼得士生王國得其地矣雲風感召得其時矣其地得其時又得觀光利賔䇿名奉常以階顯庸顧不謂榮乎抑涵負穹博擇精守固出可以為邦家之光萬民之望然後榮名氏之書志榮也鄉校群居藏修餘隟相與摩挲題刻歷訂平生非其研席之游從則家庭之詔語疇賢疇不若類荃茅而品椒榝其榮也可不懼乎知所以懼則榮至矣此賢大夫期屬方來之意也邑人洪某記浮溪橋記浮溪吳蜀往來之津始以略彴渡繼維以舟前令邵紫微梁而亭之山潤川明倣佛垂虹宣霅分派南注潦水時匯雷轟電射橋莫克支久趙帥卿來絫以石且屋其上規制堅密而勢益雄前年秋洪發諸山平疇廣隰漭為一壑縱放橫軼洶如濤江直北之橋盡决順濟亦壞方令垂滿綿蕞艤度暴漲斷綆涉者仍病焉池陽程君燾至之逾年間與客行溪上愛風物之勝思䇿隊立壞如帥卿而重於煩民遂一用紫微成摹釃水為十三道巨植駢峙修䦨旁翼袤三百尺廣三尋有二尺東西石梁各一星兩亭壓岸猶舊先是紫微中橋著亭麗于北坐挹兩天目以便遊息迎湍受激亭仆而橋隨之改著于南勢相屬而不相麗異時亭或不力橋庶幾保無恙市材僦工直與時平手畫目授匠與心謀不纍朔而告功疊嶂危瞰漪漣涵碧霏開煙合人冉冉行圗畫中潦無停輪冰無留屨相與夸誦前邵後程不容口而君意猶若欿然者謂凡物廢興㳂革相循無窮壞必有由成必有漸橋凡幾變矣今揆時度力所僅就爾他山可斫安知來者之不復石乎士大夫之患莫大於吝與驕吝者拔一毛利其民不肯為驕者毫髮及其民則施施有德色蓋無學問義理以養其心而氣為之贏縮也君廉平有精力得敬事愛人之意視可以興利除害者不慮費而橋役其大橋成不矜為巳惠而以圗堅惠逺卷卷後之人加於人一等矣紹定己丑十月日里人記知心堂記昔在孝宗皇帝以盛德大業紹開中興仁不異逺視坤維戚休如在陛枑間乃淳熙丙申秋七月制詔晉原李公蘩以倉部貟外郎總蜀賦望選也未上首奏利路和糴為民害假臣三數月可永除五十年病根為國為民之慮目無全牛矣尋奏易之裒多益寡書之懋遷有無皆深寓理財至計臣願於經費中揆盈虛斂散之冝酌緩急先後之序通融排斡劑量取豫盡變抑配舊法官自與農為市不虧豪忽之價不取圭撮之贏而軍不乏興民不加賦其條凡數十其大節目十有一反覆熟究皆經久實利惟少寬轡䇿俾得盡其愚上大竒之詔制置范公成大同詳度又詔度支郎周嗣武就核利害悉奏所請可施行公以聖主難逢時幾易失亦連上奏願任責辦集其議三閲歲而堅定案全蜀餉道歲大約以石計者一百五十餘萬中六十餘萬科之邊氓量家業以定均敷之數名和糴實強取民不堪命怨咨轉聞皇明洞燭萬里一意任公以寬西顧奏始上非惟九重難之公卿大夫皆難之蜀人之切於解倒垂者亦莫不難之而公見定守篤慷慨論列不少折纍書與同列辨難尤力汔如始議官糴民槩價與時為低昻逺邇歡趍輦負繈屬聲氣不動而軍餉給九州數十萬户踴躍呼舞始知有生之樂家祠人祝之逮范公入參機密上問蜀罷糴可久行否范公奏以身保之上恱曰是大不易得繇倉部郎再進太府卿且嚮用遽以不起聞當寧悼惜特豫遺表恩庶官所未有也前是倉部綸言有心乎愛民朕實知之之語越五十年其子昌州守瑀掇知心名所居堂侈聖賢際遇之盛示丗丗萬子孫以無忘先烈書曰亦越文王武王克知三有宅心灼見三有俊心以敬事上帝立民長伯又曰文王惟克宅厥心乃克立兹常事司牧人以克俊有德夫知人以知其心為難人主之心存乎民而後能知人臣愛民之心知人安民所以為一事也方公領餉事上未嘗識其面朝虛相位中莫有主之者蜀丗將怙勢吝權兵竈虛實不容問而制閫𥘉亦未即孚是議章前後上者十有三璽書下尚書報可者八變而通之以盡利至于今嘉賴公獨恃上之明上獨知公之誠也此誠感動豈一日之積哉自為小官所至以惠利著西憲邊防十事之奏榷牧馬政七害之奏興元歲旱免糴關隘守兵之奏康濟一念動切諸身指陳利病明白洞逹上久巳心屬至此簡知益深雖􅎱將詭辭沮撓而宸翰勞問至再洞然不疑君臣之際毫髮無遺憾矣趙充國奏屯田便冝每上輒下公卿議臣𥘉是其計者什三中什五最後什八宣帝既報將軍計是猶兩從破羌彊弩之畫未為深知其心也上之知公曠千古而一遇者歟然公之遇合天也非人也𥘉建議罷糴關內梁洋諸郡旱而雨關外階成西和鳯皆大有年糴價大减天知公之心矣此心上通於天而天知之君其有不知者乎人臣患乎此心之不盡不患君門之逺天之髙也某日宦于蜀賢士大夫多為誦資政黃公裳漢中行及罷糴行謂雪山可磨汶江可竭阜陵之德公之功不可諼且感今懷往未有巳也昌州以廉寬守家法進進為時用嘗寮有雅好輒為稡所聞以詔蒸彛鼎吁王之藎臣無念爾祖丗光顯冝矣夙興夜寐母忝爾所生尚益懋之哉於潜縣㕔題名記六飛都吳邑加重令加選題名昉於隆興甲申續於嘉泰癸亥前後著見者四十有二人石近燬紹定戊子續記自見大夫始舊聞放失矣九華程君燾至精敏而峻潔大不弛綱細不漏目民隱吏慝搜獵幾無遺治行亹亹逼前獻垂滿討諸故府合題名三為一以存往而詔來且追書唐及國朝全盛時賢令十一人于首髙山景行不以耳目所接為僅足也然著記未免於闕文遺風或得於慨想東晉虞府君嘗為吾長吏甚有遺愛志逸其名託錢武肅乾山濟安廟碑以傳邑自漢隸丹陽以來為令者知幾人傳者能幾否固幸其不傳臧而不幸不傳者可勝道耶夫士君子立於丗豈以傳而為善不傳而遂巳也未有為善而必其傳也亦未有善積而名不傳也其亦為所可傳勿為所不可傳而自幸於無傳也雖自幸於無傳而根窳相形其溢於邦之耆老俊秀牙頰間者未嘗不並傳也書曰康乃心顧乃德逺乃猷𥙿乃以民寧司民社者尚監兹哉臨安真相院修造記佛以大圎覺為伽藍非劫火所能壞也而麗於有為之迹者則有壞有興東天目之蘿山翼若翥鳯其下為白佛院治平中賜今額開禧丙寅臘殿廬堂廡院額僧牒俱火唯門閈存主僧清皎與其徒智月收合餘燼集諸弟子詔之曰魔事至矣吾徒能以佛事處魔事何不濟汝文禮禪學而儒行名在諸公其往復吾額汝宗㑹鋭於丗故其往復吾宇汝藴湘其相㑹出丗間法不離丗間法一念精進勝妙現前因相與信受而退明年冬禮部給額據嘉定庚午春僧堂及廊廡成巳卯春二月已未佛殿成紹定戊子冬佛像成門閣鍾簴尋一新近者倡其役逺者勸其功亡慮為錢三千萬㑹行乞于兩淮者七湘亦再披攘經營奮空起有堅忍彊濟越二紀乃迄于成而智淵募建善法堂亦就緒佛氏願力歷三生如一日閲纍丗如一人名山勝壤塔廟之崇閎樓觀之傑麗切雲漢亘崖谷人力窮矣猶以為未足大抵非一手足之為也皎之徒五丗相承人人以飭壞植仆為巳責志念之烈不為飢渴寒暑變穹如奧如繚如闢如燁如卒不愆于素丗之貴家大室或不一再傳而臺傾池荒弗支弗治沈沈渠渠境變主移何肯堂之難耶㑹謁余志興造顛末因著所感如此若夫三十二相孰相為真孰相非真以是因緣而為說法有汝師滅翁廣長舌相在余不能也癸巳春正月甲子於潜洪某記竹洲記盤洲野處之族子天成士龍蚤力學從豫游頃因肄業之舊治竹洲以寄其志洲與嵩君山拱揖一水縈紆琅玕萬箇著亭其中曰令寒曰吟風弄月怪石森植效竒表其尤日雲根曰倚天曰華山孫洲之外曰樵溪曰碧澗循澗而北行百許步直王子峯之麓有泉甘冽曰石盆衡從可七八尋泉旁小山橫陳斷崖絶壁勢敵千仭飛玉泉漱其左松風巖敞其右髙槐老桂參錯蔽虧風雨晦明姿度百出每藏修之暇坐清隂以數息俯寒泉而照影春緑晴哢機觸神㑹無一不可人意而洲獨以竹著右竹也竹之得於天者與君子同其直壓之贔屭而不折也其剛暴之栗烈而不移也其虛飽之風露而不盈也苞之寸茁而有干雲之勢則其氣之不可遏叢之衆卉而無徇丗之容則其德之不可狎也而於水石為最冝因依映帶魚魚翼翼如家人拂髦櫛縰端鞸佩紛林立於巖君之側如冠者童子試春服於舞雩如子大夫射䇿于廷如百辟鳴玉而朝御史執法之在旁屏氣若不息如三軍襟甲而陳大將軍旗鼓中立坐作進退唯其令也故有志於久大者取焉淇奧之竹以猗猗言識者謂即淇園之竹其詩曰有斐君子如切如磋如琢如磨夫如切如磋道學也如琢如磨自修也自修之與道學何取於竹士龍家有老斫盍以是質之寶慶𥘉元中和節古潜洪某記此君軒記軒舊麗寂照精舍東坡以倅行縣為賦不可居無竹之詩隆興𥘉徙于縣治衮繡堂之東開禧間嘗重建寶慶𥘉元避上嫌名令桐江方侯熙易以此君仍用坡詩晉王徽之語也君者有德位之尊稱自萬乘至子男百里之國皆稱君以君名縣齊之竹其尊與君百里等然竹之君以德言百里之君以位言知君之所以為德則優於君百里矣易之震為敷為蕃鮮為蒼筤竹其於時為春春物之生敷而蕃鮮莫竹若孤根峭植不數歲𬒳山而雲戴角繭栗曽幾崇朝巳干霄而槊生意勃勃乎其不可禦故觀造物生生之德亦莫竹若也侯政成心休日與君對念吾民生齒之數能如君之蕃乎生養之具能如君之阜乎襁褓鞠育能如君日夜所息與沆瀣俱升黃髮婆娑能如君什伍相依少長相扶老歲月飽風霜而無蕉萃之色乎以君之生觀民之生侯於此不徒名也吁人未哺吾不可以獨飫人方臞吾不可以獨腴對此大嚼奚心哉說詩者以意逆志可也紹定元年正月日里人洪某記善圃記余官太少時𬒳檄行青城道上夏氣淑清空無點雲西望群巘巉碧雪山出其顛霽霏留滋朝陽映明濯濯如白夫渠擢立萬葉間可攬也入山秀蔚而邃古與廬阜琅琊相上下宿丈人觀規犂明登儲福挹三十六峯之勝雨不果迄今旁午于懷一夕新崇寧丞楊君平叔過余玉泉山麓自言先吏部墓距峯七八里而近現真馬溪兩山夾峙小溪中貫竝溪原谷曠平冝耕鑿因廬焉屋後竹可二十畒左右臯壤鱗屬葺為小圃摟溪山為我有入圃畦𬞞環小莊曰壠畒丗田可耕也稍行結屋三間曰讀書處丗書可讀也又稍行瀦淪漪為蓮沼亭其中曰君子讀書求為君子也又稍行桃李與梅錯植小亭曰託根耻獨為君子也出與丗接和則易流屋篔簹深處曰節堂直哉清矣清易至於隘必輔以通循曲水闢徑曰通蹊蹊盡海棠數十本堂曰天冨貴修其天爵非以要人爵也少折者亭柳隂曰早歸來逹當知止窮亦不失歸根復命之理也能如是然後不遺臭於丗築臺叢桂旁曰垂芳以厚終也最而名之曰善圃志獨善兼善之義丐為我發之余方夢想西山聞君占勝其下喜如從步屧於煙畦露徑間回詹衆峯之倚寒碧燭向跋不覺膝之促因為言易九卦示所以善其身十三卦示所以善天下天下者身之推也善天下之難未若善其身之難故於九卦反覆致意尤深君躬耕力書汲汲君子之歸羣而思立介而思通進而思反一朝夕而思百丗知嚮乎明善誠身之學矣然非名之求之貴而實之踐之貴非修之終身之為多而敗之斯須之為不少日用飲食之細家人唯諾之常暗室屋漏之密所謂獨善者在是而兼善者亦在是夫豈可以異言哉吏部公蚤以文墨表西南入為名郎權臣曲意鉤致正色郤之其於善身善天下之要體認熟矣而推行未究也君能於著存之頃循而進之使充實輝光衣被丘園花竹魚鳥生意相續九原之眉信矣平叔竦然拱立曰敢不勉請書以為圃記歸而刻諸石紹定四年春正月甲午錢唐洪某記東山婆娑巖壑記婆娑巖壑者何鄉先生吏部俞公讀書處也天目下趍于臨安穹為雙徑奧為大滌洞崛竒明邃為九仙玲瓏及東西永安山其鍾為人物唐季光啓中錢武肅始以功名著越百二十餘年有郎工部出又百七十餘年有公卓犖相望為名法從山川英靈之氣大氐屯固蒙鬱蓄極而後發夫豈易然也哉公家西市距東山里所少時屏人事窮年藏修山中學成一舉冠天下後每解官還里輒抱書山房繹其業講索益精詣益深論著益雄古四方秀艾摳請屨滿緇徒可與語亦泊然與為莫逆交軒宇佳處丐一語品題未嘗不笑領也公即丗忽忽二十年僧老死且盡獨主塔了仁應門業淨趣明淡寂如止水撫風物之蕭疏愴耆舊之凋落以公平生最愛環翠之勝因葺閣下為堂以祠公擲疇昔所賦名之且悉疏詩文于壁林巘蔽虧花竹深映與窣堵相近逺儼猶昔也公儻騎雲馭風挾仙人左元放之徒忽去倐來乎夫出處之義大矣靜者常得之艮為山主靜而動靜不失其時其道光明雖動未嘗不靜也公方昌羊空谷燕坐而山月上長嘯而林華墮閉風霆閣雲雨人莫窺其涘及出而施之詩書仁義之澤滂葩淋漓而春萬象風節所存殆有駭濤怒颶日夜舂撞所不能搖者身在禁闥乃心清泉白石間蓋處亦靜出亦靜也綸巾一壑目擊道存山顧不重耶晉謝太傅髙卧是山石室濬谷之趣自謂伯夷何逺悠悠千古此意惟公識之故併圗其像以慰山靈之思云門人洪某記餘杭重建縣治記餘杭苕霅之津㑹故冬豫奉老親行霅上諸山扁舟循苕溪而下間登岸從牧翁漁媪語人人夸誦吾令年方壯而識老政出清靜民曽不省有官府也因以野服謁訂所聞令肅客于丞舍起訊之故曰縣治舊占溪南後徙于北宣和焚於睦寇江令袤重建建炎焚於金寇張令永嗣又建閲年百餘浸淫穿蠧凛乎欲壓圗撤而新之治寺吏民之耳目非他役比故不敢不勉豫退而心念是邑近在畿內地望非不枵然大也而土薄水淺十日晴則告乾三日雨已相戒為溢備民以故亡蓋藏而令以負租督過者十七八彼芘于是豈漢無壓焉之懼哉所壓有急於屋者也見大夫以朝士來寧久此苟可撑扶以了歲月何新為新之寧不勤其民而自為紛紜耶未信潰于成也越數月苕人過豫門曰縣寺成矣治事之㕔退食之堂宴息之室崇楹邃闥表裏中度發地得中霤遺跡位置面勢且還其𥘉矣屋後惡木冗莽鴟梟狐狸嘯醜舞怪之地剃翦不留餘拓圃結亭松竹伍伍氣象一新矣而田里晏然罔聞知嗟夫縣無劇易視令為劇易弱者以苟偷為安皇恤我後強者惟力是矜一役之興萬戚之乘也於此能於政休俗暇儲材庸力以植壞起仆使吏治尊民詹聳而一毫不以勤其民至斥圭田再歲之入以食功可表也巳惟昔聖賢道化之盛有本末而無內外其用力自相在爾室始蓋萬室之治不如一室之難也言偃宰武城淡臺滅明非公事未嘗至其室是室之嚴所親必直諒所講必正大所踐必誠敬詖辭詭行姦聲亂色無一得以搖吾之清明而弦歌之化行矣令其進於是乎役起正月已未訖五月癸丑大尹詳定户部侍郎余公佐其費為多令公族名希磐以進士試刑法中其科嘗為大理評事云紹定癸巳秋七月甲子潜山洪某記鎮江府學田記三代學校與井田相表裏量地以制邑度地以居民食足事時安居而樂業然後興學養在教先也然比閭族黨聮合保受而教與養巳並行五家之比積而至於二十五家之閭門側必有孰衆庶所聚以里居之有道德者為之師是入於孰而學也春將出民里胥坐於右孰鄰長坐於左孰畢出然後歸是出於孰而耕也出於孰而耕則周旋乎同并之田入於孰而學則薰浹乎同門之訓養之所至教亦至焉𥘉未嘗去里巷違父兄以為學而人人有士君子之器自孰升之黨庠遂序國學官而祿之不勝用矣王道衰井田壞學校日廢漢除秦禁士始散出以求師自是經生學士傳業寖蕃大師衆至千餘人博士弟子貟之外未知何以為養東漢儒學益盛精廬所建贏糧動以千百耆名髙義開門受徒著録每不下萬人蓋人自養而自學矣士生三代之時教且養一出於上生三代之後乃自養而自學是後丗之為士難於古無怪乎人材道化之不古也國朝以崇儒右文為一道德同風俗之本上自太學下至郡縣學莫不教且養田不井授而庠序之盛不减三代故其養為難京口郡學之田在金壇湖澤間為多經界行於潦浸之後以茭葑地定租畝出錢僅二十餘歲久茭葑為膏腴而租猶故官沙諸莊在江渚者又日朘於潮以故食常患於不續歲已丑今兵部侍郎趙公范為守有以金壇田告者檄官核其入每畝俾量出斗租以淡士事未竟㑹邊遽移鎮維楊而軍器監丞韓公大倫實來視校官陊圯首經葺之民聞風欣然願輸大約山土田以畝計一萬五千一百有竒歲增米以石計九百二十錢以緍計九百五十四於是廪有繼粟而寢處有管簟几席之安沙田之可捍築者亦次第集事郡文學羅君闓慮異時勢攘力劫乾沒詆讕之無以為久請記之孟子曰無常産而有常心唯士為然士之異於凡民者以是心不為飢渴害也然非講學不足以窮理非窮理不足以知命非知命不足以養心夫繫於天而無所用吾力者命也循乎天而無往不惟天之聽者所以致其命也吾知修吾身行吾義而死生禍福之在天者一不與知命自我而立也以此處貧賤雖祿萬鍾食方丈不足以易吾簞瓢之樂所養豈不浩然矣乎而職於養人者不當以是論羣吾民之秀於學欲使鳶飛魚躍於作成之下以長治其民而壽吾國顧未免養之有不淡焉而曰士有常心不為飢渴害也其可哉然則二公封植學校之意學者不可不承來者不可不嗣也平齊文集卷第九
