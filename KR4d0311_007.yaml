body:
  text: 詩六庚寅元日甲子晴聖君元命是元正三素雲開甲子晴不識姓名農圃老相逢便與賀升平元夕輕隂不隔團團月遺俗猶傳緩緩歌踏雪看燈知不惡冝春釀酒恨無多水仙蘭水仙瀟灑伴梅寒鴻鴈行中合數蘭七里香花陪隸耳涪翁醉眼被粗瞞燈歎坐久燈欲乾倒檠丐餘瀝點滴能幾多燼滅在漏刻可以觀養生精涸神氣蝕豈伊半圭茸能續踵後息可以觀為政斂苦生理迫豈伊數匙糜能起溝中瘠嗟哉秋晨禾葉葉含露液母使暵就稿而望一溉益對門兩絶對門三日罷晨炊無處傭身老畫師安得化山為飯顆大家鼓腹太平時一簾霏雨暗花朝焙藥爐邊擁破貂深坐不知畦麥信喜看黃液上瓶焦禽語脫却布袴博米歸岡泥滑滑行苦遲打麥作飯知何時阿婆餅焦涎滿頥更願春𧖟一百箔賣新得價絲貴樂葫蘆沽酒和家酌免教竈婦嘲姑惡讀元公輔傳有感公輔溪壑欲胡椒八百斛若比梁兾大是廉幾船珠璣幾車玉三十萬萬無厭足我宋從來相用儒國肥民飽却家臞田園圗史論貧冨鼎鼐樓臺辨有無嗚呼哉鄙夫嗚呼哉貪夫示諸兒老人四十年前示兒長詩豫章實佳木尋丈早異衆匠石雖未顧終解作梁棟社櫟大蔽牛不資丗所用棄置成散材歲久即空洞誠由天所産亦在德者種吾兒豫章流丱角不好弄經訓雖未通數過輒成誦只今十五六舉止頗持重仰賴師友功綴緝成賦頌積絲未盈尺粗喜入機綜胡為不自量將使應鄉貢文埸倍千數作者豈幸中而子於其間燕雀雜鸞鳯鉛刀未易割庶可供一閧造物果何如往往形吉夢天其助我心勿使汝放縱業貴精于勤耐取曉窗凍文章實公器妙語丗人共歲朝哦此詩洗盞揭春甕吾家有隂德行矣光炎宋某今五十五矣敬用尊韻示諸兒道大兩儀小身寡萬物衆此心能砥柱斯文即隆棟書從羲孔來字字濟丗用愈窮理愈邃如探無砥洞有書不勤讀惰農失春種如何望秋成箕杵日簸弄一經勝籯金萬帙供洛誦所願器業進增益門户重兒童悟易玄奴婢曉詩頌而况以士名經史懶條綜古來天目下誰識三歲貢吾翁破天荒教子期命中顧我肋巳雞望汝毛猶鳯詩書氣脈續聲價天壤閧毋學韓家符燈火照睡夢毋學陶家雍文術付遊縱光明發勤苦竒雋出餓凍四壁瓢腹空一檠鐺腳共人情易喘筒丗事難算甕努力須青春三陳與二宋春行花信雨擔閣睡魔茶破除朗吟搖矮屋徐步逸輕車鳥語向人密交情隨事踈紛紛何足問天地一蘧廬次趙保之清明即事五絶餅喫紅綾空復憶錢分白打砥曽知推排風雨清明過只有梨花三兩枝草草携家去踏青舊阡新冡𥿄錢輕觸懷易作中年惡羡殺兒童笑語聲花信東風第幾回蕭條門巷老蒼苔漢宫儘有新鑽火無分傳將一點來看花何必只長安到處韶華總一般可是家貧風物晚郎當萵筍鬪春盤擅春正是海棠時賸為新晴凖備詩潑火雨來還有信岡南岡北竹雞啼九華葉子真賦汴吳兩都極陳治亂之原仍有詩用杜遣懷韻見寄因和酬之於皇永昌陵食龜大梁都坐控天下樞卜丗周鼎俱聖賢六七作夷夏同康衢懷鴆玩積安厝火忘細娛黼京相與樂興亡視如無元氣付一錮膏血供百須但知豢冨貴金珠潤黃壚豈料醉夢中蠱瘵生華腴凄風暗離黍斜陽渺煙蕪空令老忠簡渡河死猶呼南來吳會雄北望汴水枯迓續赤帝脈羈縻黃頭胡楚蜀壯襟帶江淮豐灌輸以此圗中原所嗟欠謀夫平園舊賔客清燈耿寒爐搔首宿感集拊髀流光徂理亂有成鑒天髙不容呼擬古賦二京舉一通三隅謂墮狗監舌寧老瓜芋區誰能齒臯朔俳優雜星巫芙蓉歸去來月落長庚孤暮春即事溫明好天氣猛憶湖山遨平堤到處柳流水誰家桃樽斚選勝檻笙歌喚輕舠百需不移具一醉何庸逃膜鼓著日緊𥿄鳶得風髙買歸不論價矜詡相為豪迅晷略兩眼柔颸搖三毛閙裏夢巳破間邊趣方牢摘桑暮西崦浸榖朝東臯病來飯即藥客至茶當醪雲煙面目稔筍蕨氣勢鏖腰頑渠稱鶴腳硬難為鰲吾非東山謝亦非華陽陶泊乎潛溪潛萬事隨所遭次韻閔飢兩絶貴人生長不知田絲竹聲中醉飽眠渠信春山青草盡排門三日未炊煙巷頭巷尾幾夷齊日為飢腸不肯西只願天公多雨粟便教米價賤如泥茶笋病蕾金𥘉出焙板玉又登厨為愛頰車雋做成風骨臞黃婆幾倒盡姹女得安無快意冝知悔清標不忍孤五兵生厚味寧作病浮屠口占酬俞端叔牡丹沉香亭北夢魂賖驚見祥雲七寶車窮孟嘗君空好客病維摩老不禁花次韻何伯溫三首庭前木蘭花皎皎扶春陽鶴鳴夜漏午步花獨歌商低迷露濕衣浩蕩月滿梁深省渺誰語中心空自藏出門夾徑松春盡花滿林毿毿麈尾黃梟梟雲氣深仙人左元放騎龍夜相尋飯我花杪露實腹虛其心銅瓶一穟蕙芳潔以自旌相看色轉睟未言意先傾翛如鄭子真聲名豈其卿明窗細披挹心空氣和平山鄉石田磽確萬山隈逢著荒年更可哀盡日幾人擔米上長年何處得錢來扣門強貸刑難逭閉户清飢死又催不是乾坤芻狗汝要令箇箇學顔回錢德成山水窟亦有黃金埓非無瑞錦窠養蒙知趣早觀復用功多嘉客賁埸谷碩人槃澗阿時平風日好花竹幾行窩壽程宰三首作縣如弄潮莫吸半呷水紅旗上岸來喝采沙河市拈取第一籌細柳天風裏愛民如緣竿百尺頭進步未到百尺頭努力莫回顧當埸萬人看亭亭碧霄住回翁十日前先脫老鶴胎拍手浮玉頂君騎鳯凰來相逢説長生一笑榴花開曉出一雙杜宇青天月兩點烏犍白水陂不為好山勾引出那知巳是插秧時行臨安縣圃縣勢坡陀樹老蒼山光明潤客荒唐木蘭多露不能濕薝蔔匪風還自香萬事婦姑鳴好醜百年翁仲領興亡九龍堂裏隨冝酒盧橘來禽日正長寄題永嘉林氏真意堂萱草徑庭寂橘花窗户明我惟天地性物自古今情元酒無窮味朱弦不盡聲道從涵泳得寬作讀書程答隆慶李守楀萬里一天碧百懷雙鬢秋凄其占後會展也企前修風露昻藏鶴煙波浩蕩鷗書來如覿面香滿藕花洲東山次俞紫微止止堂韻佛法元無法人謀盡過謀説空猶是著領妙更何求徑滑松杉古窗虛水石幽琤琤鳴鐵裏安處一時休繡觀音酬郢州王知録丹青美人之贈兩絶楚人不識女須面只畫昭君并莫愁􅑿得江南窮相眼自嗟空白一生頭十相端嚴具足身一團楊柳淨瓶春石城莫與蛾眉看羞不如人却妬人乍涼一雨添一涼秋近暑巳逺菰荷響騷颯忽其歲年晚悁悁我所思室而偏其反燕乳巢未空蛩吟枕先滿涉非忘淺深飲自知冷暖黃姑與織女隔河送悽惋南金英瓊瑶不換霜鬢短七夕好箇牽牛織女天凄其獨夜不成眠柳家細婢何能問太尉粗人祗自憐比翼難磨終古恨嫵眉未了宿生緣新涼如水誰消得平等天公也解偏秋思一曲玉連瑣十分金屈巵故新相代謝砥用為秋悲寓興巨口松江鱸縮頸槎頭鯿一釂聊復爾百懷故依然林靜橫沆瀣庭空淡嬋姢鳴螿識人意切切悲流年最憐重開桂抱寒為人妍阮亨甫壽樂堂淡庵各一首孤塔明橫巘短橋華枉渚結堂水石邃奉此清節母菊能駐頽景松下蔚可數萱能忘百憂竹間粲欲語日淡迎春風雲薄謝秋暑板輿穿蔭來綵𬒮踏花舞點頭每一笑彈指忽千古盡將柏舟淚灑作蓼莪雨僾然其若存青山照庭户右壽樂江西老淡庵髙節湛秋水君庵亦淡名聞其風興起一徑窈柏竹八窗秀荃芷意行襲幽芳燕坐鑑碧泚銅爐古鍾磬瓦研素屏几玄根息藝藝泰宇安止止大羮及元酒不入丗人齒床頭周易在更與參妙理右淡庵秋懷二首素節垂垂杪衰懷拍拍叢風乾梧葉白霜老菊花紅理曲多添瘦停詩不減窮出尋空闊處揩眼送飛鴻鸚鵡琵琶恨融歸十四弦撥寒紅玉笋拍暖繡金蓮梅影春風裏茶聲雪水邊自憐還自笑星髮照嬋姢記夢青天一朵雲起東斗黑怒雨驤玉龍江頭女子十七八喚出八十老龍翁龍翁擲珠引龍舞女子笑滿雙頰紅天風吹動翡翠佩騎龍直入蓬萊宫山行紀事至節後兩日侍老人訪嶽林精舍晚過真君觀小飲還宿澄維那房厥明登九仙山晚取道陌上花里而歸徐雲叟鍾冠之崇之偕行男延勳侍扉開日華早路轉霜花鮮遊鴻得嘉客健鶴隨老仙舴艋野渡淺略彴孤村連紆餘盤龍外杳靄烏猿邊麥畦破凍剗稻架烘晴懸萬鴉暗鴻洞隻鷺明㛹姢寺古繚虛嶂房深貯澄漣珍鱗紫金睟秀石蒼玉攣住僧自縳律愛客能逃禪老帖不容塌枯琴尚堪弦出訪文舉碣還息維摩氊窗暉梅枝月帳鬱柏子煙吸清飽蟬腹擁薄攢龜肩忍寒如忍艾望曉猶望年報明翠鯨壯送暖紅麟妍讀易坐方穩搜詩去俄翩行行晉縣壘歷歷吳墓田森峭徑絶壁嵌空派危泉飛墮雪珂境撼動冰輪閣名天憩寂小養雋挾酣急凌巔閣摧失傑詠巖在餘竒鐫夕氣生逺嶼倦懷寄平川路旁柳如此陌上花依然數年束強項一日舒聮拳大千自鵬鷃方寸皆魚鳶東風染芳碧更著尋春鞭和何伯溫見寄二首問字無人過草堂昨非今是兩俱忘鶴何骯髒寒方警梅許凄涼靜更香萬古江山窮太白一簾風月老張蒼多君不作炎涼語識我平生鐵石腸青山流水曉蔥朧讀遍黃庭萬境空羔甕無緣澆舌本貘屏有分護頭風人謀歷歷既未濟民力班班大小東陶寫此懷須好句殷勤時與寄來鴻和子有感時八州都督新推轂兩紀中書舊覆甌郿塢然齊如有䇿聊城飛笴便無憂時逆全作過歲杪用韻二首日月磨心緒風霜染鬢華曆看新歲草梅憶舊年花濁酒供僛舞清歌應摻撾阿咸多事在猶問老生涯黃麾春簇仗夢不到東華瓦研磨冰葉磚爐煮雪花窮甘猿帳卧老倦犢轅撾凍解光風轉晴波拍兩涯元宵前三日侍老人遊雙林大徑山髙寺山巔小徑山深寺山趾辛夷花開數點雨艾納香空半泓水新新故故自樓閣下下髙髙各窗几二三名公詩一束八十老衲畫幾𥿄雲岑滅沒野屋浮草樹離列渡舟檥露橫斷浦月巳髙日落平沙風欲起直疑著我江湖間安得伴君巖壑裏魚肥尚恨絲蓴晚酒酣苦愛𦵔筍美參寥有句墮杳靄更上迎暉亭徙倚謹和老人明朝中春二首田夫野老布長衫郊外相逢與共談一把年華將望六九分春色又過三竹雞絶呌茶生笋梅子微酸酒熟藍流轉風光無間斷此身元與化功參淡黃深碧上春衫無限春懷豈易談隨手去來拈放一到頭得失暮朝三日烘花氣通玄牝雨洗山光漲蔚藍熟聽五更晴哢好不須多恨罷朝參春行次韻拂開芳草碧坐斷落花紅丗味觥籌外年華帶眼中六州空鑄鐵萬物任為銅有鷕桑疇雉逢時會長雄病齒吾母苦蚤衰髮霜齒存幾小兒得其髮大兒得其齒豫方四十時上齶右車毀從兹白石源歲歲費經理軟疑梅著酸踈類榴罅子根浮觸易兀力弱遇輒靡懷核忌堅栗設胔便脆美爛炮故自佳急咽聊復爾刺肥劇鉏姦剔纎難拔壘屢搜風屢入一快勢一圯撼搖腫貫顴焦蠧痛徹髓外雖編貝然中實空齦似赤龍攪沆􅒭玉池漲清泚天鼓弗能扣金鼎亦徒舐乳媪老不羞機女少自喜風流久已絶血氣安足恃磨治朝辛鹽漱溉夕莎芷庶幾尚扶危不至遽乏使太官羊何腴五侯鯖更旨雖無轑釡嗔未免媚竈耻菽腐柔趂梜粟糜滑流七不愁餒在中却笑飽欲死舌以柔故存此語未敢唯春思三絶柳汁何能染鬢根柳絲只解絆愁魂年光有砥催人急水牡丹花又上盆細草荒煙古墓田知經寒食幾年天雪條花下翩翩𥿄疑是曽分白打錢蝴蝶深深淺淺黃被春惱得一般狂打團飛入菜花去自信丗間無别香偶成沂水春風弄夕暉舞雩意得詠而歸為何與點狂曽晢箇裏須參最上機三月晦東山太皥明朝禪祝融杖藜能送幾東風兩崖蘿蔓因依緑一樹桐華自在紅聒聒竊脂農即事喈喈摶黍女趍功細思舉丗誰間得一笑浮圗倒景中續夢琉璃庭扣水晶欄寶樹婆娑玉斧間只恐姮娥嫌冷落却隨飛月下人間作茶行磨斫女媧輔天不盡石磅礴輪囷凝紺碧臼刳扶桑挂日最上枝媻􅘐勃窣生紋漪吳罡小君贈我杵阿香藁砧授我斧斧開蒼璧粲磊磊杵碎玄璣紛楚楚出臼入磨光吐吞危坐隻手旋乾坤碧瑶宫殿几塵墮蕊珠樓閣粧鉛翻慢流乳泉活火鼎淅瑟微波開溟涬花風迸入毛骨香雪月浸徹須眉影太一真人走上蓮花航維摩居士驚起獅子床不交半談共細啜山河日月俱清涼桑苧翁玉川子欵門未暇相倒屣豫方抱易坐虛明參到洗心玄妙旨送程於潛兩首溪山民物古政理器能寬平易見眉睫明清生肺肝春風簾影暖霜月研聲寒野老自相語元豐崔長官遡紫催飛舄攢紅簇去鞍吾邦傾市送旁邑塞塗看清廟登犧象明庭峙孔鸞野翁麋鹿友時與訊平安新月天面如人面昏昏鎮是愁晚來雲色解新月放眉頭百合花日月飛雙轂如何駐黑頭才看敷密友又見拆強仇葉聚稜稜峭花垂娜娜稠晚涼芬烈甚欲睡更遲留雨中次韻兩絶積多雲鶴巖前雨種遍長松墓上田豐歉相乘天有數今年管取斗三錢提壷勸飲元無秫促織催機未有絲葉砥蟬蟟尤更苦吸風飲露伴人飢送徐顯道尉無錫握手不禁別庭梧聲欲秋雲霄生腳砥田里付眉頭敬是禔身柱和為應物舟卷旗蒲柳市茶鼎雨颼颼二花粲粲金錢映玉簮榮華能得幾光隂季倫歌妓春申客零落秋風沒處尋理菖蒲朝刪石上青之黃暮摘鏡裏黑之蒼胸中多少冗荆棘不翦不藝空過日君不見顔子一克巳曽參三省身每日低頭矻矻自點檢何曽浪把外物勞精神嗟乎我猶未免為鄉人間居二首一覺湯餅睡幾轉庭花隂不作八翼夢以無冨貴心東家朝鳴玉西家暮橫金芭蕉大蔽牛不奈霜風侵何如老忘得曲肱滋味深出門聞鳩語秋思生春妍豆苗深沒腰稻花髙出肩路旁兩三叟合爪感謝天老身幸不死得見穰穰田眼中多少人不能待豐年雙林志廉得元暉筆法作此七十三矣為賦六言兩首近浦霏開略彴逺山雲沒招提樹砥人家欲曉隔籬倣佛雞啼潮退寒洲聚沫雨收春嶂蒸雲歷歷舊經行處江村曙色𥘉分送阮深甫尉桂東兩首秋隂踈梧桐暮寒老蒹葭病鶴臥空谷遊鴻起平沙飄搖征衣單寂歷津堠賖中年不禁别湘江渺天涯一靜鎮百紛一恕生百順所居欲官大此道貴坐進塗平鞭影疾風壯帆力迅臯蘭拾秋芳好寄南來信九月一日侍老人遊洞霄宿超然館聞鐘太一相過燭未銷朝元鐘動鬱羅蕭身輕不怕瓊臺滑蹴踏青霞上斗杓翠蛟亭兩絶壯杉耄檜護嵌空飛墮蜿蜒白玉虹莫道隔凡元有柱胡麻流出石矼東晴雷碾破白雲􅌪無數林華衮下坡好把轆轤翻轉著崑崙頂上卷黃河贈石室朱修行兩絶響泉一派落天風人在浮雲柳絮中亭午柴關猶未啓碧珍瓏砥拒霜紅落葉堆中折腳鐺白雲煮盡又還生洞門黃鶴婆娑舞留得松風待月明送趙處士遊方道家何荒唐釋氏更汗漫君胡欲逃儒結入楊墨案時文窘枘鑿俗好厭冰炭起尋出頭路去覔行腳飯左携仙君茅右挾佛祖粲隨身絶長物到處得竒觀江山枯桐寫風月老筆判識透心轉空養足骨自換長生不可獨分寄石髓半何正言母安人挽詩鳯采生丹穴螢光聚絳幃兩登黃甲去一佩皂囊歸萱老悲方切蘭枯夢又非青山秋寂歷客淚不勝揮𥘉釀手臼登新秫頭缸試嫩醪蒲城寒信早栗里曠懷髙重熟魚沾麵微生蟹帶糟老儂元不飲隨喜亦陶陶贈前京東王制屬赤葉風欲盡黃花霜未乾病添豫許老窮迫子能寒劒蝕蛟還吼袍塵鶻尚盤山東河北事欲語淚汍瀾翁媪行翁頭白如銀媪頭黃如金抵足搔瘡昏到明羞殺敗布多年衾晴窗蟢子懸瀰瀰翁媪相看顔色啓門前人送撰碑錢半贖冬衣半糴米哭都城火辛卯九月丙戍夜未中祝融漲熖通天紅曽樓傑觀舞燧象綺峯繡陌奔燭龍始從李博士橋起三面分風十五里崩摧洶洶海潮翻填咽紛紛釡魚死開禧回祿前未聞今更五分多二分大塗小撤噤不講拱手坐視連宵焚殿前將軍猛如虎救得汾陽令公府祖宗神靈飛上天痛哉九廟成焦土仲冬二日還自谷川道中兩絶晴煙杳靄似春山踈柳啼鴉意度間溪上麥田翻未遍故遲牛帶夕陽還滿天返照醉紅殷未到生明月巳彎好是蛾眉無點恨盈盈淡掃有無間至節前十日遊勝因寺霜霽午曦暖潦收沙路晞束山知寺古避客怪僧稀籜滑涉危屐藤鈎穿密衣月黃風不動燈火虹去聲橋歸謹次老人至節韻但見隂陽遞斡流誰知陽本未嘗休善端繼繼無窮脈元化生生不盡頭杜牧浪將箱勸讀少陵空為線添愁何如靜坐觀其復一點靈臺造物遊至節出謁回二絶一脈陽從地砥回人情物意便春臺鮮衣稚子面紅醉知向外家參節來巧笑聲搖六博盆纎纎人在緑窗根隔紗想見春風面雲滑金叉欲溜䀶病目日過學不力年催名未芳心期雖皎皎目視巳茫茫燈疊青紅暈書紛黑白行蒲團深瞑坐禪味覺偏長椒菊枕矮檠矻𥘉年細字窘晚節天憐蠧書障神授鴻寶訣金葩涼而嚴丹寶溫以烈兩囊貯風露半簮藉霜雪芬透頂𩕳爽清祛腦脂熱夢魂寥廓逺宇觀沆瀣徹雲開月更朗電掣巖欲裂術妙刮膜金功過刳蟇鐵聱牙讀楚詛瑣尾窺越絶不憂幻景侵且喜翳根滅頌花醉春溫餐英飽秋潔塗屋兆蕃碩飲潭進耆耋况兹芳澤聚盡洗空華結夜氣存虛明天光發昭晣須彌能微塵渤澥或丘垤不直一笑粲巳判雙眥決俞提舉挽詩二首展也萬夫特翛然山澤臞朔風空汴泗春水渺淮湖籌驛尹師魯詩壇梅聖俞繡衣歸老去有韞不輕沽蒼鶴孤山曉黃花栗里秋一身雖物外萬國尚眉頭遺老幾何在耆英只麼休問天天不語江闊莫雲愁奚知縣挽詩敏鋭霹靂手寬平雲夢胸雄臺髙幕畫劇邑冨民庸帆挂風方駃戈揮日又舂炊粱剪春韭無復奉從容臘中步月二絶平山堂下解圍去天水堡前經戰來天地無情一般月照人霜骨白皚皚賣妻鬻子年飢後索母求爺賊亂餘對月椎胸幾家哭更堪蕭索歲將除何正言挽詩雋手芥拾紫忠肝蒲伏青嬰龍雲氣直縳虎雪毛腥炊枕夢何短書棺名更馨眇然人物幾墓草涕交零謹和老人惠山泉二首取水驛符到喊山旗信通碾分花砥月爐受竹間風金谷正覔醉玉川誰道窮頂門甘露入喚醒主人公第二水泉動斜三封印通愛竒親煮雪得雋細生風酒肺蘇將渴詩情洗盡窮娉婷須好買供奉讀書公歲暮山中紀事三首南山大小空橫行無常時蓄狗豢豕盡澤吻樵牧兒翁嫗起譟逐妥尾行愈遲力窮哭且罵天網不汝遺里巷負暄翁隤然支離疏叨虱緣緼袍點綴頷下須旁人勸翁捫搖手一任渠虱多轉不癢何庸事驅除鄉風臘草五比户然爆竹窮隂挾黃昏霹靂起空屋梁間鬼拍手笑人未免俗罔兩白晝行渠爾一爆逐除夜市兒數十百挾炬相追奔爭唱賣呆歌祈以昭易惛我呆大如屋幾臘擁敗垣群雛勸我賣急售價莫論弄巧或成拙太清不如渾老鐵無孔鎚甘守鈍性根新年欲識新年課都非舊日圗詞分詩料帳酒奪飯工夫煆息柳邊手鑷間花裏鬚寒消芳草緑打急辦行厨謹和老人欲還故廬颼颼破屋小青禱客枕頻年寄道周行止非人真可笑窮通有命尚何愁春風舊壘雙飛燕宿雨新巢百拙鳩信是還家貧亦好德人何處不天遊謹和老人春行抗疏明時效伏伽一歸七度試春紗柔風緑遍庭前草細雨紅催陌上花惠逺買來猶濁酒趙州喫去只粗茶回頭恰恰鶯啼處黃四娘今尚有家又塔院僧伽傳法處阿育放光時到頂直無縫透心橫有枝梅間詩鳯咮竹裏酒鴟夷醉上危層去空明渺所思燈夕獨酌二絶鈿車羅帕禁街夜珂傘炬城沙路春少不自強今老矣落梅風暖酒生鱗海濤風定柳枝曲江楫波明桃葉歌剪燭停杯聽宛轉不妨白雪映青蛾送遊考功將漕夔門七絶溫公一傳諌議劉菊坡一傳吏部遊長庚伴月天欲曉西照太白南羅浮神鼎一鑄魑魅怖法鼓四震波旬悲祖宗涵養天下氣留得此脈扶顛危欲鳴不鳴銜口馬欲去不去羸角羝排天絶呌河漢裂隻舸飛上岷江西古來刀鋸鼎鑊具用待誹謗妖言人掁觸不怒豫節去惟天為大知堯仁金湯棄去七百里珠玉走盡六十州誰生厲階不可問桔柏江上風颼飀燒畬瀼外竹枝瘦踏磧灘上桃花肥繡衣故鄉豈不好為天下計母庸歸四肢誰謂可無骨五臟自信難留寒跋豫望之不得語但願萬里書平安正月二十四日早夢乞聰明於東坡東來一舸橫天上御風而行無點浪有人野服帽髙簷宛如赤壁圗中樣舉手疾聲呼先生為我心孔開聰明䱼然一笑若相語乞得聰明不如魯老人晚得女真真又曽孫女金華皆再周而殤葬塔院後今春焚化用前韻賦詩謹和窣波影裏誦陀伽古佛燈籠護絳紗智慧竭羅雖正果慈悲妙善亦空花怕寒婉孌𥘉拳蕨望雨醒鬆細舌茶節物感人還自解有兒何用女當家送澄維那訪舊湖山梅子酸猶淺桃花豔已饒春風開口吸明月換肩挑鶴向平湖放猿從古洞招出門天地濶何處不逍遙葉主簿挽詩生理鴟夷子心期桑苧翁行厨修竹月坐艦落花風雛好才孤鳯行踈忽斷鴻吳松明逺目一點夕陽紅謹和老人古硯韻破壞憨僧衲凹欹漫叟窪吐雲頭縮蜃啖月口呿蟇宫㜮愁難捧堂胥怒可撾莫貪濡筆利浪草侍中麻路逢徽州送牡丹入都飛絮遊絲弄霽華出門芳草渺天涯太平莫道全無象脫繡鳴鈴傳送花首夏一絶示徐錦囊金九未熟櫻桃過錦幄俱空芍藥來共坐晚涼觀物化床頭有酒為君開答王仲鈞兩首無言安止止不動妙如如暴虎未聞道汗牛空讀書赤窮遑恤後白坐且求𥘉寂歷野花晚嫣然風雨餘老鏡風霜飽離觴歲月悠曲多傳郢水前郢州司理詩亦到蘇州拽轉撩天鼻抽將閙市頭投林母用急時至會封侯次子有下第韻東風換骨立成仙五色終迷自古然龍變未符今舉讖鶴來當驗後科緣情如中酒冝親酒命合腰錢會有錢許買娉婷供老伴不妨遲得兩三年答駱肖秦過我葵榴巷留君筍薤厨襟懷新雨快面目故山癯自笑孤飛鶴誰憐返哺烏未應埋沒得囊有萬驪珠𥘉夏即事一首謝俞德逺惠茶病眼昏花懶讀書閉門恬養冉溪愚一簾草色蛤呼伴四壁樹隂雞護雛巳是歸來何用引本無太極不須圗小團自汲新泉試涼滿松風石銚爐重午山蹊獨步扶病索清蔭循林步幽霏花拈勃姑飯草拾蝦蟆衣良藥觸手是壯容轉頭非昜輔天上漏難駐人間暉寒暑遞流斡悲樂相因依功名少終吉冨貴多危機李泌語欲咽屈平志空違不如滿引酒舉丗知我希平齋文集卷第七
