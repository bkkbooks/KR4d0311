body:
  text: 序楚泮榮登義約序禮賔周制續食漢法士未嘗爲舂糧之謀科舉設而待士之意衰薦名春官至有貧不能行者亦有婁上而索其家者逺方皆病之番江去武林餘千里歳當大比相與裒金俟同盟薦送之多寡均以給費嗟乎床頭金盡壯士失色嚢無一錢羞澁萬態彼蓋未知道者吾儒讀書萬卷可敵猗頓之富何至預以行槖不充爲憂是舉以義爲勸亦唯相期於功名之㑹而已然義利相去不能以寸而趍舎有舜跖之分平時燈䆫議論務以道義相磨礲至利害迫之小則賣友大則賣國視所學爲芻狗者多矣諸君聮翩青雲致身冨貴其母忘虀鹽時後車十乗從者數百其母忘聚糧時一貴一賤升沉不齊其母忘同盟時能守是約斯可謂義皆曰能遂輟萬錢爲之倡嘉定三年正月望日錢塘洪某序送何龔父序夏至後三日龔父歸閬訪予以别飲之酒且告之曰君子之學進於静爲難静者誠之復性之貞也聖人定之以中正仁義而主静學聖人者必以静養夫中正仁義之所自出蓋人生本静物交物引之則静者動動而無以制之愛惡情僞互相感觸則横流而忘返静所以制夫動也而静之功非可以驟進朝省夕察日磨月錬用力於惟危之地如馭駻馬如防潰隄如治百萬之師使志足以帥氣而氣不爲非義餒在我者立在物者靡慾心平而躁心釋静之功進矣静進則内體純固而清明廣大生焉清明則天地萬物之理皆㑹於吾誠廣大則方寸之運天地萬物皆爲吾用而道在是矣易六十四卦乾坤之外其本體以道言者惟復與艮復之動隱於至静之中故曰反復其道艮之静立於羣動之表故曰其道光明道未有不自静入者也參之魯艮顔子之如愚復聖門之正傳以此龔父資簡茂近於静其入道爲易澄心以觀我平心以觀物一敬主内萬想不揺山光凝而白雲度野水空而庭草碧悠然意得表裏俱融所到詎可㝷尺計哉予方習矣弗察乃以告吾子它山之石可以爲錯朋友講切之義也龔父勉之異日將於是乎觀所進於潜洪氏譜系圗序洪姓有兩出一避唐孝敬帝及本朝宣祖諱易弘爲洪一伏羲神農間共工以水德伯九州其子勾龍爲后土後裔封於共爲共氏漢末避仇益水爲洪吾宗共伯之胄也聚族天目下以東洪名其村無慮六七十家耆舊相傳始祖自四明挈家奉母來今西莊下擔墓猶亡恙毎歳除家祀所謂渡江祖席地用古禮而所徙歳月漫不可考然自始祖至于今不翅十五六丗一丗三十年當是唐中葉徙居於潜谷口矣洪望燉煌郡其散見於纂記多占籍東南呉廬江太守矩宣城人唐集賢學士孝昌舒城人翰林學士侃仕南漢參知政事昌杲仕南唐昇元宗譜一侍御三尚書則鄱陽三洪之逺祖也得姓以來鄱陽爲鼎盛而在潜之洪四五百年間種德蓻善源深流長曽未有顯者豈聞崖僊之風以肥遯爲髙歟抑名山大川英淑之氣有待而發蓄雲閉霆然後大沛厥施歟紹興巳酉裔孫珏首考丗系派别爲圗藏于家其後斌又采之爲祖宗諱第圗訖于已卯去今六十八年支葉益蕃不可無紀余自郎曹罷歸地偏日永因彚稡而續之凢力田以肥家從戎以丗宦讀書爲文以名埸屋皆倉監公長子仁朗之傳吾所祖也故詳仁藴之後數傳而遂微故老不存舊聞放失未免間闕文以俟質訪夫能言其祖郯子見師不識其先籍談取誚肖貌于兩間者不可不知丗繫之所自出知所自出則知根榦華葉同此一氣自葉流根不容間斷春秋烝嘗以序昭穆而謹終追逺之意存歳時㑹聚以親族黨而乖争陵犯之風息朝夕講磨修飭求爲善人君子之歸而無忝於爾祖此圗蓋亦風教之助云寶慶丙戍六月庚寅十五丗孫某序豫章外集詩注序天降時雨山川岀雲故嵩髙烝民之詠不于人物之盛而于其生我列聖以人文陶天下學問議論文章之士莫盛於熈豐元紹間其生也類在神文朝如詩家曰蘇黄曰黄陳蘇公生於景祐陳公生於皇祐而豫章生於慶暦天地清寧日月正明禀於氣者全也公得清寧正明之全氣氣全而神王挾豐隆騎倒景飄飄乎與造物者游放爲篇章超軼絶塵獨立萬物之表坡翁蓋心服之而後山師焉其集嘗擬莊子分内外篇外集如韓淮隂驅市人背水而戰暗與兵法合内集如諸葛武侯八陣竒正相生鬼神莫窺其奥彚分之意嚴矣君子之學日進而日新日新而日化進則人新則道化則天逝者如斯不舎晝夜正以是也文與詩亦然論詩者不泝其始無以知其進而新不極其終無以知其新而化内集斷自入舘以後極其終矣外集起𥘉年溪上吟泝其始也眉山任處士驥天成擺落科舉之累眞積於學書無不覽愛公詩若嗜欲然以内集有任子淵注因注外集十二卷攷年譜以推出處用事必求其意用字必探其原勤且博至矣或以詩嘗經公手刪而疑其多愛然使學者盡見前輩少壯至老之作以觀日新日化之功雖多不厭也子逢博習有家法方注詩時兩髦耽耽撿書捧研領退而學詩之意今以名卿守蜀白首矣懼父書無傳力自讎校鋟而公諸丗萬里信來俾序之某晩岀未闖其樊何敢贅樓攻媿謂宋宗儒摘阮歌戴道士彈琴詩不知何以分内外當有能辨之者余聞李衛公好惠山泉置驛取水有僧言長安昊天觀井水與惠山泉通雜它水十餘缶試之僧指其二曰此惠山泉也文饒爲罷水驛欲知内外之辨者請以是觀之桂巖雙蓮圗序西風入簷凉滿巾席紫水何君噐之以嘉蓮圗來示云大兒自任舎桂巖沼中所産也前是庭砌嘗長異篁今復有此郷之耆耋雋艾相與夸詠以爲瑞懼弗克當也子以爲何如余撫圗太息言曰深哉造物之意也鳲鳩在桑其子七兮淑人君子其儀一兮鳲鳩之哺其子朝從上而下暮從下而上均平如一君以義方名家以厚德燕後男子子四叔仲季連著聲科級而伯未也伯有子亦復嶄然露頴於埸屋派義方之澤蔓厚德之慶猶鳲鳩晚哺已徧於下方進而上及固有開必先乎夫英華者和順之發也馨香者忠信之逹也充實輝光者善美之形見呈露不可遏者也君觀是華根培而榦擢歧芳而趾榮天理人事之相爲符昭昭也惟無必其在天而後知天之可必也年月日序春秋說序帝王誥命訖於平王國風變於黍離聖人傷王者之不作因魯史修春秋以奉天命而立人極夫天命流行於人極之中無一息間斷人惟不知吾心有天而外求天謂吉凶禍福天未嘗定往往無天而動於惡然天雖有時而未定終必有時而定天者定則人者屈此人極之所由立也此春秋成亂臣賊子所以懼也彼亂臣賊子惟利是計豈懼夫空言之貶身後之辱哉懼夫天者定而人者屈失其所以爲利也故凢犯天下之清議冒天下之大罪能逭諸一時不能逭諸異日能逭諸其身不能逭諸其子若孫人誰無愛身愛子孫之念知天定有不可逭則欲動於惡將有所懼而戢此撥亂反正之筆所以有功於人極也且易春秋在魯皆所以司天人之契人欲窮而天理滅其卦爲剥春秋二百四十二年純乎剥者也以齊威霸天下始末求之毎四十年當一爻隂愈進則亂愈甚盟宋之後晉以天下之權授之楚而大夫專盟諸侯皆廩廪乎贅斿之危五隂之剥成矣其末又以天下之權授之吴吴楚與越參立而交横大夫各朶頥其國禍亂及矣而獲麟於西狩亂極必治安知無王者作此碩果不食剥所以不終於剥也春秋以傷王者不作而始以幸王者復作而終以魯聖賢之澤未泯一變可至道而託之以詔萬丗天道至教聖人至德備見於行事斷斷乎循之則治違之則亂得之則生失之則死信人極非春秋不立也余自考功罷歸杜門深省有感於聖人以天治人之意作春秋說兩漢詔令序天道不言而四時行聖人不言而萬化成言非感人悟物之本也審矣二帝之典三王之誥猶不能已於言誠在言前也言岀於誠雖言而忘言漢丗至誠之學不講皇極之訓蔑聞而一人志慮形爲播告大抵岀於手製天下猶得以因其言知其意夫言之不文行之不逺渾渾灝噩王言之體也漢上接三代統緒其文猶有爾雅之遺人主天資有髙下躬行有純駁識量有廣狹政事有得失固不容槩論而以仁立國之意丁寧懇惻四百年猶一日至先主孔明之用蜀一時詔勑亦能使聞者爲之興起豈非兩漢之澤未斬歟孟子曰誦其詩讀其書不知其人可乎是以論其丗也此書爲尚論其丗作嘉定癸未冬甲子於潜洪某序送程叔運掌之湖南序秋風動容木葉欲下眉新進士叔運程君過我東山將歴沅湘而南征愀然買酒酌之曰香草佳木隨地皆産而莫盛於湘之南湘南衆芳所在杜衡江蘺夫容薜荔木蘭若芷荃蓀椒桂不可一二名而莫盛於蘭蘭有國香人服媚之𥘉不以進而榮其生深林無人自芳亦不以退而辱騷人所以反覆深致其意以其似道也故紉之爲佩折瓊枝以繼之而求襲其芳澤是芳發於身逹於家漸於國以及乎天下薫蒸乎兩間流𬒳乎百丗曽何負於人哉而服艾者謂不可佩人心嗜好不同乃爾於蘭庸何悲委厥美以從俗而與惡草俱化則蘭之悲也然蕪没於蕭艾之中可蔽其芳不可奪其芳故曰佩􅌭紛其繁飾兮芳菲菲其彌章又曰惟兹佩之可貴兮芳菲菲其難虧其根於天者蓋終始未嘗爲時俗流從所轉也蘭有數種有澤蘭有石蘭有一榦一花之蘭或秀於春或旉於夏而發榮沅湘者紫而尤馥見於秋爲正秋方憭慄慘悽萬卉溘然如戰敗無人色緑葉紫莖表表獨芳其可敬也夫坎維心亨困而不失其所亨此蘭之所以似道也君欲進乎道盍於蘭乎訪之且爲我歴訊衆芳無羔攬涕延佇未知九畹百畮之誰屬也嬾窟詩藁序錢積祕丞檇李錢君子正與余好嘗從容論詩喜稱仲氏慶善賦詠得回谿老人之傳恨不及識也子正即丗十有五六年其猶子巖友以嬾窟一編來曰願徼福于祕丞叔丐爲先君子發之余愴然追往不能已因念詩亡而離騷作騷之憤丗疾邪蓋岀於小雅之變後丗之詩又以岀於騷爲近雅時觸乎所感事拂乎所遇託物引興以寄永愾紆餘窈眇激揚頓挫有不盡之思而詩工矣然皆變小雅流風之遺也知大雅廣哉熈熈乎之體幾何人哉慶善嘗爲長樂宰施不盡學其見於詩凢騷人感槩不平之氣憤鬰無聊之情一無有陶冩性分惟澹然樂易之歸江山之平逺風月之清明草木魚鳥之幽間自適皆其神氣之動德符之充也廣大而静䟽逹而信者冝歌大雅其必有㑹乎題跋龍州免運糧夫碑跋蜀自開禧佳兵以來調役婁矣龍之民獨共其二平時家出丁壯畨上十關五寨以扼氐隴有警則以賦授役霜骭雷腹􅍪奔魚貫飛輓于關表間顧更厚征之其民重困有懟而無告制置南海崔公都運合陽趙公聞而惻然曰不堪命矣嚴爾戍寛爾轉饟自今其勿與山窮水盡之邦刀耕火種之俗始有生意誠求之也詩曰民亦勞止汔可小息母縱詭隨以謹罔極敢告諸來者嘉定甲申五月旦日易齋詩藁跋詩無定鵠㑹心是的仲可謫居二十年自放於詩多警䇿其賦梅有天不能寒獨有梅一渉春風不足竒之句讀之至此悵然乆之曰其有分寒餓也耶余於此有㑹其亦有分寒餓也耶因書卷末崔文昌書翰跋爲黎監丞伯登作蜀輿鬼分野多鬼術辛已瑞慶節有日者自益昌過少城竊詹菊坡老先生於大慈寺滿散所退而謂某曰帥嶺南古佛西蜀福星也至節前後度劔即辭過崇寧謁德升曰賢大夫旦夕入益昌幕時宣閫猶無恙甚疑之已而至節後果度劔德升㝷入幕以縝栗緯恢博以簡静翼方嚴從容論議如正志審固之鏃劃然而破的如躊躇四顧之刄謋然而中􅑆如鳴和鸞逐水曲之馭妥然王良造父之手而六轡如舞也用能起乆憊之俗弭紛集之變而遂與同外賔主遇合固有數行乎其間乎夫以朝廷信臣由一路帥四路若可億揣莫府𥘉開求士於叢英旅雋之中而數巳先定人其可萌一毫劵外之想乎因觀菊坡手帖有感敬書其後俞拙庵偈語跋士君子平生學力最可驗於啓手足之頃曵消揺之杖易華睆之簀蓋安之以爲常而不以爲異也拙庵居士業儒好脩以拙自喜拙則静静則平平則澄而明理明志定不爲氣所動故能無怛化病革家人環泣撝勿泣命子德藻滌研濡筆手書四句偈以訣神宇凝正鉤畫勁峭實踐素履絯攝呈露坦然以方寸遺子孫非學力之驗耶至此然後知簸弄精光於百巧者之不如拙陶同年崇詩卷跋某與宗山同壬戍進士甲申冬同除祕書郎迓之江上投分日宻乙酉秋某去脩門未幾宗山亦去時上方郷用舊學何落落獨爾耶宋廣平賦梅花疑非鐵石心腸人海棠詩近之矣九原莫起撫卷澘然彭忠毅謚勑跋爲董景揚作紹興間顔邵以其祖魯公所自書告進上曰人皆有一死或輕於鴻毛或重於太山處死爲難耳忠毅彭公亦善處死者也守衢日方臘䧟歙睦杭衢介于三郡賊勢張甚獨與郡僚叚處約守城城䧟罵賊以死有殺身以成仁公之謂矣公伯氏尚書元祐紹聖正人壻余御史亦以直聲聞天下一門氣節相尚輝映千古景揚公曽孫壻得呉傅朋所書謚勑於其家故篋猥釀中寶之如天球珙璧其知所尚哉年月日某敬觀于朱陀聞復閣家朝南避僞回任檄跋開禧丁卯之變蜀士有死之以爲忠者有去之以爲義者各行其志也吾朝南其去之以爲義者歟夫死生命也去就義也惟其委死生於天而後能全去就於人易曰君子以致命遂志朝南以之徽廟草書千文跋臣恭惟徽宗皇帝聖學天縱粃糠姚姒萬幾餘閑游戯翰墨元氣淋漓不擇地而施梁周興嗣所次千文遂𬒳異丗非常之遇髙宗皇帝中興江左志在復古列聖雲章奎畫厚募歸之東序每得宣和宸藻輙悲不自勝以故左璫慮傷上意多抑不進此文其一也龍騰電掣出入造化躪繇轢羲前無千古甲丁護持刼燼不壞凢十有六𥿄悉以交龍篆章劵其縫臣子述博古識眞恭禠而寶襲之一日出以示臣臣聞紹興間上知懷素千文藏董弅家命朱勝非諭指投進使此書得陳乙覽豈復求鶩於野乎感歎之餘謹拜手稽首志其末寶慶𥘉元寒食日臣洪某髙廟千文跋經乾緯坤者典學之全功出聖入神者游藝之餘事臣恭惟髙宗皇帝斷鰲立極息馬論道緝熈光明之學追嫓三五倬彼雲漢敷賁石經龍畫螺書旁分徧刻莫不大關造化細及庶務垂則于億萬丗千文特凢將下陳何與大學婣姢餘閑亦復肆筆及之臣子述所藏臨智永書識以彭城瑶暉奉華印章劉望彭城或謂當時劉貴妃所得好賜楷法遒潤草聖妍力神動天隨超絶衆妙視永所書可謂集厥大成金聲而玉振之矣我太宗皇帝嘗行草千文賜李至至請鑱諸石以詔方來上曰梁武得鍾繇破碑俾周興嗣次韻非垂丗立教之道孝經百行之本朕當親書觀思陵奎藻者當以熈陵之意參之寶慶改元清明後一日臣洪某九頓首謹記程剛愍死事跋死生命也處死生義也義所當死直死耳君子不茍免而生也身不茍免而生乃所以生社稷也天寳之禍唐以顔李張許之死而生靖康之禍吾宋以傅李梅陳程安諸賢之死而生皆功在社稷者也嗚呼安有功在社稷如剛愍而其後莫之録乎端平𥘉元立夏後兩日古潜洪某題洪崖圗洪崖三皇時有道之士其見於隋唐間者曰張氲或曰藴自號洪崖先生岀入以髯髧五雪驢一自隨此圗是也呉興葉子淵得晁氏所藏龍眠本手臨以見遺老人戯題云先生固清髙弄拙反成巧一人御六子終𬒳雪兒妙此畫此詩俱有眼也猶子穮弦誦之暇取所畫臨之一發輙破的老睫爲明因識其末紹定癸巳立秋日題西岳降獵圗君玉以宫車遊獵圗二寄示共七𥿄韔箙前驅嬪御紛從來輿去馬蹴踏雲氣其精妙瑰恠縱横變化出天入神嘆非龍眠莫能作而不能名之轉似都官隆山李成之曰西岳降獵圗也吾家絹本得之康節孫邵公濟家人物部分與此無一不合獨第七節前多馬上美人四因合二圗爲一次第其先後以復得非兩家所藏同出一時之筆𥿄其創絹其成歟絹壽止五百年𥿄壽千年君玉倒黄河以洗研挹玉井以濡翰醉攬風露吸金天之晶而賦之必有與此畫相爲壽者紹定癸已立秋日於潜洪某舜俞書于繡山堂題天台聲聞十八尊者像余庚午𥘉夏與㑹稽王仲鈞同遊廬山旬餘一夕仲鈞先還南康城余獨宿開元寺軒䆫静深毛骨灑然夜半夢至佛殿前遇長身僧握余手而言堯曰數句巳斷於篇章之末參乎一唯獨得於言意之外孔子子思相傳者如是吾佛亦如之孟子不足與語此言訖而覺林月滿庭水泠泠如琴筑因起坐不復寐晨粥舉似衲子無能㑹但以山中古佛示現爲對轉首二紀矣臨安東山浄空岀天台聲聞十八尊者像乞一轉語恍然有感追前夢書之聲聞領此必有超悟於文字語言之表者范丞相謝表跋慶暦中仁宗以中外人望用韓范冨共政責治於期月間遇合之盛如此一朝欲止僥倖退不肖而小人始側目相繼去位髙平公受知髙廟前無與比至重惜名噐裁抑茍得亦罷相於紹興𥘉直道之難行雖盛丗猶不免可勝歎哉端平丙申正月十一日於潜洪某書劉忠肅尚書右丞告跋挫士氣者沽激之名壞國是者調亭之論忠肅公在元祐𥘉以吕正獻薦爲侍御史進御史中丞又以正獻薦擢尚書右丞方在臺時彈奏蔡確章亨吕惠卿安燾等靡遺餘力第知去大姦大佞以扶植更化之盛不暇計它日之禍也使公計它日之禍則必以無所是非可否避沽激之名開調亭之論局面隨手變更奚待閱八年而後爲紹聖哉雖然無鮑叔則無管仲無子皮則無子産無正獻則安有忠肅觀此告者當有感丙申春社日於潜洪某敬題于摛文堂劉忠肅冗費官制擬草跋前兩項寳元嘉祐詳定减省冗費似是進故事之類後兩項元豐頒行官制指揮必公爲右司郎中時代宰臣擬進續通鑑於覈正吏治條曰詔於創𬒳差命條曰上批其間頗有刪改處大意皆如所擬年月與此合神宗聖訓左右司湏是學爲宰相良有以夫劉忠肅遺龔輔之手啓跋公時爲校書郎公用韓魏公薦自江陵府觀察推官除祕閣校勘𥘉入朝時帖也尊諌院以先生丈丈首畨用名印於月次畨用於名皆近丗所罕見觀劉忠肅手簡嘉定甲申某與公曽孫爲龍州交承端平乙未丙申又獲與公元孫今太常寺主簿同朝常簿論事挺挺有祖風烈可敬也出示此軸敬書其後題劉忠肅和洗竹詩帖洗竹和篇與白樂天養竹記同意闢邪衛正嚴矣異時罷相乃出於所善之楊畏何薈翳託根之深耶觀劉忠肅所書金剛經此必非在臺省時所書閑退中移心法耳書諸公贈鍼醫李立之十全堂詩文後眞西山病革呉義夫自江西津致立之視之曰鍼有起死功未至之數日西山隤嗚呼天胡奪斯人之亟耶豈二竪畏立之之至迫之殆耶抑立之有天幸鍼不及施於决不可起之疾得以全其術耶余得竒疾於上齶逾年累更醫不効立之視之曰鍼艾所不及也知其不可治而不治是亦全巳江湖間恐有異人竒士能以竒方治竒疾試爲訪之幸得其方以寄是又不自居其全而能進於全歟古潜洪某舜俞書天笁杲古鏡住持箴此古鏡磨鏡法也乆後光明透徹自無待磨諸禪莫𬒳老行者熱瞞道不湏拂拭古潜洪舜俞平齋文集卷第十
