body:
  text: 奏狀復官申省狀辛卯今月二十二日凖尚書省劄子勘會某昨因臣僚論列久挂責籍纍經赦宥今又該遇慶壽霈恩合議指揮七月十六日奉聖旨洪某特與敘復元官仍與宫觀伏念某曩以狂愚自速罪戾遭逢大慶蒙𬒳寬恩特還舊階仍賦優廩仰戴天地生成之造所有省劄除巳於當日望闕謝恩祗受外須至申聞者禮部郎官辭免申省狀癸巳十月今月十八日恭凖尚書省劄子備奉聖旨洪某除禮部郎官成命肇頒危衷震愓伏念某曩以狂瞽自干譴何去國巳閲於九年奉祠且及於兩歲委心丘壑絶望班行不圗大明昭揭之辰亦與衆正彚征之會沉淪吐氣俯仰知榮第惟司馬位冡宰之𥘉蘇軾𬒳儀曹之召詎容是選猥及非材欲望朝廷特賜敷奏改卑在外合入小小差遣以養偏親實出生成之造所有省劄見寄留臨安縣庫未敢祗受謹具申尚書省乞賜敷奏伏候指揮辭免除監察御史申省狀右某今月二十九日凖尚書省劄子三省同奉御筆洪某除監察御史日下供職者恩榮自天兢懼無地竊以公議國家之命脈人材朝廷之精神方其未出則望之如景星如鳯凰及其既用則倚之為屈軼為獬豸元祐王巖叟之召明道范仲淹之來繄時所推皆此其選皇上養晦於十年之久天下望治於踰月之間轉機括以作新厲搢紳而更始紀綱所繫風憲可輕如某者積困窮途甫還舊著學問不足以窺王猷之逺議論不足以扶國是之公首玷親除必速官謗况未嘗作縣難以入臺欲望朝廷特賜敷奏收非常之誤渥卑有望之時髦庶使危蹤少安微分所有省劄某未敢祗受謹具申尚書省伏候指揮辭免殿中侍御史申省狀甲午四月右某今月十五日凖尚書省劄子節文三省同奉御筆洪某除殿中侍御史日下供職者渙敡異渥震愓危衷竊惟柱後惠文之官尤重殿中執法之選職修明於國是用整肅於朝綱粵從琴瑟之更張類多矛盾之並立邊帥之或和或戰正值兩強廷臣之孰是孰非必求一勝決治亂安危之勢觀抑揚進退之機疇副臺端盍掄時望如某者誤蒙搜拔濫厠紏繩謂車當主於可行何人心之擾擾而舟必無於偏重乃王道之平平方包不稱之羞忽冒非常之擢周旋烏府供奉赤墀純仁之內出姓名固誓圗於美報唐介之願解言職正恐負於隆知欲望朝廷特賜敷奏光摩日月别求夔龍接武之英威厲風霜庶折豺狼當道之氣所有省劄某未敢祗受謹具申尚書省伏候指揮第二次辭免右某昨凖尚書省劄子節文三省同奉御筆洪某除殿中侍御史日下供職於當日具狀辭免今月十六日凖尚書省劄子備奉聖旨不允者聞命知榮感恩思奮官卑不當再具辭免事有上關國體難以黽勉供職蓋緣近者一再論奏邊事與外閫異同諸將方鳴劒鼓行而前少有疑情必妨大計欲望朝廷念中外相應之理力賜敷奏改卑某間慢差遣邊臣聞之亦將踴躍赴功而無後顧一進退間足強國勢某下情不任懇切之至謹具申尚書省伏候指揮辭免中書舍人申省狀右某今月二十八日凖尚書省劄子三省同奉銜筆洪某除中書舍人挾日再遷寸衷積悸伏念某賦資至陋遇事最踈甫叨赤墀供奉之官遽劾烏臺分察之士冝加誅斥乃𬒳褒除矧討論欲貴於皇猷而封駁亦關於國論詎容冒處自速煩言欲望朝廷特賜敷奏收絲綸之新渥卑香火之叢祠所有省劄某未敢祗受第二辭免狀右某昨凖尚書省劄子三省同奉御筆洪某除中書舍人某於當日具狀辭免今月二十九日凖尚書省劄子備奉聖旨不允者某控辭誤渥尚閟俞音恩重命輕不當再具免櫝重念某九年流落一旦遭逢自郎分察執法殿中曽未踰旬忽塵詞掖聖上更新萬化收召衆正蒙𬒳寵眷未有某之比者况判花演誥儒生至榮豈不願發揚九重厲精更始之意使百工砥礪以承休德而某瓶罌器溢潢潦源枯儻華要之冒居必顛隮之立見欲望朝廷力賜敷奏亟收成命特賦叢祠或蒙矜念係是招徠一人之數改授斗壘以慰偏親實出望表所有省劄未敢祗受辭免兼同修國史實録院同修撰奏右臣今月二十六日凖尚書省劄子三省同奉聖旨洪某兼同修國史兼實録院同修撰者專官演誥甫玷討論分職紬書忽參撰次蒙恩舄奕揣分屏營竊以典謨所以記言春秋所以斷事六經不作三史相承馬遷辨而不華猶坐是非之謬班固詳而有體尚譏仁義之輕逮其下之紛紛徒傳之譾譾矧今修明三館之制揚厲纍朝之休在國史則紀傳表志之纂裁在實録則日月時年之編繫欲成萬丗之典冝得三長之材豈臣斐狂可贊筆削伏望皇帝陛下亟收寵渥别卑譽髦必漬墨之得人庶汗青之有日所有恩命臣未敢祗受乞祠奏右臣藐然踈庸久坐罪斥皇帝陛下更新萬化登崇衆正誤蒙簡記首預收召為郎甫旬而分察分察數月而執法執法踰旬而代言尋兼史館仍理還磨勘歷觀廷紳未有叨竊若臣之甚者遭時遇主冝圗報稱而性稟狷介學術迀拙但知以竭慮為忠不計以直情為激天涵地育未賜譴何揆之進退之誼出臺便當引去貪戀芻豆黽勉至今廉耻道喪朝夕芒負况當衆賢和於朝之時獨纍皇極之治隆寬不誅公議莫貸欲望聖慈特賜祠廪俾歸求君子時中之學以備異時器使實戴終始生成之造謹録奏聞伏候勑旨再乞輔外申省狀照對某昨具狀奏陳乞賦祠廩今月十六日凖尚書省劄子備奉聖旨不允某蒙恩優異揣分賤微不當再有陳請兼區區肝臆巳盡敷控前狀不敢更有陳述惟是某叨第三十有三年除奉祠外未及十考四年蜀道父親以逺不克往前後就養僅五六年間居積久菽水不給遭逢聖朝録用其不肖子目睹恩榮踴躍自慶今春秋七十有六每以足迹未到江湖為不滿年當喜懼急於養志欲望朝廷念人子事親之日短特賜敷奏陶鎔某一小小合入差遣俾獲迎侍官遊以娛晚景實為孝治錫類之仁須至申聞者辭免兼權吏部侍郎申省狀右某今月𥘉九日凖尚書省劄子三省同奉聖旨洪某兼權吏部侍郎蒙恩便蕃聞命兢惕竊以詞垣四禁稽緩為先選部三銓繁劇尤甚專掌尚虞於弗暨兼官必至於多違伏念某學問空踈材識譾陋領內史之職舉乎一而未能參小宰之聮共其二以何有雖代庖而越爼將毁瓦而畫墁欲望朝廷特賜敷奏念御馬不容於窮力而牧羊每患於多岐俾塵舊官亟寢新命少安愚分實戴隆私所有省劄某未敢祗受病乞輔外奏右臣竊惟窮則呼天疾痛則呼父母方臣頻年擯退窮莫之恤陛下更新萬化不待呼天首加搜拔自間外為禮部郎如蘇軾不作縣為御史如周必大以殿中執法出臺而升詞掖如張震還久廢之磨勘如胡銓又涉筆史館攝組銓曹曽未逾年遍歷華要遭時遇主若此豈不願周旋衆正之會少效千慮之愚而臣分量易盈災蹇踵至悼亡未幾忽得竒疾癰生上齶數醫更療纍旬未愈痛連牙頰飲食減少形骸雖具氣液潛泄斯皆素餐無輔朵頥不節之所由致君父以體群臣為心有疾痛而不呼是為欺隱欲望聖慈察臣知事君之誼而非潔身有垂白之親而非輕祿俯憐實病𥘉非飾詞特卑在外待闕差遣還家將理或可痊愈實戴天地父母生全之恩謹録奏聞伏候勑旨辭免兼直學士院奏乙未右臣今月十五日凖尚書省劄子三省同奉御筆洪某兼直學士院自天渙寵控地包羞伏念臣久困投間適逢更化市駿骨以致千里馬方共興於斯文剖大瓠以為五石樽獨無輔於當丗越從言責猥玷從班危蹤坐滕口之愆竒疾示朵頥之戒精神銷鑠翰墨荒蕪屢懇請於一麾忽進兼於兩制負且乘而知懼服不稱以貽譏伏望皇帝陛下察臣孤陋而寡聞憐臣早衰而多病俾從外輔免冒中除庶幾少安斗筲之分所有恩命臣未敢祗受辭免兼侍講奏右臣凖尚書省劄子今月十八日三省同奉御筆洪某兼侍講者疊𬒳寵私彌深榮懼伏念臣力耕有素涉獵無多文淪巫史之微道昧聖經之奧頃叨召對拱聽訓辭首明宣光綜攬之方繼論羲文經綸之旨退深慙於謏聞難仰跋於清光政虞汙玉堂之廬忽俾侍金華之席丘學山而莫及蠡測海以奚堪伏望皇朝俯垂英鑒肆别求於鴻碩容自蓋於空踈所有恩命臣未敢祗受經筵乞祠奏臣蕞爾庸陋叨榮過分朵頥致疾經年不愈嘗控祠壘之請邇來病證轉劇又再控祠請天聽遼邈未賜俞允臣非不知陛下待士之厚接下之周當仰體眷遇力疾自效又非不知所領職事備極清華有名儒終身企望而不得為者印纍綬若榮耀偏親豈應自取間退維臣器量淺狹病根深固若一意營進不思還家休養形􅤕神離溘先朝露此身永負君親之恩矣扶憊經筵祈憐宸扆欲望聖慈亟賜從欲俾收朝迹歸佚叢祠息心將理容可痊愈凡未正首丘之日皆駿奔王事之時中庸九經曰體群臣陛下蓋深得之故敢籲天請命臣下情無任迫切之至取進止辭免除吏部侍郎兼給事中奏右臣今月十日凖尚書省劄子三省同奉御筆洪某除吏部侍郎兼給事中日下供職者渙綸舄奕震魄正營臣竊以銓省者人材之權衡瑣闥者國是之綱紀裴行儉以知人之鑒顯張元素以回天之力稱匪得譽髦曷當妙選如臣者背時泄辱遇主光榮鳯掖代言兼儤鑾坡之直虎門勸講仍紬石室之藏井不可以汲深弊車尤難於任重譾焉溢量竒甚纒痾屢退乞於叢祠忽進聮於法從二題才而既重參批敕以尤嚴求間獲遷服寵知懼欲望皇帝陛下官必懋德器母假人念輔頰欲穿莫稱論思之職而精神已索難居閲讀之司母拘反汗之嫌特徇祝釐之請用安愚分庶保危蹤所有恩命臣未敢祗受再辭免奏右臣昨凖尚書省劄子三省同奉御筆洪某除吏部侍郎兼給事中日下供職臣具奏辭免拾肆日恭凖詔不允者寵命便蕃嘗伸控避綸言溫厚未賜矜俞在微臣不當更有懇陳而公議詎容弗加祗畏靖惟弱質久苦沉痾期息影於一祠致瀝忱於九疏兹蒙誤渥更越常倫無清通之鑒而為小宰之真無孤特之操而兼夕郎之重聮翩六組照映一時方退處之力祈乃進升之狎至將疑矯偽必速顛危伏望皇帝陛下俯矜病悴之深亟寢恩榮之茂俾叨間廩免玷華塗緑給事中不容虛職除已權冝一面閲讀外所有恩命臣實未敢祗受辭免除給事中奏丙申正月右臣今月𥘉一日凖尚書省劄子三省同奉御筆洪某除給事中日下供職兼職依舊者自天錫命無地措躬臣竊惟朝廷命令之出在中書則許舍人封還在門下則許給事中審駁尚書既奉行矣又許臺諌論列皆所以扶植紀綱而維國勢皇帝陛下親政日勤責治日切方一新臺諌舍人之選搢紳想望其風采給事中冝得漢魏相唐李藩者流以紏正違失顧以寵臣臣頃二選部嘗攝承瑣闥批敕無夕郎之風論事乏回天之力正虞幽黜敢冒真除矧當元會之辰爵人於朝而使彼其之子不稱其服先之公議謂何伏望聖慈念左省實喉舌之司名器非假人之具博選一丗豪雋有風力者俾專省閲容臣姑仍東銓徐丐間廪以全陳力不能之誼所有恩命臣未敢祗受再辭免奏右臣昨凖尚書省劄子三省同奉御筆洪某除給事中日下供職兼職依舊臣具奏辭免今月𥘉五日恭凖詔不允者訓辭溫厚德意丁寧螻蟻微臣所當即祗成命第自濫吹朝列以來蒙𬒳隆知敻無倫比而福薄器狹苦竒疾者一年有半寢食俱妨老形畢具方圗再理祠請夕拜真除從天而下俯伏自揣榮懼交集蓋命令喉襟之地精神枯涸則省閲有違見志氣銷耎則封駁無強力鸞臺廢職自臣養痾始臣將何所逃罪欲望聖慈為官擇人以振起朝廷之綱紀收還誤渥俾免顛隮實戴乾坤之造所有恩命臣未敢祗受辭免兼侍讀奏右臣今月𥘉三日凖尚書省劄子正月𥘉一日三省同奉御筆洪某兼侍讀者便蕃疏渥懾讋交懷臣竊惟上聖以典學為功諸儒以詔媺為職執經並列勸讀尤嚴間嘗起舊弼於內祠今亦進耆英於書殿必深於道乃稱厥官如臣者猥繇法從之聮濫厠細氊之講懷鉛無得呻畢何禆屬月正元日之臨盛春王三朝之會首叨榮於瑣闥仍陟寵於金華四象八卦之陳未知源委五典三墳之誦曷效涓埃儻兼取於熊魚必重譏於鶉特伏望皇帝陛下充能自得師之妙廣佛時仔肩之公察臣潢潦之易除矜臣丘垤之難進俾安舊序别選名流所有恩命臣未敢祗受乞叢祠奏右臣竊惟體群臣者人君之大經尸寵利者人臣之大戒君體臣而閔其情臣事君而致其義斯合乎進退出處之冝矣臣恭遇陛下親事法宫之始拔擢於留落之餘清塗要轍再歲幾遍乃正月𥘉吉首叨宸筆進升銀臺金華之峻至榮至耀群臣莫能跋及臣亦罔知上膺睿眷之繇序髙而鬼瞰量盈而神害宿恙加進竒證迭出齒頰浮腫面目可憎雖包羞茹痛牽強應酬寢食俱妨形神不接反覆自揣詎容尚玷班綴臣非不知去歲以久病冝去屢疏塵瀆面蒙聖訓諭留如待鴻儒宿德所當國爾忘身少圗報稱而災迍迫逐無一日寧若更貪戀寵利尸素養疢則是進乏獻替之益既仰負於殊奬退失廉耻之節復上纍於隆知將何所容身宇宙之間欲望聖慈念臣形證皆陛下之所目擊特推體群臣之意賦以叢祠還家將理俟病少間容續次陳乞斗壘勉效民庸頂乾踵坤不外履育臣下情無任祈天請命之至謹録奏聞伏候勑旨辭免除翰林學士知制誥奏右臣今月二十四日凖省劄三省同奉御筆洪某除翰林學士知制誥兼職依舊者內制疏榮中襟襲懼伏念臣山林朴朽場屋腐陳出逢日月清明之𥘉進立雲漢昭回之下自濫竽於西掖仍越爼於北扉狹量超踰竒痾間作方祠櫝聮翩之上徹忽除書煥爛之中敷蠲塗歸之煩升儤直之峻駑駘千里斥鷃九霄荒虛不稱於摛文羸頓尤難於就職伏望皇帝陛下察臣叨寵為巳劇祈間為巳多特詔大臣檢會前後奏申賦以香火之廪博選歐蘇增重鼇禁庶幾詔令有古風烈而名器不至假人所有恩命臣未敢祗受再辭免奏右臣昨凖省劄三省同奉御筆洪某除翰林學士知制誥兼職依舊臣具奏辭免四月二十九日恭凖詔不允續凖省劄備奉聖旨升兼修國史兼實録院修撰者臣竊惟正天下之動莫如給事中鼓天下之動莫如翰林學士繇唐以來俱號妙選學士尤為貴重自非風裁峻潔文詞爾雅負王佐器略罕有疊踐二職之真者臣批敕乏李藩之風力草詔無陸贄之法度誤蒙聖擢正序瑣闈甫閲十旬即專內命仍勸金華之誦讀進升石室之纂修變化而嬗未有速於臣者天施地生榮𬒳萬象蟲鳴螽躍莫知稱塞兼自濫吹東曹以來苦病丐祠疏至六七今乃於委惙之中叨深嚴之選而扶病就職為給事中則求去為學士則留是舍魚而取熊掌也何以為出處之義用是傴俯控陳不嫌再瀆伏望皇帝陛下察巳試之罔功矜不能之冝止俯從所欲特與祠廟差遣一次庶免以進為退上玷公議所有恩命臣未敢祗受第三次辭免申省狀右某昨凖省劄三省同奉御筆洪某除翰林學士知制誥兼職依舊某嘗再具奏辭免今月𥘉三日凖省劄備奉聖旨依已降詔不允不得再有陳請者某重惟神宗朝首擢司馬光翰林學士以不能四六辭其後王安石除知制誥自此不復辭官光非不能四六安石非慕官爵者辭受之間各有深意某待罪夕拜驟領詞苑材不稱官病不任事在義當去昭如白日纍疏祈免非有他也而俞音猶閟况今文詞之長不無其人趙汝談之古潔吳泳之典麗真德秀無恙時甚推賞之內之陳耆卿應㒡外之吳潛李劉陳塤參合輿論皆可次第而當妙選某老矣病矣眢井不可汲矣欲望朝廷特賜敷奏改卑香火之廩擁北門視草之名尋西崦投間之迹雖即首丘百丗有餘榮也所有恩命某未敢祗受乞檢會八次奏申特卑間廩奏右臣自歲旦蒙恩拔擢待罪瑣闈宿量坌盈沉痾日進連上五疏丐祠未蒙俞允間又叨詞苑之命三控免櫝天聽愈髙旬日以來昏昏常如醉人四肢浮腫百骸酸碎氣息迫促生意一線欲望聖慈詔有司檢會前後八次奏申特卑間廩庶幾早還故山杜門謝事或可攝理易曰拘係之乃從維之詩曰縶之維之以永今朝陛下方此藂天下之賢而無容輕去者如臣窳陋亦在縶維之列命之逢也貴賤有常夭壽不二臣之去也亦命之不可過也謹録奏聞伏候勑旨辭免除端明殿學士在京宫觀奏右臣今月十九日凖尚書省劄子三省同奉御筆洪某除端明殿學士在京宫觀者臣聞名器者君道之所甚重分量者臣道之所當安臣蒙𬒳聖眷超絶周行多病早衰屢嘗丐去俞音未報除目又攽天道虧盈眷愈厚除愈峻而病愈進病愈進而留愈篤正序禁林一草未視叨華書殿且領京祠非耆儒宿德而兼取之晉如鼫鼠正厲臣之謂也欲望聖慈念猿鳥冝歸於山林之中鷗騖徒多於江湖之上收還成命俾返故廬銜戴天恩生死肉骨以之所有恩命臣未敢祗受再辭免奏右臣昨凖尚書省劄子三省同奉御筆洪某除端明殿學士在京宫觀臣具奏辭免今月二十五日恭凖詔不允又凖尚書省劄子備奉聖旨仍舊兼修國史兼實録院修撰兼侍讀者臣竊惟端殿之穹崇內祠之優佚經筵史館之清顯望不輕屬恩無妄施親覽政柄以來崔與之之難進易退李􅐉之博物洽聞皆以耆儒當此殊禮臣實何人病且死矣乃使接迹二賢之後續貂奚益諉鶴是懼祠請屢陳俞音尚閟欲望聖慈憐臣久病不差察臣真情不欺收還上件誤渥特卑在外一祠以養殘喘以待驅馳所有恩命臣未敢祗受乞將慶典一官改賜父親銀緋申省狀凖尚書省劄子洪某該遇昨來慶典赦文轉一官並不曽陳乞轉行十月二十二日奉聖旨特與轉行伏念臣脫身淹滯遭丗盛明巳蒙優恩理還積年間廢磨勘官至正郎此來又蒙特旨轉行塵竊過分莫遑寧處惟是父親鉞甘貧無營教忠有訓春秋今七十有七雖纍經恩封見通直郎致仕服緑才及十一年該賜章服之日尚逺喜懼交至人子至情照得紹興中太常博士張九成乞以磨勘一官與父伸賜五品服朝廷從之某輒援上項事例欲將慶典轉行一官恩命乞與父親某改賜銀緋伏望朝廷敷奏特賜從欲用為就養之榮式昭錫類之孝須至申聞者小貼子照會某父親某昨以某在責降中不敢陳乞慶典轉一官恩例欲乞朝廷併賜指揮平齋文集卷第十二
