  - {type: variant, offset: 2, length: 3867, content: 一國子司業張虙除祭酒仍兼侍講制勑具官某賢必希乎聖士必希乎賢朕欲新美天下之士親擇老成有賢望者爲國子師士非幸歟爾淵乎海濵之老也見幾而蚤遯覽德而肯來俾参師氏詔媺于虎門望其容則易直子諒之心生聽其辭則淵泉溥博之義見而况摳衣問業於函丈之間者兹用進之大司成以專六德之教師道立而善人多豐芭所以爲數丗之仁朕其庶幾乎可樞宻檢詳袁肅除右司郎中兼權樞宻副都承旨制勑具官某朕更張萬化首命一相筦文武之柄宰掾以賛政理樞掾以参訏謨非深識厲精求治之意不在此選爾學得其傳而邃於知氣集以義而勇於行端笏立朝論議閎偉朕知其可大受也挈宏綱於省闥導宻旨於殿陛肆兼命爾維時股肱大臣内欲爲朕修天保以上之治爾彌縫之外欲爲朕舉采薇以下之治爾佐佑之往欽哉可右司郎中袁肅除太府少卿兼知臨安府制勑具官某維前寧人得名法從濬正大之源以養君德折姦邪之氣以興人心學無不該用有未盡求諸一庭詩禮之彦爲我四方岳牧之師爾講貫有源業履甚度盤根利噐奏民庸而獨髙熟路輕車聳朝望以更偉肆簡都曹之最進参列寺之華典吾神臯資乃儒術俗乆壤而周南之化未浹政積弛而商邑之治未張澄精神於百爲妙機括於一轉迪若考詩書之訓宣朕躬道德之行民情咸熈國勢自重此非趙張三王所能知也往逺乃猷用對予渥可大理少卿李鳴復除大理卿制勑具官某朕近觀勑令所編類舊典我孝祖宸筆逐事點勘増修刪改曲當情法於恤刑之條尤加詳焉企慕不已因親扎以示輕用徒刑之戒廷尉天下平可不遴擇爾表于西州儀于王朝心夷氣龢藹然君子長者之風廼者俘纍之獄咨爾聽之簡稽得情弊成以宥而朕好生之德𬒳于貉隷逹于窮髮之北良用嘉歎晉躋九列帥屬棘廷使四方司政典獄咸知朕欽恤之意念之哉刑期無刑以長我王國可吏部郎中趙彦悈除大理少卿制敕具官某朕近觀勑令所編類舊典我孝祖宸筆逐事點勘増修刪改曲當情法於恤刑之條尤加詳焉孰復企慕因親扎以示輕用徒刑之戒廷尉天下平可不遴擇爾講學之粹操履之茂摽的于公族而吏治更髙司臬江左讞奏平允一道無冤民入爲望郎進參列棘四方司政典獄於爾乎則焉欽哉刑期無刑以長我王國可國子博士李大同除祕書丞仍兼崇政殿說書制勑具官某斯文在天地間前乎管百丗之旣往後乎鑰百丗之方來非諸儒誰屬爾以經明行修都倫魁之望詩所謂如金如錫如圭如璧者也列在書帷据經訂古以沃朕心具有師法朕甚嘉之繇博士進丞中祕仍懋金華之業蓋將閎其中而肆其外用昌斯文豈特以鎮吾群玉之府可著作佐郎蔣重珍除著作郎仍兼崇政殿說書制朕甚嘉之繇佐譔進領著廷餘同前校書郎黄朴除著作佐郎仍兼崇政殿說書制朕甚嘉之進繇典校佐譔祕廷餘同前太常博士徐清叟太學博士葉味道並除祕書郎仍兼崇政殿說書制爾以經明行修茂名家之傳徐爾以經明行修都儒林之望葉朕甚嘉之繇博士進典中祕餘並同前祕書丞彭方除著作佐郎兼權侍左郎官制勑具官某斯文在天地間前乎管百丗之旣往後乎鑰百丗之方來非諸儒誰屬爾以經明行修都儒林之望詩所謂如金如錫如圭如璧者也丞于祕丘攝組畫省銓綜餘隟盡讀禾見之書韜涵日冨進之佐著蓋將閎其中而肆其外用昌斯文豈特爲時佳吏部哉可祕書郎張洽除著作佐郎制入典中祕盡讀未見之書餘同彭方制敷文閣學士通奉大夫程珌該慶典轉正議大夫制勑奉壽巵於長樂方深追慕之悲通禁籍於甘泉尚共榮懷之慶有嘉宿德何愛崇階具官某學邃而識融履純而飬厚濟時谹議五英六莖之龢華國髙文四璉八簋之古自玉堂之引去毎宣室之興思胡扼虎關尚閑駒谷復非遽復已萌於碩果之餘睽不終睽必合於遇雨之後首進班於穹閣仍賦廪於珍臺在爾初無慕爵之心惟朕蓋有懋官之典肆加蕃錫庸侈殊私施㦸方新寧鬰起家之望佩囊惟舊毋忘存闕之忠可著作郎權司封郎官呉泳除軍噐少監兼直舎人院制勑具官某朕親攬萬機緫飭百度與士大夫洒濯激昻以追元祐思得軾轍掌我書命興起人心於播告之下爾操行純茂文思汗瀾本之詩書暢之莊騷太史體冝演誥朕有戎監職優務省往服少事雍容討論推厲精更始之意著之訓辭渾厚森嚴與越棘大弓同其古斯無媿江漢之靈矣論駮以扶國是朕又於此觀爾之風力可禮部郎官兼學士院權直趙汝談除祕書少監兼權直學士院制勑具官某中興百餘年公族之直禁林惟淳熈間彦中一人爾識度純明風槩凝逺杜門著書尚友千古皎皎白駒之在空谷也㤗道宏開勉爲朕起南宫北扉文簡而有法進參木天之峻仍直丹地之嚴選妙擢殊前後間見爾其推朕厲精更始之意著之訓辭使四方萬里咸曰大哉王言一哉王心是爲稱職可太府少卿何炳除司農卿制勑具官某文帝一形錢榖岀入之問貫朽粟腐其効立見朕於國計登耗念之孰矣而大農經費常患於不澹何耶爾性行純固材諝通明蚤游刃而有餘晚韜光而更宻入參治藏之府曽幾何日能聲著聞進長九扈將以𥙿吾國也孰漏當窒孰蠧當除孰冗當節公爾忘私毋憚叢劇庸稱予厲精政事之意可金淵李榘並除太學博士制勑具官某等科舉之學非所以淑士心也必義理性命之學明則多善士化更而新師選可不重乎爾抱負閎講貫熟製錦劇邑弦歌藹聞可以爲成均師矣敷暢奥義薫陶善性使諸生人人有舞雩詠歸之樂則吾與點可太學博士葉應輔除國子博士仍兼景獻太子府教授制勑具官某科舉之學非所以淑士心也必義理性命之學明則多善士化更而新師選可不重乎爾抱負閎講貫熟模範賢關惠訓宗邸能茂明所學可以爲胄子師矣敷暢奥義薫陶善性使人人有舞雩詠歸之樂則吾與點可奉議郎袁立儒餫賞轉一官制勑具官某間者均光襄房之役靡勞不酬爾材良氣雋優於邊畫督餫以濟軍事不憚鞅掌禦侮制勝與有勞焉朕方信賞以勸事功進官一列其懋承之保障最聞嗣有褒擢可全子材除淮西安撫副使兼知廬州兼計度轉運副使制勑具官某朕夢想東都廼睠西顧若昔濡頃之築芍陂之屯郾城之士飽馬騰淝水之風聲鶴唳欲追往躅宅牧良難爾彊乂而忠果逹且武荆襄淮海備著賢勞入搴朝列之華岀鎮邊維之重四履綏静三軍激昻令行陳潁之間氣薄潼藍之表朕嘉爾勇於徇國就卑帥旄仍揔飛輓用究多多益辦之韞惟和戰之議論不齊守禦之規模一定必量敵而進慮勝而㑹必臨事而懼好謀而成能圗萬全何往不濟爾尚勉之哉可贈寶文閣直學士楊邁特贈龍圗閣學士制勑朕慨念漢宣入承天統博陽侯之定䇿方共致於中興澓中翁之受詩胡獨成於長往宻勿麟儀之舊淒凉馬鬛之新睠懷若存襃贈冝厚具官某抱古粹學事予𥘉潜反覆發明盡詩書禮樂之奥從容規切必仁義道德之言毎尊所聞務藏諸用旣授五龍而夾日忽比列星而騎箕雜佩贈之莫䆒仔肩之益一鑑亡矣可勝殄瘁之悲雖䘏典之有加尚徽章之未稱峻陟淵圗之序丕増泉壤之光易文子之名死冝不朽録叔敖之後生與俱榮尚其營魂服我休寵可黄壯猷何處信課最各轉一官制勑具官某緫核名實而信必其賞罰親政之急務也爾守何處信貳輔藩有美政且能濬導利源坏窒蠧穴版部課賦入以最聞増秩賞能庸示予信其益厲精白以承可右正言王遂除殿中侍御史制勑具官某朕始親萬幾首得一士置在明目張膽之地蔚有正色敢言之風神鼎鑄而魑魅莫逢干將淬而犀兕亦斷善類吐氣貪夫革心察之旣稔所安用之不厭其速甫躋諌列亟副臺端純仁之内岀姓名蓋非輕授趙抃之不避權倖抑所優爲朕方虚已以受人爾亦得時而行道難逢者風雲之胥㑹易失者日月之如流萬古在前億丗在後母替精白承休之節用爲汗青傳逺之圗可吏部郎中兼右司李宗勉除監察御史制勑具官某蓋聞淫朋去然後可以榖正人側媚屏然後可以用吉士天運之往來消長此其機歟爾和而趨於中大而進於正日用力於明善之學如恐不及洊奉郡最入儀郎省素絲一節未嘗以爵禄入於心諸大夫國人皆信其爲賢也朕方謹憸人充耳目之戒儀圗可御史者莫如汝冝在易一隂不能勝五陽則决之於夬五陽不可忽一隂則柅之於遇潜觀機括而制其微天下可常㤗也爾亦有辭于永丗可大理卿李鳴復除侍御史制勑具官某朕稽家法之相傳睠臺綱之特重仁廟思得忠厚淳直之士𥙿陵務革澆浮薄惡之風蓋心術正則無詭隨議論平則不沽激欲維吾國冝表若人爾秉心澹夷藴識精粹良吏之譽溢於外服吉士之稱著於中朝甫陞卿月之華趣應法星之象維昔田錫曁于何郯莫非西土之英列在南床之選幾年無此一旦得之春秋之盡而不汙大關榮辱洪範之㑹其有極一洗黨偏百辟咸慕乎君子之中四方聳聞乎仁者之勇繄予所屬惟爾其承可祕書丞兼崇政殿說書李大同除右正言兼侍講制勑具官某師氏詔媺保氏諌惡皆有道之士爲之朕厲精求治之𥘉増置經筵官相與講明五三六經之道以養其源諸儒序進䄡如翼如爾於其間湏眉皓白氣肅而辭莊淵乎其似道也朕退而自喜曰得一佳諌官矣擢寘騎省仍侍氊厦逆耳沃心朕於爾乎嘉頼官守一時之臧否言責萬丗之榮辱毋憚嬰鱗有懷不盡然軔輪折檻特救過於巳著望儀刑而意消不聞亦式不諌亦入庶其置朕於無過之地乎可吕殊除太學録制勑具官某科舉之學非所以淑士心也必義理性命之學明則多善士化更而新師選可不重乎爾抱負閎講貫熟金玉其度而不茍售可以爲成均師矣規矩脩明之餘敷暢奥旨薫陶善性使人人有舞雩詠歸之樂則吾與點可大宗正丞蔡範除戸部郎中淮西緫領制勑具官某三表五餌不如晁錯實塞之䇿破羗強弩不如充國留田之奏綏御皆不可廢夫守也爾名儒之胄良吏之表廉静有立不爲茍同冝岀入省闥以緝庶務中原事機方集必事力之𥙿乃克濟庸輟爾以尚書郎給餉道往哉守淮所以蔽江而控河士飽而歌馬騰于槽淮西之成雋功以此出納有經而無壅利取予有權而無近名足食足兵爾蓋優爲之寓攻於守而不株其守盍以方略上可歸順人李義承節郎張瑀李德魏珏保義郎制勑具官某討叛以誼懷服以仁殱渠貸脅歸斯受之爾能革心奚愛勇爵祗戴寛恩勉圗報効可歸順人同鼎武翼郎王聞顯武翼大夫呼延實來伯友修武郎制勑具官某國家推天覆之仁舎逆取順豈以南北爲間爾等執羈絏以從亡虜途窮力屈束身歸命朕不汝棄也昜卑武級之勞毋忘忠力之報可廣州觀察推官魏國梁殁于王事贈通直郎制勑具官某嶺甿不靖爾挺身往諭恩信亦旣勤止得疾于行齎志以没録勞進秩尚慰九泉可淮西路鈐范用吉授髙州刺史節制京西比路軍馬制勑具官某殘虜就燼中原爲墟關河方徯於來蘇陳潁首歸於疆理上功莫府謂爾有勞亟陞遥刺之華仍揔進屯之重祗承休渥益勵忠勤可江陵府副都統孟珙特轉武經郎制勑具官某方城爲城漢水爲池天險也制閫設險加嚴峙芻榦具畚臿濬深培髙屹然金湯之固第勞來上爾實程督進秩二等用勸事功可, WYG: ''}
