  - {type: variant, offset: 7886, length: 664, content: 太府寺簿劉炳除諸王宫大小學教授制勑具官某行葦忠厚内睦九族朕豈惟睦之必擇師儒以玉其成爾西産之良邃於易能發明未畫之藴其師表于磐宗紬繹義理切劘情性使成人有德小子有造則予汝嘉可軍噐監丞謝奕禮除大宗正丞兼權兵部郎官制勑具官某丞郎朕所重非其人不輕卑爾韋平之裔有詩禮之傳隂馬之族無冨貴之累可謂雅噐矣丞我大宗攝組郎省豈特用爲爾榮恭儉惟徳恪勤廼事朕將以是觀爾之致逺可賈似道特轉奉議郎制勑具官某朕建后於相家又命妃於法從家而関雎之化行進封有俶推恩惟稱爾襲芳弓冶之傳承暉四星之首擢丞武監進秩二等奕奕光榮矣務學好脩用燕多祉可度支郎中謝采伯除軍噐監制敕具官某呉粤之劒取其地良妢胡之笴取其材美朕觀諸此得噐使群工之道爾生相家而無驕氣地之良也挹儒科而有能聲材之美也地良材美繇郎版部長戎監疇不謂冝豈徒以肺附進哉易之除戎詩之備械書之糓胄敿干皆今急務毋視訓工程作爲猥釀而不之屑可魏峻除太社令楊璪除耤田令制勑具官某等社耤置令類以公卿佳子弟處之鸞停鵠峙於梧竹間貴其稱也爾峻貂蟬丗家風度凝粹爾璪筆槖名裔氣禀開敏或司國社或掌帝藉列在容臺培養逺噐其益勵于學以對寵榮可華文閣待制知瀘州魏了翁明堂恩進封蒲江縣開國男加食邑制勑朕蒐儀先甲蕆祀上辛賦思齊之詩慕親方切稽我將之頌饗帝尤嚴恍三靈之宴娭遒百禄之來下有懷時彦冝錫神釐具官某學貫乎古今氣塞乎穹壤立朝素節挺朝陽之梧桐去國丹心凛歳寒之松栢屬更張之伊始頋趣召之冝先頴川正急於借恂宣室遂遲於見誼旣厎于治廼遄其歸維昔宗祈敷時餕惠駿奔百辟曽齊胙之靡遺燕衎一賢胡魯膰之未至冝爵升於榖壁仍户衍於畬圭爾毋謂萬鐘之何加朕方念四簋之不飽亟承顯渥入告嘉猷可, WYG: ''}
