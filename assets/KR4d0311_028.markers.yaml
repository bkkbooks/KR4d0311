  - {type: variant, offset: 2984, length: 1, content: 君, WYG: 尤急熟觀否㤗往來}
  - {type: variant, offset: 2986, length: 1, content: 化, WYG: 運宻轉乾坤闔闢之機大姦朝耡衆雋暮㧞謂鵲巢可窺而鳯凰集駿骨既市而騏驥來憐其數竒開以寸進某敢不敬佩隆眷加鞭後圖白首為郎敢嘆桑榆之晚丹心報國更祈松柏之堅囘薛觀文啓恭審陞華秘殿均逸珠庭六子之佐乾坤功成斯退八還之玩日月宇定自光几几雖新巖巖維舊恭惟某官吏師一代王佐兩朝問方略之世家自唐浸盛練制度之人物視漢畧同三十年密勿於修門一萬戸肇開於大國倚成方切引去何輕野梅官栁之坊路喧迎騎流水青山之屋門繫歸艎兒孫出萬巻以披吟父老散千金而燕集移閶闔衣冠之夢為園林鐘鼓之盟陽羡買田拍塞秧疇之雨惠山試水颼飀茶竈之風誰為公謀使有此樂某猥慿客度輙犯顔行呂獻可固得罪於荆舒文潞公初何尤於質肅想見幅巾蕭散訪疇昔之釣游願言列鼎舂容享方來之耆艾囘程内翰啓伏審均逸珍臺陞華穹閣人材凋落之久上深念之天運轉移之新公向用矣漸所以進㤗於此占恭惟某官九垓隆名五嶽全氣伊川明道而後獨傳正宗野處平園以來復見作者早從龍尾直上鰲頭扶日之功未酬偃月之機已露方奪萑苻之氣遽尋花竹之盟司馬公之流水青山姑從獨樂歐陽子之茅簷凉簟尚想玉堂雖出處了無累於吾心然安危豈遽忘於斯世宜膺蠖濩之眷趣進凝嚴之班與造物者遊益培夜氣後}
