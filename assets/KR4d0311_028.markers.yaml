  - {type: variant, offset: 251, length: 212, content: 治否生於泰理所必至而酣豢宴安者常忽之有能燭其幾於人情之所易忽而轉移機軸於冥冥之中使履霜不至於堅冰陽常進而隂常置於空虚不用之地則大亨以正可常保而吉其㐫矣觀至于之辭則知吉㐫未定之間儘有可用力之地特患乎玩安忘危不知所以用其力彖曰臨剛浸而長說而順剛中而應大亨以正天之道也至于八月有㐫消不乆也臣聞一陽而復二陽而臨剛浸長也下卦爲兊上卦爲坤說而順也九二以剛處中上與六五相應剛中而應也臨有是德故大亨以正也隂陽消長皆非一日之積今陽剛浸長於復返, WYG: 久早}
