  - {type: variant, offset: 1734, length: 990, content: 重噐難安夙夜兢愓危懼猶恐不蔇而可樂於得位而泰然處之乎甘者說樂之至也六三居下卦之上處兊說之極而以臨人之位爲樂玩聲色之娯而忘美疢之患懷宴安之適而遺鴆毒之慮好樂一形投合四集便嬖側媚相與以巧言令色皷舞之施之政事冝其無往而利也有能凛然深省幡然大改以所樂爲所憂念二陽方進於下而消不乆之㐫已兆於吸呼之頃操危慮深若不能以終日切切乎予又集于蓼之懼則前日之咎今可免矣蓋三以甘說爲臨其位不中不正一惟偏私之徇故象示不當之戒又懼夫人耻過而遂非開之自新許以轉甘爲憂雖有咎而不長有國者冝知所擇矣六四至臨无咎象曰至臨无咎位當也臣聞至臨臨之至也四居大臣之位上比於五君以道合下應於𥘉賢以道親且時當剛長大臣虚心無我援天下陽剛之賢進輔其君與共成致君之業以此而臨豈非至乎然進賢退不肖大臣職也援陽剛之賢與共成致君之業乃職分之當然極其至如周公之握髮吐哺始可以无咎有一毫驕吝之色賢者望望而去之則咎隨之矣象明臨之能極其至亦惟處得其位之故以六居四是爲正位體柔履順不自矜其能而惟賢是與德與位稱也六五之君柔矣六四之大臣又柔而下無陽剛之賢爲之應則治淪於姑息勢失於委靡謀國者能辭其咎乎六五知臨大君之冝吉象曰大君之冝行中之謂也臣聞知所以察未見之幾制有爲之㑹人君之臨天下轉移萬化闔闢萬變必有知行乎其間而知以得中爲難蓋是知之用不及則闇太過則察無過無不及則中六五有深沉先物之知又下與九二之賢爲正應不以一已之聦明爲聦明而以賢者之聦明爲聦明臨無遺知矣然知不可以過用丗之小知自私者用知必過明帝之苛察德宗之猜忌何其𥚹也故惟大德之君然後於用知爲冝明有前旒之蔽見無淵魚之察知君子之當進必推翕受之量知小人之當退曽微深疾之心以大用知而知得其中即舜之大知也象言行中之謂豈非不過用其知即舜之用中歟中庸聦明睿知以有臨必寛𥙿温柔以有容正此意上六敦臨吉无咎象曰敦臨之吉志在内也臣聞卦終必變君臨天下之道以克終爲難必用心加厚乎其𥘉則可以保其終敦者厚之至也何所厚厚於親君子也親君子逺小人之心乆而愈篤則以之畏天必加畏以之愛民必加愛無所往不用其厚也艮上九敦民以加厚而吉臨旣吉又申之以无咎者爲六三設也上六居臨之終而應乎三三不中不正上茍私所應與而親之何以免咎惟舎三隂邪之小人而志在二𥘉陽剛之君子故冝有咎而免也兊爲内卦君子在内屈已下親不以乆而替寜有加於大亨之鼎母或失於二簋之權輿則賢者肩一心以輔乎上非箴之庭燎則戒之無逸君臨天下之道於是乎保克終之吉矣明皇始厚宋璟韓休張九齡終厚李林甫憲宗始厚杜, WYG: 約}
