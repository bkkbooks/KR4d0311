  - {type: variant, offset: 4485, length: 2119, content: 能反觀諸身去小人而從君子故道爲未失也然未之一辭猶未深保其不失道盍亦戰戰栗栗於取舎之决爲舜而不爲跖爲堯而不爲桀哉此正大學致知工夫之地六四觀國之光利用賔于王象曰觀國之光尚賔也臣聞九五剛中之君在上𥘉與二去九五爲逺故止於童觀闚觀三少近則未失道四切近則利用賔觀愈近見愈親也賢者進退有時行藏有道如麒麟鳯凰其出必待休明之丗故觀國之光然後賔也國之光明本君德之光明人君能明吾之明德如鑑不受翳水不受滓則本然之明常存篤實之光充實之輝皆由此而發在朝廷則禮樂彰法度著在天下則道德同風俗一其爲國之光大矣賢者觀乎此而願立於其朝伊尹起於莘野吕望歸於東海豈非湯文之時利用賔乎象以尚賔發之蓋道義重則勢利輕賢者寜甘心於白駒之谷考槃之澗不肯屈身輕售其出也以時其進也以禮其事君也以道君望其儀刑而起敬故崇尚之以賔禮而不敢臣取重者在已重之者在君如此則諌行言聽膏澤下於民矣茍在已無以取重君且望而輕之母恠乎有言莫之行也九五觀我生君子无咎象曰觀我生觀民也臣謂反觀内省之功儒者所難而况貴爲萬乗可喜可欲所以移其心者滿於前乎九五陽剛而中正居巽而應順動無過舉矣然猶於我生必反而觀之凢言行出於吾身者爲我生觀吾一言之出皆合於君子之道則言無過言一行之出皆合於君子之道則行無過行以此示民可以无咎有一不合於君子則有咎矣吾身未能无咎顧欲使天下皆有士君子之噐表偏而影正無是理也象又以觀民言者君子之道本諸身證諸庶民觀群黎百姓徧爲爾德則知言行之出於吾身者爲善觀怙侈滅義服美于人則知言行之出於吾身者爲不善是觀我生者必當觀諸民也因觀民之所化而觀吾身則言行是非不能揜因觀我之所生而觀吾心則念慮之邪正不能蔽由外而反諸内愈近愈不敢自恕由内而推諸外愈逺愈不能自隱内外交相養之道旣盡天下觀而化之孰不顒然而孚乎上九觀其生君子无咎象曰觀其生志未平也臣聞上九與九五爻辭同惟我生其生異蓋吾身之所出爲我生九五之君所以自觀也上九則觀君身之所出故爲其生五君位上處無位之地而宻比之雖居無位之地一念未嘗忘乎君常欲納之於無過故觀君之言行果君子耶則喜其能免於咎觀君之言行未君子耶則憂其不能免於咎身在畎畒心在王室因所觀而察之惟恐吾君之出乎身發乎邇者有一毫之未當無以示四海之儀則其志豈遽平哉然九五觀我生上九觀其生皆合乎君子之道而僅止於无咎何耶人君之治身無止法言行極尭舜禹湯文武之盛不過盡其身之所當爲𥘉非有餘故君子乃无咎不然有咎矣人臣之望君無止法以禹湯文武爲未足又耻其不及堯舜故君德至于君子特喜其无咎未敢遽以爲可安也此觀之君臣所以各盡其道噬嗑亨利用獄臣聞嗑者合也噬去頥中之物而合也頥卦合艮震爲體𥘉上皆剛而中之四爻皆柔猶人之頥虚其中也噬嗑𥘉上皆剛與頥同而四亦剛是頥中有物間之故有待於噬而後嗑也凢去間之道皆然時則勿有間之是君臣之際以無所間而合也人不間於父母昆弟之言是骨肉之際以無所間而合也彼蠻夷猾夏㓂賊姦宄蓋梗聖人之化爲天下之間者去其間則化行於天下矣噬嗑亨間去而合即亨也其義利於用獄獄以推見其爲間之情而去之則梗吾化者不至於覆出爲惡病根除而正氣還也其在人心則人欲爲天理之間人欲盡去天理流行豈非間去而亨乎此又克巳工夫之當盡彖曰頥中有物曰噬嗑噬嗑而亨剛柔分動而明雷電合而章柔得中而上行雖不當位利用獄也臣聞頥者養也頥以納飲食致養而有物梗之故必待噬而後合合則亨矣亨之功在噬噬者用力囓去之也小人爲君子之間不用力以退小人則君子不進夷狄爲中國之間不用力以却夷狄則中國不尊姦民爲良民之間不用力以治姦民則良民不安此皆噬之功所以致亨也以爻言之則三陽三隂爲剛柔分以卦言之則下震上離爲動而明以象言之則震爲雷離爲電二者參合而成章雷取其威電取其明治獄之道無大於此然六五爲用獄之主乃以柔中之道行於上雖以隂居陽爲不當位而治獄以燭見情僞爲先离體虚中而明故於用獄爲利夫獄者民命所係得其情則哀矜而弗喜欽恤之仁行焉茍不以柔治而以剛治則明過於察威過於猛人將無所錯手足失天地大生之德矣噬嗑義在除間而歸於柔中以此知好生者聖人之本心用刑者聖人之不得已象曰雷電噬嗑先王以明罰勑法臣聞隂陽相薄而爲雷相軋而爲電故震之一陽動於下離之一隂明於中噬嗑之象取焉卦本先電彖象乃以雷先於電者蓋泰卦上坤而下乾不曰地天交泰而曰天地交泰取其交也噬嗑上離而下震不曰電雷噬嗑而曰雷電噬嗑取其合也電明而雷動雷行而電隨明與威合然後梗化者可去徒明而不威則詳於察姦而不能除其失也懦徒威而不明則銳於去惡而不能辨其失也闇明行以威威發以明天下無難去之間矣先王觀雷電之象於是用電之明以明罰用雷之威以勑法罰顯而枉直各得其情法飭而輕重各當其罪利用獄之道盡矣舜之去四㐫成王之去三監孔子之去少正卯皆此道也然辟以止辟刑期無刑聖人豈徒恃法令爲齊民之具明與威並用罰一人而千萬人懼法雖飭而不常用也雷電之合隨即開霽天道亦豈常用其威哉𥘉九屨校滅趾无咎象曰屨校滅趾不行也臣聞噬嗑利用獄𥘉上爲受刑之人人之性本善情動欲生遂䧟於惡聖人憫之故設爲刑罰以懲惡而挽之於善然善惡觀其所積欲惡之不積當於其始而禁之趾在下爲行之始加校於屨而趾滅焉彼雖欲行而不可得則不進於惡可以免咎矣校足械也滅没也校深大至於没其足也或謂滅趾爲刖刑刖則施踊何取乎屨有屨加校非斷趾明矣唐虞畫象而民不犯特赭衣菲屨之類肉刑未嘗用也蓋小懲而大誡故能免麗於刑小不懲則惡積罪大聖人豈得而私宥哉其在人心一念有不善貴乎早覺而力遏不貳過, WYG: ''}
