  - {type: line-break, offset: 680, content: '', id: KR4d0311_SBCK_028-2b09}
  - {type: indent, offset: 680, content: 　, id: KR4d0311_krp_028-bkkind29}
  - {type: variant, offset: 685, length: 762, content: 奉行差役巳有蔡京消豈待乆哉遯進而否君子之道盡消則蔡京之禍天下㐫莫甚焉夫惟上之人常以防微杜漸爲心遏隂柔於未進之始尚何陽消之慮象曰澤上有地臨君子以教思無窮容保民無疆臣聞坤地在上兊澤居下地之臨澤最爲切近君臨民之象也地上有水爲比澤上有地爲臨皆以切近取義而水與澤異水流而不盈故比於地而不爲臨澤者水之瀦涵深蓄逺渟奫演迆而地之岸際常臨之此具區雲夢大野所以爲澤而不爲川浸也君子觀地與澤相臨之象而得近民之理故教思必无窮容保必无疆无窮者意味深長百丗猶有先王之澤則兊之浸潤也無疆者規摹恢廣出日莫非丕冒之地則坤之包含也人君以是臨民無媿君師之責矣蓋君之於民猶父之於子其相親也以情相維也以道而非可以勢分拘以勢而臨則教思必淺容保必狹私心町畦公道磔裂尚何足以知臨之爲大乎大哉堯之爲君惟天爲大惟堯則之人君方寸之中與堯同大而後可以盡臨之不然教思何由而无窮容保何由而无疆哉𥘉九咸臨貞吉象曰咸臨貞吉志行正也臣聞澤通於山爲咸咸感也凢具隂陽孰能無感以貞則吉貞者正也君子小人之辨在於正不正之間臨爲剛長之卦𥘉九與四爲應而比於二皆臨我者也吾欲感動所臨獲乎上以行吾道必一出於正曠乎其公而係吝之私不留純乎其誠而矯飾之僞不作此以正感彼以正應精神心術之妙相與凝固而不散則君子之道由是進進乎泰亨之盛所感以正而吉也然所感之邪正莫謹乎其𥘉志者心之所之在卦之𥘉此心趨嚮主於正而行則無往不以正合進以正可以正邦也一渉於邪則見金夫不有躬進不以正特一時之茍合爾然則下之感乎上能察乎正不正而爲進退則不至於失已上之應乎下能辨乎正不正而爲用舎則不至於失人九二咸臨吉无不利象曰咸臨吉无不利未順命也臣聞臨之爲卦以二陽爲主二陽又以九二爲重二承乎五五臨乎二實君臣相與感通之㑹二剛中五柔中俱得其正冝旣吉且无不利也然自復而臨陽剛浸長固吉矣而長必有消八月之遯巳逆計其必㐫君臣相與綱維斯丗其將聽隂陽之自爲消長付之無可柰何, WYG: 静静}
