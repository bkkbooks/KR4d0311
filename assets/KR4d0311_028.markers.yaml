  - {type: variant, offset: 6616, length: 2, content: 早遏, WYG: 盡擁師干於江漢控戎索於關河以頗牧之籌修羊陸之政屯田之奏則營平之逺略出師之表則孔明之精忠收績前茅垂休汗竹邊有雲中之警上興鉅鹿之思灑寳墨以疏恩易美名而壹惠光流宇宙聲撼華夷是皆曹武穆之將家范文正之儒裔克傳世業深結帝知故能顯揚於無窮于以侈大其有子某聳聆盛事倍􅈭懦𠂻方圖羾於柔緘忽首勤於珍翰執謙良過抱愧為多排紛控賀不莊仰丏台察除禮部謝丞相劄子某恭惟我聖上親萬幾之初賢相宅百揆之始大明昭揭公道宏開群隂見睍而雪消衆正連茹而茅㧞融歸皇極扶立太平某去國九年奉祠再歲自謂窮途之老死不圖大造之更生抱舊直之青綾趨新窠之瑞錦孰云起廢有此叨榮某官鑒其愚而無它腸愛其懦而有立志以恤窮悼屈之念為嘘枯吹生之仁首加招徠使脱沉滯動八十親之喜寛數百指之愁踴躍而興糜捐以報然念禹錫十年待文昌之相始授此官温公數月趣東坡之還乃居是選豈繄晚學可跂前修伏望鈞慈憫傷弓之心危察墮甑之氣索收還誤渥改轉真機賙其甔石之家授以升斗之壘一飽養志三熏戴恩謹此控謝併布其𠂻仰祈鈞察答呉總卿劄子某九年擯去𤣥都之樹已空一日喚囘少林之壁忽倒若有相者夫豈偶然某官功名鼎盛之秋意氣相期之素謂荃蕙化為茅久矣尚復何言而桃李自成隂有}
