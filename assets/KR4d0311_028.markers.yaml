  - {type: variant, offset: 100, length: 127, content: 亨臨則元亨利貞陽寖長而隂寖消也臨據陽長之㑹旣能變蠱壞而亨通又能處亨通而正固以此保大其又奚虞而見逺識微者巳不勝其隱憂何則隂陽無兩盛之理一長則一消其機在反掌間自復而臨以至爲泰爲大壯爲夬爲乾陽極矣而一隂潜萌於五陽之下爲姤二隂則遯也由建子而復至建未而遯凢八閱月二, WYG: 積}
