  - {type: variant, offset: 6663, length: 147, content: 間者九四也𥘉九與四爲正應是同惡相濟者也膚柔而易噬猶𥘉之爲惡未稔而易制鼻髙而難滅猶四之爲間甚大而難治始噬者膚而終至於滅鼻小懲於𥘉遂大討於四也四之間去則𥘉無與應小人之黨孤何能爲哉乗剛言二位乎𥘉之上乗𥘉之剛以攻四之剛因瑕而及堅也蓋二居中得正以用刑所施不失其序故下能治𥘉之罪上能除四之間輕重有權尚何過咎, WYG: 復興使懦志}
