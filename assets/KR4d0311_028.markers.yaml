  - {type: variant, offset: 6823, length: 199, content: 過用輕兵以臨之而阮自服進至崇墉則聲罪致伐必是絶是忽而後巳彼其剛戾梗化之罪雖同阮爲易討崇爲難討侵阮則膚之噬伐崇則鼻之滅聖人𥘉意不汲汲於深治小人而終有不容不深治者皆其所自取也六三噬腊肉遇毒小吝无咎象曰遇毒位不當也臣聞周禮腊人掌乾肉腊物之全乾者也小人掌盛而勢強其堅難噬與全體之腊同三乗𥘉應上而隣於四疾小人挾黨爲間欲盡除之然人之爲惡情有淺深罪有輕重不問渠魁脅從而例殱之是舉腊肉之全體求快於一噬故反遇其毒豈非, WYG: 已感藏}
