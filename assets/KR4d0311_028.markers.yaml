  - {type: variant, offset: 3653, length: 338, content: 不盡自然國治而天下平與身歴目睹所設教何異哉𥘉六童觀小人无咎君子吝象曰𥘉六童觀小人道也臣聞觀以二陽位否剥之間欲化小人爲君子故待小人恕欲君子益進其爲君子故待君子嚴九五宅中于上光明碩大之德如日月之照臨有目皆覩𥘉氣卑質弱而去五逺乃爲童稚之觀童者蒙而未發孩提之童無不知愛其親則有可發之機彼其䧟於小人豈性也哉物欲蔽之也茍如童稚於倥侗顓蒙之𥘉有以發之則昏者可迪塞者可通氣質變化安知小人之不爲君子故雖童觀而許其无咎象以小人道爲言其質固不可以語上而申言𥘉六亦示其上進之路也爲君子而不能以學問開明所見而甘心與懵無識知者同歸則爲吝矣聖人於大觀之𥘉恕於待小人所以示皇極大受之法嚴於待君子所以示春秋責備之法六二闚觀利女貞象曰闚觀女貞亦可醜也臣聞聖人之道無窮人心之見有限上帝降衷若有常性靈明虚徹𥘉無聖愚賢, WYG: ''}
