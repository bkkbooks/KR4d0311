  - {type: variant, offset: 7071, length: 5, content: 戮人三所處, WYG: 警䇿其}
  - {type: variant, offset: 7077, length: 944, content: 中不正而欲施刑去天下之間人其肯心服哉齊威公自侵蔡而伐楚猶噬難噬之腊肉屈元如師辭多勃戾有遇毒小吝之象而終於服包茅不貢之罪則无咎矣齊之挾天子以令諸侯位固不當楚雖強不敢不服豈非齊之尊王名正言順乎九四噬乾胏得金矢利艱貞吉象曰利艱貞吉未光也臣聞凢物乾爲陽濡爲隂腊胏及肉以乾取義指陽爻言也九四在一卦之中本爲間者以爻言之則四之位近君九之材足以堅决而立斷故資之以除間𥘉九不畏不仁不耻不義四與爲正應猶聮骨之胏肉旣乾而堅至爲難噬一旦噬而去之見善明而趍義勇蓋得金矢之象焉有金之剛而無柔懦有矢之直而無回遹義形於色不茹不吐冝難噬者之無不噬也然去間不可有所易以易視之樞機不宻未必不反爲人所制不可有所撓在我不能貞固其守而猶豫遷就安知無當斷不斷之患此所以利艱貞吉也象言未光蓋始與小人宻而終力去之雖得去間之義亦豈所謂表裏純一本末坦明昭昭然掲日月而行者乎平勃勸吕氏王諸吕其後卒誅諸吕在漢爲有大功參之王陵以白馬之盟折其萌則二臣爲未光矣大臣任去間之責者當觀諸此六五噬乾肉得黄金貞厲无咎象曰貞厲无咎得當也臣聞人主天下之利勢威靈氣𦦨之所曁以去小人之間則小人消以去夷狄之間則夷狄服權有所歸則勢有所易也腊肉全體最難噬乾胏附骨亦難噬乾肉雖難噬而視腊胏爲易凢三爻之陽皆足以梗化以六五離明之君制之如噬乾肉然何堅之不斷何間之不除正以其得黄金之象也黄取其中金取其剛人君有剛中之德天下之悍戾邪僻無不退聽尤當正固守此而以兢愓危厲行之則惡無覆出㐫無反噬尚何咎之有夫有間則有咎其所以能終免於咎蓋以得剛中之道以治間當其冝也六五本柔中爻乃取剛中爲義上卦屬離離一隂居二陽之間中柔而外剛仁者之勇也君德茍仁有餘而剛不足則無以斷天下之疑定天下之業唐之姑息受制於強藩悍鎮漢之優游養釁於宦官外戚豈不甚可鑒哉上九何校滅耳凶象曰何校滅耳聦不明也臣聞𥘉上兩爻皆受刑之人初九小懲而大誡故受刑輕上九惡積而罪大故受刑重何校械其頸也械深大至於没耳耳主聦有耳而不能聞過徙義聾瞶其心而浸至此極其所由來者漸矣夫視曰明聽曰聦本二事也而以不明麗之聦明於聽德然後謂之聦也天下之耳相似誰無是聦私心塞之顛倒是非而有誤蠅聲而雞蟻闘而牛外雖有聞中實蔽惑故聞人之善言而惡其逆已聞人之惡言則恱其順已不明孰大焉使盗跖桀紂能聽人逆已之言而不以順已爲恱亦何至天下之惡皆歸萬丗不可湔濯哉此易象示人遷善改過之門最緊切處, WYG: 逮毋惜陸續}
