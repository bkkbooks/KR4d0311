  - {type: variant, offset: 2977, length: 2, content: 均此, WYG: 依乘最先九鰲負地而四極安扶植更力肆増隆於上婘亟入贊於中樞密勿引裾雍容補衮避權逺勢初無富貴之心合意運籌自契明良之㑹覆金甌其久矣登玉鉉焉遲之播一朝希濶之麻開幾年壅塞之路昔妖星示變除舊之兆已萌今瑞雪應期作新之慶可卜兩全文武之憲獨斡中和之}
  - {type: page-break, offset: 2977, content: '', id: KR4d0311_WYG_028-2a, image: WYG1175/WYG1175-0296c.png}
  - {type: variant, offset: 2980, length: 2, content: 也是, WYG: 惟國事總總乎其方殷而民情喁喁然其更切决否泰之消長在乾坤之轉旋平輕重於一舟丕展濟川之畧寄安危於八柱迄成支厦之功以福華夷以夀社稷某霜途易蹶冰谷難春夙䝉鍳賞之殊快覩延登之盛調元有道坐培上甲子之休播物無垠早吐雌丙申之氣踴躍胥慶編摩曷宣禮部郎官謝廟堂啓九年去國甘從西崦之耕一旦起家遽草南宫之奏大明昭揭於積曀之後妙造濳囘於沍寒之中脱迹沉淪委心坱圠伏念某天姿不頴世諦更踈虎負嵎莫敢攖徒奮直前之氣鹿走險何能擇了無善後之謀寄懷抱於倚楹付光隂於靣壁低徊空谷轉輾窮途蠻素掉頭早厭香山之老雍端拍手亦嗤栗里之貧間意行而覔詩率危坐而讀易忽逢隂剥遂與陽升牢落馮唐尋青綾之故歩推頽禹錫訪瑞錦之新窠久湮焦榖之芽頓吐寒灰之熖俛仰自省生成有歸兹盖恭遇某官道包元功心契真宰伊尹舉而不仁逺矣選衆惟公臯陶歌而庶事康哉}
  - {type: page-break, offset: 2980, content: '', id: KR4d0311_WYG_028-2b, image: WYG1175/WYG1175-0296d.png}
