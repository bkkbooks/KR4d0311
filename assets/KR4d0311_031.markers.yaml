  - {type: indent, offset: 3979, content: 　　　　, id: KR4d0311_krp_031-bkkind12}
  - {type: variant, offset: 3979, length: 614, content: 舒夫人墓誌銘余友毛璲君玉書以舒城尉何光華填諱狀一通來曰先大父帥屬諱若訥字辯道丗爲處松陽望族娶葉無子殁繼舒氏諱妙慧婺永康人年二十六來歸生洙次涬次庶子渙文璲父克任㓜子也孫五人璡璲璚璋琡女孫六人慶元已未正月二十六日大父卒後十有四年嘉定壬申十二月八日大母卒得壽七十有八性静而慈相大父惟義之急不以有亡爲解教諸父必儒璲父酷嗜収書鬻田園以庚直借書問字者滿門縱論古今留連燕飲莫繼燭弗倦至空其家歳庚午春大母且泣且語吾望而取冨貴以華老今顧日貧爾妻死矣母懷居挈爾子游都門或幸成立不成吾死母歸夏鬻荷塘屋得緍錢千二百留半爲菽水不虞備偕璲哭辭以出月移歳改倀倀逆旅莫之省大母訃聞無斗舂以奔䘮父子東望號躃絶已復蘇念惟忍死賣文以辦葬庶乎不孝之罪可末减於是曵𥚑並奏王公貴人門鉤摘繪冩脫手眼青解衣推食不我勒也紹定庚寅璲侍父歸自惟揚倒槖中裝經度窀穸相攸逍遥觀舊址古洞陽之側山明水清妥厥靈爲冝越壬辰二月廼克葬先是璲母程氏兆金山之陽地卑多潦從弟璋之母程死焚而末殯同日併遷柩骨夾祔于側置田租二十斛入逍遥爲烝嘗供挽道士楊祖雲主岡林仍度一人以丗汛埽烏乎樂莫樂於負米悲莫悲於齧臂髙堂垂白一訣千古爲子若孫者何心哉頼天卑矜積囏苦二十年了大事子幸哀而銘之水激則髙矢激則逺賢父子激於太夫人一言日夜刻厲用能以子雲之筆札孔璋之書檄撥窮起悴還以奉之生之養不過百年而死之奉與山川相爲乆其無憾矣乎小人有母凄其拱木因感愴系之詞以申孝子慈孫之志銘曰林洞古兮虚壇瑶草春兮芳蘭笙鶴杳兮雲旗閑魂返宅兮吉且安髙, WYG: 高}
