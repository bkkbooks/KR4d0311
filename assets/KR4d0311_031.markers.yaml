  - {type: indent, offset: 5212, content: 　　　　, id: KR4d0311_krp_031-bkkind15}
  - {type: variant, offset: 5212, length: 818, content: 佛心禪師塔銘寧宗皇帝在宥三十有一年元嘿無爲以心學仁天下聞主徑山如琰得即心非心之祕賜號佛心禪師婁命就山爲衆說法錫賚甚寵山川震燿夫敬直義方表裏兩盡下學上逹顯微一貫此自昔聖賢相傳之心法釋氏得之證其體而滅其用以成之者性爲圜覺以復則不妄爲楞嚴以勿忘勿助長爲金剛第一義以不失赤子之心爲華嚴最上乗湛然太虚本無増减雲行月脫隨有昏明頂竅靈關鼻端寂觀一喚覺於意識智得之表而大光明藏無欠無餘南渡百年間大慧杲以是說授佛照光佛照以授師師寧海國氏子母夢神人遺大珠而娠生有光瑞能言時母戯之曰人從何來曰人中來聞者異之十五出家浄土院十八祝髮二十游方卅一得法於佛照𥘉束包問津雙徑見大慧髙弟仁扣以當時千七百衆咨决之要得狗子無佛性話黙領去江湖徧叅群疑塞匈還求决佛照於台之報恩夜參聞舉丗尊鞭影語曰見鞭影而行非良馬也言下有省旦日入室問不思善不思惡正恁麽時如何是琰上座本來面目師云佛手遮不得曰恁地也未夢見在乆之從過靈隠苦研精索至忘食寢佛照勇其進痛施砭劄師終以未徹憤悱遂謁證老衲於番易聞旁僧商略雲門話墮語云那裏是這僧話墮處豁然洞見佛照從前機用義諦宻融智辯捷出九萬里風在下矣還參於育王佛照迎呼曰大事辦耶尋復從過是山朝莫激揚極其造詣佛照毎語人曰我握佛柄以來的契吾機惟琰耳其賞屬如此繇育王分座出主南劒之含清歴越之能仁明之光孝建康之蔣山皆迫而後應最後天童與是山宸命也師見趣髙深提倡直截所至禪衲川赴平居簡黙似不能言及籌室勘驗學徒如驚雷忽電不容湊泊領衆嚴而奉已約應物圎而處事定叢林推敬謂浙中尊宿獨此翁因共稱浙翁住山八年春秋七十五矣以退休請未獲命一日忽剡遺奏遣書别素所往來公卿抵莫問侍者曰鐘鳴未曰已鳴大書偈擲筆端逝寶慶𥘉元秋七月戊寅也越九日塔于東􅤝之麓其徒了阡以師六㑹語要介法戒謁辭圗堅銘曰佛果有心萬籟沉沉佛果無心萬象森森靈明溥通徹古徹今契非其真杳不可尋佛照鉗椎雲門芥鍼是印非印脫鑛鑄金沕萬古淵閉陽闢隂砲車起雲奮霹靂音川鬽澤恠腦裂氣瘖湏臾恬霽天垂斗參無去無來谷髙岸深護窣堵波龍公夜吟爲蜜說甜以詔主林, WYG: ''}
