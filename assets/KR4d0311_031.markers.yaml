  - {type: indent, offset: 6922, content: 　　　　, id: KR4d0311_krp_031-bkkind20}
  - {type: variant, offset: 6922, length: 627, content: 獅巖沈君墓誌銘浙漕貢士沈湀與余交歩趨語黙中度文中律執親䘮啜𬞞處獨不見齒者三年一日舉内外柩四竣事謁余銘其先大父獅巖君墓孝子慈孫之請不得辭也沈氏望呉興避五季亂徙瑞安丗以儒名家惟正生忠訓咸咸生特奏琮琮生君諱賁字成伯年七十有三以慶元己未五月十日卒娶給事劉公安上姪女先卒子二振蚤卒抃未除君䘮卒女二適進士鄔說許仲承孫一湀女孫三湀承考志以紹定己丑十一月癸酉葬君于横山考祔焉君少負英氣身七尺射命中聞舊臣宿將說中原事輙慷慨流涕間往來武夷考亭諸山從偉人訪異聞得八陳微指因㑹稡諸家方圎竒正之說著書數千言附以孤虚六甲占風望氣之法期於有用學成不售杜門評論諸史究見成敗得失以寄憤鬰氣岸㓗然湛盧青萍之在匣有不可蟠屈者而行已居家動合繩矩事母劉夫人以孝聞訓育猶子収拾師友遺孤乳保之若已子董勸里丁郷校之役若家事行義著矣猶未足爲君多也丙戍風潮之變死者山積君旣負母如亢爽群從少稚􅍪至轟豗澎湃震掉心目跬歩不能進相與號呼於浮沉中君奮前不顧手挈而登之人人得脫魚鼈之涎而君二子反迷失道莫知所之或唁君君曰是有命旣而亦皆免於難士平居暇日孰不知志士仁人爲可慕猝然之變壓于前死生禍福垂於一髪未有不志移氣奪擇利以自謀於此能委命徇義寧忘其身忘其子而不忍遺兄弟之子其惟近古之卓行乎先是君家東美躬行二君子從伊川先生游得其學特奏未冠以明經走京師試行臺爲貢士第一遂介從弟游伊川門君學得於特奏就正於東美抗志制行信有自來哉銘曰學出伊洛如江河近接其流渚而沱釃爲洫渠引沚阿滲漉所及黍與禾有相之道嘉且多壬辰冬十有二月庚寅於潜洪某撰呉, WYG: 吳}
