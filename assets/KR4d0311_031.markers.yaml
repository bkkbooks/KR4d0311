  - {type: variant, offset: 1732, length: 1949, content: 孺人呉氏墓誌銘孺人呉姓諱妙静臨安將仕郎渭之女承務郎致仕俞君泳之妻子三人修職郎新桂陽軍教授德藻進士德林德棻女二人適進士陳千齡國學呉元卿呉氏丗以詩書孝友爲家法將仕君四女見聞濡浹皆有淑行孺人㓜尤敏悟誦書知倫類識大義親有疾衣不解帶藥餌非親嘗不進旣嫁踰月而哭其姑以不獲日奉巾櫛爲終身恨歳時感愴烝嘗孔嚴承務君性䟽直不切切規利約衣節食以相之身任家事之勞而𥙿其子於學子未就外傅孝經論語率口授誦聲鏘然塗𥿄淋漓輙喜溢顔面延師聚書斥簮珥無靳色間遣游學裝齎靡宻必經手反必問所習及所與友教授以嘉定甲戍入太學登舎選癸未中甲科明年秋新天子大饗承務君與孺人俱受𥘉封族姻交賀孺人愀然曰吾舅姑餘慶也歳侵輟餐以食餓者疫癘手和藥以遺病者内外親黨小不咸爲之委曲開暁使釋然驩洽如𥘉而後已故其殁也哭之皆盡哀實寶慶丙戍六月癸已也年五十有九卜丁亥九月丙午葬于平西郷九山之原教授以某辱與游一日欵門泣且拜曰母氏攻苦教諸兒閔焉日望其成德藻甫得一官垂及迎養而棄之不自意忍死以襄大事百用旣戒敢請銘嗚呼吾母之教某猶君母疇昔需外教之次而失吾母與君同痛割迨今未間也尚忍銘君母哉銘曰山韞玉而長虹水孕珠而五色維子之賢繄母之德鬰鬰林丘過者必式呉氏孺人墓誌銘臨安故鍾君子度之妻呉氏守静以寶慶二年六月丁亥卒年六十有四曽祖贇祖憲父渭將仕郎將仕公壻于鍾夫人鍾出也而歸子度男二人長殤次應僑孫二人甫阜孫女二人曽孫三人夫人之卒姑王夫人春秋八十九矣一日呼應僑來前曰吾年至此䘮兒女幾盡繄汝母是頼汝母方哭汝妻吾又哭汝母天乎忍哉丗非無賢婦賢如汝母不多見未嫁時其母苦上氣疾多方療之未愈晨起剔股和糜以進兄孝立感之亦齋戒露禱穴胸析肝以救遂活其母郷閭稱孝旣嫁吾家一手綜理家務以相汝父汝父得專意問學所與游皆當丗知名士風月佳時論文氣雋諸公索飲亡筭其典中饋隨取輙辦無倦容客去主人頽然奏床鼻息如雷汝母復秉燭料撿中外理明日事矣如是二十四年而婺婺居又二十四年未嘗御鈆華所以孝於奉我者終始如一日記汝父無恙時日侍我昌羊後圃半酣奉觴起舞且歌吾欣然和之汝母手挹新果以薦聲怡氣下吾毎爲盡醉不幸婦姑俱孀相依爲命杯羮必絮寸跬必掖悲歡榮瘁同之今舎我而先吾不欲生矣應僑放聲哭王夫人亦哭應僑遂奉大母命來丐銘以葬夫孝者百行之本也女而孝於母婦而孝於姑其本立矣以之治身峻而絜以之理家儉而法以之處妯娌婣族和而有禮訓子孫必以學手足親愛有疾痛恨不能分其楚鄰有襁褓失哺惻然遣乳媪日字之如已出歳儉包黍以遺餓者大侵則捐攻苦食淡之積倡郷邑爲粥以食之其風槩有介胄不可犯之色而慈於䘏人其言論識趣雖賢士大夫不能過而信於行事孝之推也於古誼應銘某與其孤應僑厚當銘故中書貳卿嘗銘子度宰木拱矣夫人卜以其年十二月丙申合葬于國昌郷湊水山之原廼爲之銘銘曰人生兩間與萬物異孝爲之根其榦也義有齊季女孝於事親移之事姑厥孝惟鈞孝著而義松堅玉㓗衆善萃焉皆其枝葉凡得於天悉具是彛不媿于幽維此銘詩孺人呉氏墓誌銘孺人姓呉氏臨安新溪人呉與同里郎姓丗有連父憲噐孜以妻之生二男思懃懃蚤卒一女嫁呉公棨孫四人謙諤詠該曽孫八人偉儀倬俶伋儼僑俌元孫四人孫曽元女十人人壽七袠鮮矣孺人九十有四上壽也上壽百未必一有有之衰病日侵食費祝動費掖常也孺人晚益堅強視聽不少衰耄期而堅強累百未必一有有之必含飴擁䣛嬉戯蒲前而後懌以舒孺人身見五丗家數百指矣耄期而堅強身見五丗千百未必一有有之能少長巉巉盡在目中乎孺人一門數十年尊不哭卑兒婦皆七十餘歳時帥諸孫班白者弁者角者髫鬢者羅拜奉觴介夀綵衣紛如也耄期而堅強身見五丗且一門數十年尊不哭卑抑寥乎鮮矣矧能以詩書華其家偉挹郷薦伋升太學勝衣以上層級相師友進未艾也好德者福積善者慶天道可必如此孺人福慶萃於身鍾於後豈偶然哉卒以紹定戊子十一月丁丑葬以明年十一月癸酉合章塢夫兆思謁銘爲書人之所難天之可必者以勸其奉尊章順相夫勤約以厚烝嘗嚴待骨肉有恩意常事不書銘曰豐難乎其臧也耋難乎其康也繩繩難乎其將也噫盛哉夀母之慶也鍾孺人墓誌銘余杜門東山下一日有客冒前乞銘其母弗省也旣而言吾聞君子不以已廢人君能使巴清母傳寧能使衛姜母詩乎因改容扣其槪信不可没已孺人鍾姓諱妙清丗居臨安西市年十六歸東市阮君自勵十九娠而寡父林母陳夙愛甚即而唁之唶唶憐之哭而指其腹曰勿我憐也生男耶守男生女耶守女安之命也逾月得男又即而撫之哭而目其嬰曰天以此厚我矣除䘮歸寧母黨具杯勺相勞苦且泛辭覘之哭而罵曰爾不聞良馬不兩鞍耶亟索車去事舅姑謹於夫時舅殁姑老益謹於舅時姑殁輯睦先後篤於姑時惠誨其孤逢時使成立三孫亦秀爽而生日饒毎自喜曰可以見吾夫地下矣年五十七而卒實紹定已丑五月一日也古者婦人女子居處有圗史之訓行歩有環珮之節用能養其心於禮義孺人里中家人子耳箴紉機杼之外無它習而芳齡自誓雪明日烈根於天性然歟前是逢時痛父蚤丗無塋爲母預治兆域于錦南平原築堂夀樂環以水竹時奉板輿來游意甚適至是以九月壬申復父魂合葬焉銘曰水有時兮洄石有時兮泐匪泐匪洄兮維婦之則, WYG: ''}
