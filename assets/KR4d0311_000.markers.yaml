  - {type: variant, offset: 709, length: 539, content: 韻九日閱武退而紀事酬呉教程丞送髙才卿守永康二首贈相士郭少僊水僊鏡月酒後戯呈及甫偶成梅二絶荅呉叔永叔長二絶荅家朝南二絶次髙永康送行韻重過劒門荅程教見和梅詩二絶和虞仲易送行二首次李閬州禀議三首夢中得蕎粥詩和程教元日韻次鄭宣撫詩刻韻酬黎倅元夕春日即事再用韻春行次程廷邁春行送王萬里赴闕再和廷邁草堂次虞憲日近即事五絶垂去送崔吉甫分韻得舎字次李叅政晚春口占十絶次朝南送研屏香几韻和李叅政東園韻十絶次程季允韻謝髙倅送糟蟹破故𥿄荅髙才卿二絶次劉後溪和雁湖即事十絶四月壬午發利州二絶漩口帽子簷水宿發閬州二絶回龍寺松龜勝寺枸𣏌伏中宿冨樂山賞泉次張伯脩韻宿觀音寺次朝南韻二絶青渠追和宋金部壁間韻幽芳晩凉倚䆫觀稼二絶龍尾食菜讀楞嚴得老人書中詩用韻次徐隆慶夀詩韻二首卷第四詩三壽崔西清二首試院口占二絶隨筆林氏著存亭馬城詩寄趙耤令挽李貫之郎中二首次張義立登九頂三絶大像烏尤清音亭萬景樓次韻六絶壽鄒茶使三首次曹瀘南韻三首大雲寺同王翬父晚歸用伯脩韻迓虞提刑嘉陵江舟中三絶落棗岸行新井道間安泰戯成四十字寄王翬父和黎德升贈别應提刑招飲北山伯矩同登牛頭過三鶴山二絶入少城題李叅政范殿撰大散關詩後次李公謹美人行見寄後溪挽詩二首柳絮二絶追和及甫雪用虞仲易觀棊詩韻拜和老人見寄韻彌牟觀土八陣寄程嘉定楊漢州見和荅之二絶荅程, WYG: 意歟考史稱咨夔為}
