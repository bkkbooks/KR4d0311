  - {type: variant, offset: 49, length: 548, content: 峽橋萬杉寺酌觀音泉瀑布開先寺後青玉峽大孤山東西林天池燈庾樓谷簾泉楚城靖節祠湯泉歸宗墨池三疊泉白鶴觀楞伽山房二絶水行洪園洗心堂飲中偶成荅仲肅梅鄱江樓晩望有感取凉二絶敞雲樓二絶正月三日遊東西園擬古送莊郎中歸朝二首次林同年韻二絶送陳倅陪郡侯出郊勸農六絶夜讀夷堅放卷偶成秋夜次韻曹提管楚東之作中秋對月次曹提管韻和黄宰木犀清斯樓分韻得里字次韻曹提管梅次黄宰早春韻分岐四絶呈及甫白鹿書院和黄幾叔墨梅二絶和黄宰招飲觀芳草次黄宰韻古竟謝崔楊州辟七首送潜同年敷調官歸嚴陵道上雜詠七絶爲清隱打化僧說偈丁東泉昭君行春日山行二首挽中書俞侍郎二首贈希聲居士江頭寄致逺二絶寄崔帥卿贈趙同年别壽崔帥卿七絶續洗兵馬上李制置送興元聶帥送新婺州汪緫領歸歙送崔少蓬南歸五首平山勸農呈丘帥二首挽孫謙伯二首次繆仲右韻二首用胡衛道贈姚居士韻孫推内子挽詩李致逺母夫人挽詩二首送商緫郎三絶挽伯父二首次張亞夫喜雨挽李漕二首次洪漕韻二首寄趙景周撫幹二首贈洪子需二絶口占贈相者送丘都承卷第三詩二呈同行諸丈遇風出陸次程及甫韻次及甫韻送致逺别九日復口荅程及甫徐少望宿柁頭次及甫入沌韻又荅孫正叔祖母哀挽二首夜泊劉郎浦二絶夜泊柳子口荆州江浮水燈作佛事江陵渚宫又次及甫渚宫艬舡次及甫即事登無盡墓次程教韻二絶次及甫覺寒舟中望南山次及甫韻青草夢詩次及甫入峽雜詠峽口, WYG: ''}
