  - {type: 'kr:newline', offset: 0, content: '

      ', id: KR4d0311_krp_016-bkkkrnewl1}
  - {type: line-break, offset: 0, content: '', id: KR4d0311_SBCK_016-1a02}
  - {type: indent, offset: 0, content: 　, id: KR4d0311_krp_016-bkkind1}
  - {type: variant, offset: 1, length: 0, content: '', WYG: 欲為朕修天保以上之治爾彌縫之外欲為朕舉采薇以下之治爾佐佑之往欽哉可右司即中袁肅除太府少卿兼知臨安府}
  - {type: variant, offset: 2, length: 0, content: '', WYG: 勑具官某惟前寕人得名法從濬正大之源以養君徳折姦邪之氣以興人心學無不該用有未盡求諸一庭詩禮之彦為我四方岳牧之資爾講貫有源業履甚度盤根利器奏民庸而獨髙熟路輕車聳朝望以更偉肆簡都曹之最進参列寺之華典吾神臯資乃儒術俗久壞而周南之化未浃政積弛而商邑之治未張澄精神於百為妙機括於一轉廸若攷詩書之訓宣朕躬道徳之行民情咸熈國勢自重此非趙張}
  - {type: page-break, offset: 2, content: '', id: KR4d0311_WYG_016-2b, image: WYG1175/WYG1175-0219d.png}
  - {type: 'kr:newline', offset: 3, content: '

