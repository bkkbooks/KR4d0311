  - {type: line-break, offset: 3, content: '', id: KR4d0311_SBCK_016-1a03}
  - {type: indent, offset: 3, content: 　　　　, id: KR4d0311_krp_016-bkkind2}
  - {type: variant, offset: 3, length: 2, content: 光禄, WYG: 王所能知也往遠乃猷用對予渥可大理少卿李鳴復除大理卿制勑具官某朕近觀勑令所編類舊典我孝祖宸筆逐事㸃勘増修刪改曲當情法於恤刑之條尤加詳焉企慕不已因親札以示輕用徒刑之戒廷尉天下平可不遴擇爾表於西州儀於王朝心夷氣和藹然君子長者之風廼者俘纍之獄咨爾聴之簡稽得情弊成以宥而朕好生之徳被於貉𨽻達於窮髪之北良用嘉欵晉躋九列帥屬棘庭使四方司政典獄咸知朕欽恤之意念之哉刑期無刑以長我王國可吏部即中趙彦悈除大理少卿制勑具官某朕近觀勑令所編類舊典我孝祖宸筆逐事㸃勘増修刪改曲當情法於恤刑之條尤加詳焉孰復企慕因親札以示輕用徒刑之戒廷尉天下平可不遴擇爾講學之粹操履之茂摽的於公族而吏治更髙司臬江左讞奏平允一道無寃民入為望即進参列棘四方司政典獄於爾乎則焉刑期無刑以長我王國可國子博士李大同除祕書丞仍兼崇政殿説書制勅具官某斯文在天地間前乎管百世之既往後乎鑰百世之方來非諸儒誰屬爾以經明行修都倫魁之望詩所謂如金如錫如圭如璧者也列在書帷据今訂古以沃朕心具有師法朕甚嘉之繇博士進丞中祕仍懋金華之業盖將閎其中而肆其外用昌斯文豈特以鎮吾群玉之府可著作佐即蔣重珎除著作郎仍兼崇政殿説書制朕甚嘉之繇佐譔進領著廷餘同前校書即黄朴除著作佐即仍兼崇政殿說書朕甚嘉之進繇典校佐譔祕廷餘同前太常博士徐清叟太學博士葉味道並除祕書即仍兼崇政殿説書制爾以經明行修茂名家之傳徐爾以經明行修都儒林之望葉朕甚嘉之繇博士進典中祕餘並同前秘書丞彭方除著作佐郎兼權侍左郎官制勑具官某斯文在天地間前乎管百世之既往後乎鑰百世之方來非諸儒誰屬爾以經明行修都儒林之望詩所謂如金如錫如圭如璧者也丞於祕邱攝組畫省銓綜餘隟盡讀未見之書韜涵日富進之佐著蓋將閎其中而肆其外用昌斯文豈特為時佳吏部哉可秘書郎張洽除著作佐郎制入典中秘讀未見書餘同彭方制敷文閣學士通奉}
