  - {type: variant, offset: 5816, length: 567, content: 同𬒳二南風又萱長冝男草榴開結子花歡聲喧令節慶事屬天家七言三首綺䟽浸影槐龍轉繡户浮香艾虎垂硯冷玉蜍金井水手抄警戒愛君詩又裁成寶月翻宫扇織就祥雲製御衣朝賀歸來無點暑坐看燕子引雛飛又穿蓮漏永金鋪邃雪藕衣輕玉殿凉好把無邪毋不敬細挑綵字夀君王端平三年春帖子詞皇帝閤五言三首龡鳯東風轉擕龍北斗回人間遒鐸振天上獸樽開又冰天寒色餞暘谷霽華賔生意乾坤滿宸襟一點春又寛大朝廷詔中和郡國詩欲求躋慶暦先使見淳熈七言三首喚仗紫宸披暁靄退朝清燕坐晴霏簡編有味爐熏永鈴索無聲漏箭稀又東風送喜上天顔吉語飛來井軫間榆塞雪消鳴鏑静柳營月暖擊刁閑又麥苗培秀臘前雪稻種浸芽春後晴野老田夫觀治象便從新歳賀升平皇后閤五言二首太液輕澌泮温明霽日融菜流芳荇碧花頌瑞椒紅又甲觀韶光集禖壇好語傳思齊男慶百假樂子冝千七言三首塗山隂賛夏王化嬀汭宻禆虞帝仁保合大和無間斷際天蟠地一般春又關雎風化冠周南次第桃夭及葛覃農事未興先獻種女紅方起又親𧖟又殷雷金鑰千門邃斜月璇題六寢深禁柳護寒鴉未起求衣巳獻晩朝箴貴妃閤五言二首梅試催粧粉蘭披入夢香迎春占北斗受福拜東皇又象應軒龍次恩承帝座光燕壇風澹蕩𧖟館日舒長七言三首春透蓬萊碧玉壷晴䆫恭侍寶奎敷從容玩畫家人卦取次題箴列女圗又鳷鵲雪殘籠霽景鵁鶄波暖颺紋漪宫中不用催行樂草木群生各自熈又萬年枝上綵裁緑千葉花頭酥點紅鏡綬囊絲相映燭探先半月慶流虹平齋文集卷第十六, WYG: ''}
