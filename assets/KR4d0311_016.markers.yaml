  - {type: variant, offset: 7, length: 3, content: 右丞相, WYG: 程珌該慶典轉正議大夫制勑奉壽巵於長樂方深追慕之悲通禁籍於甘泉尚共榮懷之慶有嘉宿德何愛崇階具官某學邃而識融履純而養厚濟時谹議五霙六莖之和華國髙文四璉八簋之古自玉堂之引去毎宣室之興思胡扼虎關尚閑駒谷復非遽復已萌於碩果之餘暌不終暌必合於遇雨之後首進班於穹閣仍賦廩於珎臺在爾初無慕爵之心惟朕盖有懋官之典肆加蕃錫庸侈殊私施㦸方新寕鬰起家之望佩囊惟舊毋忘存闕之忠可著作郎權司封郎官吳泳除軍器少監}
  - {type: page-break, offset: 7, content: '', id: KR4d0311_WYG_016-6a, image: WYG1175/WYG1175-0221c.png}
  - {type: variant, offset: 11, length: 5, content: 樞宻使鄭清, WYG: 直舍人院制勑具官某朕親攬萬幾總飭百度與士大夫洒濯激昂以追元祐思得軾轍掌我書命興起人心於播吿}
  - {type: variant, offset: 17, length: 0, content: '', WYG: 下爾操行純茂文思汗瀾本之詩書暢之莊騷太史體宜演誥朕有戎監職優務省往服少事雍容討論推厲精更始之意著之訓辭渾厚森嚴與越棘大弓同其古斯無愧江漢之靈矣論駮以扶國是朕又於此觀爾之風力}
  - {type: page-break, offset: 17, content: '', id: KR4d0311_WYG_016-6b, image: WYG1175/WYG1175-0221d.png}
