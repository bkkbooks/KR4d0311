  - {type: variant, offset: 159, length: 222, content: 更化即上天下澤以辨分本内陽外隂而進賢凛諌路之復開紛倖門之自塞回狂瀾於旣倒坐消貪濁之風泝大川而獨航期濟艱難之運惟宿弊不容於驟革而駿功有待於美成修攘之務孔嚴安危之寄逾重匪進乆虚之次曷旋丕應之機是用稽之端拱趙普之元勲叅以咸平李沆之舊德序陞左輔光踐前修緫樞機於本兵超品級於賜位仍陪多邑併衍真畬以尊天官冡宰之權以應太微上相之象於戯一徳咸有莫大乎主善之爲師百志惟熈莫先乎任賢之勿貳予欲天縡之穆汝翼予欲國棟之隆汝爲予欲職業咸修汝明子欲形聲俱和汝聽仰承尊帝籲俊, WYG: 厲精政事}
