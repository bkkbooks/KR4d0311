  - {type: variant, offset: 501, length: 0, content: '', WYG: 等科舉之學非所以淑士也必義理性命之學明則多善士化更而新師選可不重乎爾抱負閎講貫熟製錦劇邑弦歌藹聞可以為成均師矣敷暢奥義薰陶善性使諸生人人有舞雩詠歸之樂則吾與㸃也可太學博士葉應輔除國子博士仍兼景獻太子府教授制勑具官某模範賢關惠訓宗邸能茂明所學可以為胄子師矣餘同上奉議郎袁立儒餫賞轉一官制勑具官某間者均光襄房之役靡勞不酬爾才良氣雋優於邊畫督餫以濟軍事不憚鞅掌禦侮制冦與有勞焉朕方信賞以勸事功進官一列其懋承之保障最聞俟有優擢可全子材除淮西安撫副使兼知廬州兼計度轉運副使制勑具官某朕夢想東都廼眷西顧若昔濡須之築芍陂之屯郾城之士飽馬騰淝水之風聲鶴唳欲追往躅宅牧良難爾彊入而忠果達且武荆襄淮海倍著賢勞入搴朝列之華出鎮邊維之重四履綏靖三軍激昂令行陳潁之間氣薄潼藍之表朕嘉爾勇於徇國就畀帥旄仍總飛輓用䆒多多益辦之韞惟和戰之議論不齊守禦之規模一定必量敵而進慮勝而㑹必臨事而懼好謀而成能圖萬全何往不濟尚勉之哉可贈寳文閣學士楊邁特贈龍圖閣學士制勑朕慨念漢宣入承大綂博陸侯之定策方共致於中興澓中翁之受詩胡獨成於長往宻勿麟儀之舊凄凉馬鬛之新睠懷若存褒贈宜厚具官某抱古邃學事予初潛反覆發明盡詩書禮樂之奥從容規切必仁義道德之言每尊所聞務藏諸用既授五龍而夾日忽比列星而騎箕雜佩贈之莫䆒仔肩之益一鑑亡矣可勝殄瘁之悲雖䘏典之有加尚徽章之未稱峻陟淵圖之序丕増泉壤之光易文子之名死宜不朽録叔敖之後生與俱榮尚其營䰟服我休寵可黃壯猷何處信課最各轉一官制勑具官某綜覈名實而信必其賞罰親政之急務也爾守何處信貳輔藩有美政且能濬𨗳利源坯窒蠧穴版部課賦入以最聞増秩賞能庸示予信其益厲精白以承可右正言王遂除殿中侍御史制勑具官某朕始親萬幾首得一士置在明目張膽之地蔚有正色敢言之風神鼎鑄而魑魅莫逢干將淬而犀兕亦㫁善類吐氣貪夫革心察之既稔所安用之不厭其速甫躋諫列亟副臺端純仁之内出姓名蓋非輕授趙抃之不避權倖抑所優為朕方虛已以受人爾亦得時而行道難逢者風雲之胥㑹易失者日月之如流萬古在前億世在後毋替精白承休之節用為汗青傳遠之圖可吏部郎中兼右司李宗勉除監察御史制勑具官某蓋聞淫朋去然後可以榖正人側媚屏然後可以用吉士天運之往來消長此其機與爾和而趨於中大而麗於正日用力於明善之學如恐不及洊奉郡最入儀郎省素絲一節未嘗以爵禄入於心諸大夫國人皆信其為賢也朕方謹憸人充耳目之戒儀圖可御史者莫如汝宜在易一隂不能勝五陽則決之於夬五陽不可忽一隂則柅之於遇潛觀機括而制其㣲天下可常泰也爾亦有辭於永世可大理卿李鳴復除侍御史制勑具官某朕稽家法之相傳睠臺綱之特重仁廟思得忠厚淳誠之士裕陵務革澆浮薄惡之風盖心直正則無詭隨議論平則不沽􅈭欲維吾國宜表若人爾}
