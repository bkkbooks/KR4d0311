  - {type: variant, offset: 4106, length: 783, content: 無連雞之患然同舟遇風又慮一處不牢則俱受其害分建三數大鎮聚甲兵糗糧以重中權似可熊卧虎視而並塞列城護風寒之地恐難於歛戍使寸寸而守之則備多力分抑兵家之所忌挾𥘉郡以爲外扞庶増藩籬之固而鞭長或不及於馬腹委雞功而棄之又幾前功之俱廢㳂江諸大屯招兵増戍而練舟師門户之急務也或謂守淮襄自能蔽江原堡綿亘於鳯沔所以保蜀也移三關之戍而扼三泉得無已迫乎督府進駐荆鄂上流壯矣金房聮蜀海道接淮延袤數千里或虞運掉之難隨地分立莫府則大費又未易支也以至南北軍何以相制官民兵何以相使屯田於新疆何以能不資敵調夫於邊郡何以能不重優子大夫熟於觀時切於憂國其舉三邊備守之要悉意陳之將復于上萬壽觀純福殿開啓甲子本命道埸青詞玉暦紹休猥次周星之歳金行紀閏適臨元命之辰祗祓瑶壇具宣瓊籙伏願真游潜格景况旁流九扈有秋陶人心於和樂三邊無警鞏國勢於尊安朱表孟秋月閏先甲命元肅延真馭之臨仰控忱衷之禱上銷咎證下鎮危情格丕乂於萬方儲鴻休於百丗太一宫祈晴醮青詞西成應兊南畒占豐熏心淫雨之憂拜手叢霄之禱伏願飈斿潜格曦馭昭升凢陶玉燭之和均燕金穰之慶永祐陵下宫顯恭皇后殿神帳後壁山墙坍損修整畢告遷神御還殿表文奠幄栢宫靈斿夙御繕垣椒寢僊仗嘗移屹鳩僝之告功儼燕寧之復次孟冬朝獻祝香文伏願乾文循軌㤗道迓衡愛日薫和民遂恬熈之樂朔風絶警軍無暴露之憂昭德崇勲閣安奉太師趙汝愚貌像祝文維姬有旦維宋有公斷鰲奠極賔日升穹歳閱周星祀登功宗諏禮曲臺妥靈肖容肩摩前喆凌煙嫓隆祭告功臣二十三人祝文容臺丹青森拱星弁有虚其席惟人是踐相我前寜盤宗碩彦訊良告䖍爼豆群獻甲子本命青詞氣轉一陽甫應𥘉躔之紀辰開六甲首逢端命之元祗演雲籖仰延飈駕伏願天光下濟帝况博臨壽域四方永底凝民之治金城萬里亟収郤敵之功滿散朱表序届𥘉陽辰臨元命宣演冲科之祕導迎善氣之新鶴唳風聲奉天威而制勝星暉日暈受帝祉以緜休立春祭太一祝文天尊神兮挾東皇龍駕翶兮周八荒五福舎兮迪時康祠壇紫兮歌青陽神宴娭兮夜未央星留俞兮, WYG: 平齋}
