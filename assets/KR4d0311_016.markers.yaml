  - {type: variant, offset: 18, length: 3, content: 特授特, WYG: 禮部郎官兼學士院權直趙汝談除秘書少監兼權直學士院制勑具官某中興百餘年公族之直禁林惟淳熈間彦中一人爾識度純明風槩凝遠杜門著書尚友千古皎皎白駒之在空谷也泰道宏開勉為朕起南宮北扉文簡而有法}
