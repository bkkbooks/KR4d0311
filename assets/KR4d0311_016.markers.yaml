  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書}
  - {type: page-break, offset: 0, content: '', id: KR4d0311_WYG_016-1a, image: WYG1175/WYG1175-0219a.png}
  - {type: variant, offset: 2, length: 1, content: 文, WYG: ''}
  - {type: variant, offset: 4, length: 2, content: 卷第, WYG: 巻}
  - {type: variant, offset: 8, length: 0, content: '', WYG: 宋洪咨䕫撰外制國子司業張虙除祭酒仍兼侍講制勑具官某賢必希乎聖士必希乎賢朕欲新美天下之士親擇老成有賢望者為國子師士非幸與爾淵乎海濵之老也見幾而早遯覧徳而肯來俾参師氏詔媺於虎門望其容則易直子諒之心生聼其詞則淵泉溥博之義見而况摳衣問業於函丈之間者兹用進之大司成以專六徳之教師道立而善人多豐芑所以為數世之仁朕其庶幾乎可樞宻檢詳袁肅除右司即中兼權樞宻副都承㫖制勑具官某朕更張萬化首命一相筦文武之柄宰掾以賛政理樞掾以参訏謨非深識厲精求治之意不在此選爾學得其傳而邃於知氣集以義而勇於行端笏立朝論議閎偉朕知其可大受也挈宏綱於省闥𨗳宻㫖於殿陛肆兼命爾維時股肱大臣}
  - {type: page-break, offset: 8, content: '', id: KR4d0311_WYG_016-1b, image: WYG1175/WYG1175-0219b.png}
  - {type: page-break, offset: 8, content: '', id: KR4d0311_WYG_016-2a, image: WYG1175/WYG1175-0219c.png}
