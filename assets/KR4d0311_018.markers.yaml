  - {type: indent, offset: 0, content: 　, id: KR4d0311_krp_018-bkkind1}
  - {type: variant, offset: 2, length: 0, content: '', WYG: 太府寺簿劉炳除諸王宫大小學教授制勅具官某行葦忠厚内睦九族豈惟睦之必擇師儒以玉其成爾西産之良邃於易能發明未畫之藴其師表于磐石紬繹義理切劘情性使成人有德小子有造則予汝嘉可軍噐監丞謝奕禮除大宗正丞兼權兵部郎官制勅具官某丞郎朕所重非其人不輕畀爾韋平之裔有詩禮之傳隂馬之族無富貴之累可謂雅噐矣丞我大宗攝徂郎省豈特用為爾榮恭儉惟徳恪勤廼事朕將以是觀爾之致逺可賈似道特轉奉議郎制勅具官某朕建后於相家又命妃於法從而關雎之化行進封有俶推恩惟稱爾襲芳弓冶之傳承暉四星之首擢丞武監進秩}
  - {type: page-break, offset: 2, content: '', id: KR4d0311_WYG_018-1b, image: WYG1175/WYG1175-0233b.png}
  - {type: page-break, offset: 2, content: '', id: KR4d0311_WYG_018-2a, image: WYG1175/WYG1175-0233c.png}
  - {type: 'kr:newline', offset: 3, content: '

      ', id: KR4d0311_krp_018-bkkkrnewl2}
  - {type: line-break, offset: 3, content: '', id: KR4d0311_SBCK_018-1a03}
  - {type: indent, offset: 3, content: 　　　　, id: KR4d0311_krp_018-bkkind2}
  - {type: variant, offset: 3, length: 0, content: '', WYG: 等奕奕光榮矣務學好修用燕多祉可度支郎中謝采伯除軍噐監制勅具官某吳越之劍取其地良妢胡之笴取其材美朕觀諸此得噐使羣工之道爾生相家而無驕氣地之良也挹儒科而有能聲材之美也地良材美繇郎版部長戎監疇不謂宜豈徒以肺腑進哉易之除戎詩之備械書之􅙀胄敿干皆今急務毋視訓工程作為猥釀而不之屑可魏峻除太社令楊璪除籍田令制勅具官某等社籍置令類以公卿佳子弟處之鸞停鵠峙於梧竹間貴其稱也爾峻貂蟬世家風度凝粹爾璪筆槖名裔氣禀開敏或司國社或掌帝籍列在容臺培養逺噐其益勵於學以對寵榮可華文閣待制知瀘州魏了翁用明堂恩進封蒲江縣開國男加食邑制勅朕有懐時彦宜錫神釐具官某學貫乎古今氣塞乎穹壌立朝素節挺朝陽之梧桐去國丹心凛歳寒之松栢屬更張之伊始顧趣召之宜先頴川正急於借恂宣室遂遲於見誼既底於治廼遄其歸維昔宗祈敷時餕惠駿奔百辟曽齊胙之靡儀燕衎一賢胡魯膰之未至宜爵升於糓辟仍戸衍於畬圭爾毋謂萬鍾之何加朕方念四簋之不飽亟承顯渥入告嘉猷可餘同鄭性之}
