  - {type: variant, offset: 3296, length: 5094, content: 宫觀葉莫除權發遣贛州提舉南安南雄汀州兵甲制勑具官某章貢與閩粤錯壤其俗易揺而難服奉吾詔令以填綏之其惟良二千石乎爾和平而有制莊静而有立武岡戎伍之變洞察情僞宻設方略不數旬兇渠授首一邦厎寧帥閫上功旣懋爾賞繩於文吏吾帥臣又爲爾明白之起分二水之符坐緫三州之甲必恩意孚而善良吐氣威信著而悍獷革心治化蒸蒸如漢良吏是爲不負所舉可陳良驥轉承議郎制勑具官某維揚翦冦之賞大閫第功無微不逮爾庀役瓜洲賫伐援比以自請亦陞一列責實方嚴思稱所蒙可王丙特改承務郎制勑具官某巴蓬山髙林深姦民淵藪嘯呼剽刼實繁有徒爾奮身書生急義郷井招懷其脅從禽僇其不率一方安堵制閫上功超授京秩宦塗方開亦克用勸可參知政事兼同知樞宻院事喬行簡除知樞宻院事同提舉編修經武要略加食邑實封制勑朕撫車攻復古之運慕烝民任賢之風我儀圗之則山甫柔嘉侯誰在矣則張仲孝友廼睠股肱之重夙咨德齒之尊講内治以旣嚴籌中興而抑熟進握本兵之寄俾殫謀國之長渙我明綸諗于列序具官某直大而不倚沉深而有謀翛然其臞精神溢乎萬物之表皓然其老志氣塞乎兩儀之間予養晦則宻勿以效忱予更化則從容而賛决凢君子小人之進退曁中國外夷之盛衰備輸啓沃之忠居頼弼諧之助惟關洛有鼎來之機㑹而江淮有前進之規模必元老壯猷乃可以出萬全必真儒無敵乃可以大一統就煩舊德坐筦洪樞緫提經武之編益懋運籌之略申陪井賦併實圭腴噫詢黄髮則罔愆朕方謹仡仡畨畨之戒有常德以立武爾母忘緜緜翼翼之圗渉歴深則無躁謀思慮精則無遺䇿共恢大業茂對閎休可資政殿大學士新知建康府曽從龍除參知政事同提舉編修勑令加食邑實封制勑慶暦之開太平范仲淹爲參預元祐之新大化吕公著爲疑丞朕遵晦十年厲精一旦趣召先朝之彦俾還近輔之聮誕敡絲綸敷告簪紱具官某學根乎正大氣抱乎純明其重足以挫衆紛屹然鼎吕其静足以燭群動瞭若蓍龜蚤服在於大僚耻苟同於汙俗不合則去有待而行鶴鳴九臯乆聞聲而樂只鳯翔千仞迄覽德以來思予興相見何晚之嗟爾動可爲忠言之喜舉昔大對勸今力行嘿有契於此心期共繇於斯道更化則可善治冝増重於本朝折衝何必臨邊奚尚勞於外服爰輟居留之寄聿嚴共政之圗莅勑局以提綱拓爰田而衍賦併昭異數式獎英猷噫六典建於周家莫先乎設參而置輔庶績凝於虞室尤在乎同寅而協恭勉殫訏謨之忠共濟垂拱之治可左諌議大夫鄭性之除端明殿學士簽書樞宻院事同提舉編修經武要略進封加食邑實封制勑朕迪簡在廷儀圗共政繇諌長而選蓋僅聞於二紀之間自倫魁而升况並見於一日之頃繄非常之盛舉必不丗之竒材翊我事樞揚于制綍具官某身端而行治心廣而體胖鴻漸可用爲儀望風髙於華著雞鳴不改其度志晚適於槃阿維予𥘉潜慕丗賢喆未親魏證之論已稔蕭生之名迨躬攬於萬幾首旁招於衆正擢從郡最列在從塗朝入對於治朝暮進登於騎省規君德則中庸大學條國事則天保采薇方累䟽之前陳巳一言之黙寤徑躋宥府宻賛籌帷由求之切而得之難故知之深而用之速緫武經之大筆陟書殿之穹班爵肇啓於徹侯封更陪於多邑以寄股肱之重以示精神之強噫虞舜之治有五人朕方篤任賢之意宣王之德洽四國爾盍思復古之圗叶濟廟謨丕昭儒効可何處乆除直寳謨閣知鎮江府制勑具官某南徐襟江枕海而控淮地望重矣制勝孔嚴擇守加遴爾材猷閎碩志氣激壯爲御史諌官嘗陳内外修攘之略具有本末朕甚偉之冠冕蓬山未鬯設施祖逖擊楫渡江之地以奎直往爲朕圗厥功應接于外屏蔽于内威行愛孚而天險之勢以強京師併蒙福也可何琮除直徽猷閣福建路轉運副使制勑具官某七閩樂郊也間者鴟義姦宄多抵冒于法非蕉萃菀結莫之省乎爾風槩凝逺性行脩絜丗道渫濁能不磷緇朕噐之奏對間乆矣歛武華要寓直凝邃夙駕暑征往將使指豈直爲飛輓計以鐵冠觸邪之餘威察一道臧否貪亷而刺舉之使吏姦澄而民氣舒斯稱朕臨遣之意可董洪父自脩王公瑾父囦方岳父欽祖趙子森父復先陳子椿父千期朱炎父師友孫鏞父价以明堂恩封官制勑具官某緫章大饗熈事㳙成歛福錫民同躋仁壽爾旄期康彊有子仕版京秩䟽封式昭善慶可太中大夫曹叔逺特轉通奉大夫依前煥章閣待制致仕制勑訪正元之遺事尚想告猶追長慶之髙風遽聞請老莫囬雅志庸錫徽章具官某襟度曠夷風規凝粹羊腸峻阪蚤備罄於忠勤豹尾屬車晚寖隆於恩遇勞禁塗而諗疾佚真館以言歸賜杖竊遲掛冠何亟疊進髙華之秩仍通嚴邃之班祗服寵榮益綏壽嘏可正議大夫程珌磨勘轉正奉大夫制勑等六曹而上課嚴三歳之遷超四品而升秩重八年之轉雖循彛典實著恩章具官某粹學淵深英規山立謀猷獻納備殫日月之忠典冊鋪張叶應風雲之㑹繇殊庭之引興毎魏闕之存心積閱旣深陟明可後飛鴻自適𥘉何計於穹階鳴鶴相求肯尚遺於宿德可閭丘梓林炎趙崇媺趙崇森除大理評事制勑具官某等興獄惟平之難漢吏用法巧文寖深於是置廷尉平四人務平之爾梓爾炎爾崇媺爾崇森皆練習律令而文無害故並命以司庶獄之平明啓刑書胥占咸庶中正中則平矣欽哉可虞衡除大理寺正制勑具官某王制獄辭之成史告于正正聽之正所以正庶獄之不正也爾簡澹而詳敏褰帷嶺嶠之東以風力著庸命爾正于李吏有上下其手以舞吾法爾悉爲朕紏之庶幾廷中稱平而天下無冤民可權知信州史彌忞除將作監丞制勑具官某上饒間于江浙頃悍卒軼紀律以駭吾民翦其萌可緩乎爾優於應變勇於討惡尸二渠于市而群姦之魄禠千里厎定朕甚材之召丞匠監用旌爾能繕修務簡益培雅望可趙與懽起復直寳謨閣淮西提刑制勑具官某兵刑一也西淮方整軍經武陳時臬事冝加謹爾公族之雋材優而氣盛嘗守輔邦蔚有能譽繁弱可乆櫜乎起之欒棘進之奎直往司臬于西能使在泮獻囚與在泮獻馘同功則移孝爲忠之道得矣可大理寺丞桂萬榮除考功貟外郎制勑具官某馮唐白首顔駟厖眉尚書郎以老於識爲重爾行己純固莅事精恪丞于北寺不詭不撓蓋渉深而識定者也考功課吏之法公則一私則萬殊勉爲我權衡之抑揚惟允嗣有襃進可權兵部尚書趙至道除寳謨閣直學士知鎮江府制勑法從莫如文昌八座之尊价藩莫如扶風三輔之重必卷舒之有𥙿斯出入之俱榮具官某蚤以孝稱晩繇亷進歴耳目之寄毎侃侃以自將升喉舌之官尤循循而唯謹乆厭禁嚴之直欲㝷閑退之盟莫挽而留冝華其去赤刀琬琰峻祕職於西清皂蓋朱􅙲鞏名城於北固亟上中和之最尉予耆艾之思可太常寺丞兼權右司曽天麟除將作少監制勑具官某永惟技巧工匠之鮮及不如宫室苑囿之無増故繕監不以飭工而以儲材爾䟽通而文寛静而栗材出鄧林信良矣容臺省闥趣升于少匠厚其儲以致用也爾知噐用利則用力少而就效衆斯識朕心可王瀹轉承議郎制勑具官某朕觀新店民之語知和糴之厲民尚矣爾守滁日糴辦而民不擾數踰三萬應我賞格増秩旌勞尚鞭其後可歸順人沙兀惹特𥙷修武郎添差蔡州兵鈐兼權蔡州事制勑具官某襄漢奮伐淮蔡底平莫府以戎捷來上謂爾能知逆順之分赤心歸誼願効忠力蔡人即吾人也爰卑右階就命爾守復民業以趨耕作士氣以待戰保障鞏固斯稱委寄可房應發轉文林郎制勑具官某六騩復土五使置官凢備驅馳悉霑賞賚爾祗吏役例進一階茂對恩榮尚思䇿厲可劉顯以父評戰殁𥙷承信郎制勑具官某蜀關禦寇虓將死勇爾父從之鏖戰繼殁羽林孤兒漢恩特厚録爾一官用勸徇國可石天瑞白華𥙷秉義郎制勑具官某等方城濯征垂瓠震潰執訊獲醜餘燼爲空爾能自歸貸而官使尚圗忠効用荅生全可李駿起復直龍圗閣四川都大茶馬制勑具官某秦蜀榷牧之政分合凢幾然非其人分任而不足得其人合治而有餘爾沉毅足以經逺果逹足以治劇所居厎績晚譽更偉坤維事力日匱茗法壞而後馬政壞頃嘗分任未見其益也兹庸合以命爾且寓直淵圗以重其行母俟祥琴慷慨叱馭能使廉信浹於園户行於蕃落則摘山冨而効牽蕃矣可工部郎中鄭寅除尚左郎官制勑具官某艮以止爲體能時止則止然後能時行則行爾簡粹而通亮爲郡嘗以治理効聞顧時俗之流從又孰能無變化懼荃蕙之俱茅也而恬然歸絜坐玩歳華待化機之轉移偕衆正而彚集其將有行乎郎選甚髙母憚于劇朕方思所以進爾者可王轉朝請郎制勑具官某榷務萬貨萃焉而摘山煮海之利居多羡入必賞厥有著令爾材優於從政嘗司出納歳有羡利其知理財正辭之義乎一官懋賞益圗爾庸可將作少監趙與芮除大理少卿制勑具官某孟侯朕其弟必卷卷以陳時臬事丕蔽要囚爲誥豈非刑者君子所盡心友之篤則誨之切乎爾氣質金玉歩趨繩矩卓有大雅不羣之風朕猶欲其政事之熟更也旣試之大匠又試之少大理民命至重國脉所關欽哉恤哉其寧惟永爾亦與有令聞可鄧雲轉武節郎制勑具官某山東逆儔負固淮楚大振貔貅之氣一空狐兎之群制閫第功爾嘗鏖戰進官四等護戎湖右其日夕淬礪以稱信賞可王旻勑具官某山東逆儔負固淮楚大振貔貅之氣一空狐兎之群制閫第功爾嘗鏖戰峻升武級用獎驍雄仍顓戎律之嚴坐鎮邊城之重祗承異渥勉䇿竒勲可直寶謨閣宫觀劉宰除太常寺丞制勑具官某聖人與曽點說􅃮雕開蓋不汲汲於用乃所以致用也爾得於天者厚求於人者薄見幾逺引樂道而著書與行乎國政之乆者相爲終始丗方瀾倒獨落落乎其有風飈朕甚嘉之抜之槃澗丞我奉常幡然一來尚不負國人之望可考功貟外郎桂萬榮除尚右郎官制勑具官某比歳倖門開而吏道雜武級猥濫尤甚綜核方嚴銓筦冝允爾爲考功郎氣嚴詞厲吏莫敢欺推是以修審官西院之法鑒掲而妍醜分衡設而輕重判劇曹其澄乎來幾何日三錫厥命用惟其材母謂序進可前右正言何萬齡特轉朝奉大夫直寳謨閣致仕制勑具官某臺諌以觸邪指佞爲職自仗馬相戒而舍豺狼問狐狸有年矣爾以駿發之材邁往之氣列在騎省能於波流風靡之中奮擊大吏疾於迅霆非不畏強禦者乎銜䘏以殁歳月奔駚崇階邃職示不汝忘可兩淮制置使兼㳂江制置副使趙范除江淮制置大使制勑全江淮濟中興莫重乎要衝之勢築壇埸拜大將莫嚴乎專閫之權廼睠時髦宻承廟筭内養威而植屏外觀變以投機丕建使名特加命綍具官某挺姿果毅抗志忠勤材閎而用周力振西平之業氣壯而識老逺追鄧禹之風自討賊之䇿勲即平戎之定計入儀法從出撫成師朕惟九節度以無統率而危唐四將軍以有領屬而強漢必中權之獨揔斯外治之咸張車攻復㑹東都首經營於江滸閟宫遂荒徐宅先疆理於淮夷兹大恢表裏之規摹冝盡禀精明之號令翼翼文昌之座堂堂太一之旗壯本根於荆揚震聲采於汴洛詩書之帥以尊主爲德仁義之將以安民爲功行三軍則務於好謀掌六師則貴乎同力觀宣勞之寖乆信任重之優爲江左自有夷吾朕方倚深長之略河南盡爲晉土爾盍堅綏定之圗可權工部侍郎留元英除集英殿修撰知江州制勑翠緌鳴玉入聮法從之榮皂蓋飛旟出殿名藩之重不輕厥選冝賁其行具官某篤實無華寛平有則物情方靡𥘉何意於鷹鸇丗道旣回仍可儀於鵷鷺政藉居中之益忽騰𥙷外之章勉徇懇祈俾圗共理升班論譔留夙望於甘泉奉最蕃宣寄壯懷於湓浦予曲盡待臣之禮爾益殫報上之忠可葉奭除國子博士應㒡除太學博士兼莊文府教授汪之道除國子録制勑具官某道存乎人心藴之爲德行行之爲事業文辭陋矣朕故謹擇知道者爲學校師爾奭直簡而廉爾㒡融明而静爾之道英拔而粹俱有得乎正大之旨庸命奭爲博士以學胄子㒡爲博士以學士仍典藩房之教之道爲録以紏胄監之不如規者師道立而皆知以求仁明善爲急化成天下獨不在兹乎可著作郎兼權司封郎官蔣重珍除起居舎人兼崇政殿說書制勑具官某迪惟先朝䇿士多得倫魁之彦敷遺後人休朕旣簡在大僚又簡厥修如爾重珍者以柱史從華光之游矯矯乎鳯凰之集阿閣黄鵠之下太液也榮貴素定盛名難居詔媺責難益究爾韞使碩大光明不愧天聖嘉祐之盛顧不偉歟可黄壯猷除金部郎官制勑具官某朕方經理京洛財計𥙿於内則事力充於外金幣委輸鉤考其數以周知登耗而頒節制司珍職也爾噐局明整材華暢茂司庾左淛能斟酌取予歛散之冝以乂我民趣踐郎省參掌國用曹雖劇刃游盤錯矣抑以是詳觀爾之能可司農寺簿趙鎬夫除司農寺丞兼提領安邊所制勑具官某景壽昌丞大農關内漕榖國便之常平置倉民便之北邊亦藉以給丞不當如是耶爾鎬夫機圜而不窮氣銳而有立逾月再轉就丞九扈且坐緫邊計材選也孰科當興孰害當除母使壽昌專美於漢則職之稱可軍噐監簿陳振孫除諸王宫大小學教授制勑具官某我仁宗詔諸宫院教授非止講習經旨湏選履行端慤蓋欲其以身教也爾静而不競簡而不華可謂端慤矣振振麟定以爾爲之師觀榘度於歩武之間挹芳潤於言論之頃而成童旣冠莫非大雅麗澤講習之功將有考於此可方大琮除司農寺簿樓杓除軍噐監簿制勑具官某寺監有簿職鈎稽違失簡矣國以養材士以養望爾大琮粹然其瑜而静俾簿于農寺爾杓凝然其度而立俾簿于戎監鴻之漸而鷺之振也觀其所養朕不敢忽爾益觀其自養可知南安軍彭鉉職事修舉轉一官制勑具官某漢二千石有治理効輙璽書勉厲増其秩故良吏爲盛朕甚慕之爾果於事功逹於識慮而敏於材江右南接嶺嶠俗駻而難御支壘假守能不以蠒絲易保障田里相安蟊賊屏息其漢吏之良乎一秩示勸益進于理以對顯擢可施􅵉差知融州制勑具官某融在廣右爲望郡銅虎符不輕卑爾以淳熈執政之胄克修令猷履平而植固三爲別乗抱璞不售亦老於丗故矣以是起家母鄙逺其民而厚拊之廉善逹于聽聞斯稱惟良之選可曹叔逺贈光禄大夫制勑老之將至甫抗志於垂車生也有涯遽遺言於易簀推我䀌傷之意形于贈禭之章具官某薫然澤物之春蔚乎成已之學中年去國留落而氣不衰晚節還朝虺隤而志巳勌進陟論思之選退㝷蕭散之盟方惜日以自休胡御風而不返出處本末具知存闕之忠始終哀榮茂享書棺之寵可季衍直寶文閣致仕制勑具官某河東守以一人之毁而去雲中守以文吏之繩而罰今昔之通恨爾直方自信無所撓折宅牧淮右竟以賈憎朕夷攷其平生公於徇國廉於居官暌弧之疑可亡也齒髮未衰遺榮何亟進直寶奎尚其吐氣可, WYG: ''}
