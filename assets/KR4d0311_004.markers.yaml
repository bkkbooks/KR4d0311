  - {type: variant, offset: 960, length: 316, content: 地間誰虧復誰全手携昭文琴一曲三千年大雲寺同王翬父晩歸春風拍天梯夕舂墮寒浦潭潭水晶宫灔灔赤金柱汞爐煮丹砂釀作九霞醑陽侯醉而狂喚起燭龍舞濕紅照白髪客子有酒所舉鞭問同來扶桑在何許同來狂更甚揺手作虜語上流屠鯨鯢流血一川雨用伯脩韻迓虞提刑從來圗易必思艱運甓工夫莫放閑萬里功名終竟在百年元氣早湏還安危着眼棋枰外中否留心弩括間寄似匆匆無幾語華陽東去是潼關嘉陵江舟中三絶柳色黄黄草色微一川新渌兩紅衣老天也信還家好淡日柔風送客歸辛夷零落水生漪睡暖沙鳬蔭酒旗不是歸㠶相料理春光如許厎能知東風吹老地棠花燕子歸來認得家茅屋石田渾好在白頭何苦尚天涯落棗楊柳天機淺櫻桃丗態深空山鳩問荅肥水鶩浮沉格物知窮理觀時㑹省心最憐誰氏女沙裏日淘金岸行少年血氣暗消磨盎盎陽春, WYG: 命難諶民情難}
