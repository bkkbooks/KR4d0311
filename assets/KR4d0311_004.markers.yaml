  - {type: variant, offset: 59, length: 3, content: 止福蜀, WYG: 嘗過於剛哉况陽無常勝之功隂無盡滅之理消長往來間不容髪二陽之臨方長而二隂之遯已知其必至陽消葢不久也自復至遯閱月凢八而謂其消不久何哉疾疢萌於強壯之時}
  - {type: variant, offset: 63, length: 2, content: 爲作, WYG: 不自覺也元祐初司馬光一洗新法之弊而奉行差役已有蔡京消豈待久哉遯進而否君子之道盡消則蔡京之禍}
