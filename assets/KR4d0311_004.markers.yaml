  - {type: variant, offset: 57, length: 1, content: 獨, WYG: 之地則大亨以正可常保而吉其凶矣觀至于之辭則知吉凶未定之間儘有可用力之地特患乎玩安忘危不知所以用其力彖曰臨剛浸而長説而順剛中而應大亨以正天之道也至于八月有凶消不久也臣聞一陽而復二陽而臨剛浸長也下卦為兌上卦為坤説而順也九二以剛處中上與六五相應剛中而應也臨有是德故大亨以正也隂陽消長皆非一日之積今陽剛浸長於復返之餘其來有漸然懼其乘方進之機鋭於逐羣隂而失之暴故繼以説而順説而無所憤順而無所拂心和氣平動循天理則剛不至於過於是臣之剛中足以輔乎君君之柔中足以濟乎臣上下交應同歸一中宜大亨可致且不失其正也豈特人事為然天為剛德猶不干時一元運於上而雲行雨施保合太和莫非剛徤中正之用天道亦}
  - {type: page-break, offset: 57, content: '', id: KR4d0311_WYG_004-2b, image: WYG1175/WYG1175-0151b.png}
