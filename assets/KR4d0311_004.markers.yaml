  - {type: variant, offset: 67, length: 6, content: 福幾年生一賢, WYG: 凶莫甚焉夫惟上之人常以防㣲杜漸為心遏隂柔於未進之始尚何陽消之慮象曰澤上有地臨君子以教思无窮容保民无疆臣聞坤地在上兌澤居下地之臨澤最為切近君臨民之象也地上有水為比澤上有地為臨皆以切近取義而水與澤異水流而不盈故比於地而不為臨澤者水之瀦含深蓄逺渟奫演迆而地之岸際常臨之此具區雲夢}
