  - {type: variant, offset: 2332, length: 437, content: 句雁湖甚賞之因用韻反騷周天日月何曽住大地山河祗自磨不死者存人獨耳㑹令斧亦爛如柯拜和老人見寄韻阿翁瑩徹八䆫冰獨愛春郊畫有聲正鮆魚肥桃漲暖欲河魨上荻芽生驚雷破柱眠逾穩明月中庭酌屢更應待兒歸相從臾萬紅堆裏槊齊横彌牟觀土八陣寄程嘉定房公堂是蓋公堂漏下無聲日正長應念常山蛇陣處有人搔首立斜陽楊漢州見和荅之二首西樓伴食老西堂拆韈渾無半線長推向萬山深處去沉犀橋北望龍陽春隨落絮去堂堂白髪相看作許長人物如公猶未節諸生何敢薄淮陽荅程嘉定二首練𬒮蒿簮不下堂肯隨時丗畫眉長旁人莫解東風意只道花梢合向陽鈴索閑閑静冶堂漢州東堂槐隂匼匝柳絲長東君五日如京兆早及殘紅醉豔陽隆慶徐守作堂名蜀固一夕夢與余賦詩堂上有何時首歸塗樽酒逢故人之句未幾過其堂爲賦之蜀踞國上流蜀固天下固欲爲天下謀護蜀風寒處極邊植藩籬黄牛白環戍中間屹垣墉武休河池路近裏古劒關峭絶鳥莫度屏蔽益梓䕫堂奥有門户天險以德強地險以勢阻王公設人險頗牧與羊杜前茅元戎崔當道卧老虎後距付君侯萬卷作干櫓坤維鞏金湯國勢重鼎吕予曰有䟽附予曰有禦侮我聞大劒旁小劒, WYG: 禍}
