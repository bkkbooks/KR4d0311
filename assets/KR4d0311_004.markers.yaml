  - {type: variant, offset: 854, length: 0, content: '', WYG: 心所之也在卦之初此心趋向志於正而行則無往不以正合進以正可以正邦也一涉於邪則見金夫不有躬進不以正特一時之茍合耳然則下之感乎上能察乎正不正而為進退則不至於失已上之應乎下能辨乎正不正而為用舍則不至於失人九二咸臨吉无不利象曰咸臨吉无不利未順命也臣聞臨之為卦以二陽為主二陽又以九二為重二承乎五五臨乎二實君臣相與感通之㑹二剛中五柔中俱得其正宜既吉且无不利也然自復而臨陽剛浸長固吉矣而長必有消八月之遯已逆計其必凶君臣相與綱維斯世其將聽隂陽之自為消長付之無可奈何而安之若命乎抑將進陽退隂以制消長之運而自我立命乎命賦於天受於人行廢有定運死生有定數}
