  - {type: variant, offset: 488, length: 307, content: 容驕山中肯着如斯客來聽春風婆餅焦萬景樓次韻六絶扶踈巖桂拒霜開蒼莽鵁鶄屬玉來想見山隂秋色裏一聲欵乃暮潮回金谷白頭誰石友香山青眼幾殷兄三峨九頂知人意長與江樓酒面平秋入徐熈水墨山荻花吹雪渺江干樓頭未用催行酒待到三更月上看木落川空亦大竒坐中亡酒客湏追非渠江漢孟東野孤我南山韓退之霜磧蕭蕭落漲痕西風吹日墮金盆馮髙送目河湟外萬里戎情屬柳渾過鴈聲中歳月侵東流江水識歸心峨眉天目髙相似多買青山尚及今壽鄒茶使二首鶴鴈旌旗導紫軿方瞳秋水照人明㤗山可碎膽常定滄海自渾心轉清萬事至公如正獻片言不妄即元城擎天正要堅牢柱長與皇家植太平手挈蓬弧掛井參籌邊樓下瑞雲深傳將絶學聖賢脉㑹得𥘉陽天地心議論文章胷萬甲功名冨貴腹三壬春風禁柳東華路扈駕催行荔, WYG: 散則君}
