  - {type: variant, offset: 2907, length: 4675, content: 得是韋弦送交代王公輔興州乳臭腥紅𫀆萬馬夾擁横磨刀奴顔婢舌競勸進羅拜狗彘讙優猱漢家衣冠餘兩豪同楊騤却立渠肯汙腥臊傳呼趣拜聲色厲一巳俛首昻其尻獨君此膝竟不屈男兒等死輕鴻毛群憸相顧重太息我輩天地焉能逃安西樓碑字如斗勲名爛熳官稱髙若爲龍州易萬州雙鬢如雪風騷騷君不見義不帝秦魯仲連何曽黄金横帶後部皷吹前騂旄行三盤蟇頥棧道三首棧險涎魚蛤梯危嘯虎貙室人交謫我客子倍愁予後殿推腰上前行掉臂呼龍眠如得見冩作赴州圖息女頩相問危途骨欲摧兒知縁厎去耶自爲官來野圃榴多子山田芋有魁乞歸吾計决一粲且傳杯虎爪灘頭棹蟇頥閣上車危機知略似薄命聽何如鸕筏陵飛景鳩巢架太虚乾坤眞一穽着眼莫躊躇赤崖老箐深藏洞嵌崖峭夾谿雙扉巫峽似半壁竇圌山名在彰明界低落日人煙絶孤雲客路迷紅旗穿石去青兕隔林啼讀史三絶泗水飛沉周寳鼎霸城遏住漢銅人人心不似無情物多少英豪入魏秦晉將屈乗餌來虞越送西施買斷呉馬齒雖髙人未老五湖風月䄠陶朱黄門常侍禱明堂竇武陳蕃横𬒳殃料得天公方睡着不應受囑變官方用蜀行送徐隆慶守金州兵家如弈棋局局勢不同漢王引兵故道出襲雍武侯率師祁山揺關中何曽踏陳迹乃欲収新功中興用蜀九十秋咄哉求劒空刻舟今年出秦州明年岀鞏州了無一鏃飛到商􅉑州但諉險絶不可度豈識竒道湏竒謀漢水隂洵水陽左房襄右梁洋中間詩書禮樂帥手提招揺麾天狼以人材爲武庫以人心爲金湯於斯二者有足恃出竒度險如康莊君不見紹興間虜從鶻嶺窺蜀山彼旣能來我能往疾驅風雨過潼關毀鄧艾廟蜀庸無與守魏吃浪成名血巳洿砧机魂猶饕酒牲柏溪融雪㵼玉案倚雲横瀦薙莫留跡山川方氣平西龍道院溪影山光浸曉寒空庭人馬報平安夢回非想天中界身是無懷國裏官桑葚青紅鳩澒洞麥花開落雉蹣􅘐好班嘉定中興詔盡與蓬婆滴博看龍州麩金丹砂到官後民告所得倍於他時喜爲賦詩乳到零陵竭珠辭合浦行地非慳所産人自晦於征砂粒層層長金麩點點明盛衰非自爾利莫與民争七夕黄姑織女萬古心脉脉欲渡銀河深有齊季女起拜月緑髪一縷蒙金針眼明志針如志鵠針髪相投如破鏃回身拍手笑廼翁字大行踈燒矮燭夜坐公退不妨飲夜凉猶未眠瓦檠鳴落燼鑞鼎濕霏煙露葉悄相煦候蟲讙自煎白頭行萬里轉眼過三年雨夥頥秋後雨瞑些晚來凉夾市崩崖赤環城漲潦黄隨冝梨栗熟滿意黍蕎香白鷺追紅鶴歸飛作箇忙范漕仲武季克雲坡西來一鶴山澤臞春風六轡閑且都公餘鏡月晝隂寂睡起手校羣芳圗海棠酣透燕王邸豹血深染重氍毹昌南别派更竒絶豐容靚飾香生膚牡丹鼎盛漢川譜行輩近許天彭俱翠微㔩葉光照路馬上秦􅉑湏人扶鳯州楊柳足佳思苒苒百尺青流蘇黎州菊華抱勁節濯濯一丈黄䄡䄖老成典刑識􅌲桂晩出姓字聞珊瑚石蟬風味更清烈比屋梓益梁䕫巫豐年樂事與民共浣花㝷勝時騎驢珍葩異卉價如玉爛買西産歸東呉雲坡手種五色錦徧地歩障金谷無花光深處澹容與碧瞳如水霜髯湏公家鴟夷老僊伯功成始去浮江湖中原赤子未奠枕而忍獨樂盟鷗鳬湘江之西勒浯石瀚海之北封狼胥歸來岸幘坐想雪太白萬里峨眉孤氣平德全紀渻子宇定光發南榮趎不隨造物共流轉玉立堂下松千株官舎見月三首山如天目髙水如天目急明月如郷人不速推户入問月從何來天梯幾何級辛勤度參井萬里逺神我來萬山厎舉眼無似人惟月獨知我寂歴常相親而我亦知月愛其日日新今夕自今夕不踏昨夜陳凉邊蔗境佳静裏大羮眞郤書對月坐掃空翳根塵絡緯無寸絲軋軋夜向晨路晞胡不歸貂裘弊蘇秦酬程嘉定楊漢州見和三首詩禮椎徐徐律令符急急翛然丗紛逺愛此山斗入政無勸課條功蔑捕虜級尺清蓋丈渾過眼秋巳及濁暑怯中乾積潦窘下濕脫雲得佳月如渇快新汲湓浦琵琶語赤壁洞蕭泣斯人不可見庭空漏聲澁我榻乆欲下我堂日巳葺儻有謫仙來文采晁無咎襟期李伯時昔爲鈎直釣今是刼忙棋弩谷深無路盤堤薄有基程辟武階教官廣文如我冷兩地四愁詩燕頷非無相鳶肩㑹有時三薫珍敝帚一笑玩征棋松菊吾家物衡茅厥父基青峯簾獨捲細和式微詩次費伯矩護印道中韻合着絲絇侍建章却隨靴袴踏蒼凉燈前針線爲誰好鏡裏黛鈆如許忙野水無心鷗等伍秋風有味菊顔行到頭靈運終成佛妙境湏聞戒定香生日口占霜露剛氐道侵㝷五十翁相逢多郢癭自笑亦龍聾同官多聾黍甕新醅緑丹爐宿火紅斗杓明建子芸荔又春風王火井見過先以詩寄用韻二首自期東里先生似恰與西龍道院冝槲葉蕭騷秋入畫梅花的皪月供詩盟鷗誰是知機早歎鶴吾猶決計遲歸去來兮松菊在故山毋用費文移故人寒踏龍門路來聽深山唱竹枝半丗向人長落落幾回於我獨竒竒淡交似水有餘味薄俗如雲無定姿一點青燈俱白髮相看不語只心知送曹瀘南赴闕聞之善治水不與水争勢順流導漢漾徐當過三澨又聞善登山不與山争力緩歩出朝陽晚亦到崧極展也曹瀘南所學見所履致身以登山應物以治水幾年蠶叢州歸問長安道巴船五百料太半外省草白駒在彼谷桑扈鶯其領人物方眇然惜此尺璧景踈梅耿絶碕飛夢隨去槳索蓍爲占之聖功得蒙養薺餛飩嫰斸苔邊緑甘包雪裏春蕭家湯是祖束叟餅爲鄰混沌函三極冲和貯一眞日斜摩腹睡自謂葛天民羅浮髙壽崔制置羅浮髙哉四百四十有二峯三峯最髙拔起金芙蓉耀眞洞天鎻溟𪷟鰲背咫尺蓬萊通璿房瑶室深玲瓏霞袿霓袽紛丰茸中有老僊擾白龍藕花冠巾九節笻招邀茅盈挾赤松麾訶列缺鞭靊霳天雞未呌萬籟空夜半喚出扶桑紅下照萬象方屯蒙起踏斗柄呼東風夫胥雲氣低葱蘢海若吐蜃天投虹前旌招揺導祝融從以五色騎羊翁蒼舒檮戭伯虎熊風后力牧常先鴻日用大學心中庸暗室屋漏十目同夏璜薦繅旅大弓太蔟爲角諧函鐘日星宗彛映華蟲江河健㠶轉蒙衝慶暦元祐諸儒宗立朝直聲摩穹窿眞卿長孺誰爲容白頭萬里行蠶叢清獻清節乖崖忠太平盛時適其逢事有至難莫如公表裏壞證阻且訌參苓温平匪砭攻潜瘳膏肓夷疽癰三邊按堵九扈豐祥飈甘雨天爲功趯趯和樂躍阜螽沾沾啁哳瘖寒蛩雪山不隔黈纊聦衮衣繡裳遄歸東天津疋馬兩玉童䄂䟽入奏明光宫中興規模舊提封直北燕薊西崆峒功成跨鶴追葛洪神光烱烱方雙瞳金丹寳訣傳枕中負薪汲水長相從張太博亨泉古人以木爲井義立發而得之公家老博望手斵扶桑根騎之泛溟渤飄然泝崑崙直到析木津細問黄河源玉繩澹碧落機杼閑天孫北斗可用挹槎腹窪爲樽獨携天一水從乾納諸坤梧桐九秋影苔蘚千年㾗媪神發深閟泉冽槎猶存爾泉以亨字是亨本於元丗人重通塞祗就利處論習坎維心亨中有眞肧腪木上有水井何嘗以亨言泉於性中汲畫向象外吞安得跨黄鵠往𣢾君平門廷邁留少城和𥘉入西龍道院詩來用韻荅之雪錦樓髙眼易寒春風朶朶似長安終年避事寧爲客到處㝷詩勝覔官金鑿落邊檛蹀躞玉參差裏舞􅩚􅘐華燈變盡歸來晩囬首西涪可忍看蜀燈夕有變燈送范漕赴召八絶太平宰相范堯夫曽駕西州使者車雅操清規公更勝委蛇退食一編書淮頭蜀口幾虺隤百戰山川入眼來行伍姓名渾歴歴定知水鏡不遺材急符喚岀雅州丁刀染紅巾血雨腥定蜀論功誰第一茗山合着後溪銘走卒兒童口是碑百年幾見好監司浣花鏡月經行處草木江山亦去思嘉州過盡又涪州到處湏判十日留汲媪畬翁遮道拜東風未定莫行舟匹馬西征歳月多蒼頭引鶴共婆娑傳聞虚佇如清獻益漕歸來徑上坡天道頻年說好還到今胡壒没天山延英爲奏平戎䇿只在人心國勢間紅絲歩障海棠開厎似西湖半樹梅要試平生調鼎手安排青子待公來𬒳檄出城引郤東風觱栗聲竹輿如斗作春行山中祗恠天能窄棧外方知地本平黔𬒮煉斜屋小黄纓淘礦亂砂明終年一飽難如許愧爾爐熏管送迎次李綿州和丁興元韻二首燕寢深凝自在香蒼髯扶病玩流光桃符暦日又新歳粔籹燋糟非故郷燈影參差棋濺雹酒行雜遝劒横霜武侯遺憾誰當洗夜半銜枚入鳯翔梅花巳是隔年香投老何能面復光求則得之青籸飯歸斯受矣白雲郷果柑微似温生乳閬柿多於處着霜扶起東南風物夢舉觴目送去鴻翔劒外驢苦甚淮南䭾嗟哉蜀口􅐒護身㯶結䪌防口竹編籠逺近關梁接髙低閣棧通琅璫鳴鐸裏誰識木牛功潭毒關倚天翠壁夾黄流傴僂嘔啞輓上舟今古英雄愁絶處夕陽籌筆驛東頭送崔先生東歸嘉定甲戌冬掃門古楊州一見握手歎飛黄厄鹽輈士憂不聞道勿以窮故憂爲聖爲賢人所貴天爵修萬卷我有莊子肯從我游良農不輟耕嘉榖終有秋動心得曽益雪案三年留一朝推使岀西風着兠牟莽蒼淮月冷低迷汴雲愁正抱虎兕寢孰脫鷹隼韝越在歳執徐公來殿西頭廷臣擇自從喚起驂玉虬暑發采石磯寒登籌邊樓孤燈語中夕民瘼何當瘳明年護全蜀後車旅枚鄒熟聆老規模劒湏鑄知収中間卑一麾牢關控西涪相望幾何驛時許聞成謀積誠泮羣疑實踐激衆媮風濤澎湃中竟濟師德舟主人永終譽客亦無窮休見謂汾陽門走卒皆王侯騎火明桃林詔催告辰猶仍挈舊司馬入詹翠雲裘裏江水齊穩一葉隨沙鷗道重冨貴輕目光送羅浮竿頭要猛進壷尾毋浪投此意造物知筮得素履幽十年甘苦客從我冝如由可歸猶未歸魂斷楊花洲六經孔孟學其用爲伊周天方昌斯文敢告司鼎篝次仲禹迓叔禹西歸韻二首坡頴風流幾許年依然夜雨落花邊白頭故媪釡忘轑紅頰諸孫衣解牽聚鴈沙平江百折養鵝水暖柳三眠行厨洗玉更爲壽父老來看許近前萬里春風一札書錦幢繡斾二難俱殷紅荔子武侯渡深碧藕花房相湖家慶盛於羣玉府身名榮過執金吾人生信是團欒好我亦歸謀種芋區壽鄭制置昆丘侍郎南霍僊身騎於莵雪毛韉芙蓉結旌紫雲導望舒參乗豐隆鞭晨朝東華天帝所班在玉斧茅盈前帝矜下土沸螘垤往哉爲洗中原羶扶桑五色枝拂日蔚藍一碧壷藏天祥飈吹衣𬒳髮下輪囷旁薄煙非煙㤗山喬嶽氣矗矗長江大河胷淵淵五三六經濟丗學盡得慶暦諸公傳絲絇勌踏龍尾道玉轡直上羊腸巔印方趣視已走敵擔未及弛先行邊黄牛皂郊撤戍堡左洋右沔閑屯田規摹了了入眼厎奠而後發矢脫弦長安可到只十日祁山不岀今幾年甲申有䜟爲公設席卷關洛趍幽燕命珪相印明騎火碧瞳黒鬢冝貂蟬槐龍不動晝隂永瑶草無際春風妍蒼生元氣秋葉薄善類命脉遊絲懸保兹天子屬山甫願獻大雅烝民篇讀書樓二首流水青山一榻深銅柯石榦半䆫隂公餘點校七分易老去服行三字箴消長乗除觀物理存亡操舎驗人心日長大得官閑力乳燕鳴鳩盡好音引郤蜂衙一事無求師尚友聖賢俱激昻意氣中興頌収歛身心太極圗畬火明邊飢虎過渡船聲外老鶬呼江南雲水寛多少萬里深山着此臞發龍州六月十六日涪山信有靈送客六月雨曉行如深秋午憇無點暑泥溪兩首沙路縁江曲斜陽塞轎明晩花酣暈淺平水笑􅌪輕喜䕃時休駕疑昏屢問程誰家剛齊餅味過八珍烹左計來行險強名爲愛竒一家川藞苴三頓豆離萁壓架龍門石撑囊劒閣詩扁舟歸計足不問鶴和龜荅及甫見和二首喚晴山鳥滑辟暑水花明蜀隷綿猶重呉儂葛自輕交情潘接魏師法尹從程鵝鴨堪供客多煩拗項烹我愛湖南客從横正復竒短裳甘製芰破釡懶燃萁憤丗惟堪飲憂邊不到詩最憐孤寂甚欲爲喚羅龜唐何循吏廟阿姉雲鬒融翠翹主翁縞髮明金貂軍功告身博一粲嬖奴銅綬華臀腰有民有社桔栢渚腥風怪電騰炎熛望青採木起生廟奴主分席城狐驕延年國釗怙女寵無此土木丹青妖居人側目路人指把炬睥晲桓宫焦維唐益昌有循吏身代挽繂寛科徭婆娑棠芾滿江滸不與霜後菰蒲凋邦人扣縣合詞請撤彼祔此安羣囂青𫀆角帶儼如在雲車風馬手可招前榮後寢曼且碩庭容百騎鳴箎簫龜蛇琢鋪閟煙燎衛卒拔劒垂彤弨去思香火幾百祀叢廬風雨寒蕭蕭眼前突兀忽見此天實假手金屋嬌吁嗟勢來不足恃秋雲變滅春冰消桐郷烝嘗麟閣畫未省隨手遭人祧君不見江原清獻楠新繁衛公栢蒼榦合抱干雲霄萬牛拽倒斫廟柱售䛕薦佞喘猲獢只今還有楮錢肯向荒庭燒楠栢皆託言大風所拔採爲成都生祠先妣忌日發昭化短棹横秋桔栢磯青山無盡白雲飛官三年矣母安在天一方兮兒欲歸拱木隂隂閑墓隧背萱寂寂老庭闈呼兒掃驛陳遺像杯酒爐香淚滿衣荅贈劉交代二首危棧摩千仞牢關護一􅌪山巔閑地少溪面白雲多晝永琴書樂年豐皷角和官清誰得似祗欠客經過畨上松扶塞逢迎桔栢碕髙風挹元祐遺事說開禧丹鳯崗頭咮蒼龍洞口漦秋光無限好管勾費新詩僊鶴樓避暑孤塔山光寂危樓岸影斜秋聲來木末客思滿天涯離列髙低樹滄茫隱見沙夜凉人𬒳酒乗月快浮家次韻張提刑方送行六絶着破征衫欠再逢三峨九頂夢遊從也知造物函深意未放西南易道東伊川去後幾多年道在離堆沫水邊身任兹文湏着力莫將人事屬之天扁舟觸熱下涪忠肩聳無人肯拍洪詩送凉風天外至魚龍起舞浪花中太白嘗嗟蜀道囏少陵欲鏟劒門山何如推起蓬䆫看萬里江天碧鳥還了無薏苡可囊珠解事家人氣甚都日試西川煎茗法半投白堊半雞蘇雲邊江樹作離聲囬首秋光滿渭城蜀水呉山無間斷只應明月識人情, WYG: ''}
