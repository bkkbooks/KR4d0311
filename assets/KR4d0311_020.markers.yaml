  - {type: variant, offset: 2814, length: 1989, content: 資政殿大學士光禄大夫提舉洞霄宫制勑朕睠懷元祐登用群賢范鎮以内祠召而辭行馮京以勸讀除而請老維予宿德有昔遺風肆加進律之恩庸渙告廷之綍具官某體全碩大性韞端良蚤擅文埸盡奪諸儒之氣晚躋政路首參元化之機國論之可否未明人材之進退未决深沉籌畫宻勿敷陳巳究同寅協恭之謀廼抗陳力就列之誼功成名遂而身退固適雅懷齒宿才壯而意新毎形渇想屬親政柄趣侍經筵逺稽真廟之命耆儒近法阜陵之尊舊學亟冝強起胡不果來進祕殿之大名升争臣之穹秩夷猶故里匽薄殊庭式昭體貌之隆増重儀刑之舊且酒醴維醹以祈黄耇豈忘壽俊之思母金玉爾音而有遐心尚頼逺猶之告可劉用行除太常寺簿制勑具官某孔子先簿正祭噐寅清禮樂之府簿非冗曹比也爾以凝重之噐和平之政乆著聲於湖表擢寘容臺禮制樂作皆參聽之漢儀雜秦唐舞因隋情文本末必稽其失而紏其違母徒諉之簿書之末可宗正寺簿林申差權發遣安吉州制勑具官某衆賢聚於朝而郡國吏不能皆賢元氣猶未貫也故間擇周行之彦以出守爾博習明修蚤藹時譽翔而後集甫簿正于麟宗呉興闕守輟一賢以惠之漢選博士諌大夫爲守相之意也脩門咫尺轉聞良易勿棘勿弛圗惟厥中可大理少卿謝奕禮除右文殿修撰主管佑神觀仍奉朝請制勑具官某本朝家法上軋三代戚畹冨而貴之不及以政豈特防微杜漸之意示優異也爾晉太傅之懿傳漢長秋之篤友丰神氣度灑然塵表詎容乆煩奏讞之冗升班論譔賦廪内祠日奉便朝玉色而山立優且榮矣益厲謙恭之美對敡光大之休可林應龍轉承直郎制勑具官某飛錢造幣蜀材孔良灌輸外帑歳有常額爾董裝發應我賞科其進一階益勤勿懈可户部侍郎淮東緫領岳珂磨勘轉中大夫制勑虞廷考百工之績而黜陟行周官計群吏之治而誅賞定兹疇勞於法從冝䟽渥於綸言具官某蚤擅長材屢膺煩使控天塹之勢望乆著於筭鞭參地官之權班寖髙於禁槖閥匪一朝之積課當三歳之遷爰舉彛章式増文秩元豐近臣之品特示寵榮紹興名將之家益殫忠藎可慈聖太后山陵復土提舉官呉惟德轉翊衛大夫制勑慈殿升真渺僊游於少廣茂陵卜祔矗王氣於橋山廼睠按行之勞特循襃進之典具官某禀姿温恪莅事精勤北省承休特重遭逢之慶東朝罹變可勝攀慕之悲泝沙麓之慶源相稽山之吉壤龍盤鞏勢騩馭妥靈冝陟序於横階用増華於留務益思謙毖祗對恩榮可叅知政事曽從龍贈三代故曽祖詳太傅贈太師制勑朕進寧考之舊臣懷昭陵之碩輔修紀綱於基命宥宻之日問政令於同寅協恭之時終定䇿于兩朝用垂休乎億丗去之幾葉有爾曽孫具官某故曽祖具官某靈臺湛凝㤗宇昭晣忠和孝友之行悉本諸身詩書禮樂之風遂昌厥後卓犖倫魁之彦雍容近弼之聮逺泝慶源丕敡愍冊巖石之瞻師尹蔚爲窀穸之光故國之有丗臣益介雲仍之祉可故祖憕太師衛國公贈魏國公制勑元受之參則一貫忠恕之學參得之點則浴沂舞雩之風出雲必自於太山導漾實由於嶓冡不遡所積曷觀厥成具官某故祖具官某性抱冲和氣涵磅礴𣢾叚下澤夙優郷里之評駟馬髙車終遂門閭之志鍾聞孫而間出參大政以更張爰敷告第之恩庸侈傳家之慶自天錫羡文公之衛允臧易地進封畢萬之魏必大營魂儼在寵渥祗歆可才人賈氏故伯冲贈迪功郎制勑具官某氏故伯具某人維邦之媛建閤後庭澤曁一門厥有令典爾其伯父拱木巳隂𥘉品追榮尚歆殊渥可才人賈氏故兄承奉郎貫道贈承事郎制勑具官某氏故兄具官某維邦之媛建閤後庭澤曁一門厥有令典爾其同氣拱木巳隂進秩追榮尚歆殊渥可故母弟迪功郎史商卿贈修職郎制勑具官某氏故母弟具官某維邦之媛建閤後廷澤曁母黨厥有令典爾其季舅拱木巳隂進秩追榮尚歆殊渥可趙以夫除江西路提舉常平茶鹽公事制勑具官某江右壤接閩粤創殘未𥙷思得賢使者藥石而梁肉之亟還元氣之舊爾以公族儀儀之麟周旋外服藉甚有聞輟臨漳之符以庾節幸一道部邑南豐繄乃故治民之情僞俗之良寙皦如示諸掌咨諏所及精采一變積憊甦醒矣亦惟深求大學以義爲利之意則獲我心可祕書少監趙汝談除宗正少卿依舊兼權直學士院制勑具官某宗正四星在帝座東南漢取象置官以序九族辟彊德更生遞爲之爾學如辟彊行如德文采議論有更生之風羽儀道山翛然澤臞輝浸群玉不可得而親踈也維今屬籍蕃衍盛大過劉氏其爲朕奠丗繫辨昭穆而陶之信厚以重盤石之宗視草鑾坡則已試可矣可袁甫除祕書少監制勑具官某朕惟五緯聚奎天開離明之運科目取士而異人出焉故親政以來招選魁躔之雋登之政途列之經幄且進之䇿府爾學傳于家磨礲于師友所造蓋深麾節攸届旣推詩書之澤浸其民又合秀民佳子弟以義理性命之學啓迪而薫陶之自任以斯道若此參領登瀛冝矣詩曰樂只君子邦家之光其疾驅以副虚佇可張嗣古右文殿修撰知平江府制勑具官某漢重三輔唐重四輔闔閭故國吾股肱郡也選任維艱爾蚤聞前輩之論議熟識昭代之典章而材諝足以濟之龍泉干將鳴匣蓋乆用之惟恐不亟北門留鑰雖輟干行屏翰近畿徒得君重其通班于祕殿往宣朕意時和歳豐坻京相望民有漁陽不可支之樂而無新店實強取之苦斯稱厥職可趙立夫除祕閣修撰樞宻副都承旨制勑具官某天下之勢猶衡朕旣遴柬廷彦出長外服必博選民庸入治内服然後無輕重之偏爾頃繇九列觀風近甸聲氣不揺而百蠧戢蓋吏師也孝宣厲精政事樞機周宻周貴加詳宻貴加謹維爾老於識而精於慮式遄其歸以譔著中祕參宥廷之導旨周宻以濟中興其庶矣乎可朱鑑除大理寺簿林瓌, WYG: ''}
