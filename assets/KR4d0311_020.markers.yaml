  - {type: variant, offset: 237, length: 275, content: 中度懿行應規教子則朱􅙲熊軾之榮抱孫則茸纛油幢之重慶垂三葉化應二南冝申拓於脂田用増華於翟茀予非私授爾尚祗歆可故繼曽祖母於氏贈通義郡夫人制勑后順承乾元朕旣選之貂蟬之裔妃宻賛坤德朕必選之筆槖之門顧積慶之有𥘉冝追榮之無斁具官某故繼曽祖母某氏幽閑女則婉娩婦儀承先以于沼于沚之勤垂後以如山如河之懿是鍾邦媛實冠宫嬙泝産嘏之源流衍䟽恩之命數易封名壤増賁幽扄可故祖偉太子少傅贈太子太傅制勑赤城霞起而建標雙闕雲竦而夾路渟涵神秀發越嘉祥地靈人傑之有開德厚流光之可卜具官某故祖具官某材猷雋茂學問精深射䇿决科蚤聳士林之望分符出守晚搴宦路之華惟所積如江河之源故其傳全川嶽之氣子爲, WYG: ''}
