  - {type: variant, offset: 6401, length: 432, content: 湖之波茸纛外馳盡収峩雪之祲茂賢勞而不伐堅𥘉志以善藏玩丗何求際時乃出渇大老之入見促便朝之給扶中庸九經所陳者天下國家之道丘索五典所讀者上丗帝王之書嘉德義之可尊知文獻之足證擢繇司冦進攝春官以正名爲衛之先以秉禮爲魯之本豈止九賔之臚句群臣無敢諠譁抑令三輔之威儀老吏或至垂泣乃若石室太史之業金華師氏之功具罄英猷奚煩多訓可禮部尚書陳卓除吏部尚書兼給事中兼侍讀制勑朕仰惟孝廟夙重天官妙選於乾道淳熈之間豈一二士眞除於俊卿必大之後纔三數人矧趨瑣闥之嚴仍侍露門之邃輯兹茂渥屬我耆儒具官某玉粹而春和霜明而秋㓗代言爾雅蔚乎廊廟之文批勑森嚴屹然社稷之噐乆周旋於禁槖日宻勿於宸旒望之則祥麟威鳯之在廷親之則天球洪璧之照几簡知惟舊郷用罙深睠遵晦於十年甫厲精於期月内閑請謁旣絶側門敕授之風外杜營求盡革都堂唱注之弊猶慮三銓之法未精九等之材疇庸儀曹冠序選部以水鏡之清而洗丗道之濁以衡石之公而遏物情之私品藻之鑒旣髙論思之望逾重帥屬掌治朕方思周公六典之規知人安民爾盍究臯陶九德之訓祗承眷倚懋對儀圗可崔福轉兩官, WYG: 府}
