  - {type: variant, offset: 5705, length: 454, content: 華文閣知泉州制勑具官某朕嘉與海内更始疇昔庶士御事淫朋比德者退之有爲有猷有守者進之而内外肅爾以直簡之噐明通之識列在烏府斡棄周鼎而寶康瓠時論日陂乃能不爲咸股之隨有識韙之泉七閩望郡且筦琛航凋憊乆而未甦爾其以奎直起家熟思振刷之方挽回冨庶之舊用稱簡拔可陳舜臣湖北提點刑獄公事林演提舉湖北路常平茶鹽公事制勑具官某等禹貢田賦定於雲土夢作乂之後召南獄訟息於美化行乎江漢之餘今荆楚境也故出節而分遣爾舜臣以詳練之材治邕管逺民安之司庾湖右就進憲節明刑弼教必能使江漢皆善俗爾演以平易之政治景陵人有去思易麾安陸亟進庾節推利予民必能使雲夢無横歛夫監司賢則郡守賢郡守賢則縣令賢轉移習俗當自身始保護風寒亦惟本固往懋哉可桂萬榮直寶章閣知常德府彭方直祕閣知袁州制勑具官某等汲黯願出入禁闥蕭望之雅意本朝士以華近爲榮自昔然也而吾望郎如萬榮名監少如方顧牽聮以外庸請豈朕待賢之道有未至耶抑賢者體國無内外之間也武陵統乎澧辰沅靖冝春介乎潭洪贛吉其俗皆易治而難服爾萬榮予職往守武陵爾方予職往守冝春寛以字之静以鎮之異壤而同治矣朕將於此乎選表可留元剛轉中大夫直寶, WYG: 寳}
