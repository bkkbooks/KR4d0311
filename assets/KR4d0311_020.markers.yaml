  - {type: variant, offset: 529, length: 1, content: 宫, WYG: 定}
  - {type: variant, offset: 531, length: 963, content: 傅九京可作百丗其昌可故祖母於氏贈蘄春郡夫人制勑帝嚳建四妃而萬化成虞舜立二妃而四海乂蓋得正家之道廼凝治國之功兹位亞於軒龍甫儀新於䄖翟肆嘉内德爰獎先徽具官某故祖母具某氏秉柔之姿履惠和之行閨門視則婣黨推尊生也有涯蚤棄采蘩之㓗死焉不朽終流芼荇之芳號旣正於小君封更加於大郡僾乎如在其克祗承可故繼祖母陸氏贈和政郡夫人制勑唐之諸妃有以恭順稱者有以敏淑稱者雖禀天姿之懿實原丗範之嚴具官某故繼祖母具某氏歩節佩環聲諧琴瑟言言乎勉君子之正翼翼乎承先祖之恭身無愧於女箴家克貽於嬪則膺子光寵具乃肅雍紫綬金章旣視儀於一品文軒象服冝追命於重闈益開湯沐之封永燕焄蒿之𣏌可故父渉太子少師贈太子太師制勑梁傅有孫首𬒳丗宗之選膠東生女亦形光武之思推百丗之發祥驗一門之流慶肇新妃掖追賁親闈具官某故父具官某敵愾精忠折衝逺略披攘妖祲功成淮泗之郊撫納遺黎恩𬒳淄青之境施隆而報必腆積厚而發亦閎象開次北之星光映遡明之月關睢寤寐思服克參窈窕之求雞鳴警戒相成更致盈昌之助望孚禁壼澤被私庭進東宫師範之尊侈北岳神休之應繩繩蟄蟄尚克相之可故母史氏贈太寧郡夫人制勑葛覃后妃之本必以在父母家志女功之事言之予得賢妃言動中繩矩母訓豈無自來哉具官某故母具某氏出韋平之裔歸嚴徐之門熟薫染於詩書恪歩趨於禮法維蛇恊夢篤生淑之姿禖燕占祥迓衆多之祉睠起家之垂慶冝告第之䟽榮申錫郡封永綏廟食可桂如琥除川秦都大茶馬制勑具官某茗出於蜀駔駿來於秦熈寧分職元豐合之故邇者榷牧分而復合爾氣禀温良治理平易䕫巫之民安其政進嬀閣之直緫秦蜀之務興利除害必有得於熟聞素講者詩曰秉心塞淵騋牝三千又曰思無疆思馬斯臧精爾心思之運蕃吾充廐之良魯衛之政且將改聽易視矣往哉母忽可髙稼知沔州兼利州路提點刑獄公事制勑具官某沔屏翰梁益而扼秦隴自關堡險阻蕩析於兵燼連年繕治舊觀猶未還故擇牧尤遴爾氣度軒豁議論精到周旋閫幙秦蜀如指諸掌朕方趣之來將有訪也而沔非爾莫固吾圉榮以木天之直一道臬事併屬之拊循必厚經理必宻東西應援同獎王室必睦小大之獄必以情奉計入奏有日矣可陳隆之除直華文閣知興元府兼安撫制勑具官某西顧之憂朕未嘗一日志也制蜀旣分置使副梁又以謀帥請得非原堡失其險難於方面之勲乎爾出入兵間而膽略雄往來塞下而機籌熟沔雖重孰與梁重進直丈奎建屏作牧民生之未殖者爾集之軍政之未覈者爾飭之邊防之未宻者爾緝之聲援合而彼已無異情志慮公而内外有實政守固而戰克矣往勿替朕命可, WYG: 圖}
