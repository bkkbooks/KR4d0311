  - {type: variant, offset: 516, length: 3, content: 賢妃予, WYG: 領屬而强漢必中權之獨縂斯外治之咸張車攻復㑹東都首經營於江滸閟宫遂荒徐宅先疆理於淮夷兹大恢表裏之規摹宜盡禀精明之號令翼翼文昌之座堂堂太乙之旗壯本根於荆揚震聲采於汴洛詩書之帥以尊主為德仁義之將以安民為功行三軍則務於好謀掌六師則貴乎同力觀宣勞之寖久信任重之優為江左自有夷吾朕}
