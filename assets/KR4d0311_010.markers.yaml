  - {type: line-break, offset: 46, content: '', id: KR4d0311_SBCK_010-1a06}
  - {type: variant, offset: 46, length: 1, content: 婁, WYG: 未孚歟彼其輪臺之詔奉天之詔均罪已也其辭孰切寛大之詔陣傷之詔均恤人也其惠孰渥河涼三鎮播告之修均所以奪其心也其意孰明視草之才較以除書德音擅名者孰勝期期之請視以批敇壊麻為忠者孰優此猶未足深議也後元獨盛於七制元和並列於三宗號令之煥然可述與温雅有古風烈乃不見於文帝之賛唐之威令幾於復振獨於贊憲宗言之而二祖之制命無稱焉作史者必有深意恭惟主}
  - {type: variant, offset: 48, length: 0, content: '', WYG: 祗畏天戒勤恤民隠嘉與海内同躋仁夀廼者明詔荐頒飭監司守令以奉職之意開盜賊脅從以自新之途王言大哉一見可决四方萬里鼔舞於風雷之下當不止於山東魏博吏士}
  - {type: page-break, offset: 48, content: '', id: KR4d0311_WYG_010-8b, image: WYG1175/WYG1175-0190d.png}
  - {type: variant, offset: 49, length: 3, content: 索其家, WYG: 已也然澄清}
  - {type: variant, offset: 53, length: 1, content: 逺, WYG: 流為姑息撫字者轉為催科習俗移人詎能遽革錢弊久壅而未通榖價}
  - {type: variant, offset: 55, length: 2, content: 皆病, WYG: 踴而未艾凶歲多暴還定猶難伊欲吏治興起姦盜革心翕然丕應如漢唐}
  - {type: variant, offset: 58, length: 12, content: 番江去武林餘千里歳當大比, WYG: 盛時若何而可憂世之士盍}
