  - {type: variant, offset: 72, length: 3, content: 裒金俟, WYG: 圖之七問周南為三百篇之始文王修身齊家治國平天下之道悉於此見之亦猶易首乾坤書㫁自唐虞之意與然自闗睢至兎置凡七詩始言關睢之化行又四詩而麟趾始著其應夫王道自閨門祍席而達乎天下逺而難化者宜莫如㭬杙之人近而易化者宜莫如}
