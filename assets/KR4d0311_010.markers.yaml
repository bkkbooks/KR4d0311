  - {type: variant, offset: 4449, length: 1308, content: 死之以爲忠者有去之以爲義者各行其志也吾朝南其去之以爲義者歟夫死生命也去就義也惟其委死生於天而後能全去就於人易曰君子以致命遂志朝南以之徽廟草書千文跋臣恭惟徽宗皇帝聖學天縱粃糠姚姒萬幾餘閑游戯翰墨元氣淋漓不擇地而施梁周興嗣所次千文遂𬒳異丗非常之遇髙宗皇帝中興江左志在復古列聖雲章奎畫厚募歸之東序每得宣和宸藻輙悲不自勝以故左璫慮傷上意多抑不進此文其一也龍騰電掣出入造化躪繇轢羲前無千古甲丁護持刼燼不壞凢十有六𥿄悉以交龍篆章劵其縫臣子述博古識眞恭禠而寶襲之一日出以示臣臣聞紹興間上知懷素千文藏董弅家命朱勝非諭指投進使此書得陳乙覽豈復求鶩於野乎感歎之餘謹拜手稽首志其末寶慶𥘉元寒食日臣洪某髙廟千文跋經乾緯坤者典學之全功出聖入神者游藝之餘事臣恭惟髙宗皇帝斷鰲立極息馬論道緝熈光明之學追嫓三五倬彼雲漢敷賁石經龍畫螺書旁分徧刻莫不大關造化細及庶務垂則于億萬丗千文特凢將下陳何與大學婣姢餘閑亦復肆筆及之臣子述所藏臨智永書識以彭城瑶暉奉華印章劉望彭城或謂當時劉貴妃所得好賜楷法遒潤草聖妍力神動天隨超絶衆妙視永所書可謂集厥大成金聲而玉振之矣我太宗皇帝嘗行草千文賜李至至請鑱諸石以詔方來上曰梁武得鍾繇破碑俾周興嗣次韻非垂丗立教之道孝經百行之本朕當親書觀思陵奎藻者當以熈陵之意參之寶慶改元清明後一日臣洪某九頓首謹記程剛愍死事跋死生命也處死生義也義所當死直死耳君子不茍免而生也身不茍免而生乃所以生社稷也天寳之禍唐以顔李張許之死而生靖康之禍吾宋以傅李梅陳程安諸賢之死而生皆功在社稷者也嗚呼安有功在社稷如剛愍而其後莫之録乎端平𥘉元立夏後兩日古潜洪某題洪崖圗洪崖三皇時有道之士其見於隋唐間者曰張氲或曰藴自號洪崖先生岀入以髯髧五雪驢一自隨此圗是也呉興葉子淵得晁氏所藏龍眠本手臨以見遺老人戯題云先生固清髙弄拙反成巧一人御六子終𬒳雪兒妙此畫此詩俱有眼也猶子穮弦誦之暇取所畫臨之一發輙破的老睫爲明因識其末紹定癸巳立秋日題西岳降獵圗君玉以宫車遊獵圗二寄示共七𥿄韔箙前驅嬪御紛從來輿去馬蹴踏雲氣其精妙瑰恠縱横變化出天入神嘆非龍眠莫能作而不能名之轉似都官隆山李成之曰西岳降獵圗也吾家絹本得之康節孫邵公濟家人物部分與此無一不合獨第七節前多馬上美人四因合二圗爲一次第其先後以復得非兩家所藏同出一時之筆𥿄其創絹其成歟絹壽止五百年𥿄壽千年君玉倒黄河以洗研挹玉井以濡翰醉攬風露吸金天之晶而賦之必有與此畫相爲壽者紹定癸已立秋日於潜洪某舜俞書于繡山堂題天台聲聞十八尊者像余庚午𥘉夏與㑹稽王仲鈞同遊廬山旬餘一夕仲鈞先還南康城余獨宿開元寺軒䆫静深毛骨灑然夜半夢至佛殿前遇長身僧握余手而言堯曰數句巳斷於篇章之末參乎一唯獨得於言意之外孔子子思相傳者如是吾佛亦如之孟子不足與語此言訖而覺林月滿庭水泠泠如琴筑因起坐不復寐晨粥舉似衲子無能㑹但以山中古佛示現爲對轉首二紀矣臨安東山浄空岀天台聲聞十八尊者像乞一轉語恍然有感追前夢書之聲聞領此必有超悟於文字語言之表者范丞相謝表跋慶暦中仁宗以中外人望用韓范冨共政責治於期月間遇合之盛如此一朝欲止僥倖退不肖而小人始側目相繼去位髙平公受知髙廟前無與比至重惜名噐裁抑茍得亦罷相於紹興𥘉直道之難行雖盛丗猶不免可勝歎哉端平丙申正月十一日於潜洪某書劉忠肅尚書右丞, WYG: 司}
