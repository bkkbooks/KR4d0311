  - {type: variant, offset: 4058, length: 0, content: '', WYG: 辭必有深意宣大水而繼以饑襄大水而繼以大饑淫潦妨農固宜艱食而威成之秋大水莊之末年横流尤數至鼔用牲於社於門何為皆不以歉告抑豈如七年之水雖無麥苗不害嘉榖故從而略之然大無麥禾臧孫辰遂至告糴貽我來牟獨非嘉殖與亦未有洚水若是而嘉穀不害者威之初年有平原出水之害越二歲而有年其轉凶為豐者何道他國非無乖沴宋獨書水淫雨害於粢盛乃知其必興者何説恭惟主上篤於敬天切於愛民真得堯湯之用心而大兵之後四方未免以水旱告若幾於春秋之不一書者天心仁愛固在是與木饑水毁皆有數與近觀吾饒去歲常暘今兹常雨官無委積民有菜色而或者猶以饒在江東為優得毋旱不為災雨不害榖如魯史之所書與諸君學貫天人不愧舒向盍相與發明春秋筆削之義以諗為政者毋以訐而為直九問人主操富貴之柄以御天下錢幣輕重之權當一出於上不當與天下共之}
