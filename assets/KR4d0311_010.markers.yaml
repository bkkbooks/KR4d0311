  - {type: variant, offset: 28, length: 1, content: 待, WYG: 從之不識長安果可入乎信抱國}
  - {type: variant, offset: 31, length: 6, content: 意衰薦名春官, WYG: 畧亮負王佐之才得失勝負燎如觀火隨機而應慮勝而㑹必有非衆人所能窺者幸紬繹之六問三盤五誥之不作而漢制詔幾於典誥得非去古未逺猶有渾灝之遺風耶漢唐有天下皆數百年漢之帝紀詔不一書而唐史略之何耶文帝之詔半為農下山東布詔令老癃扶杖觀聴願觀德化之成可謂善於布宣者矣而當時猶謂吏奉吾詔不勤勸民不明何責吏之深也循良無傳獨一河南抑吏治誠有未至歟憲宗之世藩鎮禀令制下魏博士卒懽動如雷}
  - {type: page-break, offset: 31, content: '', id: KR4d0311_WYG_010-7b, image: WYG1175/WYG1175-0190b.png}
  - {type: variant, offset: 39, length: 4, content: 貧不能行, WYG: 倔强何益之嘆可謂易於感動}
  - {type: variant, offset: 44, length: 0, content: '', WYG: 矣而淮蔡以三州之衆合兵環攻累年乃下何平盜之難也草制失詞致煩改定抑人心}
  - {type: page-break, offset: 44, content: '', id: KR4d0311_WYG_010-8a, image: WYG1175/WYG1175-0190c.png}
