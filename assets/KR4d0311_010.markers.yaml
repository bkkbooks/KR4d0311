  - {type: variant, offset: 80, length: 17, content: 多寡均以給費嗟乎床頭金盡壯士失色嚢, WYG: 親今乃不應於彼而應於此何耶羔羊為鵲巢之功致在位皆節儉正直至其應見於騶虞則天下純被文王之化草木群生}
