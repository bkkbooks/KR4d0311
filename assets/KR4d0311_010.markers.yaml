  - {type: variant, offset: 505, length: 1552, content: 在是矣易六十四卦乾坤之外其本體以道言者惟復與艮復之動隱於至静之中故曰反復其道艮之静立於羣動之表故曰其道光明道未有不自静入者也參之魯艮顔子之如愚復聖門之正傳以此龔父資簡茂近於静其入道爲易澄心以觀我平心以觀物一敬主内萬想不揺山光凝而白雲度野水空而庭草碧悠然意得表裏俱融所到詎可㝷尺計哉予方習矣弗察乃以告吾子它山之石可以爲錯朋友講切之義也龔父勉之異日將於是乎觀所進於潜洪氏譜系圗序洪姓有兩出一避唐孝敬帝及本朝宣祖諱易弘爲洪一伏羲神農間共工以水德伯九州其子勾龍爲后土後裔封於共爲共氏漢末避仇益水爲洪吾宗共伯之胄也聚族天目下以東洪名其村無慮六七十家耆舊相傳始祖自四明挈家奉母來今西莊下擔墓猶亡恙毎歳除家祀所謂渡江祖席地用古禮而所徙歳月漫不可考然自始祖至于今不翅十五六丗一丗三十年當是唐中葉徙居於潜谷口矣洪望燉煌郡其散見於纂記多占籍東南呉廬江太守矩宣城人唐集賢學士孝昌舒城人翰林學士侃仕南漢參知政事昌杲仕南唐昇元宗譜一侍御三尚書則鄱陽三洪之逺祖也得姓以來鄱陽爲鼎盛而在潜之洪四五百年間種德蓻善源深流長曽未有顯者豈聞崖僊之風以肥遯爲髙歟抑名山大川英淑之氣有待而發蓄雲閉霆然後大沛厥施歟紹興巳酉裔孫珏首考丗系派别爲圗藏于家其後斌又采之爲祖宗諱第圗訖于已卯去今六十八年支葉益蕃不可無紀余自郎曹罷歸地偏日永因彚稡而續之凢力田以肥家從戎以丗宦讀書爲文以名埸屋皆倉監公長子仁朗之傳吾所祖也故詳仁藴之後數傳而遂微故老不存舊聞放失未免間闕文以俟質訪夫能言其祖郯子見師不識其先籍談取誚肖貌于兩間者不可不知丗繫之所自出知所自出則知根榦華葉同此一氣自葉流根不容間斷春秋烝嘗以序昭穆而謹終追逺之意存歳時㑹聚以親族黨而乖争陵犯之風息朝夕講磨修飭求爲善人君子之歸而無忝於爾祖此圗蓋亦風教之助云寶慶丙戍六月庚寅十五丗孫某序豫章外集詩注序天降時雨山川岀雲故嵩髙烝民之詠不于人物之盛而于其生我列聖以人文陶天下學問議論文章之士莫盛於熈豐元紹間其生也類在神文朝如詩家曰蘇黄曰黄陳蘇公生於景祐陳公生於皇祐而豫章生於慶暦天地清寧日月正明禀於氣者全也公得清寧正明之全氣氣全而神王挾豐隆騎倒景飄飄乎與造物者游放爲篇章超軼絶塵獨立萬物之表坡翁蓋心服之而後山師焉其集嘗擬莊子分内外篇外集如韓淮隂驅市人背水而戰暗與兵法合内集如諸葛武侯八陣竒正相生鬼神莫窺其奥彚分之意嚴矣君子之學日進而日新日新而日化進則人新則道化則天逝者如斯不舎晝夜正以是也文與詩亦然論詩者不泝其始無以知其進而新不極其終無以知其新而化内集斷自入舘以後極其終矣外集起𥘉年溪上吟泝其始也眉山任處士驥天成擺落科舉之累眞積於學書無不覽愛公詩若嗜欲然以内集有任子淵注因注外集十二卷攷年譜以推出處用事必求其意用字必探其原勤且博至矣或以詩嘗經公手刪而疑其多愛然使學者盡見前輩少壯至老之作以觀日新日化之功雖多不厭也子逢博習有家法方注詩時兩髦耽耽撿書捧研領退而學詩之意今以名卿守蜀白首矣懼父書無傳力自讎校鋟而公諸丗萬里信來俾序之某晩岀未闖其樊何敢贅樓攻媿謂宋宗儒摘阮歌戴道士彈琴詩不知何以分内外當有能辨之者余聞李衛公好惠山泉置驛取水有僧言長安昊天觀井水與惠山泉通雜它水十餘缶試之僧指其二曰此惠山泉也文饒爲罷水驛欲知内外之辨者請以是觀之桂巖雙蓮圗序西風入簷凉滿巾席紫水何君噐之以嘉蓮圗來示云大兒自任舎桂巖沼中所産也前是庭砌嘗長異篁今復有此郷之耆耋雋艾相與夸詠以爲瑞懼弗克當也子以爲何如余撫圗太息言曰深哉造物之意也鳲鳩在桑其子七兮淑人君子其儀一兮鳲鳩之哺其子朝從上而下暮從下而上均平如一君以義方名家以厚德燕後男子子四叔仲季連著聲科級而伯未也伯有子亦復嶄然露頴於埸屋派義方之澤蔓厚德之慶猶鳲鳩晚哺已徧於下方進而上及固有開必先乎夫英華者和順之發也馨香者忠信之逹也充實輝光者善美之形見呈露不可遏者也君觀是華根培而榦擢歧芳而趾榮天理, WYG: ''}
