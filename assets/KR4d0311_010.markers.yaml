  - {type: variant, offset: 5, length: 1, content: 第, WYG: ''}
  - {type: variant, offset: 7, length: 0, content: '', WYG: 宋洪咨䕫撰策問饒州堂試一問周官有宮正掌王宮之戒禁糾令宮伯掌王宮之士庶子凡在版者皆屬之天官所以嚴宿衛而備非常也漢制周廬千列陛㦸百重視周為加詳光禄勲衛尉之設即宮伯宮正之遺意亦屬之丞相否乎排闥而入大臣隨之内朝外朝之勢猶未至于隔絶加官既設之後大臣亦得至内庭否乎入未央宮殿門不納徘徊往來其禁嚴矣使北軍之印未解則將何以制其變清宮具法駕而入謁者之衛端門且誰何之則夜拜衛将軍無乃猶或置疑其間耶置酒宣室敢於形辟㦸之言從幸林光有以杜觸瑟之變若不當以詼諧覊虜少之而當時議者欲使列侯郡守二千石各擇吏民之賢者嵗貢以給宿衛豈其猶未足為賢耶儒者侍中特聽掌御唾壺朝廷榮之似不足榮也其榮之何説願為中郎出入禁闥而薄淮陽之郡似未可薄也其薄之何意黄門侍郎號為要處彼擢之給事黄門又以為官之落拓何也郡國材官番上宿衛其法果皆便乎南北分屯以相統制其權果孰重乎謁者執楯執㦸武士騶與期門羽林之置亦各有説乎世為衛尉見于同姓而王國人乃不得宿衛何也太傅古官論道經邦而以給事中領宿衛又何也夫以漢世宿衛之嚴防㣲杜漸皆有深意揆之成周其得失安在邇者議臣有請宮禁侍衛各儆攸司欲以隆主威而尊國勢上亟諭之不識漢制有可施於今日者乎諸君博古通今言之無畧二問恭惟主上撫盈成之運垂延洪之休豫建元良以固國本謹擇天下耆儒端士為之輔翼儲德日隆涓剛受册三代有道之長誠不是過自漢以下固不容並論也而有司竊於考古有疑焉四皓之來衣冠甚偉羽翼既成而漢之大本以定子房之畫婉矣論者乃謂其植黨締交以相傾軋殆非子房之意然髙帝與呂后母子共起於艱難之中漢業甫定顧牽於私慾欲動摇之期期之諌曽莫能回其意則權以濟事似不當以植黨論也至觀異日開博望苑以延賔客遂至於虧天性之恩無乃出於招致四皓之故智乎二䟽之去知足不辱有以激漢世亷頑懦立之風亦可謂賢矣而論者謂是時太子年未冠學未成未可以潔身而退然宣帝之教不過雜覇之制道已非詒謀燕翼之道獨親許氏而尊禮師傅之意寖薄見幾而作似不當以潔身論也至考其既去之餘論語孝經之學遂轉於甘泉洞簫賦之好卒無以養成其德得非二䟽遺其憂乎夫齊威㑹諸侯於首止而王世子始定髙宗舊學於甘盤既乃遯於荒野是則四皓之來二䟽之去盖非茍然者而得失是非曽無定論何耶諸君以麟趾之英親逢懿爍自宜鋪張揚厲編之詩書而無愧商訂及此特以觀講學之素耳幸茂明之三問五百歲而聖人出若囿於天地之定數君臣而並父子而處胡為獨盛於帝王之世耶電繞斗樞虹流華渚瑶光貫月赤龍生風其見於世紀者若此質之正符亦過於愛竒矣然履武敏歆天命元鳥降而生商詩人猶且咏歌之不足得非聖人之生固與人異而受命之符抑有在耶夫天生聪明天錫勇智謂之生知之性出類㧞萃可也語怪及神顧安取此至若東南有天子氣南陽有鬰葱之佳氣得非王氣有所屬乎夢神於大澤之陂夢吞日於猗蘭之殿得非精神有所感乎重瞳八彩日角龍顔與夫鳳姿日表之異抑肖貎有不同乎十四月而生乃立堯母門胡為誕彌之月適相似也甲觀畫堂或謂畫九子母于其中果何據也功成慶善之樂何為而作誕聖繼天之樂孰從而獻千秋紀節何所本始節近長春其議安在恭惟主上天縱之聖冠冕千古御籙膺圖重熈累洽屬兹良月瑞慶標辰桂海氷天嵩呼華祝同一心也諸君生逢千一之期目覩五三之盛躋公堂稱兕觥以介萬夀實維其時是宜鋪張對天之宏休與生民天保之詩相為表裏凡自昔帝王震夙之盛事盍相與訂㩁以諗有司四問道揆明於上法守嚴於下則天下之治不難舉矣宅揆之官奮庸熈載三公之職論道經邦古之大臣所以任天下之重曷嘗以細故自累哉漢唐之世九卿更進他官參與已失委任大臣之意而持禄固位伴食模稜尚何望其職業之能盡其間少知治體者抑又不能無疑焉錢榖决獄所宜與聞乃一諉之内史廷尉而不復省事無不統顧如是耶死傷横道豈不大於牛喘而科瑣邊吏僅見於赤白嚢交馳之後恐憂邉思職者不爾也聽受訟獄日不暇給乃至有愧禮樂豈萬世長策未暇講耶}
