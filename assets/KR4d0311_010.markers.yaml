  - {type: variant, offset: 5758, length: 707, content: 跋挫士氣者沽激之名壞國是者調亭之論忠肅公在元祐𥘉以吕正獻薦爲侍御史進御史中丞又以正獻薦擢尚書右丞方在臺時彈奏蔡確章亨吕惠卿安燾等靡遺餘力第知去大姦大佞以扶植更化之盛不暇計它日之禍也使公計它日之禍則必以無所是非可否避沽激之名開調亭之論局面隨手變更奚待閱八年而後爲紹聖哉雖然無鮑叔則無管仲無子皮則無子産無正獻則安有忠肅觀此告者當有感丙申春社日於潜洪某敬題于摛文堂劉忠肅冗費官制擬草跋前兩項寳元嘉祐詳定减省冗費似是進故事之類後兩項元豐頒行官制指揮必公爲右司郎中時代宰臣擬進續通鑑於覈正吏治條曰詔於創𬒳差命條曰上批其間頗有刪改處大意皆如所擬年月與此合神宗聖訓左右司湏是學爲宰相良有以夫劉忠肅遺龔輔之手啓跋公時爲校書郎公用韓魏公薦自江陵府觀察推官除祕閣校勘𥘉入朝時帖也尊諌院以先生丈丈首畨用名印於月次畨用於名皆近丗所罕見觀劉忠肅手簡嘉定甲申某與公曽孫爲龍州交承端平乙未丙申又獲與公元孫今太常寺主簿同朝常簿論事挺挺有祖風烈可敬也出示此軸敬書其後題劉忠肅和洗竹詩帖洗竹和篇與白樂天養竹記同意闢邪衛正嚴矣異時罷相乃出於所善之楊畏何薈翳託根之深耶觀劉忠肅所書金剛經此必非在臺省時所書閑退中移心法耳書諸公贈鍼醫李立之十全堂詩文後眞西山病革呉義夫自江西津致立之視之曰鍼有起死功未至之數日西山隤嗚呼天胡奪斯人之亟耶豈二竪畏立之之至迫之殆耶抑立之有天幸鍼不及施於决不可起之疾得以全其術耶余得竒疾於上齶逾年累更醫不効立之視之曰鍼艾所不及也知其不可治而不治是亦全巳江湖間恐有異人竒士能以竒方治竒疾試爲訪之幸得其方以寄是又不自居其全而能進於全歟古潜洪某舜俞書天笁杲古鏡住持箴此古鏡磨鏡法也乆後光明透徹自無待磨諸禪莫𬒳老行者熱瞞道不湏拂拭古潜洪舜俞, WYG: ''}
