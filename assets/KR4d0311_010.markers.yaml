  - {type: indent, offset: 1, content: 　　　　, id: KR4d0311_krp_010-bkkind2}
  - {type: variant, offset: 1, length: 10, content: 楚泮榮登義約序禮賔周, WYG: 進郎吏仰視不顧則體貎安在而止擇十使猶患未盡得人恐兼収待用者不爾也夫坐而論道謂之三公綱舉目張豈無其要而世之喜事事者乃以身親細務為稱職不事事者又以無所建明為得體漢唐相業之卑得無坐是乎主上更新萬化圖任老成以恢張治功宜日異而月殊可也然天下之弊紛如蝟毛二三大臣夙夜盡瘁於其間而未底厥成故議臣欲清中書之務簡節疎目而講明其大者揆守之辨要必有在至若賢才之未盡舉倖門之未易塞兵聚而難散民困而易摇糓貴尤艱於和糴楮輕尚費於稱提凡此數端莫非當今之急務孰為大臣之職孰為有司之事輕重緩急當與識時務者籌之諸君其毋隠五問兵以多算勝智者察事幾於呼吸之間料敵勢於千里之外發無不中如矢破的何其神也而謀之用舍抑又有幸有不幸焉廣武説成安欲假竒兵絶信耳之輜重而兩将可致淮隂使人間視知其不用然後敢下井陘亦可謂竒策矣使成安果用其計則信将何以應之魏延每隨亮出輙欲請兵異道㑹於潼闗如韓信故事其謀差強人意亮乃}
