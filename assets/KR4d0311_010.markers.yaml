  - {type: variant, offset: 2513, length: 643, content: 道而託之以詔萬丗天道至教聖人至德備見於行事斷斷乎循之則治違之則亂得之則生失之則死信人極非春秋不立也余自考功罷歸杜門深省有感於聖人以天治人之意作春秋說兩漢詔令序天道不言而四時行聖人不言而萬化成言非感人悟物之本也審矣二帝之典三王之誥猶不能已於言誠在言前也言岀於誠雖言而忘言漢丗至誠之學不講皇極之訓蔑聞而一人志慮形爲播告大抵岀於手製天下猶得以因其言知其意夫言之不文行之不逺渾渾灝噩王言之體也漢上接三代統緒其文猶有爾雅之遺人主天資有髙下躬行有純駁識量有廣狹政事有得失固不容槩論而以仁立國之意丁寧懇惻四百年猶一日至先主孔明之用蜀一時詔勑亦能使聞者爲之興起豈非兩漢之澤未斬歟孟子曰誦其詩讀其書不知其人可乎是以論其丗也此書爲尚論其丗作嘉定癸未冬甲子於潜洪某序送程叔運掌之湖南序秋風動容木葉欲下眉新進士叔運程君過我東山將歴沅湘而南征愀然買酒酌之曰香草佳木隨地皆産而莫盛於湘之南湘南衆芳所在杜衡江蘺夫容薜荔木蘭若芷荃蓀椒桂不可一二名而莫盛於蘭蘭有國香人服媚之𥘉不以進而榮其生深林無人自芳亦不以退而辱騷人所以反覆深致其意以其似道也故紉之爲佩折瓊枝以繼之而求襲其芳澤是芳發於身逹於家漸於國以及乎天下薫蒸乎兩間流𬒳乎百丗曽何負於人哉而服艾者謂不可佩人心嗜好不同乃爾於蘭庸何悲委厥美以從俗而與惡草俱化則蘭之悲也然蕪没於蕭艾之中可蔽其芳不可奪其芳故曰佩􅌭紛其繁飾兮芳菲菲其彌章又曰惟兹佩之可貴兮芳菲菲其難虧其根於天者蓋終始未嘗爲時俗流從所轉也蘭有數種有澤蘭有石蘭有一榦一花之蘭或秀於春或旉於夏而發榮沅湘者紫而尤馥見, WYG: ''}
