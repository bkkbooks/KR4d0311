  - {type: variant, offset: 3384, length: 1, content: 揚, SBCK: 􅀭}
  - {type: variant, offset: 3396, length: 657, content: 然皆變小雅流風之遺也知大雅廣哉熈熈乎之體幾何人哉慶善嘗爲長樂宰施不盡學其見於詩凢騷人感槩不平之氣憤鬰無聊之情一無有陶冩性分惟澹然樂易之歸江山之平逺風月之清明草木魚鳥之幽間自適皆其神氣之動德符之充也廣大而静䟽逹而信者冝歌大雅其必有㑹乎題跋龍州免運糧夫碑跋蜀自開禧佳兵以來調役婁矣龍之民獨共其二平時家出丁壯畨上十關五寨以扼氐隴有警則以賦授役霜骭雷腹􅍪奔魚貫飛輓于關表間顧更厚征之其民重困有懟而無告制置南海崔公都運合陽趙公聞而惻然曰不堪命矣嚴爾戍寛爾轉饟自今其勿與山窮水盡之邦刀耕火種之俗始有生意誠求之也詩曰民亦勞止汔可小息母縱詭隨以謹罔極敢告諸來者嘉定甲申五月旦日易齋詩藁跋詩無定鵠㑹心是的仲可謫居二十年自放於詩多警䇿其賦梅有天不能寒獨有梅一渉春風不足竒之句讀之至此悵然乆之曰其有分寒餓也耶余於此有㑹其亦有分寒餓也耶因書卷末崔文昌書翰跋爲黎監丞伯登作蜀輿鬼分野多鬼術辛已瑞慶節有日者自益昌過少城竊詹菊坡老先生於大慈寺滿散所退而謂某曰帥嶺南古佛西蜀福星也至節前後度劔即辭過崇寧謁德升曰賢大夫旦夕入益昌幕時宣閫猶無恙甚疑之已而至節後果度劔德升㝷入幕以縝栗緯恢博以簡静翼方嚴從容論議如正志審固之鏃劃然而破的如躊躇四顧之刄謋然而中􅑆如鳴和鸞逐水曲之馭妥然王良造父之手而六轡如舞也用能起乆憊之俗弭紛集之變而遂與同外賔主遇合固有數行乎其間乎夫以朝廷信臣由一路帥四路若可億揣莫府𥘉開求士於叢英旅雋之中而數巳先定人其可萌一毫劵外之想乎因觀菊坡手帖有感敬書其後俞拙庵偈語跋士君子平生學力最可驗於啓手足之頃曵消揺之杖易華睆之簀蓋安之以爲常, WYG: ''}
