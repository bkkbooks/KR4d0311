  - {type: variant, offset: 2952, length: 1559, content: 行狀提舉俞太中行狀公諱灝字商卿其先晉公子食采俞豆亭以爲氏典午永嘉中歙人縱爲征西大將軍榦葉扶踈或顯或微唐末昱有蹟于朝昱生稠自江南宦呉越爲睦州刺史中奉刺史五丗孫也丗居杭爲著姓太中娶于呉興之烏程因徙家焉公㓜敏悟吐辭輙不凢旣冠挹浙漕舉材名鬰起大家貴公子競延致爲師登紹熈癸丑乙科授呉縣尉秩滿辟户部犒賞武康酒庫以格知寧國府宣城縣未上辟知盱眙軍招信縣逾年改辟鎮江都統司主管機冝文字嘉定𥘉元充淮東安撫司參議官二年知臨安府城南左廂公事未上監行在都進奏院兼添差淮東安撫司參議官三年知安豐軍六年知常德府七年提舉湖北常平茶鹽尋主管冲佑觀十二年辟淮東安撫司參議官不就主管崇禧觀提舉千秋鴻禧觀寶慶二年引年致其事先是隨軍䇿應守禦暴露屢特褒轉積階至中大夫爵錢塘縣開國男食邑三百戸賜紫金魚袋東朝大慶尊禮髙年以孫晦封太中大夫𥘉任警捕筦㩁職守外無一辭自鬻當路愛其廉而文交推輓不遺力試邑極邊謂攻守以人心爲本首發芻粟振窮乏家嫗摩之甚得民和王師驟起趨泗隨軍轉運使倉卒無措約公共議公言敝邑已備夫馬千囊米以俟使者大喜薄暮促行遲明悉辦因歎服曰非公幾敗事招撫司調兵道出招信境二河深廣非浮梁莫濟辰巳間檄至申欲渡具材有素先期而集邑阻敵境僅一水北界數千人拏舟坌至邑人大恐公謂彼飢民欲就食耳亦安知非嘗試我者使諭之曰汝等皆中原遺黎慕義而來然湏申明上司方敢受可令徒長至邑議之已而桀黠者十輩來勞之肴醑潜遣戍兵驅其徒出境歘驚疑潰去十輩者返岸亡其衆踉蹡而逃自是知邑有備莫敢窺宣撫丘公崈聞其静定有謀檄使禀議一見大噐賞所陳數䇿即施行留幕下數月聞虜且南㓂以盱眙畢守再遇孤立命攝倅助之還未數日虜果襲淮隂圍山陽畢𬒳旨䇿應解圍甚亟公謂將軍去此虜必引兵壓吾境不去如方命何畢决計啓行挽公與俱屯于雲山諜報日急公料虜必深入窺采石請回軍守石梁河以遏其鋒騎壒漲天人情洶洶戎服行伍中意氣激壯如平時畢毎笑語公吾不料書生亦有此膽也時畢威名暴振招撫深忌之多掣肘公走樞府力陳利害乃命畢節制兩淮軍馬亟回守六合虜果分兵擣虚不得入相距逾月而遁畢尋以都統兼知楊州念非公無與共濟國事辟置機幕進參謀議邊計郡政悉委之區處救脫機於矢石之間回震暴於碪斧之下心平理明軍民恱服留軍中五閱歳以親老歸省胡海弄兵復繇奏邸參幕議公熟識淮人情僞招納盪平計畫居多餘黨有來降者帥以乆抗王師誅之公謂此皆一時迫脅非夲心元惡旣殄來者即良民也極力救護全活甚衆仍各給據使歸農帥怒其咈已同列咸爲危之公曰死生命也委順而已卒歡好如𥘉朝廷以佐平淮㓂有勞擢守六安陛辭論嚴邊備清流品甚切郡經兵燼一意勞集建治宇黌舎葺軍營井井有端緒未幾以太中憂去邊氓共惜之守武陵以簡静稱隨領庾節取予中度未數月引疾去自是絶念榮進矣丘公壽雋帥維揚以公先丗老賔客欲羅致自助掉頭謝去卜築西湖之九里松出門數百歩即買舟任所之㑹意處竟日忘返毎舉酒望孤山而酹曰湖山政爲我輩設也如是者幾二十年湖旁居人以老僊目之晩喜觀釋氏書疾革屏藥餌弗御索筆大書偈語而逝紹定四年四月朔前三日也享年八十有六娶范氏贈令人繼髙氏封碩人二子長遜次修職郎楚州録事叅軍丙皆先卒女三人適進士倪良能芮爕秉義郎前監嘉興府贍軍酒庫沈吉甫孫三人晦從事郎監嘉興府比較務昕㬇業進士公遇郊先任猶子而後孫人推其義性亮直不茍合而接物必以情待婣黨有恩退然若不勝衣而精神充滿志氣奮厲不爲死生禍福所移其驅馳疆埸出入莫府料敵制勝多破的開禧乙丑開邊有萌芽一唱萬和功在漏刻張公巖位政府宻引公籌之公爲言輕脫寡謀之人若可喜不可信燕人趙良嗣平州張覺往轍可鑒力陳之張公然其說後悉驗識慮深逺矣文流出胸臆擺落陳言詩有晩唐風致詞妙處迫秦晏客或扣其舊作輙太息言未第時姜潘諸故人相與泛苕霅登垂虹放浪煙波風露間更倡遞酬以得句相夸尚夜深𬒳酒膽壯拍手嘯歌魚龍起舞今無復此樂矣尚何言哉姪孫松得公詩百篇鋟爲青松居士集餘蒐録未竟諸孫將以其年十二月癸酉葬公于錢塘縣定山郷排山塢之原某視公爲郷執謹叙其業履以告太史氏, WYG: ''}
