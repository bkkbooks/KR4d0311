  - {type: variant, offset: 1350, length: 7, content: 盛者必有信已太, WYG: 争新許楩楠之耐久詞高戞玉意重訂金水調數聲恨欠雪兒之唱山光一帶願從詩老之遊占報斐然垂察幸甚生日囘啓癸巳九年謫之賦不暇問天十月交之詩猶記墮地方擁山隂之雪忽披沁水之春醖藉不凢機杼自别以彼富貴榮華之夢開此風流散淡之懷意氣重於斷金音調諧於佩玉醉唤盧仝之赤脚强為我歌笑摩杜老之白頭莫當君賜其為感著未易名言生日回呉季永寺簿啓乙未歲週六甲氣近一陽}
