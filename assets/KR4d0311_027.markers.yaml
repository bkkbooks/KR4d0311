  - {type: variant, offset: 272, length: 0, content: '', WYG: 竒材公請當今日之}
  - {type: variant, offset: 273, length: 2, content: 剛柔, WYG: 寄方整雍丘之役又嚴斜谷之征惟井參之上游與關隴而錯壤枕戈雖切傳檄尚遲豈人謀之未臧抑天運之有待敵乘丙午之釁而犯梁汴於今百年我應甲申之䜟而破秦川在此一舉開誠心以集衆智倡大義以激三軍招摇所臨欃槍如洗天生晟非為朕亟收耆定之功帝咨度遂}
