  - {type: variant, offset: 2248, length: 1136, content: 隨而无咎似識此意其以隨元亨利正同乾德之備非彖意也彖曰隨剛來而下柔動而說隨大亨正无咎而天下隨時隨時之義大矣哉臣聞易以上下無常剛柔相易成卦乾上九之剛來於坤二隂之下爲震而上卦則兊動於内而說於外也蓋隨自否來方否之時三陽位於上三隂位於下天地不交而萬物不通何隨之有隨之爲卦上下接而隂陽交故其動也臣言可從則說而從乎臣民欲可從則說而從乎民剛下於柔不惟已之徇也惟不徇乎已之私是以否之塞轉而爲隨之通大亨且正終保其无咎而與天下相安於時措之冝羲農黄帝堯舜氏十三卦之制作與夫子丑寅之建忠質文之尚析因夷隩作訛成易之序莫非與時而偕行上無戾乎天運下無咈乎人心其義至大而不可窮皆剛來下柔轉否爲隨之功也茍徒恃一巳之剛而不明下柔之義勢尊則亢氣盈則驕君子之言日踈小民之情日戾猶不免於無民無輔又安保隨之不爲否乎象曰澤中有雷隨君子以嚮晦入宴息臣聞静極而動動極而静造化自然之理也雷動於春夏今潜伏於澤之中兊爲澤正秋之時也雷収聲於正秋亦維當静之時隨時而安於静且以養夫動也雷不養動於静無以出地而奮豫君子不養動於静無以體天而行健龍蛇之蟄以存身豈徒蟄哉故朝以聽政晝以訪問夜以安身莫非惟時之隨使不安其身於夜神過役則易竭朝聼晝訪烏能無憊是以嚮晦必入處於内而宴息息蓋作之幾生之本也夜氣存於至静之中湛然其清淵然其明渾然與太極同體嚮晦所養若此凢旦晝所以泛應酬酢各中乎理而用之不窮者皆此其出也彼沈湎於長夜宴安於祍席安知瞬存息養之義𥘉九官有渝貞吉出門交有功象曰官有渝從正吉也出門交有功不失也臣聞隨以剛來下柔成卦重在𥘉九𥘉隨之始也所隨邪正是非當嚴之於始夫耳目之官不思而蔽於物心之官則思人之一身耳司聦目司明以至口鼻體莫不各有所司心則統之君子治身之道當先治其心蓋此心不難於應事物之常而難於接事物之變境變於前感物而動官失其守遂與俱移能於紛至沓來之變操之常得其正則吉矣然必出門而交乃能有功出門即出門同人之義交於事物無親暱係吝之私也一私不立與天下爲公則旣吉而且有功豈非所交不失其正歟彼謂不見可欲使心不亂是必死灰槁木而後可其何以定而應寂然不動感而遂通天下之故感而通天下之故而寂然不動者常自若能如是則見可欲而心不亂然後可與論從正不失之義六二係小子失丈夫象曰係小子弗兼與也臣聞理無兩立心無兩用人無兩從隨以得所從爲吉六二以隂從陽𥘉九陽之微爲小子九五陽之盛爲丈夫小子剽輕而無逺慮丈夫静重而有深識吾心所係苟屬於在下之小子則必失在上之丈夫所與豈能兼哉大抵中人之性趨下易趨上難小子狎而親便辟善柔如以石投水丈夫敬而踈直諒多聞如以水投石言焉舎忠而從佞事焉舎是而從非行焉舎正而從邪得於此則失於彼曽不自覺也六二隂柔牽於多愛故設此戒以勸擇善板詩刺厲王失道老夫灌灌然輸其忱欵而不見聽小子則蹻蹻然得志而驕所從可不謹乎六三係丈夫失小子隨有求得利居貞象曰係丈夫志舎下也臣聞同是心也操舎有存, WYG: 銘藏}
