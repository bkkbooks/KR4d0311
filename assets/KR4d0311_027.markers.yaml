  - {type: variant, offset: 2060, length: 187, content: 從乎我與我之從乎人皆從也而隨以我之所從爲重外卦兊内卦震震動而兊說一念動於中隨所感而說從之得所從則有大亨之理然動說成體易於轉移惟利乎貞則可以保其終之无咎况人君宅民物之上一言而萬里響應一動而群黎風偃致亨之大有不難者特懼乎所從不得其正爾從乎天理正也而從人欲從乎人心正也而從已私賢人君子之從正也而從佞人忠言嘉謨之從正也而從䜛說儒生學士之從正也而從宦官女子從非其正咎能免乎穆姜謂有是四, WYG: ''}
