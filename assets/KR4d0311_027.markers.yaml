  - {type: variant, offset: 1037, length: 300, content: 望已深屬之矣人主能不沉酣於逸縱不昏蔽於便佞好賢之心不衰求善之志不改則介者終有時而親矣六三盱豫悔遲有悔象曰盱豫有悔位不當也臣謂此人臣患得患失之象三迫近九四當國之大臣欲如𥘉六小人進爲容恱恐非正應而不我與眄眄仰視逐逐營求是患得也欲如六二君子介特自守又利害禍福交戰於胸中躊躇未决趑趄復前是患失也以不中正之人處不中正之位而盱遲皆悔隕穫充詘情狀畢露其悔而不凶者大臣不與爲應姦無所售故不至凶使其姦得售則欺君賣國無所不至矣有國者安用是患得患失之臣爲哉九四由豫大有得勿疑朋盍簮象曰由豫大有得志大行也臣聞九四以一陽爲衆隂所宗材全而氣盛毅然以天下之重爲已任下傾心而仰之上虚心而屬之此天下之豫所由致也由我致豫建侯而國勢尊行師, WYG: 啓}
