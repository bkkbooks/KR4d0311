  - {type: variant, offset: 3385, length: 3792, content: 善利有舜跖一念之發所由分也故人心惟危六二本居中得正係乃在於小子六三本不中不正係反在於丈夫克念罔念之間狂聖易位此心界限烏可不嚴哉吾之所係旣能舎邪而從正舎非而從是則無求不獲人之善皆我之善也而猶以居貞爲利不正則雖擇善而從不能固執何益哉然所係得失當觀之立志之𥘉趨嚮髙明則上從趨嚮卑汚則下從三欲舎卑汚而進髙明冝不爲小子屈也君道亦然志在於下則係孟明而失蹇叔係商鞅而失甘龍係林甫而失九齡係盧𣏌而失陸䞇天下以之而亂六二六三兩爻政相反玩易者可以類推而知所擇矣九四隨有獲貞凶有孚在道以明何咎象曰隨有獲其義凶也有孚在道明功也臣聞仁者先難而後獲𥘉未嘗有獲心詭遇一朝而獲十則有心於獲者也人臣之患莫大乎有心於獲獲心一萌則髙者徇名卑者逐利一念外騖曽莫知返功與道始判而爲二臯䕫稷契伊傅周召道行而功自存乎其中管晏求功於道之外而功亦泯矣九四以陽剛之材居近君之位動於中而說於外其心所隨惟在於獲急淺功近利之計昧至正大公之趍貞固守此冝其凶也是必順天命本人心以輔治而行其所無事惟知有道不知有功一忱所存終始無間則功自道出昭然大明於天下皆歸於仁義禮樂之中皥皥乎其不自知尚何咎之有夫子之得邦家立之斯立道之斯行綏之斯來動之斯和足以盡此董仲舒謂仁人正其誼不謀其利明其道不計其功足以知此九五孚于嘉吉象曰孚于嘉吉位正中也臣聞嘉者善也九五居中得正之君在隨之時以說爲體聲色玩好一無動乎其中而惟善之從言必善言動必善行發必善政用必善士其推之四海散之兩間良心善性之感發祥風膏雨之霑𬒳何往而非嘉哉然其要在孚孚者出於中心之實而非僞表裏相應終始相續以不貳不息之心而從乎善斷斷乎有諸巳之信以極乎充實之善輝光之大而進乎聖神之域吉孰大焉茍惟矯揉於十手十目之地而放於宫庭之淵邃勉強於一朝一夕之頃而怠於歳月之悠乆秉於中者非實意飾於外者皆僞爲善轉而惡吉亦轉而凶一念之孚不孚其應蓋不爽也象以位正中爲言蓋有是位不可無是德九五之位旣正且中而德之正中又能㑹萬善於一已位斯稱矣是知居天下之廣居立天下之正位必行天下之大道上六拘係之乃從維之王用亨于西山象曰拘係之上窮也臣聞民至愚而神可以心感不可以力刼可以道御不可以智籠隨之上六人心恱從有所不容釋此非智力所能及也大玊居邠迫於狄不忍以養人者害人而去之民相與遮前擁後力攀強挽惟恐仁人之舎去旣拘係之又從而維之與詩白駒之留賢者縶之維之同意民之留大王者若此大王終不爲之留而從者如歸市有人斯有土故用之亨于西山周家八百年之業於是乎肇迹矣象以拘係之爲上窮蓋上處隨之極髙而無位大王爲狄所迫失位而去至於拘係之不可留遂邑于𡵨山之下豈非隨之窮乎易道窮必變窮上返下冝有亨之理也然則人心之所去秦雖刼之而不能止人心之所趍周雖逃之而不能郤有天下者可不深求撫后虐讎之義而思所以固結斯民之心哉蠱元亨利渉大川先甲三日後甲三日臣聞大弊極壞之丗天所以開聖人也蠱取壊亂爲義以爻言之自㤗來以卦言之繼豫隨之後安則玩玩則媮媮則垢弊日積養成壞證與人乆宴溺而疾生於心其爲蠱一也而蠱無終蠱之理故蠱壊之中有元亨者存何則飢易爲食渇易爲飲大弊極壞易爲治方王道板蕩綱紀文章一切掃地英君起而拯之中興不翅反掌是知蠱未有不可治治得其道而大亨雖江河至險亦利於渉特患乎安於蠱而無興起之志耳然急於救弊者未免用意之太銳切於望治者未免求功之太速險難在前徑渉不懼志壯氣盈視天下事若無足爲而易之易則難者將至過懲前日之不事事適滋後日之多事未保其不然也夫甲者十干之首而事之端旣先三日以謀其始又後三日以圗其終反覆擬論備極詳宻使治道日有趍新之功而無矯枉之慮前弊可拯後患可弭矣夫如是然後謂之善治蠱彖曰蠱剛上而柔下巽而止蠱蠱元亨而天下治也利渉大川往有事也先甲三日後甲三日終則有始天行也臣聞戸樞不蠧流水不腐以其日運而不息也故蠱壞常生於乆安不事事之餘人君亢然于上人臣靡然於下截然其不相接且下以巽順養諛無切劘正救之益上以逸樂養尊乏振厲奮發之意於是紀綱隳於姑息制度弛於因循道揆法守紊亂於私意之膠轕天下之治日入於大弊極壞之境而不自知在卦艮之剛居上九巽之柔居𥘉六巽順艮止而蠱以成正君臣相與拱手安坐以致天下之亂也然蠱豈終於蠱哉有能以飭蠱爲已任力量大而規摹壯精神全而風采立一斡旋間掃積壞之弊而興大亨之治有不難者利渉大川必明之以往有事蓋乆安不事事所以成蠱往有事所以濟蠱也况作事貴果慮事貴精丗之賢君思欲爲天下拯弊起壞而納之治豈非立志之美然或發強有餘而宻察不足廣大已致而精微未盡故事隨舉而隨沮令隨行而隨輟皆由未得先甲後甲之義也夫先甲三日以謀始後甲三日以圗終終而復始循環無間精義入神以致用何蠱之不治其在天行如貞之復返於元艮之復出於震非終之外他有所謂始也故觀天運則知人事象曰山下有風蠱君子以振民育德臣聞左氏傳風落山爲蠱風落於山下無物不撓故蠱以取象然致蠱者風之動治蠱者艮之静蓋艮體重厚而篤實不爲物移屹乎山之止也風能撓於一時使山下之物散亂不齊少焉風止草木之髙髙下下自若山何嘗加損哉君子觀象於蠱以巽振民以艮育德育成君德固作興民心之本而德之育也必以山之静與山下出泉蒙同吾能體中正仁義而主静挫衆紛而不擾應萬變而不亂動與静無非静外物孰能蠱之吾心無所蠱則人心無所蠱而天下國家之治無所蠱一静足以制百動也玩易者必因象而求意𥘉六幹父之蠱有子考无咎厲終吉象曰幹父之蠱意承考也臣聞蠱自泰來具坤乾之體故諸爻幹蠱以父母言父之行事一出於正作室而塗墍茨爲力甚易不見其子幹治之功惟前人蠱壞有待振飭必其材足以植僵起仆使百堵偕作於室毁之餘則幹治之功見矣有子而考无咎正以子能𥙷其過也不然生不之諍没不之改䧟父不義猶爲有子乎然聖門以不改父臣父政爲難𥘉六乃於繼父之始亟懲其蠱壞而飭治之必有甚不獲已者而於心終不安故必以惕厲處之事無輕舉舉之必當如此則可以終吉終不失其順也象所謂意承考蓋前人之蠱自我而治不曰我之能而曰吾父之志欲爲而未遂者今特以我之意逆父之意而行之幹治非我功也是不特揜父之過又將揚父之名豈不俱有光榮哉元祐改新法斥姦臣皆推之神考之志正得此意九二幹母之蠱不可貞象曰幹母之蠱得中道也臣聞九二上應六五爲子事母母有不及不可不正正救或過則易至於傷恩怡聲下氣柔行巽入使之浸潤而冰釋則蠱爲可治或以貞行之隂柔之性吝執不回情有所激未必不重其蠱也貞者事之幹而幹母之蠱不可貞不貞乃所以爲中蓋闈閫之内聽其自蠱爲不及急於治蠱爲太過無過無不及則中道得二居巽體之中猶以是爲子道戒事母難於事父也詩凱風母氏聖善我無令人痛自尅責幾無以自容於天地間卒能回母心而成其志可謂得此義矣推之事君睽之遇主于巷未免委曲開陳隂柔故也若夫事剛明之主則王臣蹇蹇匪躬之故惟恐其不克貞九三幹父之蠱小有悔无大咎象曰幹父之蠱終无咎也臣聞舜之齋慄曽子之養志莫非順乎親也子以順感父以慈應家有蠱壞不治之事隨冝整飭次第畢舉而閨門雍肅氣象自如乃幹蠱之善也九三處巽體而過於剛安得無悔然其才足以克家與其嘻嘻失節置父於有過之地孰若三諌號泣納父於無過之域故所悔小而咎不至於大象以終无咎言之迹若非順心未嘗不順也彼排闥引𥚑折檻􅮾輪之臣雖一時若以忤上爲咎而其心欲使國家動無過舉實存乎愛君忠顯而咎泯亦猶是也然則子以剛幹父之蠱而无咎恃父之慈臣以剛幹君之蠱而无咎恃君之明六四𥙿父之蠱往見吝象曰𥙿父之蠱往未得也臣聞德可以勉而進才不可以強而能丗之賢子以起家爲已任如善弈者以一着救一枰之敗非有過人之材不能也六四以柔居艮體之下寛夷静厚有餘而材不足方家事之蠱壊非不思滌蕩振刷而一新之材不逮心詎容強揠故其蠱僅止於𥙿𥙿者寛緩而不迫也事勢搶攘弊端膠轕人情易於躁忿而能鎮動以静制逆以順撫獷戾以柔逶迤容與不求快於一時而磨以歳月終能使亂繩之自解而蠱亦徐飭矣茍不量其材冒爲一决則往必見吝正以力常奪於過髙變毎激於欲速不可以輕進也人臣治君之蠱亦有隨材就功以爲𥙿者子産相鄭修辭令以交於晉楚而外難紓主彊直以盟於駟豐而内難解郷校議之而不怨輿人誦之而不怒鄭頼以寧非𥙿於蠱者乎故孔子美其有君子之道而不稱其材茍材過於子産而道非君子則盆成括之死又孟子所深歎六五幹父之蠱用譽象曰幹父用譽承以德也臣聞愛敬者孝之始顯揚者孝之終人君出而當遺大投艱之責仆者興之紛者理之壊者修之彌縫前人之闕使天下後丗不得以議其過如昭帝繼武帝與民休息已爲難事而况揚父令譽於無窮者乎六五柔中之君得九二剛中之臣爲之輔蠱壊之見於前者一意幹治不遺餘力已往之咎與時俱化方來之善隨日加新而父之譽用是暴白於天下後丗此無他承之以德故也承以材略則必求度外之功承以文法則僅救目前之過惟承之以德則髙明光大之懿緝熈於九重溥博淵泉之澤滲漉於四海天下莫不以手加額賀吾君之有子後丗亦莫不稱其爲天下得人之仁父之譽豈不充塞於天地之間乎文王當商末蠱壞之丗志有未遂武王以聖德繼之而文之聲益廣此爻應之上九不事王侯髙尚其事象曰不事王侯志可則也臣聞功名之士輕冨貴道義之士輕功名丗道蠱壞少有抱負者孰無趍事赴功之心而上九乃不屑事王侯豈其恝然忘天下不與丗同其憂哉費惠公曰吾於子思則師之矣吾於顔般則友之矣王順長息則事我者也繆公亟見於子思子思不恱以位則子君也我臣也何敢與君友也以德則子事我者也上九居無位之地而道足以爲王者師茍其時上無明天子下無賢諸侯詎肯屈道而事之潜心太極之先獨立萬物之表髙尚其所行事外物無一足以動其心志如此其逺也百丗聞風猶將興起豈不可爲丗則哉雖然隱居求志正所以爲行義逹道之本一瓢非所憂則可以繼四代而興禮樂萬鐘非所慕則可以承三聖而正人心丗之興大事建大業决非患得患失者之所能爲窮居不損盛行不加則致君澤民恢乎有餘用矣伊尹三聘而成格天之功孔明三顧而定興漢之計道義重故也是知不以冨貴功名先入其心者乃可與圗天下之事, WYG: 斁乗染奚殫}
