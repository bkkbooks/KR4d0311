  - {type: variant, offset: 860, length: 1, content: 理, WYG: 至情宜人上之深詧伏念某汚邪家世窶藪身名王粲問從誰猝猝行邊之忠顧况悔生汝依依去國之懷泝瞿塘灧澦而西躡龍門石櫃以北趼足萬里囘首五年江上秋風影斷未歸之鴈城頭落日魂飛返哺之烏讀何蕃之傳而躊躇覧孫寳之章而惕息去天雖渺控地有祈但為昏定晨省之謀廼叨朝奏暮召之寵父曰嗟予子行役展轉許時昔我往矣今來思團欒有日舉家懽舞行道榮觀兹盖伏遇某官以躬行作百世之程以性學立三才之極大既和於民則細亦盡於人情四牡之啓處不遑聽其來諗杕杜之憂心孔疚知爾懐歸况家山正在紅雲之旁而菽水難供白雲之外俾趨北闕就養南陔所謂老者安少者懷莫}
  - {type: page-break, offset: 860, content: '', id: KR4d0311_WYG_027-3a, image: WYG1175/WYG1175-0291c.png}
  - {type: variant, offset: 862, length: 0, content: '', WYG: 仁之至義之盡苐閶闔䕶關之有虎蓬萊引掉之常風可恃而前惟繫所主三吐哺三握髪行窺上衮之光壹舉足壹出言永戴洪鈞之施過此以往未知所裁賀廟堂定䇿啓劄恭審以一代元勲定萬世大䇿生靈有主社稷無疆嘗觀歴代之源流因攷置君之本末奉之冕服伊尹在太甲為阿衡逆以干戈召公相康王作顧命凢邦家奕世之慶皆宰輔得人之功秦不足言漢亦未善代王之入以太尉陳平何為曽孫之立以將軍楊敞不}
  - {type: page-break, offset: 862, content: '', id: KR4d0311_WYG_027-3b, image: WYG1175/WYG1175-0291d.png}
