  - {type: variant, offset: 72, length: 197, content: 震動於上坤順於下動必以順故建侯以親衆行師以動衆事雖至重無不利大順則大利在其中也建侯而非順則開國而用小人行師而非順則行險而毒天下果何利之有哉其卦以一陽主五隂亦有比建國師蓄衆之互體象曰豫剛應而志行順以動豫豫順以動故天地如之而况建侯行師乎天地以順動故日月不過而四時不忒聖人以順動則刑罰清而民服豫之時義大矣哉六五以柔居上九四以剛應之剛宻比於柔不期應而自應也人君有柔中之德虚已以任大臣大臣有剛健之德自任以, WYG: 為}
