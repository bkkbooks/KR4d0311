  - {type: variant, offset: 472, length: 385, content: 至静而不露迨出乎地而奮乎天群蟄啓户萬象趍榮孰不同其和豫然聖人合震坤以爲象不曰雷出地上而以奮言深閉乆鬰之餘一旦震發造化妙用軒豁呈露施生訢合動植昭蘇豫莫大於此先王觀豫之象發揚和聲褒崇先德如韶繼勺酌以侈祖考對天之休盛薦之上帝如思文我將推而配之蓋謂治至於豫皆祖考盛德之積非予一人所能致也人君惟不以和豫自居則不至於以逸豫自安矣𥘉六鳴豫凶象曰𥘉六鳴豫志窮凶也臣聞巧言者誤國之具佞人者危丗之本豫五隂皆宗九四一陽四秉大臣之權𥘉以隂柔小人宻相應與極其趍和之意形爲邪謟之辭以求容恱大臣亦恱其愛已而甘受之象以志窮致凶爲言志不自立惟用之於獻佞貢諛其窮可知矣等而上之以此求容恱於君人材阨而不進則曰野無遺賢民生困而不省則曰雨不害稼積薪將然而曰已安已治朋黨方興而曰太平無象其發於聲音謟曲萬態而宦官女子之言朝夕薫浹於耳者又相與爲表裏大厦就頽同於一壓凶孰大焉六二介于石不終日貞吉象曰不終日貞吉以中正也臣聞, WYG: 親闈盖}
