  - {type: variant, offset: 1340, length: 1, content: 順, WYG: 屬厯數在舜而天命歸危疑雖深咳唾已定挈洊雷而出地獨恃寸心扶大明而當天盡出一手此盖列聖鍳其志先正啓其􅇆用能奠九鼎於聲色不動之中於以大一統於觀聽維新之始旂常編紀鐘呂特書泰山喬嶽之俱崇長江大河之無極某委身坱圠拭目休明知宗祏之有依與草木而同慶然事莫難於謀始功尤重於圖終潞公老臣盡日立侍於少主之側魏公舊相一旦巻簾於母后之前有光昔人正在今日某下情不任踴躍慶快之至秘書郎謝廟堂啓虎落賦歸尚憶窮邉之戍龍飛入奏忽叨廣内之除當明兩作離之旦而兼收與謂一為元之制而並下始終大造之力俛仰平生之榮竊以漢九種一百三家録嚴中祕唐四部二十萬巻藏富𢎞文迨熙朝之煟興嚴列舘之鼎峙上搜禹穴下采虞初登其庭者道山日月之最華讀其書者瀛洲風露之亦飽乃若秩羙職清之選莫非見殫聞洽之神如某者識字無竒用心徒苦日斜牛背慣從襏襫之耕月暗馬頭間問兠鍪之役莫府劍山之外麗譙涪水之濵粗了官癡不改書癖伊川絶學已箍匠之不存清獻高風尚蒼龍之可語心折百牢之客路眼穿萬里之親闈苐期西崦之還乃作東華之夢周章拜命勃宰趨朝天近五雲甫候紫宸之對地清群玉忽陪碧閬之遊左思於此而賦三都世南由是而擅五絶歴觀作者深愧斯文兹盖恭遇某官定大計如隆興開皇極如元祐收召久閑之耆艾韓吕朋來登崇未顯之俊良晁張輩出謂今奎壁之府自昔豫章之林國以儲才士焉養望遂下采於兎褐亦俾乘於鹿車某敢不澡雪精神於征塵没没之餘收歛身心於夜氣摇摇之後竹裏汲泉而煮茗花邊挹露以研朱端日將臨首獻三元之頌盛時親見尚賡七德之歌囘胡判院啓曠度高才方快景星之睹雄文大軸忽勤明月之投喜獲一麟盡洗萬馬恭惟某官壘劘屈賈灰撥隂何以湖海一生之豪為京洛諸老之客流涕痛哭見於議論怒罵嬉笑發為文章具眼非無其人壓頭終付之命黄金且盡長鋏猶存自昔聲名當三千而何啻祇今富貴過五十以非遲某脱從烟霞來足風露枕書清樾之底誰與喚醒拾句落花之邉更煩舉似略茲具報幸甚鍳紆臨安諸友招講東山啓慕徂徠之餘風退安西崦引嶽麓之故事延致東巖豈不願一鄉善士之交其如非諸儒名家之選莫當盛意輙誦淺聞盖自兩楹之夢既符一貫之學如綫以仲尼事有若安能無貌似之疑由子思傳孟軻所幸有性善之說迨秦熖之寖冷而漢塗之復開淄川言易濟南言書各擅專門之業賈逵作訓馬融作傳居多著録之徒雖穿鑿之未純亦發明之良苦㑹文有益温故宜師乃若㤗北之仰昌黎衡湘之宗子厚頭童齒豁未免先生欺予哉之嘲耳拂心騷且有吾子見愛爾之嘆顧好為之通患在善誘以疇能惟本朝五星之聚奎而斯文百川之至海自伊洛出有洙泗風氣象巖巖立盡三更之雪精神盎盎坐餘一月之春所謂賢希聖聖希天夫豈書盡言言盡意諸老信有功於後覺群英求無愧於前修腔子裏盡惻隠之心貴加存養科舉外有義理之學不厭討論待自得於源流更孰加於模範藐如逐客老矣陳人久忘東塗西抹之時未定南去北來之地辱拂黄龍之榻俾修白鹿之規端是借聾誠難起甓見大巫而怯敵危坐於虎皮從野翁者遊尚醉眠於牛背略敷梗槩切幾鍳紆再荅招講啓劄某伏承妙語申諭寵延曷月予還歸哉久啓故園之興吾年今已如此難陪勝社之游况蝸涎不足以自濡而螢爝何堪於共照徒慚便腹多費解頥幸諸君之見寛容老子之省事窪尊西市甘寂寞之漫郎石室東山付風流之太傅薦縢口説切幾心孚生日囘啓戊子蒼顔五十三又逢初度化身千百億總是窮愁辱飛雙鳬來顧獨鶴開行厨於竹裏出妙語於梅邉為留西日之隂特轉東風之信掛梢緑鳯夢何到於調羮啄黍黄鷄盟尚尋於煮餅其為心感併得面陳生日回程宰啓己丑以墨梅并詩來牛奮其角閲良月之就盈鴻漸于干驚朔風之欲暮過勤掞藻加賁垂蓬某官學道愛人折節下士問出老先生之門而驚其不偶日奉太夫人之懽而念}
