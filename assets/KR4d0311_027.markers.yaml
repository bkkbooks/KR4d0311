  - {type: variant, offset: 335, length: 136, content: 已人君之建侯行師其能違乎天地以順而動則日月四時無過忒人君以順而動則不待刑罰而民心服在我無所違乎理在人自無所違乎我也時者天運義者天理順而行之豫之時義豈不甚大茍或違道干譽咈民從欲是爲悖矣象曰雷出地奮豫先王以作樂崇德殷薦之上帝以配祖考禮極順樂極和順則和矣樂所以導和也方雷在地中動, WYG: 入奏唐使便}
