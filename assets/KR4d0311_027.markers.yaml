  - {type: variant, offset: 276, length: 1, content: 應, WYG: 予丕贊升平之業某一身虎䑕萬里駏蛩昔凌斗野以從游今介雪山}
  - {type: variant, offset: 278, length: 0, content: '', WYG: 聽令慨斯道之孰主誇吾邦之有人未賭前茅已占破竹讀長安之露布}
  - {type: variant, offset: 279, length: 3, content: 濟志所, WYG: 與懽呼賡涇水之鐃歌尚知興起被新㫖奏事謝廟堂啓瞻太行之雲心方摇於西徼近長安之日夢忽到於東華天道以從}
  - {type: variant, offset: 283, length: 7, content: 爲何往不克然志, WYG: 為仁人紀以錫類為孝綱常立矣聖賢能}
