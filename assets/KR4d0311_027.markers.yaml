  - {type: variant, offset: 1503, length: 337, content: 之累則足以合天下之善斷斷乎知賢之當任知邪之當去不以疑貳之心來䜛賊而啓惎間則百志惟熈矣六五貞疾恒不死象曰六五貞疾乗剛也恒不死中未亡也臣聞疾非特六淫之疾凢足以爲吾心之害吾德之累吾國之憂吾民之戚皆疾也人君處和豫之極而逸豫生嗜慾好樂便嬖側媚之足以蠱方寸者紛至於前於此能一念内固外邪客氣不得以乗虚而干正則德性堅明元氣充實旣壽其身又以壽其民壽其國則億萬年無疆之休皆其功也象以乗剛中未亡爲言蓋六五柔中之君乗乎剛則有格心之大臣而内志不可揺秉乎中則有閑邪之定力而外慾不能入内外交相養此所以貞疾而安恒不死而壽也夫德慧生乎疢疾鴆毒藏於宴安此爻在豫之五當以無逸三宗享國之意參之上六冥豫成有渝无咎象曰冥豫在上何可長也臣聞人孰無靈明虚徹之性有物蔽之則靈者冥和豫之極而肆逸豫此心瞽塞罔有知覺故冥豫以成成非, WYG: 引手加額第}
