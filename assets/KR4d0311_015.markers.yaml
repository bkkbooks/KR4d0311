  - {type: variant, offset: 2662, length: 364, content: 工部尚書時暫兼權吏部尚書兼修玉牒官兼侍讀李鳴復辭免除權刑部尚書日下供職兼職並依舊恩命不允詔朕惟舜命九官垂共工臯陶作士皆終其身不易後世必遞遷熟試以觀通材卿爲棘卿有明清之風則峻緫一臺爲臺端有直亮之操則超躋八座爲起部有簡静之譽則併攝天官知卿深故進卿亟也然經逺猶者貴事功之詳歴圗大任者在望實之積孚兹繇五雉之華趣典鷞鳩之重擢無虚月意蓋有在卿以因人序升而辭過矣其思式敬爾由獄以長我王國所辭冝不允中奉大夫寶文閣待制賜紫金魚袋鍾震辭免除寳章閣直學士知静江府廣西經略安撫恩命不允詔朕待臣下無中外之間以乆不見卿召自姑孰賜對于便朝議論平實可見於行良用嘉獎攝長起曹詔墨猶濕而嘖言已至憮然不得而私也廼睠桂筦爲廣右都㑹有江山之勝無瘴癘之虐峻直西清往顓牧御過家上冡行道謂榮豈若季布徒以一毀譽爲進退哉勉敷徳意使海蜑山獠人人懷其生則予以懌所辭冝不允朝議大夫權尚書, WYG: ''}
