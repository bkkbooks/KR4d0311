  - {type: variant, offset: 2, length: 850, content: 二殿中侍御史王遂辭免除户部侍郎恩命不允詔朕自親政以來臺諌以直聲著者必超軼等級而進之所以勸敢言廣忠益也卿氣壯而材茂識髙而論偉繇分察再遷察非法於殿中暴未殄之惡折方萌之姦蹇蹇匪躬聞于天下朕甚噐其直稽諸故府臺臣以供奉赤墀攝貳版部僅一二見如卿即日爲真亦足昭眷簡之殊旌拔之異矣矧嘗考覈郡國計簿具見本末理財有䟽義利之辨尤嚴今特舉而措之毋多遜所辭冝不允權户部侍郎趙立夫辭免除户部侍郎恩命不允詔小司徒掌建邦之教灋令貢賦抑其細也而後世專以理財爲職卿本固而末茂外寛而内明踐敡所至務以有餘不敢盡之意寓於政事攝貳地卿恂恂如不能言而鈎索原委檢覈滲漏吏無所容其欺心計精矣就俾爲真用懋前業夫天下大計分隷四緫其入于版曹者纔二十七郡生寡而食衆用疾而爲舒故常患不澹鞭筭笏畫之長朕方以陳恕望卿勿辭可也所辭冝不允權刑部侍郎李性傳辭免除禮部侍郎恩命不允詔有虞氏命伯夷作秩宗曰夙夜惟寅直哉惟清寅故直直故清也知此然後可以爲禮樂之官卿務敬以直内之學有淵乎似道之風甘泉之論思露門之勸講責難陳善備罄忠益而不汲汲於進寅直清矣若昔折民惟刑與降典相爲表裏疇庸邦憲之平正序春官之貳選妙望華朕命惟允齊仲孫來省難知魯秉周禮而不敢動晉欲服楚必先大蒐被廬示之禮時方多艱卿其思所以尊吾國者徒鳴其謙非朕所望所辭冝不允權兵部侍郎趙彦悈辭免除兵部侍郎恩命不允詔卿學問造乎精微論議根乎正大垂紳端笏於朝蓋麟之儀儀鳯之師師也引年告歸朕以金華之業未竟擢繇武部之最就進貳卿之真亦可爲勉留矣而猶以歸諗歴觀在廷畨畨黄髪我尚有之而公族之年耆德明孰踰卿者四郊多壘主憂則臣辱同姓之老方與國同其戚休而忍不爲朕修九伐之灋明七德之武遽舎之去乎其彊起就厥位所辭冝不允朝議大夫新除兵部侍郎兼國史院編修官實録院檢討官兼崇政殿說書趙彦悈辭免陞兼同修國史實録院同修撰恩命不允詔經者道之綱也史者事之紀也八書十志而下述作紛紛經學之不明也深於經則必良於史卿學有師傳晚造自得邇英論說析微抉隱多先儒所未發用力於經深矣典謨歴代之軌範春秋百王之繩墨記言動者祖焉卿能以經法爲史法品藻實録方將軼遷董而上之進参纂修尚奚遜所辭冝不允特進, WYG: ''}
