  - {type: variant, offset: 2055, length: 271, content: 之足以重郷國也輟經幄之優進書殿之重髙牙大纛歸鎮鳴珂薦紳父老念疇昔綏靖之勲猶在必動色相告坤維可無憂矣况峻職以尚賢即家而爲守在蜀纔止一人朕於卿可謂盡體貌之冝往哉毋以中外爲間所辭冝不允端明殿學士宣奉大夫李􅐉再上表辭免除資政殿學士知眉州恩命不允詔孔子自衛而反魯孟軻去齊而歸鄒弗逢其時乃諉諸命卿心存於致主朕志切於用賢將以有行未爲不遇曩頻年外服甞著績於制垣今再歳中朝遂眡班於執政雍容勸讀繾綣給扶顧圗任之念未志何引謝之章屢至躋隆名於祕殿建巨屏於故郷歴考前聞罕見近比相如之諭蜀道方來弩矢之迎買臣之守㑹稽何勤印綬之上諒薄言於晝繡尚逺告於辰猶所辭冝不允太中大夫守, WYG: 范}
