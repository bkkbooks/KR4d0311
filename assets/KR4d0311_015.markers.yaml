  - {type: variant, offset: 3201, length: 0, content: '', WYG: 副使張元簡銀合夏藥勑書炎令司衡赫威鑠石廼睠上流之寄具宣外禦之勞爰錫珍良式資寳衛賜鎮江府都統制王虎池州都統制趙邦永鄂州江陵府副都統制樊文彬江州左軍統制權管幹光州武定都綂制司職事王忠銀合夏藥勑書三庚御序萬甲分屯總戎律以良勞犯炎威而不憚宜頒珍劑用示眷懐賜平江府許浦水軍都統制董琳銀合夏藥勑書三庚御序萬甲分屯䕶海道以良勞犯暑威而不憚宜頒珍劑用示眷懐賜帯御噐械兼權管主馬軍行司公事兼知光州孟珙建康府都綂制兼知泗州李虎鄂州江陵府都綂制兼權發遣德安府王旻興元府都統制李顯忠鎮江府副都綂制劉虎襄陽府忠衛軍副都綂制江海權沔州都綂制司職事陳昱權利州都綂制司職事曹友聞權廬州強勇軍都綂制司職事王福利州後軍綂制權行管幹金州都綂制司職事吳桂銀合夏藥勑書三庚御序萬甲行邊總戎律以良勞犯炎威而不憚宜頒珍劑用示眷懷賜龍圖閣學士京西湖北路安撫制置大使兼知襄陽府趙范銀合臘藥勑書卿任隆外閫威聳上㳺犯霜露以靡寧䕶風寒而良苦爰錫衞生之寳用旌敵愾之勞壯爾精神寛予憂顧賜權刑部尚書㳂江制置大}
