  - {type: variant, offset: 3426, length: 1986, content: 除簽書樞宻院事令疾速赴行在奏事恩命不允詔采薇以遣戍視薇之剛柔爲行役乆近之候而岀車勞還枤杜勤歸繼之所以閔歴時之勞也間者歳聿云暮卿憤於封豖長蛇荐食上國烈然以樞臣視師于江上星言夙駕冒犯霜露曽無幾微見顔面亦云壯矣呉楚上下數千里臂指運掉氣勢翕合有岀門同人之應朕寢爲安廼睠莫春閱時且再勞於王事盍遄其歸在師中吉序進一等特以示吉甫之燕喜而舎爵䇿勲猶有待也何行而弭歛戍之後艱何施而杜挻憂之内奰何所處置而使朝廷尊彊生靈之無失所延英入對其孰數于前以圗綏靖引疾而辭非朕所望所辭冝不允謝奕昌辭免特授保寧軍節度使提舉萬壽觀恩命不允詔我孝宗迪關雎之風重葛覃之本言告師氏閒歸謁於祖禰之庭詔馭群臣必進褒於伯仲之列著爲國典用厚人倫卿笙磬和平珩璜縝粹清規雅度具存江左之風嘉則令儀同禀洽陽之氣聮鴈行於朱閤肅鷺序於彤墀祗奉宫闈還展寢廟榮光接子五丗異數萃於一門超陟齋壇緫提真館蓋率先朝之舊匪繇近戚之私冝益務於好脩毋過勤於引避所辭冝不允謝奕禮辭免特授保康軍節度使提舉萬壽觀恩命不允詔朕尊臨函夏夙建長秋化成二南曽無示私外家之意禮成五廟冝有昭德異姓之恩卿性行淑均風神秀徹如圭如璧泝慶派於貂蟬吹壎吹篪播英聲於鵷鷺託在肺附蔚爲羽儀奉翟禕而修寢廟之恭擁旄節以領祠庭之佚寵超二等榮動一時以淳熈戚畹之彛章爲慶元相閥之盛事匪徒馭貴抑以教婣勉循制節之規冝略撝謙之請所辭冝不允魏了翁再辭免依舊端明殿學士除簽書樞宻院事令疾速赴行在奏事恩命不允詔兵難隃度則倍道而疾征事有宻奏則乗傳而趣入王事靡盬所以不皇啓處也國朝儒而知兵莫加於范仲淹慶暦中岀經略西事乆之未獲要領而召爲副樞定廟謨於殿陛之間震天聲於靈夏之表卒揉服之卿腹有萬甲名齊一韓廼者視師之行恊比諸閫拊循三軍有關疆事旣得以直逹朕聽今又以所目擊還歸坐籌折箠笞之好音懷之吾有以待虜矣恢台之交風日未烈其遄驅以尉渇佇所辭冝不允不得再有陳請皇叔祖少傅保寧軍節度使充萬壽觀使嗣秀王師彌生日詔十一月十七日生新陽踰浹恊氣先春生一代之宗英爲兩朝之國老眷隆列棘恩賁垂蓬備牢餼以陳儀荗燕頥而介壽同知樞宻院事鄭性之生日詔小寒届節駿嶽儲神應昌運以生賢斡洪樞而賛治特隆睠遇肇錫餼牽介黄髪之脩齡侈緇衣之篤好永寧郡王楊石生日詔紀鳯標春將臨銘栢傳龜毓瑞先慶垂蓬豐好賜於周官洽燕私於漢戚祗予寵渥介爾耆齡光禄大夫右丞相兼樞宻使鄭清之再辭免授特進左丞相兼樞宻使恩命不允批荅元愷並舉而百揆宅之司空公孤俱立而六典掌之冡宰大厦必棟梁之任巨川惟舟楫之資允繫具瞻曽微虚授以卿韞帝師之學抱王佐之材疇績中台升班首輔蓋欲究致主澤民之業凝調元賛化之功使國勢重於泰山而人心安於磐石倚毗良切考謹非輕盍亟爲奠枕之圗猶堅執循墻之請人不足與適也朕正頼於格心時則勿有間之卿何疑於立政况此艱難之日豈其閑退之時所辭冝不允宣奉大夫知樞宻院事兼參知政事喬行簡再辭免特授金紫光禄大夫右丞相兼樞宻使恩命不允批荅帝賚良弼而輔丕乂天生賢佐而祐中興繄一徳之交孚實千齡之幸㑹卿三朝夀俊四海逹尊充於性則碩大而光明備於身則康寧而夀考如圭如璧之猗重較乆人望之獨隆非龍非彲之遺汝師新國均之對秉蓋天所相維朕之承中外之壞證己形上下之憂心如醉趣展濟時之略毋貽避事之嫌所辭冝不允宣奉大夫知樞宻院事兼参知政事喬行簡再上表辭免特授金紫光禄大夫右丞相兼樞宻使恩命不允仍斷來章批荅朕以治國平天下根本於人主之身深宫暗室左凖右規曷甞一息懈而世道積壞之餘國勢未振物情易揺中夜以思懔乎若朽索之馭六馬榆塞又將秋矣並建輔弼亟圗康濟免櫝洊至得無以𥙷苴罅漏扶植頽敝之難耶列聖紀綱法度具在天下事猶可爲以卿老於謀國勇於致君調元經武特在機括之一轉趣亮天功用荅人望牢辭可巳也所辭冝不允仍斷來章光禄大夫右丞相兼樞宻使鄭清之再上表辭免特授特進左丞相兼樞宻使恩命不允仍斷來章批荅元首明則股肱良股肱喜則元首起相湏甚切相值甚艱卿學足以承三聖之傳識足以定萬丗之䇿適更張之有待嗟大壞之難圗救病於已危以爾爲上醫之盧扁葺廬於旣朽以爾爲巧工之般輸特隆左揆之登昭示右賢之切交孚靡間頻巽奚爲瞑眩而厥疾瘳妙試回生之劑綢繆而彼桑徹熟思禦侮之規毋棄爾成亟祗朕命所辭冝不允仍斷來章金紫光禄大夫參知政事兼同知樞宻院事曽從龍上表再辭免除知樞宻院事兼參知政事恩命不允仍斷來章批荅國朝之治莫盛於嘉祐時則有大臣考覈兵數地理使邊防無闕戍奉行典章故事使百官奉法循理而朝廷尊卿之祖也卿山立川流克丗厥徳兹以參預進本兵之重且丗厥官運籌幄中制勝堂上修攘兩盡庶幾海内復還全盛之風詩不云乎對揚王休作召公考此朕所望於卿者撝辭徒費所辭冝不允仍斷來章端明殿學士太中大夫簽書樞宻院事鄭性之上表再辭免除同知樞宻院事恩命不允仍斷來章批荅有國之患莫大於君臣上下以危爲安而不知懼知懼則可爲矣朕静觀天下之勢惕如渉淵故並建股肱心膂圗濟于艱二三大臣切於體國莫不念戒懼之不可已而卿踧然以外憂内患爲己責天所以訓楚警晉之意其庶矣乎本彊則精神折衝得道則狙詐作使力賛樞機之運毋徒傴俯之恭所辭冝不允仍斷來章端明殿學士正議大夫, WYG: ''}
