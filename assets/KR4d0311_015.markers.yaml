  - {type: variant, offset: 1406, length: 302, content: 進而勸讀則明引君於當道之誼退而撰次則用大事書於䇿之法恢乎有餘地也所辭冝不允户部侍郎王遂辭免同修國史實録院同修撰恩命不允詔文以氣爲主職史事者有直氣則無曲筆卿以學問養集義之氣頃爲御史不爲強禦屈剛且直矣進升言語侍從之聮参舉紀傳編年之法以前日之是非一時者榮辱百丗均是氣也况司馬遷之進姦雄崇埶利班固之否正直輕仁義曽莫能當卿麾訶之餘鋒一代大典乆未就緒非卿其誰宜爲所辭冝不允兵部侍郎趙彦悈辭免侍講恩命不允詔元祐中程頥爲說書以敬涵飬君德范祖禹爲侍講以和開導主意親學士大夫之益如此朕知卿和而能敬始進之以頥今進之以祖禹德性之迪意嚮之正惟吾宗老是凖巽櫝來上謂究心自得而無能悟主朕實愧焉雖然學有緝熈于光明佛時仔肩示我顯德行亦惟卿, WYG: 功}
