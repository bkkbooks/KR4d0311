  - {type: variant, offset: 5939, length: 842, content: 詎止訖天誅於洄曲倚湏戒道勿事循墙所辭冝不允仍斷來章曽從龍第二次辭免樞宻使都督江淮軍馬不允斷章批荅易之師正丈人吉非必以素居冨貴稱也才謀德業衆所尊信畏服則國勢倚之而重卿德業之茂才謀之偉積孚于衆望出分憂寄盡董師干十乗啓行有日矣本兵置使特壯前茅豈以冨貴卿哉矧兩相兼官於中元戎專官於外體貌均壹脉絡貫通修扞于艱以敉寧武圗功蓋在此行虎拜稽首對揚王休毋屢勤遜牘爲也所辭冝不允仍斷來章文武百寮宰臣鄭清之等上表奏請皇帝正月五日天基聖節御紫宸殿上壽不允批荅朕親㩜政枋以來嘉與海内相安於善治而秉德不康寧無以輯天人之和咎證荐形於象緯妖氛旁煽於畺垂致使吾民重罹其害夙夜怵厲心焉如擣其敢晏然盛禮備樂于廷以侈誕彌之慶哉群公百辟盍圗往求朕攸濟顧援承平舊章以請君曰卜爾萬壽無疆固天保歸美之至情而嚴恭寅畏天命自度治民祗懼無逸享國之長在此不在彼也其思將順用副憂勤所請冝不允文武百寮宰臣鄭清之等再上表奏請皇帝正月五日天基聖節御紫宸殿上壽不允批荅誕節之置非古也我朝列聖觀㑹通以合禮必随時而酌損之上天示變則寢同天之祲容萬民失業則蠲天申之縟典蓋以畏天恤民爲心不以位爲樂也朕獲承至尊休德于今一紀露囊獻賀毎仰而不進矧今玩洊雷之象恐懼修省莫敢遑息而可効千秋爲宴樂乎約浮崇簡朕志堅定卿等勿重請也所請冝不允謝奕昌再辤免特授保寜軍節度使提舉萬夀觀恩命不允仍断來章批荅后父據春秋褒紀之義帝舅縁大雅申伯之意而外戚恩澤寖博其來尚矣卿以相門芝蘭之彦中闈棠棣之雋蹈履規矩藹有令譽翟車歸謁首建騂旄雖恩數超出拘攣之表而人不謂過豈特舊章之可循抑官惟其稱非私昵之及也樊氏丗篤隂亦戒侈恂恂苗裔傳龜襲紫朕所以期卿者甚逺毋留成命所辭冝不允仍断來章謝奕禮再辭免特授保康軍節度使提舉萬壽觀恩命不允仍断來章批荅閨門者王道之本后有進賢之志無私謁之心則公道行而倖門塞紀綱立而名噐重雖同氣何有乎濫恩卿傃冨貴而退遜服儒雅而謹勑后實嘉之于邑于謝寢廟旣成禕衣歸省相祀有恪伯仲一日而授兩節度越常科恩義稱也免櫝來上謂隆名盛典不容倖得而謙畏有加漢四姓罔克專美於前矣亟祗若予命所辭冝不允仍断來章, WYG: 詞}
