  - {type: variant, offset: 5419, length: 358, content: 陳卓再上表辭免簽書樞宻院事恩命不允仍斷來章批荅蓋聞宣王中興倚重於孝友之張仲有孝友之臣主於内則戎車四牡始得以成伐功於外卿踐履全君子之和操守得大臣之正朕之張仲也自登宥府物望具孚進不躐等厥任増重夫國勢之安危在所寄邊防䟽闊軍律放紛風寒之慮方深隂雨之備冝急卿雖位樞庭之末可過謙乎所辭冝不允仍斷來章曽從龍再辭免樞宻使不允批荅召虎江漢之命姬旦淮夷之征皆爵上公往衛中國欲威靈之旁暢必名位之加崇卿有武而有文能定而能應處基命宥宻之寄得受任危難之風果爲朕行耶趣進臨於都㑹吾無復憂矣知坐折於遐衝胡尚遜於使端似未孚於予志望之重則可以盡護諸將權之尊則可以獎率三軍矧視周家之禮猶輕其在國朝之典未逺匪隆㧾統曷聳觀瞻抑使表裏聮絡之諸屯皆識上下綱維之深意玁狁孔熾我是用急姑煩籌筆之勞徐方來庭王曰還歸佇錫命珪之寵倚毗良切傴俯奚勤所辭冝不允魏了翁再辭免簽樞, WYG: ''}
