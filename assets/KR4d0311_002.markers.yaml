  - {type: line-break, offset: 25, content: '', id: KR4d0311_SBCK_002-1a05}
  - {type: variant, offset: 28, length: 2, content: 東家, WYG: 可其何以定而應寂然不動感而遂通天下之故感而通天下之故而寂然不動者常自若能如是則見可欲而心不亂然後可與論從正不失之義六二係小子失丈夫象曰係小子弗兼與也臣聞理無兩立心無兩用人無兩從隨以得所從為吉六二以隂從陽初九陽之㣲為小子九五陽之盛為丈夫小子剽輕而無逺慮丈夫靜重而}
  - {type: page-break, offset: 28, content: '', id: KR4d0311_WYG_002-5a, image: WYG1175/WYG1175-0143a.png}
  - {type: variant, offset: 31, length: 4, content: 酒兮緑參, WYG: 深識吾心所係茍屬於在下之小子則必失在上之丈夫所與豈能兼哉大抵中人之性趋下易趋上難小子狎而親便嬖善柔如以石投水丈夫敬而踈直諒多聞如以水投石言焉舍忠而從佞事焉舍是而從非行焉舍正而從邪得於此則失於彼曽不自覺也六二隂柔牽於多愛故設此戒以勸擇善板詩刺厲王失道老夫灌灌然輸其忱欵而不見聽小子則蹻蹻然得志而驕所從可不謹乎六三係丈夫失小子隨有求得利居貞象曰係丈夫志舍下也臣聞同是心也操舍有存亡善利有舜跖一念之發所由分也故人心惟危六二本居中得正係乃在於小子六三本不中不正係乃在於丈夫克念罔念之間狂聖易位此心界限惡可不嚴哉吾之所係既能舍邪而從正舍非而從是則無求不獲人之善皆我之善也而猶以居貞為利不正則雖擇善而從不能固執何益哉然所係得失當觀之立志之初趨向髙明則上從趨向卑汚則下從三欲舍卑汚而進髙明宜不為小子屈也君道亦然志在於下則係孟明而失蹇叔係商鞅而失甘龍係林甫而失九齡係盧把而失陸贄}
