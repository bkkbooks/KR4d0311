  - {type: variant, offset: 9, length: 11, content: 兮葛巾渡柴桑兮水泠泠稚, WYG: 之一身耳司聰目司明以至口鼻體莫不各有所司心則綂之君}
  - {type: variant, offset: 10, length: 1, content: 葛, SBCK: 􅁑}
  - {type: variant, offset: 15, length: 1, content: 兮, SBCK: 􅀆}
  - {type: variant, offset: 21, length: 5, content: 髧兩髦兮從, WYG: 治身之道當先治其心盖此心不難於應事物之常而難於接事物之變境變於前感物而動官失其守遂與俱移能於紛至㳫來之變操之常得其正則吉矣然必出門而交乃能有功出門即出門同人之義交於事物無親暱係吝之私也一私不立與天下為公則既吉而且有功豈非所交不失其正與彼謂不見可欲使心不亂是必死灰槁木}
  - {type: page-break, offset: 21, content: '', id: KR4d0311_WYG_002-4b, image: WYG1175/WYG1175-0142d.png}
