  - {type: variant, offset: 369, length: 1857, content: 熟處難爲别酒到離邊不柰斟漁叟厎知如許事櫂歌穿入暮烟林水宿分席眠鷗渚廬山夢巳通蓬聲踈宻雨燈影往來風我正思吾母兒應說乃翁擁衾天未曉此味與誰同過四望山人逺鷺孤立湖平天四垂柂移舡解語帘舞酒求知望眼傾三笑騷吟寄九思今宵吾計得解鼈薦鴟夷阻風呈趙史君三絶長紅送酒岀江城檣燕喃喃第二程風色似知攀卧意打頭未肯放舡行倚風晴纜着煙莎一抹斜陽白鳥過脫手簿書無半點細飜黄卷課龜羅遲速乗除轉晩飈布㠶快意定明朝廬山試問髙多少欲望西川萬里橋左蠡山爲飛沙白江縁漲潦黄古今雙去鶩天地一輕航雋永還欹枕牢愁忍别觴晴雲横不度何處是柴桑落星寺春秋隕石于宋五分作金焦與星渚大圎鏡裏八䆫開面面魚龍聽人語瀑垂一線吹不動山擁萬騎明可數嗟哉蓄眼無此竒欲倒銀河卷歸去入山箯輿軋幽徑喬松矯踈花好鳥媚嘉䕃圎吭咽清笳膏畦走秧馬茅簷嘶蠒車誰知天下樂盡屬山人家橋横澗水斷寺古林屋斜羅漢寺銘架鎮法皷詩碑記煎茶尊者儼如故天奎失龍蛇劃然小䆫開五蕊撑谽谺斗酒軟兩脚捷歩窮烟霞三峽橋太行擘破黄河出贔屭飜身滄海立老龍抱寶正鼾睡地厎黒風吹霹靂挹之以北斗之柄瀹之以明月之璧啜之以太白東坡兩謫僊尚不負乎此山之泉石萬杉寺散珠亭酌觀音泉蒼杉拱立萬夫長破衲素封千户侯昨夜金僊失瓔珞寒光滿地不曽收瀑布開先寺後青壁雙尖長劒倚博山突兀晴煙紫槐里先生醉欲醒丫山道人定𥘉起摩莎兩眼看飛虹猛悟此身如此水崑崙絶頂有眞瀑倒㵼生肥玉池裏淙淙夜半漱白石十二瓊樓浸清泚是中有味人不知白練銀河較形似青玉峽水繞江南阿李家滿空飛雪響雷車流將采石磯頭去坐看浮梁壓浪花開先乃李中主書院大孤山洶長江其迅流巋傑石乎中峙送兩目兮雙㠶有美人兮千里東西林逺永兩尊宿未了人我心相距纔百武割據東西林淵明游其間買酒時共斟虎溪醉來往同是廬山隂清溜轉幽港斷雲度巍岑等作如是觀爐香對森森天池燈山谷人家避李成誰知刼數莫逃兵到今鬼燐青無數認作文殊佛火明庾樓湓城陶庾共功名廟食樓居孰重輕衮衮長江流不盡淮山青處夕陽明谷簾泉山椒飛派落寒空闘水曽收第一功萬馬鐵衣行夜雪六虬銀甲動秋風分甘晩到玉川子知味早輸桑苧翁手弄潺湲坐盤石蒼凉新月上孤桐楚城靖節祠雨引莓苔上短垣流泉無恙自㳙㳙不如歸去來兮好百丗聞風只杜䳌湯泉水府燃犀處扶桑浴日時能觀雷復地始信坎生離浄垢元無着温凉祗自知驪山殷鑒在莫受阿環緇歸宗墨池龍跳虎躍入昭陵墨汁空留一叚冰散作淋漓元氣濕屋頭老木掛踈藤三疊泉捉月仙人不到處騎鵠凌風髙着歩巃嵸翠壁挿天開天上飛來素濤怒玻瓈琢岀蓮花漏激電吸蜍髙下注布㠶危掛八節灘飽風吹上龍門路冰絲細織無幅綃雪花亂卷有聲絮蔚然而龍鏘然韶大者如珠小者霧解衣盤薄踞虎豹遥送空濛濕巾屨金鋪玉户蔡家姝拍手招人笑相顧麻姑老矣不解事指點五雲推使去白鶴觀缺唇丹井應千尺秃頂靈杉恰百圍鶴去不聞人下子黄蜂無數採花歸楞伽山房二絶八萬猊床方丈室九千書卷半邊䆫儋翁句子無人問流水泠泠度石矼風標勁似聶政姊筆力健如曹大家此手始能爲此竹對渠枯木老槎牙水行岸曲頻移柂巾欹獨倚檣月分雲外影風進水邊凉宿鳥樹三匝佳人天一方清斯纓可濯誰爲賦滄浪洪園洗心堂飲中偶成官事何時了抽身朱墨叢未霜烏桕赤得日紫嶶紅山勢西南缺湖光左右通引將絲竹郤洗耳聽松風荅仲肅梅廵簷索笑爲踈花便未開花亦自佳帶月折歸香在手閙觀塞破路三丫鄱江樓晩望暮雨纔收未炙燈蒼鷖掠破岸隂澄湏臾認得舡頭竹始信漁人掛起􅊻有感一蝗東方來孕子九十九未岀婪酣肚巳辦饞口漫天自成幕掃地不用帚一朝霜風寒何處弄百醜取凉二絶六月冷官還解熱解衣盤礴坐蒼苔微風只在松梢頂着意招呼不下來平湖水則减三分尚欠紅蕖一叚雲萬斛波光自吞吐月明亦足張吾軍敞雲樓二絶江天雲作黒山頽上到樓頭手決開水墨枕屏三百里斜陽屬玉一雙來草樹成行整復斜江頭白處定蘆花夜深更着無邊月好箇樓居處士家正月三日同莫幹祝法遊東西園探得行春第一籌南梢花事半將休斷雲不礙逺山碧新月自隨江水流金谷主人眞已矣玉堂老子尚來不丁寧留取蒲城酒更約東風汗漫遊擬古送莊郎中歸朝二首西北有髙樓長眺起我思我思非今人古人莫見之孟軻尊仁義妾婦秦與儀孔明抱禮樂鬼蜮操及丕已物孰重輕徇道不徇時冨貴一餉樂名節百丗師居今而行古豈無若人斯遡洄從之游洧盤濯雙緌渉江採芙蓉露華不盈筐雜之蘭爲佩申之蕙爲纕持此孰與贈美人天一方駟虬乗蒼鷖御風朝虚皇䄂中治安書琅琅奏明光探囊岀刀圭爲民起膏肓臨流不可渡與丗爲津梁玉池浸雞舌薫作青史香林同年𬒳檄來體訪民租寓僧舎有詩因次韻二絶河水清兮有縣特東方作矣未解𥜗寄聲卿自用卿法我獨舉酒留詩臞我雖不飽尚二簋人則何辜無一𥜗官儂早下减租筆天下可肥身寧臞送陳倅泊然無營如子雲撓之不濁如黄憲清静勿擾如曹參躬行不言如石建古人與稽今人居外若不足中有餘治中别駕寄途耳用則, WYG: ''}
