  - {type: variant, offset: 5664, length: 2080, content: 㑹潼關不從魏延請公才幾倍亮謀略濟忠鯁機㑹有可乗臨事勿吹冷秦隴咳唾定歸衮顓國秉頌磨浯水濵銘勒燕然頂諸生筆如椽湏公一笑肯送新婺州汪緫領歸歙天驕運去如隤堤横決燕涿流青齊斬竿掲旗扣並塞𬒳髮左祍稱遺黎膾肝山前走肉語碓骨寨裏飢魂啼盡籠虎兕淮南北期獵狐兎山東西常人喜功首例肯智士察變眉先低危言不顧犯衆忌設難直欲開羣迷近嗟唐禍兆回紇逺述晉亂基羗氐積薪未然不着手曲突巳驗空噬臍賊㠶方落射湖去胡騎巳闖滁山嘶正湏籌幄坐月觀却卷郡紱㝷黟谿帶泥燒筍薦晨餉踏雨剪韭供春韲心安便是上池藥眼浄何用黄金箆蜀公早嘗着野服君實晚始持桓圭方來事業推不去還踏曉皷聽朝雞窮邊殺氣貫矛㦸嚴城酸風吹鼔鼙化雲相隨不可得矯望玉宇横蒼鷖送崔少蓬南歸五首美官誰不愛所貴以道得道足以得之有厎去尤力祥麟快掣鎻玄鶴不受弋此意關重輕當有識者識欽永早患失光禹晚志得飄風一鴻毛何能益人國己重物乃輕此理要深識方寸浩然氣天地吾其塞冨貴紛探驪功名競騎虎眉端萬國愁公意良獨苦五年安邊功絶口不自語仙㠶去蓬萊急浪一砥柱岀江梅未花過嶺青着枝解裝書滿床自課應門兒獨樂非不好民瘼將疇醫詔來不俟駕丗事猶可爲楊州傾城出作逺事追送諸生更依依瘦馬踏朝凍冥鴻去何許水落霜宇空鬢短心緒長危檣曵清夢平山放脚氛埃表搔頭廣莫間淮分三代水江護六朝山落日蒼烟起秋風白鳥還歐韓呼不起髀滿鬢毛斑勸農呈丘帥劭耕好語落西疇父老逢迎笑點頭銷甲事農官有術賣薪沽酒我何憂黄金深椀頻傾倒白布長衫迭獻酬颯颯雨華隨後乗安排麥隴十分秋南樓健目畧江臯淅蔌風沙響鬢毛草色不隨壕岸斷柳梢恰與女墻髙碧幢紅斾三邊帥羽扇綸巾一丗豪坐上捷書來獵獵官軍破賊戰方鏖挽孫謙伯二首文妙生花筆名成映雪書處家貧似冨應物宻如踈薦墨交黄綬榮光照板輿出門車折軸天理竟何如日月無多子郷邦失兩賢直爲吾黨慟不作丗情憐握手春風醉論心夜雨眠耳言猶歴歴何忍表君阡次繆仲右韻二首心緒千絲結年華一鳥過可人元自少知已不湏多咄咄君休恠嗚嗚我亦歌將軍渾健在醉尉莫誰何䆫暖楊花撲庭空燕子過年侵歡易減春惱病冝多攪涕論兵事扶頭讀凱歌日來能飲未正好醉亡何用胡衛道贈姚居士韻牢落淮南賦小山霜風容易老人顔楊瀾左蠡天垂碧夢與盟鷗共往還孫推内子挽詩玉立金閨客家人亦許清共聽秋塞柝細剔夜䆫檠娣𬒮從渠好兒𥜗得我平西風吹落葉不盡夕陽明李致逺母夫人挽詩二首有子何蕃似懸知母訓賢市賖留客酒隣貸買書錢苦過蓮心後甜囬蔗境邊一朝風木憾誰與問蒼天日與夫人子相隨若弟兄羡渠猶有母使我欲無生未病思求藥方餐念遺羮此情今巳矣淚雨待同傾送商緫郎三首鶴唳風聲淝水捷馬騰士飽蔡州平笑談定取中興䇿莫道司存只餉兵霜遲斷隴蕎花白水足平田稻子紅剰把豐年供祖帳送將玉節過江東百㝷浮玉三更月萬里長江一色秋照映此心湏此水不妨小泊讀書舟挽伯父二首白髮兒隨母蒼顔弟對兄四休元易足一笑更何營論事絲弦直存心鏡面平德人今已矣誰與嗣郷評憶作行邊别相期到鶴州秋風驚過眼落日懶回頭華屋空遺憾佳城足逺謀無從扶柩哭揮淚寄江流次張亞夫喜雨亞夫從張林自青州到楚汴都黍離迷宫堧金鋪獸面秋風寒百年大義冷於鐵西湖走馬狨絲鞍亡秦定必三户楚况今南北皆王土紫髯青鬢祖豫州威如迅霆惠如雨山東井落回生意收召驚魂髙枕睡中有虓將來青州馬蹄欲踏狼胥碎邦人聚觀閧塞塗和氣釀雪蘇焦枯銀城萬里軋坤軸燭龍一色煇天衢殷殷好語傳田間雪晴又雨直幾錢翠麰漲天士宿飽踴躍一皷空兩甄中原宿愁無地愬歡呼從此歸王度更煩老筆爲草檄讀之㑹使頭風愈挽李漕二首翰墨多推轂功名早着鞭風行青草外春到白鹽邊老去心猶壯歸來意正便如何天不愸烟雨閟新阡百折溪山裏佳哉有此翁名方隨政起命已坐文窮滿眼棠隂在回頭橘隱空詩髯無復磔萬象自春風次洪漕韻二首塞垣擁雪髑髏寒多少將軍博美官莫恨知心今丗鮮湏知行道古來難時窮地狹何能舞命好天髙亦可鑚此理乗除應㑹得梅邊索酒笑相看和月梅花共一寒兠牟未必盡麄官醉來抱膝吟梁父睡起搔頭著說難冨貴冰山何用倚功名盤石自湏鑚朔風衰草腥狐兎獵火歸鞭夾市看寄趙景周撫幹二首罨畫春樹碧逢迎繫行舟酒盡可以起更作湏臾留我方鶴投籠君已鷹脫韝相期在歳晏贈之珊瑚鉤楊柳青巳絮芍藥紅方葩詩隨去㠶東春風屬誰家音踈日月駚目短天宇賖小德最憐渠丹頰三髻丫贈洪子需二首莫恃青春兩頰紅年來我巳鬢如蓬盤洲野處源流在早挹文名尉若翁樓倚晴空月滿湖一塵飛不到庭除虞𥘉九百渾髙閣且讀人間本分書口占秋風巳颯梧猶碧宿雨纔収稗亦花天着工夫供醉眼東鄰有酒不堪賖贈相者猨臂老不侯鳶肩騰上速婁羅千丈長不博一寸福送丘都承藝祖立鰲極腹心趙書記披圗指幽燕翰死誰可繼異時拾空城中國坐自弊伊吾紛抵掌湏作根本計仁皇柔北夷冨公效表餌終身耻言功力辭樞宻使況今百年間未洗新亭淚平凉急㝷盟正恐廢大義中朝兩說分各植漢趙幟詔書趣公歸渇欲斷羣議矯矯鸞鳯姿鼎鼎廊廟噐持心水鏡平料事蓍蔡智天道方好還上䇿先自治折衷和戰間守乃萬全利西關碎其有東壘掇所棄證狀朝暮殊守亦豈易事醫國得和扁神聖工巧備囊中黄昏湯着手湏早試外禦幾邊將中權一閫制當思擇時髦不在變局勢時欲分道置制閫忠賢乃命脉公道實元氣精神以此彊可郤十萬騎淮南畏汲黯奉天倚陸䞇中興在公手一語澤百丗太山重名節鴻毛等冨貴不惟天下望是亦文定志紫樞摩斗極青藜照中祕江風駕檣烏天闊秋雨霽諸生笑牽衣狂語出半醉勿作醉語看嚼蠟或有味, WYG: ''}
