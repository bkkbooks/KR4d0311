  - {type: variant, offset: 2, length: 5, content: 廬山五猗猗, WYG: 念動於中隨所感而說隨之得所從則有大亨之理然動說成體易於轉移惟利乎貞則可以保其終之无咎况人君宅民物之上一言而萬里響應一動而群黎風偃致亨之大有不難者特懼乎所從不得其正耳從乎天理正也而從人欲從乎人心正也而從已私賢人君子之從正也而從佞人忠言嘉謨之從正也而從讒說儒生學士之從正也而從宦官女子從非其正咎能免乎穆姜謂有四德隨而无咎似識此意其以隨元亨利貞同乾德之備非彖意也彖曰隨剛來而下柔動而說隨大亨正无咎而天下隨時隨時之義大矣哉臣聞易以上下无常剛柔相易成卦乾上九之剛來於坤二隂之下為震而上卦則兑動於内而說於外也盖隨自否來方否之時三陽位於上三隂位於下天地不交而萬物不通何隨之有隨之為卦上下接而隂陽交故其動也臣言可從則說而從乎臣民欲可從則說而從乎民剛下於柔不惟已之狥也惟不狥乎已之私是以否之塞轉而為隨之通大亨且正終保其无咎而與天下相安於時措之宜羲農黄帝堯舜氏十三卦之制作與夫子丑寅之建忠質文之尚析因夷隩作訛成易之序莫非與時而偕行上無戾乎天運下無咈乎人心其義至大而不可窮皆剛來下柔轉否為隨之功也茍徒恃一已之剛而不明下柔之義勢尊則亢氣盛則驕君子之言日踈小民之情日戾猶不免於無民無輔又安保隨之不為否乎象曰澤中有雷隨君子以嚮晦入宴息臣聞静極而動動極而静造化自然之理也雷動於春夏今潛伏於澤之中兑為澤正秋之時也雷収聲於正秋亦維當静之時隨時而安於静且以養夫動也雷不養動於静無以出地而奮豫君子不養動於静無以體天而行徤龍蛇之蟄以存身豈徒蟄哉故朝以聽政晝以訪問夜以安身莫非惟時之隨使不安其身於夜神過役則易竭朝聽晝訪烏能無憊是以嚮晦必入處於内而宴息息盖作之機生之本也夜氣存于至静之中湛然其清淵然其明渾然與太極同體嚮晦所養}
