  - {type: variant, offset: 8, length: 0, content: '', WYG: 此凡旦晝所以泛應酬酢各中乎理而用之不窮者皆此其出也彼沈湎於長夜宴安於袵席安知瞬息存養之義初九官有渝貞吉出門交有功象曰官有渝從正吉也出門交有功不失也臣聞隨以剛來下柔成卦重在初九初隨之始也所隨邪正是非當嚴之於始夫耳目之官不思而蔽於物心之官則思}
  - {type: page-break, offset: 8, content: '', id: KR4d0311_WYG_002-4a, image: WYG1175/WYG1175-0142c.png}
