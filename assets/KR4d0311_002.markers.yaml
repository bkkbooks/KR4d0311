  - {type: variant, offset: 156, length: 212, content: 友兮邀白雲而同宿風露澹兮我琴舞玄鶴兮龍吟與太古兮同音尚靈脩兮知心猗若人兮黄犢春風蕩兮瑶草緑犢護草兮行復止隔林呼兮老觳􅑌眠犢背兮閑閑仰看青天兮飛鳥還恍夢游兮何所箕山頴水兮匪巢伊許猗若人兮深衣萬鐘不爲㤗兮一簞而遯肥溪之清兮不受淄月離離兮風披披芙蓉兮渉採欲淡兮心夷駕言兮何之羲文兮與歸解纜春落平蕪外舟行白雨邊鳩譍山爾汝櫓畫水之玄官冷誰能吏身閑便是僊康廬眞箇去信有夙生縁晚晴子規聲裏半晴隂百丈牽行岸草深挾雨倒回風有力避山横轉水無心人, WYG: 間則功自道出昭然大明}
