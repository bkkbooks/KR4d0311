  - {type: variant, offset: 4771, length: 892, content: 閑兩窮覿面塵埃裏一笑論情醉夢間爲說斯文有宗主春風楊柳滿平山壽崔帥卿七絶嶺右山川間岀賢開元宰相最居先中間不數余安道恰到于今五百年連蜷雌霓墮晴空光照書樓卷𥿄紅天爲斯文開瑞應海南海北一宗工塞下人家盎盎春又推餘澤及流民慶州小范青州冨合作先生社稷身弄兵澒洞射陽秋一𥿄招呼殺氣收十萬蒼生驚魄定活人隂德過賔州夕烽旁午徹甘泉獨有淮東一臂全若使盡從持重計廟謨厎用更憂邊紛紛傳檄方言戰猝猝囊金又說和誰信規摹湏早定計然半䇿不湏多垂弧節過便春風入侍猩𫀆一點紅殿上獸樽誰得飲漢廷諸老定輸公續洗兵馬上李制置太白過午芒角獰蚩尤亘天鉤尾赬淮東千里正齁寢夜半洶湧傳邊聲王師北渡衂泗口胡馬南牧揺青平擁城敗將死蝸縮護堡羸卒飛猱驚詩書元帥戒夙駕往試百萬胷中兵幾人險語挽衣斷甚至涕泗交縱横李晟爲國不虚出裴度與賊難俱生兩軍相持以氣勝督戰火急開行營長江漲緑馮夷舞擊楫東來親一鼓威靈閃閃動牛斗精采軒軒起貔虎金牌銀牌膽爲冷千户萬户色如土尺兵寸鏃不待施巳覺目中無此虜四旬頡頏闘困獸一夕倉皇竄飢䑕不聞令狐戞刁斗但見龜山撑窣堵麥畦黄裏栗留風秧甽青邊勃姑雨老農想見太平年買酒煮茶相勞苦黄旗紫蓋祥光開宫柳飛絮公歸來平淮勒碑字如斗鐃歌奏曲聲如雷奉觴再拜白壽母兒輩破賊邊州回歡然一笑春滿面婆娑起舞斑衣萊還觀先正紹興日立朝清節髙崔嵬獨於和議植赤幟坐令火德然寒灰家傳此意石不轉事業自許圗雲臺從今着手快經理一洗河洛無纎埃君不見武侯用西蜀誅賞大明人自服又不見叔子鎮襄陽恩信一孚江漢皆金湯送興元聶帥泛觀天地間一氣如爨鼎半鼎沸正急半豈獨爾静從旁更益薪旣往漫不省疇當起沃之轆轤轉脩綆長空墮旄頭胡命懸漏頃不戢方自焚餘熖燎吾境俶從淮漢擾馴至襃斜警勢欲合南北事湏得要領和固不可爲戰亦未易逞中興關人謀而可倚天幸君侯冨經綸頗牧在禁省憂國如憂家申旦抱耿耿䄂中平戎䇿直欲繫其頸王斧下青冥上游建巨屏秋髙馬正肥慨慷泝巴郢鏠旗凛太一福星映參井蜀從更化來舊痛甫甦醒風寒不善護遂與勞復等内勢旣􅏓盭外兵且贅癭但嗟車轔轔未見旗整整胷中百萬兵氣壓貔虎猛凉飈送先聲鬼蜮巳匿影自昔樹勲業莫先拔翹頴共功非衆材殆類無麵餅孔明駐漢中欲翦漢賊梗委心任費禕屈膝拜許靖笑談扼姦雄老死不得至今出師表日月光烱烱惜, WYG: ''}
