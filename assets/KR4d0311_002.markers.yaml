  - {type: variant, offset: 50, length: 2, content: 醒漭, WYG: 嘗有獲心詭遇一朝而獲十則有心於獲者也人臣之患莫大乎有心於獲獲心一萌則髙者狥名卑者逐利一念外騖曽莫知返功與道始判而為二臯䕫稷契伊傅周召道行而功自存乎其中管晏求功於道之外而功亦冺矣九四以陽剛之材居近君之位動於中而說於外其心所隨惟在於獲急淺功近利之計昧至正大公之趣貞固守此宜其凶也是必順天命本人心以輔治而行其所}
