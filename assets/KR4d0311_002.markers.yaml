  - {type: variant, offset: 3581, length: 1148, content: 古鼎金景歊浮雲斡棄不知愛瓦豆薦苾芬提携向中庭拂拭蒼蘚紋雖非大籀篆彷彿猶八分㩥㩥兒女手申旦軋機杼織成遍地錦翠鳳濕花露三年卷篋中背立泣不遇持歸付刀尺晝線金針度江頭客子舡盡日卧沙尾維楫非不具潮弱未能跬秋風雪浪髙長年絶呌起舡行莫倚柁難得此汛水梧桐生髙岡上有朝陽枝鳯從南方來覽煇而下之一鳴寒暑平再鳴風雨時秋秋百鳥羣振翼長追隨送潜同年敷調官歸以君一年長爲我異姓兄衡從玄圃玉岀入武庫兵急手搏蒼兕雋氣鞭長鯨議論到千古慷慨吐不平漢以𥘉元衰唐以天寳傾附勢妾媚嫵避事兒嚘嚶頽靡寖成俗忠良竟吞聲自謂倚南山不知壞長城君子勇於義小人罔而生儻不餓采薇逺可死結纓每聞壯其語亦嘗用吾情有餘不必盡尺渾勝丈清六經源岷嶓百家派渭涇歸求性内學莫計身外名春風兩鬢緑秋月雙眼明通德擁髙髻勤勤剔寒檠嚴陵道上雜詠七首江上送行潮汛小舡頭回首夕陽多人生有幾柳如此客思不禁花柰何半江雲濕欲成雨兩岸水渾𥘉退潮短短竹籬花朶壓深深麥塢雉媒嬌玄英范老聞風起俱爲羊裘一釣絲堂扁三賢非本意何如只號子陵祠石壇千尺薜蘿古沙徑百盤苔蘚香不是先生求矯丗懶將日月趂人忙闖巢摶黍待晨餉投岸舂鉏㝷暮棲揔是心爲形所役搔頭獨立渡橋西髙髙下下客行路整整斜斜人住家端的今年蠶較晩石榴花下響繅車細草護沙連不斷踈風畧雨散還收山田麥熟不歸去三百里江都是愁爲清隱打化僧說偈雲山幸不求吾是魚鳥依然笑我頑自欲入城持鉢去扣門可煞老僧閑丁東泉渇烏滴盡三更雨鐵鳯敲寒六月風湯餅困來茶未熟爲師揺夢作丁東昭君行紅嫣翠濕平陽里轣轆遊車汛流水蒼頭擁騎知謂誰草草人家寄生子君王神武重邊功不愛穠華勝桃李青鸞扶下五雲車顛倒衣裳冠薦履賞功未了說和親又墮蛾眉芳夢裏平章三十六宫春遣似天驕買驩喜朔風吹雪胡馬嘶獵歸月淡龍城西重旃穹窿壓斗帳泛盎快攪金留犂細調弦索爲郎皷手未推郤眉先低林深人静孤啄木春盡樹暗雙黄鸝大居次吹梅花老小居次舞楊花迷屠牙勃窣起爲壽一粲相對酣如泥子卿海上亦良苦牧羝未乳兒先乳信道天涯共此情誰謂姬姜必齊魯妾身不爲漢婕妤下嫁猶獲當單于從來蕃漢等昆弟得婿渠不如家奴君不見冡象廬山誰比數青塚名傳千萬古春日山行二首一晴一雨柳添碧半落半開梅着酸不𬒳東風相鼔弄春山只有老蒼官兩點眼光牛背上一􅌪春色落花邊丗縁不到山深處只恐深山起丗縁挽中書俞侍郎二首噐重千鈞鼎胷涵萬斛舟文章歐六一政事冨青州偃月知誰在靈光獨我留貂蟬雖未着不作汗青羞銓省承新渥詞垣訪舊隂頽波回萬折斷岸立千㝷秪謂人猶已那思昔異今時清猶憤死天地是知心贈希聲居士汗漫騎鯨去西風髮半簮安心元是藥得趣不妨琴人静蛩鳴夜天寒月出林爲君重洗耳别酒不湏斟江頭寄致逺二首箕斗光移析木津踏霜扶醉不驚塵夜寒應是梅花覺半歛愁容婉待春客䆫翻遍竹爐香樓外更聲作許長解事燈花相報似擁爐兒女說荒唐寄崔帥卿歸鴻隻影宿汀洲夢繞蘆花不柰愁頴谷杯羮無日遺翳桑槖飯有時酬功名曠丗來斯受議論驚人合則留此事大關, WYG: ''}
