  - {type: variant, offset: 6914, length: 554, content: 材爾氣岸瑰瑋風采英發曩守齊安能不撓于彊衡陽又以節用愛人著推之坐鎮三峽鞏護十連不惟刀耕火種之民懷生而樂業平沙八陣歴歴魚復折衝應變之略盡在目中矣往哉母憚叱馭可游九功除祕閣修撰知慶元府兼㳂海制置制勑具官某四明宻拱呉㑹遥控瀚海制閫重寄間以法從臨之苟當其材何嫌超授爾涵負之深踐敡之乆要衝鉅鎮隨所至以最聞矧導承宻旨熟聞德意而以中祕論譔莅吾股肱郡辦治易爾雖然維大家有禮字細民有恩讋魚鹽姦宄之出没有威靡舛厥施時乃良牧其祗若予訓可張元簡除湖南路轉運判官兼知鄂州制勑具官某季子歸魯㢘頗用趙民望素孚則舞轡於熟路易爲功爾氣壯而材豐識髙而論偉曩守邊壘奮不顧身以衛其民重湖以北莫不想聞其風采兹駕漕軺往填鄂渚號令未施列城已信其能福我矣轉輸澄按之餘扶羸飫飢蒐惰繕圯使隱然長城之足恃斯増重於夙望可何元壽除太府寺丞緫領湖廣軍馬錢糧制勑具官某紹興分建四緫今垂百年時有不同得其人則轉難而爲易爾肅括而將以敏暢逹而守以静試郡並塞不求快意之功厥慮蓋深起守武昌以漕輓攝軍賦切切於民之瘵國之疚厥慮益深事惟知其難則易者將至此朕所以就卑餉節而華之丞郎也信能以仁爲本以智爲制斡盈虚權取予俾挈畚用𥙿而民不病則予以懌可林半千除江東路提點刑獄公事制勑具官某慶暦𥘉謀國者欲漸易監司使澄汰所部吏以興太平朕采是說於親政之始所易多矣而一節以庾再節以漕三節以憲獨爾之升若梯級然豈非, WYG: 才毋謂序}
