  - {type: variant, offset: 5235, length: 1, content: 周, WYG: 必巻舒之有裕斯出入之俱榮具官某早以孝稱晩繇㢘進歴耳目之寄每侃侃以自將升喉舌之官尤循循而維謹久厭禁嚴之直欲尋閑退之盟莫挽而留宜華其去赤刀琬琰峻秘職於西清皁蓋朱幡鞏名城於北固亟上中興之最慰予耆艾之思可太常寺丞兼權右司曽天麟除將作少監勅具官某永惟技巧工匠之鮮及不如宫室苑囿之無増故膳監不以飭工而以程才爾䟽通而艾寛靜而栗材出鄧林信良矣容臺省闥趣陞於少匠厚其儲以致用也爾知噐用利則用力少而就效衆斯識朕心可王瀹轉承議郎制勅具官某朕觀新店民之語知和糴之厲民尚矣爾守滁日糴辦而民不擾數逾三萬應我賞格増秩旌賢尚鞭其後可歸順人沙兀惹特補修武郎添差蔡州兵鈐兼權蔡州事詔勅具官某襄漢奮伐淮蔡底平莫府以戎㨗來上謂爾能知逆順之分赤心歸誼願效忠力蔡人即吾人也爰畀右階就命爾守復民業以趨耕作士氣以待戰保障鞏固斯稱委寄可房應發轉文林郎制勅具官某六騩復土五使置官凡備驅馳悉霑賞賚爾祗吏役例進一階茂對恩榮尚思䇿厲可劉顯以艾評戰歿補承信郎制勅具官某蜀關禦㓂虓將死勇爾父從之鏖戰繼歿羽林孤兒漢恩特厚録爾一官用勸徇國可石天瑞白華補秉義郎制勅具官某等方城濯征垂瓠震潰執訊獲醜餘燼為空爾能自歸貸而官使尚圖忠効用答生全可李駿起復直龍圖閣四川都大茶馬制勅具官某秦蜀𣙜牧之政分合凡幾然非其人分任而不足得其人合治而有餘爾沉毅足以經逺果逹足以治劇所居底績晩譽更偉坤維事力日匱茗法壊而後馬政壊頃甞分任未見其益也茲庸合以命爾且寓直淵圖以重其}
