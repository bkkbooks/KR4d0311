  - {type: variant, offset: 6177, length: 735, content: 者以材仕者以志爾學有誠身之功心無交物之累泊乎其遇而不留也頃繇著廷參我宰掾理明見定優於叢劇顧欲趨簡以養天龢何志尚之逺耶升班少匠靖共自守宗磐峙秀往爲我淑艾之冝有餘𥙿可江西安撫使陳韡除工部侍郎制勑朕永懷阜陵妙選法從越在内服必有獻可替否之益越在外服必有折衝厭難之勞兹率循於燕謀庸謹簡於英望具官某懿文而莊栗洵武而沉雄髙山深林卓爾濟時之略秋霜烈日皜乎徇國之心自蠢動於江閩寖蔓延於嶺海民無寧處國有隱憂屢勤繡斧之行未息耰鉏之警龔遂尉安渤海令一布而巳孚景弇窮追尤來威四馳而隨定䇿勲獨茂締眷逾深歌出車以勞還趣韓奕而入覲班參五正宻扈豹尾屬車之塵朝進一賢坐掃旄頭罕畢之祲究爾論思之韞副予柬注之懷可馮邦佐除直祕閣主管潼川路安撫司公事知瀘州制勑具官某瀘南控扼六詔爲重鎮頃連以法從宅乃牧民夷按堵繼之厥選雖艱爾文有英氣政有卓識蜀士之位表著者亟稱之擢自偏州往殿帥閫且榮以中祕之直朕於用材可謂超越拘攣之表矣維昔武侯將有事于中原必深入不毛先定南方欲無後顧之慮也懋展夙韞稱此隆委可黎伯登除直寶章閣潼川路提點刑獄公事兼提舉制勑具官某民無逺近悉恃部使者爲司命御史爲朕言東蜀司臬之非材謹擇而亟易之爾静實充於内亮逹著於外立朝未幾翩然引去累更名郡櫛垢濯痍聲稱藉甚出少府之節巳晚故寓直寶奎以賁之周爰咨詢則民情通不畏強禦則吏治聳惟察惟法其審克之則獄訟平蜀雖萬里夫何逺之有可項寅孫除直祕閣權成都府路轉運判官制勑具官某魚鳬𧖟叢之國邈在參井皇華命使自江漢差擇而上之庶忘登天之爲難爾以果逹之姿彊乂之志給餉上流旣厎厥績就易飛輓之節駕言西征其氣蓋巳狎瞿唐灔澦而旁礴峩雪之表矣吏以不失平爲良民以不取􅑿爲冨邊徼以不求功爲安知此於將指乎何有可童頥除直祕閣權發遣䕫州兼主管本路安撫司公事制勑具官某䕫子之國楚蜀衿吭時平急於拊綏有遽於控扼牧民御衆必, WYG: ''}
