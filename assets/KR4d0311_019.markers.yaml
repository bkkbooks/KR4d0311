  - {type: variant, offset: 157, length: 2715, content: 難爾審機於應物迎刃於制事咸以材屬駕軺漕粤易轍殿閩人冝其官何嫌改令夫鎮危疑之情活彫瘵之俗固守職也揠苗常患於助長種木亦忌於太恩行所無事而不求赫赫其吏治之良乎可戸部侍郎京湖制置使史嵩之除權兵部尚書制勑朕仰稽韓奕江漢之詩俯考皇武方城之雅嗟古風之寖邈睠王事之良勞擢繇外閫之崇列在中臺之峻有華從槖冝錫賛書具官某挺秀相門出竒將略審刺虎之勢必滅虜以爲期乗投鼠之機雖㑹戎而不憚震威聲於垂瓠禠營魄於穹廬珍竒之灰旣空冒頓之鏑遂絶圗八陵而效捷固知天道之還告九廟以歸功亦頼人謀之賛肆嘉乃志式獎爾庸躋文昌八座之聮攝司馬五兵之柄維時眷遇允謂遭逢豈不懷歸而畏簡書旣舉勞還之典乃使帥屬而平邦國尚修獻愷之儀可大理少卿趙與芮除寶文閣待制提舉佑神觀仍奉朝請制勑龜鈕藻衣甫奏平反之最翠緌玉佩趣躋次對之聮匪親愛之私恩實榮懷之彛典具官某暉承霄極秀挹天潢性行忠和踐丞郎而養望材猷通敏歴卿監以蜚聲朕觀葛藟之綿綿嘉棠棣之韡韡乆恬於進冝峻其遷延閣陞華儼荷囊而待問真庭均逸樂戯綵以承顔益隆信厚之風茂對熾昌之嘏可辛克承除直顯謨閣主管紹興府千秋鴻禧觀制勑具官某蒹葭蒼蒼白露爲霜丗道不競人材老於摧折者何可勝數爾以練逹之材精宻之識屢更事任具著勞効意所不合翩然駕飛鴻而獨徃不計揺落之幾秋也朕厲精求治亟起耆哲而用之則以病諗豈遂忘斯丗乎寳奎寓直館養恬尚識予遡洄之意可張洽除直祕閣主管建康府崇禧觀制勑具官某蒹葭蒼蒼白露爲霜丗道不競人材老於摧折者何可勝數爾以簡澹之姿明逺之識嘗於撫字關决見其材意所不合翩然駕飛鴻而獨往不計揺落之幾秋也朕厲精求治亟起耆哲而用之則以病諗豈遂忘斯丗乎祕廷寓直間館養恬尚識予遡洄之意可宗正少卿張嗣古除祕閣修撰樞宻院副都承旨制勑具官某朕長馭中原樞掾皆得以與聞廟筭矧導宣宻命日與柱下史並直文拗爲最近爾識照未然之機材擅有用之噐曩記言于朝國勢虜情論建甚悉恨不果用也白首重來識益定材益老其以中祕論譔參承宥宻制勝之略保大之謀凢可以賛吾樞紐者母懲母忽可大宗正丞兼兵部郎官謝奕禮除將作少監制勑具官某右賢左戚國之令典戚且賢襃進可後乎爾端良而敏英潤而澤芝煇玉映有文靖故家之風度冝不爲流水游龍而移攝幾亟貳繕監非朕之私戚而賢也其靖共爾位以鼎來之福可太府寺丞陳韔除大宗正丞制勑具官某綿綿瓜瓞本支百丗必屬近行尊者訓齊之而丞以庶姓春秋公族大夫之意也爾頴然處囊之錐恢然發硎之刃而退然不自襮涵負蓋逺庀屬外府藉甚有聲董治大宗勉賛而長朕之進用爾者此其階可副都承旨張嗣古除右文殿修撰權知建康府江東安撫制勑具官某秣陵槃槃一都㑹進可以控中原朕方規復輿圗思得魁壘俊偉之彦付以留籥爾起自乆間入對便殿敷陳攻守大要具有顛末擢承宻旨出揔陪京䘏民以厚根本厲兵以壯形勢鞏護天塹應接汴洛地以人重母謂事權之非昔也祕殿論譔姑華爾行有功見知顯拔未艾可張元簡除太府寺丞制勑具官某士君子知用舎有命行藏有義則身可屈氣不可折爾軒岸而閎偉任重噐也荆門城築之役平板榦程土物其成不愆于素如楚艾獵民方便安之遽掣其肘而去身雖屈其氣全矣起之家食丞于外府朕蓋以是爲事任之儲可曽天麟除浙東提舉常平茶鹽公事制勑具官某朕親政以來諸道部使者選必精察必謹欲光華之被原隰也爾名家之彦周行之翹頴知朕德意志慮蓋熟左浙庾臺往將使指維昔先朝有䟽曹娥斗門洩鑑湖入江而田不病民至今德之非爾祖也耶逺乃猷𥙿乃以民寧母徒曰山海之藏足以利吾國可僉書樞宻院事鄭性之贈三代故曽祖可大贈太子少保制勑朕儀圗近弼招選譽髦自竒童而升如天聖之晏殊由倫魁而進如端拱之蒙正蔚扶輿之鍾粹侈演迆之儲祥榮燭九原寵延三世具官某故曽祖具官某隱居求志積善在身無言不酬著在郷評之望非禮勿動形爲家法之傳軸雖折於壯齡榦實培於慶裔予倚西府邇臣之重爾登東宫亞保之崇祗服禭章茂綏廟祀可故曽祖妣陳氏贈咸寧郡夫人制勑豫章生於鄧林璆琳出於元圃積深蓄厚則發之逺推髙原大則報之隆具官某故曽祖妣某氏婺矛牙居而肅於齊家約處而豐於教子惠來師友燕及孫曽覩警悟之姿則愛鍾于心聞弦誦之聲則喜動於色成兹國噐翊我政樞雖八柱明堂不及生前之見而六瑚清廟竟爲身後之光肇開湯沐之封増賁烝嘗之祀尚其不昧歆此殊榮可故祖獎贈太子少傅制勑叔虞之唐必興畢萬之魏必大何天道之應若劵劑以取償蓋人事之修猶耒耨而望穫欲驗孫謀之逺盍觀祖澤之休具官某故祖某頴悟秉姿淹該進學文從字順勇追賈馬之風墨妙筆精雅得鍾王之法方賢哉之騰譽胡逝者之興嗟不在其身克昌厥後繄我弼諧之助皆而講習之傳宫傅參華起英魂於旣往泉扄増燿垂景祐於方來可故祖妣陳氏贈齊安郡夫人制勑上推乎八丗者康成之先下占乎五丗者有嬀之後矧王母誨言之未泯而聞孫承弼之方新肆加告第之恩庸表起家之慶具官某故祖妣某氏坦直無隱静間有儀奉事婺矛牙姑動不違於四德扶携㓜子守益厲於三從斷機之教旣嚴含飴之愛更切受兹介福發爾幽光文軒象服之華愍典蜜章之寵懿魂如在尚克饗之可故父汝永贈太子少師制勑爲人君止於仁而仁莫宏於錫類爲人子止於孝而孝莫盛於揚名朕博求開物成務之材唯濟修政攘夷之治隆樞廷之眷倚侈禰廟之褒崇具官某故父具官某蹈道有常秉德無競周旋郷黨寛洪長者之風盤礴丘園正㓗幽人之操念義方之爲訓豈科舉之徒文凢一時師友之功必千古聖賢之藴晁董公孫之對固有源流益稷皐陶之謨正資羽翼佩一經而追往撫三釡以興悲欲慰孝思可稽禭典超進宫師之亞増光家學之傳式勸教忠母忘垂𥙿可故母碩人黄氏贈冝春郡夫人制勑衮衣而感蓼莪不如戯綵之爲榮鼎食而悲凱風不如負米之爲樂矧乃三遷之訓成予四輔之賢冝沛恩榮用紓孝慕具官某故母某氏夙姿警慧素履静柔佩帨奉姑修婉容而特謹傾奩教子掲懿範以尤嚴迄培隆棟之材克賛改弦之化流徽無斁鍾慶有源幾年馬鬛之封一旦魚軒之錫德無不報魂尚知歆可故妻碩人潘氏贈清河郡夫人制勑碩人其頎必稱厥德君子偕老誰無此心同甘苦於隱約之秋異幽明於顯融之日有懷契闊曷尉欷歔具官某故妻某氏生自名門儷于魁彦淑均接下佩纕荃芷之芳雝肅奉先錡釡藻蘋之㓗推舉按齊眉之意致趨機斷織之規生資助以居多殁追榮而冝厚委佗象服首正小君之封積累鵲巢益綿奕丗之慶可直華文閣知江陵府楊恢除知襄陽府京西安撫副使時暫兼京湖制置司公事制勑具官某荆襄自昔衿喉之地吾國之上游也師以進爲功故襄陽視荆南爲尤重爾雋偉而有志莊静而有謀頃上邊最擢帥于荆事任蓋重矣王師方向河洛俾爾擁旄進屯于襄任又加重望隆中而懷葛亮眺峴首而慕羊祜臨江漢而思召虎積榖練甲控扼險要使前茅無後顧之憂首尾有相應之勢而吾之取中原可以萬全時乃功可尤爚除直祕閣權知江陵府兼主管湖北路安撫司公事制勑具官某荆州用武之國東連呉㑹西通巴蜀而北控京洛經理中原之秋宅乃牧尤難其人爾渉深而養之固蓄厚而發之閎太阿龍泉之出匣斷蛟剸犀忽若篲泛豈安陸專城足以展其材寓直中祕全護荆楚觀三國必争之形勢考羊陸守禦之規摹熊臥虎視精神折衝上流之顧寛則朕可安意而圗中原矣往懋厥功用副推擇可知吉州劉煒叔職事修舉特轉奉直大夫制勑具官某漢, WYG: ''}
