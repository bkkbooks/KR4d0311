  - {type: indent, offset: 222, content: 　, id: KR4d0311_krp_029-bkkind7}
  - {type: variant, offset: 232, length: 0, content: '', WYG: 學問議論文章之士莫盛於熙豐元紹間其生也類在於神宗朝如詩家曰蘇黄曰黄陳蘇公生於景祐陳公生於皇祐而豫章生於慶歴天地清寧日月正明禀於氣者全也公得清寧正明之全氣氣全而神王挾豐隆騎倒景飄飄乎與造物者遊放為篇章超軼絶塵獨立萬物之表坡翁盖心服之而後山師焉其集嘗擬莊子分内外篇外集如韓淮隂驅市人背水而戰暗與兵法合内集如諸葛武侯八陣竒正相生鬼神莫窺其奥彚分之意嚴矣君子之學日進而日新日新而日化進則人新則道化則天逝者如斯不舎晝夜正以是也文與詩亦然論詩者不泝其始無以知其進而新不極其終無以知其新而化内集斷自入舘以後極其終矣外集起初年溪上吟泝其始也眉山任處士驥天成擺落科舉之累真積於學者無不覽愛公詩若嗜慾然}
  - {type: page-break, offset: 232, content: '', id: KR4d0311_WYG_029-5b, image: WYG1175/WYG1175-0303d.png}
  - {type: page-break, offset: 232, content: '', id: KR4d0311_WYG_029-6a, image: WYG1175/WYG1175-0304a.png}
  - {type: substitution, offset: 233, original: 内, replacement: 內, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:366e8ec95655b72d3205b878dc416602f82ff8a6b5dd240168f5ee5a7c65a61e', entry: vf-4477}}
  - {type: variant, offset: 234, length: 33, content: 侍所獻投之汴水使左右諸大夫國人皆知志不在小而在大與光武手不執珠玉同, WYG: 集有任子淵注因註外集十二巻攷年譜以推出處用事必求其}
