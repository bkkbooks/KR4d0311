  - {type: variant, offset: 1560, length: 1245, content: 拔十城上以不能成功深悔之歎曰魏證若在不使我有是行也臣聞孟子曰入則無法家拂士出則無敵國外患者國常亡蓋自堯舜不作人主孰能無舉動之過所頼以拂正其非而反諸是惟左右前後之臣爾而便佞者逢之輕黠者長之具位者拱視而不暇問畏事者竊歎而不敢言幸而敢言亦惟一言以塞責而終歸於首鼠人主過舉於是莫之能救使當舉動少差之𥘉力盡面折廷諍之誼引𥚑不從繼以折檻自非諱過愎諌之主安能不矍然悟幡然改惟其若宫之竒懦而不能強諌故雖諌無益也先主復關羽之耻而興忿兵太宗討髙麗之罪而興貪兵非無黄權禇遂良等之諌而所諌不力無救於行法魏二臣猶在必將激烈懇到極其骨鯁不從不止也夷陵鴨緑之悔當時諸臣安得辭其責哉雖然亮知惜孝直而考其推擇之素特蔣琬費禕之純良向寵之淑均何望其復有孝直之方勁太宗知惜魏證而田舎翁之怒見於生前仆碑停昏之恨形於身後敢言之氣沮䘮殆盡末節欲望廷臣如證之剴切難矣是則人君平時能養法家拂士之氣臨事乃獲法家拂士之力上方欲用文武求之如弗及始以蒲輪迎枚生見主父偃而歎息群士慕嚮異人並出卜式抜於芻牧洪羊擢於賈孺衛青奮於奴僕日磾出於降虜斯亦曩時版築飯牛之朋巳漢之得人於兹爲盛儒雅則公孫洪董仲舒兒寛篤行則石建石慶質直則汲黯卜式推賢則韓安國鄭當時定令則趙禹張湯文章則司馬遷相如滑稽則東方朔枚臯應對則嚴助朱買臣歴數則唐都洛下閎協律則李延年運籌則桑洪羊奉使則張騫蘇武將率則衛青霍去病受遺則霍光金日磾其餘不可勝紀是以興造功業制度遺文後丗莫及順帝知能任使故士得用情天下喁喁仰其風采遂廼備元纁玉帛以聘南陽樊英天子降寢殿設壇席尚書奉引延問失得急登賢之舉虚降已之禮於是處士鄙生忘其拘儒拂巾祍褐以企旌車之招矣至廼英能承風俊乂咸事若李固周舉之淵謨洪深左雄黄瓊之政事正固亘焉楊厚以儒學進崔爰馬融以文章顯呉祐蘇章种暠欒巴牧民之良幹龐參虞詡將帥之宏規王龔張皓虚心以推士張綱杜喬直道以紏違郎顗隂陽詳宻張衡機術特妙東京之士於兹盛焉向使廟堂納其髙謀疆埸宣其智力帷幄容其謇辭舉措禀其成式則武宣之軌豈其逺而臣聞求賢而不用吉士與不求同知人而不善任使與不知同人主有志於治孰不知非賢罔乂而急於求賢者有行可除可公養之仕亦莫不起而應其求海濵之大老至洛陽之年少至東山之髙卧者至周南之滯留者至明庭立鵠華階振鷺非不極一時之盛而知不盡所抱用不盡所知如醫者聚參苓术桂玉札丹砂於一槖品雖至珍用與病違雖聚無益也武帝蒲輪之招一下而異人並出順帝元纁之聘一馳而俊乂咸事好賢急士之意前後無間然武帝有儒雅篤行質直推賢定令文章滑稽應對歴數協律運籌奉使將率受遺所聚凢二十七人而漢以之盛順帝有淵謨政事儒學文章牧民將帥推士紏違隂陽機術所聚凢二十人而漢以之衰蓋武帝於人才之長短小大洞察底藴隨所用而各當順帝第知來之而髙謀不見納謇辭不見容智力不得宣賢雖滿朝廷足以美觀聽而巳諸葛亮嘗言親賢人逺小人先漢所以興隆親小人逺賢士後漢所以傾頽一親一逺之間盛衰判矣易之損益皆以十朋之龜弗克違明衆賢之助在損之六五虚中自損以從在下之賢則爲元吉在益之六二賢者欲致益於君而君之樂受其益未可盡必也則惟常守正固以待之至王用之以享于帝然後吉有志於治者其可以徒聚, WYG: 犯}
