  - {type: variant, offset: 3776, length: 671, content: 則畏心忘而敬心泯天理之存者幾何武王惕懼而銘諸物不曰視邇所代則曰溺不可救不曰其禍將大則曰社稷爲危何其辭之嚴也天眞難保人慾易流岀入起居之際龜鑒在目庶幾常若危亡禍亂之壓其前而起臨深履薄之懼無一念之非敬也然以武王之聖豈待睹銘而知懼哉尭舜性之也湯武身之也身之則寜過於檢防求進乎性之之域也其或収歛於十手十目之地而縱肆於暗室屋漏之中修飾於親儒生學士之時而玩狎於對宦官女子之頃雖有此銘如無此銘矣故中庸大學皆貴乎君子謹其獨宣公十有五年秋𥘉稅畒𥘉者何始也稅畒者何履畒而稅也𥘉稅畒何以書譏何譏爾譏始履畒而稅也臣謂立法以取民莫患乎其作俑也夫君與民夲一家國用之而取諸民民出其所有以供乎上猶子奉父孰不敬應然自昔什一之法公田藉民力而耕収其歳入民田之私則未嘗有稅魯剏法履畒以稅之國用不足蓋有甚不獲已者聖人於此乃書𥘉以示譏豈非𥘉之所剏疑若特一時之暫而後之㳂襲必假是以行其無藝之歛如螽之生喙其害未有厎止二吾不足而用田賦此其俑也武帝紀書𥘉筭商車𥘉筭緍錢𥘉榷酒酤頗識此意梁冀在位二十餘年窮極滿盛収冀財貨縣官斥賣合三十餘萬萬以充王府用减天下租稅之半散其苑囿以業窮民臣聞財用之在天下如血脉行乎一身可通而不可壅王者藏冨於民霸者蔵冨於國其下冨不在國又不在民而在於聚歛臣之家蓋自正道不行而人心壞人心壞而吏治壞舎義趍利假公售私朘民自封一孔不貸柄國者又爲生姦受盗之府而天下之冨偏聚焉此冀所以積至三十餘萬萬而未屬饜也夫財本吾國之有而取以助國財皆吾民之出而還以予民其理順其政公故収冀家以充王府而减租稅天下以爲快後丗莫以爲非不謂威帝能行之也太祖問李承進曰莊宗以英武定中原享國不乆何也承進曰莊宗務姑息將士, WYG: ''}
