  - {type: variant, offset: 7175, length: 441, content: 至廣陵吴徐盛爲疑城自石頭至江乗一日而成又大浮舟艦于江時江水盛長帝臨望歎曰魏雖有武騎千群無所用之未可圗也帝舟遇暴風漂蕩幾至覆没乃旋師臣聞江流湯湯萬古一天險也而飛渡者有之曹操之至赤壁曹丕之至廣陵佛狸之至瓜歩逆亮之至采石皆望洋奪氣或且送死豈長江隨時而爲險夷耶天險在勢人險在德與政君無闕德天人交助夫誰敢犯之其次朝無闕政紀綱立賞罰明號令信任賢使能各當其材則人謀咸賛國勢増彊坐有以制勝矣丕之再飲江窺吴輙自廢而返非特川后之効其靈孫權爲國靡政不舉謀臣勇將咸樂爲用疑城相望巨艦相銜而丕膽落天限南北冝其不敢以一衣帶水易視之也是知天險待人險而固德政増修勝勢在我東南有太山之安矣周丗宗撃北漢主劉崇於髙平之南樊愛能何徽引騎兵先遁帝欲誅愛能等以肅軍政猶豫未决張永德曰愛能等望敵先奔死未塞責且陛下方欲削平四海茍軍法不立雖有熊羆之士百萬之衆安得而用之帝擲枕於地大呼稱善即収愛能徽及所部軍使以上七十餘人悉斬之自是驕將惰卒始知所懼不行姑息之政矣臣聞軍國之綱紀莫大於賞罰有賞而無罰則惠褻而威不振白刃在前誰肯委命此軍法所以, WYG: 秋}
