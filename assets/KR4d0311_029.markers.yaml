  - {type: variant, offset: 550, length: 794, content: 道則天下狙詐咸作敵御之爲言以馬喻也詭銜泛駕之馬跅弛而難制使王良造父御之則鳴和鸞逐水曲進退伸縮無不如意否則駻不受覊矣謝安之用三亘人徒知其經逺無競而不知駕御之術黙寓乎其間蓋石䖍趫捷絶倫旣奪之上流而石民與伊非所患兼是時荆江豫三州軍事皆在安都督之下而兵權實操於内此首重則彼尾輕也苟朝廷無以操其權而制其命王彪之所謂兵權萃於一門非深根固蔕之冝安烏得不爲之深慮哉知此則知八柄馭臣雖王者有所不敢忽髙帝詔曰欲省賦甚今獻未有程吏或多賦以爲獻而諸侯王尤多民疾之令諸侯王通侯常以十月朝獻及郡各以其口數率人歳六十三錢以給獻費武帝置𥘉郡十七且以其故俗治毋賦稅南陽漢中以往各以其地比給𥘉郡而𥘉郡時時殺吏漢發南方吏卒往誅之費皆仰給大農以均輸調鹽鐵助賦故能贍之然兵所過縣爲以訾給毋乏而巳不敢言擅賦法矣臣聞人君有愛民之實意而後有及民之實惠漢丗詔書出於人主之筆精神心術之微悉於詔見之觀髙帝欲省賦甚之語簡嚴明白繼之文帝振貸减租之詔勤勤懇懇其愛民實意皆可以對越天地安有不𬒳其澤者漢賦有三口賦以食天子筭賦以治庫兵車馬更賦以給戍邊此詔所欲省當是斯時又有獻賦郡國假獻爲名重賦以爲民害故亟欲省之方楚漢之争未決則𥘉爲筭賦及天下旣定則欲省獻賦以此見傷財害民無如兵費之重兵費百出而欲行愛民之政蓋難然愛民之意不可以兵而間斷也武帝元狩之詔謂君者心也民猶支體支體傷則心􅉃怛非無愛民之意而好大喜功移之臣嘗考司馬遷平凖書其論帝取財贍兵本末凢十餘節一節害深於一節曰江淮之間蕭然矣曰廢格沮誹窮治之獄用矣曰三人言利析秋毫矣曰吏道益雜而多賈人矣曰稍稍置均輸通貨物矣曰無慮皆鑄金錢矣曰公卿大夫多謟䛕取容矣曰楊可告緍令縱矣曰縣官有鹽鐵緍錢之故用益饒矣曰株送徒入財得𥙷郎郎選衰矣而終至於曰不敢言擅賦法矣而極髙帝欲爲民省賦帝乃聽吏擅取非經常之賦夫豈不知有民哉置郡方新顒顒待哺恐廢前功惟求趣辦雖欲禁吏之不擅賦不可得也益口賦三十輪臺悔之猶幸此意不絶如綫而仁義之澤未至於遽斬此, WYG: ''}
