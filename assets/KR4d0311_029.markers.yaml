  - {type: variant, offset: 9, length: 9, content: 故事髙宗皇帝建炎元, WYG: 宋洪咨䕫撰序楚泮榮登義約序禮賔周制續食漢法士未嘗為舂糧之謀科舉設而待士之意衰薦名春官至有貧不能行者亦有屡上而索其家者逺方皆病之番江去武林餘千里歲當大比相與裒金俟同盟薦送之多寡均以給費嗟乎牀頭金盡壯士失色囊無一錢羞澁萬態彼盖未知道者吾儒讀書萬巻可敵猗頓之富何至預以行槖不充為憂是舉以義為勸亦惟相期於功名之會而已然義利相去不能以寸而趨舎有舜跖之分平時燈窻議論務以道義相磨礲至利害廹之小則賣友大則賣國視所學為芻狗者多矣諸君聯翩青雲致身富貴其毋忘虀鹽時後車十乗從者數百其毋忘聚糧時一貴一賤升沉不齊其毋忘同盟時能守是約斯可謂義皆曰能遂輟萬錢為之倡嘉定三}
