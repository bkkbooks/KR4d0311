  - {type: variant, offset: 269, length: 0, content: '', WYG: 字必探其原勤且博至矣或以詩嘗經公手刪而疑其多愛然使學者盡見前輩少年至老之作以觀日新日化之功雖多不厭也子逢博習有家法方注詩時兩髦耽耽檢書捧硯領退而學詩之意今以名卿守蜀白首矣懼父書無傳力自校讐鋟而公諸世萬里信來俾序之某晚出未闖其藩何敢贅疣攻瑰謂宋宗儒摘阮歌戴道士彈琴書不知何以分内外當有}
  - {type: page-break, offset: 269, content: '', id: KR4d0311_WYG_029-6b, image: WYG1175/WYG1175-0304b.png}
  - {type: variant, offset: 270, length: 2, content: 収拾, WYG: 辨之者余聞李衛公好惠山泉置驛取水有僧言長安昊天觀井水與惠山泉通雜他水十餘缶試之僧指其二曰此惠山泉也文饒為罷水驛欲知内外之辨者請以是觀之桂巖雙蓮圖序西風入簷涼滿巾席紫水何君器之以嘉蓮圖來示云大兒自任舎桂巖沼中所産前是庭砌嘗長異篁今復有此鄉之耆耋雋艾相與夸咏以為瑞懼弗克當也子以為何如余撫圖太息曰深哉造物之意也鳲鳩在桑其子七兮淑}
