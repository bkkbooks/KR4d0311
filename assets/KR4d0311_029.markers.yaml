  - {type: variant, offset: 7739, length: 360, content: 災變皆徹樂恐陛下以同天節虜使當上壽故未斷其請臣以爲此盛德事正當以示夷狄乞并罷上壽從之即日而雨弼又上䟽願益畏天戒逺姦佞近忠良神宗親書荅詔曰義忠言親理正文直苟非意在愛君志在王室何以臻此敢不置之枕席銘諸肺腑終老是戒更願公不替今日之志則天災不難弭太平可立俟也臣聞詩曰文王陟降在帝左右又曰陟降厥士日監在兹上天之心與君接人君之心與天通一陟一降隨寓隨在𥘉無毫髮之間五事有敬怠則庶證有休咎其應如響之應聲我神祖以乆旱輟同天節上壽之禮亢陽即日而雨陛下以雷變寢天基節上壽之禮積隂即日而霽夫豈人力所能致哉此心即天心天心即此心也冨弼於旣雨之後奏益畏天戒逺姦佞近忠良蓋姦佞之逺忠良之近即以畏天戒天意在於進君子退小人人君欽承此意而行之則寅畏之實也荅詔欲弼不替今日之志君臣交相儆戒冝有以祈天永命也歟臣故亦願陛下與二三大臣不以天意已回爲喜常以天命難諶爲懼, WYG: 會乎}
