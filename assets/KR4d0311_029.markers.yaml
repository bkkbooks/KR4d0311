  - {type: variant, offset: 117, length: 8, content: 重則有所輕愛易流, WYG: 到詎可尋尺計哉予方習矣弗察乃以告吾子它山}
  - {type: variant, offset: 126, length: 43, content: 隂者視尺璧如瓦礫寶難得之賢者視逺物如糞壤徑寸之珠不易齊之四臣連城之璧不奪趙之一士審輕重, WYG: 石可以為錯朋友講切}
