  - {type: variant, offset: 76, length: 9, content: 息盗耳臣聞人主一念, WYG: 制夫動也而静之功非可以驟進朝省夕察日磨月鍊用力於惟危之地如馭悍馬如防潰隄如治百萬之師使志足以帥氣而氣不為非義餒在我者立在物者靡慾心平而躁心釋静之功進矣静進則内體純固而清明廣大生焉清明則天地萬物之理皆會於吾誠廣大則方寸之運天地萬物皆為吾用而道在是矣易六十四卦乾坤之外其本體以道言者惟復與艮復}
