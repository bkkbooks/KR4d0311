  - {type: line-break, offset: 2960, content: '', id: KR4d0311_SBCK_029-8b09}
  - {type: variant, offset: 2960, length: 742, content: 安平之大體治危亡之壊證以守文之常度制應變之危機故近丗論者謂此何等時而舉不急之務訟觀作矣胡不築將壇以拜淮隂太學興矣胡不立武舉以招汾陽親雩之禮行矣胡不屈帝尊而勞細柳博士之貟置矣胡不造樓舡而命將軍諌皷謗木設矣胡不修車馬備噐械以圗修攘之治是非數端爲可略也典午綴斿胡羯扛鼎中原豪傑競起而逐鹿時之所急不在是也使當時内以經制國用爲實政而不以綀衣爲僅足之規外以嚴飭兵備爲實功而不以玉冊爲茍安之地晉其興乎厥今金甌雖無玷缺之虞玉關未有閉拒之䇿戰難於必勝守難於必固和難於必信而民力國計已俱至於窮不汲汲於豐財強兵先其所當急而論義理者多清談言政事者多細務拆裳𥙷帶以爲巧折柳樊圃以爲固厝火積薪以爲安脫有意外之警臣恐非雍容拱揖之所能辦也席前左端之銘曰安樂必敬前右端之銘曰無行可悔後左端之銘曰一反一側亦不可以忘後右端之銘曰所監不逺視邇所代机之銘曰皇皇惟敬口生㖃口戕口鑑之銘曰見爾前慮爾後盥盤之銘曰與其溺於人也寧溺於淵溺於淵猶可游也溺於人不可救也楹之銘曰毋曰胡殘其禍將然毋曰胡害其禍將大毋曰胡傷其禍將長杖之銘曰惡乎危於忿㚄惡乎失道於嗜慾惡乎相忘於冨貴帶之銘曰火滅修容謹戒必恭恭則壽屨履之銘曰謹之勞勞則冨觴豆之銘曰食自杖食自杖戒之憍憍則逃户之銘曰夫名難得而易失無懃弗志而曰我知之乎無懃弗及而曰我杖之乎擾阻以泥之若風將至必先揺揺雖有聖人不能爲謀也牗之銘曰隨天時地之財敬祀皇天敬以先時劒之銘曰帶之以爲服動必行德行德則興倍德則壞弓之銘曰屈伸之義廢興之行無忘自過矛之銘曰造矛造矛少間弗忍終身之羞予一人所聞以戒後丗子孫衣之銘曰桑𧖟苦女工難得新捐故後必寒鏡之銘曰以鏡自照見形容以人自照者見吉凶觴之銘曰樂極則悲沈湎致非社稷爲危机之銘曰安無忘危存無忘亡孰惟二者必後無凶杖之銘曰輔人無茍扶人無容此武王聞丹書於師尚父爲銘以自警也維昔帝王之治, WYG: 齊威覇}
