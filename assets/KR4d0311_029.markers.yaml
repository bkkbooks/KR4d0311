  - {type: variant, offset: 10, length: 2, content: 冬十, WYG: 正}
  - {type: variant, offset: 13, length: 2, content: 内侍, WYG: 望日錢唐洪某序送何龔父序夏至後三日龔父歸閬訪予以别飲之酒且告之曰君子之學進於静為難静者誠之復性之貞也聖人定之以中正仁義而主静學聖人者必以静養夫中正仁義之所}
