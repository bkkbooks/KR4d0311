  - {type: variant, offset: 5838, length: 621, content: 攻一心是特知制外而未知養内安有内心不治而外邪可閑者哉孝宗皇帝宣諭宰臣十年來欲令宰執進呈退將得旨文字再具熟狀進入朕再行審閱批出然後施行旣免專擅之嫌且無遷令之患易曰渙汗其大號書曰令出惟行勿惟反反汗非也號令當反而不反是又遂非也然未當而反不若謹之於樞機未發之先一發而民信之孝祖所以欲再行審閱使無遷令之患也茍熟狀之進隨入隨可而思慮不加焉其與不再進何異惟能存主一之敬毎事収歛精神熟觀詳繹而後出尚奚舛令之有孝宗皇帝臨朝毎以方寸𥿄作掌記微偃兩旁而中摺之寘在御手若内殿則留香案上三省宻院奏事畢即視所記一一宣諭已乃収之人主日緫萬幾之繁而心思有限安能無所遺忘孝祖聦明睿智與神爲謀猶識所欲宣諭之事於掌記可謂文理宻察矣故凢禁嚴清燕之地經史之所閱典故之所聞群臣章奏之所采有當與大臣參酌可否日隨記於其上俟坐論從容歴舉而訪之大臣所知悉心以對所未及知則討論以進乆而天下事無一不明習而洞曉其益豈不多哉明道中執政除親舊二人爲正言司諌上謂曰祖宗法臺諌官湏出宸選若大臣自除則大臣過失無敢言者治平二年以范純仁爲殿中侍御史吕大防爲監察御史裏行近制御史有闕則命翰林學士御史中丞迭舉二人而上自擇取一人爲之至是闕兩貟舉者未上内出純仁大防姓名而命之臣聞臺諌天子耳目之官耳以司吾之聦目以司吾之明而人執之可乎張行成無先容舉爲殿中侍御史柳公權有諍臣風屈爲諌議大夫萬乗親擢邇臣莫與夫如是則任耳目之寄者激昻振厲思稱主知周而無所比正而無所阿朝政之得失廟論之是非相業之修廢不吐不茹悉以上聞不至於懷私恩徇偏見以亂, WYG: ''}
