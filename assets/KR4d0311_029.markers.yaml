  - {type: variant, offset: 5122, length: 702, content: 而忘其親生凉殿閣而忘其民心移於物惟欲是縱賢君所當戒也熈寧三年知舉吕公著在貢院中宻奏言天子臨軒䇿士而用詩賦非舉賢求治之意乞出自宸衷以諮訪治道至是上御集英殿進士𥘉就席有司猶給禮部韻及試題出乃䇿問也旣而賜葉祖洽巳下及第時韓維吕惠卿𥘉考䇿阿時者多在髙等訐直者多在下等自郷舉里選之法壞而取士惟虚文是尚漢䇿賢良雖未免以利禄入其心科别或有未竟猶不失言揚之意唐進士得人爲盛特絺章繪句之習工如日五色何益丗用國朝䇿士𥘉襲唐人詞章之舊至此始以䇿諮訪治道與漢制科等其意美矣然草茅言事豈能皆若素宦于朝而効忠獻直悉出於愛君憂國之眞情言之當固不以人廢言之過亦貴於能容人君能容過直之言市駿骨揖怒蛙感發作興之下孰不以安危治忽之實來告茍有司喜阿逢而惡訐直以行上下其手之私如吕惠卿輩美意一失奚以臨軒發䇿爲哉維我仁宗之䇿蘇轍其言宫中事過於直上曰以直言求人而以直棄之天下謂我何可謂有大舜之大矣是時考官則司馬光范鎮蔡襄唐太宗謂蕭瑀曰朕少好弓矢得良弓十數自謂無以加近以示弓工乃曰皆非良材朕問其故工曰木心不直則脉理皆邪弓雖勁而發矢不直朕始寤向者辨之未精也虞人有原獸之箴輪人有糟粕之議工執藝事以諌不聞於丗乆矣而唐之弓工獨得古意其言蓋以規太宗功業雖盛而治心之道實未嘗講也夫心者萬理之㑹萬事之主此心明白洞逹無一毫迂曲之累則見面盎背皆天理之形著發號出令盡人心之契合敬義直方所以相爲表裏也太宗天姿髙而學問不足其得在於好名其失亦在於好名好名故能矯揉爲善惟名之好而觀省存養之不加故矯揉之力怠而禀受之偏者不能揜輕我宫人之怒不役一夫之怒㑹湏殺此田舎翁之怒以至好大喜功而多愛無非夲心之發露也木心不直脉理皆邪雖勁而發矢不直弓工可謂善窺其君心術之㣲矣太宗亦可於此進格物正心之功, WYG: ''}
