  - {type: variant, offset: 7067, length: 107, content: 市井之冨兒軍政非宫庭之嬖倖以至在列皆陸䞇而非盧𣏌皆李泌而非張延賞則朝廷之勢重於九鼎藩鎮安得而輕視之藩鎮之敢於干名犯分朝廷輕故也自昔安有朝廷輕於上廉傾級圯而能措大噐於安者哉魏丗祖東如許昌大興軍伐吴親御舟循蔡潁浮淮如壽, WYG: ''}
