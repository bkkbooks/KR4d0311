  - {type: variant, offset: 100, length: 2, content: 好惡, WYG: 曰其道光明道未有不自静入者也參}
  - {type: variant, offset: 103, length: 3, content: 念當謹, WYG: 魯艮顔子之如愚復聖門之正傳以此龔父資簡茂近於静}
  - {type: page-break, offset: 103, content: '', id: KR4d0311_WYG_029-3a, image: WYG1175/WYG1175-0302c.png}
  - {type: variant, offset: 107, length: 3, content: 微蓋此, WYG: 入道為易澄}
  - {type: variant, offset: 111, length: 0, content: '', WYG: 以觀我平心以觀物一敬主内萬想}
  - {type: variant, offset: 112, length: 4, content: 能兩用有, WYG: 摇山光凝而白雲度野水空而庭草碧悠然意得表裏俱瑩}
