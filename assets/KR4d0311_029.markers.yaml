  - {type: variant, offset: 7619, length: 1, content: 近, WYG: 余自考功罷歸杜門深省有感於聖人以天治人之意作春秋說兩漢詔令序天道不言而四時行聖人不言而萬化成言非感人悟物之本也審矣二帝之典三王之謨猶不能已於言誠在言前也言出於誠雖言而忘言漢世至誠之學不講皇極之訓蔑聞而一人志慮形為播告大抵出於手製天下猶得以因其言知其意夫言之不文行之不逺渾渾灝噩王言之體也漢上接三代統緒其文猶有爾雅之遺人主天資有高下躬行有純駁識量有廣狹政事有得失固不容槩論而以仁立國之意丁寧反覆四百}
  - {type: page-break, offset: 7619, content: '', id: KR4d0311_WYG_029-9b, image: WYG1175/WYG1175-0305d.png}
  - {type: variant, offset: 7621, length: 0, content: '', WYG: 猶一日至先主孔明之用蜀一時詔勑亦能使聞者為之興起豈非兩漢之澤未斬歟孟子曰誦其詩讀其書不知其人可乎是}
  - {type: variant, offset: 7622, length: 3, content: 來僨軍, WYG: 論其世也此書為尚論其世作送程叔運掌}
  - {type: page-break, offset: 7622, content: '', id: KR4d0311_WYG_029-10a, image: WYG1175/WYG1175-0306a.png}
  - {type: variant, offset: 7626, length: 0, content: '', WYG: 湖南序秋風動容木葉欲下眉新進士叔運程君過我東山}
  - {type: variant, offset: 7627, length: 0, content: '', WYG: 歴沅湘而南征愀然買酒酌之曰香草佳木隨地皆産而莫盛於湘之南湘南衆芳所在杜衡江籬芙蓉薜荔木蘭若芷荃孫椒桂不可一二名而莫盛於蘭蘭有國香人服媚之初不以進而榮其生深林無人自芳亦不以退而辱騷人所以反覆深致其意以其似道也故紉之為佩折瓊枝以繼之而求襲其芳澤是芳發於身逹於家漸於國以及乎天下熏烝乎兩間流被乎百世曽何負於人哉而服艾者謂不可佩人心嗜好不同乃爾於蘭庸何悲委厥美以從俗而與惡草俱化則蘭之悲也然蕪没於蕭艾之中可蔽其芳不可奪其芳故曰佩繽紛其繁飾兮芳菲菲其彌章又曰惟兹佩之可貴兮芳菲菲其難虧其根於天者盖始終}
  - {type: page-break, offset: 7627, content: '', id: KR4d0311_WYG_029-10b, image: WYG1175/WYG1175-0306b.png}
  - {type: variant, offset: 7629, length: 0, content: '', WYG: 為時俗流從所轉也蘭}
  - {type: variant, offset: 7630, length: 4, content: 顯罰間鐫, WYG: 數種有澤蘭有石蘭有一榦一花之蘭或秀於春或旉於夏而發榮沅湘者紫而尤馥見於秋為正秋方憭慄慘悽萬卉溘然如戰敗無人色緑葉紫莖表表獨芳}
