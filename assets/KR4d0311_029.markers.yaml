  - {type: indent, offset: 169, content: 　, id: KR4d0311_krp_029-bkkind3}
  - {type: variant, offset: 172, length: 1, content: 魯, WYG: 龔父勉之異日將於是乎觀所進於濳洪氏譜系圖序洪姓有兩出一避唐孝敬帝及今本朝宣祖諱易𢎞為洪一伏羲神農間共工以水德伯九州其子勾龍為后土後裔封於共為共氏漢末避仇益水為洪吾宗共伯之胄也聚族天目下以東洪名其村無慮六七十家耆舊相傳始祖自四明挈家奉母來今西莊下擔墓猶亡恙毎歲除家祀所謂渡江祖席地用古禮而所徙歲月漫不可考然自始祖至於今不翅十五六世一世三十年當是唐中葉徙居於濳谷口矣洪望燉煌郡其散見於纂記多占籍東南吳廬江太守矩宣城人唐集賢學士孝昌舒城人翰林學士侃仕南漢參知政事昌杲仕南唐昇元宗譜一侍御三尚書則鄱陽三洪之逺祖也得姓以來鄱陽為鼎盛而在濳之洪四五百年間種德蓺善源深流長曽未有顯者豈聞崖􅋖之風以肥遯為高歟抑名山大川英淑之氣有待而發蓄雲閉霆然後大沛厥施歟紹興己酉裔孫珏首考世系𣲖别為圖藏於家其後斌又采之為祖宗諱第圖訖于己夘去今六十八年枝葉益蕃不可無紀余自郎曹罷歸地偏日永因彚稡而續之凢力田以肥家從戎以世宦讀書為文以名塲屋皆倉監}
  - {type: page-break, offset: 172, content: '', id: KR4d0311_WYG_029-3b, image: WYG1175/WYG1175-0302d.png}
  - {type: page-break, offset: 172, content: '', id: KR4d0311_WYG_029-4a, image: WYG1175/WYG1175-0303a.png}
  - {type: page-break, offset: 172, content: '', id: KR4d0311_WYG_029-4b, image: WYG1175/WYG1175-0303b.png}
  - {type: variant, offset: 174, length: 3, content: 伐衛齊, WYG: 長子仁朗之傳吾所祖也故詳仁藴之後數傳而遂微故老不存舊聞放失未免間闕文以俟質訪夫能言其祖郯子見師不識其先藉談取誚肖貌於兩間者不可不知世繫之所自出知所自出則知根榦華葉同此一氣自葉流根不容間斷春秋烝嘗以序昭穆而謹終追逺之意存歲時會聚以親族黨而乖争陵犯之風息朝夕講摩修飭求為善士君子之歸而無忝於爾祖此圖盖亦風教之助云寳慶丙戌六月庚寅十五世孫某序豫章外集詩註序天降時雨山川出雲故嵩高烝民之咏不于}
  - {type: page-break, offset: 174, content: '', id: KR4d0311_WYG_029-5a, image: WYG1175/WYG1175-0303c.png}
  - {type: variant, offset: 178, length: 4, content: 來歸衛寶, WYG: 物之盛}
  - {type: variant, offset: 183, length: 9, content: 意不啻足齊伐北燕賂, WYG: 於其生我朝列聖}
  - {type: 'kr:newline', offset: 187, content: '

