  - {type: variant, offset: 5231, length: 255, content: 棘元戎重寄安危惟人然自昔康時濟丗非便儇皦厲者所能爲此截截善諞言秦誓所以重悔也卿沉深如鄧禹鎮静如謝安始對延英首以佳兵爲戒識慮逺矣共政逾年威重有體朕知可屬大事時方多壘輟股肱之臣以盡護邊將國有令典便朝咨卿勉爲朕往卿旣許朕矣而猶以取具臨時爲解夫軍國一機内外同體措置得冝精采立變走符堅於肥水折佛貍於瓜歩盡在卿指縱之下母留成命佇奏膚公所辭冝不允權禮部尚書魏了翁辭免除端明殿學士同簽書樞宻院事督視京湖軍馬恩命不允詔可大之業由事而生此功業所以見乎變也蠢兹黠虜窺我蜀襄朕慨事變之方來一日建兩督府於江上使聲援相接以全制勝卿學洞古今, WYG: 嚴}
