  - {type: variant, offset: 4151, length: 1038, content: 權吏部尚書恩命不允詔朕謀廟訪落之始卿以嘉猷入告曰王位在德元厥亦惟棐民彛用懌寧人受命實獲我心無人乎子思之側不我留也間去而嗑惠然來思敷奏以言亦克用乂方將迪簡在庭偕庶明翼于朕躬以春官行天官事顧以爲大介賚尓耶惟寅斯清惟公斯明卿蓋𥙿於率屬母違朕所辭冝不允兵部侍郎淮東制置使趙葵乞罷黜不允詔維予前寧人經德秉哲咨乃父宅牧于江漢匪舒匪棘肆敉寜武圗功迨今靡間言良用嘉歎廼者錫壹惠之謚以忠冠肅亦惟旌往勸來庶幾丗有不二心之臣服勞于王家卿佩教忠之訓奮志孔武朕推心任之整淮浦之旅雪崤函之眚奄觀後効顧以群疑自鞠自沮何耶夫簡物議者䘮功之本畏人言者進德之機㩜卿來奏謂忠孝有聞憂懼無所且重感於惎間不行之子儀継自今其知所進矣虖秋風戒寒嚴車攻之修備謹采薇之守衛以張吾國而昭乃辟之有乂睽疑何有哉避讙祈免非朕樂聞所請冝不允端明殿學士太中大夫廣東經略安撫使崔與之再辭免除參知政事趣令就道恩命不允不得再有陳請詔朕慨念爲君之難儀圗耆壽俊共政用康保民以長我王國詔書屢下申之親札致敬有禮視安車蒲輪爲加厚卿抱道俟時可幡然起東海之濵矣巽章至再陳義何切范鎮年未及謝事而休致在元祐固不以爲矯獨不思文彦博起於旣老之餘力扶丕乂豈徒爲保身之哲耶夫麒麟鳯凰之出百鷙率服以其德非以其力也卿旅力雖愆精神逾勁坐而謀國必能折姦弭慝翼朕攸濟維日望之彊飯就道母憚于行所辭冝不允不得再有陳請寳謨閣學士正議大夫提舉江州太平興國官余嶸乞俾致其事不允詔華髪舊德壯猶元老有國者所甚重故朕親政以來樂得耆喆是馮是翼兆渭水以奮庸起海濵而共政經闈史觀亦參列備咨訪安有先朝名法從老於學問政事如卿而簡拔獨後乎顧卿牧御湖湘積勞嬰疢姑俾均佚祠庭嗇精神以俟用兹攬來章祈致厥事惻然宿恙之未平也知止不殆抗懷固髙渇想儀刑詎容得謝其務玩勿藥有喜之象以康乃身佇嘉謀之入告所請冝不允太中大夫權禮部尚書兼直學士院兼同修國史實録院同修撰兼侍讀魏了翁乞賦祠廩不允詔靺鞨不道闖我蜀関卿伯氏杖使者節乗沔誓不與俱生而死之朕䀌然歎嘉詔褒金城之節以勸忠且以紓卿孔懷之戚而請祠欲西將進至荆䕫與父老謀救郷國陳義甚髙昔漢嘗有事于四方馳傳諭蜀屬之司馬相如汲黯則留以自近山立玉色姦宄奪氣功出大將軍上本彊則精神折衝故也卿其圗濟乃辟謹勿言去有勝筭亟入告所請冝不允禮部尚書魏了翁辭免慶典轉一官詔緇衣之冝兮敝予又改爲兮好賢之心無斁也卿曩以言去國非朕意更化入儀槖從直諒之氣不少衰朕愛其有元祐諸賢之風旣還銓簿之四階兹又進慶典之一秩眷隆恩浹豈以周南留滯爲間哉夫天爵之尊固無慕於人爵緇衣之好朕心庶幾焉其母過辭所辭冝不允知樞宻院事曽從龍辭免, WYG: ''}
