  - {type: variant, offset: 5204, length: 1, content: 承, WYG: 厲精百度之新注意一賢之切望既孚於巗石位宜正於元台咸輯群工渙揚大號具官某道包乎衆甫氣塞乎兩間其無我則顔氏克己之仁其有為則曽子守約之勇升暘谷之日而春萬象翊我初潛興太山之雲而雨八瀛贊予更化即上天下澤以辨分本内陽外隂而進賢凛諌路之復開紛倖門之自塞回狂瀾於既倒坐消貪濁之風泝大川而獨航期濟}
