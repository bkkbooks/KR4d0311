  - {type: variant, offset: 2, length: 3517, content: 一戒飭將帥撫恤士卒詔朕仰惟藝祖皇帝立國以仁制國以義撫軍馭軍恩威不相揜用能賦民養軍而民不憚整軍衛民而軍不怨經制一定國勢尊安慨慕風烈常懼弗逮間者惠陽建安京口髙沙之軍蠢爲不静以駭民聽雖怙終必戮迄伸邦憲而事非獲巳痛切朕躬夫三綱五常之理在人未始泯絶彼其忘平時撫養之恩背理捐生而以衛民者厲民豈盡本心哉有司奉令不䖍故其病於掊尅而飢寒之不免困於力役而休息之無期鬰悒於沮遏而赴愬之無所殆非一日亦惟朕之不明有以敢之詩不云乎祈父予王之爪牙胡轉予于恤内而三衙外而列閫曁諸軍主兵官其各體至意上下交飭訓禮示信威以儆其玩而恩以恤其私使人人自愛相安于紀律而國勢張時惟汝嘉狃故必罰朕不敢赦四川安撫制置使趙彦呐堅守邊関將士用命奬諭詔坤維國之上游我髙宗皇帝暢威逺之略炳知人之鑒拔虓將玠俾扼賊虜出竒制勝隱如長城蜀固而國勢定於皇祖烈朕甚慕之蠢兹新虜荐食亡厭廼者窺我蜀関諸將嘗奮前鏖郤矣兹又渉漢沔以逞卿儒而知兵忠於徇國用玠勝筭身爲金湯駐軍于原上馮髙下臨熊卧虎視圍合累旬而氣不折將士感厲用命人百其勇虜有後顧逡廵不敢深入卿之力也朕自聞卿犯危難控險阻每飯意未嘗不在原忽㩜吉奏且歎且喜彼曲我直彼竭我盈乗神人之共憤鼔吾貔貅滌氛壒而空之勞士輯民治堡繕塞使西陲安堵如故母患有功之不見知也書曰汝多修扞我于艱若汝予嘉卿尚勉之哉新除吏部尚書李􅐉辭免陞兼修國史兼實録院修撰專一提領纂修髙宗皇帝正史恩命不允詔自史䇿散逸於鬰攸之後思陵大典正史迄今猶未脫藁朕甚懼焉卿以開物成務之材通今博古之識入儀于禁途國史實録俾參撰次具有家法兹旣正厥職掌而炎興之醲綱懿榘所以維人心而永天命者併屬卿鈎元提要亟緒成之用副予思皇祖烈之意典銓批勑精明有餘母以學槁思昏爲解使太史公之業無傳也所辭冝不允福州觀察使楊鳯孫除安德軍承宣使依舊提舉佑神觀免奉朝請恩命不允詔朕躬御路朝永懷長樂旣推恩猶子又推恩猶子之子所以隆罔極之報也矧卿文雅自將謙静寡過尤慈扆所鍾愛進之留務佚之祠館雍容家食以奉其親可不謂榮乎昔隂馬氏以恂恂丗厥家用能龜紫傳襲與國同慶尚祗踐之奚辭爲所辭冝不允端明殿學士崔與之辭免除廣東經略安撫使兼知廣州恩命不允詔朕惟先朝以韓琦守相范仲淹守蘇德選也然擁旄里第於安平無事之時孰與即家宅牧而分憂寄卿風節在朝廷威名在夷狄朕之韓范也頃辭聘召佚老海濵悍卒嘯兇薄畨禺幅巾登陴赤心諭暁衆狙屏氣宵遁賢者有益於人國如此就鎮郷枌全護海嶠家國一體孰如卿冝矧弭盗於淮郤㓂於蜀沉深有逺略爲我強起可也士君子行乎蠻貊易行乎州里難愈近而愈不可欺卿忠信篤敬積孚於州里推之可以孚蠻貊鴞音之革奚難哉即日建牙四履驩舞朕方嘉卿勇義而識變巽櫝非所樂聞也所辭冝不允從臣李􅐉等乞將所得俸給减半幇支不允詔朕承丗治垢敝之極楮輕物重公私交瘉夙夜不皇寜惟昔司馬光有言撙節用度冝自上始故裁濫約冗興于眇躬而大臣祈歸賦禄之半蓋錢榖之問方棘相與警勑貶損以圗其闕非以是爲可𥙿吾國也卿等誼深體國援比有請其未諭朕志乎夫損貴酌損節戒苦節惟時之中尓知厲羔羊五紽之風予乃蹈權輿四簋之戒國雖未𥙿何至是勉思大計之禆母徇小㢘之執所請冝不允中大夫眞德秀辭免資政殿學士在京宫觀兼侍讀恩命不允詔天之生賢不數其得時行道亦非偶然者朕以王佐噐卿於十年之前儀圗共政所以承天祐慰人望也平治之機方開無妄之疾來諗當饋重歎天豈虚生是賢哉惟大學一書卿推致知格物之理啓沃甚悉而未竟其以祕殿内祠養疾闕下少間則勸讀于邇英卿獲專意嗇衛朕不失佛時仔肩之益而大政易於諮訪是爲兼得天壽斯文何恙不巳股肱嘉哉母輕於去朕所辭冝不允光禄大夫右丞相兼樞宻使鄭清之再上奏劄乞從鐫罷居家待罪不允不得再有陳請詔國朝筦軍於三衙本兵於宥府務立上下相維之制使知少長有禮之風故服事有階而犯法惟劒是關國體可忽廟謨卿具守文應變之長得禁暴和衆之略謂平陸失伍固訓齊之乆隳曲梁亂行抑驕駻之難制恩威並用紀律復張顧倚成之方深胡引慝之荐至廼腃周公之輔克綏洛邑之頑予以敉寧武功毎思艱而圗易我惟無斁康事迄欲去而復留冝體朕心勉安厥位惟京師南北軍之置必謹惟羽林左右衛之選必精益奮乃庸茂躋于治尚奚罪之待所請冝不允不得再有陳請知院喬行簡參政曽從龍樞宻鄭性之同僉書陳卓再上奏劄仰祈明罰居家待罪不允不得再有陳請詔維國大勢如人一身病之受也有源證之發也有候粤從債帥莫制驕兵但知畏不識之煩曽靡見光弼之整適當其弊乃在于今卿宣弼諧之勞懋綏靖之畫虎兕出於柙知干戈之可憂牛羊反諸人念芻牧之有在抗章自劾陳義甚髙維開寳川班擊皷之時與慶暦衛士踰垣之日股肱未嘗引咎精神自能折衝勉殫訏謨奚事挹損所請冝不允賜宣奉大夫知樞宻院事喬行簡辭免除兼參知政事恩命不允詔存養固則智識明閱歴深則謀慮逺此朕倚重黄髮之意也睠留樞筦數日一朝帷幄大議瞭如蓍蔡維我隆興淳熈軍國一體典宥宻者必參大政安有文武兼資之老猶未與聞萬微之務乎命從中出旣喻朕心何嫌何疑而欲引避况天下之弊莫大於因循姑息朕寤寐治道茫乎渉川卿其與丞相同心協力濟斯丗于艱以副責治之切施置罷行之得冝則轉移興起之有漸矍鑠是翁謹勿憚煩也所辭冝不允知院兼參政喬行簡辭免權監修國史日暦恩命不允詔春秋修魯史之舊以事繫日以日繫月而書法著因書法以求聖人心法不在鉅儒乎卿學優柔而饜飫文贍直而詳核軍國訏謨之暇振挈綱領錯綜注記襲六爲七而作一經蓋浩乎沛然也矧自薛居正以來執政緫統尚矣其母以兼三爲解而曠大典所辭冝不允光禄大夫右丞相兼樞宻使鄭清之乞解罷機政不允詔朕永惟萬務之統在一相相安厥位然後可圗社稷之安丞相蚤以天下爲己任弼予親政期厎丕乂謂宿弊沉痼勢難遽起而正氣寖還徐當自瘉用能虚心無我聚衆賢於朝抜茅而泰盍簮而豫朕日夜望之遽以孤危祈解機政中流捨濟川之楫可乎天下之理一公可以勝衆私一敬可以勝百邪益旣乃心終輔台德母使國人謂朕任賢之或貳也所請冝不允光禄大夫右丞相兼樞宻使鄭清之乞俾還故里不允詔廼六月庚寅召對宰執于便殿咨訪庶務漏過午太史奏日有承氣其占爲臣承君其吾相開心布公率同列以承弼厥辟之象歟諄切諭留旣還需牘越四日癸巳仍以去請殊咈朕懷周公聖人也群情猶不能遽孚其欲去迄留輔成太平之業爲文武申固天命也朕於卿一體無間而明農之志浩不可遏縱不念公無困哉之訓獨不爲前寧人付託之重奉幣供王以祈天永命虖慶暦之車主必行元祐之舟戒偏重卿旣得之推是心以往何治不濟國歩方艱而捨去天下其謂卿何其謂朕何所請冝不允光禄大夫右丞相兼樞宻使鄭清之辭免授特進左丞相兼樞宻使恩命不允詔元祐更化一日制下命二相吕大防爲左范純仁爲右而大防之宅左凢七年君臣之際盛矣哉朕遵晦養蒙之乆嘉與群生共躋新美得卿舊學相我親政壅者迪之仆者植之憊者翼之大明當天群隂盡伏靡容光之不照卿之力也左揆虚位有年如人身之股肱何可偏舉故進卿以首相兼緫文武之柄且選於衆得耆俊以助之朝夕納誨夾輔台德庶幾元祐之盛撝章來上乃以寵榮爲懼而求歸老卿豈人爵所能榮哉得位與時憂責彌重勉殫金礪之益迄成玉鉉之功獨善非所望也所辭冝不允宣奉大夫知樞宻院事兼參知政事喬行簡辭免特授金紫光禄大夫右丞相兼樞宻使恩命不允詔帝王盛丗左禹而右臯左周而右召用能濟登雍熈泰和之治本朝稽古建官並相非一權臣專國則獨相如彼其乆可不變而通之乎卿直大無競心老成有逺慮方威柄未還他人所不敢言者毎雍容造膝歴言之簡在朕心知爲宰相噐迨更化共政而益信進升次輔仍斡樞極蔽自夙志倚爲蓍龜謂冝亟展經綸之藴副予望治之切顧猶以衰病諉大廷朝㑹進趨䄡如拜起翼如搢紳動色相慶謂少壯有不速精神折衝奚難哉書曰若濟巨川用汝作舟楫其勿辭所辭冝不允權禮部尚書魏了翁辭免兼直學士院恩命不允詔戊寅並命二相越翼日己卯便朝同班奏擬首以卿進曰號令文章有國之精神禁林虚直非了翁不可朕喜於得人亟俞之卿乆困排根趣還禁近學益老文益偉戞摩三光斧藻萬象沛乎有餘思以是而草内命孰謂典誥之逺母多遜也所辭冝不允喬行簡辭免提舉國史實録院提舉㑹要勑令經武要略恩命不允詔房元齡之監修國史實録崔鉉之進讀㑹要與蕭何之次律令魏相之知兵略皆宰相職也卿以名丗鴻碩爰立作相内外萬務蓋無不統矧簡䇿之記兵律之志乎維是諸書事嚴體重設官分纂曠歳未就非老於經制述作之學緫提其綱要諸儒將奚所折衷而収汗青之功哉國典有常巽章良過所辭冝不允金紫光禄大夫參知政事兼同知樞宻院事曽從龍辭免除知樞宻院事兼參知政事恩命不允詔乾坤以六子爲用而化功成朕同日命二相又同日命四執政六子備矣卿以凝重參大政以深沉賛廟筭履正奉公言可厎績朕簡注蓋深進筦五兵之寄仍預萬微之務夫豈以序遷爲卿榮天下大勢方厝火於積薪朝廷逺慮冝徹桑於未雨討諸軍國一日不可緩也抗章祈免欲别求文武全材而用之孰有加於卿者乎旣深多事之憂母徇一謙之執所辭冝不允端明殿學士太中大夫簽書樞宻院事鄭性之辭免除同知樞宻院事恩命不允詔慶暦以韓琦范仲淹爲樞宻副使士大夫酌酒相賀朕思見其人若飢渇卿氣明而抗志逺見定而慮事精列在宥府隱憂更切指陳可否多中肯綮進參樞筦之嚴増壯精神之本待之優乃望之深也卿能以琦仲淹自勉則何巽避之有所辭冝不允, WYG: ''}
