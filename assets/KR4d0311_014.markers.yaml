  - {type: variant, offset: 3553, length: 0, content: '', WYG: 不允仍㫁來章批答葢聞宣王中興倚重於孝友之張仲有孝友之臣主於内則戎車四牡始得以成功伐於外卿踐履全君子之和操守得大臣之正朕之張仲也自登宥府物望具孚進不躐等厥任増重夫國勢之安危在所寄邊防疎濶軍律放紛風寒之慮太深隂雨之備宜亟卿雖位樞庭之末可過謙乎所辭宜不允仍㫁來章曽從龍再辭免樞宻使不允批答召虎江漢之命姬旦淮夷之征皆爵上公往衞中國欲威靈之旁暢必名位之崇加卿有武而有文能定而能應處基命宥宻之寄得受任危難之風果為朕行耶趣進臨於都㑹吾無復憂矣知坐折於遐衝胡尚遜於使端似未孚於予志望之重則可以盡䕶諸将權之尊則可以奨率三軍矧視周家之禮猶輕其在國朝之典未逺匪隆縂統曷聳觀瞻抑使表裏聨絡之諸屯皆識上下綱維之深意玁狁孔熾我是用急姑煩籌筆之勞徐方來庭王曰旋歸佇錫命珪之寵倚毗良切傴俛奚勤所辭宜不允魏了翁再辭免簽樞督視荆湖兵馬不允㫁章批答昔在先朝蜀出名輔張浚精忠之山立允文碩畫之淵深皆於王事靡盬之秋克奮元戎啓行之畧朕方深於憂顧卿盍展於英猷荐披謙牘之勤猶遜師干之重睠禁途之獻納暨經厦之建明雖所陳略施未盡如賈誼之志然其策常用已深識子房之心兹共濟於艱難乃過虞於扞格况上流之形勢甚重而中朝之體統不殊精神既孚􅍺絡自貫甲寅報可亟宜上方略于金城辛巳饗功詎止訖天誅於洄曲倚須戒道勿事循墻所辭宜不允曽從龍第二次辭免樞宻使都督江淮軍馬不允㫁章批答易之師正丈人吉非必以素居富貴稱也才謀德業衆所尊信畏服則國勢倚之而重卿德業之茂才謀之偉積孚於衆望出分憂寄盡董師干十乘啓行有日矣本兵置使特壯前茅豈以富貴卿哉况兩相兼官於中元戎專官於外體貎均一脉絡貫通修扞于艱以敉寧武圖功盖在此行虎拜稽首對揚王休毋屢勤遜牘為也所辭宜不允仍㫁來章文武百寮宰臣鄭清之等上表奏請皇帝正月五日天基聖節御紫宸殿上夀不允批答朕親攬政柄以來嘉與海内相安于善治而秉德不康寧無以輯天人之和咎證荐形於象緯妖氛旁煽於疆陲致使吾民重罹其害夙夜怵厲心焉如擣其敢晏然盛禮備樂於廷以侈誕彌之慶哉群公百辟盍圖往求朕攸濟顧援承平舊章以請君曰卜爾萬夀無疆固天保歸美之至情而嚴恭寅畏天命自度治民祗懼無逸享國之長在此不在彼也其思將順用副憂勤所請宜不允文武百寮宰臣鄭清之等再上表奏請天基聖節御殿上夀不允批答誕節之置非古也我朝列聖觀㑹通以合禮必隨時而酌損之上天示變則寢同天之祲容萬民失業則蠲天申之縟典盖以畏天恤民為心不以位為樂也朕獲承至尊休德於今一紀露囊獻賀毎抑而不進矧今玩荐雷之象恐懼修省莫敢遑息而可効千秋為宴樂乎約浮崇簡朕志堅定卿等勿重請也所請宜不允謝奕昌再辭免授保寧軍節度使提舉萬夀觀}
