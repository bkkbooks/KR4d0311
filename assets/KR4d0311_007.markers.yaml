  - {type: variant, offset: 4647, length: 1, content: 雙, SBCK: 􅀟}
  - {type: variant, offset: 4652, length: 5, content: 元暉筆法作, WYG: 新捐故後必寒鏡之銘曰以鏡自照見形容以人自照者見吉凶觴之銘曰樂極則悲沉湎致非社稷為危机之銘曰安無忘危存無忘亡孰惟二者必後無凶杖之銘曰輔人無茍扶人無容}
  - {type: variant, offset: 4658, length: 24, content: 七十三矣爲賦六言兩首近浦霏開略彴逺山雲没招提樹厎, WYG: 武王聞丹書於師尚父為銘以自警也維昔帝王之治天下莫不以敬為主敬則百慮澄不敬則百慮擾敬則萬善集不敬則萬善隳是敬非自外而入也上帝臨女無貳爾心知所畏然後知所敬也}
