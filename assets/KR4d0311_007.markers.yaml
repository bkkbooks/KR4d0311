  - {type: line-break, offset: 58, content: '', id: KR4d0311_SBCK_007-1a08}
  - {type: variant, offset: 59, length: 6, content: 惡冝春釀酒恨, WYG: 舛其序治道何患於不舉元帝承皇綱觧紐之餘宜思興起國勢如拯溺救焚之急顧乃以安平之太體治危亡之壞證以守文之常度制應變之危機故近世論者謂此何等時而舉不急之務訟觀作矣胡不築將壇以拜淮隂太學興矣胡不立武舉以招汾陽親雩之禮行矣胡不屈帝尊而勞細栁博士之員置矣胡不造樓船而命將軍諫鼓謗木設矣胡不修車馬備器械以圖修攘之治是非數端為可畧也典午綴斿胡羯扛鼎中原豪傑競起而逐鹿時之所急不在是也使當時内以經制國用為實政而不以練衣為僅足之規外以嚴飭兵備為實功而不以玉册為茍安之地晉其興乎厥今金甌雖}
  - {type: page-break, offset: 59, content: '', id: KR4d0311_WYG_007-11a, image: WYG1175/WYG1175-0171a.png}
  - {type: variant, offset: 66, length: 0, content: '', WYG: 玷缺之虞玉關未有閉拒之䇿戰難於必勝守難於必固和難於必信而民力國計已俱至於窮不汲汲於豐財强兵先其所當急而論義理者}
