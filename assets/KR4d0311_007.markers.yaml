  - {type: variant, offset: 141, length: 368, content: 以觀爲政歛苦生理迫豈伊數匙糜能起溝中瘠嗟哉秋晨禾葉葉含露液母使暵就槁而望一漑益對門兩絶對門三日罷晨炊無處傭身老畫師安得化山爲飯顆大家皷腹太平時一簾霏雨暗花朝焙藥爐邊擁破貂深坐不知畦麥信喜看黄液上瓶焦禽語脫却布袴博米歸崗泥滑滑行苦遲打麥作飯知何時阿婆餅焦涎滿頥更願春𧖟一百箔賣新得價絲貴樂葫蘆沽酒和家酌免教竈婦嘲姑惡讀元公輔傳有感公輔溪壑慾胡椒八百斛若比梁兾大是廉幾舡珠璣幾車玉三十萬萬無厭足我宋從來相用儒國肥民飽却家臞田園圗史論貧冨鼎鼐樓臺辨有無嗚呼哉鄙夫嗚呼哉貪夫示諸兒老人四十年前示兒長詩豫章實佳木㝷丈早異衆匠石雖未顧終解作梁棟社櫟大蔽牛不資丗所用棄置成散材歳乆即空洞誠由天所産亦在德者種吾兒豫章流丱角不好弄經訓雖未通數過輙成誦只今十五六舉止頗持重仰頼師友功綴緝成賦頌積絲未盈尺粗喜入機綜胡爲不自量將使應郷貢文埸倍千數作者豈倖中而子, WYG: 遊也溺}
