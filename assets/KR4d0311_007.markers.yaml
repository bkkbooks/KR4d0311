  - {type: variant, offset: 6, length: 2, content: 七詩, WYG: 知來之而高謀不見納謇辭不見容智力不得宣賢才滿朝廷足以美觀聽而已諸葛亮嘗言親賢人逺小人先漢所以興隆親小人逺賢士後漢所以傾頽一親一逺之間盛衰判矣易之損益皆以十朋之龜弗克違明衆賢之助在損之}
