  - {type: variant, offset: 3, length: 2, content: 集卷, WYG: 帝振貸减租之詔勤勤懇懇其愛民實意皆可以對越天地安有不被其澤者漢賦有三口賦以食天子算賦以治庫兵車馬更賦以給戍邊此詔所欲省當是斯時又有獻賦郡國假獻為名重賦以為民害故亟欲省之方楚漢之争未决則初為算賦及天下既定則欲省獻賦以此見傷財害民無如兵費之重兵費百出而欲行愛民之政蓋難然愛民之意不可以兵而間斷也武帝元狩之詔謂君者心也民猶支體支體傷則心􅉃怛非無愛民之意而好大喜功移之臣嘗考司馬遷平凖書其論帝取財贍兵本末凡十餘節一節害深於一節曰江淮之間蕭然矣曰廢沮誹窮治之獄用矣曰三人言利析秋毫矣曰吏道益雜而多賈人矣曰稍稍置均輸通貨物矣曰無慮皆鑄金錢矣曰公卿大夫多諂諛取容矣曰楊可告緡令縱矣曰縣官有鹽鐵緡錢之故用益饒矣曰株送徒入財得補郎即選衰矣而終至於曰不敢言擅賦法矣而極高帝欲為民省賦帝乃聽吏擅取非經常之賦夫豈不知有民哉置郡方新顒顒待哺恐廢前功惟求趨辦雖欲禁吏之不擅賦不可得也益口賦三十輪臺悔之猶幸此意不絶如綫而仁義之澤未至於遽斬此所以壽四百年之脉與紹興元年六月辛已上虞縣丞婁寅亮上書言宗社大計欲望於伯字行下遴選太祖諸孫有賢德者視秩親王使牧九州以待皇嗣之生退處藩服上大嘆寤戊子上諭大臣曰昨令廣選藝祖之後宗子二三歲者得四五人資相皆非岐嶷且令歸家俟其至泉南選之臣恭考高宗皇帝誕聖於大觀丁亥即位於建炎丁未至婁寅亮上書之歲聖壽方二十有五萬世無疆之計大矣哉蜀先主將東征孫權羣臣多諫不從大軍敗績諸葛亮嘆曰法孝直若在則能制主上東行就欲東行必不傾危矣唐太宗欲自征高麗羣臣多諫不聽凡㧞十城上以不能成功深悔之嘆曰魏徴若在不使我有是行也臣聞孟子曰入則無法家拂士出則無敵國外患者國恒亡蓋自堯舜不作人主孰能無舉動之過所賴以拂正其非而反諸是惟左右前後之臣耳而便佞者逄之輕黠者長之具位者拱視而不暇問畏事者竊欲而不敢言幸而敢言亦惟一言以塞責而終歸於首䑕人主過舉於是莫之能救使當舉動少差之初力盡面折廷諍之誼引裾不從繼以折檻自非諱過愎諫之主安能不瞿然悟幡然改惟其若宫之竒懦而不能强諫故雖諫無益也先主復關羽之恥而興忿兵太宗討高麗之罪而興貪兵非無黃權褚遂良等之諫而所諫不力無救於行法魏二臣猶在必將激烈懇到極其骨鯁不從不止也夷陵鴨緑之悔當時諸臣安得辭其責哉雖然亮知惜孝直而考其推擇之素特蔣琬費褘之純良向寵之淑均何望其復有孝直之方勁太宗知惜魏徴而田舍翁之怒見於生前仆碑停昏之恨形於身後敢言之氣沮喪殆盡末節欲望廷臣如徴之剴切難矣是則人君平時能養法家拂士之氣臨事乃獲法家拂士之力上方欲用文武求之如弗及始以蒲輪迎枚生見主父偃而嘆息羣士慕嚮異人並出卜式㧞於芻牧𢎞羊擢於賈䜿衛青奮於奴僕日磾出於降虜斯亦曩時版築飯牛之朋矣漢之得人於兹為盛儒雅則公孫𢎞董仲舒兒寛篤行則石建石慶質直則汲黯卜式推賢則韓安國鄭當時定令則趙禹張湯文章則司馬遷相如滑稽則東方朔枚臯應對則嚴助朱買臣厯數則唐都洛下閎協律則李延年運籌則桑𢎞羊奉使則張騫蘇武將率則衛青霍去病受遺則霍光金日磾其餘不可勝紀是以興造功業制度遺文後世莫及順帝知能任使故士得用情天下喁喁仰其風采遂乃備元纁玉帛以聘南陽樊英天子降寢殿設壇席尚書奉引延問失得急登賢之舉虚降已之禮於是處士鄙生忘其拘儒拂巾祍褐以企旌車之招矣至廼英能承風俊又咸事若李固周舉之淵謨𢎞深左雄黃瓊之政事正固桓焉楊厚以儒學進崔爰馬融以文章顯吳祐蘇章种暠欒巴牧民之良幹龎参虞詡將帥之宏規王龔張皓虛心以推士張綱杜喬直道以紏違郎顗隂陽詳宻張衡機術特妙東京之士於兹盛焉向使廟堂納其高謀疆塲宣其智力帷幄容其謇辭舉措禀其程式則武宣之軌豈其逺而臣聞求賢而不用吉士與不求同知人而不善任使與不知同人主有志於治孰不知非賢罔又而急於求賢者有行可際可公養之仕亦莫不起而應其求海濵之大老至洛陽之年少至東山之高卧者至周南之滯留者至明廷立鵠華階振鷺非不極一時之盛而知不盡所抱用不盡所知如醫者聚参苓术桂玉札丹砂於一槖品雖至珍用與病違雖聚無益也武帝蒲輪之徴一下而異人並出順帝元纁之聘一馳而俊又咸事好賢急士之意前後無間然武帝有儒雅篤行質直推賢定令文章滑稽應對厯數協律運籌奉使將帥受遺所聚凡二十七人而漢以之盛順帝有淵謨政事儒學文章牧民將帥推士紏違隂陽機術所聚方二十人而漢以之衰蓋武帝於人才之長短小大洞察底藴隨所用而當順帝}
