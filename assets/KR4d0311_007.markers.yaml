  - {type: variant, offset: 5580, length: 1970, content: 便春䑓鮮衣稚子面紅醉知向外家參節來巧笑聲揺六博盆纎纎人在緑䆫根隔紗想見春風面雲滑金釵欲溜㾗病目日過學不力年催名未芳心期雖皦皦目視巳茫茫燈疊青紅暈書紛黒白行蒲團深瞑坐禪味覺偏長椒菊枕矮檠矻𥘉年細字窘晚節天憐蠧書障神授鴻寳訣金葩凉而嚴丹寳温以烈兩囊貯風露半簮藉霜雪芬透頂𩕳爽清祛腦脂熱夢魂寥廓逺宇觀沆瀣澈雲開月更朗電掣巖欲裂術妙刮膜金功過刳蟇鐵聱牙讀楚詛瑣尾窺越絶不憂幻景侵且喜翳根滅頌花醉春温餐英飽秋㓗塗屋兆蕃碩飲潭進耆耋况兹芳澤聚盡洗空華結夜氣存虚明天光發昭晣湏彌能微塵渤澥或丘垤不直一笑粲巳判雙眥决俞提舉挽詩二首展也萬夫特翛然山澤臞朔風空汴泗春水渺淮湖籌驛尹師魯詩壇梅聖俞繡衣歸老去有韞不輕沽蒼鶴孤山曉黄花栗里秋一身雖物外萬國尚眉頭遺老幾何在耆英只麽休問天天不語江闊莫雲愁奚知縣挽詩敏銳霹靂手寛平雲夢胷雄臺髙幕畫劇邑冨民庸㠶掛風方駃戈揮日又舂炊粱剪春韭無復奉從容臈中歩月二絶平山堂下解圍去天水堡前經戰來天地無情一般月照人霜骨白皚皚賣妻鬻子年饑後索母求爺賊亂餘對月椎胷幾家哭更堪蕭索歳將除何正言挽詩雋手芥拾紫忠肝蒲伏青嬰龍雲氣直縳虎雪毛腥炊枕夢何短書棺名更馨眇然人物幾墓草涕交零謹和老人惠山泉二首取水驛符到喊山旗信通碾分花厎月爐受竹間風金谷正覔醉玉川誰道窮頂門甘露入喚醒主人公第二水泉動斜三封印通愛竒親煮雪得雋細生風酒肺蘇將渇詩情洗盡窮娉婷湏好買供奉讀書公歳暮山中紀事三首南山大小空横行無常時蓄狗豢豕盡澤吻樵牧兒翁嫗起譟逐妥尾行愈遲力窮哭且罵天網不汝遺里巷負暄翁隤然支離䟽饕虱縁緼袍點綴頷下湏旁人勸翁捫揺手一任渠虱多轉不癢何庸事驅除郷風臘卄五比户然爆竹窮隂挾黄昏霹靂起空屋梁間鬼拍手笑人未免俗罔兩白晝行渠爾一爆逐除夜市兒數十百挾炬相追奔争唱賣獃歌祈以昭易惛我獃大如屋幾臘擁敗垣群雛勸我賣急售價莫論弄巧或成拙太清不如渾老鐵無孔鎚甘守鈍性根新年欲識新年課都非舊日圗詞分詩料帳酒奪飯工夫鍜息柳邊手鑷閑花裏鬚寒消芳草緑打急辦行厨謹和老人欲還故廬颼颼破屋小青禂客枕頻年寄道周行止非人眞可笑窮通有命尚何愁春風舊壘雙飛燕宿雨新巢百拙鳩信是還家貧亦好德人何處不天遊謹和老人春行抗䟽明時効伏伽一歸七度試春紗柔風緑遍庭前草細雨紅催陌上花惠逺買來猶濁酒趙州喫去只麄茶回頭恰恰鶯啼處黄四娘今尚有家又塔院僧伽傳法處阿育放光時到頂直無縫透心横有枝梅間詩鳯咮竹裏酒鴟夷醉上危層去空明渺所思燈夕獨酌二絶鈿車羅帕禁街夜珂傘炬城沙路春少不自強今老矣落梅風暖酒生鱗海濤風定柳枝曲江檝波明桃葉歌剪燭停盃聽宛轉不妨白雪映青蛾送游考功將漕䕫門七絶温公一傳諌議劉菊坡一傳吏部游長庚伴月天欲曉西照太白南羅浮神鼎一鑄魑魅怖法鼓四震波旬悲祖宗涵養天下氣留得此脉扶顛危欲鳴不鳴銜口馬欲去不去羸角羝排天絶呌河漢裂隻舸飛上岷江西古來刀鋸鼎鑊具用待誹謗妖言人掁觸不怒予節去惟天爲大知堯仁金湯棄去七百里珠玉走盡六十州誰生厲階不可問桔栢江上風颼飀燒畬瀼外竹枝瘦踏磧灘上桃花肥繡衣故郷豈不好爲天下計母庸歸四肢誰謂可無骨五臟自信難留寒跋予望之不得語但願萬里書平安正月二十四日早夢乞聦明於東坡東來一舸横天上御風而行無點浪有人野服帽髙簷宛如赤壁圗中様舉手疾聲呼先生爲我心孔開聦明䱼然一笑若相語乞得聦明不如魯老人晚得女眞眞又曽孫女金華皆再周而殤葬塔院後今春焚化用前韻賦詩謹和窣波影裏誦陁伽古佛燈籠護絳紗智慧竭羅雖正果慈悲妙善亦空花怕寒婉孌𥘉拳蕨望雨醒鬆細舌茶節物感人還自解有兒何用女當家送澄維那訪舊湖山梅子酸猶淺桃花豔已饒春風開口吸明月換肩挑鶴向平湖放猿從古洞招出門天地濶何處不逍遥葉主簿挽詩生理鴟夷子心期桑苧翁行厨脩竹月坐艦落花風雛好纔孤鳯行踈忽斷鴻呉松明逺目一點夕陽紅謹和老人古硯韻破壞憨僧衲凹欹漫叟窪吐雲頭縮蜃啖月口呿蟇宫㜮愁難捧堂胥怒可撾莫貪濡筆利浪草侍中麻路逢徽州送牡丹入都飛絮遊絲弄霽華出門芳草渺天涯太平莫道全無象脫繡鳴鈴傳送花首夏一絶示徐錦囊金九未熟櫻桃過錦幄俱空芍藥來共坐晩凉觀物化床頭有酒爲君開荅王仲鈞兩首無言安止止不動妙如如暴虎未聞道汗牛空讀書赤窮遑恤後白坐且求𥘉寂歴野花晩嫣然風雨餘老鏡風霜飽離觴歳月悠曲多傳郢水前郢州司理詩亦到蘇州拽轉撩天鼻抽將閙市頭投林母用急時至㑹封侯次子有下第韻東風換骨立成僊五色終迷自古然龍變未符今舉䜟鶴來當驗後科縁情如中酒冝親酒命合腰錢㑹有錢許買娉婷供老伴不妨遲得兩三年荅駱肖秦過我葵榴巷留君筍薤厨襟懷新雨快面目故山癯自笑孤飛鶴誰憐返哺烏未應埋没得囊有萬驪珠𥘉夏即事一首謝俞德逺惠茶病眼昏花懶讀書閉門恬養冉溪愚一簾草色蛤呼伴四壁樹隂雞護雛巳是歸來何用引本無太極不湏圗小團自汲新泉試凉滿松風石銚爐重午山蹊獨歩扶病索清䕃循林歩幽霏花拈勃姑飯草拾蝦蟆衣良藥觸手是壯容轉頭非昜𥙷天上漏難駐人間暉寒暑遞流斡悲樂相因依功名少終吉冨貴多危機李泌語欲咽屈平志空違不如滿引酒舉丗知我希, WYG: ''}
