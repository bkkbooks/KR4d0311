  - {type: variant, offset: 4644, length: 7, content: 待豐年雙林志廉, WYG: 為謀也牖之銘曰隨天時地之財敬祀皇天敬以先時劍之銘曰帶之以為服動必行徳行徳則興背徳則壊弓之銘曰屈伸之義廢興之行無忘自過矛之銘曰造矛造矛少間弗忍終身之羞予一人所聞以戒後世子孫衣之銘曰桑蠶苦女工難}
