  - {type: variant, offset: 2203, length: 900, content: 滿渉非忘淺深飲自知冷暖黄姑與織女隔河送悽惋南金英瓊瑶不換霜鬢短七夕好箇牽牛織女天凄其獨夜不成眠柳家細婢何能問太尉麄人祗自憐比翼難磨終古恨嫵眉未了宿生縁新凉如水誰消得平等天公也解偏秋思一曲玉連瑣十分金屈巵故新相代謝厎用爲秋悲寓興巨口松江鱸縮頸槎頭鯿一釂聊復爾百懷故依然林静横沆瀣庭空澹嬋姢鳴螿識人意切切悲流年最憐重開桂抱寒爲人妍阮亨甫壽樂堂澹庵各一首孤塔明横巘短橋華枉渚結堂水石邃奉此清節母菊能駐頽景松下蔚可數萱能忘百憂竹間粲欲語日淡迎春風雲薄謝秋暑板輿穿䕃來綵𬒮踏花舞點頭毎一笑彈指忽千古盡將栢舟淚灑作蓼莪雨僾然其若存青山照庭户右壽樂江西老澹庵髙節湛秋水君庵亦澹名聞其風興起一徑窈栢竹八䆫秀荃芷意行襲幽芳燕坐鑑碧泚銅爐古鍾磬瓦研素屏几玄根息芸芸㤗宇安止止大羮及元酒不入丗人齒床頭周易在更與參妙理右澹庵秋懷二首素節垂垂杪衰懷拍拍叢風乾梧葉白霜老菊花紅理曲多添瘦停詩不减窮出㝷空闊處揩眼送飛鴻鸚鵡琵琶恨融歸十四弦撥寒紅玉笋拍暖繡金蓮梅影春風裏茶聲雪水邊自憐還自笑星髮照嬋姢記夢青天一朶雲起東斗黒怒雨驤玉龍江頭女子十七八喚出八十老龍翁龍翁擲珠引龍舞女子笑滿雙頰紅天風吹動翡翠佩騎龍直入蓬萊宫山行紀事至節後兩日侍老人訪岳林精舎晩過眞君觀小飲還宿澄維那房厥明登九僊山晚取道陌上花里而歸徐雲叟鍾冠之崇之偕行男延勲侍扉開日華早路轉霜花鮮遊鴻得嘉客健鶴隨老僊舴艋野渡淺畧彴孤村連紆餘盤龍外杳靄烏猿邊麥畦破凍剗稻架烘晴懸萬鴉暗鴻洞隻鷺明㛹姢寺古繚虚嶂房深貯澄漣珍鱗紫金睟秀石蒼玉攣住僧自縳律愛客能逃禪老帖不容塌枯琴尚堪弦出訪文舉碣還息維摩氊䆫暉梅枝月帳鬰栢子煙吸清飽蟬腹擁薄攅龜肩忍寒如忍艾望曉猶望年報明翠鯨壯送暖紅麟妍讀易坐方穩搜詩去俄翩行行晉縣壘歴歴呉墓田森峭徑絶壁嵌空派危泉飛墮雪珂境撼動冰輪閣名天憇寂小養雋挾酣急凌巔閣摧失傑詠巖在餘竒鐫夕氣生逺嶼勌懷寄平川路旁柳如此陌上花依然數年束強項一日舒聮拳大千自鵬鷃方寸皆魚鳶東風染芳碧更着㝷春鞭和何伯温見寄二首問字無人過草堂昨非今是兩俱忘鶴何骯髒寒方警梅許凄凉静更香萬古江山窮太白一簾風月老張蒼多君不作炎凉語識我平生鐵石腸青山流水曉葱朧讀遍黄庭萬境空羔甕無縁澆舌本貘屏, WYG: 摇摇雖}
