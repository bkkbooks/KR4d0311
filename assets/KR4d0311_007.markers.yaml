  - {type: variant, offset: 510, length: 1597, content: 其間燕雀雜鸞鳯鈆刀未易割庶可供一閧造物果何如往往形吉夢天其助我心勿使汝放縱業貴精于勤耐取曉䆫凍文章實公器妙語丗人共歳朝哦此詩洗醆掲春甕吾家有隂德行矣光炎宋某今五十五矣敬用尊韻示諸兒道大兩儀小身寡萬物衆此心能砥柱斯文即隆棟書從羲孔來字字濟丗用愈窮理愈邃如探無厎洞有書不勤讀惰農失春種如何望秋成箕杵日簸弄一經勝籯金萬帙供洛誦所願噐業進増益門户重兒童悟易玄奴婢曉詩頌而况以士名經史懶條綜古來天目下誰識三歳貢吾翁破天荒教子期命中顧我肋巳雞望汝毛猶鳯詩書氣脉續聲價天壤閧毋學韓家符燈火照睡夢毋學陶家雍文術付遊縱光明發勤苦竒雋出餓凍四壁瓢腹空一檠鐺脚共人情易喘筒丗事難筭甕努力湏青春三陳與二宋春行花信雨擔閣睡魔茶破除朗吟揺矮屋徐歩逸輕車鳥語向人宻交情隨事踈紛紛何足問天地一蘧廬次趙保之清明即事五絶餅喫紅綾空復憶錢分白打厎曽知推排風雨清明過只有梨花三兩枝草草携家去踏青舊阡新冡𥿄錢輕觸懷易作中年惡羡殺兒童笑語聲花信東風第幾回蕭條門巷老蒼苔漢宫儘有新鑚火無分傳將一點來看花何必只長安到處韶華緫一般可是家貧風物晚郎當萵筍鬪春盤擅春正是海棠時賸爲新晴凖備詩潑火雨來還有信崗南崗北竹雞啼九華葉子眞賦汴呉兩都極陳治亂之原仍有詩用杜遣懷韻見寄因和酬之於皇永昌陵食龜大梁都坐控天下樞卜丗周鼎俱聖賢六七作夷夏同康衢懷鴆玩積安厝火忘細娯黼京相與樂興亡視如無元氣付一錮膏血供百湏但知豢冨貴金珠潤黄壚豈料醉夢中蠱瘵生華腴凄風暗離黍斜陽渺煙蕪空令老忠簡渡河死猶呼南來呉㑹雄北望汴水枯迓續赤帝脉覊縻黄頭胡楚蜀壯襟帶江淮豐灌輸以此圗中原所嗟欠謀夫平園舊賔客清燈耿寒爐搔首宿感集拊髀流光徂理亂有成鑒天髙不容呼擬古賦二京舉一通三隅謂墮狗監舌寜老瓜芋區誰能齒臯朔俳優雜星巫芙蓉歸去來月落長庚孤暮春即事温明好天氣猛憶湖山遨平堤到處柳流水誰家桃樽斚選勝檻笙歌喚輕舠百需不移具一醉何庸逃膜皷着日緊𥿄鳶得風髙買歸不論價矜詡相爲豪迅晷畧兩眼柔颸揺三毛閙裏夢巳破閑邊趣方牢摘桑暮西崦浸榖朝東臯病來飯即藥客至茶當醪雲煙面目稔筍蕨氣勢鏖腰頑渠稱鶴脚硬難爲鰲吾非東山謝亦非華陽陶泊乎潜溪潜萬事隨所遭次韻閔飢兩絶貴人生長不知田絲竹聲中醉飽眠渠信春山青草盡排門三日未炊煙巷頭巷尾幾夷齊日爲飢腸不肯西只願天公多雨粟便教米價賤如泥茶笋病蕾金𥘉出焙板玉又登厨爲愛頰車雋做成風骨臞黄婆幾倒盡姹女得安無快意冝知悔清標不忍孤五兵生厚味寜作病浮屠口占酬俞端叔牡丹沉香亭北夢魂賖驚見祥雲七寳車窮孟嘗君空好客病維摩老不禁花次韻何伯温三首庭前木蘭花皦皦扶春陽鶴鳴夜漏午歩花獨歌商低迷露濕衣浩蕩月滿梁深省渺誰語中心空自藏出門夾徑松春盡花滿林毿毿麈尾黄梟梟雲氣深仙人左元放騎龍夜相㝷飯我花杪露實腹虚其心銅瓶一穟蕙芳㓗以自旌相看色轉睟未言意先傾翛如鄭子眞聲名豈其卿明䆫細披挹心空氣和平山郷石田磽确萬山隈逢着荒年更可哀盡日幾人擔米上長年何處得錢來扣門強貸刑難逭閉户清飢死又催不是乾坤芻狗汝要令箇箇學顔回錢德成山水窟亦有黄金埓非無瑞錦窠養蒙知趣早觀復用功多嘉客賁埸谷碩人槃澗阿時平風日好花竹幾行窩壽程宰三首作縣如弄潮莫吸半呷水紅旗上岸來喝采沙河市拈取第一籌細柳天風裏愛民如縁竿百尺頭進歩未到百尺頭努力莫回顧當埸萬人看亭亭碧霄住回翁十日前先脫老鶴胎拍手浮玉頂君騎鳯凰來相逢說長生一笑榴花開曉出一雙杜宇青天月兩點烏犍白水陂不爲好山勾引出那知巳是揷秧時行臨安縣圃縣勢坡陀樹老蒼山光明潤客荒唐木蘭多露不能濕薝蔔匪風還自香萬事婦姑鳴好醜百年翁仲領興亡九龍堂裏隨冝酒盧橘來禽日正長寄題永嘉林氏眞意堂萱草逕庭寂橘花䆫户明我惟天地性物自古今情元酒無窮味朱弦不盡聲道從涵泳得寛作讀書程荅隆慶李守楀萬里一天碧百懷雙鬢秋凄其占後㑹展也企前脩風露昻藏鶴煙波浩蕩鷗書來如覿面香滿藕花洲東山次俞紫微止止堂韻佛法元無法人謀盡過謀說空猶是着領妙更何求徑滑松杉古䆫虚水石幽琤琤鳴鐵裏安處一時休繡觀音酬郢州王知録丹青美人之贈兩絶楚, WYG: ''}
