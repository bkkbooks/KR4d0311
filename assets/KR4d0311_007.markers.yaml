  - {type: variant, offset: 2, length: 0, content: '', WYG: 集巻七宋洪咨䕫撰故事高宗皇帝建炎元年冬十月内侍自京賫内府珠玉二囊來上上投之汴水翌日以諭輔臣黃潛善曰可惜有之不必棄無之不必求上曰太古之世擿玉毁珠小盗不起朕甚慕之庶幾求所以息盗耳臣聞人主一念之動左右承之百辟趨之天下嚮之故好惡之念當謹其㣲蓋此心不能兩用有所重則有所輕愛易流之隂者視尺璧如瓦礫寶難得之賢者視逺物如糞壤徑寸之珠不易齊之四臣連城之璧不奪趙之一士審輕重之義也魯公伐衛齊人來歸衛寶而意不啻足齊伐北燕賂以瑤甕玉櫝遂不克而還此念一為外物所移志消氣沮矣我高宗皇帝紹開中興急欲信大義於天下以内侍所獻投之汴水使左右諸大夫國人皆知志不在小而在大與光武手不執珠玉同意用能收拾人心於渙散之餘振起國勢於頺壞之後後聖所當法也廼者經畧山東九重之上初未嘗有嗜好見於外而當國惟寶玉是狥諸將旁搜巧索争投所好珍竒異玩坌集私第歸附者得以窺其無志於中原而動於惡臣願陛下一懲宿弊而反之凡以珠玉服玩來獻皆碎之通衢以示聖意之所嚮邊臣聞風亦將以功名自勵務為亷白以服豪傑盗賊之心事功可集矣至若中原銅鏹亦不必以輦入内郡為功昔張林告淮閫有云土地歸本朝銅錢安徃識者謂為至論謀國者所當察也晉謝安以荆江二州並缺桓石䖍有沔陽之功慮其驍猛在形勝之地終或難制乃以桓石民為荆州桓伊為中流石䖍為豫州既以三桓據三州彼此無怨各得所任其經逺無競類皆如此臣聞御得其道則天下狙詐咸作使御失其道則天下狙詐咸作敵御之為言以馬喻也譎銜泛駕之馬跅􅕟而難制使王良造父御之則鳴和鸞逐水曲進退伸縮無不如意否則駻不受覊矣謝安之用三桓人徒知其經逺無競而不知駕馭之術黙寓乎其間蓋石䖍趫㨗絶倫既奪之上流而石民與伊非所患兼是時荆江豫三州軍事皆在安都督之下而兵權實操於内此首重則彼尾輕也茍朝廷無以操其權而制其命王彪之所謂兵權萃於一門非深根固蒂之宜安烏得不為之深慮哉知此則知八柄馭臣雖王者有所不敢忽高帝詔曰欲省賦甚今獻未有程吏或多賦以為獻而諸侯王尤多民疾之令諸侯王通侯常以十月朝獻及郡各以其口數率人嵗六十三錢以給獻費武帝制初郡十七且以其故俗治毋賦税南陽漢中以徃各以其地比給初郡而初郡時時殺吏漢發南方吏卒徃誅之費皆仰給大農以均輸調鹽鐵助賦役故能贍之然兵所過縣為以貲給毋乏而已不敢言擅賦法矣臣聞人君有愛民之實意而後有及民之實惠漢世詔書出於人主之筆精神心術之㣲悉於詔見之觀高帝欲省賦甚之語簡嚴明白繼之}
