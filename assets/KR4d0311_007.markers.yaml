  - {type: variant, offset: 38, length: 12, content: 夕輕隂不隔團團月遺俗猶傳, WYG: 年帝親雩初置諫鼓謗木新作聽訟觀二年置博士員四年置周易儀禮公羊博士帝親覧庶獄臣聞物有本末事有終始知所先後則近道矣先者事之所當急後者事之所當}
