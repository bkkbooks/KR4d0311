  - {type: variant, offset: 2, length: 2, content: 庚寅, WYG: 五虛中自損以從在下之賢則為}
  - {type: variant, offset: 5, length: 5, content: 日甲子晴聖, WYG: 吉在益之六二賢者欲致益於上而}
  - {type: 'kr:newline', offset: 9, content: '

      ', id: KR4d0311_krp_007-bkkkrnewl3}
  - {type: line-break, offset: 9, content: '', id: KR4d0311_SBCK_007-1a04}
  - {type: variant, offset: 11, length: 0, content: '', WYG: 之樂受其益未可必也則惟常守正固以待之至王用之以享於帝然後吉有志於治者其可以徒聚天下之賢哉賢者之聚亦豈可徒樂盍簪之盛而不思相與共慰天下之望哉晉}
  - {type: variant, offset: 12, length: 2, content: 命是, WYG: 帝建武}
  - {type: variant, offset: 15, length: 22, content: 正三素雲開甲子晴不識姓名農圃老相逢便與賀升平, WYG: 年置史官立太學太興}
