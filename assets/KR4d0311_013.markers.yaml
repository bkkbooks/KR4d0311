  - {type: variant, offset: 2949, length: 2964, content: 甚盛甚偉司馬公門之有元城崔先生之有執事可以名百丗矣荅葉子真書某疇昔過九芙蓉下知有隱君子之廬在舟駚弗能扣謁迄今不滿珤帖相先陳誼甚髙凛然不敢當兩都盛作雖用班張賦體發我宋之光明究治亂之本末主文而諌國風之遺意也明主冝置一通於座右以爲龜鑑惜無夜誦子虚者雖然得如狗監誦之政恐牙頰汚君賦耳琴書何時過潜山寓舎在臨安道旁弭節賜訪庶滿定交之願切幾紆照荅黄濟叔簡某不聞問又許時東山桃柳觀玉泉笋蕨供未嘗不撫景懷人寵示睡藤深仞愛念養生者枕不欲髙以禇爲則日减一畨其平以漸也前是有惠枕者皆苦髙拜賜獨便衰惰鈞天之想已斷遊仙之夢可㝷老去惟睡熟有味耳與李微之校理書某疇昔祓飾子墨酬先施後山深林宻病嬾相乗賤姓氏無從徹風日不到處斾芙蓉而弄斗柄駕蓮葉而讀玉書殊恨仙凢之隔也伏諗通金閨之籍進紫宸之班上待特舉有禮矣公可以留矣多賀多賀司馬遷史號實録酷吏傳張湯在其中平凖書又謂湯死亡思湯平生大略可睹班固推賢揚善拔之酷吏推賢揚善可進也而煽虐流毒不可泯也讀史至此毎疑班氏以宫掖之故與金張許史不能忘情特曲筆以出之丗未有擿其心者執事以良史材實録以信後丗於遷固必有折衷敢請所以教荅印松巖帖道人出山去山色如死灰更下一轉脚作麽生鷲峯旣能飛來何不飛去曰百動不如一静松巖畢竟何如時印老再住中天笁荅楊平叔知丞簡某正尓寂寂忽來跫然之音於萬里外猿鶴起舞清燈相對澹有餘味哦新詩道舊游恍然置我太白峩眉間而飽之風露也去不待明良用悁結善圃記見屬極仞下采蜀名公巨筆如林何爲乃貴野鶩告更圗之庶不爲江山花竹羞與俞提舉簡某聞抱邁往英特之氣而不伸舒固易成疾湏得慷慨士共談古今盛衰治亂之故南北離合成敗之因奮髯頓足極其痛快以振宣精神否則秀眉清吭緩歌美成小晏得意詞更畨進酒花信風散入骨髓經絡則病自霍然去矣公以爲何如荅何正父簡衲子有修水觀者湛然虚白在前童子投以瓦礫而心爲之痛瓦礫去心即安如𥘉執事得無有隱然未快者乎又有叅黄梅禪者百雜碎還我核子來老夫不復作核子想也荅沈簿餽歳簡某今年至窮無錐可卓老色懽悰相爲消長可柰何風誼不替先春致餉脂賜銀罌柑傳紫帕不復作此夢烹鯉點酥而引大白亦窮臘盛事感甚感甚荅葉子真書三墳書見寄張燈細讀如登無懷赫胥之庭與鴻𪷟汗漫語知易無起止太極無増减特今人自不古耳連山歸蔵方從館中傳抄俟至更當參合以驗所造大比又近俛踏槐黄否篤志古學如此安用追逐時好東塗西抺爲某歳裏殊乏好懷得袁安太丘語不覺興起略此奉報時中彊飯以昌斯文荅髙處州書某毎懷龜緫之冨騶牙之博玉連瑣之竒古金背鏡之明清一代能幾三十年前玉堂䇿天猶教管一樓煙雨耶峯雲留鬰堘水溜潺挾此豐年歸報天子某屏息萬山間不敢以隻字汚人門髙誼絶俗銀鈎寳唾逺訪死生正是北關風雨中送客時節可勝悢然異書如見異人它稱是褁飯問子桑之意何可忘荅魏鶴山書某重午日忽得李校勘書轉示珤帖鈎畫爛然晃漾心目竊知存養深固踐履堅實著書立言超然自得不爲江山風景動揺喜劇而悲如見君子記文録似皆有益丗教不爲徒丈如入清廟觀武庫一名一物皆足以使人起敬畏志定而氣盛也簡州三賢閣記發明著於人心極有味百丗之下猶將聞風興起天目山房𥘉無足道託髙文以不朽遂與廬山山房照映今古講學之方行已之要用丗之大法皆在焉切磋究之愧不獲朝扣夕請何敢以爲過額篆竒古清壯與文稱崔菊坡結字老蒼當禀凂書記二美具矣自有天目無此竒事老人年七十有二菽水蕭然相與安之若命而獨學無友孤陋寡聞求仁入德之本尚幸私淑之荅呉叔永寺丞書某山中人不敢修履端賀頗聞除用衮衮可奪淮南之氣蜀珍何尚遲之叔永四六時出一斑亹亹追逐前輩似聞近頗推擇玉堂揮翰之手欲辭得乎某一斥七年床頭惟有易在百榖草木皆甲拆焦榖不芽亦是天道栽培傾覆之常但願麥熟師休與大千丗界同此太平之樂長安城中燈火笙歌徹暁湖山柳又黄矣過蒙紆念寂寞顓函勞訪鮮醲交委窮悴亦春多感多感又至節小簡新陽方升天機在半夜子之𥘉人事在五更三之後觀復于此作如何薦取偶得雙魚二兎持獻求筌蹄外一轉語莫只道萬物未生時芸生荔挺出矣荅張簿惠白魚帖入夜辱雙玉尺之餉張燈舉酒恨無水晶盤行之媿感媿感荅程宗武書某前辱見過清談殊欵鄙吝之意消矣讀書爲文皆以優游涵泳而得之優游涵泳之功非膠膠擾擾者所能爲也故必主之以静外静其形内静其心危坐沉思始能㑹古人之意於糟粕之外不惟進於文且進於道矣丗有形雖静而心實馳者亦有心欲静而牽於物交物不能静者大約息形而後能収心形且不息心豈能収心不能収學於何有異端之子猶能以觀鼻端白數踵後息爲功吾儒乃不能歛方寸於環堵間顧欲求史記於名山大川如子長是爲大也是自恕也吾子年甚少天資甚髙恃其天資之髙而忘其年之不能以常少濡筆伸𥿄前無古人問其所以尉垂白倚門之望則未免老歳月於奔走吾爲子懼夫君子之於學蔵焉脩焉息焉遊焉藏脩學也息遊亦學也非曰墯肢體以爲息縱耳目以爲遊也藏修之未加而假息遊以自放求夫文之進且不可得况道乎吾子往矣深居而衆籟寂寧極而萬境融以此讀書則書有味以此爲文則文有法以此立身則身有度優游涵泳之功日異而月不同矣若曰吾身雖動吾心未嘗不静當思静在動先可也相愛之深不容不盡情幸勿罪通崔菊坡書某伏自閬州城南下違離之拜整整十年進不能爲公朝趍事赴功以荅所主退不能從師門攷德問業以益所學一不成而萬有餘䘮空老此生然猶不敢自枉者寜以窮故負知已不以通負知已也况今天下逹尊誰出先生之右門人弟子之最親孰如牛馬走造物深意安敢不使同退又同進耶搢紳間謂凢任制閫莫有終譽獨吾菊坡不待躡足之疑便引掉頭之興綽然餘𥙿乆而愈安公孫碩膚德音不瑕考槃在澗碩人之寛詩取碩大爲言蓋其胸中浩乎而淵盎乎而春貧賤冨貴不能移吾之所樂惟先生以之邇來頭風不作酒時進而飯日加天所以壽吾道之脉也某骫骳之藁近綴拾若千首繕録仰塵宗匠郢人運斤成風斵鼻端之堊斵者固難受斵者亦不易告痛賜斤削暇時更告賜一序引以黼黻之使得託之不朽死生榮幸荅毛君玉簡某正坐晝寂而髙軒來氣甚明禮甚度浩乎吞鴟夷五湖於胷中而無西子之累所見過所聞矣金堂石室之勝俟霽同登判作半月期揚鞭索去銳不可留目送征鴻立盡梧桐半軒之影荅呉叔永司封書某比承遣信暴下後勉出勞苦之聞其歸言鬚白容悴不類前時司封甚駭且疑非愛念之深不及此人生能幾寒暑六十到頭如何禁得老色不上面頻年窮阨以少知命而安誼不至以飢渇害其心猶能堅忍待盡於萬山間暇時繙書考觀古人行事體察諸身毎竊笑韓退之不善處窮去國得州未至落寞嗟嗟戚戚日與死迫欲奏薄伎於從官之内紀太山鏤玉牒便作司馬相如垂死時語使其重錮乆窮無覔飽之地又當如何彼宗元禹錫爲冨貴所引如嬰兒之慕乳其不能處貧賤却不足責辱愛念不翅骨肉輙發其狂言幸勿爲不知我者道又荅借書帖某宿拜還誨玩未脫手蠆尾又來閴寥中風誼孰如司封者携酒與魚以借書又是山中一竒事平生只據見在無力殺青數種皆未之収南宫北扉旦夕且出命直湏洗濯舊見以生新意使前無古人叔永肯効獺祭魚耶荅葉子真書某面壁窮山自分老死一且蒙恩入爲禮部郎未浹月忽叨分察之命夢想不到神魂爲飛髙誼絶俗妙灑臨存不作兒女子昵昵賀語而開以象筵第一誼拈槌竪拂喝佛罵祖平生無此伎倆所擉雖非甕中鱉亦直鱉耳憶昔行見寄崛竒警切起敬不暇雪平地尺欲覔訪安道之舟無繇可得擁鼻清吟徒深悁想荅真福州書某疇昔端拜上記後兒曹得從阿戎於日邊獲知時止時行之槩大用尉㥦鳯凰覽德輝而下千仞維日望之聖上遵養時晦之乆剛明奮發風采立變大姦距脫來者始有安脚之地前因奏對嘗陳君子聚則爲泰今自外至者纔一二而大老未來真儒未召否泰之機猶未决私心憂之温陵積蠧之餘不謂費支撑𥙷緝如此陽春有脚又轉而南朝家不過爲潢池未清計國有仁賢則四海赤子莫不奠居奚一方之足慮新元發春或以登延君實爲第一義則, WYG: ''}
