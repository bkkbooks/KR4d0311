  - {type: variant, offset: 2496, length: 452, content: 數月追復秦王㝷改葬汝鄧間兩朝忠厚親睦之仁上通於天今紀元取法其有感於斯乎聖上本心之所發見必於首春自有處分股肱大臣從容開廣使早有定論以慰列聖在天之靈端拱咸平忠厚之脉迓續於無窮矣某備數分察欲舉乙酉封事中語再有陳述退念事關大體必出於宸衷獨斷而後光明俊偉在大臣亦盡將順歸美之道與臺諌有言而後行萬矣因觀布衣諸葛符所上續生意書冒昧敷爲廟堂新元壽國獻伏丐鈞察與張司業宓劄子某少禀適有經德劉齋長見過䄂出上皇帝書録本自言欲解職去退閱所上書殊有直氣學舎累年厄於鉗制今始得伸一喙於可言之日九重樂聞人言大臣不惡人言給舎臺諌而下人言所及聞之亦足以戒今何所忤而欲去耶敢望開諭前廊勿令解職以成朝廷培養士氣作成士風之美伏覬炳照賀游景仁工部書某承𬒳郎潜之除私切賛懌正大明誠謂冝日夕在上左右陳善閉邪以究中庸大學之功青綾入直未足多賀數年來奏議警䇿如執事者有幾吾君不以爲午而除目毎在噤蟬喑馬之先搢紳可知所勸矣論思精切尚盛氣以湏之荅游工部簡伏讀奏篇如喧啾百鳥中之孤鳯如窮隂沍寒中之霹靂如九鼎象物而鑄魑魅罔兩爲之膽栗神悸如大光明鏡當空而懸大魔王無所遯, WYG: 壊證已}
