  - {type: variant, offset: 1118, length: 385, content: 與進文階歴觀大化之更無若微生之幸兹蓋恭遇皇帝陛下惟皇作極觀過知仁謂静者無營臣之静特安於拙而退者不競臣之退乃厄於窮過爲華衮之褒昭示緇衣之好疊䟽新渥一洗舊愆臣敢不懲迷復於前戒冥升於後終身不理磨勘固慙淳熈勸講之官當制封還詞頭尚勉康定代言之職臣無任謝授侍講告表臣某言恭奉告命授臣兼侍講者五花疊組甫塵鼇禁之除六畫專經仍玷虎門之選籲天莫避蹐地靡皇中謝臣竊以太極判而兩儀生聖人出而八卦作取小過取大壯堯舜獨盡其神曰連山曰歸藏夏商參用其灋皆繇汲汲之學能進乾乾之功迨開物成務之教衰而崇德廣業之意泯第資誦說莫究推行武帝尊儒紊通變使民之理太宗慕古昧以蒙養正之方縱得其言何關於治蓋形而上者謂之道必神而明之存乎人恭惟皇帝陛下觀象洗心玩爻盡性悟㤗之内健外順首賢路之宏開鑒蠱之上剛下柔急朝綱之復振有體則斯有用能知而必能行奚俟鯫生尚容蠡測况臣鈎深無得納約有慙朱雲之折充宗僅致忠之辨京房之事延壽靡忘理亂之占, WYG: 書放紛吏並縁為姦利}
