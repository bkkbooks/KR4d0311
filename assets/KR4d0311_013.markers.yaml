  - {type: variant, offset: 7118, length: 313, content: 禄以養偏親或未容遽去則群邪窟穴巨蠧根株明以見飭尚摩厲以湏邇者上諭臺長以隂消潜化可謂天地之量帝王之言然君子之進未盛小人無自消之理此萬目所以顒顒望閤下與二三公之來相與成端平之治也臺諌捄過於已著講讀格非於未形兼官信是確論亦必待其人然後行樂只君子邦家之光某遡風曷勝忱切與余京尹鑄書某仰恃惻怚愛民之素輙有控禀昨因論寛民力事遂及四郡仰給客米三縣民無藏鏹乞除禁米下江之令與免三分見錢聖上視民如傷從善如流聞已蒙報可推君之惠致之民則在大尹欲望主盟嚴與行下遍榜暁示通知使乆後貪吏黷胥母得容轉移之姦牟竝縁之利則家戴上恩人𬒳公賜與江山相爲無窮也前所白楮皮事巳荷矜從田里皷舞謹此且謝且祈伏丐台察通余尚書天錫書某九年坐廢一旦謂來擬時從賔尾矯望班頭攷德問業, WYG: 策適更張}
