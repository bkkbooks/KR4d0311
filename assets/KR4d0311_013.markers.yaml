  - {type: variant, offset: 6268, length: 729, content: 下風鍾皷園林此生絶念矣荅蘇上舎書士君子立於斯丗能處逆以順則無入而不自得猶之水焉瀑於吕梁湍於龍門束於瞿唐灔澦或搏或激或洄或洑或潜或濆所遇之勢不能皆如長江大河一放千里之爲快而其順則自若此習坎之險所以維心亨也足下得罪之𥘉士友過者皆扼腕裂眥以相告非其罪明矣非其罪而處非其地境之逆也聖賢觀人不觀其處順而觀其處逆貧賤則不去患難則傃行空乏其身行拂亂其所爲則以之動心忍性其中休休焉安乎天而進乎道也某於足下無一日之雅賜之書如乆要誦數過喜其無怨懟之辭舂陵論著誦之半月喜其在貧賤患難空乏拂亂之中而有以養其心信其善處逆也易窮則變故否終有喜困終終吉剥終得輿如足下之學之文天豈終厄之哉占報草草伏惟亮察荅禮滅翁帖承教帖獲知新正領衆安隱甚尉湖山作春雪供草木玉立聽說法這一句直是難道更湏教衲子門嚼着冷冰冰地應心方好回蔣祕書伏審入趍中祕候對外朝養齊明之誠以動凝嚴之聽造請可略也劄翰戒暁仰仞謙光進昌其言用鬯所學不勝區區之望切覬台察荅淮東趙帥葵書某恭諗張碧油之幢眡黄金之印淮海澄晏青齊震驚慶愜慶愜張忠定在蜀五年工夫只一信字某官雍容籌邊慷慨敵愾淮民之不淪於左祍皆一手拯拔之力威名惠利草木亦孚今又撫甘棠婆娑之䕃而封植之足食足兵而民信冝無難者衮衮未皇上記以賀首𬒳珍蹟鈎畫淋漓猶帶平山堂之雲氣尉浣以還恨不獲從公于邁周旋樽爼細聽堂前楊柳之詞一洗磊砢寵示榜文切中兵民之害還浮鹽通竹木規摹整暇懦志爲起邊風不動以湏暇之日而圗堅乆之功北顧寛矣荅袁守甫書某投閑時士友自番江來爲言新刱書院甚盛教刑合爲一其淑人心甚大拳拳歸敬遂因名山四大字之賜附記以自通浮湛不足計也九年擯廢一旦推出失身閙籃眞是窘事馬伏波謂聞人過如聞父母之名今乃盻盻然揣量長短指摘是非用心雖公亦壞心術朝夕凛凛抱負乗之懼而眞貳卿書來告之以當徐徐開導母遽激烈以養, WYG: ''}
