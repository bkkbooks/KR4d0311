  - {type: variant, offset: 2441, length: 0, content: '', WYG: 事匪徒馭貴抑以教婣勉循制節之規宜畧撝謙之牘所辭宜不允魏了翁再辭免依舊端明殿學士除簽書樞宻院事令疾速赴行在奏事恩命不允詔兵難隃度則倍道而疾征事有宻奏則乗傳而趣入王事靡盬所以不遑啓處也國朝儒而知兵莫加於范仲淹出經畧西事久之未獲要領而占爲副樞定廟謨於殿陛之間震天聲於靈夏之表卒柔服之卿腹有萬甲名齊一韓廼者視師之行恊比諸閫拊循三軍有關疆事既得以直達朕聽今又以所目擊還歸坐籌折箠笞之好音懐之吾有以待敵矣恢台之交風日未烈}
  - {type: page-break, offset: 2441, content: '', id: KR4d0311_WYG_013-7a, image: WYG1175/WYG1175-0207a.png}
  - {type: variant, offset: 2442, length: 1, content: 原, WYG: 遄驅以慰渴佇所辭宜不允不得再爲陳請皇叔祖少傅保寧軍節度使充萬夀觀使嗣秀王師彌生日詔十一月十七生新陽踰節恊氣先春生一代之宗英爲兩朝之國老眷隆列棘㤙賁垂蓬備牢餼以陳儀茂燕頥而介夀同知樞宻院事鄭性之生日詔小寒届節峻岳儲神應昌運以生賢幹洪樞而贊治特隆眷遇肇錫餼牽介黄髪之脩齡侈緇衣之篤好永寧郡王楊石生日詔紀鳳標春将臨銘栢傳龜毓瑞先慶垂蓬豐好賜於周官洽燕私於漢戚祗予寵眷介爾耆靈光禄大夫右丞相兼樞宻院使鄭清之再辭免特進左丞相兼樞宻使㤙命不允詔元愷並舉而百揆宅之司空公孤俱立而六典掌之冢宰大厦}
