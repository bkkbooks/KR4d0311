  - {type: line-break, offset: 7580, content: '', id: KR4d0311_SBCK_013-21b05}
  - {type: variant, offset: 7582, length: 512, content: 遇深告時時警䇿開迪之荅趙淮東書某洊拜珍帖之辱謙光爛然病睫開明寵報漣水已還版圗之舊不折半㦸坐収全功以嚴淮堧之屏蔽視窮力以堰瓦梁利害相萬前此有言屯田者某毎謂屯於外壤而不爲盗資屯於内地而不奪民有然後可爲經乆之利漣水間田不可以頃畒計果能因其人力使自守自耕旣不爲盗資又不奪民有積粟強兵隱然金湯之固自治之上䇿也前時但知移吾粟以養左祍故終於無成爲國謀長正倚忠略規模審重乃見良圗某曷勝欽嚮之至荅眞福帥書某備貟分察兩月間凢十二䟽其論事一則中書積弊二求言求賢三講學急務四乞施行同列論䟽五寛民力論人之䟽首薛次袁又其次中外十餘輩而已外間所傳人數甚多皆非事實所陳亦未有不行但行之不盡如所乞尓上嘗諭臺長得放過且放過使之隂消潜化此天地之量也然君子道長則小人道消進君子不勇小人無自消之理此中外所以顒顒望公之來公果來天下何患不泰前日講學䟽中首及兄弟之好又以公劄與廟堂言之意猶有待末及邊臣生事異日憂端恐在此兹拜珤汗之辱蒙以静定和平爲然静定易揺於喜功和平之過易入於弱又湏得舒卷闔闢之權可也閩中想不至如泉南費力欲作三五年規摹公計甚得天下計則未也去非筆力敏健且記得人物本末甚冨駑良不齊物論莫揜少焉湏謝去尚惟以主盟國是爲心隨事警起惴志使不爲公朝羞察官例以上下半年檢三省, WYG: ''}
