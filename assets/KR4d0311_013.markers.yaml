  - {type: variant, offset: 1581, length: 0, content: '', WYG: 李鳴復辭免除權刑部尚書日下供職兼職並依舊恩命不允詔朕惟舜命九官垂作共工臯陶作士皆終其身不易後世必逓遷熟試以觀通材卿為棘卿有明清之風則峻縂一臺為臺端有直亮之操則超躋八座為起部有簡静之譽則併攝天官知卿深故進卿亟也然經逺猶者貴事功之詳歴圖大任者在望實之積孚兹由五雉之華趣典爽鳩之重擢無虚月意盖有在卿以因人序升而辭過矣其思式敬爾由獄以長我王國所辭宜不允中奉大夫寳文閣待制}
