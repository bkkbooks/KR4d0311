  - {type: variant, offset: 1604, length: 1, content: 院, WYG: 知静江府廣西經畧安撫恩命不允詔朕待臣下無中外之間以久不見卿詔自姑熟賜對於便朝議論平實可見於行良用嘉奨攝長起曹詔墨猶濕而嘖言已至憮然不得而私也廼眷桂管為管右都㑹有江山之勝無瘴厲之虐峻直西清往顓牧御過家上冡行道謂榮豈若季布徒以一毁譽為進退哉勉敷德意使海蜑山獠人懐其生則予以懌所辭不允朝議大夫權尚書兵部侍郎四川安撫制置使趙彦呐乞速加汰斥不允詔西南六十州倚天險以為固卿老於邊籌控仙源之險以挫賊鋒功與馬服光據北山等朕既下詔奨勞矣而爾子洸夫又能獮潰旅以紓心腹之憂威名既立賊雖狼貪無厭羝觸未已獨不忌吾老羆之當道耶進卿武部之貳且官厥子於朝其體有功見知之意益堅授任危難之圖收合散亡謹固封守使全蜀以寧毋過爲引咎以自餒其氣也所請宜不允朝議大夫試尚書工部侍郎㳂江制置使}
