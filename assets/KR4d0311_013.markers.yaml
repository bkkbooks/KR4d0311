  - {type: variant, offset: 172, length: 747, content: 出守靖惟忝冒倍切凌兢兹蓋恭遇皇帝陛下立賢無方用人惟已格帝若伊陟臣扈内尊朝廷治民則黄霸翁歸外布郡國况在坤維之表欲如天陛之前遂使譾材亦叨煩使臣誓鞭駑駕仰荅鴻私七百里山髙谷深首嚴保鄣二千石政平訟理共樂耕桑臣無任謝暦日表運承天統益綿卜丗之休暦授人時特重歸竒之閏民生知勸吏績用熈中謝恭惟皇帝陛下紹開中興昭受上帝齊璿璣之政旦復旦而有常推神筴之元朔又朔而不息爰謹日官之課仍新月令之頒臣猥戍龍門恪循鳯紀刀耕火種俾陶一氣之春椎髻卉裳同樂三登之俗臣無任瑞慶聖節賀表日宣重光乆啓升平之運龍成五色仍摽震夙之辰懽動幅貟和薫宇宙中賀恭惟皇帝陛下天大亦大日新又新丗祖之三十年寖格清明之治武王之八百國迄成耆定之勲屬電樞之發祥冝旗翼之齊壽臣涪江領戍嵩嶽傳呼十月未央阻効稱觴之慶千秋華蕚願輸獻鑑之忠臣無任功德䟽赤龍紀瑞聖人間生白狼獻詩天下同慶輙裒衆妙之果仰介無疆之休皇帝陛下共願福禄萬年本支百丗日所照露所墜盡復輿圗天以清地以寧永隆磐石謝授中書舎人告仍賜紫章服表臣某言恭奉告命授臣中書舎人仍賜紫章服者南臺執法方虞妄發之愆西掖代言忽冒眞除之寵恩深語塞感激涕零中謝臣竊觀元祐之𥘉欲救熈寧之弊御史則劉摰傅堯俞王巖叟諌官則孫覺鮮于侁朱光庭給事中則純仁知制誥則蘇軾維當今之更化冝視昔之得人伏念某學術踈文氣卑沮無欲不欲蚤嘗慕於前賢時行則行晚始遭於上聖甫玷粉闈之直趣陞烏府之班知可爲於忠言期不負於所學莧陸夬夬去惡草以未能莠田驕驕護良苗而徒切坐需汰斥誤𬒳褒遷踰旬觀象之門即日紫微之閣移抨彈於封駁固脉絡之相關加修飾於討論柰精神之巳奪戴天坱圠控地凌兢兹蓋恭遇皇帝陛下煥文惟堯好善如禹謂臣九年之謫困何意於求升念臣一日之逢否不期而返㤗俾効操觚之技驟參簮筆之聮進之史職則望溢於元超錫之命服則事同於李絳便蕃君寵洋溢親懽臣敢不砥礪夙心研磨素習雷一動而皆奮勉揚更化, WYG: 堅壁細栁}
