  - {type: variant, offset: 3594, length: 3306, content: 通崔安撫啓捧研從游乆綴門人之列分弓庀役就充幕吏之貟天巧其逢人榮所託竊以小范之帥環慶舉張方平大蘇之牧中山進李端叔兩公辟士之盛事百丗知人之美談不圗晚生親見前輩恭惟某官光明而亮偉端重而沉深望之儼乎道德之容挹之薫然仁義之澤驅千兵萬馬於筆下風雨恬霽而無聲吞五湖三江於胷中波濤舂撞而不動剸兕麻源之右掣鯨桂海之南清畏人知静忘物競其去也諸公挽留而莫可其歸也四輩趣召而後來甫躋郎省之華亟填戎垣之重秋風保障威行萬竈之煙春日耕桑驩動一犂之雨淮南倚以爲脉山東聞而屬心况狐兎失穴之餘正貔貅扼塞之日人皆輕進公獨隱憂謂中原機㑹之方來而外治規摹之未立灞上棘門如兒戯耳尚遺債帥之風方城漢水雖衆用之未免市人之戰要湏彊國勢於精神之表乃可制虜命於掌股之間反覆開陳庶幾感悟彼竪儒幾敗乃事徒諉諸一勝一負之常此元老克壯其猶必運以萬舉萬全之略寧少遲於遄召庸迄奏於膚公坐縳可汗盡還輿地某四年食客三丗夙縁濟慈航於黒風大海之中送靈槎於黄河昆侖之上烏幕濫巾於温石兎園接𬒮於鄒枚誓上下以相隨抑東西而惟命誦蕪城之賦熟形勢於曽來續泗水之碑寄功名於不朽矢心歸倚拜手敷陳謝崔安撫舉改官啓子來幾日甫爾依紅我有二天居然破白惟屹立於丗方横潰之表故力挈於人不比數之中抒敬瓣香歸恩丈席竊以人材由江左而降幕客在淮南爲多韓魏公得王金陵而不及賞音牛竒章辟杜書記而未嘗推轂遂令遺憾尚見前聞伏念某讀書不多渉道更淺方其始銳自謂五石瓠可剖以爲樽迨此中艱乃知六州鐵猶鑄不成錯以舟行岸移而閱丗變以霜降水落而觀物情虚憍寖平剥蝕漸復冨貴非吾願未敢云然貧賤玉汝成容或有此然紛紛成敗之異論而咄咄炎凉之易情不圗一日之逢遂有終身之託拔從食客列在屬僚歳寒東閤之梅結根已舊春色平山之柳成䕃方新廣平下坐而揖之前相如末至而進諸右使無地主誰破天荒兹蓋伏遇某官功蓋三邊眼髙四海論材以相馬之法觀過於奪牛之蹊得一士於河南了無貴戚之命空群良於洛北惟有山人之媒共驚甄拔之殊誰識機契之早五更進履已是㑹心半夜傳衣不容放手故於落落難合之㑹而有沾沾自喜之榮上下四方盡是依劉之地始終一節敢忘在莒之時銜戴寔深編摩抑略謝丘安撫舉改官啓從莫府之游甫當春後上公車之薦忽在秋先軒軒特逹之知落落希闊之遇得之驚躍傳者信疑竊以槖駞種樹以蚤實爲功狙翁賦芧以朝得而喜伊物理之猶爾豈人情之不然矧墮七選之坑欲結五剡之塔寧爲雞口母跋狼胡必考素以點頭始探期而入手如某者有婞直之短無趍和之長肝膽輪囷據鞍之髀易滿頭顱蕭颯讀書之眼尚明不能忍藜莧之飢漫欲決枋榆之起勉辭襏襫來拂兠鍪多以白面書生而見嗤獨得紫髯將軍而許可樂哉飛泳藉甚推揚着鞭要使出祖逖之先成佛肯教在靈運之後未回沆碭預借扶揺兹蓋伏遇某官親得南軒之傳丗濟文定之美非有心於冨貴而冨貴自迫不求名於氣節而氣節更髙脫彼少年新進之埸運此真儒無敵之略識微見逺常懷猛虎出柙之憂彊本折衝自有老羆當道之勢至若虚以接物而謙以下士明於見善而勇於抜材又當路諸公之所難實舉丗善類之攸屬矧在晩出亶爲至榮本無疇昔之縁便蒙刮眼不負平生之學即是酬恩百喙可窮寸襟莫冩賀侍御啓榻前承渥柱裏升班物情大旱之餘適蘇霖雨天象太微之次首應法星九重侈知人之明四海享任賢之福竊以兩儀具清明廣大之體萬物鍾扶輿磅礴之靈得其中和者爲景星爲鳯凰全其剛正者爲屈軼爲獬豸况千古之間氣生一朝之偉人如伯夷聖之清如孟軻勇於義用能任天子耳目之寄于以壽皇家氣脉之傳恭惟某官歩趍聖賢冠佩道德旁蹊捷徑不求少室之山絶岸孤峯坐閱瞿唐之浪顧環轍之乆矣終覽輝而下之簮筆烏臺伏蒲騎省上不爲危言而駭聽下不爲矯節以沽名惟致辨於君子小人之間而防微於宦官女子之際外邪不入元氣自充以培社稷無疆之休以兆國家中興之象深締邃嚴之眷進顓雄劇之權堂堂不撓爲儒宗謀猷惟舊行行且止避御史風采又新然而一論列關吾道之盛衰一建明係斯民之休戚時雖無闕事或可言士夫懷寡㢘鮮耻之風將帥乏趍事赴功之志戰守之規摹靡定賞罰之綱紀未張斜封尚費於調停横歛更多於朘剥惟正人用則國勢重於黄鍾九鼎惟公道行則人心安於泰山四維此皆前日之已言抑亦于今之最急願申谹議迄濟丕平當今文靖之警君復聞于丗母使清獻之論事專美於前狂斐一鳴隕越萬坐謝李坡舉自代并應詔啓草正元之諌䟽旣許同升應建武之詔書又蒙特舉人驚再推轂於朞月之頃誰信屢擊節於十年之前撫往事以慨然幸平生之有此伏念某灌畦自命媚竈不能忽起市虎無端之疑遂罹蹊牛巳甚之禍丹心獨破疇能百口保之白髮相看寧忍一家哭矣已甘墮地之棄甑不謂中流之得壷剪𥿄而招驚魂探囊而起壊證雖乏洛北山人之譽亦備淮南幕客之貟憐抱影之零丁爲騰書之旁午六鰲連掣五鶚齊飛它人不足而我有餘大造已多而公未倦讓䕫壤龍而讓朱虎誠過乎謙進豹進鮒而進樂羊抑何其力所謂真知已者夫豈輕予人哉兹蓋伏遇某官地望如山門庭似水萬斛轉柁運平國論之偏五色𥙷裳彌縫君德之闕其正足以用大其公足以生明去小人如去稂莠不厭其芟夷愛君子如愛𣏌梓寧過於封殖引蔡襄而居同列有言必酬薦唐介而處要官弗進不已爰得魚而取掌仍騎鶴以纏腰曷勝自喜之情猶有無厭之請苦心選佛固慙衣鉢之傳凢骨登僊更乞刀圭之賜寸忱有屬尺禇奚殫謝制使李尚書舉改官啓謁裴度於洄曲之營最居人後拔杜牧於淮南之幕忽處衆先得之擊地而驚恍若從天而下竊㠯前輩所謂汲引孤寒之綆近丗以爲攀結權要之梯倚冰山爲太山延頸待囑指䑕璞謂荆璞拱手奉歸名爲蓄吾家之參苓實則種它人之桃李自喜得計烏知可羞若其點頭堂下之一言具眼坐中之小異幾年無此一日見之如某者材非竒竒老已冉冉方虚憍恃氣安知涪翁四句偈之有功迨拂亂動心始信􅱼山三字箴之得力眇鴻毛其自命蕞雞肋以何求朅來刀斗之郷偶備櫜鞬之役旣不能磨盾以草檄又不能推枰而畫籌第於内外臂指之拘攣與夫上下精神之消靡多所感觸爲之隱憂顧國事以如斯於身謀而何有炎門耻炙捷徑甘賖道之將行歟但居易以俟命人莫我知也欲忍窮而著書不圗負壑之秋乃有回瀾之力未齊五鶚先獲一麟固非曹劉沈謝模索以可知且無金張許史游揚而爲助逈出望表猥塵選中兹蓋伏遇某官翰墨大蘇威名小范黄髮鯢齒入奉壽母之懽織文鳥章出寛聖主之顧以忠孝兩全之懿用文武兼資之材號召青齊指麾燕薊已斷匈奴之臂行􅃮月氏之頭與共功名孰非豪傑乃至嘘一寒之谷欲使脫七選之坑以勸着鞭以愧刓印偉此舉之尤特信所關之匪輕某敢不敬佩十六字之襃期荅二三䇿之取丸藥生翼𥘉匪求而得之瓣香報恩當有大於此者卷卷衘戴切切敷敶謝權帥洪提刑薦啓騎楊州之鶴正切夢思冠楚人之猴忽叨論薦嗟丗道之寖薄幸宗盟之有歸竊㠯絲苓同生於松而絲託苓爲根蕖荷皆出於藕而蕖倚荷爲䕃惟鼻祖源流之無閒故耳孫枝榦之相依伏念某少耕潜山壯宦鄱水訪盤洲之事業正印難傳誦野處之文章餘燈可續柰九京之不作竟千里之空還昔期芳菲菲而彌章今歎景翳翳其將暮不圗州牧出我丗家蔚乎相扶日有川泳雲飛之樂劃然長嘯時窺山鳴谷應之機胡人事之方乖曽身謀之靡定㠶隨風引舟挾岸移長鋏自隨勃窣兠牟之厎短檠相對凄凉刁斗之邊皇華不隔於照臨吉語忽傳於吹送一鳬巳去五鳯俱飛雖狄武襄之譜梁公大非吾耦然吕文穆之舉夷簡豈無它人出於真情有此竒事兹蓋伏遇某官噐能管樂苗裔韋平材恢恢乎辦多身矯矯其立獨山韞玉而自潤粹然有道之容水中凖則不争澹乎無我之意扶立故家之喬木挽回末俗之頽波涕唾熱宫金玉寒畯謂族姓如晨星之有幾况主賔與春風而俱和置冗蹟於四賢借華襃於一字俾懋所學用昌斯文白髮聲名媿難齊於二陸青雲歩武尚自附於三洪深感于中姑陳其槩謝賈制置特薦啓小單于之膽落方集竒謀大都督之眼髙首薦下士試新刻黄金之印署獨銜碧玉之章同日驩傳一時盛事伏念某萬無能役一不敢欺滿架挿書自矜鄴侯之冨舉家食粥誰念魯公之貧風霜不貸而枝葉凋歳月已老而根榦在往來塞下出入兵間車轔轔馬蕭蕭毎痛心於浪戰田确确牛㕰㕰更攬涕於煩輸兩年之賞識固多一旦之遭逢九異蟻隨磨轉鴈逐陽飛趨幕折腰甫識少陵之面上堂携手已知􅎦蔑之心聽說劔於酒邊許推枰於燈下良由機契遂以名聞兹蓋恭遇某官貫穿古今揮斥宇宙望長安於灞岸一生忠義之心進雍丘於淮隂百戰功名之㑹用紹興分道之典故施慶暦定邊之規摹旣綏靖於山東且經營於河北築臺延士思得良籌推轂進賢不遺餘力爰俾摧頽之下走亦蒙特達之殊知念圖報之無它惟納忠之有益虎兕出於柙曩甞失於防閑蛇龍放之菹今盍思於區處勢必知已而又知彼權當在我而毋在人御衆莫若寛平制敵無如審重財散則民乃聚食足則兵自強此皆巳見於施行務在更加於推廣大孚衆望弘濟中興繪像雲臺不媿膠東之傳磨崖浯水願書元結之碑觸突有誅震愓退聽, WYG: ''}
