  - {type: variant, offset: 9, length: 1, content: 外, WYG: 宋洪咨䕫撰青詞萬夀觀純福殿開啟甲子本命道場青詞玉厯紹休猥次周星之歲金行紀閏適臨元命之辰祗祓瑶壇具宣瓊籙伏願真遊濳格景貺旁流九扈有秋陶人心於和樂三邊無警鞏國勢於奠安朱表孟秋月閏先甲命元肅延真馭之臨仰控忱􅇆之禱上銷咎證下鎮危情格丕乂於萬方儲鴻休於百世太一宫祈晴醮青詞西成應兊南畝占豐熏心滛雨之憂拜首叢霄之禱伏願飈斿濳格曦馭昭升凡陶玉燭之和俱燕金穣之慶永祐陵下宫顯恭皇后殿神帳後壁山墻坍損修整畢告遷神御還殿表文奠幄栢宫靈斿夙御繕垣椒寢僊仗嘗移屹鳩僝之告功儼燕寧之復次孟冬朝獻祝香文伏願乾文循軌㤗道迓衡愛日薰和民遂熈恬之樂朔方絶警軍無暴露之憂昭德崇勳閣安奉太師趙汝愚貌像祝文維姬有旦維宋有公斷鰲奠極賔日升穹歲閲周星祀登崇功諏禮曲臺妥靈肖容肩摩前哲凌烟嫓隆祭告功臣二十三人祝文容臺丹青森拱星弁有虛其席惟人是踐相我前寧磐宗碩彦訊良告䖍爼豆羣獻甲子本命青詞氣轉一陽甫應初躔之紀辰開六甲首逢端命之元祗演雲籖仰延飈駕伏願天光下濟帝况博臨夀域四方永底寧民之意金城萬里亟收却敵之功滿散朱表序屆初陽辰臨元命宣演沖科之祕導迎善氣之新鶴唳風聲奉天威而}
