  - {type: variant, offset: 194, length: 1871, content: 不輕於售挽莫能致迨攬大政幡然肯來敷經氊厦吮墨螭首朕方傾意郷之非仲舒不遇比也卧疾念歸姑以論譔殿輔藩勿藥且召矣可姚珤除直祕閣權知建寧府制勑具官某冨沙軍情屢揺頃爲甚官治民廬半委烈燼朕念之怛然故選孰知德意者爲守寓直中祕以榮其行爾名在文學之科而議論鏘發志氣英邁丞于麟臺郎于憲部與聞廟筭於宥府聲問日起詎冝輕去一方病矣勉爲朕往廉平以字民簡静以馭軍百廢具舉而聲色不動以表列城是爲稱選可何炳除集英殿修撰知江州制勑長江上下護風寒非一處潯陽西挹武昌東引京口自晉以來爲重鎮故輟從臣臨之具官某以撥煩之材致逺之識嘗建臺閫于上流厥績用茂晩登從塗齒宿而氣不衰升華論譔往控天險酌保鄣繭絲之計嚴綢繆牖户之圗江波不驚廬阜屹峙尚可登庾亮之樓而銷憂也可國子監書庫兼皇后宅教授徐雄除國子録制勑具官某虞周有胄子國子之教漢有四姓小侯之學朕參用之以作人爾講習克勤圭角不露方授經隂馬之家遂分録成均之政師道行焉茂哉思其所以爲人師可陳大樸平黎蠻賞轉儒林郎制勑具官某黎蠻千紀海邦繹騷爾宻賛守臣設謀致討論功冝賞爰進一階漢水之陽益勤警邏可張綽平蠻督餫賞轉儒林郎制勑具官某黎蠻干紀海邦繹騷維時守臣亟致討定爾服官黄綬督餫良勞示勸一階益勤警邏可趙善瀚知岳州制勑具官某岳陽處粤蜀荆楚之㑹呉晉皆爲重鎮以魯肅陶侃爲之守爾氣盛於權竒材優於盤錯傑傑然公族之頴繁弱櫜藏人所共惜起馮熊軾揖肅侃於千古之上可無薄洞庭而羞君山也維彼澤國民生孔艱悉力拊循毋失休譽我有好爵將於爾乎進之可黄朴改差知泉州制勑具官某奉親而守便郡搢紳之至榮爾學問昭融議論激壯以倫魁雅望昌文聲於朝而料戎情商國勢類出人意表識者以方面之材期之甫懷呉興之綬隨綰温陵之組去家壓境能幾何舎板輿親御如行户庭父老相與榮豔於道周且喜色相告曰仁孝同源孝於親必仁於民凋瘵其甦乎可塗顯行知崇慶府制勑具官某蜀在萬里外朕於人物之賢否難隃度而耳目惟制閫之寄爾之公廉律已豈弟愛民彦呐爲朕言之觀逺臣以其所主唐安一麾不汝吝也政平訟理圗稱厥舉謹勿以去朝廷爲邈可厲模楮綱賞轉朝請大夫制勑具官某幣行於東南而取楮於蜀精實緻宻僞難以亂眞也爾抱材敏銳將漕井絡歳發楮綱適應賞令其升一級庸勸奉公可權工部侍郎徐僑除集英殿修撰提舉佑神觀兼侍讀制勑勞侍從之事願去承明考仁聖之風勉留廣厦雖優老之令典實崇儒之盛心具官某志操孤髙問學淳古詠歸沂水之上丗果何求作興北海之濵時然後出有嘉耆艾寘在清華守益固而眷益隆進愈峻而辭愈力兹領祠於闕下仍勸讀於禁中以體貌大臣之舊規爲尊寵髙年之特禮更陞論譔不替纂修行葦之養老乞言亦孔厚矣大學之致知格物尚茂明之可黄堮知肇慶府制勑具官某朕惟民生之不易吏治之不良雖斗壘未嘗輕卑矧名藩乎爾承元祐故家之傳材優而氣壯自著勞於試邑即振譽於登畿僅爾小休倐焉復起爲遐嶠之民擇守也潰旅未殄地迫髙要往疾其驅亟圗按堵可丁曄除直寶謨閣淮東路轉運判官制勑具官某王良造父之御鳴和鸞逐水曲無不中節人與馬相習也爾氣明而敏材通而偉屏翰澄清之最荐著於淮左物情地利習之乆矣兹還寶奎之直俾膺飛輓之寄咨諏貴廣積貯貴豐往究乃心用圗厥績以寛我東顧可魏了翁除權禮部尚書兼直學士院兼侍讀制勑秩宗之典三禮虞凝垂拱之功春官之掌九儀周格盈成之治繄制作之自古必推行之在人進我鴻儒膺兹妙選具官某氣以志爲帥學以經爲宗賈誼六太息之書洞逹國體魏證十不終之䟽仰當帝心梧桐方挺於朝陽兼葭已颯於白露逆處以順樂忘其憂務著書而立言期精義以致用緑竹猗猗而瞻彼奥毎興磨切之思白駒皎皎而奎之直俾膺飛輓之寄咨諏貴廣積貯貴豐往究乃心用圗厥績以寛我東顧可魏了翁除權禮部尚書兼直學士院兼侍讀制勑秩宗之典三禮虞凝垂拱之功春官之掌九儀周格盈成之治繄制作之自古必推行之在人進我鴻儒膺兹妙選具官某氣以志爲帥學以經爲宗賈誼六太息之書洞逹國體魏證十不終之䟽仰當帝心梧桐方挺於朝陽兼葭已颯於白露逆處以順樂忘其憂務著書而立言期精義以致用緑竹猗猗而瞻彼奥毎興磨切之思白駒皎皎而食我苗徒起縶維之歎適中朝之更始俾外服之遄歸睠百王之典寖微而一代之防多闕匪究定民之本曷爲經丗之方漢僅草儀猶折武夫之氣魯惟秉禮卒回彊國之謀爾熟講乎后倉之九篇深稽乎姬公之六典未入趨於宣室趣攝長於容臺仍摛盤誥之文更勸索丘之讀登崇伊始簡注良深吏士之見官儀正頼濟時之略公卿之明王制毋忘致主之規可叅知政事曽從龍除知樞宻院事加食邑實封仍兼叅知政事制勑聖賢相維而致升平莫重弼諧之寄文武兼資而有智略尤嚴宥宻之圗廼睠譽髦洊參大政進筦五兵之重用培九鼎之尊倚成匪輕作命惟允具官某學該乎今古識貫乎天人長江大河不足以喻其量之深太山喬嶽不足以言其噐之重夙擅倫魁之望嘗陪近輔之聮仲舒見嫉孫洪不少安於朝廷之上李泌出避元氏寧退處乎畎畒之間旣屢最於价藩爰趣還於政路屬逢, WYG: ''}
