  - {type: variant, offset: 78, length: 105, content: 後京口爲江淮襟喉升班論譔起家出鎮識老氣定而政平軍民之福也暇日登北固而長望慷慨擊楫聞風作興斯稱予蓄材待事之意可蔣重珍除集英殿修撰知安吉州制勑具官某董仲舒冝在漢廷而出相教令國中所居輙治志在及物無中外之間爾以奥學閎識, WYG: 音上}
