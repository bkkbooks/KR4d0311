  - {type: variant, offset: 6282, length: 0, content: '', WYG: 中興兆赤符節摽千歲厯氣協五時圖又雨足秧分甽風清麥弄岐聖心涵水鏡即是太平基又明進離方午柔生遇已隂妙參三聖易理測兩儀心七言三首緝熈虛敞薰颸細清燕深明晝晷長大學中庸繙詠久金猊幾度手添香又登進英才追慶厯開延正論踵咸平朝廷有道長如此拜賜宫衣信是榮又王師一舉下河東好定規摹繼伐功入眼宫槐宜夏日轉頭關栁易秋風貴妃閤五言二首珮襲芳蘭碧釵明寳篆紅深宫三十六同被二南風又萱長宜男草榴開結子花歡聲喧令節慶事屬天家七言三首綺䟽浸影槐龍轉繡户浮香艾虎垂硯冷玉蜍金井水手抄警戒愛君詩又裁成寳月翻宫扇織就祥雲製御衣朝賀歸來無㸃暑坐㸔燕子引雛飛又穿蓮漏水金鋪邃雪藕衣輕玉殿凉好把毋邪毋不敬細挑綵字夀君王端平三年春帖子詞皇帝閤五言三首龡鳯東風轉携龍北斗回人間遒振鐸天上獸樽開又氷天寒雪餞暘谷齊華賔生意乾坤滿宸襟一㸃春又寛大朝廷詔中和郡國詩欲求躋慶厯先使見淳熈七言三首喚仗紫宸披曉靄退朝清宴坐晴霏簡編有味鑪香永鈴索無聲漏箭稀又東風送喜上天顔吉語飛来井軫間榆塞雪消鳴鏑静栁營月暖撃刁閑又麥苗培秀臘前雪稻種浸芽春後晴野老田夫觀治象便從新歳賀昇平皇后閤五言二首太液輕澌泮温明霽日融菜流芳荇碧花頌瑞椒紅又甲觀韶光集禖壇好語傳思齊男慶百假樂子宜千七言三首塗山隂贊夏王化媯汭宻嫓虞帝仁保合太和無間斷際天蟠地一般春又關雎風化冠周南次第桃夭及葛覃農事未興先獻種女紅方起又親蠶又殷雷金鑰千門邃斜月璇題六寝深禁栁䕶寒烟未起求衣已獻晚朝箴貴妃閤五言二首梅試催籹粉蘭披入夢香迎春占北斗受福拜東皇又象應軒龍次恩承帝座光燕壇風澹蕩蠶舘日舒長七言三首春透蓬莱碧玉壺晴忩恭侍寳奎敷從容玩畫家人卦取次題箴列女圖又鳷鵲雪殘籠霽景鵁鶄波暖颺紋漪宫中不用催行樂草木羣生各自熈又萬年枝上綵綴緑千葉花頭酥㸃紅鏡綬嚢絲相映燭探先半月慶流虹古今詩東山金堂石室舊徜徉被髮依然下大荒風送嬋娟花落蘂雲移縹緲濕踈篁桓伊筝外深情酒幼度碁邊定力香萬事古今開闔眼樓頭吹面水風凉東山即事西風巻宿祲天高近重陽門虚自沆瀣塔静能琅璫幽花多素英穠香奪春芳草木未黃落繁隂留夏凉棋雋决漢楚杯壯迷彭殤醉㡌信孟嘉歸鞭忘葛彊萬事貴適意誰能扣蒼蒼東山塔院春暮太皥明朝禪祝融杖藜能送幾東風兩崖蘿蔓因依緑一樹桐花自在紅聒聒竊脂農即事喈喈摶黍女趨功細思舉世誰閑得一咲浮圖倒影中又絶句折屐棊邊情易矯捋鬚筝畔淚難禁何如拍手招元放玉室金堂深更深三休亭亭在玲瓏山九折岩之南出郭暄欲暑渉林清自秋歩隨目力高身與山氣浮飛来辛夷花拾得蓮葉舟一聲提壺盧四顧叢薄幽詰屈九曲屏突兀十二樓泉流澗級峻雲起樹隂稠左摩紫髯兕右拂蒼鱗虬上呼笙簫侣下瞰錦繡洲太極浩初判此山欎相繆幾人記曾来老苔蝕雕鎪玲瓏聽我歌歌徹玲瓏愁有酒且湑我羲娥雪人頭丁東泉渇烏滴盡三更雨鐡鳯敲寒六月風湯餅困来茶未熟為師摇夢作丁東招隐辭雲氣歛兮天目之巔濤江綫橫兮海門濺濺扶桑子半兮陽烏翩翩可俯而掬兮咽}
