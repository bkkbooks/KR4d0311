  - {type: variant, offset: 6283, length: 3, content: 示㑹歸, WYG: 天井無聲}
  - {type: variant, offset: 6287, length: 5, content: 方尤拂膺於, WYG: 泉子其隐乎吾與子兮拾荃其二雲氣冐兮天目之趾疊湫濆薄兮洞石齒齒列缺正畫兮睡蛟蟄起可豢而擾兮浴以天河倒流之水子其隐乎吾與子兮採芷其三雲氣吐兮天目之腹乳潭沉沉兮鴨潭煜煜徐伍朝徃而暮来兮雙碧鹿可挽而舞兮侑以天風歩虛之曲子其隐乎吾與子兮蒔菊徐伍天目二仙人寳福寺山房門巷蕭然雀可羅藏書萬巻自研摩懶尋玉女登西嶽甘伴金仙坐補陀書帶草長塵慮少鉢曇花放}
