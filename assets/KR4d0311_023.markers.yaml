  - {type: variant, offset: 45, length: 0, content: '', WYG: 基聖節錫宴致語帝出乎震祥開華渚之光雲上于天恩錫鎬京之燕恭惟皇帝陛下聪明時乂剛健日新與物為春播太和于有截自天申命綿景祚於無疆臣等幸備伶官願陳口號寳鳯啣春度玉墀開基節後即天基日行黃}
  - {type: variant, offset: 46, length: 8, content: 至教爾以昻霄聳壑, WYG: 三辰秩斗轉蒼龍萬象熈扶起車攻常武運做成既醉太平時千官拜舞東風裏歡上延英萬歳巵勾合曲嵩岳三呼山鞏聖人}
