  - {type: variant, offset: 7725, length: 1232, content: 冝厚追榮之典積恩徽於大郡新湯沐於名邦象服是冝尚其不昧可故祖母汪氏魯郡夫人特贈崇國夫人制勑含飴弄孫者家庭之慶爲醴烝祖者寢廟之榮肆倚重於良臣庸追榮於大母具官某故祖母具某氏淑均姆訓雍肅婦儀采南澗之蘋躬承家而共祀有北山之李丗爲國以生賢睠時樞紐之尊賛我經綸之妙孝思維永德報冝隆易郡號於曲阜之墟進國封於崇墉之壤潜光煥發懿魄祗歆可故父居仁華文閣學士正奉大夫贈太師特追封申國公制勑朕講求采薇治外之略企慕烝民任賢之風擢時英猷列我該輔千㝷之木以培埴而茂九層之臺以積累而髙必有教忠乃能移孝具官某故父具官某心夷而履粹學博而文雄締眷阜陵佩荷囊之清切受知光廟擁茸纛之森嚴視萬石以爲輕傳一經而特重克開哲嗣進翊洪樞禰廟䟽榮躋上公於二吕師垣流慶邁盛事於三陳可故嫡母王氏鎮國夫人特贈燕國夫人制勑延范逵而開陶侃濟丗之功闚元齡而卜王珪佐時之業家或無於賢母國奚有於名臣具官某故嫡母具某氏環珮雍和帨紛肅穆獻納論思之最能勉其夫彌縫輔賛之功克昌厥子任方隆於政路報冝侈於脂田進召公故國之封正魯人小君之號音容未泯蠁䀜其歆可故所生母俞氏新安郡夫人特贈和政郡夫人制勑綵衣之戯天性眞樂板輿之奉人生至榮睠予兩社爲輔之英抱此萬鍾致養之憾匪隆禭典曷尉孝思具官某故所生母具某氏毓詩禮之門嬪衣冠之族怡聲下氣奉棘列之尊章柔則令儀佐槖班之君子爰篤生於國棟肆坐斡於天樞心如母存義以子貴易舊封於古歙加新命於西岷不惟紓蓼莪之悲抑亦示白華之勸可故妻林氏信安郡夫人特贈大寧郡夫人制勑召南鵲巢之什夫人起家魯侯燕嘉之詩令妻受祉何嗟契闊不逮顯融具官某故妻具某氏佩服女箴踐修婦則于沼于沚齊明錡釡之共如山如河􅈺雅笄珈之飾冝百年之偕老胡一旦之溘先顧予樞臣失此内助冝郡封之加峻俾廟食之増華隂相其夫永輔吾國可家抑除將作監丞制勑具官某參井之光下濟岷峨之氣上直鍾其英者多清廟之噐故選拔爲盛爾淵於學而睟葩於詞而峻西産之珍也外閫荐以名薦深鐍弗售特招乃來球璧冝在東序而渉匠監之筆朕豈以閬劒善最爲可略哉職優事簡姑涵雅望伯仲壎箎聲問孰禦可四川制置司機冝文字趙垙夫除太社令制勑具官某朕重名噐甚録其父之勞而進其子於周行不一二見也爾父以名法從當方面撫蜀控秦具有威略賛籌莫府爾抑有助朕何愛司社不以爲循陔之榮哉其砥礪事功使人知西平之有子可史彌鞏王㝢㩁務羡賞各轉一官制勑具官某等筦㩁國計所關羡必賞爾庀職京口克懋厥官歳入有常能溢其額俾進陞於一列庸獎厲於勞能可史全之監軍平蔡州轉兩官制勑具官某方城負固我師進討摩壘鏖戰遂復故境爾監厥軍計功受賞兩秩升華勉思來効可孫林張旺告發軍姦並𥙷承信郎制勑具某人羽林失馭敢犯紀律爾發其姦悉正顯戮而京邑以寧登名武階儲材將列表示戎行使知懲勸可陳文孫知髙州制勑具官某炎嶠守吏必諳風土稔習俗然後能盡心於撫字爾端飭而敏於政守封川民無歎愁易符髙凉必能推之共理詩不云乎誰能亨魚漑之釡􅑄貴不擾也徃毋鄙逺其民可淮東路兵馬領轄耶律均復山陽有功轉三官授武德大夫兼知淮安州鹽城縣制勑具官某山陽淮之門户間爲冦保王師大討蟻潰䑕逸爾搴旗鏖擊之勇莫府髙之疊進武階徃理邊邑加意撫循毋失軍民之譽可, WYG: ''}
