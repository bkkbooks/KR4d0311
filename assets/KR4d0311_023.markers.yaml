  - {type: variant, offset: 43, length: 1, content: 爲, WYG: 潤之坎震巽三者之氣合而隂陽和甘霈應既霑既足迄用康年維爾神之功昭慈聖憲皇后永思陵憲節皇后憲聖慈烈皇后下宫修葺奏遷神御表文葱葱鬰欎蟠佳氣於兩儀實實枚枚鞏閟宫于千古飭御史以省視戒工師而繕修遷御有嚴前期敢告孟秋朝獻祝香文伏願氣調玉燭序秩金行雨足周原年屢登於大有風清漢塞運丕濟於中興}
  - {type: page-break, offset: 43, content: '', id: KR4d0311_WYG_023-5b, image: WYG1175/WYG1175-0267b.png}
