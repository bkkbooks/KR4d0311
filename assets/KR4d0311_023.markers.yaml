  - {type: variant, offset: 6948, length: 776, content: 期三事寜計一階噫君子不可諼兮尚想英規之在賢者樂與共也竟嗟𥘉志之違往服恩徽用光祖道可資政殿學士太中大夫致仕眞德秀贈銀青光禄大夫制勑致爲臣而歸甫惜孟軻之去非夫人之慟忽驚顔子之亡以十年退養廊廟之姿不一日與聞朝廷之議悲深易簀恩重書棺具官某休休焉有容屬屬乎其敬中庸大學之經丗講貫深微伊訓說命之格君敷陳坦白少徊朔於禁路首典領於文闈爲國蒐賢忘身竭瘁方騰徹棘之譽已告負薪之憂趣升股肱旋乞骸骨鍾全氣於三光五嶽如斯幾人受正命於太極兩儀僅爾中壽舉朝歎息行道咨嗟顧民生之方殿屎豈天意之未平治咸觖金甌之望特陞銀艾之榮噫渉大水而無津孰濟奔流之勢仰髙山而景行尚聞屹立之風九原可興百丗不朽可同簽書樞宻院事陳卓贈三代故曽祖嘉謨朝奉郎贈太子少保特贈太子太保制勑有嬀逺系爲漢丗家咸而欽欽而躬躬而寵則位司空寔而紀紀而群群而泰則官僕射繄流光之無斁蓋鍾慶之有源具官某故曽祖具官某充實中存浚明外著愛人利物博古通今子拔列卿之頴孫搴法從之華傳至爾曽進輔予治培深而發必茂積厚而報亦豐雨露九霄峻陟青宫之保雲來百丗益増黄壤之光可故曽祖母黄氏上饒郡夫人特贈文安郡夫人制勑天降時雨山川出雲崧髙駿極之詩所以作也必有隤祉發祥之懿是鍾經文緯武之英具官某故曽祖母具官某氏淑行椒蘭柔儀蘋藻婦從夫而積累始大厥家孫生子以顯揚遂彊吾國丕顯曽門之慶申加名郡之封僾然如存歆此休渥可故祖膏朝奉大夫太府少卿贈太子太傅特贈少傅制勑寤寐治功登崇人傑三階聮耀不忘夙夜宥宻之忠五廟均休益茂春秋烝嘗之孝冝隆尊祖用顯詒孫具官某故祖具官某德履純明風猷簡逺荐更外服隂成勿翦之棠特立中朝氣凛後凋之栢僅升華於卿月竟鍾瑞於樞星賛我逺圗皆而遺訓班髙亞傅時申加第之恩望重丗臣益篤傳家之慶可故祖母蔡氏魏郡夫人特贈安國夫人制勑舜帝之後爲陳文王之昭有蔡冝其家室貽厥子孫具官某故祖母具某氏任只秉心温其積行禮嚴舉桉曵藻綬於名卿教篤斷機飛翠緌於法從傳芳再丗制勝五兵不忘報本之, WYG: ''}
