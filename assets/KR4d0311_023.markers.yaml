  - {type: variant, offset: 2067, length: 4212, content: 備罄告猶直方大之兼全深得鎮浮之體知仁勇之並用洞明應變之機顧邊瑣之孔艱期廟謨之宏濟宣帝樞機周宻固先二相之資憲宗紀律設張尤切衆賢之助肆疇庸於間社俾進序於本兵緫提星紐之權仍賛台衡之務邑畬申衍邦典増崇以成道德之彊以全帝王之勝噫天保治内所以収采薇之功烝民任賢所以定車攻之業維眞儒之無敵知中國之有人務逺乃猷用厎于乂可簽書樞宻院事鄭性之除同知樞宻院事加食邑四百户制勑帝舜之格三苗有伯益以賛禹宣王之定四國有吉甫以誦申睠宥宻之孔嚴頼寅恭之協濟肆頒命綍叅典事樞具官某資蚤悟而夙成學旁貫而曲暢凾鐘太蔟爲角始終皦繹之和玉瓉黄流在中表裏清明之粹乆矣冥鴻之去時哉儀鳯之來不累日而長諌坡未再月而登政路以非常之際㑹爲有大之規摹難於定不難於回熟知國勢可以戰斯可以守洞識戎情爰進貳於本兵仍申陪於賜邑維予制勝咨爾陳謨府兵列於關中孰是相維之制屬國置於塞下曷爲叵測之防隱憂旣深區畫可後坐弭控弦之警宻輸借箸之籌噫文武之憲萬邦政有頼中興之畫明良之康庶事盍共圗丕應之功惟爾之能俾予以治可同簽書樞宻院事陳卓除簽書樞宻院事加食邑四百戸制勑民獻敉寧武功求濟於艱大之日王師遵養時晦用介於純熈之餘睠國勢之重輕視人謀之臧否進賢宥府揚號明廷具官某柳下惠之聖和樂正子之好善謙謙自牧夙全君子之風蹇蹇匪躬克慕王臣之操紛炎門之競騖獨夷軌之徐行一泯忮求兩無緇磷去知有命靡矜噐能政理之長來亦何心益稔議論文章之望迨親攬於威柄爰趣登於政塗勤樸斵於梓材力賛厲精之治綢牖户於桑土常懷先事之憂備罄壯猷罙深邃簡就陟樞庭之序仍循書殿之班爵進公圭秩陪邑采俾宻禆於勝筭用坐折於遐衝噫明主可爲忠言朕方合介胄搢紳之議上䇿莫如自治爾盍思車馬噐械之圗必同寅協恭而和衷斯禁暴定功而保大式孚民聽庸對王休可余玠起復宣教郎襄陽府通判兼京西制置司機冝文字制勑具官某奪情非令典也惟從戎則許其墨爾以明敏練逹受知于制閫秋防孔邇辟置自助起之堊室貳政要藩且參莫府之畫不以家事辭王事其禮之變乎移孝爲忠勉圗協濟可李勉平黎賞轉朝奉郎制勑具官某廣右平黎上功爾以彊敏宣勞于莫府進二秩以獎之甫通閨籍遂階貟外異渥也試邑于䖍益勵勿懈可軍噐少監徐清叟除將作監依舊兼司封郎官兼崇政殿說書制勑具官某朝廷之用賢非一途信其賢耶用之惟恐不亟故必躐正郎梯監少而升爾家傳正大之學躬厲直方之操金華開說援古以證今亹亹不倦朕甚嘉之攝主爵貳戎監而進大匠華軌直矣朴素化行繕修務簡涵泳竹素綽乎餘暇輪人有釋椎鑿議堂上之讀者試詳訪之以告庶乎他山之石可以政玉也可大宗正丞蔣峴除軍噐少監仍兼權侍左郎官制勑具官某武監戎部之附庸官間無事少也占位渉筆無幾牘然郷用之材於此乎儲爾學問醇茂義理融暢恬夷而莊舒卷阿吉士其人歟丞我麟宗攝郎銓省几案文書填委不動聲氣隨手冰泮而九品無遺鑒體用具矣試材以劇養望以暇鶴膝犀渠姑貳程作朕方圗所以進爾者可丘岳除兵部郎官趙與􅊸除都官郎中兼樞宻院檢詳文字制勑具官某等國朝最重尚書郎之選懷香而奏明光襆𬒳而直建禮非郡最不眞授爾岳篤茂而暢邁守儀眞以吏畏民懷稱爾與􅊸䟽明而詳逹守嘉禾以政平訟理著朕厲精政事以來歴課吏治皆其良也表惟良之吏以勸郡國故俾岳郎于司武與􅊸自丞大宗郎于司僕且攝屬于宥府太微積星之次即日爲眞顧不謂榮乎兵不可黷刑不可濫必寢必措勉賛而長可樞宻院編修官趙汝譢除宗正寺丞仍兼右司制勑具官某三丞望華職簡而宰屬爲劇授官兼劇以簡欲其材有餘於事也爾蚤収危級蔚著雅望攝組省闥靡枉于法守而事不辭難沛乎其材也擢繇編纂渉筆宗盟仍行紀綱百司之職輕車熟路疇能及之益涵致逺之噐用對方來之渥可汪之道除太常寺丞制勑具官某漢制朝儀武夫拔劒擊柱之風爲之氣奪使成周禮樂得見于後丗情僞之防何如哉故奉常置丞必通于古誼爾學博而約氣直而清時輅冕舞之傳孰復蓋乆談經宫邸薫陶信厚渉筆曲臺冝矣因革損益訂古而施諸今以美化善俗亦惟無忘夙夜惟寅之義可劉克莊除樞宻院編修官兼權侍右郎官制勑具官某時政記者國史之椎輪經武要略則先朝制勝典刑之囊括其書纂次於樞屬自昔必名儒文士爾家傳儒藝蚤著文聲韞抱不凢脫餌科級諸老先生多之簿正屬籍進升刪潤維汗青之稱也與聞廟畫攝事郎潜精毖簡通對我殊擢可陳一薦護獻俘有勞轉朝奉郎制勑具官某垂瓠合圍穹廬就燼凾守緒檻天綱獻功于藁街脩途護役爾寔宣勞其升貟外之階往効幕中之畫可顔信之獻俘有勞轉保義郎制勑具官某淮蔡凾骨獻俘之役爾與有勞其陞一階以酬跋渉可蔡仲龍除大宗正丞兼權屯田郎官袁商太常博士並兼沂靖王府教授制勑具官某等沂邸於屬爲近朕篤内睦擇師而教之乆則逓遷獎其勤爾仲龍爾商皆以經明行修立於朝如玉在山燁然其煇潤楷範麟趾麗澤多益是用進仲龍丞于大宗且攝省郎進商繼仲龍議禮于曲臺而典教悉惟求舊懋詩書禮樂之訓陶河間東平之風不特講留屯蒐綿蕞之欽厥職也可安恭行除大理寺正制勑具官某廷尉有正監及平漢制也我朝置正於卿少之下丞司直之上厥選蓋謹爾材姿亮通風榘明整蔚其梧鵠之秀丞郡以李法簿召未至升之正以聽獄成甄拔峻矣書曰明啓刑書胥占咸庶中正勉哉圗厥稱可魏峻除宗正寺簿楊璪太府寺簿趙與爽耤田令制勑具官某等楩柟𣏌梓之材生於鄧林其地美矣非雨露之養不成爾峻簡而温雅而文爾璪茂而通整而練爾與爽頴而秀韶而明英英丗家翹翹天支朕皆欲養其材以待用故進峻簿正于瑶牒璪繼峻簿外府與爽繼璪令帝耤前煇後暎其各懋於自獻可馮去疾除武學博士制勑具官某善用兵者不學古兵法而圯下一編亦詎容無師慶暦置右庠之意昉此爾以通經博古之學彪炳於文成均諸生咸歛祍其下風而平時慷慨激烈論南北離合之勢兵家勝負之略皆有據依遷之博士使業韜鈐者又得所矜式新美作成之下安知不有武舉如子儀出於中乎可劉宰除將作少監制勑具官某朕宵旴圗治計効猶邈每嘆君子有材之雖然不敢諉斯丗之無其人也爾隱居以求志深造而自得君子人歟其論天下事目無全牛投刃可以中桑林之節材抑偉矣旌招屢下未肯從吾游何耶超越拘攣繇丞奉常徑貳繕監迎之致敬有禮矣惠然來思毋興盡而返可尤爚除知江陵府兼京湖路安撫劉煇叔政績轉一官依舊知建昌軍制勑具官某等河東以地望之重歸季布頴川以民情之安留冦恂悉惟其冝爾爚抱識時應變之長往帥荆州事權非昔而承上撫下無間言可以爲難矣故齒召復還以壯吾上游控扼之勢爾煇叔厲盡職奉公之志出守盱江邑里甫集而興利除害無遺功可以爲善矣故選擢復留以尉千里戀慕之情分閫乗壘任有輕重朕爲地望民情而擇官奚有間哉各鞭厥後毋棄爾成可葛洪除資政殿大學士提舉洞霄宫制勑武公叡聖晩不忘箴國之心文子廉忠老猶篤事君之志朕緬懷舊弼乆樂燕居年垂九袠之崇望稔三朝之重峻陞邃職昭示隆恩具官某嶧陽特生之桐新甫後凋之栢致身廊廟雍容麟也之來引興丘園翕忽鳯兮之去仁樂山而俱寂義飲水以自娯雖黄髪之畨畨愈丹心之烱烱廼睠粹古務尊耆儒不得謝則賜杖而安車優游佚老如有問則就室而珍從懇切乞言方將遣掌故而訪伏生乃欲致少傅而從䟽受旄期雖重於趣召矍鑠詎容於告歸陟祕殿之大名踵珍臺之優廩肆加體貌式聳觀瞻噫壽考維祺朕敢忽日秩月存之禮憂心如醉爾毋忘晨興夙寤之規益茂養恬對揚猷訓可何處乆太府卿兼知嘉興府制勑具官某士君子任於時入儀九列出殿三輔通顯矣矧建惟月之旜馮扶風之軾而爲王人爾守故家之學術熟昭代之典章色莊辭毅争是非於殿陛間不少詘用之郡國何姦萌之不戢戾氣之不弭哉因南徐惜其去之早知檇李恐其來之暮就乗夏縵趣布藩條徒得君重毋薄淮陽也可度正轉朝議大夫守禮部侍郎致仕制勑允矣君子佩筆槖以方眞賢哉大夫掛衣冠而何亟能知所止盍賁其行具官某學守粹傳性全至善見於治郡有閉閤思過之風推以立朝得自牖納約之體進貳秩宗之典仍參師氏之司尚頼繩愆遽聞告老一正君而定未究責難之恭致爲臣而歸廼慕保身之哲冝升華秩用尉耆齡還家峩雪之邊遺丗煙霞之表莫回爾志徒愴予懷可禮部侍郎致仕度正贈通議大夫制勑有十夫予翼方來下於井參不一老憗遺乃去騎於箕尾冝加禭典庸示眷懷具官某秉心醇明制行平實大夫國人之譽蚤推其賢諸老先生之傳晚試所學踐禁途而獻替簉經幄以開陳每望其儀嘗期以壽胡夕陽之莫駐忽朝露之先零臥病於數千卷之間性焉巳盡殮含於二三子之手命也何言凄凉萬里之歸赫奕四階之贈英魂如在茂渥歆承可趙綝除大理寺丞諸葛十朋除大理寺司直制勑具官某等獄重事也鍜錬以爲巧攟摭以爲察析律以爲宻深文以爲公而民命近止國脉斵矣理官其可不選爾綝噐涵渾璞薫然忠厚長者之風挈繩直於圜棘刑不失仁故就進之丞爾十朋歩中規矩藹然悃幅無華之美賛笏畫於國帑利不失義故俾繼綝司邦之直皆以逹吾好生之德也敬之哉惟良折獄可太學博士李榘除諸王宫大小學教授制勑具官某大學在西郊小學在國中四代之制然也二學並設以教神明之胄則我朝作古爾行應周旋之規學茂講習之澤相觀而善六館得師而吾葛藟瓜瓞之秀不可無良範也故輟之司教于宫庠小以成小大以成大等就傅肄簡而上皆知勉於爲善則振振之化行矣可太學正何處恬除太學博士制勑具官某博士掌通古今漢始以五經置施讎之易孔霸之書張生之詩小戴之禮皆嘗以是論同異於石渠其通經何如哉爾涵渾厚之氣藴精深之學正于膠庠士服習其訓而不敢犯升之分經講授之官剖疑析滯導正釋回以成首善之風乃見師法可架閣林宋偉除太學正臨安府學教授林伯順除武學諭鄭斗祥除太學録制勑具官某等文武異庠而樞紐風化坯冶人物之功等故選授皆明師爾宋偉志氣激昻講藝精博爾伯順風規凝整汲古深長爾斗祥抱負瑰傑造理閎奥掌故郡博士中一舉而得三士上庠以宋偉爲正斗祥爲録右庠以伯順爲諭望實孚矣教學相長之道尚觀所進可兩浙轉運判官顔頥仲除户部郎官兼知臨安府制勑具官某朕間者親扎十有二條敕畿尹以重四方之本丁寧貇到奉行惟人爾立心直而平見理静而明處事果而精將漕闕下聲采奮厲撫虎兕之出柙知牛羊之求牧兼組彈壓都人士安之兹用擢之版部郎俾爲眞周以尊枕于京爲盛漢以桴皷不鳴爲能爕友彊弗友剛柔異施而國勢増鼎吕之重斯克訓于朕志可都官兼檢詳趙與􅊸除直寶章問兩浙路轉運判官制勑具官某歳九遷而日三接遇合之盛也未半歳褒表者五六其非常之遇歟爾良而材寛夷而精宻治輔郡有善最朕旣増秩原其任未幾以丞大宗召又未幾以都官樞掾進又未幾以寶奎寓直國畿將漕選翼乎鴻鵠之遇順風誰能禦之夫諸路之漕一也而漕于畿爲難嘘弱揉彊壓浮鎮薄與牧尹參錯爲功皇皇枕奠矣可端明殿學士廣東經略知廣州崔與之除參知政事加食邑四百戸制勑朕仰稽列聖並建輔臣在乾德則除餘慶於荆南就參國秉在紹興則擢趙鼎於江右入預政機肆嘉牧御之賢乆鬰訏謨之望討論舊典揚厲新綸具官某存心以事天行義以逹道風節髙乎一丗威名聳于四夷泛三峽而歸乆適山林之樂越五嶺而召尚安水石之閑甫陞書殿以賦祠旋即里門而宅牧期釋宵衣之慮忘居晝錦之榮方飛鴞懷我好音已肅登陴之諭迨急鹿鋌而走險竟伸負固之誅環扶胥黄木以懷生極交阯蒼梧而息警益深簡在可後儀圗維漢化之雖更尚唐綱之未振聚民獻以爲敉寧之本毎拊髀於才難, WYG: ''}
