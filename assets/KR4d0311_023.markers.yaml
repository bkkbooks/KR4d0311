  - {type: substitution, offset: 3, original: 呉, replacement: 吳, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:366e8ec95655b72d3205b878dc416602f82ff8a6b5dd240168f5ee5a7c65a61e', entry: vf-3155}}
  - {type: variant, offset: 8, length: 12, content: 殿修撰知鎮江府制勑具官某, WYG: 天尊神兮挾東皇龍駕翺兮周八荒五福舍兮廸時康祠壇紫兮歌青陽神宴娛兮夜未央星留俞兮集祥光四氣和兮萬有昌三垂晏兮九農穰多受祉兮命溥將太一宫交年醮青詞化宫宻轉序首正於孟陬歳事更新法肇頒於象魏輙輸悃素仰叩旻蒼靖念眇躬適逢多故隴西未靖逞貔虎以慿陵漢上方鏖又風鶴之報警狼烽交於梁沔騎􅅽徧於荆襄由秉徳之不康寧致御事之日艱大跂叢霄而引咎迎端朔以祈休伏願上帝畀矜尊神篤祐以全取勝亟清玉塞之塵轉危為安增壮金城之勢凡遂耕桑之樂悉歸覆育之仁天基聖節青詞保佑自天運應一元之泰誕彌厥月氣陶萬彚之春展寀瑶壇投忱璇極伏願兩儀申祐列曜延光時和歲豐妙叶玉衡之正兵寢刑措屹隆磐石之安朱表星回蓂厯茂迎震夙之期雲䕶芝函備展泰元之薦仰祈昭鍳申錫鴻釐東作西成躋民生於仁夀南暢北洽措國勢於安彊孟春朝獻祝香文伏願緝熈純嘏保合太和雨霽秧疇咸樂東郊之業風恬栁塞盡清南牧之塵攢宫補種祝文路寢孔碩每切慕思春露既濡宜加繕植先事以告維靈之安孟夏朝獻祝香文伏願本支蕃衍疆塲敉寧}
