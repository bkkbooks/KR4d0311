  - {type: variant, offset: 836, length: 4, content: 右某昨凖, WYG: 除兵部侍郎恩命不允詔卿學問造乎精㣲論議根乎正大垂紳端笏於朝盖麟之儀儀鳯之師師也引年告歸朕以金華之業未就擢繇武部之最就進貳卿之真亦可為勉留矣而猶以歸諗歴觀在廷番番黄髮我}
  - {type: variant, offset: 841, length: 0, content: '', WYG: 有之而公族之年耆徳明孰踰卿者四郊多壘主憂則臣族同姓之老方與國同其戚休而忍不為朕修九伐之法明七徳之武遽舍之去乎其彊起就厥位所辭宜不允朝議大夫新除兵部侍即兼國史院編修官實録院檢討官兼崇政殿説}
