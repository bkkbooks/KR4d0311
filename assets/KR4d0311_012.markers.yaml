  - {type: variant, offset: 1582, length: 244, content: 臣未敢祗受乞祠奏右臣藐然踈庸乆坐罪斥皇帝陛下更新萬化登崇衆正誤蒙簡記首預収召爲郎甫旬而分察分察數月而執法執法踰旬而代言㝷兼史館仍理還磨勘歴觀廷紳未有叨竊若臣之甚者遭時遇主冝圗報稱而性禀狷介學術迀拙但知以竭慮爲忠不計以直情爲激天涵地育未賜譴何揆之進退之誼出臺便當引去貪戀芻豆黽勉至今廉耻道䘮朝夕芒負况當衆賢和於朝之時獨累皇極之治隆寛不誅公議莫貸欲望聖慈特賜祠廪俾歸求君子時中之學以備異時噐使實戴終始生成之造謹録奏聞伏候勑旨再乞𥙷外申省狀照對某昨具狀奏陳乞賦祠廩今月十六日凖尚書省劄子備奉聖旨, WYG: ''}
