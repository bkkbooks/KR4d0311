  - {type: variant, offset: 1379, length: 0, content: '', WYG: 恩命不允詔經者道之綱也史者事之紀也八書十字而下述作紛紛經學之不明也深於經則必良於史卿學有師傳晚造自得邇英論説析㣲抉奥多先儒所未發用力於經深矣典謨歴代之軌範春秋百王之䋲墨記言動者祖焉卿能以經法為史法品藻實録方將軼遷董而上之進参纂修尚奚遜所辭宜不允特進左丞相兼樞宻使鄭清之等}
  - {type: page-break, offset: 1379, content: '', id: KR4d0311_WYG_012-4a, image: WYG1175/WYG1175-0201a.png}
