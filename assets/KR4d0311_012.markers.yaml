  - {type: variant, offset: 2945, length: 1174, content: 將理容可痊愈凢未正首丘之日皆駿奔王事之時中庸九經曰體群臣陛下蓋深得之故敢籲天請命臣下情無任迫切之至取進止辭免除吏部侍郎兼給事中奏右臣今月十日凖尚書省劄子三省同奉御筆洪某除吏部侍郎兼給事中日下供職者渙綸舄奕震魄正營臣竊以銓省者人材之權衡瑣闥者國是之綱紀裴行儉以知人之鑒顯張元素以回天之力稱匪得譽髦曷當妙選如臣者背時渫辱遇主光榮鳯掖代言兼儤鑾坡之直虎門勸講仍紬石室之藏井不可以汲深弊車尤難於任重譾焉溢量竒甚纒痾屢退乞於叢祠忽進聮於法從貳題才而旣重參批敕以尤嚴求閑獲遷服寵知懼欲望皇帝陛下官必懋德噐母假人念輔頰欲穿莫稱論思之職而精神已索難居閱讀之司母拘反汗之嫌特徇祝釐之請用安愚分庶保危蹤所有恩命臣未敢祗受再辭免奏右臣昨凖尚書省劄子三省同奉御筆洪某除吏部侍郎兼給事中日下供職臣具奏辭免拾肆日恭凖詔不允者寵命便蕃嘗伸控避綸言温厚未賜矜俞在微臣不當更有懇陳而公議詎容弗加祗畏靖惟弱質乆苦沉痾期息影於一祠致瀝忱於九䟽兹蒙誤渥更越常倫無清通之鑒而爲小宰之眞無孤特之操而兼夕郎之重聮翩六組照映一時方退處之力祈乃進陞之狎至將疑矯僞必速顛危伏望皇帝陛下俯矜病悴之深亟寢恩榮之茂俾叨閑廩免玷華塗緑給事中不容虚職除已權冝一面閱讀外所有恩命臣實未敢祗受辭免除給事中奏丙申正月右臣今月𥘉一日凖尚書省劄子三省同奉御筆洪某除給事中日下供職兼職依舊者自天錫命無地措躬臣竊惟朝廷命令之出在中書則許舎人封還在門下則許給事中審駁尚書旣奉行矣又許臺諌論列皆所以扶植紀綱而維國勢皇帝陛下親政日勤責治日切方一新臺諌舎人之選搢紳想望其風采給事中冝得漢魏相唐李藩者流以紏正違失顧以寵臣臣頃貳選部嘗攝承瑣闥批敕無夕郎之風論事乏回天之力正虞幽黜敢冒真除矧當元㑹之辰爵人於朝而使彼其之子不稱其服先之公議謂何伏望聖慈念左省實喉舌之司名噐非假人之具博選一丗豪雋有風力者俾專省閱容臣姑仍東銓徐丐閑廪以全陳力不能之誼所有恩命臣未敢祗受再辭免奏右臣昨凖尚書省劄子三省同奉御筆洪某除給事中日下供職兼職依舊臣具奏辭免今月𥘉五日恭凖詔不允者訓辭温厚德意丁寧螻蟻微臣所當即祗成命第自濫吹朝列以來蒙𬒳隆知夐無倫比而福薄噐狹苦竒疾者一年有半寢食俱妨老形畢具方圗再理祠請夕拜真除從天而下俯伏自揣榮懼交集蓋命令喉衿之地精神枯涸則省閱有違見志氣銷耎則封駁無彊力鸞臺廢職自臣養痾始臣將何所逃罪欲望聖慈爲官擇人以振起朝廷之綱紀収還誤渥俾免顛隮實戴乾坤之造所有恩命臣未敢祗受辭免兼侍讀奏右臣今月𥘉三日凖尚書省劄子正月𥘉一日三省同奉御筆洪某兼侍讀者便蕃䟽渥懾讋交懷臣竊惟上聖以典學爲功諸儒以詔媺爲職執經並列勸讀尤嚴間嘗起舊弼於内祠今亦進耆英於書殿必深於道乃稱厥官如臣者猥繇法從之聮濫厠細氊之講懷鈆無得呻畢何禆屬月正元日之臨盛春王三朝之㑹首叨榮於瑣闥仍陟寵於金華四象八卦之陳未知源委五典三墳之誦曷効㳙埃儻兼取於熊魚必重譏於鶉特伏望皇帝陛下充能, WYG: ''}
