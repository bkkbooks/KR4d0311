  - {type: variant, offset: 1403, length: 0, content: '', WYG: 侍讀恩命不允詔周小史掌邦國之志奠繫世辨昭穆師氏以媺詔王居虎門之左司王朝自唐以來瑶牒之纂修經幃之誦説蓋昉諸此而兼其長為難卿著御史之冠曵尚書之履聲稱籍甚而執春秋一經以陪緝熈之講尤多所發明朕熟察所韞閎中而肆外故以開元禇無量開成李衢之職兼命之進而勸讀則明引君於當道之誼退而撰次則用大事於書冊之法恢乎有餘地也所辭宜不允户部侍即王遂辭免}
