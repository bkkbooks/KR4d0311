  - {type: variant, offset: 1884, length: 558, content: 以逺不克往前後就養僅五六年閑居積乆菽水不給遭逢聖朝録用其不肖子目睹恩榮踴躍自慶今春秋七十有六每以足跡未到江湖爲不滿年當喜懼急於養志欲望朝廷念人子事親之日短特賜敷奏陶鎔某一小小合入差遣俾獲迎侍官遊以娛晚景實爲孝治錫類之仁湏至申聞者辭免兼權吏部侍郎申省狀右某今月𥘉九日凖尚書省劄子三省同奉聖旨洪某兼權吏部侍郎蒙恩便蕃聞命兢惕竊以詞垣四禁稽緩爲先選部三銓繁劇尤甚專掌尚虞於弗曁兼官必至於多違伏念某學問空踈材識譾陋領内史之職舉乎一而未能參小宰之聮共其二以何有雖代庖而越爼將毁瓦而畫墁欲望朝廷特賜敷奏念御馬不容於窮力而牧羊每患於多岐俾塵舊官亟寢新命少安愚分實戴隆私所有省劄某未敢祗受病乞𥙷外奏右臣竊惟窮則呼天疾痛則呼父母方臣頻年擯退窮莫之恤陛下更新萬化不待呼天首加蒐拔自閑外爲禮部郎如蘇軾不作縣爲御史如周必大以殿中執法出臺而陞詞掖如張震還乆廢之磨勘如胡銓又渉筆史館攝組銓曹曽未逾年徧歴華要遭時遇主若此豈不願周旋衆正之㑹少効千慮之愚而臣分量易盈災蹇踵至悼亡未幾忽得竒疾癰生上齶數醫更療累旬未愈痛連牙頰飲食减少形骸雖具氣液潜泄斯皆素餐無𥙷朶頥不節之所由致君父以體群臣爲心有疾痛而不呼是爲欺隱欲望聖慈察臣知事君之誼而非㓗身有垂白之親而非輕禄俯憐實病𥘉非飾詞特卑在外待闕差遣還家將理或可痊愈實戴天地父母生全之恩謹録奏聞伏候勑旨辭免兼直, WYG: ''}
