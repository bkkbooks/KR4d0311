  - {type: variant, offset: 811, length: 1, content: 氣, WYG: 風甘泉之論思露門之勸講責難陳善備罄忠益而不汲汲於進寅直清矣若昔折民惟刑與降典相為表裏疇庸邦憲之平正序春官之貳選妙望華朕命惟允齊仲孫來省難知魯秉周禮而不敢動晉欲服楚必先大蒐被廬示之禮時方多艱卿其思}
