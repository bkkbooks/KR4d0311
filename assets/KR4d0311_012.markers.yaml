  - {type: variant, offset: 4170, length: 260, content: 體群臣者人君之大經尸寵利者人臣之大戒君體臣而閔其情臣事君而致其義斯合乎進退出處之冝矣臣恭遇陛下親事法宫之始拔擢於留落之餘清塗要轍再歳幾徧廼正月𥘉吉首叨宸筆進陞銀臺金華之峻至榮至耀群臣莫能跋及臣亦罔知上膺睿睠之繇序髙而鬼瞰量盈而神害宿恙加進竒證迭出齒頰浮腫面目可憎雖包羞茹痛牽強應酬寢食俱妨形神不接反覆自揣詎容尚玷班綴臣非不知去歳以乆病冝去屢䟽塵瀆面蒙聖訓諭留如待鴻儒宿德所當國爾忘身少圗報稱而災迍迫逐無一日寧若更貪戀寵利尸素養疢則是進乏獻替之益旣仰負於殊奬退失廉耻之節復上累於隆知將何所容身宇宙之間欲望聖慈念臣形證皆陛下, WYG: 卿勉}
