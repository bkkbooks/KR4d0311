  - {type: variant, offset: 2451, length: 4, content: 月十五日, WYG: 進之以祖禹徳性之廸意嚮之正惟吾宗老是}
  - {type: variant, offset: 2456, length: 346, content: 尚書省劄子三省同奉御筆洪某兼直學士院自天渙寵控地包羞伏念臣乆困投閑適逢更化市駿骨以致千里馬方共興於斯文剖大瓠以爲五石樽獨無𥙷於當丗越從言責猥玷從班危蹤坐滕口之愆竒疾示朶頥之戒精神銷鑠翰墨荒蕪屢懇請於一麾忽進兼於兩制負且乗而知懼服不稱以貽譏伏望皇帝陛下察臣孤陋而寡聞憐臣早衰而多病俾從外𥙷免冒中除庶幾少安斗筲之分所有恩命臣未敢祗受辭免兼侍講奏右臣凖尚書省劄子今月十八日三省同奉御筆洪某兼侍講者疊𬒳寵私彌深榮懼伏念臣力耕有素渉獵無多文淪巫史之微道昧聖經之奥頃叨召對拱聽訓辭首明宣光綜攬之方繼論羲文經綸之旨退深慙於謏聞難仰跋於清光政虞汙玉堂之廬忽俾侍金華之席丘學山而莫及蠡測海以奚堪伏望皇朝俯垂英鑒肆别求於鴻碩容自蓋於空踈所有恩命臣未敢祗受經筵乞祠奏臣蕞爾庸陋饕榮過分朶頥致疾經年不愈嘗控祠壘之請邇, WYG: 巽櫝}
