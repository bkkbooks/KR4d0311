  - {type: variant, offset: 1380, length: 1, content: 右, WYG: 為雷發非時乞賜罷黜家居待罪不允詔自昔有國之患莫大於君}
  - {type: variant, offset: 1382, length: 5, content: 今月二十六, WYG: 玩天變而不知懼間者雷洊發於首春雷君象也詩稱震電不寕不令朕方引咎修省卿等亦以陽不歛藏俟罪於家上下相與警懼若此吾國其庶幾乎漢丙魏同心輔政風雨災變時氣失節皆惕然以為己憂而中興之治成卿宜一乃心徳圖所以回天意者移災股肱非朕志也明發其率百辟以朝端朔所請宜不允特進左丞相兼樞宻使鄭清之等奏為滿散天基聖節乞許肆筵不允詔朕惟天心仁愛人君故出災異以譴告之星雷示變天所以大儆朕也而卿等職思其憂莫不震恐引慝可謂得交修之誼矣然損貴酌損節戒苦節禮以義起必惟厥中朕於誕}
  - {type: page-break, offset: 1382, content: '', id: KR4d0311_WYG_012-4b, image: WYG1175/WYG1175-0201b.png}
  - {type: page-break, offset: 1382, content: '', id: KR4d0311_WYG_012-5a, image: WYG1175/WYG1175-0201c.png}
  - {type: variant, offset: 1388, length: 1, content: 凖, WYG: 既寢上壽之禮群臣嘉賔之式燕可盡略乎勉體示慈之意毋勤引避之嫌所辭宜不允太中大夫同知樞宻院事兼恭知政事鄭性之奏為雷電非時乞賜顯加黜罰不允詔廼立春再翌日庚戌殷雷始發又再翌日壬子而震少陽驟洩恐懼靡寕故預戒百官天基節寢介壽輟用樂庶幾上答天譴卿乃謂咎在臣等乞加顯黜昔我仁祖以春雷為異明詔責躬曷嘗歸過股肱卿宜悉心輔朕以虩虩致福勿復辭費所請宜不允工部}
  - {type: page-break, offset: 1388, content: '', id: KR4d0311_WYG_012-5b, image: WYG1175/WYG1175-0201d.png}
