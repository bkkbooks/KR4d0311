  - {type: variant, offset: 770, length: 9, content: 願解言職正恐負於隆, WYG: 長朕方以陳恕望卿勿辭可也所辭宜不允權刑部侍郎李性傳辭免除禮部侍郎恩命不允詔有虞氏命伯夷作秩宗曰夙夜惟寅直哉惟清寅故直直故清也}
