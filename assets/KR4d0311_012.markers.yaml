  - {type: variant, offset: 842, length: 28, content: 省劄子節文三省同奉御筆洪某除殿中侍御史日下供職於當日具狀, WYG: 趙彦悈}
  - {type: indent, offset: 851, content: 　, id: KR4d0311_krp_012-bkkind10}
