  - {type: line-break, offset: 854, content: '', id: KR4d0311_SBCK_012-3a08}
  - {type: variant, offset: 872, length: 496, content: 今月十六日凖尚書省劄子備奉聖旨不允者聞命知榮感恩思奮官卑不當再具辭免事有上關國體難以黽勉供職蓋縁近者一再論奏邊事與外閫異同諸將方鳴劒皷行而前少有疑情必妨大計欲望朝廷念中外相應之理力賜敷奏改卑某閑慢差遣邊臣聞之亦將踴躍赴功而無後顧一進退間足強國勢某下情不任懇切之至謹具申尚書省伏候指揮辭免中書舎人申省狀右某今月二十八日凖尚書省劄子三省同奉衘筆洪某除中書舎人挾日再遷寸衷積悸伏念某賦資至陋遇事最踈甫叨赤墀供奉之官遽劾烏臺分察之士冝加誅斥廼𬒳襃除矧討論欲貴於皇猷而封駁亦關於國論詎容冒處自速煩言欲望朝廷特賜敷奏収絲綸之新渥卑香火之叢祠所有省劄某未敢祗受第二辭免狀右某昨凖尚書省劄子三省同奉御筆洪某除中書舎人某於當日具狀辭免今月二十九日凖尚書省劄子備奉聖旨不允者某控辭誤渥尚閟俞音恩重命輕不當再具免櫝重念某九年流落一旦遭逢自郎分察執法殿中曽未踰旬忽塵詞掖聖上更新萬化収召衆正蒙𬒳寵眷未有某之比者况判花演誥儒生至榮豈不願發揚九重厲精更始之意使百工砥礪以承休德而某瓶甖噐溢潢潦源枯儻華要之冒居必顛隮之立見欲望朝廷力賜敷奏亟収成命特賦叢祠或蒙矜念係是招徠一人之數改授斗壘以慰偏親實出望表所有省劄未敢祗受辭免, WYG: 陞}
