  - {type: indent, offset: 56, content: 　, id: KR4d0311_krp_012-bkkind3}
  - {type: variant, offset: 59, length: 498, content: 某特與叙復元官仍與宫觀伏念某曩以狂愚自速罪戾遭逢大慶蒙𬒳寛恩特還舊階仍賦優廩仰戴天地生成之造所有省劄除巳於當日望闕謝恩祗受外湏至申聞者禮部郎官辭免申省狀癸巳十月今月十八日恭凖尚書省劄子備奉聖旨洪某除禮部郎官成命肇頒危衷震愓伏念某曩以狂瞽自干譴何去國巳閱於九年奉祠且及於兩歳委心丘壑絶望班行不圗大明昭掲之辰亦與衆正彚征之㑹沉淪吐氣俛仰知榮第惟司馬位冡宰之𥘉蘇軾𬒳儀曹之召詎容是選猥及非材欲望朝廷特賜敷奏改卑在外合入小小差遣以養偏親實出生成之造所有省劄見寄留臨安縣庫未敢祗受謹具申尚書省乞賜敷奏伏候指揮辭免除監察御史申省狀右某今月二十九日凖尚書省劄子三省同奉御筆洪某除監察御史日下供職者恩榮自天兢懼無地竊以公議國家之命脉人材朝廷之精神方其未出則望之如景星如鳯凰及其旣用則倚之爲屈軼爲獬豸元祐王巖叟之召明道范仲淹之來繄時所推皆此其選皇上養晦於十年之乆天下望治於踰月之間轉機括以作新厲搢紳而更始紀綱所繫風憲可輕如某者積困窮途甫還舊著學問不足以窺王猷之逺議論不足以扶國是之公首玷親除必速官謗况未嘗作縣難以入臺欲望朝廷特賜敷奏収非常之誤渥卑有望之時髦庶使危蹤少安微分所有省劄某未敢祗受謹具申尚書省伏候指揮辭免, WYG: 咨䕫撰内制}
