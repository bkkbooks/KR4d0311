  - {type: variant, offset: 2337, length: 2099, content: 當一面有餘也惟邊關雖靖田菜尚荒繕原堡濬溝洫貸牛種以耕最今急務咨爾良牧郎于司田以莅之墾屯積榖貔貅宿飽秦隴在吾目中矣往哉圗稱柬拔可盧進李聚朱廣等一十六人歸順𥙷承節郎制勑具官某等王道以舎逆取順爲貴人情以用夏變夷爲難唐鄧歸疆爾能自拔爵之鶡弁爲我王官其祗服恩榮毋怠可李虎趙邦永轉右武大夫王政轉左武大夫制勑具官某等隆興詔旨横階非戰功不授勸忠勇也山陽之役爾等忠於衛國勇於敵愾功最來上應我賞典進升五列特免貤恩尚思在師中吉以承天寵可周衧轉從事郎制勑具官某荒政莫先於勸分建安饑爾不俟勸捐私廪與邦人共之非輕財急義能爾耶循陞二列用旌好善抑厲異時居官及民之益可王瓉轉朝奉郎制勑具官某浮光子威巴灣之捷論者疑之然功疑惟重爾禔身肅括莅事正固非徼功爲利者關决于光嘗同調遣書生而知戎情何愛一官不以爲賢勞勸往分乗障之符亟上安邊之最可林瓌除直祕閣與宫觀制勑具官某朕惟華髮國之元龜年耆德明靡不招選而逸老養髙亦必有以厲其節爾素履昭融泰宇澄澈逾八望九脫屣丗故之心與冥鴻俱逺朕欲起之名藩不能奪也木天寓直仍賦真祠閱理多而更事深尚乞言之有待可殿前司統領劉喜轉武顯大夫制勑具官某詩嚴備噐易重除戎爾董工程悉皆犀利進陞穹列用獎精能庀役羽林益勤國事可董昇葛仙白身𥙷忠翊郎制勑具官某等拔自材官戍吾邊壘勇而知義不墮賊謀登名勇爵之榮勵志事功之㑹可游佀除軍噐監制勑具官某紹熈末國有大議蜀士主軍噐監簿者實發之冝其有子哉爾雅粹而明静莊而舒曩列干朝慷慨論事有風槩意所不合攬轡徑去朕未嘗不思見賈生也化弦更張召自萬里便朝趣對氣不少衰武監務簡姑爲朕長之以需柬抜夫難得者可爲之時易奪者有爲之志立朝大節能若犀渠鶴膝淬勵而常新爾父履綦猶在與有榮矣可知嘉興府趙與􅊸政績轉朝議大夫制勑具官某檇李吾股肱郡民衆物繁號難治共理得人朕不輕易也爾明而整寛静而有立所至冝其材典我輔藩視田里疾痛抑搔之亦旣用乂而賦入不愆于期知體國矣孝宣親政以良二千石爲重有治狀則増秩使留朕於爾用之度越品級不計也然自昔政令以乆而孚亦以乆而玩力鞭其後益茂厥成則惟汝能可李昴英除大理寺司直兼廣東經略司機冝文字制勑具官某東廣弗靖朕起壯猶之老於其郷以鎮綏之簡僚必謹爾抱邁往之氣而有賢聲月評所重進列棘廷就參幕畫雲川飛泳熟講長筭恩威得兼濟之方海嶠息桴皷之警謂爾來矣可李華依舊直華文閣廣東路轉運判官制勑具官某朕親政逾年深惟民貧而不加恤軍勞而不加閔戒飭攸司屢矣嶺左吏奉吾詔不勤釀成蒲澤之警部刺史可不擇乎爾踐履平實施置精敏臨汀政美盗不敢近嘗進之奎直以風厲四方南顧未寛用輟以往星言夙駕謹勿歎賢勞之獨也轉輸方亟綏静爲期臺閫相望叶謀共濟斯稱予重逺之意可趙汝憚轉中奉大夫致仕制勑具官某生而在選拔之科死則有贈禭之典國家之待搢紳厚於恩篤於禮矣爾以公族之雋蚤即鴻騫中嘗鷁退老其材而用之意蓋有待何崦嵫迅景之迫耶進官一等往書爾柩榮光下燭尚克祗歆可趙希逾轉兩官授朝奉郎制勑具官某維昔洞徭負固湖湘繹騷爾切於衛民勇於徇國深入窮討一方以寧帥垣上功疊進華秩公議信其不忝也益殫撫字之勤茂對襃遷之渥可軍噐少監直舎人院呉泳除祕書少監兼權中書舎人制勑具官某東璧圗書之府西垣誥令之司皆儒者至榮也然成周盛時内史掌䇿命御史掌賛書外史參其間掌四方之志掌三皇五帝之書豈書志之藏與䇿賛之出相爲源委歟爾學明河洛之正文擅江漢之竒試代予言韶雅而不華翹明而有體斧藻百度律吕萬化具孚于觀聽而還詔惟允朕甚噐之用進貳于蓬山以重四禁汗牛之書飫於中而倚馬之藻掞於外源而委也唐武德正觀間是兼命師古號爲稱職爾尚懋乃訓以亢斯文可安癸仲除太府少卿依舊緫領四川軍馬錢粮制勑具官某西南民力竭矣稽九賦之登耗權萬貨之盈虚以贍列營惟王人是屬苟稱厥職九卿不吝也爾蚤嘗與聞定蜀之謀天險地産歴歴在目以燭照數計之智濟笏畫鞭筭之長挈畚用𥙿外府繇貳而長豈特序遷以獎爾勞推周官九府之法均通乎上下兵食足而民不病朕有望焉可陳康􅳹除司農寺主簿兼知泰州制勑具官某蜀有三陳閩之三陳實似之爾抱淹洽之學雖退然不以殊科見而素履行願含章時發鴻鴈行之良也簿正農扈出守海邦蓋以起爾詎謂是足以處爾哉可歸順人王丗昌𥙷武翼大夫差知宿州制勑具官某老上之庭旣焚月氏之頭且􅃮爾見幾興起慕義來歸挈符離於版圗削左祍而冠帶朕甚嘉之峻陞武列仍領軍防往分銅竹之符用聳郷枌之望其竭忠以稱殊渥可歸順人張子良𥙷武翼郎京東路兵馬鈐轄制勑具官某爾乆厭旃裘樂慕冠帶鏠旗所指相與挈符離而歸職方可謂知義矣峻躋武級往莅戎鈐茂對寵光勉圖忠効可歸順僞進士出身齊希古𥙷承直郎制勑具官某爾乆厭旃裘樂慕冠帶鏠旗所指相與挈符離而歸職方可謂知義矣特卑文階毋忘忠藎可歸順人西珪𥙷承信郎制勑具官某爾乆厭旃裘樂慕冠帶鏠旗所指相與挈符離而歸職方可謂知義矣易授勇爵尚知激厲可歸順人于仙郭珍劉用游淑並𥙷承信郎制勑具官某等爾等乆厭旃裘樂慕冠帶首挈唐鄧歸吾版圗可謂知義矣易授勇爵尚知激厲可僞朝列大夫張德直改𥙷文林郎僞朝列大夫李國賢改𥙷從事郎制勑具官某等江漢之師于征唐鄧之境盡復爾等窮而歸義待以同仁易授文階示有科級祗服好生之德勉殫事上之忠可張叔寅贈宣教郎予一子恩澤制勑具官某韃犯蜀關兵行如鬼爾以郡博士從戎而死之盡臣節也褒進京秩仍官遺孤邾矢復魂可以瞑目可趙善璙除刑部郎中制勑具官某吾欲省刑甚憲部置郎以參决四方之讞必熟於布宣德意者乃在此, WYG: ''}
