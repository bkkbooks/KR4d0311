  - {type: variant, offset: 8032, length: 5, content: 勝宣力惟勤, WYG: 墟進國封於崇墉之壌潛光煥發懿魄祗歆故父居仁華文閣學士正奉大夫贈太師特追封申國公制勑朕講求采薇治外之畧企慕烝民任賢之風擢時英猷列我該輔千尋之木以培植而茂九層之臺以}
  - {type: variant, offset: 8038, length: 1, content: 日, WYG: 累而高必有教忠乃能移孝具官某故父某心夷而履粹學博而文雄締眷阜陵佩荷嚢之清切受知光廟擁茸纛之森嚴視萬石}
