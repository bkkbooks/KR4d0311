  - {type: variant, offset: 8009, length: 5, content: 涵渟術業震, WYG: 故曾祖某充實中存浚明外著愛利物博古通今孫搴法從之華子拔列卿之頴傳至爾曾進輔予治培深而發必茂積厚而報亦豐雨露九霄進陟青宫之保雲来百世益增黃壌之光可曾祖母黃氏上饒郡夫人贈文安郡夫人勑天降時雨山川出雲嵩高峻極之詩所以作也必有隤止發祥之懿是鍾經文緯武之英具官某曾祖母某氏淑行椒蘭柔儀蘋藻婦從夫而積累始大厥家孫生子以顯揚遂彊吾國丕顯曾門之慶申加名郡之封僾然如存歆此休渥可故祖膏朝奉大夫太府少卿贈太子少傅特贈太傅制勑寤寐治功登崇人傑三階聫}
  - {type: page-break, offset: 8009, content: '', id: KR4d0311_WYG_022-8b, image: WYG1175/WYG1175-0262b.png}
  - {type: variant, offset: 8015, length: 1, content: 威, WYG: 不忘夙夜宥宻之忠五廟均休益茂春秋烝嘗之孝宜隆尊祖用顯詒孫具官某故祖某德履純明風猷簡逺荐更外服隂成勿翦之棠特立中朝氣凛後凋之栢僅升華於卿月竟鍾瑞於樞星賛我逺圖皆而遺訓班高亞傅特申加第之恩望重世臣益篤傳家之慶可故祖母蔡氏魏郡夫人特贈安國夫人制勑舜帝之後為陳文王之昭有蔡宜其家室貽厥子孫具官某祖母某氏任只秉心温其積行禮嚴舉案曵藻綬於}
  - {type: page-break, offset: 8015, content: '', id: KR4d0311_WYG_022-9a, image: WYG1175/WYG1175-0262c.png}
