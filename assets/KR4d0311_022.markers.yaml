  - {type: variant, offset: 6193, length: 662, content: 第勞來上謂爾冝賞其進一列用勸字民可鍾璵轉修職郎制勑具官某六騩復土五使置官凢備馳驅悉霑賞賚爾祗冗役例進一階茂對恩榮毋忘䇿厲可崔興王信劉旺彭立劉政王才彭辛王用並𥙷承節郎制勑某人等壽春兩寨分扼東西爾能効忠冦不敢犯登名勇爵益厲功多可劉謙王鎔轉兩官並授保義郎制勑具官某等虜旣焚巢爾因削祍易之武級列在王官其加進於二階俾恪勤於乃職可王福轉武翼郎陞差淮西路鈐兼強勇軍都統制勑具官某軍務孔嚴將材匪易爾以挽彊射逺奮不顧身爲吾帥臣所舉升之一秩進領戎鈐任責捍邊尚迪果毅可戴翼轉奉議郎制勑具官某盗發江右蔓延嶠南討平雖倚於元戎奔奏抑資於群吏爾抱材試邑竭力餉軍其進華階用旌勞効可何元壽除户部郎官依舊緫領湖廣軍馬錢糧制勑具官某我思陵詔户部郎建臺鄂渚專緫軍賦自霍蠡始良法美意垂𥙿百丗爾以通練燭物理以沉宻制事冝餉師逾年有宿飽而無後爨襄鄂用壯正序地官之屬増重王人之權有功見知矣主兵主財惟和惟一漢之人傑豈以戰勝攻取而後給餽之勞哉可王伯大除江南路提舉常平茶鹽公事兼知池州制勑具官某朕甚重部刺史之選必試可然後爲眞爾清粹而恬夷多文而有政所至以治行著池陽宻控天塹臺郡常相依而立假節臨藩亦旣滿歳牧御兩得軍民胥安爰疇屏翰之庸就正司庾之寄歛一道之權以重一州又推一州之澤以幸一道田閭爾甦卒乗爾輯吏治爾澄財計爾𥙿賢譽日起豈乆於外服者可李江轉四官授武功大夫依舊淮東路兵馬鈐轄制勑具官某于台之役大小三十七戰而城降士用命也莫府上功謂爾勇鷙而敢戰冝受醲賞峻躋武級緫戍海陵報國赤心更觀來効可趙汝捍和糴賞轉朝奉大夫制勑具官某漢享平糴之利唐𬒳和糴之害行之惟人爾以材選將漕畿内雖乗豐糴賤易於辦集而農, WYG: ''}
