  - {type: variant, offset: 1393, length: 611, content: 知肇慶府制勑具官某朕廣求民瘼毎患郡縣吏不能體篤近舉逺之意故嶺嶠擇守尤謹爾踐歴之乆通練而詳明佐理畨禺蔚有善譽就卑符組假守髙要炎荒凋羸特甚鎮物以静字民以寛吾澤東漸于海矣徃旣乃心罔俾包拯之專美可權刑部侍郎周端朝特轉通議大夫守刑部侍郎致仕制勑孟氏脩身立命不以殀壽易其心曽子正色出辭不以寢疾忘其道生惟無媿殁亦有榮具官某蚤負直聲晚充素學廣厦細氊之上考古以訂今法從屬車之間獻可而替否乆朕心之簡在斯吾道之將行胡不歳寒乃先朝露渺流光之莫返湛正性之長存跋予望之尚想嘉猷之告嘅其歎矣徒勤遺藁之求往升二級之華用作九原之氣可李伯度除直祕閣京西轉運判官兼提舉提刑制勑具官某京右比歳科調轉輸之繁民不堪命朕屢詔寛䘏必賢刺史奉行之爾材周於用政得其平上流並邊之郡治理茂著擢卑庾節民情具冝進丞戎監就領漕輓又華之中祕之直憲庾併以屬爾身兼數噐矣孟子謂省刑薄歛深耕易耨而修孝弟忠信可以撻堅甲利兵人心國勢蓋相爲表裏也往圗稱朕指可顔耆仲直祕閣淮東路提舉常平茶鹽兼提點刑獄公事制勑具官某江淮財賦之淵唐所恃以用其國也朕自親萬務日討御外理内之術顧詹在廷求善治賦者使于淮廼今得之爾開亮而敏精練而實越在省闥事有可否不爲詭隨朕嘉其公爾忘私也輟泉南之行授節東出庾政臬事併咨之而牢盆之課爲尤重本錢給則亭户樂其㢘鈔法定則商賈趨其信浮鹽窒則官府安其義從容笏畫斡東南山海之藏以濟經費可不勉歟可楊椿贈武經郎制勑具官某爾結髮從戎熟知虜勢赤心報國竟死邊鋒陞再級以示襃俾列屯之知勸可李安國轉武功郎依舊, WYG: ''}
