  - {type: variant, offset: 8074, length: 4, content: 益堅控禦, WYG: 守封川民無歎愁易符高凉必能推}
  - {type: variant, offset: 8079, length: 1, content: 圗, WYG: 共理詩不云乎誰能烹魚溉之釜鬵貴不擾也往母鄙逺其民可淮東路兵馬提轄耶律均復山陽有功轉三官授武德大夫兼知淮安州鹽城縣制勑具官某山陽淮之門户間為㓂保王師大討蟻潰䑕逸爾搴旗鏖撃之勇莫府高之叠進武階徃理邊邑加意拊循母失軍民之譽}
