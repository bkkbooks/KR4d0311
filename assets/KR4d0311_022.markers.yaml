  - {type: variant, offset: 8068, length: 2, content: 紹興, WYG: 伯仲壎箎聲問孰禦可四川制置司機宜文字趙珖夫除太社令制勑具官某朕重名噐甚錄其父}
  - {type: variant, offset: 8071, length: 2, content: 付劇, WYG: 勞而進其子於周行不一二見也爾父以名法從當方面撫蜀控秦具有威畧贊籌莫府爾抑有助朕何愛司社不以為循陔之榮哉其砥礪事使人知西平有子可史彌鞏王㝢㩁務羡賞各轉一官勑具官某等筦㩁國計所關羡必有賞爾宅職京口克懋厥官嵗入有常能溢其額俾進陞于一列庸奨厲於勞能史全之監軍平蔡州轉兩官制勑具官某方城負固我師進討摩壘鏖戰遂復故境爾監厥軍計功受賞兩秩升華勉思来効可孫林張旺告發軍姦並補承信郎制勑羽林失馭敢犯紀律爾發其姦悉正顯戮而京邑以寧登名武階儲材将列表示戎行使知懲勸陳文孫知高州制勑具官某炎嶠守吏必諳風土稔習俗然後能盡心於撫字爾端飭而敏於}
  - {type: page-break, offset: 8071, content: '', id: KR4d0311_WYG_022-12b, image: WYG1175/WYG1175-0264b.png}
