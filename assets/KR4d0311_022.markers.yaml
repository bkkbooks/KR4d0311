  - {type: variant, offset: 8026, length: 4, content: 切石頭鍾, WYG: 臣庸追榮于大母具官某祖母某氏淑均姆訓雍肅婦儀采南澗之濵躬承家而共祀有北山之李世為國以生賢睠時樞紐之尊賛我經綸之妙孝思惟永徳報宜隆易郡號於曲}
