  - {type: variant, offset: 5151, length: 437, content: 曽頴茂除直祕閣依舊福建路提點刑獄公事制勑具官某端拱𥘉詔就崇文院建祕閣擇三館書充其中淳化御飛白以扁之穹窿宏敞號稱木天今偉觀猶昔也寓直其間有登瀛之榮爾佩詩書之訓濟聲猷之美亭刑七閩而行帥事薙姦植良民聽用肅朕聞而嘉之俾進直于東壁以重臬臺天球琬琰河圗大訓虹光下飭可挹可攬益思所以稱榮遇可趙彦候湖南路轉運判官姚子材湖南路提點刑獄黄静夫湖南路提舉常平茶鹽公事制勑具官某等重湖以南地大而物夥二三部使者皆賢則列城風動與斯民相安於和平之域爾彦候秀整而雅䟽亮而㓗陳我臬事率乂棐彛其升之漕節爾子材寛夷而栗安恬而邵司我庾事亦克用乂其進之憲節爾静夫平易而敏詳謹而練著績外服善不近名其卑之倉節孔門三子果逹藝皆可從政仁則未也朕同日出三節以參舉一道之政治賦折獄能知用力於仁民其有不𬒳皇華之澤者乎往哉毋虚朕選可陳塏除直敷文閣知安慶府制勑具官某漢科瑣邊吏於赤白囊交馳之後蓋巳晩矣故竝邊擇守綢繆於未隂爾清謹而有立志宣勞江湖間非一日起丞農扈聲問益華皖城闕守其寓邃嚴之直勉爲朕往民嘗苦於征調兵猶疲於戍守恪意鎮撫屹爲保鄣, WYG: 諼兮}
