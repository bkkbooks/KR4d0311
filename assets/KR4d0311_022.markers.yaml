  - {type: variant, offset: 8067, length: 0, content: '', WYG: 最能勉其夫彌縫輔贊之功克昌厥子任方隆於政路報宜侈於脂田進召公故國之封正魯人小君之號音容未泯蠁􅆄其歆故生母俞氏新安夫人特贈和政郡夫人勑綵衣之戲天性真樂板輿之奉人生至榮睠予兩社為輔之英抱此萬鍾致養之憾匪隆禭典曷慰孝思具官某生母某氏毓詩禮之門嬪衣冠之族怡聲下氣奉棘列之尊章柔色令儀佐槖班之君子爰篤生於國棟肆坐筦於天樞心如母存義以子貴易舊封於古歙加新命於西岷不惟紓蓼莪之悲抑亦示白華之勸故妻林氏信安郡夫人贈大寧郡夫人勑召南鵲巢之什夫人起家魯侯燕喜之詩令妻受祉何嗟契濶不逮顯融具官某妻某氏佩服女貞踐修婦則于沼于沚齊明錡釜之供如山如河嫻雅筓珈之飾宜百年之偕老胡一旦之溘先顧予樞臣失此内助宜郡封之加峻俾廟食之增華家抑除將作監丞制勑具官某參井之光下濟岷峨之氣上直鍾其英者多清廟之噐故選抜為盛爾淵於學而睟葩於詞而峻西産之彦也外閫荐以名薦深鐍弗售特招乃來球璧宜在東序而渉匠監之筆朕豈以閬劍善最為可略哉職優事簡姑涵雅}
