  - {type: variant, offset: 8022, length: 3, content: 嚴告猶, WYG: 思宜厚追榮之典積恩徽於大郡新湯沐於名邦象服是宜尚其不昧故祖母汪氏魯郡夫人特贈崇國夫人勑含飴弄孫者家庭之慶為醴烝祖者寝廟之榮肆倚重於}
