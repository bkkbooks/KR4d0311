  - {type: variant, offset: 6875, length: 8, content: 于内軍噐庫廊漢廷, WYG: 諭宰臣十年來欲令宰執進呈退將得㫖文字再具熟状進入朕再行審閲批出然後施行既免專擅之嫌且無遷令之患易曰渙汗其大號書曰令出惟行勿惟反反汗非也號令當反而不反是又遂非也然未當而反不若謹之於樞機未發之先一發而民信之孝祖所以欲再行審閲使無遷令之患也茍熟狀之進隨可隨入而思慮不加焉其}
