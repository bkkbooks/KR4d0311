  - {type: variant, offset: 6, length: 42, content: 飽飯茶甌罷閑觀萬物情狗加獅立號猫冒虎爲名故沼慈姑王新畦腐婢榮蟬從何許變忽送出林聲薄命, WYG: 告兒郎軰寒冷望與救接莊宗即隨其所欲給之蓋威令不行賞賚無節也上撫髀嘆曰三十年夾河戰争取得}
