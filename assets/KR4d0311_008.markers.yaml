  - {type: variant, offset: 5982, length: 544, content: 老偃師滿眼機關無着處到頭線索有収時兩儀亦有盈虧數萬物難逃出入機一把牙籌空自苦蓋棺着得幾通衣避風䑓上深情寵偃月堂中盡意謀争柰天公無面目滿林黄葉一畨秋煑茗燒香雙赤脚撿書洗研一蒼頭斯文興䘮由天在未用安排地起樓元子掃空桓氏業窟郎蕩盡李家風前人留得兒孫立何患鸞枝不長桐方窮蔡澤問唐舉未遇鄴侯逢懶殘觸石起雲能沛雨不應長作旱雷看命有窮通分虎䑕事無得失盡雞蟲東籬獨有黄花在挹取寒香壽阿翁又和青女籠晴試小春門前沙路浄無塵平洲水竹因依好白鷺飛來不避人往來魚虎澗流淺出没䑕狼庭草荒宅近市傍人不到獨迎西日上東墻柳亞溪橋幾換條鬢根添得雪飄蕭清臞自信堪騎鶴最喜無錢絆住腰爾雅蟲魚巳熟知更將埤雅訪農師投糟赤蟹眞無價薦餅黄雞正及時終朝聒得耳神飛東舎西隣盡販機百様攀花無我分慣將簾作後堂衣架上亂書兒自整床頭濁酒婦能謀只將翹足垂蓮勢静對書䆫課弈秋風裏行雲不自由低眉重整玉搔頭桃根縱有飛花渡燕子寧無接翅樓寒燈芳燼發春紅讀到豳詩繼匪風吾道有消還有長欲將此意冩絲桐蟹正肥時秋色老鴉争噪處夕陽殘未湏多進玻瓈盌滿樹霜紅正好看天時人事共流通何用將冰語夏蟲判爲梅花多釀酒春風裏着蜜翁翁仲冬九日還可庵謁墓遂入都未放梅梢一箇春枇杷花巳玉嶙峋霜靴帶取苔㾗去應𬒳孤猿野鶴嗔䑓中聽雪淅瀝松㕔夜空山一様聲冰霜元自勁水月更添清衾薄難留夢䆫虚易得明庭烏催, WYG: 宻}
