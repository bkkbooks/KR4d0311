  - {type: variant, offset: 6527, length: 324, content: 墨未曉巳先鳴太一宫齋祭呈司封呉舎人立春前一日寳鑰轟霄啓玉晨風恬雪霽浄無塵東皇太一紫壇曉丗界大千青陸春藜杖流光環珮集鏠旗歛影豆籩陳樂歌湏仗甘泉筆斧藻天家㤗道新謹和老人除日吾道何通塞人情自寂喧無羔還可茗有鶴不湏錢議論追嘉祐聲名續正元壽親惟此爾一笑栢椒邊清凉院僧房致齋花片墻隂晚禽聲屋角晴東風猶峭在煨芋坐深明銓闈董試上巳二絶天氣年年只麽新官忙不似舊閑身油車畫舫西湖閙可惜埋頭典却春柳暗鴉嬌日正長筆頭風雨響脩廊一簾芳碧雙蝴蝶也解㝷人姓字香除夜哭内宻雪踈風客屋穿幾回除夕伴憂煎團欒方索日邊飯契闊巳成松厎眠畫火何堪思舊事理衣誰與管新年平時戒汝無多酌争得屠蘇到汝前省闈試士東風蓆帽快行催渾爲天家造士來捧詔九霄雲氣濕分題五色日華開㨂金沙裏湏精鑒脫頴囊中盡異材容受直, WYG: ''}
