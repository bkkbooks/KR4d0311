  - {type: variant, offset: 2116, length: 2090, content: 不着半點塵天地萬象肧腪春扇者橘書者栗瓢者术韁而掣者葛笠而鞭者拙中間厖然大者雪從我兩髯三髧一蹩躠驢何鈍奴何癡前掣後鞭趣使馳麾鞭愈急行愈遲掣韁欲斷人驢疲但見尻秃秃蹄局局欲墜不墜止鳴木本無伎倆能噴玉正可吞聲春草緑先生御氣存其神下驢歩行意更眞從渠蹇材拗莫馴超然目送八極轡鳯驂麒麟歳晏得路隻輪車易上失時獨幅𬒳難眠淡黄虀飯茅柴酒東掩西遮也過年百想卧輪翻伎倆三生圎澤弄精魂何如静對梅花坐春滿江南雪後村謹和老人賦梅寄得江南驛信來窺林映水幾枝開形容綺語空能絮酬荅芳心揔巳灰厭舊趍新和粉染奪眞弄假點酥裁紛紛兒女春風惱却笑詩翁醉打隈和趙保之青田即事寶犀壓帳春風入渇烏傳箭寒澌滴砉然推枕起放衙霜月滿庭鳬鴈集簿書顛倒六作五文移縱横一取十精神坐照吏姦破政事流從儒術出墨池霹靂送飛雨積案如山笑譚畢逢迎合爪逓相賀戒石亭前見天日公餘琴疊舞胎僊客退爐熏齋繡佛芳蹊桃李不自言舊燕新鶯沸消息詩筒入手如見面金井新泉生玉色汗青不朽湏早計過眼年華征羽急臈月二十五夜䏑玉懷雪貍膾銀憶冰鱭異哉山澤荒坐我窮鬼祟兒頭似耶白相對玩殘歳爐寒灰熒熒檠涸燈翳翳擘柑老赤脚煖酒小青髻一酌佳入蔗再酌甘勝薺陶然㑹道妙嗒然司德契吾身與乾坤共此小關棙三百六十節一節一節繫四萬八千息一息一息繼日月有往來隂陽有開閉太和行其間周流無邊際臈盡梅紛披春回柳揺曵非時難強揠有命莫過計顔回簞瓢空季路緼𫀆弊只恐非大賢公不待後丗送程宗武遊岝㠋驟暖揠芳意薄遊烘軟塵亂山雲氣曉啼鳥杏花春人物少催老物華新換陳一聲鏗爾瑟沂水緑鱗鱗謹和老人雪晴雲屏九折跨三休公欲行春雪不愁逗暖流澌鳴暗谷送晴倒景漾層樓似無似有草㾗動半落半開花氣浮婆餅焦聲林外起便從野渡喚横舟元寂宫生祠行上元庚申間臺珍館嚴鶴林老桂鉅竹籠春隂騎鶴僊翁杳莫㝷適從何來貂挿金裳珮丹青雜璆琳旗旛繡綵薫甲沉蕊函三洞羅森森雲璈九奏鏘愔愔擁爐歩虚揺箕參稽首寥陽祈博臨庭下朝謁紛冠簮願言福壽髙於岑問子爲誰對輙瘖以目代口手拊襟伊民豺虎國蠧蟫細大敲剥無遺針凛虞膏血供几砧巧䛕曲媚求回心天乎少戢湯火燖庶幾沸魚逃釡􅑄上帝福善禍必淫髙目下耳一監歆察此頌禱皆呻吟革彼飛鴞懷好音嗚呼愛而祠者古畏而祠者今安得皥皥相忘武城弦歌單父琴婆餅焦萬斛精神一握身清吭宛轉欲飛塵雞纔唱後便知曉燕未來前先得春驚覺海棠休苦睡提醒楊柳莫空顰最憐吉語能相報麥熟同爲皷腹人孫教授挽詩手織天孫錦胷吞海若洋官卑材不盡年往慮空長啼鳥呼春夢飛花餞夕陽唯餘君子澤挿架簡編香笋蕨小兒握固骨何弱稚子着綳肌尚寒豈不愛渠風味好只應催我鬢毛殘浴罷氣體和浴罷氣體和坐睡便胡床首欹如汲瓶數俯輙一昻瞢騰復瞢騰慾泯想亦忘乾坤孰髙下今古誰興亡矍然瞠兩眼踈䆫半斜陽䆫下櫻桃花無風自吹香金不換歌東家鼎貴萬户侯西家暴冨十谷牛喚絲呼竹進玉舟把酒巳作明朝愁中間人家賤貧慣旣得未得兩無患晏眠起喫盫菜飯飯罷亂拈書冊看此樂名爲金不換酬東風引魏鄭公田舎翁陸敬輿老獠奴斯人斯人尚如許薄命蛾眉何足數野桃溪杏次第紅脫袴博酒酬東風溪行却掃晝隂永意行溪上汀鬢華年减黒草暈日添青魚舞新磨鏡鷗飛小畫屏梨花寒食近誰與管飄零用呉祕書正月晦韻攬春群玉冩芳懷次第安排到藥苔但得斯文留脉在湏教我輩放眉開踈風細雨桃花過竹屋柴門燕子來老去湖山無復夢荷鉏西崦覔榿栽禮滅翁退天台能仁院歸梁渚一絶寄之倒劄枯藤立晚風山光不與水俱東蘋花落盡蘆花老地闊天髙一箇鴻㯶櫚舊脫敗蓑亂新添華節髙肅容春尚静俠氣夏方豪黄孕子魚腹青披孔雀尻豐撞知可製雷動景鍾號碧桃曲草平不斷瑶池路樓礙東風花滿樹緑眉素頰澹裙裳月華暖透三更露雙成飛瓊妬髙妍引梢揺月分嬋姢雲璈一曲迸空碧青鸞驚起花翩翩燭下次海棠紅深翠淺浣花春投老相逢過所欣有許精神冝半睡無多醖藉莫全醺涵渟芳露湏饒月籠護晴暉不礙雲成就化工眞冨貴天香更與牡丹分送李微之倅成都鳯生丹山西來爲太平符矯立青琅玕祥雲蔚相扶一鳴合簫韶再鳴應騶虞散爲清明風萬象皆旉與色舉抑何决矢脫金僕姑戞摩參旗髙可望不可呼穿花迷嬌雉唼藻戯乳鳬搔首重太息春隂渺江湖次叔厚韻夢斷紅塵踏九衢雲山佳處借樓居採將瓠葉隨冝煑拾得榴皮信意書未問我今忘我丗湏知吾本愛吾廬黄公壚在花隂裏磊砢從君一破除二佳佳笋如佳人柔晢飽風致佳醑如佳士醇明負骨氣此笋配此醑可愛不可醉得醉豈不好醉恐不知味蔚如王謝家文雅將冨貴二月二十七遊僊洞次壁間韻點脚地維絶舉頭天語聞瀑泉飛響雪洞石湧崩雲縹緲追元放低回揖郭文神清知好在煙鎻緑苔紋用韻荅趙主簿逸氣蓋三謝英詞參二班飛緌冝北闕枉駕忽東山花妥晝隂寂絮吹春思閑光風知幾轉盡付酒杯間謹和老人羅山自鑄鐵成錯誰吹灰使然俗情床上下野趣宻中邊花豔明光錦苔㾗白打錢醉翁詩板在山莫放童顛寄題辛氏塵外樓羅浮三十里樓對玉崔嵬風卷軟紅去雲扶飛翠來㑹心湏盡帙適性莫多杯除得翳根盡靈光生鏡臺𥘉夏鶴帳華纓絶牛蹊老屐穿薄晴生晩哢深緑護餘妍萬卷不堪煮百懷空自煎朱櫻黄苦笋小酌便陶然里人送芍藥用韻詩