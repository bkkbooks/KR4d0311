  - {type: variant, offset: 7182, length: 12, content: 晚重壓牛車倍費鞭閏月卄六, WYG: 獸奔恬不為怪於是兵律壊國勢㣲矣英主欲大有為宜以世宗髙平之事為法群臣請上尊號及作樂神宗以久旱不許群臣固請富弼言故事有災變皆徹恐陛下以同天節虜使當上夀故未斷其請臣以為此盛德事正當以示夷狄乞并罷上夀從之即}
