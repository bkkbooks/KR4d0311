  - {type: variant, offset: 1846, length: 0, content: '', WYG: 民志上下不辨民志何由定民志不定而欲求國勢之安强是却行而求全也况三軍以紀律為重處不}
  - {type: page-break, offset: 1846, content: '', id: KR4d0311_WYG_008-2b, image: WYG1175/WYG1175-0174b.png}
  - {type: variant, offset: 1847, length: 8, content: 梅亦解分身送李致, WYG: 禮則出不知律犯上之意一萌作亂之機已兆尚可望其敵王愾而伸國威哉唐自肅宗偷一時之安平盧節度察軍中所欲立者授以旌節自是以姑息為常至於偏禆士卒殺逐主帥而不問亷}
  - {type: 'kr:newline', offset: 1852, content: '

      ', id: KR4d0311_krp_008-bkkkrnewl159}
  - {type: line-break, offset: 1852, content: '', id: KR4d0311_SBCK_008-7b04}
  - {type: indent, offset: 1852, content: 　　　　, id: KR4d0311_krp_008-bkkind45}
  - {type: variant, offset: 1856, length: 0, content: '', WYG: 地則堂高亷近地則堂卑陵夷之勢何所不至此唐所以亡也後唐莊宗猶襲故態不能以軍法約束而威令不行享國不永竟坐姑息之過我太祖皇帝受天明命為世立極盡革唐季五代禮法蕩析之弊一階一級上下相承川班妄訴必肆顯戮此所以國勢有金城千里之固民生有泰山四維之}
  - {type: page-break, offset: 1856, content: '', id: KR4d0311_WYG_008-3a, image: WYG1175/WYG1175-0174c.png}
  - {type: variant, offset: 1857, length: 4, content: 逺簿二首, WYG: 也然豈徒以階級之法懲之哉平時撫養不吝爵賞茍犯法則有劍恩施而後威立宜軍心悦服不敢輕於有犯也憲宗嘗與宰相論治道於延英殿日旰暑甚汙透御服宰相恐上體倦求退上留之曰朕入禁中所與處者獨宫人宦官爾故樂與卿等共談為理之要殊不知倦也人心不可以兩用有所慕則有所忘好善者忘酒樂德者忘色八年於外急於拯}
  - {type: page-break, offset: 1857, content: '', id: KR4d0311_WYG_008-3b, image: WYG1175/WYG1175-0174d.png}
