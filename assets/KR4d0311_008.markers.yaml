  - {type: variant, offset: 7155, length: 0, content: '', WYG: 紙作掌記㣲偃兩旁而中摺之寘在御手若内殿則留香案上三省宻院奏事畢即視所記}
  - {type: variant, offset: 7156, length: 1, content: 點, SBCK: 􅀧}
  - {type: variant, offset: 7156, length: 2, content: 點光, WYG: 一宣諭已乃收之人主日總萬幾之煩而心思有限安能無所遺忘孝祖聰}
  - {type: variant, offset: 7159, length: 1, content: 徧, WYG: 睿智與神為謀猶識所欲宣諭之事於掌記可謂文理宻察矣故凡禁嚴清燕之地經史之所閲典故之所聞群臣章奏之所采有當與}
  - {type: page-break, offset: 7159, content: '', id: KR4d0311_WYG_008-7b, image: WYG1175/WYG1175-0176d.png}
  - {type: substitution, offset: 7159, original: 徧, replacement: 遍, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-17526}}
  - {type: variant, offset: 7161, length: 0, content: '', WYG: 臣恭酌可否日隨記於其上俟坐論從容歴舉而訪之大臣所知悉心以對所未及知則討論以進久而天下事無一不明習而洞曉其益豈不多哉明道中執政除親舊二人為正言司諌上謂曰祖宗法䑓諌官須出宸選若大臣自除則大臣過失無敢言者治平二年以范純仁為殿中侍御史吕大防為監察御史裏行近制御史有闕則命翰林學士御史中丞迭舉二人而上自擇取一人為之至是闕兩貟舉者未上内出純仁大防姓名而用之臣聞臺諌天子耳目之官耳以司吾之聰目以司吾之明而人執之可乎張行成無先容舉為殿中侍御史栁公權有諍臣風屈為諌議大夫萬乗親擢邇臣莫與夫如是則任耳目之寄者激昂振勵思稱主知周而無所比正而無所阿朝政之得失廟論之是非相業之修廢不吐不茹悉以上聞不至於懐私恩徇偏見以亂天下之公我朝祖宗法臺諌官須出宸選正以是也異時唐介論文彦博王陶彈韓琦以二輔臣之賢猶不為之少隐况下於文韓者乎雖然臺諌不由進擬固足攬御臣之柄要必人主有至明之見而後能奮獨斷以聳衆望否則不謀之外廷謀之左右親暱附下罔上抑又甚矣大明在上邪正洞燭得范純仁吕大防而内出姓名得歐陽修余靖王素而御筆親除斯無愧累朝之盛唐貞元中宣武都知兵馬使李萬榮逐節度使劉士寧上聞之使問陸贄贄上奏士寧既逐雖是衆情萬榮摠軍且非朝㫖願審之謹之上復謂贄曰今議除一親王充節度使令萬榮知留後贄復上奏曰夫制置之安危由勢付授之濟否由才勢如器焉惟在所置置之夷地則平才如負焉惟在所授踰其力則踣為國之道以義訓人将教事君先令順長若使傾奪之徒便得代居其任利之所在人各有心此源潛滋禍必難救非徒長亂之道亦開謀逆之端上不從竟以萬榮為留後臣聞名分者天下之大閑植之則治隳之則亂唐自天寳以宴安兆釁君失其尊肅宗復國宜思挈皇綱於既墜扶大分於寖隳乃就平盧軍中察所欲立者授以節旄自此廢置之權在軍士而姑息之弊開至代宗專事姑息僅止覊縻德宗加甚焉李萬榮逐劉士寧而自摠宣武陸贄以傾奪長亂為諌曾莫之聴夫姑息者陵夷之本姑且也息止也茍圖一時之静急求目前之紓而莫計其窮是以强藩悍将敗國事者不敢問冐國禁者不敢討屈情抑勢俯而就之以順適其意所求必從所請必獲倨傲偃蹇莫知禀程始則節度不知有朝廷久則将校不知有節度更相睥睨見便則奪犯上者必好亂德宗亦安能禁萬榮之自為留後乎然使當時君德修明朝綱振肅不以猜忌踈臣下不以聚歛苦民生禁兵非市井之富児軍政非宫庭之嬖倖以至在列皆陸贄而非盧把皆李泌而非張延賞則朝廷之勢重於九鼎藩鎮安得而輕視之藩鎮之敢於干名犯分朝廷輕故也自昔安有朝廷輕於上廉傾級圯而能措大器於安者哉魏世祖東如許昌大興軍伐吴親御舟循蔡潁浮淮如夀春至廣陵吴徐盛為疑城自石頭至江乗一日而成又大浮舟艦於江時江水盛長帝臨望歎曰魏雖有武騎}
