  - {type: variant, offset: 7028, length: 125, content: 風古拔士先隨聖化新収歛文章歸獻替安排事業到彌綸宸章屬望丁寧甚上荅天恩莫愛身謹和老人瘳字韻本期洗眼看伊周到此華胥只夢遊爛熳蒼苔心事晚婆娑紅槿鬢華秋藏頭欲効鑚沙鼈捫舌空成噍草牛飯豆芋魁渾好在得歸不藥病還瘳謹和大人喜晴雨脚如麻日日然垂成生恐壞豐年九重肸蠁通, WYG: 帝臨朝每以}
