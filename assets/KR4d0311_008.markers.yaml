  - {type: variant, offset: 7195, length: 3, content: 奉御香, WYG: 而雨弼又上䟽願益畏天戒逺佞姦近忠良神宗親書答詔曰義忠言親理正文直茍非意在愛君志在王室何以臻此敢不置之枕席銘諸肺腑終老是戒更願公不替今日之志則天災不難弭太平可立俟也臣聞詩曰文王陟降在帝左右又曰陟降厥士日監在兹上天之心與君接人君之心與天通一陟一降隨寓隨在初無毫髪之間五事有敬怠則庻徴有休咎其應如響之應聲我神祖以久旱輟同天節上夀之禮積隂即日而雨陛下以雷變寝天基節上夀之禮積隂即日而霽夫豈人力所能致哉此心即天心天心即此心也富弼於既雨之後奏益畏天戒逺姦佞近忠良盖姦佞之逺忠良之近即以畏天戒人意在於進君子退小人人君欽承此意而行之則寅畏之實也答詔欲弼不替今日之志君臣交相警戒宜有以}
