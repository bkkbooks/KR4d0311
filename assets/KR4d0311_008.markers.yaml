  - {type: variant, offset: 4647, length: 1089, content: 建鼓勸竭作除田緑紛披滿築沮澤岸平流綺堘陂定約欲水均執熱願雨隨破柱雷電合危簷溜紳垂成功一天瓢収穫萬京坻開元正觀盛閉關更休師和趙青田燕坐青田鶴翁杜德機天根月窟手探之嬰兒姹女熟摶弄妙處不許旁人知渠家庭院紛花藥啄木黄鸝幾推郤流蘇百子卧春風萬慾難供無厎壑生門死户一線間内丹走盡求外丹明朝赤黄裂大山護鼎龍虎方閑閑新秋藥名兩首老色蒼蒼耳向聾秋聲欺得白頭翁已甘草詔元無分只苦耽詩乆欠功引興從容風月足放懷浪宕水雲空雨餘凉意生庭户夜半天河鵲信通兩眼旋花雪點鬚鑚頭故𥿄枉工夫勌懷懶附子公櫝閑性熟諳摩詰圗枝拂雲香行到桂葉隨風舞又催梧乗槎欲到空青問織女牽牛事有無謹和老人官山看髙子厚修墓秋風問訊老芙蕖靖節前行後阿舒緩䇿穩過金絡馬小烹佳勝蔗漿厨何榮何辱人千古誰是誰非冡一區遇着好花隨處醉莫論他屋與吾廬用子有述懷韻爲壽筆力強於二石弓文埸早合擅元戎東西塗抹未爲老左右圗書那得窮三日窺牛酬壯志十年到鳯䇿竒功更湏傳取長生訣蜜炬髙燒不受風俞成大送新芋謝三郎女敗蓑衣繿縷中藏玉雪肌柱下莫愁無乳媪秋風得此可忘飢范待制子長挽詩二首太白曉𦦨𦦨飛鴻秋冥冥氣節蚤巳勁勲名晚逾馨冰霜蜀棧蹇風雨秦關腥一范不可作岷峨千古青生不餌栢寺死纔跨松階浮雲忽易滅明月終難埋宇宙卓有立江山渺無涯掩卷獨搔首西風知此懷和俞成大八月梅花秋光深處送春來青葉扶踈數點梅料是知君新釀熟攙先九月菊花開謹和老人秋日遣懷鬰鬰年來亦欲東窮魔揮斥欠天蓬得甜自喜皆花宻與苦相忘獨蓼蟲張望紅秔新作業柴桑青菊舊家風隣翁強解人間事數問朱轓甚日熊月下用鄭大參和沾維那圎覺韻無縫冰輪萬古同御風飛到碧天中四方上下無遮礙一點清光處處通東山即事西風卷宿祲天髙近重陽閣虚自沆瀣塔静能琅璫幽花多素英穠香奪春芳老木未黄落繁隂生夏凉棋雋决楚漢杯壯迷彭殤醉㡌信孟嘉歸鞭忘葛強萬事貴適意誰能扣蒼蒼九月四日過増口道中秋光拍塞小村墟髙下人家意自如屋厎四蠶抽蛹細墻頭三桂着花踈握兒早秫酒無限杓子晚菘虀有餘大似元豐年界好天應容我老樵漁謹和老人九日樓頭獨立夕陽西摇落髙風萬木嘶人自官芻銜馬口我方社酒薦豚蹄一塵不着青銅鏡萬法皆空黒􅃮箆節後龍山應更好秋光拍滿錦障泥謹和老人賦牛尾貍二首踏白霜明夜牽黄木葉秋斕斑文未豹觳􅑌䏑先牛壓玉開三面蒸酥讓一頭酒邊纎手削醉倒老浮丘北雪佛貍種西風金狗秋謀生貪過䑕逃死喘如牛糟熟涎奴舌虀芳點客頭何時明獵火吞盡楚青丘趙忠簡孫璧見過有詩用韻薄命窘震凌餘生颯糞朽閑閑飽欵竹寂寂老鍜柳溪空漁争隈野熟飲𬒳肘有隣晨致薤無客夜剪韭忽來闖户屨自挈問字酒𥘉見了眉睫徐語應心口顧予果誰與恐子不我友維昔燕夾攻坐使汴失守應奉固亂階新法實禍首療危非庸醫救敗湏國手豐魏兩翁奮關洛孤憤乆人謀宻相濟天意斷非偶攻守豈, WYG: 所議}
