  - {type: variant, offset: 6854, length: 12, content: 聖好聽臚唱響春雷六月五日, WYG: 臨軒策士而用詩賦非舉賢求治之意乞出自宸𠂻以諮訪治道至是上御}
  - {type: 'kr:newline', offset: 6862, content: '

