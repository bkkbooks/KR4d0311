  - {type: variant, offset: 5, length: 0, content: '', WYG: 十餘年窮極滿盛收冀財貨縣官斥賣合三十餘萬萬以充王府用減天下租税之半散其苑囿以業窮民臣聞財用之在天下如血脉行乎一身可通而不可壅王者藏富於民覇者藏富於國其下富不在國又不在民而在於聚歛臣之家蓋自正道不行而人心壞人心壞而吏治壊舍義趨利假公售私朘民自封一孔不貸柄國者又為生姦受盗之府而天下之富偏聚焉此冀所以積至三十餘萬萬而未屬饜也夫財本吾國之有而取以助國財皆吾民之出而還以予民其理順其政公故收冀家以充王府而减租税天下以為快後世莫以為非不謂桓帝能行之也太祖問李承進曰莊宗以英武定中原享國不久何也承進曰莊宗務姑息將士每出禁民衛卒必控馬}
