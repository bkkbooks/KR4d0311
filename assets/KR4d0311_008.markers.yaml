  - {type: variant, offset: 285, length: 1558, content: 公平賢大夫筆端知已有劵外得心無落日揺墻竹淒風墮井梧蓄深施不盡留與讀書符和子有催歸卜廬必擇地買鄰不論金出機與入機去心即來心拗性臨川翁罷相老境侵霜竹鍾山寺雅寄金玉音強項峨眉僊渡海憂患深𥝧稏陽羡田歡言飽甘霖故山月在眼客屋風滿襟欲歸欠生業隨寓如家林覔榿適閑趣借竹供清吟俛仰一逆旅乾坤古猶今謹和老人蓮桂二絶點破秋光數葉荷水清時見小魚過渟涵風露三更足収拾江湖萬頃多搗成一百八丸黄入手能令熱惱凉金粟如來身巳化蕊珠僊子骨猶香移居西郭重樓閏九十八欲歸未辦買山資東寄西存漫一枝樓上起樓渠自巧客中作客我何癡﨑嶇溪歩通虚市鬰屈山蹊護短籬不用子猷親種竹屋頭元有緑猗猗自和得寮便住似西資誰暇安巢更擇枝閤宻不妨中酒聖樓明大好養書癡誌公分料存刀尺龐老家風欠笊籬大厦千間宵八尺傍人莫笑太窮猗小雪前三日鍾冠之約余侍老人行山舟發後洪入杜塢自鄭蓋庵過閬山趍翔鳯山菁山徧覽楊墳秀園遂至何山道埸山乗興薄呉興訪玉湖書院水晶境界而歸自戊子至庚子隂晴相半勝處輙徘徊賦詩飲酒偉哉觀也數詩見後溪流轉處兩三家落落踈林淺淺沙可是小春風物早檐頭一束杜䳌花右長橋渡止水攪不動好山邀輙來松間寒月晚似欠兩翁催右閬山妙嚴院松月堂讀張汪二公詩有感用無垢韻鈎輈格磔鳥呼晚勃窣媻姍人試寒野水不流山四合寶華雲裏着欄干一徑白雲明似雪滿山紅葉豔於花過溪買酒等閑事只恐客來非當家右宿妙勝閣無雨又無日此行天相之荒園遺木老古隧得峯竒霜晩𬞞猶劔風温茗巳旗行厨何用許勝處可忘飢右出閬山狂暖釀成雨逆風揺斷橈寂談王舎衛悶想欎臺蕭遊興孤芒屩歸期數翠翹推篷占霽色木末散聲招右謹和老人鳯口遇雨聽雨客無寐放晴山有靈禪關深紫翠勲廟肅丹閑事只恐客來非當家右宿妙勝閣無雨又無日此行天相之荒園遺木老古隧得峯竒霜晩𬞞猶劔風温茗巳旗行厨何用許勝處可忘飢右出閬山狂暖釀成雨逆風揺斷橈寂談王舎衛悶想欎臺蕭遊興孤芒屩歸期數翠翹推篷占霽色木末散聲招右謹和老人鳯口遇雨聽雨客無寐放晴山有靈禪關深紫翠勲廟肅丹閑事只恐客來非當家右宿妙勝閣無雨又無日此行天相之荒園遺木老古隧得峯竒霜晩𬞞猶劔風温茗巳旗行厨何用許勝處可忘飢右出閬山狂暖釀成雨逆風揺斷橈寂談王舎衛悶想欎臺蕭遊興孤芒屩歸期數翠翹推篷占霽色木末散聲招右謹和老人鳯口遇雨聽雨客無寐放晴山有靈禪關深紫翠勲廟肅丹青鼇負摩雲碣龍扶拱日屏眞如無盡意石澗水泠泠右翔鳯山資福寺古木隂隂兀老蒼月於踈處弄昏黄廵簷不見梅花面認得東風句子香小䆫無欠亦無餘一榻翛然雪透膚収拾故書藏恰好怕人冩入鳯山圗右宿資福小閣次梁間韻生前圗形燿凌煙死後起冡髙祁連垜樓隂合蒼官立輦路苔生石翁泣呉人最重十月朝𥿄錢掛冡風飄飄積金至斗命可買玉帶貂冠鎮長在右楊墳日髙褁飯看何山山缺東南水遶關松檜不揺風自度讀書聲在白雲間右何山書堂何山如幽人道埸如大家穰穰衲子脚刺刺騷翁牙挾雋控寒飈搜光躡晨霞危顛矯窣堵平疇畧汙邪巖泉跑虎湧徑松髯龍拏鍾𣑽破深寂金碧開紛葩脩廊歩屐峻傑閣望眼賖山勢珮玦矗湖光鏡奩谺清苕杳靄入古弁空𪷟遮列翠軒名新建不可唾群籟無敢譁坐我旃檀林酌之槍旗茶宇定岫出雲語妙天雨華吾生乆墮甑昔遊慣乗槎夷猶廬阜陽宿留岷江涯髙曽凌嶠棧卑或搜崖窪昨夢難歴省此行足雄誇老親八十健閑儔二三嘉拍浮一葉眇収攬萬景奢冨貴上蔡犬貧賤東陵瓜未湏笑落鐸誰能苦觰沙候門占噪鵲旋橈趂歸鴉竒事恐没没舉詩屬僧伽右道埸山苕霅趍太湖地少天宇寛髙低寶樓閣盛之水晶盤中有讀書廬八䆫頫晴瀾衡弁儼相望不受湖光吞彼美金玉人伊吾斗䦨干騎鯨渺何許衰柳風露寒右玉湖書院懷二倪繫舡官柳根闤闠得深宻日落逺水明雲収好山出天開有聲畫人立無價璧酒行不湏多鷺下菰蒲夕右葉推官無盡景梅兩絶風霜揺落都盧盡一點春回造化家萬物成終又成始湏將艮體看梅花寒根不與物俱陳髁髁梢頭寂寂春却月凌風誰㑹得不沾一葉是眞身和樓前梅兩絶飛香漲艶拍簷牙暖熱樓居鄂陸家寶髻盤鴉冰柱曉倚䦨平折北梢花樓髙夜静月華陳冷浸含章一叚春人影花光相, WYG: 以辨}
