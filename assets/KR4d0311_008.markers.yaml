  - {type: variant, offset: 7166, length: 8, content: 花厎散愁銷野次葦, WYG: 姑息之政矣臣聞軍國之綱紀莫大於賞罰有賞而無罰則惠䙝而威不振白刃在前誰肯委命此軍法所以不立也近年以来僨軍之将未嘗有顯罰}
