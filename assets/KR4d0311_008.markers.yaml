  - {type: variant, offset: 4314, length: 332, content: 鳯舞鸞飛今帝家遺廟斷垣低槲葉荒村舊井濕桐花馮夷尚怕潮頭弩一望西興渡口沙滅翁爲日者求詩大橈甲子一串穿東州西州走諸禪芭蕉虚實果何物橄欖苦甜猶問天華光佛壽十二刼瞿曇像法一千年兩翁見子肯倒屣好爲推到無生前用鍾侍郎韻贈懶谷蒲團竹几妙髙臺瞑坐何能放眼開門外白雲多事在又將飛雨出山來暑夕樓髙収晩照野逈送宵隂鷺下汀沙静螢行岸竹深攖寧和順氣縁督正平心轉物天機妙昭文不在琴王章皂囊盥手自封題忘却牛衣忍凍啼一點丹心通碧落歳寒寧負白頭妻暑坐隔簾草樹隔溪山宻宻深深洞啓關水色山光無障礙南風送入亂書間謹和老人夏日東山即事二首剗草根湏盡傳花葉未多明波撑窣堵老石卧盤陀煨美甘分芋蒸肥欠褁荷醒然下山去明月滿林阿菜把野園送花枝隣巷賖搗蟾和絳雪騎斗弄青霞古帖臨禽李新詩續稻瓜晩凉隨杖履携酒訪魚槎田家建除, WYG: ''}
