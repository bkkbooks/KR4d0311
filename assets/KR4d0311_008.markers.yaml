  - {type: indent, offset: 6862, content: 　　　　, id: KR4d0311_krp_008-bkkind128}
  - {type: variant, offset: 6869, length: 0, content: '', WYG: 進士初就席有司猶給禮部韻及試題出乃策問也既而賜葉祖洽已下及第時韓維吕惠卿初考策阿時者多在高等訐直者多在下等自鄉舉里選之法壞而取士惟虛文是尚漢策賢良雖未免以利禄入其心科别或有未竟猶不失言揚之意唐進士得人為盛特絺章繪句之習工如日五色何益世用國朝策士初襲唐人辭章之咎至此始以}
  - {type: page-break, offset: 6869, content: '', id: KR4d0311_WYG_008-4b, image: WYG1175/WYG1175-0175b.png}
  - {type: variant, offset: 6870, length: 2, content: 士從, WYG: 諮訪治道與漢制科等其意美矣然草茅言事豈能皆若素宦於朝而効忠獻直悉出於愛君憂國之眞情言之當固不以人廢言之過亦貴於能容人君能容過直之言市駿骨揖怒蛙感興發作之下孰不以安危治忽之實來告茍有司喜阿逄而惡訐直以行上下其手之私如吕惠卿􅒰美意一失奚以臨軒發策為哉維我仁宗之策蘇轍其言宫中事過於直上曰以直言求人而以直棄之天下謂我何可謂有大舜之大矣是時考}
  - {type: page-break, offset: 6870, content: '', id: KR4d0311_WYG_008-5a, image: WYG1175/WYG1175-0175c.png}
  - {type: variant, offset: 6873, length: 1, content: 待, WYG: 則司馬光范鎮蔡襄唐太宗謂蕭瑀曰朕少好弓矢得良弓十數自謂無以加近以示弓工乃曰皆非良材朕問其故工曰木心不直則脉理皆邪弓雖勁而發矢不直朕始寤向者辨之未精也虞人有原獸之箴輪人有糟粕之議工執藝事以諫不聞於世久矣而唐之弓工獨得古意其言蓋以規太宗功業雖盛而治心之道實未嘗講也夫心者萬理之㑹萬事之主此心明白洞逹無一毫迂曲之累則見面盎背皆天理之形著發號出令盡人心之契合敬義直方所以相為表裏也太宗天姿高而學問不足其得在於好名其失亦在於好名好名故能矯揉為善惟名之好而觀省存養之不加故矯揉之力怠而禀受之偏者不能掩輕我宫人之怒不役一夫之怒㑹須殺此田舍翁之怒以至好大喜功而多愛無非本心之發露也木心不直脉理皆邪雖勁而發矢不直弓工可謂善窺其君心術之㣲矣太宗亦可於此進格物正心之功矣其謂勇辨謟諛姦詐嗜慾輻輳以攻一心是特知制外而未知養内安有内心不治而外邪可閑者哉孝宗皇帝}
