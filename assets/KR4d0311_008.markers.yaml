  - {type: variant, offset: 7162, length: 2, content: 喜動, WYG: 羣無所用之未可圖也帝舟遇暴風漂蕩幾至覆没乃旋師臣聞江流湯湯萬古一天險也而飛渡者有之曹操之至赤壁曹丕之至廣陵佛狸之至瓜歩逆亮之至采石皆望洋奪氣或且送死豈長江隨時而為險夷耶天險在勢人險在德與政君無闕德天人交助夫誰敢犯之其次}
  - {type: page-break, offset: 7162, content: '', id: KR4d0311_WYG_008-11a, image: WYG1175/WYG1175-0178c.png}
  - {type: variant, offset: 7165, length: 0, content: '', WYG: 無闕政紀綱立賞罰明號令信任賢使能各當其才則人謀咸賛國勢増强坐有以制勝矣丕之再飲江窺吴輙自廢而返非特川后之效其靈孫權為國靡政不舉謀臣勇将咸樂為用疑城相望巨艦相衘而丕膽落天限南北宜其不敢以一衣帶水易視之也是知天險待人而固德政増修勝勢在我東南有㤗山之安矣周世宗擊北漢主劉崇於髙平之南樊愛能何徽引騎兵先遁帝欲誅愛能等以肅軍政猶豫未决張永德曰愛能等望敵先奔死未塞責且陛下方欲削平四海茍軍法不立雖有熊羆之士百萬之衆安得而用之帝擲枕於地大呼稱善即收愛能徽及所部軍使以上七十餘人悉斬之自是驕将惰卒始知所懼不}
