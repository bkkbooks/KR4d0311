  - {type: variant, offset: 2458, length: 0, content: '', WYG: 之功承以文法則僅救目前之過惟承之以德則髙明光大之懿緝熈於九重溥博淵泉之澤滲漉於海内天下莫不以手加額賀吾君之有子後世亦莫不稱其為天下得人之仁父之譽豈不充塞於天地之間乎文王當商末蠱壞之世有志未遂武王以聖德繼之而文之聲益廣此爻應之上九不事王侯髙尚其事象曰不事王侯志可則也臣聞功名之士輕富貴道義之士輕功名世道蠱壞少有抱負者孰無趋事赴功之心而上九乃不屑事王侯豈其恝然忘天下不與世同其憂哉費惠公曰吾於子思則師之矣吾於顔般則友之矣王順長息則事我者也繆公亟見於子思子思不恱以位則子君也我臣也何敢與君友也以德則子事我者也上九居無位之地而道足以為王者師茍其時上無明天子下無賢諸侯詎肯屈道而事之潛心太極之先獨}
