  - {type: variant, offset: 76, length: 147, content: 故故隨人後客月依依墮我前半夜索樽同決計五更囬柂不成眠筍輿吹面新凉入湏信封姨正自賢次及甫韻送致逺别塞塵没没馬蕭蕭丗事今朝異昨朝爲羡白鷗何浩蕩却思斥鴳亦逍遥平沙露磧江波歛逺樹明堤野霧銷快着扁舟歸教子勝渠滿屋貯胡椒九日復口凉邊未放菊花斑莫作重陽節物看就網買魚風露重推篷舉酒水天寛箭頭歳月離弦易局面功名, WYG: ''}
