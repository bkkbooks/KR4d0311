  - {type: variant, offset: 5, length: 3, content: 諸丈秋, WYG: 也臣聞户樞不蠧流水不腐以其日運而不息也故蠱壞常生於久安不事事之餘人君亢然于上人臣靡然于下截然其不相接且下以巽順養腴無切劘正救之益上以逸樂養尊乏振厲奮發之意於是紀綱隳於姑息制度弛於因循道揆法守紊亂於私意之轇轕天下之治日入於大弊極壞之境而不自知在卦艮之剛居上九巽之柔居初六巽順艮止而蠱以成正君臣相與拱平安坐以致天下之亂也然蠱豈終於蠱哉有能以飭蠱為已任力量大而規模壯精神全而}
