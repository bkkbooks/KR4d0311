  - {type: variant, offset: 9, length: 14, content: 俱白髪萬里錦城官箭貫雙鵰易琴, WYG: 采立一斡旋間掃積壞之弊而興大亨之治有不難者利渉大川必明之以往有事盖久安不事事所以成蠱往有事所以濟蠱也况作事貴果慮事貴精世之賢君思欲為天下拯弊起壞而納之治豈非立志之美然或發強有餘而宻察不足廣大已致而精微未盡故事}
  - {type: variant, offset: 19, length: 1, content: 雙, SBCK: 􅀟}
  - {type: variant, offset: 24, length: 11, content: 一鶴難國寛同是福民病獨, WYG: 舉而隨沮令隨行而隨輟皆由未得先甲後甲之義也夫先甲三日以謀始後甲三日以圖終終而復始循環無間精義入神以致用}
