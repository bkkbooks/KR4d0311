  - {type: variant, offset: 1409, length: 252, content: 計至今疑是避秦人蝦䗫培泉丹墀萬字中興䇿西蜀人材待細掄好把玉蜍留水去直言莫問近前嗔聖節日望拜黄牛祠前退讀衆碑感而有作蜀在八極間卦位西南坤萬里泝天險三峽爲坤門巨靈擘太華飛出黄河源餘刃落巴山巉絶雷斧㾗衆崖束長江水石相吐吞轟豗九鼇戰洶湧萬馬奔髙低建瓴峻上下竹節繁操舟失毫氂虀粉千丈渾灘名鼎無義造物疑少恩黄牛壓其漘坐睨驚濤飜入門兩石馬耳缺蹄噭存行人紛乞靈熏燎迷旂旛摩挲幾豐碑䬃沓箎應塤醉翁事巴恠無盡語不根黄能羽淵魄蒼牛離堆魂逞竒角異說終莫探厥原或指峽名掲或取山形蹲狼頭與鹿角胡不登脤膰五行土勝水似識丁壬婚爾牛何來思, WYG: ''}
