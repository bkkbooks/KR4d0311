  - {type: variant, offset: 1710, length: 2, content: 險抑, WYG: 之事隨宜整飭次第畢舉而閨門雍肅氣象自如乃幹蠱之善也九三處巽體而過於剛安得無悔然其才足以克家與其嘻嘻失節置父於有過之地孰若三諫號泣納父於無過之域故所悔小而咎不至於大象以終无咎言之迹若非順心未嘗不順也彼排闥引裾折檻軔輪之臣雖一時若以忤上為咎而其心欲使國家動無過舉實存乎愛君忠顯而咎冺亦猶是也然則子以剛幹父之蠱而旡咎恃父之慈臣以剛幹君之蠱而无咎恃君之明六四裕父之蠱往見吝象曰裕父之蠱往未得也臣聞德可以勉而進才不可以彊而能世之賢子以起家為已任如善奕者以一著救一枰之敗非有過人之才不能也六四以柔居艮體之下寛夷静厚有餘而材不足方家事之蠱壞非不思滌蕩振刷而一新之材不逮心詎容強揠故其蠱僅止於裕裕者寛緩而不廹也事勢搶攘弊端轇轕人情易於躁紊而能鎮動}
