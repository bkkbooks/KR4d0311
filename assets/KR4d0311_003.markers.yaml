  - {type: variant, offset: 7, length: 4, content: 詩二呈同, WYG: 宋洪咨䕫撰講義蠱元亨利渉大川先甲三日後甲三日臣聞大弊極壞之世天所以開聖人也蠱取壞亂為義以爻言之自㤗來以卦言之繼豫隨之後安則玩玩則媮媮則垢弊日積養成壞證與人久宴溺而疾生於心其為蠱一也而蠱無終蠱之理故蠱壞之中有元亨者存何則飢易為食渴易為飲大弊極壞易為治方王道板蕩綱紀文章一切掃地英君起而拯之中興不翅反掌是知蠱未有不可治治得其道而大亨雖江河至險亦利於涉特患安于蠱而無興起之志耳然急於救弊者未免用意之太鋭切於望治者未免求功之太速險難在前徑渉不懼志壯氣盈視天下事若無足為而易之易則難者将至過懲前日之不事事適滋後日之多事未保其不然也夫甲者十干之首而事之端既先三日以謀其始又後三日以圖其終反覆擬論備極詳宻使治道日有趋新之功而無矯枉之慮前弊可拯後患可弭矣夫如是然後謂之善治蠱彖曰蠱剛上而柔下巽而止蠱蠱元亨而天下治也利渉大川往有事也先甲三日後甲三日終則有始天}
  - {type: page-break, offset: 7, content: '', id: KR4d0311_WYG_003-1b, image: WYG1175/WYG1175-0145d.png}
