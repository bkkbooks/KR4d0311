  - {type: variant, offset: 277, length: 0, content: '', WYG: 蠱君子以振民育德臣聞左氏傳風落山為蠱風落於山下無物}
  - {type: variant, offset: 278, length: 4, content: 怕江流逆, WYG: 撓故蠱以取象然致蠱者風之動治蠱者艮之静盖艮體重厚而篤實不為物移屹乎山之止也風能撓於一時使山下之物散亂不齊少焉風止草木之髙髙下下自若山何嘗加損哉君子觀象於蠱以巽振民以艮育德育成君德固作興民心之本而德之育也必以山之静與山下出泉䝉同吾能體中正仁義而主静挫衆紛而不擾應萬變而不亂動與静}
  - {type: page-break, offset: 278, content: '', id: KR4d0311_WYG_003-4a, image: WYG1175/WYG1175-0147a.png}
  - {type: variant, offset: 283, length: 5, content: 媿何憂蜀道, WYG: 非静外物孰能蠱之吾心無所蠱則人心無所蠱而天下國家之治無所蠱一静足以制百動也玩易者必因象而求意初六幹父之蠱有子考无咎厲終吉象曰幹父之蠱意承考也臣聞蠱自㤗來具乾坤之體故諸爻幹蠱以父母言父之行事一出於正作室而塗塈茨為力甚易不見其子幹治之功惟前人蠱壞有待振飭必其才足以植僵起仆使百堵皆作於室毁之餘則幹治之功見矣有子而考无咎正以子能補其過也不然生不之諍没不之改陥父不義猶為有子乎然聖人以不改父臣父政為}
  - {type: page-break, offset: 283, content: '', id: KR4d0311_WYG_003-4b, image: WYG1175/WYG1175-0147b.png}
