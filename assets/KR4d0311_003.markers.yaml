  - {type: variant, offset: 1317, length: 0, content: '', WYG: 則可以終吉終不失其順也象所謂意承考盖前人之蠱自我而治不曰我之能而曰吾父之志欲為而未遂者今特以我之意逆父之意而行之幹治非我功也是不特揜父之過又将揚父之名豈不俱有光榮哉元祐改新法斥姦臣皆推之神考之意正得此意九二幹母之蠱不可貞象曰幹母之蠱得中道也臣聞九二上應}
  - {type: variant, offset: 1318, length: 3, content: 一先生, WYG: 五為子事母母有不及不可不正正救或過則易至於傷恩怡聲下氣柔行巽入使之浸潤而氷釋則蠱為可治或以貞行之隂柔之性吝執不囘情有所激未必不重其蠱也貞者事之幹而幹母之蠱不可貞不貞乃所以為中盖闈閫之内聽其自蠱為不及急於治蠱為太過無過無不及則中道得二居巽體之中猶以是為子道戒事母難於事父也詩凱風母氏聖善我無令人痛自尅責}
