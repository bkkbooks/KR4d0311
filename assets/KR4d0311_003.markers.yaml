  - {type: variant, offset: 1715, length: 26, content: 喧萬命脫谽谺神手司平反長年送迎神性瘠漓酒酸歸舡詫靈賜, WYG: 逆以順撫横厲以柔逶迤容與不求快於一時而磨以歲月終能使亂䋲之自解而蠱亦徐飭矣茍不量其材冐為一决則往必見吝正以力常奪於過髙變每激於欲速不可以輕進也人臣治君之蠱亦有隨才就功以為裕者子産相鄭修辭令以交於晉楚而外難紓主強直以盟於豐駟而内難解鄉校議之而不怨輿人誦之而不怒鄭頼以寧非裕於蠱者乎故孔子美其有君子之道而不稱其材茍材過於子産而道非君子則盆成括之死又孟子所深歎六五幹父之蠱用譽象曰幹父用譽承以德也臣聞愛敬者孝之始顯揚者孝之終人君出而當遺大投艱之責仆者興之紛者理之壞者修之彌縫前人之闕使天下後世不得以議其過如昭帝繼武帝與民休息已為難事而况揚父令譽於無窮者乎六五柔中之君得九二剛中之臣為之輔蠱壞之見於前者一}
