  - {type: variant, offset: 289, length: 92, content: 但願浣花花好在免教杜曲眼長寒宿柂頭次及甫入沌韻手遮西日望褒斜百折舟行尚玉沙風趂港回㠶落柱草迷路斷牽収車長烟漠漠非吾土老樹離離似我家今夜宿頭應更好月明四面盡蘆花又荅孫正叔萬里西風鴈影斜平, WYG: 初六乃於繼父之始亟懲其蠱壞而飭治之必有甚不獲已者而於心終不}
