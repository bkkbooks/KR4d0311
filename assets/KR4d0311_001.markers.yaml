  - {type: variant, offset: 77, length: 0, content: '', WYG: 哉其卦以一陽主五隂亦有比建國師蓄衆之互體象曰豫剛應而志行順以動豫豫順以動故天地如之而况建侯行師乎天地以順動故日月不過而四時不忒聖人以順動則刑罰清而民服豫之時義大矣哉}
  - {type: variant, offset: 78, length: 0, content: '', WYG: 五以柔居上九四以剛應之剛宻比於柔不期應而自應也人君有柔中之徳虚已以任大臣大臣有剛徤之德自任以天下之重剛柔相應而相濟志所欲為何往不克然志之所以行亦惟其順也以順而動用能致豫既豫之後又以順動終始一順無有間斷天地所以妙不息之運如此而已人君之建侯行師其能違乎天地以順而動則日月四時無過忒人君以順而動則不待刑罰而民心服在我無所違乎理在人自無所違乎我也時者天運義者天理順而行之豫之時義豈不甚大茍或違道干譽咈民從欲是為悖矣象曰雷}
  - {type: page-break, offset: 78, content: '', id: KR4d0311_WYG_001-2a, image: WYG1175/WYG1175-0137c.png}
