  - {type: variant, offset: 79, length: 4, content: 智創物重, WYG: 地奮豫先王以作樂崇德殷薦之上帝以配祖考禮極順樂極和順則和矣樂所以導和也方雷}
  - {type: variant, offset: 84, length: 9, content: 泉幣燧昊俶興黄虞踵, WYG: 地中動於至靜而不露迨出乎地而奮乎天群蟄啓户萬象趋榮孰不同其和豫然聖人合震坤以為象不曰雷出地上而以奮言深閉久欝之餘一旦奮發造化妙用軒豁呈露施生訢合動植昭蘇豫莫大於此先王觀豫之象發揚和聲褒崇先德如韶}
