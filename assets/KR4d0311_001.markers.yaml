  - {type: variant, offset: 1424, length: 1, content: 博, WYG: 君乘乎剛則有格心之大臣而内志不可摇秉乎中則有閑邪之定力而外慾不能入内外交相飬此所以貞疾而安恒不死而壽}
  - {type: page-break, offset: 1424, content: '', id: KR4d0311_WYG_001-7a, image: WYG1175/WYG1175-0140a.png}
  - {type: variant, offset: 1426, length: 16, content: 逮其籠簣齊畚臿具專諸虎攫孟賁豕負, WYG: 夫德慧生乎疢疾鴆毒藏於宴安此爻在豫之五當以無逸三宗享國之意參之上六㝠豫成有渝旡咎象曰㝠豫在上何可長也臣聞人孰無靈明虚徹之性有物蔽之則靈者㝠和豫之極而肆逸豫此心瞽塞罔有知覺故㝠豫以成成非一日之積也方此心清明之初豈不知觀逸逰田沈湎耽樂之為患及為外物所移則勤者惰立者弛操者放日積月累性為情鑠而㝠頑不靈之豫於是乎成正以隂柔之資不能聞義而}
