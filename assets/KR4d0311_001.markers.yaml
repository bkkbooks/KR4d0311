  - {type: line-break, offset: 1418, content: '', id: KR4d0311_SBCK_001-4b02}
  - {type: variant, offset: 1419, length: 1, content: 嫓, WYG: 决趦趄復前是患失也以不中正之人處不中正之位而盱遲皆悔隕穫充詘情狀畢露其悔而不凶者大臣不與為應姦無所售故不至凶使其姦得售則欺君賣國無所不至矣有國者安用是患得患失之臣為哉九四由豫大有得勿疑朋盍簪象曰由豫大有得志大行也臣聞九四以一陽為衆隂所宗材全而氣盛毅然以天下之重為已任下傾心而仰之上虚心而屬之此天下之豫所由致也由我致豫建侯而國勢尊行師而人心順其有得大矣然功業之盛者必有信已太過之弊權任之隆者必有專已自用之咎大臣當由豫之時茍驕吝一萌不能開心與天下之賢以共治則豫之由致安保其不為亂之階得亦安保其不失也惟洞無有我之私披胸臆以待賢忘勢分以下士疑豫一㸃不㽞於中則聲應氣求之下如簪聚髪何材之不集而致君澤民之志遂得以達於天下信於萬世此正周公握髪吐哺時也盖疑者德之莠事之賊大臣無疑心之累則足以合天下之善㫁㫁乎知賢之當任知邪之當去不以疑貳之心來讒賊而啓惎間則百志維熈矣六五貞疾恒不死象曰六五貞疾乘剛也恒不死中未亡也臣聞疾非特六淫之疾凡足以為吾心之害吾德之累吾國之憂吾民之戚皆疾也人君處和豫之極而逸豫生嗜慾好樂便嬖側媚之足以蠱方寸者紛至於前於此能一念内固外邪客氣不得以乘虚而干正則德性堅明元氣充實既壽其身又以壽其民壽其國則億萬年無疆之休皆}
  - {type: page-break, offset: 1419, content: '', id: KR4d0311_WYG_001-5b, image: WYG1175/WYG1175-0139b.png}
