  - {type: variant, offset: 2386, length: 1772, content: 私殖金工鑠之則有禁蠻舶洩之則有辟冝京師貫朽而莫校天下藏鏹而山則也其或用取鹿皮制參飛錢通物之變扶時之偏亦本於輕重之相濟子母之相權至論殖財莫如擇使有管仲則藏冨於國得劉晏則錢流於地言未畢客有在旁啞然而笑曰子來自畨知泉則詳坎蛙難語乎海水醯雞未窺乎天光獨不聞負扆南面運坱北之鈞而皷四方者乎盪八卦範九章颺關睢播我將融庶品於道德之槖歛衆寶於俊乂之埸磨而不磷者布在臺省動之斯和者坐諸廟堂旋乾轉坤闔隂闢陽陶唐冶虞規周矩商禮樂凝俗易窳而良仁義鑄人革否而臧㤗階以平天歩以康前星爛乎重暉旄頭澹其不芒南風薰而民財阜膏雨時而年榖昌于以植帝王太平之業詎止圗霸功之冨強余乃豁然悟蹶然起拜手而系之曰天不愛道聖賢興兮地不愛寶稼穡登兮人不愛情冨壽且安兮化工之巧莫窮其端兮老圃賦嗟余生之刺乖甘偭宻而即䟽痡虺隤其勌游臝盤薄乎閑居老旣怯於山橋窮莫備乎澤車坐玩相牛之經間抄種樹之書五十弓兮野園數百武乎破廬一秃翁以自業羣癡兒而共鉏冰解寒祛霏開日舒濯濯我畦瀏瀏我渠穉甲怒長鮮英蔚扶渉熟成趣驩然忘劬翁放鉏顧兒而言曰汝亦知夫丗有遇不遇之𬞞乎鴽釀施蓼蠯醢侑𦵔蔌之冨強余乃豁然悟蹶然起拜手而系之曰天不愛道聖賢興兮地不愛寶稼穡登兮人不愛情冨壽且安兮化工之巧莫窮其端兮老圃賦嗟余生之刺乖甘偭宻而即䟽痡虺隤其勌游臝盤薄乎閑居老旣怯於山橋窮莫備乎澤車坐玩相牛之經間抄種樹之書五十弓兮野園數百武乎破廬一秃翁以自業羣癡兒而共鉏冰解寒祛霏開日舒濯濯我畦瀏瀏我渠穉甲怒長鮮英蔚扶渉熟成趣驩然忘劬翁放鉏顧兒而言曰汝亦知夫丗有遇不遇之𬞞乎鴽釀施蓼蠯醢侑𦵔蔌蒲羞鱉食苽薦魚芥醬且胾葱渫且朐烈有桂椒滑有堇榆已多乎燧人庖犧氏之𥘉而况織翠㢝殷紅氍毹沐漓觴斚轟豗鍾竽猩唇豹胎之鼎素黿紫駞之厨始饞涎其趨新中便腹而厭餘於是葷臊望風而引郤芳辛候色而應湏擷翠苕於崑丘掇瑶頴乎方壷蔗漿盛夏而凍合萍虀祁寒而煖敷行以白玉奉之緑珠五侯鯖兮遜美天酥陀兮失腴此其遇合不翅𥘉識之機雲晚見之嚴徐也若乃巖壑棲遲竹屋槿籬蓴擅場於秋風空結鱸魚之思韭争長於春雨未辦黄粱之炊荻生而河魨上橙熟而蟹螯肥指雖動而莫酬腹不負其幾希巳而凌寒采薇迎陽刈葵祮萱堂背䄡芹澗湄鑱黄獨之雪苗筐白薤之露蕤茗蘼蕪以滌煩醪枸𣏌而𥙷羸冷淘煮兮槐茁餫飩斫兮薺滋泫膏鉶兮雹突飫糞火兮蹲鴟酣糟紫薑之掌沐醯青蔯之絲雲蒸罌粟之乳濤洶胡麻之糜輪囷鵝鴨之瓠鬰屈龍蛇之芝婆娑熊蹯之菘䰐鬖虬髯之菭鱭孕子兮㯶魚鱉解裙兮樹雞竹競綳兮稚子蕨𥘉拳兮小兒以至太華之藕黄河之菇婆羅之波稜大宛之苜蓿南越之鹿角江東之耑蹄與夫蜀之雞蘇龍鶴栮脯加皮名品紛綸色光陸離性異温凉氣分王衰芼擇加精調胹得冝香聞爽心味適解眉有舉桉之接敬無轑釡之見欺芬芬苾苾雜陳更進可以甦文園之渴療首陽之飢彼其石芥老而逾勁苦筍少而巳竒蔊有拂士之風菊抱幽人之姿囬睨蔓菁隨地而易質薯蕷視人而變形曽不蒲乎一嗤矧肯數乎惡苣邪蒿臭蒜而穢荽然是𬞞也進不榮於珥貂鳴玉之齒退不豪乎洒削胃脯之頥煙雲歕薄乎夜讀之吻風露簸蕩乎朝吟之脾與齋鉢其争道食方丈乎何期其不遇可知已兒拱而前其然豈然諸葛以姓行元脩以字傳玉糝得坡老而重銀茄爲涪翁而妍與其見賞於肉食之鄙孰若託名於捽茹之賢蓋窮患姱名之不立而不患併日之食粥逹患宿學之不能行而不患一筯之萬錢茍道義之信飽飯𬞞食而樂焉翁捧腹一笑長歌振林皎白駒兮束芻母金玉兮爾音閔氓賦嗟蚩蚩兮皇之氓惟皇引逸兮氓不自逸厥生考室于山兮山嘯而瀑其降丘宅土兮土又墊而谷中田爲廬謂可髙枕無虞兮劃吞齧爲川渠倚岸環竹以奠厥居兮岸且善隤不可以乆諸死殮無衾兮生煬無竈哭不成聲兮仰天以􅑧天蕩蕩兮何尤陽侯不仁兮挾天虐氓而横流卑畦席卷兮望已絶瀦澮坼兮髙疇隨裂今夕之憂兮無以爲歸明發之憂兮何以禦飢嗚呼蚩蚩之氓兮惟皇之依烘蚤賦麥送爽寒梅迎溽隂羸肌老幹敗絮故衾睡蛇甫蟠跳蟲倐臨無蜂蠆材有豺虎心孕藁之隩宅笫之岑質眇乎粟觜餓也鐔其來施施其進駸駸假託茵慿陵躐祍襟躁躍如舞潜行似瘖左發右應前郤後侵螫其股錐惕其氊針據蒺刺刺負芒森森龜息正清撓不可禁蝶夢方栩攪不可任􅐡搔空疲摸索曷尋撫床以興子規夜吟赤脚張燈蒼頭熾煁絮衾壓篝烈於釡􅑄𥘉而蠕動如商望參少焉紛綸如髪聚簮或壯或穉或纁或黔或尾而丁或腹而壬龍跳虎擲疑聞嗚喑星流電激驚逃沸潯力窮勢屈駢搏旅擒祈父爪牙凱平緑林蠢爾蕞末虱爲賞音虱養大體尚知酌斟爾繁有徒喋血􅉃深予其火攻難腥斧碪老妻在旁一笑振衿謂彼族赤可爲丗箴逢笋氣張見瓜影沉王極必衰理無古今俗諺謂蚤笋籜來瓜皮去, WYG: 戒}
