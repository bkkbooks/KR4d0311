  - {type: variant, offset: 1849, length: 526, content: 介蹊㷈積髙於脩楹日愈乆而滋力礬旣生而細碖是設抄盆筠絡以􅍥是築甓槽竹龍以釃散鈱葉而中鋪沃銗液而下漬勇抱甕以潺湲馴飜瓢而滂濞分釅淡於淄澠别清濁於涇渭其滲㵼之聲則糟丘壓酒於歩兵之厨其轉引之勢則渴烏傳漏於挈壷之氏左挹右注循環不竭晝湛夕漑薫染翕欱幻成寒煖燥濕不移之體疑刀圭之點鐵若乃卝課登綱程促鐵往銅來錫至鈆續川浮舳艫之衘尾陸走車擔之繦屬出嶺嶠下荆蜀絶彭蠡洞庭而星馳泝重淮大江而電逐四趍圜府如輻有轂殷轔軒礚崱屴複陸頓之連城貯之列屋黒雲隤山而亂委熊豹谽谺而起伏蓋不待銷飛㢘鉟瞿曇而鍾官之用足於是鑄錢使攷其㑹辨銅令第其品丁夫竭作匠師讙奮煤突整㓗炭户充牣鼓兩儀之籥而大播役六丁之工而迭運祝融作女媧進一煽濤生海門之微波再煽日吐扶桑之疊暈三煽烘朝霞而爛照四煽洶屯雷而欲震張格澤之輝𦦨迸攙搶之芒潤夸父即之汗翻漿而暍河伯望之瞳眩花而瞬澄澈不殽通明無燼黒濁之氣竭而黄氣次黄白之氣竭而青氣應液爰㵼於兠杓匣遂明於模印之落落貫之磷磷磋之以風車之輣軋轆之以水輪之砰隱繒網㳙拭蠱覈摩揗肉好周郭堅澤精緊文勁銀鈎色瑩玉填旣刮垢以磨光始結緍而就凖盡東門之漚麻不足以爲其貫引百吏告功三官動色乃督餫艘乃輸王國版曹稽其贏虚之數起部程其精觕之績謹内府之登儲衍外帑之樁積天子守之以恭儉冡宰理之以均節與五銖, WYG: ''}
