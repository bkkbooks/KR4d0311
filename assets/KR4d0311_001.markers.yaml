  - {type: variant, offset: 1415, length: 3, content: 偕作曽, WYG: 望已深屬之矣人主能不沉酣於逸縱不昏蔽於便佞好賢之心不衰求善之志不改則介者終有時而親矣六三盱豫悔遲有悔象曰盱豫有悔位不當也臣謂此人臣患得患失之象三廹近九四當國之大臣欲如初六小人進為容恱恐非正應而不我與眄眄仰視逐逐營求是患得也欲如六二君子介特自守又利害祻福交戰於胸中躊躇}
  - {type: page-break, offset: 1415, content: '', id: KR4d0311_WYG_001-5a, image: WYG1175/WYG1175-0139a.png}
