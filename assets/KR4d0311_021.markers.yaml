  - {type: variant, offset: 5002, length: 580, content: 委重於臺閫之辟爾賦材彊敏抗志駿偉貳政長沙綽有佳譽辟函上於公車謂冝方闕守奉詔條以撫遐嶠莫如汝稱往哉毋鄙逺其俗而同其戚休山甿溪獠咸知德意是爲舉能其官可鄧雲特轉武略大夫制勑具官某功之多者賞必厚爾江右捕盗山陽討虜皆以功受賞崗門鹽城又著竒功信能迪果毅矣躐進穹級參護戎旅毋玩寵榮而忘賈勇可留子邁救荒推賞轉朝奉大夫依舊潭州通判制勑具官某救荒無定法得其人則政舉爾試邑衡陽再講荒政旣脫民於溝瘠又儲粟爲先備朕惠養元元之意庶幾下逹矣升秩正郎貳政大府益進民庸惟勤惟毖可王爚轉朝奉郎致仕制勑具官某官至貟外郎則賞延于丗必年勞乃克轉爾飭已無玷莅官有聲方諗疾以少休遽遺榮而長往肆疇前績式進華階燕爾後昆服予異渥可章謙亨除京西路提舉常平茶鹽公事制勑具官某朕選拔四方譽俊布列中外茍當其材用之惟恐不亟縱騁景靡過都歴塊乃見齧膝乗旦之良也爾業履正平材氣駿發能不墜其家聲擢繇轄院趣守壯藩未合竹符趣卑英蕩蓋欲及精銳而用之維京右民力憊而未甦財計屈而未𥙿出納歛散權之以義而行以仁惟爾之能可淮東路兵馬鈐轄桑青轉武功大夫制勑具官某于台之役大小三十七戰而城降士用命也莫府上功謂爾勇􅋧而敢戰冝受醲賞峻躋武級統戍惟揚報國赤心更觀來効可趙彦覃除直寳謨閣權知廣州兼廣東路經略安撫制勑具官某自唐以來殿南服者能使海嶺之陬旣足旣濡幾何人故宅牧必謹爾嚴於治己而不絶物切於愛民而不近名公族之英吏之良也起乗蜀傳卑冶節刀布之利方興畨禺課帥又, WYG: ''}
