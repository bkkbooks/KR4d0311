  - {type: variant, offset: 2136, length: 783, content: 趙希昔除工部郎官制勑具官某朕日御便朝與二三大臣妙柬四方之雋乂登崇之廼睠西顧有公姓之老在爾秉心静夷制行縝栗聲問蚤頴擢于政事之科晚守東川材益練政益美捐有餘以紓征調之迫家誦而人德之卷懷滋乆宿望猶鬰握蘭起部冝不俟駕蜀之邊防軍實民賦吏治爾平日講之蓋熟朕將修輦過郎舎故事而問焉可辛稏潼川府路提點刑獄趙希濬䕫州路提點刑獄張起艮成都府路提點刑獄公事制勑具官某等東井法令所取平參下三星曰罰主斬艾分節司憲於參旗井絡之分加遴惟均爾稏丗傳威望身佩材名直指䕫巫姦宄屏息其進以典東川之獄爾希濬氣禀篤厚政術寛平共理眉山田里熈豫其升以司巴峽之臬爾起艮吏事詳敏邊籌精練出入制幙多所毗益其擢以亭西州之讞在易賁無敢折獄豐折獄致刑噬嗑明罰勑法皆有離象取其外剛而内明也然無慾者必剛無私者必明爾等果能以明用剛則數道之間吏之不良民之無告悉暸乎目擊矣欽哉毋謂君門萬里之逺可汪之強殁於王事特贈朝奉郎與一子恩澤制勑具官某魯誄賁父漢録孤兒閔死事也爾庀職淮幙宻參機籌變起倉卒父子併命聞者悲傷之進官一等澤及遺孤營魂有知可無銜憾可楊伯雨除䕫州路轉運判官制勑具官某四蜀財計莫豐於大寧鹽筴之入數十年來漕臣以羡餘濟苞苴囊槖無遺利矣朕欲變而通之故謹擇所使爾材甚頴政甚練可使治其職也一節起家六轡督餫擁牢盆之冨運筭鞭之長輕車峻阪夫誰能禦然民力竭矣盍思所以𥙿之軍餉棘矣盍思所以濟之利源無壅上下阜通朕蓋於此乎課爾之㢘能可王翔除直祕閣利州路轉運判官兼知利州制勑具官某寧武控梁蔽益夙號重鎮故必以漕兼守而制閫亦於此立莫府今閫外之制移梁閫内之制還益漕守滋重爾材茂而識逺志堅而慮宻隴蜀山川之形勢兵民之便冝歴歴在目中玉節銅符采衆譽而併屬且木天寓直以華之委寄隆矣夫邊儲軍實以厚民爲本農桑勸則食貨通田里安則保障固祁山斜谷之運與中和樂職之詠實相表裏爾其懋圗之可黎伯登除直華文閣知潼川府制勑具官某實材用則天下治堯舜三代循吏之効惟其務實不務名也爾莊静不襮而篤求己之, WYG: 太}
