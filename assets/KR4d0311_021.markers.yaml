  - {type: variant, offset: 1272, length: 466, content: 淵而不忍以根連株送之命資其身委蛻炎瘴其甘如飴非所謂剛者乎唐司刑有功守死明道不阿旨詭辭以求苟免吾於爾見之追榮論譔仍録遺孤英魂如在尚知未有乆而不定之天也可陳宓贈直龍圗閣制勑具官某列聖以隆寛大公涵養天下敢言之氣故雖丗道波靡必有嶤然自見折姦萌而扶正論者爾風猷名相之裔學問諸老之傳刷行出政具有源委嘉定一䟽朝陽獨鳴於萬喙皆瘖之頃憸壬禠魄而不敢肆頑鄙洒心而思自立何其偉也分符卑節挽之莫回樂道著書死而後已砥柱斯丗之功甚大進直淵圗仍獎厥子泉扄有知其識予恨不同時之意可張柙中奉大夫致仕制勑具官某岷峨多竒士朕弓旌下招絯網略盡其不克忍死以湏更化則囿於命爾抱材翹雋藴識超邁分教眉山適遭蜀變慷慨灑涕不草賀僞之表志節立矣入儀班著出最麾節方將滂洋厥施於盈科之後何返壑之速耶萬里蒐賢于嗟靡及一階告第冥漠知榮可楊必復贈朝請大夫制勑具官某聖人有金城以守圄扞敵之臣能死城郭封疆也爾乗障文南不虞潰卒之渉境挺身諭告期革鴞音雖披赤心竟蹈白刃望風棄郡紱而逃者冝知媿矣優加愍典超進華階仍俾丗延用旌死節可尤元龍贈通直郎制勑具官某尉以警捕爲職盗發三衢爾能躬帥弓刀嬰其鋒而死之職不曠矣官之, WYG: 哲宜}
