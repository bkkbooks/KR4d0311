  - {type: indent, offset: 0, content: 　　, id: KR4d0311_krp_021-bkkind1}
  - {type: variant, offset: 2, length: 0, content: '', WYG: 魏了翁除權禮部尚書兼直學士院兼侍讀制勑秩宗之典三禮虞凝垂拱之功春官之掌九儀周格盈成之治繄制作之自古必推行之在人進我鴻儒膺兹妙選具官某氣以志為帥學以經為宗賈誼六太息之書洞達國體魏徵十不終之䟽仰當帝心梧桐方挺於朝陽蒹葭已颯於白露遂處以順樂忘其憂務著書而立言期精義以致用緑竹猗猗而瞻彼澳每興磨切之思白駒皎皎而食我苗徒起縶維之歎適中朝之更始俾外服之遄歸睠百王之典寖微而一代之防多闕匪究定民之本曷為經世之方漢僅草儀猶折武夫之氣魯惟秉禮卒回強國之謀爾熟講乎后蒼之九篇深稽乎姬公之六典未入趨於宣室趣攝長於容臺仍摛盤誥之文更勸索丘之讀登崇伊始簡注良深吏士之見官儀正頼濟時之畧公卿之明王制毋忘致主之規叅知政事曾從龍除知樞宻院事加食邑實封仍兼叅知政事制勑聖賢相維而致昇平莫重弼諧之寄文武兼資而有智略尤嚴宥宻之圖廼睠譽髦洊參大政進筦}
