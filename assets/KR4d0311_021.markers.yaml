  - {type: indent, offset: 753, content: 　　　　, id: KR4d0311_krp_021-bkkind12}
  - {type: variant, offset: 753, length: 1, content: 樓, WYG: 安恭行除大理寺正制勑具官某廷尉有正監及平漢制也我朝置正於卿少之下丞司直之上厥選蓋謹爾材資亮通風矩明整蔚其梧鵠之秀丞郡以李法簿召未至升之正以聽獄成甄㧞峻矣書曰明啟刑書胥占咸庻中正勉哉圖厥稱可魏峻除宗正寺簿楊璪太府簿趙與爽籍田令制勑具官某等楩柟把梓之材生于鄧林其地美也非雨露之養不成爾峻簡而温雅而文爾璪茂而通整而練爾與爽頴而秀韶而明英英世家翹翹天支朕皆欲養其材以待用故進峻簿正於珤牒璪繼峻簿外傅與爽繼璪令帝籍前暉後映其各懋於自獻可馮去疾除武學博士制勑具官某善用兵者不學古兵法而圯下一編亦詎容無師慶厯置右庠之意}
  - {type: page-break, offset: 753, content: '', id: KR4d0311_WYG_021-9b, image: WYG1175/WYG1175-0255d.png}
  - {type: page-break, offset: 753, content: '', id: KR4d0311_WYG_021-10a, image: WYG1175/WYG1175-0256a.png}
  - {type: variant, offset: 755, length: 5, content: 贈直龍圗閣, WYG: 此爾以通經博古之學彪炳於文成均諸生咸歛衽其下風而平時慷慨激烈論南北離合之勢兵家勝負之畧皆有據依遷之博士使業韜鈴者又得所矜式新美作成之下安知不有武舉如子儀出於中乎可劉宰除將作少監制勑具官某朕宵旰圖治計効猶邈每嘆君子有材之難然不敢諉斯世之無其人也爾隱居以求志深造而自得君子人歟其論天下事目無全牛投刄可以中桑林之節材益偉矣旌詔屢下未肯從吾㳺何耶超越拘攣繇丞奉常經貳繕監迎之致敬有禮矣惠然來思毋興盡而返可尤爚除知江陵府兼京湖路安撫劉煇叔政績轉一官依舊知建昌軍制勑具官某等河東以地望之重歸季布頴川以民情之安㽞㓂恂悉惟其宜爾爚抱識時應變之長徃帥荆州事權非昔而承上撫下無間言可以為難矣故齒召復還以壯吾上㳺控扼之勢爾煇叔厲盡職奉公之志出守盱江邑里甫集而興利除害無遺功可以為善矣故選擢復留以尉千里戀慕之情分閫乗壘任有輕重朕為地望民情而擇官奚有間哉各鞭厥後無棄爾成可葛洪除資政殿大學士提舉洞霄宫制勑武公叡聖晚年不忘箴規之心文子亷忠至老猶篤事君之志朕緬懷舊弼乆樂燕居年垂九袠之崇望稔三朝之重峻深邃職昭示隆恩具官某嶧陽特生之桐新甫後凋之柏致身廊廟雍容麟也之來引興丘園翕忽鳯兮之去仁樂山而俱寂義飲水以自娛雖黄髮之皤皤愈丹心之炯炯廼睠粹古務尊耆儒不得謝則賜杖而安車優㳺佚老如有問則就室而珍從懇切乞言方將遺掌故而訪伏生乃欲致少傅而從䟽受旄期雖重於趨召矍鑠詎容於告歸陟祕殿之大名踵珍臺之優禮肆加體貎式聳觀瞻噫夀考維祺朕敢失日秩月存之禮憂心如醉爾無忘晨興夙寤之規益茂養恬對揚猷訓可何處乆太府卿兼知嘉興府}
