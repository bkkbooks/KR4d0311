  - {type: variant, offset: 6196, length: 581, content: 戎監胷中兵甲筆端戈矛尚於此培致逺之噐可天水軍教授權知軍州曹友聞特轉承事郎權知天水軍事制勑具官某矯矯虎臣在泮獻馘此風無傳乆矣爾奮迹詩書典教邊壘冦至不爲先去之謀見義乃有必爲之勇迎鋒鏖擊蜀關以寜儒而知兵良用嘉歎趣升京秩仍進一階就分保障之符増壯金湯之勢可呉馹特轉武經郎制勑具官某縠將中軍溱爲之佐賛籌幙府毎難其材爾從元戎備殫婉畫躋榮一列毋替忠勞可城固縣尉趙僎特轉儒林郎制勑具官某尉黄綬卑秩也苟志事功必露囊頴爾警于邊瑣克賛戎旃進秩旌能益勤勿懈可武功大夫湯孝信轉右武大夫制勑繁纓不如多邑弊袴必待有功况品級超越于拘攣之表具官某抱姿梟勇屢効戰多都梁之役援近比以祈醲賞雖礙止法亦進横階予豈爾私蓋以勸忠勞也懋建舟師之績仰酬異等之恩可川秦都大茶馬桂如琥除户部貟外郎制勑具官某尚書郎非民庸暴白不授矧地官之屬選髙而劇可輕乎爾將漕于䕫就建帥閫不苛急以牟利不矯異以干名刀耕火種之民悉安之朕惟榷牧卑節以示獎厲孰與入奏明光之爲宻式遄其歸賛我邦計凋窮若何而𥙿煩冗若何而節幣輕物重若何而權推此類具言之用觀爾韞可呉昌裔除太常寺簿鄭逢辰將作監簿制勑具官某等朕惟湯執中立賢無方故待天下之材未嘗以進士丗家爲輕重爾昌裔氣明而文冨所謂江漢炳靈曄曄其秀者爾逢辰志立而噐整所謂臺閣之儀不習自成者朕知其皆嶄然而角陞昌裔于奉常以訂禮登逢辰于匠監以信度塗轍相望而簿正等臺萊𣏌梓盡在封植中其競厥職以對蒐拔可陳授中奉大夫直敷文閣, WYG: ''}
