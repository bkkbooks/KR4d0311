  - {type: indent, offset: 3, content: 　　　　, id: KR4d0311_krp_021-bkkind2}
  - {type: variant, offset: 3, length: 0, content: '', WYG: 兵之重用培九鼎之尊倚成匪輕作命惟允具官某學該乎今古識貫乎天人長江大河不足以喻其量之深太山喬嶽不足以言其噐之重夙擅掄魁之望嘗陪近輔之聫仲舒見疾孫𢎞不少安於朝廷之上李泌出避元氏寧退處乎畎畝之間既屢最于介藩爰趣還於政路屬逢更化備罄告猶直方大之兼全深得鎮浮之體知仁勇之並用洞明應變之幾顧邊鎻之孔艱期廟謨之洪濟宣帝樞機周宻固先二相之資憲宗紀律設張尤切衆賢之助肆疇庸於間社俾進序於本兵縂提星紐之權仍贊台衡之務邑畬申衍邦典增崇以成道德之疆以全帝王之勝噫天保治内所以收采薇之功烝民任賢所以定車攻之業維真儒之無敵知中國之有人務逺乃猷用厎於乂可簽書樞宻院事鄭性之除同知樞宻事加食邑四百户制勑帝舜之格三苗有伯益以贊禹宣王之定四國有吉甫以誦申睠宥宻之孔嚴頼寅恭之恊濟肆頒命綍參典事樞具官某資早悟而夙成學旁貫而曲暢凾鐘太簇為角始終繳繹之和玉瓚黃流在中表裏清明之粹久矣冥鴻之去時哉儀鳳之來不累日而長諫坡未再月而登政路以非常之際㑹為有大之規摹難於定不難於回熟知國勢可以戰斯可以守洞識戎情爰進貳於本兵仍申陪於賜邑維予制勝咨爾陳謨府兵列於關中孰是相維之制屬國置於塞下曷為叵測之防隐憂既深區畫可後坐弭控弦之警宻輸借箸之籌噫文武之憲萬邦政有頼中興之佐明良之圖庶事盍共康丕應之功惟爾之能俾予以治可同簽書樞宻院事陳卓除簽書加食邑四百户制勑民獻敉寧武功求濟於艱大之日王師遵養時晦用介於純熈之餘睠國勢之重輕視人謀之臧否進賢宥府揚號明庭具官某栁下惠之聖和樂正子之好善謙謙自牧夙全君子之風蹇蹇匪躬克慕王臣之操紛炎門之競騖獨夷軌之徐行一冺忮求両無淄磷去知有命靡矜噐能政理之長来亦何心益稔議論文章之望迨親覽於威柄爰趣登於政塗勤樸斵於梓材力贊厲精之治綢牗户於桑土常懐先事之憂備罄壯猷罙深邃簡就陟樞庭之序仍循書殿之班爵進公圭秩陪邑采俾宻裨於勝筭用坐折於遐衝噫明主可為忠言朕方合介胄縉紳之議上策莫如自治爾盍思車馬噐械之圖必同寅協恭而和𠂻斯禁暴定功而保大式孚民聽庸對王休可余玠起復宣教郎㐮陽府通判兼西京制置}
