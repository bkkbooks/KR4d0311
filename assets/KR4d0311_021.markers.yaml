  - {type: variant, offset: 88, length: 608, content: 之選於此乎儲勉佐乃長母以再轉爲淹也可權兵部尚書史嵩之除寳章閣直學士宫觀制勑封萬里之侯不足以敵過庭之榮佩六國之印不足以易戯綵之樂方枤杜之還役乃式微之賦歸具官某蚤奮儒科寖躋朝列牧民御衆擁漢水之騂旄舎爵䇿勲佩甘泉之紫槖雖向日之云切顧望雲之抑深願爲返哺之烏退奉閑居之燕重違雅志俾領真游以西清嚴邃之聮致南陔怡愉之養石奮之教素謹諒亟下於里門子牟之心常存尚母忘於魏闕可林楷特轉朝議大夫直敷文閣致仕制勑具官某情莫切於閔勞恩莫厚於崇卒廼者赤子嘯兵三衢朕爲之丙夜不安枕爾以公平廉静選拔出守薙鉏稂莠不遺餘力廩廩向還定矣而病以革告天胡奪之亟耶進官一列升職四等用書爾柩尚克知歆可趙范除龍圗閣學士京湖制置大使兼知襄陽府制勑仲淹守慶州而純粹踵其成規丗衡築青澗而种諤保其遺績繄㦸纛交輝之盛實衣冠奕葉之榮具官某望壓江淮志吞河洛前茅後勁不虞街亭節度之違左櫜右鞬益慕金城圗略之上獨差彊於人意常簡在於朕心睠上流形勢之雄有乃考威名之著闞如虓虎賢於長城爾嘗從士爕之謀晉心廉頗之用趙士冠西清之邃職護北門老農扶杖以歡迎喜談舊事宿將帕紅而上謁誓立新功惟寡欲可以全剛惟集思可以廣益惟多筭可以制敵惟不殺可以結人守果見於有餘攻奚憂於不足功名未艾何止復鴈門之踦機㑹無窮正可奮澠池之翼勉揚先烈用荅殊知可史洽轉奉直大夫制勑具官某間者韃犯信陽略雲夢轉黄陂而薄浮光虐𦦨蓋烈烈也爾爲守將能識事機亟調貔貅奮前迎擊賊禠氣而宵遁可謂敏則有功矣一歳三階實爲異數賞無倖得其懋承之可孟點鄧泳各轉一, WYG: ''}
