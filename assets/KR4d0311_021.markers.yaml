  - {type: variant, offset: 6830, length: 1386, content: 雖未竟乃功亦旣勞止増秩進職於更化之前今不與易也真祠均佚善刀而藏時方急材尚觀新硎之發可中奉大夫趙善璙轉一官回授本生父不卞贈承事郎制勑松栢不生於培塿而梧桐生於朝陽士君子可忘其本哉具官某故本生父某秀挹天潢評髙月旦是生賢息岀繼同支屬進秩以旌能願貤恩而報本爰加愍典用慰孝思顯親揚名之榮衣𬒳九原矣尚歆承之無斁可中奉大夫趙善璙轉一官回授故本生母梅氏贈孺人制勑松栢不生於培塿而梧桐生於朝陽士君子可忘其本哉具官某故本生母某氏歸嬪宗磐蔚著閫範是生賢息岀繼同支屬進秩以旌能願貤恩而報本爰加愍典用尉孝思顯親揚名之榮衣𬒳九原矣尚歆承之無斁可中大夫參知政事陳貴誼特授正議大夫守參知政事致仕制勑湏股肱而治甫新萬化之更乞骸骨而歸俄惜一賢之老晉加異數渙播明緍具官某寛博而川涵凝重而山立道貫六學足以羽翼乎聖傳文成一家足以經緯乎國典蚤華塗之徧歴亟邇列之延登𥙷衮於有闕之時而胥訓居多改弦於不調之後而同寅更力允天民之先覺蔚王佐之全材况休然而有容且澹乎而無慾冝其俾艾胡爾遺榮維楫未施朕方念乗航之勢輻輪俱壯爾乃爲稅駕之圗睠委倚之素深惜訏謨之未究趣升峻秩仍拓真畬九老自娯孰與繪樂天之社五湖莫返尚思鑄范蠡之金可陳章特授中大夫致仕制勑具官某㓜學而壯行者在所立生榮而死哀者在所遇爾制行寛夷莅事明練荐更共理之寄民熈於田野士競於庠序蔽芾猶未拜也方祝釐而自適遽謝事以長逝進躋崇秩用荅宿勞朕之待臣下可謂有恩矣營魂如存歆此禭典可僞觀察副使顔仲明僞都緫領王逸僞徴仕郎化平縣令胡士元僞徴仕郎單公履僞明威將軍鄭彦僞將仕郎尚書户部任嘉言僞都緫領亢志忠僞安平都尉張林僞宣武將軍安居信僞明威將軍晉德僞武節將軍同進僞同知􅉑州軍州事聞鈞僞徴仕郎王采苓僞登科人尚書令史朝列大夫陳紀並𥙷承信郎僞朝列大夫郝士特僞都尉劉儀僞昭毅大將軍楊全僞定逺大將軍郭春並𥙷承節郎僞光禄大夫張俊特𥙷忠翊郎制勑具官某等王者大一統際天所覆孰非吾臣爾等效官外域歸誼中朝授之右階拔干左祍其相與竭忠以報上可故正議大夫守參知政事致仕陳貴誼特贈少保資政殿大學士制勑抗章太紫之北歸志方新占象尾箕之東遊魂巳逺廼睠謨明弼諧之韞未究輔相彌縫之功茂錫恩徽誕敡命綍具官某學根乎正大氣備乎中和德盛禮恭謙九三君子之美義方敬直坤六二大臣之風自儀禁路之華趣踐政塗之重了無緇磷具罄猷爲欲仁而仁斯至則無念非公不言而言必中則有謀斯斷屬更大化共振頽綱三千惟一心正頼烝徒之助五十不稱夭遽驚隆棟之摧惟慶暦之仲淹曁元祐之蘇轍用俱不盡命尚奚尤萬金之藥雖施何嗟及矣十漸之屏猶在如將見之欲紓殄瘁之悲庸侈襃崇之典位外朝之列棘班祕殿之鴻名噫亮天功而弼一人詎止書棺之寵質鬼神而俟百丗永爲銘鼎之光極而生死之榮歆我始終之遇可金部郎中黄壯猷除直祕閣權知紹興府兼浙東安撫制勑具官某㑹稽東南鉅鎮中興百年之馮翊朕之豐沛也吏治剛則甈柔則坯故牧守以識體爲良爾韞姿融明慮事精宻間者攬轡左淛政得寛猛之中朕深知之輟自望郎出殿帥閫中祕寓直擁髙牙大纛而東豈特以華舊部之觀哉書曰以厥庶民曁厥臣逹大家又曰康濟小民率自中德禮刑政導齊有序而上下相安於和樂體斯得矣重楮幣而輕和買抑思乃言之踐可彭協贈承信郎制勑具官某勇士不忘䘮其元義重於生也武休之役爾挺戈䧟陣効死封疆而賊氣奪可謂勇矣荐升武級仍録孤兒英魂有知歆戴無憾可歸順人王青劉天山米興王庭李思齊門清劉全魏師愈王瑜李𥙿范天保並𥙷保義郎制勑具官某等王者大一統際天所覆孰非吾臣爾等效官外域歸命中朝授之右階拔于左祍其相與竭忠以報上, WYG: ''}
