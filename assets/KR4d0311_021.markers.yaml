  - {type: page-break, offset: 742, content: '', id: KR4d0311_WYG_021-8b, image: WYG1175/WYG1175-0255b.png}
  - {type: variant, offset: 746, length: 0, content: '', WYG: 員外之階徃効莫中之畫可顔信之獻俘有勞轉保義郎制勑具官某淮蔡凾骨獻俘之役爾與有勞其陞}
  - {type: variant, offset: 748, length: 0, content: '', WYG: 以酬䟦涉可蔡仲龍除大宗正丞兼權屯田郎官袁商太常博士並兼沂請王府教授制勑具官某等沂邸於屬為近朕篤内睦擇師而教之乆則逓遷奬其勤爾皆以經明行修立於朝如玉在山煜然其煇潤楷範麟趾麗澤多益是}
  - {type: page-break, offset: 748, content: '', id: KR4d0311_WYG_021-9a, image: WYG1175/WYG1175-0255c.png}
  - {type: variant, offset: 749, length: 1, content: 獎, SBCK: 􅅄}
  - {type: variant, offset: 749, length: 3, content: 獎賢勞, WYG: 進仲龍丞於大宗且攝省郎進商繼仲龍議禮於曲臺而典教悉惟求舊懋詩書禮樂之訓陶河間東平之風不特講習留屯蒐綿蕞之欽厥職也}
  - {type: 'kr:newline', offset: 753, content: '

