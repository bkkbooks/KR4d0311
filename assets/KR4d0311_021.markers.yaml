  - {type: variant, offset: 4, length: 5, content: 農寺丞陶木, WYG: 機宜文字制勑具官某奪情非令典也惟從戎則許其墨爾以明敏練達受知於制閫秋防孔邇辟置自助起之堊室貳政要藩且參幕府之畫不以家事辭王事其禮之變乎移孝為忠勉圖協濟可李勉平黎賞轉朝奉郎制勑具官某廣右平黎上功爾以彊敏宣勞於莫府進二秩以奨之甫通閨籍遂階員外異渥也試邑於䖍益厲勿懈可軍噐少監徐清叟}
  - {type: page-break, offset: 4, content: '', id: KR4d0311_WYG_021-5a, image: WYG1175/WYG1175-0253c.png}
  - {type: page-break, offset: 4, content: '', id: KR4d0311_WYG_021-5b, image: WYG1175/WYG1175-0253d.png}
  - {type: variant, offset: 10, length: 0, content: '', WYG: 將作監依舊兼司封郎官崇政殿説書制勑具官某朝廷之用賢非一途信其賢耶用之惟恐不亟故必躐正郎梯監少而升爾家傳正大之學躬厲直方之操金華開説援古以証今亹亹不倦朕甚嘉之攝主爵貳戎監而進大匠華軌直矣朴素化行繕修務簡涵泳竹素綽乎餘暇輪人有釋椎鑿議上之讀書者試詳訪之以告庻乎他山之石可以攻玉也可}
  - {type: page-break, offset: 10, content: '', id: KR4d0311_WYG_021-6a, image: WYG1175/WYG1175-0254a.png}
  - {type: variant, offset: 13, length: 0, content: '', WYG: 丞蔣峴除軍噐少監仍兼權侍左郎官制勑具官某武監戎部之附庸官間無事少也占位渉筆無幾牘然向用之材於是乎儲爾學問醇茂義理融暢恬夷而莊舒巻阿吉士其人歟丞我麟宗攝郎銓省几案文書填委不動聲色隨手冰泮而九品無遺鑒體用具矣試材以劇養望以暇鶴膝犀渠姑貳程作朕方圖所以進爾者可丘岳除兵部郎官趙與除都官郎中兼樞宻院檢詳文字制勑具官某等國朝最重尚書郎之選懷香而奏明光襆被而直建禮非郡最不真授爾岳篤茂而暢邁守夷真以吏畏民懐稱爾與䟽明而詳達守嘉禾以政平訟理著朕厲精政事以來厯課吏治皆其良也表惟良之吏以勸郡國故俾岳郎于司武與自丞大宗郎于司僕且攝屬于宥府太㣲積星之次即日為真顧不謂榮乎兵不可黷刑不可濫必寢必措勉賛而長可樞宻院編修官趙汝譢除宗正寺丞仍兼右司制勑具官某王丞望華職簡而宰屬為劇授官兼劇以簡欲其才有餘於事也爾早收危級蔚著雅望攝組省闥靡枉於法守而事不辭難沛乎其才也擢由編纂涉筆宗盟仍行紀綱百司之職輕車熟路疇能及之益涵致逺之噐用對方來之渥可汪之道除太常寺}
