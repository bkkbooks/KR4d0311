  - {type: variant, offset: 3354, length: 1226, content: 病可謂良矣寓直中祕殿我巨屏旁制于四郡恩威兼濟辦治無難然元祐諸賢邦有遺像尚求聞於往行用康保民以表于蜀可李鋂差知嘉定府制勑具官某犍爲古夜郎國漢定西南夷與沈黎俱置郡而地望夐出黎上迨爲潜藩又加重爾璵璠其質豫章其材故家之最良也試郡于黎疚心邊瑣所陳便民事冝懇切而詳明知必良于政易鎮犍爲昭示獎擢體予不忘逺之意懋爾有常吉之行恩信並著民夷胥安則所至可紀矣可李艮孫知隆慶府李仲熊知紹慶府制勑具官某等劒門北扼棧道黔陽南控溪洞皆要藩也亦皆潜藩也守不輕授爾艮孫以敏劭之姿著關决之譽就擁劒麾駕輕車於熟路爾仲熊以駿邁之噐養融顯之望趣綰黔紱發利刃於新硎孟子曰固國不以山谿之險險雖天設必以人固爾能䖍奉吾詔養民也惠使民也義則人心隱然可恃如金湯徃哉毋忽可劉竑之改知重慶府制勑具官某蜀有耆壽雋直節著於慶元髙風振於嘉定落落乎其不苟合朕聞而賢之爾其季子也力學而脩㓗抱材而謙粹雍容氣度酷似厥考方需偏壘趣典名藩超等而授人不謂過而喜古渝之得賢守家法可想也益懋中和之治用昌詩禮之業可李景翶和糴賞轉朝議大夫致仕制勑具官某李悝平糴之法百丗可行也居是邦而習其俗則雖多易辦爾緫蜀賦而歸優游家食以冨於才任我糴事年豐價平農固樂市積數踰億能無勞乎躐升元士之級尚知告老之榮可陳一薦屯田和糴賞轉承議郎制勑具官某羊祜墾田於襄陽至有十年之積豈一手足之力哉爾材髙莫府職涖耕屯當危機交急之秋収平時勸課之効迄充兵廩用濟邊功進升一級之華益懋方來之績可歸順周岊𥙷武功郎遥郡刺史淮東兵馬鈐轄制勑具官某朐山東峙宻邇淮浦挈城歸誼爾實倡之莫非王臣超卑武級仍躋榮於遥刺俾參領於戎鈐祗服異恩勉殫忠力可李敏𥙷修武郎制勑具官某虜情叵測以間爲竒爾戍安豐深察情僞不爲利誘仍效戰多超授武階用旌知義可蒲南強落致仕差知茂州制勑具官某自筰以東北冉駹爲大茂其地也六夷七羗九蠻錯處之俗猶有遺者置守必廉静爾廉而介於守静而恬於進踐敡可紀蜀士共推之詎容以據鞍矍鑠掛神武之冠耶起之里居徃鎮汶水化浹于襏襫風行于旃毳不待按籌邊之圗而遐徼奠枕矣其母徒以遺榮爲髙可楊恢除直寶文閣淮西制置副使兼知黄州制勑具官某弈莫先於審局布勢取勢多則勝局也江淮表裏分置制閫亦然爾乗塞於均宅牧於荆進屯於襄撫機應變之材愈出而不窮維時淮右風寒最切而齊安據山川之㑹峻直寶奎參領閫寄往爲朕守中襄鄂昇揚而立首尾聮絡非取勢獨多乎江漢之詩曰匪安匪舒淮夷來鋪又曰經營四方告成于王淮服厎寧則四方可經營也内繕諸關外嚴列戍懷來新氓綏定故境朕方倚重於汝懋哉可工部侍郎知建康府陳韡明堂加恩制勑朕蒐儀先甲蕆祀上辛賦思齊之詩慕親方切稽我將之頌饗帝尤嚴恍三靈之宴娭遒百禄之來下有懷時彦冝錫神釐具官某學擅名儒望髙法從輪囷膽略吞青海於胷中磅礴威名碎黒山於掌上廼睠明禋之講迄臻熈事之成雖阻清廟之執籩靡忘宣室之前席爵爰升於蒲璧户仍衍於畬圭帝命式干九圍朕旣荷受球之寵天威不違咫尺爾毋忘拜胙之恭懋暢英猷對敡景况可虞孝先特轉一官授朝奉大夫制勑具官某蜀關赤白囊交馳姦甿或乗間矯䖍爲郡縣害去敗群之羊必良牧爾以長材選拔攝守閬川芟夷不逞封護善良千里絶桴皷之警, WYG: ''}
