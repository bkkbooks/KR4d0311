  - {type: variant, offset: 5583, length: 481, content: 以往爲官擇人奚嫌數易夫貪泉不能汙夷齊之操固也以身爲表州縣吏聞風皆趨於精白則遵海而南斯民安必樂業如中州矣朕蓋以廉頑立懦而望汝可翰林學士真德秀磨勘轉中大夫制勑用儒無敵奚拘考績之科彰德有常可後懋官之典矧承暉於蓮炬盍䟽寵於芝綸具官某學冨而文醇行方而言正孟氏舎齊而去昔豈本心季子爲魯而來今維衆望冠鑾坡而視草列氊厦以侍言展也開陳隱然禆益雖時行或異於時止而歳㑹悉歸於歳成稽課簿之旣髙陟文階之冝峻食舊德從上吉也政資宻勿之規有好爵與爾靡之懋對便蕃之渥可項容孫改差知順慶府制勑具官某果山朕潜藩也睠焉西顧未有以慰其父兄子弟思得良二千石以惠之爾林猷之偉事功之敏能稱其家者分符蜀道亦旣皷枻三峽易文以果地益大寄益重疲甿凋俗元氣未固視其戚休爲朕風披而雨濡之使物物皆生意澤庶乎不下壅矣往哉盡乃心可李以制除大理寺丞趙師楷太府寺丞衛洙大理寺簿魏峻太府寺簿制勑具官某文帝明習國家事首以决獄錢榖爲問仁儉一念之發也朕此意毎於分職授任見之以制學業粹明心術平厚勾稽棘讞惟允故進之以丞廷尉洙莊静有守寛夷無競則擢繇司匭爲之簿師楷宗枝秀頴吏能通暢討論外計蓋熟故來之以丞外府峻風規􅈺整志尚簡逺則輟繇儲戎爲之簿獄者生民, WYG: ''}
