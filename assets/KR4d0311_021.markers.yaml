  - {type: variant, offset: 4582, length: 418, content: 獎乎進階正郎分麾邊徼益厲精白以承可陳亞卿知德慶府制勑具官某古康名藩也邈在嶺海之東必習其風土諳其俗者爲之守爾𥙿於材諝敏於事功自筮仕至試郡扶胥黄木之間熟知津矣藹勞能之可紀鬰瓌韞之未究起家分符往鎮瀧水其爲朕布宣寛大之意簡賦平刑以惠逺民可牛大年以子病乞祠除直敷文閣主管建康府崇禧觀制勑具官某立朝而引去握節而賦歸殆不以冨貴利逹入其心者歟爾玉雪其廉明凖繩其平直卓有立於斯丗晚繇蜀道入儀郎省歩武寖華矣而出駕四牡列城聳動顧浩然有歸志何耶父母惟其疾之憂天性之愛也爾以子諗朕重違之進班穹閣均佚釐館非朕之不汝以也尚培髙風用礪頽俗可曽治鳯除直徽猷閣知建寧府制勑具官某閩粤接壤比歳黔首失職相挻而動亦旣厎定矣推吾德意燠寒飫飢以遂其欲安欲壽之情在賢牧守爾噐識邃明材猷通亮所至以最稱宅牧畨禺恩信茂著一道晏然沉柝建安鉅屏號稱難治其進直奎躔易地填綏之爾知閩之俗與粤近則爕友柔克彊弗友剛克何徃非美政哉可沈安義辟差知冝州制勑具官某廣右郡二十餘或繚而深控蠻而枕海守慮人噐之不相習, WYG: 良範}
