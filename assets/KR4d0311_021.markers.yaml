  - {type: variant, offset: 702, length: 12, content: 等唐鄧息蔡復歸版圗雖發縱, WYG: 時政紀者國史}
  - {type: variant, offset: 715, length: 0, content: '', WYG: 椎輪經武要略則先朝制勝典刑之囊括其書纂次於樞屬自昔必名儒文士爾家傳儒藝蚤著文聲韞抱不凢脫餌科級諸老先生多之簿正屬籍進升刪潤維汗青之稱也與聞廟畫攝事郎讃精毖簡通對我殊擢可陳一薦䕶獻俘}
  - {type: variant, offset: 716, length: 24, content: 人亦莫府之交助爾能知體國不憚從戎効婉畫於郾城賛成, WYG: 勞轉朝奉郎制勑具官某垂瓠合圍穹廬就燼凾首緒檻天網獻}
