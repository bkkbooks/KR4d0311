  - {type: variant, offset: 115, length: 2, content: 秉粹, WYG: 道德宗師文章宿老太山之雲為雨自有機緘虞淵之日洗光不動聲色方權奸之用事惟明哲以保身幾年出鄴侯以避元載之鋒一旦進弱翁}
  - {type: variant, offset: 118, length: 0, content: '', WYG: 正霍禹之罪雲霓盡掃宇宙復清五龍夾以飛既展濟時之畧四蛇入其宇初無求世之心耡梅花之月於未春飲木蘭之露於將曉觀渠血指攅我醉眉然救否者莫謹乎苞霜而反剥者亦由乎碩果離當復合危可使平我公有衮衣以歸趣登上相天子負斧扆而立迄濟中興某涉道未深謀身更拙聊爾署冗䘖於紙尾居然託後乘於遨頭矯詹峨眉太白之間知有東坡頴濵者在雖執鞭之晚矣尚捧硯以從之盖欲質平生書囊之疑豈止為方來夾袋之地後天下而樂况曽恊於寅恭安宇内為先願無忘於辰告寸忱所屬百喙奚殫上劉閣學啓駟玉虬以征尚遲牀下之拜騎青牛而過敢後道旁之迎顧斯文千古以無傳而前輩百年之幾見熟窺梗槩粗識源流盖自蜀公以來始有後溪者作其清明則青天白日其高深則太山黄河參古今之典刑具出處之本末權門鼎盛在熙寧自拔於熙寧聖化更張在元祐不黨于元祐以鷄鳴膠膠之志追鴻飛㝠㝠之風去不可留歸猶未老廵梅花而索笑浩若胷中之春樹萱草以忘憂蕭然物外之樂盡醉於田父泥飲之頃相忘於舎者争席之間文章散落於人寰翰墨流傳於夷裔雖有詔以强起曽何心於復來然而一飯不忘乎吾君百方欲濟乎斯世有關廟畫毎以驛聞宗磐未强首陳儲嗣事之十九疏民瘼已亟次及條例司之數千言仗孤忠以直前犯衆怒而不顧亶為仁者之勇兼得聖人之清天下之逹尊三孰如公者國中之儒者一其舎我乎賜劍}
