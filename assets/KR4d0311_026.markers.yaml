  - {type: variant, offset: 992, length: 2, content: 五嶽, WYG: 晁黄文采集芙蓉之裳而修初服不着一塵卧蓮葉之舟而讀玉書平吞八極屢試發硎之刅難藏露頴之錐宣閫㧞尤戎垣借重落筆於龍筋鳯髓之上寄興乎魚泳鳥飛之間姑賛籌邊即登天禄某遠趨幕底近接牆隂合簮甫挹於清標攬袂首勤於好語手遮西日曷圖横草之功脚􅂿東風當共浣花之樂龍州到任謝廟堂啓萬里橋邊甫解佐州之組百牢關裏忽分䕶塞之符名未登聖天子之御屏身已入真宰相之夾袋夢想不到頂踵有歸伏念某氷霰窮厓風濤苦海藐爾幾年之流落軒然一旦之遭逢補太廟齋即入扣天田之角與京官通判出捫雲棧之參了無關决之長惟佩丁寧之訓一來錦水四度劍門雖弗陪大幕府之賔猶自詭老元戎之客其於徇國靡忘愚公移山之心所謂籌邊但進彭祖觀井之法偶畢葵丘之戍方謀栗里之歸不圖寒根遽動春意兹盖恭遇某官胷中水鏡筆下化爐有猷有為有守則念之得箕子建極之意乃牧乃事乃凖惟后矣循周公立政之規凢諸老退而無營暨衆正用之未盡大為坯冶悉入蒐羅上關豐芑數世之仁下應㤗茅三陽之象為今元祐嗣昔淳熙矧墮甑之餘生乃播鈞之舊物亟令剖竹靡俟需𤓰厯吉日以問塗遡下風而委命丹心許國敢矜畵㦸之榮白髪倚門苐想綵衣之樂兩}
