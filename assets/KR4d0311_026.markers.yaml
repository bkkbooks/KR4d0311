  - {type: variant, offset: 988, length: 3, content: 九垓隆, WYG: 琅琅國子監之書爛爛蓬萊宫之賦一通脱手萬乘改容杜書記在其下風嚴少尹置諸上客如石投水猶珠生淵指籌邊之兩圖平章蠻徼草出師之一表號召秦關搴盡芙蓉之花遂翻芍藥之影某幾年心敬一日眼明略窺小陸之文已識大任之韞屋頭問訊欣鷄犬之相聞劍外征行恨燕鴻之相避囘僉判袖啓星槎仙客忽來笙鶴之聲雪錦主人益壯琴龜之氣辱在聨事願言定交恭惟某官賀白材}
