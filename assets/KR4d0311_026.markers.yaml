  - {type: variant, offset: 1540, length: 624, content: 之蹕遽蛻骨於湏臾黜轉而升榮忘其辱兹蓋恭遇某官吾道砥柱斯文津梁遜直諌如元齡之佐唐去副封如魏相之興漢謂保合善類必去敗群之羊而修明大公何愛溺井之狗辨薫蕕之殊氣培𣏌李之深根俾京尹授館以使留許詞臣遜闕以見處宣昭實意安集危蹤續翻紅芍藥之吟莫知稱塞占澄碧琅玗之夢終托生成銜戴輪困栞摩梗槩回趙制使啓恭審上思東略公請西征以文昌八座之尊緫元戎十乗之重江淮増氣關洛屬心恭惟某官文武兼資忠孝兩盡西平父子悉如飛而如翰慶州弟兄抑非彲而非虎挫狂虜於指顧之下平逆雛於笑談之間功歸一家名震四海正佩甘泉之槖又分細柳之弓㓜度却符堅於合肥風聲撼塞公瑾破曹瞞於赤壁雪浪翻江中莫府之宏開外提封之盡護不求一勝必出萬全東夏口西武昌規模旣定北羊腸南伊闕經略何難大奏愷於前茅永垂光於汗竹某搔頭白雪引睇赤雲竹樓之記猶存徒懷清賞桃林之詩可作尚賀元功回楊侍郎啓竊以南臺執法未輸折檻之忠西掖代言遽獻斵䆫之醜蒙恩超越揣分凌兢伏念某蚤坐排根乆成流落窮懷不柰毎嗟煮鶴之琴老氣未衰尚愛擊蛇之笏天適開於日月地偶借於風霜了無回川障瀾之功僅有去莠護苗之志方奮前而抨擊忽踵後以褒遷觀象門深浹日之留已幸翔鸞閣静半生之夢還驚取數過多揆元有自恭惟某官聲諧笙磬佩襲璆璜閙裏掉頭耿耿髙時之操閑邊䄂手卷卷憂丗之心念善類之相扶欲頽風之復起遂令渫辱亦轉光榮詩到蒼苔寄宦情之澹泊帖來青李佩交好之綢繆占報斐然垂察幸甚回趙婺州必愿謝忠定配享劄子恭惟先正忠定太師周程粹學文冨精忠龍夾日以飛定神噐於危疑之頃鰲負極而立安盤石於指顧之間𥘉罹偃月之謀終墮浮, WYG: ''}
