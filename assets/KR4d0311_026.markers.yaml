  - {type: variant, offset: 119, length: 0, content: '', WYG: 以給扶偉衣冠而入侍某遨頭後乘鉗尾冗銜毎思退續離騷之辭何幸親問太𤣥之字觀神和而氣定知目擊而道存自憐孺子倥侗毋惜一編之教更願老親强健亦如三夀之朋敬在下風有如皦日上安宣撫啓魚鳬蠶叢以來形勢千古伏龍鳯雛而後勲業一人朝家西顧以寛憂屬吏東郷而聽令九􅀈夘旗之近三熏子墨之恭竊嘗泛觀古今制敵之機頗識東南立國之勢腹心江浙腰膂荆襄維蜀道之山川如人身之頭目吳合之則可奪曹瞞之氣晉失之則難折阿堅之謀雖太白峩眉四萬八千年始通中國然西陵江都五千七百里莫重上游唇亡則齒必寒首擊而尾自應欲混鼎峙三分之地無如坤維半壁之天恭惟某官抱王佐之材任天下之重乘雲氣騎日月横騖泬寥之天簸鴻䝉扇雷霆獨立汗漫之表以道義養吾之大勇以忠忱運我之壯猷唾怒虎其}
