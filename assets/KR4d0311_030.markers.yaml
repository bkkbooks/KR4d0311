  - {type: variant, offset: 183, length: 20, content: 從之豈譎正無關於彊弱耶是猶有可諉者曰國異, WYG: 蕃鮮莫竹若孤根峭直不數歲被山如雲戴角繭栗曽幾崇朝已干霄}
  - {type: variant, offset: 189, length: 1, content: 關, SBCK: 􅀜}
  - {type: substitution, offset: 191, original: 彊, replacement: 強, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-17539}}
