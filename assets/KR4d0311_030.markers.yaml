  - {type: variant, offset: 1424, length: 331, content: 統制其權果孰重乎謁者執楯執㦸武士騶與期門羽林之置亦各有說乎丗爲衛尉見於同姓而王國人乃不得宿衛何也太傅古官論道經邦而以給事中領宿衛又何也夫以漢丗宿衛之嚴防微杜漸皆有深意揆之成周其得失安在邇者議臣有請宫禁侍衛各儆攸司欲以隆主威而尊國勢上亟俞之不識漢制有可施於今日者乎諸君博古通今言之毋略二問恭惟主上撫盈成之運垂延洪之休豫建元良以固國夲謹擇天下耆儒端士爲之輔翼儲德日隆㳙剛授冊三代有道之長誠不是過自漢以下固不容並論也而有司竊於攷古有疑焉四皓之來衣冠甚偉羽翼旣成而漢之大本以定子房之畫婉矣論者乃謂其植黨締交以相傾軋殆非子房之意然髙帝與吕后母子共起於艱難之中漢業甫定顧牽於私愛欲動揺之期期之諌曽莫能回其意則權以濟事似不當以植黨論也至觀異日開博望苑以延賔客遂至於虧天性之恩無, WYG: ''}
