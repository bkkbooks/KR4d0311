  - {type: variant, offset: 704, length: 3, content: 小人居, WYG: 於億萬世千文特凡將下陳何與大學婣娟餘閑亦復肆筆及之臣子述所藏臨智永書識以彭城瑤暉奉華印章劉望彭城或謂當時劉貴妃所得好賜楷法遒潤草聖妍力神動天隨超絶衆妙視永所書可謂集厥大成金聲而玉振之矣我太宗皇帝嘗行草千文賜李至至請鑱諸石以詔方來上曰梁武得鍾繇破碑周興嗣次韻非垂世立教之道孝經百行之本朕當親書觀思陵奎藻者當以熙陵之意叅之寳慶改元清明後一日程剛愍死事跋死生命也處死生義也義所當死直死耳}
  - {type: page-break, offset: 704, content: '', id: KR4d0311_WYG_030-13b, image: WYG1175/WYG1175-0314d.png}
  - {type: variant, offset: 709, length: 1, content: 小, WYG: 不茍免而生也身不茍免而生乃所以生社稷也天寳之禍唐以顔李張許之死而生靖康之禍吾宋以傅李梅陳程安諸賢之死而生皆功在社稷者也嗚呼安有功在社稷如剛愍而其後莫之録乎端平初元立夏後兩日古濳洪某題洪崖圖洪崖三皇時有道之士其見於隋唐間者曰張氲或曰藴自號洪崖先生出入以髯髧五雪驢一自隨此圖是也呉興葉子淵得晁氏所藏龍眠本手臨以見遺老}
  - {type: page-break, offset: 709, content: '', id: KR4d0311_WYG_030-14a, image: WYG1175/WYG1175-0315a.png}
  - {type: variant, offset: 711, length: 0, content: '', WYG: 戲云先生固清高弄拙或反巧一人御六子終被雪兒抄此畵此詩俱有眼也猶子穮弦誦}
  - {type: page-break, offset: 711, content: '', id: KR4d0311_WYG_030-14b, image: WYG1175/WYG1175-0315b.png}
  - {type: variant, offset: 712, length: 1, content: 間, WYG: 餘取所畵臨之一發輙破的老睫為明因識其末紹定癸巳立秋日題西岳降獵圖君玉以宫車游獵圖二寄示共七紙韔箭前驅嬪御紛從來輿去馬蹴踏雲氣其精妙瑰怪縱横變化出入天神嘆非龍眠莫能作}
  - {type: variant, offset: 714, length: 46, content: 爲郷原之行其害德爲尤甚受之者何意四凶之惡已著猶得以假息於堯朝非包荒歟尭不去四凶而舜去之豈包荒, WYG: ''}
