  - {type: line-break, offset: 646, content: '', id: KR4d0311_SBCK_030-2b06}
  - {type: variant, offset: 646, length: 2, content: 啓小, WYG: 怛化病革家}
  - {type: variant, offset: 649, length: 1, content: 乗, WYG: 環泣撝勿泣命子德藻滌硯濡茟手書四句偈以訣神宇凝正鉤畫勁峭實踐素履絯攝呈露坦然以方寸遺子孫非學力之騐耶至此然後知簸㺯精光於百巧者之不如拙陶同年崇詩巻跋某與宗山同壬戌進士甲申冬同除祕書郎迓之江上投分日宻乙酉秋某去修門未幾宗山亦去時上方鄉用舊學何落落獨爾耶宋廣平賦梅花疑非鐡石心腸人海棠詩近之矣九原莫起撫巻澘然彭忠毅謚勑跋為董景晹作紹興}
  - {type: page-break, offset: 649, content: '', id: KR4d0311_WYG_030-11a, image: WYG1175/WYG1175-0313c.png}
