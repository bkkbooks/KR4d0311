  - {type: substitution, offset: 143, original: 爲, replacement: 為, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19875}}
  - {type: variant, offset: 149, length: 5, content: 心術譎正宜, WYG: 志立其政以不擾為理以勤為功彈琴讀書於退食委蛇之頃泊如韋布坐以静勝雲生前岑鳥號後塢徃徃忻然契所適是樓特寄焉爾其成也以紹定辛夘臘月丙午越明年立春後五日記此君軒記軒舊麗寂照精舎東坡以倅杭行縣為賦不}
  - {type: variant, offset: 155, length: 0, content: '', WYG: 居無竹之詩隆興初徙於縣治衮繡堂之東開禧間嘗重建寳慶初元避上嫌名令桐江方侯熙易}
  - {type: page-break, offset: 155, content: '', id: KR4d0311_WYG_030-7a, image: WYG1175/WYG1175-0311c.png}
  - {type: variant, offset: 156, length: 1, content: 占, WYG: 此君軒仍用坡詩晉王徽之語也君者有德位之尊稱自萬乗至子男百里之國皆稱君以君名縣齋之竹}
  - {type: variant, offset: 158, length: 7, content: 國何威公僅能終, WYG: 尊與君百里等然竹之君以德言百里之君以位言知君之所以為德則優於君百里矣易之震為旉為蕃鮮為蒼莨竹}
  - {type: 'kr:newline', offset: 161, content: '

