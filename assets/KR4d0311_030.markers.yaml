  - {type: variant, offset: 2552, length: 343, content: 聽受獄訟日不暇給乃至有愧禮樂豈萬丗長䇿未暇講耶序進郎吏仰視不顧則體貌安在而止擇十使猶患未盡得人恐兼収待用者不爾也夫坐而論道謂之王公綱舉目張豈無其要而丗之喜事事者乃以身親細務爲稱職不事事者又以無所建明爲得體漢唐相業之卑得無坐是乎主上更新萬化圗任老成以恢張治功冝日異而月殊可也然天下之弊紛如蝟毛二三大臣夙夜盡瘁於其間而未厎厥成故議臣欲清中書之務簡節踈目而講明其大者揆守之辨要必有在至若賢材之未盡舉倖門之未易塞兵聚而難散民困而易揺榖貴尤艱於和糴楮輕尚費於稱提凢此數端莫非當今之急務孰爲大臣之職孰爲有司之事輕重緩急當與識時務者籌之諸君其毋隠五問兵以多筭勝智者察事機於呼吸之間料敵勢於千里之外發無不中如矢破的何其神也而謀之用舎抑又有幸不幸者存焉廣武說成安欲假竒兵絶信耳之輜重而兩將可致淮隂使人間視, WYG: ''}
