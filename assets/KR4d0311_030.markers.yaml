  - {type: variant, offset: 299, length: 272, content: 餘單于且欵塞而來享中興之治赫然莫及而一傳之後漢業衰焉弱轉而彊彊轉而弱始終之變相反若此其必有故矣恭惟主上更張萬化緫攬權綱舉天下之政滌蕩振刷而一新之朝廷清明邊鄙不聳四方延頸以望太平而轉弱爲彊之機不可失也宵旰雖切庶績未凝鴻鴈之民尚勞於還定鼠狗之盗猶費於掃除而内外體統之間血脉壅厎臂指拘攣識者尤爲之深慮國勢所係若有待而彊意者刑賞之施恵褻而威不振耶紀綱之張名存而實未至耶抑亦體祖宗立國之意守以寛仁道德安彊隱然自有不可犯之威而天命人心之固在此而不在彼耶諸君其敷繹濟時之䇿以告礙格問國論之變至乎中而定夫中在易爲二五在書爲皇極君子小人進退之機天下國家理亂之夲皆, WYG: 生侯}
