  - {type: variant, offset: 3196, length: 721, content: 盗之難也草制失辭至煩改定抑人心亦有未孚歟彼其輪臺之詔奉天之詔均罪已也其辭孰切寛大之詔陣傷之詔均恤人也其惠孰渥河凉三鎮播告之修均所以奪其心也其意孰明視草之才較以除書德音擅名者孰勝期期之請視以批勑壞麻爲忠者孰優此猶未足深議也後元獨盛於七制元和並列於三宗號令之煥然可述與温雅有古風烈乃不見於文帝之賛唐之威令幾於復振獨於賛憲宗言之而二祖之制命無稱焉作史者必有深意恭惟主上祗畏天戒勤恤民隱嘉與海内同躋仁壽廼者明詔荐頒飭監司守令以奉職之意開盗賊脅從以自新之塗王言大哉一見可决四方萬里鼓舞於風雷之下當不止於山東魏博吏士而已也然澄清者流爲姑息撫字者轉爲催科習俗移人詎能遽革錢幣乆壅而未通榖價方踴而未艾凶歳多暴還定猶難伊欲吏治興起姦盗革心翕然丕應如漢唐之盛時若何而可憂丗之士盍相與圗之七問周南爲三百篇之始文王脩身齊家治國平天下之道悉於此見之亦猶易首乾坤書斷自唐虞之意歟然自關雎至兎罝凢七詩始言關雎之化行又四詩而至麟趾始著其應夫王道自閨門祍席而逹乎天下逺而難化者冝莫如㭬杙之人近而易化者冝莫如同姓之親今乃不應於彼而應於此何耶羔羊爲鵲巢之功致在位皆節儉正直至其應見於騶虞則天下純𬒳文王之化草木群生無一不遂夫召南特諸侯之風其視周南王者之風固爲有間彼之應顯於庶類之微此獨應於公子信厚無犯非禮而已又何耶詩取麟以爲興趾定角果有仁厚之象歟抑謂太平致麟之時歟序言衰丗不知果紂與文王之日歟抑謂周之季丗歟麟趾鑄金以班諸侯王夫豈無說而良史之作訖于麟其意安在語曰人而不爲周南召南其猶正墻面而立有志於學者必三復於此而好脩之公子尤當佩之而不忘反覆二南之意推之於行葦角弓以究終始盛衰之變諸君事也其爲我索言之八問六經著天道人事之極莫詳於春秋雖不言某事有某應而證應具存其聖人憂丗之心所由見乎日食, WYG: 齋集巻}
