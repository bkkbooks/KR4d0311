  - {type: substitution, offset: 849, original: 說, replacement: 説, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19811}}
  - {type: variant, offset: 851, length: 1, content: 自, WYG: 山中古佛示現為對轉首二紀矣臨安東山静空出天台聲聞十八尊者像乞一轉語恍然有感追前夢書之聲}
