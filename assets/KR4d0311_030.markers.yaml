  - {type: variant, offset: 651, length: 1, content: 而, WYG: 顔邵以其祖魯公所自書告}
  - {type: variant, offset: 654, length: 6, content: 漸耶洪範皇極, WYG: 上曰人皆有一死或輕於鴻毛或重於太山處死為難爾忠毅彭公亦善處死者也守衢日方臘䧟歙睦杭衢介於三郡賊勢張甚獨與郡僚段處約守城城䧟罵賊以死有殺身以成仁公}
  - {type: page-break, offset: 654, content: '', id: KR4d0311_WYG_030-11b, image: WYG1175/WYG1175-0313d.png}
  - {type: variant, offset: 661, length: 1, content: 疇, WYG: 謂矣公伯氏尚書元祐紹聖正人壻余御史亦以直聲聞天下一門氣節相尚輝映千古景暘公曽孫壻得吳傅朋所書謚勑於其家故篋猥釀中寳之如天球拱璧其知所尚哉年月日某敬觀於朱陀聞復閣家朝南避偽囘任檄跋開禧丁夘之變蜀士}
  - {type: page-break, offset: 661, content: '', id: KR4d0311_WYG_030-12a, image: WYG1175/WYG1175-0314a.png}
