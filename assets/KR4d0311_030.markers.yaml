  - {type: line-break, offset: 199, content: '', id: KR4d0311_SBCK_030-1b03}
  - {type: variant, offset: 204, length: 42, content: 勢殊也及觀漢之文宣規摹一家而彊弱乃有異勢呉王不朝賜以几杖匈奴嫚侮結以金繒太息流涕之書, WYG: 樂生意勃勃乎}
