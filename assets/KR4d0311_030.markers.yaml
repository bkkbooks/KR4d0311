  - {type: variant, offset: 847, length: 1, content: 假, WYG: 兩家所藏同出一時之筆紙其創絹其成與絹夀止五百年紙壽千年君玉倒黄河以洗研挹玉井以濡翰醉攬風露吸金天之晶而賦之必有與此畵相為夀者紹定癸巳秋日洪某書題天台聲聞十八尊者像余庚午初夏與會稽王仲鈞同遊廬山旬餘一夕仲鈞先還南康城予獨宿開元寺軒窻静深毛骨灑然夜半夢至佛殿前遇長身僧握予手而言堯曰數句已斷于篇章之末參乎一唯獨得於言意之外孔子子思相傳者如}
