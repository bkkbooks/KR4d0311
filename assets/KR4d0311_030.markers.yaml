  - {type: variant, offset: 884, length: 147, content: 立而中道以行漢唐之季朋黨成風雖賢者不能免豈其自叛于中歟抑上之人無以并包而大受之故逸爲朋黨之歸歟厥今更化以來進君子而退小人開衆正而杜群枉天下莫不服聖上之明而用舎之際猶恐或激於偏徇議者乃有中立不倚之說蓋欲示尚中建極之意而定國論於不可轉移之地也夫否與泰常相反極與咎不兩立邪正消長間不容髮伊欲恢包荒之量, WYG: 肖}
