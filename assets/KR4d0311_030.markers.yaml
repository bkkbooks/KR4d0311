  - {type: variant, offset: 676, length: 2, content: 福冝, WYG: 以為義者與夫死生命}
  - {type: variant, offset: 679, length: 12, content: 至不協于極不罹于咎亦且大, WYG: 去就義也惟其委死生於天}
