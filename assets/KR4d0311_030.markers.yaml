  - {type: line-break, offset: 161, content: '', id: KR4d0311_SBCK_030-1b01}
  - {type: variant, offset: 166, length: 7, content: 身霸業遂替文公, WYG: 時為春春物}
  - {type: variant, offset: 174, length: 8, content: 後丗爲盟主齊且屈, WYG: 生旉}
  - {type: substitution, offset: 176, original: 爲, replacement: 為, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19875}}
