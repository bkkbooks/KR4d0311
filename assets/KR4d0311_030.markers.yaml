  - {type: line-break, offset: 123, content: '', id: KR4d0311_SBCK_030-1a10}
  - {type: variant, offset: 130, length: 1, content: 齊, WYG: 為令者知幾人傳者能幾否固幸其不傳臧而不幸不傳者可勝道耶夫士君子立於世豈以傳而為善不傳而遂已也未}
  - {type: variant, offset: 132, length: 2, content: 葵丘, WYG: 為不善而必其傳也亦未有善積而名不傳也其亦為所可傳勿為所不可傳而自幸為無傳也雖自幸於無傳而根窳相形其溢於邦}
  - {type: variant, offset: 135, length: 0, content: '', WYG: 耆老俊秀牙頰間者未嘗不並傳也書曰康乃心顧乃德逺乃猷裕乃以民寧司民社者尚監茲哉會心樓記濳負天目支峰石柱為縣治前繚鳯凰青山右峙岝㠋三靣騰躍峻㧞多竒觀東山獨庳伏不稱疇昔嘗於門阿少左作近民樓以亢厥勢而地廹雜囂非宜久且十年矣今令荆溪張君本耒公餘慿高周覽謂景岡觀泉辨隂陽而位置古人所重相攸衆樂園亭之列岫正枕東麓可駕庳以為崇屬時農隙買材賃力斥亭為重屋三間飛䟦縹緲脱氛埃而接雲氣扁以會心其下軒窻靜深仍列岫之舊名前二十歩山碕斗立碕外八十歩許為圃以射北有净凉亭環立巨竹廼取徑於亭之東南渉圃級碕而升樓羣山奔湊一覽而有如主人由阼階肅賔及介相與揖遜酧酢几席間不譁不偪左右具宜邑勢隱然以尊非直為臨眺故也而却紛領要疏滌此心之煩欝以熙其民厥有助焉人心元體湛然太虚之涵萬象無主則物誘於外心徃}
  - {type: page-break, offset: 135, content: '', id: KR4d0311_WYG_030-5b, image: WYG1175/WYG1175-0310d.png}
  - {type: page-break, offset: 135, content: '', id: KR4d0311_WYG_030-6a, image: WYG1175/WYG1175-0311a.png}
  - {type: substitution, offset: 135, original: 㑹, replacement: 會, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-0002}}
  - {type: variant, offset: 136, length: 1, content: 晉, WYG: 境}
  - {type: variant, offset: 138, length: 9, content: 踐土之盟均爲五霸之, WYG: 主則理融於内境來㑹心定而明静而所見物物皆春意斯得所㑹矣君起中興世家年壯而識老氣}
  - {type: page-break, offset: 138, content: '', id: KR4d0311_WYG_030-6b, image: WYG1175/WYG1175-0311b.png}
