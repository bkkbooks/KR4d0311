  - {type: line-break, offset: 28, content: '', id: KR4d0311_SBCK_030-1a05}
  - {type: variant, offset: 28, length: 42, content: 於齊乃能逆料預計於數百年之前則其勢亦有時而定也周之季丗地不大於曹滕民不衆於邾莒而諸侯, WYG: 耳目非他役比故}
  - {type: 'kr:newline', offset: 47, content: '

