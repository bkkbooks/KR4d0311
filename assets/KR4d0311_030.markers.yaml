  - {type: variant, offset: 3919, length: 6065, content: 六螽蝝蜚蜮之災緫十有八雪電星石隕霜無冰凢其關於天人之際雖微必録而水旱之變尤不敢略僖王正月不雨夏四月不雨六月始雨其不曰旱謂其有志於民而不爲災然文自正月不雨至于秋七月昭上辛大雩季辛又雩旱亦甚矣而不以旱書無乃亦不爲災耶以至夏大旱欲焚巫尫而復止是歳饑而不害然旱以大書爲虐尤酷安有民不困于饑者不然則宣亦書大旱而不書饑亦謂其不害可也或書旱或書雩或書不雨美惡異辭必有深意宣大水而繼以饑襄大水而繼以大饑淫潦妨農固冝艱食而威成之秋大水莊之末年横流尤數至皷用牲于社于門何爲皆不以歉告抑豈如七年之水雖無麥苗不害嘉榖故從而略之然大無麥禾臧孫辰遂至告糴貽我來牟獨非嘉殖歟亦未有洚水若是而嘉榖不害者威之𥘉年有平原出水之害越二歳而有年其轉㓙爲豐者何道它國非無乖沴宋獨書水淫雨害於粢盛乃知其必興者何說恭惟主上篤於敬天切於愛民真得堯湯之用心而大兵之後四方未免以水旱告若幾於春秋之不一書者天心仁愛固在是歟木飢水毁皆有數歟有年之慶勃興之兆否泰相反抑權輿於此歟近觀吾饒去歳常暘今兹常雨官無委積民有菜色而或者猶以饒在江東爲優得無旱不爲災雨不害榖如魯史之所書歟諸君學貫天人不愧舒向盍相與發明春秋筆削之意以諗爲政者毋以訐而爲直九問人主操冨貴之柄以御天下錢幣輕重之權當一出於上不當與天下共之也虞夏金爲三品周立九府圜法利權所在上實專之至景王欲更鑄大錢單穆公雖諌而不聽百姓竟蒙其利揆之劉陶之議則不合文帝除盗鑄之令賜鄧通銅山得以自鑄而錢乃至於貫朽質之賈生之論則不然撰直三千錯刀五千何其直之多百錢墊七八與三十五爲陌何其陌之寡是猶未足深論彼漢之五銖唐之開元錢制是爲得輕重之中然五銖旣行郡國多姦鑄而益輕公卿請鑄鍾官赤側以一當五其後二歳赤側以賤而廢三官錢始冨矣開元旣用以經費不給始鑄乾元重寶參用以一當十犯法日數百終復其舊然後民便之夫錢出於上而散於下上之所重孰得而輕顧方行而遽輟何耶抑上之人不過爲一時權冝之舉隨即反經耶否則朝廷之上無以主其議以一人之言爲用舎耶漢方再造猶興五銖之思唐凢幾丗一循開元之制而赤側重寶不復見抑又何也國家銅楮並行深得子母相權之意頃以楮幣益輕多爲秤提之術而未厎於重於是以開禧新布以二准三行於輦轂之下利權輕重操之自我可謂得其冝矣或者猶謂貨泉新舊均國寶也而自爲抑揚京城内外皆畿甸也而自爲畛域恐未免抵冒之多然使以二准三果可通行則錢之布於天下者皆可從而増益否幸以利害得諸目撃者爲有司告十問大江以東衣冠之盛饒爲最螺洲地䜟異人出焉冠大廷丗殊科班班可數皆學校作成之功也漢之畨君唐之顔魯公德澤在人至深而獨不聞垂意興學何耶晉虞公爲内史大脩庠序是前此嘗有學矣誰實基之移告屬縣廣招生徒至七百餘人教養之盛若此今所養僅能三之一而韲鹽之態常患不足不知當時雲㑹輻湊何以爲養先正范文正公相攸於東湖上繼者始築儒宫以據水光山色之㑹公之詩文胡不及之買田三頃以澹士大書特書詫以爲盛然所入其能幾何今膏腴歳増數凢幾倍而倉廩之積不見有餘抑尾閭之泄無以窒其源耶髙堂顯敞不改舊觀硯湖平逺尤覺増明二公所以淑艾後人者雖百丗聞風而亦起諸君藏脩其間講明正心誠意之學涵養致君澤民之業以求無負於教育之素盍各爲我言爾志十一問丗臣之喬木舊德之元龜有國者所甚重而出處進退天下莫不望以爲標的尚論古人顧不能無疑焉復亳卜洛之餘告歸之志則同胡爲乃有欲去而復留者不惟自留且作書以留同列同列亦爲乆留而不去何勇退之難耶海濵二老同爲善養而來歸扣馬之諌鷹揚之舉果孰爲義天下旣定表東海者乃不與師保左右之任何耶從心不踰矩之年尚皇皇於歴聘否以天下之逹尊自居能終不見諸侯否乗馹而見輦而如公告老猶得以與聞國事至朝廷大議遣廷尉諮問亦乞言之遺意否願棄人間事從赤松子游蓋已見幾而作何衣冠甚偉者始來上閔將軍之老召其子爲太僕可謂貪賢之切何知足不辱者遽去求文武如不及而蒲輪之迎特能詞賦爲治顧在力行而魯邸之議乃先服色據鞍矍鑠非不銳也未免乗下澤車之悔食肉萬里非不壯也未免入玉門關之請而無踰老臣尚堪一行則又好勇至老而不衰其視畨畨黄髮之謀孰得孰失晚應賢良但見不情而多詐周流四公不過恭遜以取媚請尚方劒賜靈壽杖與夫長樂老之自叙血氣旣衰固應爾歟彼緑野堂之遊九老圗之作亦必有所懲而然也著節而稱祭酒攷於周當爲何官遮說而得三老不謂秦尚存此名自諌大夫遷御史大夫爲太傅而封褒德侯漢家校年夕法抑又安在書陳舊人之圗任詩歌元老之壯猶年髙德邵閱義理爲甚熟出處大節必有非衆人所能識者幸商訂之十二問漢公子之好學莫如楚元王一門之盛元王受詩於浮丘伯諸子皆讀詩至孫辟強亦好讀詩越數丗猶有以少通詩書召者豈非過庭之訓而然歟然德修黃老之術得枕中鴻寳苑祕書於淮南其子竟以是下吏恐非所以爲義方之教也而典校祕書於天禄閣太一青藜爲之下照歆復領五經卒父前業可謂能丗其官矣然向自主榖梁春秋義歆則欲建左氏春秋論難迭出自爲矛盾豈父書有不必讀耶抑輪扁斵輪不能授其子耶其䆒榖梁左氏於聖人之經爲孰近左氏多古字歆獨好之引傳釋經轉相發明其於字學蓋精棻則方且問竒字於子雲無乃有貴鶩之意歟向作洪範五行傳嚴爲外戚之戒歆乃挾周官泉府之說爲新室國師父子異心一至於此然國師方貴顯矣棻以符命投四裔何其忘䑛犢之愛也董仲舒爲漢純儒通逹古今有𥙷於丗向與之相伯仲伊吕無以加之語必非輕許可者淵源不及游夏何爲歆復少之曽孫龔篤論君子以歆言爲然黨同伐異孰爲至當自交而至于龔弓冶箕裘之業蟬聮十丗輝映兩都其間先後異同是非得失不可槩論意者同於好學而不同於所學亦不害爲丗家歟諸君平時自許不在漢公子之下家學之傳亦能若是其盛否十三問周之士也貴而肆秦之士也賤而拘疇實使之然賤而且拘秦固以亡貴而至於肆周亦安取此得非周以道勝法秦以法勝道耶太學賢士之關士氣屈伸公論通塞所係爲甚重鮑宣爲司隷諸生舉幡集闕下而留之夫司隷内治京師外統諸郡其於太學若無與也愛而留之不忍其去所以能得其心者何固嘗聞郷校議執政之善否而憎兹多口者欲毁之胡爲於宣獨眷眷如此韓愈爲祭酒招諸生而誨之學競起欺予之嘲夫祭酒爲古司成國人矜式其於弟子貟至近而易格也侮而嘲之曽不受教所以莫能回其心者何固嘗聞聚爲朋曹誶罵有司而退然自克者無幾胡爲於愈亦不能少降心以相從耶異時處士横議名節相望適以趣漢室之衰六館之士不䧟非義終無以弭唐室之變遡流尋源要必有說十四問孔門速肖者七十子而名在四科者十人而已果孰爲之區别耶參悟一貫於口耳之外胡爲不在四科之列夫子傳之曽子曽子傳之子思子思傳之孟子是道之統參乃得之而在四科者反不與何耶借曰政事言語文學不足以盡道德行之顔閔蓋嘗在寢矣平日之所許可之所期屬非曽子所敢望今不傳諸此而傳諸彼必有深意謂參之魯有受道之質歟回也亦如愚謂參之孝爲百行之源歟孝哉子騫𥘉亦何愧意者寶藏於海聽夫人之所自取歟後世以顔孟配先聖而得道統之正傳如曽子僅與游夏齒又有不可曉者願聞其說十五問臺諌天子之耳目建置本末可得聞乎九官之命聖䜛納言龍獨任其責它官何爲不得與善旌謗木人皆可言而四凶之惡胡不聞有斥其非者周官有御史司諌似以風采議論爲職然御史掌治令賛書之事𥘉不及於觸邪指佞而弊群吏者乃有小宰司諌掌紏萬民之德亦不及於繩愆弼違而諌王惡者乃有保氏官名與後丗同而職業則異何故藉曰凢治者受灋令御史得以劾其違令之罪以詔廢置司諌可以因事而納規三百六十官之中職於紏察者止二人無乃自狹其進言之塗歟漢承秦制以御史大夫爲三公中執法領侍御史十五人諌大夫無常貟多至數十人唐則監察御史十人又有裏行之名諌議大夫四人而拾遺𥙷闕亦復並置其視周人設官可謂詳矣而當時治道曽不能庶幾成周之盛豈惟其人不惟其官歟方今衆正在列國是堅定臺諌紀綱之地雖不備其官而一士諤諤嘗首形於王言之嘉歎然攷之國朝之制天禧中御史諌官皆四貟慶暦有三諌之除元豐有六察之命今焉冠豸伏蒲各專一官而不並建必有深意謂才難而不輕授歟賢俊滿朝敦無明目張膽之志否則得其人而一䕫自足歟十朋之龜弗克違冝其不厭多也又否則聖朝無闕小人退聽而皂囊白筆之可略歟則人情之譸張國事之膠轕未可盡諉諸太平之無事意者御史司諌之專其任將以復成周之訓歟復古之難不可不詳議而熟圗也諸君志於有用其爲鋪張聖賢相逢之盛事十六問與其有聚歛之臣寧有盗臣以其爲國植怨於民也盗竊寶玉大弓春秋誅之胡獨聚歛之臣不及贓吏犯法法在姦吏舞法法亡蓋無法則無以爲國也伐檀之貪鄙無功詩人刺之胡不聞有刺在位之姦者茍變賦於民而食人二雞子至疑其傷廉然禮順人情乃或置米肉之遺於不問何耶劉寵之爲守受一大錢而去人皆稱其賢然法有明禁受所監臨一孔以上皆贓論何耶得非禮法不相爲用歟頃者貪相債帥之得志上下成風恬不爲怪聖化更新首嚴簠簋不飾之禁革貪爲廉冝翕然丕變論者猶謂賞罰不信不足以懲汚染之習而善類名家科甲之士不當遷就爲之諱是欲一以文法繩之也禮義廉耻以維持士大夫之風俗法禁之外亦有可行者乎若曰人心趍利如水就下禮不足以防其無厭之慾法不足以制其自營之私又將何術而可史家皆傳酷吏獨無傳贓吏者伊欲裒爲一書暴諸國史一字之貶若撻諸市不識可使革心易行精白以承休否十七問宰相論可否於廟堂之上以行其道諌官争是非於殿陛之間以行其言經綸治功彌縫君德蓋非它官比也冡宰制國用必於歳杪然周官大宰歳終受群吏之㑹其不㑹者惟酒與膳服耳夫惟辟玉食膳服之不㑹冝也酒誥一篇歴歴無彛酒之戒酒而可以不㑹乎彼庖人膳夫之不㑹王及后丗子皆然而酒正之不㑹唯王及后而丗子不與得非養正於蒙不容以是亂德耶歳終天子齊戒受群臣之諌然周官司諌不過紏萬民之德而掌諌王惡者惟保氏一官進言之路何示人不廣藉曰左右前後皆可繩愆而受諌獨於歳終事有可諌必待卒歳而後言則爲立仗馬者多矣彼孟春徇鐸工執藝事以諌此受以歳終彼諌以歳始抑又何故後丗宰相兼領鹽鐵度支諌大夫無常貟揆之周家建官之制然歟否歟朝而問一歳錢榖之數與正旦酌獸樽以賞直言槩之歳杪制用歳終受諌同歟否歟頃建言于朝者請宰相制國用諌官𥙷闕貟歳云莫矣因舉周官王制之疑以爲問十八恭惟主上盛德大業冠冕帝王閎休懿鑠輝映天地廼者自仲秋𥘉吉日御昕朝巳而儲闈之授冊宗祀之慶成千秋之上壽元正長至萬玉來庭盛事荐臻祲容迭講凢此大朝㑹之儀固有曲臺之議在然國家制作多仍唐舊是不可以無攷也今觀唐制大駕屬車十二乗大陳設則分左右施於衛内三衛畨上分爲五仗號衙内五衛元日朔望視朝則服翼善冠其後朔望仍用弁服元日冬至朝㑹七德與九功同舞其後至有不忍觀破陣樂舞者至於大陳設皇太子而下以次上夀且奏祥瑞雲物其大略亦若是而巳而其間不能無疑者太極宫之承天門受萬國之朝賀旣曰古之外朝矣或又謂含元殿在周爲外朝在唐爲大朝何也太極殿者朔望坐而視政旣曰古之中朝矣或又謂宣政殿在周爲中朝在唐爲正殿何也兩儀殿常日以聽政而視事爲古内朝又以爲紫宸周之内朝漢之宣室唐之上閤亦曰内衙然乎否耶兩儀承慶皆爲受朝聽訟之所而元和中正朔乃御紫宸朝賀寳暦中則又月朔御紫宸行入閤之儀胡爲受朝之地曽無定所舊制以隻日視朝其後乃命輟朝放朝皆用雙日或又五日一御太極殿胡爲臨朝之日曽無定期引對廷臣何婁見於延英讀示月令何獨見於宣政入閤之儀開元舊禮夲無之後之諸儒從而附益抑又何說也夫以唐家一代之制損益㳂革豈無得失之辨仰參周典俯采漢儀其合於古而冝於今要必有一定之說諸君結綬登畿觀國之光有日矣試言其槩武舉公試䇿問乙酉問恭惟皇上以聦喆英粹嗣無疆大歴服學聚問辨寛居仁行四方萬里翹跂望治諸君蒙𬒳新美之化可無說以禆新政敢問舜月正元日受終于文祖首察璣衡以齊七政而類禋望徧之並舉豈觀天交神庶政莫先歟異時月正元日格于文祖詢四岳闢四門明目逹聦惟恐或後且進十二牧而歴咨之聽言用人又所當急也太甲元祀祗見厥祖伊尹明言烈祖之成德以訓于王是天下之政無大於法祖宗矣髙宗恭嘿思道君臣相與告語尤卷卷於遜志時敏之務典學豈容緩歟成王即政無逸舉三宗以勸主乎畏天愛民而巳立政一書乃以三宅三俊爲不可忽終之勿誤庶獄爲重意固各有在歟抑又有可疑者禹受命于神宗不旋踵㑹群后誓師而征有苗康王率循大卞大臣進戒未暇他及首以張皇六師爲言佳兵不祥之噐顧先之何歟豈國之大事在戎不可一日弛歟新服厥命求以聳四方之觀聽歟人情易玩泰用馮河之義歟君以乾剛爲德必神武英略而後足以運天下歟事有夲末物有先後知所先後則近道矣隆古帝王出治之序參之今日所當先者悉意陳之有司將以復于上省試一乙未問大明當天而萬景隨北辰居所而列曜拱恭惟主上以文王之聖躬虞舜之孝宫中三年之制畢將㳙剛旦御路朝以延見百官臨撫萬國禮隆典鉅不可不預蒐而夙講也周外朝在路門外内朝在路門内燕朝在路寢之庭所謂治朝者果安在豈即外朝歟天官大宰王眡治朝則賛聽治豈王公坐論關於治道甚大斯謂之治朝歟司士之公孤卿大夫士朝士之群吏州長衆庶莫不在列揆之明堂位夷蠻戎狄不與焉豈置之國門之外不容列於表著歟漢接三代而興奉常綿蕞之習不過秦儀雜就巳知皇帝之貴使得魯兩生相與翼成之果盡還周典之舊歟德陽殿大朝㑹夜漏未盡七刻鳴鍾受賀與長樂之儀先後交映然長樂陳車俠陛執㦸傳警而不設樂德陽乃鍾皷鏗鍧管絃燁煜豈禮樂至此而後備歟宣帝受釐前席何盛服齊明獨施於少年之見宣德幘坐迎笑何威儀簡略能奪夫說客之氣髙帝之朝廷而愛幸者媟戯於殿上宰相得以折之先帝之正處而貴寵者引内於殿中中郎得以郤之佞倖方張二臣何爲無投䑕之忌小臣廷辱師傅至攀折殿檻而不顧蓋謂其不能正主益民也而金華入說尚書論語其有𥙷於帝學者何事武帳不冠不見使人可其奏而出入禁闥之請曽不克從間見髙門之論乃謂妄發其不能動帝聽者何說十萬横行面謾可斬而殿上皆恐遂罷朝不復議何聽納之易奉珍來朝待以客禮而甘泉受謁稱藩而不名何禮遇之過朝而問錢榖出入公私之積何其難於𥙿也坐朝而日􅉴未退内外之務何其難於清也朝堂百僚之位蕭曹邴魏謀謨乎其上司徒府毎天子親幸與丞相决大事是外朝之存者豈非君臣一堂交孚無間而後足以増朝廷之重歟其歴攷周漢夲末以告二問繼志述事者人主之逹孝崇德報功者朝廷之盛典昔在寧考親挈神噐以授聖明昭哉嗣服于今一紀而文母保佑之恩永言孝思亦旣升祔侑食清廟豈無舊弼顧猶缺焉可乎盤庚告其臣民兹予大享于先王爾祖其從與享之功臣配食於廟商家尚矣而莫名所享之臣伊尹格于皇天伊陟臣扈格于上帝豈即其人乎周司勲有功者祭於大烝傳者於王功曰勲獨取輔成王業之周公而召公之夾輔尚父之爕伐皆所不及豈難其人乎漢論功定封録第侯籍臧諸宗廟以至麒麟雲臺之繪崇報厚矣未聞有列於烝嘗者而先儒謂漢祭有功於廟庭其詳可得聞乎唐享功臣祫則配禘則不配其後禘祫皆配果合乎古否也髙祖廟以裴劉故人爼豆其間能無出於私乎太宗廟以魏證讎臣冠佩其中抑無一之非公乎長風孤騫之仁傑廟享冝也而五王之賢並侑固不厭其衆乎忠貫日月之子儀廟享亦冝也而中興第一之功不與亦不嫌其寡乎佐佑王化之說享之未過也而應變守文之名相皆不在選其有所抑乎光復宗祏之晟享之誠當也而上不負天子下不負所學者廼置而不問豈文墨議論不如汗馬乎翦蜀於清明無蔽之日平蔡於惟斷乃成之時杜裴元功享之俱無媿也而崇文及愬莫非指縱之下乃與同升豈將相叶心然後功業有濟乎許敬宗威勢熾灼停享於神龍固足以懲滔天之罪而名宰相如元齡百丗猶將宥之亦以子停何以允公論苗晉卿小心謹畏崇配於大暦已不足以孚當丗之望而首賛經綸如裴冕一時無能及者乃以即丗先後爲疑何以逃清議自武德至于元和功臣列在祀典凢四十餘人穆敬文武宣而下廟食靡所著見豈無其人則闕乎抑有其人而泯乎無傳也夫黄鍾動而氣序轉應龍翔而雲霧集君臣感召之機蓋非偶然者然一時之功敦與乎萬丗之功左右諸大夫之曰賢孰與乎國人之皆曰賢人心是非昭如日月侑饗大議可一言而定也諸君攷古驗今以對毋枉平齋文集卷第三十, WYG: ''}
