  - {type: line-break, offset: 66, content: '', id: KR4d0311_SBCK_030-1a07}
  - {type: variant, offset: 72, length: 0, content: '', WYG: 不勉予退而心念邑近在畿内地望非不枵然大也而土薄水淺十日晴則告乾三日雨則相戒為溢備民以故無葢藏而令以負租督過者十七八彼芘於此豈能為壓焉之懼哉所壓}
  - {type: variant, offset: 73, length: 0, content: '', WYG: 急於屋者見大夫以朝士來宰乎此茍可撐扶以延歳月何新為新之寧不勤其民而自為紛紜耶未信潰乎成也越歲月苕人過予門曰縣之寺成矣治事之㕔退食之堂宴息之室崇樓邃閣表裏中度發地得中霤遺趾位置靣勢且還其初矣屋後惡木叢莾鴟鴞狐狸舞怪之地薙翦不留餘拓圃結亭竹木伍伍氣象一新矣而田里宴然罔聞知嗟夫縣}
  - {type: page-break, offset: 73, content: '', id: KR4d0311_WYG_030-3b, image: WYG1175/WYG1175-0309d.png}
  - {type: variant, offset: 74, length: 1, content: 周, WYG: 劇易弱者以茍偷為安遑惜我後强者惟力是務一役}
  - {type: variant, offset: 76, length: 4, content: 心秦汛埽, WYG: 興萬戚之乘也於此能於政休俗暇儲材庸力以植壞起仆使吏治尊民瞻聳而一毫不以動其民至斥圭田再歲之入以食功可表也已惟昔聖賢道化之盛有本末而無内外其用力自相在爾室始盖萬室之治不如一室之難也言偃宰武城澹臺滅明非公不至是室之嚴所親必直諒所諮必正大所踐必誠敬詖辭詭行姦聲亂色無一得以摇吾之清明而弦歌之化行矣令其進於是乎役起正月己未迄於五月癸丑令公族名希磐以進士試刑法中其科嘗為大理評事云紹定癸巳秋七月甲子記於濳縣㕔題名記}
  - {type: page-break, offset: 76, content: '', id: KR4d0311_WYG_030-4a, image: WYG1175/WYG1175-0310a.png}
  - {type: page-break, offset: 76, content: '', id: KR4d0311_WYG_030-4b, image: WYG1175/WYG1175-0310b.png}
  - {type: substitution, offset: 79, original: 埽, replacement: 掃, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19464}}
  - {type: variant, offset: 81, length: 0, content: '', WYG: 飛都呉邑加重令加選題名昉於隆興甲申續於嘉泰癸亥前後著見者四十有二人石近燬紹定戊子續記自晁大夫始舊聞放失矣九華程君燾至精敏而浚㓗大不弛綱細不漏目民隠吏慝搜獵幾無遺治行亹亹逼前獻垂滿討諸故府}
  - {type: variant, offset: 82, length: 4, content: 鞭笞四夷, WYG: 題名三為一以存往而詔來且追書唐及國朝全盛時賢令十一人於首高山景行不以耳目所接為僅足也然著記未免於闕聞遺風或待於慨想東晉虞府君嘗為吾長吏甚有遺愛志逸其名託錢武肅乾山濟安廟碑以傳邑}
  - {type: page-break, offset: 82, content: '', id: KR4d0311_WYG_030-5a, image: WYG1175/WYG1175-0310c.png}
  - {type: 'kr:newline', offset: 85, content: '

