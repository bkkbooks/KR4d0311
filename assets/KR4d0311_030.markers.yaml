  - {type: variant, offset: 8, length: 2, content: 䇿問, WYG: 宋洪咨䕫撰記東山婆娑巖壑記婆娑巖壑者何郷先生吏部俞公讀書處也天目下趨於臨安穹為雙徑奥為大滌洞崛竒明邃為九􅋖玲瓏及東西永安其鍾為人物唐光啓中錢武肅始以功名著越百二十餘年有公卓卓相望為名法從山川英靈之氣大抵屯固䝉欝蓄極而後發夫豈易然也哉公家西市離東山里許少屏人事窮年藏修山中學成一舉冠天下後毎觧官還里輙抱書山房繹其業講索益精造詣益深論著益雄故四方秀艾摳請屨滿緇徒可與語亦泊然與為莫逆交軒宇佳處丏一語品題未嘗不笑領也公即世忽二十年僧老死且盡獨主塔且仁應門業静趣明澹寂如止水撫風物之蕭踈愴耆舊之凋落以平生最愛環翠之勝因葺閣下為堂以祠公摘公疇昔所賦名之且悉疏詩文於壁林巚蔽窺花竹深暎與窣堵相近遠儼猶昔也公儻騎雲馭風挾仙人左元放之徒忽去而倐來乎夫出處之義大矣静者常得之艮為山主静而動静不失其時其道光明雖動未嘗不静也公方徜徉空谷燕坐深山月明長嘯而林華墮門風霆閣雲而人莫窺其涘及出而施之詩書仁義之澤滂礴淋漓而春融萬象風節所存殆有駭濤怒颺日夜舂撞所不能摇者身在禁闥乃心清泉白石間盖處亦静出亦静也綸巾一壑目擊道存顧不重耶晉謝太傅高卧東山石室濬谷之趣自謂伯夷何遠悠悠千古此意惟公識之故并圖其像以慰山靈之思云餘杭重建縣治記餘杭苕霅之津會故冬予奉親行霅上諸山扁舟循苕溪而下間登岸從牧翁溪媪語人人誇誦吾令年方壯而識老政出清静民曽不省有官府也因以野服謁訂所聞令肅容於丞舎起訊之故曰縣治舊占溪南後徙於溪北宣和焚於睦㓂}
