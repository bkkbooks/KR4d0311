  - {type: line-break, offset: 684, content: '', id: KR4d0311_SBCK_030-2b08}
  - {type: variant, offset: 692, length: 6, content: 受之恊于極則, WYG: 後能全去就於人易曰}
  - {type: substitution, offset: 694, original: 恊, replacement: 協, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19819}}
  - {type: variant, offset: 700, length: 3, content: 罹于咎, WYG: 以致命遂志朝南以之徽廟草書千文跋臣恭惟我徽宗皇帝聖學天縱粃糠姚姒萬幾餘閑游戲翰墨元氣淋漓不擇地而施梁周興嗣所次千文遂被異世非常之遇及高宗皇帝中興江左志在復古列聖雲章奎畫厚募歸之東序毎得宣和宸藻輙悲不自勝以故左璫慮傷夫上意多抑不進此文其一也龍騰電掣出入造化躪繇轢羲前無千古甲丁䕶持刼燼不壞凢十有六紙悉以交龍篆章分劵其縫臣子述博古識真恭褫而寳襲之一日出以示臣臣聞紹興間今上知懐素千文藏董弅家命朱勝非諭㫖投進使此書得陳乙覽豈復求鶩於野乎感歎之餘謹拜手稽首志其末寳慶初元寒食日臣洪某髙廟千文跋經乾緯坤者典學之全功出聖入神者游藝之餘事臣恭惟髙宗皇帝斷鰲立極息馬論道緝熙光明之學追嫓三五倬彼雲漢敷賁石經龍畫螺書旁分編刻莫不大闗造化細及庻務垂}
