  - {type: line-break, offset: 85, content: '', id: KR4d0311_SBCK_030-1a08}
  - {type: variant, offset: 87, length: 41, content: 以爲帝王萬丗之業而繩樞之子亦得而易視之人有尫羸而壽考物或暴長而夭折理固應爾獨怪春秋, WYG: 漢𨽻丹陽}
  - {type: substitution, offset: 88, original: 爲, replacement: 為, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19875}}
