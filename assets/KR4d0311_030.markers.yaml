  - {type: line-break, offset: 627, content: '', id: KR4d0311_SBCK_030-2b05}
  - {type: variant, offset: 629, length: 0, content: '', WYG: 獨腴對此大嚼奚心哉說詩者以意逆志可也於濳縣丞㕔續題名記吳門葉君芑丞吾濳諸臺交薦其材垂滿過予以題名更端屬之記且曰官無庳崇職無簡煩事無易難惟敬則行居是官而罔其思非敬也居是官而出其思亦非敬也上}
  - {type: page-break, offset: 629, content: '', id: KR4d0311_WYG_030-8a, image: WYG1175/WYG1175-0312a.png}
  - {type: variant, offset: 630, length: 0, content: '', WYG: 侵官以僭下不怠官以曠心止於是靡他其適如農有畔行無越思其斯為執事敬乎芑不佞何足以及此惟是常平義倉之賦受丁口力役之簡稽暨上官所以奔走使令之悉惟}
  - {type: variant, offset: 631, length: 0, content: '', WYG: 土膏脉奮凍觧泉動出入阡陌程督防瀦日與臺笠襏襫相爾汝過此不問也有堂述六靣山}
  - {type: page-break, offset: 631, content: '', id: KR4d0311_WYG_030-8b, image: WYG1175/WYG1175-0312b.png}
  - {type: variant, offset: 632, length: 1, content: 負, SBCK: 􅀒}
  - {type: variant, offset: 632, length: 0, content: '', WYG: 俯沼嘉卉美竹參伍布列暇時玩游鱗之落曳聽幽吭之啁哳㺯柔芳而坐宻䕃以休其心}
  - {type: variant, offset: 633, length: 2, content: 荒穢, WYG: 丞不負丞不敢知也余愛其言知敬於職業因筆而畀}
  - {type: variant, offset: 636, length: 1, content: 累, WYG: 且告來}
  - {type: substitution, offset: 636, original: 累, replacement: 纍, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-20807}}
  - {type: variant, offset: 638, length: 1, content: 乃, WYG: 題跋龍州免運糧夫䟦蜀自開禧佳兵以來調役屢矣龍之民獨共其二平時家出丁壯番上十關五塞以扼氐隴有警則以賦授役霜骭雷腹麕奔魚貫飛輓於關表間顧更厚征之其民重困有懟而無告制置南海崔公都運合陽趙公聞而惻然曰不堪命矣嚴爾戍寛爾轉饟自今其勿與山窮水盡之邦刀耕火種之俗始有生意誠求之也詩曰民亦勞止汔可小康毋縱詭隨以謹罔極敢告諸來者嘉定甲申五月易齋詩藁跋詩無定鵠會心是的仲可謫居二十年自放於詩多警䇿其賦梅有天不能寒獨有梅一涉春風不足竒之句讀至此悵然久之曰其有分寒餓也耶余於此有會其亦有分寒餓也耶因書巻末崔文昌書翰跋為黎監丞伯登作蜀輿鬼分野多鬼術辛巳節闕瑞慶節有日者自益昌過少城竊􅉟菊坡老先生於大慈寺滿散所退而謂某曰帥嶺南古佛西蜀福星也至節前後度劍即辭過崇寧謁德升曰賢大夫旦夕入益昌幕時宣閫猶無恙甚疑之已而至節後果度劍德升尋入幕以縝栗緯恢博以簡静翼方嚴}
  - {type: page-break, offset: 638, content: '', id: KR4d0311_WYG_030-9a, image: WYG1175/WYG1175-0312c.png}
  - {type: page-break, offset: 638, content: '', id: KR4d0311_WYG_030-9b, image: WYG1175/WYG1175-0312d.png}
  - {type: page-break, offset: 638, content: '', id: KR4d0311_WYG_030-10a, image: WYG1175/WYG1175-0313a.png}
  - {type: variant, offset: 640, length: 0, content: '', WYG: 容議論如正志審固之鏃劃然}
  - {type: variant, offset: 641, length: 2, content: 包含, WYG: 破的如躊躇滿志}
  - {type: variant, offset: 644, length: 1, content: 得, WYG: 刅謋然而中窽如鳴和鸞逐水曲之馭安然王良造父之手而六轡如舞也用能起久憊之俗弭紛集之變而遂與同升賔主遇合固有數行乎其間夫以朝廷信臣由一路帥四路若可億揣幕府初開求士於叢英旅雋之中而數已先定人其可萌一毫劵外之想乎因觀菊坡手帖有感敬書其後俞拙菴偈語跋士君子平生學力最可騐於啓手足之頃曳逍遥之杖易華睆之簀盖安之以為常而不以為異也拙菴居士業儒好修以拙自喜拙則静静則平平則澄而明理明志定不為氣所動故能}
  - {type: page-break, offset: 644, content: '', id: KR4d0311_WYG_030-10b, image: WYG1175/WYG1175-0313b.png}
