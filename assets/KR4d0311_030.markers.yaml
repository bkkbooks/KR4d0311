  - {type: variant, offset: 1035, length: 0, content: '', WYG: 與比至重惜名器裁抑茍}
  - {type: variant, offset: 1036, length: 0, content: '', WYG: 亦罷相於紹興初直道之難行雖盛世猶不免可勝歎哉端平丙申正月十一劉忠肅尚書右丞告跋挫士氣者沽激之名壞國是者調停之論忠肅公在元祐初}
  - {type: page-break, offset: 1036, content: '', id: KR4d0311_WYG_030-16b, image: WYG1175/WYG1175-0316b.png}
  - {type: variant, offset: 1037, length: 2, content: 投君, WYG: 呂正獻薦為侍御史進中丞又以正獻薦擢尚書右丞方在臺時彈奏蔡確章亨呂惠卿安燾等靡遺餘力苐知去大姦大佞以扶植更化之盛不暇計它日之禍也使公計他日之禍則必以無所是非可否避沽激之名開調停之論局靣隨手變易奚待閲八年而後為紹聖哉雖然無鮑叔則無管仲無}
  - {type: variant, offset: 1040, length: 0, content: '', WYG: 皮則無子産無正獻則安有忠肅觀此告者當有感丙申春社洪某題於摛文堂劉忠肅冗費官制擬草跋前兩項寳元嘉祐詳定減省冗費似是進故事}
