  - {type: line-break, offset: 32, content: '', id: KR4d0311_SBCK_005-1a05}
  - {type: variant, offset: 36, length: 3, content: 烏犍手, WYG: 偃皥皥乎其不}
  - {type: variant, offset: 40, length: 16, content: 牽蜀口戍兵誰飽飯淮頭編户幾安眠野, WYG: 知實有無形之觀存盖誠存乎中不動而敬不言而信不容以形迹窺也後世省方之禮廢}
  - {type: 'kr:newline', offset: 51, content: '

      ', id: KR4d0311_krp_005-bkkkrnewl5}
  - {type: line-break, offset: 51, content: '', id: KR4d0311_SBCK_005-1a06}
  - {type: variant, offset: 57, length: 10, content: 只願羣賢進輻湊良籌到, WYG: 主深居九重之}
  - {type: page-break, offset: 57, content: '', id: KR4d0311_WYG_005-4a, image: WYG1175/WYG1175-0157a.png}
  - {type: variant, offset: 68, length: 1, content: 前, WYG: 民何由觀教何由設亦惟心存乎群生之休戚庶俗之美惡四方}
  - {type: 'kr:newline', offset: 69, content: '

      ', id: KR4d0311_krp_005-bkkkrnewl6}
  - {type: line-break, offset: 69, content: '', id: KR4d0311_SBCK_005-1a07}
  - {type: variant, offset: 71, length: 2, content: 來鴻, WYG: 皆瞭然於户庭之間而以身為教自正心誠意以至於修身齊家無一不盡自然國治而天下平與身歴目覩所設教何異哉初六童觀小人无咎君子吝象曰初六童觀小人道也臣聞觀以二陽位否剥之間欲化小人為君子故待小人恕欲君子益進其為君子故待君子嚴九五宅中於上光明碩大之德如日月之照臨有目皆覩初氣卑質弱而去五逺乃為童稚之觀童者䝉而未發孩提之童無不知愛其親則有可發之幾彼其陥於小人豈性也哉物欲蔽之也茍如童稚於倥侗顓䝉之初有以發之則昏者可廸塞者可通氣質變化安知小人之不為君子故雖童觀而許其无咎象以小人道為言其質固不可以語上而申言初六亦示其上進之路也為君子而不能以學問開明所見而甘心與懵然無知識者同歸則為吝矣聖人於大觀之初恕於待小人所以示皇極大受之法嚴於待君子所以示春秋責偹之法六二闚觀利女貞象曰闚觀女貞亦可醜也臣聞聖人之道無窮人心之見有限上帝降𠂻若有常性靈明虚徹初無聖愚賢不肖之間而氣有清濁材有利鈍故所見亦隨之而廣狹仁者見之謂之仁知者見之謂之知百姓日用而不知此其所以區而别之也闚觀之不能廣大豈非六二氣質之柔闇與九五陽剛之君大觀在上乃帝光天之下至于海隅蒼生萬邦黎獻共惟帝臣之時初以童稚之見而觀䝉昧}
  - {type: page-break, offset: 71, content: '', id: KR4d0311_WYG_005-4b, image: WYG1175/WYG1175-0157b.png}
  - {type: page-break, offset: 71, content: '', id: KR4d0311_WYG_005-5a, image: WYG1175/WYG1175-0157c.png}
  - {type: page-break, offset: 71, content: '', id: KR4d0311_WYG_005-5b, image: WYG1175/WYG1175-0157d.png}
  - {type: variant, offset: 75, length: 3, content: 書社前, WYG: 識知二以窺覘之見而觀有識知矣又自安於卑陋蹇淺僅足以知聖人之汙是惟女子生長於深閨之中幽間專靜而有守則闚觀猶未至害士君子則害道矣象發明爻辭之所未發謂闚觀為觀雖女子之貞亦有可醜盖鑽穴相闚闚見室家皆為不正之視女子雖貞而所視不正心隨境移恐不能保其貞也然則欲廣闚觀之見則何先中庸曰好學近乎知學愈進則見愈廣聖人之全體大用目擊而道存矣故惟已百之已千之雖愚必明雖柔必強六三觀我生進退象曰觀我生進退未失道也臣聞三上承二陽下接二隂而居其中陽為君子隂為小人進而從陽則為君子之}
  - {type: page-break, offset: 75, content: '', id: KR4d0311_WYG_005-6a, image: WYG1175/WYG1175-0158a.png}
  - {type: variant, offset: 79, length: 1, content: 燕, WYG: 退而從隂則為小人之趋一進一退盖邪正善惡之關也三於此觀我生生者出於吾身者也其大端則言行是已觀吾之言其進而合於君子耶其未至於君子耶觀吾之行其退而陥於小人耶其遂逺於小人耶君子小人之界限其間不能以寸反觀吾身之所發必欲進}
  - {type: page-break, offset: 79, content: '', id: KR4d0311_WYG_005-6b, image: WYG1175/WYG1175-0158b.png}
  - {type: variant, offset: 81, length: 0, content: '', WYG: 上之二陽同其光明而不欲退與下之二隂同其柔闇能如是三雖處不中不正之位亦未至於失道也盖三之質易於失道以能反觀諸身去小}
  - {type: variant, offset: 82, length: 4, content: 俱漲㾗落, WYG: 而從君子故道為未失也然未之一辭猶未深保其不失道盍亦戰戰栗栗於取舍之决為舜而不為跖為堯而不為桀哉此正大學致知工夫之地六四觀國之光利用賔于王象曰觀國之光尚賔也臣聞九五剛中之君在上初與二去九五為逺故止於童觀闚觀三少近則未失道四切近則利用賔觀愈近見愈親也賢者進退有時行藏有道如麒麟鳳凰其出必待休明之世故觀國之光然}
  - {type: page-break, offset: 82, content: '', id: KR4d0311_WYG_005-7a, image: WYG1175/WYG1175-0158c.png}
  - {type: variant, offset: 87, length: 19, content: 杭巫峽風力髙時畧太湖深愧平生嗟靖節一厈, WYG: 賔也國之光明本君德之光明人君能明吾之明德如鑑不受翳水不受滓則本然之明常存篤實之光充實之輝皆由此而發在朝廷則禮樂彰法度著在}
  - {type: page-break, offset: 87, content: '', id: KR4d0311_WYG_005-7b, image: WYG1175/WYG1175-0158d.png}
  - {type: 'kr:newline', offset: 88, content: '

