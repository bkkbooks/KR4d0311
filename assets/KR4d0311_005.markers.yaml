  - {type: line-break, offset: 128, content: '', id: KR4d0311_SBCK_005-1a11}
  - {type: variant, offset: 133, length: 32, content: 翁獨擅眞清磴古蒼苔澁巖空細溜明誰刋新即事盡剔舊題名太息今猶古江山, WYG: 士君子之器表偏而影正無是理也象又以觀民言者君子之道本諸身徴諸庶民觀羣黎百姓徧為爾德則知言行之出於吾身者為善觀怙侈滅義服美於人則知言行之出於吾身者為}
  - {type: substitution, offset: 136, original: 眞, replacement: 真, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:366e8ec95655b72d3205b878dc416602f82ff8a6b5dd240168f5ee5a7c65a61e', entry: vf-3262}}
