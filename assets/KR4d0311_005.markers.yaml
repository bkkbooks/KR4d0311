  - {type: line-break, offset: 107, content: '', id: KR4d0311_SBCK_005-1a09}
  - {type: variant, offset: 108, length: 0, content: '', WYG: 則道德同風俗一其為國之光大矣賢者觀乎此而願立於其朝伊尹起於莘野呂}
  - {type: variant, offset: 109, length: 1, content: 夷, WYG: 歸於東海豈非湯文之時利用賔乎象以尚賔發之盖道義重則勢利輕賢者寧甘心於白駒之谷考槃之澗不肯屈身輕售其出也以時其進也以禮其事君也以道君望其儀型而起敬故崇尚之以賔禮而不敢臣取重者在已重之者在君如此則諫行言聽膏澤下於民矣茍在已無以取重君且望而輕之毋怪乎有言莫之行也九五觀我生君子无咎象曰觀我生觀民也臣謂反觀内省之功儒者所難而况貴為萬乘可喜可欲所以移其心者滿於前乎九五陽剛而中正居巽而應順動無過舉矣然猶於我生必反而觀之凡言行出於}
  - {type: page-break, offset: 109, content: '', id: KR4d0311_WYG_005-8a, image: WYG1175/WYG1175-0159a.png}
  - {type: variant, offset: 111, length: 9, content: 延英入定中興業早震, WYG: 身者為我生觀吾一言之出皆合於君子之道則言無過言一行之出皆合於君子之道則行無過行以此示民可以无咎有一不合於君子則有咎矣吾身未能无咎顧欲使}
  - {type: page-break, offset: 111, content: '', id: KR4d0311_WYG_005-8b, image: WYG1175/WYG1175-0159b.png}
  - {type: variant, offset: 121, length: 11, content: 聲到鬼區岑公洞洞從開闢, WYG: 下皆}
  - {type: variant, offset: 123, length: 1, content: 鬼, SBCK: 􅀑}
  - {type: 'kr:newline', offset: 125, content: '

      ', id: KR4d0311_krp_005-bkkkrnewl9}
