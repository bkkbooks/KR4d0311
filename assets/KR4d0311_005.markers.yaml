  - {type: variant, offset: 4406, length: 3334, content: 時珍重牧兒相指似隔林招手不吾欺飛泉濺雪林華濕盤石生雲古蘚乾早着些詞招隱去㤗山有賊膾人肝稻花秋晚蟹洗手薺菜春𥘉餳膠牙築厎空山誰辦此留君只有石邊茶不提長劒斬江蛟便掲脩竿釣海鰲縱老無成猶自許一溪流水兩山桃不知我者謂何哉布韈青鞋日日催長嘯一聲啼鳥外朶頥有象著山雷平明岀去日斜回小立巖花澗草隈光景留連非我事此心曽點􅃮雕開挽阮開之窮逹皆歸命虧成不掛心醉餘便腹睡棋罷掉頭吟孔雀門䦨舊驪駒院落深可堪重剥啄寂寂杏花隂柳天機日與物華新嫵緑柔黄觸撥人精采只消些子雨腰肢無着許多春興亡螢苑迷樓夢榮辱孤山麯院塵醒眼年來渾看破萬縁分定不湏顰杏萬山築厎作春妍一樹繁紅直幾錢深院日長來燕後平池水暖浴鵝天弦歌禮樂詩書地榜帖功名冨貴天兒輩對花湏自勉莫教空惱少陵顛柳用前韻菀彼烟絲一様新依然面目我陳人只疑大造元無物豈料深山亦有春盡日三眠渾得意隨風萬舞不驚塵長長短短亭前路肯與渠儂管笑顰上巳呈子有隔水梨花豪放盡安排䑕耳到庭槐十分春事杜門過百色老懷中酒來聞麗人行頭輙掉見蘭亭帖眼還開碧衫玉唾酴醿晩更倩詩翁着句催顔延年三月三日率爾成詩前詩重韻太率可笑過盡風波灔澦堆一閑無夢到宫槐迎頭寒食清明近入手櫻桃芍藥來率爾成詩聊意逹快然自足亦顔開期君曲水芳林序花裏傳宣火急催百舌飛上三足烏喚起百舌鳥皷弄林杪春瀾飜屋頭曉氣吞黄栗留勢挾秦吉了向人售嘈雜司物窘煎炒轉頭芳意歇噤喙青隂悄晚食從來此腹負將軍淡飯投韲現報身三月不曽知笋蕨夢魂敢到水晶鱗次韻荼䕷二絶瓔珞垂垂蕚緑華光明淡竚自成家枕幃醖藉風流足甘放朝來𬒳厎衙愛春留得瓊英在添竹扶將翠蔓髙更着金沙相間種主人四壁錦周遭官採木深山風雨幾百秋直干雲漢大蔽牛輪囷離竒中尺度一旦岀應天家搜山摧浪壓斧斤下横亘十畒眠蒼虬白頭地主坐歎息物囿於數吾何尤爲言此殆有天幸如拔莘渭歸商周棟梁未央坐萬乗柱石明堂朝諸侯老翁聞語囅然起致祝切莫去作昭陽梳洗樓楊花舊雨人無半迹來惺惺獨坐眼慵開却嫌飛絮猶多事點破門前一徑苔春禽雜言倉庚倉庚集谷之苕謂汝也幽而豈其喬勃鳩勃鳩有安斯巢矜婦之功不念鵲勞决决杜䳌念歸何悲豈知汝歸不如未歸翩翩元鳥羣雛相依羽毛浹矣同乳異飛負隂抱陽均此一氣孰使然哉凄其永愾次徐雲叟賦桃源無脚橋經始西風八月秋桃花春漲巳無憂横飛閣道虚空度直放銀河自在流倚岸斜看疑是洞循坡穩上認爲樓遍行呉蜀今纔識却笑浮橋謾造舟次韻映山紅燧人鑚榆岀新烟烟光濕雨山蒼然黄鸝怯寒噤未語有喙三尺惟啼䳌血流染花不知數赤霞爛熳横丹天前山後山列錦障上澗下澗敷金蓮海棠無香許流亞石榴有豔疑姻連目光逺送空翠表勝處正在繁芳邊七香寳車果安在東風老去空華顛送監丞家同年守簡池三十韻去年爲君來明廷峙鸞鵠今年爲親歸蠶市苦思蜀扶輿岀脩門萬里宛在目大江六月寒風飽㠶數幅金山如幽人杜蘅繚荷屋采石如壯士鐵騎明鋈續五老烟光開九華雲氣矗如王公大人冠冕而佩玉大孤狷介甚赤壁清曠足黄鶴俠者流雋放不容束英雄古荆州霜月耿喬木寂寞三閭亭風露落秋菊陽臺峰十二森拱峽江曲髙標聳赤松絶槩凛孤竹或如漢汲黯抗直敢掁觸又如唐眞卿峻絜不受辱瞿唐灔澦堆一柱軋坤軸潰城雎陽孤鉤黨林宗獨水石明邊酌蘋蓼佳處宿寛作幾月程迎面峨眉緑丗道淡有味人生平爲福江山無愧容草木有餘馥試劒信雄拔易簡更清沃虎蛇方横道有此廉平牧相如駟馬貴長孺一翁秃明河隔黄姑碧落杳飛鶩獨復即無妄多識廼大畜歳晏以爲期仁亦在乎熟木末老芙蓉䦨干深首蓿郵籖莫厭婁瑟僴尉淇奥浮玉道士琴老蟾亭午潭澄隂雄虬怒吼雌虬吟空巖納息耳應心冩之以神寓之音大音激越風振林細音窈眇雲起岑天機不動天和深非虧非成非古今博山一點蓬萊沉山中吟幽居多暇櫽括黄庭内篇賦山中吟俾善琴者倚操而歌之蘂珠閑居兮作七言琴心三疊兮舞胎僊呼吸日月下上雲烟兮囬紫抱黄入丹田一面宗泥丸六府主丹元七蕤應兩扉九微徹三關明堂閟虎章玄闕森龍幡素衣翠重裏朱帶緑華裙上有黄裳子丹兮常在兩眉端欲求泥丸滿直湏丹元存靈臺貯清明太極涵肧腪升坎降離凝正一而融三五兮付之靈堅童子玉池太和官重樓十二環兮蘭玕朱鳥白石源兮潺湲專閉御景而握固兮嗽咽金液漑靈根胎津溢而琅英飽兮積精累氣而成眞髙研恬淡兮道之園物物不干兮㤗而平身披鳯衣銜虎符兮控駕三素躡飛霞而升廣寒東西兩目兮倚天木隂隂兮泉㳙㳙一唱三歎兮玄鶴下其蹁躚八景二十四眞兮吾亦不知其然而然損戒二首河魨行水厎志在全其生縋綆激使怒拍浮拾彭亨觸來不自制天君失和平懲忿當如山一静弭百争野虞雉爲媒榖榖雌召雄隂機發翳緑碎迸錦纈紅耳目誘於物顛倒不有躬窒慾當如澤涵渟清鏡空引鏡水白深還黒山黄逺自青紛然無定色何者是眞形不壞只太極長存惟六經莫疑晨鏡裏黳􅃮換星星苦笋臨軒解褐賜湯沐一節兩節水蒼玉氣嚴慣嘗志士膽格髙厭食太官肉此君可人如西湖荷邊冰簟三更鋪心知爽快不冝過柰此風月人間無丁謂鶴相專朝巧萬般中書位子太山安沂公冷眼旁邊看機㑹來時隻脚飜欽若獎丁丁䧟若謂之厚演演擠丁勢交利合皆如此說與金陵老子聽食糟行龍州石秫七斗醪百錢半升官價髙村民無分酒到吻清晨荷薪争博糟得糟還家喜欲舞逺汲淡煮燃松毛餈麥餅澁難下藉此嚥送如葷臊我時作守輙自愧每飯釡有羮堪轑罷官兩夏肉入務食糟却如住百牢紛綸玉縷芼葱㳿晃漾珠滴霑麻膏多從未破甑頭餾間入半折鐺中爊王瓜未甲蒿苣老芬美獨擅盤飱豪饞奴停匕朶予餕一餔七八譏何饕太平無事稱意飽竹床大鼾枕離騷客來闖户口尚臭錯疑𬒳酒醺陶陶我亦爲言恰夢金絲帳厎斟羊羔五月庚申夢人相指爲馬周且誦詩兩句覺而足之伸縮一雙手去來三丗身新豐驚昨夢斗酒滿懷春苦笋用前韻林谷迎梅新雨沐和綳熟煮琅玕玉籜龍别種冨風味㯶魚同科少肌肉吾廬兩山介宣湖緑隂門徑楊花鋪攻苦食淡父子俱笑看兩孫指之無老人曽和天象白氣一抹蚩尤旗南斗北斗天兩垂西方熒惑耀芒角𥘉月吐魄來食之去年天象巳可駭今年天象更可疑春王正月曁三月黒氣幾度摩晨曦銅盤亭亭慘且淡鐵鈸拍拍合復離沙盆貯水静照影眼亂兩日讙童兒移時妖氛漸引郤赤光如血鋪庭墀家無占書矒休咎但効婺矛牙婦顰雙眉昨朝忽見邸狀報詔荅丞相辭公師首言金烏効祥瑞變我愁蹙成愉怡玉堂學士天下選王治有象非吾欺東淮西蜀狗䑕賊看折尺箠從頭笞用虞提刑剛簡見寄詩韻荅之有美人兮古錦官落花芳草幾慿欄紛紛丗故肱三折忽忽年華指一彈詩到考槃湏熟講易於未濟莫輕看門前尺雪清燈夜尚欲從公扣兩端雞鳴而起一般時舜跖殊途覺與迷此理天無分厚薄乃心人自眩東西柴門風雨榴花老草巷烟霏燕子低玉汝有書來萬里聖賢不㤗不栖栖次韻夏日乍晴雲更黒頓冷日如青飽飯眞成蠧幽居又見螢燈光翻露柱琴疊舞黄庭猛作逃儒去沉酣幾箇醒瀑布白龍飛岀翠雲堆不見源頭只見來勢有盛衰惟視雨聲無髙下盡成雷誰教河皷翻將落我欲陽侯挽取回東陌西阡分港去豐年入眼稻花開狐䑕狐䑕擅一窟虎蛇行九逵不論天有眼但管地無皮吏鶩肥如瓠民魚爛欲糜交征誰敢問空想素絲詩次韻髙蓼隰葒照眼似舡䆫只欠沙頭野鴨雙花引穟垂丹作佩葉扶節起翠爲幢婦収滋味歸羮鼎兒挹馨香赴酒缸老我爲渠牽午夢白蘋風冷釣煙江示諸兒徂徠古君子涇渭何太明一姦衆稷契詩作竒禍萌姦人擠之死旣死氣未平銳欲剖其棺謂北走猶生妻子坐凍餒不斷啼號聲冨韓各分俸買田活其嬰吾䟽視彼詩歴數羣公卿觸怒非一竦舉朝眼瞠瞠所頼天子聖不死五鼎烹斥歸天目下石田力躬耕田少食指多讀書飢鳶鳴此身不足憂憂我身後惸冨韓不常有勉哉自玉成忍貧知好脩道在困亦亨續夢造化有眞機寒暑不停軸秋風促絡緯春雨鳴播榖一氣臂屈伸萬事手翻覆得牛或貽災失馬詎非福七侯梁冀誅三妹國忠族鼎貴正酣豢旁窺巳魚肉自古聖賢徒不耻貧賤辱忠信以爲寳豈弟而干禄但信命行藏不計得遲速㤗極必有否剥爛乃爲復一理無間斷九卦要精熟夢起獨忘言䆫前數叢菊浄𣑽僧頥蒙堂山下有雷頥山下出泉蒙主静山之體養正静之功閑閑六䆫明寂寂萬籟空坐觀鼻端白巖花自春風讀漢書漢衰元帝爲優游成帝荒淫更可憂論說金華風過耳山河大柄醉中休六月二十八日入朱陀山寺决决巖下泉翛翛竹間路破寂孤蜩吟送瞑踈鍾度箇裏欲求心應生無所住促織一點光分草際螢繰車未了緯車鳴催科知要先期辦風露飢腸織到明水碧衫裙透骨鮮飄揺機杼夜凉邊隔林恐有人聞得報縣來拘土産錢荅子有髙吟梁甫卧隆中眼厎駑駘不足空清白自將千古月温凉不定六時風交梨火棗根苗長翠竹黄花信息通樓外秋鶯強饒舌笑人遲却黒頭公用韻荅游司直佀見寄道在皇王帝霸間古今同是一人寰不愁垂白三千丈獨喜飛黄十二閑晚桂薦花熏鼎古寒松墮子茗甌斑山中風味無人㑹頼得新詩起老頑龍池沙漲龍徙三湫宅山飛百道洪雲車風馬去福地洞天空蒼莽渾沙積﨑嶇没徑通等閑陵谷變驚倒白頭翁, WYG: ''}
