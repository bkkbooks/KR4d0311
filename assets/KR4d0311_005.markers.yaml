  - {type: indent, offset: 2, content: 　　　　, id: KR4d0311_krp_005-bkkind2}
  - {type: variant, offset: 2, length: 4, content: 次楊瀘南, WYG: 時不忒聖人}
  - {type: variant, offset: 7, length: 5, content: 前區字韻送, WYG: 神道設教而天下服矣臣聞一隂為姤進而為遯為否為觀為剥莫非小人道長觀獨不以隂盛為憂者二陽在上四隂順聽於下是上有陽剛之君儀表一世隂柔雖衆方将化而為君子之歸其為觀甚大也觀合巽坤為卦以九居五順巽而中正也循理而}
  - {type: page-break, offset: 7, content: '', id: KR4d0311_WYG_005-2b, image: WYG1175/WYG1175-0156b.png}
  - {type: 'kr:newline', offset: 13, content: '

      ', id: KR4d0311_krp_005-bkkkrnewl3}
  - {type: line-break, offset: 13, content: '', id: KR4d0311_SBCK_005-1a04}
  - {type: variant, offset: 13, length: 2, content: 水穩, WYG: 無所拂逆可以懐天下未足以觀天下觀天下必中且正大明當天萬物咸仰一有偏倚必有照臨不及之地此聖人所以為天立極也然必本之以誠誠者物之終始不誠無物此心之誠不存則順巽中正俱失其有猶盥而不薦以誠為主黍稷不如明德之馨殺牛不如禴祭之福在誠不在物也此誠所格斯民莫不相孚以心顒然尊仰隨所觀而化其觀果何所見哉誠則形也其化果孰使之然哉唯天下至誠為能化也求諸天道春夏秋冬運行而不息皆神之所為聖人以是道設教天下不期服而自服又豈非誠則神乎觀之聖人一誠貫通三才之間始與人為一終與天為一極而歸於無聲無臭之妙非黄帝堯舜之神化宜民文王之純亦不已不足以當之象曰}
  - {type: page-break, offset: 13, content: '', id: KR4d0311_WYG_005-3a, image: WYG1175/WYG1175-0156c.png}
  - {type: variant, offset: 16, length: 4, content: 凉快長年, WYG: 行地上觀先王以省方觀民設教臣聞自上示下為觀天下之物凡可以示人者皆有形之觀惟風行乎地上草木均被披拂則無形之觀有形之觀其觀淺無形之觀其觀深故先王取象於風之行地省方觀民而設教五方之俗各有不同隨方省察因民俗而教之以救其偏扶其正使同}
  - {type: page-break, offset: 16, content: '', id: KR4d0311_WYG_005-3b, image: WYG1175/WYG1175-0156d.png}
  - {type: variant, offset: 21, length: 14, content: 㠶東指白雲邊落花𣢾叚兒能御薦, WYG: 道德之中舜之同律度量衡成王之考制度雖若涉於有形之觀教行而民從猶風行而}
  - {type: substitution, offset: 21, original: 㠶, replacement: 帆, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:366e8ec95655b72d3205b878dc416602f82ff8a6b5dd240168f5ee5a7c65a61e', entry: vf-0178}}
  - {type: variant, offset: 29, length: 1, content: 𣢾, SBCK: 􅅃}
  - {type: substitution, offset: 30, original: 叚, replacement: 假, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:366e8ec95655b72d3205b878dc416602f82ff8a6b5dd240168f5ee5a7c65a61e', entry: vf-1105}}
  - {type: 'kr:newline', offset: 32, content: '

