  - {type: variant, offset: 2094, length: 1129, content: 社日乆要來新燕簷花泫曉霏治聾憨舅醉廢讀惰孫歸鶻突輸􅑿局醒鬆脫着衣一簾春寂寂誰解識吾機春事莫爲春愁兩鬢翁管愁元不屬春風深黄楊柳夕陽外淡白杏花明月中大自在身天地並妙光明性聖愚同鳴鳩乳燕相料理融得從前萬慮空寒暄不齊二絶社後歸來燕兩三門前細柳緑摻摻乞將蝴蝶蜻蜓扇與試鵝黄水碧衫次第新烟欲試茶錚錚飛霰響簷牙惜春苦欲春長在且得輕寒約住花敬次老人即事韶華九十恰平分過化中存一點神草脫燒㾗非故色梅收花事又新人正襟危坐三靈㑹擁鼻長謡萬象賔酬荅風光惟辦此可能春夢到天津清明二絶梨花匼匝不見葉柳穟玲瓏𥘉欲綿寒食清明等閑過日長飜覆壓書眠風將好夢到蘭亭驚覺虚簷九子鈴老眼醒來無着處倚樓檢校樹頭青次韻西塢道庵芳蹊幾曲重行行塢裏曽隂塢外晴秧馬鬅鬙和雨種蘀龍菌蠢帶煙烹黒風動地前程暗白日行天内景明却愛道民無別解一杯春茗雪花輕雪歎二絶唐時三月十八雪况復今年多一旬萬紫千紅渾過盡荼䕷滿架與争春桑頴騷騷麥又萎雪花如椀雨如絲老天只解苦黔首快活貴人那得知桂子次韻贈阮甥一樹青青桂子榮廣寒宫殿玉爲楹不知天上何年墮故使人間有種生風影碎揺籖帙爽露華倒洗筆頭清寸田更與加培埴收取天香染姓名次韻雙桂物理無枯厎有榮一雙玉樹倚脩楹長如拱璧天球在元共交梨火棗生卜築地連盤谷勝賦歸人占小山清晝隂最喜添新緑時有佳禽自薦名閑居暑設青綀幕晴更皂葛巾家貧猶氣象人老亦精神蜂閙花生計蛾翾繭化身静中觀物變同是一天眞鍾惠叔轉示趙臨安兩山堂諸公詩刻隨喜二首兩峯髙峙玉五畒秀含滋細柳未眠種脩篁方醉移雨將雲岀谷水引月歸池動静天機宻何人共一巵朶頥常逐逐觀復自休休静晝青竹笋深春黄栗留覺圎熏穟直夢破茗華浮爲問連山易床頭好在不燕巢華堂横架晴虹壯來鳯結巢長一丈中間贔屭譙樓勢兩旁坡陀翼城様相攸爾居莫此樂得意鳴聲相下上同時啐啄三四雛盡日往來千百餉欲飛未飛翅羞澁似定不定跋揺漾施施引趂女墻行戢戢教升危堞望黄金鑄印分裏有何用芹泥呈瑞象事見類說主人長健燕長歸但願春風不相放浮溪周居士挽詩野水崗頭屋春風竹裏厨所安仁者静其樂道之腴遺逸盍徴詔耆英空畫圗詩書根氣逺叢桂蔚相扶次韻子有賦著圗書所冨兒種巵敵封君貧翁結柳呼奴星物理虧盈蛇䕫蚿惟有讀書可以逃天刑守玄老死天禄閣巧宦三入承明庭人生得失雉梟盧惟有知道可以垂芳馨嗟予鈍甚爐厎鑛陶冩淬濯誰爲硎買書充屋手點勘𣏌菊門巷槐花零九流七略宗六經大川小澮趍東溟騷人墨客幾汗青秦姬趙女争娉婷聖賢氣脉眇如綫義理門户元無扄圎冠方屨弗見道金貂玉櫑空圗形君年正壯眼如􅃮一過萬字披不停借書一瓻走赤脚燈前急雨鳴髙瓴扶輿磅礴天兩目渟蓄雲氣藏風霆鈎深造極猛着力㑹挿八翼摶青冥九日老無擘畫笑柴桑兩眼惺惺菊自黄渠更笑人無菊把拒霜相對過重陽荅子有褁飯無人過子桑拒霜一徑雨昏黄花根記縳西湖纜紅淺紅深醉夕陽夫容向背有深態纎穠無定姿最憐花脫後全似蕊包時荆公, WYG: ''}
