  - {type: variant, offset: 1433, length: 572, content: 斯今有酒可别不敢斟天乎天乎知客心天乎天乎知客心和續古蜜术參桂齊名骨自香百花釀醑助甘凉含金咀玉風標别消得肩吾爲發揚贈小兒醫忍飢覔句孟東野守寂草玄楊子雲囊有遺書無與讀兩家恨不早逢君和續古謝送墨黒月黳雲脫太清海風吹上筆頭輕瑣䆫冷透芙蕖碧定有新銘到九成題鍾春伯所示周昉明皇對弈圗寳欄十二午隂移思入雲霄落子遲當局早知提醒着危機應不墮蛾眉乙酉六月十九日應詔言事九月一日去國一首黒風吹雨岀長安破帽騷騷怯暮寒不得之乎成一事却因而已失三官人心天理推詳易丗路交情點檢難白髮老人經事慣教兒只作博投看丙戍天基節自至道宫趍寳福院寒甚朝謁千秋節攀援萬歳藤山明松戴雪澗澁石懷冰清壯髯還㦸酸癯面亦稜暖寒能破戒珍重虎溪僧大人用韻再一首静裏栽梨棗閑邊話葛藤縁塵還我雪丗態任渠冰宿卉芽渾脫新禽語摸稜年華催鑷白自笑秃於僧乙酉歳暮有感三絶罷參歸趂日髙眠隨意繙書不計編歳事從教催白髪春風元只在丹田精神收召入腔來水色山光面目開可惜行􅌪新失伴雪晴未忍說㝷梅樽酒團欒里社情眼中忽不見公榮祗應天體如雞子地下人間共月明時疇甫𥘉逝敬和大人新年韻井渫得泉終必食睽弧遇雨更奚疑毋庸伊尹要三聘且學顔淵克四非勢去鐵鞋無處覔志亨金印有時纍梅花結子桃花發爛熳春風醉典衣梅寒瓶虚挿一枝斜留待春風放霽華巳信不冰方着水可憐欲槁更開花繁芳玉立夾胡床勾引春韶午夢長有眼盡迷空裏色無心方識定中香又竹屋茅簷一樹斜冰霜意氣蓋韶華, WYG: ''}
