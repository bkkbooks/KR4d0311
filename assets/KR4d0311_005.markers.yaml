  - {type: variant, offset: 199, length: 74, content: 過雨斷雲閑絶壁凉風歸鳥急平林江山難着醒時眼有酒如澠放手斟東屯犖确嶔岑轉百盤峽天深處得平寛秋風䇿䇿􅐘花老暮雨蕭蕭稻子寒仁者樂山心本静碩人在澗體俱胖農家, WYG: 則念慮之邪正}
