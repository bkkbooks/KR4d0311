  - {type: line-break, offset: 166, content: '', id: KR4d0311_SBCK_005-1b02}
  - {type: variant, offset: 166, length: 32, content: 丗情開濟堂魚復平沙漲夕隂紅旗影底老蛟吟窮今亘古三分恨托地撑天一寸, WYG: 善是觀我生者必當觀之民也因觀民之所化而觀吾身則言行是非不能掩因觀我之所生而觀吾}
