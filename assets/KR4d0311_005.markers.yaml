  - {type: line-break, offset: 88, content: '', id: KR4d0311_SBCK_005-1a08}
  - {type: substitution, offset: 94, original: 畧, replacement: 略, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:366e8ec95655b72d3205b878dc416602f82ff8a6b5dd240168f5ee5a7c65a61e', entry: vf-1080}}
  - {type: 'kr:newline', offset: 107, content: '

