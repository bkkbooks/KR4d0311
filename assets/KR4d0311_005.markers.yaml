  - {type: variant, offset: 3537, length: 628, content: 搔首送斜暉次韻可庵梅點雪非耶果是耶紫千紅萬未曽芽蒼苔有暈龍鍾樹幽谷無人自在花地暖孤鴻來索伴天空雙鷺下通家詩翁快整春風脚山路霜泥踏馬牙卭杖次韻槎使携歸餉老人髙稜踈節屈中伸撥開豺虎慿陵氣攝取蛟龍變化身訪洗頭盆還喜健伴行脚笠未嫌貧一般仙骨清如鶴倚看滄溟解起塵疇甫叔挽詩二首南渡幾年裏深山誰力書獨君酣百戰許我丐三餘參斗明燈燼湖江渇硯蜍斯人猶不第天理竟何如撰屨西山路㝷春得重陪那知分手去不作轉頭來寂寂雙溪雪依依半樹梅經行陳迹在横涕濕蒼苔夢中和人梅詩山礬韻溪路槎牙木葉乾角聲吹動五更寒踈踈梅蘂踈踈雪一叚生綃不用礬又用韻竹外横梢半欲乾透香肌骨不勝寒定知天上梅花腦不比人間柳絮礬聞山陽夏全之變洮湟私牘舊開邊淮楚依然様子傳抱虎寢蛟心不保護疽諱蠱禍相挻河流三舎盡人血城闔四門無竈烟昨夜洗兵盈尺雪華夷齊賀太平年丁亥歳朝把筆雞喚璇杓一夜東長天紺碧静無風年華老子懽娱裏春事兒曹翰墨中脫雪薺芽盤飣緑晞陽椒蕾酒行紅赭𫀆親上慈明冊正想千官㑹漢宫三日兄弟侍老人展墓歸和尊韻雲淡風柔霽色輕瀧岡阡上氣和明莫思舊日遨頭岀且試新年便面行飽飯即爲君子㤗濁醪不失聖人清一翁二季春無盡更願諸孫向老成次韻梅影白玉堂前絶丗容水晶簾薄透重重非僊非鬼樹明滅似夢似眞花淡濃韈照晴波添縹緲佩揺寒月欠𤤮瓏一畨青子成隂後却笑癡兒認舊蹤春雪甲子乾飛雨元宵濕隕星風柔行陣陣月淡下亭亭木筆侵凌碧來牟掩映青東皇収拾急暖漲赴滄溟招隱三章贈李洋自號同𥘉子雲氣歛兮天目之顛濤江綫横兮海門濺濺扶桑子半兮陽烏翩可俯而掬兮嚥以天井無聲之泉子, WYG: ''}
