  - {type: variant, offset: 7, length: 1, content: 詩, WYG: 宋洪咨䕫撰講義觀盥而不薦有孚顒若臣聞臨觀反對卦也臨二陽在下觀二陽在上觀如兩觀之觀儀型揭而群瞻聳也觀之聖人正心修身以觀天下一誠之外無他尚猶宗廟之祭交於神明一誠之外無他物盥即奉槃沃盥巾以帨手時也祭先盥手然後酌鬯而祼祼用鬰鬯猶未免託物以求神盥則蠲潔内外與神黙接洋洋乎如在其上如在其左右不假物而誠已通又何俟腥熟之薦而後逹其誠哉為人上者能至誠主一無假乎外如盥而不薦斯民不期孚而自孚矣孚者信也誠之實有諸已者也人受天地之中以生誰無是誠君以誠感民以誠應顒然興起不約而同與聖人作而萬物覩均此機也是知人君之化天下不難於孚諸人而難於孚諸已彖曰大觀在上順而巽中正以觀天下觀盥而不薦有孚顒若下觀而化也觀天之神道而}
  - {type: page-break, offset: 7, content: '', id: KR4d0311_WYG_005-1b, image: WYG1175/WYG1175-0155d.png}
  - {type: page-break, offset: 7, content: '', id: KR4d0311_WYG_005-2a, image: WYG1175/WYG1175-0156a.png}
