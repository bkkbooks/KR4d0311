  - {type: variant, offset: 8, length: 5, content: 箴緝熈箴并, WYG: 宋洪咨䕫撰策問饒州堂試十問大江以東衣冠之盛饒為最螺州地䜟異人出焉冠大廷世殊科班班可數皆學校作成之功也漢之番君唐之顔魯公德澤在人至深而獨不聞垂意興學何邪晋虞公為内史大修庠}
