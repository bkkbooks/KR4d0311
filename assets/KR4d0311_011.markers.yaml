  - {type: variant, offset: 5040, length: 13, content: 酒正注􅙤音糟又子由反固不爲, WYG: 本}
  - {type: substitution, offset: 5052, original: 爲, replacement: 為, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19875}}
  - {type: variant, offset: 5054, length: 731, content: 據然周漢官名有酒正宫正軍正宗正皆爲正不爲貞若月令大酋是秦官正避政爲貞則秦紀注正月爲征不爲貞漢隷之遶或從三點兼遒字下畫稍長非􅙤明甚隷法用筆上出下鈎故與從艸類其實名遒字貞立也遒與貞立義頗相關以􅙤貞爲酒正鑿矣塼徑一尺五寸廣五寸半髙二寸叔源以二見餉因考之勸農文龍陽萬山環合控引氐隴去朝廷無慮七千里聖天子仁不異逺俾太守自東南來牧是邦太守山中人也熟知爾父老安於山爲可樂然地勢峭隘土脉磽瘠非刀莫耕非火莫種細民終歳勤動不得一飽至煉以續朝夕亦良苦矣故不患爾農之不力而患乎爾農之蠧夏熟秋成公租私債未暇問長于耆保者取之胥于邑里者取之雄于閭黨者取之隷于坊場河渡者取之召集有定期裒歛有定數怒攘笑攫不厭不止其獲登于爾瓦釡土鉶有幾此農所以重苦也太守以牧養細民爲職爾無患所以蠧爾者而益力于農冬至元正晴和臈未盡一日得雪立春開霽其占爲豐年于耜舉趾母後爾時深耕易耨母愛爾力母徇小利逐末母肆小忿啓争以荒爾業天時旣順人事又力冝爾百榖穰穰有秋雞豚燕社歡浹隣里仰事俯育優游卒歳又家推其秀子弟使力于學孝悌修明風俗淳古太守與爾父老同此樂也可不勉諸大人里居上梁文天目山前兩乳拱帝王都玉川城裏數間占神仙府規摹仍舊氣象増新谷隱老人萬事任縁一生守分焚香讀易老去之意已消把酒賦詩醉來之興不淺雖烟雲自足於别墅而風雨不堪於敝廬乆懷問舎之心忽有肯堂之請拔貧作冨搜材𣏌梓之林培下就髙拓址蘭荃之圃門前流水屋上青山可容髙車駟馬之歸可受玉帶金魚之謁脩梁肇舉好語讙傳東家近祥雲杳靄紅千古溪山鍾秀氣一庭梧竹貯春風南水轉山回護蔚藍客有可人來剥啄掃花藉草共春酣西夭矯晴虹臥碧溪脚力好山俱不盡朝來佳氣與雲齊北飛簷正與琁杓直槐邊消息我先知橘裏風光誰解識上積善有根天所相黄庭誦徧晝隂閑十二行􅩲春盎盎下老來倦學樊遲稼大兒鉏耨小兒耘萬頃心田収𥝧稏伏願上梁, WYG: ''}
