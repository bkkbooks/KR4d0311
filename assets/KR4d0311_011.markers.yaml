  - {type: variant, offset: 3879, length: 2, content: 奉詔, WYG: 熟圖也諸君志於有用其為鋪張聖賢相逢之盛事十六問與其有聚歛之臣寧有盜臣以其為國植怨於民也盜竊寳玉大弓春秋誅之胡獨聚歛之臣}
  - {type: variant, offset: 3882, length: 1, content: 謹, WYG: 及賍吏犯法法在姦吏舞法法亡盖無法則無以為國也伐檀之貪鄙而無功詩人刺之胡不聞有刺在位之姦}
  - {type: page-break, offset: 3882, content: '', id: KR4d0311_WYG_011-8b, image: WYG1175/WYG1175-0197b.png}
  - {type: variant, offset: 3884, length: 0, content: '', WYG: 茍變賦於民而食人二鷄子至疑其傷亷然禮順人情乃或置米肉之遺於不問何邪劉寵之為守受一大錢而去人}
  - {type: variant, offset: 3885, length: 1, content: 坐, WYG: 稱其賢然法有明禁受所監臨一孔以上皆贜論何耶得非禮法不相為用與頃者貪相債帥之得志上下成風恬不為怪聖化更新首嚴簠簋不飭之禁革貪為亷宜翕然丕變論者猶謂賞罰不信不足以懲汚染之習而善類名家科甲之士不當遷就為之諱是欲一以文法懲之也禮義亷恥以維持士大夫之風俗法禁之外亦有可行者乎若曰人心趋利如水就下禮不足以防其無厭之欲法不足以制其自營之私又將何術而可史家皆傳酷吏獨無傳賍吏者欲裒為一書暴諸國史一字之貶若撻諸市不識可使革心易行精白以承休否十七問宰相論可否於廟堂之上以行其道諌官争是非於殿陛之間以行其言經綸治功彌縫君德盖非他官比也冢宰制國用必於歲杪然周官太宰歲終受群吏之㑹其不㑹者惟酒與膳服耳夫惟辟玉食膳服之不㑹宜也酒誥一篇歴歴無彞酒之戒酒而可}
  - {type: page-break, offset: 3885, content: '', id: KR4d0311_WYG_011-9a, image: WYG1175/WYG1175-0197c.png}
  - {type: page-break, offset: 3885, content: '', id: KR4d0311_WYG_011-9b, image: WYG1175/WYG1175-0197d.png}
  - {type: variant, offset: 3888, length: 2, content: 敬丞, WYG: 㑹乎彼庖人膳夫之不㑹王及后世子皆然而酒正之不㑹惟王及后而世子不與得非養正於䝉不容以是亂德耶歲終天子齋戒受群臣之諫然周官司諌不過紏萬民之德而掌諫王惡者惟保氏一官進言之路何示人不廣藉曰左右前後皆可繩愆而受諌獨于歲終事有可諫必待卒歲而後言則為立仗馬者多矣彼孟春徇鐸工執藝事以諫此受以歲終彼諌以歲始抑又何故後世宰}
  - {type: page-break, offset: 3888, content: '', id: KR4d0311_WYG_011-10a, image: WYG1175/WYG1175-0198a.png}
