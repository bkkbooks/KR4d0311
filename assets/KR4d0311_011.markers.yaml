  - {type: line-break, offset: 6, content: '', id: KR4d0311_SBCK_011-1a04}
  - {type: variant, offset: 6, length: 0, content: '', WYG: 是前此嘗有學矣誰實基之移告屬縣廣招生徒至七百餘人教養之盛若此今所養僅能三之一而虀鹽之態常患不足不知當時雲㑹輻輳何以為養先正范文正公相攸於東湖上繼者始築儒宮以據水光山色之㑹公之詩文胡不及之買田三頃以贍士大書特書詫以為盛然所入其能幾何今膏腴歲増數凡幾倍而倉廪之積不見有餘抑尾閭之泄無以窒其源耶髙堂顯敞不改舊觀硯湖平逺尤覺増明二公所以淑艾後人者雖百世聞風而亦起諸君藏修其間講明正心誠意之學􅆂飬致君澤民之業以求無負於教育之素盍各為我言爾志十一問世}
  - {type: page-break, offset: 6, content: '', id: KR4d0311_WYG_011-1b, image: WYG1175/WYG1175-0193d.png}
  - {type: page-break, offset: 6, content: '', id: KR4d0311_WYG_011-2a, image: WYG1175/WYG1175-0194a.png}
  - {type: indent, offset: 7, content: 　, id: KR4d0311_krp_011-bkkind3}
  - {type: variant, offset: 7, length: 2, content: 月正, WYG: 之喬木舊德之}
  - {type: variant, offset: 10, length: 1, content: 日, WYG: 龜有國者所甚重而出處進退天下莫不望以為標的尚論古人顧不能無疑焉復亳卜洛之餘告歸之志則同胡為乃有欲去而復留者不惟自留且作書以留同列同列亦為久留而不去何勇退之難耶海濵二老同為善飬而來歸扣馬之諌鷹揚之舉果孰為義天下既定表東海者乃不與師保左右之任何耶從心不踰矩之年尚}
  - {type: page-break, offset: 10, content: '', id: KR4d0311_WYG_011-2b, image: WYG1175/WYG1175-0194b.png}
  - {type: indent, offset: 11, content: 　, id: KR4d0311_krp_011-bkkind4}
  - {type: variant, offset: 12, length: 22, content: 帝陛下御大慶殿受朝朝退中出奎畫詔増𥙷講讀官夫, WYG: 皇於歴聘否以}
