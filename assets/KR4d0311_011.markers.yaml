  - {type: variant, offset: 1673, length: 1700, content: 逐外忘内天理人慾彼進此退有醴其醲勢利之酣有飴其美聲色之甘飽心生疾快意起競能寡其欲自還所性盎乎春融寥乎秋清靚乎深淵汨乎大羮脫機削械未散之樸郤紛屏華可乆之約朋來斯孚匪宻匪踈事至斯應匪亟匪徐左圗右書前槐後竹明月在池白雲滿谷琴入希微詩造和平神怡體舒赫胥大庭以此事先以此燕後鄙聞而寛薄見而厚噫委命則恬任理則眞收歛則敬警省則仁方寸寜極萬象化醇味此無味名其實賔龔時俌庸齋銘顥穹生民秉彛好德本體明清實用平直耳目口鼻此性形色仁義禮智此心知識父止父道子共子職郷黨恂恂閨門翼翼是爲天常亦曰帝則無哲無愚無今無昔雞鳴而起向晦而息夏葛冬裘渇飲飢食順而循之如水就濕背而反之如木倒植夙夜匪懈如穎斯栗旦晝或汨如皦斯蝕秩叙諏謨信謹稽易學爲入門敬是居域無事而擾凢夫擿埴與時而中君子安宅體認要精踐守貴力行著習察有舜無跖經名而廬慈湖名其母夫人墓廬曰天經庸名而室允蹈斯義勿問元吉鶴巖銘東天目支峯曰雲鶴巖雲冒其顛輙雨鶴未嘗見也壬戌春群鶴見某叨奉常第己卯秋再見子有翁冠郷選夫豈偶然哉翁所居與巖直因以鶴巖自命昻昻中林奮爲時瑞巖瑞翁耶翁瑞巖耶銘曰天作髙山東西兩目虬潜西淵鶴盤東谷枕西之沱宅東之阿與虬委蛇與鶴婆娑鶴禀乎陽維君子性清哉伯夷浩然鄒孟鶴遊乎隂維君子居顔氏陋巷孔明草廬導陽而鳴九霄咫尺脫隂而升萬里瞬息在易後天尻坎頂離葆此純白觀象玩辭賛老人壽容賛徹也禪葆也僊静也淵全也天崔先生壽容賛清獻之清忠定之定杭海健㠶燭天老鏡白李韓柳賛壬午春行劒利萬山中乞漿野人家小憇見壁間唐人像四頗有思致扣所從來主人謂探籌得之遂售于我四君子聲名俱震燿一丗俱以事貶香山昌黎還爲名法從柳州竟爲蕉荔留太白且騎鯨不返矣中苟無媿讎我者豈能終病之少餒焉好我者不能翼而奮也人耶天耶戊子夏五西市暴梅因太息爲之賛忠南夜郎零陵潮陽地何凉凉人何堂堂如星在天垂精耀芒隕而爲石桀立不僵如水行地茫乎望洋激而之山歕薄淋浪不縮不張不軋不揚繄人之鬰斯天之昌理有消息時有通塞禍同福殊剛柔異則柔必有麗剛能自植剛窮斯返柔窮愈窒否終則傾屯終則泣剥終碩果坎終叢棘士寜剛躓母坐柔踣吾以四子占終於易東山渡水布袋賛半進半退是罥是礙且請老師放下布袋蜀繡轉經觀音賛觀丗間音非丗間音非丗間音觀丗間音咦一卷旁行雙點􅃮無人識得老婆心昭君賛彼姝者子丰兮孌兮懷我好音邦之媛兮今夕何夕而恍此見兮雖然賢賢易色可也莫愁賛美目盻兮清揚婉兮悠悠我思室而逺兮還予授子之粲兮雖然好德如好色可也鍾冠之出山佛賛聞何法來爲何事岀放妙光明作大饒益題子馨弟寄容髯星星而氣腴眉垂垂而意舒易足而寡求危坐而深居此吾家之少游㓜輿也聽風雨於對床約雲山之卜廬朝奉親而撰屨夕課兒而讀書吾其歸乎雜文兩漢詔令緫論自典謨訓誥誓命之書不作兩漢之制最爲近古一曰䇿書其文曰維某年月日二曰制書其文曰制詔三公三曰詔書其文曰告某官如故事四曰誡勑其文曰有詔勑某官此其凢也䇿有制䇿詔䇿親䇿勑有詔勑璽勑宻勑書有䇿書璽書手書權書赫蹏書詔有制詔親詔宻詔特詔優詔中詔清詔手筆下詔遺詔令有下令著令挈令及令甲令乙令丙諭有口諭風諭譙諭宥罪有赦訓諸王有誥召天下兵有羽檄要詰有誓約延拜有賛以致有報有賜有問有詰又有手迹手記詔記其曰恩澤詔書寛大詔書一切詔書及哀痛之詔隨事名之此其目也䇿命簡長二尺短者半之以篆書罷免用尺一木兩行以隷書遺單于書牘以尺一寸選舉召拜亦書之尺一板古今篆隷文體曰鶴頭書與偃波書俱詔板所用在漢則謂之尺一簡詔書有眞草又有案案者冩詔之文一扎十行細書以賜方國扎牒也孟康曰漢𥘉有三璽蔡邕獨斷曰天子六璽皆白玉螭虎紐輿地志曰漢封詔璽用武都紫泥故制詔皆璽封尚書令印重封唯赦贖令司徒印露布州郡詔記緑綈方厎用御史中丞印通官文書不著姓司隷詣尚書封胡降檄著姓非故事詔書皂囊施檢報書緑囊宻詔或衣帶間丹書藏之石室策書藏之金匱此其制也漢丗代言未設官王言作命厥意猶古而討論潤色亦間有其人髙后令大謁者張澤報單于嫚書淮南王安善文辭武帝每爲報書及賜常召司馬相如視草光武荅北匈奴藁草司徒掾班彪所上至永寧中陳忠謂尚書出納帝命爲王喉舌諸郎鮮有雅材每爲詔文轉相求訪且辭多鄙固遂薦周興爲尚書郎秦少府吏四人在殿中主發書謂之尚書漢因之武昭以後稍重張安丗以善書給事尚書囊簮筆事武帝數十年後漢始置尚書郎三十六人主作文書起草月賜赤管大筆隃麋墨此其造命之原也詔, WYG: ''}
