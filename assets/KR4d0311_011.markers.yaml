  - {type: variant, offset: 3507, length: 208, content: 則無以使人心丕應惟命之承故夫夜下詔書決之亟也甲寅書報應之疾也母下所賜書幾事宻也封還詔書渙號不容於輕出也更報單于書辭令不嫌於修飾也六月甲子詔書非赦令皆蠲除之雖反汗猶愈於遂非而稔惑也有司母得言赦前事所以示民信也䇿書泰深痛切君子作文爲賢者諱所貴乎體之識也昧死奏故事詔書二十三事所重乎祖宗良法美意之得也璽書封小詔書獨下抑不可不慮其賈疑而召激也案尚書大行無遺詔詔書獨臧嬰家及安得詔書封三子事姦隱於倉卒詐售於危疑尤有國者所當謹察, WYG: 今焉冠豸伏蒲各專一官}
