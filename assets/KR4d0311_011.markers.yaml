  - {type: line-break, offset: 3366, content: '', id: KR4d0311_SBCK_011-10b01}
  - {type: variant, offset: 3377, length: 0, content: '', WYG: 為太傅而封褒德侯漢家校年之法抑又安在書陳舊人之圖任詩歌元老之壮猷年髙德劭閲義理為甚熟出處大節必有非衆人所能識者幸商訂之十二問漢公子之好學莫如楚元王一門之盛元王受詩於浮丘伯諸子皆讀詩至孫辟疆亦好讀詩越數世猶有以少通詩書名者豈非過庭之訓而然與然德修黄老之術得枕中鴻寳秘苑書於淮南其子竟以是}
  - {type: page-break, offset: 3377, content: '', id: KR4d0311_WYG_011-3b, image: WYG1175/WYG1175-0194d.png}
  - {type: variant, offset: 3378, length: 0, content: '', WYG: 吏恐非所以為義方之教也而典校秘書於天禄閣太一青藜為之下照歆復領五經卒父前業可謂能世其官矣然向自主榖梁春秋義歆則欲建左右春秋論難迭出自為矛盾豈父書有不必讀耶抑輪扁斵輪不能授其子耶其究榖梁左氏於聖人之經為孰近左氏多古字歆獨好之引傳釋經轉}
  - {type: page-break, offset: 3378, content: '', id: KR4d0311_WYG_011-4a, image: WYG1175/WYG1175-0195a.png}
  - {type: variant, offset: 3379, length: 0, content: '', WYG: 發明其於字學盖精棻則方且問竒字於子雲無乃有貴鶩之意與向作洪範五行傳為外戚之戒歆乃挾周官泉府之説為新室}
  - {type: variant, offset: 3380, length: 0, content: '', WYG: 師父子異心一至於此然國師方貴顯矣棻以符命投四裔何其忘䑛犢之愛也董仲舒為漢純儒通達古今有補於治向與之}
  - {type: page-break, offset: 3380, content: '', id: KR4d0311_WYG_011-4b, image: WYG1175/WYG1175-0195b.png}
  - {type: variant, offset: 3381, length: 0, content: '', WYG: 伯仲伊呂無以加之語必非輕許可者淵源不及逰夏何為歆復少之曽孫龔篤論君子以歆言為然黨同伐異孰為至當自交而至於龔弓冶箕裘之業蟬聨十世輝映兩都其間先後異同是非得失不可槩論意者同于好學而不同於所學亦不害為世家歟諸生平時自許不在漢公子之下家學之傳亦能若是之盛否十三問周之士也貴而肆秦之士也賤而拘疇實使之然賤而且拘秦固以亡貴而至於肆周亦安取此得非周以道勝法秦以法勝道耶太學賢士之關士氣屈伸公論通塞所係為甚重鮑宣為司𨽻諸生舉幡集闕下而留之夫司𨽻内治京師外綂諸郡其於太學若無與也愛而留之不忍其去所以能得其心者何故嘗聞鄉校議執政之善否而憎兹多口者欲毁之胡為於宣獨眷眷如此韓愈為祭酒招諸生而誨之學競起侮予之嘲夫祭酒為古司成}
  - {type: page-break, offset: 3381, content: '', id: KR4d0311_WYG_011-5a, image: WYG1175/WYG1175-0195c.png}
  - {type: page-break, offset: 3381, content: '', id: KR4d0311_WYG_011-5b, image: WYG1175/WYG1175-0195d.png}
  - {type: variant, offset: 3382, length: 1, content: 下, WYG: 人矜式其於弟子員至近而易格也侮而嘲之曽不受教所以莫能回其心者何故嘗聞聚為朋曹誶罵有司而退然自克者無幾胡為於愈亦不能少降心以相從耶異時處士横議名節相望適以趣漢室之衰六舘之士不陥非義終無以弭唐室之變遡流尋源要必有説十四問孔門速肖者七十子而名在四科者十人而已果孰為之區别耶參悟一貫於口耳之外胡為不在四科之列夫子傳}
  - {type: page-break, offset: 3382, content: '', id: KR4d0311_WYG_011-6a, image: WYG1175/WYG1175-0196a.png}
  - {type: variant, offset: 3384, length: 2, content: 侯王, WYG: 曽子曽子傳之子思子思傳之孟子是道之統參乃得之而在四科者反不與何耶借曰政事言語文學不足以盡道德行之顔閔盖嘗在寢矣平日之所許可之所期屬非曽子所敢望今不傳諸此而傳之彼必有深意謂參之魯有受道之質與回也亦如愚謂參之孝為百行之源乎孝哉閔子騫初亦何愧意者寳藏於海聽夫人之所自取與後世以顔孟配先聖而得道統之正傳如曽子僅與㳺夏齒又有不可曉者願聞其説十五問臺諌天子之耳目建置本末可得聞乎九官之命聖讒納言龍獨任其責他官何為不得與善旌謗木人皆可言而四凶之惡胡不聞有斥其非者周官}
