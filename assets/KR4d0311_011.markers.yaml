  - {type: line-break, offset: 41, content: '', id: KR4d0311_SBCK_011-1a06}
  - {type: variant, offset: 41, length: 2, content: 學爲, WYG: 見輦而如公告老猶得以與聞國事至朝廷}
  - {type: substitution, offset: 42, original: 爲, replacement: 為, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19875}}
  - {type: variant, offset: 44, length: 564, content: 故二典莫先於若稽古陛下襟道佩德軌堯矩舜履端於始典學是崇豈特漢丗重席於正旦以華觀聽哉虚心遜志日再御緝熈延見儒臣峩冠垂紳魚雅就列凢皇王帝霸之所以治天地民物之所以立莫不聚辨居行以進乎罔覺臣寡陋不足以望日月之末光躐升勸誦榮燭縑簡退惟恭在責難敬在陳善輙効虞人官箴王闕謹拜手稽首裁减一篇昧死塵獻于進讀之始文詞骫骳而毣毣寸忠日以髙明光大望陛下伏惟聖慈特垂采擇其辭曰灝穹生民作之君師中立一身宗主兩儀仁在自弘敬在自約剛在自克明在自覺蓋尊莫尊於德性微莫微於道心正能養於蒙則如泉之始逹慾不窒於損則如澤之彌深是以大學止於至善中庸必謹其獨凖繩規矩檢百爲於將動盤杅几杖収一念於未逐惟定可以澄萬化之源惟虚可以來萬善之益惟博易可以培人材之氣惟寛静可以𥙿民生之力五事乃饗帝之本九經實用丗之則關雎麟趾之意存則王政舉常棣葛藟之義明則天彛植此帝王所以正心而脩身齊家而治國彼惠而姣臨春昭陽豈不爾思伐德之鋩彼醲而郁糟隄肉林豈不爾思傷生之鐔况淫樂者志必荒沈湎者氣必昏前靡顧乎太華之壓後遑恤乎滄溟之翻以四海大命供方寸之侈以百丗惡名易一息之懽胡不思天命之不易王業之至艱欽哉母謂天髙厥鍳匪近相在爾室莫見乎隱母謂民卑其聽易欺鼔鍾于宫莫顯乎微故清燕而居必如駿奔在廟之頃嚮晦而息必如辨色眡朝之時所觀貴大母梏於隘所慮貴逺母局於淺母功之徼維莠驕驕母利之涸維木濯濯母名之慕而實之棄母才之尚而德, WYG: 議遣廷尉咨問亦乞言}
