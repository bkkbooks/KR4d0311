  - {type: variant, offset: 3503, length: 2, content: 以義, WYG: 庶幾成周之盛豈惟其人不惟其官歟方今衆正在列國是堅定臺諌紀綱之地雖不偹其官而一士諤諤嘗首形於王言之嘉歎然攷之國朝之}
