  - {type: variant, offset: 973, length: 386, content: 銘仕止乆速始終條理中清中權我則異是繄聖之時天地相似賢希乎聖考祥視履謟驕不作端木所喜簡以自將子桑伯子事稽厥冝不啻足矣欲進乎道尼母以柅樂而好禮如金就砥敬以行簡如弓矯矢任重致逺其謂斯士盤洲有孫玉雪蘭芷垂髫拱立一語提耳挾山超海不可則止我與聖賢相去半跬爲所可爲如詘伸指勿謂僅足稅駕旋軌光昭前聞銘在齋几三研銘瓦得之梓潼令端得之五羊醫子石得之天目黄冠叄銘之艮其埴坤其閾坎其洫蔡而墨之離其食金聲而方玉紺而章洸洸乎泱泱乎三代禮樂之藏割􅉳龍之膽剖玄鵬之卵霆耶風耶此其筦蠖室銘室在聞復閣衡維摩方丈五去一從半之三面禇屏闢左牖以受朝陽之光孜禪作也余爲名以蠖今二十餘年矣而閑居讀書其中似非偶然者不可不銘銘曰天地四維八尺之璣日月兩燿八尺之表中立吾身宇宙而人心統元識肧腪太極有室衡㝷此身此心如璣之斡如表之臿屏宻牖明體舒氣平其處也眇其運也杳萬古在前後千億年六合爲大微一塵芥悉受以虚不欠不餘溥通妙用縱横錯綜屈, WYG: 亦}
