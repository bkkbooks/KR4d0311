  - {type: variant, offset: 4191, length: 679, content: 大氐史遷所筆皆有深意固文贍而意不逮曄則文亦不逮乎固矣某假守龍陽俗古事簡因得縱觀三史裒其所謂詔制書䇿令勑諭報誓約之成章者凢若干通事著其略毎帝以臆見繫之釐爲若干卷揔曰兩漢詔令以𥙷續書之亡欲觀漢治者當有考於斯文八陣圗說庚辰秋余以太少贅丞入蜀天台許才甫偕行小至後維舟魚復灘下散䇿同訪武侯之遺跡霜風凛晴寒浦縮潦平沙壘石歴歴可數知其原信出於易八陣魁六十有四重易之卦也却月魁二十有四作易之畫也畫起於圎而神故却月之形圎卦定於方以知故八陣之體方方居前而圎居後卦自畫始方自圎生也壁門直袤曲折翼其旁則隂陽二物握竒則有虚一之象焉丗之言風后握竒經者徒知四爲正四爲竒餘竒爲握竒又徒知數有九中心零者大將握之而不知握之在何地余記歩入八陣深處細視魁間平沙之上沙隱起如兩大帶直袤曲折具壁門之體而微竚立環睨正居衆魁之心而虚其中餘竒所握其在兹乎况壁門東向歸峽此則其門西向涪萬出機入機又有不可測識之妙江流湯湯歳月浩渺彼石所壘不爲衝波怒濤轉移巳非人力所及此特微沙相屬亦爾儼然如新抑異矣武侯之忠上貫三極下洞萬古山靈川祇所以護存至此正欲後丗即其虚實向背推見至隱而知侯之用心談古者按圗而不及暏訪古者撫境而不及察往往能言八陣之異同而大將中握遊軍外布曽莫得其指要余每爲之太息才甫出蜀今十年考訂圗說用力乆而功深天機地軸搜抉呈露莫不精確而有據依其於壁門之設先出遊軍定兩端尤得諸賢未發之藴展卷熟覽恍然如對鹽甲因發握竒居中之義以表裏之且詡吾賔主西征之不爲徒行也漢磚考三代墓中欵識用銅偃師比干墓銅槃是也漢銅禁嚴始易以磚至晉唐亦間用磚潜人耕鑿多獲晉磚紹定已丑秋校長謝濟叔源治墓東塢得漢磚七十六面橅脫螭虎文隱起上下爲字十有四曰, WYG: 儀開}
