  - {type: variant, offset: 4079, length: 28, content: 刪潤髙帝未即位遷不書詔惟重祠敬祭詔見封禪書景帝紀遷不書詔, WYG: 疑者太極宮之承天門受萬國之朝賀既曰古之外朝矣或又謂含元殿在周為外朝在唐為大朝何也太極殿者朔望坐而視政既曰古之中朝矣或又謂宣政殿在周為中朝在唐為正殿何也兩儀殿常曰以聽政而視事為古内朝又以紫宸為周之内朝漢之宣室唐之上閤亦曰内衙然乎否乎兩儀承慶皆為受朝聽訟之所而元和中正朔乃御紫宸朝賀寳歴中則又月朔御紫宸行入閤之儀胡為受朝之地曽無定所舊制以隻日視朝}
