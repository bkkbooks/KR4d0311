  - {type: variant, offset: 7032, length: 2121, content: 廉寛守家法進進爲時用嘗寮有雅好輙爲稡所聞以詔烝彛鼎吁王之藎臣無念爾祖丗光顯冝矣夙興夜寐母忝爾所生尚益懋之哉於潜縣㕔題名記六飛都吴邑加重令加選題名昉於隆興甲申續於嘉㤗癸亥前後著見者四十有二人石近燬紹定戊子續記自見大夫始舊聞放失矣九華程君燾至精敏而峻絜大不弛綱細不漏目民隱吏慝蒐獵幾無遺治行亹亹逼前獻垂滿討諸故府合題名三爲一以存往而詔來且追書唐及國朝全盛時賢令十一人于首髙山景行不以耳目所接爲僅足也然著記未免於闕文遺風或得於慨想東晉虞府君嘗爲吾長吏甚有遺愛志逸其名託錢武肅乾山濟安廟碑以傳邑自漢隷丹陽以來爲令者知幾人傳者能幾否固幸其不傳臧而不幸不傳者可勝道耶夫士君子立於丗豈以傳而爲善不傳而遂巳也未有爲善而必其傳也亦未有善積而名不傳也其亦爲所可傳勿爲所不可傳而自幸於無傳也雖自幸於無傳而根窳相形其溢於邦之耆老俊秀牙頰間者未嘗不並傳也書曰康乃心顧乃德逺乃猷𥙿乃以民寧司民社者尚監兹哉臨安眞相院修造記佛以大圎覺爲伽藍非刼火所能壞也而麗於有爲之迹者則有壞有興東天目之蘿山翼若翥鳯其下爲白佛院治平中賜今額開禧丙寅臈殿廬堂廡院額僧牒俱火唯門閈存主僧清皎與其徒智月收合餘燼集諸弟子詔之曰魔事至矣吾徒能以佛事處魔事何不濟汝文禮禪學而儒行名在諸公其往復吾額汝宗㑹銳於丗故其往復吾宇汝藴湘其相㑹出丗間法不離丗間法一念精進勝妙現前因相與信受而退明年冬禮部給額據嘉定庚午春僧堂及廊廡成巳卯春二月已未佛殿成紹定戊子冬佛像成門閣鍾簴㝷一新近者倡其役逺者勸其功亡慮爲錢三千萬㑹行乞于兩淮者七湘亦再披攘經營奮空起有堅忍彊濟越二紀廼迄于成而智淵募建善法堂亦就緒佛氏願力歴三生如一日閱累丗如一人名山勝壤塔廟之崇閎樓觀之傑麗切雲漢亘崖谷人力窮矣猶以爲未足大抵非一手足之爲也皎之徒五丗相承人人以飭壞植仆爲巳責志念之烈不爲飢渇寒暑變穹如奥如繚如闢如燁如卒不愆于素丗之貴家大室或不一再傳而臺傾池荒弗支弗治沈沈渠渠境變主移何肯堂之難耶㑹謁余誌興造顛末因著所感如此若夫三十二相孰相爲眞孰相非眞以是因縁而爲說法有汝師滅翁廣長舌相在余不能也癸巳春正月甲子於潜洪某記竹洲記盤洲野處之族子天成士龍蚤力學從予游頃因肄業之舊治竹洲以寄其志洲與崧君山拱揖一水縈紆琅玕萬箇著亭其中曰令寒曰吟風弄月怪石森植効竒表其尤日雲根曰倚天曰華山孫洲之外曰樵谿曰碧澗循澗而北行百許歩直王子峯之麓有泉甘冽曰石盆衡從可七八㝷泉旁小山横陳斷厓絶壁勢敵千仭飛玉泉漱其左松風巖敞其右髙槐老桂參錯蔽虧風雨晦明姿度百出毎藏脩之暇坐清隂以數息頫寒泉而照影春緑晴哢機觸神㑹無一不可人意而洲獨以竹著右竹也竹之得於天者與君子同其直壓之贔屭而不折也其剛暴之栗烈而不移也其虚飽之風露而不盈也苞之寸茁而有干雲之勢則其氣之不可遏叢之衆卉而無徇丗之容則其德之不可狎也而於水石爲最冝因依暎帶魚魚翼翼如家人拂髦櫛縰端鞸佩紛林立於巖君之側如冠者童子試春服於舞雩如子大夫射䇿于廷如百辟鳴玉而朝御史執法之在旁屏氣若不息如三軍衿甲而陳大將軍旗皷中立坐作進退唯其令也故有志於乆大者取焉淇奥之竹以猗猗言識者謂即淇園之竹其詩曰有斐君子如切如磋如琢如磨夫如切如磋道學也如琢如磨自脩也自脩之與道學何取於竹士龍家有老斵盍以是質之寶慶𥘉元中和節古潜洪某記此君軒記軒舊麗寂照精舎東坡以倅行縣爲賦不可居無竹之詩隆興𥘉徙于縣治衮繡堂之東開禧間嘗重建寶慶𥘉元避上嫌名令桐江方侯熈易以此君仍用坡詩晉王徽之語也君者有德位之尊稱自萬乗至子男百里之國皆稱君以君名縣齋之竹其尊與君百里等然竹之君以德言百里之君以位言知君之所以爲德則優於君百里矣易之震爲旉爲蕃鮮爲蒼筤竹其於時爲春春物之生旉而蕃鮮莫竹若孤根峭植不數歳𬒳山而雲戴角蠒栗曽幾崇朝巳干霄而槊生意勃勃乎其不可禦故觀造物生生之德亦莫竹若也侯政成心休日與君對念吾民生齒之數能如君之蕃乎生養之具能如君之阜乎襁褓鞠育能如君日夜所息與沆瀣俱升黄髪婆娑能如君什伍相依少長相扶老歳月飽風霜而無蕉萃之色乎以君之生觀民之生侯於此不徒名也吁人未哺吾不可以獨飫人方臞吾不可以獨腴對此大嚼奚心哉說詩者以意逆志可也紹定元年正月日里人洪某記善圃記余官太少時𬒳檄行青城道上夏氣淑清空無點雲西望群巘巉碧雪山出其顛霽霏留滋朝陽映明濯濯如白夫渠擢立萬葉間可攬也入山秀蔚而邃古與廬阜琅琊相上下宿丈人觀規犂明登儲福挹三十六峯之勝雨不果迄今旁午于懷一夕新崇寧丞楊君平叔過余玉泉山麓自言先吏部墓距峯七八里而近現眞馬溪兩山夾峙小溪中貫竝溪原谷曠平冝耕鑿因廬焉屋後竹可二十畒左右臯壤鱗屬葺爲小圃摟溪山爲我有入圃畦𬞞環小莊曰壠畒丗田可耕也稍行結屋三間曰讀書處丗書可讀也又稍行瀦淪漪爲蓮沼亭其中曰君子讀書求爲君子也又稍行桃李與梅錯植小亭曰託根耻獨爲君子也出與丗接和則易流屋篔簹深處曰節堂直哉清矣清易至於隘必輔以通循曲水闢徑曰通蹊蹊盡海棠數十本堂曰天冨貴修其天爵非以要人爵也少折者亭柳隂曰早歸來逹當知止窮亦不失歸根復命之理也能如是然後不遺臭於丗築臺叢桂旁曰垂芳以厚終也最而名之曰善圃志獨善兼善之義丐爲我發之余方夢想西山聞君占勝其下喜如從歩屧於煙畦露徑間回詹衆峯之倚寒碧燭向跋不覺膝之促因爲言易九卦示所以善其身十三卦示所以善天下天下者身之推也善天下之難未若善其身之難故於九卦反覆致意尤深君躬耕力書汲汲, WYG: 投}
