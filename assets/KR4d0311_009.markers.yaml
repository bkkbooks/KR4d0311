  - {type: variant, offset: 9304, length: 4, content: 頃循而進, WYG: 士盍相與圖}
  - {type: variant, offset: 9309, length: 2005, content: 使充實輝光衣被丘園花竹魚鳥生意相續九原之眉信矣平叔竦然拱立曰敢不勉請書以爲圃記歸而刻諸石紹定四年春正月甲午錢唐洪某記東山婆娑巖壑記婆娑巖壑者何郷先生吏部俞公讀書處也天目下趍于臨安穹爲雙徑奥爲大滌洞崛竒明邃爲九僊玲瓏及東西永安山其鍾爲人物唐季光啓中錢武肅始以功名著越百二十餘年有郎工部出又百七十餘年有公卓犖相望爲名法從山川英靈之氣大氐屯固蒙鬰蓄極而後發夫豈易然也哉公家西市距東山里所少時屏人事窮年藏脩山中學成一舉冠天下後毎解官還里輙抱書山房繹其業講索益精詣益深論著益雄古四方秀艾摳請屨滿緇徒可與語亦泊然與爲莫逆交軒宇佳處丐一語品題未嘗不笑領也公即丗忽忽二十年僧老死且盡獨主塔了仁應門業浄趣明澹寂如止水撫風物之蕭䟽愴耆舊之凋落以公平生最愛環翠之勝因葺閣下爲堂以祠公擿疇昔所賦名之且悉䟽詩文于壁林巘蔽虧花竹深映與窣堵相近逺儼猶昔也公儻騎雲馭風挾僊人左元放之徒忽去倐來乎夫出處之義大矣静者常得之艮爲山主静而動静不失其時其道光明雖動未嘗不静也公方昌羊空谷燕坐而山月上長嘯而林華墮閉風霆閣雲雨人莫窺其涘及出而施之詩書仁義之澤滂葩淋漓而春萬象風節所存殆有駭濤怒颶日夜舂撞所不能揺者身在禁闥乃心清泉白石間蓋處亦静出亦静也綸巾一壑目擊道存山顧不重耶晉謝太傅髙卧是山石室濬谷之趣自謂伯夷何逺悠悠千古此意惟公識之故併圗其像以慰山靈之思云門人洪某記餘杭重建縣治記餘杭苕霅之津㑹故冬予奉老親行霅上諸山扁舟循苕谿而下間登岸從牧翁漁媪語人人夸誦吾令年方壯而識老政出清静民曽不省有官府也因以野服謁訂所聞令肅客于丞舎起訊之故曰縣治舊占溪南後徙于北宣和焚於睦㓂江令袤重建建炎焚於金㓂張令永嗣又建閱年百餘浸淫穿蠧凛乎欲壓圗撤而新之治寺吏民之耳目非他役比故不敢不勉予退而心念是邑近在畿内地望非不枵然大也而土薄水淺十日晴則告乾三日雨已相戒爲溢備民以故亡蓋藏而令以負租督過者十七八彼芘于是豈漢無壓焉之懼哉所壓有急於屋者也見大夫以朝士來寧乆此苟可撑扶以了歳月何新爲新之寧不勤其民而自爲紛紜耶未信潰于成也越數月苕人過予門曰縣寺成矣治事之㕔退食之堂宴息之室崇楹邃闥表裏中度發地得中霤遺跡位置面勢且還其𥘉矣屋後惡木冗莽鴟梟狐狸嘯醜舞恠之地薙翦不留餘拓圃結亭松竹伍伍氣象一新矣而田里晏然罔聞知嗟夫縣無劇易視令爲劇易弱者以苟偷爲安皇恤我後強者惟力是矜一役之興萬慼之乗也於此能於政休俗暇儲材庸力以植壞起仆使吏治尊民詹聳而一毫不以勤其民至斥圭田再歳之入以食功可表也巳惟昔聖賢道化之盛有本末而無内外其用力自相在爾室始蓋萬室之治不如一室之難也言偃宰武城澹臺滅明非公事未嘗至其室是室之嚴所親必直諒所講必正大所踐必誠敬詖辭詭行姦聲亂色無一得以揺吾之清明而弦歌之化行矣令其進於是乎役起正月已未訖五月癸丑大尹詳定户部侍郎余公佐其費爲多令公族名希磐以進士試刑法中其科嘗爲大理評事云紹定癸巳秋七月甲子潜山洪某記鎮江府學田記三代學校與井田相表裏量地以制邑度地以居民食足事時安居而樂業然後興學養在教先也然比閭族黨聮合保受而教與養巳並行五家之比積而至於二十五家之閭門側必有塾衆庶所聚以里居之有道徳者爲之師是入於塾而學也春將出民里胥坐於右塾隣長坐於左塾畢出然後歸是出於塾而耕也出於塾而耕則周旋乎同并之田入於塾而學則薫浹乎同門之訓養之所至教亦至焉𥘉未嘗去里巷違父兄以爲學而人人有士君子之噐自塾升之黨庠遂序國學官而禄之不勝用矣王道衰井田壞學校日廢漢除秦禁士始散出以求師自是經生學士傳業寖蕃大師衆至千餘人博士弟子貟之外未知何以爲養東漢儒學益盛精廬所建贏糧動以千百耆名髙義開門受徒著録毎不下萬人蓋人自養而自學矣士生三代之時教且養一出於上生三代之後廼自養而自學是後丗之爲士難於古無恠乎人材道化之不古也國朝以崇儒右文爲一道德同風俗之本上自太學下至郡縣學莫不教且養田不井授而庠序之盛不减三代故其養爲難京口郡學之田在金壇湖澤間爲多經界行於潦浸之後以茭葑地定租畮出錢僅二十餘歳乆茭葑爲膏腴而租猶故官沙諸莊在江渚者又日朘於潮以故食常患於不續歳已丑今兵部侍郎趙公范爲守有以金壇田告者檄官核其入毎畮俾量岀斗租以澹士事未竟㑹邊遽移鎮維楊而軍噐監丞韓公大倫實來視校官陊圯首經葺之民聞風欣然願輸大約山土田以畮計一萬五千一百有竒歳増米以石計九百二十錢以緍計九百五十四於是廪有繼粟而寢處有筦簟几席之安沙田之可捍築者亦次第集事郡文學羅君闓慮異時勢攘力刼乾没詆讕之無以爲乆請記之孟子曰無常産而有常心唯士爲然士之異於凢民者以是心不爲飢渇害也然非講學不足以窮理非窮理不足以知命非知命不足以養心夫繫於天而無所用吾力者命也循乎天而無往不惟天之聽者所以致其命也吾知脩吾身行吾義而死生禍福之在天者一不與知命自我而立也以此處貧賤雖禄萬鍾食方丈不足以易吾簞瓢之樂所養豈不浩然矣乎而職於養人者不當以是論羣吾民之秀於學欲使鳶飛魚躍於作成之下以長治其民而壽吾國顧未免養之有不澹焉而曰士有常心不爲飢渇害也其可哉然則二公封植學校之意學者不可不承來者不可不嗣也, WYG: ''}
