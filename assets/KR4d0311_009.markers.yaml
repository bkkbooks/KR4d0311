  - {type: line-break, offset: 331, content: '', id: KR4d0311_SBCK_009-1b10}
  - {type: variant, offset: 337, length: 2, content: 刺史, WYG: 恐難於歛戍使寸寸而守之則備多力分抑兵家之所忌挾初郡以為外扞庶増藩籬之固而鞭長或不及於馬腹委雞肋而棄之又幾前功之俱廢沿江諸大屯招兵増戍而練舟師門户之急務也或謂守淮襄自能蔽江原保綿亘於鳳沔所以保蜀也移三關之戍而扼三泉得無已廹乎督府進駐荆襄上流壯矣金房聨蜀海道接淮延袤數千里或虞運掉之難隨地分立幕府則大費又未易支也以至南北軍何以相制官民兵何以相使屯田於新疆何以能不資敵調夫於邊郡何以能不重擾子大夫熟於觀時切於憂國其舉三邊備守之要悉意陳之將復于上武舉公試策問乙酉問恭惟皇上以聰喆英粹嗣無疆大歴服學問辨寛居仁行義四方萬里翹跂望治諸君䝉被新美之化可無説以禆新政敢問舜月正元日受終文祖首察璣衡以齊七政而類禋望徧之並舉豈觀天交神庶政莫先與異時月正元日格于文祖詢四岳闢四門明目達聰惟恐或後且進十}
  - {type: page-break, offset: 337, content: '', id: KR4d0311_WYG_009-4b, image: WYG1175/WYG1175-0182b.png}
  - {type: page-break, offset: 337, content: '', id: KR4d0311_WYG_009-5a, image: WYG1175/WYG1175-0182c.png}
  - {type: variant, offset: 340, length: 2, content: 千石, WYG: 牧而歴咨之聽言用人又所當急也太甲元祀祗見厥祖伊尹明言烈祖之成德以訓於王是天下之政無大於法祖宗矣髙宗恭嘿思道君臣相與告語尤惓惓於遜志時敏之務典學豈容緩與成王即政無逸舉三宗以勸主乎畏天愛民而已立政一書乃以三宅三俊為不可忽終之勿悮庶獄為重意固各有在與抑又有可疑者禹受命於神宗不旋踵㑹群后誓師而征有苗康王率循大卞大臣進戒未暇他及首以張皇六師為言佳兵不祥之器顧先之何與豈國之大事在戎不可一日弛與新服厥命求以聳四方之觀聽與人情易玩泰用馮河之義與君以乾剛為德必神武英略而後足以運天下與事有本末物有先後則近道矣隆古帝王出治之序參之今日所當先者悉以陳之有司将以復于上省試一乙未問大明當天而萬景隨北辰居所而列曜拱恭惟主上以文王之聖躬虞舜之孝宮中三年之制畢将㳙剛旦御路朝以延見百官臨撫萬國禮隆典鉅不可不預蒐而夙講也周外朝在路門外内朝在路門内燕朝在路寢之庭所謂治朝者果安在豈即外朝與天官太宰王眡治朝則贊體治豈王公坐論關於治道甚大斯謂之治朝與司}
  - {type: page-break, offset: 340, content: '', id: KR4d0311_WYG_009-5b, image: WYG1175/WYG1175-0182d.png}
  - {type: page-break, offset: 340, content: '', id: KR4d0311_WYG_009-6a, image: WYG1175/WYG1175-0183a.png}
  - {type: page-break, offset: 340, content: '', id: KR4d0311_WYG_009-6b, image: WYG1175/WYG1175-0183b.png}
  - {type: variant, offset: 343, length: 0, content: '', WYG: 之公孤卿大夫士朝士之群吏州長衆庶莫不在列揆之明堂位夷蠻戎狄不與焉豈置之國門之外不容列於表著與漢接三代而興奉常綿蕞之習不過秦儀雜就已知皇帝之貴使得魯兩生相與翼成之果盡還周之舊歟德陽殿大朝㑹夜漏未盡七刻鳴鐘受賀與長樂之儀先後交映然長樂陳車俠陛執㦸傳警而不設樂德陽乃鐘鼔鏗鍧管絃和雅豈禮樂至此而後備與宣帝受釐前席何盛服齋明獨施於少年之見宣德幘坐迎笑何威儀簡略能奪夫説客之氣髙帝之朝廷而愛幸者媟戯於殿上宰相得以折之先帝之正處而貴寵者引内於殿中中郎得以卻之佞倖方張二臣何為無投䑕之忌小臣廷辱師傅至攀折殿檻而不顧盖謂其不能正主益民也而金華入説尚書論語其有補於帝學者何事武帳不冠不見使人可其奏而出入禁闥之請曽不克從間見髙門之論乃謂妄發其不能動帝聽者何説十萬横行面謾可斬而殿上}
  - {type: page-break, offset: 343, content: '', id: KR4d0311_WYG_009-7a, image: WYG1175/WYG1175-0183c.png}
  - {type: page-break, offset: 343, content: '', id: KR4d0311_WYG_009-7b, image: WYG1175/WYG1175-0183d.png}
  - {type: variant, offset: 344, length: 3, content: 能皂白, WYG: 恐遂罷朝不復議何聽納}
  - {type: variant, offset: 348, length: 26, content: 毎爲予言三山李公珏握憲節時威名凛乎動人康山膏腴十頃舉, WYG: 易奉珍來朝待}
