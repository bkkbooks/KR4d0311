  - {type: variant, offset: 192, length: 10, content: 田歸于學最五頃有竒山, WYG: 累兒戯之習其道何先光武再造炎圖璽書明見以服竇融幘坐迎笑以折馬援御豪傑之法然也中原遺材慕義來附效智效勇俾皆歡呼鼔舞於大受之中而無養鷹之患放虎之虞其術何要孝宣號}
  - {type: page-break, offset: 192, content: '', id: KR4d0311_WYG_009-3a, image: WYG1175/WYG1175-0181c.png}
