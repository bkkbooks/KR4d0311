  - {type: line-break, offset: 312, content: '', id: KR4d0311_SBCK_009-1b09}
  - {type: variant, offset: 324, length: 0, content: '', WYG: 勢以制動静之機操縱闔闢顧不在我乎至若軍律之當嚴戎旃之當睦邊民之當䘏新甿之當撫無一不關宵旰之慮子大夫有志事功其率意茂明之朕將親覧召試舘職策天下大勢首蜀尾淮而腰膂荆襄自昔所甚重也諸葛亮之用蜀祖逖謝元之用淮羊祜陸遜之用荆襄規模具在得其人善用之則撫機酬變進退闔闢豈不在我而猶患備守之匪易蜀方告警㐮又戒嚴且蔓延於淮右敵為三師以觀所應故我之應敵不容出於一術諸閫交相為援如常山之蛇力非不合也或慮趋前不能無後顧畫境人自為守可無連鷄之患然同舟遇風又慮一處不牢則俱受其害分建三數大鎮聚甲兵糗糧以重中}
  - {type: page-break, offset: 324, content: '', id: KR4d0311_WYG_009-4a, image: WYG1175/WYG1175-0182a.png}
  - {type: variant, offset: 325, length: 10, content: 度者歟饒學居臺府鼎峙, WYG: 似可熊卧虎視而並塞列城䕶風寒}
  - {type: 'kr:newline', offset: 331, content: '

