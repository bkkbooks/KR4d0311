  - {type: variant, offset: 509, length: 1, content: 翼, WYG: 諸侯不敢有無周}
  - {type: variant, offset: 511, length: 4, content: 督軍湖匯, WYG: 心秦汛埽六合鞭笞四海自以為帝王萬世之業而繩樞之子亦得而易視之人有尫羸而壽考物或暴長而夭折理固應爾獨怪春秋以來齊有葵丘之㑹晉有踐土之盟均為五覇之盛而心術譎正宜可以占}
  - {type: variant, offset: 516, length: 1, content: 右, WYG: 國何威公僅能終其身覇業遂替文公之後世為盟主齊且屈而從之豈譎正無闗於強弱耶是猶有可諉者曰國異而勢殊也及觀漢之文宣規摹一家而強弱乃有異勢吳王不朝賜以几杖匃奴嫚侮結以金繒太息流涕之勢其不滿人意非一事然兵無刃而威權自振刑不肉而德化自孚}
  - {type: page-break, offset: 516, content: '', id: KR4d0311_WYG_009-11a, image: WYG1175/WYG1175-0185c.png}
  - {type: variant, offset: 518, length: 4, content: 湖爲堤徑, WYG: 朽粟腐迄成庶富之效而後嗣頼之樞機周宻技巧咸精吏稱民安之餘單}
  - {type: substitution, offset: 519, original: 爲, replacement: 為, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19875}}
  - {type: variant, offset: 523, length: 16, content: 學湖裂爲東西西湖在堤北倚山瀦水植, WYG: 且欵塞而來享中興之治赫然莫及而一傳之後漢業衰焉弱轉而強強轉而弱始終之變相反若此其必有故矣恭惟主上更張萬化縂攬權綱舉天下之政滌蕩振刷而一新之朝廷清明邊鄙不聳四方延頸}
  - {type: substitution, offset: 526, original: 爲, replacement: 為, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19875}}
