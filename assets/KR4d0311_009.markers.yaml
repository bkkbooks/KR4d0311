  - {type: variant, offset: 389, length: 2, content: 􅐁吾, WYG: 甘泉受謁稱藩而不名何禮遇之過朝而問錢穀出入公私之積何其難於裕也坐朝而日􅉴未退内外之務何其難於清也朝堂百僚之位䔥曹丙魏謀謨乎其上司徒毎府天子親幸與丞相决大事是外朝之存者豈非君臣一堂交孚無間而後足以増朝廷之重歟其歴攷周漢本末以告二問繼志述事者人主之達孝崇德報功者朝廷之盛典昔在寧考親挈神器以授聖明昭哉嗣服于今一紀而文母保佑之恩永言孝思亦既邦祔侑食清廟豈無舊弼顧猶􅆙焉可乎盤庚告其臣民兹予大享于先王爾祖其從與享之功臣配食于太廟商家尚矣而莫名}
  - {type: page-break, offset: 389, content: '', id: KR4d0311_WYG_009-8a, image: WYG1175/WYG1175-0184a.png}
  - {type: page-break, offset: 389, content: '', id: KR4d0311_WYG_009-8b, image: WYG1175/WYG1175-0184b.png}
  - {type: variant, offset: 392, length: 0, content: '', WYG: 享之臣伊尹格于皇天伊涉臣扈格於上帝豈即其人乎周司勲}
  - {type: variant, offset: 393, length: 0, content: '', WYG: 功者祭於大烝傳者於王功曰勲獨取輔成王業之周公而召公之夾輔尚父之爕伐皆所不及豈難其人乎漢論功定封録第侯籍藏諸宗廟}
  - {type: variant, offset: 394, length: 2, content: 肥𣏌, WYG: 至麒麟雲臺之繪崇報厚矣未聞有列於烝嘗}
  - {type: variant, offset: 395, length: 1, content: 𣏌, SBCK: 􅂎}
  - {type: variant, offset: 397, length: 0, content: '', WYG: 而先儒謂漢祭有功於廟庭其詳可得聞乎唐享功臣祫則配禘則不配其後禘祫皆配果合乎古否也髙祖廟以裴劉故人爼豆其間能無出於私乎太宗廟以魏徴讎臣冠佩其中抑無一之非公乎長風孤騫之仁傑廟享宜也而五王之}
  - {type: page-break, offset: 397, content: '', id: KR4d0311_WYG_009-9a, image: WYG1175/WYG1175-0184c.png}
  - {type: variant, offset: 398, length: 1, content: 否, WYG: 並侑固不厭其衆忠冠日月之子儀廟享亦宜也而中興第一之功不與亦不嫌其寡乎佐佑王化之説享之未過也而應變守文之名相皆不在選其有所抑乎光復宗祏之李晟享之誠當也而上不負天子下不負所學者廼置而不問豈文墨議論不如汗馬乎翦蜀於清明無蔽之日平蔡於惟㫁乃成之時杜裴元功享之俱無媿也而崇文及愬莫非指蹤之下乃與同升豈将相叶心然後功業有濟乎許敬宗威勢熾灼停享於神龍固足以懲㴞天之罪而名宰相如𤣥齡百世猶将宥之亦以子停}
  - {type: page-break, offset: 398, content: '', id: KR4d0311_WYG_009-9b, image: WYG1175/WYG1175-0184d.png}
  - {type: variant, offset: 400, length: 0, content: '', WYG: 以允公論苗晉卿小心謹畏崇配於大歴已不足以孚當世之望而首贊經綸}
  - {type: variant, offset: 401, length: 0, content: '', WYG: 裴冕一時無能及者乃以即世先後為疑何以逃清議自武德至於元和功臣列在祀典凡四十餘人穆敬文武宣而下廟食靡所著見豈無其人則闕乎抑有其人而冺乎無傳}
  - {type: page-break, offset: 401, content: '', id: KR4d0311_WYG_009-10a, image: WYG1175/WYG1175-0185a.png}
  - {type: variant, offset: 402, length: 0, content: '', WYG: 夫黄鐘動而氣序轉應龍翔而雲霧集君臣感召之機盖非偶然者然一時之功孰與乎萬世之功左右諸大夫之曰賢孰與乎國人之皆曰賢人心是非昭如日月侑饗大議可一言而定也諸君攷古騐}
  - {type: variant, offset: 403, length: 1, content: 李, WYG: 以對毋枉江東漕司不礙格問國無常勢隨時而為強弱周}
  - {type: variant, offset: 405, length: 5, content: 平反西道與, WYG: 之於魯太}
