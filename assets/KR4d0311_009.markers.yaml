  - {type: variant, offset: 1472, length: 4888, content: 事患不爲耳度逺近凖髙下程廣狹量淺深圗成而鎮江都統馮榯實來聮請于朝㝷報可屬時晏清弓䩨矢箙戍兵湏暇售力相先植表作旗萬臿競奮行行伍伍一無敢譁單車廵勞犒給有度蒐簡勤惰勸懲有章日出而作未昳戒休嘯篁坎皷歸營驩動其施功自東徂西而終於南因地相冝河面闊至十有六丈厎殺其半深五分廣之一環繚三千五百四十一丈壕外餘三丈護以旱溝又外三丈封積土以限淋淤又展地七丈以受土使與危堞不相陵民地眡歳入庚其直事已俾復作業城五門爲月河緫百十七丈而南爲裏河又八十七丈呀然而淵沛然而川波光柳隂下上交映實墉實壑深與髙稱賈航餫艘並㠶疾馳萬目驚盱前所未暏西北曰堡寨城周九里十六歩相去餘二里屬以夾城勢如蜂腰地所必守左右尤淺隘濬之槩如州城壕以丈計者七百三十有一且甓女墻以壯其勢郡倚三塘爲固有邊遽則䟽陳公句城塘水灌州城壕支河引水入九曲池合雷塘水灌西城壕公先是封築閘柵斥大隄岸潴水益漭漾兩壕告功試決而注之水僅落數寸而河流四溢矣經始于八年八月訖于九年九月工一百一十五萬四百二十五費朝家緍錢三十四萬八千七百五十六米石二萬一千八百四十七州家激犒爲緍錢五萬一千六百市河貫城即古䢴溝南距北五里六十歩外壕旣深水勢趍下市河涸不可舟就加深廣三分廣一新輿梁五又費緍錢四萬有竒公以正大學問發爲政事所至聲迹章灼擊楫東來恩信孚浹軍民歸命恃爲長城識者以經濟事業望之斯役特細耳客謂孱虜垂亡機㑹方集何規規守是爲公曰不然古人設險如弈棋置子雖踈取勢欲廣楊爲根本要地控海沂而引汴泗取勢爲獨多吾試與子馮髙而望中原故壤一目千里強本折衝顧不在兹乎客領之去是役也參議陳師文機冝何處禮提督通判髙惟月鈐轄劉諶節度推官鮑克正受給統制孟顯仁緫轄統制王明元眞統領韓亮王孝忠張健李進李琮莊安國夏榮部役敢勇精銳武鋒神勇左軍強勇鎮淮則其役兵也公名與之字正子南海人利州通判㕔記上更化十有三年南海崔公以名灋從出殿成都柬其屬得宣城孫君若蒙正叔爲成都宰與俱西明年公盡護全蜀闢幕府于劔外緝忠裒益正叔參焉又明年辟通判利州利以寧武冠其軍介梁益拓表撑裏自昔號重鎮中興後臺閫鼎立又重郡太守印綰以部刺史丞貳非它郡比也舊有廨郡治東歳庚辰合爲大行臺郡治麗于漕郡丞倀倀無與歸濡需而游寠藪而泊吾腹果矣它不暇問正叔以爲大愧一日過南門綿谷故驛掖仆碑摩桫讀之皇祐中規置也秦蜀同軌利當孔道故崇大其館以贏客使其後郡將兵鈐迭嘗匽薄近復釐爲四五以廬僑士叢猥族紛左陊右壓庭下老木數章突兀輪囷猶有百年文獻在正叔喜曰可矣退而咨諸長長曰可哉翼衡以從張故以新迪晦以明堂序有嚴官府具體旣表舊扁諸大夫相與落之三邊無塵野無遺秉可信眉一釂矣書來屬余以記余謂天壤間孰非傳舎閱人之地况毀室於鴞取巢於鵲抑有甚不獲巳者未足爲正叔書也憶疇昔過正叔抵掌劇談丗故節節中窽郤其言利者怨之殖也名者忌之的也忿與慾損摩桫讀之皇祐中規置也秦蜀同軌利當孔道故崇大其館以贏客使其後郡將兵鈐迭嘗匽薄近復釐爲四五以廬僑士叢猥族紛左陊右壓庭下老木數章突兀輪囷猶有百年文獻在正叔喜曰可矣退而咨諸長長曰可哉翼衡以從張故以新迪晦以明堂序有嚴官府具體旣表舊扁諸大夫相與落之三邊無塵野無遺秉可信眉一釂矣書來屬余以記余謂天壤間孰非傳舎閱人之地况毀室於鴞取巢於鵲抑有甚不獲巳者未足爲正叔書也憶疇昔過正叔抵掌劇談丗故節節中窽郤其言利者怨之殖也名者忌之的也忿與慾損之棘也氣壹動志者壯之蹶而得者老之蝕也天下所謂磨之不磷灼之不焦震之不碎者惟一誠實而巳身不行道不行於妻子苟誠其身則可以順乎親信乎朋友而獲乎上眞者不可矯昭者不可匿也余聞而惕然向知正叔之老於才今知正叔之老於學故書嘉定十六年六月朔洪某記清約堂記參天地而立者人包天地而運者心同是心也而有人心道心之别道心性之存也人心情之動也情動而百欲生故危之危而難安未至於亡也故猶可及反反則危者平矣顔之復曽之省反身之謂也然省在復先能省而後能復顔子有不善未嘗不知知之未嘗復行隨省而復也曽子則用力於省者顔色之正容貌之動辭氣之出戰兢惕厲警察精宻無一息之間斷而夫子之道竟以是得三省之積一貫之入歟晉人張君承祖伯脩學博而材偉氣明而膽壯舉天下禍福利害莫能壓之試劇成都期年政成作堂以休扁以清約殆老於丗故落其華而取實將以是志所省乎夫養心莫善於寡欲其爲人也寡欲雖有不存焉者寡矣其爲人也多欲雖有存焉者寡矣此心具清明之全體人欲一萌清明隨蝕去其所以蝕清明者而清明還則本然之心得矣故天下之損莫大於欲人心之所當損亦莫急於欲邑大夫公餘退食燕坐深省曰夜氣之存其不爲旦晝汨乎雞鳴而起其於利與善之間巳辨乎宫室之美妻妾之奉所識窮乏之得我其不爲之動乎口之於味耳之於聲目之於色四體之於安逸其知有命而委順乎内以敬而直外以義而方敬義充塞於内外物慾無自而入則民𬒳學道之澤矣董㓜宰不足進也詩云蒹葭蒼蒼白露爲霜所謂伊人在水一方西郷舉酒爲伯脩賦之寶慶𥘉元八月旦日古潜洪某記洞霄宮施田記洞霄距行闕三舎而近翠華臨幸舊德典領廷緌寺貂禜禱旁午望出璇臺珍館之右星冠羽衣來游來處常不翅數百千指九霞八景晴霏濕翠朝攬夕挹充然有得而主其徒者毎皇皇懼無鞅數衆之弗克澹唐中葉嘗賜觀庄田一所國𥘉錢氏籍以歸有司祥符中賜仁和田十有五頃除其租政和中易賜膏田千畒逮紹興刱通明殿于宫之東偏又歳有常餼以給齋祭列聖涵育之恩至矣賜田中更多故僅存磽瘠歳入不足支數月都監宫事龔大明語其徒王思明王大年前是住山潘君三華尚能斥槖裝買曹橋田以繼粟吾徒可坐睨寛郷上腴大家腐陳丐彼有餘輔吾不足庶幾我疇我耕我庾我積以𥙿我後之人怡聲勸相堅力經度其志卒以酬畏壘旣攘姑射且熟皷腹升平稽首萬壽欲與是山相爲無窮來諗予爲記夫道行乎天地之間日用飲食何者非道先王以是生養天下一夫授田百畒于耜築埸有其時紏笠趙鎛有其具堅好頴栗舂揄釋烝有其成墻屋有桑疆畎有果蓏柵有雞豚沼有魚鱉身勤於所養心安於所止一毫無待於人此王道所以爲盛也丗降道裂始有食非其力者浮屠氏幻而辯能撼人以禍福塍陌綺錯鉢巾雲趍所至皆是而爲老氏之學者大氐以清浄無爲爲宗湏於人者狹故其廬聚不能十佛之一雖名山藏室大洞殊庭號稱海内之望亦往往㣲常産以自殖其教然也於其教清浄無爲之中而能謀長以殖其衆可不謂難乎雖然樂與餌過客止道澹乎其無味視之不可見聽之不可聞而用之不可旣爾師之說然也繼今不以口體爲心害冝有進乎澹而無味者余家天目之陽去天柱爲近間當分半席叩之施者生有祈死有薦其姓氏畒石附見碑隂云於潜丞廳續題名記吴門葉君芭丞吾潜諸臺交薦其材垂滿過余以題名更端屬之記且曰官無􅋻崇職無簡繁事無易難惟敬則行居是官而罔其思非敬也居是官而出其思亦非敬也上不侵官以僣下不怠官以曠心止於事靡他其適如農有畔行無越思其斯爲執事敬乎芭不佞何足以及此惟是常平義倉之賦受丁口力役之簡稽曁上官所以奔走使令之悉惟謹土膏脉奮凍解泉動出入阡陌程督坊瀦日與臺笠襏襫相爾汝過此不問也有堂述六面山而俯沼嘉卉美竹參伍布列暇時玩游鱗之溶曵聽幽吭之啁哳弄柔芳而坐宻䕃以休其心負丞不負丞不敢知也余愛其言知敬於職業因筆而卑之石且告來者奚疑堂記爲楊尚書汝明作太極運而隂陽生隂陽分而剛柔斷人具隂陽剛柔之體而性太極者也氣禀則有不齊得陽剛之粹者爲正直爲平易爲静定爲勇决得隂柔之偏者爲便曲爲險躁爲多愛爲不果自昔聖賢所以擇精而守一與道俱出與義俱入進不㤗驕退不吝屈動以天而不牽於物剛實爲之夫剛者疑之斧慾者疑之蘖慾則不能剛矣剛而無慾然後能知天知天之所以命我者不容毫忽人力於其間則能安乎天凢利害禍福榮辱得䘮錯立乎吾前不將不迎不掣不撓躍如脫矢􅒂如奏刀沛如决千仭之隄而赴平川疑何有哉今寶章閣學士瀘南帥尚書公表和而裏也剛其立朝不沽激以爲異亦不媕阿以爲同惟時之中締知茂陵廩廩枋用一日幡然請蜀麾而去築堂家山顯爽靚深志將老焉間斯燕斯謂歸去來一詞指在末章先君嘗欲以奚疑扁所居未暇也遂名之易之遯曰肥遯無不利無所疑也見於上九之剛坤之六二不疑其所行則動而剛也有是剛信道而踐實任運而養胖處貧賤無患得之心處冨貴無患失之心遯與坤所以均於群疑之泮然見幾以用遯違丗者之事故其剛著於外敬直義方而德不孤用丗者之事故其剛動於中靖節違丗者也公用丗者也違丗固安乎天用丗抑何往非天哉昔伯起傳秉及彪四丗德業蟬聮相煇爲東京名族清白之遺也公以安乎天者上承考下以詔子若孫德業庸可旣乎敢爲楊氏賀且爲楊氏勸著圗書所記余誦天隨子杞菊賦愛之因取著圗書所名閑居之室菊坡爲灑其扁廉頑立懦之風可挹也嘗言曰結繩以前未有書有書自易三畫始易在天地之先而畫顯於一隂一陽之後陽竒爲乾隂耦爲坤隂陽竒耦之畫交而文生焉故易者文之太極也詩書禮樂春秋論語文之兩儀也諸子之有見於道有𥙷於丗教者文之四時五行三辰也太史之紀録先儒之訓詁文人才士之撰著騷人墨客之賦詠公卿大夫之論奏百家異端稗官小說各求自表於丗其融爲江河峙爲山嶽散爲風雲雨露磔裂爲草木之華昆蟲之鳴不知其幾也而緫之爲圗書其出於河洛者蓋其元也前代書皆禇素傳抄至五季始有六經墨版國𥘉又刋司馬遷班固范曄諸史以幸學者猶未盡然也今則靡書不版矣手抄之得難版傳之聚易得之難則讀之力聚之易則有書不讀如前輩之慮蓋多然亦有由也士未一命晨䆫向白執編而長哦夜膏欲涸掩卷而紬繹莫非所謂科舉之文書非不讀也而讀非其書及旣一命矣日以司空城旦從事神疲力瘁於簿書文墨中書不暇讀矣爲士而讀非其書爲吏而書不暇讀勇於學問者顧不爾而力與心違類不能不爾故惟不士不吏而後可以力於書余家合新故書亡慮萬餘帙放斥還山無埸屋之冗無官府之勞書於此而不讀眞不讀矣郤萬紛以保静揩雙眵而就明日課一編心領大義老退雖不能彊記如苗得漑生意亦新易曰君子多識前言往行以蓄其德厚其入而不輕其出是之謂蓄蓄之極而至於何天之衢亨則上逹矣未蓋棺之日月尚勉之於潜登科續題名記上科詔再頒之歳冬十月己未邑令池陽程君燾修鹿鳴故事于宣化堂諸生作而言曰潜士登科有題名自慶元龍飛始閱三十年石且溢矣表先逹以厲後進盍續諸令曰唯唯鳯凰鳴矣于彼髙岡地之得也梧桐生矣于彼朝陽時之得也時與地莫難乎兼得士生王國得其地矣雲風感召得其時矣其地得其時又得觀光利賔䇿名奉常以階顯庸顧不謂榮乎抑涵負穹博擇精守固出可以爲邦家之光萬民之望然後榮名氏之書志榮也郷校群居藏脩餘隟相與摩挲題刻歴訂平生非其研席之游從則家庭之詔語疇賢疇不若類荃茅而品椒榝其榮也可不懼乎知所以懼則榮至矣此賢大夫期属方來之意也邑人洪某記浮溪橋記浮溪吴蜀往來之津始以略彴渡繼維以舟前令邵紫微梁而亭之山潤川明彷彿垂虹宣霅分派南注潦水時匯雷轟電射橋莫克支乆趙帥卿來絫以石且屋其上規制堅宻而勢益雄前年秋洪發諸山平疇廣隰漭爲一壑縱放横軼洶如濤江直北之橋盡决順濟亦壞方令垂滿綿蕞艤度暴漲斷綆渉者仍病焉池陽程君燾至之逾年間與客行溪上愛風物之勝思䇿隊立壞如帥卿而重於煩民遂一用紫微成摹釃水爲十三道巨植駢峙脩䦨旁翼袤三百尺廣三㝷有二尺東西石梁各一星兩亭壓岸猶舊先是紫微中橋着亭麗于北坐挹兩天目以便遊息迎湍受激亭仆而橋隨之改着于南勢相屬而不相麗異時亭或不力橋庶幾保無恙市材僦工直與時平手畫目授匠與心謀不累朔而告功疊嶂危瞰漪漣涵碧霏開煙合人冉冉行圗畫中潦無停輪冰無留屨相與夸誦前邵後程不容口而君意猶若欿然者謂凢物廢興㳂革相循無窮壞必有由成必有漸橋凢幾變矣今揆時度力所僅就爾他山可斵安知來者之不復石乎士大夫之患莫大於吝與驕吝者拔一毛利其民不肯爲驕者毫髪及其民則施施有德色蓋無學問義理以養其心而氣爲之贏縮也君廉平有精力得敬事愛人之意視可以興利除害者不慮費而橋役其大橋成不矜爲巳惠而以圗堅惠逺卷卷後之人加於人一等矣紹定己丑十月日里人記知心堂記昔在孝宗皇帝以盛德大業紹開中興仁不異逺視坤維戚休如在陛枑間廼淳熈丙申秋七月制詔晉原李公蘩以倉部貟外郎緫蜀賦望選也未上首奏利路和糴爲民害假臣三數月可永除五十年病根爲國爲民之慮目無全牛矣㝷奏易之裒多益寡書之懋遷有無皆深寓理財至計臣願於經費中揆盈虚歛散之冝酌緩急先後之序通融排斡劑量取予盡變抑配舊法官自與農爲市不虧豪忽之價不取圭撮之贏而軍不乏興民不加賦其條凢數十其大節目十有一反覆熟究皆經乆實利惟少寛轡䇿俾得盡其愚上大竒之詔制置范公成大同詳度又詔度支郎周嗣武就覈利害悉奏所請可施行公以聖主難逢時幾易失亦連上奏願任責辦集其議三閱歳而堅定案全蜀餉道歳大約以石計者一百五十餘萬中六十餘萬科之邊氓量家業以定均敷之數名和糴實強取民不堪命怨咨轉聞皇明洞燭萬里一意任公以寛西顧奏始上非惟九重難之公卿大夫皆難之蜀人之切於解倒垂者亦, WYG: ''}
