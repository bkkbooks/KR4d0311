  - {type: variant, offset: 1271, length: 199, content: 拓於隋俯仰千古岸移谷遷坡陀濔迆隱起蒼莽間後周顯德中韓令坤相攸東南陬别城以亢治所周二十里一百五十歩崇二十六尺是爲今州城國朝盛時南轅北輈走集旁午如奠枕堂皇無所事乎金湯之險六飛南駐郡爲北門重鎮形勢控帶繕防日嚴培庳葺陋萬雉鬰起矗如長雲望不可極而壕河堙陿日甚稍不雨則褰裳可渉嘉定甲戍春金部郎崔公出鎮是邦厥𥘉視事登陴臨眺進父老而問故謂役費夥繁民壤綺錯且城東髙卬平衍虜嘗頓兵浚下増髙守禦非冝坐是噤不敢輕議公慨然念, WYG: 杜群枉}
