  - {type: variant, offset: 256, length: 2, content: 鎮俗, WYG: 之呼韓稱藩則置酒甘泉}
  - {type: variant, offset: 259, length: 4, content: 静格姦暴, WYG: 饗之御夷狄之法然也故讎雖殄新隣方張或和或戰情偽叵測在我必有}
  - {type: substitution, offset: 259, original: 静, replacement: 靜, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-20691}}
