  - {type: variant, offset: 7, length: 4, content: 記饒州州, WYG: 宋洪咨䕫撰策問文舉殿試策朕猥承至尊休德於今一紀夙寤晨興懼不克負荷以羞列聖廼者収攬大柄躬親萬務嘉與海内共濟丕又㧞人才於久鬰䟽言路於積壅亦既踰年而更化善治猶云未獲豈弊端轇轕汙俗沉浸未易遽更與抑崇名忘實齊末遺本所更者政而不及化與何責治愈切而愈邈也黄帝堯舜通其變使民不倦非聽其窮而莫之反垂衣裳而天下治必有妙於化裁推行之表者三代忠質文之尚其弊未始不可救而禮有損益隨時施宜亦非區區於制度文為之間也孔子變魯至道孟軻以齊王猶反手綏來動和過化存神固不容以淺智窺而四代禮樂經世之大法三王四事治國之要道知之者衆而行之者寡何與夫天命不難於迓續而難於凝人心不難於轉移而難於固朕歴觀治忽消長之運念此至熟而行有弗逮國體嘗少振矣而茍且相仍未保其不弛國論嘗少定矣而是非交至未保其不揺國勢不可不彊而選將厲兵屯田積榖未能両全攻守之宜國計不可不裕而約已厚下開原節流未能一出取予之正伊欲整紀綱於姑息之餘飭法度於因循之後洒濯衆志新美大化以凝固天命人心於無窮其要安在子大夫彊}
