  - {type: variant, offset: 185, length: 2, content: 番水, WYG: 挫黥布御將之法然也周廬内衞列屯外戍使功使過俾皆踴躍奔走於作興之}
  - {type: variant, offset: 188, length: 3, content: 郷在官, WYG: 而無跅弛}
