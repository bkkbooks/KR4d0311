  - {type: variant, offset: 264, length: 6, content: 誠惻然念民力, WYG: 待}
  - {type: variant, offset: 271, length: 1, content: 窮, WYG: 進可為車攻之復古退不失采􅅔之守衛其策何上夫能御將帥}
  - {type: variant, offset: 273, length: 3, content: 甘苦同, WYG: 後能御豪傑能御豪傑而後能御夷狄審本末}
  - {type: page-break, offset: 273, content: '', id: KR4d0311_WYG_009-3b, image: WYG1175/WYG1175-0181d.png}
