  - {type: line-break, offset: 407, content: '', id: KR4d0311_SBCK_009-2a03}
  - {type: variant, offset: 411, length: 81, content: 實共長江聲明風采彪丙交映詩曰矯矯虎臣在泮獻馘江右以是期李公淑問如臯陶在泮獻囚江左以是頌葉公公名簣字景山嘗任太府少卿今直寶謨閣嘉定三年四月朔旦洪某記重築采芹堤記城東, WYG: 之於齊乃能逆料預計於}
