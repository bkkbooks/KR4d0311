  - {type: variant, offset: 11, length: 2, content: 勲名, WYG: 盛事百世知人之羙談不圖晚生親見前輩恭惟某官光明而亮偉端重而沉深望之儼乎道德之容挹之薫然仁義之澤驅千兵萬馬於筆下風雨恬霽而無聲吞五湖三江於胸中波濤舂撞而不動剸兕麻源之右掣鯨桂海之南清畏人知静忘物競其去也諸公挽留而莫可其歸也四輩趣召而後來甫躋郎省之華亟填戎垣之重秋風保障威行萬竈之烟春日耕桑驩動一犁之雨淮南倚以為脉山東}
