  - {type: variant, offset: 2666, length: 209, content: 規凢諸老退而無營曁衆正用之未盡大爲坯冶悉入蒐羅上關豐芭數丗之仁下應泰茅三陽之象爲今元祐嗣昔淳熈矧墮甑之餘生乃播鈞之舊物亟令剖竹靡俟需瓜歴吉日以問塗遡下風而委命丹心許國敢矜畫㦸之榮白髮倚門第想綵衣之樂兩全命誼一出生成謝制置崔閣學啓目送飛雲欲問吴頭之路手遮落日忽乗蜀尾之關告赤崖父老以天子之聖仁諭青羗種族以元戎之威信凢束衿而聽令皆彈指以知恩伏念某危機熏心老色上面拍銅㪷而舞角銳之習巳空摩石鼓而歌嗜竒之癖猶在惟鷽鳩不能以自奮, WYG: 典}
