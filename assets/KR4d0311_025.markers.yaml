  - {type: variant, offset: 3830, length: 2578, content: 其來諗杖杜之憂心孔疚知爾懷歸况家山正在紅雲之旁而菽水難供白雪之外俾趍北闕就養南陔所謂老者安少者懷莫非仁之至義之盡第閶闔護關之有虎蓬萊引棹之常風可恃而前惟繫所主三吐哺三握髮行窺上衮之光壹舉足壹出言永戴洪鈞之施過此以往未知所裁賀廟堂定䇿啓劄恭審以一代元勲定萬丗大䇿生靈有主社稷無疆嘗觀歴代之源流因攷置君之本末奉之冕服伊尹在太甲爲阿衡逆以干戈召公相康王作顧命凢邦家奕丗之慶皆宰輔得人之功秦不足言漢亦未善代王之入以太尉陳平何爲曽孫之立以將軍楊敞不與或外戚推擇於襁褓之内或宦官操制於掌握之中託周公行事者皆然如武侯用心者有幾以至晉聽之司馬之處分唐付之中尉之轉移倒持太阿擅弄神噐忠如狄仁傑中宗僅付諸人智如李衛公宣宗不出於己噬臍莫及搤擥徒多惟我熈朝若時元老藏書金匱定大業於兄弟之繼承漬墨水盂扶正統於父子之授受顧託之寄在宰相擁立之權歸朝廷大典具存盛事復見某官相先帝十七年之治培皇家億萬祀之休巍巍煌煌無逸太平之業濯濯赫赫崧髙中興之謀逮慿几之道揚重嗣服之付托謳歌之啓而人心屬暦數在舜而天命歸危疑雖深咳唾已定挈洊雷而出地獨恃寸心扶大明而當天盡出一手此蓋列聖監其志先正啓其衷用能奠九鼎於聲色不動之中于以大一統於觀聽惟新之始旂常徧紀鍾吕特書泰山喬嶽之俱崇長江大河之無極某委身坱圠拭目休明知宗祏之有依與草木而同慶然事莫難於謀始功尤重於圗終潞公老臣盡日立侍於少主之側魏公舊相一旦卷簾於母后之前有光昔人正在今日某下情不任踴躍慶快之至秘書郎謝廟堂啓虎落賦歸尚憶窮邊之戍龍飛入奏忽叨廣内之除當明兩作離之旦而兼収與謂一爲元之制而並下始終大造之力俛仰平生之榮竊以漢九種一百三家録嚴中祕唐四部二十萬卷藏冨弘文迨熈朝之煟興嚴列館之鼎峙上捜禹穴下采虞𥘉登其庭者道山日月之最華讀其書者瀛洲風露之亦飽乃若秩羙職清之選莫非見殫聞洽之材如某者識字亡竒用心徒苦日斜牛背慣從襏襫之耕月暗馬頭間問兠牟之役莫府劔山之外麗譙涪水之濵粗了官癡不改書癖伊川絶學巳箍匠之不存清獻髙風尚蒼頭之可語心折百牢之客路眼穿萬里之親闈第期西崦之還乃作東華之夢周章拜命勃窣趨朝天近五雲甫候紫宸之對地清群玉忽陪碧閬之遊左思于此而賦三都丗南由是而擅五絶歴觀作者深媿斯文兹蓋㳟遇某官定大計如隆興開皇極如元祐収召乆閑之耆艾韓吕朋來登崇未顯之畯良晁張輩出謂今奎壁之府自昔豫章之林國以儲材士焉養望遂下采於兎褐亦俾乗於鹿車某敢不澡雪精神於征塵没没之餘収歛身心於夜氣揺揺之後竹裏汲泉而煮茗花邊挹露以研朱端日將臨首獻三元之頌盛時親見尚賡七德之歌回胡判院啓曠度髙才方快景星之睹雄文大軸忽勤明月之投喜獲一麟盡洗萬馬恭惟某官壘劘屈賈灰撥隂何以湖海一生之豪爲京洛諸老之客流涕痛哭見於議論怒罵嘻笑發爲文章具眼非無其人壓頭終付之命黄金且盡長鋏猶存自昔聲名當三千而何啻祗今冨貴過五十以非遲某脫從煙霞來足風露枕書清樾之厎誰與喚醒拾落花之邊更煩舉似略兹具報幸甚鑒紆臨安諸友招講東山啓慕徂徠之餘風退安西崦引嶽麓之故事延致東巖豈不願一郷善士之交其如非諸儒名家之選莫當盛意輙誦淺聞蓋自兩楹之夢旣符一貫之學如綫以仲尼事有若安能無貌似之疑由子思傳孟軻所幸有性善之說迨秦熖之寖冷而漢塗之復開淄川言易濟南言書各擅專門之業賈逵作訓馬融作傳居多著録之徒雖穿鑿之未純亦發明之良苦㑹文有益温故冝師乃若泰北之仰昌黎衡湘之宗子厚頭童齒豁未免先生欺余哉之嘲耳拂心騷且有吾子見愛爾之嘆顧好爲之通患在善誘以疇能惟本朝五星之聚奎而斯文百川之至海自伊洛出有洙泗風氣象巖巖立盡三更之雪精神盎盎坐餘一月之春所謂賢希聖聖希天夫豈書盡言言盡意諸老信有功於後覺群英求無媿於前脩腔子裏盡惻隱之心貴加存養科舉外有義理之學不厭討論能自得於源流更孰加於模範藐如逐客老矣陳人乆忘東塗西抺之時未定南去北來之地辱拂黄龍之榻俾修白鹿之規端是借聾誠難起躄見大巫而怯敢危坐於虎皮從野翁者遊尚醉眠於牛背略敷梗槩切幾鑒紆再荅招講啓劄某伏承妙語申諭寵延曷月予還歸哉乆起故園之興吾年今已如此難陪勝社之遊况蝸涎不足以自濡而螢爝何堪於共照徒慙便腹多費解頥幸諸君之見寛容老子之省事窪樽西乳甘寂寞之漫郎石室東山付風流之太傅荐滕口說切幾心孚生日回啓戊子蒼顔五十三又逢𥘉度化身千百億揔是窮愁辱飛雙鳬來顧獨鶴開行厨於竹裏出妙語於梅邊爲留西日之隂待轉東風之信掛梢緑鳯夢何到於調羮啄黍黄雞盟尚㝷於煑餅其爲心感併得面陳生日回程宰啓己丑以墨梅并詩來牛奮其角閱良月之就盈鴻漸于干驚朔風之欲暮過勤掞藻加賁垂蓬某官學道愛人折節下士同出老先生之門而矜其不耦日奉太夫人之懽而念其有親欲回東里之春先寄西湖之信句隨香動格與幹髙照見百里奚飯牛之心冩出九方臯相馬之意戒以點白俾之守玄老我長閑敲棊聲於橘裏爲君細誦引酒興於梅邊生日回啓庚寅閱天地之數乆矣疑年對聖賢之書蕭然送日方嘆箕張而牛奮忽聞春發以鯨鏗笑桃李之争新許楩楠之耐乆詞髙戞玉意重訂金水調數聲恨欠雪兒之唱山光一帶願從詩老之遊占報斐然垂察幸甚生日回啓癸巳九年謫之賦不暇問天十月交之詩猶記墮地方擁山隂之雪忽披沁水之春醖藉不凢機杼自别以彼冨貴榮華之夢開此風流散誕之懷意氣重於斷金音調諧於佩玉醉喚盧仝之赤脚強爲我歌笑摩杜老之白頭莫當君賜其爲感著未易名言生日回呉季永寺簿啓乙未歳周六甲氣近一陽過辱髙情俯記𥘉度呉罡之斧修月出語不凢洪崖之榼留春拜賜殊侈琢磨以岷山五花之玉護養以峨眉千歳之苓愛之欲生永以爲好義襟特重莫訝卷錦鯨而還老眼尚明要看冠鐵豸而立復官謝廟堂啓新綸渙發宏開宥罪之科舊秩復還仍賦祝釐之廪與兩儀而同量控九地以知恩伏念某姿禀迂踈學問寡陋明主可忠言之日誼孰數之天下本無事之秋黯妄發矣冝坐反脣之律特寛擢髮之誅僅禠官聮俾安家食兒從郎罷拾柿葉以學書妻對藁砧然松明而理績凢此團欒之適莫非坱北之私以口語心引手加額第一日之去國倐七年之杜門户外屨空但有莓苔之徑床頭金盡况無𥝧稏之圩未問數百指碎累之煎熬可堪七八十老親之落寞居然待盡忽爾更生長樂宫之稱觴華夷同慶丹鳯門之肆青天地皆春大或漏吞丹之魚細亦振坯户之蟄洗之丹筆卑以青氊昔漁者争隈巳斷市朝之夢今廪人繼粟遂紓溝壑之憂靖惟平生盡出大造兹蓋伏遇某官手扶社稷心契乾坤卷卷乎緇衣之好賢休休然干旄之樂善謂四海之英雄豪傑悉歸籠絡之中豈一介之皦厲便儇不在涵容之數貸之衆人欲殺之始察之公論旣定之餘欲放一頭趣開三面搢紳相顧而動色簡冊大書而有光某敢不仰體包荒退思遷善歩虚聲裏疑從鈞天帝所之游知見香中期報佛地位人之德銘藏亡斁栞染奚殫, WYG: ''}
