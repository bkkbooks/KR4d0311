  - {type: variant, offset: 2510, length: 0, content: '', WYG: 如某者材非竒竒老已冉冉方虛憍恃氣安知培翁四句偈之有功迨拂亂動心始信竮山三字箴之得力眇鴻毛其自命蕞鷄肋以何求朅來刁斗之郷偶備櫜鞬之役既不能磨盾以草檄又不能推枰而畫籌第於内外臂指之拘攣與夫上下精神之消靡多所感觸為之隐憂顧國事以如斯於身謀而何有炎門耻炙㨗徑甘賖道之將行歟但居易以俟命人莫我知也欲忍窮而著書不圖負􅐿之秋乃有囘瀾之力未齊五鶚先獲一麟固非曹劉沈謝摸索以可知且無許史金張游揚而為助逈出望表猥塵選中茲盖伏遇某官翰墨大蘇威名小范黄髪兒齒入奉壽母之懽織文鳥章出寛聖主之顧以忠孝兩全之懿用文武兼資之才號召青齊指揮燕薊已斷匃奴之臂行漆月氐之頭與共功名孰非豪傑乃至嘘一寒之谷欲使脱七選之坑以勸着鞭以愧刓印偉此舉之尤特信所關之匪輕某敢不敬佩十六字之褒期答二三策之取丸藥生翼初匪求而得之瓣香報恩當有大於此者巻巻䘖戴切切敷敶謝權帥洪提刑薦啓騎揚州之鶴正切夢思冠楚人之猴忽叨論薦嗟世道之寖薄幸宗盟之有歸竊以絲苓同生於松而絲以苓為根渠荷皆出於藕而渠倚荷為䕃惟鼻祖源}
