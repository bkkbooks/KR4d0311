  - {type: variant, offset: 2511, length: 0, content: '', WYG: 之無間故耳孫枝榦之相依伏念某少耕潜山壯宦鄱水訪盤州之事業正印難傳誦野處之文章餘燈可續柰九京之不作竟千里之空還昔期芳菲菲而彌章今欲景翳翳其將暮不圖州牧出我世家蔚乎相扶日有川泳雲飛之樂劃然長嘯時窺山鳴谷應之機胡人事之方乖曽身謀之靡定㠶隨風引舟挾岸移長鋏自隨勃窣兠鍪之底短檠相對凄凉刁斗之邊皇華不隔於照臨吉語忽傳於吹送一鳬已去五鳯俱飛雖狄武襄之譜梁公大非吾偶然吕文穆之舉夷簡豈無他人出於真情有此竒事茲盖伏遇某官器能管樂苖裔韋平材恢恢乎辦多身矯矯其獨立山韞玉而自潤粹然有道之容水中凖則不争澹乎無我之意扶立故家之喬木挽囘末俗之頽波涕唾熱宫金玉寒畯謂族姓如晨星之有幾况主賔與春風而俱和置冗蹟於四賢借華衮於一字俾懋所學用昌斯文白髪聲名媿難齊於二陸青雲歩武尚自附於三洪深感於中姑陳其概謝賈制置特薦啓小單于之膽}
