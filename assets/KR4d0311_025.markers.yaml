  - {type: variant, offset: 180, length: 2, content: 五細, WYG: 海之中送靈槎}
  - {type: variant, offset: 183, length: 420, content: 目前鬰攸煽熖而薄京師熒惑吐芒而犯帝座仰占天意似應人謀朋黨漸萌未免向時一網之慮元良未定豈無異日半𥿄之憂波方急而維楫莫施證已壞而刀圭安在上深念此公有意乎恭惟某官道德宗師文章宿老太山之雲爲雨自有機緘虞淵之日洗光不動聲色方權姦之用事惟明哲以保身幾年出鄴侯以避元載之鋒一日進弱翁而正霍禹之罪雲霓盡掃宇宙復清五龍夾以飛旣展濟時之略四蛇入其宇𥘉無求丗之心鋤梅花之月於未春飲木蘭之露於將曉觀渠血指攅我醉眉然救否者莫謹乎苞桑而反剥者亦由乎碩果離當復合危可使平我公有衮衣以歸趣登上相天子負斧扆而立迄濟中興某渉道未深謀身更拙聊爾署冗銜於𥿄尾居然託後乗於遨頭矯詹峨眉太白之間知有東坡頴濵者在雖執鞭之晩矣尚捧研以從之蓋欲質平生書囊之疑豈止爲方來夾袋之地後天下而樂况曽協於寅恭安宇内爲先願無忘於辰告寸忱所屬百喙奚殫上劉閣學啓駟玉虬以征尚遲牀下之拜騎青牛而過敢後道傍之迎顧斯文千古以無傳而前輩百年之幾見熟窺梗槩粗識源流蓋自蜀公以來始有後溪者作其清明則青天白日其髙深則太山, WYG: ''}
