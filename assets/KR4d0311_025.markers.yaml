  - {type: variant, offset: 2484, length: 8, content: 夾袋夢想不到頂踵, WYG: 盛衰一建明係斯民之休戚時雖無闕事或可言士大夫懷寡廉鮮耻之風將帥乏趍事赴功之勇戰守之規模靡定賞罰之綱紀未張斜封尚費於調停横歛更多於朘剥惟正人用則國勢重於黄鐘九鼎惟公道行則人心安於泰山四維此皆前日之已言抑亦於今之最急願申谹議迄濟丕平當令文靖警君復聞於世毋使清獻之論事專羙於前狂斐一鳴隕越萬坐謝李坡舉自代并應詔啓草正元之諫疏既許同升應建武之詔書又䝉特舉人驚再推轂於朞月之頃誰信屢擊節於十年之前撫往事以慨然幸平生之}
