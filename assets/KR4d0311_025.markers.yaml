  - {type: variant, offset: 2497, length: 0, content: '', WYG: 灌畦自命媚竈不能忽起市虎無端之疑遂罹蹊牛已甚之禍丹心獨破疇能百口保之白髮相看安忍一家哭矣已甘墮地之棄甑不謂中流之得壺剪紙而招驚䰟探囊而起壞証雖乏洛北山人之譽亦備淮南幕客之員憐抱影之零仃為騰書之旁午六鰲連掣五鶚齊飛它人不足而我有餘大造已多而公未倦讓䕫讓龍而讓朱虎誠過乎謙進豹進鮒而進樂羊抑何其力所謂真知己者夫豈輕予人哉兹盖伏遇某官地望如山門庭似水萬斛轉舵運平國論之偏五色補裳彌縫君德之闕其正足以用大其公足以生明去小人如去稂莠不厭其芟夷愛君子如愛杞梓寧過於封殖引蔡襄而居同列有言必酬薦唐介而處要官弗進不已爰得魚而取掌仍騎鶴以纒腰曷勝自喜之情猶有無厭之請苦心選佛固慙衣鉢之傳凢骨登仙更乞刀圭之賜寸忱有屬尺楮奚殫謝制使李尚書舉改官啓謁裴度於洄曲之營最居人後抜杜牧於淮南之幕忽處衆先得之擊地而驚恍若從天而下竊以前輩所謂汲引孤寒之綆近世以為攀級權要之梯倚}
