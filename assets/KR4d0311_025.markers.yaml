  - {type: variant, offset: 615, length: 302, content: 本末權門鼎盛在熈寧自拔於熈寧聖化更張處元祐不黨於元祐以雞鳴嘐嘐之志追鴻飛冥冥之風去不可留歸猶未老廵梅花而索笑浩若胸中之春樹諼草以忘憂蕭然物外之樂盡醉於田父泥飲之頃相忘於舎者争席之間文章散落於人寰翰墨流傳於夷裔雖有詔以強起曽何心於復來然而一飯不忘乎吾君百方欲濟乎斯丗有關廟畫毎以驛聞宗磐未強首陳儲嗣事之十九䟽民瘼已亟次及條例司之數千言伏孤忠以直前犯衆怒而不顧亶爲仁者之勇兼得聖人之清天下之逹尊三孰如公者國中之儒者一其捨我乎賜劔履以給扶偉衣冠而入侍某遨頭後乗鉗尾冗銜毎思退續離騷之詞何幸親問太玄之字觀神和而氣定知目擊而道存自憐孺子倥侗毋惜一編之教更願老親強健亦如三壽之朋敬在下風有如皦日上安宣撫啓魚鳬蠶叢以來, WYG: 賦熟}
