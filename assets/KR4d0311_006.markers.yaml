  - {type: variant, offset: 1584, length: 3, content: 禮爲羅, WYG: 為刑罰以懲惡而挽之於善然善惡觀其所積欲惡之不積當於其始而禁之趾在下為行之始加校於屨而趾滅焉彼雖欲行而不可得則不進於惡可以免咎矣校足械也滅没也校深大至於没其足也或謂滅趾為刖刑刖則施踊何取乎屨有履加校非斷趾明矣唐虞畵象而民不犯特赭衣菲屨之類肉刑未嘗用也蓋}
  - {type: page-break, offset: 1584, content: '', id: KR4d0311_WYG_006-4b, image: WYG1175/WYG1175-0163b.png}
