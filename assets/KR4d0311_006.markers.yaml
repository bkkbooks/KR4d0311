  - {type: variant, offset: 1240, length: 332, content: 徑隨蘿薜上道人屋借竹茅封一杯旋煮山泉盪浣盡平生磊砢胷至日歡喜口號太平寳慶第三年萬乗𥘉郊大報天恰應漢家辛巳日八觚㤗畤立甘泉青城矗矗紫壇深碧宇無風掛斗參億萬蒼生齊合爪聖明天子得天心獨夜兩䆫明月一庭霜佛屋風鈴語夜長孤酌不多人易醒九囬腸付篆盤香雪留董景揚一色凝雲合大和定知冝瑞不冝多飢餐烏昧丗皆是飽進羊羔人幾何搶地折腰紛岸篠撑天強項獨庭柯留君待放晴光出同歩春風十二􅌪立雪立雪窮蘭若侵寒破驌驦雲迷山糊塗冰壓樹琅璫甕厎茅柴熟爐頭榾柮香樂天隨分足吾欲老田莊髙壷隱挽詩種德黄芽鼎陶心碧玉壷多交天下士幾喚竹間厨秋雨凉催讀春風醉索扶忽成觀化去冷落輞川圗山房藏書萬三千卷子有賦詩用韻門巷蕭然雀可羅藏山萬卷自研磨懶㝷玉女登西岳甘伴金僊坐𥙷陀書帶草長塵慮少鉢曇花放道縁多酒肴問字如相過引道松, WYG: 之}
