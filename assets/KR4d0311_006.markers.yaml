  - {type: variant, offset: 1627, length: 1, content: 法, WYG: 一念有不善貴乎早覺而力遏不貳過不逺復之功皆基於此覺之不早遏之不力則}
  - {type: variant, offset: 1629, length: 4, content: 㑹將佛祖, WYG: 舜就跖悔莫追矣觀易者知治已則知治人六二噬膚滅鼻旡咎象曰噬膚滅鼻乗剛也臣聞為}
