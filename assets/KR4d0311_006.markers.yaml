  - {type: variant, offset: 1634, length: 16, content: 時呵挽章冠叟卷却青雲靶書來意轉平, WYG: 卦之間者九四也初九與四為正應是同惡相濟者也膚柔而易噬猶初之為惡未稔而易制鼻高而難滅猶四之為間甚大而難治始噬者膚而終至}
