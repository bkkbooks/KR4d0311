  - {type: variant, offset: 3618, length: 9, content: 俄經震巽離盈虚消息, WYG: 凶無反噬尚何咎之有夫有間則有咎其所以能終免於咎蓋以得剛中之德以治間當其宜也六五本柔中爻乃}
