  - {type: variant, offset: 1651, length: 2, content: 斯觀, WYG: 滅鼻小懲於初遂大討於四也四之間去則初無與應小人之黨孤何能為哉乘剛言二位乎初之上乘初之剛以攻四之剛因瑕而及堅也蓋二居中得正以用刑}
  - {type: variant, offset: 1654, length: 2, content: 養知, WYG: 施}
