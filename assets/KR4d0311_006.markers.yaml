  - {type: variant, offset: 3124, length: 475, content: 作修文地下魁換骨法從青子得返魂香自緑隂來詩書根氣春無盡清白源流慶有開十二循環花瓣異信知天理有時囬鍾太君挽詩護額錦裁帕扶腰珠絡衣幾囬呼使進盡日醉言歸徑古梅成䕃堂深桂合圍重來無復拜春色黯斜暉鍾雲叔挽詩秋隼風神聳春雲筆勢竒人情方共屬天理竟難窺哭子零丁母啼耶婭姹兒落花飛絮急行道亦傷悲羅解元震龍母胡氏挽詩三丗不異爨一門皆力書此風今所少他行特其餘藻錡明䟽牖萱􅌪護碧除春光元自在遺夢杳安輿水牡丹都人呼爲雙魚花禁中呼爲紫𫀆玉帶花魏紫潜緋眞正紅天公不管老東風紫𫀆玉帶雙魚掛猶把䦨珊造化功東山塔影相輪髙挿碧霄寒好是如如不動山弄影翻光顛倒轉微權只在隙䆫間東西山二首西山許邁無人問只說東山有謝安冨貴光明貧賤晦丗情從古兩般看折屐碁邊情易矯捋鬚筝畔淚難禁何如拍手招元放玉室金堂深更深敬和老人寓舍鄒不辭三徙滕何愛一㕓典衣寛酒債乞米續炊烟勝敗供飛雹虧成付響泉東山時撰屨花厎弄潺湲午困故人書斷故山離義重惟窮到處隨無米胷中元自杵不蠶鬢厎却能絲消梅乞與嘲鹽貴苦笋烹來恠醬遲亡可柰何安若命午䆫􅑿得睡便冝再賦二首誰爲風光管合離緑隂芳草日相隨此身百丈牽三峽吾道千鈞繫一絲力戒盪舟君子适志期學圃, WYG: ''}
