  - {type: variant, offset: 2079, length: 663, content: 無錢沽阿芝亦解事低眉薦呉歈和雪肅容盛氣下璇霄不作投壷玉女嬌坡老堂前微撲面伊川門外驟齊腰得風還解掀天起帶雨纔能控地飄無限陳根生意動早看緑長後園焦寳雲庵戒師鍾山好住苦弗住䭾嶺難居眞欲居出地入天湏任我來今去古不關渠萬由旬上起膚寸一刹那間彌太虚識得鬘華雲體叚妙髙髙處坐如如戊子新元老人七十有詩自述敬和松鶴昻昻省見稀獨游汗漫友佺期光風霽日安排好秀水佳山闘飣竒嘉慶圗中身最貴耆英㑹上爵猶卑縱心境界天和聚一笑花開蝶滿枝用韻荅子有舊雨來人眼厎稀春風獨許共襟期斜川追古年年早曲水從今事事竒爛熳和詩齊少長淋漓被酒略崇卑驚回蜀道芳時夢花亞銀釵舞竹枝歳事山居歳事似羗村注瓦傾瓷酒半渾微麝和餳溲粔籹芳鳬夾薺斫餫飩阮生朱老情懷宻張丈殷兄笑語温簾外東風花信早更煩吹緑鬢毛根羅察院父瑞桂堂老僊方寸長黄芽百順薫蒸到物華移得廣寒宫裏種開將后土廟中花詩書根蔕聖賢脉忠孝馨香今古牙冨貴儻來餘事耳化工深意屬君家治平寺清音堂普門以眼聽觀音以耳觀謂得觀聽眞竟𬒳耳眼瞞瞎却觀音耳聾却普門眼萬法本來空蒙頭都不管君不見大藏五千四十八卷第一句如是我聞無着處春行百舌梢頭一半春日長無處着閑心推枰競欲投機早結毦誰知用意深梅子肧胎鹽裏味桐花擺布蜜邊隂東臯西崦行幾遍軟脚踉蹡索酒斟田家以二月二日晴雨占榖價枕上口占葛根巳盡麥方青延頸東來米價平怕聽三更三點雨要占二月二朝晴敬和老人青梅雪水迎風細作鱗青青又是故園春只知和鼎非凢子豈料升盤有苦人還我核來機轉熟寄渠花去意猶新側生厎事揺車頰空作漁陽一點顰社前一日點檢山房用呵字韻不論塌扱與婁羅判却風光屐齒磨老柳強顔翻拓跋新禽滿意奏娑陀山如欲雨何妨住僧, WYG: ''}
