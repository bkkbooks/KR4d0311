  - {type: variant, offset: 3628, length: 663, content: 諸隨盆栽菡蓞何時藕簷掛蜘蛛盡日絲左墄右平魂夢逺東崗西崦杖藜遲稜稜瘦骨蕭蕭髮恰與黄冠野服冝題李杜蘇黄像金鑾天子如天大九萬里鵬容幾箇㝷常溝瀆蝦䗫過紅錦宫𫀆空着破故書收拾歸去來倚杖斜陽唱誰和右太白風雲慘淡豺貙吼日憂無飯仍無酒秋來東屯熟八九舉家歡呼拍銅斗老夫欲釀兒欲炊老夫怕醒兒怕飢商量不下撚斷髭歸與汝母折衷之右少陵黒風撼海晨烏青海恠出没雲濤腥矯首獨立天冥冥保一以静吾清寧椰冠野服雙鬢星抱書自隨妙娉婷眼寒海南蜑家丁右東坡神爲驂騑氣爲車秋雲扶踈春風腴湯餅睡起茗椀湏意往獨與奚奴俱奴低頭笑公放懶不著書右山谷普照僧生雲軒雲閑閣巖芳歛空華谷響荅虚牝坐看白雲生㑹得無生忍雨來山出雲雨過雲歸海悠然天地間得此大自在夏至過東市二絶挿遍秧疇雨恰晴牧兒頂踵是升平秃穿犢鼻迎風去横坐牛腰趂草行漲落平溪水見沙緑隂兩岸市人家晚風來去吹香逺蔌蔌冬青幾樹花和黄伯淵閩人見寄二首流轉風光不暫違等無地角與天涯故人書到幾青李生面客來時紫芝窮裏埋頭傾啞酒凉邊趂手應盲棋寂寥簡短君應笑郎罷吟詩囝和詩錦埜西頭始識君便期堊鼻着風斤餘甘到厎有遺味薝蔔本來無異芬忽忽又弦凉榭月亭亭還合暮山雲玉泉道士窮於我也買新鵝約右軍敬和老人覽鏡西谷柴車手自巾風吹不到庾郎塵回光返照千江月復命歸根一點春永晝同䆫陶處士凉宵專席竹夫人徐公好醜渾休問認取青銅鏡裏眞又和憶可庵耐翁流慶徧仍來隨處烝嘗薦筍苔但認白雲飛一點便勝黄犢走千回屋山早露柤梨熟墓道秋風菊桂開父子相從歸展省豈無野水爲添杯次韻夏日秧青水白四郊同召雨無煩訪守宫槐葉煮􅡤隨市俗蓮花搗麴稱家風過從乆謝三千客嬉戯長娯七十翁巳是太平農圃老更揩兩眼看升, WYG: 剛}
