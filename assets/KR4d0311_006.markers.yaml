  - {type: variant, offset: 5241, length: 2096, content: 處琵琶推郤手舉頭啄木起林隈荅請事簡臘雪如席麥苗肥春雨如膏菜薹賤寧令前壁打後壁不將熱面塌冷面寓事六言飽鶩避弓横渚驚鱗透網平波一叚春光揺曵幾雙静眼摩挲次韻西山山深莫道得春遲雲漏晴光巳大竒夾徑幽香吹艾納隔林絶豔點燕支一川逺近迷漁屋兩市東西認酒旗錦野着亭坡老後曽來可惜獨無詩次韻遣懷不用憂春雨時來百草芳猫頭肥可臿雀舌嫰堪囊舊酒聞香烈新詩索味長櫻桃空落去吾老白雲郷挽元寂王道士盤隱早具眼栗齋仍點頭豐碑俱好在爛醉更何求院静桃開落林深鶴去留翛然風露表無處覔青牛古意條風從東來習習振枯槁美人倚䆫閨别思忽巳早兩句夢中得昔爲連理枝今爲斷腸草雞號天五更髮白不待老中春望後一日登玲瓏出郭暄欲暑渉林清自秋歩隨目力髙身與山氣浮飛來辛夷花拾得蓮葉舟一聲提壷盧四顧叢薄幽詰屈九曲屏突兀十二樓泉流澗級峻雲起峯隂稠左摩紫髯兕右拂蒼鱗虬牽衣憇更好擁䇿登三休上呼笙簫侣下瞰錦繡州豁落不平事消融無涯憂太極浩𥘉判此山鬰相繆幾人記曽來老苔蝕琱鎪玲瓏聽我歌歌徹玲瓏愁有酒且湑我羲娥雪人頭夢語麈尾御犢轅竹枝招羊車意足各人眼心合無天涯寳扇閑草蟲碧衫凉暗花茶䕷金沙厎清歌按紅牙醒疑不是夢夢到故自佳次韻娑羅花摩耶樹老無多子天女花妍有許般莫把東邊枝便斫堂堂留與碧霄干讀漢事病禹逢沈驁酣參事懦盈隂陽眠爕理天地醉財成河嶽瞢騰立羲娥蹩躠行無人能喚醒作意造升平粥罷昨朝隣家飯疊爼肉曁魚今晨自家粥單簋筍與蒲不爲昨而腯不爲今而臞面前有豐殺此腹只自如所以顔氏子簞瓢靡求餘識字行識字不用多識多反爲累結交何用深交深或中棄紫㣲有君房郎將得賔王胷無半點墨七襄亦成章票姚新賔客文園舊婦翁雖非平生驩冰雪生春容勸君五車不湏讀瞑坐蒲團養雙目作雲作雨手飜覆有時烏好丈人屋散䇿窈窕薜荔徑勃窣瞻蔔林六出無他香御此衆緑隂低頭拾摽梅齒老酸不禁仰看栗䑕度危梢與雲侵百舌巧滕頰時過聲自沉摶黍晩得意睍睆流好音水旁兩三家煮繭矮屋深午忙不暇饁荷鉏歸藁砧夾橋女蘿宻趍塢孫竹森仙人左元放拍手東西岑一氣地依天萬事古猶今溪山豈不好感槩霜滿簮前乎千百年有人獲我心後乎千百年知誰同此襟花獅雪氄吾家虥知親翰墨妍渇來趍研飲飽去枕書眠弄影窺清鏡収聲聽素絃最能持大體䑕輩任便儇老人賦鄭醫芝隱樓敬次韻鵲經心訣在鴻寳肘方全爲問春痟首何如夏脅肩樓居髙進月園渉細䟽泉學得種芝法疑君今稚川又敬和寓舍借得盧仝屋數間不爲太窄不爲寛胷中鵬背三千里膜外羊腸百八盤薜荔水中摽本逺菖蒲石上見花難麄茶糲飯隨縁過等作湏彌芥子看除妄酒泉能醉麽飯顆免飢不萬事得如願一生應莫愁凉風髙放鶴落日倒騎牛諸妄冰消盡吾師馬少游晚凉樛枝隂合翠熏籠曲曲斜斜石徑通窈眇蟬聲繰獨繭爲渠立盡晚來風迎秋熱不能堪又便秋天公厎暇與人謀形容如許馬非馬氣力幾何牛戴牛勃勃松梢雲片起琤琤藕葉雨聲留新凉收拾歸歌板鈿合金釵萬古愁敬和老人盆池埋盆作沼野人家數斛山泉拍兩涯人立晚風凉似水荷浮香氣勝於花蛙聲恰恰冝飛兩鶩影依依欠落霞齊物逍遥無大小不湏煩惱髮生丫喜雨一絶簡趙丞龍公有眼識英材好雨隨聲喚得來酒面添如田水滿眉頭放與稻花開古樂府用禮禪滅翁韻四黄金絡頭五花馬槲葉無風雪蜚野仰看飛鳥命中之好兮儇兮誰似者上蔡門望夷宫往事了不省引白春滿容嘯笙坎皷踏雪歸馬蹄不記來時蹤右公子遊獵河水湯湯公母渡爲妾言嗟未力公渡竟不疑雲昏風雨寒波深蛟鰐飢二十三絃悲復悲黄鵠不雙鸞獨飛右公母渡河桐春華竹秋霏蒼梧雲深人未歸烏八九子恣飛啄夜半飽啼山月落鸑鷟引孤雛腸空羽毛薄爲言増擊勿作遥吹參差兮共飄飄右鳯引雛羽肅肅鳴雝雝江南江北秋思同秋思中人無避處風酸月冷江流去鴈奴亦良苦群鴈不我馮夜深炬火滅復明舉網揜盡蘆花翎右鴻鴈行槿花露徑風籬取次芳朝榮暮悴付流光一秋朶朶紅相續比着人情大段長用主司理垠韻送别二首亨衢方四十滿謂乃翁如爲厎澼洸藥依然城旦書光塵風物裏消息事情𥘉束起東西玉功名冨貴餘蘆花秋摵摵征思斾悠悠歌吹莫愁國皷鐃熊繹州胷竒空盾鼻膽雋落旄頭儻有西風鴈頻書老故侯挽鍾孺人夫没姑嫜老年芳鑑珥新孤峯晴後雪碩果剥中春命義生無媿言容死未陳西風吹拱木雙劒合龍津挽阮宣義逢原父夜氣精神飽春風笑語酣脩篁森道北叢桂郁城南雨露榮三釡煙雲老一龕瀧岡阡上路秋思薄晴嵐獎菊二絶木犀滿送第三香交割秋光與後行細雨斜風籬下菊安排青蘂做重陽菰葉離披藕葉欹精神得似未秋時西風坐斷群芳路不屬黄花更屬誰章升伯妻孺人挽詩婉孌從君子青雲逺大謀樂羊燈火夜李侃皷􅎏秋露舄鳬迎喜星機鵲送愁誥花紛五色光動九原頭東山懷謝傅用禮滅翁韻金堂石室舊徜徉𬒳髮依然下大荒月送嬋姢華落蘂雲移縹緲濕踈篁桓伊筝外深情酒㓜度棋邊定力香往古來今開闔眼樓頭吹面朔風凉山中菰生米父老謂豐年之祥用子有韻秋風菰黍黑山崦罕聞之産瑞揺銀海占豐灔玉池芃芃秔合穗裊裊穄分枝却憶官張望嘗新薦一匙𥘉霜庭下曉來霜菰頓芭蕉折絡石瘦菖蒲獨抱青青節九州山僧房路突亭依石林凹渚見沙嶔危幾岣嶁深蔚似琅琊客勌驚寒思僧閑忘歳華兩䆫風露影一樹枇杷花挽俞致政徳藻父渉丗萬縁薄愛書雙眼明身從平處立道向拙中生啖蔗何妨晚栽槐恰待榮偈成投筆去天闊暮雲横挽銅里葉提點養性居士白用心承事黄春風花竹墅秋雨鱠蓴郷簡淡趍眞諦廉平絜義方誌幽無長語手墨粲琳琅徽州葉司理送冬笋凍雪晴邊白柄鑱浴泥扶出錦綳衫定知王謝家苗裔風味生來便不凢挽俞景梁億計橋門士輸君第一籌文爲, WYG: 至}
