  - {type: variant, offset: 385, length: 0, content: '', WYG: 而四亦剛}
  - {type: variant, offset: 386, length: 543, content: 郾城客對床如弟兄秋風雙鬢改落日寸心明終古方書在隨時局面更公餘經濟學講貫不嫌精晨起入夜風収雨遲明暖釀霜人窮髭易白地瘦葉先黄繡眼語叢竹畫眉啼斷崗炊烟猶未動吾亦起歌商敬和老人秋日山行湍險中回棹寛平處整驂雲峯環六六禪板占三三地冷梅枝北天空鴈影南真觀觀自性危坐讀書龕和子有雨中述懷畏塗險如峽中州蝮蛇倒退猢孫愁熟將義理自陶冩麄衣淡飯過即休邇來陽侯横造業兩涘莫辨馬與牛髙原低隰半爲壑下潦上霧昏人眸西風滯穗可能幾尚作饘粥餘冬謀如麻雨脚未肯斷便有餓死儒冠憂惟窮益堅老益壯更式相好無相猶縱爲溝瘠亦何憾多少華屋皆山丘環堵短褐陶靖節𣢾叚下澤馬少游平生耻作稻粱計好還渠不桑榆收東家夫子共此約一醉斷送黄花秌㝷梅揺落園林一再霜梅梢葉剰兩三黄蕾紅包褁春猶宻隔壠枇杷得擅香㑹心不是非心佛還疑有漏仙朝聞馳皷起夜候定鍾眠浴少衣偏垢遊多韈易穿祗將母不敬推倒野狐禪清虚堂六言爲浄𣑽僧作石澗寒泉霜曉竹崗霽月凉秋一炷銅爐栢子老禪破衲蒙頭挽萬登仕種德諌議竇處心承事黄池園花竹老庭户簡編香四丗環疊綵百年酣累觴紫㣲身不到丹墨付諸郎寄題眞相寺遥月堂仍簡禮上人四特遞盈闕八還齊闇明湏從心觀覔莫認指摽生地僻人聲逺山空夜氣清何時煨芋火相與聽瓶笙烏息隱山堂覔詩未出爲逺志出則爲小草請看耆闍窟幾年黄面老米積外科僧照源堂潜山盡頭孤峯嶭嵲布寳鬘雲雨玉珂雪, WYG: 頥}
