  - {type: variant, offset: 1588, length: 1, content: 寄, SBCK: 􅀉}
  - {type: variant, offset: 1588, length: 38, content: 寄禪䆫共講磨紅錦障泥飛騕􅒁黄金寳校琢盤陀冰虀薦飯郷風古雪汁烹茶雅道多領取單傳, WYG: 懲而大誡故能免麗於刑小不懲則惡積罪大聖人豈得而私宥哉其在人}
