  - {type: variant, offset: 1575, length: 8, content: 呵又荅景揚朝家乆, WYG: 力以退小人則君子不進夷狄為中國之間不用力以却夷狄則中國不尊姦民為良民之間不用力以治姦民則良民不安此皆噬之功所以致亨也以爻言之則三陽三隂為剛柔分以卦言之則下震上離為動而明以象言之則震為雷離為電二者參合而成章雷取其威電取其明治獄之道無大於此然六五為用獄之主乃以柔中之道行於上雖以隂居陽為不當位而治獄以燭見情僞為先離體虚中而明故於用獄為利夫獄者民命所係得其情則哀矜而勿喜欽恤之仁行焉茍不以柔治而以剛治則明過於察威過於猛人將無所措手足失天地大生之德矣噬嗑義在除間而歸於柔中以此知好生者聖人之本心用刑者聖人之不得已象曰雷電噬嗑先王以明罰勑法臣聞隂陽相薄而為雷相軋而為電故震之一陽動於下離之一隂明於中噬嗑之象取焉卦本先電彖象乃以雷先於電者蓋泰卦上坤而下乾不曰地天交泰而曰天地交泰取其交也噬嗑上離而下震不曰電雷噬嗑而曰雷電噬嗑取其合也電明而雷動雷行而電隨明與威合然後梗化者可去徒明而不威則詳於察姦而不能除其失也懦健威而不明則鋭於去惡而不能辨其失也闇明行以威威發以明天下無難去之間矣先王觀雷電之象於是用電之明以明罰用雷之威以勑法罰顯而枉直各得其情法勅而輕重各當其罪利用獄之道盡矣舜之去四凶成王之去三監孔子之去少正夘皆此道也然辟以止辟刑期無刑聖人豈徒恃法令為齊民之具明與威並用罰一人而千萬人懼法雖飭而不常用也雷電之合隨即開霽天道亦豈常用其威哉初九屨校滅趾旡咎象曰屨校滅趾不行也臣聞噬嗑利用獄初上為受刑之人人之性本善情動欲生遂陷於惡聖人憫之故}
