  - {type: variant, offset: 1659, length: 3, content: 亨梧竹, WYG: 序故下能治初之罪上能除四之間輕重有權尚何過咎之有皇矣一詩文王侵}
  - {type: page-break, offset: 1659, content: '', id: KR4d0311_WYG_006-5b, image: WYG1175/WYG1175-0163d.png}
  - {type: variant, offset: 1663, length: 4, content: 師友梅礬, WYG: 阮疆不過用輕兵以臨之而阮自服進至崇墉則聲罪致伐必是絶是忽而後已彼其剛戾梗化之罪雖同阮為易討崇為難討侵阮則膚之噬伐崇則鼻之滅聖人初意不汲汲於深治小人而終有不容不深治者}
  - {type: variant, offset: 1668, length: 7, content: 弟兄悲風吹夢逺, WYG: 其所自取也六三噬腊肉遇毒小吝旡咎象曰遇毒位}
  - {type: variant, offset: 1676, length: 11, content: 朽是郷評再用陀字韻煙霏, WYG: 當也臣聞周禮腊人掌乾肉腊物之全乾者也小人黨盛而勢強其堅難噬與全體之腊同三乘初應上而鄰於四疾小人挾黨為間欲盡除之然人之為惡情有淺}
