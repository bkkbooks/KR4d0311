  text: 平齋文集卷第十四
  hash: sha256:a3d334093bab59f12d6a466f156d01f3e9e84143dcc21d72c558f46eb91d348c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0311_SBCK_014-1a}
body:
  text: 內制一戒飭將帥撫恤士卒詔朕仰惟藝祖皇帝立國以仁制國以義撫軍馭軍恩威不相掩用能賦民養軍而民不憚整軍衛民而軍不怨經制一定國勢尊安慨慕風烈常懼弗逮間者惠陽建安京口髙沙之軍蠢為不靜以駭民聽雖怙終必戮迄伸邦憲而事非獲巳痛切朕躬夫三綱五常之理在人未始泯絶彼其忘平時撫養之恩背理捐生而以衛民者厲民豈盡本心哉有司奉令不虔故其病於掊尅而飢寒之不免困於力役而休息之無期鬱悒於沮遏而赴訴之無所殆非一日亦惟朕之不明有以敢之詩不云乎祈父豫王之爪牙胡轉豫于恤內而三衙外而列閫暨諸軍主兵官其各體至意上下交飭訓禮示信威以警其玩而恩以恤其私使人人自愛相安于紀律而國勢張時惟汝嘉狃故必罰朕不敢赦四川安撫制置使趙彥呐堅守邊關將士用命奬諭詔坤維國之上遊我髙宗皇帝暢威逺之略炳知人之鑒拔虓將玠俾扼賊虜出竒制勝隱如長城蜀固而國勢定於皇祖烈朕甚慕之蠢兹新虜荐食亡厭乃者窺我蜀關諸將嘗奮前鏖郤矣兹又涉漢沔以逞卿儒而知兵忠於徇國用玠勝算身為金湯駐軍于原上馮髙下臨熊卧虎視圍合纍旬而氣不折將士感厲用命人百其勇虜有後顧逡巡不敢深入卿之力也朕自聞卿犯危難控險阻每飯意未嘗不在原忽攬吉奏且歎且喜彼曲我直彼竭我盈乘神人之共憤鼓吾貔貅滌氛壒而空之勞士輯民治堡繕塞使西陲安堵如故母患有功之不見知也書曰汝多修扞我于艱若汝豫嘉卿尚勉之哉新除吏部尚書李􅐉辭免升兼修國史兼實録院修撰專一提領纂修髙宗皇帝正史恩命不允詔自史䇿散逸於鬱攸之後思陵大典正史迄今猶未脫藁朕甚懼焉卿以開物成務之材通今博古之識入儀于禁途國史實録俾參撰次具有家法兹既正厥職掌而炎興之醲綱懿矩所以維人心而永天命者併屬卿鈎元提要亟緒成之用副豫思皇祖烈之意典銓批勑精明有餘母以學稿思昏為解使太史公之業無傳也所辭冝不允福州觀察使楊鳯孫除安德軍承宣使依舊提舉佑神觀免奉朝請恩命不允詔朕躬御路朝永懷長樂既推恩猶子又推恩猶子之子所以隆罔極之報也矧卿文雅自將謙靜寡過尤慈扆所鍾愛進之留務佚之祠館雍容家食以奉其親可不謂榮乎昔隂馬氏以恂恂丗厥家用能龜紫傳襲與國同慶尚祗踐之奚辭為所辭冝不允端明殿學士崔與之辭免除廣東經略安撫使兼知廣州恩命不允詔朕惟先朝以韓琦守相范仲淹守蘇德選也然擁旄里第於安平無事之時孰與即家宅牧而分憂寄卿風節在朝廷威名在夷狄朕之韓范也頃辭聘召佚老海濵悍卒嘯凶薄畨禺幅巾登陴赤心諭曉衆狙屏氣宵遁賢者有益於人國如此就鎮鄉枌全護海嶠家國一體孰如卿冝矧弭盜於淮郤寇於蜀沉深有逺略為我強起可也士君子行乎蠻貊易行乎州里難愈近而愈不可欺卿忠信篤敬積孚於州里推之可以孚蠻貊梟音之革奚難哉即日建牙四履歡舞朕方嘉卿勇義而識變巽櫝非所樂聞也所辭冝不允從臣李􅐉等乞將所得俸給減半幫支不允詔朕承丗治垢敝之極楮輕物重公私交愈夙夜不皇寧惟昔司馬光有言撙節用度冝自上始故裁濫約冗興于眇躬而大臣祈歸賦祿之半蓋錢榖之問方棘相與警勑貶損以圗其闕非以是為可𥙿吾國也卿等誼深體國援比有請其未諭朕志乎夫損貴酌損節戒苦節惟時之中尓知厲羔羊五紽之風豫乃蹈權輿四簋之戒國雖未𥙿何至是勉思大計之禆母徇小廉之執所請冝不允中大夫真德秀辭免資政殿學士在京宫觀兼侍讀恩命不允詔天之生賢不數其得時行道亦非偶然者朕以王佐器卿於十年之前儀圗共政所以承天祐慰人望也平治之機方開無妄之疾來諗當饋重歎天豈虛生是賢哉惟大學一書卿推致知格物之理啓沃甚悉而未竟其以祕殿內祠養疾闕下少間則勸讀于邇英卿獲專意嗇衛朕不失佛時仔肩之益而大政易於咨訪是為兼得天壽斯文何恙不巳股肱嘉哉母輕於去朕所辭冝不允光祿大夫右丞相兼樞密使鄭清之再上奏劄乞從鐫罷居家待罪不允不得再有陳請詔國朝管軍於三衙本兵於宥府務立上下相維之制使知少長有禮之風故服事有階而犯法惟劒是關國體可忽廟謨卿具守文應變之長得禁暴和衆之略謂平陸失伍固訓齊之久隳曲梁亂行抑驕駻之難制恩威並用紀律復張顧倚成之方深胡引慝之荐至乃腃周公之輔克綏洛邑之頑豫以敉寧武功每思艱而圗易我惟無斁康事迄欲去而復留冝體朕心勉安厥位惟京師南北軍之置必謹惟羽林左右衛之選必精益奮乃庸茂躋于治尚奚罪之待所請冝不允不得再有陳請知院喬行簡參政曽從龍樞密鄭性之同僉書陳卓再上奏劄仰祈明罰居家待罪不允不得再有陳請詔維國大勢如人一身病之受也有源證之發也有候粵從債帥莫制驕兵但知畏不識之煩曽靡見光弼之整適當其弊乃在于今卿宣弼諧之勞懋綏靖之畫虎兕出於柙知干戈之可憂牛羊反諸人念芻牧之有在抗章自劾陳義甚髙維開寶川班擊鼓之時與慶曆衛士踰垣之日股肱未嘗引咎精神自能折衝勉殫訏謨奚事挹損所請冝不允賜宣奉大夫知樞密院事喬行簡辭免除兼參知政事恩命不允詔存養固則智識明閲歷深則謀慮逺此朕倚重黃髮之意也眷留樞管數日一朝帷幄大議瞭如蓍蔡維我隆興淳熙軍國一體典宥密者必參大政安有文武兼資之老猶未與聞萬微之務乎命從中出既喻朕心何嫌何疑而欲引避况天下之弊莫大於因循姑息朕寤寐治道茫乎涉川卿其與丞相同心協力濟斯丗于艱以副責治之切施置罷行之得冝則轉移興起之有漸矍鑠是翁謹勿憚煩也所辭冝不允知院兼參政喬行簡辭免權監修國史日曆恩命不允詔春秋修魯史之舊以事繫日以日繫月而書法著因書法以求聖人心法不在巨儒乎卿學優柔而饜飫文贍直而詳核軍國訏謨之暇振挈綱領錯綜注記襲六為七而作一經蓋浩乎沛然也矧自薛居正以來執政總統尚矣其母以兼三為解而曠大典所辭冝不允光祿大夫右丞相兼樞密使鄭清之乞解罷機政不允詔朕永惟萬務之統在一相相安厥位然後可圗社稷之安丞相蚤以天下為己任弼豫親政期砥丕乂謂宿弊沉痼勢難遽起而正氣寖還徐當自愈用能虛心無我聚衆賢於朝拔茅而泰盍簮而豫朕日夜望之遽以孤危祈解機政中流捨濟川之楫可乎天下之理一公可以勝衆私一敬可以勝百邪益既乃心終輔台德母使國人謂朕任賢之或二也所請冝不允光祿大夫右丞相兼樞密使鄭清之乞俾還故里不允詔乃六月庚寅召對宰執于便殿咨訪庶務漏過午太史奏日有承氣其占為臣承君其吾相開心布公率同列以承弼厥辟之象歟諄切諭留既還需牘越四日癸巳仍以去請殊咈朕懷周公聖人也群情猶不能遽孚其欲去迄留輔成太平之業為文武申固天命也朕於卿一體無間而明農之志浩不可遏縱不念公無困哉之訓獨不為前寧人付託之重奉幣供王以祈天永命呼慶曆之車主必行元祐之舟戒偏重卿既得之推是心以往何治不濟國步方艱而捨去天下其謂卿何其謂朕何所請冝不允光祿大夫右丞相兼樞密使鄭清之辭免授特進左丞相兼樞密使恩命不允詔元祐更化一日制下命二相吕大防為左范純仁為右而大防之宅左凡七年君臣之際盛矣哉朕遵晦養蒙之久嘉與群生共躋新美得卿舊學相我親政壅者迪之仆者植之憊者翼之大明當天群隂盡伏靡容光之不照卿之力也左揆虛位有年如人身之股肱何可偏舉故進卿以首相兼總文武之柄且選於衆得耆俊以助之朝夕納誨夾輔台德庶幾元祐之盛撝章來上乃以寵榮為懼而求歸老卿豈人爵所能榮哉得位與時憂責彌重勉殫金礪之益迄成玉鉉之功獨善非所望也所辭冝不允宣奉大夫知樞密院事兼參知政事喬行簡辭免特授金紫光祿大夫右丞相兼樞密使恩命不允詔帝王盛丗左禹而右臯左周而右召用能濟登雍熙泰和之治本朝稽古建官並相非一權臣專國則獨相如彼其久可不變而通之乎卿直大無競心老成有逺慮方威柄未還他人所不敢言者每雍容造膝歷言之簡在朕心知為宰相器逮更化共政而益信進升次輔仍斡樞極蔽自夙志倚為蓍龜謂冝亟展經綸之藴副豫望治之切顧猶以衰病諉大廷朝會進趨襜如拜起翼如搢紳動色相慶謂少壯有不速精神折衝奚難哉書曰若濟巨川用汝作舟楫其勿辭所辭冝不允權禮部尚書魏了翁辭免兼直學士院恩命不允詔戊寅並命二相越翼日己卯便朝同班奏擬首以卿進曰號令文章有國之精神禁林虛直非了翁不可朕喜於得人亟俞之卿久困排根趣還禁近學益老文益偉戞摩三光斧藻萬象沛乎有餘思以是而草內命孰謂典誥之逺母多遜也所辭冝不允喬行簡辭免提舉國史實録院提舉會要勑令經武要略恩命不允詔房元齡之監修國史實録崔鉉之進讀會要與蕭何之次律令魏相之知兵略皆宰相職也卿以名丗鴻碩爰立作相內外萬務蓋無不統矧簡䇿之記兵律之志乎維是諸書事嚴體重設官分纂曠歲未就非老於經制述作之學總提其綱要諸儒將奚所折衷而收汗青之功哉國典有常巽章良過所辭冝不允金紫光祿大夫參知政事兼同知樞密院事曽從龍辭免除知樞密院事兼參知政事恩命不允詔乾坤以六子為用而化功成朕同日命二相又同日命四執政六子備矣卿以凝重參大政以深沉贊廟算履正奉公言可砥績朕簡注蓋深進管五兵之寄仍預萬微之務夫豈以序遷為卿榮天下大勢方厝火於積薪朝廷逺慮冝徹桑於未雨討諸軍國一日不可緩也抗章祈免欲别求文武全材而用之孰有加於卿者乎既深多事之憂母徇一謙之執所辭冝不允端明殿學士太中大夫簽書樞密院事鄭性之辭免除同知樞密院事恩命不允詔慶曆以韓琦范仲淹為樞密副使士大夫酌酒相賀朕思見其人若飢渴卿氣明而抗志逺見定而慮事精列在宥府隱憂更切指陳可否多中肯綮進參樞管之嚴增壯精神之本待之優乃望之深也卿能以琦仲淹自勉則何巽避之有所辭冝不允端明殿學士正議大夫同簽書樞密院事陳卓辭免除依舊端明殿學士簽書樞密院事恩命不允詔朕即政之七年嘗命舊德為同簽書尋進簽書今右揆是也故甚重其選卿廉方足以起懦謙毖足以壓浮擢聮宥密訏謨備究如玉在山隱然邦家之光循序而升寵數非過深長邊瑣之思懇切籌帷之助朕所以進卿者未艾也懋哉母格成渙所辭冝不允權禮部尚書魏了翁辭免兼侍讀恩命王人求多聞以建事朕自親政以來宏開氊厦詳延儒雅性命道德之奧治亂安危之機所聞多矣卿何相見之晚耶一命而典禮再命而儤直三命而勸讀蘇軾在元祐嘗兼之惟卿為允平居之所講切憂患之所論著本末該貫從容前陳朕將虛心以聽尚奚辭權禮部尚書兼侍讀魏了翁辭免兼同修國史實録院同修撰恩命不允詔西狩絶筆遷固獨以良史稱逮唐魏謨領起居注人主索觀之以兼書善惡不奉詔厥職舉矣爾系出於謨論議挺挺猶有證之風烈紬書史館裁成一代之典疇不謂冝况為望郎名卿為柱下史皆嘗執簡纂次今顧以大宗伯參紀録之職而辭乎往欽哉書法母隱所辭冝不允光祿大夫新除左丞相兼樞密使鄭清之辭免特進恩命不允不得更有陳請詔朕惟説命之進于王立政之教厥后既交孚於志慮必共訂於規摹無言不酬從欲以治卿學足以正人心承三聖材足以經邦國紀萬民進躋上宰之班增壯中朝之勢牢辭欲去力挽乃留歷歷乎奏牘之數百言卷卷乎治道之十餘事上勿搖於疑間下自絶於依違開元要説之姚崇彼何取尓正觀勸行之魏證是蓋似之方堅此意以責成必踐乃言而砥績胡為卑牧猶遜崇賢雖賜位之加隆實懋官之冝厚矧乾道並命之盛典即元豐改制之首階匪朕敢私惟人是稱亟對揚於休命母過事於撝詞所辭冝不允權禮部尚書魏了翁辭免兼權吏部尚書恩命不允詔朕謀廟訪落之始卿以嘉猷入告曰王位在德元厥亦惟棐民彛用懌寧人受命實獲我心無人乎子思之側不我留也間去而嗑惠然來思敷奏以言亦克用乂方將迪簡在庭偕庶明翼于朕躬以春官行天官事顧以為大介賚尓耶惟寅斯清惟公斯明卿蓋𥙿於率屬母違朕所辭冝不允兵部侍郎淮東制置使趙葵乞罷黜不允詔維豫前寧人經德秉哲咨乃父宅牧于江漢匪舒匪棘肆敉寧武圗功逮今靡間言良用嘉歎乃者錫一惠之諡以忠冠肅亦惟旌往勸來庶幾丗有不二心之臣服勞于王家卿佩教忠之訓奮志孔武朕推心任之整淮浦之旅雪崤函之眚奄觀後效顧以群疑自鞠自沮何耶夫簡物議者喪功之本畏人言者進德之機攬卿來奏謂忠孝有聞憂懼無所且重感於惎間不行之子儀繼自今其知所進矣呼秋風戒寒嚴車攻之修備謹采薇之守衛以張吾國而昭乃辟之有乂睽疑何有哉避歡祈免非朕樂聞所請冝不允端明殿學士太中大夫廣東經略安撫使崔與之再辭免除參知政事趣令就道恩命不允不得再有陳請詔朕慨念為君之難儀圗耆壽俊共政用康保民以長我王國詔書屢下申之親札致敬有禮視安車蒲輪為加厚卿抱道俟時可幡然起東海之濵矣巽章至再陳義何切范鎮年未及謝事而休致在元祐固不以為矯獨不思文彥博起於既老之餘力扶丕乂豈徒為保身之哲耶夫麒麟鳯凰之出百鷙率服以其德非以其力也卿旅力雖愆精神逾徑坐而謀國必能折姦弭慝翼朕攸濟維日望之強飯就道母憚于行所辭冝不允不得再有陳請寶謨閣學士正議大夫提舉江州太平興國官余嶸乞俾致其事不允詔華髮舊德壯猶元老有國者所甚重故朕親政以來樂得耆哲是馮是翼兆渭水以奮庸起海濵而共政經闈史觀亦參列備咨訪安有先朝名法從老於學問政事如卿而簡拔獨後乎顧卿牧御湖湘積勞嬰疢姑俾均佚祠庭嗇精神以俟用兹攬來章祈致厥事惻然宿恙之未平也知止不殆抗懷固髙渴想儀刑詎容得謝其務玩勿藥有喜之象以康乃身佇嘉謀之入告所請冝不允太中大夫權禮部尚書兼直學士院兼同修國史實録院同修撰兼侍讀魏了翁乞賦祠廩不允詔靺鞨不道闖我蜀關卿伯氏杖使者節乘沔誓不與俱生而死之朕䀌然歎嘉詔褒金城之節以勸忠且以紓卿孔懷之戚而請祠欲西將進至荆夔與父老謀救鄉國陳義甚髙昔漢嘗有事于四方馳傳諭蜀屬之司馬相如汲黯則留以自近山立玉色姦宄奪氣功出大將軍上本強則精神折衝故也卿其圗濟乃辟謹勿言去有勝算亟入告所請冝不允禮部尚書魏了翁辭免慶典轉一官詔緇衣之冝兮敝豫又改為兮好賢之心無斁也卿曩以言去國非朕意更化入儀槖從直諒之氣不少衰朕愛其有元祐諸賢之風既還銓簿之四階兹又進慶典之一秩眷隆恩浹豈以周南留滯為間哉夫天爵之尊固無慕於人爵緇衣之好朕心庶幾焉其母過辭所辭冝不允知樞密院事曽從龍辭免樞密使督視江淮軍馬恩命不允詔朕承艱難之業昧綏御之方蜀既𬒳兵襄復告警長淮大江風寒之備孔棘元戎重寄安危惟人然自昔康時濟丗非便儇皎厲者所能為此截截善諞言秦誓所以重悔也卿沉深如鄧禹鎮靜如謝安始對延英首以佳兵為戒識慮逺矣共政逾年威重有體朕知可屬大事時方多壘輟股肱之臣以盡護邊將國有令典便朝咨卿勉為朕往卿既許朕矣而猶以取具臨時為解夫軍國一機內外同體措置得冝精采立變走符堅於肥水折佛貍於瓜步盡在卿指縱之下母留成命佇奏膚公所辭冝不允權禮部尚書魏了翁辭免除端明殿學士同簽書樞密院事督視京湖軍馬恩命不允詔可大之業由事而生此功業所以見乎變也蠢兹黠虜窺我蜀襄朕慨事變之方來一日建兩督府於江上使聲援相接以全制勝卿學洞古今安危之略識照夷夏盛衰之幾眷知特深讒惎莫間趣進參於樞管往盡護於上流成命一頒江漢重湖巳隱然有虎豹在山之勢顧以軍旅未學辭何耶中軍謀帥必本之詩書禮樂萬里戎情亦惟儒者能料之文事武備不容異觀也集思廣益之有加保大定功之可必亟究真儒之韞母遲先乘之行所辭冝不允同知樞密院事鄭性之辭免兼參知政事恩命不允詔軍國雖有異容文武𥘉非二道屬時多故輯我衆謀召虎來旬來宣既出揔徹疆之寄山甫令儀令色冝進參賦政之規卿學術深明氣度軒豁蚤培逺業嘗有志於著鞭晚簉邇聮猶不忘於運甓居切風寒之慮圗為隂雨之防適當東府之暫虛爰藉西樞之兼領雖相與經綸於萬務何以假為然熟觀酬酢於百為自此升矣勉殫忠益奚事勞謙所辭冝不允權工部尚書兼知建康府陳韡辭免刑部尚書沿江制置大使控扼長江往來武昌巡視恩命不允詔西陵之至江都俱切風寒之護建鄴之控天塹尤嚴王氣之占方邊遽之孔殷冝中權之增重卿弘深智略沉毅威名自膺留鑰之司備舉戎旃之務賢於長城矣既髙閫外之謀豈憂胸奴哉何吝師中之寵常伯申加於妙選制垣仍進於大名寧於卿榮徒得君重盍亟講於勝畫母過為於遜辭乃若上流更資巡視之勤陪都恐有空虛之慮肆披來奏式契朕懷况西府盡護於列屯北門母勞於行役第江流之絶警暨海道之無虞寬豫顧憂維尓成績所辭冝不允端明殿學士提舉萬壽觀兼侍讀李􅐉乞賜骸骨不允詔卿宿學深於造微壯略優於經逺簡知惟舊禮遇特殊專紬石室之藏首勸金華之讀班升書殿恩視政塗示委曲以貪賢俾從容而獻可胡為陳力婁欲乞骸豈齊王無以留孟軻抑魯公不能安孔伋致煩耆德遂起遐心朝無白首大儒則內勢輕國有黃髮良士則外侮息當此艱圗之日豈卿得謝之時母以兄弟之子而嬰其心勉為君臣之義而安厥位所請冝不允寶章閣直學士太中大夫提舉江州太平興國宫史嵩之辭免除華文閣直學士知隆興府江西安撫使恩命不允詔南昌為江湖間一都會蠻荆甌粵左控右引形勢今猶古也必得威望夙著者宅乃牧以卿抱應變之材懷經逺之志分閫京峴厥有勞績故進媯閣之直起家以鎮之顧以親年喜懼辭往來擊鮮獨不可耶亟其入覲朕將臨遣所辭冝不允太中大夫同知樞密院事兼參知政事鄭性之辭免同提舉編修勑令恩命不允詔道者立治之本法者制治之具成周盛時冡宰以六典八法八則治邦國都鄙官府必有掌其二者重成憲也我朝勑局之設總以宰臣二以執政蓋此意卿冨博古通今之學茂致君澤民之志擢副樞管進翊政枋凡前律後令著在簡䇿參舉而科别之非卿誰冝為有次律令之蕭何則規摹宏逺有奏故事詔書之魏相則品式備具而况以三代之佐修三代之法乎分職有常引避徒贅所辭冝不允端明殿學士提舉萬壽觀兼侍讀李􅐉乞歸田里不允詔岷峨江漢之英靈鍾為人物其萃在本朝莫今為盛而德爵齒之俱尊孰有過於卿者纍章祈去挽留愈力朕豈私卿哉一陽在內衆陽朋來留卿所以聚坤産之珍為邦家之光也矧蜀警未弭思卿疇昔控禦還定之功猶未大暴白於時儻聽之輕去人謂朕何卿以禮義廉耻而自砥礪朕以耆壽俊在厥服而加縶維冝體貪賢之心益究格君之學所請冝不允不得再有陳請新除端明殿學士太中大夫同簽書樞密院事督視京湖軍馬魏了翁辭免兼同提舉編修經武要略恩命不允詔國朝以武名書究鶡冠黃石之旨則有神武袐略采留侯揚僕之制則有武經總要三朝控禦之方則有經武要略阜陵規恢之志則有武經龜鑑而經武要略為尤重創業中興之宏模懿範皆在焉編剗以儒臣提綱以宰輔尊閣以樞廷其來尚矣朕方整軍修戎以折衝固圉既進卿翊本兵於內又屬卿視成師於外而是書命以參掌凡兵制邊防而下發金匱之閟藏續玉鈐之會稡昈分彚輯熟訂詳施職也亦時之冝也卿胸蟠四庫神斡五兵筆力所至挾雷霆而驅風雨奚遜為所辭冝不允侍御史兼侍講李鳴復辭免除權工部尚書恩命不允詔朕撫艱難之運而求治越拘攣之法以用人苟得非常之材可無不次之舉卿頃階卿列峻陟臺端蔚乎直其正方其義之風挺然剛不吐柔不茹之操力扶國論密契朕衷兹繇耳目之官超進喉舌之寄蓋中興百年所未有也侍從職在獻納何事不可言卿其母以言責官守為間祗若豫命所辭冝不允平齋文集卷第十四
