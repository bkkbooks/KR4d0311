body:
  text: 外制二諸王宫教授蔡仲龍除太常博士制勑具官某奉常禮樂之司王政繇出朕方起耆儒為介卿以備諏訪博士參之冝得賢爾仲龍醖藉其學詳雅其度楷模宫邸蔚有賢聲端委佩玉据經以訂損益之文折是非之議蓋𥙿如也彼度吾所能行而遷就焉朕安取此可太社令季晞顔除大理司直制勑具官某三尺法枉於舞文吏之手朕甚憫焉必得古之遺直而後可為邦之司直爾詞藻有華業履有度所居官惟法守是謹以是議法於廷尉不撓不折不僣不濫而王道行皇極立矣枉已未有能直人則孟軻之戒可敷文閣學士李􅌫明堂恩加食邑實封制勑朕搜儀先甲蕆祀上辛賦思齊之詩慕親方切稽我將之頌饗帝尤嚴恍三靈之宴娭遒百祿之來下有懷時彥冝錫神釐具官某學博而識明氣全而節徑螭頭去國望久鬱於論思豹尾行邊功獨髙於綏定屬大權之親攬務衆正之詳延首告李泌以束裝欲為賈生而前席正深樂只冝亟來思維昔宗祈敷時餕惠駿奔百辟曽齊胙之靡遺燕衎一賢胡魯膰之未至肆疇采邑仍衍真畬爾母謂萬鍾之何加朕未嘗五秉之輕與懋承顯渥入告嘉猷可戶部侍郎京湖制置使史嵩之明堂恩進封鄞縣開國子加食邑制勑朕搜儀先甲蕆祀上辛賦思齊之詩慕親方切稽我將之頌饗帝尤嚴恍三靈之宴娭遒百祿之來下有嘉邊最冝錫神釐具官某賦頴脫之才抱輻湊之略從塗融顯侈丗業於韋平制閫崇嚴聳軍聲於羊陸惟四履遐烽之絶警故九筵精意之潜通禮既砥於熙成福寧容於專嚮爵升蒲璧户衍畬圭帝命式于九圍朕既荷受球之寵天威不違咫尺爾母忘拜胙之恭懋暢英猷對敡景况可徽猷閣學士新知太平州鄒應龍明堂加恩制勑朕搜儀先甲展采上辛賦思齊之詩慕親方切稽我將之頌饗帝尤嚴恍三靈之宴娭遒百祿之來下有懷夙望冝錫蕃釐具官某學擅倫魁望髙法從居易以俟命𥘉無徇丗之心充實而有輝未究濟時之藴試望之於馮翊得汲黯於淮陽雖廣合宫之詢尚遲宣室之見維時熙事丕舉慶條肆加多邑之榮庸示名藩之寵綏我思成者在於溫恪介爾景福者由乎靖共懋展英猷對敡休渥可華文閣學士知慶元府余嶸明堂恩進封信安郡開國侯加食邑制勑朕搜儀先甲展采上辛賦思齊之詩慕親方切稽我將之頌饗帝尤嚴恍三靈之宴娭遒百祿之來下有懷宿望冝錫閎休具官某學擅名儒材優法從長沙之稱吳芮久藉蕃宣東海之得翁歸更需鎮撫雖緩受釐之訪靡忘籲俊之思乃眷明禋迄成熙事餕惠下逮於輝胞之賤脤膰上親乎族姓之尊豈繄時髦可後祭澤肆進徹侯之重仍加采邑之腴綏我思成在於溫恪介爾景福由乎靖共趣懋展於英猷用對敡於休渥可楊汝明聶子述明堂進封加食邑制勑搜儀先甲展采上辛賦思齊之詩慕親方切稽我將之頌饗帝尤嚴恍三靈之宴娭遒百祿之來下有懷宿望冝錫閎休具官某業擅名儒材優法從騎星辰於奎閣步武寖穹挹風露於珍臺精神更逺屬改弦而更始每前席之興思乃眷明禋迄成熙事餕惠下逮乎輝胞之賤脤膰上加乎族姓之尊豈繄時髦可後祭澤肆肇開於公社仍申衍於爰田雖舉邦彛實均帝社豫靡忘於寅畏爾母替於辰猶可吏部尚書崔與之除端明殿學士提舉西京崇福官制勑節誼天下之大間而厲其節者在人主德齒天下之逹尊而褒其德者在朝廷朕眷懷東海之濵夙著南陽之望渴於見晚趣使來思顧抗志之何髙冝疏恩之特異具官某純明而積學靜定而善謀東撫淮堧制勝紛拏之表西馳蜀道計安震擾之餘乃寧考簡知之深豫冲人注想之切遲十年之圭覲洊一旦之旌招戔戔之賁丘園儀圗共政囂囂之樂畎畒懇請辭行屹砥柱於患失之波巋靈光於戒得之境勉從雅志丕振髙風維元祐諸賢之方來獨范鎮屢召而不至進承明之祕殿領崇福之殊庭兹復見於耆英冝一循於優禮鳯翽翽而亦集爰止朕雖阻於儀刑駒皎皎而母有遐心爾尚殫於訓告可華文閣待制江西安撫使陳韡除權工部侍郎兼江西安撫使知隆興府制勑政令寬猛之中而後有苻澤之姦民困飢寒之迫而後有潢池之盜鉏萌芽則力易圗滋蔓則功難有嘉討捕之勞庸示褒遷之寵具官某忠以體國儒而知兵遏淮冦之鴟張威名蚤暢殄閩凶之螽起籌略更髙緑林動於循梅黑祲被於汀贛跳梁莫制震蕩靡寧朕合三道而建元戎爾鼓諸將而鏖劇賊訪鴻鴈於棘矜之下追狌鼯於篁竹之間左翦右屠而禽其良既大懲於弗靖下管上簟而安斯寢遂咸樂於有生以數年宣力之勤砥一旦成功之偉冝進班於起部仍宅牧於洪都勉為朕留益振如虎如貔之氣盡除民蠧永凝買牛買犢之風可大理寺丞鄭伯謙差知常德府提舉常德澧辰沅靖州兵馬制勑具官某武陵枕重湖帶五溪民夷錯處牧御匪易必熟知德意者往綏之爾厚而不浮莊而不撓正于廷尉惻然惟恐一民之冤德意蓋熟之矣出布藩條旁制四郡奉法循理以康乂民夷俗亦將聞風而帖服本正則末治也朕方以責實課吏爾求為可知嗣對光華之渥可復中大夫直龍圗閣致仕季衍特贈通議大夫制勑具官某天未有久而不定者士君子所以不急乎人之知而蘄乎天之知也爾公而忠廉而直所至厥績用茂顧以間退終人勝天乎朕思起事功於積弛而才之難九京莫作良深悼歎既還爾秩又寓直羲圗進兩階以追榮之天者定矣魂而有知歆此愍章可新知西外宗正事趙彥紓乞休致除直祕閣宫觀制勑具官某奔競成俗如水下趨有安於命誼而無得心吾能尊顯之爾業履平實治行廉靜嘗為部刺史通顯矣耻於浚常之求甘從肥遁之樂讀書求志若將終身朕起之外宗曽莫能奪何卷懷之深耶寓直木天優游間館身愈退而愈榮可以愧丗之嗜進而騖得者可王儀特轉朝奉郎致仕制勑具官某仕者以貟外郎致其事則澤及後嗣非㑹課應格不可幸得爾疏通而勤敏嘗二安慶板築之功居多引疾告老進秩一等不俟積閥遂郎貟外殊恩也歸而教忠尚其無斁可朝散郎直祕閣李燔特轉朝奉大夫直華文閣致仕制勑具官某朕新美政化民獻有十夫豫翼方來而未艾也胡一賢之不憗遺爾蚤從諸老之游熟講有用之學果逹而藝從政何難時未可為則卷而懷之時可為矣則歲不爾與果制於命也耶陟序正郎升華奎閣榮其歸老示我惜賢可歸順人僞防禦使樊辛特𥙷武翼大夫忠州刺史淮西兵馬副都監制勑具官某淮右鞠旅汝南歸疆爾有簞食壷漿之迎我無亡矢遺鏃之費肆嘉知義易授穹階往分刺郡之榮仍領護戎之寄勉殫忠力用答殊恩可李大謙特轉朝議大夫依前直寶章閣致仕制勑具官某竭忠盡瘁者人臣之職分榮始厚終者人君之恩禮爾寬平而栗精練而介吏能著聞久矣輟從郎省司臬左浙皇皇臨遣精神猶炯然也亡幾何遽以謝事告良用閔惻華之奎直佚之祠館又升之元士始終恩榮爾尚奚憾可寶謨閣待制致仕毛憲明堂加恩制勑搜儀先甲展采上辛賦思齊之詩慕親方切稽我將之頌饗帝尤嚴恍三靈之宴娭遒百祿之來下有懷宿望冝錫蕃釐具官某業擅名儒材優法從松階凝邃了忘勢利之榮栗里蕭間自適性真之樂屬厲精而更始每籲俊之興思乃眷明禋迄成熙事餕惠下逮乎輝胞之賤脤膰上加乎族姓之尊豈繄耆英可後祭澤肆衍邑畬之冨庸增家食之華雖舉邦彛實均帝祉豫方篤養老乞言之意爾母忘歸美報上之忠可許應龍除禮部郎中制勑具官某朕親政以來除南宫郎者再西垣北扉斧藻王度皆繇此其選爾紉襲荃蕙之芳步武珩璜之節璧海瀛山休問藉甚望郎出守挹汗瀾之澤于潮學益老矣撰儀草奏挈之華峻能以博古之識昌用丗之文其升也孰禦可司農寺丞傅㻾除都官郎中制勑具官某周司隸總冗辱之役屬秋官漢都官從事掌中郎官不法屬司隸今庀曹憲部挈令隸士職古而事簡爾儒術通明吏事詳敏纍綰郡紱綽有治行蓋能丗其家者涉筆農扈甫謂之來賜墨隃麋趣進厥序其欽飭百隸使不枉于法以培鄉用之望可淮西強勇軍統制吕深轉武經郎制勑具官某乃者山東逆儔敢犯王略大振貔虎之氣亟正鯨鯢之誅制閫第功爾嘗鏖戰進官三列仍統一軍其日夕淬礪以稱信賞可趙汝遇除度支郎中制勑具官某地官帥屬以經邦用司金職其入司度職其出􅑿虛所關維材是授爾敡歷中外以老成精練聞國費積冗軍調紛集楮幣鹽策術窮而莫繼爾其精意計度量入為出斟酌損益而圗厥中母徒委諸有司之吝可安恭行除大理寺簿制勑具官某朕緬懷先朝樞臣保蜀之勳而垕其報既擢其子又録其孫爾競爽而警敏王父所鍾愛也丞郡東川方騰善譽簿正棘廷趣登華綴三丗有蹟于朝榮矣哉仕優則學圗稱厥家可利州路轉運判官陳隆之除直寶章閣權知沔州兼利州路提刑兼提舉制勑具官某蜀號天險沔當要衝積吾百年之經營空於一旦之蹂躪孰寬憂顧冝得偉材爾氣鋭於理棼術優於應變祁山斜谷之遺迹木牛流馬之故智紬繹蓋精輟從漕挽往圗控禦合兩節奎閣以重其行爾能以公滅私一意國事厄塞常築堡塢當修流離當集疲弱當練悉為朕挽舊觀而回之進可以瞰秦隴退可以蔽梁益則維汝功可利州路提刑王翔除利路轉運判官制勑具官某武侯用蜀每患餉道之不繼以木牛流馬為未足而雜耕渭上規摹逺矣朕訂古謀今慨然于懷爾志氣閎壯材猷瓌逹周旋劒棧之表具著勞效繇憲而漕豈特以平時將輸望爾關隘空於冦攘閭井蕩於兵燬舊規猶未還也爾其以堅力行實政安輯流離經葺荒墜使民趍生業之樂則兵享耕屯之利西顧庶其寬乎可宫觀葉莫除權發遣贛州提舉南安南雄汀州兵甲制勑具官某章貢與閩粵錯壤其俗易搖而難服奉吾詔令以填綏之其惟良二千石乎爾和平而有制莊靜而有立武岡戎伍之變洞察情僞密設方略不數旬凶渠授首一邦砥寧帥閫上功既懋爾賞繩於文吏吾帥臣又為爾明白之起分二水之符坐總三州之甲必恩意孚而善良吐氣威信著而悍獷革心治化蒸蒸如漢良吏是為不負所舉可陳良驥轉承議郎制勑具官某維揚翦冦之賞大閫第功無微不逮爾庀役瓜洲賫伐援比以自請亦升一列責實方嚴思稱所蒙可王丙特改承務郎制勑具官某巴蓬山髙林深姦民淵藪嘯呼剽劫實繁有徒爾奮身書生急義鄉井招懷其脅從禽僇其不率一方安堵制閫上功超授京秩宦塗方開亦克用勸可參知政事兼同知樞密院事喬行簡除知樞密院事同提舉編修經武要略加食邑實封制勑朕撫車攻復古之運慕蒸民任賢之風我儀圗之則山甫柔嘉侯誰在矣則張仲孝友乃眷股肱之重夙咨德齒之尊講內治以既嚴籌中興而抑熟進握本兵之寄俾殫謀國之長渙我明綸諗于列序具官某直大而不倚沉深而有謀翛然其臞精神溢乎萬物之表皓然其老志氣塞乎兩儀之間豫養晦則密勿以效忱豫更化則從容而贊决凡君子小人之進退暨中國外夷之盛衰備輸啓沃之忠居賴弼諧之助惟關洛有鼎來之機㑹而江淮有前進之規模必元老壯猷乃可以出萬全必真儒無敵乃可以大一統就煩舊德坐管洪樞總提經武之編益懋運籌之略申陪井賦併實圭腴噫詢黃髮則罔愆朕方謹仡仡畨畨之戒有常德以立武爾母忘綿綿翼翼之圗涉歷深則無躁謀思慮精則無遺䇿共恢大業茂對閎休可資政殿大學士新知建康府曽從龍除參知政事同提舉編修勑令加食邑實封制勑慶曆之開太平范仲淹為參預元祐之新大化吕公著為疑丞朕遵晦十年厲精一旦趣召先朝之彥俾還近輔之聮誕敡絲綸敷告簪紱具官某學根乎正大氣抱乎純明其重足以挫衆紛屹然鼎吕其靜足以燭群動瞭若蓍龜蚤服在於大僚耻苟同於汙俗不合則去有待而行鶴鳴九臯久聞聲而樂只鳯翔千仞迄覽德以來思豫興相見何晚之嗟爾動可為忠言之喜舉昔大對勸今力行默有契於此心期共繇於斯道更化則可善治冝增重於本朝折衝何必臨邊奚尚勞於外服爰輟居留之寄聿嚴共政之圗蒞勑局以提綱拓爰田而衍賦併昭異數式獎英猷噫六典建於周家莫先乎設參而置輔庶績凝於虞室尤在乎同寅而協恭勉殫訏謨之忠共濟垂拱之治可左諌議大夫鄭性之除端明殿學士簽書樞密院事同提舉編修經武要略進封加食邑實封制勑朕迪簡在廷儀圗共政繇諌長而選蓋僅聞於二紀之間自倫魁而升况並見於一日之頃繄非常之盛舉必不丗之竒材翊我事樞揚于制綍具官某身端而行治心廣而體胖鴻漸可用為儀望風髙於華著雞鳴不改其度志晚適於槃阿維豫𥘉潜慕丗賢哲未親魏證之論已稔蕭生之名逮躬攬於萬幾首旁招於衆正擢從郡最列在從塗朝入對於治朝暮進登於騎省規君德則中庸大學條國事則天保采薇方纍疏之前陳巳一言之默寤徑躋宥府密贊籌帷由求之切而得之難故知之深而用之速總武經之大筆陟書殿之穹班爵肇啓於徹侯封更陪於多邑以寄股肱之重以示精神之強噫虞舜之治有五人朕方篤任賢之意宣王之德洽四國爾盍思復古之圗叶濟廟謨丕昭儒效可何處久除直寶謨閣知鎮江府制勑具官某南徐襟江枕海而控淮地望重矣制勝孔嚴擇守加遴爾材猷閎碩志氣激壯為御史諌官嘗陳內外修攘之略具有本末朕甚偉之冠冕蓬山未鬯設施祖逖擊楫渡江之地以奎直往為朕圗厥功應接于外屏蔽于內威行愛孚而天險之勢以強京師併蒙福也可何琮除直徽猷閣福建路轉運副使制勑具官某七閩樂郊也間者鴟義姦宄多抵冒于法非蕉萃菀結莫之省乎爾風槩凝逺性行修潔丗道泄濁能不磷緇朕器之奏對間久矣斂武華要寓直凝邃夙駕暑征往將使指豈直為飛挽計以鐵冠觸邪之餘威察一道臧否貪亷而刺舉之使吏姦澄而民氣舒斯稱朕臨遣之意可董洪父自修王公瑾父囦方嶽父欽祖趙子森父復先陳子椿父千期朱炎父師友孫鏞父價以明堂恩封官制勑具官某總章大饗熙事㳙成斂福錫民同躋仁壽爾旄期康彊有子仕版京秩疏封式昭善慶可太中大夫曹叔逺特轉通奉大夫依前煥章閣待制致仕制勑訪正元之遺事尚想告猶追長慶之髙風遽聞請老莫回雅志庸錫徽章具官某襟度曠夷風規凝粹羊腸峻阪蚤備罄於忠勤豹尾屬車晚寖隆於恩遇勞禁塗而諗疾佚真館以言歸賜杖竊遲掛冠何亟疊進髙華之秩仍通嚴邃之班祗服寵榮益綏壽嘏可正議大夫程珌磨勘轉正奉大夫制勑等六曹而上課嚴三歲之遷超四品而升秩重八年之轉雖循彛典實著恩章具官某粹學淵深英規山立謀猷獻納備殫日月之忠典冊鋪張叶應風雲之㑹繇殊庭之引興每魏闕之存心積閲既深陟明可後飛鴻自適𥘉何計於穹階鳴鶴相求肯尚遺於宿德可閭丘梓林炎趙崇媺趙崇森除大理評事制勑具官某等興獄惟平之難漢吏用法巧文寖深於是置廷尉平四人務平之爾梓爾炎爾崇媺爾崇森皆練習律令而文無害故並命以司庶獄之平明啓刑書胥占咸庶中正中則平矣欽哉可虞衡除大理寺正制勑具官某王制獄辭之成史告于正正聽之正所以正庶獄之不正也爾簡淡而詳敏褰帷嶺嶠之東以風力著庸命爾正于李吏有上下其手以舞吾法爾悉為朕紏之庶幾廷中稱平而天下無冤民可權知信州史彌忞除將作監丞制勑具官某上饒間于江浙頃悍卒軼紀律以駭吾民翦其萌可緩乎爾優於應變勇於討惡尸二渠于市而群姦之魄禠千里砥定朕甚材之召丞匠監用旌爾能繕修務簡益培雅望可趙與歡起復直寶謨閣淮西提刑制勑具官某兵刑一也西淮方整軍經武陳時臬事冝加謹爾公族之雋材優而氣盛嘗守輔邦蔚有能譽繁弱可久櫜乎起之欒棘進之奎直往司臬于西能使在泮獻囚與在泮獻馘同功則移孝為忠之道得矣可大理寺丞桂萬榮除考功貟外郎制勑具官某馮唐白首顔駟厖眉尚書郎以老於識為重爾行己純固蒞事精恪丞于北寺不詭不撓蓋涉深而識定者也考功課吏之法公則一私則萬殊勉為我權衡之抑揚惟允嗣有褒進可權兵部尚書趙至道除寶謨閣直學士知鎮江府制勑法從莫如文昌八座之尊價藩莫如扶風三輔之重必卷舒之有𥙿斯出入之俱榮具官某蚤以孝稱晚繇亷進歷耳目之寄每侃侃以自將升喉舌之官尤循循而唯謹久厭禁嚴之直欲尋間退之盟莫挽而留冝華其去赤刀琬琰峻祕職於西清皂蓋朱􅙲鞏名城於北固亟上中和之最尉豫耆艾之思可太常寺丞兼權右司曽天麟除將作少監制勑具官某永惟技巧工匠之鮮及不如宫室苑囿之無增故繕監不以飭工而以儲材爾疏通而文寬靜而栗材出鄧林信良矣容臺省闥趣升于少匠厚其儲以致用也爾知器用利則用力少而就效衆斯識朕心可王瀹轉承議郎制勑具官某朕觀新店民之語知和糴之厲民尚矣爾守滁日糴辦而民不擾數踰三萬應我賞格增秩旌勞尚鞭其後可歸順人沙兀惹特𥙷修武郎添差蔡州兵鈐兼權蔡州事制勑具官某襄漢奮伐淮蔡底平莫府以戎捷來上謂爾能知逆順之分赤心歸誼願效忠力蔡人即吾人也爰卑右階就命爾守復民業以趨耕作士氣以待戰保障鞏固斯稱委寄可房應發轉文林郎制勑具官某六騩復土五使置官凡備驅馳悉霑賞賚爾祗吏役例進一階茂對恩榮尚思䇿厲可劉顯以父評戰殁𥙷承信郎制勑具官某蜀關禦寇虓將死勇爾父從之鏖戰繼殁羽林孤兒漢恩特厚録爾一官用勸徇國可石天瑞白華𥙷秉義郎制勑具官某等方城濯征垂瓠震潰執訊獲醜餘燼為空爾能自歸貸而官使尚圗忠效用答生全可李駿起復直龍圗閣四川都大茶馬制勑具官某秦蜀榷牧之政分合凡幾然非其人分任而不足得其人合治而有餘爾沉毅足以經逺果逹足以治劇所居砥績晚譽更偉坤維事力日匱茗法壞而後馬政壞頃嘗分任未見其益也兹庸合以命爾且寓直淵圗以重其行母俟祥琴慷慨叱馭能使廉信浹於園户行於蕃落則摘山冨而效牽蕃矣可工部郎中鄭寅除尚左郎官制勑具官某艮以止為體能時止則止然後能時行則行爾簡粹而通亮為郡嘗以治理效聞顧時俗之流從又孰能無變化懼荃蕙之俱茅也而恬然歸潔坐玩歲華待化機之轉移偕衆正而彚集其將有行乎郎選甚髙母憚于劇朕方思所以進爾者可王轉朝請郎制勑具官某榷務萬貨萃焉而摘山煮海之利居多羡入必賞厥有著令爾材優於從政嘗司出納歲有羡利其知理財正辭之義乎一官懋賞益圗爾庸可將作少監趙與芮除大理少卿制勑具官某孟侯朕其弟必卷卷以陳時臬事丕蔽要囚為誥豈非刑者君子所盡心友之篤則誨之切乎爾氣質金玉步趨繩矩卓有大雅不羣之風朕猶欲其政事之熟更也既試之大匠又試之少大理民命至重國脉所關欽哉恤哉其寧惟永爾亦與有令聞可鄧雲轉武節郎制勑具官某山東逆儔負固淮楚大振貔貅之氣一空狐兔之群制閫第功爾嘗鏖戰進官四等護戎湖右其日夕淬礪以稱信賞可王旻勑具官某山東逆儔負固淮楚大振貔貅之氣一空狐兔之群制閫第功爾嘗鏖戰峻升武級用獎驍雄仍顓戎律之嚴坐鎮邊城之重祗承異渥勉䇿竒勳可直寶謨閣宫觀劉宰除太常寺丞制勑具官某聖人與曽點說􅃮雕開蓋不汲汲於用乃所以致用也爾得於天者厚求於人者薄見幾逺引樂道而著書與行乎國政之久者相為終始丗方瀾倒獨落落乎其有風飈朕甚嘉之拔之槃澗丞我奉常幡然一來尚不負國人之望可考功貟外郎桂萬榮除尚右郎官制勑具官某比歲幸門開而吏道雜武級猥濫尤甚綜核方嚴銓管冝允爾為考功郎氣嚴詞厲吏莫敢欺推是以修審官西院之法鑒揭而妍醜分衡設而輕重判劇曹其澄乎來幾何日三錫厥命用惟其材母謂序進可前右正言何萬齡特轉朝奉大夫直寶謨閣致仕制勑具官某臺諌以觸邪指佞為職自仗馬相戒而舍豺狼問狐狸有年矣爾以駿發之材邁往之氣列在騎省能於波流風靡之中奮擊大吏疾於迅霆非不畏強禦者乎銜恤以殁歲月奔駚崇階邃職示不汝忘可兩淮制置使兼㳂江制置副使趙范除江淮制置大使制勑全江淮濟中興莫重乎要衝之勢築壇埸拜大將莫嚴乎專閫之權乃眷時髦密承廟算內養威而植屏外觀變以投機丕建使名特加命綍具官某挺姿果毅抗志忠勤材閎而用周力振西平之業氣壯而識老逺追鄧禹之風自討賊之䇿勳即平戎之定計入儀法從出撫成師朕惟九節度以無統率而危唐四將軍以有領屬而強漢必中權之獨揔斯外治之咸張車攻復㑹東都首經營於江滸閟宫遂荒徐宅先疆理於淮夷兹大恢表裏之規摹冝盡禀精明之號令翼翼文昌之座堂堂太一之旗壯本根於荆揚震聲采於汴洛詩書之帥以尊主為德仁義之將以安民為功行三軍則務於好謀掌六師則貴乎同力觀宣勞之寖久信任重之優為江左自有夷吾朕方倚深長之略河南盡為晉土爾盍堅綏定之圗可權工部侍郎留元英除集英殿修撰知江州制勑翠緌鳴玉入聮法從之榮皂蓋飛旟出殿名藩之重不輕厥選冝賁其行具官某篤實無華寬平有則物情方靡𥘉何意於鷹鸇丗道既回仍可儀於鵷鷺政藉居中之益忽騰𥙷外之章勉徇懇祈俾圗共理升班論撰留夙望於甘泉奉最蕃宣寄壯懷於湓浦豫曲盡待臣之禮爾益殫報上之忠可葉奭除國子博士應㒡除太學博士兼莊文府教授汪之道除國子録制勑具官某道存乎人心藴之為德行行之為事業文辭陋矣朕故謹擇知道者為學校師爾奭直簡而廉爾㒡融明而靜爾之道英拔而粹俱有得乎正大之旨庸命奭為博士以學胄子㒡為博士以學士仍典藩房之教之道為録以紏胄監之不如規者師道立而皆知以求仁明善為急化成天下獨不在兹乎可著作郎兼權司封郎官蔣重珍除起居舍人兼崇政殿說書制勑具官某迪惟先朝䇿士多得倫魁之彥敷遺後人休朕既簡在大僚又簡厥修如爾重珍者以柱史從華光之游矯矯乎鳯凰之集阿閣黃鵠之下太液也榮貴素定盛名難居詔媺責難益究爾韞使碩大光明不愧天聖嘉祐之盛顧不偉歟可黃壯猷除金部郎官制勑具官某朕方經理京洛財計𥙿於內則事力充於外金幣委輸鉤考其數以周知登耗而頒節制司珍職也爾器局明整材華暢茂司庾左浙能斟酌取豫斂散之冝以乂我民趣踐郎省參掌國用曹雖劇刃游盤錯矣抑以是詳觀爾之能可司農寺簿趙鎬夫除司農寺丞兼提領安邊所制勑具官某景壽昌丞大農關內漕榖國便之常平置倉民便之北邊亦藉以給丞不當如是耶爾鎬夫機圜而不窮氣鋭而有立逾月再轉就丞九扈且坐總邊計材選也孰科當興孰害當除母使壽昌專美於漢則職之稱可軍器監簿陳振孫除諸王宫大小學教授制勑具官某我仁宗詔諸宫院教授非止講習經旨須選履行端慤蓋欲其以身教也爾靜而不競簡而不華可謂端慤矣振振麟定以爾為之師觀矩度於步武之間挹芳潤於言論之頃而成童既冠莫非大雅麗澤講習之功將有考於此可方大琮除司農寺簿樓杓除軍器監簿制勑具官某寺監有簿職鈎稽違失簡矣國以養材士以養望爾大琮粹然其瑜而靜俾簿于農寺爾杓凝然其度而立俾簿于戎監鴻之漸而鷺之振也觀其所養朕不敢忽爾益觀其自養可知南安軍彭鉉職事修舉轉一官制勑具官某漢二千石有治理效輒璽書勉厲增其秩故良吏為盛朕甚慕之爾果於事功逹於識慮而敏於材江右南接嶺嶠俗駻而難御支壘假守能不以繭絲易保障田里相安蟊賊屏息其漢吏之良乎一秩示勸益進于理以對顯擢可施􅵉差知融州制勑具官某融在廣右為望郡銅虎符不輕卑爾以淳熙執政之胄克修令猷履平而植固三為別乘抱璞不售亦老於丗故矣以是起家母鄙逺其民而厚拊之廉善逹于聽聞斯稱惟良之選可曹叔逺贈光祿大夫制勑老之將至甫抗志於垂車生也有涯遽遺言於易簀推我䀌傷之意形于贈禭之章具官某薰然澤物之春蔚乎成已之學中年去國留落而氣不衰晚節還朝虺隤而志巳倦進陟論思之選退尋蕭散之盟方惜日以自休胡御風而不返出處本末具知存闕之忠始終哀榮茂享書棺之寵可季衍直寶文閣致仕制勑具官某河東守以一人之毁而去雲中守以文吏之繩而罰今昔之通恨爾直方自信無所撓折宅牧淮右竟以賈憎朕夷考其平生公於徇國廉於居官暌弧之疑可亡也齒髮未衰遺榮何亟進直寶奎尚其吐氣可平齊文集卷第十八
