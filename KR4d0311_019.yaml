body:
  text: 外制三倉部郎中林清之除直寶章閣都大冶制勑具官某蓋聞有道之丗地不愛寶比鍾官之課不登非地寶嗇耶抑𥙿之惟人爾通練敏劭治郡有善狀九府圜法泉布為重輟材星省往斡東南三品之産轉嗇而為豐賈誼有言上挾銅積以御輕重錢輕則以術斂之重則散之貨物必平朕有望於汝矣可黃垺權知建寧府制勑具官某建安冨庶文物之邦比歲不登糴踴而民易動遺朝廷憂故擇守良難爾審機於應物迎刃於制事咸以材屬駕軺漕粵易轍殿閩人冝其官何嫌改令夫鎮危疑之情活雕瘵之俗固守職也揠苗常患於助長種木亦忌於太恩行所無事而不求赫赫其吏治之良乎可戶部侍郎京湖制置使史嵩之除權兵部尚書制勑朕仰稽韓奕江漢之詩俯考皇武方城之雅嗟古風之寖邈眷王事之良勞擢繇外閫之崇列在中臺之峻有華從槖冝錫贊書具官某挺秀相門出竒將略審刺虎之勢必滅虜以為期乘投鼠之機雖㑹戎而不憚震威聲於垂瓠禠營魄於穹廬珍竒之灰既空冒頓之鏑遂絶圗八陵而效捷固知天道之還告九廟以歸功亦賴人謀之贊肆嘉乃志式獎爾庸躋文昌八座之聮攝司馬五兵之柄維時眷遇允謂遭逢豈不懷歸而畏簡書既舉勞還之典乃使帥屬而平邦國尚修獻愷之儀可大理少卿趙與芮除寶文閣待制提舉佑神觀仍奉朝請制勑龜鈕藻衣甫奏平反之最翠緌玉佩趣躋次對之聮匪親愛之私恩實榮懷之彛典具官某暉承霄極秀挹天潢性行忠和踐丞郎而養望材猷通敏歷卿監以蜚聲朕觀葛藟之綿綿嘉棠棣之韡韡久恬於進冝峻其遷延閣升華儼荷囊而待問真庭均逸樂戲綵以承顔益隆信厚之風茂對熾昌之嘏可辛克承除直顯謨閣主管紹興府千秋鴻禧觀制勑具官某蒹葭蒼蒼白露為霜丗道不競人材老於摧折者何可勝數爾以練逹之材精密之識屢更事任具著勞效意所不合翩然駕飛鴻而獨往不計搖落之幾秋也朕厲精求治亟起耆哲而用之則以病諗豈遂忘斯丗乎寶奎寓直館養恬尚識豫遡洄之意可張洽除直祕閣主管建康府崇禧觀制勑具官某蒹葭蒼蒼白露為霜丗道不競人材老於摧折者何可勝數爾以簡淡之姿明逺之識嘗於撫字關决見其材意所不合翩然駕飛鴻而獨往不計搖落之幾秋也朕厲精求治亟起耆哲而用之則以病諗豈遂忘斯丗乎祕廷寓直間館養恬尚識豫遡洄之意可宗正少卿張嗣古除祕閣修撰樞密院副都承旨制勑具官某朕長馭中原樞掾皆得以與聞廟算矧導宣密命日與柱下史並直文拗為最近爾識照未然之機材擅有用之器曩記言于朝國勢虜情論建甚悉恨不果用也白首重來識益定材益老其以中祕論撰參承宥密制勝之略保大之謀凡可以贊吾樞紐者母懲母忽可大宗正丞兼兵部郎官謝奕禮除將作少監制勑具官某右賢左戚國之令典戚且賢褒進可後乎爾端良而敏英潤而澤芝輝玉映有文靖故家之風度冝不為流水游龍而移攝幾亟二繕監非朕之私戚而賢也其靖共爾位以鼎來之福可太府寺丞陳韔除大宗正丞制勑具官某綿綿瓜瓞本支百丗必屬近行尊者訓齊之而丞以庶姓春秋公族大夫之意也爾頴然處囊之錐恢然發硎之刃而退然不自襮涵負蓋逺庀屬外府藉甚有聲董治大宗勉贊而長朕之進用爾者此其階可副都承旨張嗣古除右文殿修撰權知建康府江東安撫制勑具官某秣陵槃槃一都㑹進可以控中原朕方規復輿圗思得魁壘俊偉之彥付以留籥爾起自久間入對便殿敷陳攻守大要具有顛末擢承密旨出揔陪京恤民以厚根本厲兵以壯形勢鞏護天塹應接汴洛地以人重母謂事權之非昔也祕殿論撰姑華爾行有功見知顯拔未艾可張元簡除太府寺丞制勑具官某士君子知用舍有命行藏有義則身可屈氣不可折爾軒岸而閎偉任重器也荆門城築之役平板幹程土物其成不愆于素如楚艾獵民方便安之遽掣其肘而去身雖屈其氣全矣起之家食丞于外府朕蓋以是為事任之儲可曽天麟除浙東提舉常平茶鹽公事制勑具官某朕親政以來諸道部使者選必精察必謹欲光華之被原隰也爾名家之彥周行之翹頴知朕德意志慮蓋熟左浙庾臺往將使指維昔先朝有疏曹娥斗門泄鑑湖入江而田不病民至今德之非爾祖也耶逺乃猷𥙿乃以民寧母徒曰山海之藏足以利吾國可僉書樞密院事鄭性之贈三代故曽祖可大贈太子少保制勑朕儀圗近弼招選譽髦自竒童而升如天聖之晏殊由倫魁而進如端拱之蒙正蔚扶輿之鍾粹侈演迆之儲祥榮燭九原寵延三世具官某故曽祖具官某隱居求志積善在身無言不酬著在鄉評之望非禮勿動形為家法之傳軸雖折於壯齡幹實培於慶裔豫倚西府邇臣之重爾登東宫亞保之崇祗服禭章茂綏廟祀可故曽祖妣陳氏贈咸寧郡夫人制勑豫章生於鄧林璆琳出於元圃積深蓄厚則發之逺推髙原大則報之隆具官某故曽祖妣某氏婺矛牙居而肅於齊家約處而豐於教子惠來師友燕及孫曽覩警悟之姿則愛鍾于心聞弦誦之聲則喜動於色成兹國器翊我政樞雖八柱明堂不及生前之見而六瑚清廟竟為身後之光肇開湯沐之封增賁蒸嘗之祀尚其不昧歆此殊榮可故祖獎贈太子少傅制勑叔虞之唐必興畢萬之魏必大何天道之應若劵劑以取償蓋人事之修猶耒耨而望穫欲驗孫謀之逺盍觀祖澤之休具官某故祖某頴悟秉姿淹該進學文從字順勇追賈馬之風墨妙筆精雅得鍾王之法方賢哉之騰譽胡逝者之興嗟不在其身克昌厥後繄我弼諧之助皆而講習之傳宫傅參華起英魂於既往泉扄增耀垂景祐於方來可故祖妣陳氏贈齊安郡夫人制勑上推乎八丗者康成之先下占乎五丗者有媯之後矧王母誨言之未泯而聞孫承弼之方新肆加告第之恩庸表起家之慶具官某故祖妣某氏坦直無隱靜間有儀奉事婺矛牙姑動不違於四德扶携幼子守益厲於三從斷機之教既嚴含飴之愛更切受兹介福發爾幽光文軒象服之華愍典蜜章之寵懿魂如在尚克饗之可故父汝永贈太子少師制勑為人君止於仁而仁莫宏於錫類為人子止於孝而孝莫盛於揚名朕博求開物成務之材唯濟修政攘夷之治隆樞廷之眷倚侈禰廟之褒崇具官某故父具官某蹈道有常秉德無競周旋鄉黨寬洪長者之風盤礴丘園正潔幽人之操念義方之為訓豈科舉之徒文凡一時師友之功必千古聖賢之藴朝董公孫之對固有源流益稷皋陶之謨正資羽翼佩一經而追往撫三釡以興悲欲慰孝思可稽禭典超進宫師之亞增光家學之傳式勸教忠母忘垂𥙿可故母碩人黃氏贈冝春郡夫人制勑衮衣而感蓼莪不如戲綵之為榮鼎食而悲凱風不如負米之為樂矧乃三遷之訓成豫四輔之賢冝沛恩榮用紓孝慕具官某故母某氏夙姿警慧素履靜柔佩帨奉姑修婉容而特謹傾奩教子揭懿範以尤嚴迄培隆棟之材克贊改弦之化流徽無斁鍾慶有源幾年馬鬛之封一旦魚軒之錫德無不報魂尚知歆可故妻碩人潘氏贈清河郡夫人制勑碩人其頎必稱厥德君子偕老誰無此心同甘苦於隱約之秋異幽明於顯融之日有懷契闊曷尉欷歔具官某故妻某氏生自名門儷于魁彥淑均接下佩纕荃芷之芳雍肅奉先錡釡藻蘋之潔推舉按齊眉之意致趨機斷織之規生資助以居多殁追榮而冝厚委他象服首正小君之封積纍鵲巢益綿奕丗之慶可直華文閣知江陵府楊恢除知襄陽府京西安撫副使時暫兼京湖制置司公事制勑具官某荆襄自昔襟喉之地吾國之上游也師以進為功故襄陽視荆南為尤重爾雋偉而有志莊靜而有謀頃上邊最擢帥于荆事任蓋重矣王師方向河洛俾爾擁旄進屯于襄任又加重望隆中而懷葛亮眺峴首而慕羊祜臨江漢而思召虎積榖練甲控扼險要使前茅無後顧之憂首尾有相應之勢而吾之取中原可以萬全時乃功可尤爚除直祕閣權知江陵府兼主管湖北路安撫司公事制勑具官某荆州用武之國東連吳㑹西通巴蜀而北控京洛經理中原之秋宅乃牧尤難其人爾涉深而養之固蓄厚而發之閎太阿龍泉之出匣斷蛟剸犀忽若篲泛豈安陸專城足以展其材寓直中祕全護荆楚觀三國必爭之形勢考羊陸守禦之規摹熊臥虎視精神折衝上流之顧寬則朕可安意而圗中原矣往懋厥功用副推擇可知吉州劉煒叔職事修舉特轉奉直大夫制勑具官某漢二千石有治理效輒璽書勉厲增其秩故良吏為盛朕甚慕之爾處己靖莊待民樂易所至有漢循吏之風兹守廬陵政平訟理田里安其條教而灌輸章貢以戢蠢動曽靡告勞休問逹于朕聽久矣奉直必實歷七年乃轉優於示勸不汝靳也其益勤弗懈以需選拔可范炎辭免赴都堂審察特轉承議郎與宫觀制勑具官某髙帝有尊顯賢士之詔而魯兩生不至朕收攬衆正如茅斯拔爾顧安貧樂天不屑弓旌之招易所謂履道坦坦幽人正吉非耶進秩賦祠姑遂雅志病愈造朝尚其有待可葉武子辭免召命特落致仕除直祕閣主管華州雲臺觀制勑具官某元祐間文彥博既老復與大政范鎮既老不復來亦各行其志也爾少而立壯而仕有聲老而知止不殆良可嘉尚朕求士如渴起之垂車志益堅節益固可以愧鐘鳴不休者寓直祕丘賦廪祠館貪賢重老之意尚懋承之可劉福轉武德大夫制勑具官某鵝鸛魚麗征行方鋭犀渠鶴膝製作冝精巖除上功謂爾舉職進官一列用勸忠勤可髙之問除直祕閣主管亳州明道宫制勑具官某人之止以久為難節或移於晚守或失於終此艮之上九所以為止道之至善也爾姿簡淡而踐平易用不盡材渺送目於冥鴻之表光生德宇之泰定坐閲物華之變遷時可以行猶堅卧而莫起其艮止之至善者乎厖眉華髮與汗漫游命職賦祠用賁晚節可知樞密院事喬行簡贈三代故曽祖勝之太保贈太傅制勑朕惟有維師尚父則成燮伐之功有元老方叔則建中興之業延登壽俊坐管洪樞備殫啓沃之忠宏濟規恢之治垂休亡斁開迹有源具官某故曽祖具官某琮璧粹溫笙鏞淳古左圗右書之外一泯行藏仰事俯育之間兩無愧怍克篤曽孫之慶肆躋近弼之聮申錫恩章誕揚愍冊拜王祥之秩夙敷賁於泉扄進卓茂之官益寵綏於廟祏尚其冥漠同此榮懷可故曽祖母孫氏婺國夫人贈越國夫人制勑形大者聲宏膏沃者光燁為仁雖在於一日之頃積德實計於百年之餘眷華髮之元龜兆中興之治象遡求慶派申賁曽闈具官某故曽祖母具某氏淑謹飭躬惠和逮下于沼于沚克勤錡釡之共冝室冝家允穆琴瑟之好積自一門之懿流為三丗之昌地靈有開天報不爽小君都號夙臨婺女之區大國進封肇啓㑹稽之壤歆我漏泉之澤揚而奕葉之休可故祖堯太傅贈太師制勑袁安之為太尉自良而傳陳群之録尚書由實所積寸雲足以興泰山之雨勺水足以導黃河之源方倚重於中樞冝追榮於先廟具官某故祖具官某家庭肅穆鄉黨雍和機械俱忘忠信之寶獨冨胚腪不鑿仁義之爵尤尊篤生萬石之孫坐斡五兵之柄推功祖澤錫命師垣雖聲迹巳陳何施靈壽之杖而典刑具在不愧進賢之冠祗服豫恩永綏爾祀可故祖母杜氏慶國夫人贈益國夫人制勑樂莫樂於抱孫榮莫榮於尊祖况樞機周密特重舊臣之圗而源流深長實受王母之福欲報含飴之德可稽刻蜜之章具官某故祖母具某氏婉娩令儀幽間懿行受茞蘭而獻常存起孝之心采蘋藻以承益秉有齊之念培本根而燾後茂枝葉以光前積纍既豐褒崇亦腆􅊮管有煒首開慶水之封象服是冝易胙岷山之壤紓悲霜露燕祉雲仍可故繼祖母蔣氏華國夫人贈吳國夫人制勑有孚而它吉者人事之當修積善而餘慶者天理之必應欲驗自葉流根之澤當觀斂華就實之功具官某故繼祖母具某氏冲靜以和嫕柔而度三遷教子未酬志士之懷萬卷詒孫遂享真儒之效惟股肱之寄甚重故體貌之恩特隆延及重闈均加禭典旌周公之逺裔既盛笄珈相太伯之名邦更豐湯沐信在天之可恃冝奕丗之知榮可故父森太師追封寧國公制勑四海之福君明而臣良一家之慶父慈而子孝眷言耆俊服在大僚上應極樞星紐之光散為天街析木之潤增彊吾國用顯其親具官某故父具官某明善而誠身弸中而彪外學貫穿於千古獨得其宗氣充塞於兩間莫窮所養培經畬而遺子拓文苑以傳家成兹儒英為我國鎮髙車駟馬雖不覿於生前衮冕植圭果有開於身後侈赫赫南山之望啓槃槃北地之封庶可作於九京尚克昌於百丗可故母俞氏福國夫人贈魯國夫人制勑松産於徂徠而充棟梁桐生於嶧陽而中琴瑟蓋禀鬱積蜿蜒之氣乃成光明俊偉之材匪施告第之恩曷顯擇鄰之教具官某故母具某氏姿涵圭璧行中凖繩夙夜組紃恪謹女功之習春秋錡筥祗勤婦德之修既舉按以賔夫又斷機而訓子及今熾艾念昔劬勞幼學而壯欲行豈為萬鍾之奉欲養而親不逮空懷三釡之悲尉孝慕於寒泉拓恩封於曲阜懿魂如在休命知歆可故妻吕氏安定郡夫人贈東陽郡夫人制勑宋啓皇圗吕為望姓贊太平之治則蒙正夷簡輔更化之功則公著大防逮南渡之徙都盛東陽之占籍丗傳雖逺家法猶存既有名儒以昌斯文又有賢女以相君子具官某故妻具某氏性姿􅈺淡襟度冲夷誦內則之篇佩左紛而克謹玩家人之卦主中饋以尤嚴冝為偕老之期俱享鼎來之慶胡先朝露莫共歲寒拱木參天護泉臺之佳氣脂田易地聳鄉國之榮觀可故繼妻樓氏譙郡夫人贈吳國郡夫人制勑魯公有令德之妻韓侯有燕譽之婦惟冝家而得助斯與國以同休猗嗟契闊之情於赫便蕃之渥具官某故繼妻具某氏儲英顯胄配德名門禮法周旋凛若惠昭之訓詩書薰染粲然道韞之風居既定於鵲巢進方偕於鴻漸命胡不淑生遽有涯易譙城之故封斥茂苑之吉壤增華窀穸永燕蒸嘗可趙應愚轉保義郎制勑具官某王后六服周主以奄女御及奚實從其役爾為胥史亦既竣事一秩酬勞當思自勉可王圭轉武顯大夫制勑具官某西洛歸疆巳奏三京之捷東淮平冦猶論一壘之功爾於是行嘗奮其勇升四階而示勸總尺籍以知榮可繆夢逹轉武德郎制勑西洛歸疆巳奏三京之捷東淮平冦猶論一壘之功爾於是行嘗效其力疊進官而示賞雖去職以知榮可林演權知德安府制勑具官某黃霸為廷尉正數决疑獄廷中稱平至守頴川其治遂為天下第一爾以內寬外明嘗庀屬棘寺不阿不縱鉥之以禍福不顧起家景陵冝其政平訟理而民無愁歎也安陸為湖右重鎮往布藩條能推所以治景陵者治之根本強則保障固懋之哉可李煒知崇慶府制勑具官某西南六十州惟唐安以蜀名最古且阜陵潜藩也不輕授爾篤厚不欺慈祥有則分符天彭制閫以實政上既增秩矣兹以蜀辟將又觀實政焉朕厲精更始以來寬恤之詔婁下賦欲簡刑欲平政令欲信莫非實之尚州縣吏能勤於奉詔澤安有不下流者哉其典聽朕毖可吏部侍郎鍾震除寶文閣待制知太平州制勑大江以東姑孰為重先朝建侯植屏莫非雞翹之英近丗為人擇官未免龍斷之賤逮改弦而更始每弄印以柬求得諸小宰之聮付以巨藩之寄具官某家傳正大躬踐和明華國鴻文轔轢常揚之上沃君讜論頡頏禇馬之間顧朝望之方穹胡民庸之自詭貪賢良切申諭莫留擢升次對之華往膺共理之重周行十五年之久曽不磷緇漢守二千石之真何難鎮撫維川澮浸淫之後加田閭椎剝之餘正藉循良為蘇凋瘵風規汲黯諒無薄淮陽之心事業周瑜尚識屯牛渚之意勉圗治最入告嘉猶可將作監謝奕禮除大理少卿制勑具官某朕篤於同氣之愛必試之匠監進之棘卿封培其逺器推此以待椒掖之同氣顧不厚歟爾謹言而敏行履和而牧謙貂蟬丗家龜紫大閥有此天球琬琰之粹親賢並用列在班著既觀之以繕修之儉又觀之以欽恤之仁豈苟然哉有關雎麟趾之意而後可以行周官之法度冝識朕心可吳昌裔除軍器監簿制勑具官某士以登朝為榮伯仲同朝又儒者之至榮矧同官寺乎爾學有源委氣明而材良入充坤産之賦如獲珙璧戎監務簡肩隨伯氏相與講繹於鈎稽之餘兊戈和弓森然在目杜武庫萃一門矣其益砥礪以對寵榮可太社令魏峻上殿特改宣教郎制勑具官某朕待天下士靡親踈之間日博士有以奏篇可采通金閨之籍者矣爾氣和姿整將以儒雅便殿入對首陳天命人心堅凝之本其味悠然而長懿戚大家好學喜文良用嘉歎升之京秩仍司右社顯融舄奕懋稱厥家可王極權發遣順慶府制勑具官某果山躪於兵厥既收合餘燼還井邑之舊聚渙剔蠱使斯民忘其阽危懷其者之爾博習修潔以文學為政事吾制閫者謂婉畫居多舉以守果沛乎詩書之澤家游泳而人鼓舞潜藩重矣勉哉行且召可權刑部侍郎周端朝磨勘轉中大夫制勑一日無曠董治官之常規三年有成待法從之令典屬嚴㑹課特重疏綸具官某氣莊以舒學博而約勸露門之講發韞奧於微言紬石室之書泝源流於絶筆越在司刑之二久殫弼教之勤爰計積勞肆升華級登崇方切豈以日月而為功獻替有加庶幾夙夜之終譽可曽庶贈通直郎制勑具官某掎鹿固為共踣之謀養虎必有反噬之患山陽荼毒爾以幕僚死事闔門不免焉念之慘怚追卑升朝之秩仍録應門之孤魂而有知歆此殊渥可國子監丞姚珤除祕書丞制勑具官某自天聖至嘉祐進士上之三人多至公卿豈惟后稷之穡有相抑豐芭之仁也爾以強立之學輔致逺之器大廷射䇿名在龜列而安平進朕親政始徠之丞于胄監進丞于中祕盡交瀛洲之彥縱論藏室之書浩乎沛然光明秀傑之望得所封植矣可軍器監簿吳昌裔除將作監簿制勑具官某簿皆以紏違鈎墜而匠監視戎監為髙非賢不捷進爾茂於學頴於文而縝於識蜀閫以賢聞結綬登畿諸大夫皆信其賢也擢庀除戎之屬越三日改屬于大匠雖伯氏聮治之嫌實公朝褒進之意鴻漸于干而至于磐於爾乎觀之可著作郎兼權左司彭方除將作少監兼景獻太子府教授制勑具官某省闥百司之綱領萬務之機衡劇矣而繕監為最簡用者以材仕者以志爾學有誠身之功心無交物之纍泊乎其遇而不留也頃繇著廷參我宰掾理明見定優於叢劇顧欲趨簡以養天和何志尚之逺耶升班少匠靖共自守宗磐峙秀往為我淑艾之冝有餘𥙿可江西安撫使陳韡除工部侍郎制勑朕永懷阜陵妙選法從越在內服必有獻可替否之益越在外服必有折衝厭難之勞兹率循於燕謀庸謹簡於英望具官某懿文而莊栗洵武而沉雄髙山深林卓爾濟時之略秋霜烈日皓乎徇國之心自蠢動於江閩寖蔓延於嶺海民無寧處國有隱憂屢勤繡斧之行未息耰鉏之警龔遂尉安渤海令一布而巳孚景弇窮追尤來威四馳而隨定䇿勳獨茂締眷逾深歌出車以勞還趣韓奕而入覲班參五正密扈豹尾屬車之塵朝進一賢坐掃旄頭罕畢之祲究爾論思之韞副豫柬注之懷可馮邦佐除直祕閣主管潼川路安撫司公事知瀘州制勑具官某瀘南控扼六詔為重鎮頃連以法從宅乃牧民夷按堵繼之厥選雖艱爾文有英氣政有卓識蜀士之位表著者亟稱之擢自偏州往殿帥閫且榮以中祕之直朕於用材可謂超越拘攣之表矣維昔武侯將有事于中原必深入不毛先定南方欲無後顧之慮也懋展夙韞稱此隆委可黎伯登除直寶章閣潼川路提點刑獄公事兼提舉制勑具官某民無逺近悉恃部使者為司命御史為朕言東蜀司臬之非材謹擇而亟易之爾靜實充於內亮逹著於外立朝未幾翩然引去纍更名郡櫛垢濯痍聲稱藉甚出少府之節巳晚故寓直寶奎以賁之周爰咨詢則民情通不畏強禦則吏治聳惟察惟法其審克之則獄訟平蜀雖萬里夫何逺之有可項寅孫除直祕閣權成都府路轉運判官制勑具官某魚鳬𧖟叢之國邈在參井皇華命使自江漢差擇而上之庶忘登天之為難爾以果逹之姿彊乂之志給餉上流既砥厥績就易飛挽之節駕言西征其氣蓋巳狎瞿唐灔澦而旁礴峩雪之表矣吏以不失平為良民以不取􅑿為冨邊徼以不求功為安知此於將指乎何有可童頥除直祕閣權發遣䕫州兼主管本路安撫司公事制勑具官某䕫子之國楚蜀襟吭時平急於拊綏有遽於控扼牧民御衆必惟其材爾氣岸瑰瑋風采英發曩守齊安能不撓于彊衡陽又以節用愛人著推之坐鎮三峽鞏護十連不惟刀耕火種之民懷生而樂業平沙八陳歷歷魚復折衝應變之略盡在目中矣往哉母憚叱馭可游九功除祕閣修撰知慶元府兼㳂海制置制勑具官某四明密拱吳㑹遙控瀚海制閫重寄間以法從臨之苟當其材何嫌超授爾涵負之深踐敡之久要衝巨鎮隨所至以最聞矧導承密旨熟聞德意而以中祕論撰蒞吾股肱郡辦治易爾雖然維大家有禮字細民有恩讋魚鹽姦宄之出沒有威靡舛厥施時乃良牧其祗若豫訓可張元簡除湖南路轉運判官兼知鄂州制勑具官某季子歸魯廉頗用趙民望素孚則舞轡於熟路易為功爾氣壯而材豐識髙而論偉曩守邊壘奮不顧身以衛其民重湖以北莫不想聞其風采兹駕漕軺往填鄂渚號令未施列城已信其能福我矣轉輸澄按之餘扶羸飫飢搜惰繕圯使隱然長城之足恃斯增重於夙望可何元壽除太府寺丞總領湖廣軍馬錢糧制勑具官某紹興分建四總今垂百年時有不同得其人則轉難而為易爾肅括而將以敏暢逹而守以靜試郡並塞不求快意之功厥慮蓋深起守武昌以漕挽攝軍賦切切於民之瘵國之疚厥慮益深事惟知其難則易者將至此朕所以就卑餉節而華之丞郎也信能以仁為本以智為制斡盈虛權取豫俾挈畚用𥙿而民不病則豫以懌可林半千除江東路提點刑獄公事制勑具官某慶曆𥘉謀國者欲漸易監司使澄汰所部吏以興太平朕采是說於親政之始所易多矣而一節以庾再節以漕三節以憲獨爾之升若梯級然豈非進不失矩施不失度能以儒術行耶夫聽獄之道明則不濫恕則不苛敏則不淹爾固無俟多告察屬吏賢不肖廉濁而勸沮之使江左風采有聞焉惟汝嘉可丘嶽除淮東路轉運判官兼知真州制勑具官某國家有事于中原淮民征調勤止必知其俗者順而拊之庶幾說以先民而忘勞爾淮人也忠實而無僞精敏而有勇久宦于淮閻閭之休戚邊瑣之利病瞭然于中朕知其非嘗試者比也虎符龍節自西徂東科斂思所以紓之繇役思所以間之和糴之害屯田之便思所以罷行之笏畫鞭算之中不失鞠人謀人保居以福一道豈特真之私哉可平齊文集卷第十九
