  text: 平齋文集卷第十三
  hash: sha256:0fca966fa981c117a6ba9953890d29ff0a009e3351b7fd7827b18ff9d1358d93
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0311_SBCK_013-1a}
body:
  text: 表龍州謝到任表參井天髙甫解佐州之組洮氐地逈猥分護塞之符祗服詔條具宣德意中謝竊以蠶叢開國於千古之上龍門置郡於萬山之間壤雖接於松維風尚餘於綿劒諸關晏謐商通蓬婆滴博之郊兩縣豐登民樂無懷大庭之俗相安清静冝得循良伏念臣濩落無庸輪囷有志遡淮堧以北慨祖逖之如存捫蜀道而西信武侯之可作繇治中之冗綴從閫外之下陳趼足徒勞刳心何𥙷不遑將父方滿秩以謀歸亡以瘉人廼蒙恩而出守靖惟忝冒倍切凌兢兹蓋恭遇皇帝陛下立賢無方用人惟已格帝若伊陟臣扈内尊朝廷治民則黄霸翁歸外布郡國况在坤維之表欲如天陛之前遂使譾材亦叨煩使臣誓鞭駑駕仰荅鴻私七百里山髙谷深首嚴保鄣二千石政平訟理共樂耕桑臣無任謝暦日表運承天統益綿卜丗之休暦授人時特重歸竒之閏民生知勸吏績用熈中謝恭惟皇帝陛下紹開中興昭受上帝齊璿璣之政旦復旦而有常推神筴之元朔又朔而不息爰謹日官之課仍新月令之頒臣猥戍龍門恪循鳯紀刀耕火種俾陶一氣之春椎髻卉裳同樂三登之俗臣無任瑞慶聖節賀表日宣重光乆啓升平之運龍成五色仍摽震夙之辰懽動幅貟和薫宇宙中賀恭惟皇帝陛下天大亦大日新又新丗祖之三十年寖格清明之治武王之八百國迄成耆定之勲屬電樞之發祥冝旗翼之齊壽臣涪江領戍嵩嶽傳呼十月未央阻効稱觴之慶千秋華蕚願輸獻鑑之忠臣無任功德䟽赤龍紀瑞聖人間生白狼獻詩天下同慶輙裒衆妙之果仰介無疆之休皇帝陛下共願福禄萬年本支百丗日所照露所墜盡復輿圗天以清地以寧永隆磐石謝授中書舎人告仍賜紫章服表臣某言恭奉告命授臣中書舎人仍賜紫章服者南臺執法方虞妄發之愆西掖代言忽冒眞除之寵恩深語塞感激涕零中謝臣竊觀元祐之𥘉欲救熈寧之弊御史則劉摰傅堯俞王巖叟諌官則孫覺鮮于侁朱光庭給事中則純仁知制誥則蘇軾維當今之更化冝視昔之得人伏念某學術踈文氣卑沮無欲不欲蚤嘗慕於前賢時行則行晚始遭於上聖甫玷粉闈之直趣陞烏府之班知可爲於忠言期不負於所學莧陸夬夬去惡草以未能莠田驕驕護良苗而徒切坐需汰斥誤𬒳褒遷踰旬觀象之門即日紫微之閣移抨彈於封駁固脉絡之相關加修飾於討論柰精神之巳奪戴天坱圠控地凌兢兹蓋恭遇皇帝陛下煥文惟堯好善如禹謂臣九年之謫困何意於求升念臣一日之逢否不期而返㤗俾効操觚之技驟參簮筆之聮進之史職則望溢於元超錫之命服則事同於李絳便蕃君寵洋溢親懽臣敢不砥礪夙心研磨素習雷一動而皆奮勉揚更化之風水萬折以必東誓竭徇公之節臣無任謝特理磨勘授朝請郎告表臣言恭奉告命特授朝請郎者課格三銓尚汙丹籍秩陞二等忽冒紫綸轉渫辱以光榮抜滯淹而奮厲中謝伏念臣學惟守僻志不量難明主樂忠雖嬰龍而不忤柄臣忌直竟編虎以奚迯投閑三禠之餘待盡百罹之外㑹恩不宥引咎誰憐元成玷缺之詩動心有益范滂黨錮之傳委命何辭浩日月之居諸歘乾坤之軒豁晨脫深穽夕趨要塗困據蒺以雖危㤗包荒而終吉鑒觀素履知無一朝詭遇之心考覈踐更念有十年不調之歎官簿與進文階歴觀大化之更無若微生之幸兹蓋恭遇皇帝陛下惟皇作極觀過知仁謂静者無營臣之静特安於拙而退者不競臣之退乃厄於窮過爲華衮之褒昭示緇衣之好疊䟽新渥一洗舊愆臣敢不懲迷復於前戒冥升於後終身不理磨勘固慙淳熈勸講之官當制封還詞頭尚勉康定代言之職臣無任謝授侍講告表臣某言恭奉告命授臣兼侍講者五花疊組甫塵鼇禁之除六畫專經仍玷虎門之選籲天莫避蹐地靡皇中謝臣竊以太極判而兩儀生聖人出而八卦作取小過取大壯堯舜獨盡其神曰連山曰歸藏夏商參用其灋皆繇汲汲之學能進乾乾之功迨開物成務之教衰而崇德廣業之意泯第資誦說莫究推行武帝尊儒紊通變使民之理太宗慕古昧以蒙養正之方縱得其言何關於治蓋形而上者謂之道必神而明之存乎人恭惟皇帝陛下觀象洗心玩爻盡性悟㤗之内健外順首賢路之宏開鑒蠱之上剛下柔急朝綱之復振有體則斯有用能知而必能行奚俟鯫生尚容蠡測况臣鈎深無得納約有慙朱雲之折充宗僅致忠之辨京房之事延壽靡忘理亂之占雖爝火莫乎日月之光然勺水猶覬乎江河之益探先天之妙藴踐前聖之微言剛健中正粹精著在自彊之德聦明睿智神武形爲不殺之仁俾斯文之大興幸當丗之親見臣無任謝授給事中兼侍讀賜對衣金帶表臣某言恭奉告命授臣試給事中兼直學士院兼同修國史兼實録院同修撰兼侍讀仍賜臣對衣金帶者瑣闥邃嚴首玷塗歸之選經闈清閟仍塵勸誦之聮拜奎畫以欣榮佩身章而増愓中謝臣竊以月正元日虞朝闢四門以逹聦毎歳孟春夏室狥百工而來諌蓋重履端之序用開進善之機矧銀臺乃國論綱維之司而金華實君德涵養之地運適逢於道泰賢冝急於時升伏念臣質弱早衰噐卑晚遇烏府詞垣之陟首破拘攣鰲扉銓省之登徑排膠葛念有君之忍負務非道之不陳薪未及然慮在上恬下嬉之表婺矛牙不恤緯憂形外阻内訌之間過蒙採擇之明荐𬒳褒遷之寵禮成元㑹命出昕朝責之以論事回天期之以引君當道鵜梁不稱其服凛疊組之難安鴻陸可用爲儀藐濫巾之無𥙷兹蓋恭遇皇帝陛下至公廣𬒳小善兼収謂臣狷有不爲靡徇脂韋之習嘉臣斷無他技粗存骨鯁之風故於漢廷奪席之朝魏殿設樽之旦趣陞華要俾罄迂愚第臣術昧觀頥病深咸頰乞投閑而雖切蒙賜告以良優惟薄蹄之力巳窮而倦翼之影冝息願解禁廬之直退從釐館之游飯籸扶羸儻遂山林之養羮芹效美敢忘畎畒之忠臣無任遺表臣某言竊以榮必有悴生必有死戀昌期而雖切撫頽景以難留中謝臣猥起窮途首塵要路志存冠鐵竟貽捫舌之羞戒忽佩韋遂召朶頥之疾廼若兩年而五擢甚至一月而屢遷拜宸翰於形神凋落之中進華序於氣躰摧頽之日屢騰祠請終閟俞音聖恩磅礴於兩儀遺忠輪囷於九地息今垂絶鳴固冝哀臣竊謂今日内訌外阻之勢已成根深蒂固之計安出殆非人力之及尚幸天心之回皇帝陛下至敬無邪表裏靡間而後可以祈天至公無私親踈如一而後可以祈天君子常進不摇於憸壬而後可以祈天直言常用不移於䜛佞而後可以祈天省賦薄歛不以四海奉一人之慾而後可以祈天賞功誅罪不以一人抑四海之論而後可以祈天大臣叶心共治群臣絜已奉職皆所以仰輔天德同迓天休守决不可玩視和决不可輕信事關存亡何止成敗臣奄謝明時永孤聖造魂氣有知猶當上訴于帝蒙韃不可爲中原主必佑助于有德猶是微臣區區報主之職分也臣無任御筆端明殿學士洪某鯁亮忠慤有助親政遽覽遺表深用悼惜可特與執政恩例簡劄上廟堂劄子某猥叨誤渥祗拜明綸靖惟僥逾莫稱拔擢不敢僣控私謝謹熏沐拜手以毣毣之愚僣言之聖上更新萬化取端拱咸平建號改元欲還太宗真宗一統太平之盛其原必自近始秦王薨於端拱之前四年太宗聞之流涕即詔曰涪陵公廷美朕之同氣也冝追封涪王謚曰悼且封其子至真宗未改咸平之數月追復秦王㝷改葬汝鄧間兩朝忠厚親睦之仁上通於天今紀元取法其有感於斯乎聖上本心之所發見必於首春自有處分股肱大臣從容開廣使早有定論以慰列聖在天之靈端拱咸平忠厚之脉迓續於無窮矣某備數分察欲舉乙酉封事中語再有陳述退念事關大體必出於宸衷獨斷而後光明俊偉在大臣亦盡將順歸美之道與臺諌有言而後行萬矣因觀布衣諸葛符所上續生意書冒昧敷爲廟堂新元壽國獻伏丐鈞察與張司業宓劄子某少禀適有經德劉齋長見過䄂出上皇帝書録本自言欲解職去退閱所上書殊有直氣學舎累年厄於鉗制今始得伸一喙於可言之日九重樂聞人言大臣不惡人言給舎臺諌而下人言所及聞之亦足以戒今何所忤而欲去耶敢望開諭前廊勿令解職以成朝廷培養士氣作成士風之美伏覬炳照賀游景仁工部書某承𬒳郎潜之除私切賛懌正大明誠謂冝日夕在上左右陳善閉邪以究中庸大學之功青綾入直未足多賀數年來奏議警䇿如執事者有幾吾君不以爲午而除目毎在噤蟬喑馬之先搢紳可知所勸矣論思精切尚盛氣以湏之荅游工部簡伏讀奏篇如喧啾百鳥中之孤鳯如窮隂沍寒中之霹靂如九鼎象物而鑄魑魅罔兩爲之膽栗神悸如大光明鏡當空而懸大魔王無所遯形甚盛甚偉司馬公門之有元城崔先生之有執事可以名百丗矣荅葉子真書某疇昔過九芙蓉下知有隱君子之廬在舟駚弗能扣謁迄今不滿珤帖相先陳誼甚髙凛然不敢當兩都盛作雖用班張賦體發我宋之光明究治亂之本末主文而諌國風之遺意也明主冝置一通於座右以爲龜鑑惜無夜誦子虚者雖然得如狗監誦之政恐牙頰汚君賦耳琴書何時過潜山寓舎在臨安道旁弭節賜訪庶滿定交之願切幾紆照荅黄濟叔簡某不聞問又許時東山桃柳觀玉泉笋蕨供未嘗不撫景懷人寵示睡藤深仞愛念養生者枕不欲髙以禇爲則日减一畨其平以漸也前是有惠枕者皆苦髙拜賜獨便衰惰鈞天之想已斷遊仙之夢可㝷老去惟睡熟有味耳與李微之校理書某疇昔祓飾子墨酬先施後山深林宻病嬾相乗賤姓氏無從徹風日不到處斾芙蓉而弄斗柄駕蓮葉而讀玉書殊恨仙凢之隔也伏諗通金閨之籍進紫宸之班上待特舉有禮矣公可以留矣多賀多賀司馬遷史號實録酷吏傳張湯在其中平凖書又謂湯死亡思湯平生大略可睹班固推賢揚善拔之酷吏推賢揚善可進也而煽虐流毒不可泯也讀史至此毎疑班氏以宫掖之故與金張許史不能忘情特曲筆以出之丗未有擿其心者執事以良史材實録以信後丗於遷固必有折衷敢請所以教荅印松巖帖道人出山去山色如死灰更下一轉脚作麽生鷲峯旣能飛來何不飛去曰百動不如一静松巖畢竟何如時印老再住中天笁荅楊平叔知丞簡某正尓寂寂忽來跫然之音於萬里外猿鶴起舞清燈相對澹有餘味哦新詩道舊游恍然置我太白峩眉間而飽之風露也去不待明良用悁結善圃記見屬極仞下采蜀名公巨筆如林何爲乃貴野鶩告更圗之庶不爲江山花竹羞與俞提舉簡某聞抱邁往英特之氣而不伸舒固易成疾湏得慷慨士共談古今盛衰治亂之故南北離合成敗之因奮髯頓足極其痛快以振宣精神否則秀眉清吭緩歌美成小晏得意詞更畨進酒花信風散入骨髓經絡則病自霍然去矣公以爲何如荅何正父簡衲子有修水觀者湛然虚白在前童子投以瓦礫而心爲之痛瓦礫去心即安如𥘉執事得無有隱然未快者乎又有叅黄梅禪者百雜碎還我核子來老夫不復作核子想也荅沈簿餽歳簡某今年至窮無錐可卓老色懽悰相爲消長可柰何風誼不替先春致餉脂賜銀罌柑傳紫帕不復作此夢烹鯉點酥而引大白亦窮臘盛事感甚感甚荅葉子真書三墳書見寄張燈細讀如登無懷赫胥之庭與鴻𪷟汗漫語知易無起止太極無増减特今人自不古耳連山歸蔵方從館中傳抄俟至更當參合以驗所造大比又近俛踏槐黄否篤志古學如此安用追逐時好東塗西抺爲某歳裏殊乏好懷得袁安太丘語不覺興起略此奉報時中彊飯以昌斯文荅髙處州書某毎懷龜緫之冨騶牙之博玉連瑣之竒古金背鏡之明清一代能幾三十年前玉堂䇿天猶教管一樓煙雨耶峯雲留鬰堘水溜潺挾此豐年歸報天子某屏息萬山間不敢以隻字汚人門髙誼絶俗銀鈎寳唾逺訪死生正是北關風雨中送客時節可勝悢然異書如見異人它稱是褁飯問子桑之意何可忘荅魏鶴山書某重午日忽得李校勘書轉示珤帖鈎畫爛然晃漾心目竊知存養深固踐履堅實著書立言超然自得不爲江山風景動揺喜劇而悲如見君子記文録似皆有益丗教不爲徒丈如入清廟觀武庫一名一物皆足以使人起敬畏志定而氣盛也簡州三賢閣記發明著於人心極有味百丗之下猶將聞風興起天目山房𥘉無足道託髙文以不朽遂與廬山山房照映今古講學之方行已之要用丗之大法皆在焉切磋究之愧不獲朝扣夕請何敢以爲過額篆竒古清壯與文稱崔菊坡結字老蒼當禀凂書記二美具矣自有天目無此竒事老人年七十有二菽水蕭然相與安之若命而獨學無友孤陋寡聞求仁入德之本尚幸私淑之荅呉叔永寺丞書某山中人不敢修履端賀頗聞除用衮衮可奪淮南之氣蜀珍何尚遲之叔永四六時出一斑亹亹追逐前輩似聞近頗推擇玉堂揮翰之手欲辭得乎某一斥七年床頭惟有易在百榖草木皆甲拆焦榖不芽亦是天道栽培傾覆之常但願麥熟師休與大千丗界同此太平之樂長安城中燈火笙歌徹暁湖山柳又黄矣過蒙紆念寂寞顓函勞訪鮮醲交委窮悴亦春多感多感又至節小簡新陽方升天機在半夜子之𥘉人事在五更三之後觀復于此作如何薦取偶得雙魚二兎持獻求筌蹄外一轉語莫只道萬物未生時芸生荔挺出矣荅張簿惠白魚帖入夜辱雙玉尺之餉張燈舉酒恨無水晶盤行之媿感媿感荅程宗武書某前辱見過清談殊欵鄙吝之意消矣讀書爲文皆以優游涵泳而得之優游涵泳之功非膠膠擾擾者所能爲也故必主之以静外静其形内静其心危坐沉思始能㑹古人之意於糟粕之外不惟進於文且進於道矣丗有形雖静而心實馳者亦有心欲静而牽於物交物不能静者大約息形而後能収心形且不息心豈能収心不能収學於何有異端之子猶能以觀鼻端白數踵後息爲功吾儒乃不能歛方寸於環堵間顧欲求史記於名山大川如子長是爲大也是自恕也吾子年甚少天資甚髙恃其天資之髙而忘其年之不能以常少濡筆伸𥿄前無古人問其所以尉垂白倚門之望則未免老歳月於奔走吾爲子懼夫君子之於學蔵焉脩焉息焉遊焉藏脩學也息遊亦學也非曰墯肢體以爲息縱耳目以爲遊也藏修之未加而假息遊以自放求夫文之進且不可得况道乎吾子往矣深居而衆籟寂寧極而萬境融以此讀書則書有味以此爲文則文有法以此立身則身有度優游涵泳之功日異而月不同矣若曰吾身雖動吾心未嘗不静當思静在動先可也相愛之深不容不盡情幸勿罪通崔菊坡書某伏自閬州城南下違離之拜整整十年進不能爲公朝趍事赴功以荅所主退不能從師門攷德問業以益所學一不成而萬有餘䘮空老此生然猶不敢自枉者寜以窮故負知已不以通負知已也况今天下逹尊誰出先生之右門人弟子之最親孰如牛馬走造物深意安敢不使同退又同進耶搢紳間謂凢任制閫莫有終譽獨吾菊坡不待躡足之疑便引掉頭之興綽然餘𥙿乆而愈安公孫碩膚德音不瑕考槃在澗碩人之寛詩取碩大爲言蓋其胸中浩乎而淵盎乎而春貧賤冨貴不能移吾之所樂惟先生以之邇來頭風不作酒時進而飯日加天所以壽吾道之脉也某骫骳之藁近綴拾若千首繕録仰塵宗匠郢人運斤成風斵鼻端之堊斵者固難受斵者亦不易告痛賜斤削暇時更告賜一序引以黼黻之使得託之不朽死生榮幸荅毛君玉簡某正坐晝寂而髙軒來氣甚明禮甚度浩乎吞鴟夷五湖於胷中而無西子之累所見過所聞矣金堂石室之勝俟霽同登判作半月期揚鞭索去銳不可留目送征鴻立盡梧桐半軒之影荅呉叔永司封書某比承遣信暴下後勉出勞苦之聞其歸言鬚白容悴不類前時司封甚駭且疑非愛念之深不及此人生能幾寒暑六十到頭如何禁得老色不上面頻年窮阨以少知命而安誼不至以飢渇害其心猶能堅忍待盡於萬山間暇時繙書考觀古人行事體察諸身毎竊笑韓退之不善處窮去國得州未至落寞嗟嗟戚戚日與死迫欲奏薄伎於從官之内紀太山鏤玉牒便作司馬相如垂死時語使其重錮乆窮無覔飽之地又當如何彼宗元禹錫爲冨貴所引如嬰兒之慕乳其不能處貧賤却不足責辱愛念不翅骨肉輙發其狂言幸勿爲不知我者道又荅借書帖某宿拜還誨玩未脫手蠆尾又來閴寥中風誼孰如司封者携酒與魚以借書又是山中一竒事平生只據見在無力殺青數種皆未之収南宫北扉旦夕且出命直湏洗濯舊見以生新意使前無古人叔永肯効獺祭魚耶荅葉子真書某面壁窮山自分老死一且蒙恩入爲禮部郎未浹月忽叨分察之命夢想不到神魂爲飛髙誼絶俗妙灑臨存不作兒女子昵昵賀語而開以象筵第一誼拈槌竪拂喝佛罵祖平生無此伎倆所擉雖非甕中鱉亦直鱉耳憶昔行見寄崛竒警切起敬不暇雪平地尺欲覔訪安道之舟無繇可得擁鼻清吟徒深悁想荅真福州書某疇昔端拜上記後兒曹得從阿戎於日邊獲知時止時行之槩大用尉㥦鳯凰覽德輝而下千仞維日望之聖上遵養時晦之乆剛明奮發風采立變大姦距脫來者始有安脚之地前因奏對嘗陳君子聚則爲泰今自外至者纔一二而大老未來真儒未召否泰之機猶未决私心憂之温陵積蠧之餘不謂費支撑𥙷緝如此陽春有脚又轉而南朝家不過爲潢池未清計國有仁賢則四海赤子莫不奠居奚一方之足慮新元發春或以登延君實爲第一義則上下之疑泮内外之泰成矣某爲郎纔旬日忽叨分察之命控辭弗獲黽勉就職來從乆廢朝廷之事體人才之品級懵然莫識冒處非據夙夜針氊昨借樞臣開端連上三䟽未報可平昔聲望不立致使官以人輕更遲數日不報則自作去就得從此脫去豈勝至幸况内蘖外疽未易直問耶珤帖下辱在爲郎時郎只官守察乃言責一有曠敗必貽善類宗主羞不惜鉗鎚俾有見趣郵置可數數也荅張鹽官送無垢詩刻簡見惠無垢詩帖石刻得窺前輩典刑凛凛起敬其守永嘉以病目歸而字畫轉遒勁向毎嘆無垢連蹇十四年纔脫覊紲得一郡又以盲去疑老天大無分暁今因字始知非目病雖病亦非盲也荅趙南塘書某近拜報翰之辱良尉尊嚮山中人備數周行饕榮巳甚毎思季子黒貂裘弊氣厭厭出裙𥜗下纔得一飽竈婦亦爲之動色不知窮不失義逹不離道爲何如人也面前事推排且盡更一兩日即上祠請𣏌天之憂固隨寓隨在朶頥宿疾庶幾可瘳珤帖臨存備仞燕間之適曲肱飲水尚自託於下風鍾皷園林此生絶念矣荅蘇上舎書士君子立於斯丗能處逆以順則無入而不自得猶之水焉瀑於吕梁湍於龍門束於瞿唐灔澦或搏或激或洄或洑或潜或濆所遇之勢不能皆如長江大河一放千里之爲快而其順則自若此習坎之險所以維心亨也足下得罪之𥘉士友過者皆扼腕裂眥以相告非其罪明矣非其罪而處非其地境之逆也聖賢觀人不觀其處順而觀其處逆貧賤則不去患難則傃行空乏其身行拂亂其所爲則以之動心忍性其中休休焉安乎天而進乎道也某於足下無一日之雅賜之書如乆要誦數過喜其無怨懟之辭舂陵論著誦之半月喜其在貧賤患難空乏拂亂之中而有以養其心信其善處逆也易窮則變故否終有喜困終終吉剥終得輿如足下之學之文天豈終厄之哉占報草草伏惟亮察荅禮滅翁帖承教帖獲知新正領衆安隱甚尉湖山作春雪供草木玉立聽說法這一句直是難道更湏教衲子門嚼着冷冰冰地應心方好回蔣祕書伏審入趍中祕候對外朝養齊明之誠以動凝嚴之聽造請可略也劄翰戒暁仰仞謙光進昌其言用鬯所學不勝區區之望切覬台察荅淮東趙帥葵書某恭諗張碧油之幢眡黄金之印淮海澄晏青齊震驚慶愜慶愜張忠定在蜀五年工夫只一信字某官雍容籌邊慷慨敵愾淮民之不淪於左祍皆一手拯拔之力威名惠利草木亦孚今又撫甘棠婆娑之䕃而封植之足食足兵而民信冝無難者衮衮未皇上記以賀首𬒳珍蹟鈎畫淋漓猶帶平山堂之雲氣尉浣以還恨不獲從公于邁周旋樽爼細聽堂前楊柳之詞一洗磊砢寵示榜文切中兵民之害還浮鹽通竹木規摹整暇懦志爲起邊風不動以湏暇之日而圗堅乆之功北顧寛矣荅袁守甫書某投閑時士友自番江來爲言新刱書院甚盛教刑合爲一其淑人心甚大拳拳歸敬遂因名山四大字之賜附記以自通浮湛不足計也九年擯廢一旦推出失身閙籃眞是窘事馬伏波謂聞人過如聞父母之名今乃盻盻然揣量長短指摘是非用心雖公亦壞心術朝夕凛凛抱負乗之懼而眞貳卿書來告之以當徐徐開導母遽激烈以養人主之善意使正論日伸正氣日長越兩日閤下書亦來又告之以私情不克公義不昭以含糊依違之意見而欲挽回積年巳倒之瀾天下無是理於是滌泓濯頴手録二君子書粘置屋壁東西銘之旁合以自警氣卑識陋恐終負期屬朝廷𥘉意不過禮隗以勸來者今諸賢漸集不能者當止少焉力求一閑慢之禄以養偏親或未容遽去則群邪窟穴巨蠧根株明以見飭尚摩厲以湏邇者上諭臺長以隂消潜化可謂天地之量帝王之言然君子之進未盛小人無自消之理此萬目所以顒顒望閤下與二三公之來相與成端平之治也臺諌捄過於已著講讀格非於未形兼官信是確論亦必待其人然後行樂只君子邦家之光某遡風曷勝忱切與余京尹鑄書某仰恃惻怚愛民之素輙有控禀昨因論寛民力事遂及四郡仰給客米三縣民無藏鏹乞除禁米下江之令與免三分見錢聖上視民如傷從善如流聞已蒙報可推君之惠致之民則在大尹欲望主盟嚴與行下遍榜暁示通知使乆後貪吏黷胥母得容轉移之姦牟竝縁之利則家戴上恩人𬒳公賜與江山相爲無窮也前所白楮皮事巳荷矜從田里皷舞謹此且謝且祈伏丐台察通余尚書天錫書某九年坐廢一旦謂來擬時從賔尾矯望班頭攷德問業之有地人事好乖勇去莫挽江空目斷悁焉下風疇昔閑居讀論語用舎行藏一叚嘗妄論不終於藏之學在用先故能用之則行不急於用之志在舎先故能舎之則藏公於此理講貫素熟善刀而藏之莫窺其際少焉天定以時止爲時行道更光明也太夫人乍還里第不至蔕芥否伯壎仲篪垂金佩玉以奉綵衣之樂魯侯燕喜何以過此某墮身閙籃直是窘事旦夕湏謀脫去趍承淺而知遇深告時時警䇿開迪之荅趙淮東書某洊拜珍帖之辱謙光爛然病睫開明寵報漣水已還版圗之舊不折半㦸坐収全功以嚴淮堧之屏蔽視窮力以堰瓦梁利害相萬前此有言屯田者某毎謂屯於外壤而不爲盗資屯於内地而不奪民有然後可爲經乆之利漣水間田不可以頃畒計果能因其人力使自守自耕旣不爲盗資又不奪民有積粟強兵隱然金湯之固自治之上䇿也前時但知移吾粟以養左祍故終於無成爲國謀長正倚忠略規模審重乃見良圗某曷勝欽嚮之至荅眞福帥書某備貟分察兩月間凢十二䟽其論事一則中書積弊二求言求賢三講學急務四乞施行同列論䟽五寛民力論人之䟽首薛次袁又其次中外十餘輩而已外間所傳人數甚多皆非事實所陳亦未有不行但行之不盡如所乞尓上嘗諭臺長得放過且放過使之隂消潜化此天地之量也然君子道長則小人道消進君子不勇小人無自消之理此中外所以顒顒望公之來公果來天下何患不泰前日講學䟽中首及兄弟之好又以公劄與廟堂言之意猶有待末及邊臣生事異日憂端恐在此兹拜珤汗之辱蒙以静定和平爲然静定易揺於喜功和平之過易入於弱又湏得舒卷闔闢之權可也閩中想不至如泉南費力欲作三五年規摹公計甚得天下計則未也去非筆力敏健且記得人物本末甚冨駑良不齊物論莫揜少焉湏謝去尚惟以主盟國是爲心隨事警起惴志使不爲公朝羞察官例以上下半年檢三省樞宻院簿書舊幕次都堂之右嘉定移就入門客次近僅能正此一事餘無足言併乞台察荅趙楊州書某坐想平山楊柳之盛東門芍藥之芳雅歌投壷恨不獲爲席間小異客妙畫忽臨光風滿把尉浣不容聲日來苦目眚焮瘇腮頰醫者謂當於春宣時大下之則風熱盡去昏眵可一洗自料元氣素弱禁不得此下遂謝醫瞑坐數日而目眚愈保此殘喘悉藉穹芘荅呉緫卿書某方抱婺緯之憂珤墨以奏議來熏薌莊誦灑然醒霍然汗下而愈其論起於好勝遂至以國爲戯士無定見又相與慫慂之洶洶如海濤之方生勢不容禦朝廷處以王述遺意幸未大决忠忱體國議論回天以守爲實以和爲形以戰爲應孰謂峩其冠者皆不知兵哉末引髙廟語孝廟勝負存亡之判最爲切當若曰主上它日臨朝有無一人爲朕言之嘆却恐有所見略同者未可謂盡無也淮襄爲藩籬江面是門户玉麟主人目今作如何措置守禦徹桑未雨莫待臨期出打樁之䇿幸甚折衝樽爼何必臨邊拂天旌斾之來區區望荅徐倅普書某叨竊過分病魔瞰之藥褁未嘗離手親舊書率是踈闊不特記府爲然圗上方略奏陳便冝慷慨功名可勝起敬五福言冨而不及貴足下冨矣又貴之求熊魚兼得豈不大佳然馳驅戎馬之場拮据牛犁之役得不𥙷失勞而無功孰如棹扁舟於苕剡岸紅堤緑應接不暇酒後耳熱倚風而浩歌足以洗胸中之磊砢子舎孫枝督之力學異時取科第以興門户志斯酬矣平齋文集卷第十三
