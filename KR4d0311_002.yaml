body:
  text: 詩一廬山五猗猗若人兮葛巾渡柴桑兮水泠泠稚子髧兩髦兮從而後東家有酒兮緑參天其䕃柳山風凉兮月瞑枕白石兮未醒漭無極兮天游不知乾之爲馬兮坤之爲牛猗若人兮錦𫀆屏九疊兮紫雲髙騎雲氣兮超遥汗漫下上兮昌羊以遨左手兮提北斗之杓右手兮挈東海之鼇摩兩耳兮酣熱眇八荒兮秋毫猗若人兮草堂谷簾夕隂兮香爐朝陽表溟涬以爲門兮架虚空以爲屋四海非無友兮邀白雲而同宿風露澹兮我琴舞玄鶴兮龍吟與太古兮同音尚靈脩兮知心猗若人兮黄犢春風蕩兮瑶草緑犢護草兮行復止隔林呼兮老觳􅑌眠犢背兮閑閑仰看青天兮飛鳥還恍夢游兮何所箕山頴水兮匪巢伊許猗若人兮深衣萬鐘不爲㤗兮一簞而遯肥溪之清兮不受淄月離離兮風披披芙蓉兮渉採欲淡兮心夷駕言兮何之羲文兮與歸解纜春落平蕪外舟行白雨邊鳩譍山爾汝櫓畫水之玄官冷誰能吏身閑便是僊康廬眞箇去信有夙生縁晚晴子規聲裏半晴隂百丈牽行岸草深挾雨倒回風有力避山横轉水無心人於熟處難爲别酒到離邊不柰斟漁叟厎知如許事櫂歌穿入暮烟林水宿分席眠鷗渚廬山夢巳通蓬聲踈宻雨燈影往來風我正思吾母兒應說乃翁擁衾天未曉此味與誰同過四望山人逺鷺孤立湖平天四垂柂移舡解語帘舞酒求知望眼傾三笑騷吟寄九思今宵吾計得解鼈薦鴟夷阻風呈趙史君三絶長紅送酒岀江城檣燕喃喃第二程風色似知攀卧意打頭未肯放舡行倚風晴纜着煙莎一抹斜陽白鳥過脫手簿書無半點細飜黄卷課龜羅遲速乗除轉晩飈布㠶快意定明朝廬山試問髙多少欲望西川萬里橋左蠡山爲飛沙白江縁漲潦黄古今雙去鶩天地一輕航雋永還欹枕牢愁忍别觴晴雲横不度何處是柴桑落星寺春秋隕石于宋五分作金焦與星渚大圎鏡裏八䆫開面面魚龍聽人語瀑垂一線吹不動山擁萬騎明可數嗟哉蓄眼無此竒欲倒銀河卷歸去入山箯輿軋幽徑喬松矯踈花好鳥媚嘉䕃圎吭咽清笳膏畦走秧馬茅簷嘶蠒車誰知天下樂盡屬山人家橋横澗水斷寺古林屋斜羅漢寺銘架鎮法皷詩碑記煎茶尊者儼如故天奎失龍蛇劃然小䆫開五蕊撑谽谺斗酒軟兩脚捷歩窮烟霞三峽橋太行擘破黄河出贔屭飜身滄海立老龍抱寶正鼾睡地厎黒風吹霹靂挹之以北斗之柄瀹之以明月之璧啜之以太白東坡兩謫僊尚不負乎此山之泉石萬杉寺散珠亭酌觀音泉蒼杉拱立萬夫長破衲素封千户侯昨夜金僊失瓔珞寒光滿地不曽收瀑布開先寺後青壁雙尖長劒倚博山突兀晴煙紫槐里先生醉欲醒丫山道人定𥘉起摩莎兩眼看飛虹猛悟此身如此水崑崙絶頂有眞瀑倒㵼生肥玉池裏淙淙夜半漱白石十二瓊樓浸清泚是中有味人不知白練銀河較形似青玉峽水繞江南阿李家滿空飛雪響雷車流將采石磯頭去坐看浮梁壓浪花開先乃李中主書院大孤山洶長江其迅流巋傑石乎中峙送兩目兮雙㠶有美人兮千里東西林逺永兩尊宿未了人我心相距纔百武割據東西林淵明游其間買酒時共斟虎溪醉來往同是廬山隂清溜轉幽港斷雲度巍岑等作如是觀爐香對森森天池燈山谷人家避李成誰知刼數莫逃兵到今鬼燐青無數認作文殊佛火明庾樓湓城陶庾共功名廟食樓居孰重輕衮衮長江流不盡淮山青處夕陽明谷簾泉山椒飛派落寒空闘水曽收第一功萬馬鐵衣行夜雪六虬銀甲動秋風分甘晩到玉川子知味早輸桑苧翁手弄潺湲坐盤石蒼凉新月上孤桐楚城靖節祠雨引莓苔上短垣流泉無恙自㳙㳙不如歸去來兮好百丗聞風只杜䳌湯泉水府燃犀處扶桑浴日時能觀雷復地始信坎生離浄垢元無着温凉祗自知驪山殷鑒在莫受阿環緇歸宗墨池龍跳虎躍入昭陵墨汁空留一叚冰散作淋漓元氣濕屋頭老木掛踈藤三疊泉捉月仙人不到處騎鵠凌風髙着歩巃嵸翠壁挿天開天上飛來素濤怒玻瓈琢岀蓮花漏激電吸蜍髙下注布㠶危掛八節灘飽風吹上龍門路冰絲細織無幅綃雪花亂卷有聲絮蔚然而龍鏘然韶大者如珠小者霧解衣盤薄踞虎豹遥送空濛濕巾屨金鋪玉户蔡家姝拍手招人笑相顧麻姑老矣不解事指點五雲推使去白鶴觀缺唇丹井應千尺秃頂靈杉恰百圍鶴去不聞人下子黄蜂無數採花歸楞伽山房二絶八萬猊床方丈室九千書卷半邊䆫儋翁句子無人問流水泠泠度石矼風標勁似聶政姊筆力健如曹大家此手始能爲此竹對渠枯木老槎牙水行岸曲頻移柂巾欹獨倚檣月分雲外影風進水邊凉宿鳥樹三匝佳人天一方清斯纓可濯誰爲賦滄浪洪園洗心堂飲中偶成官事何時了抽身朱墨叢未霜烏桕赤得日紫嶶紅山勢西南缺湖光左右通引將絲竹郤洗耳聽松風荅仲肅梅廵簷索笑爲踈花便未開花亦自佳帶月折歸香在手閙觀塞破路三丫鄱江樓晩望暮雨纔收未炙燈蒼鷖掠破岸隂澄湏臾認得舡頭竹始信漁人掛起􅊻有感一蝗東方來孕子九十九未岀婪酣肚巳辦饞口漫天自成幕掃地不用帚一朝霜風寒何處弄百醜取凉二絶六月冷官還解熱解衣盤礴坐蒼苔微風只在松梢頂着意招呼不下來平湖水則减三分尚欠紅蕖一叚雲萬斛波光自吞吐月明亦足張吾軍敞雲樓二絶江天雲作黒山頽上到樓頭手決開水墨枕屏三百里斜陽屬玉一雙來草樹成行整復斜江頭白處定蘆花夜深更着無邊月好箇樓居處士家正月三日同莫幹祝法遊東西園探得行春第一籌南梢花事半將休斷雲不礙逺山碧新月自隨江水流金谷主人眞已矣玉堂老子尚來不丁寧留取蒲城酒更約東風汗漫遊擬古送莊郎中歸朝二首西北有髙樓長眺起我思我思非今人古人莫見之孟軻尊仁義妾婦秦與儀孔明抱禮樂鬼蜮操及丕已物孰重輕徇道不徇時冨貴一餉樂名節百丗師居今而行古豈無若人斯遡洄從之游洧盤濯雙緌渉江採芙蓉露華不盈筐雜之蘭爲佩申之蕙爲纕持此孰與贈美人天一方駟虬乗蒼鷖御風朝虚皇䄂中治安書琅琅奏明光探囊岀刀圭爲民起膏肓臨流不可渡與丗爲津梁玉池浸雞舌薫作青史香林同年𬒳檄來體訪民租寓僧舎有詩因次韻二絶河水清兮有縣特東方作矣未解𥜗寄聲卿自用卿法我獨舉酒留詩臞我雖不飽尚二簋人則何辜無一𥜗官儂早下减租筆天下可肥身寧臞送陳倅泊然無營如子雲撓之不濁如黄憲清静勿擾如曹參躬行不言如石建古人與稽今人居外若不足中有餘治中别駕寄途耳用則天下皆華胥東風昨夜收雨脚楊柳亭前小盤礴楚江君去定思君有酒一杯湏滿酌陪郡侯岀郊勸農六絶勸農冠蓋岀江干馬上東風觱栗寒珍重春衫唾花碧畫眉狼籍道傍看山青未了曉光開鳩喚鳩譍雨又催消得犢車泥滑滑此行不爲杏花來茅屋人家蓐食烟相呼趂雨好翻田去年下麥泥如鐵一寸春膏直幾錢争問官儂子謂誰看來似不是農師向人羞道閑陪渉說與豳風七月詩煉丹人去屋蕭蕭脚厎羣山走翠蛟長嘯一聲空響荅砉然隻鶴起松梢王仙壇勸農乃馬蹄福地晉王遥仙去之所丹爐猶存半落梅花雪透明不妨把酒當春行光風有意相料理楊柳青邊約畧晴夜讀夷堅放卷偶成歛卷驚嗟語幻哤搔頭危坐對明缸梧桐細語秋傳信絡緯長鳴月上䆫濁酒不多雙耳熱妙香無盡寸心降家山未得平安報飛夢東歸拜老龐秋夜一日一畨雨三更三昧凉桐邊青弄影荷厎静留香俗物刺人眼丗情冰我腸關山何處笛落月照胡床次韻曹提管楚東之作蕭騷兩岸落秋蓬楚水西流不肯東好酒但湏知婦有新凉莫問與誰同片心置向嚚塵外萬事留將醉眼中喜得建安標格在何曽詩解使人窮中秋楚東對月次曹提管韻西風一笑話綢繆白露横江滴滴秋天没遮欄金餅上水無邊際玉繩收扶將太白酣方適喚起馮夷舞未休今夕明年應更好夜潮來處倚危樓和黄宰木犀春風花事數河陽又見玲瓏糝綴黄萬斛香添秋醖藉十分凉借月容光熏奩拾取留長挹湯鼎煎來得細嘗湏信小山標致别從渠塗額學宫粧冷廨面挹重湖結樓以收逸放之景扁以清斯諸友移酒落其成分韻得里字寧飲三斗水不揖褦襶子寧食三斗葱不踏龍斷市伯夷聖之清餓死不受滓死猶清可爲况乃未必死幾人濁惡海雞鳴爲利起魏其武安門洒削胃脯氏椰榆首陽山自伐我計是使清能死人濁者亦死耳官居寂寞濵不墮闤闠裏嚚塵一關隔宛在水中沚樓居得未有鑒影時自喜天空塔戴角湖歛沙脫觜烏桕生晴隂芙蕖淡秋蘂鷺點横烟稠鴈掠斷雲駚山缺女墻轉林斜僧屋倚江流在何許危檣岀半指長堤苔㾗平盡日無歩屣有人爲我來寒冰照人只鷗盟以要之相對弄清泚明月不滿掬一漱霜入齒葹菉薋盈室爲君種蘭茞户服艾盈腰爲君攬荃芷吾非好獨清濁亦君所耻千丈一寸渾清恐不如此出門歌濯纓聲節中宫徴西風騎兩鵠碧落絶萬里次韻曹提管梅凌寒峭立向庭除晉宋淵明漢二踈面冷不堪相娬媚心清聊爲一軒渠月來月去香仍在春少春多意自如皎㓗孤芳誰與共作詩我欲寄東徐次黄宰早春韻勝裏春來早遲君秉燭遊煖如三月暮香老百花頭心事付桑落風光催栗留人生行樂耳任命不湏求分歧四絶呈及甫草色半有無梅花間開落還家正自好柰此抱離索送君一程歸别我數里隔定非愛雞黍前例無此客大兒長如竹小兒秀如柳迎爺拜新年頷髭白八九客裏有厎忙申旦不成夢逺歸勝新昏還君春睡重白鹿書院萬緑團隂町疃埸倚凉弦誦玉琅琅溪山涵毓中和氣草木薫蒸正大香陋巷顔淵何所樂舞雩曽點若爲狂懦夫百丗聞風起此去濂溪更有莊和黄幾叔墨梅二絶月暗雲迷竹外枝寒香未動便能竒面如坡老南歸後骨似温公獨樂時六月夜䆫留取看霜風蕭颯墮林端問渠厎事青青晩耻上㝷常桃李盤和黄宰招飲大都春色三分耳能得眉頭幾度開見說東家酒𥘉熟不論今雨也湏來幕官相約觀芳草於法曹之亭黄宰病不至以詩來因次韻似無細雨還應有欲落餘花更復留草際水邊青未了可禁杯酒爲扶頭古意謝崔楊州辟七首突兀誰家樓風雨歳薄之大梁危欲壓小柱亦半欹匠斧睨其旁搏手難獨支南山有竒材細鉅不可遺拒霜着秋紅夸詡顔色好五更青女勁顦顇一何早深林蘭自芳寒節耿獨抱識此知見香鼻觀不草草山深閴無人夜半迷黒月魑魅乗其昏光恠互岀没獨行欲何之十歩八九兀隔林炬火明命向虎口脫汾隂有古鼎金景歊浮雲斡棄不知愛瓦豆薦苾芬提携向中庭拂拭蒼蘚紋雖非大籀篆彷彿猶八分㩥㩥兒女手申旦軋機杼織成遍地錦翠鳳濕花露三年卷篋中背立泣不遇持歸付刀尺晝線金針度江頭客子舡盡日卧沙尾維楫非不具潮弱未能跬秋風雪浪髙長年絶呌起舡行莫倚柁難得此汛水梧桐生髙岡上有朝陽枝鳯從南方來覽煇而下之一鳴寒暑平再鳴風雨時秋秋百鳥羣振翼長追隨送潜同年敷調官歸以君一年長爲我異姓兄衡從玄圃玉岀入武庫兵急手搏蒼兕雋氣鞭長鯨議論到千古慷慨吐不平漢以𥘉元衰唐以天寳傾附勢妾媚嫵避事兒嚘嚶頽靡寖成俗忠良竟吞聲自謂倚南山不知壞長城君子勇於義小人罔而生儻不餓采薇逺可死結纓每聞壯其語亦嘗用吾情有餘不必盡尺渾勝丈清六經源岷嶓百家派渭涇歸求性内學莫計身外名春風兩鬢緑秋月雙眼明通德擁髙髻勤勤剔寒檠嚴陵道上雜詠七首江上送行潮汛小舡頭回首夕陽多人生有幾柳如此客思不禁花柰何半江雲濕欲成雨兩岸水渾𥘉退潮短短竹籬花朶壓深深麥塢雉媒嬌玄英范老聞風起俱爲羊裘一釣絲堂扁三賢非本意何如只號子陵祠石壇千尺薜蘿古沙徑百盤苔蘚香不是先生求矯丗懶將日月趂人忙闖巢摶黍待晨餉投岸舂鉏㝷暮棲揔是心爲形所役搔頭獨立渡橋西髙髙下下客行路整整斜斜人住家端的今年蠶較晩石榴花下響繅車細草護沙連不斷踈風畧雨散還收山田麥熟不歸去三百里江都是愁爲清隱打化僧說偈雲山幸不求吾是魚鳥依然笑我頑自欲入城持鉢去扣門可煞老僧閑丁東泉渇烏滴盡三更雨鐵鳯敲寒六月風湯餅困來茶未熟爲師揺夢作丁東昭君行紅嫣翠濕平陽里轣轆遊車汛流水蒼頭擁騎知謂誰草草人家寄生子君王神武重邊功不愛穠華勝桃李青鸞扶下五雲車顛倒衣裳冠薦履賞功未了說和親又墮蛾眉芳夢裏平章三十六宫春遣似天驕買驩喜朔風吹雪胡馬嘶獵歸月淡龍城西重旃穹窿壓斗帳泛盎快攪金留犂細調弦索爲郎皷手未推郤眉先低林深人静孤啄木春盡樹暗雙黄鸝大居次吹梅花老小居次舞楊花迷屠牙勃窣起爲壽一粲相對酣如泥子卿海上亦良苦牧羝未乳兒先乳信道天涯共此情誰謂姬姜必齊魯妾身不爲漢婕妤下嫁猶獲當單于從來蕃漢等昆弟得婿渠不如家奴君不見冡象廬山誰比數青塚名傳千萬古春日山行二首一晴一雨柳添碧半落半開梅着酸不𬒳東風相鼔弄春山只有老蒼官兩點眼光牛背上一􅌪春色落花邊丗縁不到山深處只恐深山起丗縁挽中書俞侍郎二首噐重千鈞鼎胷涵萬斛舟文章歐六一政事冨青州偃月知誰在靈光獨我留貂蟬雖未着不作汗青羞銓省承新渥詞垣訪舊隂頽波回萬折斷岸立千㝷秪謂人猶已那思昔異今時清猶憤死天地是知心贈希聲居士汗漫騎鯨去西風髮半簮安心元是藥得趣不妨琴人静蛩鳴夜天寒月出林爲君重洗耳别酒不湏斟江頭寄致逺二首箕斗光移析木津踏霜扶醉不驚塵夜寒應是梅花覺半歛愁容婉待春客䆫翻遍竹爐香樓外更聲作許長解事燈花相報似擁爐兒女說荒唐寄崔帥卿歸鴻隻影宿汀洲夢繞蘆花不柰愁頴谷杯羮無日遺翳桑槖飯有時酬功名曠丗來斯受議論驚人合則留此事大關天下望殷勤爲報古楊州贈趙同年别買田招隱落星灣採盡詩材始放還逆境自安天理順閙籃誰識道心閑兩窮覿面塵埃裏一笑論情醉夢間爲說斯文有宗主春風楊柳滿平山壽崔帥卿七絶嶺右山川間岀賢開元宰相最居先中間不數余安道恰到于今五百年連蜷雌霓墮晴空光照書樓卷𥿄紅天爲斯文開瑞應海南海北一宗工塞下人家盎盎春又推餘澤及流民慶州小范青州冨合作先生社稷身弄兵澒洞射陽秋一𥿄招呼殺氣收十萬蒼生驚魄定活人隂德過賔州夕烽旁午徹甘泉獨有淮東一臂全若使盡從持重計廟謨厎用更憂邊紛紛傳檄方言戰猝猝囊金又說和誰信規摹湏早定計然半䇿不湏多垂弧節過便春風入侍猩𫀆一點紅殿上獸樽誰得飲漢廷諸老定輸公續洗兵馬上李制置太白過午芒角獰蚩尤亘天鉤尾赬淮東千里正齁寢夜半洶湧傳邊聲王師北渡衂泗口胡馬南牧揺青平擁城敗將死蝸縮護堡羸卒飛猱驚詩書元帥戒夙駕往試百萬胷中兵幾人險語挽衣斷甚至涕泗交縱横李晟爲國不虚出裴度與賊難俱生兩軍相持以氣勝督戰火急開行營長江漲緑馮夷舞擊楫東來親一鼓威靈閃閃動牛斗精采軒軒起貔虎金牌銀牌膽爲冷千户萬户色如土尺兵寸鏃不待施巳覺目中無此虜四旬頡頏闘困獸一夕倉皇竄飢䑕不聞令狐戞刁斗但見龜山撑窣堵麥畦黄裏栗留風秧甽青邊勃姑雨老農想見太平年買酒煮茶相勞苦黄旗紫蓋祥光開宫柳飛絮公歸來平淮勒碑字如斗鐃歌奏曲聲如雷奉觴再拜白壽母兒輩破賊邊州回歡然一笑春滿面婆娑起舞斑衣萊還觀先正紹興日立朝清節髙崔嵬獨於和議植赤幟坐令火德然寒灰家傳此意石不轉事業自許圗雲臺從今着手快經理一洗河洛無纎埃君不見武侯用西蜀誅賞大明人自服又不見叔子鎮襄陽恩信一孚江漢皆金湯送興元聶帥泛觀天地間一氣如爨鼎半鼎沸正急半豈獨爾静從旁更益薪旣往漫不省疇當起沃之轆轤轉脩綆長空墮旄頭胡命懸漏頃不戢方自焚餘熖燎吾境俶從淮漢擾馴至襃斜警勢欲合南北事湏得要領和固不可爲戰亦未易逞中興關人謀而可倚天幸君侯冨經綸頗牧在禁省憂國如憂家申旦抱耿耿䄂中平戎䇿直欲繫其頸王斧下青冥上游建巨屏秋髙馬正肥慨慷泝巴郢鏠旗凛太一福星映參井蜀從更化來舊痛甫甦醒風寒不善護遂與勞復等内勢旣􅏓盭外兵且贅癭但嗟車轔轔未見旗整整胷中百萬兵氣壓貔虎猛凉飈送先聲鬼蜮巳匿影自昔樹勲業莫先拔翹頴共功非衆材殆類無麵餅孔明駐漢中欲翦漢賊梗委心任費禕屈膝拜許靖笑談扼姦雄老死不得至今出師表日月光烱烱惜哉㑹潼關不從魏延請公才幾倍亮謀略濟忠鯁機㑹有可乗臨事勿吹冷秦隴咳唾定歸衮顓國秉頌磨浯水濵銘勒燕然頂諸生筆如椽湏公一笑肯送新婺州汪緫領歸歙天驕運去如隤堤横決燕涿流青齊斬竿掲旗扣並塞𬒳髮左祍稱遺黎膾肝山前走肉語碓骨寨裏飢魂啼盡籠虎兕淮南北期獵狐兎山東西常人喜功首例肯智士察變眉先低危言不顧犯衆忌設難直欲開羣迷近嗟唐禍兆回紇逺述晉亂基羗氐積薪未然不着手曲突巳驗空噬臍賊㠶方落射湖去胡騎巳闖滁山嘶正湏籌幄坐月觀却卷郡紱㝷黟谿帶泥燒筍薦晨餉踏雨剪韭供春韲心安便是上池藥眼浄何用黄金箆蜀公早嘗着野服君實晚始持桓圭方來事業推不去還踏曉皷聽朝雞窮邊殺氣貫矛㦸嚴城酸風吹鼔鼙化雲相隨不可得矯望玉宇横蒼鷖送崔少蓬南歸五首美官誰不愛所貴以道得道足以得之有厎去尤力祥麟快掣鎻玄鶴不受弋此意關重輕當有識者識欽永早患失光禹晚志得飄風一鴻毛何能益人國己重物乃輕此理要深識方寸浩然氣天地吾其塞冨貴紛探驪功名競騎虎眉端萬國愁公意良獨苦五年安邊功絶口不自語仙㠶去蓬萊急浪一砥柱岀江梅未花過嶺青着枝解裝書滿床自課應門兒獨樂非不好民瘼將疇醫詔來不俟駕丗事猶可爲楊州傾城出作逺事追送諸生更依依瘦馬踏朝凍冥鴻去何許水落霜宇空鬢短心緒長危檣曵清夢平山放脚氛埃表搔頭廣莫間淮分三代水江護六朝山落日蒼烟起秋風白鳥還歐韓呼不起髀滿鬢毛斑勸農呈丘帥劭耕好語落西疇父老逢迎笑點頭銷甲事農官有術賣薪沽酒我何憂黄金深椀頻傾倒白布長衫迭獻酬颯颯雨華隨後乗安排麥隴十分秋南樓健目畧江臯淅蔌風沙響鬢毛草色不隨壕岸斷柳梢恰與女墻髙碧幢紅斾三邊帥羽扇綸巾一丗豪坐上捷書來獵獵官軍破賊戰方鏖挽孫謙伯二首文妙生花筆名成映雪書處家貧似冨應物宻如踈薦墨交黄綬榮光照板輿出門車折軸天理竟何如日月無多子郷邦失兩賢直爲吾黨慟不作丗情憐握手春風醉論心夜雨眠耳言猶歴歴何忍表君阡次繆仲右韻二首心緒千絲結年華一鳥過可人元自少知已不湏多咄咄君休恠嗚嗚我亦歌將軍渾健在醉尉莫誰何䆫暖楊花撲庭空燕子過年侵歡易減春惱病冝多攪涕論兵事扶頭讀凱歌日來能飲未正好醉亡何用胡衛道贈姚居士韻牢落淮南賦小山霜風容易老人顔楊瀾左蠡天垂碧夢與盟鷗共往還孫推内子挽詩玉立金閨客家人亦許清共聽秋塞柝細剔夜䆫檠娣𬒮從渠好兒𥜗得我平西風吹落葉不盡夕陽明李致逺母夫人挽詩二首有子何蕃似懸知母訓賢市賖留客酒隣貸買書錢苦過蓮心後甜囬蔗境邊一朝風木憾誰與問蒼天日與夫人子相隨若弟兄羡渠猶有母使我欲無生未病思求藥方餐念遺羮此情今巳矣淚雨待同傾送商緫郎三首鶴唳風聲淝水捷馬騰士飽蔡州平笑談定取中興䇿莫道司存只餉兵霜遲斷隴蕎花白水足平田稻子紅剰把豐年供祖帳送將玉節過江東百㝷浮玉三更月萬里長江一色秋照映此心湏此水不妨小泊讀書舟挽伯父二首白髮兒隨母蒼顔弟對兄四休元易足一笑更何營論事絲弦直存心鏡面平德人今已矣誰與嗣郷評憶作行邊别相期到鶴州秋風驚過眼落日懶回頭華屋空遺憾佳城足逺謀無從扶柩哭揮淚寄江流次張亞夫喜雨亞夫從張林自青州到楚汴都黍離迷宫堧金鋪獸面秋風寒百年大義冷於鐵西湖走馬狨絲鞍亡秦定必三户楚况今南北皆王土紫髯青鬢祖豫州威如迅霆惠如雨山東井落回生意收召驚魂髙枕睡中有虓將來青州馬蹄欲踏狼胥碎邦人聚觀閧塞塗和氣釀雪蘇焦枯銀城萬里軋坤軸燭龍一色煇天衢殷殷好語傳田間雪晴又雨直幾錢翠麰漲天士宿飽踴躍一皷空兩甄中原宿愁無地愬歡呼從此歸王度更煩老筆爲草檄讀之㑹使頭風愈挽李漕二首翰墨多推轂功名早着鞭風行青草外春到白鹽邊老去心猶壯歸來意正便如何天不愸烟雨閟新阡百折溪山裏佳哉有此翁名方隨政起命已坐文窮滿眼棠隂在回頭橘隱空詩髯無復磔萬象自春風次洪漕韻二首塞垣擁雪髑髏寒多少將軍博美官莫恨知心今丗鮮湏知行道古來難時窮地狹何能舞命好天髙亦可鑚此理乗除應㑹得梅邊索酒笑相看和月梅花共一寒兠牟未必盡麄官醉來抱膝吟梁父睡起搔頭著說難冨貴冰山何用倚功名盤石自湏鑚朔風衰草腥狐兎獵火歸鞭夾市看寄趙景周撫幹二首罨畫春樹碧逢迎繫行舟酒盡可以起更作湏臾留我方鶴投籠君已鷹脫韝相期在歳晏贈之珊瑚鉤楊柳青巳絮芍藥紅方葩詩隨去㠶東春風屬誰家音踈日月駚目短天宇賖小德最憐渠丹頰三髻丫贈洪子需二首莫恃青春兩頰紅年來我巳鬢如蓬盤洲野處源流在早挹文名尉若翁樓倚晴空月滿湖一塵飛不到庭除虞𥘉九百渾髙閣且讀人間本分書口占秋風巳颯梧猶碧宿雨纔収稗亦花天着工夫供醉眼東鄰有酒不堪賖贈相者猨臂老不侯鳶肩騰上速婁羅千丈長不博一寸福送丘都承藝祖立鰲極腹心趙書記披圗指幽燕翰死誰可繼異時拾空城中國坐自弊伊吾紛抵掌湏作根本計仁皇柔北夷冨公效表餌終身耻言功力辭樞宻使況今百年間未洗新亭淚平凉急㝷盟正恐廢大義中朝兩說分各植漢趙幟詔書趣公歸渇欲斷羣議矯矯鸞鳯姿鼎鼎廊廟噐持心水鏡平料事蓍蔡智天道方好還上䇿先自治折衷和戰間守乃萬全利西關碎其有東壘掇所棄證狀朝暮殊守亦豈易事醫國得和扁神聖工巧備囊中黄昏湯着手湏早試外禦幾邊將中權一閫制當思擇時髦不在變局勢時欲分道置制閫忠賢乃命脉公道實元氣精神以此彊可郤十萬騎淮南畏汲黯奉天倚陸䞇中興在公手一語澤百丗太山重名節鴻毛等冨貴不惟天下望是亦文定志紫樞摩斗極青藜照中祕江風駕檣烏天闊秋雨霽諸生笑牽衣狂語出半醉勿作醉語看嚼蠟或有味平齋文集卷第二
