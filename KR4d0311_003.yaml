  text: 平齋文集卷第三
  hash: sha256:3c0aed180ccddff289062967399a9e71c81f9d304fa70c0a996ae246a399e157
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0311_SBCK_003-1a}
body:
  text: 詩二呈同行諸丈秋風俱白髮萬里錦城官箭貫雙雕易琴隨一鶴難國寬同是福民病獨何安前見乖崖老煩君舉似看遇風出陸金陵道中次程及甫韻留滯周南命使然莫疑上水逆風船鄉山故故隨人後客月依依墮我前半夜索樽同決計五更回柂不成眠筍輿吹面新涼入須信封姨正自賢次及甫韻送致逺别塞塵沒沒馬蕭蕭丗事今朝異昨朝為羡白鷗何浩蕩却思斥鴳亦逍遙平沙露磧江波斂逺樹明堤野霧銷快著扁舟歸教子勝渠滿屋貯胡椒九日復口涼邊未放菊花斑莫作重陽節物看就網買魚風露重推篷舉酒水天寬箭頭歲月離弦易局面功名下著難慙愧竟陵江上叟採菰搗黍鬢毛寒答程及甫徐少望客程欠舞綵衣斑懶把茱茰對酒看涼思著人窮腳健豐年到手老懷寬有風不怕江流逆無愧何憂蜀道難但願浣花花好在免教杜曲眼長寒宿柂頭次及甫入沌韻手遮西日望褒斜百折舟行尚玉沙風趂港回帆落柱草迷路斷牽收車長煙漠漠非吾土老樹離離似我家今夜宿頭應更好月明四面盡蘆花又答孫正叔萬里西風鴈影斜平安書到魯家沙遣愁白墮須行甕報喜烏邪又滿車老屋打頭思釣隱健艫銜尾認詩家道旁啁哳兒童説有腳陽春向浣花祖母哀挽二首我祖當家始零丁隻影存根芽惟大母枝葉又曽孫觸少心猶惕慈多語易溫德尊年亦稱消得誥花恩疊綵春風裏含飴愛獨深卷卷行已訓歷歷讀書針長憶違離語難酬侍養心微官稽執紼東望淚盈襟九月十八日夜泊劉郎浦二絶甥館劉郎舅仲謀並緣瓜葛借荆州人生一藉裙𥜗力卒丗如何得舉頭平生意氣壓曹瞞却為夫人石首縣有孫夫人臺鬢作斑堂上橫刀何足問五兵只在畫屏間風定船開夜泊柳子口上到荆州尚三程山逺江平眼為開楚樓西畔即陽臺金叉短笠風聲接蒸褁燋糟節物來雞喚客程三老起鴈將歸夢五更回白雲飛處西湖近應買霜螯試潑醅荆州江浮水燈作佛事誰把銀河徹砥傾倒翻星斗著行明又疑籠道紅梔子隱隱鳴鞘出五更江陵三海先聲壯重城大勢連竹為人丗界燈結水因緣風物詩囊裏英雄淚眼邊江平洲露碧沙市穩開船渚宫孤城銅斗匝枉渚玉環連柳老蟲穿蝕花殘蝶撲緣功名棊腹角勢利蜜中邊落日興亡裏誰同藥玉船又次及甫渚宫南樓風物逺西郭市聲連蠅虎寒窗搏蝸牛敗壁緣懷人喬木外吊古折荷邊冨貴今安在樵歸喚渡船艬船地與人相習天於水欲連柂迎斜岸轉笪避斷崖緣龜殼蹣􅘐砥羊腸詰曲邊幾年西蜀路無此鶴琴船次及甫即事萬里西征路同君汗漫期吳歈花裏曲楚些菊邊詞問學千雞跖功名五羖皮目前姑置此多辦峽江詩白羊同行五六登無盡墓入義方傳慶寺讀鍾離公所書兩句贈八瓊張子髙碑及吕公來訪事程教有詩次其韻鍾離權約同燒汞吕洞賔呼共屑瓊便合身隨笙鶴去砥須冠劒葬空塋墓前蒼幹直能竒勾引先生讀斷碑見説嘉禾曽有頌平生行止不須疑次及甫覺寒霜勒衾如水寒於客有期不成神女夢空賦外孫詞甕暖冝桑落冠涼怯竹皮懸知鄱水上冷落扊扅詩程鄱陽人舟中望南山次及甫韻水贏牽路漫水縮灘磧多涉丗正如許忠信平風波寒肩擁榾柮灰裏尋隂何舉頭見南山白雲生薜蘿青草夢詩後兩句早作足之乾馬坤牛放手騎縱橫上下盡通逵杖頭挑起東風海挂向東邊若木枝次及甫入峽雜詠峽口山隘留天少江迂占地多風梢猿自挂露草虎曽過坐客猶吳語行人盡楚歌川妃瀾浪甚著語試誰何十二培舍車不涉猢猻愁行舟未過蝦蟆培咸池樂部十二鍾六丁挈置巫山背鼇頭贔屭方壷裂鯨腹膨脝海門碎鑿開混沌尸者誰事逐浮雲墮茫昧平善埧水風靜處拋船易山雨晴時著句難便向箇中占好讖一程平善過雲安至喜亭巴峽頭邊第一州竹枝歌裏水東流蓋亭老柳今如此六一先生幾繫舟三遊洞二絶寥陽殿古瓊關啓祗樹園深寶蓋張長嘯一聲空響答只疑驚起橘中商披苔覔字雙明健倚樹商詩兩鬢皤地劃天開今幾丗往來人物盡消磨釣魚石翁刀耕火種皆丘甲背負腰纒盡算緍獨有石翁魚得計至今疑是避秦人蝦蟆培泉丹墀萬字中興䇿西蜀人材待細掄好把玉蜍留水去直言莫問近前嗔聖節日望拜黃牛祠前退讀衆碑感而有作蜀在八極間卦位西南坤萬里泝天險三峽為坤門巨靈擘太華飛出黃河源餘刃落巴山巉絶雷斧䀶衆崖束長江水石相吐吞轟豗九鼇戰洶湧萬馬奔髙低建瓴峻上下竹節繁操舟失毫氂虀粉千丈渾灘名鼎無義造物疑少恩黃牛壓其漘坐睨驚濤翻入門兩石馬耳缺蹄噭存行人紛乞靈熏燎迷旗幡摩挲幾豐碑颯沓箎應塤醉翁事巴怪無盡語不根黃能羽淵魄蒼牛離堆魂逞竒角異説終莫探厥原或指峽名揭或取山形蹲狼頭與鹿角胡不登脤膰五行土勝水似識丁壬婚爾牛何來思此義欠討論黃裳正坤色為牛亦坤元坤維闖其户職之廟貌尊叱吒遁蛟蜃麾訶走鼉黿駚湍危就夷怒石厲即溫神以順治險抑以靜制喧萬命脫谽谺神手司平反長年送迎神性瘠漓酒酸歸船詫靈賜意氣殊軒軒心安畫鷁穩目送征鴻騫哦詩紀行役霜風耿黃昏答及甫和束髮讀連山端倪識乾坤欲辨南北戒須窺越胡門藏書探禹穴乘槎窮靈源平生蓬矢志到處屐齒䀶腳方西湖脫眼已青丘吞長風一葦航急浪萬里奔易艬泝月峽訊程指新繁江行大玉篆星垂小銅渾風俗異東吳氣候如南恩青壁拔地起黃流從天翻身隨五兩動命恃百丈存山靈迎我來林影羅旌幡川妃導我去濤聲合鐘塤蛟龍蟄淵砥虎豹潛崖根間逢偓期語盡辟夔魍魂有祠扁汶川倚山坐平原已絶白狗渡尚望黃牛蹲要神楚懷糈賚福魯致膰力護重險濟兆應匪寇婚歐以異夢紀蘇以定分論君詩班其間壓倒白與元短窗箬葉蓬濁酒椰子尊肯來共吸鯨有味過解黿磴蘚挹曉潤巖葩借春溫郊丁趂虛集灘户射利喧巢雲屋鱗鱗鉏月坡反反棕花薦甘芳竹枝寫辛酸是中有佳趣所在留行軒胸次飫壯觀筆端快孤騫一朝簿書來能令目眵昏又用韻雲漢應地紀尾艮首起坤直坤導岷江略艮赴海門我家海之角我行江之源秋月幾改弦落漲頻移䀶金山手可挈牛渚氣欲吞追前趣倍道殿後虞䇿奔主賔會面適兒女問事繁船燈半悲喜村醪雜清渾王陽正懷親石洪未報恩飈帆鵬翼飽浪柂鷹尾翻姑熟人物逺秋浦風景存彭郎飫牲酒小姑豔幢幡兩磯峭植柱萬壑譁吹塤潯陽蕩波光赤壁盤雲根莫追白傅夢空招老坡魂黃鶴矗河漢南樓俯川原劉郎别浦橫孫媛荒臺蹲雄心漫衷甲餒魄誰薦膰吊古君雅志懷人兒新婚等為身名謀難以丗俗論沌口出百盤水府迷三元沙市俗更凋渚宫名徒尊樓艦郤長鯨艬舟進伏黿夷陵曉未霜秭歸冬猶溫玉虛想竒崛蓮碚辭囂喧楚些風骨變巴歌舌齶反屈平坐落寞昭君苦悲酸懸知鳯鎩翮不如鶴乘軒巫峯又鬱起赤甲方橫騫直登黃牛堡極目秦關昏十月晦過巫山二首巫峽逢𥘉度平生一假竒江山襟抱寫歲月鬢毛知神女翻旗下馮夷疊鼓隨直須豪舉酒棙柂不妨遲客裏年華老船頭日色曛天寒催雨雪地逺隔飛雲為吏徒三尺於民未一分重慙豪傑士度外立竒勳峽中清猿遺響落三巴樹老霜遲葉未霞大抵近南春易早梅花開盡又桃花八陳圖負卦龜藏尾鳴臯鶴引吭縱橫中左右竒正鋭圎方石挾孤忠在江輸宿恨長無人同領會搔首立斜陽益昌次費伯矩贈行韻五首浯水欲磨元結頌聊城未下魯連書靜中好與髙擡眼恐有英豪在草廬掎角中原二百州熟知彼已是良籌時賢所及都能幾清渭黃河祗自流朝氣風生暮氣歸將材零落事功微酸風斜谷祁山路眼砥何人插羽飛幕下精神清似水門前責望重於山君家文偉規摹在事業全歸靜定間快須滌硯入承明爛熳飛章拂太清冨貴功名元素定莫隨人後頌升平崔綿谷共賦亭次韻風度崔秋浦聲名鄭子真為便官事少不厭客來頻竹裏觥籌密花邊屐齒新拍欄誰得句喚起主林神詩告至李漢州驛奴莫問客為誰但報房湖水石知象鼻卷筒和月吸鳯膺橫玉倚風吹江淮消息愁端壓關洛功名老色欺陶寫此情須會得行厨催喚莫教遲參政李公以勤謹和緩勵後學江憲益以公廉忠信為八針因賦詩贈别百工聚一車百行根一誠反身物皆備動與誠俱行勤如轂下轉謹如軾前橫和緩以將之轡舞錫鸞鳴廉者欲之軫公者事之衡更當主忠信軸正箱自平是理誰獨無旦晝昏其明不誠故無物器窳轍易傾公材如大車致逺不計程八物攻且良悉由一誠生玉節天西南三峨軋峥嶸志雖屈乎位身已榮於名紹興博士翁四十辭簮纓慶鍾侍御史勇與雷霆爭清風激百丗須公亢家聲挾此八字針東歸侍延英次同年王火井晞鴻不遇之韻題遍慈恩最上層青雲塗轍幾人升一經秋雨禾方穟未到春風海亦冰閙裏功名多目論淡中氣味獨心朋蒼苔不掃芙蓉老有客𫾣門自出譍九日閲武預觀軍容退而紀事遨頭不管菊花寒簇隊晨登上將壇戲馬臺前千古事籌邊樓下萬人看弓聲瀏亮秋風徑旗采精明宿雨乾後部鐃歌歸較晚雪西烽火報平安酬吳教程丞六花結陳護輕寒緩帶西風夾谷壇破竹正期多算勝把茰何暇半酣看聲驅黑祲千山卷氣攝黃河一夜乾識得天津裴度面人心已作太山安送髙才卿守永康二首同社紛紛早上坡一麾獨愛晚婆娑矜春桃李好能幾飽雨稻梁收更多管攝三才還正大陶鎔萬象是中和西風未用輕分手尚欲從君細切磋岷峨悽愴未全蘇急要諸公著力扶政似刈葵難放手民如種樹莫搔膚雪山西去三邊靜沫水東來萬井腴小隊還家聊上冡天寒早與問無𥜗贈相士郭少仙崇蘭生深林淡泊一點芳江梅倚修竹醖藉萬斛香氣骨抱金玉精神貯冰霜若以色見我照紅還海棠水仙萬卉淨如掃風霜猶典刑睟容間整整姱節矯亭亭几滑銅熏鼎窗明石硯屏窈深人不到香觸夢魂醒鏡月酒後戲呈及甫判取琅璫醉贏教糊塗眠參橫梅下客月淡菊中仙成都學官有菊花仙祠舌在君何患尻髙我自憐岷峨如許碧強欲為人妍偶成有口只飲酒有眼只看書看書知古今治亂能愁豫不如一味飲醉眼昏蘧蘧梅兩絶玉佩瓊𥚑蕚緑華銅瓶清浸廣寒家客懷無著春風處醉向梢頭嚼盡花蒼枝老去蘚䀶乾喚起東風點暮寒會得生生無盡意雪花零亂月欄干答吳叔永叔長二絶刮霜面目淡無華落落孤山處士家若使丗間蜂蝶覺光風縱好不成花瓶笙吹徹硯蜍乾獨有梅花伴夜寒萬境空明香一點丗塵元自不相干答家朝南二絶竹光水色近宣華倣佛江南萬里家可是老諳春寂寞夜深無夢到梅花角聲悽惋笛聲乾獨立黃昏不奈寒未省半山梅在否東風歸路憶長干度劒有日髙永康以詩送行次韻紫巖護川陜號令賊膽寒客有屏山劉萬甲胸中蟠石湖牧參井遨頭黃金鞍亦有山隂陸春風迸詩肝主翁西清老羽扇元戎壇莫府若而人眼砥缺未完顧豫書生耳外強苦中乾從軍十年事未有半䇿干征笳蘆葉脆戍角梅花殘凄涼郾城月想像李與韓獨鶴發深省連雞激長嘆中原氣猶愴眉作醉裏攢君詩逺寄似語出秀可餐論事極痛快得之夢魂安御蜀知有法水曲鳴和鸞重過劒門衆水東瞿峽連山北劒門地非甘習坎天欲護全坤直上雲千尺中間月一䀶客懷無奈惡索酒自招魂答程教見和梅詩二絶一假清冰浸月華短籬踈竹是誰家春光元不分吳蜀驚見江南半樹花春隂欲雪凍雲乾索笑踈枝共一寒靜裏聞香祗自覺怕人饒舌似豐干和虞仲易送行二首霜曉滄江路梅花對此君清明涵止水變滅送浮雲論事強人意揮毫張我軍雍公衣鉢在好䇿後來勳歲月雙蓬鬢風沙一老兵氣惟慿義養命不與窮爭鼎正中邊沸船須左右平半籌無可畫空賦洗兵行次李閬州稟議三首訓狐蒼溪驛聞其聲甚妖厲五更忽轉如鈴鐸音是日立春矣頑民遷洛風隨改佞士歸唐操立更勿怪訓狐知氣轉銅丸落落便春聲立春日風千騎行春雪未消早乘羊角問逍遙明年好與供春帖淑景祥飈近九霄益昌長恨詩人挽不來東風無賴又帆開城南城北佳山水多少甘棠手自栽夢中得蕎粥詩覺而記其景聮墨雲吹雨落霜空滿地珊瑚樹樹紅老磨踏煙霏淅蔌鈍鐺奏火沸蒙茸寒江浪起雪飛外古嶂風鳴雲攪中識破太官羊氣味故山好處夢先通和程教元日韻曉雲三素過天東早送韶華入萬紅枍詣霜寒遲景轉昆明太液薄澌融憨癡官事龜生手泰定天光􅃮點瞳柏葉更須隨酒進醉鄉有地爵無功春風堂左偏鄭宣撫詩刻猶存程季允次韻亦賦寶峯翠壓小房櫳簾映平安候火紅寒送落梅吹雪外春隨細柳入雲中人情鬱處多思治天道還時只願豐賸辦從軍詩幾解為君管勾杏花風酬黎倅元夕淡黃巴月護簾櫳隨分芙蓉數點紅茶鼎擅埸文武火酒杯爭道聖賢中小遊退舍三邊靜甲子占晴二麥豐樂事賞心無過此不關花信幾畨風春日即事楊柳黃黃燕子來梅花落盡巳青梅一年春事閉門過萬里客懷呼酒開西土逖哉鴻鴈斷東方明矣子規催海棠多買燕宫本歸去家山手自栽再用韻黃妳扶春夢覺來禪心已墮老黃梅沾沾桃葉相先發寂寂梨花未肯開抱案併無鉗𥿄請索書時有打門催人生消得韶華幾兩鬢霜根不待栽春行野荼䕷發牡丹開蔌蔌楊花墮酒杯過盡韶華才一出祗應喚作探春來次程嶽州廷邁春行昨訪天梯佛龕今約烏奴汗血嘶風草正青眼中萬馬斂春埛檄書縱不煩師魯薦藁猶當出古靈杜若扶疏明逺渚荼䕷猗靡馥中庭天梯行遍烏奴去到手深杯莫暫停送王萬里赴闕安西老元戎再出護全蜀槃槃大幕府賔從如立竹狷者多調娛狂者間棖觸誰與得中行有美萬里獨正大一根氣義利兩孰復信人樂正子君子蘧伯玉春風半蕭艾秋雨幾薋菉劃然心眼明見此霜曉菊何人誦子虛燕説得舉燭平沙起孤鴻太液下黃鵠雲深閶闔啓天近觚稜矗牖明易納約井泄終受福楊柳細吹絮海棠豔成屋買酒鏖東風嘉陵江水緑再和廷邁步障晴絲夾道青土橋石磴向西埛李烏奴宅空懷古武阿婆祠懶乞靈杜宇一聲猶客路白雲萬里是親庭只應江水知人意東下何曽半息停草堂嚴武能詩甫亦詩詩名相軋便相疑思量丗上交遊事大似詩名更可知次虞憲日近即事五絶風落虛簷燕子聲屋頭屋尾菜花明爐熏燕坐參消息理本無虧莫望盈丙中甲上竒章石水砥山巔杜預碑矻矻一生圗不朽光風好處幾曽知衾寒更著癡兒踏背癢時令醜婦搔骨肉團欒窮亦好誰能膏火自煎熬急雨蕭蕭撼瓦溝夢隨潮落浙江頭倚門白髮遲歸信不為蓴絲爛熳秋梅桃結子緑隂濃饒與葵榴自在紅只有道根須猛進未甘四下二之中垂去鳯凰知細德鷗鳥識機心物理固如此丗情非特今足纓清與濁厲揭淺和深覺破從前夢長歌月滿襟送崔吉甫倅安康分韻得舍字孤松鬱澗砥老柏生石罅斗州漢水曲著此健别駕審固外體直為仁正如射萬事春冰融所貴過者化雷園陽關酒葵藥紛婭姹加餐時寄書相望無幾舍次李參政晚春湖上口占十絶褵褷瘦鶴耻乘軒踏遍莓苔十畒園欲下橫塘還決去漲䀶一尺晚來渾藉地殘花五色茵東風來去寂無䀶餘香不肯汙塵土留得蜂房活計溫一簾風雨攪黃昏歸思無邊客倚門烏賊江魚潮後市龍山漁浦渡頭村雨過桃花盡處源庭前新緑長芳蓀目前點檢燕支篆手汲清泉洗著樽屋角春聲幾樣翻勾牽春夢繞丘樊三桃二李成隂早恨不安仁老灌園濡需附勢幾崩奔獨抱離騷細討論萬事只慿方寸去剛風元不隔天關近山氣候易涼溫雲為隂晴半吐吞草木趍新千萬態藝藝何者是歸根緑隂羃定蔚藍天庭户蕭然有漏仙麥飯熟時蠶百箔山中啼鳥識豐年燕子將雛鹿養茸年華冉冉鬢成翁拂開萬古瞢騰眼多少英豪老彀中潼關殺氣渺春隂渭水泱泱柳色深為問草廬人起否漢家遺老尚謳吟朝南以詩送巴石研屏香几用韻天上何人修月斧巧將餘刃斫巴山玉蜍清浸婆娑影正在微雲點綴間首鼠年來困兩端石屏空照鬢絲斑歸舟莫道全無物分得蓬婆小雪山右研屏玉版橫陳醉眼邊尚餘金鴨水沉煙客窗寂寂那消得祗有南豐一瓣緣竹風吹酒未全醒夢入香爐五老雲好句得君青玉案起來盥手炷清熏右香几同孫子直和李參政東園韻十絶扶持吾黨誰為地保護斯文賴有天鼎欲大亨須玉鉉井於冽食定寒泉治國冝將治圃看墾除容易整齊難沼泉莫放源頭濁種竹先教地步寬破艦巳風方洶洶積薪未火又悠悠天公解管人間事甲子占晴穩有秋狂蝶正便春從臾好花猶怯冷禁持從渠歌徹鐵如意輸我興來金屈巵辦得蕭蕭水竹居閉門足了一生娛坐忘老子慵開眼強聒癡兒任挽鬚食肉玉關徒自苦然臍郿塢太生癡人心溪壑元無砥冨貴功名十二時院落深沉燕子歸應時納祐試春衣海棠過雨精神索楊柳無風力氣微大渡畫河餘玉斧祁山破賊只綸巾聖賢深意誰能會滿徑桃梅又著人孔明遁丗吟梁甫范蠡遭時䇿計然鍾鼎山林非二物莫隨窮逹較蚩妍露下三更月滿林鶴眠未警獨長吟芭蕉身丗都來幾天地中間要立心程廣文季允得崔西清薦詩來用韻古人輕國重一士士皆大吕黃鍾器道於天運主消長身為民生管榮悴五羊老仙用心古清不受塵如止水一肩直欲荷斯文兩眼從前識英偉歡然得士如得金甚矣愛賢猶愛已髙山流水甫點頭急電驚雷即燒尾天南天西各一握未見名流早傾意聲光蔚起摩日月氣類相求如鑒燧春風婭姹吹筆端毛嬙西施無粉膩咄哉婢子磨青銅雙頰晞紅欠才思珊瑚琢鈎珠結網錦署玉堂相望咫崔羣美莊居第一推轂好言良有味樂莫樂乎遇合新憂莫憂乎轇轕始柱撑大厦必衆木扶植太平須善類君不見黃河以北函關東無數赤子號悲風髙倅送糟蟹破故𥿄芽口占以謝無腸公子醉鄉徒風味元來蜀似吳便好挂門驅瘧鬼不須詩詠血模糊滿筥新芽輔骨脂雨䀶照眼碧離離功於枸𣏌菴藦似不是山人砥得知答髙才卿二絶煙波隻艇著吾徒蓴鱠秋風早憶吳左蟹右杯東計決醉來萬事付含糊脆勝芎苗軟勝脂雅冝碧碗貯流離渠渠地主恩何在骨裏黃金祗自知劉後溪和鷹湖即事詩十絶見示次韻誰家柳繫夜郎舟半月風顛估客愁起候五更風腳定安排篙楫放中流斷煙落日護林丘三數人家屋打頭見説春來寒更甚輔窗塞户勝防秋巴山深處一江流好著藏書百尺樓椳闑欂櫨渾易得杏梁桂柱若為求去年竈婦飽而腴今歲啼飢眼欲枯麥飯熟時猶逺在不多元氣急須扶夔人壁柵未曽修好事癡兒只浪遊草樹低迷風淅瀝於莵又在屋山頭金谷人家大謬悠春江自理送窮舟漁人拍手從旁笑淡飯粗衣過即休桔柏津頭訪昔遊夕陽衰草幾畨秋人心誰向忙中覺天理須從定處求雪花白盡沔山頭咽咽冰澌沔水流不見將軍闞如虎行人猶指定功樓槿花朝發夕而萎得失興亡揔一機古往今來磨不盡人間公是與公非中原離合數由天百戰關河血滿川日月赤雲占勝氣挂弓何處是祁連四月壬午發利州十里迎春地名水面開櫓聲不動柁聲催春山轉處疑江盡白鳥迎人曲折來兩岸騷騷麥尾黃茅簷半瓦蔭垂楊牧兒吹笛隨歸犢淺草平沙瞑色蒼漩口秃山束紆江寸土無平田麥登粟事起竟歲相周旋扶犂犖確間並驅從兩犍兩犍力不齊手胼後者鞭日暮鞭更急軛促肩領穿歸來茅屋下撫牛涕泗漣一飽弗易得奈此官租錢帽子簷水宿聚石樁長纜依沙插短艫日昏山虎下風急水鶬呼道豈隨時變人須出力扶仲由兒女見謂欲果乘桴發閬州二絶錦屏山後十二渡一渡一回商淺深前行戒後謹母忽淺處著腳深寒心木奴鎮山名夭矯二十里大似盤龍趍桂林中人薄暑遽如許覔樹依涼無好隂回龍寺松環蜀多冝柏回龍獨見松似驚前輩落忽與故人逢水石清髙骨風霜老退容更須堅晚節莫汙大夫封龜勝寺枸𣏌大如椽陳日華發其根而枯堂猶以地仙名地仙蛻骨歸何許獨有棕花三四樹鹿頭風月夜三更老厖吠入青雲去伏中宿冨樂山賞泉喚船絶芙蓉夾道森古柏碧天倚熏籠烈日發薌澤清涼奏水觀熱惱脫火宅石虬漱潺湲銀竹墮格磔林密天早昏巖擁地少窄坐久萬想定虛浸一奩白螢行露炯炯蛩語風䇿䇿胡床笛三弄所欠可人客還自益昌道得張伯修詩次韻劒外風煙老鬢華歸心更切獨孤遐明知東郭非吾土苦認西樓是我家萬古聲名供敝帚九州意氣付浮查同來蓬沓於潛女一笑長歌陌上花六月六日宿觀音寺次朝南韻二絶微管仲其左祍矣捨安石如蒼生何須君快草三秦檄盡為先生祛宿痾煮餅無奚徒自苦護篝有妾未為非為言示病維摩重也解天花散亂飛時崔制使頭風甚青渠追和宋金部壁間韻短亭放腳小軒渠從險趍平本一塗掌上煙川三百里蜀都風物似吳都汗青孰與老黃間能為君王把蜀山懊惱秋風吹客鬢一年三過劒門關幽芳晚涼倚窗觀稼魏城四十里晚風不動稻苗平葉葉頭邊沆瀣明井養不窮功用在誰將易象細推評飛明一點上苗端難作尋常露雨看碧眼道人參解得黃河夜半泝崑崙龍尾綿州西二十里淺磧苕花紫平畦芋梗紅瞑收漁筏雨涼入酒簾風客路三年夢官身兩鬢蓬誰知龍尾道却在鹿頭東關名食菜清晨薄采采風露拍滿篝漢中信可王新都亦冝侯王侯蜀以名菜甕菹氏諸葛籠炊字元修駢頭束翠鳯碎甲屠蒼虬下筯萬錢直轑釡千户謀暑寒久不厭暮蚤急易求相與共甘苦傾蓋成白頭厚味五兵媒文字葷羶仇移文東郭生母作肉食羞成都彘骨名東郭先生讀楞嚴人人有路證無還一念才差隔萬山識得吾儒無妄卦筏城長語盡須刪生朝前一日過隆慶十里得老人書中詩因用尊韻劒棧髙寒潦水空兒心片片趂歸鴻喜聞禪觀如黃蘖想見仙風過赤松利欲無厭騎鶴客功名有定賦狙翁萬鐘不博斑衣樂巳判身為邴曼容燈花太喜酒樽空客路真成印雪鴻出塞曲中迷灞滻籌邊圗裏認維松汗鞮虱胄心猶壯蓬矢桑弧鬢已翁東望只知歸計是輕舠苕霅采夫容次徐隆慶壽詩韻二首牛奮箕張小丙申熟知命駁不能純年來頗怪刀頭蜜老去難供席上珍闖靄千章森戟纛鏖風萬壑繹韶鈞劒山拾得商山橘醉共仙翁脯白麟史君筆斡萬牛回腳砥春風舌砥雷一夜劇談逢野閬百年髙誼見歐梅客心衮衮江流去老色翩翩歲事來墮地渠儂天巳定酒邊贏得笑顔開平齋文集卷第三
